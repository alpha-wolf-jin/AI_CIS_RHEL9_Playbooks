---
- name: Initialize meta data variables
  include_vars: cis_audit_var_6_2_2_1_1.yml

- name: "Req 01 - Check systemd-journald service active"
  ansible.builtin.shell: "systemctl is-active systemd-journald"
  args:
    executable: /bin/bash
  register: result_01
  failed_when: false
  changed_when: false

- name: "Set audit applicability fact"
  ansible.builtin.set_fact:
    audit_applicable: "{{ result_01.rc == 0 and result_01.stdout | default('') | trim == 'active' }}"

- name: "Req 02 - Check systemd-journal-remote installed"
  ansible.builtin.shell: "rpm -q systemd-journal-remote"
  args:
    executable: /bin/bash
  register: result_02
  failed_when: false
  changed_when: false
  when: audit_applicable | default(true) | bool

- name: "Set compliance status variables"
  ansible.builtin.set_fact:
    data_01: "{{ result_01.stdout | default('') | trim if audit_applicable else 'N/A' }}"
    status_01: "{{ 'NOT_APPLICABLE' if not audit_applicable else ('PASS' if result_01.rc == 0 else 'FAIL') }}"
    details_01: "{{ 'Journald not active, audit not applicable' if not audit_applicable else ('Service active' if result_01.rc == 0 else 'Service inactive') }}"
    data_02: "{{ result_02.stdout | default('') | trim if (result_02 is defined and audit_applicable) else 'N/A' }}"
    status_02: "{{ 'NOT_APPLICABLE' if not audit_applicable else (('PASS' if result_02.rc == 0 else 'FAIL') if result_02 is defined else 'SKIP') }}"
    details_02: "{{ 'Audit not applicable' if not audit_applicable else (('Package installed' if result_02.rc == 0 else 'Package not installed') if result_02 is defined else 'Not checked') }}"
    status_03: "{{ 'NOT_APPLICABLE' if not audit_applicable else ('PASS' if result_01.rc == 0 and (result_02 is defined and result_02.rc == 0) else 'FAIL') }}"
    details_03: "{{ 'Audit not applicable, journald not active' if not audit_applicable else ('Both requirements met' if result_01.rc == 0 and (result_02 is defined and result_02.rc == 0) else 'One or more requirements not met') }}"

- name: "Store final result in cis_result"
  ansible.builtin.set_fact:
    cis_result: "{{ status_03 }}"

- name: "Generate audit report"
  debug:
    msg:
    - "AUDIT REPORT — CIS 6.2.2.1.1"
    - "Reference: CIS Benchmark checkpoint 6.2.2.1.1"
    - ""
    - "REQUIREMENT 01 - {{ req_01 }}:"
    - "  Task: Req 01 - Check systemd-journald service active"
    - "  Command: systemctl is-active systemd-journald"
    - "  Exit code: {{ result_01.rc }}"
    - "  Data: {{ data_01 | trim }}"
    - "  Status: {{ status_01 | trim }}"
    - "  Details: {{ details_01 | trim }}"
    - ""
    - "REQUIREMENT 02 - {{ req_02 }}:"
    - "  Task: Req 02 - Check systemd-journal-remote installed"
    - "  Command: rpm -q systemd-journal-remote"
    - "  Exit code: {{ result_02.rc | default(-1) if audit_applicable else -1 }}"
    - "  Data: {{ data_02 | trim }}"
    - "  Status: {{ status_02 | trim }}"
    - "  Details: {{ details_02 | trim }}"
    - ""
    - "REQUIREMENT 03 - {{ req_03 }}:"
    - "  Task: Req 03 - Summarize compliance"
    - "  Command: N/A"
    - "  Exit code: -1"
    - "  Data: Overall compliance determined"
    - "  Status: {{ status_03 | trim }}"
    - "  Details: {{ details_03 | trim }}"
    - ""
    - "========================================================"
    - "OVERALL COMPLIANCE:"
    - "  Result: {{ cis_result | trim }}"
    - "  Details: {{ details_03 | trim }}"
    - "========================================================"
