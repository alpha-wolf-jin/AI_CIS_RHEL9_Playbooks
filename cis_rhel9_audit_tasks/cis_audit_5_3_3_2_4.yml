---
- name: Initialize meta data variables
  include_vars: cis_audit_var_5_3_3_2_4.yml

- name: "Initialize data variables"
  set_fact:
    data_01: "Not collected yet"
    status_01: "UNKNOWN"
    details_01: "Not evaluated"
    data_02: "Not collected yet"
    status_02: "UNKNOWN"
    details_02: "Not evaluated"
    data_03: "Not collected yet"
    status_03: "UNKNOWN"
    details_03: "Not evaluated"
    data_04: "Not collected yet"
    status_04: "UNKNOWN"
    details_04: "Not evaluated"
    data_05: "Not collected yet"
    status_05: "UNKNOWN"
    details_05: "Not evaluated"
    task_01_name: "Not executed"
    task_01_cmd: "N/A"
    task_01_rc: -1
  tags: [audit]
- name: "Req 01 - Check if libpwquality package is installed"
  shell: rpm -q libpwquality 2>/dev/null || dpkg -l libpwquality 2>/dev/null
  args:
    executable: /bin/bash
  register: result_01
  failed_when: false
  changed_when: false
  tags: [audit]
- name: "Store requirement 01 details"
  set_fact:
    task_01_name: "Check if libpwquality package is installed"
    task_01_cmd: "rpm -q libpwquality 2>/dev/null || dpkg -l libpwquality 2>/dev/null"
    task_01_rc: "{{ result_01.rc | default(-1) }}"
    data_01: "{{ result_01.stdout | default('') | trim }}"
    status_01: "{{ 'PASS' if result_01.rc | default(-1) == 0 else 'FAIL' | trim }}"
    details_01: "{{ 'Package found: ' + (result_01.stdout | default('') | trim) if result_01.rc | default(-1) == 0 else 'Package libpwquality not installed' | trim }}"
    libpwquality_installed: "{{ result_01.rc | default(-1) == 0 }}"
  tags: [audit]
- name: "Set remaining requirements to SKIPPED when libpwquality not installed"
  set_fact:
    status_02: "SKIPPED"
    details_02: "Prerequisite not met: libpwquality not installed"
    task_02_name: "Not executed - prerequisite missing"
    task_02_cmd: "N/A"
    task_02_rc: -1
    data_02: "N/A"
    status_03: "SKIPPED"
    details_03: "Prerequisite not met: libpwquality not installed"
    task_03_name: "Not executed - prerequisite missing"
    task_03_cmd: "N/A"
    task_03_rc: -1
    data_03: "N/A"
    status_04: "SKIPPED"
    details_04: "Prerequisite not met: libpwquality not installed"
    task_04_name: "Not executed - prerequisite missing"
    task_04_cmd: "N/A"
    task_04_rc: -1
    data_04: "N/A"
    status_05: "SKIPPED"
    details_05: "Audit not applicable: libpwquality not installed"
    task_05_name: "Overall compliance status"
    task_05_cmd: "N/A"
    task_05_rc: -1
    data_05: "NOT_APPLICABLE"
  when: "not libpwquality_installed"
  tags: [audit]
- block:
  - name: "Req 02 - Check maxrepeat setting in main pwquality.conf"
    shell: grep -Psi -- '^\h*maxrepeat\h*=\h*[1-3]\b' /etc/security/pwquality.conf
    args:
      executable: /bin/bash
    register: result_02
    failed_when: false
    changed_when: false
    tags: [audit]

  - name: "Store requirement 02 details"
    set_fact:
      task_02_name: "Check maxrepeat in /etc/security/pwquality.conf"
      task_02_cmd: |
        grep -Psi -- '^\h*maxrepeat\h*=\h*[1-3]\b' /etc/security/pwquality.conf
      task_02_rc: "{{ result_02.rc | default(-1) }}"
      data_02: "{{ result_02.stdout | default('') | trim }}"
      status_02: "{{ 'PASS' if (result_02.rc | default(-1) == 0 and (result_02.stdout | default('') | trim) != '') else 'FAIL' | trim }}"
      details_02: "{{ 'Setting found: ' + (result_02.stdout | default('') | trim) if (result_02.rc | default(-1) == 0 and (result_02.stdout | default('') | trim) != '') else 'No valid maxrepeat setting (1-3) found in main config' | trim }}"
    tags: [audit]

  - name: "Req 03 - Check maxrepeat setting in pwquality.conf.d directory"
    shell: grep -Psi -- '^\h*maxrepeat\h*=\h*[1-3]\b' /etc/security/pwquality.conf.d/*.conf
    args:
      executable: /bin/bash
    register: result_03
    failed_when: false
    changed_when: false
    tags: [audit]

  - name: "Store requirement 03 details"
    set_fact:
      task_03_name: "Check maxrepeat in /etc/security/pwquality.conf.d/*.conf"
      task_03_cmd: |
        grep -Psi -- '^\h*maxrepeat\h*=\h*[1-3]\b' /etc/security/pwquality.conf.d/*.conf
      task_03_rc: "{{ result_03.rc | default(-1) }}"
      data_03: "{{ result_03.stdout | default('') | trim }}"
      status_03: "{{ 'PASS' if (result_03.rc | default(-1) == 0 and (result_03.stdout | default('') | trim) != '') else 'FAIL' | trim }}"
      details_03: "{{ 'Setting found: ' + (result_03.stdout | default('') | trim) if (result_03.rc | default(-1) == 0 and (result_03.stdout | default('') | trim) != '') else 'No valid maxrepeat setting (1-3) found in .d conf files' | trim }}"
    tags: [audit]

  - name: "Req 04 - Verify no invalid maxrepeat in PAM configuration"
    shell: grep -Psi -- '^\h*password\h+(requisite|required|sufficient)\h+pam_pwquality\.so\h+([^#\n\r]+\h+)?maxrepeat\h*=\h*(0|[4-9]|[1-9][0-9]+)\b' /etc/pam.d/system-auth /etc/pam.d/password-auth
    args:
      executable: /bin/bash
    register: result_04
    failed_when: false
    changed_when: false
    tags: [audit]

  - name: "Store requirement 04 details"
    set_fact:
      task_04_name: "Check invalid maxrepeat in PAM configs"
      task_04_cmd: |
        grep -Psi -- '^\h*password\h+(requisite|required|sufficient)\h+pam_pwquality\.so\h+([^#\n\r]+\h+)?maxrepeat\h*=\h*(0|[4-9]|[1-9][0-9]+)\b' /etc/pam.d/system-auth /etc/pam.d/password-auth
      task_04_rc: "{{ result_04.rc | default(-1) }}"
      data_04: "{{ result_04.stdout | default('') | trim }}"
      status_04: "{{ 'PASS' if result_04.rc | default(-1) != 0 else 'FAIL' | trim }}"
      details_04: "{{ 'No invalid maxrepeat found in PAM configs' if result_04.rc | default(-1) != 0 else 'Invalid maxrepeat value(s) found in PAM configs: ' + (result_04.stdout | default('') | trim) | trim }}"
    tags: [audit]

  - name: "Req 05 - Compute overall compliance status"
    set_fact:
      compliance_pass: "{{ (status_02 == 'PASS' or status_03 == 'PASS') and status_04 == 'PASS' }}"
    tags: [audit]

  - name: "Store requirement 05 details"
    set_fact:
      task_05_name: "Overall compliance status"
      task_05_cmd: "N/A"
      task_05_rc: 0
      data_05: "{{ 'PASS' if compliance_pass else 'FAIL' }}"
      status_05: "{{ 'PASS' if compliance_pass else 'FAIL' | trim }}"
      details_05: "{{ 'All checks passed: maxrepeat is set to 1-3 and no conflicting PAM arguments.' if compliance_pass else 'One or more checks failed: ensure maxrepeat is configured in either /etc/security/pwquality.conf or a .d conf file with value 1-3, and no invalid maxrepeat arguments in PAM configs.' | trim }}"
    tags: [audit]

  when: libpwquality_installed | bool
  tags: [audit]
- name: "Set cis_result for final report"
  set_fact:
    cis_result: "{{ status_05 | trim }}"
  tags: [audit]
- name: "Generate audit report"
  debug:
    msg:
    - "AUDIT REPORT — CIS 5.3.3.2.4"
    - "Reference: CIS Benchmark checkpoint 5.3.3.2.4"
    - ""
    - "REQUIREMENT 01 - {{ req_01 }}:"
    - "  Task: {{ task_01_name | default('Not recorded') }}"
    - "  Command: {{ task_01_cmd | default('N/A') }}"
    - "  Exit code: {{ task_01_rc | default(-1) }}"
    - "  Data: {{ data_01 | default('') | trim }}"
    - "  Status: {{ status_01 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_01 | default('') | trim }}"
    - ""
    - "REQUIREMENT 02 - {{ req_02 }}:"
    - "  Task: {{ task_02_name | default('Not recorded') }}"
    - "  Command: {{ task_02_cmd | default('N/A') }}"
    - "  Exit code: {{ task_02_rc | default(-1) }}"
    - "  Data: {{ data_02 | default('') | trim }}"
    - "  Status: {{ status_02 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_02 | default('') | trim }}"
    - ""
    - "REQUIREMENT 03 - {{ req_03 }}:"
    - "  Task: {{ task_03_name | default('Not recorded') }}"
    - "  Command: {{ task_03_cmd | default('N/A') }}"
    - "  Exit code: {{ task_03_rc | default(-1) }}"
    - "  Data: {{ data_03 | default('') | trim }}"
    - "  Status: {{ status_03 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_03 | default('') | trim }}"
    - ""
    - "REQUIREMENT 04 - {{ req_04 }}:"
    - "  Task: {{ task_04_name | default('Not recorded') }}"
    - "  Command: {{ task_04_cmd | default('N/A') }}"
    - "  Exit code: {{ task_04_rc | default(-1) }}"
    - "  Data: {{ data_04 | default('') | trim }}"
    - "  Status: {{ status_04 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_04 | default('') | trim }}"
    - ""
    - "REQUIREMENT 05 - {{ req_05 }}:"
    - "  Task: {{ task_05_name | default('Not recorded') }}"
    - "  Command: {{ task_05_cmd | default('N/A') }}"
    - "  Exit code: {{ task_05_rc | default(-1) }}"
    - "  Data: {{ data_05 | default('') | trim }}"
    - "  Status: {{ status_05 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_05 | default('') | trim }}"
    - ""
    - "========================================================"
    - "OVERALL COMPLIANCE:"
    - "  Result: {{ cis_result | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_05 | default('Not evaluated') | trim }}"
    - "========================================================"
  tags: [audit]
