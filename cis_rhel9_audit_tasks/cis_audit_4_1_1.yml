---
- name: Initialize meta data variables
  include_vars: cis_audit_var_4_1_1.yml

- name: "Req 01 - Check nftables package installation"
  ansible.builtin.shell: "rpm -q nftables"
  args:
    executable: /bin/bash
  register: result_01
  failed_when: false
  changed_when: false

- name: "Store audit results for requirement 01"
  ansible.builtin.set_fact:
    task_01_name: "Check nftables package installation"
    task_01_cmd: "rpm -q nftables"
    task_01_rc: "{{ result_01.rc | default(-1) }}"
    data_01: "{{ result_01.stdout | default('') | trim }}"
    status_01: "{{ ('PASS' if (result_01.rc | default(-1) == 0 and (result_01.stdout | default('') | trim) != '') else 'SKIP' if ('package nftables is not installed' in (result_01.stderr | default('') | trim)) else 'FAIL') | trim }}"

- name: "Store requirement 02 details and overall compliance"
  ansible.builtin.set_fact:
    details_01: "{{ ('nftables is installed' if status_01 == 'PASS' else 'nftables is not installed (prerequisite not met)' if status_01 == 'SKIP' else 'Unexpected error during package check') | trim }}"
    task_02_name: "Generate audit report"
    task_02_cmd: "N/A"
    task_02_rc: 0
    data_02: "{{ (result_01.stdout | default('') | trim) if status_01 == 'PASS' else '' }}"
    status_02: "{{ status_01 }}"
    details_02: >-
      {% if status_01 == 'PASS' %}
        Overall compliance: PASS - nftables is installed
      {% elif status_01 == 'SKIP' %}
        Overall compliance: SKIP - nftables is not installed (prerequisite not met)
      {% else %}
        Overall compliance: FAIL - nftables check failed
      {% endif %}

- name: "Set cis_result and record requirement 03 details"
  ansible.builtin.set_fact:
    cis_result: "{{ status_02 | trim }}"
    task_03_name: "Set cis_result fact"
    task_03_cmd: "set_fact"
    task_03_rc: 0
    data_03: "cis_result = {{ status_02 | trim }}"
    status_03: "PASS"
    details_03: "cis_result set to {{ status_02 | trim }}"

- name: "Generate audit report"
  ansible.builtin.debug:
    msg:
    - "AUDIT REPORT — CIS 4.1.1"
    - "Reference: CIS Benchmark checkpoint 4.1.1"
    - ""
    - "REQUIREMENT 01 - {{ req_01 }}:"
    - "  Task: {{ task_01_name | default('Not recorded') }}"
    - "  Command: {{ task_01_cmd | default('N/A') }}"
    - "  Exit code: {{ task_01_rc | default(-1) }}"
    - "  Data: {{ data_01 | default('') | trim }}"
    - "  Status: {{ status_01 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_01 | default('') | trim }}"
    - ""
    - "REQUIREMENT 02 - {{ req_02 }}:"
    - "  Task: {{ task_02_name | default('Not recorded') }}"
    - "  Command: {{ task_02_cmd | default('N/A') }}"
    - "  Exit code: {{ task_02_rc | default(-1) }}"
    - "  Data: {{ data_02 | default('') | trim }}"
    - "  Status: {{ status_02 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_02 | default('') | trim }}"
    - ""
    - "REQUIREMENT 03 - {{ req_03 }}:"
    - "  Task: {{ task_03_name | default('Not recorded') }}"
    - "  Command: {{ task_03_cmd | default('N/A') }}"
    - "  Exit code: {{ task_03_rc | default(-1) }}"
    - "  Data: {{ data_03 | default('') | trim }}"
    - "  Status: {{ status_03 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_03 | default('') | trim }}"
    - ""
    - "========================================================"
    - "OVERALL COMPLIANCE:"
    - "  Result: {{ cis_result | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_02 | default('Not evaluated') | trim }}"
    - "========================================================"
