---
- name: Initialize meta data variables
  include_vars: cis_audit_var_7_1_7.yml

- name: "Initialize data variables"
  set_fact:
    data_01: "Not collected yet"
    status_01: "UNKNOWN"
    details_01: "Not evaluated"
    data_02: "Not collected yet"
    status_02: "UNKNOWN"
    details_02: "Not evaluated"
    data_03: "Not collected yet"
    status_03: "UNKNOWN"
    details_03: "Not evaluated"
    data_04: "Not collected yet"
    status_04: "UNKNOWN"
    details_04: "Not evaluated"
    data_05: "Not collected yet"
    status_05: "UNKNOWN"
    details_05: "Not evaluated"
    data_06: "Not collected yet"
    status_06: "UNKNOWN"
    details_06: "Not evaluated"
    task_01_name: "Not executed"
    task_01_cmd: "N/A"
    task_01_rc: -1
    task_02_name: "Not executed"
    task_02_cmd: "N/A"
    task_02_rc: -1
    task_03_name: "Not executed"
    task_03_cmd: "N/A"
    task_03_rc: -1
    task_04_name: "Not executed"
    task_04_cmd: "N/A"
    task_04_rc: -1
    task_05_name: "Not executed"
    task_05_cmd: "N/A"
    task_05_rc: -1
    task_06_name: "Not executed"
    task_06_cmd: "N/A"
    task_06_rc: -1

- name: "Req 01 - Check if /etc/gshadow exists and is a regular file"
  shell: |
    stat -Lc '%s' /etc/gshadow 2>/dev/null || echo 'NOT_FOUND'
  args:
    executable: /bin/bash
  register: result_01
  failed_when: false
  changed_when: false

- name: "Store requirement 01 details"
  set_fact:
    task_01_name: "Check if /etc/gshadow exists and is a regular file"
    task_01_cmd: "stat -Lc '%s' /etc/gshadow 2>/dev/null || echo 'NOT_FOUND'"
    task_01_rc: "{{ result_01.rc | default(-1) }}"
    data_01: "{{ result_01.stdout | default('') | trim }}"
    status_01: "{{ ('PASS' if (result_01.stdout | default('') | trim) | regex_search('^[0-9]+$') else 'FAIL') | trim }}"
    details_01: "{{ ('File exists and is a regular file' if (result_01.stdout | default('') | trim) | regex_search('^[0-9]+$') else 'File not found or not a regular file') | trim }}"

- name: "Req 02 - Check permissions on /etc/gshadow"
  shell: |
    stat -Lc 'Access: (%#a/%A)' /etc/gshadow
  args:
    executable: /bin/bash
  register: result_02
  failed_when: false
  changed_when: false

- name: "Store requirement 02 details"
  set_fact:
    task_02_name: "Check permissions on /etc/gshadow"
    task_02_cmd: "stat -Lc 'Access: (%#a/%A)' /etc/gshadow"
    task_02_rc: "{{ result_02.rc | default(-1) }}"
    data_02: "{{ result_02.stdout | default('') | trim }}"
    status_02: "{{ 'PASS' if (result_02.stdout | default('') | trim) == 'Access: (0/----------)' else 'FAIL' | trim }}"
    details_02: "{{ 'Permissions are correct (000)' if (result_02.stdout | default('') | trim) == 'Access: (0/----------)' else 'Permissions are incorrect' | trim }}"

- name: "Req 03 - Check UID ownership of /etc/gshadow"
  shell: |
    stat -Lc 'Uid: ( %u/ %U)' /etc/gshadow
  args:
    executable: /bin/bash
  register: result_03
  failed_when: false
  changed_when: false

- name: "Store requirement 03 details"
  set_fact:
    task_03_name: "Check UID ownership of /etc/gshadow"
    task_03_cmd: "stat -Lc 'Uid: ( %u/ %U)' /etc/gshadow"
    task_03_rc: "{{ result_03.rc | default(-1) }}"
    data_03: "{{ result_03.stdout | default('') | trim }}"
    status_03: "{{ 'PASS' if (result_03.stdout | default('') | trim) == 'Uid: ( 0/ root)' else 'FAIL' | trim }}"
    details_03: "{{ 'UID is root (0)' if (result_03.stdout | default('') | trim) == 'Uid: ( 0/ root)' else 'UID is not root' | trim }}"

- name: "Req 04 - Check GID ownership of /etc/gshadow"
  shell: |
    stat -Lc 'Gid: ( %g/ %G)' /etc/gshadow
  args:
    executable: /bin/bash
  register: result_04
  failed_when: false
  changed_when: false

- name: "Store requirement 04 details"
  set_fact:
    task_04_name: "Check GID ownership of /etc/gshadow"
    task_04_cmd: "stat -Lc 'Gid: ( %g/ %G)' /etc/gshadow"
    task_04_rc: "{{ result_04.rc | default(-1) }}"
    data_04: "{{ result_04.stdout | default('') | trim }}"
    status_04: "{{ 'PASS' if (result_04.stdout | default('') | trim) == 'Gid: ( 0/ root)' else 'FAIL' | trim }}"
    details_04: "{{ 'GID is root (0)' if (result_04.stdout | default('') | trim) == 'Gid: ( 0/ root)' else 'GID is not root' | trim }}"

- name: "Req 05 - Determine overall compliance"
  set_fact:
    task_05_name: "Summarize overall compliance"
    task_05_cmd: "N/A"
    task_05_rc: 0
    data_05: "{{ 'All checks passed' if (status_01 == 'PASS' and status_02 == 'PASS' and status_03 == 'PASS' and status_04 == 'PASS') else 'One or more checks failed' }}"
    status_05: "{{ 'PASS' if (status_01 == 'PASS' and status_02 == 'PASS' and status_03 == 'PASS' and status_04 == 'PASS') else 'FAIL' | trim }}"
    details_05: "{{ '/etc/gshadow is configured correctly' if (status_01 == 'PASS' and status_02 == 'PASS' and status_03 == 'PASS' and status_04 == 'PASS') else '/etc/gshadow is non-compliant' | trim }}"

- name: "Req 06 - Store cis_result"
  set_fact:
    cis_result: "{{ status_05 | default('UNKNOWN') }}"

- name: "Store requirement 06 details"
  set_fact:
    task_06_name: "Store cis_result"
    task_06_cmd: "set_fact: cis_result = {{ status_05 | default('UNKNOWN') }}"
    task_06_rc: 0
    data_06: "{{ status_05 | default('UNKNOWN') }}"
    status_06: "PASS"
    details_06: "cis_result set from overall compliance status"

- name: "Generate audit report"
  debug:
    msg:
    - "AUDIT REPORT — CIS 7.1.7"
    - "Reference: CIS Benchmark checkpoint 7.1.7"
    - ""
    - "REQUIREMENT 01 - {{ req_01 }}:"
    - "  Task: {{ task_01_name | default('Not recorded') }}"
    - "  Command: {{ task_01_cmd | default('N/A') }}"
    - "  Exit code: {{ task_01_rc | default(-1) }}"
    - "  Data: {{ data_01 | default('') | trim }}"
    - "  Status: {{ status_01 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_01 | default('') | trim }}"
    - ""
    - "REQUIREMENT 02 - {{ req_02 }}:"
    - "  Task: {{ task_02_name | default('Not recorded') }}"
    - "  Command: {{ task_02_cmd | default('N/A') }}"
    - "  Exit code: {{ task_02_rc | default(-1) }}"
    - "  Data: {{ data_02 | default('') | trim }}"
    - "  Status: {{ status_02 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_02 | default('') | trim }}"
    - ""
    - "REQUIREMENT 03 - {{ req_03 }}:"
    - "  Task: {{ task_03_name | default('Not recorded') }}"
    - "  Command: {{ task_03_cmd | default('N/A') }}"
    - "  Exit code: {{ task_03_rc | default(-1) }}"
    - "  Data: {{ data_03 | default('') | trim }}"
    - "  Status: {{ status_03 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_03 | default('') | trim }}"
    - ""
    - "REQUIREMENT 04 - {{ req_04 }}:"
    - "  Task: {{ task_04_name | default('Not recorded') }}"
    - "  Command: {{ task_04_cmd | default('N/A') }}"
    - "  Exit code: {{ task_04_rc | default(-1) }}"
    - "  Data: {{ data_04 | default('') | trim }}"
    - "  Status: {{ status_04 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_04 | default('') | trim }}"
    - ""
    - "REQUIREMENT 05 - {{ req_05 }}:"
    - "  Task: {{ task_05_name | default('Not recorded') }}"
    - "  Command: {{ task_05_cmd | default('N/A') }}"
    - "  Exit code: {{ task_05_rc | default(-1) }}"
    - "  Data: {{ data_05 | default('') | trim }}"
    - "  Status: {{ status_05 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_05 | default('') | trim }}"
    - ""
    - "REQUIREMENT 06 - {{ req_06 }}:"
    - "  Task: {{ task_06_name | default('Not recorded') }}"
    - "  Command: {{ task_06_cmd | default('N/A') }}"
    - "  Exit code: {{ task_06_rc | default(-1) }}"
    - "  Data: {{ data_06 | default('') | trim }}"
    - "  Status: {{ status_06 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_06 | default('') | trim }}"
    - ""
    - "========================================================"
    - "OVERALL COMPLIANCE:"
    - "  Result: {{ cis_result | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_05 | default('Not evaluated') | trim }}"
    - "========================================================"
