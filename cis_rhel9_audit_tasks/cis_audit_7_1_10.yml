---
- name: Initialize meta data variables
  include_vars: cis_audit_var_7_1_10.yml

- name: "Req 01 - Audit {{ opasswd_file }}"
  ansible.builtin.shell: "stat -Lc '%n Access: (%#a/%A)  Uid: ( %u/ %U) Gid: ( %g/ %G)' {{ opasswd_file }} 2>/dev/null || true"
  args:
    executable: /bin/bash
  register: opasswd_audit
  failed_when: false
  changed_when: false

- name: "Req 01 - Audit {{ opasswd_old_file }}"
  ansible.builtin.shell: "stat -Lc '%n Access: (%#a/%A)  Uid: ( %u/ %U) Gid: ( %g/ %G)' {{ opasswd_old_file }} 2>/dev/null || true"
  args:
    executable: /bin/bash
  register: opasswd_old_audit
  failed_when: false
  changed_when: false

- name: "Store requirement 01 details"
  set_fact:
    data_01: |
      {{ opasswd_audit.stdout | default('') | trim + '\n' + opasswd_old_audit.stdout | default('') | trim }}
    status_01: "{{ 'PASS' }}"
    task_01_name: "Audit /etc/security/opasswd and opasswd.old"
    task_01_cmd: "stat -Lc '%n Access: (%#a/%A)  Uid: ( %u/ %U) Gid: ( %g/ %G)' /etc/security/opasswd (and .old)"
    task_01_rc: "0"
    details_01: "Audit commands executed successfully (output captured)"

    # ==========================================================================
    # Requirement 02: Evaluate compliance using Ansible stat module (no regex)
# ==========================================================================
- name: "Req 02 - Stat {{ opasswd_file }}"
  ansible.builtin.stat:
    path: "{{ opasswd_file }}"
  register: opasswd_stat
  failed_when: false

- name: "Req 02 - Stat {{ opasswd_old_file }}"
  ansible.builtin.stat:
    path: "{{ opasswd_old_file }}"
  register: opasswd_old_stat
  failed_when: false

- name: "Req 02 - Evaluate compliance for {{ opasswd_file }}"
  set_fact:
    opasswd_compliant: >-
      {{ not opasswd_stat.stat.exists or
         (opasswd_stat.stat.mode == '0600' and opasswd_stat.stat.uid == 0 and opasswd_stat.stat.gid == 0) }}

- name: "Req 02 - Evaluate compliance for {{ opasswd_old_file }}"
  set_fact:
    opasswd_old_compliant: >-
      {{ not opasswd_old_stat.stat.exists or
         (opasswd_old_stat.stat.mode == '0600' and opasswd_old_stat.stat.uid == 0 and opasswd_old_stat.stat.gid == 0) }}

- name: "Req 02 - Summarise overall compliance status"
  set_fact:
    status_02: "{{ ('PASS' if (opasswd_compliant | default(false) | bool) and (opasswd_old_compliant | default(false) | bool) else 'FAIL') | trim }}"
    data_02: "opasswd compliant: {{ opasswd_compliant | default('undefined') }}, opasswd.old compliant: {{ opasswd_old_compliant | default('undefined') }}"
    details_02: "{{ ('Both files compliant or absent' if (opasswd_compliant | default(false) | bool) and (opasswd_old_compliant | default(false) | bool) else 'One or more files non-compliant') | trim }}"
    task_02_name: "Compliance evaluation using stat module"
    task_02_cmd: "ansible.builtin.stat on /etc/security/opasswd and /etc/security/opasswd.old"
    task_02_rc: "0"

    # ==========================================================================
    # Store final audit result in cis_result (Requirement 3 feedback fix)
# ==========================================================================
- name: "Store final audit result as cis_result"
  set_fact:
    cis_result: "{{ status_02 | default('UNKNOWN') | trim }}"

    # ==========================================================================
    # Requirement 03: Generate audit report (final task)
# ==========================================================================
- name: "Generate audit report"
  debug:
    msg:
    - "AUDIT REPORT — CIS 7.1.10"
    - "Reference: CIS Benchmark checkpoint 7.1.10"
    - ""
    - "REQUIREMENT 01 - {{ req_01 }}:"
    - "  Task: {{ task_01_name }}"
    - "  Command: {{ task_01_cmd }}"
    - "  Exit code: {{ task_01_rc }}"
    - "  Data: {{ data_01 | default('') | trim }}"
    - "  Status: {{ status_01 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_01 }}"
    - ""
    - "REQUIREMENT 02 - {{ req_02 }}:"
    - "  Task: {{ task_02_name }}"
    - "  Command: {{ task_02_cmd }}"
    - "  Exit code: {{ task_02_rc }}"
    - "  Data: {{ data_02 | default('') | trim }}"
    - "  Status: {{ status_02 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_02 }}"
    - ""
    - "========================================================"
    - "OVERALL COMPLIANCE:"
    - "  Result: {{ cis_result | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_02 | default('Not evaluated') | trim }}"
    - "========================================================"
