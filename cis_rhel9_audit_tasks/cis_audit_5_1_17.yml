---
- name: Initialize meta data variables
  include_vars: cis_audit_var_5_1_17.yml

- name: "Initialize data variables"
  set_fact:
    data_01: "Not collected yet"
    status_01: "ERROR"
    details_01: "Not evaluated"
    data_02: "Not collected yet"
    status_02: "ERROR"
    details_02: "Not evaluated"
    data_03: "Not collected yet"
    status_03: "ERROR"
    details_03: "Not evaluated"
    data_04: "Not collected yet"
    status_04: "ERROR"
    details_04: "Not evaluated"
    data_05: "Not collected yet"
    status_05: "ERROR"
    details_05: "Not evaluated"
    task_01_name: "Not executed"
    task_01_cmd: "N/A"
    task_01_rc: -1
    task_02_name: "Not executed"
    task_02_cmd: "N/A"
    task_02_rc: -1
    task_03_name: "Not executed"
    task_03_cmd: "N/A"
    task_03_rc: -1
    task_04_name: "Not executed"
    task_04_cmd: "N/A"
    task_04_rc: -1
    task_05_name: "Not executed"
    task_05_cmd: "N/A"
    task_05_rc: -1

- name: "Req 01 - Check if OpenSSH server is installed"
  ansible.builtin.shell: dpkg -l | grep -q openssh-server || rpm -q openssh-server 2>/dev/null
  args:
    executable: /bin/bash
  register: result_01
  failed_when: false
  changed_when: false

- name: "Set facts for requirement 01 and sshd installation status"
  set_fact:
    sshd_installed: "{{ result_01.rc == 0 }}"
    task_01_name: "Check if OpenSSH server is installed"
    task_01_cmd: "dpkg -l | grep -q openssh-server || rpm -q openssh-server 2>/dev/null"
    task_01_rc: "{{ result_01.rc | default(-1) }}"
    data_01: "{{ result_01.stdout | default('') | trim }}"
    status_01: "{{ 'PASS' if result_01.rc == 0 else 'SKIP' }}"
    details_01: >-
      {{ 'OpenSSH server is installed' if result_01.rc == 0 else 'OpenSSH server is not installed - further checks will be skipped' }}

- name: "Req 02 - Check if sshd service is running"
  ansible.builtin.shell: systemctl is-active sshd 2>/dev/null || service sshd status 2>/dev/null
  args:
    executable: /bin/bash
  register: result_02
  failed_when: false
  changed_when: false

- name: "Set facts for requirement 02 and sshd running status"
  set_fact:
    sshd_running: "{{ result_02.rc == 0 }}"
    task_02_name: "Check if sshd service is running"
    task_02_cmd: "systemctl is-active sshd 2>/dev/null || service sshd status 2>/dev/null"
    task_02_rc: "{{ result_02.rc | default(-1) }}"
    data_02: "{{ result_02.stdout | default('') | trim }}"
    status_02: "{{ 'PASS' if result_02.rc == 0 else 'SKIP' }}"
    details_02: >-
      {{ 'sshd service is running' if result_02.rc == 0 else 'sshd service is not running - further checks will be skipped' }}

- name: "Req 03 - Check MaxStartups parameter"
  ansible.builtin.shell: |
    {% raw %}
    sshd -T | awk '$1 ~ /^\s*maxstartups/{split($2, a, ":");{if(a[1] > 10 || a[2] > 30 || a[3] > 60) print $0}}'
    {% endraw %}
  args:
    executable: /bin/bash
  when: sshd_installed | bool and sshd_running | bool
  register: result_03
  failed_when: false
  changed_when: false

- name: "Set facts for requirement 03"
  set_fact:
    task_03_name: "Check MaxStartups parameter configuration"
    task_03_cmd: |
      sshd -T | awk '$1 ~ /^\\s*maxstartups/{split($2, a, ":");{if(a[1] > 10 || a[2] > 30 || a[3] > 60) print $0}}'
    task_03_rc: "{{ result_03.rc | default(-1) if sshd_installed | bool and sshd_running | bool else -1 }}"
    data_03: "{{ result_03.stdout | default('') | trim if sshd_installed | bool and sshd_running | bool else '' }}"
    status_03: >-
      {{ ('PASS' if (sshd_installed | bool and sshd_running | bool and
                     (result_03.stdout | default('') | trim) == '') else
         ('FAIL' if (sshd_installed | bool and sshd_running | bool) else
         'SKIP')) | trim }}
    details_03: >-
      {{ ('MaxStartups is configured correctly' if (sshd_installed | bool and sshd_running | bool and
                                                    (result_03.stdout | default('') | trim) == '') else
         ('MaxStartups is not configured correctly' if (sshd_installed | bool and sshd_running | bool) else
         'Not applicable - OpenSSH server not installed or not running')) | trim }}

- name: "Req 04 - Summarize overall compliance status"
  set_fact:
    task_04_name: "Summarize overall compliance"
    task_04_cmd: "N/A"
    task_04_rc: -1
    data_04: "Overall result"
    status_04: >-
      {{ ('PASS' if (sshd_installed | bool and sshd_running | bool and status_03 == 'PASS') else
         ('FAIL' if (sshd_installed | bool and sshd_running | bool) else
         'SKIP')) | trim }}
    details_04: >-
      {{ ('System is compliant' if (sshd_installed | bool and sshd_running | bool and status_03 == 'PASS') else
         ('System is non-compliant' if (sshd_installed | bool and sshd_running | bool) else
         'Not applicable - OpenSSH server not installed or not running')) | trim }}

- name: "Req 05 - Store final audit result in cis_result"
  set_fact:
    cis_result: "{{ status_04 }}"
    task_05_name: "Store final audit result"
    task_05_cmd: "set_fact"
    task_05_rc: 0
    data_05: "cis_result = {{ status_04 }}"
    status_05: "{{ status_04 }}"
    details_05: "Overall compliance status stored in cis_result"

- name: "Generate audit report"
  debug:
    msg:
    - "AUDIT REPORT — CIS 5.1.17"
    - "Reference: CIS Benchmark checkpoint 5.1.17"
    - ""
    - "REQUIREMENT 01 - {{ req_01 }}:"
    - "  Task: {{ task_01_name | default('Not recorded') }}"
    - "  Command: {{ task_01_cmd | default('N/A') }}"
    - "  Exit code: {{ task_01_rc | default(-1) }}"
    - "  Data: {{ data_01 | default('') | trim }}"
    - "  Status: {{ status_01 | default('ERROR') | trim }}"
    - "  Details: {{ details_01 | default('') | trim }}"
    - ""
    - "REQUIREMENT 02 - {{ req_02 }}:"
    - "  Task: {{ task_02_name | default('Not recorded') }}"
    - "  Command: {{ task_02_cmd | default('N/A') }}"
    - "  Exit code: {{ task_02_rc | default(-1) }}"
    - "  Data: {{ data_02 | default('') | trim }}"
    - "  Status: {{ status_02 | default('ERROR') | trim }}"
    - "  Details: {{ details_02 | default('') | trim }}"
    - ""
    - "REQUIREMENT 03 - {{ req_03 }}:"
    - "  Task: {{ task_03_name | default('Not recorded') }}"
    - "  Command: {{ task_03_cmd | default('N/A') }}"
    - "  Exit code: {{ task_03_rc | default(-1) }}"
    - "  Data: {{ data_03 | default('') | trim }}"
    - "  Status: {{ status_03 | default('ERROR') | trim }}"
    - "  Details: {{ details_03 | default('') | trim }}"
    - ""
    - "REQUIREMENT 04 - {{ req_04 }}:"
    - "  Task: {{ task_04_name | default('Not recorded') }}"
    - "  Command: {{ task_04_cmd | default('N/A') }}"
    - "  Exit code: {{ task_04_rc | default(-1) }}"
    - "  Data: {{ data_04 | default('') | trim }}"
    - "  Status: {{ status_04 | default('ERROR') | trim }}"
    - "  Details: {{ details_04 | default('') | trim }}"
    - ""
    - "REQUIREMENT 05 - {{ req_05 }}:"
    - "  Task: {{ task_05_name | default('Not recorded') }}"
    - "  Command: {{ task_05_cmd | default('N/A') }}"
    - "  Exit code: {{ task_05_rc | default(-1) }}"
    - "  Data: {{ data_05 | default('') | trim }}"
    - "  Status: {{ status_05 | default('ERROR') | trim }}"
    - "  Details: {{ details_05 | default('') | trim }}"
    - ""
    - "========================================================"
    - "OVERALL COMPLIANCE:"
    - "  Result: {{ cis_result | default('ERROR') | trim }}"
    - "  Details: {{ details_04 | default('Not evaluated') | trim }}"
    - "========================================================"
