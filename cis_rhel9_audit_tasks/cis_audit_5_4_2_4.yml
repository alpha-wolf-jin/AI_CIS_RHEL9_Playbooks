---
- name: Initialize meta data variables
  include_vars: cis_audit_var_5_4_2_4.yml

- name: "Initialize data variables"
  ansible.builtin.set_fact:
    data_01: "Not collected yet"
    status_01: "ERROR"
    details_01: "Not evaluated"
    data_02: "Not collected yet"
    status_02: "ERROR"
    details_02: "Not evaluated"
    data_03: "Not collected yet"
    status_03: "ERROR"
    details_03: "Not evaluated"
    data_04: "Not collected yet"
    status_04: "ERROR"
    details_04: "Not evaluated"
    task_01_name: "Not executed"
    task_01_cmd: "N/A"
    task_01_rc: -1
    task_02_name: "Not executed"
    task_02_cmd: "N/A"
    task_02_rc: -1
    task_03_name: "Not executed"
    task_03_cmd: "N/A"
    task_03_rc: -1
    task_04_name: "Not executed"
    task_04_cmd: "N/A"
    task_04_rc: -1

- name: "Req 1 - Check if root user exists"
  ansible.builtin.command: id root
  register: result_01
  failed_when: false
  changed_when: false

- name: "Store requirement 01 details"
  ansible.builtin.set_fact:
    task_01_name: "Check if root user exists"
    task_01_cmd: "id root"
    task_01_rc: "{{ result_01.rc | default(-1) }}"
    data_01: "{{ result_01.stdout | default('') | trim }}"
    status_01: "{{ 'PASS' if result_01.rc | default(-1) == 0 else 'FAIL' }}"
    details_01: "{{ 'Root user exists' if result_01.rc | default(-1) == 0 else 'Root user does not exist' }}"

- name: "Req 2 - Check root account password status"
  ansible.builtin.shell: |
    {% raw %}
    passwd -S root | awk '$2 ~ /^P/ {print "User: \""$1"\" Password is set"} $2 ~ /^L/ {print "Password locked."}'
    {% endraw %}
  args:
    executable: /bin/bash
  register: result_02_raw
  failed_when: false
  changed_when: false
  when: result_01.rc == 0

- name: "Store requirement 02 details"
  ansible.builtin.set_fact:
    task_02_name: "Check root account password status"
    task_02_cmd: "{{ req_02_command }}"
    task_02_rc: >-
      {%- if result_01.rc != 0 -%}
        -1
      {%- elif result_02_raw is defined -%}
        {{ result_02_raw.rc | default(-1) }}
      {%- else -%}
        -1
      {%- endif -%}
    data_02: >-
      {%- if result_01.rc != 0 -%}
        SKIP: Root user does not exist
      {%- elif result_02_raw is defined and result_02_raw.rc == 127 -%}
        SKIP: passwd command not found
      {%- elif result_02_raw.stdout | default('') | trim != '' -%}
        {{ result_02_raw.stdout | trim }}
      {%- else -%}
        (no output - password not set nor locked)
      {%- endif -%}
    status_02: >-
      {%- if result_01.rc != 0 -%}
        SKIP
      {%- elif result_02_raw is defined and result_02_raw.rc == 127 -%}
        SKIP
      {%- elif result_02_raw.stdout | default('') | trim != '' -%}
        PASS
      {%- else -%}
        FAIL
      {%- endif -%}
    details_02: >-
      {%- if result_01.rc != 0 -%}
        SKIP: Root user does not exist
      {%- elif result_02_raw is defined and result_02_raw.rc == 127 -%}
        SKIP: passwd command not available
      {%- elif result_02_raw.stdout | default('') | trim != '' -%}
        Root password is set or locked: {{ result_02_raw.stdout | trim }}
      {%- else -%}
        FAIL: Root password is not set nor locked
      {%- endif -%}

- name: "Req 3 - Determine overall compliance"
  ansible.builtin.set_fact:
    task_03_name: "Summarize overall compliance"
    task_03_cmd: "N/A"
    task_03_rc: 0
    data_03: "{{ status_01 | trim }} / {{ status_02 | trim }}"
    status_03: >-
      {%- if status_01 | trim == 'FAIL' -%}
        SKIP
      {%- elif status_02 | trim == 'PASS' -%}
        PASS
      {%- elif status_02 | trim == 'SKIP' -%}
        SKIP
      {%- else -%}
        FAIL
      {%- endif -%}
    details_03: >-
      {%- if status_01 | trim == 'FAIL' -%}
        SKIP: Root user does not exist
      {%- elif status_02 | trim == 'PASS' -%}
        PASS: Root password is set or account is locked
      {%- elif status_02 | trim == 'SKIP' -%}
        SKIP: Prerequisite not met (passwd command missing)
      {%- else -%}
        FAIL: Root account exists but password is not set nor locked
      {%- endif -%}

- name: "Store cis_result"
  ansible.builtin.set_fact:
    cis_result: "{{ status_03 | trim }}"

- name: "Req 4 - Store final audit result details"
  ansible.builtin.set_fact:
    task_04_name: "Store final audit result in cis_result"
    task_04_cmd: "N/A"
    task_04_rc: 0
    data_04: "{{ cis_result | default('ERROR') | trim }}"
    status_04: "{{ cis_result | default('ERROR') | trim }}"
    details_04: "{{ details_03 | default('Not evaluated') | trim }}"

- name: "Generate audit report"
  debug:
    msg:
    - "AUDIT REPORT — CIS 5.4.2.4"
    - "Reference: CIS Benchmark checkpoint 5.4.2.4"
    - ""
    - "REQUIREMENT 01 - {{ req_01 }}:"
    - "  Task: {{ task_01_name | default('Not recorded') }}"
    - "  Command: {{ task_01_cmd | default('N/A') }}"
    - "  Exit code: {{ task_01_rc | default(-1) }}"
    - "  Data: {{ data_01 | default('') | trim }}"
    - "  Status: {{ status_01 | default('ERROR') | trim }}"
    - "  Details: {{ details_01 | default('') | trim }}"
    - ""
    - "REQUIREMENT 02 - {{ req_02 }}:"
    - "  Task: {{ task_02_name | default('Not recorded') }}"
    - "  Command: {{ task_02_cmd | default('N/A') }}"
    - "  Exit code: {{ task_02_rc | default(-1) }}"
    - "  Data: {{ data_02 | default('') | trim }}"
    - "  Status: {{ status_02 | default('ERROR') | trim }}"
    - "  Details: {{ details_02 | default('') | trim }}"
    - ""
    - "REQUIREMENT 03 - {{ req_03 }}:"
    - "  Task: {{ task_03_name | default('Not recorded') }}"
    - "  Command: {{ task_03_cmd | default('N/A') }}"
    - "  Exit code: {{ task_03_rc | default(-1) }}"
    - "  Data: {{ data_03 | default('') | trim }}"
    - "  Status: {{ status_03 | default('ERROR') | trim }}"
    - "  Details: {{ details_03 | default('') | trim }}"
    - ""
    - "REQUIREMENT 04 - {{ req_04 }}:"
    - "  Task: {{ task_04_name | default('Not recorded') }}"
    - "  Command: {{ task_04_cmd | default('N/A') }}"
    - "  Exit code: {{ task_04_rc | default(-1) }}"
    - "  Data: {{ data_04 | default('') | trim }}"
    - "  Status: {{ status_04 | default('ERROR') | trim }}"
    - "  Details: {{ details_04 | default('') | trim }}"
    - ""
    - "========================================================"
    - "OVERALL COMPLIANCE:"
    - "  Result: {{ cis_result | default('ERROR') | trim }}"
    - "========================================================"
