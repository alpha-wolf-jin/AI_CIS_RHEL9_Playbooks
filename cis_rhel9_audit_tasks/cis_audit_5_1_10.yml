---
- name: Initialize meta data variables
  include_vars: cis_audit_var_5_1_10.yml

- name: "Initialize data variables"
  ansible.builtin.set_fact:
    data_01: "Not collected yet"
    status_01: "UNKNOWN"
    details_01: "Not evaluated"
    data_02: "Not collected yet"
    status_02: "UNKNOWN"
    details_02: "Not evaluated"
    data_03: "Not collected yet"
    status_03: "UNKNOWN"
    details_03: "Not evaluated"
    data_04: "Not collected yet"
    status_04: "UNKNOWN"
    details_04: "Not evaluated"
    data_05: "Not collected yet"
    status_05: "UNKNOWN"
    details_05: "Not evaluated"
    data_06: "Not collected yet"
    status_06: "UNKNOWN"
    details_06: "Not evaluated"
    task_01_name: "Not executed"
    task_01_cmd: "N/A"
    task_01_rc: -1
    task_02_name: "Not executed"
    task_02_cmd: "N/A"
    task_02_rc: -1
    task_03_name: "Not executed"
    task_03_cmd: "N/A"
    task_03_rc: -1
    task_04_name: "Not executed"
    task_04_cmd: "N/A"
    task_04_rc: -1
    task_05_name: "Not executed"
    task_05_cmd: "N/A"
    task_05_rc: -1
    task_06_name: "Not executed"
    task_06_cmd: "N/A"
    task_06_rc: -1

# Requirement 1
- name: "Req 01 - Check if OpenSSH server is installed"
  ansible.builtin.shell: "dpkg -l | grep -q openssh-server || rpm -q openssh-server 2>/dev/null"
  args:
    executable: /bin/bash
  register: result_01
  failed_when: false
  changed_when: false

- name: "Store requirement 01 details"
  ansible.builtin.set_fact:
    data_01: "{{ result_01.stdout | default('') | trim }}"
    status_01: >-
      {%- if result_01.rc | default(-1) == 0 -%}
        PASS
      {%- else -%}
        SKIP
      {%- endif -%}
    details_01: >-
      {%- if result_01.rc | default(-1) == 0 -%}
        OpenSSH server is installed
      {%- else -%}
        OpenSSH server is not installed
      {%- endif -%}
    task_01_name: "Req 01 - Check if OpenSSH server is installed"
    task_01_cmd: "dpkg -l | grep -q openssh-server || rpm -q openssh-server 2>/dev/null"
    task_01_rc: "{{ result_01.rc | default(-1) }}"
    sshd_installed: "{{ result_01.rc | default(-1) == 0 }}"

# Requirement 2
- name: "Req 02 - Check if sshd is running"
  ansible.builtin.shell: "systemctl is-active sshd 2>/dev/null || service sshd status 2>/dev/null"
  args:
    executable: /bin/bash
  register: result_02
  failed_when: false
  changed_when: false
  when: "sshd_installed | default(false) | bool"

- name: "Store requirement 02 details"
  ansible.builtin.set_fact:
    data_02: "{{ (result_02.stdout | default('') | trim) if (sshd_installed | default(false) | bool) else 'N/A' }}"
    status_02: >-
      {%- if not (sshd_installed | default(false) | bool) -%}
        SKIP
      {%- elif result_02.stdout | default('') | trim == 'active' -%}
        PASS
      {%- else -%}
        FAIL
      {%- endif -%}
    details_02: >-
      {%- if not (sshd_installed | default(false) | bool) -%}
        sshd is not installed
      {%- elif result_02.stdout | default('') | trim == 'active' -%}
        sshd is running
      {%- else -%}
        sshd is not running or check failed
      {%- endif -%}
    task_02_name: "Req 02 - Check if sshd is running"
    task_02_cmd: "systemctl is-active sshd 2>/dev/null || service sshd status 2>/dev/null"
    task_02_rc: "{{ (result_02.rc | default(-1)) if (sshd_installed | default(false) | bool) else -1 }}"

# Requirement 3
- name: "Req 03 - Check DisableForwarding is set to yes"
  ansible.builtin.shell: "sshd -T | grep -i disableforwarding"
  args:
    executable: /bin/bash
  register: result_03
  failed_when: false
  changed_when: false
  when: "sshd_installed | default(false) | bool"

- name: "Store requirement 03 details"
  ansible.builtin.set_fact:
    data_03: "{{ (result_03.stdout | default('') | trim) if (sshd_installed | default(false) | bool) else 'N/A' }}"
    status_03: >-
      {%- if not (sshd_installed | default(false) | bool) -%}
        SKIP
      {%- elif 'disableforwarding yes' in (result_03.stdout | default('') | lower) -%}
        PASS
      {%- else -%}
        FAIL
      {%- endif -%}
    details_03: >-
      {%- if not (sshd_installed | default(false) | bool) -%}
        sshd is not installed
      {%- elif 'disableforwarding yes' in (result_03.stdout | default('') | lower) -%}
        DisableForwarding is set to yes
      {%- else -%}
        DisableForwarding is not set to yes or check failed
      {%- endif -%}
    task_03_name: "Req 03 - Check DisableForwarding is set to yes"
    task_03_cmd: "sshd -T | grep -i disableforwarding"
    task_03_rc: "{{ (result_03.rc | default(-1)) if (sshd_installed | default(false) | bool) else -1 }}"

# Requirement 4: Summarize overall compliance
- name: "Req 04 - Summarize overall compliance"
  ansible.builtin.set_fact:
    status_04: >-
      {%- if status_01 | trim == 'SKIP' -%}
        SKIP
      {%- elif status_02 | trim == 'FAIL' -%}
        SKIP
      {%- elif status_01 | trim == 'PASS' and status_02 | trim == 'PASS' and status_03 | trim == 'PASS' -%}
        PASS
      {%- else -%}
        FAIL
      {%- endif -%}
    details_04: >-
      {%- if status_01 | trim == 'SKIP' -%}
        System is not applicable - OpenSSH server is not installed
      {%- elif status_02 | trim == 'FAIL' -%}
        System is not applicable - sshd is not running
      {%- elif status_01 | trim == 'PASS' and status_02 | trim == 'PASS' and status_03 | trim == 'PASS' -%}
        All checks passed - DisableForwarding is enabled
      {%- else -%}
        One or more checks failed - system is non-compliant
      {%- endif -%}
    task_04_name: "Req 04 - Summarize overall compliance"
    task_04_cmd: "set_fact"
    task_04_rc: 0

# Requirement 5: Store cis_result
- name: "Req 05 - Store audit result in cis_result"
  ansible.builtin.set_fact:
    cis_result: "{{ status_04 }}"
    status_05: "{{ status_04 }}"
    details_05: "{{ details_04 }}"
    task_05_name: "Req 05 - Store audit result in cis_result"
    task_05_cmd: "set_fact"
    task_05_rc: 0

# Requirement 6: Prepare report details
- name: "Store requirement 06 details"
  ansible.builtin.set_fact:
    task_06_name: "Generate audit report"
    task_06_cmd: "debug msg"
    task_06_rc: 0
    data_06: "Report generated"
    status_06: "PASS"
    details_06: "Audit report generated with overall compliance {{ cis_result }}"

# Generate audit report
- name: "Generate audit report"
  ansible.builtin.debug:
    msg:
    - "AUDIT REPORT — CIS 5.1.10"
    - "Reference: CIS Benchmark checkpoint 5.1.10"
    - ""
    - "REQUIREMENT 01 - {{ req_01 }}:"
    - "  Task: {{ task_01_name | default('Not executed') }}"
    - "  Command: {{ task_01_cmd | default('N/A') }}"
    - "  Exit code: {{ task_01_rc | default(-1) }}"
    - "  Data: {{ data_01 | default('') | trim }}"
    - "  Status: {{ status_01 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_01 | default('') | trim }}"
    - ""
    - "REQUIREMENT 02 - {{ req_02 }}:"
    - "  Task: {{ task_02_name | default('Not executed') }}"
    - "  Command: {{ task_02_cmd | default('N/A') }}"
    - "  Exit code: {{ task_02_rc | default(-1) }}"
    - "  Data: {{ data_02 | default('') | trim }}"
    - "  Status: {{ status_02 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_02 | default('') | trim }}"
    - ""
    - "REQUIREMENT 03 - {{ req_03 }}:"
    - "  Task: {{ task_03_name | default('Not executed') }}"
    - "  Command: {{ task_03_cmd | default('N/A') }}"
    - "  Exit code: {{ task_03_rc | default(-1) }}"
    - "  Data: {{ data_03 | default('') | trim }}"
    - "  Status: {{ status_03 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_03 | default('') | trim }}"
    - ""
    - "REQUIREMENT 04 - {{ req_04 }}:"
    - "  Task: {{ task_04_name | default('Not executed') }}"
    - "  Command: {{ task_04_cmd | default('N/A') }}"
    - "  Exit code: {{ task_04_rc | default(-1) }}"
    - "  Data: {{ data_04 | default('') | trim }}"
    - "  Status: {{ status_04 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_04 | default('') | trim }}"
    - ""
    - "REQUIREMENT 05 - {{ req_05 }}:"
    - "  Task: {{ task_05_name | default('Not executed') }}"
    - "  Command: {{ task_05_cmd | default('N/A') }}"
    - "  Exit code: {{ task_05_rc | default(-1) }}"
    - "  Data: {{ data_05 | default('') | trim }}"
    - "  Status: {{ status_05 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_05 | default('') | trim }}"
    - ""
    - "REQUIREMENT 06 - {{ req_06 }}:"
    - "  Task: {{ task_06_name | default('Not executed') }}"
    - "  Command: {{ task_06_cmd | default('N/A') }}"
    - "  Exit code: {{ task_06_rc | default(-1) }}"
    - "  Data: {{ data_06 | default('') | trim }}"
    - "  Status: {{ status_06 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_06 | default('') | trim }}"
    - ""
    - "OVERALL COMPLIANCE:"
    - "  Result: {{ cis_result }}"
