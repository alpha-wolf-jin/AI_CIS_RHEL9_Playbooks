---
- name: Initialize meta data variables
  include_vars: cis_audit_var_5_4_2_3.yml

- name: "Initialize data variables"
  set_fact:
    data_01: "Not collected yet"
    status_01: "UNKNOWN"
    details_01: "Not evaluated"
    data_02: "Not collected yet"
    status_02: "UNKNOWN"
    details_02: "Not evaluated"
    data_03: "Not collected yet"
    status_03: "UNKNOWN"
    details_03: "Not evaluated"
    data_04: "Not collected yet"
    status_04: "UNKNOWN"
    details_04: "Not evaluated"
    task_01_name: "Not executed"
    task_01_cmd: "N/A"
    task_01_rc: -1

- name: "Req 01 - Check if /etc/group file exists"
  ansible.builtin.shell: test -f /etc/group
  args:
    executable: /bin/bash
  register: result_01
  failed_when: false
  changed_when: false

- name: "Store requirement 01 details"
  set_fact:
    task_01_name: "Check if /etc/group file exists"
    task_01_cmd: "test -f /etc/group"
    task_01_rc: "{{ result_01.rc | default(-1) }}"
    data_01: "{{ 'File exists' if (result_01.rc | default(-1)) == 0 else 'File not found' }}"
    status_01: "{{ 'PASS' if (result_01.rc | default(-1)) == 0 else 'SKIP' }}"
    details_01: "{{ 'File /etc/group exists' if (result_01.rc | default(-1)) == 0 else 'File /etc/group does not exist' }}"

- name: "Req 02 - Check GID 0 groups"
  ansible.builtin.shell: "awk -F: '$3==\"0\"{print $1\":\"$3}' /etc/group"
  args:
    executable: /bin/bash
  register: result_02
  failed_when: false
  changed_when: false

- name: "Store requirement 02 details"
  set_fact:
    task_02_name: "Check that no group other than root has GID 0"
    task_02_cmd: |
      awk -F: '$3==\"0\"{print $1\":\"$3}' /etc/group
    task_02_rc: "{{ result_02.rc | default(-1) }}"
    data_02: "{{ result_02.stdout | default('') | trim }}"
    status_02: "{{ 'PASS' if (result_02.stdout | default('') | trim) == 'root:0' else 'FAIL' }}"
    details_02: "{{ 'Output matches expected root:0' if (result_02.stdout | default('') | trim) == 'root:0' else 'Output does not match expected root:0' }}"

- name: "Req 03 - Summarize overall compliance status"
  set_fact:
    task_03_name: "Summarize overall compliance status"
    task_03_cmd: "set_fact"
    task_03_rc: 0
    data_03: >-
      {{ 'Compliant' if status_02 == 'PASS' else 'Non-compliant' }}
    status_03: >-
      {{ 'PASS' if status_02 == 'PASS' else ('SKIP' if status_01 == 'SKIP' else 'FAIL') }}
    details_03: >-
      {{ 'System is compliant' if status_02 == 'PASS' else ('/etc/group does not exist; audit skipped' if status_01 == 'SKIP' else 'System is non-compliant: group root is not the only GID 0 group or /etc/group not accessible') }}

- name: "Req 04 - Store cis_result variable"
  ansible.builtin.set_fact:
    cis_result: "{{ status_03 }}"
  failed_when: false

- name: "Store requirement 04 details"
  set_fact:
    task_04_name: "Store final audit result in cis_result variable"
    task_04_cmd: "ansible.builtin.set_fact: cis_result = status_03"
    task_04_rc: 0
    data_04: "{{ cis_result | default('UNKNOWN') }}"
    status_04: "PASS"
    details_04: "cis_result variable has been set to overall compliance status"

- name: "Generate audit report"
  ansible.builtin.debug:
    msg:
    - "AUDIT REPORT — CIS 5.4.2.3"
    - "Reference: CIS Benchmark checkpoint 5.4.2.3"
    - ""
    - "REQUIREMENT 01 - {{ req_01 }}:"
    - "  Task: {{ task_01_name | default('Not recorded') }}"
    - "  Command: {{ task_01_cmd | default('N/A') }}"
    - "  Exit code: {{ task_01_rc | default(-1) }}"
    - "  Data: {{ data_01 | default('') | trim }}"
    - "  Status: {{ status_01 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_01 | default('') | trim }}"
    - ""
    - "REQUIREMENT 02 - {{ req_02 }}:"
    - "  Task: {{ task_02_name | default('Not recorded') }}"
    - "  Command: {{ task_02_cmd | default('N/A') }}"
    - "  Exit code: {{ task_02_rc | default(-1) }}"
    - "  Data: {{ data_02 | default('') | trim }}"
    - "  Status: {{ status_02 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_02 | default('') | trim }}"
    - ""
    - "REQUIREMENT 03 - {{ req_03 }}:"
    - "  Task: {{ task_03_name | default('Not recorded') }}"
    - "  Command: {{ task_03_cmd | default('N/A') }}"
    - "  Exit code: {{ task_03_rc | default(-1) }}"
    - "  Data: {{ data_03 | default('') | trim }}"
    - "  Status: {{ status_03 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_03 | default('') | trim }}"
    - ""
    - "REQUIREMENT 04 - {{ req_04 }}:"
    - "  Task: {{ task_04_name | default('Not recorded') }}"
    - "  Command: {{ task_04_cmd | default('N/A') }}"
    - "  Exit code: {{ task_04_rc | default(-1) }}"
    - "  Data: {{ data_04 | default('') | trim }}"
    - "  Status: {{ status_04 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_04 | default('') | trim }}"
    - ""
    - "========================================================"
    - "OVERALL COMPLIANCE:"
    - "  Result: {{ cis_result | default('UNKNOWN') | trim }}"
    - "========================================================"
