---
- name: Initialize meta data variables
  include_vars: cis_audit_var_6_2_3_5.yml

- name: "Req 01 - Check if rsyslog is installed"
  ansible.builtin.shell: dpkg -l | grep rsyslog || rpm -q rsyslog
  args:
    executable: /bin/bash
  register: result_01
  failed_when: false
  changed_when: false

- name: "Store requirement 01 details and prerequisites"
  ansible.builtin.set_fact:
    task_01_name: "Check if rsyslog is installed"
    task_01_cmd: "dpkg -l | grep rsyslog || rpm -q rsyslog"
    task_01_rc: "{{ result_01.rc | default(-1) }}"
    data_01: "{{ result_01.stdout | default('') | trim }}"
    status_01: "{{ ('PASS' if result_01.rc | default(-1) == 0 else 'FAIL') | trim }}"
    details_01: "{{ ('Package found' if result_01.rc | default(-1) == 0 else 'Package not found') | trim }}"
    rsyslog_installed: "{{ result_01.rc == 0 }}"

- name: "Req 02 - Check contents of /etc/rsyslog.conf"
  ansible.builtin.shell: cat /etc/rsyslog.conf
  args:
    executable: /bin/bash
  register: result_02
  failed_when: false
  changed_when: false
  when: rsyslog_installed

- name: "Store requirement 02 details"
  ansible.builtin.set_fact:
    task_02_name: "Check contents of /etc/rsyslog.conf"
    task_02_cmd: "cat /etc/rsyslog.conf"
    task_02_rc: "{{ (result_02.rc | default(-1)) if rsyslog_installed else -1 }}"
    data_02: "{{ (result_02.stdout | default('') | trim) if rsyslog_installed else 'Not applicable (rsyslog not installed)' }}"
    status_02: "{{ ('PASS' if (rsyslog_installed and result_02.rc | default(-1) == 0 and (result_02.stdout | default('') | trim | length > 0)) else ('SKIPPED' if not rsyslog_installed else 'FAIL')) | trim }}"
    details_02: "{{ ('File exists and contains content' if (rsyslog_installed and result_02.rc | default(-1) == 0 and (result_02.stdout | default('') | trim | length > 0)) else ('Package not installed' if not rsyslog_installed else 'File empty or missing')) | trim }}"

- name: "Req 03 - Check contents of /etc/rsyslog.d/*.conf"
  ansible.builtin.shell: cat /etc/rsyslog.d/*.conf 2>/dev/null
  args:
    executable: /bin/bash
  register: result_03
  failed_when: false
  changed_when: false
  when: rsyslog_installed

- name: "Store requirement 03 details"                                    # FIXED: clean status logic – does not fall back to rsyslog.conf content
  ansible.builtin.set_fact:
    task_03_name: "Check contents of /etc/rsyslog.d/*.conf"
    task_03_cmd: "cat /etc/rsyslog.d/*.conf"
    task_03_rc: "{{ (result_03.rc | default(-1)) if rsyslog_installed else -1 }}"
    data_03: "{{ (result_03.stdout | default('') | trim) if rsyslog_installed else 'Not applicable (rsyslog not installed)' }}"
    status_03: >-
      {{ ('PASS' if (rsyslog_installed and result_03.rc | default(-1) == 0 and (result_03.stdout | default('') | trim | length > 0))
          else ('SKIPPED' if not rsyslog_installed else 'FAIL')) | trim }}
    details_03: "{{ ('Files exist and contain content' if (rsyslog_installed and result_03.rc | default(-1) == 0 and (result_03.stdout | default('') | trim | length > 0)) else ('Package not installed' if not rsyslog_installed else 'No .conf files found or empty')) | trim }}"

- name: "Req 04 - Check /var/log/maillog exists and is non‑zero"
  ansible.builtin.shell: stat -c %s /var/log/maillog 2>/dev/null
  args:
    executable: /bin/bash
  register: result_04
  failed_when: false
  changed_when: false
  when: rsyslog_installed

- name: "Store requirement 04 details"
  ansible.builtin.set_fact:
    task_04_name: "Check /var/log/maillog"
    task_04_cmd: "stat -c %s /var/log/maillog"
    task_04_rc: "{{ (result_04.rc | default(-1)) if rsyslog_installed else -1 }}"
    file_size: "{{ (result_04.stdout | default('0') | trim | int) if rsyslog_installed else 0 }}"
    data_04: "{{ (('Size: ' ~ (result_04.stdout | default('0') | trim) ~ ' bytes')) if rsyslog_installed else 'Not applicable (rsyslog not installed)' }}"
    status_04: "{{ ('PASS' if (rsyslog_installed and result_04.rc | default(-1) == 0 and (result_04.stdout | default('0') | trim | int) > 0) else ('SKIPPED' if not rsyslog_installed else 'FAIL')) | trim }}"
    details_04: "{{ ('File exists and non‑zero size' if (rsyslog_installed and result_04.rc | default(-1) == 0 and (result_04.stdout | default('0') | trim | int) > 0) else ('Package not installed' if not rsyslog_installed else 'File missing or zero size')) | trim }}"

- name: "Req 05 - Summarize overall compliance status (compute cis_result)"
  ansible.builtin.set_fact:
    task_05_name: "Summarize overall compliance status"
    task_05_cmd: "N/A"
    task_05_rc: 0
    cis_result: "{{ ('PASS' if (status_02 == 'PASS' and status_03 == 'PASS' and status_04 == 'PASS') else ('SKIPPED' if not rsyslog_installed else 'FAIL')) }}"

- name: "Store requirement 05 details (use cis_result)"
  ansible.builtin.set_fact:
    data_05: "{{ 'Overall: ' + cis_result }}"
    status_05: "PASS"
    details_05: "{{ ('All checks passed' if cis_result == 'PASS' else ('Rsyslog not installed' if cis_result == 'SKIPPED' else 'One or more checks failed')) }}"

- name: "Req 06 - Store final audit result in cis_result"
  ansible.builtin.set_fact:
    task_06_name: "Store final audit result in cis_result"
    task_06_cmd: "N/A"
    task_06_rc: 0
    data_06: "{{ cis_result }}"
    status_06: "PASS"
    details_06: "Final audit result stored as {{ cis_result }}"

- name: "Generate audit report"
  ansible.builtin.debug:
    msg:
    - "AUDIT REPORT — CIS 6.2.3.5"
    - "Reference: CIS Benchmark checkpoint 6.2.3.5"
    - ""
    - "REQUIREMENT 01 - {{ req_01 }}:"
    - "  Task: {{ task_01_name }}"
    - "  Command: {{ task_01_cmd }}"
    - "  Exit code: {{ task_01_rc }}"
    - "  Data: {{ data_01 }}"
    - "  Status: {{ status_01 }}"
    - "  Details: {{ details_01 }}"
    - ""
    - "REQUIREMENT 02 - {{ req_02 }}:"
    - "  Task: {{ task_02_name }}"
    - "  Command: {{ task_02_cmd }}"
    - "  Exit code: {{ task_02_rc }}"
    - "  Data: {{ data_02 }}"
    - "  Status: {{ status_02 }}"
    - "  Details: {{ details_02 }}"
    - ""
    - "REQUIREMENT 03 - {{ req_03 }}:"
    - "  Task: {{ task_03_name }}"
    - "  Command: {{ task_03_cmd }}"
    - "  Exit code: {{ task_03_rc }}"
    - "  Data: {{ data_03 }}"
    - "  Status: {{ status_03 }}"
    - "  Details: {{ details_03 }}"
    - ""
    - "REQUIREMENT 04 - {{ req_04 }}:"
    - "  Task: {{ task_04_name }}"
    - "  Command: {{ task_04_cmd }}"
    - "  Exit code: {{ task_04_rc }}"
    - "  Data: {{ data_04 }}"
    - "  Status: {{ status_04 }}"
    - "  Details: {{ details_04 }}"
    - ""
    - "REQUIREMENT 05 - {{ req_05 }}:"
    - "  Task: {{ task_05_name }}"
    - "  Command: {{ task_05_cmd }}"
    - "  Exit code: {{ task_05_rc }}"
    - "  Data: {{ data_05 }}"
    - "  Status: {{ status_05 }}"
    - "  Details: {{ details_05 }}"
    - ""
    - "REQUIREMENT 06 - {{ req_06 }}:"
    - "  Task: {{ task_06_name }}"
    - "  Command: {{ task_06_cmd }}"
    - "  Exit code: {{ task_06_rc }}"
    - "  Data: {{ data_06 }}"
    - "  Status: {{ status_06 }}"
    - "  Details: {{ details_06 }}"
    - ""
    - "--------------------------------------------------------"
    - "OVERALL COMPLIANCE:"
    - "  Result: {{ cis_result }}"
    - "--------------------------------------------------------"
