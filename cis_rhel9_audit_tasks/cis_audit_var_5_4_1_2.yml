req_01: "Check if /etc/login.defs exists using command: `test -f /etc/login.defs`. Expected result: file exists."
req_02: |
  Check if PASS_MIN_DAYS is configured in /etc/login.defs with a value greater than 0 using command: `grep -Pi -- '^\\h*PASS_MIN_DAYS\\h+\\d+\\b' /etc/login.defs`. Expected result: output line with PASS_MIN_DAYS and a numeric value greater than 0 (e.g., PASS_MIN_DAYS 1).
req_03: |
  Check if all user passwords in /etc/shadow have PASS_MIN_DAYS greater than 0 using command: `awk -F: '($2~/^\\$.+\\$/) {if($4 < 1)print \"User: \" $1 \" PASS_MIN_DAYS: \" $4}' /etc/shadow`. Expected result: no output (nothing returned).
req_04: "Summarize overall compliance status: PASS_MIN_DAYS is configured in /etc/login.defs with a value greater than 0 and all user passwords have PASS_MIN_DAYS greater than 0."
req_05: "Store the final audit result in a variable named 'cis_result' using set_fact. Set cis_result to the overall compliance status (PASS/FAIL/SKIP/UNKNOWN) derived from the last requirement's status variable."
