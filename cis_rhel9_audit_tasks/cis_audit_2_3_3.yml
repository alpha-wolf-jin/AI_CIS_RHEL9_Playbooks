---
- name: Initialize meta data variables
  include_vars: cis_audit_var_2_3_3.yml

- name: "Initialize data variables"
  set_fact:
    data_01: "Not collected yet"
    status_01: "ERROR"
    details_01: "Not evaluated"
    data_02: "Not collected yet"
    status_02: "ERROR"
    details_02: "Not evaluated"
    data_03: "Not collected yet"
    status_03: "ERROR"
    details_03: "Not evaluated"
    data_04: "Not collected yet"
    status_04: "ERROR"
    details_04: "Not evaluated"
    task_01_name: "Not executed"
    task_01_cmd: "N/A"
    task_01_rc: -1
    task_04_name: "Not executed"
    task_04_cmd: "N/A"
    task_04_rc: -1

- name: "Req 01 - Check if chrony is installed"
  shell: "rpm -q chrony"
  args:
    executable: /bin/bash
  register: result_01
  failed_when: false
  changed_when: false

- name: "Store requirement 01 details"
  set_fact:
    chrony_installed: "{{ result_01.rc == 0 }}"
    task_01_name: "Check chrony package installation"
    task_01_cmd: "rpm -q chrony"
    task_01_rc: "{{ result_01.rc }}"
    data_01: "{{ result_01.stdout | default('') | trim }}"
    status_01: "{{ 'NOT_APPLICABLE' if result_01.rc != 0 else 'PASS' }}"
    details_01: "{{ 'chrony is installed' if result_01.rc == 0 else 'chrony is not installed' }}"

- name: "Req 02 - Check if chrony configured to run as root"
  shell: "{{ root_check_cmd }}"
  args:
    executable: /bin/bash
  register: result_02
  when: chrony_installed | bool
  failed_when: false
  changed_when: false

- name: "Store requirement 02 details"
  set_fact:
    task_02_name: "Check chrony root user configuration"
    task_02_cmd: "{{ root_check_cmd }}"
    task_02_rc: "{{ result_02.rc | default(-1) }}"
    data_02: "{{ result_02.stdout | default('') | trim }}"
    status_02: "{{ 'NOT_APPLICABLE' if not (chrony_installed | bool) else 'PASS' if (result_02.stdout | default('') | trim) == '' else 'FAIL' }}"
    details_02: "{{ 'chrony is not installed' if not (chrony_installed | bool) else 'No output - chrony is not configured to run as root' if (result_02.stdout | default('') | trim) == '' else 'chrony is configured to run as root' }}"

- name: "Req 03 - Set compliance facts for chrony audit"
  set_fact:
    task_03_name: "Overall compliance evaluation"
    task_03_cmd: "N/A"
    task_03_rc: 0
    data_03: "{{ 'Both checks passed' if status_02 == 'PASS' else 'checks did not pass' }}"
    status_03: "{{ 'NOT_APPLICABLE' if not (chrony_installed | bool) else 'PASS' if status_02 == 'PASS' else 'FAIL' }}"
    details_03: "{{ 'chrony is not installed' if not (chrony_installed | bool) else 'chrony is not configured to run as root' if status_02 == 'PASS' else 'chrony is configured to run as root' }}"

- name: "Req 04 - Store final audit result in cis_result"
  set_fact:
    cis_result: "{{ status_03 | default('ERROR') | trim }}"
    task_04_name: "Store final audit result in cis_result"
    task_04_cmd: "N/A"
    task_04_rc: 0
    data_04: "{{ status_03 | default('ERROR') | trim }}"
    status_04: "PASS"
    details_04: "cis_result set to {{ status_03 | default('ERROR') | trim }}"

- name: "Generate audit report"
  debug:
    msg:
    - "AUDIT REPORT — CIS 2.3.3"
    - "Reference: CIS Benchmark checkpoint 2.3.3"
    - "REQUIREMENT 01 - {{ req_01 }}:"
    - "  Task: {{ task_01_name | default('Not recorded') }}"
    - "  Command: {{ task_01_cmd | default('N/A') }}"
    - "  Exit code: {{ task_01_rc | default(-1) }}"
    - "  Data: {{ data_01 | default('') | trim }}"
    - "  Status: {{ status_01 | default('ERROR') | trim }}"
    - "  Details: {{ details_01 | default('') | trim }}"
    - ""
    - "REQUIREMENT 02 - {{ req_02 }}:"
    - "  Task: {{ task_02_name | default('Not recorded') }}"
    - "  Command: {{ task_02_cmd | default('N/A') }}"
    - "  Exit code: {{ task_02_rc | default(-1) }}"
    - "  Data: {{ data_02 | default('') | trim }}"
    - "  Status: {{ status_02 | default('ERROR') | trim }}"
    - "  Details: {{ details_02 | default('') | trim }}"
    - ""
    - "REQUIREMENT 03 - {{ req_03 }}:"
    - "  Task: {{ task_03_name | default('Not recorded') }}"
    - "  Command: {{ task_03_cmd | default('N/A') }}"
    - "  Exit code: {{ task_03_rc | default(-1) }}"
    - "  Data: {{ data_03 | default('') | trim }}"
    - "  Status: {{ status_03 | default('ERROR') | trim }}"
    - "  Details: {{ details_03 | default('') | trim }}"
    - ""
    - "REQUIREMENT 04 - {{ req_04 }}:"
    - "  Task: {{ task_04_name | default('Not recorded') }}"
    - "  Command: {{ task_04_cmd | default('N/A') }}"
    - "  Exit code: {{ task_04_rc | default(-1) }}"
    - "  Data: {{ data_04 | default('') | trim }}"
    - "  Status: {{ status_04 | default('ERROR') | trim }}"
    - "  Details: {{ details_04 | default('') | trim }}"
    - ""
    - "========================================================"
    - "OVERALL COMPLIANCE:"
    - "  Result: {{ cis_result }}"
    - "  Details: {{ details_03 | default('Not evaluated') | trim }}"
    - "========================================================"
