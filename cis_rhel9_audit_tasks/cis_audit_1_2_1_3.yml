---
- name: Initialize meta data variables
  include_vars: cis_audit_var_1_2_1_3.yml

- name: "Req 01 - Check if dnf is installed"
  ansible.builtin.shell: which dnf || rpm -q dnf
  args:
    executable: /bin/bash
  register: result_01
  failed_when: false
  changed_when: false

- name: "Store requirement 01 details"
  ansible.builtin.set_fact:
    dnf_installed: "{{ result_01.rc == 0 }}"
    task_01_name: "Check if dnf is installed"
    task_01_cmd: "which dnf || rpm -q dnf"
    task_01_rc: "{{ result_01.rc }}"
    data_01: "{{ result_01.stdout | default('') | trim }}"
    status_01: "{{ 'PASS' if result_01.rc == 0 else 'FAIL' }}"
    details_01: "{{ 'PASS: dnf is installed' if result_01.rc == 0 else 'FAIL: dnf not found' }}"

- name: "Req 02 - Check global repo_gpgcheck configuration"
  ansible.builtin.shell: grep ^repo_gpgcheck /etc/dnf/dnf.conf
  args:
    executable: /bin/bash
  register: result_02
  failed_when: false
  changed_when: false
  when: dnf_installed | bool

- name: "Store requirement 02 details"
  ansible.builtin.set_fact:
    task_02_name: "Check global repo_gpgcheck in /etc/dnf/dnf.conf"
    task_02_cmd: "grep ^repo_gpgcheck /etc/dnf/dnf.conf"
    task_02_rc: "{{ result_02.rc | default(-1) }}"
    data_02: "{{ (result_02.stdout | default('') | trim) if dnf_installed | bool else '' }}"
    status_02: >-
      {{ ('NOT_APPLICABLE' if not dnf_installed | bool else
         ('PASS' if result_02.rc | default(-1) == 0 and (result_02.stdout | default('') | trim) == 'repo_gpgcheck=1' else 'FAIL')) | trim }}
    details_02: >-
      {{ ('NOT_APPLICABLE: dnf is not installed - cannot perform check' if not dnf_installed | bool else
         ('PASS: Global repo_gpgcheck is set to 1' if result_02.rc | default(-1) == 0 and (result_02.stdout | default('') | trim) == 'repo_gpgcheck=1' else 'FAIL: repo_gpgcheck not set to 1 in global config')) | trim }}

- name: "Req 03 - Check per-repo configuration for repo_gpgcheck disabled"
  ansible.builtin.shell: |
    REPO_URL="fedoraproject.org"
    for repo in $(grep -l "repo_gpgcheck=0" /etc/yum.repos.d/* ); do if ! grep "${REPO_URL}" "${repo}" &>/dev/null; then echo "${repo}"; fi; done
  args:
    executable: /bin/bash
  register: result_03
  failed_when: false
  changed_when: false
  when: dnf_installed | bool

- name: "Store requirement 03 details"
  ansible.builtin.set_fact:
    task_03_name: "Check per-repo configuration for repo_gpgcheck disabled"
    task_03_cmd: |
      REPO_URL=\"fedoraproject.org\"; for repo in $(grep -l \"repo_gpgcheck=0\" /etc/yum.repos.d/* ); do if ! grep \"${REPO_URL}\" \"${repo}\" &>/dev/null; then echo \"${repo}\"; fi; done
    task_03_rc: "{{ result_03.rc | default(-1) }}"
    data_03: "{{ (result_03.stdout | default('') | trim) if dnf_installed | bool else '' }}"
    status_03: >-
      {{ ('NOT_APPLICABLE' if not dnf_installed | bool else
         ('PASS' if (result_03.stdout | default('') | trim) == '' else 'FAIL')) | trim }}
    details_03: >-
      {{ ('NOT_APPLICABLE: dnf is not installed - cannot perform check' if not dnf_installed | bool else
         ('PASS: No unauthorized repository disables repo_gpgcheck' if (result_03.stdout | default('') | trim) == '' else
          'FAIL: Found repositories with repo_gpgcheck=0 outside excluded URLs: ' + (result_03.stdout | default('') | trim))) | trim }}

- name: "Req 04 - Summarize overall compliance status"
  ansible.builtin.set_fact:
    task_04_name: "Summarize overall compliance status"
    task_04_cmd: "evaluate status_02 and status_03"
    task_04_rc: 0
    data_04: "{{ (status_02 + '/' + status_03) if dnf_installed | bool else 'N/A' }}"
    status_04: >-
      {{ ('NOT_APPLICABLE' if not dnf_installed | bool else
         ('PASS' if status_02 == 'PASS' and status_03 == 'PASS' else 'FAIL')) | trim }}
    details_04: >-
      {{ ('NOT_APPLICABLE: dnf is not installed - cannot determine compliance' if not dnf_installed | bool else
         ('PASS: All checks passed; repo_gpgcheck is globally activated and no unauthorized repository disables it' if status_02 == 'PASS' and status_03 == 'PASS' else
          'FAIL: One or more checks failed')) | trim }}

- name: "Req 05 - Store final audit result as cis_result"
  ansible.builtin.set_fact:
    cis_result: "{{ status_04 | trim }}"
    task_05_name: "Store final audit result"
    task_05_cmd: "set_fact cis_result = {{ status_04 }}"
    task_05_rc: 0
    data_05: "{{ status_04 | trim }}"
    status_05: "{{ status_04 | trim }}"
    details_05: "Final result stored as cis_result"

- name: "Generate audit report"
  ansible.builtin.debug:
    msg:
    - "AUDIT REPORT — CIS 1.2.1.3"
    - "Reference: CIS Benchmark checkpoint 1.2.1.3"
    - ""
    - "REQUIREMENT 01 - {{ req_01 }}:"
    - "  Task: {{ task_01_name | default('Not recorded') }}"
    - "  Command: {{ task_01_cmd | default('N/A') }}"
    - "  Exit code: {{ task_01_rc | default(-1) }}"
    - "  Data: {{ data_01 | default('') | trim }}"
    - "  Status: {{ status_01 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_01 | default('') | trim }}"
    - ""
    - "REQUIREMENT 02 - {{ req_02 }}:"
    - "  Task: {{ task_02_name | default('Not recorded') }}"
    - "  Command: {{ task_02_cmd | default('N/A') }}"
    - "  Exit code: {{ task_02_rc | default(-1) }}"
    - "  Data: {{ data_02 | default('') | trim }}"
    - "  Status: {{ status_02 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_02 | default('') | trim }}"
    - ""
    - "REQUIREMENT 03 - {{ req_03 }}:"
    - "  Task: {{ task_03_name | default('Not recorded') }}"
    - "  Command: {{ task_03_cmd | default('N/A') }}"
    - "  Exit code: {{ task_03_rc | default(-1) }}"
    - "  Data: {{ data_03 | default('') | trim }}"
    - "  Status: {{ status_03 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_03 | default('') | trim }}"
    - ""
    - "REQUIREMENT 04 - {{ req_04 }}:"
    - "  Task: {{ task_04_name | default('Not recorded') }}"
    - "  Command: {{ task_04_cmd | default('N/A') }}"
    - "  Exit code: {{ task_04_rc | default(-1) }}"
    - "  Data: {{ data_04 | default('') | trim }}"
    - "  Status: {{ status_04 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_04 | default('') | trim }}"
    - ""
    - "REQUIREMENT 05 - {{ req_05 }}:"
    - "  Task: {{ task_05_name | default('Not recorded') }}"
    - "  Command: {{ task_05_cmd | default('N/A') }}"
    - "  Exit code: {{ task_05_rc | default(-1) }}"
    - "  Data: {{ data_05 | default('') | trim }}"
    - "  Status: {{ status_05 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_05 | default('') | trim }}"
    - ""
    - "OVERALL COMPLIANCE:"
    - "  Result: {{ cis_result }}"
