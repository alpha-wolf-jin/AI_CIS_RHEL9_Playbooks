---
- name: Initialize meta data variables
  include_vars: cis_audit_var_1_7_5.yml

- name: "Initialize data variables"
  set_fact:
    data_01: "Not collected yet"
    status_01: "UNKNOWN"
    details_01: "Not evaluated"
    data_02: "Not collected yet"
    status_02: "UNKNOWN"
    details_02: "Not evaluated"
    data_03: "Not collected yet"
    status_03: "UNKNOWN"
    details_03: "Not evaluated"
    data_04: "Not collected yet"
    status_04: "UNKNOWN"
    details_04: "Not evaluated"
    data_05: "Not collected yet"
    status_05: "UNKNOWN"
    details_05: "Not evaluated"
    data_06: "Not collected yet"
    status_06: "UNKNOWN"
    details_06: "Not evaluated"
    task_01_name: "Not executed"
    task_01_cmd: "N/A"
    task_01_rc: -1
    task_02_name: "Not executed"
    task_02_cmd: "N/A"
    task_02_rc: -1
    task_03_name: "Not executed"
    task_03_cmd: "N/A"
    task_03_rc: -1
    task_04_name: "Not executed"
    task_04_cmd: "N/A"
    task_04_rc: -1
    task_05_name: "Not executed"
    task_05_cmd: "N/A"
    task_05_rc: -1
    task_06_name: "Not executed"
    task_06_cmd: "N/A"
    task_06_rc: -1

- name: "Req 01 - Check if /etc/issue exists"
  shell: test -f /etc/issue && echo 'exists'
  args:
    executable: /bin/bash
  register: result_01
  failed_when: false
  changed_when: false

- name: "Store requirement 01 details"
  set_fact:
    task_01_name: "Check if /etc/issue exists"
    task_01_cmd: "test -f /etc/issue && echo 'exists'"
    task_01_rc: "{{ result_01.rc | default(-1) }}"
    data_01: "{{ result_01.stdout | default('') | trim }}"
    status_01: "{{ ('PASS' if (result_01.rc | default(-1)) == 0 and ('exists' in (result_01.stdout | default('') | trim)) else 'FAIL') | trim }}"
    details_01: "{{ ('File exists' if (result_01.rc | default(-1)) == 0 and ('exists' in (result_01.stdout | default('') | trim)) else 'File does not exist') | trim }}"

- name: "Req 02 - Check full file permissions and ownership"
  shell: "stat -Lc 'Access: (%#a/%A)  Uid: ( %u/ %U) Gid: { %g/ %G)' /etc/issue"
  args:
    executable: /bin/bash
  register: result_02
  failed_when: false
  changed_when: false

- name: "Store requirement 02 details"
  set_fact:
    task_02_name: "Check full file permissions and ownership"
    task_02_cmd: "stat -Lc 'Access: (%#a/%A)  Uid: ( %u/ %U) Gid: { %g/ %G)' /etc/issue"
    task_02_rc: "{{ result_02.rc | default(-1) }}"
    data_02: "{{ result_02.stdout | default('') | trim }}"
    status_02: "{{ ('PASS' if (result_02.stdout | default('') | trim) == expected_stat_output else 'FAIL') | trim }}"
    details_02: "{{ ('Output matches expected' if (result_02.stdout | default('') | trim) == expected_stat_output else 'Output does not match expected') | trim }}"

- name: "Req 03 - Verify access permissions are 644 or more restrictive"
  shell: stat -Lc '%a' /etc/issue
  args:
    executable: /bin/bash
  register: result_03
  failed_when: false
  changed_when: false

- name: "Store requirement 03 details"
  set_fact:
    task_03_name: "Verify access permissions"
    task_03_cmd: "stat -Lc '%a' /etc/issue"
    task_03_rc: "{{ result_03.rc | default(-1) }}"
    data_03: "{{ result_03.stdout | default('') | trim }}"
    status_03: "{{ ('PASS' if (result_03.rc | default(-1)) == 0 and (result_03.stdout | default('') | trim | int) <= 644 else 'FAIL') | trim }}"
    details_03: "{{ ('Permissions ' + (result_03.stdout | default('') | trim) + ' are 644 or more restrictive' if (result_03.rc | default(-1)) == 0 and (result_03.stdout | default('') | trim | int) <= 644 else 'Permissions ' + (result_03.stdout | default('') | trim) + ' are more permissive than 644') | trim }}"

- name: "Req 04 - Verify file owner UID is 0"
  shell: stat -Lc '%u' /etc/issue
  args:
    executable: /bin/bash
  register: result_04
  failed_when: false
  changed_when: false

- name: "Store requirement 04 details"
  set_fact:
    task_04_name: "Verify file owner UID"
    task_04_cmd: "stat -Lc '%u' /etc/issue"
    task_04_rc: "{{ result_04.rc | default(-1) }}"
    data_04: "{{ result_04.stdout | default('') | trim }}"
    status_04: "{{ ('PASS' if (result_04.rc | default(-1)) == 0 and (result_04.stdout | default('') | trim) == '0' else 'FAIL') | trim }}"
    details_04: "{{ ('UID is 0 (root)' if (result_04.rc | default(-1)) == 0 and (result_04.stdout | default('') | trim) == '0' else 'UID is not 0') | trim }}"

- name: "Req 05 - Verify file group GID is 0"
  shell: stat -Lc '%g' /etc/issue
  args:
    executable: /bin/bash
  register: result_05
  failed_when: false
  changed_when: false

- name: "Store requirement 05 details"
  set_fact:
    task_05_name: "Verify file group GID"
    task_05_cmd: "stat -Lc '%g' /etc/issue"
    task_05_rc: "{{ result_05.rc | default(-1) }}"
    data_05: "{{ result_05.stdout | default('') | trim }}"
    status_05: "{{ ('PASS' if (result_05.rc | default(-1)) == 0 and (result_05.stdout | default('') | trim) == '0' else 'FAIL') | trim }}"
    details_05: "{{ ('GID is 0 (root)' if (result_05.rc | default(-1)) == 0 and (result_05.stdout | default('') | trim) == '0' else 'GID is not 0') | trim }}"

- name: "Req 06 - Summarize overall compliance status"
  set_fact:
    task_06_name: "Summarize overall compliance"
    task_06_cmd: "N/A"
    task_06_rc: 0
    data_06: "Overall"
    status_06: "{{ ('PASS' if status_01 == 'PASS' and status_02 == 'PASS' and status_03 == 'PASS' and status_04 == 'PASS' and status_05 == 'PASS' else 'FAIL') | trim }}"
    details_06: "{{ ('System is compliant with CIS 1.7.5' if status_01 == 'PASS' and status_02 == 'PASS' and status_03 == 'PASS' and status_04 == 'PASS' and status_05 == 'PASS' else 'System is non-compliant') | trim }}"

- name: "Req 07 - Store final cis_result variable"
  set_fact:
    cis_result: "{{ status_06 }}"

- name: "Generate audit report"
  debug:
    msg:
    - "AUDIT REPORT — CIS 1.7.5"
    - "Reference: CIS Benchmark checkpoint 1.7.5"
    - ""
    - "REQUIREMENT 01 - {{ req_01 }}:"
    - "  Task: {{ task_01_name | default('Not recorded') }}"
    - "  Command: {{ task_01_cmd | default('N/A') }}"
    - "  Exit code: {{ task_01_rc | default(-1) }}"
    - "  Data: {{ data_01 | default('') | trim }}"
    - "  Status: {{ status_01 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_01 | default('') | trim }}"
    - ""
    - "REQUIREMENT 02 - {{ req_02 }}:"
    - "  Task: {{ task_02_name | default('Not recorded') }}"
    - "  Command: {{ task_02_cmd | default('N/A') }}"
    - "  Exit code: {{ task_02_rc | default(-1) }}"
    - "  Data: {{ data_02 | default('') | trim }}"
    - "  Status: {{ status_02 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_02 | default('') | trim }}"
    - ""
    - "REQUIREMENT 03 - {{ req_03 }}:"
    - "  Task: {{ task_03_name | default('Not recorded') }}"
    - "  Command: {{ task_03_cmd | default('N/A') }}"
    - "  Exit code: {{ task_03_rc | default(-1) }}"
    - "  Data: {{ data_03 | default('') | trim }}"
    - "  Status: {{ status_03 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_03 | default('') | trim }}"
    - ""
    - "REQUIREMENT 04 - {{ req_04 }}:"
    - "  Task: {{ task_04_name | default('Not recorded') }}"
    - "  Command: {{ task_04_cmd | default('N/A') }}"
    - "  Exit code: {{ task_04_rc | default(-1) }}"
    - "  Data: {{ data_04 | default('') | trim }}"
    - "  Status: {{ status_04 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_04 | default('') | trim }}"
    - ""
    - "REQUIREMENT 05 - {{ req_05 }}:"
    - "  Task: {{ task_05_name | default('Not recorded') }}"
    - "  Command: {{ task_05_cmd | default('N/A') }}"
    - "  Exit code: {{ task_05_rc | default(-1) }}"
    - "  Data: {{ data_05 | default('') | trim }}"
    - "  Status: {{ status_05 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_05 | default('') | trim }}"
    - ""
    - "REQUIREMENT 06 - {{ req_06 }}:"
    - "  Task: {{ task_06_name | default('Not recorded') }}"
    - "  Command: {{ task_06_cmd | default('N/A') }}"
    - "  Exit code: {{ task_06_rc | default(-1) }}"
    - "  Data: {{ data_06 | default('') | trim }}"
    - "  Status: {{ status_06 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_06 | default('') | trim }}"
    - ""
    - "========================================================"
    - "OVERALL COMPLIANCE:"
    - "  Result: {{ cis_result | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_06 | default('Not evaluated') | trim }}"
    - "========================================================"
