---
- name: Initialize meta data variables
  include_vars: cis_audit_var_6_2_2_1_4.yml

- name: "Initialize data variables"
  ansible.builtin.set_fact:
    data_01: "Not collected yet"
    status_01: "ERROR"
    details_01: "Not evaluated"
    task_01_name: "Check if systemd-journal-remote package is installed"
    task_01_cmd: "dpkg -l systemd-journal-remote 2>/dev/null || rpm -q systemd-journal-remote 2>/dev/null"
    task_01_rc: -1

    data_02: "Not collected yet"
    status_02: "ERROR"
    details_02: "Not evaluated"
    task_02_name: "Check if systemd-journal-remote.socket is enabled"
    task_02_cmd: "systemctl is-enabled systemd-journal-remote.socket 2>/dev/null | grep -P -- '^enabled'"
    task_02_rc: -1

    data_03: "Not collected yet"
    status_03: "ERROR"
    details_03: "Not evaluated"
    task_03_name: "Check if systemd-journal-remote.service is enabled"
    task_03_cmd: "systemctl is-enabled systemd-journal-remote.service 2>/dev/null | grep -P -- '^enabled'"
    task_03_rc: -1

    data_04: "Not collected yet"
    status_04: "ERROR"
    details_04: "Not evaluated"
    task_04_name: "Check if systemd-journal-remote.socket is active"
    task_04_cmd: "systemctl is-active systemd-journal-remote.socket 2>/dev/null | grep -P -- '^active'"
    task_04_rc: -1

    data_05: "Not collected yet"
    status_05: "ERROR"
    details_05: "Not evaluated"
    task_05_name: "Check if systemd-journal-remote.service is active"
    task_05_cmd: "systemctl is-active systemd-journal-remote.service 2>/dev/null | grep -P -- '^active'"
    task_05_rc: -1

    data_06: "Not collected yet"
    status_06: "ERROR"
    details_06: "Not evaluated"
    task_06_name: "Summarize overall compliance"
    task_06_cmd: "set_fact"
    task_06_rc: -1

    data_07: "Not collected yet"
    status_07: "ERROR"
    details_07: "Not evaluated"
    task_07_name: "Store cis_result"
    task_07_cmd: "set_fact"
    task_07_rc: -1

- name: "Req 1 - Check if systemd-journal-remote is installed"
  ansible.builtin.shell: dpkg -l systemd-journal-remote 2>/dev/null || rpm -q systemd-journal-remote 2>/dev/null
  args:
    executable: /bin/bash
  register: result_01
  failed_when: false
  changed_when: false

- name: "Set package installation flag"
  ansible.builtin.set_fact:
    _package_not_installed: "{{ result_01.rc != 0 }}"

- name: "Req 2 - Check if systemd-journal-remote.socket is enabled"
  ansible.builtin.shell: systemctl is-enabled systemd-journal-remote.socket 2>/dev/null | grep -P -- '^enabled'
  args:
    executable: /bin/bash
  register: result_02
  failed_when: false
  changed_when: false
  when: "not _package_not_installed"

- name: "Req 3 - Check if systemd-journal-remote.service is enabled"
  ansible.builtin.shell: systemctl is-enabled systemd-journal-remote.service 2>/dev/null | grep -P -- '^enabled'
  args:
    executable: /bin/bash
  register: result_03
  failed_when: false
  changed_when: false
  when: "not _package_not_installed"

- name: "Req 4 - Check if systemd-journal-remote.socket is active"
  ansible.builtin.shell: systemctl is-active systemd-journal-remote.socket 2>/dev/null | grep -P -- '^active'
  args:
    executable: /bin/bash
  register: result_04
  failed_when: false
  changed_when: false
  when: "not _package_not_installed"

- name: "Req 5 - Check if systemd-journal-remote.service is active"
  ansible.builtin.shell: systemctl is-active systemd-journal-remote.service 2>/dev/null | grep -P -- '^active'
  args:
    executable: /bin/bash
  register: result_05
  failed_when: false
  changed_when: false
  when: "not _package_not_installed"

- name: "Store audit results for requirements 1-5"
  ansible.builtin.set_fact:
    data_01: "{{ result_01.stdout | default('') | trim }}"
    status_01: "{{ ('PASS' if result_01.rc != 0 else 'FAIL') | trim }}"
    details_01: "{{ ('Package not installed' if result_01.rc != 0 else 'Package is installed') | trim }}"
    task_01_rc: "{{ result_01.rc | default(-1) }}"

    data_02: "{{ ('' if _package_not_installed else result_02.stdout | default('') | trim) }}"
    status_02: "{{ ('SKIP' if _package_not_installed else ('PASS' if result_02.rc != 0 else 'FAIL')) | trim }}"
    details_02: "{{ ('Not applicable — package not installed' if _package_not_installed else ('Socket is not enabled' if result_02.rc != 0 else 'Socket is enabled')) | trim }}"
    task_02_rc: "{{ result_02.rc | default(-1) }}"

    data_03: "{{ ('' if _package_not_installed else result_03.stdout | default('') | trim) }}"
    status_03: "{{ ('SKIP' if _package_not_installed else ('PASS' if result_03.rc != 0 else 'FAIL')) | trim }}"
    details_03: "{{ ('Not applicable — package not installed' if _package_not_installed else ('Service is not enabled' if result_03.rc != 0 else 'Service is enabled')) | trim }}"
    task_03_rc: "{{ result_03.rc | default(-1) }}"

    data_04: "{{ ('' if _package_not_installed else result_04.stdout | default('') | trim) }}"
    status_04: "{{ ('SKIP' if _package_not_installed else ('PASS' if result_04.rc != 0 else 'FAIL')) | trim }}"
    details_04: "{{ ('Not applicable — package not installed' if _package_not_installed else ('Socket is not active' if result_04.rc != 0 else 'Socket is active')) | trim }}"
    task_04_rc: "{{ result_04.rc | default(-1) }}"

    data_05: "{{ ('' if _package_not_installed else result_05.stdout | default('') | trim) }}"
    status_05: "{{ ('SKIP' if _package_not_installed else ('PASS' if result_05.rc != 0 else 'FAIL')) | trim }}"
    details_05: "{{ ('Not applicable — package not installed' if _package_not_installed else ('Service is not active' if result_05.rc != 0 else 'Service is active')) | trim }}"
    task_05_rc: "{{ result_05.rc | default(-1) }}"

- name: "Req 6 - Determine overall compliance status"
  ansible.builtin.set_fact:
    cis_result: "{{ 'SKIP' if _package_not_installed else ('PASS' if status_02 == 'PASS' and status_03 == 'PASS' and status_04 == 'PASS' and status_05 == 'PASS' else 'FAIL') }}"

- name: "Set reporting variables for requirements 6 and 7"
  ansible.builtin.set_fact:
    status_06: "{{ cis_result }}"
    data_06: "{{ cis_result }}"
    details_06: "{{ 'Package not installed — system is compliant' if _package_not_installed else ( 'System is compliant' if cis_result | trim == 'PASS' else 'System is not compliant') }}"
    task_06_rc: 0
    status_07: "PASS"
    data_07: "{{ cis_result }}"
    details_07: "Final audit result stored as cis_result"
    task_07_rc: 0

- name: "Generate audit report"
  ansible.builtin.debug:
    msg:
    - "AUDIT REPORT — CIS 6.2.2.1.4"
    - "Reference: CIS Benchmark checkpoint 6.2.2.1.4"
    - ""
    - "REQUIREMENT 01 - {{ req_01 }}:"
    - "  Task: {{ task_01_name }}"
    - "  Command: {{ task_01_cmd }}"
    - "  Exit code: {{ task_01_rc }}"
    - "  Data: {{ data_01 | trim }}"
    - "  Status: {{ status_01 | trim }}"
    - "  Details: {{ details_01 | trim }}"
    - ""
    - "REQUIREMENT 02 - {{ req_02 }}:"
    - "  Task: {{ task_02_name }}"
    - "  Command: {{ task_02_cmd }}"
    - "  Exit code: {{ task_02_rc }}"
    - "  Data: {{ data_02 | trim }}"
    - "  Status: {{ status_02 | trim }}"
    - "  Details: {{ details_02 | trim }}"
    - ""
    - "REQUIREMENT 03 - {{ req_03 }}:"
    - "  Task: {{ task_03_name }}"
    - "  Command: {{ task_03_cmd }}"
    - "  Exit code: {{ task_03_rc }}"
    - "  Data: {{ data_03 | trim }}"
    - "  Status: {{ status_03 | trim }}"
    - "  Details: {{ details_03 | trim }}"
    - ""
    - "REQUIREMENT 04 - {{ req_04 }}:"
    - "  Task: {{ task_04_name }}"
    - "  Command: {{ task_04_cmd }}"
    - "  Exit code: {{ task_04_rc }}"
    - "  Data: {{ data_04 | trim }}"
    - "  Status: {{ status_04 | trim }}"
    - "  Details: {{ details_04 | trim }}"
    - ""
    - "REQUIREMENT 05 - {{ req_05 }}:"
    - "  Task: {{ task_05_name }}"
    - "  Command: {{ task_05_cmd }}"
    - "  Exit code: {{ task_05_rc }}"
    - "  Data: {{ data_05 | trim }}"
    - "  Status: {{ status_05 | trim }}"
    - "  Details: {{ details_05 | trim }}"
    - ""
    - "REQUIREMENT 06 - {{ req_06 }}:"
    - "  Task: {{ task_06_name }}"
    - "  Command: {{ task_06_cmd }}"
    - "  Exit code: {{ task_06_rc }}"
    - "  Data: {{ data_06 | trim }}"
    - "  Status: {{ status_06 | trim }}"
    - "  Details: {{ details_06 | trim }}"
    - ""
    - "REQUIREMENT 07 - {{ req_07 }}:"
    - "  Task: {{ task_07_name }}"
    - "  Command: {{ task_07_cmd }}"
    - "  Exit code: {{ task_07_rc }}"
    - "  Data: {{ data_07 | trim }}"
    - "  Status: {{ status_07 | trim }}"
    - "  Details: {{ details_07 | trim }}"
    - ""
    - "========================================================"
    - "OVERALL COMPLIANCE:"
    - "  Result: {{ cis_result }}"
    - "========================================================"
