---
- name: Initialize meta data variables
  include_vars: cis_audit_var_1_7_4.yml

- name: "Initialize data variables"
  set_fact:
    data_01: "Not collected yet"
    status_01: "UNKNOWN"
    details_01: "Not evaluated"
    data_02: "Not collected yet"
    status_02: "UNKNOWN"
    details_02: "Not evaluated"
    data_03: "Not collected yet"
    status_03: "UNKNOWN"
    details_03: "Not evaluated"
    data_04: "Not collected yet"
    status_04: "UNKNOWN"
    details_04: "Not evaluated"
    data_05: "Not collected yet"
    status_05: "UNKNOWN"
    details_05: "Not evaluated"
    task_01_name: "Not executed"
    task_01_cmd: "N/A"
    task_01_rc: -1

# Requirement 1
- name: "Req 01 - Check if /etc/motd exists using stat"
  ansible.builtin.stat:
    path: "/etc/motd"
  register: motd_stat
  failed_when: false

- name: "Store requirement 01 details"
  set_fact:
    task_01_name: "Check if /etc/motd exists using stat"
    task_01_cmd: "stat module on /etc/motd"
    task_01_rc: "0"
    data_01: "{{ 'exists' if motd_stat.stat.exists else 'does not exist' }}"
    status_01: "PASS"
    details_01: "{{ 'File exists' if motd_stat.stat.exists else 'File does not exist - no further checks needed' }}"

# Requirement 2
- name: "Req 02 - Check access permissions of /etc/motd"
  shell: "stat -Lc 'Access: (%#a/%A)  Uid: ( %u/ %U) Gid: { %g/ %G)' /etc/motd"
  args:
    executable: /bin/bash
  register: result_02
  failed_when: false
  changed_when: false
  when: motd_stat.stat.exists

- name: "Req 02 - Evaluate /etc/motd permissions compliance"
  shell: |
    if [ ! -e /etc/motd ]; then
      echo "SKIP"
      exit 0
    fi
    mode=$(stat -Lc '%a' /etc/motd)
    perm_dec=$((8#$mode))
    if [ $(( perm_dec & 022 )) -ne 0 ] || [ $(( perm_dec & 0111 )) -ne 0 ] || [ $perm_dec -gt $((8#0644)) ]; then
      echo "FAIL"
    else
      echo "PASS"
    fi
    exit 0
  args:
    executable: /bin/bash
  register: result_02_compliance
  failed_when: false
  changed_when: false
  when: motd_stat.stat.exists

- name: "Store requirement 02 details"
  set_fact:
    task_02_name: "Check access permissions of /etc/motd"
    task_02_cmd: "stat -Lc 'Access: (%#a/%A)  Uid: ( %u/ %U) Gid: { %g/ %G)' /etc/motd"
    task_02_rc: "{{ result_02.rc | default(-1) }}"
    data_02: "{{ result_02.stdout | default('') | trim }}"
    status_02: "{{ result_02_compliance.stdout | default('SKIP') | trim }}"
    details_02: >-
      {%- if not motd_stat.stat.exists -%}
      File does not exist - check skipped
      {%- elif (result_02_compliance.stdout | default('') | trim) == 'PASS' -%}
      Access permissions are compliant (644 or more restrictive)
      {%- else -%}
      Access permissions are not compliant (expected 0644 or more restrictive)
      {%- endif %}

# Requirement 3
- name: "Req 03 - Check Uid of /etc/motd"
  shell: "stat -Lc '%u' /etc/motd"
  args:
    executable: /bin/bash
  register: result_03
  failed_when: false
  changed_when: false
  when: motd_stat.stat.exists

- name: "Store requirement 03 details"
  set_fact:
    task_03_name: "Check Uid of /etc/motd"
    task_03_cmd: "stat -Lc '%u' /etc/motd"
    task_03_rc: "{{ result_03.rc | default(-1) }}"
    data_03: "{{ result_03.stdout | default('') | trim }}"
    status_03: >-
      {%- if not motd_stat.stat.exists -%}
      SKIP
      {%- elif (result_03.stdout | default('') | trim) == '0' -%}
      PASS
      {%- else -%}
      FAIL
      {%- endif %}
    details_03: >-
      {%- if not motd_stat.stat.exists -%}
      File does not exist - check skipped
      {%- elif (result_03.stdout | default('') | trim) == '0' -%}
      UID is 0 (root)
      {%- else -%}
      UID is not 0 (expected 0/root)
      {%- endif %}

# Requirement 4
- name: "Req 04 - Check Gid of /etc/motd"
  shell: "stat -Lc '%g' /etc/motd"
  args:
    executable: /bin/bash
  register: result_04
  failed_when: false
  changed_when: false
  when: motd_stat.stat.exists

- name: "Store requirement 04 details"
  set_fact:
    task_04_name: "Check Gid of /etc/motd"
    task_04_cmd: "stat -Lc '%g' /etc/motd"
    task_04_rc: "{{ result_04.rc | default(-1) }}"
    data_04: "{{ result_04.stdout | default('') | trim }}"
    status_04: >-
      {%- if not motd_stat.stat.exists -%}
      SKIP
      {%- elif (result_04.stdout | default('') | trim) == '0' -%}
      PASS
      {%- else -%}
      FAIL
      {%- endif %}
    details_04: >-
      {%- if not motd_stat.stat.exists -%}
      File does not exist - check skipped
      {%- elif (result_04.stdout | default('') | trim) == '0' -%}
      GID is 0 (root)
      {%- else -%}
      GID is not 0 (expected 0/root)
      {%- endif %}

# Extract numeric mode directly from stat module
- name: "Extract motd mode from stat output"
  set_fact:
    motd_mode: "{{ motd_stat.stat.mode if motd_stat.stat.exists else '' }}"

# Requirement 5 – evaluate compliance using a shell script that can safely perform bitwise checks
- name: "Req 05 - Evaluate overall compliance for /etc/motd"
  shell: |
    if [ ! -e /etc/motd ]; then
      echo "PASS"
      exit 0
    fi
    mode=$(stat -Lc '%a' /etc/motd)
    uid=$(stat -Lc '%u' /etc/motd)
    gid=$(stat -Lc '%g' /etc/motd)
    if [ "$uid" != "0" ] || [ "$gid" != "0" ]; then
      echo "FAIL"
      exit 0
    fi
    perm_dec=$((8#$mode))
    if [ $(( perm_dec & 022 )) -ne 0 ] ||
       [ $(( perm_dec & 0111 )) -ne 0 ] ||
       [ $perm_dec -gt $((8#0644)) ]; then
      echo "FAIL"
    else
      echo "PASS"
    fi
    exit 0
  args:
    executable: /bin/bash
  register: compliance_check
  failed_when: false
  changed_when: false

- name: "Store requirement 05 details"
  set_fact:
    task_05_name: "Evaluate overall compliance"
    task_05_cmd: "Shell script to check motd compliance"
    task_05_rc: "0"
    data_05: "{{ compliance_check.stdout | default('') | trim }}"
    status_05: "{{ compliance_check.stdout | default('FAIL') | trim }}"
    details_05: >-
      {%- if not motd_stat.stat.exists -%}
      File does not exist, check not applicable (pass)
      {%- elif compliance_check.stdout | default('FAIL') | trim == 'PASS' -%}
      Permissions, UID, and GID are compliant
      {%- else -%}
      Non-compliant: permissions {{ motd_mode | trim }} (expected 644 or more restrictive),
      UID {{ result_03.stdout | default('') | trim }} (expected 0),
      GID {{ result_04.stdout | default('') | trim }} (expected 0)
      {%- endif %}

# Requirement 6 – store final cis_result
- name: "Store cis_result"
  set_fact:
    cis_result: "{{ status_05 | trim }}"

# Requirement 7 - Generate audit report
- name: "Generate audit report"
  debug:
    msg:
    - "AUDIT REPORT — CIS 1.7.4"
    - "Reference: CIS Benchmark checkpoint 1.7.4"
    - ""
    - "REQUIREMENT 01 - {{ req_01 }}:"
    - "  Task: {{ task_01_name | default('Not recorded') }}"
    - "  Command: {{ task_01_cmd | default('N/A') }}"
    - "  Exit code: {{ task_01_rc | default(-1) }}"
    - "  Data: {{ data_01 | default('') | trim }}"
    - "  Status: {{ status_01 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_01 | default('') | trim }}"
    - ""
    - "REQUIREMENT 02 - {{ req_02 }}:"
    - "  Task: {{ task_02_name | default('Not recorded') }}"
    - "  Command: {{ task_02_cmd | default('N/A') }}"
    - "  Exit code: {{ task_02_rc | default(-1) }}"
    - "  Data: {{ data_02 | default('') | trim }}"
    - "  Status: {{ status_02 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_02 | default('') | trim }}"
    - ""
    - "REQUIREMENT 03 - {{ req_03 }}:"
    - "  Task: {{ task_03_name | default('Not recorded') }}"
    - "  Command: {{ task_03_cmd | default('N/A') }}"
    - "  Exit code: {{ task_03_rc | default(-1) }}"
    - "  Data: {{ data_03 | default('') | trim }}"
    - "  Status: {{ status_03 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_03 | default('') | trim }}"
    - ""
    - "REQUIREMENT 04 - {{ req_04 }}:"
    - "  Task: {{ task_04_name | default('Not recorded') }}"
    - "  Command: {{ task_04_cmd | default('N/A') }}"
    - "  Exit code: {{ task_04_rc | default(-1) }}"
    - "  Data: {{ data_04 | default('') | trim }}"
    - "  Status: {{ status_04 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_04 | default('') | trim }}"
    - ""
    - "REQUIREMENT 05 - {{ req_05 }}:"
    - "  Task: {{ task_05_name | default('Not recorded') }}"
    - "  Command: {{ task_05_cmd | default('N/A') }}"
    - "  Exit code: {{ task_05_rc | default(-1) }}"
    - "  Data: {{ data_05 | default('') | trim }}"
    - "  Status: {{ status_05 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_05 | default('') | trim }}"
    - ""
    - "========================================================"
    - "OVERALL COMPLIANCE:"
    - "  Result: {{ cis_result | trim }}"
    - "  Details: {{ details_05 | default('Not evaluated') | trim }}"
    - "========================================================"
