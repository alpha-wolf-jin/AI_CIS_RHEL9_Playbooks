---
- name: Initialize meta data variables
  include_vars: cis_audit_var_6_2_2_1_3.yml

- name: "Initialize data variables"
  ansible.builtin.set_fact:
    data_01: "Not collected yet"
    status_01: "UNKNOWN"
    details_01: "Not evaluated"
    data_02: "Not collected yet"
    status_02: "UNKNOWN"
    details_02: "Not evaluated"
    data_03: "Not collected yet"
    status_03: "UNKNOWN"
    details_03: "Not evaluated"
    data_04: "Not collected yet"
    status_04: "UNKNOWN"
    details_04: "Not evaluated"
    data_05: "Not collected yet"
    status_05: "UNKNOWN"
    details_05: "Not evaluated"
    task_01_name: "Not executed"
    task_01_cmd: "N/A"
    task_01_rc: -1
    task_05_name: "Not executed"
    task_05_cmd: "N/A"
    task_05_rc: -1
  tags: [audit, cis]
- name: "Req 01 - Check service unit file existence"
  ansible.builtin.shell: "systemctl list-unit-files | grep {{ service_name }}.service"
  args:
    executable: /bin/bash
  register: result_01
  failed_when: false
  changed_when: false
  tags: [audit, cis]
- name: "Set service installed fact"
  ansible.builtin.set_fact:
    service_installed: "{{ result_01.rc | default(-1) == 0 }}"
  tags: [audit, cis]
- name: "Req 02 - Check service enabled"
  ansible.builtin.shell: "systemctl is-enabled {{ service_name }}.service"
  args:
    executable: /bin/bash
  register: result_02
  failed_when: false
  changed_when: false
  tags: [audit, cis]
- name: "Req 03 - Check service active"
  ansible.builtin.shell: "systemctl is-active {{ service_name }}.service"
  args:
    executable: /bin/bash
  register: result_03
  failed_when: false
  changed_when: false
  tags: [audit, cis]
- name: "Store audit data and evaluate compliance"
  ansible.builtin.set_fact:
    task_01_name: "Check service unit file existence"
    task_01_cmd: "systemctl list-unit-files | grep {{ service_name }}.service"
    task_01_rc: "{{ result_01.rc | default(-1) }}"
    data_01: "{{ result_01.stdout | default('') | trim }}"
    status_01: >-
      {{ 'SKIPPED' if not service_installed else
         'PASS' if result_01.stdout | default('') | trim else
         'FAIL' }}
    details_01: >-
      {{ 'Service is not installed; benchmark not applicable' if not service_installed else
         'Service unit file found' if result_01.stdout | default('') | trim else
         'Service unit file not found' }}

    task_02_name: "Check service enabled"
    task_02_cmd: "systemctl is-enabled {{ service_name }}.service"
    task_02_rc: "{{ result_02.rc | default(-1) }}"
    data_02: "{{ result_02.stdout | default('') | trim }}"
    status_02: >-
      {{ 'SKIPPED' if not service_installed else
         'PASS' if (result_02.stdout | default('') | trim == 'enabled') else
         'FAIL' }}
    details_02: >-
      {{ 'Service is not installed; benchmark not applicable' if not service_installed else
         'Service is enabled' if (result_02.stdout | default('') | trim == 'enabled') else
         'Service is not enabled (output: ' ~ result_02.stdout | default('') | trim ~ ')' }}

    task_03_name: "Check service active"
    task_03_cmd: "systemctl is-active {{ service_name }}.service"
    task_03_rc: "{{ result_03.rc | default(-1) }}"
    data_03: "{{ result_03.stdout | default('') | trim }}"
    status_03: >-
      {{ 'SKIPPED' if not service_installed else
         'PASS' if (result_03.stdout | default('') | trim == 'active') else
         'FAIL' }}
    details_03: >-
      {{ 'Service is not installed; benchmark not applicable' if not service_installed else
         'Service is active' if (result_03.stdout | default('') | trim == 'active') else
         'Service is not active (output: ' ~ result_03.stdout | default('') | trim ~ ')' }}

    task_04_name: "Evaluate overall compliance"
    task_04_cmd: "N/A"
    task_04_rc: 0
    data_04: "N/A"
    status_04: >-
      {{ 'SKIPPED' if not service_installed else
         'PASS' if (result_02.stdout | default('') | trim == 'enabled') and
                   (result_03.stdout | default('') | trim == 'active') else
         'FAIL' }}
    details_04: >-
      {{ 'Service is not installed; benchmark not applicable' if not service_installed else
         'All requirements met - service is installed, enabled, and active' if (result_02.stdout | default('') | trim == 'enabled') and
           (result_03.stdout | default('') | trim == 'active') else
         'One or more checks failed' }}
  tags: [audit, cis, report]
- name: "Store cis_result"
  ansible.builtin.set_fact:
    cis_result: "{{ status_04 | trim }}"
  tags: [audit, cis, report]
- name: "Store requirement 05 details"
  ansible.builtin.set_fact:
    task_05_name: "Store final audit result"
    task_05_cmd: "set_fact cis_result = {{ status_04 | trim }}"
    task_05_rc: 0
    data_05: "{{ cis_result }}"
    status_05: "PASS"
    details_05: "cis_result set to {{ cis_result }}"
  tags: [audit, cis, report]
- name: "Generate audit report"
  ansible.builtin.debug:
    msg:
    - "AUDIT REPORT — CIS 6.2.2.1.3"
    - "Reference: CIS Benchmark checkpoint 6.2.2.1.3"
    - ""
    - "REQUIREMENT 01 - {{ req_01 }}:"
    - "  Task: {{ task_01_name | default('Not recorded') }}"
    - "  Command: {{ task_01_cmd | default('N/A') }}"
    - "  Exit code: {{ task_01_rc | default(-1) }}"
    - "  Data: {{ data_01 | default('') | trim }}"
    - "  Status: {{ status_01 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_01 | default('') | trim }}"
    - ""
    - "REQUIREMENT 02 - {{ req_02 }}:"
    - "  Task: {{ task_02_name | default('Not recorded') }}"
    - "  Command: {{ task_02_cmd | default('N/A') }}"
    - "  Exit code: {{ task_02_rc | default(-1) }}"
    - "  Data: {{ data_02 | default('') | trim }}"
    - "  Status: {{ status_02 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_02 | default('') | trim }}"
    - ""
    - "REQUIREMENT 03 - {{ req_03 }}:"
    - "  Task: {{ task_03_name | default('Not recorded') }}"
    - "  Command: {{ task_03_cmd | default('N/A') }}"
    - "  Exit code: {{ task_03_rc | default(-1) }}"
    - "  Data: {{ data_03 | default('') | trim }}"
    - "  Status: {{ status_03 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_03 | default('') | trim }}"
    - ""
    - "REQUIREMENT 04 - {{ req_04 }}:"
    - "  Task: {{ task_04_name | default('Overall evaluation') }}"
    - "  Command: {{ task_04_cmd | default('N/A') }}"
    - "  Exit code: {{ task_04_rc | default(0) }}"
    - "  Data: {{ data_04 | default('') | trim }}"
    - "  Status: {{ status_04 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_04 | default('') | trim }}"
    - ""
    - "REQUIREMENT 05 - {{ req_05 }}:"
    - "  Task: {{ task_05_name | default('Not recorded') }}"
    - "  Command: {{ task_05_cmd | default('N/A') }}"
    - "  Exit code: {{ task_05_rc | default(-1) }}"
    - "  Data: {{ data_05 | default('') | trim }}"
    - "  Status: {{ status_05 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_05 | default('') | trim }}"
    - ""
    - "========================================================"
    - "OVERALL COMPLIANCE:"
    - "  Result: {{ cis_result }}"
    - "========================================================"
  tags: [audit, cis, report]
