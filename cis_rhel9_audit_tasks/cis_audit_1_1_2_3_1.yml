---
- name: Initialize meta data variables
  include_vars: cis_audit_var_1_1_2_3_1.yml

- name: "Initialize data variables"
  set_fact:
    data_01: "Not collected yet"
    status_01: "UNKNOWN"
    details_01: "Not evaluated"
    data_02: "Not collected yet"
    status_02: "UNKNOWN"
    details_02: "Not evaluated"
    data_03: "Not collected yet"
    status_03: "UNKNOWN"
    details_03: "Not evaluated"
    task_01_name: "Not executed"
    task_01_cmd: "N/A"
    task_01_rc: -1
    task_02_name: "Not executed"
    task_02_cmd: "N/A"
    task_02_rc: -1
    task_03_name: "Not executed"
    task_03_cmd: "N/A"
    task_03_rc: -1
    cis_result: "UNKNOWN"

- name: "Req 01 - Check if /home is mounted using findmnt"
  ansible.builtin.command: findmnt -kn /home
  register: result_01
  failed_when: false
  changed_when: false

- name: "Store requirement 01 details"
  ansible.builtin.set_fact:
    task_01_name: "Check if /home is mounted using findmnt command"
    task_01_cmd: "findmnt -kn /home"
    task_01_rc: "{{ result_01.rc | default(-1) }}"
    data_01: "{{ result_01.stdout | default('') | trim }}"
    status_01: "{{ 'PASS' if result_01.rc | default(-1) == 0 else 'FAIL' }}"
    details_01: "{{ 'Findmnt executed successfully' if result_01.rc | default(-1) == 0 else 'Findmnt command failed or /home not found' }}"

- name: "Req 02 - Summarize overall compliance"
  ansible.builtin.set_fact:
    task_02_name: "Summarize overall compliance"
    task_02_cmd: "N/A (derived from requirement 01)"
    task_02_rc: "0"
    data_02: "{{ (result_01.stdout | default('') | trim) if (result_01.rc | default(-1) == 0) else 'No /home mount found' }}"
    status_02: "{{ 'PASS' if (result_01.rc | default(-1) == 0) else 'FAIL' }}"
    details_02: "{{ '/home is mounted on a separate partition.' if (result_01.rc | default(-1) == 0) else '/home is not mounted on a separate partition.' }}"

- name: "Store final audit result in cis_result"
  ansible.builtin.set_fact:
    cis_result: "{{ status_02 | default('UNKNOWN') | trim }}"
    task_03_name: "Store final audit result in cis_result"
    task_03_cmd: "set_fact: cis_result = {{ status_02 | default('UNKNOWN') | trim }}"
    task_03_rc: "0"
    data_03: "{{ status_02 | default('UNKNOWN') | trim }}"
    status_03: "PASS"
    details_03: "cis_result set to {{ status_02 | default('UNKNOWN') | trim }}"

- name: "Generate audit report"
  ansible.builtin.debug:
    msg:
    - "========================================================"
    - "AUDIT REPORT — CIS 1.1.2.3.1"
    - "Reference: CIS Benchmark checkpoint 1.1.2.3.1"
    - "========================================================"
    - ""
    - "REQUIREMENT 01 - {{ req_01 }}:"
    - "  Task: {{ task_01_name | default('Task not recorded') }}"
    - "  Command: {{ task_01_cmd | default('N/A') }}"
    - "  Exit code: {{ task_01_rc | default(-1) }}"
    - "  Data: {{ data_01 | default('') | trim }}"
    - "  Status: {{ status_01 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_01 | default('Not evaluated') | trim }}"
    - ""
    - "REQUIREMENT 02 - {{ req_02 }}:"
    - "  Task: {{ task_02_name | default('Task not recorded') }}"
    - "  Command: {{ task_02_cmd | default('N/A') }}"
    - "  Exit code: {{ task_02_rc | default(-1) }}"
    - "  Data: {{ data_02 | default('') | trim }}"
    - "  Status: {{ status_02 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_02 | default('Not evaluated') | trim }}"
    - ""
    - "REQUIREMENT 03 - {{ req_03 }}:"
    - "  Task: {{ task_03_name | default('Task not recorded') }}"
    - "  Command: {{ task_03_cmd | default('N/A') }}"
    - "  Exit code: {{ task_03_rc | default(-1) }}"
    - "  Data: {{ data_03 | default('') | trim }}"
    - "  Status: {{ status_03 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_03 | default('Not evaluated') | trim }}"
    - ""
    - "========================================================"
    - "OVERALL COMPLIANCE:"
    - "  Result: {{ cis_result | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_02 | default('Not evaluated') | trim }}"
    - "========================================================"
