req_01: "Check if dnf package manager is installed using command: `which dnf`. Expected result: path to dnf binary (e.g., /usr/bin/dnf)."
req_02: "Check for available updates and patches using command: `dnf check-update`. Expected result: no output (no updates available)."
req_03: "Check if a system reboot is required using command: `dnf needs-restarting -r`. Expected result: no output (no reboot required)."
req_04: "Summarize overall compliance status: all checks passed (no updates pending, no reboot required)."
req_05: "Store the final audit result in a variable named 'cis_result' using set_fact. Set cis_result to the overall compliance status (PASS/FAIL/SKIP/UNKNOWN) derived from the last requirement's status variable."
