---
- name: Initialize meta data variables
  include_vars: cis_audit_var_6_3_3_7.yml

- name: "Gather package facts"
  ansible.builtin.package_facts:
    manager: auto
  failed_when: false

- name: "Set auditd installed fact"
  ansible.builtin.set_fact:
    auditd_installed: "{{ 'audit' in ansible_facts.packages }}"

- name: "Set prerequisite condition"
  ansible.builtin.set_fact:
    prereq_met: "{{ auditd_installed | bool }}"

# --------------------- REQUIREMENT 1 ---------------------
- name: "Req 1 - Check on-disk audit rules for unsuccessful file access attempts"
  ansible.builtin.shell: |
    UID_MIN=$(awk '/^\s*UID_MIN/{print $2}' /etc/login.defs)
    [ -n "${UID_MIN}" ] && awk "/^[[:space:]]*-a *always,exit/ &&/ -F *arch=b(32|64)/ &&(/ -F *auid!=unset/||/ -F *auid!=-1/||/ -F *auid!=4294967295/) &&/ -F *auid>=${UID_MIN}/ &&(/ -F *exit=-EACCES/||/ -F *exit=-EPERM/) &&/ -S/ &&/creat,open,openat,truncate,ftruncate/ &&(/ key= *[!-~]* *\$/||/ -k *[!-~]* *\$/)" /etc/audit/rules.d/*.rules || printf "ERROR: Variable 'UID_MIN' is unset.\n"
  args:
    executable: /bin/bash
  register: result_01
  failed_when: false
  changed_when: false
  when: prereq_met | bool

- name: "Store requirement 01 details"
  ansible.builtin.set_fact:
    task_01_name: "Check on-disk audit rules"
    task_01_cmd: "awk pattern check on /etc/audit/rules.d/*.rules"
    task_01_rc: "{{ result_01.rc | default(-1) }}"
    data_01: "{{ result_01.stdout | default('') | trim }}"
    status_01: "{{ ('SKIP' if not (prereq_met | bool) else ('FAIL' if (result_01.rc | default(-1) != 0) or 'ERROR' in (result_01.stdout | default('') | trim) else 'PASS')) | trim }}"
    details_01: "{{ 'Prerequisite not met' if not (prereq_met | bool) else 'Command executed successfully' if (result_01.rc | default(-1) == 0) and not 'ERROR' in (result_01.stdout | default('') | trim) else 'Command failed or returned error' }}"

# --------------------- REQUIREMENT 2 ---------------------
- name: "Req 2 - Verify compliance status"
  ansible.builtin.set_fact:
    task_02_name: "Verify compliance status"
    task_02_cmd: "N/A"
    task_02_rc: "0"
    data_02: "{{ data_01 | default('') | trim }}"
    status_02: "{{ ('SKIP' if not (prereq_met | bool) else ('PASS' if (data_01 | default('') | trim | length > 0) and not 'ERROR' in (data_01 | default('') | trim) else 'FAIL')) | trim }}"
    details_02: "{{ 'Prerequisite not met' if not (prereq_met | bool) else 'Rules found for unsuccessful file access attempts' if (data_01 | default('') | trim | length > 0) and not 'ERROR' in (data_01 | default('') | trim) else 'No rules found or UID_MIN unset' }}"

# --------------------- REQUIREMENT 3 ---------------------
- name: "Req 3 - Store final audit result in cis_result"
  ansible.builtin.set_fact:
    cis_result: "{{ status_02 | default('ERROR') | trim }}"
    task_03_name: "Store cis_result"
    task_03_cmd: "N/A"
    task_03_rc: "0"
    data_03: "{{ status_02 | default('ERROR') | trim }}"
    status_03: "{{ status_02 | default('ERROR') | trim }}"
    details_03: "Overall compliance status stored"

# --------------------- REQUIREMENT 4: REPORT ---------------------
- name: "Generate audit report"
  ansible.builtin.debug:
    msg:
    - "AUDIT REPORT — CIS 6.3.3.7"
    - "Reference: CIS Benchmark checkpoint 6.3.3.7"
    - ""
    - "REQUIREMENT 01 - {{ req_01 }}:"
    - "  Task: {{ task_01_name | default('Not recorded') }}"
    - "  Command: {{ task_01_cmd | default('N/A') }}"
    - "  Exit code: {{ task_01_rc | default(-1) }}"
    - "  Data: {{ data_01 | default('') | trim }}"
    - "  Status: {{ status_01 | default('ERROR') | trim }}"
    - "  Details: {{ details_01 | default('') | trim }}"
    - ""
    - "REQUIREMENT 02 - {{ req_02 }}:"
    - "  Task: {{ task_02_name | default('Not recorded') }}"
    - "  Command: {{ task_02_cmd | default('N/A') }}"
    - "  Exit code: {{ task_02_rc | default(-1) }}"
    - "  Data: {{ data_02 | default('') | trim }}"
    - "  Status: {{ status_02 | default('ERROR') | trim }}"
    - "  Details: {{ details_02 | default('') | trim }}"
    - ""
    - "REQUIREMENT 03 - {{ req_03 }}:"
    - "  Task: {{ task_03_name | default('Not recorded') }}"
    - "  Command: {{ task_03_cmd | default('N/A') }}"
    - "  Exit code: {{ task_03_rc | default(-1) }}"
    - "  Data: {{ data_03 | default('') | trim }}"
    - "  Status: {{ status_03 | default('ERROR') | trim }}"
    - "  Details: {{ details_03 | default('') | trim }}"
    - ""
    - "========================================================"
    - "OVERALL COMPLIANCE:"
    - "  Result: {{ cis_result | default('ERROR') | trim }}"
    - "========================================================"
