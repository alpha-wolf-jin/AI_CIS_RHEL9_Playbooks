checkpoint: "1.7.1"
cis_ref: "CIS Benchmark checkpoint {{ checkpoint }}"
req_01: "Run the provided audit script to verify Ensure message of the day is configured properly."
req_02: "VERIFY: Summarise compliance status for Ensure message of the day is configured properly. Expected result: PASS if compliant, FAIL otherwise"
req_03: "Store the final audit result in a variable named 'cis_result' using set_fact. Set cis_result to the overall compliance status (PASS/FAIL/SKIP/UNKNOWN) derived from the last requirement's status variable."
req_04: "Create a task named 'Generate audit report' using debug msg with EXACTLY this format"
audit_script: "/tmp/audit_motd.sh"
audit_script_content: |
  {% raw %}
  #!/usr/bin/env bash
  {
     l_output="" l_output2=""
     a_files=()
     for l_file in /etc/motd{,.d/*}; do
        if grep -Psqi -- "(\\\v|\\\r|\\\m|\\\s|\b$(grep ^ID= /etc/os-release | cut -d= -f2 | sed -e 's/"//g')\b)" "$l_file"; then
           l_output2="$l_output2\n - File: \"$l_file\" includes system information"
        else
           a_files+=("$l_file")
        fi
     done
     if [ "${#a_files[@]}" -gt 0 ]; then
        echo -e "\n-  ** Please review the following files and verify their contents follow local site policy **\n"
        printf '%s\n' "${a_files[@]}"
     elif [ -z "$l_output2" ]; then
        echo -e "- ** No MOTD files with any size were found. Please verify this conforms to local site policy ** -"
     fi
     if [ -z "$l_output2" ]; then
        l_output=" - No MOTD files include system information"
        echo -e "\n- Audit Result:\n  ** PASS **\n$l_output\n"
     else
        echo -e "\n- Audit Result:\n  ** FAIL **\n - Reason(s) for audit failure:\n$l_output2\n"
     fi
  }
  {% endraw %}
backup_dir: "/var/log/ai-playbooks-backup/{{ checkpoint }}"
marker_file: "{{ backup_dir }}/audit_script_existed"
