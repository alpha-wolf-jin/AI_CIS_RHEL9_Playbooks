---
- name: Initialize meta data variables
  include_vars: cis_audit_var_2_4_2_1.yml

- name: "Req 1 - Gather package facts"
  ansible.builtin.package_facts:
    manager: auto
  failed_when: false
  tags: [audit]
- name: "Req 1 - Set at installed fact"
  ansible.builtin.set_fact:
    at_installed: "{{ 'at' in ansible_facts.packages }}"
  tags: [audit]
- name: "Req 1 - Capture /etc/at.allow status"
  ansible.builtin.shell: "stat -Lc 'Access: (%a/%A) Owner: (%U) Group: (%G)' /etc/at.allow"
  args:
    executable: /bin/bash
  register: at_allow_stat
  failed_when: false
  changed_when: false
  when: at_installed | default(false)
  tags: [audit]
- name: "Req 1 - Capture /etc/at.deny status"
  ansible.builtin.shell: "[ -e /etc/at.deny ] && stat -Lc 'Access: (%a/%A) Owner: (%U) Group: (%G)' /etc/at.deny || echo 'NOT_EXIST'"
  args:
    executable: /bin/bash
  register: at_deny_stat
  failed_when: false
  changed_when: false
  when: at_installed | default(false)
  tags: [audit]
- name: "Req 1 - Parse /etc/at.allow compliance details"
  ansible.builtin.set_fact:
    raw_allow: "{{ at_allow_stat.stdout | default('') }}"
    at_allow_mode: "{{ ((raw_allow.split('Access: (')[1] | default('')).split('/')[0] | default('')) | trim }}"
    at_allow_owner: "{{ ((raw_allow.split('Owner: (')[1] | default('')).split(')')[0] | default('')) | trim }}"
    at_allow_group: "{{ ((raw_allow.split('Group: (')[1] | default('')).split(')')[0] | default('')) | trim }}"
  when: at_installed | default(false) and at_allow_stat.rc == 0
  tags: [audit]
- name: "Req 1 - Evaluate /etc/at.allow compliance"
  ansible.builtin.set_fact:
    at_allow_ok: >-
      {% if at_allow_stat.rc == 0 %}
        {% set mode_int = at_allow_mode | int %}
        {{ mode_int <= 640 and at_allow_owner == 'root' and (at_allow_group == 'root' or at_allow_group == 'daemon') }}
      {% else %}
        false
      {% endif %}
  when: at_installed | default(false)
  tags: [audit]
- name: "Req 1 - Parse /etc/at.deny compliance details"
  ansible.builtin.set_fact:
    raw_deny: "{{ at_deny_stat.stdout | default('') }}"
    at_deny_not_exist: "{{ (raw_deny | trim) == 'NOT_EXIST' }}"
    at_deny_mode: >-
      {% if not at_deny_not_exist %}
        {{ ((raw_deny.split('Access: (')[1] | default('')).split('/')[0] | default('')) | trim }}
      {% else %}
        ''
      {% endif %}
    at_deny_owner: >-
      {% if not at_deny_not_exist %}
        {{ ((raw_deny.split('Owner: (')[1] | default('')).split(')')[0] | default('')) | trim }}
      {% else %}
        ''
      {% endif %}
    at_deny_group: >-
      {% if not at_deny_not_exist %}
        {{ ((raw_deny.split('Group: (')[1] | default('')).split(')')[0] | default('')) | trim }}
      {% else %}
        ''
      {% endif %}
  when: at_installed | default(false)
  tags: [audit]
- name: "Req 1 - Evaluate /etc/at.deny compliance"
  ansible.builtin.set_fact:
    at_deny_ok: >-
      {% if at_deny_not_exist | default(false) %}
        true
      {% else %}
        {% set mode_int = at_deny_mode | int %}
        {{ mode_int <= 640 and at_deny_owner == 'root' and (at_deny_group == 'root' or at_deny_group == 'daemon') }}
      {% endif %}
  when: at_installed | default(false)
  tags: [audit]
- name: "Req 2 - Determine compliance status"
  ansible.builtin.set_fact:
    compliance_status: >-
      {%- if not at_installed | bool -%}
        SKIP
      {%- elif at_allow_ok | default(false) and at_deny_ok | default(false) -%}
        PASS
      {%- else -%}
        FAIL
      {%- endif %}
  tags: [audit]
- name: "Req 2 - Set reporting facts for compliance"
  ansible.builtin.set_fact:
    task_02_name: "Verify compliance from stat outputs"
    task_02_cmd: "Evaluation of audit results"
    task_02_rc: 0
    data_02: "Compliance: {{ compliance_status }}"
    status_02: "{{ compliance_status }}"
    details_02: >-
      {%- if compliance_status == 'PASS' -%}
        at.allow and at.deny compliant
      {%- elif compliance_status == 'FAIL' -%}
        at.allow or at.deny not compliant
      {%- elif compliance_status == 'SKIP' -%}
        at package not installed, audit skipped
      {%- else -%}
        Unknown compliance status
      {%- endif %}
  tags: [audit]
- name: "Req 1 - Set reporting facts"
  ansible.builtin.set_fact:
    task_01_name: "Audit /etc/at.allow and /etc/at.deny permissions"
    task_01_cmd: "stat -Lc 'Access: (%a/%A) Owner: (%U) Group: (%G)' /etc/at.allow ; [ -e /etc/at.deny ] && stat -Lc 'Access: (%a/%A) Owner: (%U) Group: (%G)' /etc/at.deny || echo 'NOT_EXIST'"
    task_01_rc: 0
    data_01: |
      {{ (at_allow_stat.stdout | default('') | trim) + '\n' + (at_deny_stat.stdout | default('') | trim) }}
    status_01: "{{ 'SKIP' if not (at_installed | default(false)) else 'PASS' }}"
    details_01: "{{ 'at package not installed, audit skipped' if not (at_installed | default(false)) else 'Audit commands executed successfully' }}"
  tags: [audit]
- name: "Req 3 - Store final audit result in cis_result"
  ansible.builtin.set_fact:
    cis_result: "{{ status_02 | default('ERROR') }}"
  tags: [audit]
- name: "Req 3 - Set reporting facts for cis_result storage"
  ansible.builtin.set_fact:
    task_03_name: "Store cis_result fact"
    task_03_cmd: "set_fact: cis_result = {{ status_02 | default('ERROR') }}"
    task_03_rc: 0
    data_03: "cis_result = {{ cis_result }}"
    status_03: "{{ 'PASS' if cis_result is defined else 'FAIL' }}"
    details_03: "cis_result stored successfully"
  tags: [audit]
- name: "Req 4 - Set reporting facts for report generation"
  ansible.builtin.set_fact:
    task_04_name: "Generate audit report"
    task_04_cmd: "debug msg with required format"
    task_04_rc: 0
    data_04: "Report displayed below"
    status_04: "PASS"
    details_04: "Audit report generated"
  tags: [audit]
- name: "Req 4 - Generate audit report"
  ansible.builtin.debug:
    msg:
    - "AUDIT REPORT — CIS 2.4.2.1"
    - "Reference: CIS Benchmark checkpoint 2.4.2.1"
    - "REQUIREMENT 01 - {{ req_01 }}:"
    - "  Task: {{ task_01_name | default('Not recorded') }}"
    - "  Command: {{ task_01_cmd | default('N/A') }}"
    - "  Exit code: {{ task_01_rc | default(-1) }}"
    - "  Data: {{ data_01 | default('') | trim }}"
    - "  Status: {{ status_01 | default('ERROR') | trim }}"
    - "  Details: {{ details_01 | default('') | trim }}"
    - ""
    - "REQUIREMENT 02 - {{ req_02 }}:"
    - "  Task: {{ task_02_name | default('Not recorded') }}"
    - "  Command: {{ task_02_cmd | default('N/A') }}"
    - "  Exit code: {{ task_02_rc | default(-1) }}"
    - "  Data: {{ data_02 | default('') | trim }}"
    - "  Status: {{ status_02 | default('ERROR') | trim }}"
    - "  Details: {{ details_02 | default('') | trim }}"
    - ""
    - "REQUIREMENT 03 - {{ req_03 }}:"
    - "  Task: {{ task_03_name | default('Not recorded') }}"
    - "  Command: {{ task_03_cmd | default('N/A') }}"
    - "  Exit code: {{ task_03_rc | default(-1) }}"
    - "  Data: {{ data_03 | default('') | trim }}"
    - "  Status: {{ status_03 | default('ERROR') | trim }}"
    - "  Details: {{ details_03 | default('') | trim }}"
    - ""
    - "REQUIREMENT 04 - {{ req_04 }}:"
    - "  Task: {{ task_04_name | default('Not recorded') }}"
    - "  Command: {{ task_04_cmd | default('N/A') }}"
    - "  Exit code: {{ task_04_rc | default(-1) }}"
    - "  Data: {{ data_04 | default('') | trim }}"
    - "  Status: {{ status_04 | default('ERROR') | trim }}"
    - "  Details: {{ details_04 | default('') | trim }}"
    - ""
    - "========================================================"
    - "OVERALL COMPLIANCE:"
    - "  Result: {{ cis_result | default('ERROR') | trim }}"
    - "  Details: {{ details_02 | default('Not evaluated') | trim }}"
    - "========================================================"
  tags: [audit]
