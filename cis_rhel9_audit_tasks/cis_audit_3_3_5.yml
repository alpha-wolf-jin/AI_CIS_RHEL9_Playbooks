---
- name: Initialize meta data variables
  include_vars: cis_audit_var_3_3_5.yml

- name: "Snapshot - ensure backup directory exists"
  ansible.builtin.file:
    path: "{{ backup_dir }}"
    state: directory
  changed_when: false

- name: "Snapshot - check if audit script already exists"
  ansible.builtin.stat:
    path: "{{ audit_script }}"
  register: script_pre_stat

- name: "Snapshot - save script pre-existence marker"
  ansible.builtin.copy:
    content: "{{ 'yes' if script_pre_stat.stat.exists else 'no' }}"
    dest: "{{ backup_dir }}/script_preexists.txt"
  changed_when: false


- block:
  - name: "Req 1 - Copy audit script to target"
    ansible.builtin.copy:
      dest: "{{ audit_script }}"
      mode: '0700'
      content: "{{ audit_script_content }}"
    changed_when: false

  - name: "Req 1 - Execute audit script"
    ansible.builtin.shell: /bin/bash "{{ audit_script }}"
    args:
      executable: /bin/bash
    register: audit_result
    failed_when: false
    changed_when: false

  - name: "Determine compliance status from audit output"
    set_fact:
      compliance_status: >-
        {%- set out = audit_result.stdout | default('') -%}
        {%- if '** PASS **' in out %}PASS{% elif '** FAIL **' in out %}FAIL{% else %}UNKNOWN{% endif -%}

  - name: "Req 03 - Store final audit result in cis_result"
    ansible.builtin.set_fact:
      cis_result: "{{ compliance_status }}"

  - name: "Store requirement 01 details"
    set_fact:
      task_01_name: "Execute CIS 3.3.5 audit script"
      task_01_cmd: "/bin/bash /tmp/audit_cis_3_3_5.sh"
      task_01_rc: "{{ audit_result.rc | default(-1) }}"
      data_01: "{{ audit_result.stdout | default('') | trim }}"
      status_01: "{{ 'PASS' if ('** PASS **' in audit_result.stdout or '** FAIL **' in audit_result.stdout) else 'FAIL' }}"
      details_01: "{{ 'Audit script executed and results captured' if ('** PASS **' in audit_result.stdout or '** FAIL **' in audit_result.stdout) else 'Script did not produce expected audit markers' }}"

  - name: "Store requirement 02 details"
    set_fact:
      task_02_name: "Evaluate compliance from audit output"
      task_02_cmd: "N/A"
      task_02_rc: 0
      data_02: "{{ audit_result.stdout | default('') | trim }}"
      status_02: "{{ compliance_status }}"
      details_02: "{{ 'System is compliant' if compliance_status == 'PASS' else ('System is NOT compliant' if compliance_status == 'FAIL' else 'Compliance status unclear') }}"

  - name: "Store requirement 03 details"
    set_fact:
      task_03_name: "Store final audit result"
      task_03_cmd: "set_fact: cis_result = {{ compliance_status }}"
      task_03_rc: 0
      data_03: "cis_result set to {{ compliance_status }}"
      status_03: "PASS"
      details_03: "cis_result variable stored"

  - name: "Store requirement 04 details"
    set_fact:
      task_04_name: "Generate audit report"
      task_04_cmd: "debug msg"
      task_04_rc: 0
      data_04: "Report generated (see output)"
      status_04: "PASS"
      details_04: "Audit report successfully generated"

  - name: "Req 04 - Generate audit report"
    debug:
      msg:
      - "AUDIT REPORT — CIS 3.3.5"
      - "Reference: CIS Benchmark checkpoint 3.3.5"
      - ""
      - "REQUIREMENT 01 - {{ req_01 }}:"
      - "  Task: {{ task_01_name | default('Not recorded') }}"
      - "  Command: {{ task_01_cmd | default('N/A') }}"
      - "  Exit code: {{ task_01_rc | default(-1) }}"
      - "  Data: {{ data_01 | default('') | trim }}"
      - "  Status: {{ status_01 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_01 | default('') | trim }}"
      - ""
      - "REQUIREMENT 02 - {{ req_02 }}:"
      - "  Task: {{ task_02_name | default('Not recorded') }}"
      - "  Command: {{ task_02_cmd | default('N/A') }}"
      - "  Exit code: {{ task_02_rc | default(-1) }}"
      - "  Data: {{ data_02 | default('') | trim }}"
      - "  Status: {{ status_02 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_02 | default('') | trim }}"
      - ""
      - "REQUIREMENT 03 - {{ req_03 }}:"
      - "  Task: {{ task_03_name | default('Not recorded') }}"
      - "  Command: {{ task_03_cmd | default('N/A') }}"
      - "  Exit code: {{ task_03_rc | default(-1) }}"
      - "  Data: {{ data_03 | default('') | trim }}"
      - "  Status: {{ status_03 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_03 | default('') | trim }}"
      - ""
      - "REQUIREMENT 04 - {{ req_04 }}:"
      - "  Task: {{ task_04_name | default('Not recorded') }}"
      - "  Command: {{ task_04_cmd | default('N/A') }}"
      - "  Exit code: {{ task_04_rc | default(-1) }}"
      - "  Data: {{ data_04 | default('') | trim }}"
      - "  Status: {{ status_04 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_04 | default('') | trim }}"
      - ""
      - "========================================================"
      - "OVERALL COMPLIANCE:"
      - "  Result: {{ cis_result | default('UNKNOWN') | trim }}"
      - "========================================================"

  always:
  - name: "Restore - read script pre-existence marker"
    ansible.builtin.slurp:
      src: "{{ backup_dir }}/script_preexists.txt"
    register: pre_exists_marker

  - name: "Restore - remove audit script if it was created by us"
    ansible.builtin.file:
      path: "{{ audit_script }}"
      state: absent
    when: "pre_exists_marker.content | b64decode | trim == 'no'"
    changed_when: false
