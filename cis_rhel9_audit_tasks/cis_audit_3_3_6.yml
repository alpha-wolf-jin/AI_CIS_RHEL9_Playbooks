---
- name: Initialize meta data variables
  include_vars: cis_audit_var_3_3_6.yml

- name: "Initialize data variables"
  ansible.builtin.set_fact:
    data_01: "Not collected yet"
    status_01: "UNKNOWN"
    details_01: "Not evaluated"
    task_01_name: "Not executed"
    task_01_cmd: "N/A"
    task_01_rc: -1
    data_02: "Not collected yet"
    status_02: "UNKNOWN"
    details_02: "Not evaluated"
    task_02_name: "Not executed"
    task_02_cmd: "N/A"
    task_02_rc: -1
    data_03: "Not collected yet"
    status_03: "UNKNOWN"
    details_03: "Not evaluated"
    task_03_name: "Not executed"
    task_03_cmd: "N/A"
    task_03_rc: -1

# === PREREQ CHECK ===
- name: "Gather package facts"
  ansible.builtin.package_facts:
    manager: auto
  failed_when: false

- name: "Check if systemd is installed (required for systemd-sysctl)"
  ansible.builtin.set_fact:
    systemd_installed: "{{ 'systemd' in ansible_facts.packages }}"
  failed_when: false

# === REQUIREMENT 01: Run audit script ===
- name: "Req 01 - Execute audit script inline"
  ansible.builtin.shell:
    cmd: /bin/bash
    stdin: "{{ audit_script_content }}"
  args:
    executable: /bin/bash
  register: audit_result
  when: "systemd_installed | default(false) | bool"
  failed_when: false
  changed_when: false

- name: "Store requirement 01 details"
  ansible.builtin.set_fact:
    task_01_name: "Execute audit script for CIS 3.3.6"
    task_01_cmd: "/bin/bash < inline audit script"
    task_01_rc: "{{ audit_result.rc | default(-1) }}"
    data_01: "{{ audit_result.stdout | default('') | trim }}"
    status_01: "{{ 'NOT_APPLICABLE' if audit_result is skipped else 'PASS' }}"
    details_01: "{{ 'Script executed successfully' if audit_result is not skipped else 'Required systemd package not installed' }}"

# === REQUIREMENT 02: Compliance summary ===
- name: "Req 02 - Determine compliance status from audit output"
  ansible.builtin.set_fact:
    status_02: >-
      {%- set out = audit_result.stdout | default('') | trim -%}
      {%- if audit_result is skipped -%}
        NOT_APPLICABLE
      {%- elif '** PASS **' in out -%}
        PASS
      {%- elif '** FAIL **' in out -%}
        FAIL
      {%- else -%}
        UNKNOWN
      {%- endif -%}
    details_02: >-
      {%- set out = audit_result.stdout | default('') | trim -%}
      {%- if audit_result is skipped -%}
        Prerequisite not met (systemd not installed)
      {%- elif '** PASS **' in out -%}
        System is compliant
      {%- elif '** FAIL **' in out -%}
        System is not compliant
      {%- else -%}
        Unable to determine compliance
      {%- endif -%}
    data_02: "{{ audit_result.stdout | default('') | trim }}"
    task_02_name: "Summarise compliance status for secure ICMP redirects"
    task_02_cmd: "Audit script output analysis"
    task_02_rc: "{{ audit_result.rc | default(-1) }}"

# === REQUIREMENT 03: Store CIS result variable ===
- name: "Store CIS result variable and record requirement 03 details"
  ansible.builtin.set_fact:
    cis_result: "{{ status_02 | default('UNKNOWN') | trim }}"
    overall_details: >-
      Audit completed.
      System compliance: {{ status_02 | default('UNKNOWN') | trim }} - {{ details_02 | default('') | trim }}
    task_03_name: "Store CIS result variable"
    task_03_cmd: "set_fact cis_result = {{ status_02 | default('UNKNOWN') | trim }}"
    task_03_rc: 0
    data_03: "{{ status_02 | default('UNKNOWN') | trim }}"
    status_03: "PASS"
    details_03: "CIS result stored successfully"

# === AUDIT REPORT ===
- name: "Generate audit report"
  ansible.builtin.debug:
    msg:
    - "AUDIT REPORT — CIS 3.3.6"
    - "Reference: CIS Benchmark checkpoint 3.3.6"
    - ""
    - "REQUIREMENT 01 - {{ req_01 }}:"
    - "  Task: {{ task_01_name | default('Not recorded') }}"
    - "  Command: {{ task_01_cmd | default('N/A') }}"
    - "  Exit code: {{ task_01_rc | default(-1) }}"
    - "  Data: {{ data_01 | default('') | trim }}"
    - "  Status: {{ status_01 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_01 | default('') | trim }}"
    - ""
    - "REQUIREMENT 02 - {{ req_02 }}:"
    - "  Task: {{ task_02_name | default('Not recorded') }}"
    - "  Command: {{ task_02_cmd | default('N/A') }}"
    - "  Exit code: {{ task_02_rc | default(-1) }}"
    - "  Data: {{ data_02 | default('') | trim }}"
    - "  Status: {{ status_02 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_02 | default('') | trim }}"
    - ""
    - "REQUIREMENT 03 - {{ req_03 }}:"
    - "  Task: {{ task_03_name | default('Not recorded') }}"
    - "  Command: {{ task_03_cmd | default('N/A') }}"
    - "  Exit code: {{ task_03_rc | default(-1) }}"
    - "  Data: {{ data_03 | default('') | trim }}"
    - "  Status: {{ status_03 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_03 | default('') | trim }}"
    - ""
    - "========================================================"
    - "OVERALL COMPLIANCE:"
    - "  Result: {{ cis_result | default('UNKNOWN') | trim }}"
    - "  Details: {{ overall_details | default('Not evaluated') | trim }}"
    - "========================================================"
