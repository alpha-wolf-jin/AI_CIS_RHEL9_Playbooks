---
- name: Initialize meta data variables
  include_vars: cis_audit_var_1_1_2_2_2.yml

- name: "Req 01 - Check if /dev/shm is a separate partition using findmnt command"
  ansible.builtin.command: findmnt -kn /dev/shm
  register: result_01
  failed_when: false
  changed_when: false

- name: "Req 01 - Set partition check facts"
  ansible.builtin.set_fact:
    task_01_name: "Check if /dev/shm is a separate partition using findmnt command"
    task_01_cmd: "findmnt -kn /dev/shm"
    task_01_rc: "{{ result_01.rc | default(-1) }}"
    data_01: "{{ result_01.stdout | default('') | trim }}"
    status_01: "{{ 'PASS' if (result_01.rc | default(-1)) == 0 and (result_01.stdout | default('') | trim | length > 0) else 'FAIL' }}"
    details_01: "{{ 'Partition exists' if (result_01.rc | default(-1)) == 0 and (result_01.stdout | default('') | trim | length > 0) else 'Partition not found or command failed' }}"
    partition_exists: "{{ (result_01.rc | default(-1)) == 0 and (result_01.stdout | default('') | trim | length > 0) }}"

# ---------- Requirement 2 ----------
- name: "Req 02 - Check if nodev option is set on /dev/shm partition"
  ansible.builtin.shell: findmnt -kn /dev/shm | grep -v 'nodev'
  args:
    executable: /bin/bash
  register: result_02
  failed_when: false
  changed_when: false

- name: "Req 02 - Set nodev check facts"
  ansible.builtin.set_fact:
    task_02_name: "Check if nodev option is set on /dev/shm partition"
    task_02_cmd: "findmnt -kn /dev/shm | grep -v 'nodev'"
    task_02_rc: "{{ result_02.rc | default(-1) }}"
    data_02: "{{ result_02.stdout | default('') | trim }}"
    status_02: "{{ 'PASS' if (result_02.stdout | default('') | trim) == '' else 'FAIL' }}"
    details_02: "{{ 'nodev option is set (no lines returned)' if (result_02.stdout | default('') | trim) == '' else 'nodev option NOT set (non-empty output)' }}"
    nodev_set: "{{ (result_02.stdout | default('') | trim) == '' }}"

# ---------- Requirement 3 ----------
- name: "Req 03 - Determine overall compliance"
  ansible.builtin.set_fact:
    task_03_name: "Summarize overall compliance"
    task_03_cmd: "N/A (logic based on previous checks)"
    task_03_rc: "N/A"
    data_03: "Partition exists: {{ partition_exists | default(false) }}; nodev set: {{ nodev_set | default(false) }}"
    status_03: "{{ 'PASS' if (partition_exists | default(false)) and (nodev_set | default(false)) else 'FAIL' }}"
    details_03: "{{ 'System is compliant' if (partition_exists | default(false)) and (nodev_set | default(false)) else 'System is non-compliant' }}"

# ---------- Requirement 4: Store overall result in cis_result ----------
- name: "Store overall result in cis_result"
  ansible.builtin.set_fact:
    cis_result: "{{ status_03 }}"

# ---------- Generate report ----------
- name: "Generate audit report"
  ansible.builtin.debug:
    msg:
    - "AUDIT REPORT — CIS 1.1.2.2.2"
    - "Reference: CIS Benchmark checkpoint 1.1.2.2.2"
    - ""
    - "REQUIREMENT 01 - {{ req_01 }}:"
    - "  Task: {{ task_01_name | default('Task not recorded') }}"
    - "  Command: {{ task_01_cmd | default('N/A') }}"
    - "  Exit code: {{ task_01_rc | default(-1) }}"
    - "  Data: {{ data_01 | default('') | trim }}"
    - "  Status: {{ status_01 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_01 | default('Not evaluated') | trim }}"
    - ""
    - "REQUIREMENT 02 - {{ req_02 }}:"
    - "  Task: {{ task_02_name | default('Task not recorded') }}"
    - "  Command: {{ task_02_cmd | default('N/A') }}"
    - "  Exit code: {{ task_02_rc | default(-1) }}"
    - "  Data: {{ data_02 | default('') | trim }}"
    - "  Status: {{ status_02 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_02 | default('Not evaluated') | trim }}"
    - ""
    - "REQUIREMENT 03 - {{ req_03 }}:"
    - "  Task: {{ task_03_name | default('Task not recorded') }}"
    - "  Command: {{ task_03_cmd | default('N/A') }}"
    - "  Exit code: {{ task_03_rc | default('N/A') }}"
    - "  Data: {{ data_03 | default('') | trim }}"
    - "  Status: {{ status_03 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_03 | default('Not evaluated') | trim }}"
    - ""
    - "OVERALL COMPLIANCE: Result: {{ cis_result | default('UNKNOWN') | trim }}"
