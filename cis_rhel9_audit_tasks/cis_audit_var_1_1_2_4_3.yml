mount_point: "/var"
mount_option: "nosuid"
req_01: "Check if /var is a separate partition using command: `findmnt -kn /var`. Expected result: output should contain a mount point entry for /var."
req_02: "Check if the nosuid option is set on /var partition using command: `findmnt -kn /var | grep nosuid`. Expected result: output should contain the mount line with 'nosuid'."
req_03: "Summarize overall compliance: PASS if both checks pass, SKIP if /var is not a separate partition, FAIL if /var is a separate partition but nosuid is not set."
req_04: "Store the final audit result in a variable named 'cis_result' using set_fact. Set cis_result to the overall compliance status (PASS/FAIL/SKIP/ERROR) derived from the last requirement's status variable."
