---
- name: Initialize meta data variables
  include_vars: cis_audit_var_5_2_5.yml

- name: "Req 01 - Check if sudo is installed"
  ansible.builtin.shell:
    cmd: which sudo
    executable: /bin/bash
  register: result_01
  failed_when: false
  changed_when: false

- name: "Store requirement 01 details"
  set_fact:
    task_01_name: "Req 01 - Check if sudo is installed"
    task_01_cmd: "which sudo"
    task_01_rc: "{{ result_01.rc | default(-1) }}"
    data_01: "{{ result_01.stdout | default('') | trim }}"
    status_01: "{{ 'PASS' if result_01.rc | default(-1) == 0 and result_01.stdout | default('') | trim != '' else 'FAIL' }}"
    details_01: "{{ 'sudo is installed' if result_01.rc | default(-1) == 0 and result_01.stdout | default('') | trim != '' else 'sudo not found or not installed' }}"
    sudo_installed: "{{ true if result_01.rc | default(-1) == 0 and result_01.stdout | default('') | trim != '' else false }}"

- name: "Req 02 - Check for !authenticate lines in sudoers files"
  ansible.builtin.shell:
    cmd: |
      grep -r "^[^#].*\!authenticate" /etc/sudoers*
    executable: /bin/bash
  register: result_02
  failed_when: false
  changed_when: false
  when: sudo_installed | default(false)

- name: "Store requirement 02 details"
  set_fact:
    task_02_name: "Req 02 - Check for !authenticate lines in sudoers files"
    task_02_cmd: |
      grep -r "^[^#].*\!authenticate" /etc/sudoers*
    task_02_rc: "{{ result_02.rc | default(-1) if sudo_installed | default(false) else -1 }}"
    data_02: "{{ result_02.stdout | default('') | trim if sudo_installed | default(false) else 'N/A' }}"
    status_02: "{{ ('PASS' if sudo_installed | default(false) and result_02.rc | default(-1) != 0 else ('FAIL' if sudo_installed | default(false) and result_02.rc | default(-1) == 0 else 'SKIPPED')) | trim }}"
    details_02: "{{ ('No !authenticate lines found' if sudo_installed | default(false) and result_02.rc | default(-1) != 0 else ('Found !authenticate lines' if sudo_installed | default(false) and result_02.rc | default(-1) == 0 else 'Sudo is not installed, check not applicable')) | trim }}"

- name: "Req 03 - Summarize overall compliance status"
  set_fact:
    task_03_name: "Req 03 - Summarize overall compliance status"
    task_03_cmd: "N/A"
    task_03_rc: -1
    data_03: "N/A"
    status_03: "{{ ('PASS' if sudo_installed | default(false) and status_02 == 'PASS' else ('FAIL' if sudo_installed | default(false) and status_02 == 'FAIL' else 'SKIPPED')) | trim }}"
    details_03: "{{ ('System is compliant: re-authentication for privilege escalation is required' if sudo_installed | default(false) and status_02 == 'PASS' else ('System is non-compliant: found !authenticate tag(s)' if sudo_installed | default(false) and status_02 == 'FAIL' else 'Sudo not installed, check not applicable')) | trim }}"

- name: "Store final audit result in cis_result"
  set_fact:
    cis_result: "{{ status_03 | default('UNKNOWN') | trim }}"

- name: "Req 04 - Generate audit report"
  debug:
    msg:
    - "AUDIT REPORT — CIS 5.2.5"
    - "Reference: CIS Benchmark checkpoint 5.2.5"
    - ""
    - "REQUIREMENT 01 - {{ req_01 }}:"
    - "  Task: {{ task_01_name | default('Not recorded') }}"
    - "  Command: {{ task_01_cmd | default('N/A') }}"
    - "  Exit code: {{ task_01_rc | default(-1) }}"
    - "  Data: {{ data_01 | default('') | trim }}"
    - "  Status: {{ status_01 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_01 | default('') | trim }}"
    - ""
    - "REQUIREMENT 02 - {{ req_02 }}:"
    - "  Task: {{ task_02_name | default('Not recorded') }}"
    - "  Command: {{ task_02_cmd | default('N/A') }}"
    - "  Exit code: {{ task_02_rc | default(-1) }}"
    - "  Data: {{ data_02 | default('') | trim }}"
    - "  Status: {{ status_02 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_02 | default('') | trim }}"
    - ""
    - "REQUIREMENT 03 - {{ req_03 }}:"
    - "  Task: {{ task_03_name | default('Not recorded') }}"
    - "  Command: {{ task_03_cmd | default('N/A') }}"
    - "  Exit code: {{ task_03_rc | default(-1) }}"
    - "  Data: {{ data_03 | default('') | trim }}"
    - "  Status: {{ status_03 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_03 | default('') | trim }}"
    - ""
    - "OVERALL COMPLIANCE:"
    - "  Result: {{ cis_result | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_03 | default('Not evaluated') | trim }}"
