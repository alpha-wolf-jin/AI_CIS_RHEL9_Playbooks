---
- name: Initialize meta data variables
  include_vars: cis_audit_var_2_1_17.yml

- name: "Initialize report variables"
  set_fact:
    data_01: "Not collected"
    status_01: "ERROR"
    details_01: "Not evaluated"
    data_02: "Not collected"
    status_02: "ERROR"
    details_02: "Not evaluated"
    data_03: "Not collected"
    status_03: "ERROR"
    details_03: "Not evaluated"
    data_04: "Not collected"
    status_04: "ERROR"
    details_04: "Not evaluated"
    data_05: "Not collected"
    status_05: "ERROR"
    details_05: "Not evaluated"
    data_06: "Not collected"
    status_06: "ERROR"
    details_06: "Not evaluated"
    data_07: "Not collected"
    status_07: "ERROR"
    details_07: "Not evaluated"
    task_01_name: "Not executed"
    task_01_cmd: "N/A"
    task_01_rc: -1

- name: "Req 01 - Check if squid package is installed"
  ansible.builtin.shell: rpm -q squid
  args:
    executable: /bin/bash
  register: result_01
  failed_when: false
  changed_when: false

- name: "Store requirement 01 details"
  set_fact:
    task_01_name: "Check squid package"
    task_01_cmd: "rpm -q squid"
    task_01_rc: "{{ result_01.rc | default(-1) }}"
    data_01: "{{ result_01.stdout | default('') | trim }}"
    status_01: "{{ 'PASS' if (result_01.rc | default(-1)) != 0 else 'FAIL' }}"
    details_01: "{{ 'Package not installed' if (result_01.rc | default(-1)) != 0 else 'Package installed' }}"
    squid_installed: "{{ (result_01.rc | default(-1)) == 0 }}"

- name: "Req 02 - Check if squid service is enabled"
  ansible.builtin.shell: systemctl is-enabled squid.service 2>/dev/null | grep 'enabled'
  args:
    executable: /bin/bash
  register: result_02
  failed_when: false
  changed_when: false
  when: squid_installed | default(false)

- name: "Store requirement 02 details"
  set_fact:
    task_02_name: "Check squid service enabled"
    task_02_cmd: "systemctl is-enabled squid.service 2>/dev/null | grep 'enabled'"
    task_02_rc: "{{ result_02.rc | default(-1) }}"
    data_02: "{{ result_02.stdout | default('') | trim }}"
    status_02: "{{ 'SKIP' if not (squid_installed | default(false)) else 'PASS' if (result_02.stdout | default('') | trim) == '' else 'FAIL' }}"
    details_02: "{{ 'Package not installed, check skipped' if not (squid_installed | default(false)) else 'Service not enabled' if (result_02.stdout | default('') | trim) == '' else 'Service is enabled' }}"
    squid_service_enabled: "{{ (result_02.stdout | default('') | trim) != '' }}"

- name: "Req 03 - Check if squid service is active"
  ansible.builtin.shell: systemctl is-active squid.service 2>/dev/null | grep '^active'
  args:
    executable: /bin/bash
  register: result_03
  failed_when: false
  changed_when: false
  when: squid_installed | default(false)

- name: "Store requirement 03 details"
  set_fact:
    task_03_name: "Check squid service active"
    task_03_cmd: "systemctl is-active squid.service 2>/dev/null | grep '^active'"
    task_03_rc: "{{ result_03.rc | default(-1) }}"
    data_03: "{{ result_03.stdout | default('') | trim }}"
    status_03: "{{ 'SKIP' if not (squid_installed | default(false)) else 'PASS' if (result_03.stdout | default('') | trim) == '' else 'FAIL' }}"
    details_03: "{{ 'Package not installed, check skipped' if not (squid_installed | default(false)) else 'Service not active' if (result_03.stdout | default('') | trim) == '' else 'Service is active' }}"
    squid_service_active: "{{ (result_03.stdout | default('') | trim) != '' }}"

- name: "Req 04 - Verify local site policy approves dependent package"
  ansible.builtin.pause:
    prompt: "Is the dependent package approved per local site policy? (yes/no)"
  register: policy_approval
  when: squid_installed | default(false)

- name: "Store requirement 04 details"
  set_fact:
    task_04_name: "Verify local policy approval"
    task_04_cmd: "manual check"
    task_04_rc: 0
    data_04: "{{ policy_approval.user_input | default('not collected') | trim }}"
    status_04: "{{ 'SKIP' if not (squid_installed | default(false)) else 'PASS' if (policy_approval.user_input | default('') | trim) == 'yes' else 'FAIL' }}"
    details_04: "{{ 'Package not installed, check skipped' if not (squid_installed | default(false)) else 'Approved' if (policy_approval.user_input | default('') | trim) == 'yes' else 'Not approved or not provided' }}"

- name: "Req 05 - Verify local site policy for stopping/masking squid service"
  ansible.builtin.pause:
    prompt: "Is stopping and masking the squid service/socket approved per local site policy? (yes/no)"
  register: policy_masking
  when: squid_installed | default(false)

- name: "Store requirement 05 details"
  set_fact:
    task_05_name: "Verify local policy for masking"
    task_05_cmd: "manual check"
    task_05_rc: 0
    data_05: "{{ policy_masking.user_input | default('not collected') | trim }}"
    status_05: "{{ 'SKIP' if not (squid_installed | default(false)) else 'PASS' if (policy_masking.user_input | default('') | trim) == 'yes' else 'FAIL' }}"
    details_05: "{{ 'Package not installed, check skipped' if not (squid_installed | default(false)) else 'Approved' if (policy_masking.user_input | default('') | trim) == 'yes' else 'Not approved or not provided' }}"

- name: "Req 06 - Evaluate overall compliance"
  set_fact:
    task_06_name: "Evaluate overall compliance"
    task_06_cmd: "set_fact"
    task_06_rc: 0
    data_06: "Compliance evaluation"
    status_06: >-
      {{- 'PASS' if not (squid_installed | default(false))
         else 'PASS' if (status_02 | default('ERROR') | trim) == 'PASS'
                       and (status_03 | default('ERROR') | trim) == 'PASS'
                       and (status_04 | default('ERROR') | trim) == 'PASS'
                       and (status_05 | default('ERROR') | trim) == 'PASS'
         else 'FAIL' -}}
    details_06: >-
      {{- 'Package not installed, web proxy service not in use' if not (squid_installed | default(false))
         else 'Package installed, service disabled/inactive, local policies approved' if (status_02 | default('') | trim) == 'PASS'
           and (status_03 | default('') | trim) == 'PASS'
           and (status_04 | default('') | trim) == 'PASS'
           and (status_05 | default('') | trim) == 'PASS'
         else 'Non-compliant: service enabled/active or local policies not approved' -}}

- name: "Req 07 - Store cis_result variable"
  set_fact:
    task_07_name: "Store cis_result"
    task_07_cmd: "set_fact"
    task_07_rc: 0
    data_07: "{{ status_06 | trim }}"
    status_07: "PASS"
    details_07: "cis_result set to {{ status_06 | trim }}"
    cis_result: "{{ status_06 | trim }}"

- name: "Generate audit report"
  ansible.builtin.debug:
    msg:
    - "AUDIT REPORT — CIS 2.1.17"
    - "Reference: CIS Benchmark checkpoint 2.1.17"
    - ""
    - "REQUIREMENT 01 - {{ req_01 }}:"
    - "  Task: {{ task_01_name | default('Not recorded') }}"
    - "  Command: {{ task_01_cmd | default('N/A') }}"
    - "  Exit code: {{ task_01_rc | default(-1) }}"
    - "  Data: {{ data_01 | default('') | trim }}"
    - "  Status: {{ status_01 | default('ERROR') | trim }}"
    - "  Details: {{ details_01 | default('') | trim }}"
    - ""
    - "REQUIREMENT 02 - {{ req_02 }}:"
    - "  Task: {{ task_02_name | default('Not recorded') }}"
    - "  Command: {{ task_02_cmd | default('N/A') }}"
    - "  Exit code: {{ task_02_rc | default(-1) }}"
    - "  Data: {{ data_02 | default('') | trim }}"
    - "  Status: {{ status_02 | default('ERROR') | trim }}"
    - "  Details: {{ details_02 | default('') | trim }}"
    - ""
    - "REQUIREMENT 03 - {{ req_03 }}:"
    - "  Task: {{ task_03_name | default('Not recorded') }}"
    - "  Command: {{ task_03_cmd | default('N/A') }}"
    - "  Exit code: {{ task_03_rc | default(-1) }}"
    - "  Data: {{ data_03 | default('') | trim }}"
    - "  Status: {{ status_03 | default('ERROR') | trim }}"
    - "  Details: {{ details_03 | default('') | trim }}"
    - ""
    - "REQUIREMENT 04 - {{ req_04 }}:"
    - "  Task: {{ task_04_name | default('Not recorded') }}"
    - "  Command: {{ task_04_cmd | default('N/A') }}"
    - "  Exit code: {{ task_04_rc | default(-1) }}"
    - "  Data: {{ data_04 | default('') | trim }}"
    - "  Status: {{ status_04 | default('ERROR') | trim }}"
    - "  Details: {{ details_04 | default('') | trim }}"
    - ""
    - "REQUIREMENT 05 - {{ req_05 }}:"
    - "  Task: {{ task_05_name | default('Not recorded') }}"
    - "  Command: {{ task_05_cmd | default('N/A') }}"
    - "  Exit code: {{ task_05_rc | default(-1) }}"
    - "  Data: {{ data_05 | default('') | trim }}"
    - "  Status: {{ status_05 | default('ERROR') | trim }}"
    - "  Details: {{ details_05 | default('') | trim }}"
    - ""
    - "REQUIREMENT 06 - {{ req_06 }}:"
    - "  Task: {{ task_06_name | default('Not recorded') }}"
    - "  Command: {{ task_06_cmd | default('N/A') }}"
    - "  Exit code: {{ task_06_rc | default(-1) }}"
    - "  Data: {{ data_06 | default('') | trim }}"
    - "  Status: {{ status_06 | default('ERROR') | trim }}"
    - "  Details: {{ details_06 | default('') | trim }}"
    - ""
    - "REQUIREMENT 07 - {{ req_07 }}:"
    - "  Task: {{ task_07_name | default('Not recorded') }}"
    - "  Command: {{ task_07_cmd | default('N/A') }}"
    - "  Exit code: {{ task_07_rc | default(-1) }}"
    - "  Data: {{ data_07 | default('') | trim }}"
    - "  Status: {{ status_07 | default('ERROR') | trim }}"
    - "  Details: {{ details_07 | default('') | trim }}"
    - ""
    - "========================================================"
    - "OVERALL COMPLIANCE:"
    - "  Result: {{ cis_result | default('ERROR') | trim }}"
    - "  Details: {{ details_06 | default('Not evaluated') | trim }}"
    - "========================================================"
