---
- name: Initialize meta data variables
  include_vars: cis_audit_var_1_1_2_4_1.yml

- name: "Req 1 - Check if /var is mounted"
  ansible.builtin.command: findmnt -kn /var
  register: result_mount
  failed_when: false
  changed_when: false

- name: "Req 2 - Get devices for separate partition check"
  ansible.builtin.shell: |
    findmnt -n -o SOURCE /var
    findmnt -n -o SOURCE /
  args:
    executable: /bin/bash
  register: result_devices
  failed_when: false
  changed_when: false

- name: "Req 3 - Evaluate compliance"
  ansible.builtin.set_fact:
    task_01_name: "Req 1 - Check if /var is mounted"
    task_01_cmd: "findmnt -kn /var"
    task_01_rc: "{{ result_mount.rc | default(-1) }}"
    data_01: "{{ result_mount.stdout | default('') | trim }}"
    status_01: >-
      {{ 'PASS' if (result_mount.rc | default(-1) == 0)
         and (result_mount.stdout | default('') | trim | length > 0) else 'FAIL' }}
    details_01: >-
      {{ '/var is mounted' if (result_mount.rc | default(-1) == 0)
         and (result_mount.stdout | default('') | trim | length > 0) else '/var is not mounted' }}

    task_02_name: "Req 2 - Verify /var is a separate partition"
    task_02_cmd: "findmnt -n -o SOURCE /var && findmnt -n -o SOURCE /"
    task_02_rc: "{{ result_devices.rc | default(-1) }}"
    data_02: "{{ result_devices.stdout | default('') | trim }}"
    status_02: >-
      {{ 'PASS' if (result_devices.stdout_lines | default([]) | length >= 2)
         and ((result_devices.stdout_lines | default([]))[0] | default('') | trim | length > 0)
         and ((result_devices.stdout_lines | default([]))[1] | default('') | trim | length > 0)
         and ((result_devices.stdout_lines | default([]))[0] | default('') | trim
              != (result_devices.stdout_lines | default([]))[1] | default('') | trim)
         else 'FAIL' }}
    details_02: >-
      {{ 'Separate partition: /var on ' + (result_devices.stdout_lines | default([]))[0] | default('') | trim
         + ', root on ' + (result_devices.stdout_lines | default([]))[1] | default('') | trim
         if (result_devices.stdout_lines | default([]) | length >= 2
            and ((result_devices.stdout_lines | default([]))[0] | default('') | trim | length > 0)
            and ((result_devices.stdout_lines | default([]))[1] | default('') | trim | length > 0)
            and ((result_devices.stdout_lines | default([]))[0] | default('') | trim
                 != (result_devices.stdout_lines | default([]))[1] | default('') | trim))
         else 'Device not separate or missing' }}

    task_03_name: "Req 3 - Summarize compliance"
    task_03_cmd: "N/A"
    task_03_rc: "0"
    data_03: "Compliance evaluated"
    status_03: >-
      {{ 'PASS' if ( (result_mount.rc | default(-1) == 0)
                     and (result_mount.stdout | default('') | trim | length > 0)
                     and (result_devices.stdout_lines | default([]) | length >= 2)
                     and ((result_devices.stdout_lines | default([]))[0] | default('') | trim | length > 0)
                     and ((result_devices.stdout_lines | default([]))[1] | default('') | trim | length > 0)
                     and ((result_devices.stdout_lines | default([]))[0] | default('') | trim
                          != (result_devices.stdout_lines | default([]))[1] | default('') | trim) )
                 else 'FAIL' }}
    details_03: >-
      {{ 'Compliant: /var is mounted on a separate partition' 
         if ( (result_mount.rc | default(-1) == 0)
              and (result_mount.stdout | default('') | trim | length > 0)
              and (result_devices.stdout_lines | default([]) | length >= 2)
              and ((result_devices.stdout_lines | default([]))[0] | default('') | trim | length > 0)
              and ((result_devices.stdout_lines | default([]))[1] | default('') | trim | length > 0)
              and ((result_devices.stdout_lines | default([]))[0] | default('') | trim
                   != (result_devices.stdout_lines | default([]))[1] | default('') | trim) )
         else 'Non-compliant: /var is not on a separate partition' }}

- name: "Req 04 - Store final audit result in cis_result"
  ansible.builtin.set_fact:
    cis_result: "{{ status_03 | default('UNKNOWN') | trim }}"

- name: "Req 4 - Generate audit report"
  ansible.builtin.debug:
    msg:
    - "========================================================"
    - "AUDIT REPORT — CIS 1.1.2.4.1"
    - "Reference: CIS Benchmark checkpoint 1.1.2.4.1"
    - "========================================================"
    - ""
    - "REQUIREMENT 01 - {{ req_01 }}:"
    - "  Task: {{ task_01_name | default('Task not recorded') }}"
    - "  Command: {{ task_01_cmd | default('N/A') }}"
    - "  Exit code: {{ task_01_rc | default(-1) }}"
    - "  Data: {{ data_01 | default('') | trim }}"
    - "  Status: {{ status_01 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_01 | default('Not evaluated') | trim }}"
    - ""
    - "REQUIREMENT 02 - {{ req_02 }}:"
    - "  Task: {{ task_02_name | default('Task not recorded') }}"
    - "  Command: {{ task_02_cmd | default('N/A') }}"
    - "  Exit code: {{ task_02_rc | default(-1) }}"
    - "  Data: {{ data_02 | default('') | trim }}"
    - "  Status: {{ status_02 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_02 | default('Not evaluated') | trim }}"
    - ""
    - "REQUIREMENT 03 - {{ req_03 }}:"
    - "  Task: {{ task_03_name | default('Task not recorded') }}"
    - "  Command: {{ task_03_cmd | default('N/A') }}"
    - "  Exit code: {{ task_03_rc | default(-1) }}"
    - "  Data: {{ data_03 | default('') | trim }}"
    - "  Status: {{ status_03 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_03 | default('Not evaluated') | trim }}"
    - ""
    - "========================================================"
    - "OVERALL COMPLIANCE:"
    - "  Result: {{ cis_result | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_03 | default('Not evaluated') | trim }}"
    - "========================================================"
