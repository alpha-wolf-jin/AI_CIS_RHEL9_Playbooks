req_01: "Check if auditd is installed using command: `dpkg -l auditd 2>/dev/null || rpm -q audit 2>/dev/null`. Expected result: package is installed."
req_02: |
  Check on-disk audit rules for /etc/group using command: `awk '/^ *-w/ &&(/\\/etc\\/group/ ||/\\/etc\\/passwd/ ||/\\/etc\\/gshadow/ ||/\\/etc\\/shadow/ ||/\\/etc\\/security\\/opasswd/ ||/\\/etc\\/nsswitch.conf/ ||/\\/etc\\/pam.conf/ ||/\\/etc\\/pam.d/) &&/ +-p *wa/ &&(/ key= *[!-~]* *$/||/ -k *[!-~]* *$/)' /etc/audit/rules.d/*.rules`. Expected result: output includes `-w /etc/group -p wa -k identity`.
