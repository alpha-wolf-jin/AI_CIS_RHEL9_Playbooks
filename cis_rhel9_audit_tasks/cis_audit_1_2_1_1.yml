---
- name: Initialize meta data variables
  include_vars: cis_audit_var_1_2_1_1.yml

- name: "Initialize data variables"
  ansible.builtin.set_fact:
    data_01: "Not collected yet"
    status_01: "UNKNOWN"
    details_01: "Not evaluated"
    data_02: "Not collected yet"
    status_02: "UNKNOWN"
    details_02: "Not evaluated"
    data_03: "Not collected yet"
    status_03: "UNKNOWN"
    details_03: "Not evaluated"
    data_04: "Not collected yet"
    status_04: "UNKNOWN"
    details_04: "Not evaluated"
    data_05: "Not collected yet"
    status_05: "UNKNOWN"
    details_05: "Not evaluated"
    data_06: "Not collected yet"
    status_06: "UNKNOWN"
    details_06: "Not evaluated"
    task_01_name: "Not executed"
    task_01_cmd: "N/A"
    task_01_rc: -1

- name: "Req 01 - Check RPM package manager is installed"
  ansible.builtin.shell: which rpm
  args:
    executable: /bin/bash
  register: result_01
  failed_when: false
  changed_when: false

- name: "Store requirement 01 details"
  ansible.builtin.set_fact:
    task_01_name: "Check RPM package manager installed"
    task_01_cmd: "which rpm"
    task_01_rc: "{{ result_01.rc | default(-1) }}"
    data_01: "{{ result_01.stdout | default('') | trim }}"
    status_01: "{{ 'PASS' if result_01.rc | default(-1) == 0 else 'FAIL' }}"
    details_01: "{{ 'RPM found at: ' + (result_01.stdout | default('') | trim) if result_01.rc | default(-1) == 0 else 'RPM not installed' }}"
    rpm_installed: "{{ result_01.rc | default(-1) == 0 }}"

- name: "Req 02 - Check GPG key URLs in repository configuration"
  ansible.builtin.shell: grep -r gpgkey /etc/yum.repos.d/* /etc/dnf/dnf.conf
  args:
    executable: /bin/bash
  register: result_02
  failed_when: false
  changed_when: false
  when: rpm_installed | bool

- name: "Store requirement 02 details"
  ansible.builtin.set_fact:
    task_02_name: "Check repository GPG key URLs"
    task_02_cmd: "grep -r gpgkey /etc/yum.repos.d/* /etc/dnf/dnf.conf"
    task_02_rc: "{{ result_02.rc | default(-1) if rpm_installed | bool else -1 }}"
    data_02: "{{ result_02.stdout | default('') | trim if rpm_installed | bool else '' }}"
    status_02: "{{ 'PASS' if rpm_installed | bool and (result_02.stdout | default('') | trim) | length > 0 else ('SKIP' if not rpm_installed | bool else 'FAIL') }}"
    details_02: "{{ 'GPG key URLs found' if rpm_installed | bool and (result_02.stdout | default('') | trim) | length > 0 else ('Skipped because RPM not installed' if not rpm_installed | bool else 'No GPG key URLs found or error') }}"

- name: "Req 03 - List installed GPG keys with details"
  ansible.builtin.shell: |
    {% raw %}
    for RPM_PACKAGE in $(rpm -q gpg-pubkey); do
      echo "RPM: ${RPM_PACKAGE}"
      RPM_SUMMARY=$(rpm -q --queryformat "%{SUMMARY}" "${RPM_PACKAGE}")
      RPM_PACKAGER=$(rpm -q --queryformat "%{PACKAGER}" "${RPM_PACKAGE}")
      RPM_DATE=$(date +%Y-%m-%d -d "1970-1-1+$((0x$(rpm -q --queryformat "%{RELEASE}" "${RPM_PACKAGE}") ))sec")
      RPM_KEY_ID=$(rpm -q --queryformat "%{VERSION}" "${RPM_PACKAGE}")
      echo "Packager: ${RPM_PACKAGER} Summary: ${RPM_SUMMARY} Creation date: ${RPM_DATE} Key ID: ${RPM_KEY_ID}"
    done
    {% endraw %}
  args:
    executable: /bin/bash
  register: result_03
  failed_when: false
  changed_when: false
  when: rpm_installed | bool

- name: "Store requirement 03 details"
  ansible.builtin.set_fact:
    task_03_name: "List installed GPG keys"
    task_03_cmd: |
      for RPM_PACKAGE in $(rpm -q gpg-pubkey); do echo \"RPM: ${RPM_PACKAGE}\"; RPM_SUMMARY=$(rpm -q --queryformat \"%{SUMMARY}\" \"${RPM_PACKAGE}\"); RPM_PACKAGER=$(rpm -q --queryformat \"%{PACKAGER}\" \"${RPM_PACKAGE}\"); RPM_DATE=$(date +%Y-%m-%d -d \"1970-1-1+$((0x$(rpm -q --queryformat \"%{RELEASE}\" \"${RPM_PACKAGE}\") ))sec\"); RPM_KEY_ID=$(rpm -q --queryformat \"%{VERSION}\" \"${RPM_PACKAGE}\"); echo \"Packager: ${RPM_PACKAGER} Summary: ${RPM_SUMMARY} Creation date: ${RPM_DATE} Key ID: ${RPM_KEY_ID}\"; done
    task_03_rc: "{{ result_03.rc | default(-1) if rpm_installed | bool else -1 }}"
    data_03: "{{ result_03.stdout | default('') | trim if rpm_installed | bool else '' }}"
    status_03: "{{ 'PASS' if rpm_installed | bool and (result_03.stdout | default('') | trim) | length > 0 else ('SKIP' if not rpm_installed | bool else 'FAIL') }}"
    details_03: "{{ 'Installed GPG keys listed' if rpm_installed | bool and (result_03.stdout | default('') | trim) | length > 0 else ('Skipped because RPM not installed' if not rpm_installed | bool else 'No installed GPG keys found or error') }}"

- name: "Req 04 - Check locally available GPG key files"
  ansible.builtin.shell: |
    {% raw %}
    for PACKAGE in $(find /etc/pki/rpm-gpg/ -type f -exec rpm -qf {} \; | sort -u); do
      rpm -q --queryformat "%{NAME}-%{VERSION} %{PACKAGER} %{SUMMARY}\n" "${PACKAGE}"
    done
    {% endraw %}
  args:
    executable: /bin/bash
  register: result_04
  failed_when: false
  changed_when: false
  when: rpm_installed | bool

- name: "Store requirement 04 details"
  ansible.builtin.set_fact:
    task_04_name: "Check locally available GPG key files"
    task_04_cmd: |
      for PACKAGE in $(find /etc/pki/rpm-gpg/ -type f -exec rpm -qf {} \\; | sort -u); do rpm -q --queryformat \"%{NAME}-%{VERSION} %{PACKAGER} %{SUMMARY}\\n\" \"${PACKAGE}\"; done
    task_04_rc: "{{ result_04.rc | default(-1) if rpm_installed | bool else -1 }}"
    data_04: "{{ result_04.stdout | default('') | trim if rpm_installed | bool else '' }}"
    status_04: "{{ 'PASS' if rpm_installed | bool and (result_04.stdout | default('') | trim) | length > 0 else ('SKIP' if not rpm_installed | bool else 'FAIL') }}"
    details_04: "{{ 'Local GPG keys found' if rpm_installed | bool and (result_04.stdout | default('') | trim) | length > 0 else ('Skipped because RPM not installed' if not rpm_installed | bool else 'No local GPG keys found or error') }}"

- name: "Req 05 - Set GPG compliance status"
  ansible.builtin.set_fact:
    status_05: "{{ 'SKIP' if not rpm_installed | bool else 'PASS' if (status_02 | default('FAIL') == 'PASS') and (status_03 | default('FAIL') == 'PASS') and (status_04 | default('FAIL') == 'PASS') else 'FAIL' }}"

- name: "Req 05 - Store requirement 05 details"
  ansible.builtin.set_fact:
    data_05: "Overall GPG key configuration check completed"
    details_05: "{{ 'All GPG checks passed' if status_05 == 'PASS' else 'One or more GPG checks failed' if status_05 == 'FAIL' else 'RPM not installed, audit skipped' }}"
    task_05_name: "Summarize GPG compliance"
    task_05_cmd: "N/A"
    task_05_rc: 0

- name: "Req 06 - Store final audit result in cis_result"
  ansible.builtin.set_fact:
    cis_result: "{{ status_05 | default('UNKNOWN') | trim }}"
    task_06_name: "Store final cis_result"
    task_06_cmd: "N/A"
    task_06_rc: 0
    status_06: "{{ status_05 | default('UNKNOWN') | trim }}"
    data_06: "cis_result = {{ status_05 | default('UNKNOWN') | trim }}"
    details_06: "Final compliance status stored"

- name: "Generate audit report"
  debug:
    msg:
    - "AUDIT REPORT — CIS 1.2.1.1"
    - "Reference: CIS Benchmark checkpoint 1.2.1.1"
    - ""
    - "REQUIREMENT 01 - {{ req_01 }}:"
    - "  Task: {{ task_01_name | default('Not recorded') }}"
    - "  Command: {{ task_01_cmd | default('N/A') }}"
    - "  Exit code: {{ task_01_rc | default(-1) }}"
    - "  Data: {{ data_01 | default('') | trim }}"
    - "  Status: {{ status_01 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_01 | default('') | trim }}"
    - ""
    - "REQUIREMENT 02 - {{ req_02 }}:"
    - "  Task: {{ task_02_name | default('Not recorded') }}"
    - "  Command: {{ task_02_cmd | default('N/A') }}"
    - "  Exit code: {{ task_02_rc | default(-1) }}"
    - "  Data: {{ data_02 | default('') | trim }}"
    - "  Status: {{ status_02 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_02 | default('') | trim }}"
    - ""
    - "REQUIREMENT 03 - {{ req_03 }}:"
    - "  Task: {{ task_03_name | default('Not recorded') }}"
    - "  Command: {{ task_03_cmd | default('N/A') }}"
    - "  Exit code: {{ task_03_rc | default(-1) }}"
    - "  Data: {{ data_03 | default('') | trim }}"
    - "  Status: {{ status_03 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_03 | default('') | trim }}"
    - ""
    - "REQUIREMENT 04 - {{ req_04 }}:"
    - "  Task: {{ task_04_name | default('Not recorded') }}"
    - "  Command: {{ task_04_cmd | default('N/A') }}"
    - "  Exit code: {{ task_04_rc | default(-1) }}"
    - "  Data: {{ data_04 | default('') | trim }}"
    - "  Status: {{ status_04 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_04 | default('') | trim }}"
    - ""
    - "REQUIREMENT 05 - {{ req_05 }}:"
    - "  Task: {{ task_05_name | default('Not recorded') }}"
    - "  Command: {{ task_05_cmd | default('N/A') }}"
    - "  Exit code: {{ task_05_rc | default(-1) }}"
    - "  Data: {{ data_05 | default('') | trim }}"
    - "  Status: {{ status_05 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_05 | default('') | trim }}"
    - ""
    - "REQUIREMENT 06 - {{ req_06 }}:"
    - "  Task: {{ task_06_name | default('Not recorded') }}"
    - "  Command: {{ task_06_cmd | default('N/A') }}"
    - "  Exit code: {{ task_06_rc | default(-1) }}"
    - "  Data: {{ data_06 | default('') | trim }}"
    - "  Status: {{ status_06 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_06 | default('') | trim }}"
    - ""
    - "========================================================"
    - "OVERALL COMPLIANCE:"
    - "  Result: {{ cis_result | default('UNKNOWN') | trim }}"
    - "========================================================"
