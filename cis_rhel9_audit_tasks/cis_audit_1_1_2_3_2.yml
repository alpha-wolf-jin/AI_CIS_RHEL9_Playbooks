---
- name: Initialize meta data variables
  include_vars: cis_audit_var_1_1_2_3_2.yml

- name: "Initialize data variables"
  ansible.builtin.set_fact:
    task_01_name: "Req 01 - Check /home mount existence"
    task_01_cmd: "findmnt -kn /home"
    task_01_rc: -1
    data_01: ""
    status_01: "UNKNOWN"
    details_01: "Not evaluated"

    task_02_name: "Req 02 - Check nodev option on /home"
    task_02_cmd: "findmnt -kn /home | grep -v nodev"
    task_02_rc: -1
    data_02: ""
    status_02: "UNKNOWN"
    details_02: "Not evaluated"

    cis_result: "UNKNOWN"

- name: "Req 01 - Check if a separate partition exists for /home"
  ansible.builtin.command: findmnt -kn /home
  register: result_01
  failed_when: false
  changed_when: false

- name: "Req 01 - Store partition existence check details"
  ansible.builtin.set_fact:
    task_01_name: "Req 01 - Check /home mount existence"
    task_01_cmd: "findmnt -kn /home"
    task_01_rc: "{{ result_01.rc | default(-1) }}"
    data_01: "{{ result_01.stdout | default('') | trim }}"
    status_01: "{{ ('PASS' if (result_01.stdout | default('') | trim) != '' else 'FAIL') | trim }}"
    details_01: "{{ ('Found /home mount point' if (result_01.stdout | default('') | trim) != '' else 'No separate /home partition found') | trim }}"

- name: "Req 02 - Check if nodev option is set on /home partition"
  ansible.builtin.shell: findmnt -kn /home | grep -v nodev
  args:
    executable: /bin/bash
  register: result_02
  failed_when: false
  changed_when: false
  when:
  - "status_01 == 'PASS'"

- name: "Req 02 - Store nodev option check details (when /home exists)"
  ansible.builtin.set_fact:
    task_02_name: "Req 02 - Check nodev option on /home"
    task_02_cmd: "findmnt -kn /home | grep -v nodev"
    task_02_rc: "{{ result_02.rc | default(-1) }}"
    data_02: "{{ result_02.stdout | default('') | trim }}"
    status_02: "{{ ('PASS' if (result_02.stdout | default('') | trim) == '' else 'FAIL') | trim }}"
    details_02: "{{ ('nodev option is set (no lines found)' if (result_02.stdout | default('') | trim) == '' else 'nodev option missing, found: ' ~ (result_02.stdout | default('') | trim)) | trim }}"
  when:
  - "status_01 == 'PASS'"

- name: "Req 02 - Store nodev option skipped details (when no /home partition)"
  ansible.builtin.set_fact:
    task_02_name: "Req 02 - Check nodev option on /home"
    task_02_cmd: "findmnt -kn /home | grep -v nodev"
    task_02_rc: -1
    data_02: ""
    status_02: "SKIPPED"
    details_02: "No separate /home partition – check not applicable"
  when:
  - "status_01 != 'PASS'"

- name: "Set overall compliance result"
  ansible.builtin.set_fact:
    cis_result: >-
      {%- if status_01 == 'FAIL' -%}
        SKIPPED
      {%- elif status_01 == 'PASS' and status_02 == 'PASS' -%}
        PASS
      {%- elif status_01 == 'PASS' and status_02 == 'FAIL' -%}
        FAIL
      {%- else -%}
        UNKNOWN
      {%- endif -%}

- name: "Generate audit report"
  ansible.builtin.debug:
    msg:
    - "========================================================"
    - "AUDIT REPORT — CIS 1.1.2.3.2"
    - "Reference: CIS Benchmark checkpoint 1.1.2.3.2"
    - "========================================================"
    - ""
    - "REQUIREMENT 01 - {{ req_01 }}:"
    - "  Task: {{ task_01_name | default('Not recorded') }}"
    - "  Command: {{ task_01_cmd | default('N/A') }}"
    - "  Exit code: {{ task_01_rc | default(-1) }}"
    - "  Data: {{ data_01 | default('') | trim }}"
    - "  Status: {{ status_01 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_01 | default('') | trim }}"
    - ""
    - "REQUIREMENT 02 - {{ req_02 }}:"
    - "  Task: {{ task_02_name | default('Not recorded') }}"
    - "  Command: {{ task_02_cmd | default('N/A') }}"
    - "  Exit code: {{ task_02_rc | default(-1) }}"
    - "  Data: {{ data_02 | default('') | trim }}"
    - "  Status: {{ status_02 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_02 | default('') | trim }}"
    - ""
    - "========================================================"
    - "OVERALL COMPLIANCE:"
    - "  Result: {{ cis_result | default('UNKNOWN') | trim }}"
    - "========================================================"
