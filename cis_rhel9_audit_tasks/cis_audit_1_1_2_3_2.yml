---
- name: Initialize meta data variables
  include_vars: cis_audit_var_1_1_2_3_2.yml

- name: "Initialize data variables"
  set_fact:
    data_01: "Not collected yet"
    status_01: "ERROR"
    details_01: "Not evaluated"
    data_02: "Not collected yet"
    status_02: "ERROR"
    details_02: "Not evaluated"
    data_03: "Not collected yet"
    status_03: "ERROR"
    details_03: "Not evaluated"
    data_04: "Not collected yet"
    status_04: "ERROR"
    details_04: "Not evaluated"
    task_01_name: "Not executed"
    task_01_cmd: "N/A"
    task_01_rc: -1

- name: "Req 01 - Check if /home is a separate partition"
  ansible.builtin.command: "findmnt -kn /home"
  register: result_01
  failed_when: false
  changed_when: false

- name: "Store requirement 01 details"
  set_fact:
    task_01_name: "Check if /home is a separate partition"
    task_01_cmd: "findmnt -kn /home"
    task_01_rc: "{{ result_01.rc | default(-1) }}"
    data_01: "{{ result_01.stdout | default('') | trim }}"
    status_01: "{{ ('PASS' if (result_01.rc | default(-1) == 0 and (result_01.stdout | default('') | trim) != '') else 'FAIL') | trim }}"
    details_01: "{{ ('/home is a separate partition' if (result_01.rc | default(-1) == 0 and (result_01.stdout | default('') | trim) != '') else '/home is not a separate partition') | trim }}"

- name: "Req 02 - Check if nodev option is set on /home partition"
  ansible.builtin.shell: "findmnt -n -o OPTIONS /home | grep -q nodev"
  args:
    executable: /bin/bash
  register: result_02
  failed_when: false
  changed_when: false
  when: "status_01 | trim == 'PASS'"

- name: "Store requirement 02 details"
  set_fact:
    task_02_name: "Check if nodev option is set on /home partition"
    task_02_cmd: "findmnt -n -o OPTIONS /home | grep -q nodev"
    task_02_rc: "{{ result_02.rc | default(-1) }}"
    data_02: "{{ result_02.stdout | default('') | trim }}"
    status_02: "{{ ('PASS' if result_02.rc == 0 else 'FAIL') | trim }}"
    details_02: "{{ ('nodev option is set' if result_02.rc == 0 else 'nodev option not set') | trim }}"
  when: "status_01 | trim == 'PASS'"

- name: "Store requirement 02 details (skipped)"
  set_fact:
    task_02_name: "Check if nodev option is set on /home partition"
    task_02_cmd: "findmnt -n -o OPTIONS /home | grep -q nodev"
    task_02_rc: -1
    data_02: ""
    status_02: "SKIP"
    details_02: "SKIP: /home is not a separate partition"
  when: "status_01 | trim != 'PASS'"

- name: "Req 03 - Summarize overall compliance"
  set_fact:
    status_03: >-
      {%- if status_01 | trim == 'FAIL' -%}
        SKIP
      {%- elif status_02 | trim == 'PASS' -%}
        PASS
      {%- else -%}
        FAIL
      {%- endif -%}
    details_03: >-
      {%- if status_01 | trim == 'FAIL' -%}
        SKIP: /home is not a separate partition
      {%- elif status_02 | trim == 'PASS' -%}
        All audit checks passed
      {%- else -%}
        One or more audit checks failed
      {%- endif -%}
    task_03_name: "Summarize overall compliance"
    task_03_cmd: "N/A"
    task_03_rc: 0
    data_03: ""

- name: "Req 04 - Store final audit result in cis_result"
  set_fact:
    cis_result: "{{ status_03 | default('ERROR') | trim }}"
    status_04: "{{ status_03 | default('ERROR') | trim }}"
    details_04: "{{ details_03 | default('Not evaluated') | trim }}"
    task_04_name: "Store final audit result"
    task_04_cmd: "N/A"
    task_04_rc: 0
    data_04: ""

- name: "Generate audit report"
  debug:
    msg:
    - "AUDIT REPORT — CIS 1.1.2.3.2"
    - "Reference: CIS Benchmark checkpoint 1.1.2.3.2"
    - ""
    - "REQUIREMENT 01 - {{ req_01 }}:"
    - "  Task: {{ task_01_name | default('Not recorded') }}"
    - "  Command: {{ task_01_cmd | default('N/A') }}"
    - "  Exit code: {{ task_01_rc | default(-1) }}"
    - "  Data: {{ data_01 | default('') | trim }}"
    - "  Status: {{ status_01 | default('ERROR') | trim }}"
    - "  Details: {{ details_01 | default('') | trim }}"
    - ""
    - "REQUIREMENT 02 - {{ req_02 }}:"
    - "  Task: {{ task_02_name | default('Not recorded') }}"
    - "  Command: {{ task_02_cmd | default('N/A') }}"
    - "  Exit code: {{ task_02_rc | default(-1) }}"
    - "  Data: {{ data_02 | default('') | trim }}"
    - "  Status: {{ status_02 | default('ERROR') | trim }}"
    - "  Details: {{ details_02 | default('') | trim }}"
    - ""
    - "REQUIREMENT 03 - {{ req_03 }}:"
    - "  Task: {{ task_03_name | default('Not recorded') }}"
    - "  Command: {{ task_03_cmd | default('N/A') }}"
    - "  Exit code: {{ task_03_rc | default(-1) }}"
    - "  Data: {{ data_03 | default('') | trim }}"
    - "  Status: {{ status_03 | default('ERROR') | trim }}"
    - "  Details: {{ details_03 | default('') | trim }}"
    - ""
    - "REQUIREMENT 04 - {{ req_04 }}:"
    - "  Task: {{ task_04_name | default('Not recorded') }}"
    - "  Command: {{ task_04_cmd | default('N/A') }}"
    - "  Exit code: {{ task_04_rc | default(-1) }}"
    - "  Data: {{ data_04 | default('') | trim }}"
    - "  Status: {{ status_04 | default('ERROR') | trim }}"
    - "  Details: {{ details_04 | default('') | trim }}"
    - ""
    - "========================================================"
    - "OVERALL COMPLIANCE:"
    - "  Result: {{ cis_result | default('ERROR') | trim }}"
    - "  Details: {{ details_04 | default('Not evaluated') | trim }}"
    - "========================================================"
