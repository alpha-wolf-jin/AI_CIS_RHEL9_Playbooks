req_01: "Check if samba package is installed using command: `rpm -q samba`. Expected result: package samba is not installed"
req_02: "If samba package is installed and required for dependencies, check if smb.service is enabled using command: `systemctl is-enabled smb.service 2>/dev/null | grep 'enabled'`. Expected result: Nothing should be returned"
req_03: "If samba package is installed and required for dependencies, check if smb.service is active using command: `systemctl is-active smb.service 2>/dev/null | grep '^active'`. Expected result: Nothing should be returned"
req_04: "Summarize overall compliance: Ensure that either samba package is not installed, or if installed for dependencies, the smb.service is not enabled and not active, and the dependent package and service masking are approved by local site policy."
req_05: "Store the final audit result in a variable named 'cis_result' using set_fact. Set cis_result to the overall compliance status (PASS/FAIL/SKIP/ERROR) derived from the last requirement's status variable."
