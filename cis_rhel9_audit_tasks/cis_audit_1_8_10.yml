---
- name: Initialize meta data variables
  include_vars: cis_audit_var_1_8_10.yml

- name: "Req 01 - Check if GDM is installed"
  ansible.builtin.shell: 'which gdm || dpkg -l gdm3 2>/dev/null || rpm -q gdm 2>/dev/null'
  args:
    executable: /bin/bash
  register: result_01
  failed_when: false
  changed_when: false

- name: "Req 02 - Check if XDMCP is enabled in GDM configuration"
  ansible.builtin.shell: "grep -Eis '^\\s*Enable\\s*=\\s*true' /etc/gdm/custom.conf"
  args:
    executable: /bin/bash
  register: result_02
  failed_when: false
  changed_when: false
  when: result_01.rc == 0

- name: "Set cis_result"
  ansible.builtin.set_fact:
    cis_result: >-
      {{ 'SKIP' if result_01.rc | default(-1) != 0
         else ('PASS' if result_02.rc | default(-1) == 1
         else ('FAIL' if result_02.rc | default(-1) == 0
         else 'UNKNOWN')) }}

- name: "Generate audit report"
  ansible.builtin.debug:
    msg:
    - "AUDIT REPORT — CIS 1.8.10"
    - "Reference: CIS Benchmark checkpoint 1.8.10"
    - ""
    - "REQUIREMENT 01 - {{ req_01 }}:"
    - "  Task: Req 01 - Check if GDM is installed"
    - "  Command: which gdm || dpkg -l gdm3 2>/dev/null || rpm -q gdm 2>/dev/null"
    - "  Exit code: {{ result_01.rc | default(-1) }}"
    - "  Data: {{ result_01.stdout | default('') | trim }}"
    - "  Status: {{ 'PASS' if result_01.rc | default(-1) != 0 else 'FAIL' }}"
    - "  Details: {{ 'GDM not installed, audit not applicable' if result_01.rc | default(-1) != 0 else 'GDM is installed' }}"
    - ""
    - "REQUIREMENT 02 - {{ req_02 }}:"
    - "  Task: Req 02 - Check if XDMCP is enabled in GDM configuration"
    - "  Command: grep -Eis '^\\s*Enable\\s*=\\s*true' /etc/gdm/custom.conf"
    - "  Exit code: {{ (result_02.rc | default(-1)) if (result_01.rc | default(-1) == 0) else 'SKIP' }}"
    - "  Data: {{ (result_02.stdout | default('') | trim) if (result_01.rc | default(-1) == 0) else 'N/A' }}"
    - "  Status: {{ 'SKIP' if result_01.rc | default(-1) != 0 else ('PASS' if result_02.rc | default(-1) == 1 else 'FAIL') }}"
    - "  Details: {{ 'Skipped - GDM not installed' if result_01.rc | default(-1) != 0 else ('XDMCP not enabled' if result_02.rc | default(-1) == 1 else ('XDMCP enabled' if result_02.rc | default(-1) == 0 else 'Error checking configuration')) }}"
    - ""
    - "REQUIREMENT 03 - {{ req_03 }}:"
    - "  Task: Generate audit report"
    - "  Command: N/A"
    - "  Exit code: N/A"
    - "  Data: N/A"
    - "  Status: {{ 'SKIP' if result_01.rc | default(-1) != 0 else ('PASS' if result_02.rc | default(-1) == 1 else ('FAIL' if result_02.rc | default(-1) == 0 else 'UNKNOWN')) }}"
    - "  Details: {{ 'GDM not installed; audit not applicable. SKIP.' if result_01.rc | default(-1) != 0 else ('XDMCP is not enabled. Compliant.' if result_02.rc | default(-1) == 1 else ('XDMCP is enabled. Non-compliant.' if result_02.rc | default(-1) == 0 else 'Error determining compliance')) }}"
    - ""
    - "REQUIREMENT 04 - {{ req_04 }}:"
    - "  Task: Req 04 - Store final audit result"
    - "  Command: set_fact cis_result"
    - "  Exit code: 0"
    - "  Data: N/A"
    - "  Status: PASS"
    - "  Details: cis_result set to {{ cis_result }}"
    - ""
    - "========================================================"
    - "OVERALL COMPLIANCE:"
    - "  Result: {{ cis_result }}"
    - "  Details: {{ 'GDM not installed; audit not applicable. SKIP.' if result_01.rc | default(-1) != 0 else ('XDMCP is not enabled. Compliant.' if result_02.rc | default(-1) == 1 else ('XDMCP is enabled. Non-compliant.' if result_02.rc | default(-1) == 0 else 'Unable to determine compliance')) }}"
    - "========================================================"
