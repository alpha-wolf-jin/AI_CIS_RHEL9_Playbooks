---
- name: Initialize meta data variables
  include_vars: cis_audit_var_2_1_11.yml

- name: "Req 01 - Check if CUPS package is installed"
  ansible.builtin.shell: rpm -q cups
  args:
    executable: /bin/bash
  register: result_01
  failed_when: false
  changed_when: false

- name: "Store requirement 01 details"
  set_fact:
    task_01_name: "Check if CUPS package is installed"
    task_01_cmd: "rpm -q cups"
    task_01_rc: "{{ result_01.rc }}"
    data_01: "{{ result_01.stdout | default('') | trim }}"
    status_01: "{{ 'PASS' if result_01.rc != 0 else 'FAIL' }}"
    details_01: "{{ 'CUPS is not installed' if result_01.rc != 0 else 'CUPS is installed' }}"

- name: "Initialize requirement 02 and 03 skip if CUPS not installed"
  set_fact:
    status_02: "SKIP"
    data_02: "Not applicable (cups not installed)"
    details_02: "Skipped - CUPS not installed"
    task_02_name: "Check if cups services are enabled (skipped)"
    task_02_cmd: "systemctl is-enabled cups.socket cups.service 2>/dev/null | grep 'enabled'"
    task_02_rc: -1
    status_03: "SKIP"
    data_03: "Not applicable (cups not installed)"
    details_03: "Skipped - CUPS not installed"
    task_03_name: "Check if cups services are active (skipped)"
    task_03_cmd: "systemctl is-active cups.socket cups.service 2>/dev/null | grep '^active'"
    task_03_rc: -1
  when: "result_01.rc != 0"

- block:
  - name: "Req 02 - Check if cups services are enabled"
    ansible.builtin.shell: |
      systemctl is-enabled cups.socket cups.service 2>/dev/null | grep 'enabled'
    args:
      executable: /bin/bash
    register: result_02
    failed_when: false
    changed_when: false

  - name: "Store requirement 02 details"
    set_fact:
      task_02_name: "Check if cups services are enabled"
      task_02_cmd: "systemctl is-enabled cups.socket cups.service 2>/dev/null | grep 'enabled'"
      task_02_rc: "{{ result_02.rc }}"
      data_02: "{{ result_02.stdout | default('') | trim }}"
      status_02: "{{ 'PASS' if result_02.rc == 1 else 'FAIL' }}"
      details_02: "{{ 'No enabled cups services found' if result_02.rc == 1 else 'Enabled cups services found: ' ~ (result_02.stdout | default('') | trim) }}"
  when: "result_01.rc == 0"

- block:
  - name: "Req 03 - Check if cups services are active"
    ansible.builtin.shell: |
      systemctl is-active cups.socket cups.service 2>/dev/null | grep '^active'
    args:
      executable: /bin/bash
    register: result_03
    failed_when: false
    changed_when: false

  - name: "Store requirement 03 details"
    set_fact:
      task_03_name: "Check if cups services are active"
      task_03_cmd: "systemctl is-active cups.socket cups.service 2>/dev/null | grep '^active'"
      task_03_rc: "{{ result_03.rc }}"
      data_03: "{{ result_03.stdout | default('') | trim }}"
      status_03: "{{ 'PASS' if result_03.rc == 1 else 'FAIL' }}"
      details_03: "{{ 'No active cups services found' if result_03.rc == 1 else 'Active cups services found: ' ~ (result_03.stdout | default('') | trim) }}"
  when: "result_01.rc == 0"

- name: "Req 04 - Determine overall compliance"
  set_fact:
    task_04_name: "Determine overall compliance"
    task_04_cmd: "N/A (logical evaluation)"
    task_04_rc: -1
    data_04: "Statuses: 01={{ status_01 }}, 02={{ status_02 }}, 03={{ status_03 }}"
    status_04: "{{ 'PASS' if status_01 == 'PASS' or (status_01 == 'FAIL' and status_02 == 'PASS' and status_03 == 'PASS') else 'FAIL' }}"
    details_04: "{{ 'CUPS not installed' if status_01 == 'PASS' else ('CUPS installed but services not enabled and not active' if (status_01 == 'FAIL' and status_02 == 'PASS' and status_03 == 'PASS') else 'CUPS installed and services are enabled or active') }}"

- name: "Req 05 - Store final audit result"
  set_fact:
    cis_result: "{{ status_04 | default('ERROR') }}"
    status_05: "{{ status_04 | default('ERROR') }}"
    details_05: "Final audit result stored"
    task_05_name: "Store final audit result"
    task_05_cmd: "set_fact cis_result"
    task_05_rc: 0
    data_05: "See overall compliance result"

- name: "Generate audit report"
  debug:
    msg:
    - "AUDIT REPORT — CIS 2.1.11"
    - "Reference: CIS Benchmark checkpoint 2.1.11"
    - "REQUIREMENT 01 - {{ req_01 }}:"
    - "  Task: {{ task_01_name | default('Not recorded') }}"
    - "  Command: {{ task_01_cmd | default('N/A') }}"
    - "  Exit code: {{ task_01_rc | default(-1) }}"
    - "  Data: {{ data_01 | default('') | trim }}"
    - "  Status: {{ status_01 | default('ERROR') | trim }}"
    - "  Details: {{ details_01 | default('') | trim }}"
    - ""
    - "REQUIREMENT 02 - {{ req_02 }}:"
    - "  Task: {{ task_02_name | default('Not recorded') }}"
    - "  Command: {{ task_02_cmd | default('N/A') }}"
    - "  Exit code: {{ task_02_rc | default(-1) }}"
    - "  Data: {{ data_02 | default('') | trim }}"
    - "  Status: {{ status_02 | default('ERROR') | trim }}"
    - "  Details: {{ details_02 | default('') | trim }}"
    - ""
    - "REQUIREMENT 03 - {{ req_03 }}:"
    - "  Task: {{ task_03_name | default('Not recorded') }}"
    - "  Command: {{ task_03_cmd | default('N/A') }}"
    - "  Exit code: {{ task_03_rc | default(-1) }}"
    - "  Data: {{ data_03 | default('') | trim }}"
    - "  Status: {{ status_03 | default('ERROR') | trim }}"
    - "  Details: {{ details_03 | default('') | trim }}"
    - ""
    - "REQUIREMENT 04 - {{ req_04 }}:"
    - "  Task: {{ task_04_name | default('Not recorded') }}"
    - "  Command: {{ task_04_cmd | default('N/A') }}"
    - "  Exit code: {{ task_04_rc | default(-1) }}"
    - "  Data: {{ data_04 | default('') | trim }}"
    - "  Status: {{ status_04 | default('ERROR') | trim }}"
    - "  Details: {{ details_04 | default('') | trim }}"
    - ""
    - "REQUIREMENT 05 - {{ req_05 }}:"
    - "  Task: {{ task_05_name | default('Not recorded') }}"
    - "  Command: {{ task_05_cmd | default('N/A') }}"
    - "  Exit code: {{ task_05_rc | default(-1) }}"
    - "  Data: {{ data_05 | default('') | trim }}"
    - "  Status: {{ status_05 | default('ERROR') | trim }}"
    - "  Details: {{ details_05 | default('') | trim }}"
    - ""
    - "OVERALL COMPLIANCE:"
    - "  Result: {{ cis_result | default('ERROR') }}"
