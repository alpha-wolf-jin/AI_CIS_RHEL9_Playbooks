---
- name: Initialize meta data variables
  include_vars: cis_audit_var_6_3_4_9.yml

- name: "Req 01 - Check if audit tools are installed"
  ansible.builtin.shell: "which auditctl && which aureport && which ausearch && which autrace && which auditd && which augenrules"
  args:
    executable: /bin/bash
  register: result_01
  failed_when: false
  changed_when: false

- name: "Set audit not installed flag"
  ansible.builtin.set_fact:
    audit_not_installed: "{{ result_01.rc != 0 }}"

- name: "Req 02 - Check /sbin/auditctl owner"
  ansible.builtin.shell: 'stat -Lc "%n %U" /sbin/auditctl | awk ''$2 != "root" {print}'''
  args:
    executable: /bin/bash
  register: result_02
  failed_when: false
  changed_when: false
  when: "not audit_not_installed"

- name: "Req 03 - Check /sbin/aureport owner"
  ansible.builtin.shell: 'stat -Lc "%n %U" /sbin/aureport | awk ''$2 != "root" {print}'''
  args:
    executable: /bin/bash
  register: result_03
  failed_when: false
  changed_when: false
  when: "not audit_not_installed"

- name: "Req 04 - Check /sbin/ausearch owner"
  ansible.builtin.shell: 'stat -Lc "%n %U" /sbin/ausearch | awk ''$2 != "root" {print}'''
  args:
    executable: /bin/bash
  register: result_04
  failed_when: false
  changed_when: false
  when: "not audit_not_installed"

- name: "Req 05 - Check /sbin/autrace owner"
  ansible.builtin.shell: 'stat -Lc "%n %U" /sbin/autrace | awk ''$2 != "root" {print}'''
  args:
    executable: /bin/bash
  register: result_05
  failed_when: false
  changed_when: false
  when: "not audit_not_installed"

- name: "Req 06 - Check /sbin/auditd owner"
  ansible.builtin.shell: 'stat -Lc "%n %U" /sbin/auditd | awk ''$2 != "root" {print}'''
  args:
    executable: /bin/bash
  register: result_06
  failed_when: false
  changed_when: false
  when: "not audit_not_installed"

- name: "Req 07 - Check /sbin/augenrules owner"
  ansible.builtin.shell: 'stat -Lc "%n %U" /sbin/augenrules | awk ''$2 != "root" {print}'''
  args:
    executable: /bin/bash
  register: result_07
  failed_when: false
  changed_when: false
  when: "not audit_not_installed"

- name: "Compute overall compliance"
  ansible.builtin.set_fact:
    ownership_fail: >-
      {{ ((result_02.stdout | default('') | trim != '') or
          (result_03.stdout | default('') | trim != '') or
          (result_04.stdout | default('') | trim != '') or
          (result_05.stdout | default('') | trim != '') or
          (result_06.stdout | default('') | trim != '') or
          (result_07.stdout | default('') | trim != '')) }}

- name: "Set cis_result variable"
  ansible.builtin.set_fact:
    cis_result: "{{ 'NOT_APPLICABLE' if audit_not_installed else ('PASS' if not ownership_fail else 'FAIL') }}"

- name: "Generate audit report"
  ansible.builtin.debug:
    msg:
    - "AUDIT REPORT — CIS 6.3.4.9"
    - "Reference: CIS Benchmark checkpoint 6.3.4.9"
    - ""
    - "REQUIREMENT 01 - {{ req_01 }}:"
    - "  Task: Check audit tools installation"
    - "  Command: which auditctl && which aureport && which ausearch && which autrace && which auditd && which augenrules"
    - "  Exit code: {{ result_01.rc | default(-1) }}"
    - "  Data: {{ result_01.stdout | default('') | trim }}"
    - "  Status: {{ 'PASS' if result_01.rc == 0 else 'FAIL' }}"
    - "  Details: {{ 'All audit tools found' if result_01.rc == 0 else 'One or more audit tools missing' }}"
    - ""
    - "REQUIREMENT 02 - {{ req_02 }}:"
    - "  Task: Check /sbin/auditctl owner"
    - "  Command: stat -Lc \"%n %U\" /sbin/auditctl | awk '$2 != \"root\" {print}'"
    - "  Exit code: {{ result_02.rc | default('N/A') if result_02 is skipped else result_02.rc }}"
    - "  Data: {{ result_02.stdout | default('') | trim if not (result_02 is skipped) else '' }}"
    - "  Status: {{ 'NOT_APPLICABLE' if (result_02 is skipped) else ('PASS' if (result_02.stdout | default('') | trim == '') else 'FAIL') }}"
    - "  Details: {{ 'Not applicable – audit tools not installed' if (result_02 is skipped) else ('Owner is root' if (result_02.stdout | default('') | trim == '') else 'Non-root owner: ' + (result_02.stdout | default('') | trim)) }}"
    - ""
    - "REQUIREMENT 03 - {{ req_03 }}:"
    - "  Task: Check /sbin/aureport owner"
    - "  Command: stat -Lc \"%n %U\" /sbin/aureport | awk '$2 != \"root\" {print}'"
    - "  Exit code: {{ result_03.rc | default('N/A') if result_03 is skipped else result_03.rc }}"
    - "  Data: {{ result_03.stdout | default('') | trim if not (result_03 is skipped) else '' }}"
    - "  Status: {{ 'NOT_APPLICABLE' if (result_03 is skipped) else ('PASS' if (result_03.stdout | default('') | trim == '') else 'FAIL') }}"
    - "  Details: {{ 'Not applicable – audit tools not installed' if (result_03 is skipped) else ('Owner is root' if (result_03.stdout | default('') | trim == '') else 'Non-root owner: ' + (result_03.stdout | default('') | trim)) }}"
    - ""
    - "REQUIREMENT 04 - {{ req_04 }}:"
    - "  Task: Check /sbin/ausearch owner"
    - "  Command: stat -Lc \"%n %U\" /sbin/ausearch | awk '$2 != \"root\" {print}'"
    - "  Exit code: {{ result_04.rc | default('N/A') if result_04 is skipped else result_04.rc }}"
    - "  Data: {{ result_04.stdout | default('') | trim if not (result_04 is skipped) else '' }}"
    - "  Status: {{ 'NOT_APPLICABLE' if (result_04 is skipped) else ('PASS' if (result_04.stdout | default('') | trim == '') else 'FAIL') }}"
    - "  Details: {{ 'Not applicable – audit tools not installed' if (result_04 is skipped) else ('Owner is root' if (result_04.stdout | default('') | trim == '') else 'Non-root owner: ' + (result_04.stdout | default('') | trim)) }}"
    - ""
    - "REQUIREMENT 05 - {{ req_05 }}:"
    - "  Task: Check /sbin/autrace owner"
    - "  Command: stat -Lc \"%n %U\" /sbin/autrace | awk '$2 != \"root\" {print}'"
    - "  Exit code: {{ result_05.rc | default('N/A') if result_05 is skipped else result_05.rc }}"
    - "  Data: {{ result_05.stdout | default('') | trim if not (result_05 is skipped) else '' }}"
    - "  Status: {{ 'NOT_APPLICABLE' if (result_05 is skipped) else ('PASS' if (result_05.stdout | default('') | trim == '') else 'FAIL') }}"
    - "  Details: {{ 'Not applicable – audit tools not installed' if (result_05 is skipped) else ('Owner is root' if (result_05.stdout | default('') | trim == '') else 'Non-root owner: ' + (result_05.stdout | default('') | trim)) }}"
    - ""
    - "REQUIREMENT 06 - {{ req_06 }}:"
    - "  Task: Check /sbin/auditd owner"
    - "  Command: stat -Lc \"%n %U\" /sbin/auditd | awk '$2 != \"root\" {print}'"
    - "  Exit code: {{ result_06.rc | default('N/A') if result_06 is skipped else result_06.rc }}"
    - "  Data: {{ result_06.stdout | default('') | trim if not (result_06 is skipped) else '' }}"
    - "  Status: {{ 'NOT_APPLICABLE' if (result_06 is skipped) else ('PASS' if (result_06.stdout | default('') | trim == '') else 'FAIL') }}"
    - "  Details: {{ 'Not applicable – audit tools not installed' if (result_06 is skipped) else ('Owner is root' if (result_06.stdout | default('') | trim == '') else 'Non-root owner: ' + (result_06.stdout | default('') | trim)) }}"
    - ""
    - "REQUIREMENT 07 - {{ req_07 }}:"
    - "  Task: Check /sbin/augenrules owner"
    - "  Command: stat -Lc \"%n %U\" /sbin/augenrules | awk '$2 != \"root\" {print}'"
    - "  Exit code: {{ result_07.rc | default('N/A') if result_07 is skipped else result_07.rc }}"
    - "  Data: {{ result_07.stdout | default('') | trim if not (result_07 is skipped) else '' }}"
    - "  Status: {{ 'NOT_APPLICABLE' if (result_07 is skipped) else ('PASS' if (result_07.stdout | default('') | trim == '') else 'FAIL') }}"
    - "  Details: {{ 'Not applicable – audit tools not installed' if (result_07 is skipped) else ('Owner is root' if (result_07.stdout | default('') | trim == '') else 'Non-root owner: ' + (result_07.stdout | default('') | trim)) }}"
    - ""
    - "REQUIREMENT 08 - {{ req_08 }}:"
    - "  Task: Summarize overall compliance"
    - "  Command: N/A"
    - "  Exit code: N/A"
    - "  Data: N/A"
    - "  Status: {{ 'NOT_APPLICABLE' if audit_not_installed else ('PASS' if not ownership_fail else 'FAIL') }}"
    - "  Details: {{ 'Not applicable – audit tools not installed' if audit_not_installed else ('All audit tools are owned by root' if not ownership_fail else 'One or more audit tools have a non-root owner') }}"
    - ""
    - "========================================================"
    - "OVERALL RESULT:"
    - "  Result: {{ cis_result }}"
    - "  Details: {{ 'Not applicable – audit tools not installed' if audit_not_installed else ('All audit tools are owned by root' if not ownership_fail else 'At least one audit tool is not owned by root') }}"
    - "========================================================"
