---
- name: Initialize meta data variables
  include_vars: cis_audit_var_5_1_5.yml

- name: "Initialize data variables"
  set_fact:
    data_01: "Not collected yet"
    status_01: "ERROR"
    details_01: "Not evaluated"
    data_02: "Not collected yet"
    status_02: "ERROR"
    details_02: "Not evaluated"
    data_03: "Not collected yet"
    status_03: "ERROR"
    details_03: "Not evaluated"
    data_04: "Not collected yet"
    status_04: "ERROR"
    details_04: "Not evaluated"
    data_05: "Not collected yet"
    status_05: "ERROR"
    details_05: "Not evaluated"
    task_01_name: "Not executed"
    task_01_cmd: "N/A"
    task_01_rc: -1
    task_02_name: "Not executed"
    task_02_cmd: "N/A"
    task_02_rc: -1
    task_03_name: "Not executed"
    task_03_cmd: "N/A"
    task_03_rc: -1
    task_04_name: "Not executed"
    task_04_cmd: "N/A"
    task_04_rc: -1
    task_05_name: "Not executed"
    task_05_cmd: "N/A"
    task_05_rc: -1

- name: "Req 01 - Check if OpenSSH server is installed"
  shell: |
    dpkg -l | grep -q openssh-server || rpm -q openssh-server 2>/dev/null
  args:
    executable: /bin/bash
  register: result_01
  failed_when: false
  changed_when: false

- name: "Store requirement 01 details"
  set_fact:
    task_01_name: "Check sshd installation"
    task_01_cmd: "dpkg -l | grep -q openssh-server || rpm -q openssh-server 2>/dev/null"
    task_01_rc: "{{ result_01.rc | default(-1) }}"
    data_01: "{{ result_01.stdout | default('') | trim }}"
    sshd_present: "{{ result_01.rc == 0 }}"
    status_01: "{{ 'PASS' if result_01.rc == 0 else 'FAIL' }}"
    details_01: "{{ 'sshd is installed' if result_01.rc == 0 else 'sshd not found' }}"

- name: "Req 02 - Check if sshd is running"
  shell: |
    systemctl is-active sshd 2>/dev/null || service sshd status 2>/dev/null
  args:
    executable: /bin/bash
  register: result_02
  failed_when: false
  changed_when: false
  when: sshd_present | default(false) | bool

- name: "Store requirement 02 details"
  set_fact:
    task_02_name: "Check sshd running status"
    task_02_cmd: "systemctl is-active sshd 2>/dev/null || service sshd status 2>/dev/null"
    task_02_rc: "{{ result_02.rc | default(-1) if sshd_present | default(false) else -1 }}"
    data_02: "{{ (result_02.stdout | default('') | trim) if sshd_present | default(false) else 'Skipped (sshd not installed)' }}"
    sshd_running: "{{ result_02.rc == 0 if sshd_present | default(false) else false }}"
    status_02: >-
      {%- if not (sshd_present | default(false)) -%}
        SKIP
      {%- elif result_02.rc == 0 -%}
        PASS
      {%- else -%}
        FAIL
      {%- endif %}
    details_02: >-
      {%- if not (sshd_present | default(false)) -%}
        Prerequisite not met; sshd is not installed
      {%- elif result_02.rc == 0 -%}
        sshd is running
      {%- else -%}
        sshd is not running
      {%- endif %}
  when: true

- name: "Req 03 - Check for weak Key Exchange algorithms"
  shell: |
    sshd -T | grep -Pi -- 'kexalgorithms\h+([^#\n\r]+,)?(diffie-hellman-group1-sha1|diffie-hellman-group14-sha1|diffie-hellman-group-exchange-sha1)\b'
  args:
    executable: /bin/bash
  register: result_03
  failed_when: false
  changed_when: false
  when:
  - sshd_present | default(false) | bool
  - sshd_running | default(false) | bool

- name: "Store requirement 03 details"
  set_fact:
    task_03_name: "Check for weak Key Exchange algorithms"
    task_03_cmd: |
      sshd -T | grep -Pi -- 'kexalgorithms\\h+([^#\\n\\r]+,)?(diffie-hellman-group1-sha1|diffie-hellman-group14-sha1|diffie-hellman-group-exchange-sha1)\\b'
    task_03_rc: "{{ result_03.rc | default(-1) if (sshd_present | default(false) and sshd_running | default(false)) else -1 }}"
    data_03: >-
      {%- if not (sshd_present | default(false)) -%}
        Skipped (sshd not installed)
      {%- elif not (sshd_running | default(false)) -%}
        Skipped (sshd not running)
      {%- else -%}
        {{ result_03.stdout | default('') | trim }}
      {%- endif %}
    status_03: >-
      {%- if not (sshd_present | default(false)) or not (sshd_running | default(false)) -%}
        SKIP
      {%- elif result_03.stdout | default('') | trim == '' -%}
        PASS
      {%- else -%}
        FAIL
      {%- endif %}
    details_03: >-
      {%- if not (sshd_present | default(false)) -%}
        Prerequisite not met; sshd is not installed
      {%- elif not (sshd_running | default(false)) -%}
        sshd is not running
      {%- elif result_03.stdout | default('') | trim == '' -%}
        No weak KexAlgorithms found
      {%- else -%}
        Weak KexAlgorithms detected
      {%- endif %}
  when: true

- name: "Req 04 - Determine overall compliance status"
  set_fact:
    task_04_name: "Summarize overall compliance"
    task_04_cmd: "N/A"
    task_04_rc: 0
    data_04: >-
      {%- if not (sshd_present | default(false)) or not (sshd_running | default(false)) -%}
        SKIP
      {%- elif status_03 | trim == 'PASS' -%}
        PASS
      {%- else -%}
        FAIL
      {%- endif %}
    status_04: >-
      {%- if not (sshd_present | default(false)) or not (sshd_running | default(false)) -%}
        SKIP
      {%- elif status_03 | trim == 'PASS' -%}
        PASS
      {%- else -%}
        FAIL
      {%- endif %}
    details_04: >-
      {%- if not (sshd_present | default(false)) -%}
        SSH server is not installed; CIS 5.1.5 is not applicable
      {%- elif not (sshd_running | default(false)) -%}
        SSH server is not running; CIS 5.1.5 is not applicable
      {%- elif status_03 | trim == 'PASS' -%}
        No weak Key Exchange algorithms configured; compliant
      {%- else -%}
        Weak Key Exchange algorithms are configured
      {%- endif %}

- name: "Req 05 - Store final audit result in cis_result"
  set_fact:
    cis_result: "{{ status_04 | trim }}"
    task_05_name: "Set cis_result variable"
    task_05_cmd: "N/A"
    task_05_rc: 0
    data_05: "{{ status_04 | trim }}"
    status_05: "PASS"
    details_05: "cis_result variable set to {{ status_04 | trim }}"

- name: "Generate audit report"
  debug:
    msg:
    - "AUDIT REPORT — CIS 5.1.5"
    - "Reference: CIS Benchmark checkpoint 5.1.5"
    - ""
    - "REQUIREMENT 01 - {{ req_01 }}:"
    - "  Task: {{ task_01_name | default('Not recorded') }}"
    - "  Command: {{ task_01_cmd | default('N/A') }}"
    - "  Exit code: {{ task_01_rc | default(-1) }}"
    - "  Data: {{ data_01 | default('') | trim }}"
    - "  Status: {{ status_01 | default('ERROR') | trim }}"
    - "  Details: {{ details_01 | default('') | trim }}"
    - ""
    - "REQUIREMENT 02 - {{ req_02 }}:"
    - "  Task: {{ task_02_name | default('Not recorded') }}"
    - "  Command: {{ task_02_cmd | default('N/A') }}"
    - "  Exit code: {{ task_02_rc | default(-1) }}"
    - "  Data: {{ data_02 | default('') | trim }}"
    - "  Status: {{ status_02 | default('ERROR') | trim }}"
    - "  Details: {{ details_02 | default('') | trim }}"
    - ""
    - "REQUIREMENT 03 - {{ req_03 }}:"
    - "  Task: {{ task_03_name | default('Not recorded') }}"
    - "  Command: {{ task_03_cmd | default('N/A') }}"
    - "  Exit code: {{ task_03_rc | default(-1) }}"
    - "  Data: {{ data_03 | default('') | trim }}"
    - "  Status: {{ status_03 | default('ERROR') | trim }}"
    - "  Details: {{ details_03 | default('') | trim }}"
    - ""
    - "REQUIREMENT 04 - {{ req_04 }}:"
    - "  Task: {{ task_04_name | default('Not recorded') }}"
    - "  Command: {{ task_04_cmd | default('N/A') }}"
    - "  Exit code: {{ task_04_rc | default(-1) }}"
    - "  Data: {{ data_04 | default('') | trim }}"
    - "  Status: {{ status_04 | default('ERROR') | trim }}"
    - "  Details: {{ details_04 | default('') | trim }}"
    - ""
    - "REQUIREMENT 05 - {{ req_05 }}:"
    - "  Task: {{ task_05_name | default('Not recorded') }}"
    - "  Command: {{ task_05_cmd | default('N/A') }}"
    - "  Exit code: {{ task_05_rc | default(-1) }}"
    - "  Data: {{ data_05 | default('') | trim }}"
    - "  Status: {{ status_05 | default('ERROR') | trim }}"
    - "  Details: {{ details_05 | default('') | trim }}"
    - ""
    - "========================================================"
    - "OVERALL COMPLIANCE:"
    - "  Result: {{ cis_result | default('ERROR') | trim }}"
    - "  Details: {{ details_04 | default('Not evaluated') | trim }}"
    - "========================================================"
