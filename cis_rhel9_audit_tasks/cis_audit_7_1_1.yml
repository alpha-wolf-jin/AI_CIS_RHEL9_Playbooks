---
- name: Initialize meta data variables
  include_vars: cis_audit_var_7_1_1.yml

- name: "Initialize data variables"
  ansible.builtin.set_fact:
    status_01: "UNKNOWN"
    data_01: "Not collected"
    status_02: "UNKNOWN"
    data_02: "Not collected"
    status_03: "UNKNOWN"
    data_03: "Not collected"
    status_04: "UNKNOWN"
    data_04: "Not collected"
    status_05: "UNKNOWN"
    data_05: "Not collected"
    status_06: "UNKNOWN"
    data_06: "Not collected"
    task_01_name: "Not executed"
    task_01_cmd: "N/A"
    task_01_rc: -1
    task_02_name: "Not executed"
    task_02_cmd: "N/A"
    task_02_rc: -1
    task_03_name: "Not executed"
    task_03_cmd: "N/A"
    task_03_rc: -1
    task_04_name: "Not executed"
    task_04_cmd: "N/A"
    task_04_rc: -1
    task_05_name: "Not executed"
    task_05_cmd: "N/A"
    task_05_rc: -1
    task_06_name: "Not executed"
    task_06_cmd: "N/A"
    task_06_rc: -1

# Requirement 1: Check file existence
- name: "Req 01 - Check if /etc/passwd exists"
  ansible.builtin.shell: test -f /etc/passwd
  args:
    executable: /bin/bash
  register: result_01
  failed_when: false
  changed_when: false

- name: "Store requirement 01 details"
  ansible.builtin.set_fact:
    task_01_name: "Check if /etc/passwd exists"
    task_01_cmd: "test -f /etc/passwd"
    task_01_rc: "{{ result_01.rc | default(-1) }}"
    data_01: "{{ 'File exists' if (result_01.rc | default(-1)) == 0 else 'File does not exist' }}"
    status_01: "{{ 'PASS' if (result_01.rc | default(-1)) == 0 else 'FAIL' }}"
    details_01: "{{ 'Completed successfully' if (result_01.rc | default(-1)) == 0 else 'File /etc/passwd does not exist' }}"
    file_exists: "{{ (result_01.rc | default(-1)) == 0 }}"

# Requirement 2: Check permissions
- name: "Req 02 - Check permissions on /etc/passwd"
  ansible.builtin.shell: stat -Lc '%a' /etc/passwd
  args:
    executable: /bin/bash
  register: result_02
  when: file_exists | bool
  failed_when: false
  changed_when: false

- name: "Store requirement 02 details"
  ansible.builtin.set_fact:
    task_02_name: "Check permissions on /etc/passwd"
    task_02_cmd: "stat -Lc '%a' /etc/passwd"
    task_02_rc: "{{ 0 if result_02.skipped | default(false) else result_02.rc | default(-1) }}"
    data_02: "{{ 'N/A' if result_02.skipped | default(false) else (result_02.stdout | default('') | trim) }}"
    status_02: >-
      {{ 'SKIPPED' if result_02.skipped | default(false)
         else ('PASS' if (result_02.stdout | default('') | trim) | int <= 644 and (result_02.rc | default(-1)) == 0
         else 'FAIL') }}
    details_02: >-
      {{ 'Skipped because /etc/passwd does not exist' if result_02.skipped | default(false)
         else ('Permissions mode is compliant' if (result_02.stdout | default('') | trim) | int <= 644 and (result_02.rc | default(-1)) == 0
         else 'Permissions mode is not compliant (mode ' ~ (result_02.stdout | default('') | trim) ~ ')') }}

# Requirement 3: Check owner
- name: "Req 03 - Check owner of /etc/passwd"
  ansible.builtin.shell: stat -Lc '%u' /etc/passwd
  args:
    executable: /bin/bash
  register: result_03
  when: file_exists | bool
  failed_when: false
  changed_when: false

- name: "Store requirement 03 details"
  ansible.builtin.set_fact:
    task_03_name: "Check owner of /etc/passwd"
    task_03_cmd: "stat -Lc '%u' /etc/passwd"
    task_03_rc: "{{ 0 if result_03.skipped | default(false) else result_03.rc | default(-1) }}"
    data_03: "{{ 'N/A' if result_03.skipped | default(false) else (result_03.stdout | default('') | trim) }}"
    status_03: >-
      {{ 'SKIPPED' if result_03.skipped | default(false)
         else ('PASS' if (result_03.stdout | default('') | trim) == '0' else 'FAIL') }}
    details_03: >-
      {{ 'Skipped because /etc/passwd does not exist' if result_03.skipped | default(false)
         else ('Owner is root (UID 0)' if (result_03.stdout | default('') | trim) == '0'
         else 'Owner is not root (UID ' ~ (result_03.stdout | default('') | trim) ~ ')') }}

# Requirement 4: Check group
- name: "Req 04 - Check group owner of /etc/passwd"
  ansible.builtin.shell: stat -Lc '%g' /etc/passwd
  args:
    executable: /bin/bash
  register: result_04
  when: file_exists | bool
  failed_when: false
  changed_when: false

- name: "Store requirement 04 details"
  ansible.builtin.set_fact:
    task_04_name: "Check group owner of /etc/passwd"
    task_04_cmd: "stat -Lc '%g' /etc/passwd"
    task_04_rc: "{{ 0 if result_04.skipped | default(false) else result_04.rc | default(-1) }}"
    data_04: "{{ 'N/A' if result_04.skipped | default(false) else (result_04.stdout | default('') | trim) }}"
    status_04: >-
      {{ 'SKIPPED' if result_04.skipped | default(false)
         else ('PASS' if (result_04.stdout | default('') | trim) == '0' else 'FAIL') }}
    details_04: >-
      {{ 'Skipped because /etc/passwd does not exist' if result_04.skipped | default(false)
         else ('Group is root (GID 0)' if (result_04.stdout | default('') | trim) == '0'
         else 'Group is not root (GID ' ~ (result_04.stdout | default('') | trim) ~ ')') }}

# Requirement 5: Summarize overall compliance
- name: "Req 05 - Summarize overall compliance status"
  ansible.builtin.set_fact:
    task_05_name: "Summarize overall compliance status"
    task_05_cmd: "N/A"
    task_05_rc: 0
    data_05: "{{ 'PASS' if status_01 == 'PASS' and status_02 == 'PASS' and status_03 == 'PASS' and status_04 == 'PASS' else 'FAIL' }}"
    status_05: "{{ 'PASS' if status_01 == 'PASS' and status_02 == 'PASS' and status_03 == 'PASS' and status_04 == 'PASS' else 'FAIL' }}"
    details_05: "{{ 'All checks passed' if status_01 == 'PASS' and status_02 == 'PASS' and status_03 == 'PASS' and status_04 == 'PASS' else 'One or more checks failed' }}"

# Requirement 6: Store final result in cis_result
- name: "Req 06 - Store final audit result in cis_result"
  ansible.builtin.set_fact:
    task_06_name: "Store final audit result in cis_result"
    task_06_cmd: "N/A"
    task_06_rc: 0
    data_06: "{{ status_05 }}"
    status_06: "{{ status_05 }}"
    details_06: "{{ details_05 }}"
    cis_result: "{{ status_05 }}"

# Generate audit report
- name: "Generate audit report"
  ansible.builtin.debug:
    msg:
    - "AUDIT REPORT — CIS 7.1.1"
    - "Reference: CIS Benchmark checkpoint 7.1.1"
    - ""
    - "REQUIREMENT 01 - {{ req_01 }}:"
    - "  Task: {{ task_01_name | default('Not recorded') }}"
    - "  Command: {{ task_01_cmd | default('N/A') }}"
    - "  Exit code: {{ task_01_rc | default(-1) }}"
    - "  Data: {{ data_01 | default('') | trim }}"
    - "  Status: {{ status_01 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_01 | default('') | trim }}"
    - ""
    - "REQUIREMENT 02 - {{ req_02 }}:"
    - "  Task: {{ task_02_name | default('Not recorded') }}"
    - "  Command: {{ task_02_cmd | default('N/A') }}"
    - "  Exit code: {{ task_02_rc | default(-1) }}"
    - "  Data: {{ data_02 | default('') | trim }}"
    - "  Status: {{ status_02 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_02 | default('') | trim }}"
    - ""
    - "REQUIREMENT 03 - {{ req_03 }}:"
    - "  Task: {{ task_03_name | default('Not recorded') }}"
    - "  Command: {{ task_03_cmd | default('N/A') }}"
    - "  Exit code: {{ task_03_rc | default(-1) }}"
    - "  Data: {{ data_03 | default('') | trim }}"
    - "  Status: {{ status_03 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_03 | default('') | trim }}"
    - ""
    - "REQUIREMENT 04 - {{ req_04 }}:"
    - "  Task: {{ task_04_name | default('Not recorded') }}"
    - "  Command: {{ task_04_cmd | default('N/A') }}"
    - "  Exit code: {{ task_04_rc | default(-1) }}"
    - "  Data: {{ data_04 | default('') | trim }}"
    - "  Status: {{ status_04 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_04 | default('') | trim }}"
    - ""
    - "REQUIREMENT 05 - {{ req_05 }}:"
    - "  Task: {{ task_05_name | default('Not recorded') }}"
    - "  Command: {{ task_05_cmd | default('N/A') }}"
    - "  Exit code: {{ task_05_rc | default(-1) }}"
    - "  Data: {{ data_05 | default('') | trim }}"
    - "  Status: {{ status_05 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_05 | default('') | trim }}"
    - ""
    - "REQUIREMENT 06 - {{ req_06 }}:"
    - "  Task: {{ task_06_name | default('Not recorded') }}"
    - "  Command: {{ task_06_cmd | default('N/A') }}"
    - "  Exit code: {{ task_06_rc | default(-1) }}"
    - "  Data: {{ data_06 | default('') | trim }}"
    - "  Status: {{ status_06 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_06 | default('') | trim }}"
    - ""
    - "========================================================"
    - "OVERALL COMPLIANCE:"
    - "  Result: {{ cis_result | default('UNKNOWN') | trim }}"
    - "========================================================"
