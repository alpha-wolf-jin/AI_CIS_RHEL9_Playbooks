---
- name: Initialize meta data variables
  include_vars: cis_audit_var_3_3_2.yml

- name: "Initialize data variables"
  set_fact:
    task_01_name: "Not executed"
    task_01_cmd: "N/A"
    task_01_rc: -1
    data_01: "Not collected yet"
    status_01: "UNKNOWN"
    details_01: "Not evaluated"
    task_02_name: "Not executed"
    task_02_cmd: "N/A"
    task_02_rc: -1
    data_02: "Not collected yet"
    status_02: "UNKNOWN"
    details_02: "Not evaluated"

- name: "Gather package facts"
  ansible.builtin.package_facts:
    manager: auto
  failed_when: false

- name: "Set package installation status"
  set_fact:
    package_installed: "{{ 'systemd' in ansible_facts.packages }}"

- block:
  - name: "Req 01 - Copy audit script to remote"
    ansible.builtin.copy:
      dest: "{{ audit_script }}"
      mode: '0700'
      content: "{{ audit_script_content }}"
    when: package_installed
    failed_when: false
    changed_when: false

  - name: "Req 01 - Execute audit script"
    ansible.builtin.shell: "/bin/bash {{ audit_script }}"
    args:
      executable: /bin/bash
    register: audit_result
    when: package_installed
    failed_when: false
    changed_when: false

  - name: "Req 01 - Store audit execution details"
    set_fact:
      task_01_name: "Execute audit script"
      task_01_cmd: "/bin/bash {{ audit_script }}"
      task_01_rc: "{{ audit_result.rc | default(-1) }}"
      data_01: "{{ audit_result.stdout | default('') | trim }}"
      status_01: "PASS"
      details_01: "Script executed successfully; audit result captured (script exit code {{ audit_result.rc | default(-1) }})"
    when: package_installed

  - name: "Req 01 - Set skipped details when package not installed"
    set_fact:
      task_01_name: "Execute audit script"
      task_01_cmd: "N/A"
      task_01_rc: -1
      data_01: ""
      status_01: "SKIP"
      details_01: "Required package 'systemd' not installed"
    when: not package_installed

  - name: "Req 02 - Determine compliance status"
    set_fact:
      task_02_name: "Verify compliance from audit script output"
      task_02_cmd: "Parse script output for PASS/FAIL"
      task_02_rc: 0
      data_02: "{{ audit_result.stdout | default('') | trim if package_installed else '' }}"
      status_02: >-
        {{ 'SKIP' if not package_installed
           else ('PASS' if '** PASS **' in (audit_result.stdout | default(''))
           else ('FAIL' if '** FAIL **' in (audit_result.stdout | default(''))
           else 'UNKNOWN')) | trim }}
      details_02: >-
        {{ 'Required package not installed' if not package_installed
           else ('Compliant' if '** PASS **' in (audit_result.stdout | default(''))
           else ('Non-compliant' if '** FAIL **' in (audit_result.stdout | default(''))
           else 'Audit not performed')) | trim }}
    when: package_installed

  - name: "Req 02 - Set skipped status when package not installed"
    set_fact:
      task_02_name: "Verify compliance from audit script output"
      task_02_cmd: "N/A"
      task_02_rc: -1
      data_02: ""
      status_02: "SKIP"
      details_02: "Required package not installed"
    when: not package_installed

  - name: "Req 03 - Store final cis_result for audit report"
    set_fact:
      cis_result: "{{ status_02 }}"

  always:
  - name: "Cleanup - Check if audit script still exists"
    ansible.builtin.stat:
      path: "{{ audit_script }}"
    register: _script_cleanup_stat
    failed_when: false

  - name: "Cleanup - Remove temporary audit script"
    ansible.builtin.file:
      path: "{{ audit_script }}"
      state: absent
    when: _script_cleanup_stat.stat.exists | default(false)
    failed_when: false

- name: "Generate audit report"
  debug:
    msg:
    - "AUDIT REPORT — CIS 3.3.2"
    - "Reference: CIS Benchmark checkpoint 3.3.2"
    - ""
    - "REQUIREMENT 01 - {{ req_01 }}:"
    - "  Task: {{ task_01_name | default('Not recorded') }}"
    - "  Command: {{ task_01_cmd | default('N/A') }}"
    - "  Exit code: {{ task_01_rc | default(-1) }}"
    - "  Data: {{ data_01 | default('') | trim }}"
    - "  Status: {{ status_01 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_01 | default('') | trim }}"
    - ""
    - "REQUIREMENT 02 - {{ req_02 }}:"
    - "  Task: {{ task_02_name | default('Not recorded') }}"
    - "  Command: {{ task_02_cmd | default('N/A') }}"
    - "  Exit code: {{ task_02_rc | default(-1) }}"
    - "  Data: {{ data_02 | default('') | trim }}"
    - "  Status: {{ status_02 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_02 | default('') | trim }}"
    - ""
    - "OVERALL COMPLIANCE:"
    - "  Result: {{ cis_result | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_02 | default('Not evaluated') | trim }}"
