---
- name: Initialize meta data variables
  include_vars: cis_audit_var_2_1_9.yml

- name: "Initialize data variables"
  ansible.builtin.set_fact:
    data_01: ""
    status_01: "ERROR"
    details_01: "Not evaluated"
    task_01_name: "Check if nfs-utils package is installed"
    task_01_cmd: "rpm -q nfs-utils"
    task_01_rc: -1
    data_02: ""
    status_02: "SKIP"
    details_02: "Skipped: nfs-utils not installed"
    task_02_name: "Check if nfs-server.service is enabled"
    task_02_cmd: "systemctl is-enabled nfs-server.service 2>/dev/null | grep 'enabled'"
    task_02_rc: -1
    data_03: ""
    status_03: "SKIP"
    details_03: "Skipped: nfs-utils not installed"
    task_03_name: "Check if nfs-server.service is active"
    task_03_cmd: "systemctl is-active nfs-server.service 2>/dev/null | grep '^active'"
    task_03_rc: -1
    data_04: ""
    status_04: "ERROR"
    details_04: "Not evaluated"
    task_04_name: "Overall compliance determination"
    task_04_cmd: "Jinja2 expression"
    task_04_rc: 0
    data_05: ""
    status_05: "ERROR"
    details_05: "Not evaluated"
    task_05_name: "Set cis_result for final report"
    task_05_cmd: "set_fact"
    task_05_rc: 0

- name: "Req 01 - Check if nfs-utils package is installed"
  ansible.builtin.shell: "rpm -q nfs-utils"
  args:
    executable: /bin/bash
  register: result_01
  failed_when: false
  changed_when: false

- name: "Store requirement 01 details"
  ansible.builtin.set_fact:
    data_01: "{{ result_01.stdout | default('') | trim }}"
    status_01: "{{ 'PASS' if (result_01.rc | default(-1)) != 0 else 'FAIL' }}"
    details_01: "{{ 'nfs-utils is not installed' if (result_01.rc | default(-1)) != 0 else 'nfs-utils is installed' }}"
    task_01_rc: "{{ result_01.rc | default(-1) }}"
    nfs_utils_installed: "{{ (result_01.rc | default(-1)) == 0 }}"

- name: "Req 02 - Check if nfs-server.service is enabled"
  ansible.builtin.shell: "systemctl is-enabled nfs-server.service 2>/dev/null | grep 'enabled'"
  args:
    executable: /bin/bash
  register: result_02
  failed_when: false
  changed_when: false
  when: "nfs_utils_installed | default(false) | bool"

- name: "Store requirement 02 details"
  ansible.builtin.set_fact:
    data_02: "{{ result_02.stdout | default('') | trim }}"
    status_02: "{{ 'FAIL' if (result_02.rc | default(-1)) == 0 else 'PASS' }}"
    details_02: "{{ 'nfs-server.service is enabled' if (result_02.rc | default(-1)) == 0 else 'nfs-server.service is not enabled' }}"
    task_02_rc: "{{ result_02.rc | default(-1) }}"
  when: "nfs_utils_installed | default(false) | bool"

- name: "Req 03 - Check if nfs-server.service is active"
  ansible.builtin.shell: "systemctl is-active nfs-server.service 2>/dev/null | grep '^active'"
  args:
    executable: /bin/bash
  register: result_03
  failed_when: false
  changed_when: false
  when: "nfs_utils_installed | default(false) | bool"

- name: "Store requirement 03 details"
  ansible.builtin.set_fact:
    data_03: "{{ result_03.stdout | default('') | trim }}"
    status_03: "{{ 'FAIL' if (result_03.rc | default(-1)) == 0 else 'PASS' }}"
    details_03: "{{ 'nfs-server.service is active' if (result_03.rc | default(-1)) == 0 else 'nfs-server.service is not active' }}"
    task_03_rc: "{{ result_03.rc | default(-1) }}"
  when: "nfs_utils_installed | default(false) | bool"

- name: "Req 04 - Determine overall compliance"
  ansible.builtin.set_fact:
    status_04: "{{ 'PASS' if (not (nfs_utils_installed | default(false) | bool)) or ((nfs_utils_installed | default(false) | bool) and status_02 == 'PASS' and status_03 == 'PASS') else 'FAIL' }}"
    details_04: >-
      {{ 'nfs-utils is not installed' if not (nfs_utils_installed | default(false) | bool)
         else ('nfs-utils is installed but nfs-server.service is not enabled and not active' if status_02 == 'PASS' and status_03 == 'PASS'
         else 'nfs-utils is installed and nfs-server.service is enabled or active') }}
    data_04: "{{ 'PASS' if (not (nfs_utils_installed | default(false) | bool)) or ((nfs_utils_installed | default(false) | bool) and status_02 == 'PASS' and status_03 == 'PASS') else 'FAIL' }}"
    task_04_rc: 0

- name: "Set cis_result for final report"
  ansible.builtin.set_fact:
    cis_result: "{{ status_04 }}"

- name: "Generate audit report"
  ansible.builtin.debug:
    msg:
    - "AUDIT REPORT — CIS 2.1.9"
    - "Reference: CIS Benchmark checkpoint 2.1.9"
    - ""
    - "REQUIREMENT 01 - {{ req_01 }}:"
    - "  Task: {{ task_01_name | default('Not recorded') }}"
    - "  Command: {{ task_01_cmd | default('N/A') }}"
    - "  Exit code: {{ task_01_rc | default(-1) }}"
    - "  Data: {{ data_01 | default('') | trim }}"
    - "  Status: {{ status_01 | default('ERROR') | trim }}"
    - "  Details: {{ details_01 | default('') | trim }}"
    - ""
    - "REQUIREMENT 02 - {{ req_02 }}:"
    - "  Task: {{ task_02_name | default('Not recorded') }}"
    - "  Command: {{ task_02_cmd | default('N/A') }}"
    - "  Exit code: {{ task_02_rc | default(-1) }}"
    - "  Data: {{ data_02 | default('') | trim }}"
    - "  Status: {{ status_02 | default('ERROR') | trim }}"
    - "  Details: {{ details_02 | default('') | trim }}"
    - ""
    - "REQUIREMENT 03 - {{ req_03 }}:"
    - "  Task: {{ task_03_name | default('Not recorded') }}"
    - "  Command: {{ task_03_cmd | default('N/A') }}"
    - "  Exit code: {{ task_03_rc | default(-1) }}"
    - "  Data: {{ data_03 | default('') | trim }}"
    - "  Status: {{ status_03 | default('ERROR') | trim }}"
    - "  Details: {{ details_03 | default('') | trim }}"
    - ""
    - "REQUIREMENT 04 - {{ req_04 }}:"
    - "  Task: {{ task_04_name | default('Not recorded') }}"
    - "  Command: {{ task_04_cmd | default('N/A') }}"
    - "  Exit code: {{ task_04_rc | default(-1) }}"
    - "  Data: {{ data_04 | default('') | trim }}"
    - "  Status: {{ status_04 | default('ERROR') | trim }}"
    - "  Details: {{ details_04 | default('') | trim }}"
    - ""
    - "========================================================"
    - "OVERALL COMPLIANCE:"
    - "  Result: {{ cis_result | default('ERROR') | trim }}"
    - "  Details: {{ details_04 | default('Not evaluated') | trim }}"
    - "========================================================"
