---
- name: Initialize meta data variables
  include_vars: cis_audit_var_2_1_20.yml

- name: "Initialize data variables"
  set_fact:
    task_01_name: "Not executed"
    task_01_cmd: "N/A"
    task_01_rc: -1
    data_01: "Not collected yet"
    status_01: "ERROR"
    details_01: "Not evaluated"
    task_02_name: "Not executed"
    task_02_cmd: "N/A"
    task_02_rc: -1
    data_02: "Not collected yet"
    status_02: "ERROR"
    details_02: "Not evaluated"
    task_03_name: "Not executed"
    task_03_cmd: "N/A"
    task_03_rc: -1
    data_03: "Not collected yet"
    status_03: "ERROR"
    details_03: "Not evaluated"

- name: "Req 01 - Check site policy for X-Windows requirement"
  shell: echo "{{ policy_msg }}"
  args:
    executable: /bin/bash
  register: result_01
  failed_when: false

- name: "Req 01 - Set fact for policy assessment"
  set_fact:
    task_01_name: "Verify site policy"
    task_01_cmd: |
      echo \"{{ policy_msg }}\"
    task_01_rc: "{{ result_01.rc | default(-1) }}"
    data_01: "{{ result_01.stdout | default('') | trim }}"
    status_01: "{{ 'PASS' if result_01.rc | default(-1) == 0 and 'not required' in result_01.stdout | default('') | lower else 'FAIL' }}"
    details_01: "{{ 'Policy assessment: X not required' if result_01.rc | default(-1) == 0 and 'not required' in result_01.stdout | default('') | lower else 'Policy unclear' }}"

- name: "Req 02 - Check {{ package_name }} package installation"
  shell: rpm -q {{ package_name }}
  args:
    executable: /bin/bash
  register: result_02
  failed_when: false

- name: "Req 02 - Set fact for package installation status"
  set_fact:
    task_02_name: "Check package installation"
    task_02_cmd: "rpm -q {{ package_name }}"
    task_02_rc: "{{ result_02.rc | default(-1) }}"
    data_02: "{{ result_02.stdout | default('') | trim }}"
    status_02: "{{ 'PASS' if result_02.rc | default(-1) != 0 else 'FAIL' }}"
    details_02: "{{ 'Package not installed (expected)' if result_02.rc | default(-1) != 0 else 'Package is installed (should not be)' }}"

- name: "Req 03 - Determine overall compliance"
  set_fact:
    task_03_name: "Summarize overall compliance"
    task_03_cmd: "N/A"
    task_03_rc: 0
    data_03: "Overall compliance determined"
    status_03: "{{ 'PASS' if status_01 == 'PASS' and status_02 == 'PASS' else 'FAIL' }}"
    details_03: "{{ 'System is compliant: X not required and package not installed' if status_01 == 'PASS' and status_02 == 'PASS' else 'System is non-compliant: policy requires X or package installed' }}"

- name: "Store final result in cis_result"
  set_fact:
    cis_result: "{{ status_03 | default('ERROR') | trim }}"

- name: "Generate audit report"
  debug:
    msg:
    - "AUDIT REPORT — CIS 2.1.20"
    - "Reference: CIS Benchmark checkpoint 2.1.20"
    - "REQUIREMENT 01 - {{ req_01 }}:"
    - "  Task: {{ task_01_name | default('Not recorded') }}"
    - "  Command: {{ task_01_cmd | default('N/A') }}"
    - "  Exit code: {{ task_01_rc | default(-1) }}"
    - "  Data: {{ data_01 | default('') | trim }}"
    - "  Status: {{ status_01 | default('ERROR') | trim }}"
    - "  Details: {{ details_01 | default('') | trim }}"
    - ""
    - "REQUIREMENT 02 - {{ req_02 }}:"
    - "  Task: {{ task_02_name | default('Not recorded') }}"
    - "  Command: {{ task_02_cmd | default('N/A') }}"
    - "  Exit code: {{ task_02_rc | default(-1) }}"
    - "  Data: {{ data_02 | default('') | trim }}"
    - "  Status: {{ status_02 | default('ERROR') | trim }}"
    - "  Details: {{ details_02 | default('') | trim }}"
    - ""
    - "REQUIREMENT 03 - {{ req_03 }}:"
    - "  Task: {{ task_03_name | default('Not recorded') }}"
    - "  Command: {{ task_03_cmd | default('N/A') }}"
    - "  Exit code: {{ task_03_rc | default(-1) }}"
    - "  Data: {{ data_03 | default('') | trim }}"
    - "  Status: {{ status_03 | default('ERROR') | trim }}"
    - "  Details: {{ details_03 | default('') | trim }}"
    - ""
    - "========================================================"
    - "OVERALL COMPLIANCE:"
    - "  Result: {{ cis_result | default('ERROR') | trim }}"
    - "========================================================"
