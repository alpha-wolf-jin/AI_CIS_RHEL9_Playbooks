---
- name: Initialize meta data variables
  include_vars: cis_audit_var_5_3_1_2.yml

- name: "Initialize data variables"
  set_fact:
    data_01: "Not collected yet"
    status_01: "UNKNOWN"
    details_01: "Not evaluated"
    data_02: "Not collected yet"
    status_02: "UNKNOWN"
    details_02: "Not evaluated"
    data_03: "Not collected yet"
    status_03: "UNKNOWN"
    details_03: "Not evaluated"
    data_04: "Not collected yet"
    status_04: "UNKNOWN"
    details_04: "Not evaluated"
    task_01_name: "Not executed"
    task_01_cmd: "N/A"
    task_01_rc: -1
    task_02_name: "Not executed"
    task_02_cmd: "N/A"
    task_02_rc: -1
    task_03_name: "Not executed"
    task_03_cmd: "N/A"
    task_03_rc: -1
    task_04_name: "Not executed"
    task_04_cmd: "N/A"
    task_04_rc: -1

- name: "Req 01 - Query authselect package"
  ansible.builtin.shell: "rpm -q {{ package_name }}"
  args:
    executable: /bin/bash
  register: result_01
  failed_when: false
  changed_when: false

- name: "Store requirement 01 details"
  set_fact:
    task_01_name: "Query authselect package"
    task_01_cmd: "rpm -q {{ package_name }}"
    task_01_rc: "{{ result_01.rc | default(-1) }}"
    data_01: "{{ result_01.stdout | default('') | trim }}"
    status_01: >-
      {{ 'PASS' if result_01.rc | default(-1) == 0 else 'SKIP' }}
    details_01: >-
      {{ 'Package is installed' if result_01.rc | default(-1) == 0 else 'Package not installed - check skipped' }}

- name: "Req 02 - Extract authselect version"
  vars:
    version_cmd: "rpm -q --qf '%{VERSION}-%{RELEASE}' {{ package_name }}"
  ansible.builtin.shell: "{{ version_cmd }}"
  args:
    executable: /bin/bash
  register: result_02_version
  when: result_01.rc | default(-1) == 0
  failed_when: false
  changed_when: false

- name: "Store requirement 02 details"
  set_fact:
    task_02_name: "Evaluate authselect version"
    task_02_cmd: "rpm -q --qf '%{VERSION}-%{RELEASE}' {{ package_name }}"
    task_02_rc: "{{ result_02_version.rc | default(-1) }}"
    data_02: "{{ result_02_version.stdout | default('') | trim }}"
    status_02: >-
      {{ 'SKIP' if result_01.rc | default(-1) != 0 else
         ('PASS' if (result_02_version.stdout | default('0.0.0') | trim) is version(min_version, '>=') else 'FAIL') }}
    details_02: >-
      {{ 'Package not installed - version check skipped' if result_01.rc | default(-1) != 0 else
         ('Version meets minimum requirement (' + min_version + ' or greater)' if
          (result_02_version.stdout | default('0.0.0') | trim) is version(min_version, '>=') else 'Version is below ' + min_version) }}
  when: result_01.rc | default(-1) == 0 or result_01.rc | default(-1) != 0

- name: "Req 03 - Summarize overall compliance"
  set_fact:
    task_03_name: "Summarize overall compliance"
    task_03_cmd: "N/A"
    task_03_rc: 0
    data_03: "Overall compliance evaluation"
    status_03: >-
      {{ 'SKIP' if result_01.rc | default(-1) != 0 else
         ('PASS' if (result_02_version.stdout | default('0.0.0') | trim) is version(min_version, '>=') else 'FAIL') }}
    details_03: >-
      {{ 'System is not applicable for CIS 5.3.1.2 - authselect not installed, check skipped' if result_01.rc | default(-1) != 0 else
         ('System is compliant with CIS 5.3.1.2' if
          (result_02_version.stdout | default('0.0.0') | trim) is version(min_version, '>=') else 'System is NOT compliant with CIS 5.3.1.2') }}

- name: "Req 04 - Set cis_result variable"
  set_fact:
    task_04_name: "Set cis_result variable"
    task_04_cmd: "N/A"
    task_04_rc: 0
    data_04: "cis_result = {{ status_03 | default('UNKNOWN') | trim }}"
    status_04: "{{ status_03 | default('UNKNOWN') | trim }}"
    details_04: "Cis audit result variable set to {{ status_03 | default('UNKNOWN') | trim }}"
    cis_result: "{{ status_03 | default('UNKNOWN') | trim }}"

- name: "Generate audit report"
  debug:
    msg:
    - "AUDIT REPORT — CIS 5.3.1.2"
    - "Reference: CIS Benchmark checkpoint 5.3.1.2"
    - ""
    - "REQUIREMENT 01 - {{ req_01 }}:"
    - "  Task: {{ task_01_name | default('Not recorded') }}"
    - "  Command: {{ task_01_cmd | default('N/A') }}"
    - "  Exit code: {{ task_01_rc | default(-1) }}"
    - "  Data: {{ data_01 | default('') | trim }}"
    - "  Status: {{ status_01 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_01 | default('') | trim }}"
    - ""
    - "REQUIREMENT 02 - {{ req_02 }}:"
    - "  Task: {{ task_02_name | default('Not recorded') }}"
    - "  Command: {{ task_02_cmd | default('N/A') }}"
    - "  Exit code: {{ task_02_rc | default(-1) }}"
    - "  Data: {{ data_02 | default('') | trim }}"
    - "  Status: {{ status_02 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_02 | default('') | trim }}"
    - ""
    - "REQUIREMENT 03 - {{ req_03 }}:"
    - "  Task: {{ task_03_name | default('Not recorded') }}"
    - "  Command: {{ task_03_cmd | default('N/A') }}"
    - "  Exit code: {{ task_03_rc | default(-1) }}"
    - "  Data: {{ data_03 | default('') | trim }}"
    - "  Status: {{ status_03 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_03 | default('') | trim }}"
    - ""
    - "REQUIREMENT 04 - {{ req_04 }}:"
    - "  Task: {{ task_04_name | default('Not recorded') }}"
    - "  Command: {{ task_04_cmd | default('N/A') }}"
    - "  Exit code: {{ task_04_rc | default(-1) }}"
    - "  Data: {{ data_04 | default('') | trim }}"
    - "  Status: {{ status_04 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_04 | default('') | trim }}"
    - ""
    - "========================================================"
    - "OVERALL COMPLIANCE:"
    - "  Result: {{ cis_result | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_03 | default('Not evaluated') | trim }}"
    - "========================================================"
