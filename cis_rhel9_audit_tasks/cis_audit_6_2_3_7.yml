    - ""
    - "REQUIREMENT 10 - {{ req_10 }}:"
    - "  Task: Summarize overall compliance"
    - "  Command: N/A"
    - "  Exit code: 0"
    - "  Data: {{ overall_compliance }}"
    - "  Status: {{ overall_compliance | trim }}"
    - "  Details: {{ 'rsyslog not installed; checks skipped' if not rsyslog_installed else ('No imtcp receiver configuration found.' if (overall_compliance | trim) == 'PASS' else 'At least one imtcp receiver configuration found.') }}"
    - ""
    - "REQUIREMENT 11 - {{ req_11 }}:"
    - "  Task: {{ task_11_name }}"
    - "  Command: {{ task_11_cmd }}"
    - "  Exit code: {{ task_11_rc }}"
    - "  Data: {{ data_11 }}"
    - "  Status: {{ status_11 }}"
    - "  Details: {{ details_11 }}"
    - ""
