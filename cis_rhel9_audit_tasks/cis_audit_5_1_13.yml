---
- name: Initialize meta data variables
  include_vars: cis_audit_var_5_1_13.yml

- name: "Initialize data variables"
  set_fact:
    data_01: "Not collected yet"
    status_01: "UNKNOWN"
    details_01: "Not evaluated"
    data_02: "Not collected yet"
    status_02: "UNKNOWN"
    details_02: "Not evaluated"
    data_03: "Not collected yet"
    status_03: "UNKNOWN"
    details_03: "Not evaluated"
    data_04: "Not collected yet"
    status_04: "UNKNOWN"
    details_04: "Not evaluated"
    data_05: "Not collected yet"
    status_05: "UNKNOWN"
    details_05: "Not evaluated"
    task_01_name: "Not executed"
    task_01_cmd: "N/A"
    task_01_rc: -1
    task_02_name: "Not executed"
    task_02_cmd: "N/A"
    task_02_rc: -1
    task_03_name: "Not executed"
    task_03_cmd: "N/A"
    task_03_rc: -1
    task_04_name: "Not executed"
    task_04_cmd: "N/A"
    task_04_rc: -1
    task_05_name: "Not executed"
    task_05_cmd: "N/A"
    task_05_rc: -1

- name: "Gather package facts"
  ansible.builtin.package_facts:
    manager: auto
  failed_when: false

- name: "Set openssh-server installation status"
  set_fact:
    ssh_installed: "{{ 'openssh-server' in ansible_facts.packages }}"

- name: "Req 01 - Check if OpenSSH server package is installed"
  ansible.builtin.shell: dpkg -l | grep openssh-server || rpm -q openssh-server
  args:
    executable: /bin/bash
  register: result_01
  changed_when: false
  failed_when: false

- name: "Store requirement 01 details"
  set_fact:
    task_01_name: "Check OpenSSH server package installation"
    task_01_cmd: "dpkg -l | grep openssh-server || rpm -q openssh-server"
    task_01_rc: "{{ result_01.rc | default(-1) }}"
    data_01: "{{ result_01.stdout | default('') | trim }}"
    status_01: "{{ 'PASS' if (result_01.rc | default(-1) == 0 and ('openssh-server' in (result_01.stdout | default('') | lower))) else 'FAIL' }}"
    details_01: "{{ 'Package openssh-server is installed' if (result_01.rc | default(-1) == 0 and ('openssh-server' in (result_01.stdout | default('') | lower))) else 'Package not installed or failed to detect' }}"

- name: "Req 02 - Check global IgnoreRhosts setting"
  ansible.builtin.shell: sshd -T | grep ignorerhosts
  args:
    executable: /bin/bash
  register: result_02
  changed_when: false
  failed_when: false
  when: ssh_installed | bool

- name: "Store requirement 02 details"
  set_fact:
    task_02_name: "Check global IgnoreRhosts setting via sshd -T"
    task_02_cmd: "sshd -T | grep ignorerhosts"
    task_02_rc: "{{ result_02.rc | default(-1) }}"
    data_02: "{{ result_02.stdout | default('') | trim }}"
    status_02: >-
      {%- if not ssh_installed | bool -%}
        SKIPPED
      {%- elif result_02.rc | default(-1) == 0 and ('ignorerhosts yes' in (result_02.stdout | default('') | lower)) -%}
        PASS
      {%- else -%}
        FAIL
      {%- endif -%}
    details_02: >-
      {%- if not ssh_installed | bool -%}
        openssh-server not installed
      {%- elif result_02.rc | default(-1) == 0 and ('ignorerhosts yes' in (result_02.stdout | default('') | lower)) -%}
        Global IgnoreRhosts is set to yes
      {%- else -%}
        Global IgnoreRhosts is not set to yes (output: {{ result_02.stdout | default('N/A') }})
      {%- endif -%}

- name: "Req 03 - Check IgnoreRhosts for specific user"
  ansible.builtin.shell: "sshd -T -C user={{ target_user }} | grep ignorerhosts"
  args:
    executable: /bin/bash
  register: result_03
  changed_when: false
  failed_when: false
  when: ssh_installed | bool

- name: "Store requirement 03 details"
  set_fact:
    task_03_name: "Check IgnoreRhosts for user {{ target_user }} via sshd -T -C"
    task_03_cmd: "sshd -T -C user={{ target_user }} | grep ignorerhosts"
    task_03_rc: "{{ result_03.rc | default(-1) }}"
    data_03: "{{ result_03.stdout | default('') | trim }}"
    status_03: >-
      {%- if not ssh_installed | bool -%}
        SKIPPED
      {%- elif result_03.rc | default(-1) == 0 and ('ignorerhosts yes' in (result_03.stdout | default('') | lower)) -%}
        PASS
      {%- else -%}
        FAIL
      {%- endif -%}
    details_03: >-
      {%- if not ssh_installed | bool -%}
        openssh-server not installed
      {%- elif result_03.rc | default(-1) == 0 and ('ignorerhosts yes' in (result_03.stdout | default('') | lower)) -%}
        User-specific IgnoreRhosts is set to yes
      {%- else -%}
        User-specific IgnoreRhosts is not set to yes (output: {{ result_03.stdout | default('N/A') }})
      {%- endif -%}

- name: "Req 04 - Summarize overall compliance"
  set_fact:
    status_04: >-
      {%- if not ssh_installed | bool -%}
        NOT_APPLICABLE
      {%- elif status_02 == 'PASS' and status_03 == 'PASS' -%}
        PASS
      {%- else -%}
        FAIL
      {%- endif -%}
    details_04: >-
      {%- if not ssh_installed | bool -%}
        openssh-server not installed, IgnoreRhosts check not applicable
      {%- elif status_02 == 'PASS' and status_03 == 'PASS' -%}
        All IgnoreRhosts checks passed
      {%- else -%}
        One or more IgnoreRhosts checks failed
      {%- endif -%}
    data_04: >-
      {%- if not ssh_installed | bool -%}
        NOT_APPLICABLE
      {%- elif status_02 == 'PASS' and status_03 == 'PASS' -%}
        PASS
      {%- else -%}
        FAIL
      {%- endif -%}
    task_04_name: "Summarize overall compliance"
    task_04_cmd: "N/A"
    task_04_rc: 0

- name: "Req 05 - Store final audit result in cis_result"
  set_fact:
    cis_result: "{{ status_04 }}"
    status_05: "{{ status_04 }}"
    details_05: "{{ details_04 }}"
    data_05: "{{ status_04 }}"
    task_05_name: "Store final audit result"
    task_05_cmd: "N/A"
    task_05_rc: 0

- name: "Generate audit report"
  debug:
    msg:
    - "AUDIT REPORT — CIS 5.1.13"
    - "Reference: CIS Benchmark checkpoint 5.1.13"
    - ""
    - "REQUIREMENT 01 - {{ req_01 }}:"
    - "  Task: {{ task_01_name | default('Not recorded') }}"
    - "  Command: {{ task_01_cmd | default('N/A') }}"
    - "  Exit code: {{ task_01_rc | default(-1) }}"
    - "  Data: {{ data_01 | default('') | trim }}"
    - "  Status: {{ status_01 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_01 | default('') | trim }}"
    - ""
    - "REQUIREMENT 02 - {{ req_02 }}:"
    - "  Task: {{ task_02_name | default('Not recorded') }}"
    - "  Command: {{ task_02_cmd | default('N/A') }}"
    - "  Exit code: {{ task_02_rc | default(-1) }}"
    - "  Data: {{ data_02 | default('') | trim }}"
    - "  Status: {{ status_02 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_02 | default('') | trim }}"
    - ""
    - "REQUIREMENT 03 - {{ req_03 }}:"
    - "  Task: {{ task_03_name | default('Not recorded') }}"
    - "  Command: {{ task_03_cmd | default('N/A') }}"
    - "  Exit code: {{ task_03_rc | default(-1) }}"
    - "  Data: {{ data_03 | default('') | trim }}"
    - "  Status: {{ status_03 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_03 | default('') | trim }}"
    - ""
    - "REQUIREMENT 04 - {{ req_04 }}:"
    - "  Task: {{ task_04_name | default('Not recorded') }}"
    - "  Command: {{ task_04_cmd | default('N/A') }}"
    - "  Exit code: {{ task_04_rc | default(-1) }}"
    - "  Data: {{ data_04 | default('') | trim }}"
    - "  Status: {{ status_04 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_04 | default('') | trim }}"
    - ""
    - "REQUIREMENT 05 - {{ req_05 }}:"
    - "  Task: {{ task_05_name | default('Not recorded') }}"
    - "  Command: {{ task_05_cmd | default('N/A') }}"
    - "  Exit code: {{ task_05_rc | default(-1) }}"
    - "  Data: {{ data_05 | default('') | trim }}"
    - "  Status: {{ status_05 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_05 | default('') | trim }}"
    - ""
    - "========================================================"
    - "OVERALL COMPLIANCE:"
    - "  Result: {{ cis_result }}"
    - "  Details: {{ details_05 | default('Not evaluated') | trim }}"
    - "========================================================"
