---
- name: Initialize meta data variables
  include_vars: cis_audit_var_2_1_10.yml

- name: "Initialize data variables"
  set_fact:
    data_01: ""
    status_01: "ERROR"
    details_01: "Not evaluated"
    task_01_name: "Check if ypserv package is installed"
    task_01_cmd: "rpm -q ypserv"
    task_01_rc: -1
    data_02: "Skipped"
    status_02: "SKIP"
    details_02: "Service check skipped: ypserv package not installed"
    task_02_name: "Check if ypserv.service is enabled"
    task_02_cmd: "N/A"
    task_02_rc: -1
    data_03: "Skipped"
    status_03: "SKIP"
    details_03: "Service check skipped: ypserv package not installed"
    task_03_name: "Check if ypserv.service is active"
    task_03_cmd: "N/A"
    task_03_rc: -1
    data_04: ""
    status_04: "ERROR"
    details_04: "Not evaluated"
    ypserv_installed: false

- name: "Req 01 - Check if ypserv package is installed"
  shell: rpm -q ypserv
  args:
    executable: /bin/bash
  register: result_01
  failed_when: false
  changed_when: false

- name: "Store requirement 01 details"
  set_fact:
    data_01: "{{ result_01.stdout | default('') | trim }}"
    status_01: "{{ 'PASS' if result_01.rc != 0 else 'FAIL' }}"
    task_01_cmd: "rpm -q ypserv"
    task_01_rc: "{{ result_01.rc | default(-1) }}"
    details_01: "{{ 'Package ypserv is not installed' if result_01.rc != 0 else 'Package ypserv is installed' }}"
    ypserv_installed: "{{ result_01.rc == 0 }}"

- name: "Req 02 - Check if ypserv.service is enabled"
  shell: systemctl is-enabled ypserv.service 2>/dev/null | grep 'enabled'
  args:
    executable: /bin/bash
  register: result_02
  failed_when: false
  changed_when: false
  when: ypserv_installed | bool

- name: "Req 03 - Check if ypserv.service is active"
  shell: systemctl is-active ypserv.service 2>/dev/null | grep '^active'
  args:
    executable: /bin/bash
  register: result_03
  failed_when: false
  changed_when: false
  when: ypserv_installed | bool

- name: "Store requirements 02 and 03 details"
  set_fact:
    data_02: "{{ result_02.stdout | default('') | trim }}"
    status_02: "{{ 'PASS' if (result_02.stdout | default('') | trim) == '' else 'FAIL' }}"
    task_02_cmd: "systemctl is-enabled ypserv.service 2>/dev/null | grep 'enabled'"
    task_02_rc: "{{ result_02.rc | default(-1) }}"
    details_02: "{{ 'Service is not enabled' if (result_02.stdout | default('') | trim) == '' else 'Service is enabled' }}"
    data_03: "{{ result_03.stdout | default('') | trim }}"
    status_03: "{{ 'PASS' if (result_03.stdout | default('') | trim) == '' else 'FAIL' }}"
    task_03_name: "Check if ypserv.service is active"
    task_03_cmd: "systemctl is-active ypserv.service 2>/dev/null | grep '^active'"
    task_03_rc: "{{ result_03.rc | default(-1) }}"
    details_03: "{{ 'Service is not active' if (result_03.stdout | default('') | trim) == '' else 'Service is active' }}"
  when: ypserv_installed | bool

- name: "Summarize overall compliance"
  set_fact:
    status_04: >-
      {{ 'PASS' if not ypserv_installed | bool else ('PASS' if status_02 == 'PASS' and status_03 == 'PASS' else 'FAIL') }}
    details_04: >-
      {{ 'Compliant: package ypserv not installed' if not ypserv_installed | bool else ('Compliant: package installed but service not enabled and not active; verify local site policy approval' if status_02 == 'PASS' and status_03 == 'PASS' else 'Non-compliant: service is enabled or active') }}

- name: "Store final audit result in cis_result variable"
  set_fact:
    cis_result: "{{ status_04 }}"

- name: "Generate audit report"
  debug:
    msg:
    - "AUDIT REPORT — CIS 2.1.10"
    - "Reference: CIS Benchmark checkpoint 2.1.10"
    - ""
    - "REQUIREMENT 01 - {{ req_01 }}:"
    - "  Task: {{ task_01_name | default('Not recorded') }}"
    - "  Command: {{ task_01_cmd | default('N/A') }}"
    - "  Exit code: {{ task_01_rc | default(-1) }}"
    - "  Data: {{ data_01 | trim }}"
    - "  Status: {{ status_01 | trim }}"
    - "  Details: {{ details_01 | trim }}"
    - ""
    - "REQUIREMENT 02 - {{ req_02 }}:"
    - "  Task: {{ task_02_name | default('Not recorded') }}"
    - "  Command: {{ task_02_cmd | default('N/A') }}"
    - "  Exit code: {{ task_02_rc | default(-1) }}"
    - "  Data: {{ data_02 | trim }}"
    - "  Status: {{ status_02 | trim }}"
    - "  Details: {{ details_02 | trim }}"
    - ""
    - "REQUIREMENT 03 - {{ req_03 }}:"
    - "  Task: {{ task_03_name | default('Not recorded') }}"
    - "  Command: {{ task_03_cmd | default('N/A') }}"
    - "  Exit code: {{ task_03_rc | default(-1) }}"
    - "  Data: {{ data_03 | trim }}"
    - "  Status: {{ status_03 | trim }}"
    - "  Details: {{ details_03 | trim }}"
    - ""
    - "REQUIREMENT 04 - {{ req_04 }}:"
    - "  Task: Evaluate overall compliance"
    - "  Command: N/A"
    - "  Exit code: N/A"
    - "  Data: {{ data_04 | default('') | trim }}"
    - "  Status: {{ status_04 | trim }}"
    - "  Details: {{ details_04 | trim }}"
    - ""
    - "========================================================"
    - "OVERALL COMPLIANCE:"
    - "  Result: {{ cis_result | trim }}"
    - "  Details: {{ details_04 | trim }}"
    - "========================================================"
