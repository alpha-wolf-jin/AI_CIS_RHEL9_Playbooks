---
- name: Initialize meta data variables
  include_vars: cis_audit_var_7_1_6.yml

- name: "Initialize data variables"
  ansible.builtin.set_fact:
    data_01: "Not collected yet"
    status_01: "ERROR"
    details_01: "Not evaluated"
    data_02: "Not collected yet"
    status_02: "ERROR"
    details_02: "Not evaluated"
    data_03: "Not collected yet"
    status_03: "ERROR"
    details_03: "Not evaluated"
    data_04: "Not collected yet"
    status_04: "ERROR"
    details_04: "Not evaluated"
    data_05: "Not collected yet"
    status_05: "ERROR"
    details_05: "Not evaluated"
    data_06: "Not collected yet"
    status_06: "ERROR"
    details_06: "Not evaluated"
    task_01_name: "Not executed"
    task_01_cmd: "N/A"
    task_01_rc: -1

- name: "Req 01 - Check if /etc/shadow- file exists"
  ansible.builtin.shell: |
    stat -Lc '%a' /etc/shadow-
  args:
    executable: /bin/bash
  register: result_01
  failed_when: false
  changed_when: false

- name: "Store requirement 01 details"
  ansible.builtin.set_fact:
    task_01_name: "Check if /etc/shadow- file exists"
    task_01_cmd: "stat -Lc '%a' /etc/shadow-"
    task_01_rc: "{{ result_01.rc | default(-1) }}"
    data_01: "{{ result_01.stdout | default('') | trim }}"
    status_01: "{{ 'PASS' if result_01.rc | default(-1) == 0 else 'FAIL' | trim }}"
    details_01: "{{ 'File exists (permissions: ' ~ result_01.stdout | default('') | trim ~ ')' if result_01.rc | default(-1) == 0 else 'File not found' | trim }}"

- name: "Req 02 - Check permissions on /etc/shadow- are mode 000"
  ansible.builtin.shell: |
    stat -Lc '%a' /etc/shadow-
  args:
    executable: /bin/bash
  register: result_02
  failed_when: false
  changed_when: false

- name: "Store requirement 02 details"
  ansible.builtin.set_fact:
    task_02_name: "Check permissions on /etc/shadow- are mode 000"
    task_02_cmd: "stat -Lc '%a' /etc/shadow-"
    task_02_rc: "{{ result_02.rc | default(-1) }}"
    data_02: "{{ result_02.stdout | default('') | trim }}"
    status_02: "{{ 'PASS' if (result_02.rc | default(-1) == 0 and (result_02.stdout | default('') | trim) == '0') else 'FAIL' | trim }}"
    details_02: "{{ 'Permissions are mode 000' if (result_02.rc | default(-1) == 0 and (result_02.stdout | default('') | trim) == '0') else ('Permissions are not mode 000' if result_02.rc | default(-1) == 0 else 'Command failed') | trim }}"

- name: "Req 03 - Check owner UID of /etc/shadow- is 0"
  ansible.builtin.shell: |
    stat -Lc '%u' /etc/shadow-
  args:
    executable: /bin/bash
  register: result_03
  failed_when: false
  changed_when: false

- name: "Store requirement 03 details"
  ansible.builtin.set_fact:
    task_03_name: "Check owner UID of /etc/shadow- is 0"
    task_03_cmd: "stat -Lc '%u' /etc/shadow-"
    task_03_rc: "{{ result_03.rc | default(-1) }}"
    data_03: "{{ result_03.stdout | default('') | trim }}"
    status_03: "{{ 'PASS' if (result_03.rc | default(-1) == 0 and (result_03.stdout | default('') | trim) == '0') else 'FAIL' | trim }}"
    details_03: "{{ 'Owner UID is 0 (root)' if (result_03.rc | default(-1) == 0 and (result_03.stdout | default('') | trim) == '0') else ('Owner UID is not 0' if result_03.rc | default(-1) == 0 else 'Command failed') | trim }}"

- name: "Req 04 - Check group GID of /etc/shadow- is 0"
  ansible.builtin.shell: |
    stat -Lc '%g' /etc/shadow-
  args:
    executable: /bin/bash
  register: result_04
  failed_when: false
  changed_when: false

- name: "Store requirement 04 details"
  ansible.builtin.set_fact:
    task_04_name: "Check group GID of /etc/shadow- is 0"
    task_04_cmd: "stat -Lc '%g' /etc/shadow-"
    task_04_rc: "{{ result_04.rc | default(-1) }}"
    data_04: "{{ result_04.stdout | default('') | trim }}"
    status_04: "{{ 'PASS' if (result_04.rc | default(-1) == 0 and (result_04.stdout | default('') | trim) == '0') else 'FAIL' | trim }}"
    details_04: "{{ 'Group GID is 0 (root)' if (result_04.rc | default(-1) == 0 and (result_04.stdout | default('') | trim) == '0') else ('Group GID is not 0' if result_04.rc | default(-1) == 0 else 'Command failed') | trim }}"

- name: "Req 05 - Determine overall compliance"
  ansible.builtin.set_fact:
    status_05: >-
      {%- if result_01.rc | default(-1) != 0 -%}
        SKIP
      {%- elif status_02 | trim == 'PASS' and status_03 | trim == 'PASS' and status_04 | trim == 'PASS' -%}
        PASS
      {%- else -%}
        FAIL
      {%- endif %}
    data_05: "{{ 'Compliant' if status_02 | trim == 'PASS' and status_03 | trim == 'PASS' and status_04 | trim == 'PASS' else 'Non-compliant' }}"
    details_05: >-
      {%- if result_01.rc | default(-1) != 0 -%}
        File /etc/shadow- does not exist, check skipped
      {%- elif status_02 | trim == 'PASS' and status_03 | trim == 'PASS' and status_04 | trim == 'PASS' -%}
        All checks passed; /etc/shadow- is correctly configured
      {%- else -%}
        One or more checks failed; /etc/shadow- is not compliant
      {%- endif %}
    task_05_name: "Determine overall compliance"
    task_05_cmd: "N/A"
    task_05_rc: "N/A"

- name: "Req 06 - Store final audit result"
  ansible.builtin.set_fact:
    cis_result: "{{ status_05 | trim }}"
    status_06: "{{ status_05 | trim }}"
    data_06: "{{ status_05 | trim }}"
    details_06: "Final audit result stored as 'cis_result'"
    task_06_name: "Store final audit result in cis_result"
    task_06_cmd: "N/A"
    task_06_rc: "N/A"

- name: "Generate audit report"
  ansible.builtin.debug:
    msg:
    - "AUDIT REPORT — CIS 7.1.6"
    - "Reference: CIS Benchmark checkpoint 7.1.6"
    - ""
    - "REQUIREMENT 01 - {{ req_01 }}:"
    - "  Task: {{ task_01_name | default('Not recorded') }}"
    - "  Command: {{ task_01_cmd | default('N/A') }}"
    - "  Exit code: {{ task_01_rc | default(-1) }}"
    - "  Data: {{ data_01 | default('') | trim }}"
    - "  Status: {{ status_01 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_01 | default('') | trim }}"
    - ""
    - "REQUIREMENT 02 - {{ req_02 }}:"
    - "  Task: {{ task_02_name | default('Not recorded') }}"
    - "  Command: {{ task_02_cmd | default('N/A') }}"
    - "  Exit code: {{ task_02_rc | default(-1) }}"
    - "  Data: {{ data_02 | default('') | trim }}"
    - "  Status: {{ status_02 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_02 | default('') | trim }}"
    - ""
    - "REQUIREMENT 03 - {{ req_03 }}:"
    - "  Task: {{ task_03_name | default('Not recorded') }}"
    - "  Command: {{ task_03_cmd | default('N/A') }}"
    - "  Exit code: {{ task_03_rc | default(-1) }}"
    - "  Data: {{ data_03 | default('') | trim }}"
    - "  Status: {{ status_03 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_03 | default('') | trim }}"
    - ""
    - "REQUIREMENT 04 - {{ req_04 }}:"
    - "  Task: {{ task_04_name | default('Not recorded') }}"
    - "  Command: {{ task_04_cmd | default('N/A') }}"
    - "  Exit code: {{ task_04_rc | default(-1) }}"
    - "  Data: {{ data_04 | default('') | trim }}"
    - "  Status: {{ status_04 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_04 | default('') | trim }}"
    - ""
    - "REQUIREMENT 05 - {{ req_05 }}:"
    - "  Task: {{ task_05_name | default('Not recorded') }}"
    - "  Command: {{ task_05_cmd | default('N/A') }}"
    - "  Exit code: {{ task_05_rc | default(-1) }}"
    - "  Data: {{ data_05 | default('') | trim }}"
    - "  Status: {{ status_05 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_05 | default('') | trim }}"
    - ""
    - "REQUIREMENT 06 - {{ req_06 }}:"
    - "  Task: {{ task_06_name | default('Not recorded') }}"
    - "  Command: {{ task_06_cmd | default('N/A') }}"
    - "  Exit code: {{ task_06_rc | default(-1) }}"
    - "  Data: {{ data_06 | default('') | trim }}"
    - "  Status: {{ status_06 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_06 | default('') | trim }}"
    - ""
    - "========================================================"
    - "OVERALL COMPLIANCE:"
    - "  Result: {{ cis_result | default('ERROR') | trim }}"
    - "  Details: {{ details_05 | default('Not evaluated') | trim }}"
    - "========================================================"
