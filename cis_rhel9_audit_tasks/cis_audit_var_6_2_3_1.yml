package_name: "rsyslog"
expected_version_pattern: "^rsyslog-[0-9]"
req_01: "Check if rsyslog is being used for logging on the system using command: `systemctl is-active rsyslog`. Expected result: active"
req_02: "Check if rsyslog is installed using command: `rpm -q rsyslog`. Expected result: rsyslog-<version>"
req_03: "Summarize overall compliance status: Verify that both checks pass; if rsyslog is used and installed, the system is compliant; otherwise, it is non-compliant."
req_04: "Store the final audit result in a variable named 'cis_result' using set_fact. Set cis_result to the overall compliance status (PASS/FAIL/SKIP/UNKNOWN) derived from the last requirement's status variable."
