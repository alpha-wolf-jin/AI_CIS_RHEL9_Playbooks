req_01: "Check if dovecot is installed using command: `rpm -q dovecot`. Expected result: package dovecot is not installed"
req_02: "Check if cyrus-imapd is installed using command: `rpm -q cyrus-imapd`. Expected result: package cyrus-imapd is not installed"
req_03: "If dovecot is installed and required for dependencies, check if dovecot.socket is enabled using command: `systemctl is-enabled dovecot.socket 2>/dev/null | grep 'enabled'`. Expected result: Nothing should be returned"
req_04: "If dovecot is installed and required for dependencies, check if dovecot.service is enabled using command: `systemctl is-enabled dovecot.service 2>/dev/null | grep 'enabled'`. Expected result: Nothing should be returned"
req_05: "If cyrus-imapd is installed and required for dependencies, check if cyrus-imapd.service is enabled using command: `systemctl is-enabled cyrus-imapd.service 2>/dev/null | grep 'enabled'`. Expected result: Nothing should be returned"
req_06: "If dovecot is installed and required for dependencies, check if dovecot.socket is active using command: `systemctl is-active dovecot.socket 2>/dev/null | grep '^active'`. Expected result: Nothing should be returned"
req_07: "If dovecot is installed and required for dependencies, check if dovecot.service is active using command: `systemctl is-active dovecot.service 2>/dev/null | grep '^active'`. Expected result: Nothing should be returned"
req_08: "If cyrus-imapd is installed and required for dependencies, check if cyrus-imapd.service is active using command: `systemctl is-active cyrus-imapd.service 2>/dev/null | grep '^active'`. Expected result: Nothing should be returned"
req_09: "Summarize overall compliance: Ensure that either dovecot and cyrus-imapd are not installed, or if installed for dependencies, their services and sockets are not enabled and not active, and the dependent package is approved by local site policy with services/sockets stopped and masked as per policy."
req_10: "Store the final audit result in a variable named 'cis_result' using set_fact. Set cis_result to the overall compliance status (PASS/FAIL/SKIP/ERROR) derived from the last requirement's status variable."
