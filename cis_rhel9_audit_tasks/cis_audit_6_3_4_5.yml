---
- name: Initialize meta data variables
  include_vars: cis_audit_var_6_3_4_5.yml

- name: "Initialize data variables"
  set_fact:
    data_01: "Not collected"
    status_01: "UNKNOWN"
    details_01: "Not evaluated"
    task_01_name: "Not executed"
    task_01_cmd: "N/A"
    task_01_rc: -1
    data_02: "Not collected"
    status_02: "UNKNOWN"
    details_02: "Not evaluated"
    task_02_name: "Not executed"
    task_02_cmd: "N/A"
    task_02_rc: -1
    data_03: "Not collected"
    status_03: "UNKNOWN"
    details_03: "Not evaluated"
    task_03_name: "Not executed"
    task_03_cmd: "N/A"
    task_03_rc: -1

- name: "Gather package facts"
  ansible.builtin.package_facts:
    manager: auto
  failed_when: false

- name: "Set fact – auditd installation status"
  set_fact:
    auditd_installed: "{{ 'audit' in ansible_facts.packages }}"

- name: "Req 01 - Run audit script to verify file modes"
  ansible.builtin.shell: /bin/bash
  args:
    stdin: "{{ audit_script_content }}"
    executable: /bin/bash
  register: audit_result
  when: auditd_installed
  failed_when: false
  changed_when: false

- name: "Set facts for requirement 01"
  set_fact:
    task_01_name: "Execute audit script"
    task_01_cmd: "/bin/bash with audit script via stdin"
    task_01_rc: "{{ audit_result.rc | default(-1) }}"
    data_01: "{{ audit_result.stdout | default('Not executed') | trim }}"
    status_01: "{{ 'SKIP' if not (auditd_installed | default(false)) else ('PASS' if audit_result.rc | default(-1) == 0 else 'FAIL') | trim }}"
    details_01: >-
      {% if not (auditd_installed | default(false)) %}
        Auditd package not installed; verification skipped.
      {% elif audit_result.rc | default(-1) == 0 %}
        Script executed successfully.
      {% else %}
        Script failed with rc={{ audit_result.rc | default(-1) }}
      {% endif %}

- name: "Set facts for requirement 02"
  set_fact:
    task_02_name: "Verify compliance status"
    task_02_cmd: "Check 'PASS'/'FAIL' markers in script output"
    task_02_rc: "N/A"
    data_02: "{{ audit_result.stdout | default('Not executed') | trim }}"
    status_02: "{{ 'SKIP' if not (auditd_installed | default(false)) else ('PASS' if '** PASS **' in audit_result.stdout | default('') else ('FAIL' if '** FAIL **' in audit_result.stdout | default('') else 'UNKNOWN')) | trim }}"
    details_02: >-
      {% if not (auditd_installed | default(false)) %}
        Auditd not installed; verification skipped.
      {% elif '** PASS **' in audit_result.stdout | default('') %}
        All audit configuration files have correct mode.
      {% elif '** FAIL **' in audit_result.stdout | default('') %}
        Some audit configuration files have incorrect mode.
      {% else %}
        Unable to determine compliance.
      {% endif %}

- name: "Req 03 - Store final audit result in cis_result"
  set_fact:
    cis_result: "{{ status_02 | trim }}"
    task_03_name: "Store cis_result"
    task_03_cmd: "set_fact cis_result = status_02"
    task_03_rc: "N/A"
    data_03: "cis_result = {{ status_02 | trim }}"
    status_03: "PASS"
    details_03: "cis_result set to {{ status_02 | trim }}"

- name: "Generate audit report"
  debug:
    msg:
    - "AUDIT REPORT — CIS 6.3.4.5"
    - "Reference: CIS Benchmark checkpoint 6.3.4.5"
    - ""
    - "REQUIREMENT 01 - {{ req_01 }}:"
    - "  Task: {{ task_01_name | default('Not recorded') }}"
    - "  Command: {{ task_01_cmd | default('N/A') }}"
    - "  Exit code: {{ task_01_rc | default(-1) }}"
    - "  Data: {{ data_01 | default('') | trim }}"
    - "  Status: {{ status_01 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_01 | default('') | trim }}"
    - ""
    - "REQUIREMENT 02 - {{ req_02 }}:"
    - "  Task: {{ task_02_name | default('Not recorded') }}"
    - "  Command: {{ task_02_cmd | default('N/A') }}"
    - "  Exit code: {{ task_02_rc | default(-1) }}"
    - "  Data: {{ data_02 | default('') | trim }}"
    - "  Status: {{ status_02 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_02 | default('') | trim }}"
    - ""
    - "REQUIREMENT 03 - {{ req_03 }}:"
    - "  Task: {{ task_03_name | default('Not recorded') }}"
    - "  Command: {{ task_03_cmd | default('N/A') }}"
    - "  Exit code: {{ task_03_rc | default(-1) }}"
    - "  Data: {{ data_03 | default('') | trim }}"
    - "  Status: {{ status_03 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_03 | default('') | trim }}"
    - ""
    - "========================================================"
    - "OVERALL COMPLIANCE:"
    - "  Result: {{ cis_result }}"
    - "  Details: {{ details_02 | trim }}"
    - "========================================================"
