req_01: |
  Check if pam_unix.so is enabled in /etc/pam.d/password-auth using command: `grep -P -- '\\bpam_unix\\.so\\b' /etc/pam.d/password-auth`. Expected result: Output lines similar to: auth sufficient pam_unix.so, account required pam_unix.so, password sufficient pam_unix.so sha512 shadow use_authtok, session required pam_unix.so.
req_02: |
  Check if pam_unix.so is enabled in /etc/pam.d/system-auth using command: `grep -P -- '\\bpam_unix\\.so\\b' /etc/pam.d/system-auth`. Expected result: Output lines similar to: auth sufficient pam_unix.so, account required pam_unix.so, password sufficient pam_unix.so sha512 shadow use_authtok, session required pam_unix.so.
req_03: "Summarize overall compliance status: Both /etc/pam.d/password-auth and /etc/pam.d/system-auth must contain the expected pam_unix.so entries for all four management groups (auth, account, password, session). If any line is missing or differs, the system is non-compliant."
req_04: "Store the final audit result in a variable named 'cis_result' using set_fact. Set cis_result to the overall compliance status (PASS/FAIL/SKIP/UNKNOWN) derived from the last requirement's status variable."
