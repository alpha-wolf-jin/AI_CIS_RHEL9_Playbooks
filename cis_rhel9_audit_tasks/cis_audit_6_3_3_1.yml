---
- name: Initialize meta data variables
  include_vars: cis_audit_var_6_3_3_1.yml

- name: "Initialize data variables"
  ansible.builtin.set_fact:
    data_01: "Not collected yet"
    status_01: "UNKNOWN"
    details_01: "Not evaluated"
    data_02: ""
    status_02: "SKIPPED"
    details_02: "auditd not installed"
    data_03: ""
    status_03: "SKIPPED"
    details_03: "auditd not installed"
    data_04: ""
    status_04: "SKIPPED"
    details_04: "auditd not installed"
    data_05: ""
    status_05: "SKIPPED"
    details_05: "auditd not installed"
    data_06: ""
    status_06: "UNKNOWN"
    details_06: "Not evaluated"
    data_07: ""
    status_07: "UNKNOWN"
    details_07: "Not evaluated"

- name: "Req 01 - Check if auditd package is installed"
  ansible.builtin.shell:
    cmd: |
      set -o pipefail
      if dpkg -l auditd 2>/dev/null | grep -q '^ii'; then
        echo "auditd is installed (dpkg)"
        exit 0
      elif rpm -q audit &>/dev/null; then
        echo "auditd is installed (rpm)"
        exit 0
      else
        echo "auditd is not installed"
        exit 1
      fi
    executable: /bin/bash
  register: result_01
  failed_when: false
  changed_when: false

- name: "Store requirement 01 details"
  ansible.builtin.set_fact:
    task_01_name: "Check if auditd package is installed"
    task_01_cmd: "dpkg -l auditd || rpm -q audit"
    task_01_rc: "{{ result_01.rc | default(-1) }}"
    data_01: "{{ result_01.stdout | default('') | trim }}"
    status_01: "{{ 'PASS' if result_01.rc | default(-1) == 0 else 'FAIL' }}"
    details_01: "{{ 'auditd package is installed' if result_01.rc | default(-1) == 0 else 'auditd package not found' }}"
    auditd_applicable: "{{ result_01.rc == 0 }}"

- name: "Set NOT_APPLICABLE for audit rules if auditd not applicable"
  ansible.builtin.set_fact:
    task_02_name: "Check on-disk audit rules for /etc/sudoers"
    task_02_cmd: |
      awk '/^ *-w/ &&/\\/etc\\/sudoers/ &&/ +-p *wa/ &&(/ key= *[!-~]* *$/||/ -k *[!-~]* *$/)' /etc/audit/rules.d/*.rules
    task_02_rc: -1
    data_02: ""
    status_02: "NOT_APPLICABLE"
    details_02: "auditd not installed - not applicable"
    task_03_name: "Check on-disk audit rules for /etc/sudoers.d"
    task_03_cmd: |
      awk '/^ *-w/ &&/\\/etc\\/sudoers\\.d/ &&/ +-p *wa/ &&(/ key= *[!-~]* *$/||/ -k *[!-~]* *$/)' /etc/audit/rules.d/*.rules
    task_03_rc: -1
    data_03: ""
    status_03: "NOT_APPLICABLE"
    details_03: "auditd not installed - not applicable"
    task_04_name: "Check running audit rules for /etc/sudoers"
    task_04_cmd: |
      auditctl -l | awk '/^ *-w/ &&/\\/etc\\/sudoers/ &&/ +-p *wa/ &&(/ key= *[!-~]* *$/||/ -k *[!-~]* *$/)'
    task_04_rc: -1
    data_04: ""
    status_04: "NOT_APPLICABLE"
    details_04: "auditd not installed - not applicable"
    task_05_name: "Check running audit rules for /etc/sudoers.d"
    task_05_cmd: |
      auditctl -l | awk '/^ *-w/ &&/\\/etc\\/sudoers\\.d/ &&/ +-p *wa/ &&(/ key= *[!-~]* *$/||/ -k *[!-~]* *$/)'
    task_05_rc: -1
    data_05: ""
    status_05: "NOT_APPLICABLE"
    details_05: "auditd not installed - not applicable"
  when: "not auditd_applicable | bool"

- name: "Req 02 - Check on-disk audit rules for /etc/sudoers"
  ansible.builtin.shell:
    cmd: |
      awk '/^ *-w/ &&/\/etc\/sudoers/ &&/ +-p *wa/ &&(/ key= *[!-~]* *$/||/ -k *[!-~]* *$/)' /etc/audit/rules.d/*.rules
    executable: /bin/bash
  register: result_02
  failed_when: false
  changed_when: false
  when: "auditd_applicable | bool"

- name: "Store requirement 02 details"
  ansible.builtin.set_fact:
    task_02_name: "Check on-disk audit rules for /etc/sudoers"
    task_02_cmd: |
      awk '/^ *-w/ &&/\\/etc\\/sudoers/ &&/ +-p *wa/ &&(/ key= *[!-~]* *$/||/ -k *[!-~]* *$/)' /etc/audit/rules.d/*.rules
    task_02_rc: "{{ result_02.rc | default(-1) }}"
    data_02: "{{ result_02.stdout | default('') | trim }}"
    status_02: "{{ 'PASS' if ('-w /etc/sudoers -p wa -k scope' in (result_02.stdout | default(''))) else 'FAIL' }}"
    details_02: "{{ 'On-disk rule for sudoers found' if ('-w /etc/sudoers -p wa -k scope' in (result_02.stdout | default(''))) else 'On-disk rule for sudoers missing' }}"
  when: "auditd_applicable | bool"

- name: "Req 03 - Check on-disk audit rules for /etc/sudoers.d"
  ansible.builtin.shell:
    cmd: |
      awk '/^ *-w/ &&/\/etc\/sudoers\.d/ &&/ +-p *wa/ &&(/ key= *[!-~]* *$/||/ -k *[!-~]* *$/)' /etc/audit/rules.d/*.rules
