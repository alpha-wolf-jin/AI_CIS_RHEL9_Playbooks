    task_03_rc: "{{ result_03.rc | default(-1) }}"
    data_03: "{{ result_03.stdout | default('') | trim }}"
    status_03: "{{ 'PASS' if ('-w /etc/sudoers.d -p wa -k scope' in (result_03.stdout | default(''))) else 'FAIL' }}"
    details_03: "{{ 'On-disk rule for sudoers.d found' if ('-w /etc/sudoers.d -p wa -k scope' in (result_03.stdout | default(''))) else 'On-disk rule for sudoers.d missing' }}"
  when: "auditd_applicable | bool"

- name: "Req 04 - Check running audit rules for /etc/sudoers"
  ansible.builtin.shell:
    cmd: |
      set -o pipefail
      auditctl -l | awk '/^ *-w/ &&/\/etc\/sudoers/ &&/ +-p *wa/ &&(/ key= *[!-~]* *$/||/ -k *[!-~]* *$/)'
    executable: /bin/bash
  register: result_04
  failed_when: false
  changed_when: false
  when: "auditd_applicable | bool"

- name: "Store requirement 04 details"
  ansible.builtin.set_fact:
    task_04_name: "Check running audit rules for /etc/sudoers"
    task_04_cmd: |
      auditctl -l | awk '/^ *-w/ &&/\\/etc\\/sudoers/ &&/ +-p *wa/ &&(/ key= *[!-~]* *$/||/ -k *[!-~]* *$/)'
    task_04_rc: "{{ result_04.rc | default(-1) }}"
    data_04: "{{ result_04.stdout | default('') | trim }}"
    status_04: "{{ 'PASS' if ('-w /etc/sudoers -p wa -k scope' in (result_04.stdout | default(''))) else 'FAIL' }}"
    details_04: "{{ 'Running rule for sudoers found' if ('-w /etc/sudoers -p wa -k scope' in (result_04.stdout | default(''))) else 'Running rule for sudoers missing' }}"
  when: "auditd_applicable | bool"

- name: "Req 05 - Check running audit rules for /etc/sudoers.d"
  ansible.builtin.shell:
    cmd: |
      set -o pipefail
      auditctl -l | awk '/^ *-w/ &&/\/etc\/sudoers\.d/ &&/ +-p *wa/ &&(/ key= *[!-~]* *$/||/ -k *[!-~]* *$/)'
    executable: /bin/bash
  register: result_05
  failed_when: false
  changed_when: false
  when: "auditd_applicable | bool"

- name: "Store requirement 05 details"
  ansible.builtin.set_fact:
    task_05_name: "Check running audit rules for /etc/sudoers.d"
    task_05_cmd: |
      auditctl -l | awk '/^ *-w/ &&/\\/etc\\/sudoers\\.d/ &&/ +-p *wa/ &&(/ key= *[!-~]* *$/||/ -k *[!-~]* *$/)'
    task_05_rc: "{{ result_05.rc | default(-1) }}"
    data_05: "{{ result_05.stdout | default('') | trim }}"
    status_05: "{{ 'PASS' if ('-w /etc/sudoers.d -p wa -k scope' in (result_05.stdout | default(''))) else 'FAIL' }}"
    details_05: "{{ 'Running rule for sudoers.d found' if ('-w /etc/sudoers.d -p wa -k scope' in (result_05.stdout | default(''))) else 'Running rule for sudoers.d missing' }}"
  when: "auditd_applicable | bool"

- name: "Req 06 - Summarize overall compliance status"
  ansible.builtin.set_fact:
    status_06: >-
      {% if not (auditd_applicable | default(false) | bool) %}
      NOT_APPLICABLE
      {% elif status_01 == 'PASS' and status_02 == 'PASS' and status_03 == 'PASS' and status_04 == 'PASS' and status_05 == 'PASS' %}
      PASS
      {% else %}
      FAIL
      {% endif %}
    details_06: >-
      {% if not (auditd_applicable | default(false) | bool) %}
      auditd not installed - not applicable
      {% elif status_01 == 'PASS' and status_02 == 'PASS' and status_03 == 'PASS' and status_04 == 'PASS' and status_05 == 'PASS' %}
      All checks passed
      {% else %}
      One or more checks failed
      {% endif %}
    task_06_name: "Summarize overall compliance"
    task_06_cmd: "set_fact"
    task_06_rc: 0
    data_06: "N/A"

- name: "Req 07 - Store final audit result in cis_result"
  ansible.builtin.set_fact:
    cis_result: "{{ status_06 }}"
    task_07_name: "Store cis_result"
    task_07_cmd: "set_fact"
    task_07_rc: 0
    data_07: "cis_result set to {{ status_06 }}"
    status_07: "PASS"
    details_07: "Final audit result stored successfully"

- name: "Generate audit report"
  ansible.builtin.debug:
    msg:
    - "AUDIT REPORT — CIS 6.3.3.1"
    - "Reference: CIS Benchmark checkpoint 6.3.3.1"
    - "REQUIREMENT 01 - {{ req_01 }}:"
    - "  Task: {{ task_01_name | default('Not recorded') }}"
    - "  Command: {{ task_01_cmd | default('N/A') }}"
