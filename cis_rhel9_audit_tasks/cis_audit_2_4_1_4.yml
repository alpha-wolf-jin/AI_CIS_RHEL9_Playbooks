---
- name: Initialize meta data variables
  include_vars: cis_audit_var_2_4_1_4.yml

- name: "Initialize data variables"
  set_fact:
    data_01: "Not collected yet"
    status_01: "ERROR"
    details_01: "Not evaluated"
    data_02: "Not collected yet"
    status_02: "ERROR"
    details_02: "Not evaluated"
    data_03: "Not collected yet"
    status_03: "ERROR"
    details_03: "Not evaluated"
    task_01_name: "Not executed"
    task_01_cmd: "N/A"
    task_01_rc: -1
    task_02_name: "Not executed"
    task_02_cmd: "N/A"
    task_02_rc: -1
    task_03_name: "Not executed"
    task_03_cmd: "N/A"
    task_03_rc: -1

- name: "Req 01 - Check if cron package is installed"
  shell: "dpkg -l cron 2>/dev/null || rpm -q cron 2>/dev/null"
  args:
    executable: /bin/bash
  register: result_01
  failed_when: false
  changed_when: false

- name: "Store requirement 01 details"
  set_fact:
    task_01_name: "Check if cron is installed"
    task_01_cmd: "dpkg -l cron 2>/dev/null || rpm -q cron 2>/dev/null"
    task_01_rc: "{{ result_01.rc | default(-1) }}"
    data_01: "{{ result_01.stdout | default('') | trim }}"
    cron_installed: "{{ (result_01.rc | default(-1) == 0) and (result_01.stdout | default('') | trim | length > 0) }}"
    status_01: "{{ 'PASS' if (result_01.rc | default(-1) == 0) and (result_01.stdout | default('') | trim | length > 0) else 'SKIP' }}"
    details_01: "{{ 'Cron package is installed' if (result_01.rc | default(-1) == 0) and (result_01.stdout | default('') | trim | length > 0) else 'NOT_APPLICABLE: cron package is not installed' }}"

- name: "Req 02 - Check permissions on /etc/cron.daily/"
  shell: "stat -Lc 'Access: (%a/%A) Uid: ( %u/ %U) Gid: ( %g/ %G)' /etc/cron.daily/"
  args:
    executable: /bin/bash
  register: result_02
  failed_when: false
  changed_when: false

- name: "Store requirement 02 details"
  set_fact:
    task_02_name: "Check permissions on /etc/cron.daily/"
    task_02_cmd: "stat -Lc 'Access: (%a/%A) Uid: ( %u/ %U) Gid: ( %g/ %G)' /etc/cron.daily/"
    task_02_rc: "{{ result_02.rc | default(-1) }}"
    data_02: "{{ result_02.stdout | default('') | trim }}"
    status_02: "{{ 'SKIP' if not cron_installed else ('PASS' if result_02.stdout | default('') | trim == expected_perms else 'FAIL') }}"
    details_02: "{{ 'NOT_APPLICABLE: cron is not installed' if not cron_installed else ('Permissions match expected' if result_02.stdout | default('') | trim == expected_perms else 'Permissions do NOT match expected: ' ~ (result_02.stdout | default('') | trim)) }}"

- name: "Store overall compliance (Req 03)"
  set_fact:
    task_03_name: "Summarize overall compliance status"
    task_03_cmd: "N/A"
    task_03_rc: 0
    data_03: "Overall compliance derived from cron installation and /etc/cron.daily permissions"
    status_03: >-
      {{ 'PASS' if cron_installed and (result_02.stdout | default('') | trim == expected_perms)
         else ('FAIL' if cron_installed and (result_02.stdout | default('') | trim != expected_perms)
         else 'SKIP') }}
    details_03: >-
      {{ 'Cron installed and /etc/cron.daily permissions are correct' if cron_installed and (result_02.stdout | default('') | trim == expected_perms)
         else ('Cron is installed but permissions are INCORRECT: ' ~ (result_02.stdout | default('') | trim) if cron_installed and (result_02.stdout | default('') | trim != expected_perms)
         else 'Cannot assess compliance – cron is not installed') }}

- name: "Store final audit result in cis_result"
  set_fact:
    cis_result: "{{ status_03 }}"

- name: "Generate audit report"
  debug:
    msg:
    - "AUDIT REPORT — CIS 2.4.1.4"
    - "Reference: CIS Benchmark checkpoint 2.4.1.4"
    - ""
    - "REQUIREMENT 01 - {{ req_01 }}:"
    - "  Task: {{ task_01_name | default('Not recorded') }}"
    - "  Command: {{ task_01_cmd | default('N/A') }}"
    - "  Exit code: {{ task_01_rc | default(-1) }}"
    - "  Data: {{ data_01 | default('') | trim }}"
    - "  Status: {{ status_01 | default('ERROR') | trim }}"
    - "  Details: {{ details_01 | default('') | trim }}"
    - ""
    - "REQUIREMENT 02 - {{ req_02 }}:"
    - "  Task: {{ task_02_name | default('Not recorded') }}"
    - "  Command: {{ task_02_cmd | default('N/A') }}"
    - "  Exit code: {{ task_02_rc | default(-1) }}"
    - "  Data: {{ data_02 | default('') | trim }}"
    - "  Status: {{ status_02 | default('ERROR') | trim }}"
    - "  Details: {{ details_02 | default('') | trim }}"
    - ""
    - "REQUIREMENT 03 - {{ req_03 }}:"
    - "  Task: {{ task_03_name | default('Not recorded') }}"
    - "  Command: {{ task_03_cmd | default('N/A') }}"
    - "  Exit code: {{ task_03_rc | default(-1) }}"
    - "  Data: {{ data_03 | default('') | trim }}"
    - "  Status: {{ status_03 | default('ERROR') | trim }}"
    - "  Details: {{ details_03 | default('') | trim }}"
    - ""
    - "========================================================"
    - "OVERALL COMPLIANCE:"
    - "  Result: {{ cis_result | default('ERROR') | trim }}"
    - "  Details: {{ details_03 | default('Not evaluated') | trim }}"
    - "========================================================"
