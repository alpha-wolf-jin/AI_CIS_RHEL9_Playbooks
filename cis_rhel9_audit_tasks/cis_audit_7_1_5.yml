---
- name: Initialize meta data variables
  include_vars: cis_audit_var_7_1_5.yml

- name: "Initialize data variables"
  set_fact:
    data_01: "Not collected yet"
    status_01: "UNKNOWN"
    details_01: "Not evaluated"
    data_02: "Not collected yet"
    status_02: "UNKNOWN"
    details_02: "Not evaluated"
    data_03: "Not collected yet"
    status_03: "UNKNOWN"
    details_03: "Not evaluated"
    data_04: "Not collected yet"
    status_04: "UNKNOWN"
    details_04: "Not evaluated"
    data_05: "Not collected yet"
    status_05: "UNKNOWN"
    details_05: "Not evaluated"
    data_06: "Not collected yet"
    status_06: "UNKNOWN"
    details_06: "Not evaluated"
    data_07: "Not collected yet"
    status_07: "UNKNOWN"
    details_07: "Not evaluated"
    data_08: "Not collected yet"
    status_08: "UNKNOWN"
    details_08: "Not evaluated"
    task_01_name: "Not executed"
    task_01_cmd: "N/A"
    task_01_rc: -1

# Requirement 1
- name: "Req 01 - Check if /etc/shadow exists and retrieve permissions"
  shell: "stat -Lc '%a' /etc/shadow 2>/dev/null || echo 'NOT_FOUND'"
  args:
    executable: /bin/bash
  register: result_01
  failed_when: false
  changed_when: false

- name: "Store requirement 01 data and status"
  set_fact:
    task_01_name: "Check if /etc/shadow exists and retrieve permissions"
    task_01_cmd: "stat -Lc '%a' /etc/shadow 2>/dev/null || echo 'NOT_FOUND'"
    task_01_rc: "{{ result_01.rc | default(-1) }}"
    data_01: "{{ result_01.stdout | default('') | trim }}"
    file_exists: "{{ (result_01.stdout | default('') | trim) != 'NOT_FOUND' }}"
    status_01: "{{ 'PASS' if (result_01.stdout | default('') | trim) != 'NOT_FOUND' else 'FAIL' }}"

- name: "Store requirement 01 details"
  set_fact:
    details_01: "{{ 'File exists' if status_01 == 'PASS' else 'File not found' }}"

# Requirement 2
- name: "Req 02 - Check /etc/shadow permissions are set to 000"
  shell: "stat -Lc '%a' /etc/shadow"
  args:
    executable: /bin/bash
  register: result_02
  when: file_exists | default(false) | bool
  failed_when: false
  changed_when: false

- name: "Store requirement 02 data and status"
  set_fact:
    task_02_name: "Check /etc/shadow permissions set to 000"
    task_02_cmd: "stat -Lc '%a' /etc/shadow"
    task_02_rc: "{{ result_02.rc | default(-1) if result_02 is defined else -1 }}"
    data_02: "{{ result_02.stdout | default('') | trim if result_02 is defined else '' }}"
    status_02: "{{ 'PASS' if file_exists | bool and (result_02.stdout | default('') | trim) == '0' else 'FAIL' }}"
    details_02: >-
      {{ 'Permissions are 000' if file_exists | bool and (result_02.stdout | default('') | trim) == '0' else ('Permissions are not 000 or check failed' if file_exists | bool else 'File does not exist') }}

# Requirement 3
- name: "Req 03 - Check /etc/shadow owner UID is 0"
  shell: "stat -Lc '%u' /etc/shadow"
  args:
    executable: /bin/bash
  register: result_03
  when: file_exists | default(false) | bool
  failed_when: false
  changed_when: false

- name: "Store requirement 03 data and status"
  set_fact:
    task_03_name: "Check /etc/shadow owner UID is 0"
    task_03_cmd: "stat -Lc '%u' /etc/shadow"
    task_03_rc: "{{ result_03.rc | default(-1) if result_03 is defined else -1 }}"
    data_03: "{{ result_03.stdout | default('') | trim if result_03 is defined else '' }}"
    status_03: "{{ 'PASS' if file_exists | bool and (result_03.stdout | default('') | trim) == '0' else 'FAIL' }}"
    details_03: >-
      {{ 'Owner UID is 0' if file_exists | bool and (result_03.stdout | default('') | trim) == '0' else ('Owner UID is not 0 or check failed' if file_exists | bool else 'File does not exist') }}

# Requirement 4
- name: "Req 04 - Check /etc/shadow owner name is root"
  shell: "stat -Lc '%U' /etc/shadow"
  args:
    executable: /bin/bash
  register: result_04
  when: file_exists | default(false) | bool
  failed_when: false
  changed_when: false

- name: "Store requirement 04 data and status"
  set_fact:
    task_04_name: "Check /etc/shadow owner name is root"
    task_04_cmd: "stat -Lc '%U' /etc/shadow"
    task_04_rc: "{{ result_04.rc | default(-1) if result_04 is defined else -1 }}"
    data_04: "{{ result_04.stdout | default('') | trim if result_04 is defined else '' }}"
    status_04: "{{ 'PASS' if file_exists | bool and (result_04.stdout | default('') | trim) == 'root' else 'FAIL' }}"
    details_04: >-
      {{ 'Owner name is root' if file_exists | bool and (result_04.stdout | default('') | trim) == 'root' else ('Owner name is not root or check failed' if file_exists | bool else 'File does not exist') }}

# Requirement 5
- name: "Req 05 - Check /etc/shadow group GID is 0"
  shell: "stat -Lc '%g' /etc/shadow"
  args:
    executable: /bin/bash
  register: result_05
  when: file_exists | default(false) | bool
  failed_when: false
  changed_when: false

- name: "Store requirement 05 data and status"
  set_fact:
    task_05_name: "Check /etc/shadow group GID is 0"
    task_05_cmd: "stat -Lc '%g' /etc/shadow"
    task_05_rc: "{{ result_05.rc | default(-1) if result_05 is defined else -1 }}"
    data_05: "{{ result_05.stdout | default('') | trim if result_05 is defined else '' }}"
    status_05: "{{ 'PASS' if file_exists | bool and (result_05.stdout | default('') | trim) == '0' else 'FAIL' }}"
    details_05: >-
      {{ 'Group GID is 0' if file_exists | bool and (result_05.stdout | default('') | trim) == '0' else ('Group GID is not 0 or check failed' if file_exists | bool else 'File does not exist') }}

# Requirement 6
- name: "Req 06 - Check /etc/shadow group name is root"
  shell: "stat -Lc '%G' /etc/shadow"
  args:
    executable: /bin/bash
  register: result_06
  when: file_exists | default(false) | bool
  failed_when: false
  changed_when: false

- name: "Store requirement 06 data and status"
  set_fact:
    task_06_name: "Check /etc/shadow group name is root"
    task_06_cmd: "stat -Lc '%G' /etc/shadow"
    task_06_rc: "{{ result_06.rc | default(-1) if result_06 is defined else -1 }}"
    data_06: "{{ result_06.stdout | default('') | trim if result_06 is defined else '' }}"
    status_06: "{{ 'PASS' if file_exists | bool and (result_06.stdout | default('') | trim) == 'root' else 'FAIL' }}"
    details_06: >-
      {{ 'Group name is root' if file_exists | bool and (result_06.stdout | default('') | trim) == 'root' else ('Group name is not root or check failed' if file_exists | bool else 'File does not exist') }}

# Requirement 7 - Summarize overall compliance
- name: "Req 07 - Determine overall compliance status"
  set_fact:
    task_07_name: "Summarize overall compliance"
    task_07_cmd: "N/A"
    task_07_rc: 0
    data_07: "overall_summary"
    status_07: >-
      {{ 'PASS' if status_01 == 'PASS' and status_02 == 'PASS' and status_03 == 'PASS' and status_04 == 'PASS' and status_05 == 'PASS' and status_06 == 'PASS' else 'FAIL' }}

- name: "Req 07 - Generate compliance details"
  set_fact:
    details_07: >-
      {{ 'All checks passed' if status_07 == 'PASS' else 'Some checks failed' }}

# Requirement 8 - Store final audit result
- name: "Req 08 - Store final audit result as cis_result"
  set_fact:
    task_08_name: "Store final audit result"
    task_08_cmd: "N/A"
    task_08_rc: 0
    data_08: "{{ status_07 }}"
    status_08: "{{ status_07 }}"
    details_08: "{{ details_07 }}"
    cis_result: "{{ status_07 }}"

