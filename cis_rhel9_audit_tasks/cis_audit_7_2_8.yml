---
- name: Initialize meta data variables
  include_vars: cis_audit_var_7_2_8.yml

- name: "Snapshot - Ensure backup directory exists"
  ansible.builtin.file:
    path: "{{ backup_dir }}"
    state: directory
  changed_when: false

- name: "Snapshot - Check if audit script exists before execution"
  ansible.builtin.stat:
    path: "{{ audit_script }}"
  register: pre_script_stat
  changed_when: false

- name: "Snapshot - Record pre-existing state of audit script"
  ansible.builtin.copy:
    content: "{{ pre_script_stat.stat.exists | default(false) | string }}"
    dest: "{{ backup_dir }}/audit_script_existed.txt"
  changed_when: false


- block:
  - name: "Req 01 - Copy audit script to remote"
    ansible.builtin.copy:
      dest: "{{ audit_script }}"
      mode: '0700'
      content: "{{ audit_script_content }}"
    changed_when: false
    failed_when: false

  - name: "Req 01 - Execute audit script"
    ansible.builtin.shell: "/bin/bash {{ audit_script }}"
    args:
      executable: /bin/bash
    register: audit_result
    changed_when: false
    failed_when: false

  - name: "Store requirement 01 details"
    set_fact:
      task_01_name: "Req 01 - Execute audit script"
      task_01_cmd: "{{ audit_script }}"
      task_01_rc: "{{ audit_result.rc | default(-1) }}"
      data_01: "{{ audit_result.stdout | default('') | trim }}"
      status_01: "{{ ('PASS' if audit_result.rc | default(-1) == 0 else 'FAIL') | trim }}"
      details_01: "{{ ('Script executed successfully' if audit_result.rc | default(-1) == 0 else 'Script execution failed') | trim }}"

  - name: "Req 02 - Evaluate compliance status"
    set_fact:
      status_02: "{{ ('PASS' if '** PASS **' in (audit_result.stdout | default('')) else ('FAIL' if '** FAIL **' in (audit_result.stdout | default('')) else 'UNKNOWN')) | trim }}"
      details_02: "{{ ('Compliant: All checks passed' if '** PASS **' in (audit_result.stdout | default('')) else ('Non-compliant: One or more checks failed' if '** FAIL **' in (audit_result.stdout | default('')) else 'Unable to determine compliance from script output')) | trim }}"
      data_02: "{{ audit_result.stdout | default('') | trim }}"
      task_02_name: "Req 02 - Evaluate compliance status"
      task_02_cmd: "Evaluate script output for PASS/FAIL markers"
      task_02_rc: "N/A"

  - name: "Req 03 - Store final compliance status in cis_result"
    set_fact:
      cis_result: "{{ status_02 | trim }}"
      task_03_name: "Req 03 - Store final compliance status"
      task_03_cmd: "ansible.builtin.set_fact"
      task_03_rc: "N/A"
      data_03: "cis_result set to {{ status_02 | trim }}"
      status_03: "PASS"
      details_03: "Compliance status stored"

  - name: "Req 04 - Generate audit report"
    debug:
      msg:
      - "AUDIT REPORT — CIS 7.2.8"
      - "Reference: CIS Benchmark checkpoint 7.2.8"
      - ""
      - "REQUIREMENT 01 - {{ req_01 }}:"
      - "  Task: {{ task_01_name | default('Not recorded') }}"
      - "  Command: {{ task_01_cmd | default('N/A') }}"
      - "  Exit code: {{ task_01_rc | default(-1) }}"
      - "  Data: {{ data_01 | default('') | trim }}"
      - "  Status: {{ status_01 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_01 | default('') | trim }}"
      - ""
      - "REQUIREMENT 02 - {{ req_02 }}:"
      - "  Task: {{ task_02_name | default('Not recorded') }}"
      - "  Command: {{ task_02_cmd | default('N/A') }}"
      - "  Exit code: {{ task_02_rc | default('N/A') }}"
      - "  Data: {{ data_02 | default('') | trim }}"
      - "  Status: {{ status_02 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_02 | default('') | trim }}"
      - ""
      - "REQUIREMENT 03 - {{ req_03 }}:"
      - "  Task: {{ task_03_name | default('Not recorded') }}"
      - "  Command: {{ task_03_cmd | default('N/A') }}"
      - "  Exit code: {{ task_03_rc | default('N/A') }}"
      - "  Data: {{ data_03 | default('') | trim }}"
      - "  Status: {{ status_03 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_03 | default('') | trim }}"
      - ""
      - "REQUIREMENT 04 - {{ req_04 }}:"
      - "  Task: Generate audit report"
      - "  Command: ansible.builtin.debug"
      - "  Exit code: N/A"
      - "  Data: Report generated"
      - "  Status: PASS"
      - "  Details: Audit report output"
      - ""
      - "========================================================"
      - "OVERALL COMPLIANCE:"
      - "  Result: {{ cis_result | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_02 | default('Not evaluated') | trim }}"
      - "========================================================"
  always:
  - name: "Restore - Read pre-existing state of audit script"
    ansible.builtin.slurp:
      src: "{{ backup_dir }}/audit_script_existed.txt"
    register: existed_file
    failed_when: false

  - name: "Restore - Remove audit script if it did not exist before"
    ansible.builtin.file:
      path: "{{ audit_script }}"
      state: absent
    when: "existed_file.content | b64decode | trim == 'False'"

  - name: "Restore - Remove backup directory"
    ansible.builtin.file:
      path: "{{ backup_dir }}"
      state: absent
    ignore_errors: true
