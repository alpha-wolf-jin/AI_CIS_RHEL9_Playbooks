---
- name: Initialize meta data variables
  include_vars: cis_audit_var_1_1_1_4.yml

- name: "Snapshot - Create backup directory"
  ansible.builtin.file:
    path: "{{ backup_dir }}"
    state: directory
    mode: "0700"
  tags: [snapshot]
- name: "Snapshot - Check if audit script already exists"
  ansible.builtin.stat:
    path: "{{ audit_script }}"
  register: _pre_script_exists
  tags: [snapshot]
- name: "Snapshot - Mark pre-existence of audit script"
  ansible.builtin.copy:
    content: ""
    dest: "{{ backup_dir }}/script.pre_existed"
    mode: "0600"
  when: _pre_script_exists.stat.exists | default(false) | bool
  tags: [snapshot]

- block:
  - name: "Req 1 - Copy audit script to target"
    ansible.builtin.copy:
      dest: "{{ audit_script }}"
      content: "{{ audit_script_content }}"
      mode: "0700"
    changed_when: false
    failed_when: false

  - name: "Req 1 - Execute audit script"
    ansible.builtin.shell: "/bin/bash {{ audit_script }}"
    args:
      executable: /bin/bash
    register: audit_result
    failed_when: false
    changed_when: false

  - name: "Req 2 - Evaluate compliance status"
    ansible.builtin.set_fact:
      compliance_status: "{{ 'PASS' if '** PASS **' in audit_result.stdout else ('FAIL' if '** FAIL **' in audit_result.stdout else 'UNKNOWN') }}"
      compliance_details: "{{ audit_result.stdout | default('') | trim }}"

  - name: "Req 3 - Store final audit result in cis_result"
    ansible.builtin.set_fact:
      cis_result: "{{ compliance_status }}"
      task_03_name: "Store final audit result in cis_result"
      task_03_cmd: "ansible.builtin.set_fact"
      task_03_rc: 0
      data_03: "{{ compliance_status }}"
      status_03: "{{ compliance_status }}"
      details_03: "cis_result set to {{ compliance_status }}"
  tags: [execute]

  always:
  - name: "Restore - Check if audit script pre-existed"
    ansible.builtin.stat:
      path: "{{ backup_dir }}/script.pre_existed"
    register: _marker_stat
    tags: [restore]

  - name: "Restore - Remove audit script if it did not pre-exist"
    ansible.builtin.file:
      path: "{{ audit_script }}"
      state: absent
    when: not (_marker_stat.stat.exists | default(false) | bool)
    changed_when: false
    tags: [restore]

- name: "Generate audit report"
  ansible.builtin.debug:
    msg:
    - "========================================================"
    - "        AUDIT REPORT — CIS 1.1.1.4"
    - "========================================================"
    - ""
    - "Reference: CIS Benchmark checkpoint 1.1.1.4"
    - ""
    - "REQUIREMENT 1 - Run the provided audit script:"
    - "  Task: Execute CIS 1.1.1.4 audit script"
    - "  Command: /bin/bash /tmp/cis_1_1_1_4_audit.sh"
    - "  Exit code: {{ audit_result.rc | default(-1) }}"
    - "  Data: {{ audit_result.stdout | default('') | trim }}"
    - "  Status: {{ compliance_status }}"
    - "  Details: {{ compliance_details }}"
    - ""
    - "REQUIREMENT 2 - {{ req_02 }}:"
    - "  Status: {{ compliance_status }}"
    - "  Details: {{ compliance_details }}"
    - ""
    - "REQUIREMENT 3 - {{ req_03 }}:"
    - "  Task: {{ task_03_name | default('Not recorded') }}"
    - "  Command: {{ task_03_cmd | default('N/A') }}"
    - "  Exit code: {{ task_03_rc | default(-1) }}"
    - "  Data: {{ data_03 | default('') | trim }}"
    - "  Status: {{ status_03 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_03 | default('') | trim }}"
    - ""
    - "========================================================"
    - "OVERALL COMPLIANCE:"
    - "  Result: {{ cis_result }}"
    - "  Details: {{ compliance_details }}"
    - "========================================================"
