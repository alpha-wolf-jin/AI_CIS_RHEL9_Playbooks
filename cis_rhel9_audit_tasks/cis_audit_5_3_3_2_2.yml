---
- name: Initialize meta data variables
  include_vars: cis_audit_var_5_3_3_2_2.yml

- name: "Gather package facts"
  ansible.builtin.package_facts:
    manager: auto
  failed_when: false

- name: "Set pwquality installed flag"
  set_fact:
    pwquality_installed: "{{ ('libpwquality' in ansible_facts.packages) or ('pwquality' in ansible_facts.packages) | default(false) }}"

- name: "Req 01 - Check if pwquality configuration files exist"
  ansible.builtin.shell: |
    ls /etc/security/pwquality.conf /etc/security/pwquality.conf.d/*.conf 2>/dev/null
  args:
    executable: /bin/bash
  register: result_01
  failed_when: false
  when: pwquality_installed | bool

- name: "Req 02 - Verify pam_pwquality.so is used in PAM config"
  ansible.builtin.shell: |
    grep -Psi -- 'pam_pwquality\.so' /etc/pam.d/system-auth /etc/pam.d/password-auth 2>/dev/null
  args:
    executable: /bin/bash
  register: result_02
  failed_when: false
  when: pwquality_installed | bool

- name: "Req 03 - Check minlen >= 14 in pwquality config"
  ansible.builtin.shell: |
    grep -Psi -- '^\h*minlen\h*=\h*(1[4-9]|[2-9][0-9]|[1-9][0-9]{2,})\b' /etc/security/pwquality.conf /etc/security/pwquality.conf.d/*.conf
  args:
    executable: /bin/bash
  register: result_03
  failed_when: false
  when: pwquality_installed | bool

- name: "Req 04 - Check minlen < 14 in PAM config"
  ansible.builtin.shell: |
    grep -Psi -- '^\h*password\h+(requisite|required|sufficient)\h+pam_pwquality\.so\h+([^#\n\r]+\h+)?minlen\h*=\h*([0-9]|1[0-3])\b' /etc/pam.d/system-auth /etc/pam.d/password-auth
  args:
    executable: /bin/bash
  register: result_04
  failed_when: false
  when: pwquality_installed | bool

- name: "Store audit results for requirements 1-4"
  set_fact:
    task_01_name: "Check if pwquality configuration files exist"
    task_01_cmd: "ls /etc/security/pwquality.conf /etc/security/pwquality.conf.d/*.conf 2>/dev/null"
    task_01_rc: "{{ result_01.rc | default(-1) }}"
    data_01: "{{ result_01.stdout | default('') | trim }}"
    status_01: >-
      {{ ('SKIPPED' if not pwquality_installed | default(false) else
          ('PASS' if (result_01.stdout | default('') | trim) != '' else 'FAIL')) | trim }}
    details_01: >-
      {{ ('Not applicable: libpwquality/pwquality package not installed' if not pwquality_installed | default(false) else
          ('Configuration files found' if (result_01.stdout | default('') | trim) != '' else 'No configuration files found')) | trim }}

    task_02_name: "Verify pam_pwquality.so is used in PAM config"
    task_02_cmd: |
      grep -Psi -- 'pam_pwquality\\.so' /etc/pam.d/system-auth /etc/pam.d/password-auth 2>/dev/null
    task_02_rc: "{{ result_02.rc | default(-1) }}"
    data_02: "{{ result_02.stdout | default('') | trim }}"
    status_02: >-
      {{ ('SKIPPED' if not pwquality_installed | default(false) else
          ('PASS' if (result_02.rc | default(-1)) == 0 and (result_02.stdout | default('') | trim) != '' else 'FAIL')) | trim }}
    details_02: >-
      {{ ('Not applicable: libpwquality/pwquality package not installed' if not pwquality_installed | default(false) else
          ('pam_pwquality.so found in PAM configuration' if (result_02.rc | default(-1)) == 0 and (result_02.stdout | default('') | trim) != '' else
           'pam_pwquality.so not found in PAM configuration')) | trim }}

    task_03_name: "Check minlen >= 14 in pwquality config"
    task_03_cmd: |
      grep -Psi -- '^\\h*minlen\\h*=\\h*(1[4-9]|[2-9][0-9]|[1-9][0-9]{2,})\\b' /etc/security/pwquality.conf /etc/security/pwquality.conf.d/*.conf
    task_03_rc: "{{ result_03.rc | default(-1) }}"
    data_03: "{{ result_03.stdout | default('') | trim }}"
    status_03: >-
      {{ ('SKIPPED' if not pwquality_installed | default(false) else
          ('PASS' if (result_03.rc | default(-1)) == 0 and (result_03.stdout | default('') | trim) != '' else 'FAIL')) | trim }}
    details_03: >-
      {{ ('Not applicable: libpwquality/pwquality package not installed' if not pwquality_installed | default(false) else
          ('minlen >= 14 found' if (result_03.rc | default(-1)) == 0 and (result_03.stdout | default('') | trim) != '' else 'minlen >= 14 not found or output empty')) | trim }}

    task_04_name: "Check minlen < 14 in PAM files"
    task_04_cmd: |
      grep -Psi -- '^\\h*password\\h+(requisite|required|sufficient)\\h+pam_pwquality\\.so\\h+([^#\\n\\r]+\\h+)?minlen\\h*=\\h*([0-9]|1[0-3])\\b' /etc/pam.d/system-auth /etc/pam.d/password-auth
    task_04_rc: "{{ result_04.rc | default(-1) }}"
    data_04: "{{ result_04.stdout | default('') | trim }}"
    status_04: >-
      {{ ('SKIPPED' if not pwquality_installed | default(false) else
          ('PASS' if (result_04.rc | default(-1)) == 1 else 'FAIL')) | trim }}
    details_04: >-
      {{ ('Not applicable: libpwquality/pwquality package not installed' if not pwquality_installed | default(false) else
          ('No conflicting lower minlen found' if (result_04.rc | default(-1)) == 1 else 'Conflicting lower minlen found in PAM')) | trim }}

- name: "Req 05 - Compute overall compliance"
  set_fact:
    status_05: >-
      {{ ('SKIPPED' if not pwquality_installed | default(false) else
          ('PASS' if status_01 == 'PASS' and status_02 == 'PASS' and status_03 == 'PASS' and status_04 == 'PASS' else 'FAIL')) | trim }}
    details_05: >-
      {{ ('Not applicable: libpwquality/pwquality package not installed – check skipped' if not pwquality_installed | default(false) else
          ('Overall PASS: password length >= 14 and no conflicting PAM settings' if status_01 == 'PASS' and status_02 == 'PASS' and status_03 == 'PASS' and status_04 == 'PASS' else
           'Overall FAIL: one or more checks indicate non‑compliance')) | trim }}

- name: "Req 06 - Store final audit result"
  set_fact:
    cis_result: "{{ status_05 | default('UNKNOWN') | trim }}"

- name: "Generate audit report"
  debug:
    msg:
    - "AUDIT REPORT — CIS 5.3.3.2.2"
    - "Reference: CIS Benchmark checkpoint 5.3.3.2.2"
    - ""
    - "REQUIREMENT 01 - {{ req_01 }}:"
    - "  Task: {{ task_01_name | default('Not recorded') }}"
    - "  Command: {{ task_01_cmd | default('N/A') }}"
    - "  Exit code: {{ task_01_rc | default(-1) }}"
    - "  Data: {{ data_01 | default('') | trim }}"
    - "  Status: {{ status_01 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_01 | default('') | trim }}"
    - ""
    - "REQUIREMENT 02 - {{ req_02 }}:"
    - "  Task: {{ task_02_name | default('Not recorded') }}"
    - "  Command: {{ task_02_cmd | default('N/A') }}"
    - "  Exit code: {{ task_02_rc | default(-1) }}"
    - "  Data: {{ data_02 | default('') | trim }}"
    - "  Status: {{ status_02 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_02 | default('') | trim }}"
    - ""
    - "REQUIREMENT 03 - {{ req_03 }}:"
    - "  Task: {{ task_03_name | default('Not recorded') }}"
    - "  Command: {{ task_03_cmd | default('N/A') }}"
    - "  Exit code: {{ task_03_rc | default(-1) }}"
    - "  Data: {{ data_03 | default('') | trim }}"
    - "  Status: {{ status_03 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_03 | default('') | trim }}"
    - ""
    - "REQUIREMENT 04 - {{ req_04 }}:"
    - "  Task: {{ task_04_name | default('Not recorded') }}"
    - "  Command: {{ task_04_cmd | default('N/A') }}"
    - "  Exit code: {{ task_04_rc | default(-1) }}"
    - "  Data: {{ data_04 | default('') | trim }}"
    - "  Status: {{ status_04 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_04 | default('') | trim }}"
    - ""
    - "REQUIREMENT 05 - {{ req_05 }}:"
    - "  Task: Overall compliance evaluation"
    - "  Command: N/A"
    - "  Exit code: N/A"
    - "  Data: N/A"
    - "  Status: {{ status_05 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_05 | default('') | trim }}"
    - ""
    - "REQUIREMENT 06 - {{ req_06 }}:"
    - "  Task: Store final audit result"
    - "  Command: N/A"
    - "  Exit code: N/A"
    - "  Data: {{ cis_result | default('') | trim }}"
    - "  Status: {{ cis_result | default('UNKNOWN') | trim }}"
    - "  Details: cis_result stored as '{{ cis_result | default('UNKNOWN') | trim }}'"
    - ""
    - "========================================================"
    - "OVERALL COMPLIANCE:"
    - "  Result: {{ cis_result | default('UNKNOWN') | trim }}"
    - "========================================================"
