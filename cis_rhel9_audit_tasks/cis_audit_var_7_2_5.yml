req_00: "Verify system prerequisites for duplicate GID check"
req_01: "Run the provided audit script to verify Ensure no duplicate GIDs exist."
req_02: "VERIFY: Summarise compliance status for Ensure no duplicate GIDs exist. Expected result: PASS if compliant, FAIL otherwise"
req_03: "Store the final audit result in a variable named 'cis_result' using set_fact. Set cis_result to the overall compliance status (PASS/FAIL/SKIPPED/UNKNOWN) derived from the last requirement's status variable."
audit_script: "/tmp/audit_duplicate_gids.sh"
audit_script_content: |
  {% raw %}
  #!/usr/bin/env bash
  {
     while read -r l_count l_gid; do
        if [ "$l_count" -gt 1 ]; then
        echo -e "Duplicate GID: \"$l_gid\" Groups: \"$(awk -F: '($3 == n) { print $1 }' n=$l_gid /etc/group | xargs)\""
      fi
    done < <(cut -f3 -d":" /etc/group | sort -n | uniq -c)
  }
  {% endraw %}
backup_dir: "/var/log/ai-playbooks-backup/cis_7.2.5"
pre_exist_marker: "{{ backup_dir }}/audit_script_pre_exist_marker"
