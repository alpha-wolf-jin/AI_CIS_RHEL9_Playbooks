---
- name: Initialize meta data variables
  include_vars: cis_audit_var_5_3_3_2_5.yml

- name: "Initialize data variables"
  set_fact:
    data_01: "Not collected"
    status_01: "ERROR"
    details_01: "Not evaluated"
    data_02: "Not collected"
    status_02: "ERROR"
    details_02: "Not evaluated"
    data_03: "Not collected"
    status_03: "ERROR"
    details_03: "Not evaluated"
    data_04: "Not collected"
    status_04: "ERROR"
    details_04: "Not evaluated"
    data_05: "Not collected"
    status_05: "ERROR"
    details_05: "Not evaluated"
    task_01_name: "Not executed"
    task_01_cmd: "N/A"
    task_01_rc: -1
    task_02_name: "Not executed"
    task_02_cmd: "N/A"
    task_02_rc: -1
    task_03_name: "Not executed"
    task_03_cmd: "N/A"
    task_03_rc: -1
    task_04_name: "Not executed"
    task_04_cmd: "N/A"
    task_04_rc: -1
    task_05_name: "Not executed"
    task_05_cmd: "N/A"
    task_05_rc: -1

- name: "Req 01 - Gather package facts"
  ansible.builtin.package_facts:
    manager: auto
  failed_when: false
  changed_when: false

- name: "Req 01 - Set pam_pwquality_installed fact and requirement details"
  set_fact:
    pam_pwquality_installed: "{{ 'pam_pwquality' in ansible_facts.packages or 'libpwquality' in ansible_facts.packages }}"
    data_01: "{{ 'pam_pwquality' in ansible_facts.packages or 'libpwquality' in ansible_facts.packages }}"
    status_01: "{{ 'PASS' if (('pam_pwquality' in ansible_facts.packages or 'libpwquality' in ansible_facts.packages) | default(false) | bool) else 'FAIL' | trim }}"
    details_01: "{{ 'pam_pwquality is installed' if (('pam_pwquality' in ansible_facts.packages or 'libpwquality' in ansible_facts.packages) | default(false) | bool) else 'pam_pwquality is NOT installed' | trim }}"
    task_01_name: "Check if pam_pwquality is installed"
    task_01_cmd: "ansible.builtin.package_facts"
    task_01_rc: 0

- name: "Req 02 - Check maxsequence setting in pwquality configuration files"
  ansible.builtin.shell: |
    grep -Psi -- '^\h*maxsequence\h*=\h*[1-3]\b' /etc/security/pwquality.conf /etc/security/pwquality.conf.d/*.conf 2>/dev/null
  args:
    executable: /bin/bash
  register: result_02
  failed_when: false
  changed_when: false
  when: "pam_pwquality_installed | default(false) | bool"

- name: "Req 02 - Store maxsequence check details"
  set_fact:
    data_02: "{{ (result_02.stdout | default('') | trim) if (pam_pwquality_installed | default(false) | bool) else '' }}"
    status_02: >-
      {% if not (pam_pwquality_installed | default(false) | bool) %}SKIP
      {% elif (result_02.stdout | default('') | trim | length > 0) %}PASS
      {% else %}FAIL
      {% endif %}
    details_02: >-
      {% if not (pam_pwquality_installed | default(false) | bool) %}SKIP: pam_pwquality not installed
      {% elif (result_02.stdout | default('') | trim | length > 0) %}PASS: maxsequence set to 1-3
      {% else %}FAIL: maxsequence not set to 1-3
      {% endif %}
    task_02_name: "Check maxsequence in pwquality config files"
    task_02_cmd: |
      grep -Psi -- '^\h*maxsequence\h*=\h*[1-3]\b' /etc/security/pwquality.conf /etc/security/pwquality.conf.d/*.conf
    task_02_rc: "{{ result_02.rc | default(-1) }}"

- name: "Req 03 - Check maxsequence is not set to invalid values in PAM configuration files"
  ansible.builtin.shell: |
    grep -Psi -- '^\h*password\h+(requisite|required|sufficient)\h+pam_pwquality\.so\h+([^#\n\r]+\h+)?maxsequence\h*=\h*(0|[4-9]|[1-9][0-9]+)\b' /etc/pam.d/system-auth /etc/pam.d/password-auth 2>/dev/null
  args:
    executable: /bin/bash
  register: result_03
  failed_when: false
  changed_when: false
  when: "pam_pwquality_installed | default(false) | bool"

- name: "Req 03 - Store PAM maxsequence check details"
  set_fact:
    data_03: "{{ (result_03.stdout | default('') | trim) if (pam_pwquality_installed | default(false) | bool) else '' }}"
    status_03: >-
      {% if not (pam_pwquality_installed | default(false) | bool) %}SKIP
      {% elif (result_03.stdout | default('') | trim | length == 0) %}PASS
      {% else %}FAIL
      {% endif %}
    details_03: >-
      {% if not (pam_pwquality_installed | default(false) | bool) %}SKIP: pam_pwquality not installed
      {% elif (result_03.stdout | default('') | trim | length == 0) %}PASS: no invalid maxsequence in PAM files
      {% else %}FAIL: invalid maxsequence found in PAM files
      {% endif %}
    task_03_name: "Check maxsequence not in PAM config with invalid values"
    task_03_cmd: |
      grep -Psi -- '^\h*password\h+(requisite|required|sufficient)\h+pam_pwquality\.so\h+([^#\n\r]+\h+)?maxsequence\h*=\h*(0|[4-9]|[1-9][0-9]+)\b' /etc/pam.d/system-auth /etc/pam.d/password-auth
    task_03_rc: "{{ result_03.rc | default(-1) }}"

- name: "Req 04 - Summarize overall compliance"
  set_fact:
    status_04: >-
      {% if not (pam_pwquality_installed | default(false) | bool) %}SKIP
      {% elif (status_02 | default('ERROR') | trim == 'PASS') and (status_03 | default('ERROR') | trim == 'PASS') %}PASS
      {% else %}FAIL
      {% endif %}
    details_04: >-
      {% if not (pam_pwquality_installed | default(false) | bool) %}SKIP: pam_pwquality not installed
      {% elif (status_02 | default('ERROR') | trim == 'PASS') and (status_03 | default('ERROR') | trim == 'PASS') %}PASS: All checks passed
      {% else %}FAIL: One or more checks failed
      {% endif %}
    data_04: "N/A"
    task_04_name: "Summarize overall compliance"
    task_04_cmd: "set_fact"
    task_04_rc: 0

- name: "Req 05 - Store final audit result in cis_result"
  set_fact:
    cis_result: "{{ status_04 | default('ERROR') | trim }}"
    status_05: "{{ status_04 | default('ERROR') | trim }}"
    details_05: "{{ details_04 | default('Not evaluated') | trim }}"
    data_05: "{{ data_04 | default('N/A') }}"
    task_05_name: "Store final audit result"
    task_05_cmd: "set_fact"
    task_05_rc: 0

- name: "Generate audit report"
  debug:
    msg:
    - "AUDIT REPORT — CIS 5.3.3.2.5"
    - "Reference: CIS Benchmark checkpoint 5.3.3.2.5"
    - ""
    - "REQUIREMENT 01 - {{ req_01 }}:"
    - "  Task: {{ task_01_name | default('Not recorded') }}"
    - "  Command: {{ task_01_cmd | default('N/A') }}"
    - "  Exit code: {{ task_01_rc | default(-1) }}"
    - "  Data: {{ data_01 | default('') | trim }}"
    - "  Status: {{ status_01 | default('ERROR') | trim }}"
    - "  Details: {{ details_01 | default('') | trim }}"
    - ""
    - "REQUIREMENT 02 - {{ req_02 }}:"
    - "  Task: {{ task_02_name | default('Not recorded') }}"
    - "  Command: {{ task_02_cmd | default('N/A') }}"
    - "  Exit code: {{ task_02_rc | default(-1) }}"
    - "  Data: {{ data_02 | default('') | trim }}"
    - "  Status: {{ status_02 | default('ERROR') | trim }}"
    - "  Details: {{ details_02 | default('') | trim }}"
    - ""
    - "REQUIREMENT 03 - {{ req_03 }}:"
    - "  Task: {{ task_03_name | default('Not recorded') }}"
    - "  Command: {{ task_03_cmd | default('N/A') }}"
    - "  Exit code: {{ task_03_rc | default(-1) }}"
    - "  Data: {{ data_03 | default('') | trim }}"
    - "  Status: {{ status_03 | default('ERROR') | trim }}"
    - "  Details: {{ details_03 | default('') | trim }}"
    - ""
    - "REQUIREMENT 04 - {{ req_04 }}:"
    - "  Task: {{ task_04_name | default('Not recorded') }}"
    - "  Command: {{ task_04_cmd | default('N/A') }}"
    - "  Exit code: {{ task_04_rc | default(-1) }}"
    - "  Data: {{ data_04 | default('') | trim }}"
    - "  Status: {{ status_04 | default('ERROR') | trim }}"
    - "  Details: {{ details_04 | default('') | trim }}"
    - ""
    - "REQUIREMENT 05 - {{ req_05 }}:"
    - "  Task: {{ task_05_name | default('Not recorded') }}"
    - "  Command: {{ task_05_cmd | default('N/A') }}"
    - "  Exit code: {{ task_05_rc | default(-1) }}"
    - "  Data: {{ data_05 | default('') | trim }}"
    - "  Status: {{ status_05 | default('ERROR') | trim }}"
    - "  Details: {{ details_05 | default('') | trim }}"
    - ""
    - "========================================================"
    - "OVERALL COMPLIANCE:"
    - "  Result: {{ cis_result | default('ERROR') | trim }}"
    - "  Details: {{ details_04 | default('Not evaluated') | trim }}"
    - "========================================================"
