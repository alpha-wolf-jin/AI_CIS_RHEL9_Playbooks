---
- name: Initialize meta data variables
  include_vars: cis_audit_var_5_1_6.yml

- name: "Initialize data variables"
  set_fact:
    data_01: "Not collected yet"
    status_01: "ERROR"
    details_01: "Not evaluated"
    task_01_name: "Not executed"
    task_01_cmd: "N/A"
    task_01_rc: -1
    data_02: "Not collected yet"
    status_02: "ERROR"
    details_02: "Not evaluated"
    task_02_name: "Not executed"
    task_02_cmd: "N/A"
    task_02_rc: -1
    data_03: "Not collected yet"
    status_03: "ERROR"
    details_03: "Not evaluated"
    task_03_name: "Not executed"
    task_03_cmd: "N/A"
    task_03_rc: -1
    data_04: "Not collected yet"
    status_04: "ERROR"
    details_04: "Not evaluated"
    task_04_name: "Not executed"
    task_04_cmd: "N/A"
    task_04_rc: -1
    data_05: "Not collected yet"
    status_05: "ERROR"
    details_05: "Not evaluated"
    task_05_name: "Not executed"
    task_05_cmd: "N/A"
    task_05_rc: -1
    data_06: "Not collected yet"
    status_06: "ERROR"
    details_06: "Not evaluated"
    task_06_name: "Not executed"
    task_06_cmd: "N/A"
    task_06_rc: -1

- name: "Req 01 - Gather package facts"
  ansible.builtin.package_facts:
    manager: auto
  failed_when: false
  changed_when: false

- name: "Store requirement 01 details"
  set_fact:
    sshd_installed: "{{ 'openssh-server' in ansible_facts.packages }}"
    task_01_name: "Check sshd installation"
    task_01_cmd: "ansible.builtin.package_facts + check if openssh-server is installed"
    task_01_rc: 0
    data_01: "{{ 'openssh-server installed' if ('openssh-server' in ansible_facts.packages) else 'openssh-server not found' }}"
    status_01: "{{ 'PASS' if ('openssh-server' in ansible_facts.packages) else 'SKIP' }}"
    details_01: "{{ 'sshd is installed' if ('openssh-server' in ansible_facts.packages) else 'sshd not found' }}"

- name: "Req 02 - Check if sshd service is running"
  shell: systemctl is-active sshd 2>/dev/null || service sshd status 2>/dev/null
  args:
    executable: /bin/bash
  register: result_02
  failed_when: false
  changed_when: false
  when: sshd_installed | default(false) | bool

- name: "Set sshd_running fact"
  set_fact:
    sshd_running: "{{ (result_02.stdout | default('') | trim == 'active') | bool }}"
  when: sshd_installed | default(false) | bool

- name: "Store requirement 02 details"
  set_fact:
    task_02_name: "Check sshd running status"
    task_02_cmd: "systemctl is-active sshd 2>/dev/null || service sshd status 2>/dev/null"
    task_02_rc: "{{ result_02.rc | default(-1) if sshd_installed | default(false) | bool else -1 }}"
    data_02: "{{ result_02.stdout | default('') | trim if sshd_installed | default(false) | bool else '' }}"
    status_02: >-
      {%- if sshd_installed | default(false) | bool %}
        {%- if sshd_running | default(false) | bool %}PASS
        {%- else %}SKIP{% endif %}
      {%- else %}SKIP{% endif -%}
    details_02: >-
      {%- if sshd_installed | default(false) | bool %}
        {%- if sshd_running | default(false) | bool %}sshd is running
        {%- else %}sshd is not running{% endif %}
      {%- else %}sshd not installed{% endif -%}

- name: "Req 03 - Check for weak MAC algorithms in sshd"
  shell: |
    sshd -T | grep -Pi -- 'macs\h+([^#\n\r]+,)?(hmac-md5|hmac-md5-96|hmac-ripemd160|hmac-sha1-96|umac-64@openssh\.com|hmac-md5-etm@openssh\.com|hmac-md5-96-etm@openssh\.com|hmac-ripemd160-etm@openssh\.com|hmac-sha1-96-etm@openssh\.com|umac-64-etm@openssh\.com|umac-128-etm@openssh\.com)\b'
  args:
    executable: /bin/bash
  register: result_03
  failed_when: false
  changed_when: false
  when: (sshd_installed | default(false) | bool) and (sshd_running | default(false) | bool)

- name: "Store requirement 03 details"
  set_fact:
    task_03_name: "Check weak MAC algorithms"
    task_03_cmd: |
      sshd -T | grep -Pi -- 'macs\\h+([^#\\n\\r]+,)?(hmac-md5|hmac-md5-96|hmac-ripemd160|hmac-sha1-96|umac-64@openssh\\.com|hmac-md5-etm@openssh\\.com|hmac-md5-96-etm@openssh\\.com|hmac-ripemd160-etm@openssh\\.com|hmac-sha1-96-etm@openssh\\.com|umac-64-etm@openssh\\.com|umac-128-etm@openssh\\.com)\\b'
    task_03_rc: "{{ result_03.rc | default(-1) if (sshd_installed | default(false) | bool) and (sshd_running | default(false) | bool) else -1 }}"
    data_03: "{{ result_03.stdout | default('') | trim if (sshd_installed | default(false) | bool) and (sshd_running | default(false) | bool) else '' }}"
    status_03: >-
      {%- if (sshd_installed | default(false) | bool) and (sshd_running | default(false) | bool) %}
        {%- if (result_03.stdout | default('') | trim) | length == 0 %}PASS
        {%- else %}FAIL{% endif %}
      {%- else %}SKIP{% endif -%}
    details_03: >-
      {%- if (sshd_installed | default(false) | bool) and (sshd_running | default(false) | bool) %}
        {%- if (result_03.stdout | default('') | trim) | length == 0 %}No weak MACs found
        {%- else %}Weak MACs present: {{ result_03.stdout | trim }}{% endif %}
      {%- else %}Check skipped (sshd not installed or not running){% endif -%}

- name: "Req 04 - Check if CVE-2023-48795 is patched via rpm changelog"
  shell: rpm -q --changelog openssh-server | grep -qi CVE-2023-48795
  args:
    executable: /bin/bash
  register: result_04
  failed_when: false
  changed_when: false
  when: (sshd_installed | default(false) | bool) and (sshd_running | default(false) | bool)

- name: "Store requirement 04 details"
  set_fact:
    task_04_name: "Check CVE-2023-48795 patch via rpm changelog"
    task_04_cmd: "rpm -q --changelog openssh-server | grep -qi CVE-2023-48795"
    task_04_rc: "{{ result_04.rc | default(-1) if (sshd_installed | default(false) | bool) and (sshd_running | default(false) | bool) else -1 }}"
    data_04: "{{ result_04.stdout | default('') | trim if (sshd_installed | default(false) | bool) and (sshd_running | default(false) | bool) else '' }}"
    status_04: >-
      {%- if (sshd_installed | default(false) | bool) and (sshd_running | default(false) | bool) %}
        {%- if result_04.rc | default(-1) | int == 0 %}PASS
        {%- elif result_04.rc | default(-1) | int == 1 %}FAIL
        {%- else %}ERROR{% endif %}
      {%- else %}SKIP{% endif -%}
    details_04: >-
      {%- if (sshd_installed | default(false) | bool) and (sshd_running | default(false) | bool) %}
        {%- if result_04.rc | default(-1) | int == 0 %}CVE-2023-48795 patch found in changelog
        {%- elif result_04.rc | default(-1) | int == 1 %}No CVE-2023-48795 info in changelog – likely vulnerable
        {%- else %}Unable to verify (rpm missing or unexpected error) – unknown patching status{% endif %}
      {%- else %}Check skipped (sshd not installed or not running){% endif -%}

- name: "Req 05 - Summarize overall compliance"
  set_fact:
    task_05_name: "Summarize overall compliance"
    task_05_cmd: "N/A (analysis)"
    task_05_rc: 0
    data_05: "See details per requirement"
    status_05: >-
      {%- if status_01 | trim == 'SKIP' or status_02 | trim == 'SKIP' -%}
      SKIP
      {%- elif 'FAIL' in [status_01 | trim, status_02 | trim, status_03 | trim, status_04 | trim] or 'ERROR' in [status_01 | trim, status_02 | trim, status_03 | trim, status_04 | trim] -%}
      FAIL
      {%- else -%}
      PASS
      {%- endif -%}
    details_05: >-
      {%- if status_01 | trim == 'SKIP' or status_02 | trim == 'SKIP' -%}
      Audit skipped - OpenSSH server not installed or not running
      {%- elif 'FAIL' in [status_01 | trim, status_02 | trim, status_03 | trim, status_04 | trim] or 'ERROR' in [status_01 | trim, status_02 | trim, status_03 | trim, status_04 | trim] -%}
      One or more checks fail or could not be determined
      {%- else -%}
      All checks passed
      {%- endif -%}

- name: "Req 06 - Store final cis_result variable"
  set_fact:
    cis_result: "{{ status_05 | trim }}"
  changed_when: false

- name: "Store requirement 06 details"
  set_fact:
    task_06_name: "Store final cis_result variable"
    task_06_cmd: "set_fact: cis_result = status_05"
    task_06_rc: 0
    data_06: "{{ cis_result }}"
    status_06: "{{ 'PASS' if cis_result is defined else 'UNKNOWN' }}"
    details_06: "cis_result set to {{ cis_result }}"

- name: "Generate audit report"
  debug:
    msg:
    - "AUDIT REPORT — CIS 5.1.6"
    - "Reference: CIS Benchmark checkpoint 5.1.6"
    - ""
    - "REQUIREMENT 01 - {{ req_01 }}:"
    - "  Task: {{ task_01_name | default('Not recorded') }}"
    - "  Command: {{ task_01_cmd | default('N/A') }}"
    - "  Exit code: {{ task_01_rc | default(-1) }}"
    - "  Data: {{ data_01 | default('') | trim }}"
    - "  Status: {{ status_01 | default('ERROR') | trim }}"
    - "  Details: {{ details_01 | default('') | trim }}"
    - ""
    - "REQUIREMENT 02 - {{ req_02 }}:"
    - "  Task: {{ task_02_name | default('Not recorded') }}"
    - "  Command: {{ task_02_cmd | default('N/A') }}"
    - "  Exit code: {{ task_02_rc | default(-1) }}"
    - "  Data: {{ data_02 | default('') | trim }}"
    - "  Status: {{ status_02 | default('ERROR') | trim }}"
    - "  Details: {{ details_02 | default('') | trim }}"
    - ""
    - "REQUIREMENT 03 - {{ req_03 }}:"
    - "  Task: {{ task_03_name | default('Not recorded') }}"
    - "  Command: {{ task_03_cmd | default('N/A') }}"
    - "  Exit code: {{ task_03_rc | default(-1) }}"
    - "  Data: {{ data_03 | default('') | trim }}"
    - "  Status: {{ status_03 | default('ERROR') | trim }}"
    - "  Details: {{ details_03 | default('') | trim }}"
    - ""
    - "REQUIREMENT 04 - {{ req_04 }}:"
    - "  Task: {{ task_04_name | default('Not recorded') }}"
    - "  Command: {{ task_04_cmd | default('N/A') }}"
    - "  Exit code: {{ task_04_rc | default(-1) }}"
    - "  Data: {{ data_04 | default('') | trim }}"
    - "  Status: {{ status_04 | default('ERROR') | trim }}"
    - "  Details: {{ details_04 | default('') | trim }}"
    - ""
    - "REQUIREMENT 05 - {{ req_05 }}:"
    - "  Task: {{ task_05_name | default('Not recorded') }}"
    - "  Command: {{ task_05_cmd | default('N/A') }}"
    - "  Exit code: {{ task_05_rc | default(-1) }}"
    - "  Data: {{ data_05 | default('') | trim }}"
    - "  Status: {{ status_05 | default('ERROR') | trim }}"
    - "  Details: {{ details_05 | default('') | trim }}"
    - ""
    - "REQUIREMENT 06 - {{ req_06 }}:"
    - "  Task: {{ task_06_name | default('Not recorded') }}"
    - "  Command: {{ task_06_cmd | default('N/A') }}"
    - "  Exit code: {{ task_06_rc | default(-1) }}"
    - "  Data: {{ data_06 | default('') | trim }}"
    - "  Status: {{ status_06 | default('ERROR') | trim }}"
    - "  Details: {{ details_06 | default('') | trim }}"
    - ""
    - "========================================================"
    - "OVERALL COMPLIANCE:"
    - "  Result: {{ cis_result | default('ERROR') | trim }}"
    - "  Details: {{ details_05 | default('Not evaluated') | trim }}"
    - "========================================================"
