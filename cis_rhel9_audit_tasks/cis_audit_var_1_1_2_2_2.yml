req_01: "Check if /dev/shm is a separate partition using command: `findmnt -kn /dev/shm`. Expected result: output should contain a mount point entry for /dev/shm."
req_02: "Check if the nodev option is set on /dev/shm partition using command: `findmnt -kn /dev/shm | grep -v 'nodev'`. Expected result: no output (empty)."
req_03: "Summarize overall compliance: if /dev/shm is a separate partition and the nodev option is set, the system is compliant; otherwise, it is non-compliant."
