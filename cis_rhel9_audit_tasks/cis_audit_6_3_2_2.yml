---
- name: Initialize meta data variables
  include_vars: cis_audit_var_6_3_2_2.yml

- name: "Initialize data variables"
  set_fact:
    data_01: "Not collected yet"
    status_01: "ERROR"
    details_01: "Not evaluated"
    data_02: "Not collected yet"
    status_02: "ERROR"
    details_02: "Not evaluated"
    data_03: "Not collected yet"
    status_03: "ERROR"
    details_03: "Not evaluated"
    data_04: "Not collected yet"
    status_04: "ERROR"
    details_04: "Not evaluated"
    data_05: "Not collected yet"
    status_05: "ERROR"
    details_05: "Not evaluated"
    task_01_name: "Not executed"
    task_01_cmd: "N/A"
    task_01_rc: -1
    task_02_name: "Not executed"
    task_02_cmd: "N/A"
    task_02_rc: -1
    task_03_name: "Not executed"
    task_03_cmd: "N/A"
    task_03_rc: -1
    task_04_name: "Not executed"
    task_04_cmd: "N/A"
    task_04_rc: -1
    task_05_name: "Not executed"
    task_05_cmd: "N/A"
    task_05_rc: -1

# Requirement 1
- name: "Req 01 - Check if auditd package is installed"
  ansible.builtin.shell: dpkg -l auditd 2>/dev/null || rpm -q audit 2>/dev/null
  args:
    executable: /bin/bash
  register: result_01
  failed_when: false
  changed_when: false

- name: "Store requirement 01 details"
  set_fact:
    task_01_name: "Check if auditd package is installed"
    task_01_cmd: "dpkg -l auditd 2>/dev/null || rpm -q audit 2>/dev/null"
    task_01_rc: "{{ result_01.rc | default(-1) }}"
    data_01: "{{ result_01.stdout | default('') | trim }}"
    status_01: "{{ 'PASS' if result_01.rc | default(-1) == 0 else 'FAIL' }}"
    details_01: "{{ 'Package is installed' if result_01.rc | default(-1) == 0 else 'Package not found' }}"

# Requirement 2
- name: "Req 02 - Check if /etc/audit/auditd.conf exists"
  ansible.builtin.shell: test -f /etc/audit/auditd.conf && echo 'EXISTS'
  args:
    executable: /bin/bash
  register: result_02
  failed_when: false
  changed_when: false

- name: "Store requirement 02 details"
  set_fact:
    task_02_name: "Check if /etc/audit/auditd.conf exists"
    task_02_cmd: "test -f /etc/audit/auditd.conf && echo 'EXISTS'"
    task_02_rc: "{{ result_02.rc | default(-1) }}"
    data_02: "{{ result_02.stdout | default('') | trim }}"
    status_02: "{{ 'PASS' if (result_02.rc | default(-1) == 0 and (result_02.stdout | default('') | trim) == 'EXISTS') else 'FAIL' }}"
    details_02: "{{ 'Configuration file exists' if (result_02.rc | default(-1) == 0 and (result_02.stdout | default('') | trim) == 'EXISTS') else 'Configuration file does not exist' }}"

# Requirement 3
- name: "Req 03 - Check max_log_file_action setting in auditd.conf"
  ansible.builtin.shell: grep -E '^\s*max_log_file_action\s*=\s*keep_logs' /etc/audit/auditd.conf
  args:
    executable: /bin/bash
  register: result_03
  failed_when: false
  changed_when: false

- name: "Store requirement 03 details"
  set_fact:
    task_03_name: "Check max_log_file_action setting in auditd.conf"
    task_03_cmd: |
      grep -E '^\s*max_log_file_action\s*=\s*keep_logs' /etc/audit/auditd.conf
    task_03_rc: "{{ result_03.rc | default(-1) }}"
    data_03: "{{ result_03.stdout | default('') | trim }}"
    status_03: "{{ 'PASS' if result_03.rc | default(-1) == 0 else 'FAIL' }}"
    details_03: "{{ 'max_log_file_action = keep_logs is set' if result_03.rc | default(-1) == 0 else 'max_log_file_action is not set to keep_logs' }}"

# Requirement 4
- name: "Req 04 - Summarize overall compliance"
  set_fact:
    status_04: "{{ 'SKIP' if (status_01 | trim != 'PASS' or status_02 | trim != 'PASS') else ('PASS' if status_03 | trim == 'PASS' else 'FAIL') }}"
    details_04: "{{ 'Prerequisite not met (auditd not installed or config missing)' if (status_01 | trim != 'PASS' or status_02 | trim != 'PASS') else ('System is compliant' if status_03 | trim == 'PASS' else 'max_log_file_action is not set to keep_logs') }}"
    task_04_name: "Summarize overall compliance"
    task_04_cmd: "set_fact (compliance logic)"
    task_04_rc: 0
    data_04: "{{ 'SKIP' if (status_01 | trim != 'PASS' or status_02 | trim != 'PASS') else ('PASS' if status_03 | trim == 'PASS' else 'FAIL') }}"

# Requirement 5
- name: "Req 05 - Store final audit result in cis_result"
  set_fact:
    cis_result: "{{ status_04 | default('ERROR') | trim }}"
    task_05_name: "Store final audit result in cis_result"
    task_05_cmd: "set_fact cis_result = status_04"
    task_05_rc: 0
    data_05: "{{ status_04 | default('ERROR') | trim }}"
    status_05: "{{ status_04 | default('ERROR') | trim }}"
    details_05: "Final compliance result"

# Generate audit report
- name: "Generate audit report"
  debug:
    msg:
    - "AUDIT REPORT — CIS 6.3.2.2"
    - "Reference: CIS Benchmark checkpoint 6.3.2.2"
    - ""
    - "REQUIREMENT 01 - {{ req_01 }}:"
    - "  Task: {{ task_01_name | default('Not recorded') }}"
    - "  Command: {{ task_01_cmd | default('N/A') }}"
    - "  Exit code: {{ task_01_rc | default(-1) }}"
    - "  Data: {{ data_01 | default('') | trim }}"
    - "  Status: {{ status_01 | default('ERROR') | trim }}"
    - "  Details: {{ details_01 | default('') | trim }}"
    - ""
    - "REQUIREMENT 02 - {{ req_02 }}:"
    - "  Task: {{ task_02_name | default('Not recorded') }}"
    - "  Command: {{ task_02_cmd | default('N/A') }}"
    - "  Exit code: {{ task_02_rc | default(-1) }}"
    - "  Data: {{ data_02 | default('') | trim }}"
    - "  Status: {{ status_02 | default('ERROR') | trim }}"
    - "  Details: {{ details_02 | default('') | trim }}"
    - ""
    - "REQUIREMENT 03 - {{ req_03 }}:"
    - "  Task: {{ task_03_name | default('Not recorded') }}"
    - "  Command: {{ task_03_cmd | default('N/A') }}"
    - "  Exit code: {{ task_03_rc | default(-1) }}"
    - "  Data: {{ data_03 | default('') | trim }}"
    - "  Status: {{ status_03 | default('ERROR') | trim }}"
    - "  Details: {{ details_03 | default('') | trim }}"
    - ""
    - "REQUIREMENT 04 - {{ req_04 }}:"
    - "  Task: {{ task_04_name | default('Not recorded') }}"
    - "  Command: {{ task_04_cmd | default('N/A') }}"
    - "  Exit code: {{ task_04_rc | default(-1) }}"
    - "  Data: {{ data_04 | default('') | trim }}"
    - "  Status: {{ status_04 | default('ERROR') | trim }}"
    - "  Details: {{ details_04 | default('') | trim }}"
    - ""
    - "REQUIREMENT 05 - {{ req_05 }}:"
    - "  Task: {{ task_05_name | default('Not recorded') }}"
    - "  Command: {{ task_05_cmd | default('N/A') }}"
    - "  Exit code: {{ task_05_rc | default(-1) }}"
    - "  Data: {{ data_05 | default('') | trim }}"
    - "  Status: {{ status_05 | default('ERROR') | trim }}"
    - "  Details: {{ details_05 | default('') | trim }}"
    - ""
    - "========================================================"
    - "OVERALL COMPLIANCE:"
    - "  Result: {{ cis_result | default('ERROR') | trim }}"
    - "========================================================"
