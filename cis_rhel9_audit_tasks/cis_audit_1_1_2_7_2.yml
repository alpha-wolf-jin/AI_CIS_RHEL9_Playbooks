---
- name: Initialize meta data variables
  include_vars: cis_audit_var_1_1_2_7_2.yml

- name: "Req 1 - Check if /var/log/audit is a separate partition"
  ansible.builtin.command: findmnt -kn "{{ mount_point }}"
  register: result_01
  failed_when: false
  changed_when: false

- name: "Store requirement 01 details"
  set_fact:
    task_01_name: "Check if /var/log/audit is a separate partition"
    task_01_cmd: "findmnt -kn {{ mount_point }}"
    task_01_rc: "{{ result_01.rc | default(-1) }}"
    data_01: "{{ result_01.stdout | default('') | trim }}"
    status_01: "{{ 'PASS' if result_01.rc == 0 and (result_01.stdout | default('') | trim | length > 0) else 'FAIL' }}"
    details_01: "{{ 'Separate partition exists' if result_01.rc == 0 and (result_01.stdout | default('') | trim | length > 0) else 'No separate partition found' }}"

- name: "Req 2 - Check if nodev option is set on /var/log/audit partition"
  ansible.builtin.shell: "findmnt -kn {{ mount_point }} | grep -v {{ mount_option }}"
  args:
    executable: /bin/bash
  register: result_02
  failed_when: false
  changed_when: false
  when:
  - result_01.rc == 0
  - "result_01.stdout | default('') | trim | length > 0"

- name: "Store requirement 02 details"
  set_fact:
    task_02_name: "Check if nodev option is set on /var/log/audit partition"
    task_02_cmd: "findmnt -kn {{ mount_point }} | grep -v {{ mount_option }}"
    task_02_rc: "{{ result_02.rc | default(-1) if (result_02 is defined and not (result_02.skipped | default(false))) else -1 }}"
    data_02: "{{ 'Not applicable - no separate partition' if (result_02 is not defined or (result_02.skipped | default(false))) else (result_02.stdout | default('') | trim) }}"
    status_02: "{{ 'SKIPPED' if (result_02 is not defined or (result_02.skipped | default(false))) else ('PASS' if (result_02.stdout | default('') | trim == '') else 'FAIL') }}"
    details_02: "{{ 'Requirement not applicable because /var/log/audit is not a separate partition' if (result_02 is not defined or (result_02.skipped | default(false))) else ('nodev option is set' if (result_02.stdout | default('') | trim == '') else 'nodev option is not set') }}"

- name: "Req 3 - Summarize overall compliance status"
  set_fact:
    task_03_name: "Summarize overall compliance status"
    task_03_cmd: "N/A"
    task_03_rc: 0
    data_03: "status_01: {{ status_01 }}, status_02: {{ status_02 }}"
    status_03: >-
      {{ 'SKIPPED' if status_01 == 'FAIL' else ('PASS' if status_02 == 'PASS' else 'FAIL') }}
    details_03: >-
      {{ 'Partition /var/log/audit does not exist - requirement not applicable' if status_01 == 'FAIL'
         else ('Both checks passed - compliant' if status_02 == 'PASS'
               else 'nodev option is not set - non-compliant') }}

- name: "Store final audit result in cis_result"
  set_fact:
    cis_result: "{{ status_03 }}"

- name: "Generate audit report"
  debug:
    msg:
    - "AUDIT REPORT — CIS 1.1.2.7.2"
    - "Reference: CIS Benchmark checkpoint 1.1.2.7.2"
    - ""
    - "REQUIREMENT 01 - {{ req_01 }}:"
    - "  Task: {{ task_01_name | default('Not recorded') }}"
    - "  Command: {{ task_01_cmd | default('N/A') }}"
    - "  Exit code: {{ task_01_rc | default(-1) }}"
    - "  Data: {{ data_01 | default('') | trim }}"
    - "  Status: {{ status_01 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_01 | default('') | trim }}"
    - ""
    - "REQUIREMENT 02 - {{ req_02 }}:"
    - "  Task: {{ task_02_name | default('Not recorded') }}"
    - "  Command: {{ task_02_cmd | default('N/A') }}"
    - "  Exit code: {{ task_02_rc | default(-1) }}"
    - "  Data: {{ data_02 | default('') | trim }}"
    - "  Status: {{ status_02 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_02 | default('') | trim }}"
    - ""
    - "REQUIREMENT 03 - {{ req_03 }}:"
    - "  Task: {{ task_03_name | default('Not recorded') }}"
    - "  Command: {{ task_03_cmd | default('N/A') }}"
    - "  Exit code: {{ task_03_rc | default(-1) }}"
    - "  Data: {{ data_03 | default('') | trim }}"
    - "  Status: {{ status_03 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_03 | default('') | trim }}"
    - ""
    - "REQUIREMENT 04 - {{ req_04 }}:"
    - "  Task: Store cis_result"
    - "  Command: set_fact"
    - "  Exit code: 0"
    - "  Data: cis_result = {{ cis_result | default('UNKNOWN') | trim }}"
    - "  Status: {{ cis_result | default('UNKNOWN') | trim }}"
    - "  Details: Copied from overall compliance status"
    - ""
    - "========================================================"
    - "OVERALL COMPLIANCE:"
    - "  Result: {{ cis_result | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_03 | default('Not evaluated') | trim }}"
    - "========================================================"
