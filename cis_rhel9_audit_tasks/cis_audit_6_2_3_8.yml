---
- name: Initialize meta data variables
  include_vars: cis_audit_var_6_2_3_8.yml

- name: "Snapshot - Check if audit script already exists"
  ansible.builtin.stat:
    path: "{{ audit_script }}"
  register: script_pre_stat
  tags: [snapshot]
- name: "Snapshot - Write existence status to file"
  ansible.builtin.copy:
    content: "{{ script_pre_stat.stat.exists | default(false) | string }}"
    dest: /tmp/.cis_6.2.3.8_audit_pre_exists
    mode: '0600'
  tags: [snapshot]

- block:
  - name: "Initialize data variables"
    ansible.builtin.set_fact:
      data_01: "Not collected yet"
      status_01: "UNKNOWN"
      details_01: "Not evaluated"
      data_02: "Not collected yet"
      status_02: "UNKNOWN"
      details_02: "Not evaluated"
      data_03: "Not collected yet"
      status_03: "UNKNOWN"
      details_03: "Not evaluated"
      task_01_name: "Not executed"
      task_01_cmd: "N/A"
      task_01_rc: -1
      task_02_name: "Not executed"
      task_02_cmd: "N/A"
      task_02_rc: -1
      task_03_name: "Not executed"
      task_03_cmd: "N/A"
      task_03_rc: -1
    tags: [execute]

  - name: "Gather package facts to check if rsyslog is installed"
    ansible.builtin.package_facts:
      manager: auto
    failed_when: false
    tags: [execute]

  - name: "Determine if rsyslog is installed"
    ansible.builtin.set_fact:
      rsyslog_installed: "{{ 'rsyslog' in ansible_facts.packages }}"
    tags: [execute]

  - name: "Copy audit script to remote"
    ansible.builtin.copy:
      dest: "{{ audit_script }}"
      mode: "0700"
      content: "{{ audit_script_content }}"
    changed_when: false
    when: rsyslog_installed | bool
    tags: [execute]

  - name: "Req 01 - Execute audit script"
    ansible.builtin.shell: "/bin/bash {{ audit_script }}"
    args:
      executable: /bin/bash
    register: audit_result
    failed_when: false
    changed_when: false
    when: rsyslog_installed | bool
    tags: [execute]

  - name: "Set requirement 01 details when rsyslog installed"
    ansible.builtin.set_fact:
      task_01_name: "Execute audit script"
      task_01_cmd: "/bin/bash {{ audit_script }}"
      task_01_rc: "{{ audit_result.rc | default(-1) }}"
      data_01: "{{ audit_result.stdout | default('') | trim }}"
      status_01: "{{ ('PASS' if audit_result.rc | default(-1) == 0 else 'FAIL') | trim }}"
      details_01: "{{ ('Script executed successfully' if audit_result.rc | default(-1) == 0 else 'Script execution failed') | trim }}"
    when: rsyslog_installed | bool
    tags: [execute]

  - name: "Set requirement 01 details when rsyslog not installed"
    ansible.builtin.set_fact:
      task_01_name: "Execute audit script"
      task_01_cmd: "N/A"
      task_01_rc: -1
      data_01: "NOT_APPLICABLE"
      status_01: "SKIPPED"
      details_01: "rsyslog is not installed, audit not applicable"
    when: not rsyslog_installed | bool
    tags: [execute]

  - name: "Req 02 - Verify compliance from script output"
    ansible.builtin.set_fact:
      task_02_name: "Verify compliance status"
      task_02_cmd: "Evaluate output"
      task_02_rc: 0
      compliance_status: >-
        {%- if rsyslog_installed | bool -%}
          {%- if audit_result.stdout is defined and audit_result.stdout | default('') -%}
            {%- if '** FAIL **' in audit_result.stdout -%}FAIL
            {%- elif '** REVIEW **' in audit_result.stdout -%}PASS
            {%- else -%}UNKNOWN
            {%- endif %}
          {%- else -%}UNKNOWN
          {%- endif %}
        {%- else -%}NOT_APPLICABLE
        {%- endif %}
    when: yes
    tags: [execute]

  - name: "Set requirement 02 details"
    ansible.builtin.set_fact:
      data_02: "{{ compliance_status | default('UNKNOWN') | trim }}"
      status_02: "{{ compliance_status | default('UNKNOWN') | trim }}"
      details_02: "{{ ('PASS if configured, FAIL if not, UNKNOWN otherwise' if rsyslog_installed | bool else 'rsyslog not installed') }}"
    when: yes
    tags: [execute]

  - name: "Req 03 - Store final audit result in cis_result"
    ansible.builtin.set_fact:
      cis_result: "{{ status_02 | default('UNKNOWN') | trim }}"
      task_03_name: "Store cis_result"
      task_03_cmd: "set_fact cis_result={{ status_02 }}"
      task_03_rc: 0
      data_03: "cis_result set"
      status_03: "PASS"
      details_03: "Final result stored"
    when: yes
    tags: [execute]

  - name: "Generate audit report"
    ansible.builtin.debug:
      msg:
      - "AUDIT REPORT — CIS 6.2.3.8"
      - "Reference: CIS Benchmark checkpoint 6.2.3.8"
      - ""
      - "REQUIREMENT 01 - {{ req_01 }}:"
      - "  Task: {{ task_01_name | default('Not recorded') }}"
      - "  Command: {{ task_01_cmd | default('N/A') }}"
      - "  Exit code: {{ task_01_rc | default(-1) }}"
      - "  Data: {{ data_01 | default('') | trim }}"
      - "  Status: {{ status_01 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_01 | default('') | trim }}"
      - ""
      - "REQUIREMENT 02 - {{ req_02 }}:"
      - "  Task: {{ task_02_name | default('Not recorded') }}"
      - "  Command: {{ task_02_cmd | default('N/A') }}"
      - "  Exit code: {{ task_02_rc | default(-1) }}"
      - "  Data: {{ data_02 | default('') | trim }}"
      - "  Status: {{ status_02 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_02 | default('') | trim }}"
      - ""
      - "REQUIREMENT 03 - {{ req_03 }}:"
      - "  Task: {{ task_03_name | default('Not recorded') }}"
      - "  Command: {{ task_03_cmd | default('N/A') }}"
      - "  Exit code: {{ task_03_rc | default(-1) }}"
      - "  Data: {{ data_03 | default('') | trim }}"
      - "  Status: {{ status_03 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_03 | default('') | trim }}"
      - ""
      - "========================================================"
      - "OVERALL COMPLIANCE:"
      - "  Result: {{ cis_result | default('UNKNOWN') | trim }}"
      - "========================================================"
    tags: [execute]

  always:
  - name: "Restore - Read pre-existence flag"
    ansible.builtin.slurp:
      src: /tmp/.cis_6.2.3.8_audit_pre_exists
    register: flag_slurp
    tags: [restore]

  - name: "Restore - Remove audit script if it was created by this playbook"
    ansible.builtin.file:
      path: "{{ audit_script }}"
      state: absent
    when: "flag_slurp.content | b64decode | trim == 'False'"
    tags: [restore]

  - name: "Restore - Remove flag file"
    ansible.builtin.file:
      path: /tmp/.cis_6.2.3.8_audit_pre_exists
      state: absent
    tags: [restore]
