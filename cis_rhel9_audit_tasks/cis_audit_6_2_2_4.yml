---
- name: Initialize meta data variables
  include_vars: cis_audit_var_6_2_2_4.yml

- name: "Initialize data variables"
  ansible.builtin.set_fact:
    data_01: "Not collected yet"
    status_01: "ERROR"
    details_01: "Not evaluated"
    data_02: "Not collected yet"
    status_02: "ERROR"
    details_02: "Not evaluated"
    data_03: "Not collected yet"
    status_03: "ERROR"
    details_03: "Not evaluated"
    data_04: "Not collected yet"
    status_04: "ERROR"
    details_04: "Not evaluated"
    task_01_name: "Not executed"
    task_01_cmd: "N/A"
    task_01_rc: -1
    task_02_name: "Not executed"
    task_02_cmd: "N/A"
    task_02_rc: -1
    task_03_name: "Not executed"
    task_03_cmd: "N/A"
    task_03_rc: -1
    task_04_name: "Not executed"
    task_04_cmd: "N/A"
    task_04_rc: -1

- name: "Req 01 - Check if systemd-journald is available"
  ansible.builtin.shell: |
    set -o pipefail
    dpkg -l systemd 2>/dev/null || rpm -q systemd 2>/dev/null || \
    ( systemctl is-active systemd-journald 2>/dev/null && echo "systemd-journald is active" ) || \
    /bin/true
  args:
    executable: /bin/bash
  register: result_01
  failed_when: false
  changed_when: false

- name: "Req 01 - Set journald installed fact"
  ansible.builtin.set_fact:
    journald_installed: >-
      {{ ( (result_01.rc | default(1)) == 0
           and ( (result_01.stdout | default('') | trim) != '') )
         or ( (result_01.stdout | default('')) is search('systemd-journald is active') ) }}

- name: "Req 01 - Store requirement 01 details"
  ansible.builtin.set_fact:
    task_01_name: "Check if systemd-journald is available"
    task_01_cmd: "set -o pipefail; dpkg -l systemd 2>/dev/null || rpm -q systemd 2>/dev/null || ( systemctl is-active systemd-journald 2>/dev/null && echo 'systemd-journald is active' ) || /bin/true"
    task_01_rc: "{{ result_01.rc | default(-1) }}"
    data_01: "{{ result_01.stdout | default('') | trim }}"
    status_01: "{{ 'PASS' if journald_installed | bool else 'FAIL' }}"
    details_01: "{{ 'systemd and journald are available' if journald_installed | bool else 'systemd-journald is not available (systemd not detected)' }}"

- name: "Req 02 - Check journald storage configuration"
  ansible.builtin.shell: |
    systemd-analyze cat-config systemd/journald.conf systemd/journald.conf.d/* 2>/dev/null | grep -E '^Storage=persistent'
  args:
    executable: /bin/bash
  register: result_02
  failed_when: false
  changed_when: false
  when: journald_installed | bool

- name: "Req 02 - Store requirement 02 details"
  ansible.builtin.set_fact:
    task_02_name: "Check if journald storage is persistent"
    task_02_cmd: "systemd-analyze cat-config systemd/journald.conf systemd/journald.conf.d/* | grep -E '^Storage=persistent'"
    task_02_rc: "{{ result_02.rc | default(-1) if (journald_installed | bool) else -1 }}"
    data_02: "{{ result_02.stdout | default('') | trim if (journald_installed | bool) else '' }}"
    status_02: >-
      {%- if not journald_installed | bool -%}
      SKIP
      {%- elif result_02.rc | default(-1) == 0 and 'Storage=persistent' in (result_02.stdout | default('')) -%}
      PASS
      {%- else -%}
      FAIL
      {%- endif -%}
    details_02: >-
      {%- if not journald_installed | bool -%}
      systemd-journald is not available; this check is not applicable
      {%- elif result_02.rc | default(-1) == 0 and 'Storage=persistent' in (result_02.stdout | default('')) -%}
      Journald storage is set to persistent
      {%- else -%}
      Journald storage is not set to persistent or check failed
      {%- endif -%}

- name: "Req 03 - Set overall compliance status"
  ansible.builtin.set_fact:
    task_03_name: "Summarize overall compliance"
    task_03_cmd: "N/A"
    task_03_rc: 0
    data_03: ""
    status_03: >-
      {%- if not journald_installed | bool -%}
      SKIP
      {%- elif status_02 | trim == 'PASS' -%}
      PASS
      {%- else -%}
      FAIL
      {%- endif -%}
    details_03: >-
      {%- if not journald_installed | bool -%}
      systemd-journald is not available; CIS benchmark not applicable
      {%- elif status_02 | trim == 'PASS' -%}
      All checks passed; system is compliant
      {%- else -%}
      One or more checks failed; system is non-compliant
      {%- endif -%}

- name: "Req 04 - Store final audit result in cis_result"
  ansible.builtin.set_fact:
    cis_result: "{{ status_03 | trim }}"
    task_04_name: "Store cis_result"
    task_04_cmd: "set_fact"
    task_04_rc: 0
    data_04: "{{ status_03 | trim }}"
    status_04: "PASS"
    details_04: "Final result stored in cis_result"

- name: "Generate audit report"
  ansible.builtin.debug:
    msg:
    - "AUDIT REPORT — CIS {{ cis_checkpoint }}"
    - "Reference: CIS Benchmark checkpoint {{ cis_checkpoint }}"
    - ""
    - "REQUIREMENT 01 - {{ req_01 }}:"
    - "  Task: {{ task_01_name | default('Not recorded') }}"
    - "  Command: {{ task_01_cmd | default('N/A') }}"
    - "  Exit code: {{ task_01_rc | default(-1) }}"
    - "  Data: {{ data_01 | default('') | trim }}"
    - "  Status: {{ status_01 | default('ERROR') | trim }}"
    - "  Details: {{ details_01 | default('') | trim }}"
    - ""
    - "REQUIREMENT 02 - {{ req_02 }}:"
    - "  Task: {{ task_02_name | default('Not recorded') }}"
    - "  Command: {{ task_02_cmd | default('N/A') }}"
    - "  Exit code: {{ task_02_rc | default(-1) }}"
    - "  Data: {{ data_02 | default('') | trim }}"
    - "  Status: {{ status_02 | default('ERROR') | trim }}"
    - "  Details: {{ details_02 | default('') | trim }}"
    - ""
    - "REQUIREMENT 03 - {{ req_03 }}:"
    - "  Task: {{ task_03_name | default('Not recorded') }}"
    - "  Command: {{ task_03_cmd | default('N/A') }}"
    - "  Exit code: {{ task_03_rc | default(-1) }}"
    - "  Data: {{ data_03 | default('') | trim }}"
    - "  Status: {{ status_03 | default('ERROR') | trim }}"
    - "  Details: {{ details_03 | default('') | trim }}"
    - ""
    - "REQUIREMENT 04 - {{ req_04 }}:"
    - "  Task: {{ task_04_name | default('Not recorded') }}"
    - "  Command: {{ task_04_cmd | default('N/A') }}"
    - "  Exit code: {{ task_04_rc | default(-1) }}"
    - "  Data: {{ data_04 | default('') | trim }}"
    - "  Status: {{ status_04 | default('ERROR') | trim }}"
    - "  Details: {{ details_04 | default('') | trim }}"
    - ""
    - "========================================================"
    - "OVERALL COMPLIANCE:"
    - "  Result: {{ cis_result | default('ERROR') | trim }}"
    - "  Details: {{ details_03 | default('Not evaluated') | trim }}"
    - "========================================================"
