---
- name: Initialize meta data variables
  include_vars: cis_audit_var_1_3_1_7.yml

- name: "Initialize data variables"
  ansible.builtin.set_fact:
    data_01: "Not collected yet"
    status_01: "UNKNOWN"
    details_01: "Not evaluated"
    data_02: "Not collected yet"
    status_02: "UNKNOWN"
    details_02: "Not evaluated"
    data_03: "Not collected yet"
    status_03: "UNKNOWN"
    details_03: "Not evaluated"
    task_01_name: "Not executed"
    task_01_cmd: "N/A"
    task_01_rc: -1
    task_02_name: "Not executed"
    task_02_cmd: "N/A"
    task_02_rc: -1
    task_03_name: "Not executed"
    task_03_cmd: "N/A"
    task_03_rc: -1

- name: "Req 01 - Check if mcstrans package is installed using rpm"
  ansible.builtin.shell: "rpm -q {{ package_name }}"
  args:
    executable: /bin/bash
  register: result_01
  failed_when: false
  changed_when: false

- name: "Store requirement 01 details"
  ansible.builtin.set_fact:
    task_01_name: "Check if mcstrans package is installed using rpm"
    task_01_cmd: "rpm -q {{ package_name }}"
    task_01_rc: "{{ result_01.rc | default(-1) }}"
    data_01: "{{ result_01.stdout | default('') | trim }}"
    status_01: "{{ 'PASS' if result_01.rc | default(-1) != 0 else 'FAIL' }}"
    details_01: "{{ 'PASS: mcstrans is not installed' if result_01.rc | default(-1) != 0 else 'FAIL: mcstrans is installed' }}"

- name: "Req 02 - Set compliance fact for mcstrans"
  ansible.builtin.set_fact:
    task_02_name: "Set compliance fact for mcstrans"
    task_02_cmd: "N/A"
    task_02_rc: 0
    data_02: "Compliance evaluation"
    status_02: "{{ ('PASS' if result_01.rc | default(-1) != 0 else 'FAIL') | trim }}"
    details_02: "{{ 'PASS: System is compliant - mcstrans is not installed' if result_01.rc | default(-1) != 0 else 'FAIL: System is non-compliant - mcstrans is installed' }}"

- name: "Store final cis_result variable"
  ansible.builtin.set_fact:
    cis_result: "{{ status_02 }}"

- name: "Store requirement 03 details"
  ansible.builtin.set_fact:
    task_03_name: "Store final cis_result variable"
    task_03_cmd: "set_fact: cis_result = {{ status_02 }}"
    task_03_rc: 0
    data_03: "{{ status_02 | default('') | trim }}"
    status_03: "PASS"
    details_03: "cis_result set successfully"

- name: "Generate execution report"
  debug:
    msg:
    - "AUDIT REPORT — CIS 1.3.1.7"
    - "Reference: CIS Benchmark checkpoint 1.3.1.7"
    - ""
    - "REQUIREMENT 01 - {{ req_01 }}:"
    - "  Task: {{ task_01_name | default('Not recorded') }}"
    - "  Command: {{ task_01_cmd | default('N/A') }}"
    - "  Exit code: {{ task_01_rc | default(-1) }}"
    - "  Data: {{ data_01 | default('') | trim }}"
    - "  Status: {{ status_01 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_01 | default('') | trim }}"
    - ""
    - "REQUIREMENT 02 - {{ req_02 }}:"
    - "  Task: {{ task_02_name | default('Not recorded') }}"
    - "  Command: {{ task_02_cmd | default('N/A') }}"
    - "  Exit code: {{ task_02_rc | default(-1) }}"
    - "  Data: {{ data_02 | default('') | trim }}"
    - "  Status: {{ status_02 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_02 | default('') | trim }}"
    - ""
    - "REQUIREMENT 03 - {{ req_03 }}:"
    - "  Task: {{ task_03_name | default('Not recorded') }}"
    - "  Command: {{ task_03_cmd | default('N/A') }}"
    - "  Exit code: {{ task_03_rc | default(-1) }}"
    - "  Data: {{ data_03 | default('') | trim }}"
    - "  Status: {{ status_03 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_03 | default('') | trim }}"
    - ""
    - "========================================================"
    - "OVERALL COMPLIANCE:"
    - "  Result: {{ cis_result | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_02 | default('Not evaluated') | trim }}"
    - "========================================================"
