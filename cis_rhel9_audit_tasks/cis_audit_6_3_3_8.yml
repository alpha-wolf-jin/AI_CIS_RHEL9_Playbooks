# Requirement 1: Check if auditd is installed
- name: "Req 01 - Check if auditd package is installed"
  shell: dpkg -l auditd 2>/dev/null || rpm -q audit 2>/dev/null
  args:
    executable: /bin/bash
  register: result_01
  failed_when: false
  changed_when: false

- name: "Store requirement 01 details"
  set_fact:
    task_01_name: "Check if auditd is installed"
    task_01_cmd: "dpkg -l auditd 2>/dev/null || rpm -q audit 2>/dev/null"
    task_01_rc: "{{ result_01.rc | default(-1) }}"
    data_01: "{{ result_01.stdout | default('') | trim }}"
    status_01: "{{ 'PASS' if result_01.rc | default(-1) == 0 else 'FAIL' }}"
    details_01: "{{ 'auditd package is installed' if result_01.rc | default(-1) == 0 else 'auditd package NOT installed' }}"
    auditd_installed: "{{ result_01.rc | default(-1) == 0 }}"

# On-disk audit rules check (shared awk)
- name: "Req 02-09 - Collect on-disk audit rules"
  shell: |
    awk '/^ *-w/ &&(/\/etc\/group/ ||/\/etc\/passwd/ ||/\/etc\/gshadow/ ||/\/etc\/shadow/ ||/\/etc\/security\/opasswd/ ||/\/etc\/nsswitch.conf/ ||/\/etc\/pam.conf/ ||/\/etc\/pam.d/) &&/ +-p *wa/ &&(/ key= *[!-~]* *$/||/ -k *[!-~]* *$/)' /etc/audit/rules.d/*.rules
  args:
    executable: /bin/bash
  register: disk_output
  when: "auditd_installed | default(false) | bool"
  failed_when: false
  changed_when: false

# Running rules check (shared auditctl | awk)
- name: "Req 10-17 - Collect running audit rules"
  shell: |
    auditctl -l | awk '/^ *-w/ &&(/\/etc\/group/ ||/\/etc\/passwd/ ||/\/etc\/gshadow/ ||/\/etc\/shadow/ ||/\/etc\/security\/opasswd/ ||/\/etc\/nsswitch.conf/ ||/\/etc\/pam.conf/ ||/\/etc\/pam.d/) &&/ +-p *wa/ &&(/ key= *[!-~]* *$/||/ -k *[!-~]* *$/)'
  args:
    executable: /bin/bash
  register: running_output
  when: "auditd_installed | default(false) | bool"
  failed_when: false
  changed_when: false

# Requirements 2-9: Evaluate each on-disk file
- name: "Req 02 - Evaluate on-disk rule for /etc/group"
  set_fact:
    task_02_name: "Check on-disk audit rules for /etc/group"
    task_02_cmd: "awk ... (see playbook)"
    task_02_rc: "{{ disk_output.rc | default(-1) if auditd_installed | default(false) | bool else -1 }}"
    data_02: "{{ disk_output.stdout | default('') | trim if auditd_installed | default(false) | bool else 'N/A' }}"
    status_02: >-
      {%- if not (auditd_installed | default(false) | bool) -%}NOT_APPLICABLE
      {%- elif '-w /etc/group -p wa -k identity' in (disk_output.stdout | default('')) -%}PASS
      {%- else -%}FAIL
      {%- endif -%}
    details_02: >-
      {%- if not (auditd_installed | default(false) | bool) -%}auditd not installed — NOT_APPLICABLE
      {%- elif '-w /etc/group -p wa -k identity' in (disk_output.stdout | default('')) -%}Rule present
      {%- else -%}Rule missing
