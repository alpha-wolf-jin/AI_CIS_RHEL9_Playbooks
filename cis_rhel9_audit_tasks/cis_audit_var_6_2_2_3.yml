req_01: "Check if systemd-journald is installed using command: `dpkg -l systemd-journald 2>/dev/null || rpm -q systemd-journald 2>/dev/null`. Expected result: package is installed."
req_02: "Check if journald Compress is set to yes using command: `systemd-analyze cat-config systemd/journald.conf systemd/journald.conf.d/* | grep -E '^Compress=yes'`. Expected result: Compress=yes"
req_03: "Summarize overall compliance: PASS if all checks pass, SKIP if systemd-journald is not installed, FAIL if Compress is not set to yes."
req_04: "Store the final audit result in a variable named 'cis_result' using set_fact. Set cis_result to the overall compliance status (PASS/FAIL/SKIP/ERROR) derived from the last requirement's status variable."
