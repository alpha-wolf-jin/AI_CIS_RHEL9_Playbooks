---
- name: Initialize meta data variables
  include_vars: cis_audit_var_1_6_3.yml

- name: "Initialize data variables"
  set_fact:
    data_01: "Not collected yet"
    status_01: "ERROR"
    details_01: "Not evaluated"
    data_02: "Not collected yet"
    status_02: "ERROR"
    details_02: "Not evaluated"
    data_03: "Not collected yet"
    status_03: "ERROR"
    details_03: "Not evaluated"
    data_04: "Not collected yet"
    status_04: "ERROR"
    details_04: "Not evaluated"
    data_05: "Not collected yet"
    status_05: "ERROR"
    details_05: "Not evaluated"
    task_01_name: "Not executed"
    task_01_cmd: "N/A"
    task_01_rc: -1
    task_02_name: "Not executed"
    task_02_cmd: "N/A"
    task_02_rc: -1
    task_03_name: "Not executed"
    task_03_cmd: "N/A"
    task_03_rc: -1
    task_04_name: "Not executed"
    task_04_cmd: "N/A"
    task_04_rc: -1
    task_05_name: "Not executed"
    task_05_cmd: "N/A"
    task_05_rc: -1

- name: "Req 01 - Check if crypto-policies package is installed"
  ansible.builtin.shell: "rpm -q crypto-policies"
  args:
    executable: /bin/bash
  register: result_01
  failed_when: false
  changed_when: false

- name: "Store requirement 01 details"
  set_fact:
    task_01_name: "Check if crypto-policies package is installed"
    task_01_cmd: "rpm -q crypto-policies"
    task_01_rc: "{{ result_01.rc | default(-1) }}"
    data_01: "{{ result_01.stdout | default('') | trim }}"
    status_01: "{{ 'PASS' if result_01.rc | default(-1) == 0 else 'FAIL' }}"
    details_01: "{{ 'Package found: ' ~ result_01.stdout | trim if result_01.rc | default(-1) == 0 else 'crypto-policies package is NOT installed' }}"

- name: "Set package installed flag"
  set_fact:
    crypto_policies_installed: "{{ result_01.rc == 0 }}"

- name: "Req 02 - Check that SHA1 hash and signature support is disabled in current policy"
  ansible.builtin.shell: |
    awk -F= '($1~/(hash|sign)/ && $2~/SHA1/ && $2!~/^\s*-\s*([^#\n\r]+)?SHA1/){print}' /etc/crypto-policies/state/CURRENT.pol
  args:
    executable: /bin/bash
  register: result_02
  failed_when: false
  changed_when: false
  when: crypto_policies_installed | bool

- name: "Store requirement 02 details"
  set_fact:
    task_02_name: "Check SHA1 hash and signature support disabled"
    task_02_cmd: |
      awk -F= '($1~/(hash|sign)/ && $2~/SHA1/ && $2!~/^\s*-\s*([^#\n\r]+)?SHA1/){print}' /etc/crypto-policies/state/CURRENT.pol
    task_02_rc: "{{ result_02.rc | default(-1) if crypto_policies_installed | bool else -1 }}"
    data_02: "{{ result_02.stdout | default('') | trim if crypto_policies_installed | bool else 'N/A' }}"
    status_02: >-
      {{- 'SKIP' if not crypto_policies_installed | bool else
         ('PASS' if (result_02.stdout | default('') | trim) == '' else 'FAIL') -}}
    details_02: >-
      {{- 'Prerequisite not met - crypto-policies not installed' if not crypto_policies_installed | bool else
         ('SHA1 hash and signature support disabled - no non‑negated SHA1 entries found' if (result_02.stdout | default('') | trim) == '' else
         'SHA1 hash and/or signature support still enabled - non‑negated SHA1 entries detected') -}}

- name: "Req 03 - Check that sha1_in_certs is set to 0 in NO-SHA1 subpolicy"
  ansible.builtin.shell: "grep -F 'sha1_in_certs = 0' /etc/crypto-policies/policies/modules/NO-SHA1.pmod"
  args:
    executable: /bin/bash
  register: result_03
  failed_when: false
  changed_when: false
  when: crypto_policies_installed | bool

- name: "Store requirement 03 details"
  set_fact:
    task_03_name: "Check sha1_in_certs = 0 in subpolicy"
    task_03_cmd: "grep -F 'sha1_in_certs = 0' /etc/crypto-policies/policies/modules/NO-SHA1.pmod"
    task_03_rc: "{{ result_03.rc | default(-1) if crypto_policies_installed | bool else -1 }}"
    data_03: "{{ result_03.stdout | default('') | trim if crypto_policies_installed | bool else 'N/A' }}"
    status_03: >-
      {{- 'SKIP' if not crypto_policies_installed | bool else
         ('PASS' if (result_03.stdout | default('') | trim == 'sha1_in_certs = 0') else 'FAIL') -}}
    details_03: >-
      {{- 'Prerequisite not met - crypto-policies not installed' if not crypto_policies_installed | bool else
         ('sha1_in_certs = 0 is set in NO-SHA1.pmod subpolicy' if (result_03.stdout | default('') | trim == 'sha1_in_certs = 0') else
         'sha1_in_certs = 0 is NOT present in NO-SHA1.pmod subpolicy') -}}

- name: "Req 04 - Summarize overall compliance (evaluate status)"
  set_fact:
    status_04: >-
      {{- 'SKIP' if not crypto_policies_installed | bool else
         ('PASS' if (status_02 | default('') | trim == 'PASS' and status_03 | default('') | trim == 'PASS') else 'FAIL') -}}
    details_04: >-
      {{- 'crypto-policies package is not installed - audit skipped' if not crypto_policies_installed | bool else
         ('All checks passed - system-wide crypto policy disables SHA1 support' if (status_02 | default('') | trim == 'PASS' and status_03 | default('') | trim == 'PASS') else
         'One or more checks failed - SHA1 support may still be enabled') -}}

- name: "Req 04 - Store data and task info after status is known"
  set_fact:
    data_04: "{{ status_04 | default('ERROR') | trim }}"
    task_04_name: "Summarize overall compliance"
    task_04_cmd: "set_fact based on previous statuses"
    task_04_rc: 0

- name: "Req 05 - Store final audit result in cis_result"
  set_fact:
    cis_result: "{{ status_04 | default('ERROR') | trim }}"

- name: "Store requirement 05 details"
  set_fact:
    task_05_name: "Store overall audit result"
    task_05_cmd: "set_fact cis_result = status_04"
    task_05_rc: 0
    data_05: "{{ cis_result | default('ERROR') | trim }}"
    status_05: "PASS"
    details_05: "cis_result set to {{ cis_result | default('ERROR') | trim }}"

- name: "Generate audit report"
  debug:
    msg:
    - "AUDIT REPORT — CIS 1.6.3"
    - "Reference: CIS Benchmark checkpoint 1.6.3"
    - ""
    - "REQUIREMENT 01 - {{ req_01 }}:"
    - "  Task: {{ task_01_name | default('Not recorded') }}"
    - "  Command: {{ task_01_cmd | default('N/A') }}"
    - "  Exit code: {{ task_01_rc | default(-1) }}"
    - "  Data: {{ data_01 | default('') | trim }}"
    - "  Status: {{ status_01 | default('ERROR') | trim }}"
    - "  Details: {{ details_01 | default('') | trim }}"
    - ""
    - "REQUIREMENT 02 - {{ req_02 }}:"
    - "  Task: {{ task_02_name | default('Not recorded') }}"
    - "  Command: {{ task_02_cmd | default('N/A') }}"
    - "  Exit code: {{ task_02_rc | default(-1) }}"
    - "  Data: {{ data_02 | default('') | trim }}"
    - "  Status: {{ status_02 | default('ERROR') | trim }}"
    - "  Details: {{ details_02 | default('') | trim }}"
    - ""
    - "REQUIREMENT 03 - {{ req_03 }}:"
    - "  Task: {{ task_03_name | default('Not recorded') }}"
    - "  Command: {{ task_03_cmd | default('N/A') }}"
    - "  Exit code: {{ task_03_rc | default(-1) }}"
    - "  Data: {{ data_03 | default('') | trim }}"
    - "  Status: {{ status_03 | default('ERROR') | trim }}"
    - "  Details: {{ details_03 | default('') | trim }}"
    - ""
    - "REQUIREMENT 04 - {{ req_04 }}:"
    - "  Task: {{ task_04_name | default('Not recorded') }}"
    - "  Command: {{ task_04_cmd | default('N/A') }}"
    - "  Exit code: {{ task_04_rc | default(-1) }}"
    - "  Data: {{ data_04 | default('') | trim }}"
    - "  Status: {{ status_04 | default('ERROR') | trim }}"
    - "  Details: {{ details_04 | default('') | trim }}"
    - ""
    - "REQUIREMENT 05 - {{ req_05 }}:"
    - "  Task: {{ task_05_name | default('Not recorded') }}"
    - "  Command: {{ task_05_cmd | default('N/A') }}"
    - "  Exit code: {{ task_05_rc | default(-1) }}"
    - "  Data: {{ data_05 | default('') | trim }}"
    - "  Status: {{ status_05 | default('ERROR') | trim }}"
    - "  Details: {{ details_05 | default('') | trim }}"
    - ""
    - "========================================================"
    - "OVERALL COMPLIANCE:"
    - "  Result: {{ cis_result | default('ERROR') | trim }}"
    - "  Details: {{ details_04 | default('Not evaluated') | trim }}"
    - "========================================================"
