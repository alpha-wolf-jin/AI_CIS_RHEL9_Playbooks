---
- name: Initialize meta data variables
  include_vars: cis_audit_var_1_6_3.yml

- name: "Initialize data variables"
  ansible.builtin.set_fact:
    data_01: "Not collected yet"
    status_01: "ERROR"
    details_01: "Not evaluated"
    data_02: "Not collected yet"
    status_02: "SKIP"
    details_02: "Skipped, crypto-policies package not installed"
    data_03: "Not collected yet"
    status_03: "SKIP"
    details_03: "Skipped, crypto-policies package not installed"
    data_04: "Not collected yet"
    status_04: "ERROR"
    details_04: "Not evaluated"
    data_05: "Not collected yet"
    status_05: "ERROR"
    details_05: "Not evaluated"
    task_01_name: "Not executed"
    task_01_cmd: "N/A"
    task_01_rc: -1
    task_02_name: "Not executed"
    task_02_cmd: "N/A"
    task_02_rc: -1
    task_03_name: "Not executed"
    task_03_cmd: "N/A"
    task_03_rc: -1
    task_04_name: "Not executed"
    task_04_cmd: "N/A"
    task_04_rc: -1
    task_05_name: "Not executed"
    task_05_cmd: "N/A"
    task_05_rc: -1

- name: "Req 01 - Check if crypto-policies package is installed"
  ansible.builtin.shell: rpm -q crypto-policies
  args:
    executable: /bin/bash
  register: result_01
  failed_when: false
  changed_when: false

- name: "Store requirement 01 details"
  ansible.builtin.set_fact:
    task_01_name: "Check if crypto-policies package is installed"
    task_01_cmd: "rpm -q crypto-policies"
    task_01_rc: "{{ result_01.rc | default(-1) }}"
    data_01: "{{ result_01.stdout | default('') | trim }}"
    status_01: "{{ 'PASS' if result_01.rc | default(-1) == 0 else 'FAIL' }}"
    details_01: "{{ 'Package crypto-policies is installed' if result_01.rc | default(-1) == 0 else 'Package crypto-policies is NOT installed' }}"
    package_installed: "{{ result_01.rc | default(-1) == 0 }}"

- name: "Req 02 - Check SHA1 hash and signature support is disabled"
  ansible.builtin.shell: |
    awk -F= '($1~/(hash|sign)/ && $2~/SHA1/ && $2!~/^\s*-\s*([^#\n\r]+)?SHA1/){print}' /etc/crypto-policies/state/CURRENT.pol
  args:
    executable: /bin/bash
  register: result_02
  failed_when: false
  changed_when: false
  when: "package_installed | default(false) | bool"

- name: "Store requirement 02 details"
  ansible.builtin.set_fact:
    task_02_name: "Check SHA1 hash and signature support is disabled"
    task_02_cmd: |
      awk -F= '($1~/(hash|sign)/ && $2~/SHA1/ && $2!~/^\\s*-\\s*([^#\\n\\r]+)?SHA1/){print}' /etc/crypto-policies/state/CURRENT.pol
    task_02_rc: "{{ result_02.rc | default(-1) }}"
    data_02: "{{ result_02.stdout | default('') | trim }}"
    status_02: "{{ 'PASS' if (result_02.stdout | default('') | trim | length == 0) else 'FAIL' }}"
    details_02: "{{ 'No SHA1 hash/sign found (disabled)' if (result_02.stdout | default('') | trim | length == 0) else 'SHA1 hash/sign found (not disabled)' }}"
  when: "package_installed | default(false) | bool"

- name: "Req 03 - Check sha1_in_certs is set to 0"
  ansible.builtin.shell: |
    grep -Psi -- '^\h*sha1_in_certs\h*=\h*' /etc/crypto-policies/state/CURRENT.pol
  args:
    executable: /bin/bash
  register: result_03
  failed_when: false
  changed_when: false
  when: "package_installed | default(false) | bool"

- name: "Store requirement 03 details"
  ansible.builtin.set_fact:
    task_03_name: "Check sha1_in_certs is set to 0"
    task_03_cmd: |
      grep -Psi -- '^\\h*sha1_in_certs\\h*=\\h*' /etc/crypto-policies/state/CURRENT.pol
    task_03_rc: "{{ result_03.rc | default(-1) }}"
    data_03: "{{ result_03.stdout | default('') | trim }}"
    status_03: |
      {{ ("PASS" if (result_03.stdout | default("") | trim | regex_search("^sha1_in_certs\s*=\s*0$")) else "FAIL") }}
    details_03: |
      {{ ("sha1_in_certs = 0 configured correctly" if (result_03.stdout | default("") | trim | regex_search("^sha1_in_certs\s*=\s*0$")) else "sha1_in_certs is not set to 0") }}
  when: "package_installed | default(false) | bool"

- name: "Req 04 - Summarize overall compliance"
  ansible.builtin.set_fact:
    cis_result: >-
      {%- if not (package_installed | default(false) | bool) -%}
      SKIP
      {%- elif (status_02 | default('ERROR') | trim == 'PASS') and (status_03 | default('ERROR') | trim == 'PASS') -%}
      PASS
      {%- else -%}
      FAIL
      {%- endif %}
    details_04: >-
      {%- if not (package_installed | default(false) | bool) -%}
      crypto-policies package not installed, skipping checks
      {%- elif (status_02 | default('ERROR') | trim == 'PASS') and (status_03 | default('ERROR') | trim == 'PASS') -%}
      All checks passed, SHA1 disabled correctly
      {%- else -%}
      One or more checks failed
      {%- endif %}

- name: "Store requirement 04 details"
  ansible.builtin.set_fact:
    task_04_name: "Summarize overall compliance"
    task_04_cmd: "N/A"
    task_04_rc: "N/A"
    data_04: "N/A"
    status_04: "{{ cis_result | trim }}"

- name: "Store requirement 05 details"
  ansible.builtin.set_fact:
    task_05_name: "Generate audit report"
    task_05_cmd: "debug msg"
    task_05_rc: 0
    status_05: "{{ cis_result | default('ERROR') | trim }}"
    details_05: "Report generated successfully"
    data_05: "N/A"

- name: "Req 05 - Generate audit report"
  ansible.builtin.debug:
    msg:
    - "AUDIT REPORT — CIS 1.6.3"
    - "Reference: CIS Benchmark checkpoint 1.6.3"
    - ""
    - "REQUIREMENT 01 - {{ req_01 }}:"
    - "  Task: {{ task_01_name | default('Not recorded') }}"
    - "  Command: {{ task_01_cmd | default('N/A') }}"
    - "  Exit code: {{ task_01_rc | default(-1) }}"
    - "  Data: {{ data_01 | default('') | trim }}"
    - "  Status: {{ status_01 | default('ERROR') | trim }}"
    - "  Details: {{ details_01 | default('') | trim }}"
    - ""
    - "REQUIREMENT 02 - {{ req_02 }}:"
    - "  Task: {{ task_02_name | default('Not recorded') }}"
    - "  Command: {{ task_02_cmd | default('N/A') }}"
    - "  Exit code: {{ task_02_rc | default(-1) }}"
    - "  Data: {{ data_02 | default('') | trim }}"
    - "  Status: {{ status_02 | default('ERROR') | trim }}"
    - "  Details: {{ details_02 | default('') | trim }}"
    - ""
    - "REQUIREMENT 03 - {{ req_03 }}:"
    - "  Task: {{ task_03_name | default('Not recorded') }}"
    - "  Command: {{ task_03_cmd | default('N/A') }}"
    - "  Exit code: {{ task_03_rc | default(-1) }}"
    - "  Data: {{ data_03 | default('') | trim }}"
    - "  Status: {{ status_03 | default('ERROR') | trim }}"
    - "  Details: {{ details_03 | default('') | trim }}"
    - ""
    - "REQUIREMENT 04 - {{ req_04 }}:"
    - "  Task: {{ task_04_name | default('Not recorded') }}"
    - "  Command: {{ task_04_cmd | default('N/A') }}"
    - "  Exit code: {{ task_04_rc | default(-1) }}"
    - "  Data: {{ data_04 | default('') | trim }}"
    - "  Status: {{ status_04 | default('ERROR') | trim }}"
    - "  Details: {{ details_04 | default('') | trim }}"
    - ""
    - "REQUIREMENT 05 - {{ req_05 }}:"
    - "  Task: {{ task_05_name | default('Not recorded') }}"
    - "  Command: {{ task_05_cmd | default('N/A') }}"
    - "  Exit code: {{ task_05_rc | default(-1) }}"
    - "  Data: {{ data_05 | default('') | trim }}"
    - "  Status: {{ status_05 | default('ERROR') | trim }}"
    - "  Details: {{ details_05 | default('') | trim }}"
    - ""
    - "========================================================"
    - "OVERALL COMPLIANCE:"
    - "  Result: {{ cis_result | default('ERROR') | trim }}"
    - "  Details: {{ details_04 | default('Not evaluated') | trim }}"
    - "========================================================"
