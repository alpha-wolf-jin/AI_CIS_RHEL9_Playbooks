---
- name: Initialize meta data variables
  include_vars: cis_audit_var_1_6_3.yml

- name: "Initialize data variables"
  ansible.builtin.set_fact:
    data_01: "Not collected yet"
    status_01: "ERROR"
    details_01: "Not evaluated"
    data_02: "Not collected yet"
    status_02: "ERROR"
    details_02: "Not evaluated"
    data_03: "Not collected yet"
    status_03: "ERROR"
    details_03: "Not evaluated"
    data_04: "Not collected yet"
    status_04: "ERROR"
    details_04: "Not evaluated"
    data_05: "Not collected yet"
    status_05: "ERROR"
    details_05: "Not evaluated"
    task_01_name: "Not executed"
    task_01_cmd: "N/A"
    task_01_rc: -1
    crypto_policies_installed: false

- name: "Req 01 - Check if crypto-policies package is installed"
  ansible.builtin.command: rpm -q crypto-policies
  register: result_01
  failed_when: false
  changed_when: false

- name: "Store requirement 01 details"
  ansible.builtin.set_fact:
    task_01_name: "Check crypto-policies package installed"
    task_01_cmd: "rpm -q crypto-policies"
    task_01_rc: "{{ result_01.rc | default(-1) }}"
    data_01: "{{ result_01.stdout if result_01.rc == 0 else 'package not installed' }}"
    status_01: "{{ 'PASS' if result_01.rc == 0 else 'SKIP' }}"
    details_01: "{{ 'crypto-policies package is installed' if result_01.rc == 0 else 'crypto-policies package not found — entire check SKIP' }}"
    crypto_policies_installed: "{{ result_01.rc == 0 }}"

- name: "Check policy state file exists"
  ansible.builtin.stat:
    path: "{{ crypto_policy_file }}"
  register: policy_file_stat
  when: "crypto_policies_installed | default(false)"

- name: "Set policy file existence fact"
  ansible.builtin.set_fact:
    policy_file_exists: "{{ policy_file_stat.stat.exists | default(false) }}"
  when: "crypto_policies_installed | default(false)"

- name: "Req 02 - Check SHA1 hash/sign support disabled"
  ansible.builtin.shell: |
    awk -F= '($1~/(hash|sign)/ && $2~/SHA1/ && $2!~/^\s*-\s*([^#\n\r]+)?SHA1/){print}' {{ crypto_policy_file }}
  args:
    executable: /bin/bash
  register: result_02
  when: "crypto_policies_installed | default(false) and policy_file_exists | default(false)"
  failed_when: false
  changed_when: false

- name: "Store requirement 02 details"
  ansible.builtin.set_fact:
    task_02_name: "Check SHA1 hash/sign support disabled"
    task_02_cmd: |
      awk -F= '($1~/(hash|sign)/ && $2~/SHA1/ && $2!~/^\s*-\s*([^#\n\r]+)?SHA1/){print}' {{ crypto_policy_file }}
    task_02_rc: "{{ result_02.rc | default(-1) if result_02 is defined else -1 }}"
    data_02: "{{ result_02.stdout | default('') | trim if result_02 is defined else '' }}"
    status_02: >-
      {%- if not (crypto_policies_installed | default(false)) -%}
        SKIP
      {%- elif not (policy_file_exists | default(false)) -%}
        FAIL
      {%- elif (result_02.stdout | default('') | trim) == '' -%}
        PASS
      {%- else -%}
        FAIL
      {%- endif -%}
    details_02: >-
      {%- if not (crypto_policies_installed | default(false)) -%}
        Skipped: crypto-policies package not installed
      {%- elif not (policy_file_exists | default(false)) -%}
        Failed: policy state file not found — cannot verify SHA1 setting
      {%- elif (result_02.stdout | default('') | trim) == '' -%}
        No SHA1 hash/sign lines found — compliant
      {%- else -%}
        SHA1 hash/sign lines found — non-compliant
      {%- endif -%}

- name: "Req 03 - Check sha1_in_certs set to 0"
  ansible.builtin.shell: |
    grep -Psi -- '^\h*sha1_in_certs\h*=\h*' {{ crypto_policy_file }}
  args:
    executable: /bin/bash
  register: result_03
  when: "crypto_policies_installed | default(false) and policy_file_exists | default(false)"
  failed_when: false
  changed_when: false

- name: "Store requirement 03 details"
  ansible.builtin.set_fact:
    task_03_name: "Check sha1_in_certs set to 0"
    task_03_cmd: |
      grep -Psi -- '^\h*sha1_in_certs\h*=\h*' {{ crypto_policy_file }}
    task_03_rc: "{{ result_03.rc | default(-1) if result_03 is defined else -1 }}"
    data_03: "{{ result_03.stdout | default('') | trim if result_03 is defined else '' }}"
    status_03: >-
      {%- if not (crypto_policies_installed | default(false)) -%}
        SKIP
      {%- elif not (policy_file_exists | default(false)) -%}
        FAIL
      {%- elif 'sha1_in_certs = 0' in result_03.stdout | default('') -%}
        PASS
      {%- else -%}
        FAIL
      {%- endif -%}
    details_03: >-
      {%- if not (crypto_policies_installed | default(false)) -%}
        Skipped: crypto-policies package not installed
      {%- elif not (policy_file_exists | default(false)) -%}
        Failed: policy state file not found — cannot verify sha1_in_certs
      {%- elif 'sha1_in_certs = 0' in result_03.stdout | default('') -%}
        sha1_in_certs = 0 — compliant
      {%- else -%}
        sha1_in_certs not 0 or missing — non-compliant
      {%- endif -%}

- name: "Req 04 - Determine overall compliance status"
  ansible.builtin.set_fact:
    cis_result: >-
      {%- if not (crypto_policies_installed | default(false)) -%}
        SKIP
      {%- elif status_02 | trim == 'PASS' and status_03 | trim == 'PASS' -%}
        PASS
      {%- else -%}
        FAIL
      {%- endif -%}

- name: "Req 04 - Store summary details"
  ansible.builtin.set_fact:
    status_04: "{{ cis_result | trim }}"
    data_04: "Overall compliance: {{ cis_result | trim }}"
    details_04: "Summary derived from requirements 02 and 03"
    task_04_name: "Summarize overall compliance status"
    task_04_cmd: "N/A"
    task_04_rc: 0

- name: "Req 05 - Store final audit result in cis_result"
  ansible.builtin.set_fact:
    status_05: "{{ cis_result | trim }}"
    data_05: "cis_result = {{ cis_result | trim }}"
    details_05: "Final audit result stored"
    task_05_name: "Store final audit result"
    task_05_cmd: "N/A"
    task_05_rc: 0

- name: "Generate audit report"
  ansible.builtin.debug:
    msg:
    - "AUDIT REPORT — CIS 1.6.3"
    - "Reference: CIS Benchmark checkpoint 1.6.3"
    - ""
    - "REQUIREMENT 01 - {{ req_01 }}"
    - "  Task: {{ task_01_name | default('Not recorded') }}"
    - "  Command: {{ task_01_cmd | default('N/A') }}"
    - "  Exit code: {{ task_01_rc | default(-1) }}"
    - "  Data: {{ data_01 | default('') | trim }}"
    - "  Status: {{ status_01 | default('ERROR') | trim }}"
    - "  Details: {{ details_01 | default('') | trim }}"
    - ""
    - "REQUIREMENT 02 - {{ req_02 }}"
    - "  Task: {{ task_02_name | default('Not recorded') }}"
    - "  Command: {{ task_02_cmd | default('N/A') }}"
    - "  Exit code: {{ task_02_rc | default(-1) }}"
    - "  Data: {{ data_02 | default('') | trim }}"
    - "  Status: {{ status_02 | default('ERROR') | trim }}"
    - "  Details: {{ details_02 | default('') | trim }}"
    - ""
    - "REQUIREMENT 03 - {{ req_03 }}"
    - "  Task: {{ task_03_name | default('Not recorded') }}"
    - "  Command: {{ task_03_cmd | default('N/A') }}"
    - "  Exit code: {{ task_03_rc | default(-1) }}"
    - "  Data: {{ data_03 | default('') | trim }}"
    - "  Status: {{ status_03 | default('ERROR') | trim }}"
    - "  Details: {{ details_03 | default('') | trim }}"
    - ""
    - "REQUIREMENT 04 - {{ req_04 }}"
    - "  Task: {{ task_04_name | default('Not recorded') }}"
    - "  Command: {{ task_04_cmd | default('N/A') }}"
    - "  Exit code: {{ task_04_rc | default(-1) }}"
    - "  Data: {{ data_04 | default('') | trim }}"
    - "  Status: {{ status_04 | default('ERROR') | trim }}"
    - "  Details: {{ details_04 | default('') | trim }}"
    - ""
    - "REQUIREMENT 05 - {{ req_05 }}"
    - "  Task: {{ task_05_name | default('Not recorded') }}"
    - "  Command: {{ task_05_cmd | default('N/A') }}"
    - "  Exit code: {{ task_05_rc | default(-1) }}"
    - "  Data: {{ data_05 | default('') | trim }}"
    - "  Status: {{ status_05 | default('ERROR') | trim }}"
    - "  Details: {{ details_05 | default('') | trim }}"
    - ""
    - "========================================================"
    - "OVERALL COMPLIANCE:"
    - "  Result: {{ cis_result | default('ERROR') | trim }}"
    - "========================================================"
