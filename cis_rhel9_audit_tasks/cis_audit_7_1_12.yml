---
- name: Initialize meta data variables
  include_vars: cis_audit_var_7_1_12.yml

- name: "Snapshot - Create backup directory"
  ansible.builtin.file:
    path: "{{ backup_dir }}"
    state: directory
    mode: '0755'
  changed_when: false

- name: "Snapshot - Check if temporary audit script already exists"
  ansible.builtin.stat:
    path: "{{ audit_script }}"
  register: script_stat_pre

- name: "Snapshot - Store existence marker"
  ansible.builtin.copy:
    dest: "{{ marker_file }}"
    content: "{{ 'true' if script_stat_pre.stat.exists else 'false' }}"
  changed_when: false


- name: "Initialize data variables"
  set_fact:
    task_01_name: "Not executed"
    task_01_cmd: "/bin/bash {{ audit_script }}"
    task_01_rc: -1
    data_01: ""
    status_01: "UNKNOWN"
    details_01: ""
    task_02_name: "Not executed"
    task_02_cmd: "N/A"
    task_02_rc: -1
    data_02: ""
    status_02: "UNKNOWN"
    details_02: ""
    task_03_name: "Not executed"
    task_03_cmd: "N/A"
    task_03_rc: -1
    data_03: ""
    status_03: "UNKNOWN"
    details_03: ""
    compliance_status_02: "UNKNOWN"

- block:
  - name: "Req 01 - Copy audit script to remote host"
    ansible.builtin.copy:
      dest: "{{ audit_script }}"
      mode: '0700'
      content: "{{ audit_script_content }}"
    changed_when: false

  - name: "Req 01 - Execute audit script for unowned/ungrouped files"
    ansible.builtin.shell: "/bin/bash '{{ audit_script }}'"
    args:
      executable: /bin/bash
    register: audit_result
    failed_when: false
    changed_when: false

  - name: "Req 01 - Store audit execution details"
    set_fact:
      task_01_name: "Execute audit script for unowned/ungrouped files"
      task_01_cmd: "/bin/bash {{ audit_script }}"
      task_01_rc: "{{ audit_result.rc | default(-1) }}"
      data_01: "{{ audit_result.stdout | default('') | trim }}"
      status_01: "{{ ('PASS' if audit_result.rc | default(-1) | int == 0 else 'FAIL') | trim }}"
      details_01: "{{ ('Script executed successfully' if audit_result.rc | default(-1) | int == 0 else 'Script execution failed with rc=' + (audit_result.rc | default(-1) | string)) | trim }}"

  - name: "Req 02 - Evaluate compliance status and store verification results"
    set_fact:
      task_02_name: "Verify compliance status for unowned and ungrouped files"
      task_02_cmd: "N/A (evaluated from audit script output)"
      task_02_rc: 0
      data_02: "{{ audit_result.stdout | default('') | trim }}"
      status_02: "{{ ('PASS' if ('** PASS **' in audit_result.stdout | default('')) else ('FAIL' if ('** FAIL **' in audit_result.stdout | default('')) else 'UNKNOWN')) | trim }}"
      details_02: "{{ ('Verification completed. Compliance status: PASS' if ('** PASS **' in audit_result.stdout | default('')) else ('Verification completed. Compliance status: FAIL' if ('** FAIL **' in audit_result.stdout | default('')) else 'Verification completed but unable to determine status from script output')) | trim }}"
      compliance_status_02: "{{ ('PASS' if ('** PASS **' in audit_result.stdout | default('')) else ('FAIL' if ('** FAIL **' in audit_result.stdout | default('')) else 'UNKNOWN')) | trim }}"

  - name: "Req 03 - Store final audit result in cis_result"
    set_fact:
      cis_result: "{{ compliance_status_02 }}"
      task_03_name: "Store compliance status as cis_result"
      task_03_cmd: "set_fact cis_result = {{ compliance_status_02 }}"
      task_03_rc: 0
      data_03: "cis_result set to {{ compliance_status_02 }}"
      status_03: "PASS"
      details_03: "Final audit result stored for report"

  always:
  - name: "Restore - Read existence marker"
    ansible.builtin.slurp:
      src: "{{ marker_file }}"
    register: marker_slurp

  - name: "Restore - Remove temporary audit script if it was not present before"
    ansible.builtin.file:
      path: "{{ audit_script }}"
      state: absent
    when: "marker_slurp.content | b64decode | trim == 'false'"
    changed_when: false
    ignore_errors: yes

- name: "Generate audit report"
  debug:
    msg:
    - "AUDIT REPORT — CIS 7.1.12"
    - "Reference: CIS Benchmark checkpoint 7.1.12"
    - ""
    - "REQUIREMENT 01 - {{ req_01 }}:"
    - "  Task: {{ task_01_name | default('Not recorded') }}"
    - "  Command: {{ task_01_cmd | default('N/A') }}"
    - "  Exit code: {{ task_01_rc | default(-1) }}"
    - "  Data: {{ data_01 | default('') | trim }}"
    - "  Status: {{ status_01 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_01 | default('Not evaluated') | trim }}"
    - ""
    - "REQUIREMENT 02 - {{ req_02 }}:"
    - "  Task: {{ task_02_name | default('Not recorded') }}"
    - "  Command: {{ task_02_cmd | default('N/A') }}"
    - "  Exit code: {{ task_02_rc | default(-1) }}"
    - "  Data: {{ data_02 | default('') | trim }}"
    - "  Status: {{ status_02 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_02 | default('Not evaluated') | trim }}"
    - ""
    - "REQUIREMENT 03 - {{ req_03 }}:"
    - "  Task: {{ task_03_name | default('Not recorded') }}"
    - "  Command: {{ task_03_cmd | default('N/A') }}"
    - "  Exit code: {{ task_03_rc | default(-1) }}"
    - "  Data: {{ data_03 | default('') | trim }}"
    - "  Status: {{ status_03 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_03 | default('Not evaluated') | trim }}"
    - ""
    - "========================================================"
    - "OVERALL COMPLIANCE:"
    - "  Result: {{ cis_result | default('UNKNOWN') | trim }}"
    - "========================================================"
