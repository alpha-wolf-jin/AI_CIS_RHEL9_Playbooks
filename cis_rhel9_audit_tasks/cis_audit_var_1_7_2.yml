expected_banner: "Authorized users only. All activity may be monitored and reported."
req_01: "Check if /etc/issue file exists using command: `test -f /etc/issue`. Expected result: file exists."
req_02: "Check the contents of /etc/issue match site policy using command: `cat /etc/issue`. Expected result: contents match site policy."
req_03: |
  Check that /etc/issue does not contain operating system release information (\\v, \\r, \\m, \\s, or the OS ID from /etc/os-release) using command: `grep -E -i \"(\\\\v|\\\\r|\\\\m|\\\\s|$(grep '^ID=' /etc/os-release | cut -d= -f2 | sed -e 's/\"//g'))\" /etc/issue`. Expected result: no results returned.
req_04: "Summarize overall compliance: PASS if all checks pass, SKIP if /etc/issue does not exist, FAIL if the file exists but contents are missing or contain disallowed information."
req_05: "Store the final audit result in a variable named 'cis_result' using set_fact. Set cis_result to the overall compliance status (PASS/FAIL/SKIP/ERROR) derived from the last requirement's status variable."
