---
- name: Initialize meta data variables
  include_vars: cis_audit_var_5_1_15.yml

- name: "Initialize data variables"
  set_fact:
    data_01: "Not collected yet"
    status_01: "UNKNOWN"
    details_01: "Not evaluated"
    data_02: "Not collected yet"
    status_02: "UNKNOWN"
    details_02: "Not evaluated"
    data_03: "Not collected yet"
    status_03: "UNKNOWN"
    details_03: "Not evaluated"
    data_04: "Not collected yet"
    status_04: "UNKNOWN"
    details_04: "Not evaluated"
    data_05: "Not collected yet"
    status_05: "UNKNOWN"
    details_05: "Not evaluated"
    data_06: "Not collected yet"
    status_06: "UNKNOWN"
    details_06: "Not evaluated"
    task_01_name: "Not executed"
    task_01_cmd: "N/A"
    task_01_rc: -1
    task_02_name: "Not executed"
    task_02_cmd: "N/A"
    task_02_rc: -1

- name: "Req 01 - Check if OpenSSH server is installed"
  shell: dpkg -l | grep openssh-server || rpm -q openssh-server
  args:
    executable: /bin/bash
  register: result_01
  failed_when: false
  changed_when: false

- name: "Store requirement 01 details"
  set_fact:
    sshd_installed: "{{ result_01.rc == 0 }}"
    task_01_name: "Check if OpenSSH server is installed"
    task_01_cmd: "dpkg -l | grep openssh-server || rpm -q openssh-server"
    task_01_rc: "{{ result_01.rc | default(-1) }}"
    data_01: "{{ result_01.stdout | default('') | trim }}"
    status_01: "{{ ('PASS' if result_01.rc == 0 else 'FAIL') | trim }}"
    details_01: "{{ ('OpenSSH server is installed' if result_01.rc == 0 else 'OpenSSH server not found') | trim }}"

- name: "Req 02 - Check if sshd service is running"
  shell: systemctl is-active sshd || service sshd status
  args:
    executable: /bin/bash
  register: result_02
  when: sshd_installed | bool
  failed_when: false
  changed_when: false

- name: "Store requirement 02 details"
  set_fact:
    sshd_running: "{{ result_02.rc | default(1) == 0 }}"
    task_02_name: "Check if sshd service is running"
    task_02_cmd: "systemctl is-active sshd || service sshd status"
    task_02_rc: "{{ result_02.rc | default(-1) }}"
    data_02: "{{ result_02.stdout | default('') | trim }}"
    status_02: "{{ ('PASS' if result_02.rc | default(-1) == 0 else 'FAIL') | trim }}"
    details_02: "{{ ('sshd is running' if result_02.rc | default(-1) == 0 else 'sshd is not running or check failed') | trim }}"
  when: sshd_installed | bool

- name: "Req 03 - Check current LogLevel setting in sshd configuration"
  shell: sshd -T | grep loglevel
  args:
    executable: /bin/bash
  register: result_03
  when:
  - sshd_installed | bool
  - sshd_running | default(false) | bool
  failed_when: false
  changed_when: false

- name: "Store requirement 03 details"
  set_fact:
    task_03_name: "Check current LogLevel setting in sshd configuration"
    task_03_cmd: "sshd -T | grep loglevel"
    task_03_rc: "{{ result_03.rc | default(-1) }}"
    data_03: "{{ result_03.stdout | default('') | trim }}"
    status_03: >-
      {%- if not (sshd_installed | default(false) | bool) or not (sshd_running | default(false) | bool) -%}SKIP
      {%- elif result_03.rc | default(-1) == 0 and ('VERBOSE' in result_03.stdout | default('') or 'INFO' in result_03.stdout | default('')) -%}PASS
      {%- else -%}FAIL
      {%- endif -%}
    details_03: >-
      {%- if not (sshd_installed | default(false) | bool) or not (sshd_running | default(false) | bool) -%}OpenSSH server not installed or not running
      {%- elif result_03.rc | default(-1) == 0 and ('VERBOSE' in result_03.stdout | default('') or 'INFO' in result_03.stdout | default('')) -%}LogLevel is correctly set to VERBOSE or INFO
      {%- else -%}LogLevel setting not compliant or check failed
      {%- endif -%}

- name: "Req 04 - Check LogLevel for specific user in sshd Match blocks"
  shell: sshd -T -C user=sshuser | grep loglevel
  args:
    executable: /bin/bash
  register: result_04
  when:
  - sshd_installed | bool
  - sshd_running | default(false) | bool
  failed_when: false
  changed_when: false

- name: "Store requirement 04 details"
  set_fact:
    task_04_name: "Check LogLevel for specific user in sshd Match blocks"
    task_04_cmd: "sshd -T -C user=sshuser | grep loglevel"
    task_04_rc: "{{ result_04.rc | default(-1) }}"
    data_04: "{{ result_04.stdout | default('') | trim }}"
    status_04: >-
      {%- if not (sshd_installed | default(false) | bool) or not (sshd_running | default(false) | bool) -%}SKIP
      {%- elif result_04.rc | default(-1) == 0 and ('VERBOSE' in result_04.stdout | default('') or 'INFO' in result_04.stdout | default('')) -%}PASS
      {%- else -%}FAIL
      {%- endif -%}
    details_04: >-
      {%- if not (sshd_installed | default(false) | bool) or not (sshd_running | default(false) | bool) -%}OpenSSH server not installed or not running
      {%- elif result_04.rc == 0 and ('VERBOSE' in result_04.stdout | default('') or 'INFO' in result_04.stdout | default('')) -%}Match block LogLevel is compliant (VERBOSE or INFO)
      {%- else -%}Match block LogLevel not compliant or check failed
      {%- endif -%}

- name: "Req 05 - Summarize overall compliance"
  set_fact:
    task_05_name: "Summarize overall compliance"
    task_05_cmd: "Evaluation of data from previous checks"
    task_05_rc: 0
    data_05: "Overall compliance evaluated"
    status_05: >-
      {%- if (not (sshd_installed | default(false) | bool)) or (not (sshd_running | default(false) | bool)) -%}SKIP
      {%- elif status_03 == 'PASS' and status_04 == 'PASS' -%}PASS
      {%- else -%}FAIL
      {%- endif -%}
    details_05: >-
      {%- if (not (sshd_installed | default(false) | bool)) or (not (sshd_running | default(false) | bool)) -%}OpenSSH server not installed or not running. All checks skipped.
      {%- elif status_03 == 'PASS' and status_04 == 'PASS' -%}All LogLevel checks compliant: main setting and Match block (if any) are VERBOSE or INFO.
      {%- else -%}One or more LogLevel checks failed: main setting or Match block not compliant with VERBOSE or INFO.
      {%- endif -%}

- name: "Store requirement 06 details - set cis_result"
  set_fact:
    cis_result: "{{ status_05 }}"
    task_06_name: "Store final audit result in cis_result"
    task_06_cmd: "set_fact: cis_result = {{ status_05 }}"
    task_06_rc: 0
    data_06: "cis_result set to {{ status_05 }}"
    status_06: "{{ status_05 }}"
    details_06: "cis_result variable created with overall compliance status"

- name: "Generate audit report"
  debug:
    msg:
    - "AUDIT REPORT — CIS 5.1.15"
    - "Reference: CIS Benchmark checkpoint 5.1.15"
    - ""
    - "REQUIREMENT 01 - {{ req_01 }}:"
    - "  Task: {{ task_01_name | default('Not recorded') }}"
    - "  Command: {{ task_01_cmd | default('N/A') }}"
    - "  Exit code: {{ task_01_rc | default(-1) }}"
    - "  Data: {{ data_01 | default('') | trim }}"
    - "  Status: {{ status_01 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_01 | default('') | trim }}"
    - ""
    - "REQUIREMENT 02 - {{ req_02 }}:"
    - "  Task: {{ task_02_name | default('Not recorded') }}"
    - "  Command: {{ task_02_cmd | default('N/A') }}"
    - "  Exit code: {{ task_02_rc | default(-1) }}"
    - "  Data: {{ data_02 | default('') | trim }}"
    - "  Status: {{ status_02 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_02 | default('') | trim }}"
    - ""
    - "REQUIREMENT 03 - {{ req_03 }}:"
    - "  Task: {{ task_03_name | default('Not recorded') }}"
    - "  Command: {{ task_03_cmd | default('N/A') }}"
    - "  Exit code: {{ task_03_rc | default(-1) }}"
    - "  Data: {{ data_03 | default('') | trim }}"
    - "  Status: {{ status_03 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_03 | default('') | trim }}"
    - ""
    - "REQUIREMENT 04 - {{ req_04 }}:"
    - "  Task: {{ task_04_name | default('Not recorded') }}"
    - "  Command: {{ task_04_cmd | default('N/A') }}"
    - "  Exit code: {{ task_04_rc | default(-1) }}"
    - "  Data: {{ data_04 | default('') | trim }}"
    - "  Status: {{ status_04 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_04 | default('') | trim }}"
    - ""
    - "REQUIREMENT 05 - {{ req_05 }}:"
    - "  Task: {{ task_05_name | default('Not recorded') }}"
    - "  Command: {{ task_05_cmd | default('N/A') }}"
    - "  Exit code: {{ task_05_rc | default(-1) }}"
    - "  Data: {{ data_05 | default('') | trim }}"
    - "  Status: {{ status_05 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_05 | default('') | trim }}"
    - ""
    - "REQUIREMENT 06 - {{ req_06 }}:"
    - "  Task: {{ task_06_name | default('Not recorded') }}"
    - "  Command: {{ task_06_cmd | default('N/A') }}"
    - "  Exit code: {{ task_06_rc | default(-1) }}"
    - "  Data: {{ data_06 | default('') | trim }}"
    - "  Status: {{ status_06 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_06 | default('') | trim }}"
    - ""
    - "========================================================"
    - "OVERALL COMPLIANCE:"
    - "  Result: {{ cis_result | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_05 | default('Not evaluated') | trim }}"
    - "========================================================"
