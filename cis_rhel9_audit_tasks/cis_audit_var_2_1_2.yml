req_01: "Check if avahi package is installed using command: `rpm -q avahi`. Expected result: package avahi is not installed"
req_02: "If avahi package is required as a dependency, check that avahi-daemon.socket and avahi-daemon.service are not enabled using command: `systemctl is-enabled avahi-daemon.socket avahi-daemon.service 2>/dev/null | grep 'enabled'`. Expected result: Nothing should be returned"
req_03: "If avahi package is required as a dependency, check that avahi-daemon.socket and avahi-daemon.service are not active using command: `systemctl is-active avahi-daemon.socket avahi-daemon.service 2>/dev/null | grep '^active'`. Expected result: Nothing should be returned"
req_04: "Summarize overall compliance status: Ensure avahi daemon services are not in use, with all checks passing as per the audit procedure."
req_05: "Store the final audit result in a variable named 'cis_result' using set_fact. Set cis_result to the overall compliance status (PASS/FAIL/SKIP/ERROR) derived from the last requirement's status variable."
