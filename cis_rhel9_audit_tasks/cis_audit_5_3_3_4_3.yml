---
- name: Initialize meta data variables
  include_vars: cis_audit_var_5_3_3_4_3.yml

- name: "Initialize data variables"
  set_fact:
    data_01: "Not collected yet"
    status_01: "UNKNOWN"
    details_01: "Not evaluated"
    data_02: "Not collected yet"
    status_02: "UNKNOWN"
    details_02: "Not evaluated"
    data_03: "Not collected yet"
    status_03: "UNKNOWN"
    details_03: "Not evaluated"
    data_04: "Not collected yet"
    status_04: "UNKNOWN"
    details_04: "Not evaluated"
    task_01_name: "Not executed"
    task_01_cmd: "N/A"
    task_01_rc: -1
    task_02_name: "Not executed"
    task_02_cmd: "N/A"
    task_02_rc: -1

- name: "Check PAM configuration files exist"
  shell: ls /etc/pam.d/password-auth /etc/pam.d/system-auth 2>/dev/null
  args:
    executable: /bin/bash
  register: result_01
  failed_when: false
  changed_when: false

- name: "Determine if PAM is installed"
  set_fact:
    pam_installed: "{{ (result_01.stdout_lines | length == 2 and '/etc/pam.d/password-auth' in result_01.stdout_lines and '/etc/pam.d/system-auth' in result_01.stdout_lines) | bool }}"

- name: "Req 01 - Check password hashing algorithm"
  shell: |
    grep -P -- '^\h*password\h+([^#\n\r]+)\h+pam_unix\.so\h+([^#\n\r]+\h+)?(sha512|yescrypt)\b' /etc/pam.d/password-auth /etc/pam.d/system-auth
  args:
    executable: /bin/bash
  register: result_02
  failed_when: false
  changed_when: false
  when: pam_installed | bool

- name: "Check hashing output"
  set_fact:
    hash_ok: >-
      {{ (result_02.stdout is defined and '/etc/pam.d/password-auth:' in result_02.stdout and '/etc/pam.d/system-auth:' in result_02.stdout) | bool }}
  when: pam_installed | bool

- name: "Store hashing check details (Requirement 1)"
  set_fact:
    task_01_name: "Check if pam_unix.so uses strong password hashing"
    task_01_cmd: |
      grep -P -- '^\h*password\h+([^#\n\r]+)\h+pam_unix\.so\h+([^#\n\r]+\h+)?(sha512|yescrypt)\b' /etc/pam.d/password-auth /etc/pam.d/system-auth
    task_01_rc: "{{ result_02.rc | default(-1) }}"
    data_01: "{{ result_02.stdout | default('') | trim }}"
    status_01: "{{ 'PASS' if hash_ok | bool else 'FAIL' }}"
    details_01: "{{ 'Both files contain pam_unix.so with sha512 or yescrypt.' if hash_ok | bool else 'Strong hashing not confirmed in both files.' }}"
  when: pam_installed | bool

- name: "Store hashing check details (Requirement 1) when PAM not installed"
  set_fact:
    task_01_name: "Check if pam_unix.so uses strong password hashing"
    task_01_cmd: |
      grep -P -- '^\h*password\h+([^#\n\r]+)\h+pam_unix\.so\h+([^#\n\r]+\h+)?(sha512|yescrypt)\b' /etc/pam.d/password-auth /etc/pam.d/system-auth
    task_01_rc: -1
    data_01: ""
    status_01: "SKIP"
    details_01: "PAM is not installed; check skipped."
  when: not pam_installed | bool

- name: "Store file existence details (Requirement 2)"
  set_fact:
    task_02_name: "Check PAM installation (both config files exist)"
    task_02_cmd: "ls /etc/pam.d/password-auth /etc/pam.d/system-auth 2>/dev/null"
    task_02_rc: "{{ result_01.rc | default(-1) }}"
    data_02: "{{ result_01.stdout_lines | default([]) | join(', ') | trim }}"
    status_02: "{{ 'PASS' if pam_installed | bool else 'FAIL' }}"
    details_02: "{{ 'Both PAM configuration files exist.' if pam_installed | bool else 'One or both PAM configuration files are missing.' }}"

- name: "Evaluate overall compliance"
  set_fact:
    task_03_name: "Summarize overall compliance"
    task_03_cmd: "N/A"
    task_03_rc: 0
    data_03: "Overall compliance evaluation"
    status_03: >-
      {{ 'SKIP' if not pam_installed | bool
         else ('PASS' if status_01 | trim == 'PASS' and status_02 | trim == 'PASS' else 'FAIL') }}
    details_03: >-
      {{ 'PAM is not installed; audit not applicable.' if not pam_installed | bool
         else ('System is compliant with CIS 5.3.3.4.3.' if status_01 | trim == 'PASS' and status_02 | trim == 'PASS' else 'System is NOT compliant with CIS 5.3.3.4.3.') }}

- name: "Req 04 - Store final audit result in cis_result"
  set_fact:
    cis_result: "{{ status_03 | trim }}"
    task_04_name: "Store final audit result as cis_result"
    task_04_cmd: "set_fact cis_result = {{ status_03 | trim }}"
    task_04_rc: 0
    data_04: "{{ status_03 | trim }}"
    status_04: "PASS"
    details_04: "Successfully stored cis_result as {{ status_03 | trim }}"

- name: "Generate audit report"
  debug:
    msg:
    - "AUDIT REPORT — CIS 5.3.3.4.3"
    - "Reference: CIS Benchmark checkpoint 5.3.3.4.3"
    - ""
    - "REQUIREMENT 01 - {{ req_01 }}:"
    - "  Task: {{ task_01_name | default('Not recorded') }}"
    - "  Command: {{ task_01_cmd | default('N/A') }}"
    - "  Exit code: {{ task_01_rc | default(-1) }}"
    - "  Data: {{ data_01 | default('') | trim }}"
    - "  Status: {{ status_01 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_01 | default('') | trim }}"
    - ""
    - "REQUIREMENT 02 - {{ req_02 }}:"
    - "  Task: {{ task_02_name | default('Not recorded') }}"
    - "  Command: {{ task_02_cmd | default('N/A') }}"
    - "  Exit code: {{ task_02_rc | default(-1) }}"
    - "  Data: {{ data_02 | default('') | trim }}"
    - "  Status: {{ status_02 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_02 | default('') | trim }}"
    - ""
    - "REQUIREMENT 03 - {{ req_03 }}:"
    - "  Task: {{ task_03_name | default('Not recorded') }}"
    - "  Command: {{ task_03_cmd | default('N/A') }}"
    - "  Exit code: {{ task_03_rc | default(-1) }}"
    - "  Data: {{ data_03 | default('') | trim }}"
    - "  Status: {{ status_03 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_03 | default('') | trim }}"
    - ""
    - "REQUIREMENT 04 - {{ req_04 }}:"
    - "  Task: {{ task_04_name | default('Not recorded') }}"
    - "  Command: {{ task_04_cmd | default('N/A') }}"
    - "  Exit code: {{ task_04_rc | default(-1) }}"
    - "  Data: {{ data_04 | default('') | trim }}"
    - "  Status: {{ status_04 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_04 | default('') | trim }}"
    - ""
    - "========================================================"
    - "OVERALL COMPLIANCE:"
    - "  Result: {{ cis_result | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_03 | default('Not evaluated') | trim }}"
    - "========================================================"
