---
- name: Initialize meta data variables
  include_vars: cis_audit_var_6_2_3_1.yml

- name: "Initialize data variables"
  set_fact:
    data_01: "Not collected yet"
    status_01: "UNKNOWN"
    details_01: "Not evaluated"
    data_02: "Not collected yet"
    status_02: "UNKNOWN"
    details_02: "Not evaluated"
    data_03: "Not collected yet"
    status_03: "UNKNOWN"
    details_03: "Not evaluated"
    data_04: "Not collected yet"
    status_04: "UNKNOWN"
    details_04: "Not evaluated"
    task_01_name: "Not executed"
    task_01_cmd: "N/A"
    task_01_rc: -1
    task_02_name: "Not executed"
    task_02_cmd: "N/A"
    task_02_rc: -1
    task_03_name: "Not executed"
    task_03_cmd: "N/A"
    task_03_rc: -1
    task_04_name: "Not executed"
    task_04_cmd: "N/A"
    task_04_rc: -1

    # -----------------------------------------------
    # PRE-CHECK: verify rsyslog is installed at all
# -----------------------------------------------
- name: "Pre-check - Verify rsyslog is installed"
  ansible.builtin.command: rpm -q rsyslog
  register: rsyslog_check
  failed_when: false
  changed_when: false

- name: "Set NOT_APPLICABLE when rsyslog is not present"
  set_fact:
    status_01: "NOT_APPLICABLE"
    status_02: "NOT_APPLICABLE"
    status_03: "NOT_APPLICABLE"
    status_04: "NOT_APPLICABLE"
    cis_result: "NOT_APPLICABLE"
    data_01: "Not applicable – rsyslog not installed"
    data_02: "Not applicable – rsyslog not installed"
    data_03: "Not applicable – rsyslog not installed"
    data_04: "Not applicable"
    details_01: "rsyslog is not installed on this system"
    details_02: "rsyslog is not installed on this system"
    details_03: "rsyslog is not installed, audit not applicable"
    details_04: "Not applicable"
  when: "rsyslog_check.rc != 0"

    # -----------------------------------------------
    # REQUIREMENT 1 – check if rsyslog is active
# -----------------------------------------------
- name: "Req 01 - Check if rsyslog is the active logging service"
  ansible.builtin.command: systemctl is-active rsyslog
  register: result_01
  failed_when: false
  changed_when: false
  when: "rsyslog_check.rc == 0"

- name: "Store requirement 01 details"
  set_fact:
    task_01_name: "Check if rsyslog is the active logging service"
    task_01_cmd: "systemctl is-active rsyslog"
    task_01_rc: "{{ result_01.rc | default(-1) }}"
    data_01: "{{ result_01.stdout | default('') | trim }}"
    status_01: "{{ ('PASS' if result_01.stdout | default('') | trim == 'active' else 'FAIL') | trim }}"
    details_01: "{{ ('Service active' if result_01.stdout | default('') | trim == 'active' else 'Service not active or missing') | trim }}"
  when: "rsyslog_check.rc == 0"

    # -----------------------------------------------
    # REQUIREMENT 2 – check if rsyslog is installed
# -----------------------------------------------
- name: "Req 02 - Check if {{ package_name }} is installed"
  ansible.builtin.shell: rpm -q {{ package_name }}
  args:
    executable: /bin/bash
  register: result_02
  failed_when: false
  changed_when: false
  when: "rsyslog_check.rc == 0"

- name: "Store requirement 02 details"
  set_fact:
    task_02_name: "Check if {{ package_name }} is installed"
    task_02_cmd: "rpm -q {{ package_name }}"
    task_02_rc: "{{ result_02.rc | default(-1) }}"
    data_02: "{{ result_02.stdout | default('') | trim }}"
    status_02: >-
      {{ ('PASS' if (result_02.rc | default(-1) == 0) and (result_02.stdout | regex_search(expected_version_pattern)) else 'FAIL') | trim }}
    details_02: >-
      {{ ('Package installed with valid version' if (result_02.rc | default(-1) == 0) and (result_02.stdout | regex_search(expected_version_pattern)) else 'Package not installed or version pattern mismatch') | trim }}
  when: "rsyslog_check.rc == 0"

    # -----------------------------------------------
    # REQUIREMENT 3 – overall compliance
# -----------------------------------------------
- name: "Req 03 - Summarize overall compliance status"
  set_fact:
    task_03_name: "Summarize overall compliance status"
    task_03_cmd: "Logic evaluation (service active + package installed)"
    task_03_rc: "0"
    data_03: "Service active: {{ status_01 | default('UNKNOWN') | trim }}, Package installed: {{ status_02 | default('UNKNOWN') | trim }}"
    status_03: >-
      {{ 'PASS' if (status_01 | default('UNKNOWN') | trim) == 'PASS' and (status_02 | default('UNKNOWN') | trim) == 'PASS'
         else 'FAIL' if (status_01 | default('UNKNOWN') | trim) == 'PASS' and (status_02 | default('UNKNOWN') | trim) != 'PASS'
         else 'SKIP' }}
    details_03: >-
      {{ 'Both checks passed' if (status_01 | default('UNKNOWN') | trim) == 'PASS' and (status_02 | default('UNKNOWN') | trim) == 'PASS'
         else 'Service active but package not compliant' if (status_01 | default('UNKNOWN') | trim) == 'PASS'
         else 'rsyslog is not the active logging service' }}
  when: "rsyslog_check.rc == 0"

    # -----------------------------------------------
    # REQUIREMENT 4 – store cis_result
# -----------------------------------------------
- name: "Req 04 - Store final audit result in cis_result"
  set_fact:
    task_04_name: "Store cis_result"
    task_04_cmd: "set_fact: cis_result = overall compliance status"
    task_04_rc: "0"
    data_04: "cis_result: {{ status_03 | default('UNKNOWN') | trim }}"
    status_04: "PASS"
    details_04: "Stored final compliance status"
    cis_result: "{{ status_03 | default('UNKNOWN') | trim }}"
  when: "rsyslog_check.rc == 0"

    # -----------------------------------------------
    # FINAL REPORT
# -----------------------------------------------
- name: "Generate audit report"
  debug:
    msg:
    - "AUDIT REPORT — CIS 6.2.3.1"
    - "Reference: CIS Benchmark checkpoint 6.2.3.1"
    - ""
    - "REQUIREMENT 01 - {{ req_01 }}:"
    - "  Task: {{ task_01_name | default('Not recorded') }}"
    - "  Command: {{ task_01_cmd | default('N/A') }}"
    - "  Exit code: {{ task_01_rc | default(-1) }}"
    - "  Data: {{ data_01 | default('') | trim }}"
    - "  Status: {{ status_01 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_01 | default('') | trim }}"
    - ""
    - "REQUIREMENT 02 - {{ req_02 }}:"
    - "  Task: {{ task_02_name | default('Not recorded') }}"
    - "  Command: {{ task_02_cmd | default('N/A') }}"
    - "  Exit code: {{ task_02_rc | default(-1) }}"
    - "  Data: {{ data_02 | default('') | trim }}"
    - "  Status: {{ status_02 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_02 | default('') | trim }}"
    - ""
    - "REQUIREMENT 03 - {{ req_03 }}:"
    - "  Task: {{ task_03_name | default('Not recorded') }}"
    - "  Command: {{ task_03_cmd | default('N/A') }}"
    - "  Exit code: {{ task_03_rc | default(-1) }}"
    - "  Data: {{ data_03 | default('') | trim }}"
    - "  Status: {{ status_03 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_03 | default('') | trim }}"
    - ""
    - "REQUIREMENT 04 - {{ req_04 }}:"
    - "  Task: {{ task_04_name | default('Not recorded') }}"
    - "  Command: {{ task_04_cmd | default('N/A') }}"
    - "  Exit code: {{ task_04_rc | default(-1) }}"
    - "  Data: {{ data_04 | default('') | trim }}"
    - "  Status: {{ status_04 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_04 | default('') | trim }}"
    - ""
    - "========================================================"
    - "OVERALL COMPLIANCE:"
    - "  Result: {{ cis_result | default('UNKNOWN') | trim }}"
    - "========================================================"
