---
- name: Initialize meta data variables
  include_vars: cis_audit_var_2_2_4.yml

- name: "Initialize data variables"
  set_fact:
    task_01_name: ""
    task_01_cmd: "N/A"
    task_01_rc: -1
    data_01: ""
    status_01: "ERROR"
    details_01: "Not evaluated"
    task_02_name: ""
    task_02_cmd: "N/A"
    task_02_rc: -1
    data_02: ""
    status_02: "ERROR"
    details_02: "Not evaluated"

- name: "Req 01 - Check if telnet client package is installed using rpm -q telnet"
  ansible.builtin.shell: rpm -q telnet
  args:
    executable: /bin/bash
  register: result_01
  failed_when: false
  changed_when: false

- name: "Store requirement 01 details"
  set_fact:
    task_01_name: "Check if telnet client package is installed using rpm -q telnet"
    task_01_cmd: "rpm -q telnet"
    task_01_rc: "{{ result_01.rc | default(-1) }}"
    data_01: "{{ result_01.stdout | default('') | trim }}"
    status_01: "{{ 'PASS' if (result_01.rc | default(-1)) == 1 else ('FAIL' if (result_01.rc | default(-1)) == 0 else 'ERROR') }}"
    details_01: "{{ 'telnet client is not installed (compliance met)' if (result_01.rc | default(-1)) == 1 else ('telnet client IS installed (non-compliant)' if (result_01.rc | default(-1)) == 0 else 'Cannot determine from rpm output') }}"

- name: "Req 02 - Summarize overall compliance status"
  set_fact:
    task_02_name: "Evaluate overall compliance"
    task_02_cmd: "set_fact"
    task_02_rc: 0
    data_02: "{{ data_01 }}"
    status_02: "{{ status_01 }}"
    details_02: "{{ details_01 }}"

- name: "Store final audit result in cis_result"
  set_fact:
    cis_result: "{{ status_02 }}"

- name: "Generate audit report"
  debug:
    msg:
    - "AUDIT REPORT — CIS 2.2.4"
    - "Reference: CIS Benchmark checkpoint 2.2.4"
    - ""
    - "REQUIREMENT 01 - {{ req_01 }}:"
    - "  Task: {{ task_01_name | default('Not recorded') }}"
    - "  Command: {{ task_01_cmd | default('N/A') }}"
    - "  Exit code: {{ task_01_rc | default(-1) }}"
    - "  Data: {{ data_01 | default('') | trim }}"
    - "  Status: {{ status_01 | default('ERROR') | trim }}"
    - "  Details: {{ details_01 | default('') | trim }}"
    - ""
    - "REQUIREMENT 02 - {{ req_02 }}:"
    - "  Task: {{ task_02_name | default('Not recorded') }}"
    - "  Command: {{ task_02_cmd | default('N/A') }}"
    - "  Exit code: {{ task_02_rc | default(-1) }}"
    - "  Data: {{ data_02 | default('') | trim }}"
    - "  Status: {{ status_02 | default('ERROR') | trim }}"
    - "  Details: {{ details_02 | default('') | trim }}"
    - ""
    - "========================================================"
    - "OVERALL COMPLIANCE:"
    - "  Result: {{ cis_result | default('ERROR') | trim }}"
    - "  Details: {{ details_02 | default('Not evaluated') | trim }}"
    - "========================================================"
