req_01: "Check if OpenSSH server is installed using command: `which sshd || dpkg -l | grep openssh-server || rpm -q openssh-server`. Expected result: sshd binary or package is present."
req_02: |
  Check if sshd access restrictions are configured using command: `sshd -T | grep -Pi -- '^\\h*(allow|deny)(users|groups)\\h+\\H+'`. Expected result: Output matches at least one of: allowusers <userlist>, allowgroups <grouplist>, denyusers <userlist>, denygroups <grouplist>.
req_03: "Review the user/group lists from the previous command to ensure they follow local site policy. Expected result: Users and groups in the list are authorized per local policy."
req_04: |
  If Match blocks are used, check for specific user (e.g., sshuser) using command: `sshd -T -C user=sshuser | grep -Pi -- '^\\h*(allow|deny)(users|groups)\\h+\\H+'`. Expected result: Output matches at least one of the allowed/denied directives for that user context.
req_05: "Summarize overall compliance status: Verify that at least one of the four directives (allowusers, allowgroups, denyusers, denygroups) is configured and that all listed users/groups comply with local policy. Expected result: All checks pass."
req_06: "Store the final audit result in a variable named 'cis_result' using set_fact. Set cis_result to the overall compliance status (PASS/FAIL/SKIP/UNKNOWN) derived from the last requirement's status variable."
