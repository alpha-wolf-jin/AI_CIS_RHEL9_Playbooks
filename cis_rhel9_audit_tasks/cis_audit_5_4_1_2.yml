---
- name: Initialize meta data variables
  include_vars: cis_audit_var_5_4_1_2.yml

- name: "Initialize data variables"
  ansible.builtin.set_fact:
    data_01: "Not collected yet"
    status_01: "UNKNOWN"
    details_01: "Not evaluated"
    task_01_name: "Not executed"
    task_01_cmd: "N/A"
    task_01_rc: -1
    data_02: "Not collected yet"
    status_02: "UNKNOWN"
    details_02: "Not evaluated"
    task_02_name: "Not executed"
    task_02_cmd: "N/A"
    task_02_rc: -1
    data_03: "Not collected yet"
    status_03: "UNKNOWN"
    details_03: "Not evaluated"
    task_03_name: "Not executed"
    task_03_cmd: "N/A"
    task_03_rc: -1
    data_04: "Not collected yet"
    status_04: "UNKNOWN"
    details_04: "Not evaluated"
    task_04_name: "Not executed"
    task_04_cmd: "N/A"
    task_04_rc: -1
    data_05: "Not collected yet"
    status_05: "UNKNOWN"
    details_05: "Not evaluated"
    task_05_name: "Not executed"
    task_05_cmd: "N/A"
    task_05_rc: -1

- name: "Req 01 - Check if /etc/login.defs exists"
  ansible.builtin.shell: test -f /etc/login.defs
  args:
    executable: /bin/bash
  register: result_01
  failed_when: false
  changed_when: false

- name: "Store requirement 01 details"
  ansible.builtin.set_fact:
    task_01_name: "Check if /etc/login.defs exists"
    task_01_cmd: "test -f /etc/login.defs"
    task_01_rc: "{{ result_01.rc | default(-1) }}"
    data_01: "{{ 'File exists' if (result_01.rc | default(-1)) == 0 else 'File not found' }}"
    status_01: "{{ 'PASS' if (result_01.rc | default(-1)) == 0 else 'FAIL' }}"
    details_01: "{{ 'File /etc/login.defs exists' if (result_01.rc | default(-1)) == 0 else 'File /etc/login.defs does not exist' }}"

- name: "Req 02 - Check PASS_MIN_DAYS in /etc/login.defs"
  ansible.builtin.shell: grep -Pi -- '^\h*PASS_MIN_DAYS\h+[1-9]\d*\b' /etc/login.defs
  args:
    executable: /bin/bash
  register: result_02
  failed_when: false
  changed_when: false

- name: "Store requirement 02 details"
  ansible.builtin.set_fact:
    task_02_name: "Check PASS_MIN_DAYS in /etc/login.defs"
    task_02_cmd: |
      grep -Pi -- '^\\h*PASS_MIN_DAYS\\h+[1-9]\\d*\\b' /etc/login.defs
    task_02_rc: "{{ result_02.rc | default(-1) }}"
    data_02: "{{ result_02.stdout | default('') | trim }}"
    status_02: "{{ 'PASS' if (result_02.rc | default(-1)) == 0 and (result_02.stdout | default('') | trim) != '' else 'FAIL' }}"
    details_02: "{{ 'PASS_MIN_DAYS found with value > 0' if (result_02.rc | default(-1)) == 0 and (result_02.stdout | default('') | trim) != '' else 'PASS_MIN_DAYS not found or value <= 0' }}"

- name: "Req 03 - Check PASS_MIN_DAYS in /etc/shadow for all users"
  ansible.builtin.shell: |
    awk -F: '($2~/^\$.+\$/) {if($4 < 1)print "User: " $1 " PASS_MIN_DAYS: " $4}' /etc/shadow
  args:
    executable: /bin/bash
  register: result_03
  failed_when: false
  changed_when: false

- name: "Store requirement 03 details"
  ansible.builtin.set_fact:
    task_03_name: "Check PASS_MIN_DAYS in /etc/shadow for all users"
    task_03_cmd: |
      awk -F: '($2~/^\\$.+\\$/) {if($4 < 1)print \"User: \" $1 \" PASS_MIN_DAYS: \" $4}' /etc/shadow
    task_03_rc: "{{ result_03.rc | default(-1) }}"
    data_03: "{{ result_03.stdout | default('') | trim }}"
    status_03: "{{ 'PASS' if (result_03.rc | default(-1)) == 0 and (result_03.stdout | default('') | trim) == '' else 'FAIL' }}"
    details_03: "{{ 'No users with PASS_MIN_DAYS < 1' if (result_03.rc | default(-1)) == 0 and (result_03.stdout | default('') | trim) == '' else 'Users with insufficient PASS_MIN_DAYS found' }}"

- name: "Req 04 - Summarize overall compliance status"
  ansible.builtin.set_fact:
    compliance_status: "{{ 'PASS' if (status_02 | default('UNKNOWN') | trim) == 'PASS' and (status_03 | default('UNKNOWN') | trim) == 'PASS' else 'FAIL' }}"
    task_04_name: "Summarize overall compliance"
    task_04_cmd: "N/A"
    task_04_rc: 0
    data_04: "{{ 'PASS' if (status_02 | default('UNKNOWN') | trim) == 'PASS' and (status_03 | default('UNKNOWN') | trim) == 'PASS' else 'FAIL' }}"
    status_04: "{{ 'PASS' if (status_02 | default('UNKNOWN') | trim) == 'PASS' and (status_03 | default('UNKNOWN') | trim) == 'PASS' else 'FAIL' }}"
    details_04: "{{ 'Both checks passed' if (status_02 | default('UNKNOWN') | trim) == 'PASS' and (status_03 | default('UNKNOWN') | trim) == 'PASS' else 'One or more checks failed' }}"

- name: "Req 05 - Store final audit result as cis_result"
  ansible.builtin.set_fact:
    cis_result: "{{ compliance_status | default('UNKNOWN') | trim }}"

- name: "Store requirement 05 details"
  ansible.builtin.set_fact:
    task_05_name: "Store final audit result as cis_result"
    task_05_cmd: "set_fact"
    task_05_rc: 0
    data_05: "{{ cis_result }}"
    status_05: "{{ cis_result }}"
    details_05: "{{ 'Final cis_result set to ' + cis_result }}"

- name: "Generate audit report"
  ansible.builtin.debug:
    msg:
    - "AUDIT REPORT — CIS 5.4.1.2"
    - "Reference: CIS Benchmark checkpoint 5.4.1.2"
    - ""
    - "REQUIREMENT 01 - {{ req_01 }}:"
    - "  Task: {{ task_01_name | default('Not recorded') }}"
    - "  Command: {{ task_01_cmd | default('N/A') }}"
    - "  Exit code: {{ task_01_rc | default(-1) }}"
    - "  Data: {{ data_01 | default('') | trim }}"
    - "  Status: {{ status_01 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_01 | default('') | trim }}"
    - ""
    - "REQUIREMENT 02 - {{ req_02 }}:"
    - "  Task: {{ task_02_name | default('Not recorded') }}"
    - "  Command: {{ task_02_cmd | default('N/A') }}"
    - "  Exit code: {{ task_02_rc | default(-1) }}"
    - "  Data: {{ data_02 | default('') | trim }}"
    - "  Status: {{ status_02 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_02 | default('') | trim }}"
    - ""
    - "REQUIREMENT 03 - {{ req_03 }}:"
    - "  Task: {{ task_03_name | default('Not recorded') }}"
    - "  Command: {{ task_03_cmd | default('N/A') }}"
    - "  Exit code: {{ task_03_rc | default(-1) }}"
    - "  Data: {{ data_03 | default('') | trim }}"
    - "  Status: {{ status_03 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_03 | default('') | trim }}"
    - ""
    - "REQUIREMENT 04 - {{ req_04 }}:"
    - "  Task: {{ task_04_name | default('Not recorded') }}"
    - "  Command: {{ task_04_cmd | default('N/A') }}"
    - "  Exit code: {{ task_04_rc | default(-1) }}"
    - "  Data: {{ data_04 | default('') | trim }}"
    - "  Status: {{ status_04 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_04 | default('') | trim }}"
    - ""
    - "REQUIREMENT 05 - {{ req_05 }}:"
    - "  Task: {{ task_05_name | default('Not recorded') }}"
    - "  Command: {{ task_05_cmd | default('N/A') }}"
    - "  Exit code: {{ task_05_rc | default(-1) }}"
    - "  Data: {{ data_05 | default('') | trim }}"
    - "  Status: {{ status_05 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_05 | default('') | trim }}"
    - ""
    - "========================================================"
    - "OVERALL COMPLIANCE:"
    - "  Result: {{ cis_result | default('UNKNOWN') | trim }}"
    - "========================================================"
