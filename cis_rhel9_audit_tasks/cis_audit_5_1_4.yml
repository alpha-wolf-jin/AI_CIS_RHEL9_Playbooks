---
- name: Initialize meta data variables
  include_vars: cis_audit_var_5_1_4.yml

- name: "Req 01 - Check if OpenSSH server package is installed"
  ansible.builtin.shell: dpkg -l | grep -q openssh-server || rpm -q openssh-server
  args:
    executable: /bin/bash
  register: result_01
  failed_when: false
  changed_when: false

- name: "Store requirement 01 details"
  ansible.builtin.set_fact:
    sshd_installed: "{{ result_01.rc == 0 }}"
    task_01_name: "Req 01 - Check if OpenSSH server package is installed"
    task_01_cmd: |
      dpkg -l | grep -q openssh-server || rpm -q openssh-server
    task_01_rc: "{{ result_01.rc | default(-1) }}"
    data_01: "{{ result_01.stdout | default('') | trim }}"
    status_01: "{{ 'PASS' if result_01.rc == 0 else 'FAIL' }}"
    details_01: "{{ 'OpenSSH server is installed' if result_01.rc == 0 else 'OpenSSH server is NOT installed' }}"

- name: "Req 02 - Check if sshd service is active"
  ansible.builtin.shell: systemctl is-active sshd 2>/dev/null || service sshd status 2>/dev/null
  args:
    executable: /bin/bash
  register: result_02
  failed_when: false
  changed_when: false

- name: "Store requirement 02 details"
  ansible.builtin.set_fact:
    sshd_active: "{{ sshd_installed | bool and result_02.rc == 0 }}"
    task_02_name: "Req 02 - Check if sshd service is active"
    task_02_cmd: |
      systemctl is-active sshd 2>/dev/null || service sshd status 2>/dev/null
    task_02_rc: "{{ result_02.rc | default(-1) }}"
    data_02: "{{ result_02.stdout | default('') | trim }}"
    status_02: "{{ 'PASS' if (sshd_installed | bool) and (result_02.rc | default(-1) == 0) else ('FAIL' if (sshd_installed | bool) else 'SKIP') }}"
    details_02: "{{ 'sshd service is active' if (sshd_installed | bool) and (result_02.rc | default(-1) == 0) else ('sshd service is NOT active' if (sshd_installed | bool) else 'Not applicable (sshd not installed)') }}"

- name: "Initialize placeholder variables for skipped tasks"
  ansible.builtin.set_fact:
    result_03:
      stdout: ""
      rc: -1
    result_04:
      stdout: ""
      rc: -1

- name: "Req 03 - Check sshd ciphers for weak ciphers"
  ansible.builtin.shell: |
    sshd -T | grep -Pi -- '^ciphers\h+\"?([^#\n\r]+,)?((3des|blowfish|cast128|aes(128|192|256))-cbc|arcfour(128|256)?|rijndael-cbc@lysator\.liu\.se|chacha20-poly1305@openssh\.com)\b'
  args:
    executable: /bin/bash
  register: result_03
  failed_when: false
  changed_when: false
  when:
  - sshd_installed | bool
  - sshd_active | bool

- name: "Req 04 - Check if chacha20-poly1305 is present"
  ansible.builtin.shell: sshd -T | grep -i chacha20-poly1305@openssh.com
  args:
    executable: /bin/bash
  register: result_04
  failed_when: false
  changed_when: false
  when:
  - sshd_installed | bool
  - sshd_active | bool

- name: "Evaluate compliance statuses for requirements 03-05"
  ansible.builtin.set_fact:
    task_03_name: "Req 03 - Check sshd ciphers for weak ciphers"
    task_03_cmd: |
      sshd -T | grep -Pi -- '^ciphers\h+\"?([^#\n\r]+,)?((3des|blowfish|cast128|aes(128|192|256))-cbc|arcfour(128|256)?|rijndael-cbc@lysator\.liu\.se|chacha20-poly1305@openssh\.com)\b'
    task_03_rc: "{{ result_03.rc | default(-1) }}"
    data_03: "{{ result_03.stdout | default('') | trim }}"
    status_03: "{{ 'PASS' if (sshd_installed | bool) and (sshd_active | bool) and (result_03.stdout | default('') | trim == '') else ('FAIL' if (sshd_installed | bool) and (sshd_active | bool) else 'SKIP') }}"
    details_03: "{{ 'No weak ciphers found' if (sshd_installed | bool) and (sshd_active | bool) and (result_03.stdout | default('') | trim == '') else ('Weak ciphers found: ' + (result_03.stdout | default('') | trim) if (sshd_installed | bool) and (sshd_active | bool) else 'Not applicable (sshd not installed or not running)') }}"
    task_04_name: "Req 04 - Check if chacha20-poly1305 is present"
    task_04_cmd: |
      sshd -T | grep -i chacha20-poly1305@openssh.com
    task_04_rc: "{{ result_04.rc | default(-1) }}"
    data_04: "{{ result_04.stdout | default('') | trim }}"
    status_04: "{{ 'PASS' if (sshd_installed | bool) and (sshd_active | bool) and (result_04.stdout | default('') | trim == '') else ('FAIL' if (sshd_installed | bool) and (sshd_active | bool) else 'SKIP') }}"
    details_04: "{{ 'chacha20-poly1305@openssh.com not in use' if (sshd_installed | bool) and (sshd_active | bool) and (result_04.stdout | default('') | trim == '') else ('chacha20-poly1305@openssh.com is present; manual review required for CVE-2023-48795 patch status' if (sshd_installed | bool) and (sshd_active | bool) else 'Not applicable (sshd not installed or not running)') }}"
    task_05_name: "Req 05 - Summarize overall compliance"
    task_05_cmd: "N/A"
    task_05_rc: "0"
    data_05: "N/A"
    status_05: >-
      {%- if not (sshd_installed | bool) -%}
        SKIP
      {%- elif not (sshd_active | bool) -%}
        SKIP
      {%- elif (result_03.stdout | default('') | trim != '') or (result_04.stdout | default('') | trim != '') -%}
        FAIL
      {%- else -%}
        PASS
      {%- endif -%}
    details_05: >-
      {%- if not (sshd_installed | bool) -%}
        Not applicable: OpenSSH server not installed
      {%- elif not (sshd_active | bool) -%}
        Not applicable: sshd service not running
      {%- elif (result_03.stdout | default('') | trim != '') or (result_04.stdout | default('') | trim != '') -%}
        Non-compliant: weak ciphers detected or chacha20-poly1305 present without confirmed patch
      {%- else -%}
        Compliant: No weak ciphers and chacha20 not used
      {%- endif -%}

- name: "Req 06 - Store final audit result in cis_result"
  ansible.builtin.set_fact:
    cis_result: "{{ status_05 | default('ERROR') | trim }}"

- name: "Record requirement 06 metadata"
  ansible.builtin.set_fact:
    task_06_name: "Req 06 - Store final audit result in cis_result"
    task_06_cmd: "N/A"
    task_06_rc: "0"
    data_06: "{{ cis_result }}"
    status_06: "{{ cis_result }}"
    details_06: "Final audit result stored as cis_result"

- name: "Generate audit report"
  ansible.builtin.debug:
    msg:
    - "AUDIT REPORT — CIS 5.1.4"
    - "Reference: CIS Benchmark checkpoint 5.1.4"
    - ""
    - "REQUIREMENT 01 - {{ req_01 }}:"
    - "  Task: {{ task_01_name | default('Not recorded') }}"
    - "  Command: {{ task_01_cmd | default('N/A') }}"
    - "  Exit code: {{ task_01_rc | default(-1) }}"
    - "  Data: {{ data_01 | default('') | trim }}"
    - "  Status: {{ status_01 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_01 | default('') | trim }}"
    - ""
    - "REQUIREMENT 02 - {{ req_02 }}:"
    - "  Task: {{ task_02_name | default('Not recorded') }}"
    - "  Command: {{ task_02_cmd | default('N/A') }}"
    - "  Exit code: {{ task_02_rc | default(-1) }}"
    - "  Data: {{ data_02 | default('') | trim }}"
    - "  Status: {{ status_02 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_02 | default('') | trim }}"
    - ""
    - "REQUIREMENT 03 - {{ req_03 }}:"
    - "  Task: {{ task_03_name | default('Not recorded') }}"
    - "  Command: {{ task_03_cmd | default('N/A') }}"
    - "  Exit code: {{ task_03_rc | default(-1) }}"
    - "  Data: {{ data_03 | default('') | trim }}"
    - "  Status: {{ status_03 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_03 | default('') | trim }}"
    - ""
    - "REQUIREMENT 04 - {{ req_04 }}:"
    - "  Task: {{ task_04_name | default('Not recorded') }}"
    - "  Command: {{ task_04_cmd | default('N/A') }}"
    - "  Exit code: {{ task_04_rc | default(-1) }}"
    - "  Data: {{ data_04 | default('') | trim }}"
    - "  Status: {{ status_04 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_04 | default('') | trim }}"
    - ""
    - "REQUIREMENT 05 - {{ req_05 }}:"
    - "  Task: {{ task_05_name | default('Not recorded') }}"
    - "  Command: {{ task_05_cmd | default('N/A') }}"
    - "  Exit code: {{ task_05_rc | default(-1) }}"
    - "  Data: {{ data_05 | default('') | trim }}"
    - "  Status: {{ status_05 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_05 | default('') | trim }}"
    - ""
    - "REQUIREMENT 06 - {{ req_06 }}:"
    - "  Task: {{ task_06_name | default('Not recorded') }}"
    - "  Command: {{ task_06_cmd | default('N/A') }}"
    - "  Exit code: {{ task_06_rc | default(-1) }}"
    - "  Data: {{ data_06 | default('') | trim }}"
    - "  Status: {{ status_06 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_06 | default('') | trim }}"
    - ""
    - "========================================================"
    - "OVERALL COMPLIANCE:"
    - "  Result: {{ cis_result | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_05 | default('Not evaluated') | trim }}"
    - "========================================================"
