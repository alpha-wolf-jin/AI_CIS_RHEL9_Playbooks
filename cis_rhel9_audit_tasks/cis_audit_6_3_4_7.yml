---
- name: Initialize meta data variables
  include_vars: cis_audit_var_6_3_4_7.yml

- name: "Initialize data variables"
  ansible.builtin.set_fact:
    data_01: "Not collected yet"
    status_01: "UNKNOWN"
    details_01: "Not evaluated"
    data_02: "Not collected yet"
    status_02: "UNKNOWN"
    details_02: "Not evaluated"
    data_03: "Not collected yet"
    status_03: "UNKNOWN"
    details_03: "Not evaluated"
    data_04: "Not collected yet"
    status_04: "UNKNOWN"
    details_04: "Not evaluated"
    data_05: "Not collected yet"
    status_05: "UNKNOWN"
    details_05: "Not evaluated"
    task_01_name: "Not executed"
    task_01_cmd: "N/A"
    task_01_rc: -1

# Requirement 1
- name: "Req 01 - Check auditd package installed"
  ansible.builtin.shell: dpkg -l auditd 2>/dev/null || rpm -q audit 2>/dev/null
  args:
    executable: /bin/bash
  register: result_01
  failed_when: false
  changed_when: false

- name: "Store Req 01 details"
  ansible.builtin.set_fact:
    auditd_installed: "{{ result_01.rc == 0 }}"
    task_01_name: "Check auditd package installed"
    task_01_cmd: "dpkg -l auditd 2>/dev/null || rpm -q audit 2>/dev/null"
    task_01_rc: "{{ result_01.rc }}"
    data_01: "{{ result_01.stdout | default('') | trim }}"
    status_01: "{{ 'PASS' if result_01.rc == 0 else 'FAIL' }}"
    details_01: "{{ 'Package installed' if result_01.rc == 0 else 'Package not installed' }}"

# Requirement 2 (corrected)
- name: "Req 02 - Check /etc/audit/ directory exists"
  ansible.builtin.shell: test -d /etc/audit/ && echo 'exists'
  args:
    executable: /bin/bash
  register: result_02
  failed_when: false
  changed_when: false

- name: "Store Req 02 status"
  ansible.builtin.set_fact:
    task_02_name: "Check /etc/audit/ directory exists"
    task_02_cmd: "test -d /etc/audit/ && echo 'exists'"
    task_02_rc: "{{ result_02.rc }}"
    data_02: "{{ result_02.stdout | default('') | trim }}"
    status_02: "{{ 'NOT_APPLICABLE' if not auditd_installed else ('PASS' if result_02.stdout is defined and result_02.stdout | trim == 'exists' else 'FAIL') }}"

- name: "Store Req 02 details"
  ansible.builtin.set_fact:
    details_02: "{{ 'Directory exists' if status_02 == 'PASS' else ('Not applicable, auditd not installed' if status_02 == 'NOT_APPLICABLE' else 'Directory /etc/audit/ does not exist') }}"

# Requirement 3
- name: "Req 03 - Check audit config files group ownership"
  ansible.builtin.shell:
    cmd: |
      find /etc/audit/ -type f \( -name '*.conf' -o -name '*.rules' \) ! -group root
  args:
    executable: /bin/bash
  register: result_03
  failed_when: false
  changed_when: false

- name: "Store Req 03 status"
  ansible.builtin.set_fact:
    task_03_name: "Check audit config files group ownership"
    task_03_cmd: |
      find /etc/audit/ -type f \\( -name '*.conf' -o -name '*.rules' \\) ! -group root
    task_03_rc: "{{ result_03.rc }}"
    data_03: "{{ result_03.stdout | default('') | trim }}"
    status_03: "{{ 'NOT_APPLICABLE' if not auditd_installed else ('PASS' if (result_03.stdout | default('') | trim == '') else 'FAIL') }}"

- name: "Store Req 03 details"
  ansible.builtin.set_fact:
    details_03: "{{ 'All config files owned by group root' if status_03 == 'PASS' else ('Not applicable, auditd not installed' if status_03 == 'NOT_APPLICABLE' else 'Files not owned by group root found: ' + (result_03.stdout | default('') | trim)) }}"

# Requirement 4 - Overall compliance
- name: "Store Req 04 status"
  ansible.builtin.set_fact:
    task_04_name: "Overall compliance evaluation"
    task_04_cmd: "N/A"
    task_04_rc: 0
    data_04: "N/A"
    status_04: "{{ 'NOT_APPLICABLE' if not auditd_installed else ('PASS' if (status_01 == 'PASS' and status_02 == 'PASS' and status_03 == 'PASS') else 'FAIL') }}"

- name: "Store Req 04 details"
  ansible.builtin.set_fact:
    details_04: "{{ 'System compliant with CIS 6.3.4.7' if status_04 == 'PASS' else ('Audit daemon not installed, checkpoint not applicable' if status_04 == 'NOT_APPLICABLE' else 'One or more checks failed') }}"

# Requirement 5 - Store cis_result
- name: "Store final compliance result in cis_result"
  ansible.builtin.set_fact:
    cis_result: "{{ status_04 }}"

- name: "Store Req 05 details"
  ansible.builtin.set_fact:
    task_05_name: "Store final audit result in cis_result"
    task_05_cmd: "set_fact: cis_result = {{ status_04 }}"
    task_05_rc: 0
    data_05: "{{ cis_result }}"
    status_05: "{{ cis_result }}"
    details_05: "{{ 'Overall compliance: ' + cis_result }}"

# Final audit report
- name: "Generate audit report"
  ansible.builtin.debug:
    msg:
    - "AUDIT REPORT — CIS 6.3.4.7"
    - "Reference: CIS Benchmark checkpoint 6.3.4.7"
    - ""
    - "REQUIREMENT 01 - {{ req_01 }}:"
    - "  Task: {{ task_01_name | default('Not recorded') }}"
    - "  Command: {{ task_01_cmd | default('N/A') }}"
    - "  Exit code: {{ task_01_rc | default(-1) }}"
    - "  Data: {{ data_01 | default('') | trim }}"
    - "  Status: {{ status_01 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_01 | default('') | trim }}"
    - ""
    - "REQUIREMENT 02 - {{ req_02 }}:"
    - "  Task: {{ task_02_name | default('Not recorded') }}"
    - "  Command: {{ task_02_cmd | default('N/A') }}"
    - "  Exit code: {{ task_02_rc | default(-1) }}"
    - "  Data: {{ data_02 | default('') | trim }}"
    - "  Status: {{ status_02 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_02 | default('') | trim }}"
    - ""
    - "REQUIREMENT 03 - {{ req_03 }}:"
    - "  Task: {{ task_03_name | default('Not recorded') }}"
    - "  Command: {{ task_03_cmd | default('N/A') }}"
    - "  Exit code: {{ task_03_rc | default(-1) }}"
    - "  Data: {{ data_03 | default('') | trim }}"
    - "  Status: {{ status_03 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_03 | default('') | trim }}"
    - ""
    - "REQUIREMENT 04 - {{ req_04 }}:"
    - "  Task: {{ task_04_name | default('Not recorded') }}"
    - "  Command: {{ task_04_cmd | default('N/A') }}"
    - "  Exit code: {{ task_04_rc | default(-1) }}"
    - "  Data: {{ data_04 | default('') | trim }}"
    - "  Status: {{ status_04 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_04 | default('') | trim }}"
    - ""
    - "REQUIREMENT 05 - {{ req_05 }}:"
    - "  Task: {{ task_05_name | default('Not recorded') }}"
    - "  Command: {{ task_05_cmd | default('N/A') }}"
    - "  Exit code: {{ task_05_rc | default(-1) }}"
    - "  Data: {{ data_05 | default('') | trim }}"
    - "  Status: {{ status_05 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_05 | default('') | trim }}"
    - ""
    - "OVERALL COMPLIANCE:"
    - "  Result: {{ cis_result | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_04 | default('Not evaluated') | trim }}"
