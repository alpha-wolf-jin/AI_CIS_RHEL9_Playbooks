req_01: |
  Run the audit procedure for Ensure at is restricted to authorized users: - IF - at is installed on the system: Run the following command to verify /etc/at.allow: • Exists • Is mode 0640 or more restrictive • Is owned by the user root • Is group owned by the group daemon or group root # stat -Lc 'Access: (%a/%A) Owner: (%U) Group: (%G)' /etc/at.allow Access: (640/-rw-r-----) Owner: (root) Group: (daemon) -OR- Access: (640/-rw-r-----) Owner: (root) Group: (root) Verify mode is 640 or more restrictive, owner is root, and group is daemon or root Run the following command to verify at.deny doesn't exist, -OR- is: • Mode 0640 or more restrictive • Owned by the user root • Group owned by the group daemon or group root # [ -e \"/etc/at.deny\" ] && stat -Lc 'Access: (%a/%A) Owner: (%U) Group: (%G)' /etc/at.deny Access: (640/-rw-r-----) Owner: (root) Group: (daemon) -OR- Access: (640/-rw-r-----) Owner: (root) Group: (root) -OR- Nothing is returned If a value is returned, verify mode is 640 or more restrictive, owner is root, and group is daemon or root. Expected result: Output shows compliance status
req_02: "VERIFY: Summarise compliance status for Ensure at is restricted to authorized users. Expected result: PASS if compliant, FAIL otherwise"
req_03: "Store the final audit result in a variable named 'cis_result' using set_fact. Set cis_result to the overall compliance status (PASS/FAIL/SKIP/ERROR) derived from the last requirement's status variable."
req_04: "Create a task named 'Generate audit report' using debug msg with the specified audit format, then display the overall compliance."
