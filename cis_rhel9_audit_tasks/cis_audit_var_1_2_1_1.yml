req_01: "Check if GPG key configuration is applicable by verifying that RPM package manager is installed using command: `which rpm`. Expected result: non-empty path to rpm binary."
req_02: "Check that all repository GPG key URLs are configured using command: `grep -r gpgkey /etc/yum.repos.d/* /etc/dnf/dnf.conf`. Expected result: one or more lines containing gpgkey URLs."
req_03: |
  List installed GPG keys and verify their details using the full script: `for RPM_PACKAGE in $(rpm -q gpg-pubkey); do echo \"RPM: ${RPM_PACKAGE}\"; RPM_SUMMARY=$(rpm -q --queryformat \"%{SUMMARY}\" \"${RPM_PACKAGE}\"); RPM_PACKAGER=$(rpm -q --queryformat \"%{PACKAGER}\" \"${RPM_PACKAGE}\"); RPM_DATE=$(date +%Y-%m-%d -d \"1970-1-1+$((0x$(rpm -q --queryformat \"%{RELEASE}\" \"${RPM_PACKAGE}\") ))sec\"); RPM_KEY_ID=$(rpm -q --queryformat \"%{VERSION}\" \"${RPM_PACKAGE}\"); echo \"Packager: ${RPM_PACKAGER} Summary: ${RPM_SUMMARY} Creation date: ${RPM_DATE} Key ID: ${RPM_KEY_ID}\"; done`. Expected result: list of installed GPG keys with packager, summary, creation date, and key ID.
req_04: |
  Check locally available GPG keys in /etc/pki/rpm-gpg/ and their source packages using command: `for PACKAGE in $(find /etc/pki/rpm-gpg/ -type f -exec rpm -qf {} \\; | sort -u); do rpm -q --queryformat \"%{NAME}-%{VERSION} %{PACKAGER} %{SUMMARY}\\n\" \"${PACKAGE}\"; done`. Expected result: list of package names, packagers, and summaries for each GPG key file.
req_05: "Summarize overall compliance status: Ensure that all GPG keys are correctly configured, installed, and match expected repository keys. Expected result: all checks pass with no missing or mismatched keys."
req_06: "Store the final audit result in a variable named 'cis_result' using set_fact. Set cis_result to the overall compliance status (PASS/FAIL/SKIP/UNKNOWN) derived from the last requirement's status variable."
