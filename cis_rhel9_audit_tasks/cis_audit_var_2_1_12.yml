req_01: "Check if rpcbind package is installed using command: `rpm -q rpcbind`. Expected result: package rpcbind is not installed"
req_02: "If rpcbind package is installed (required as dependency), check that rpcbind.socket and rpcbind.service are not enabled using command: `systemctl is-enabled rpcbind.socket rpcbind.service 2>/dev/null | grep 'enabled'`. Expected result: Nothing should be returned"
req_03: "If rpcbind package is installed (required as dependency), check that rpcbind.socket and rpcbind.service are not active using command: `systemctl is-active rpcbind.socket rpcbind.service 2>/dev/null | grep '^active'`. Expected result: Nothing should be returned"
req_04: "If rpcbind package is installed and required as a dependency, verify that the dependent package is approved by local site policy. Expected result: Approval documented per local policy"
req_05: "If rpcbind package is installed and required as a dependency, verify that stopping and masking the service and/or socket meets local site policy. Expected result: Compliance with local site policy"
req_06: "Summarize overall compliance status: All checks passed (rpcbind not installed, or if installed, services are disabled/inactive and policy requirements met). Expected result: Compliant"
req_07: "Store the final audit result in a variable named 'cis_result' using set_fact. Set cis_result to the overall compliance status (PASS/FAIL/SKIP/ERROR) derived from the last requirement's status variable."
