---
- name: Initialize meta data variables
  include_vars: cis_audit_var_5_3_3_1_3.yml

- name: "Initialize data variables"
  set_fact:
    data_01: "Not collected yet"
    status_01: "UNKNOWN"
    details_01: "Not evaluated"
    data_02: "Not collected yet"
    status_02: "UNKNOWN"
    details_02: "Not evaluated"
    data_03: "Not collected yet"
    status_03: "UNKNOWN"
    details_03: "Not evaluated"
    data_04: "Not collected yet"
    status_04: "UNKNOWN"
    details_04: "Not evaluated"
    data_05: "Not collected yet"
    status_05: "UNKNOWN"
    details_05: "Not evaluated"
    data_06: "Not collected yet"
    status_06: "UNKNOWN"
    details_06: "Not evaluated"
    task_01_name: "Not executed"
    task_01_cmd: "N/A"
    task_01_rc: -1
    task_02_name: "Not executed"
    task_02_cmd: "N/A"
    task_02_rc: -1
    task_03_name: "Not executed"
    task_03_cmd: "N/A"
    task_03_rc: -1
    task_04_name: "Not executed"
    task_04_cmd: "N/A"
    task_04_rc: -1
    task_05_name: "Not executed"
    task_05_cmd: "N/A"
    task_05_rc: -1
    task_06_name: "Not executed"
    task_06_cmd: "N/A"
    task_06_rc: -1

- name: "Req 01 - Check if faillock configuration file exists"
  ansible.builtin.stat:
    path: /etc/security/faillock.conf
  register: result_01
  failed_when: false

- name: "Store requirement 01 details and set audit applicability"
  set_fact:
    task_01_name: "Check faillock.conf existence"
    task_01_cmd: "test -f /etc/security/faillock.conf"
    task_01_rc: "{{ 0 if result_01.stat.exists else 1 }}"
    data_01: "{{ 'file exists' if result_01.stat.exists else 'file does not exist' }}"
    status_01: "{{ 'PASS' if result_01.stat.exists else 'FAIL' }}"
    details_01: "{{ 'File /etc/security/faillock.conf exists' if result_01.stat.exists else 'File /etc/security/faillock.conf is missing' }}"
    audit_applicable: "{{ result_01.stat.exists }}"

- name: "Req 02 - Check if even_deny_root or root_unlock_time is enabled in faillock.conf"
  ansible.builtin.shell:
    cmd: |
      grep -Pi -- '^\h*(even_deny_root|root_unlock_time\h*=\h*\d+)\b' /etc/security/faillock.conf
    executable: /bin/bash
  register: result_02
  failed_when: false
  changed_when: false
  when: audit_applicable | bool

- name: "Evaluate requirement 02 match"
  set_fact:
    req02_matched: >-
      {{ (result_02.rc | default(-1)) == 0
         and (result_02.stdout | default('') | trim | length) > 0 }}
  when: audit_applicable | bool

- name: "Store requirement 02 details"
  set_fact:
    task_02_name: "Check even_deny_root/root_unlock_time in faillock.conf"
    task_02_cmd: |
      grep -Pi -- '^\h*(even_deny_root|root_unlock_time\h*=\h*\d+)\b' /etc/security/faillock.conf
    task_02_rc: "{{ result_02.rc | default(-1) }}"
    data_02: "{{ result_02.stdout | default('') | trim }}"
    status_02: "{{ 'PASS' if req02_matched | bool else 'FAIL' }}"
    details_02: >-
      {{ 'Configuration found: matches even_deny_root or root_unlock_time'
         if req02_matched | bool
         else 'No matching configuration found' }}
  when: audit_applicable | bool

- name: "Req 03 - Check if root_unlock_time is set to less than 60 seconds in faillock.conf"
  ansible.builtin.shell:
    cmd: |
      grep -Pi -- '^\h*root_unlock_time\h*=\h*([1-9]|[1-5][0-9])\b' /etc/security/faillock.conf
    executable: /bin/bash
  register: result_03
  failed_when: false
  changed_when: false
  when: audit_applicable | bool

- name: "Store requirement 03 details"
  set_fact:
    task_03_name: "Check root_unlock_time < 60 in faillock.conf"
    task_03_cmd: |
      grep -Pi -- '^\h*root_unlock_time\h*=\h*([1-9]|[1-5][0-9])\b' /etc/security/faillock.conf
    task_03_rc: "{{ result_03.rc | default(-1) }}"
    data_03: "{{ result_03.stdout | default('') | trim }}"
    status_03: "{{ 'PASS' if (result_03.rc | default(-1)) == 1 else 'FAIL' }}"
    details_03: >-
      {{ 'No root_unlock_time setting less than 60 found (compliant)' if (result_03.rc | default(-1)) == 1
         else 'root_unlock_time setting less than 60 found: ' + (result_03.stdout | default('') | trim) }}
  when: audit_applicable | bool

- name: "Req 04 - Check if root_unlock_time argument in pam_faillock.so is set to less than 60 seconds"
  ansible.builtin.shell:
    cmd: |
      grep -Pi -- '^\h*auth\h+([^#\n\r]+\h+)pam_faillock\.so\h+([^#\n\r]+\h+)?root_unlock_time\h*=\h*([1-9]|[1-5][0-9])\b' /etc/pam.d/system-auth /etc/pam.d/password-auth
    executable: /bin/bash
  register: result_04
  failed_when: false
  changed_when: false
  when: audit_applicable | bool

- name: "Store requirement 04 details"
  set_fact:
    task_04_name: "Check root_unlock_time < 60 in PAM files"
    task_04_cmd: |
      grep -Pi -- '^\h*auth\h+([^#\n\r]+\h+)pam_faillock\.so\h+([^#\n\r]+\h+)?root_unlock_time\h*=\h*([1-9]|[1-5][0-9])\b' /etc/pam.d/system-auth /etc/pam.d/password-auth
    task_04_rc: "{{ result_04.rc | default(-1) }}"
    data_04: "{{ result_04.stdout | default('') | trim }}"
    status_04: "{{ 'PASS' if (result_04.rc | default(-1)) == 1 else 'FAIL' }}"
    details_04: >-
      {{ 'No root_unlock_time setting less than 60 in PAM (compliant)' if (result_04.rc | default(-1)) == 1
         else 'root_unlock_time setting less than 60 in PAM: ' + (result_04.stdout | default('') | trim) }}
  when: audit_applicable | bool

- name: "Req 05 - Summarize overall compliance"
  set_fact:
    task_05_name: "Compliance evaluation"
    task_05_cmd: "N/A"
    task_05_rc: 0
    data_05: "Overall compliance"
    status_05: >-
      {{ 'NOT_APPLICABLE' if not (audit_applicable | default(false) | bool)
         else ('PASS' if (status_01 == 'PASS' and status_02 == 'PASS' and status_03 == 'PASS' and status_04 == 'PASS') else 'FAIL') }}
    details_05: >-
      {{ 'Software not installed - audit not applicable' if not (audit_applicable | default(false) | bool)
         else ('All checks passed - compliant' if (status_01 == 'PASS' and status_02 == 'PASS' and status_03 == 'PASS' and status_04 == 'PASS')
               else 'One or more checks failed - not compliant') }}

- name: "Req 06 - Store final audit result in cis_result"
  set_fact:
    task_06_name: "Store cis_result"
    task_06_cmd: "N/A"
    task_06_rc: 0
    data_06: "cis_result set"
    status_06: "{{ status_05 | default('UNKNOWN') | trim }}"
    details_06: "Final compliance status recorded as cis_result"
    cis_result: "{{ status_05 | default('UNKNOWN') | trim }}"

- name: "Generate audit report"
  debug:
    msg:
    - "AUDIT REPORT — CIS 5.3.3.1.3"
    - "Reference: CIS Benchmark checkpoint 5.3.3.1.3"
    - ""
    - "REQUIREMENT 01 - {{ req_01 }}"
    - "  Task: {{ task_01_name | default('Not recorded') }}"
    - "  Command: {{ task_01_cmd | default('N/A') }}"
    - "  Exit code: {{ task_01_rc | default(-1) }}"
    - "  Data: {{ data_01 | default('') | trim }}"
    - "  Status: {{ status_01 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_01 | default('') | trim }}"
    - ""
    - "REQUIREMENT 02 - {{ req_02 }}"
    - "  Task: {{ task_02_name | default('Not recorded') }}"
    - "  Command: {{ task_02_cmd | default('N/A') }}"
    - "  Exit code: {{ task_02_rc | default(-1) }}"
    - "  Data: {{ data_02 | default('') | trim }}"
    - "  Status: {{ status_02 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_02 | default('') | trim }}"
    - ""
    - "REQUIREMENT 03 - {{ req_03 }}"
    - "  Task: {{ task_03_name | default('Not recorded') }}"
    - "  Command: {{ task_03_cmd | default('N/A') }}"
    - "  Exit code: {{ task_03_rc | default(-1) }}"
    - "  Data: {{ data_03 | default('') | trim }}"
    - "  Status: {{ status_03 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_03 | default('') | trim }}"
    - ""
    - "REQUIREMENT 04 - {{ req_04 }}"
    - "  Task: {{ task_04_name | default('Not recorded') }}"
    - "  Command: {{ task_04_cmd | default('N/A') }}"
    - "  Exit code: {{ task_04_rc | default(-1) }}"
    - "  Data: {{ data_04 | default('') | trim }}"
    - "  Status: {{ status_04 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_04 | default('') | trim }}"
    - ""
    - "REQUIREMENT 05 - {{ req_05 }}"
    - "  Task: {{ task_05_name | default('Not recorded') }}"
    - "  Command: {{ task_05_cmd | default('N/A') }}"
    - "  Exit code: {{ task_05_rc | default(-1) }}"
    - "  Data: {{ data_05 | default('') | trim }}"
    - "  Status: {{ status_05 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_05 | default('') | trim }}"
    - ""
    - "REQUIREMENT 06 - {{ req_06 }}"
    - "  Task: {{ task_06_name | default('Not recorded') }}"
    - "  Command: {{ task_06_cmd | default('N/A') }}"
    - "  Exit code: {{ task_06_rc | default(-1) }}"
    - "  Data: {{ data_06 | default('') | trim }}"
    - "  Status: {{ status_06 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_06 | default('') | trim }}"
    - ""
    - "========================================================"
    - "OVERALL COMPLIANCE:"
    - "  Result: {{ cis_result | default('UNKNOWN') | trim }}"
    - "========================================================"
