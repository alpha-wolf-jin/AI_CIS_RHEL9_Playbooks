req_01: "Check if CUPS package is installed using command: `rpm -q cups`. Expected result: package cups is not installed"
req_02: "If CUPS package is installed as a dependency, check if cups.socket and cups.service are enabled using command: `systemctl is-enabled cups.socket cups.service 2>/dev/null | grep 'enabled'`. Expected result: Nothing should be returned"
req_03: "If CUPS package is installed as a dependency, check if cups.socket and cups.service are active using command: `systemctl is-active cups.socket cups.service 2>/dev/null | grep '^active'`. Expected result: Nothing should be returned"
req_04: "Summarize overall compliance: Ensure that either CUPS is not installed, or if installed as a dependency, the services and sockets are not enabled or active, and the dependent package is approved by local site policy with masking as per policy."
req_05: "Store the final audit result in a variable named 'cis_result' using set_fact. Set cis_result to the overall compliance status (PASS/FAIL/SKIP/ERROR) derived from the last requirement's status variable."
