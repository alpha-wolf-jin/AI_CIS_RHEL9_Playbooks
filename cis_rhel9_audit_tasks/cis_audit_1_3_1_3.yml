---
- name: Initialize meta data variables
  include_vars: cis_audit_var_1_3_1_3.yml

- name: "Initialize data variables"
  set_fact:
    data_01: "Not collected yet"
    status_01: "UNKNOWN"
    details_01: "Not evaluated"
    data_02: "Not collected yet"
    status_02: "UNKNOWN"
    details_02: "Not evaluated"
    data_03: "Not collected yet"
    status_03: "UNKNOWN"
    details_03: "Not evaluated"
    data_04: "Not collected yet"
    status_04: "UNKNOWN"
    details_04: "Not evaluated"
    data_05: "Not collected yet"
    status_05: "UNKNOWN"
    details_05: "Not evaluated"
    task_01_name: "Not executed"
    task_01_cmd: "N/A"
    task_01_rc: -1
    task_02_name: "Not executed"
    task_02_cmd: "N/A"
    task_02_rc: -1
    task_03_name: "Not executed"
    task_03_cmd: "N/A"
    task_03_rc: -1
    task_04_name: "Not executed"
    task_04_cmd: "N/A"
    task_04_rc: -1
    task_05_name: "Not executed"
    task_05_cmd: "N/A"
    task_05_rc: -1

- name: "Req 01 - Check if selinux-policy-targeted package is installed"
  shell: "rpm -q selinux-policy-targeted"
  args:
    executable: /bin/bash
  register: result_01
  failed_when: false
  changed_when: false

- name: "Store requirement 01 details and determine SELinux presence"
  set_fact:
    selinux_installed: "{{ result_01.rc == 0 }}"
    task_01_name: "Check if selinux-policy-targeted package is installed"
    task_01_cmd: "rpm -q selinux-policy-targeted"
    task_01_rc: "{{ result_01.rc | default(-1) }}"
    data_01: "{{ result_01.stdout | default('') | trim }}"
    status_01: "{{ 'PASS' if result_01.rc == 0 else 'SKIP' }}"
    details_01: "{{ 'Package selinux-policy-targeted is installed.' if result_01.rc == 0 else 'Package not installed; SELinux policy audit skipped.' }}"

- name: "Req 02 - Check SELinux policy type configuration in /etc/selinux/config"
  shell: "grep -E '^[[:space:]]*SELINUXTYPE=(targeted|mls)[[:space:]]*$' /etc/selinux/config"
  args:
    executable: /bin/bash
  register: result_02
  failed_when: false
  changed_when: false
  when: "selinux_installed | default(false) | bool"

- name: "Store requirement 02 details"
  set_fact:
    task_02_name: "Check SELinux policy type configuration"
    task_02_cmd: "grep -E '^[[:space:]]*SELINUXTYPE=(targeted|mls)[[:space:]]*$' /etc/selinux/config"
    task_02_rc: "{{ result_02.rc | default(-1) }}"
    data_02: "{{ result_02.stdout | default('') | trim }}"
    status_02: "{{ 'PASS' if (result_02.rc | default(-1)) == 0 else ('SKIP' if (result_02.skipped | default(false)) else 'FAIL') }}"
    details_02: "{{ 'Configuration matches expected policy type (targeted or mls).' if (result_02.rc | default(-1)) == 0 else ('SELinux policy type check skipped (SELinux not installed).' if (result_02.skipped | default(false)) else 'Configuration does not match expected policy type.') }}"

- name: "Req 03 - Check currently loaded SELinux policy"
  shell: "sestatus | awk '/^Loaded policy name:/{print $NF}'"
  args:
    executable: /bin/bash
  register: result_03
  failed_when: false
  changed_when: false
  when: "selinux_installed | default(false) | bool"

- name: "Store requirement 03 details"
  set_fact:
    task_03_name: "Check currently loaded SELinux policy"
    task_03_cmd: "sestatus | awk '/^Loaded policy name:/{print $NF}'"
    task_03_rc: "{{ result_03.rc | default(-1) }}"
    data_03: "{{ result_03.stdout | default('') | trim }}"
    status_03: "{{ 'SKIP' if (result_03.skipped | default(false)) else ('PASS' if (result_03.stdout | default('') | trim) in ['targeted', 'mls'] else 'FAIL') }}"
    details_03: "{{ 'Loaded policy name matches targeted or mls.' if (not (result_03.skipped | default(false))) and ((result_03.stdout | default('') | trim) in ['targeted', 'mls']) else ('Loaded policy check skipped (SELinux not installed).' if (result_03.skipped | default(false)) else 'Loaded policy does not match expected value.') }}"

- name: "Req 04 - Summarize overall compliance"
  set_fact:
    task_04_name: "Overall compliance assessment"
    task_04_cmd: "N/A"
    task_04_rc: 0
    status_04: "{{ 'PASS' if status_01 == 'PASS' and status_02 == 'PASS' and status_03 == 'PASS' else ('SKIP' if status_01 == 'SKIP' else 'FAIL') }}"
    details_04: "{{ 'SELinux policy is configured to meet or exceed the default targeted policy.' if status_01 == 'PASS' and status_02 == 'PASS' and status_03 == 'PASS' else ('Audit skipped because SELinux is not installed.' if status_01 == 'SKIP' else 'One or more checks failed; SELinux policy does not meet requirement.') }}"
    data_04: "{{ status_01 }}, {{ status_02 }}, {{ status_03 }}"

- name: "Req 05 - Store overall result in cis_result"
  set_fact:
    cis_result: "{{ status_04 | default('UNKNOWN') | trim }}"
    task_05_name: "Store cis_result"
    task_05_cmd: "N/A"
    task_05_rc: 0
    data_05: "{{ status_04 | default('UNKNOWN') | trim }}"
    status_05: "{{ ('PASS' if (status_04 | default('UNKNOWN')) != 'UNKNOWN' else 'UNKNOWN') | trim }}"
    details_05: "{{ ('Overall compliance stored in cis_result.' if (status_04 | default('UNKNOWN')) != 'UNKNOWN' else 'Unable to determine overall compliance.') | trim }}"

- name: "Generate audit report"
  debug:
    msg:
    - "AUDIT REPORT — CIS 1.3.1.3"
    - "Reference: CIS Benchmark checkpoint 1.3.1.3"
    - ""
    - "REQUIREMENT 01 - {{ req_01 }}:"
    - "  Task: {{ task_01_name | default('Not recorded') }}"
    - "  Command: {{ task_01_cmd | default('N/A') }}"
    - "  Exit code: {{ task_01_rc | default(-1) }}"
    - "  Data: {{ data_01 | default('') | trim }}"
    - "  Status: {{ status_01 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_01 | default('') | trim }}"
    - ""
    - "REQUIREMENT 02 - {{ req_02 }}:"
    - "  Task: {{ task_02_name | default('Not recorded') }}"
    - "  Command: {{ task_02_cmd | default('N/A') }}"
    - "  Exit code: {{ task_02_rc | default(-1) }}"
    - "  Data: {{ data_02 | default('') | trim }}"
    - "  Status: {{ status_02 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_02 | default('') | trim }}"
    - ""
    - "REQUIREMENT 03 - {{ req_03 }}:"
    - "  Task: {{ task_03_name | default('Not recorded') }}"
    - "  Command: {{ task_03_cmd | default('N/A') }}"
    - "  Exit code: {{ task_03_rc | default(-1) }}"
    - "  Data: {{ data_03 | default('') | trim }}"
    - "  Status: {{ status_03 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_03 | default('') | trim }}"
    - ""
    - "REQUIREMENT 04 - {{ req_04 }}:"
    - "  Task: {{ task_04_name | default('Not recorded') }}"
    - "  Command: {{ task_04_cmd | default('N/A') }}"
    - "  Exit code: {{ task_04_rc | default(-1) }}"
    - "  Data: {{ data_04 | default('') | trim }}"
    - "  Status: {{ status_04 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_04 | default('') | trim }}"
    - ""
    - "REQUIREMENT 05 - {{ req_05 }}:"
    - "  Task: {{ task_05_name | default('Not recorded') }}"
    - "  Command: {{ task_05_cmd | default('N/A') }}"
    - "  Exit code: {{ task_05_rc | default(-1) }}"
    - "  Data: {{ data_05 | default('') | trim }}"
    - "  Status: {{ status_05 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_05 | default('') | trim }}"
    - ""
    - "========================================================"
    - "OVERALL COMPLIANCE:"
    - "  Result: {{ cis_result | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_04 | default('Not evaluated') | trim }}"
    - "========================================================"
