---
- name: Initialize meta data variables
  include_vars: cis_audit_var_5_4_1_4.yml

- name: "Initialize data variables"
  set_fact:
    data_01: "Not collected yet"
    status_01: "UNKNOWN"
    details_01: "Not evaluated"
    data_02: "Not collected yet"
    status_02: "UNKNOWN"
    details_02: "Not evaluated"
    data_03: "Not collected yet"
    status_03: "UNKNOWN"
    details_03: "Not evaluated"
    task_01_name: "Not executed"
    task_01_cmd: "N/A"
    task_01_rc: -1
    task_02_name: "Not executed"
    task_02_cmd: "N/A"
    task_02_rc: -1
    task_03_name: "Not executed"
    task_03_cmd: "N/A"
    task_03_rc: -1

- name: "Req 01 - Check if /etc/login.defs exists"
  shell: test -f /etc/login.defs && echo 'EXISTS'
  args:
    executable: /bin/bash
  register: result_01
  failed_when: false
  changed_when: false

- name: "Store requirement 01 details"
  set_fact:
    task_01_name: "Req 01 - Check if /etc/login.defs exists"
    task_01_cmd: "test -f /etc/login.defs && echo 'EXISTS'"
    task_01_rc: "{{ result_01.rc | default(-1) }}"
    data_01: "{{ result_01.stdout | default('') | trim }}"
    status_01: "{{ ('PASS' if (result_01.rc | default(-1) == 0 and result_01.stdout | default('') | trim == 'EXISTS') else 'FAIL') | trim }}"
    details_01: "{{ ('File exists' if (result_01.rc | default(-1) == 0 and result_01.stdout | default('') | trim == 'EXISTS') else 'File does not exist or command failed') | trim }}"

- name: "Req 02 - Check ENCRYPT_METHOD setting in /etc/login.defs"
  shell: |
    grep -Pi -- '^\h*ENCRYPT_METHOD\h+(SHA512|yescrypt)\b' /etc/login.defs
  args:
    executable: /bin/bash
  register: result_02
  failed_when: false
  changed_when: false
  when: "data_01 | default('') | trim == 'EXISTS'"

- name: "Store requirement 02 details"
  set_fact:
    task_02_name: "Req 02 - Check ENCRYPT_METHOD setting"
    task_02_cmd: |
      grep -Pi -- '^\\h*ENCRYPT_METHOD\\h+(SHA512|yescrypt)\\b' /etc/login.defs
    task_02_rc: "{{ result_02.rc | default(-1) if result_02 is not skipped else -1 }}"
    data_02: "{{ result_02.stdout | default('') | trim if result_02 is not skipped else '' }}"
    status_02: >-
      {{ 
        'SKIP' if (result_02 is skipped)
        else ('PASS' if (result_02.rc | default(-1) == 0 and result_02.stdout | default('') | trim != '')
        else 'FAIL')
      | trim }}
    details_02: >-
      {{
        'File does not exist, cannot check ENCRYPT_METHOD' if (result_02 is skipped)
        else ('Valid ENCRYPT_METHOD found' if (result_02.rc | default(-1) == 0 and result_02.stdout | default('') | trim != '')
        else 'ENCRYPT_METHOD not set to SHA512 or yescrypt, or grep failed')
      | trim }}

- name: "Req 03 - Summarize compliance status"
  set_fact:
    data_03: "{{ ('Compliant' if (data_01 | default('') | trim == 'EXISTS' and status_02 | default('') | trim == 'PASS') else 'Non-compliant') | trim }}"
    status_03: "{{ ('PASS' if (data_01 | default('') | trim == 'EXISTS' and status_02 | default('') | trim == 'PASS') else 'FAIL') | trim }}"
    details_03: "{{ ('System is compliant: /etc/login.defs exists and ENCRYPT_METHOD is set to a strong algorithm' if (data_01 | default('') | trim == 'EXISTS' and status_02 | default('') | trim == 'PASS') else 'System is non-compliant: either /etc/login.defs missing or ENCRYPT_METHOD not set correctly') | trim }}"
    task_03_name: "Req 03 - Compliance evaluation"
    task_03_cmd: "N/A"
    task_03_rc: 0

- name: "Set cis_result variable"
  set_fact:
    cis_result: "{{ status_03 | trim }}"
  when: "status_03 is defined"

- name: "Generate audit report"
  debug:
    msg:
    - "AUDIT REPORT — CIS 5.4.1.4"
    - "Reference: CIS Benchmark checkpoint 5.4.1.4"
    - ""
    - "REQUIREMENT 01 - {{ req_01 }}:"
    - "  Task: {{ task_01_name | default('Not recorded') }}"
    - "  Command: {{ task_01_cmd | default('N/A') }}"
    - "  Exit code: {{ task_01_rc | default(-1) }}"
    - "  Data: {{ data_01 | default('') | trim }}"
    - "  Status: {{ status_01 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_01 | default('') | trim }}"
    - ""
    - "REQUIREMENT 02 - {{ req_02 }}:"
    - "  Task: {{ task_02_name | default('Not recorded') }}"
    - "  Command: {{ task_02_cmd | default('N/A') }}"
    - "  Exit code: {{ task_02_rc | default(-1) }}"
    - "  Data: {{ data_02 | default('') | trim }}"
    - "  Status: {{ status_02 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_02 | default('') | trim }}"
    - ""
    - "REQUIREMENT 03 - {{ req_03 }}:"
    - "  Task: {{ task_03_name | default('Not recorded') }}"
    - "  Command: {{ task_03_cmd | default('N/A') }}"
    - "  Exit code: {{ task_03_rc | default(-1) }}"
    - "  Data: {{ data_03 | default('') | trim }}"
    - "  Status: {{ status_03 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_03 | default('') | trim }}"
    - ""
    - "========================================================"
    - "OVERALL COMPLIANCE:"
    - "  Result: {{ cis_result | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_03 | default('Not evaluated') | trim }}"
    - "========================================================"
