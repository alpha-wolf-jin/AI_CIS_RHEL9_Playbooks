---
- name: Initialize meta data variables
  include_vars: cis_audit_var_1_1_2_5_2.yml

- name: "Req 01 - Check if a separate partition exists for /var/tmp using findmnt command"
  ansible.builtin.shell: findmnt -kn /var/tmp
  args:
    executable: /bin/bash
  register: result_01
  failed_when: false
  changed_when: false

- name: "Req 02 - Check if nodev option is set on /var/tmp partition using findmnt and grep"
  ansible.builtin.shell: findmnt -kn /var/tmp | grep -v nodev
  args:
    executable: /bin/bash
  register: result_02
  failed_when: false
  changed_when: false

- name: "Set partition existence fact"
  ansible.builtin.set_fact:
    partition_exists: "{{ (result_01.rc | default(-1) == 0) and (result_01.stdout | default('') | trim != '') }}"

- name: "Req 03 - Summarize overall compliance status"
  ansible.builtin.set_fact:
    task_01_name: "Check if a separate partition exists for /var/tmp using findmnt command"
    task_01_cmd: "findmnt -kn /var/tmp"
    task_01_rc: "{{ result_01.rc | default(-1) }}"
    data_01: "{{ result_01.stdout | default('') | trim }}"
    status_01: "{{ 'PASS' if partition_exists else 'FAIL' }}"
    details_01: "{{ 'Separate partition exists for /var/tmp' if partition_exists else 'No separate partition found for /var/tmp' }}"
    task_02_name: "Check if nodev option is set on /var/tmp partition using findmnt and grep"
    task_02_cmd: "findmnt -kn /var/tmp | grep -v nodev"
    task_02_rc: "{{ result_02.rc | default(-1) }}"
    data_02: "{{ result_02.stdout | default('') | trim }}"
    status_02: "{{ 'SKIPPED' if not partition_exists else ('PASS' if (result_02.stdout | default('') | trim) == '' else 'FAIL') }}"
    details_02: "{{ 'No separate partition; check not applicable' if not partition_exists else ('nodev option is set on /var/tmp partition' if (result_02.stdout | default('') | trim) == '' else 'nodev option is NOT set on /var/tmp partition') }}"
    status_03: "{{ 'PASS' if (partition_exists and (result_02.stdout | default('') | trim) == '') else 'FAIL' }}"
    details_03: "{{ 'System is compliant: /var/tmp partition exists with nodev option set' if (partition_exists and (result_02.stdout | default('') | trim) == '') else ('Non-compliant: ' + ('No separate /var/tmp partition' if not partition_exists else 'nodev option not set on /var/tmp partition')) }}"

- name: "Store final audit result in cis_result"
  ansible.builtin.set_fact:
    cis_result: "{{ status_03 }}"

- name: "Generate audit report"
  ansible.builtin.debug:
    msg:
    - "AUDIT REPORT — CIS 1.1.2.5.2"
    - "Reference: CIS Benchmark checkpoint 1.1.2.5.2"
    - ""
    - "REQUIREMENT 01 - {{ req_01 }}:"
    - "  Task: {{ task_01_name | default('Not recorded') }}"
    - "  Command: {{ task_01_cmd | default('N/A') }}"
    - "  Exit code: {{ task_01_rc | default(-1) }}"
    - "  Data: {{ data_01 | default('') | trim }}"
    - "  Status: {{ status_01 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_01 | default('') | trim }}"
    - ""
    - "REQUIREMENT 02 - {{ req_02 }}:"
    - "  Task: {{ task_02_name | default('Not recorded') }}"
    - "  Command: {{ task_02_cmd | default('N/A') }}"
    - "  Exit code: {{ task_02_rc | default(-1) }}"
    - "  Data: {{ data_02 | default('') | trim }}"
    - "  Status: {{ status_02 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_02 | default('') | trim }}"
    - ""
    - "REQUIREMENT 03 - {{ req_03 }}:"
    - "  Task: Summarize overall compliance status"
    - "  Command: N/A"
    - "  Exit code: N/A"
    - "  Data: {{ status_03 | default('UNKNOWN') | trim }}"
    - "  Status: {{ status_03 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_03 | default('') | trim }}"
    - ""
    - "========================================================"
    - "OVERALL COMPLIANCE:"
    - "  Result: {{ cis_result | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_03 | default('Not evaluated') | trim }}"
    - "========================================================"
