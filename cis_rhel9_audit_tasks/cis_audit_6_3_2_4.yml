---
- name: Initialize meta data variables
  include_vars: cis_audit_var_6_3_2_4.yml

- name: "Initialize data variables"
  set_fact:
    data_01: "Not collected yet"
    status_01: "ERROR"
    details_01: "Not evaluated"
    data_02: "Not collected yet"
    status_02: "ERROR"
    details_02: "Not evaluated"
    data_03: "Not collected yet"
    status_03: "ERROR"
    details_03: "Not evaluated"
    data_04: ""
    status_04: "ERROR"
    details_04: "Not evaluated"
    data_05: ""
    status_05: "ERROR"
    details_05: "Not evaluated"
    task_01_name: "Not executed"
    task_01_cmd: "N/A"
    task_01_rc: -1

# Requirement 1: Check if auditd configuration file exists
- name: "Req 01 - Check if auditd configuration file exists"
  ansible.builtin.stat:
    path: /etc/audit/auditd.conf
  register: auditd_config_stat
  failed_when: false
  changed_when: false

- name: "Store requirement 01 details"
  set_fact:
    task_01_name: "Check if auditd configuration file exists"
    task_01_cmd: "stat /etc/audit/auditd.conf (ansible.builtin.stat)"
    task_01_rc: "{{ 0 if auditd_config_stat.stat.exists else 1 }}"
    data_01: "{{ 'File exists' if auditd_config_stat.stat.exists else 'File does not exist' }}"
    status_01: "{{ 'PASS' if auditd_config_stat.stat.exists else 'FAIL' }}"
    details_01: "{{ 'Configuration file /etc/audit/auditd.conf found' if auditd_config_stat.stat.exists else 'Configuration file /etc/audit/auditd.conf not found' }}"

# Requirement 2: Check space_left_action
- name: "Req 02 - Check space_left_action in auditd config"
  ansible.builtin.shell: grep -P -- '^\h*space_left_action\h*=\h*(email|exec|single|halt)\b' /etc/audit/auditd.conf
  args:
    executable: /bin/bash
  register: result_02
  failed_when: false
  changed_when: false
  when: auditd_config_stat.stat.exists

- name: "Store requirement 02 details"
  set_fact:
    task_02_name: "Check space_left_action in auditd config"
    task_02_cmd: |
      grep -P -- '^\\h*space_left_action\\h*=\\h*(email|exec|single|halt)\\b' /etc/audit/auditd.conf
    task_02_rc: "{{ result_02.rc | default(-1) if not (result_02.skipped | default(false)) else 'N/A' }}"
    data_02: "{{ result_02.stdout | default('') | trim if not (result_02.skipped | default(false)) else '' }}"
    status_02: >-
      {%- if result_02.skipped | default(false) -%}
        SKIP
      {%- elif result_02.rc | default(-1) == 0 -%}
        PASS
      {%- else -%}
        FAIL
      {%- endif -%}
    details_02: >-
      {%- if result_02.skipped | default(false) -%}
        Skipped because config file does not exist
      {%- elif result_02.rc | default(-1) == 0 -%}
        space_left_action matches expected values
      {%- else -%}
        space_left_action does not match expected values or config file issues
      {%- endif -%}

# Requirement 3: Check admin_space_left_action
- name: "Req 03 - Check admin_space_left_action in auditd config"
  ansible.builtin.shell: grep -P -- '^\h*admin_space_left_action\h*=\h*(single|halt)\b' /etc/audit/auditd.conf
  args:
    executable: /bin/bash
  register: result_03
  failed_when: false
  changed_when: false
  when: auditd_config_stat.stat.exists

- name: "Store requirement 03 details"
  set_fact:
    task_03_name: "Check admin_space_left_action in auditd config"
    task_03_cmd: |
      grep -P -- '^\\h*admin_space_left_action\\h*=\\h*(single|halt)\\b' /etc/audit/auditd.conf
    task_03_rc: "{{ result_03.rc | default(-1) if not (result_03.skipped | default(false)) else 'N/A' }}"
    data_03: "{{ result_03.stdout | default('') | trim if not (result_03.skipped | default(false)) else '' }}"
    status_03: >-
      {%- if result_03.skipped | default(false) -%}
        SKIP
      {%- elif result_03.rc | default(-1) == 0 -%}
        PASS
      {%- else -%}
        FAIL
      {%- endif -%}
    details_03: >-
      {%- if result_03.skipped | default(false) -%}
        Skipped because config file does not exist
      {%- elif result_03.rc | default(-1) == 0 -%}
        admin_space_left_action matches expected values
      {%- else -%}
        admin_space_left_action does not match expected values or config file issues
      {%- endif -%}

# Requirement 4: Overall compliance
- name: "Req 04 - Summarize overall compliance"
  set_fact:
    task_04_name: "Summarize overall compliance"
    task_04_cmd: "N/A"
    task_04_rc: "N/A"
    data_04: ""
    status_04: >-
      {%- if not auditd_config_stat.stat.exists -%}
        SKIP
      {%- elif status_02 | trim == 'PASS' and status_03 | trim == 'PASS' -%}
        PASS
      {%- else -%}
        FAIL
      {%- endif -%}
    details_04: >-
      {%- if not auditd_config_stat.stat.exists -%}
        Auditd configuration file does not exist
      {%- elif status_02 | trim == 'PASS' and status_03 | trim == 'PASS' -%}
        All auditd config checks passed
      {%- else -%}
        Auditd config does not meet CIS requirements
      {%- endif -%}

# Requirement 5: Final result variable
- name: "Req 05 - Store final audit result in cis_result"
  set_fact:
    task_05_name: "Store final audit result"
    task_05_cmd: "N/A"
    task_05_rc: "N/A"
    data_05: ""
    cis_result: "{{ status_04 | trim }}"
    status_05: "{{ status_04 | trim }}"
    details_05: "{{ details_04 | trim }}"

# Final report
- name: "Generate audit report"
  debug:
    msg:
    - "AUDIT REPORT — CIS 6.3.2.4"
    - "Reference: CIS Benchmark checkpoint 6.3.2.4"
    - ""
    - "REQUIREMENT 01 - {{ req_01 }}:"
    - "  Task: {{ task_01_name | default('Not recorded') }}"
    - "  Command: {{ task_01_cmd | default('N/A') }}"
    - "  Exit code: {{ task_01_rc | default(-1) }}"
    - "  Data: {{ data_01 | default('') | trim }}"
    - "  Status: {{ status_01 | default('ERROR') | trim }}"
    - "  Details: {{ details_01 | default('') | trim }}"
    - ""
    - "REQUIREMENT 02 - {{ req_02 }}:"
    - "  Task: {{ task_02_name | default('Not recorded') }}"
    - "  Command: {{ task_02_cmd | default('N/A') }}"
    - "  Exit code: {{ task_02_rc | default(-1) }}"
    - "  Data: {{ data_02 | default('') | trim }}"
    - "  Status: {{ status_02 | default('ERROR') | trim }}"
    - "  Details: {{ details_02 | default('') | trim }}"
    - ""
    - "REQUIREMENT 03 - {{ req_03 }}:"
    - "  Task: {{ task_03_name | default('Not recorded') }}"
    - "  Command: {{ task_03_cmd | default('N/A') }}"
    - "  Exit code: {{ task_03_rc | default(-1) }}"
    - "  Data: {{ data_03 | default('') | trim }}"
    - "  Status: {{ status_03 | default('ERROR') | trim }}"
    - "  Details: {{ details_03 | default('') | trim }}"
    - ""
    - "REQUIREMENT 04 - {{ req_04 }}:"
    - "  Task: {{ task_04_name | default('Not recorded') }}"
    - "  Command: {{ task_04_cmd | default('N/A') }}"
    - "  Exit code: {{ task_04_rc | default(-1) }}"
    - "  Data: {{ data_04 | default('') | trim }}"
    - "  Status: {{ status_04 | default('ERROR') | trim }}"
    - "  Details: {{ details_04 | default('') | trim }}"
    - ""
    - "REQUIREMENT 05 - {{ req_05 }}:"
    - "  Task: {{ task_05_name | default('Not recorded') }}"
    - "  Command: {{ task_05_cmd | default('N/A') }}"
    - "  Exit code: {{ task_05_rc | default(-1) }}"
    - "  Data: {{ data_05 | default('') | trim }}"
    - "  Status: {{ status_05 | default('ERROR') | trim }}"
    - "  Details: {{ details_05 | default('') | trim }}"
    - ""
    - "========================================================"
    - "OVERALL COMPLIANCE:"
    - "  Result: {{ cis_result | default('ERROR') | trim }}"
    - "========================================================"
