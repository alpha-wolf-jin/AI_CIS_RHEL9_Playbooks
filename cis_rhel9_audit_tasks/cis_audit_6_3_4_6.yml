---
- name: Initialize meta data variables
  include_vars: cis_audit_var_6_3_4_6.yml

- name: "Req 01 - Check if auditd is installed"
  ansible.builtin.shell: dpkg -l auditd 2>/dev/null || rpm -q audit 2>/dev/null
  args:
    executable: /bin/bash
  register: result_01
  failed_when: false
  changed_when: false

- name: "Initialize status variables"
  set_fact:
    auditd_installed: "{{ result_01.rc == 0 }}"
    data_01: "{{ result_01.stdout | default('') | trim }}"
    status_01: "{{ 'PASS' if result_01.rc == 0 else 'FAIL' }}"
    details_01: "{{ 'Package auditd is installed' if result_01.rc == 0 else 'Package auditd is not installed' }}"
    status_02: "{{ 'NOT_APPLICABLE' if not (result_01.rc == 0) else 'UNKNOWN' }}"
    data_02: "{{ 'N/A' if not (result_01.rc == 0) else 'No data yet' }}"
    details_02: "{{ 'Auditd not installed - check not applicable' if not (result_01.rc == 0) else 'Not yet evaluated' }}"
    status_03: "{{ 'NOT_APPLICABLE' if not (result_01.rc == 0) else 'UNKNOWN' }}"
    data_03: "{{ 'N/A' if not (result_01.rc == 0) else 'No data yet' }}"
    details_03: "{{ 'Auditd not installed - check not applicable' if not (result_01.rc == 0) else 'Not yet evaluated' }}"
    status_04: "{{ 'NOT_APPLICABLE' if not (result_01.rc == 0) else 'UNKNOWN' }}"
    data_04: "{{ 'N/A' if not (result_01.rc == 0) else 'No data yet' }}"
    details_04: "{{ 'Auditd not installed - check not applicable' if not (result_01.rc == 0) else 'Not yet evaluated' }}"
    status_05: "{{ 'NOT_APPLICABLE' if not (result_01.rc == 0) else 'UNKNOWN' }}"
    data_05: "{{ 'N/A' if not (result_01.rc == 0) else 'No data yet' }}"
    details_05: "{{ 'Auditd not installed - check not applicable' if not (result_01.rc == 0) else 'Not yet evaluated' }}"
    task_01_name: "Req 01 - Check if auditd is installed"
    task_01_cmd: "dpkg -l auditd 2>/dev/null || rpm -q audit 2>/dev/null"
    task_01_rc: "{{ result_01.rc | default(-1) }}"

- name: "Req 02 - Check audit config files owned by root user"
  ansible.builtin.shell: |
    find /etc/audit/ -type f \( -name '*.conf' -o -name '*.rules' \) ! -user root
  args:
    executable: /bin/bash
  register: result_02
  failed_when: false
  changed_when: false
  when: auditd_installed | bool

- name: "Store requirement 02 results"
  set_fact:
    status_02: "{{ 'PASS' if (result_02.stdout | default('') | trim == '' and result_02.rc | default(1) == 0) else 'FAIL' }}"
    data_02: "{{ result_02.stdout | default('') | trim }}"
    details_02: "{{ 'All audit configuration files owned by root' if (result_02.stdout | default('') | trim == '' and result_02.rc | default(1) == 0) else ('Non-root owned files found: ' + result_02.stdout | default('') | trim) if result_02.stdout | default('') | trim != '' else 'Error executing find command' }}"
    task_02_name: "Req 02 - Check audit config files owned by root user"
    task_02_cmd: |
      find /etc/audit/ -type f \( -name '*.conf' -o -name '*.rules' \) ! -user root
    task_02_rc: "{{ result_02.rc | default(-1) }}"
  when: auditd_installed | bool

- name: "Req 03 - Check audit config files owned by root group"
  ansible.builtin.shell: |
    find /etc/audit/ -type f \( -name '*.conf' -o -name '*.rules' \) ! -group root
  args:
    executable: /bin/bash
  register: result_03
  failed_when: false
  changed_when: false
  when: auditd_installed | bool

- name: "Store requirement 03 results"
  set_fact:
    status_03: "{{ 'PASS' if (result_03.stdout | default('') | trim == '' and result_03.rc | default(1) == 0) else 'FAIL' }}"
    data_03: "{{ result_03.stdout | default('') | trim }}"
    details_03: "{{ 'All audit configuration files owned by root group' if (result_03.stdout | default('') | trim == '' and result_03.rc | default(1) == 0) else ('Non-root group owned files found: ' + result_03.stdout | default('') | trim) if result_03.stdout | default('') | trim != '' else 'Error executing find command' }}"
    task_03_name: "Req 03 - Check audit config files owned by root group"
    task_03_cmd: |
      find /etc/audit/ -type f \( -name '*.conf' -o -name '*.rules' \) ! -group root
    task_03_rc: "{{ result_03.rc | default(-1) }}"
  when: auditd_installed | bool

- name: "Req 04 - Check audit config files have restrictive permissions"
  ansible.builtin.shell: |
    find /etc/audit/ -type f \( -name '*.conf' -o -name '*.rules' \) -perm /137
  args:
    executable: /bin/bash
  register: result_04
  failed_when: false
  changed_when: false
  when: auditd_installed | bool

- name: "Store requirement 04 results"
  set_fact:
    status_04: "{{ 'PASS' if (result_04.stdout | default('') | trim == '' and result_04.rc | default(1) == 0) else 'FAIL' }}"
    data_04: "{{ result_04.stdout | default('') | trim }}"
    details_04: "{{ 'All audit configuration files have mode 640 or more restrictive' if (result_04.stdout | default('') | trim == '' and result_04.rc | default(1) == 0) else ('Files with excessive permissions found: ' + result_04.stdout | default('') | trim) if result_04.stdout | default('') | trim != '' else 'Error executing find command' }}"
    task_04_name: "Req 04 - Check audit config files have restrictive permissions"
    task_04_cmd: |
      find /etc/audit/ -type f \( -name '*.conf' -o -name '*.rules' \) -perm /137
    task_04_rc: "{{ result_04.rc | default(-1) }}"
  when: auditd_installed | bool

- name: "Compute overall compliance"
  set_fact:
    status_05: >-
      {%- if not (auditd_installed | bool) -%}
        NOT_APPLICABLE
      {%- elif status_02 == 'PASS' and status_03 == 'PASS' and status_04 == 'PASS' -%}
        PASS
      {%- else -%}
        FAIL
      {%- endif -%}
    details_05: >-
      {%- if not (auditd_installed | bool) -%}
        Auditd is not installed; CIS 6.3.4.6 is not applicable.
      {%- elif status_02 == 'PASS' and status_03 == 'PASS' and status_04 == 'PASS' -%}
        All checks passed: audit configuration files are owned by root, root group, and have restrictive permissions.
      {%- else -%}
        One or more checks failed. See individual requirement details for non-compliance.
      {%- endif -%}
    task_05_name: "Req 05 - Summarize overall compliance"
    task_05_cmd: "Logic: overall PASS if all find commands return no output"
    task_05_rc: "N/A"

- name: "Req 06 - Store final audit result in cis_result"
  set_fact:
    cis_result: "{{ status_05 }}"
    task_06_name: "Req 06 - Store final audit result in cis_result"
    task_06_cmd: "set_fact: cis_result = {{ status_05 }}"
    task_06_rc: "N/A"
    data_06: "{{ status_05 | default('UNKNOWN') | trim }}"
    status_06: "PASS"
    details_06: "cis_result set to {{ status_05 | default('UNKNOWN') | trim }}"

- name: "Generate audit report"
  debug:
    msg:
    - "AUDIT REPORT — CIS 6.3.4.6"
    - "Reference: CIS Benchmark checkpoint 6.3.4.6"
    - ""
    - "REQUIREMENT 01 - {{ req_01 }}"
    - "  Task: {{ task_01_name | default('Not recorded') }}"
    - "  Command: {{ task_01_cmd | default('N/A') }}"
    - "  Exit code: {{ task_01_rc | default(-1) }}"
    - "  Data: {{ data_01 | default('') | trim }}"
    - "  Status: {{ status_01 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_01 | default('') | trim }}"
    - ""
    - "REQUIREMENT 02 - {{ req_02 }}"
    - "  Task: {{ task_02_name | default('Not recorded') }}"
    - "  Command: {{ task_02_cmd | default('N/A') }}"
    - "  Exit code: {{ task_02_rc | default(-1) }}"
    - "  Data: {{ data_02 | default('') | trim }}"
    - "  Status: {{ status_02 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_02 | default('') | trim }}"
    - ""
    - "REQUIREMENT 03 - {{ req_03 }}"
    - "  Task: {{ task_03_name | default('Not recorded') }}"
    - "  Command: {{ task_03_cmd | default('N/A') }}"
    - "  Exit code: {{ task_03_rc | default(-1) }}"
    - "  Data: {{ data_03 | default('') | trim }}"
    - "  Status: {{ status_03 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_03 | default('') | trim }}"
    - ""
    - "REQUIREMENT 04 - {{ req_04 }}"
    - "  Task: {{ task_04_name | default('Not recorded') }}"
    - "  Command: {{ task_04_cmd | default('N/A') }}"
    - "  Exit code: {{ task_04_rc | default(-1) }}"
    - "  Data: {{ data_04 | default('') | trim }}"
    - "  Status: {{ status_04 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_04 | default('') | trim }}"
    - ""
    - "REQUIREMENT 05 - {{ req_05 }}"
    - "  Task: {{ task_05_name | default('Not recorded') }}"
    - "  Command: {{ task_05_cmd | default('N/A') }}"
    - "  Exit code: {{ task_05_rc | default('N/A') }}"
    - "  Data: {{ data_05 | default('') | trim }}"
    - "  Status: {{ status_05 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_05 | default('') | trim }}"
    - ""
    - "REQUIREMENT 06 - {{ req_06 }}"
    - "  Task: {{ task_06_name | default('Not recorded') }}"
    - "  Command: {{ task_06_cmd | default('N/A') }}"
    - "  Exit code: {{ task_06_rc | default('N/A') }}"
    - "  Data: {{ data_06 | default('') | trim }}"
    - "  Status: {{ status_06 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_06 | default('') | trim }}"
    - ""
    - "========================================================"
    - "OVERALL COMPLIANCE:"
    - "  Result: {{ cis_result | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_05 | default('Not evaluated') | trim }}"
    - "========================================================"
