---
- name: Initialize meta data variables
  include_vars: cis_audit_var_6_2_1_3.yml

- name: "Initialize data variables"
  set_fact:
    task_01_name: "Not executed"
    task_01_cmd: "N/A"
    task_01_rc: -1
    data_01: "Not collected yet"
    status_01: "UNKNOWN"
    details_01: "Not evaluated"
    task_02_name: "Not executed"
    task_02_cmd: "N/A"
    task_02_rc: -1
    data_02: "Not collected yet"
    status_02: "UNKNOWN"
    details_02: "Not evaluated"
    task_03_name: "Not executed"
    task_03_cmd: "N/A"
    task_03_rc: -1
    data_03: "Not collected yet"
    status_03: "UNKNOWN"
    details_03: "Not evaluated"
    task_04_name: "Not executed"
    task_04_cmd: "N/A"
    task_04_rc: -1
    data_04: "Not collected yet"
    status_04: "UNKNOWN"
    details_04: "Not evaluated"
    task_05_name: "Not executed"
    task_05_cmd: "N/A"
    task_05_rc: -1
    data_05: "Not collected yet"
    status_05: "UNKNOWN"
    details_05: "Not evaluated"

- name: "Req 01 - Check if systemd-journald is installed and active"
  ansible.builtin.shell: systemctl is-active systemd-journald
  args:
    executable: /bin/bash
  register: result_01
  failed_when: false
  changed_when: false

- name: "Store requirement 01 details"
  set_fact:
    task_01_name: "Check if systemd-journald is installed and active using systemctl is-active"
    task_01_cmd: "systemctl is-active systemd-journald"
    task_01_rc: "{{ result_01.rc | default(-1) }}"
    data_01: "{{ result_01.stdout | default('') | trim }}"
    status_01: "{{ ('PASS' if result_01.rc | default(-1) == 0 and result_01.stdout | default('') | trim == 'active' else 'NOT_APPLICABLE' if 'not found' in result_01.stderr | default('') | lower else 'FAIL') | trim }}"
    details_01: "{{ 'Service active' if result_01.rc | default(-1) == 0 and result_01.stdout | default('') | trim == 'active' else 'Service not installed' if 'not found' in result_01.stderr | default('') | lower else 'Service not active' | trim }}"

- name: "Req 02 - Check journald log rotation configuration using systemd-analyze cat-config"
  ansible.builtin.shell: systemd-analyze cat-config systemd/journald.conf 2>/dev/null | grep -E '^[[:space:]]*(SystemMaxUse|SystemKeepFree|RuntimeMaxUse|RuntimeKeepFree|MaxFileSec)='
  args:
    executable: /bin/bash
  register: result_02
  failed_when: false
  changed_when: false
  when: "status_01 | default('FAIL') | trim == 'PASS'"

- name: "Store requirement 02 details"
  set_fact:
    task_02_name: "Check journald log rotation configuration using systemd-analyze cat-config and grep"
    task_02_cmd: "systemd-analyze cat-config systemd/journald.conf 2>/dev/null | grep -E '^[[:space:]]*(SystemMaxUse|SystemKeepFree|RuntimeMaxUse|RuntimeKeepFree|MaxFileSec)='"
    task_02_rc: "{{ result_02.rc | default(-1) if result_02 is not skipped else -1 }}"
    data_02: "{{ result_02.stdout | default('') | trim if result_02 is not skipped else '' }}"
    status_02: "{{ 'SKIPPED' if result_02 is skipped else 'PASS' if result_02.rc | default(-1) == 0 and 'SystemMaxUse=' in result_02.stdout | default('') and 'SystemKeepFree=' in result_02.stdout | default('') and 'RuntimeMaxUse=' in result_02.stdout | default('') and 'RuntimeKeepFree=' in result_02.stdout | default('') and 'MaxFileSec=' in result_02.stdout | default('') else 'FAIL' | trim }}"
    details_02: "{{ 'Prerequisite not met' if result_02 is skipped else 'All five rotation parameters configured (uncommented)' if result_02.rc | default(-1) == 0 and 'SystemMaxUse=' in result_02.stdout | default('') and 'SystemKeepFree=' in result_02.stdout | default('') and 'RuntimeMaxUse=' in result_02.stdout | default('') and 'RuntimeKeepFree=' in result_02.stdout | default('') and 'MaxFileSec=' in result_02.stdout | default('') else 'Not all rotation parameters configured or all are commented out' | trim }}"

- name: "Req 03 - Verify journald rotation parameters comply with site policy using systemd-analyze"
  ansible.builtin.shell: systemd-analyze cat-config systemd/journald.conf 2>/dev/null | grep -E '^[[:space:]]*(SystemMaxUse|SystemKeepFree|RuntimeMaxUse|RuntimeKeepFree|MaxFileSec)='
  args:
    executable: /bin/bash
  register: result_03
  failed_when: false
  changed_when: false
  when: "status_01 | default('FAIL') | trim == 'PASS'"

- name: "Store requirement 03 details"
  set_fact:
    task_03_name: "Verify journald rotation parameters comply with site policy using systemd-analyze and grep"
    task_03_cmd: "systemd-analyze cat-config systemd/journald.conf 2>/dev/null | grep -E '^[[:space:]]*(SystemMaxUse|SystemKeepFree|RuntimeMaxUse|RuntimeKeepFree|MaxFileSec)='"
    task_03_rc: "{{ result_03.rc | default(-1) if result_03 is not skipped else -1 }}"
    data_03: "{{ result_03.stdout | default('') | trim if result_03 is not skipped else '' }}"
    status_03: >-
      {{ 'SKIPPED' if result_03 is skipped
         else 'PASS' if result_03.rc | default(-1) == 0
           and 'SystemMaxUse=' in result_03.stdout | default('')
           and 'SystemKeepFree=' in result_03.stdout | default('')
           and 'RuntimeMaxUse=' in result_03.stdout | default('')
           and 'RuntimeKeepFree=' in result_03.stdout | default('')
           and 'MaxFileSec=' in result_03.stdout | default('')
           and (result_03.stdout | default('') | regex_search('SystemMaxUse=\\S')) is not none
           and (result_03.stdout | default('') | regex_search('SystemKeepFree=\\S')) is not none
           and (result_03.stdout | default('') | regex_search('RuntimeMaxUse=\\S')) is not none
           and (result_03.stdout | default('') | regex_search('RuntimeKeepFree=\\S')) is not none
           and (result_03.stdout | default('') | regex_search('MaxFileSec=\\S')) is not none
         else 'FAIL' | trim }}
    details_03: >-
      {{ 'Prerequisite not met' if result_03 is skipped
         else 'All five parameters set with non-empty values' if result_03.rc | default(-1) == 0
           and 'SystemMaxUse=' in result_03.stdout | default('')
           and 'SystemKeepFree=' in result_03.stdout | default('')
           and 'RuntimeMaxUse=' in result_03.stdout | default('')
           and 'RuntimeKeepFree=' in result_03.stdout | default('')
           and 'MaxFileSec=' in result_03.stdout | default('')
           and (result_03.stdout | default('') | regex_search('SystemMaxUse=\\S')) is not none
           and (result_03.stdout | default('') | regex_search('SystemKeepFree=\\S')) is not none
           and (result_03.stdout | default('') | regex_search('RuntimeMaxUse=\\S')) is not none
           and (result_03.stdout | default('') | regex_search('RuntimeKeepFree=\\S')) is not none
           and (result_03.stdout | default('') | regex_search('MaxFileSec=\\S')) is not none
         else 'Not all required parameters configured with non-empty values or all are commented out' | trim }}

- name: "Req 04 - Summarize overall compliance status"
  set_fact:
    task_04_name: "Summarize overall compliance status using set_fact"
    task_04_cmd: "set_fact based on status_01, status_02, status_03"
    task_04_rc: "0"
    status_04: "{{ 'NOT_APPLICABLE' if status_01 == 'NOT_APPLICABLE' else 'PASS' if status_01 == 'PASS' and status_02 == 'PASS' and status_03 == 'PASS' else 'FAIL' | trim }}"
    details_04: "{{ 'Service not available' if status_01 == 'NOT_APPLICABLE' else 'All checks passed' if status_01 == 'PASS' and status_02 == 'PASS' and status_03 == 'PASS' else 'One or more checks failed' | trim }}"
    data_04: "{{ 'NOT_APPLICABLE' if status_01 == 'NOT_APPLICABLE' else 'PASS' if status_01 == 'PASS' and status_02 == 'PASS' and status_03 == 'PASS' else 'FAIL' | trim }}"

- name: "Req 05 - Store final audit result as cis_result"
  set_fact:
    cis_result: "{{ status_04 | default('UNKNOWN') | trim }}"
    task_05_name: "Store final audit result as cis_result"
    task_05_cmd: "set_fact cis_result = {{ status_04 | default('UNKNOWN') | trim }}"
    task_05_rc: "0"
    data_05: "{{ status_04 | default('UNKNOWN') | trim }}"
    status_05: "{{ 'PASS' if status_04 is defined else 'FAIL' | trim }}"
    details_05: "cis_result set to {{ status_04 | default('UNKNOWN') | trim }}"

- name: "Generate audit report"
  debug:
    msg:
    - "AUDIT REPORT — CIS 6.2.1.3"
    - "Reference: CIS Benchmark checkpoint 6.2.1.3"
    - ""
    - "REQUIREMENT 01 - {{ req_01 }}:"
    - "  Task: {{ task_01_name | default('Not recorded') }}"
    - "  Command: {{ task_01_cmd | default('N/A') }}"
    - "  Exit code: {{ task_01_rc | default(-1) }}"
    - "  Data: {{ data_01 | default('') | trim }}"
    - "  Status: {{ status_01 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_01 | default('') | trim }}"
    - ""
    - "REQUIREMENT 02 - {{ req_02 }}:"
    - "  Task: {{ task_02_name | default('Not recorded') }}"
    - "  Command: {{ task_02_cmd | default('N/A') }}"
    - "  Exit code: {{ task_02_rc | default(-1) }}"
    - "  Data: {{ data_02 | default('') | trim }}"
    - "  Status: {{ status_02 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_02 | default('') | trim }}"
    - ""
    - "REQUIREMENT 03 - {{ req_03 }}:"
    - "  Task: {{ task_03_name | default('Not recorded') }}"
    - "  Command: {{ task_03_cmd | default('N/A') }}"
    - "  Exit code: {{ task_03_rc | default(-1) }}"
    - "  Data: {{ data_03 | default('') | trim }}"
    - "  Status: {{ status_03 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_03 | default('') | trim }}"
    - ""
    - "REQUIREMENT 04 - {{ req_04 }}:"
    - "  Task: {{ task_04_name | default('Not recorded') }}"
    - "  Command: {{ task_04_cmd | default('N/A') }}"
    - "  Exit code: {{ task_04_rc | default(-1) }}"
    - "  Data: {{ data_04 | default('') | trim }}"
    - "  Status: {{ status_04 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_04 | default('') | trim }}"
    - ""
    - "REQUIREMENT 05 - {{ req_05 }}:"
    - "  Task: {{ task_05_name | default('Not recorded') }}"
    - "  Command: {{ task_05_cmd | default('N/A') }}"
    - "  Exit code: {{ task_05_rc | default(-1) }}"
    - "  Data: {{ data_05 | default('') | trim }}"
    - "  Status: {{ status_05 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_05 | default('') | trim }}"
    - ""
    - "OVERALL COMPLIANCE:"
    - "  Result: {{ cis_result | default('UNKNOWN') | trim }}"
