req_01: "Check if sudo is installed using command: `which sudo || dpkg -l sudo || rpm -q sudo`. Expected result: sudo is installed."
req_02: "Check on-disk audit rules for actions as another user (64-bit) using command: `awk '/^ *-a *always,exit/ &&/ -F *arch=b(32|64)/ &&(/ -F *auid!=unset/||/ -F *auid!=-1/||/ -F *auid!=4294967295/) &&(/ -C *euid!=uid/||/ -C *uid!=euid/) &&/ -S *execve/ &&(/ key= *[!-~]* *$/||/ -k *[!-~]* *$/)' /etc/audit/rules.d/*.rules`. Expected result: output includes `-a always,exit -F arch=b64 -C euid!=uid -F auid!=unset -S execve -k user_emulation`."
req_03: "Check on-disk audit rules for actions as another user (32-bit) using command: `awk '/^ *-a *always,exit/ &&/ -F *arch=b(32|64)/ &&(/ -F *auid!=unset/||/ -F *auid!=-1/||/ -F *auid!=4294967295/) &&(/ -C *euid!=uid/||/ -C *uid!=euid/) &&/ -S *execve/ &&(/ key= *[!-~]* *$/||/ -k *[!-~]* *$/)' /etc/audit/rules.d/*.rules`. Expected result: output includes `-a always,exit -F arch=b32 -C euid!=uid -F auid!=unset -S execve -k user_emulation`."
req_04: "Check running audit rules for actions as another user (64-bit) using command: `auditctl -l | awk '/^ *-a *always,exit/ &&/ -F *arch=b(32|64)/ &&(/ -F *auid!=unset/||/ -F *auid!=-1/||/ -F *auid!=4294967295/) &&(/ -C *euid!=uid/||/ -C *uid!=euid/) &&/ -S *execve/ &&(/ key= *[!-~]* *$/||/ -k *[!-~]* *$/)'`. Expected result: output includes `-a always,exit -F arch=b64 -S execve -C uid!=euid -F auid!=-1 -F key=user_emulation`."
req_05: "Check running audit rules for actions as another user (32-bit) using command: `auditctl -l | awk '/^ *-a *always,exit/ &&/ -F *arch=b(32|64)/ &&(/ -F *auid!=unset/||/ -F *auid!=-1/||/ -F *auid!=4294967295/) &&(/ -C *euid!=uid/||/ -C *uid!=euid/) &&/ -S *execve/ &&(/ key= *[!-~]* *$/||/ -k *[!-~]* *$/)'`. Expected result: output includes `-a always,exit -F arch=b32 -S execve -C uid!=euid -F auid!=-1 -F key=user_emulation`."
req_06: "Summarize overall compliance status: both on-disk and running audit rules must contain the expected rules for both 64-bit and 32-bit architectures. Expected result: all checks pass."
req_07: "Store the final audit result in a variable named 'cis_result' using set_fact. Set cis_result to the overall compliance status (PASS/FAIL/SKIPPED/UNKNOWN) derived from the last requirement's status variable."

expected_ondisk_b64: "-a always,exit -F arch=b64 -C euid!=uid -F auid!=unset -S execve -k user_emulation"
expected_ondisk_b32: "-a always,exit -F arch=b32 -C euid!=uid -F auid!=unset -S execve -k user_emulation"
expected_running_b64: "-a always,exit -F arch=b64 -S execve -C uid!=euid -F auid!=-1 -F key=user_emulation"
expected_running_b32: "-a always,exit -F arch=b32 -S execve -C uid!=euid -F auid!=-1 -F key=user_emulation"
