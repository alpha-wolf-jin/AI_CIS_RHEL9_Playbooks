---
- name: Initialize meta data variables
  include_vars: cis_audit_var_1_5_1.yml

- name: "Initialize data variables"
  set_fact:
    data_01: "Not collected yet"
    status_01: "UNKNOWN"
    details_01: "Not evaluated"
    task_01_name: "Not executed"
    task_01_cmd: "N/A"
    task_01_rc: -1
    data_02: "Not collected yet"
    status_02: "UNKNOWN"
    details_02: "Not evaluated"
    task_02_name: "Not executed"
    task_02_cmd: "N/A"
    task_02_rc: -1
    data_03: "Not collected yet"
    status_03: "UNKNOWN"
    details_03: "Not evaluated"
    task_03_name: "Not executed"
    task_03_cmd: "N/A"
    task_03_rc: -1

- name: "Req 01 - Execute audit script to verify kernel.randomize_va_space"
  shell: |
    /bin/bash -s <<'SCRIPT_EOF'
    {{ audit_script_content }}
    SCRIPT_EOF
  args:
    executable: /bin/bash
  register: script_result
  failed_when: false
  changed_when: false

- name: "Store requirement 01 details"
  set_fact:
    task_01_name: "Run audit script to verify kernel.randomize_va_space"
    task_01_cmd: "Embedded bash script (see CIS procedure)"
    task_01_rc: "{{ script_result.rc | default(-1) }}"
    data_01: "{{ script_result.stdout | default('') | trim }}"
    status_01: "{{ ('PASS' if '** PASS **' in (script_result.stdout | default('')) else 'FAIL') | trim }}"
    details_01: "{{ ('Audit script indicates compliance PASS' if '** PASS **' in (script_result.stdout | default('')) else 'Audit script indicates compliance FAIL') | trim }}"

- name: "Req 02 - Summarize compliance status"
  set_fact:
    task_02_name: "Parse script output for PASS/FAIL indicator"
    task_02_cmd: "N/A (checks output of previous script)"
    task_02_rc: 0
    data_02: "{{ script_result.stdout | default('') | trim }}"
    status_02: "{{ ('PASS' if '** PASS **' in (script_result.stdout | default('')) else 'FAIL') | trim }}"
    details_02: "{{ ('Compliance status: PASS' if '** PASS **' in (script_result.stdout | default('')) else 'Compliance status: FAIL') | trim }}"

- name: "Req 03 - Store final audit result as cis_result"
  set_fact:
    cis_result: "{{ status_02 | default('UNKNOWN') | trim }}"
    task_03_name: "Store cis_result from status_02"
    task_03_cmd: "set_fact"
    task_03_rc: 0
    data_03: "{{ status_02 | default('UNKNOWN') | trim }}"
    status_03: "PASS"
    details_03: "cis_result set successfully"

- name: "Generate audit report"
  debug:
    msg:
    - "AUDIT REPORT — CIS 1.5.1"
    - "Reference: CIS Benchmark checkpoint 1.5.1"
    - ""
    - "REQUIREMENT 01 - {{ req_01 }}:"
    - "  Task: {{ task_01_name | default('Not recorded') }}"
    - "  Command: {{ task_01_cmd | default('N/A') }}"
    - "  Exit code: {{ task_01_rc | default(-1) }}"
    - "  Data: {{ data_01 | default('') | trim }}"
    - "  Status: {{ status_01 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_01 | default('') | trim }}"
    - ""
    - "REQUIREMENT 02 - {{ req_02 }}:"
    - "  Task: {{ task_02_name | default('Not recorded') }}"
    - "  Command: {{ task_02_cmd | default('N/A') }}"
    - "  Exit code: {{ task_02_rc | default(-1) }}"
    - "  Data: {{ data_02 | default('') | trim }}"
    - "  Status: {{ status_02 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_02 | default('') | trim }}"
    - ""
    - "REQUIREMENT 03 - {{ req_03 }}:"
    - "  Task: {{ task_03_name | default('Not recorded') }}"
    - "  Command: {{ task_03_cmd | default('N/A') }}"
    - "  Exit code: {{ task_03_rc | default(-1) }}"
    - "  Data: {{ data_03 | default('') | trim }}"
    - "  Status: {{ status_03 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_03 | default('') | trim }}"
    - ""
    - "========================================================"
    - "OVERALL COMPLIANCE:"
    - "  Result: {{ cis_result }}"
    - "========================================================"
