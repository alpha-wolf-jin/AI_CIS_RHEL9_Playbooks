---
- name: Initialize meta data variables
  include_vars: cis_audit_var_1_1_1_7.yml

- name: "Initialize data variables"
  ansible.builtin.set_fact:
    data_02: "Not collected yet"
    status_02: "UNKNOWN"
    details_02: "Not evaluated"
    task_02_name: "Not executed"
    task_02_cmd: "N/A"
    task_02_rc: -1

- name: "Req 1 - Execute audit script for udf kernel module"
  ansible.builtin.shell:
    cmd: /bin/bash
    stdin: "{{ audit_script_content }}"
  args:
    executable: /bin/bash
  register: audit_result
  failed_when: false
  changed_when: false

- name: "Store requirement 01 details"
  ansible.builtin.set_fact:
    task_01_name: "Execute audit script for udf kernel module"
    task_01_cmd: "{{ audit_result.cmd | default('N/A') }}"
    task_01_rc: "{{ audit_result.rc | default(-1) }}"
    data_01: "{{ audit_result.stdout | default('') }}"
    status_01: "{{ 'PASS' if audit_result.rc == 0 else 'FAIL' }}"
    details_01: "Audit script completed"

- name: "Store requirement 02 details"
  ansible.builtin.set_fact:
    task_02_name: "Audit udf kernel module availability"
    task_02_cmd: "{{ audit_result.cmd | default('N/A') }}"
    task_02_rc: "{{ audit_result.rc | default(-1) }}"
    data_02: "{{ audit_result.stdout | default('') | trim }}"
    status_02: "{{ 'PASS' if ('** PASS **' in audit_result.stdout | default('')) else 'FAIL' }}"
    details_02: "Verification completed successfully"

- name: "Store final audit result in cis_result"
  ansible.builtin.set_fact:
    cis_result: "{{ 'PASS' if '** PASS **' in audit_result.stdout | default('') else 'FAIL' }}"

- name: "Store requirement 03 details"
  ansible.builtin.set_fact:
    task_03_name: "Store final audit result in cis_result"
    task_03_cmd: "set_fact"
    task_03_rc: 0
    data_03: "cis_result set to {{ cis_result }}"
    status_03: "PASS"
    details_03: "cis_result stored successfully"

- name: "Store requirement 04 details"
  ansible.builtin.set_fact:
    task_04_name: "Generate audit report"
    task_04_cmd: "debug msg"
    task_04_rc: 0
    data_04: "Report displayed"
    status_04: "PASS"
    details_04: "Audit report generated"

- name: "Generate audit report"
  ansible.builtin.debug:
    msg:
    - "========================================================"
    - "        AUDIT REPORT — CIS 1.1.1.7"
    - "========================================================"
    - "Reference: CIS Benchmark checkpoint 1.1.1.7"
    - ""
    - "REQUIREMENT 01 - {{ req_01 }}:"
    - "  Task: {{ task_01_name | default('Not recorded') }}"
    - "  Command: {{ task_01_cmd | default('N/A') }}"
    - "  Exit code: {{ task_01_rc | default(-1) }}"
    - "  Data: {{ data_01 | default('') | trim }}"
    - "  Status: {{ status_01 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_01 | default('') | trim }}"
    - ""
    - "REQUIREMENT 02 - {{ req_02 }}:"
    - "  Task: {{ task_02_name | default('Not recorded') }}"
    - "  Command: {{ task_02_cmd | default('N/A') }}"
    - "  Exit code: {{ task_02_rc | default(-1) }}"
    - "  Data: {{ data_02 | default('') | trim }}"
    - "  Status: {{ status_02 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_02 | default('') | trim }}"
    - ""
    - "REQUIREMENT 03 - {{ req_03 }}:"
    - "  Task: {{ task_03_name | default('Not recorded') }}"
    - "  Command: {{ task_03_cmd | default('N/A') }}"
    - "  Exit code: {{ task_03_rc | default(-1) }}"
    - "  Data: {{ data_03 | default('') | trim }}"
    - "  Status: {{ status_03 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_03 | default('') | trim }}"
    - ""
    - "REQUIREMENT 04 - {{ req_04 }}:"
    - "  Task: {{ task_04_name | default('Not recorded') }}"
    - "  Command: {{ task_04_cmd | default('N/A') }}"
    - "  Exit code: {{ task_04_rc | default(-1) }}"
    - "  Data: {{ data_04 | default('') | trim }}"
    - "  Status: {{ status_04 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_04 | default('') | trim }}"
    - ""
    - "========================================================"
    - "OVERALL COMPLIANCE:"
    - "  Result: {{ cis_result | default('UNKNOWN') | trim }}"
    - "========================================================"
