---
- name: Initialize meta data variables
  include_vars: cis_audit_var_3_3_3.yml

- name: "Initialize data variables"
  set_fact:
    data_01: "Not collected yet"
    status_01: "UNKNOWN"
    details_01: "Not evaluated"
    task_01_name: "Not executed"
    task_01_cmd: "N/A"
    task_01_rc: -1
    data_02: "Not collected yet"
    status_02: "UNKNOWN"
    details_02: "Not evaluated"
    task_02_name: "Not executed"
    task_02_cmd: "N/A"
    task_02_rc: -1
    data_03: "Not collected yet"
    status_03: "UNKNOWN"
    details_03: "Not evaluated"
    task_03_name: "Not executed"
    task_03_cmd: "N/A"
    task_03_rc: -1

- name: "Req 01 - Execute audit script via stdin (no temporary file)"
  ansible.builtin.shell: /bin/bash
  args:
    stdin: "{{ audit_script_content }}"
    executable: /bin/bash
  register: result_01
  failed_when: false
  changed_when: false

- name: "Store requirement 01 details"
  set_fact:
    task_01_name: "Execute audit script"
    task_01_cmd: "bash (stdin from audit_script_content)"
    task_01_rc: "{{ result_01.rc | default(-1) }}"
    data_01: "{{ result_01.stdout | default('') | trim }}"
    status_01: "{{ ('PASS' if result_01.rc | default(-1) | int == 0 else 'FAIL') | trim }}"
    details_01: "{{ ('Script executed successfully' if result_01.rc | default(-1) | int == 0 else 'Script execution failed') | trim }}"

- name: "Req 02 - Summarise compliance status"
  set_fact:
    task_02_name: "Verify compliance status"
    task_02_cmd: "Check if '** PASS **' in audit script output"
    task_02_rc: "0"
    data_02: "{{ result_01.stdout | default('') | trim }}"
    status_02: "{{ ('PASS' if ('** PASS **' in (result_01.stdout | default(''))) else 'FAIL') | trim }}"
    details_02: "{{ ('Compliant' if ('** PASS **' in (result_01.stdout | default(''))) else 'Non-compliant') | trim }}"

- name: "Req 03 - Store overall compliance result"
  set_fact:
    cis_result: "{{ status_02 | trim }}"
    task_03_name: "Store final audit result"
    task_03_cmd: "set_fact cis_result = status_02"
    task_03_rc: "0"
    data_03: "cis_result: {{ status_02 | trim }}"
    status_03: "{{ status_02 | trim }}"
    details_03: "Overall compliance status derived from requirement 02"

- name: "Generate audit report"
  debug:
    msg:
    - "AUDIT REPORT — CIS 3.3.3"
    - "Reference: CIS Benchmark checkpoint 3.3.3"
    - ""
    - "REQUIREMENT 01 - {{ req_01 }}"
    - "  Task: {{ task_01_name | default('Not recorded') }}"
    - "  Command: {{ task_01_cmd | default('N/A') }}"
    - "  Exit code: {{ task_01_rc | default(-1) }}"
    - "  Data: {{ data_01 | default('') | trim }}"
    - "  Status: {{ status_01 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_01 | default('') | trim }}"
    - ""
    - "REQUIREMENT 02 - {{ req_02 }}:"
    - "  Task: {{ task_02_name | default('Not recorded') }}"
    - "  Command: {{ task_02_cmd | default('N/A') }}"
    - "  Exit code: {{ task_02_rc | default(-1) }}"
    - "  Data: {{ data_02 | default('') | trim }}"
    - "  Status: {{ status_02 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_02 | default('') | trim }}"
    - ""
    - "REQUIREMENT 03 - {{ req_03 }}:"
    - "  Task: {{ task_03_name | default('Not recorded') }}"
    - "  Command: {{ task_03_cmd | default('N/A') }}"
    - "  Exit code: {{ task_03_rc | default(-1) }}"
    - "  Data: {{ data_03 | default('') | trim }}"
    - "  Status: {{ status_03 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_03 | default('') | trim }}"
    - ""
    - "========================================================"
    - "OVERALL COMPLIANCE:"
    - "  Result: {{ cis_result | default('UNKNOWN') }}"
    - "========================================================"
