---
- name: Initialize meta data variables
  include_vars: cis_audit_var_6_2_4_1.yml

- name: "Snapshot - Create backup directory"
  ansible.builtin.file:
    path: "{{ backup_dir }}"
    state: directory
    mode: '0700'
  tags: [snapshot]
- name: "Snapshot - Check if audit script exists"
  ansible.builtin.stat:
    path: "{{ audit_script }}"
  register: _snap_script_stat
  failed_when: false
  tags: [snapshot]
- name: "Snapshot - Record audit script existence marker"
  ansible.builtin.copy:
    content: "{{ _snap_script_stat.stat.exists | default(false) }}"
    dest: "{{ backup_dir }}/script_existed"
  tags: [snapshot]

- block:
  - name: "Initialize data variables"
    set_fact:
      data_01: "Not collected yet"
      status_01: "UNKNOWN"
      details_01: "Not evaluated"
      task_01_name: "Not executed"
      task_01_cmd: "N/A"
      task_01_rc: -1
    tags: [execute]

  - name: "Req 01 - Deploy audit script to target"
    ansible.builtin.copy:
      content: "{{ audit_script_content }}"
      dest: "{{ audit_script }}"
      mode: '0700'
    failed_when: false
    changed_when: false
    tags: [execute]

  - name: "Req 01 - Execute audit script"
    ansible.builtin.shell: "/bin/bash {{ audit_script }}"
    args:
      executable: /bin/bash
    register: audit_result
    failed_when: false
    ignore_errors: yes
    changed_when: false
    tags: [execute]

  - name: "Req 01 - Clean up audit script"
    ansible.builtin.file:
      path: "{{ audit_script }}"
      state: absent
    failed_when: false
    changed_when: false
    tags: [execute]

  - name: "Store requirement 01 details"
    set_fact:
      task_01_name: "Execute audit script to verify /var/log permissions and ownership"
      task_01_cmd: "/bin/bash {{ audit_script }}"
      task_01_rc: "{{ audit_result.rc | default(-1) }}"
      data_01: "{{ audit_result.stdout | default('') | trim }}"
      status_01: "{{ 'PASS' if audit_result.rc | default(-1) == 0 or '** Pass **' in (audit_result.stdout | default('')) else 'ERROR' }}"
      details_01: "{{ 'Audit script completed successfully' if audit_result.rc | default(-1) == 0 or '** Pass **' in (audit_result.stdout | default('')) else 'Audit script failed with rc=' ~ (audit_result.rc | default(-1)) }}"
    tags: [execute]

  - name: "Req 02 - Determine compliance status from audit output"
    set_fact:
      status_02: "{{ 'PASS' if '** Pass **' in (audit_result.stdout | default('')) else 'FAIL' }}"
      details_02: "{{ 'System is compliant' if '** Pass **' in (audit_result.stdout | default('')) else 'System is not compliant - files with incorrect permissions/ownership detected' }}"
    tags: [execute]

  - name: "Store final audit result in cis_result"
    set_fact:
      cis_result: "{{ status_02 | default('ERROR') | trim }}"
    tags: [execute]

  - name: "Generate audit report"
    debug:
      msg:
      - "AUDIT REPORT — CIS 6.2.4.1"
      - "Reference: CIS Benchmark checkpoint 6.2.4.1"
      - ""
      - "REQUIREMENT 01 - {{ req_01 }}:"
      - "  Task: {{ task_01_name | default('Not recorded') }}"
      - "  Command: {{ task_01_cmd | default('N/A') }}"
      - "  Exit code: {{ task_01_rc | default(-1) }}"
      - "  Data: {{ data_01 | default('') | trim }}"
      - "  Status: {{ status_01 | default('ERROR') | trim }}"
      - "  Details: {{ details_01 | default('') | trim }}"
      - ""
      - "REQUIREMENT 02 - {{ req_02 }}:"
      - "  Task: Parse audit script output for compliance"
      - "  Command: N/A"
      - "  Exit code: N/A"
      - "  Data: {{ audit_result.stdout | default('') | trim }}"
      - "  Status: {{ status_02 | default('ERROR') | trim }}"
      - "  Details: {{ details_02 | default('') | trim }}"
      - ""
      - "REQUIREMENT 03 - {{ req_03 }}:"
      - "  Task: Store cis_result"
      - "  Command: set_fact"
      - "  Exit code: N/A"
      - "  Data: cis_result = {{ cis_result | default('ERROR') | trim }}"
      - "  Status: {{ 'PASS' if cis_result is defined else 'ERROR' | trim }}"
      - "  Details: Final audit result stored in cis_result"
      - ""
      - "========================================================"
      - "OVERALL COMPLIANCE:"
      - "  Result: {{ cis_result | default('ERROR') | trim }}"
      - "  Details: {{ details_02 | default('Not evaluated') | trim }}"
      - "========================================================"
    tags: [execute]

  always:
  - name: "Restore - Check if backup directory exists"
    ansible.builtin.stat:
      path: "{{ backup_dir }}"
    register: _restore_dir_stat
    failed_when: false
    tags: [restore]

  - name: "Restore - Read audit script existence marker"
    ansible.builtin.slurp:
      src: "{{ backup_dir }}/script_existed"
    register: _restore_script_existed
    when: _restore_dir_stat.stat.exists | default(false)
    failed_when: false
    tags: [restore]

  - name: "Restore - Remove audit script if it was created by audit"
    ansible.builtin.file:
      path: "{{ audit_script }}"
      state: absent
    when:
    - _restore_script_existed.content is defined
    - (_restore_script_existed.content | b64decode | trim) == 'False'
    failed_when: false
    tags: [restore]

  - name: "Restore - Remove backup directory"
    ansible.builtin.file:
      path: "{{ backup_dir }}"
      state: absent
    failed_when: false
    tags: [restore]
