# Requirement 9 - Summarize overall compliance
- name: "Req 09 - Summarize overall compliance"
  set_fact:
    status_09: "{{ 'PASS' if ('FAIL' not in [status_01, status_02, status_03, status_04, status_05, status_06, status_07, status_08]) else 'FAIL' }}"
    details_09: "{{ 'Overall compliance: PASS. No message access server services are in use.' if ('FAIL' not in [status_01, status_02, status_03, status_04, status_05, status_06, status_07, status_08]) else 'Overall compliance: FAIL. Some checks failed.' }}"
    task_09_name: "Req 09 - Summarize overall compliance"
    task_09_cmd: "N/A"
    task_09_rc: -1
    data_09: "N/A"

# Requirement 10 - Store final result
- name: "Req 10 - Store final audit result in cis_result"
  set_fact:
    cis_result: "{{ status_09 }}"
    task_10_name: "Req 10 - Store final audit result in cis_result"
    task_10_cmd: "N/A"
    task_10_rc: -1
