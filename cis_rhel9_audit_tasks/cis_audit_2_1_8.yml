    details_04: "{{ 'NOT_APPLICABLE: dovecot is not installed' if not (dovecot_installed | default(false) | bool) else ('PASS: dovecot.service is not enabled' if (result_04.rc | default(-1) != 0) else 'FAIL: dovecot.service is enabled') }}"

