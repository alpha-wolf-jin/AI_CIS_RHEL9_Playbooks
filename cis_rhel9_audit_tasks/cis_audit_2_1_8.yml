---
- name: Initialize meta data variables
  include_vars: cis_audit_var_2_1_8.yml

- name: "Req 01 - Check if dovecot is installed"
  shell: "rpm -q dovecot"
  args:
    executable: /bin/bash
  register: result_01
  failed_when: false
  changed_when: false

- name: "Store requirement 01 details"
  set_fact:
    task_01_name: "Req 01 - Check if dovecot is installed"
    task_01_cmd: "rpm -q dovecot"
    task_01_rc: "{{ result_01.rc | default(-1) }}"
    data_01: "{{ result_01.stdout | default('') | trim }}"
    dovecot_installed: "{{ result_01.rc == 0 }}"
    status_01: "{{ 'PASS' if result_01.rc != 0 else 'FAIL' }}"
    details_01: "{{ 'PASS: Package dovecot is not installed' if result_01.rc != 0 else 'FAIL: Package dovecot is installed' }}"

# Requirement 2
- name: "Req 02 - Check if cyrus-imapd is installed"
  shell: "rpm -q cyrus-imapd"
  args:
    executable: /bin/bash
  register: result_02
  failed_when: false
  changed_when: false

- name: "Store requirement 02 details"
  set_fact:
    task_02_name: "Req 02 - Check if cyrus-imapd is installed"
    task_02_cmd: "rpm -q cyrus-imapd"
    task_02_rc: "{{ result_02.rc | default(-1) }}"
    data_02: "{{ result_02.stdout | default('') | trim }}"
    cyrus_installed: "{{ result_02.rc == 0 }}"
    status_02: "{{ 'PASS' if result_02.rc != 0 else 'FAIL' }}"
    details_02: "{{ 'PASS: Package cyrus-imapd is not installed' if result_02.rc != 0 else 'FAIL: Package cyrus-imapd is installed' }}"

# Requirement 3
- name: "Req 03 - Check if dovecot.socket is enabled"
  shell: "systemctl is-enabled dovecot.socket 2>/dev/null | grep 'enabled'"
  args:
    executable: /bin/bash
  register: result_03
  failed_when: false
  changed_when: false
  when: dovecot_installed | default(false) | bool

- name: "Store requirement 03 details"
  set_fact:
    task_03_name: "Req 03 - Check if dovecot.socket is enabled"
    task_03_cmd: "systemctl is-enabled dovecot.socket 2>/dev/null | grep 'enabled'"
    task_03_rc: "{{ -1 if not (dovecot_installed | default(false) | bool) else (result_03.rc | default(-1)) }}"
    data_03: "{{ 'N/A' if not (dovecot_installed | default(false) | bool) else (result_03.stdout | default('') | trim) }}"
    status_03: "{{ 'NOT_APPLICABLE' if not (dovecot_installed | default(false) | bool) else ('PASS' if (result_03.rc | default(-1) != 0) else 'FAIL') }}"
    details_03: "{{ 'NOT_APPLICABLE: dovecot is not installed' if not (dovecot_installed | default(false) | bool) else ('PASS: dovecot.socket is not enabled' if (result_03.rc | default(-1) != 0) else 'FAIL: dovecot.socket is enabled') }}"

