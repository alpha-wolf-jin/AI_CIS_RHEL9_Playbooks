---
- name: Initialize meta data variables
  include_vars: cis_audit_var_1_2_2_1.yml

- name: "Initialize data variables"
  set_fact:
    data_01: "Not collected yet"
    status_01: "UNKNOWN"
    details_01: "Not evaluated"
    task_01_name: "Not executed"
    task_01_cmd: "N/A"
    task_01_rc: -1
    data_02: "Not collected yet"
    status_02: "UNKNOWN"
    details_02: "Not evaluated"
    task_02_name: "Not executed"
    task_02_cmd: "N/A"
    task_02_rc: -1
    data_03: "Not collected yet"
    status_03: "UNKNOWN"
    details_03: "Not evaluated"
    task_03_name: "Not executed"
    task_03_cmd: "N/A"
    task_03_rc: -1
    data_04: "Not collected yet"
    status_04: "UNKNOWN"
    details_04: "Not evaluated"
    data_05: "Not collected yet"
    status_05: "UNKNOWN"
    details_05: "Not evaluated"

- name: "Req 01 - Check if dnf package manager is installed"
  ansible.builtin.shell: which dnf
  args:
    executable: /bin/bash
  register: result_01
  failed_when: false
  changed_when: false

- name: "Store requirement 01 details"
  set_fact:
    task_01_name: "Check dnf installation"
    task_01_cmd: "which dnf"
    task_01_rc: "{{ result_01.rc | default(-1) }}"
    data_01: "{{ result_01.stdout | default('') | trim }}"
    status_01: "{{ 'SKIP' if result_01.rc | default(-1) != 0 else 'PASS' | trim }}"
    details_01: "{{ 'dnf not found' if result_01.rc | default(-1) != 0 else 'dnf installed at ' + result_01.stdout | trim }}"
    dnf_available: "{{ result_01.rc | default(-1) == 0 }}"

- name: "Req 02 - Check for available updates using dnf check-update"
  ansible.builtin.shell: dnf check-update
  args:
    executable: /bin/bash
  register: result_02
  failed_when: false
  changed_when: false
  when: dnf_available | bool

- name: "Store requirement 02 details"
  set_fact:
    task_02_name: "Check for available updates"
    task_02_cmd: "dnf check-update"
    task_02_rc: "{{ result_02.rc | default(-1) }}"
    data_02: "{{ result_02.stdout | default('') | trim }}"
    status_02: "{{ 'SKIP' if result_02 is skipped else ('PASS' if result_02.rc | default(-1) == 0 else 'FAIL') | trim }}"
    details_02: "{{ 'dnf not available' if result_02 is skipped else ('No updates available' if result_02.rc | default(-1) == 0 else 'Updates available or error') | trim }}"

- name: "Req 03 - Check if system reboot is required"
  ansible.builtin.shell: dnf needs-restarting -r
  args:
    executable: /bin/bash
  register: result_03
  failed_when: false
  changed_when: false
  when: dnf_available | bool

- name: "Store requirement 03 details"
  set_fact:
    task_03_name: "Check if reboot required"
    task_03_cmd: "dnf needs-restarting -r"
    task_03_rc: "{{ result_03.rc | default(-1) }}"
    data_03: "{{ result_03.stdout | default('') | trim }}"
    status_03: "{{ 'SKIP' if result_03 is skipped else ('PASS' if result_03.rc | default(-1) == 0 else 'FAIL') | trim }}"
    details_03: "{{ 'dnf not available' if result_03 is skipped else ('No reboot required' if result_03.rc | default(-1) == 0 else 'Reboot required or error') | trim }}"

- name: "Req 04 - Summarize overall compliance status"
  set_fact:
    status_04: >-
      {{
        'PASS' if status_01 == 'PASS' and status_02 == 'PASS' and status_03 == 'PASS'
        else ('FAIL' if status_01 == 'FAIL' or status_02 == 'FAIL' or status_03 == 'FAIL'
        else ('SKIP' if status_01 == 'SKIP' or status_02 == 'SKIP' or status_03 == 'SKIP'
        else 'UNKNOWN'))
      }}

- name: "Store requirement 04 details"
  set_fact:
    data_04: "{{ status_04 }}"
    details_04: >-
      {{
        'All checks passed' if status_04 == 'PASS'
        else ('Some checks failed' if status_04 == 'FAIL'
        else ('Check skipped due to dnf not available' if status_04 == 'SKIP'
        else 'Unknown'))
      }}

- name: "Req 05 - Store final audit result"
  set_fact:
    cis_result: "{{ status_04 | trim }}"
    status_05: "{{ status_04 | trim }}"
    data_05: "{{ status_04 | trim }}"
    details_05: "{{ details_04 }}"

- name: "Generate audit report"
  debug:
    msg:
    - "AUDIT REPORT — CIS 1.2.2.1"
    - "Reference: CIS Benchmark checkpoint 1.2.2.1"
    - ""
    - "REQUIREMENT 01 - {{ req_01 }}:"
    - "  Task: {{ task_01_name | default('Not recorded') }}"
    - "  Command: {{ task_01_cmd | default('N/A') }}"
    - "  Exit code: {{ task_01_rc | default(-1) }}"
    - "  Data: {{ data_01 | default('') | trim }}"
    - "  Status: {{ status_01 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_01 | default('') | trim }}"
    - ""
    - "REQUIREMENT 02 - {{ req_02 }}:"
    - "  Task: {{ task_02_name | default('Not recorded') }}"
    - "  Command: {{ task_02_cmd | default('N/A') }}"
    - "  Exit code: {{ task_02_rc | default(-1) }}"
    - "  Data: {{ data_02 | default('') | trim }}"
    - "  Status: {{ status_02 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_02 | default('') | trim }}"
    - ""
    - "REQUIREMENT 03 - {{ req_03 }}:"
    - "  Task: {{ task_03_name | default('Not recorded') }}"
    - "  Command: {{ task_03_cmd | default('N/A') }}"
    - "  Exit code: {{ task_03_rc | default(-1) }}"
    - "  Data: {{ data_03 | default('') | trim }}"
    - "  Status: {{ status_03 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_03 | default('') | trim }}"
    - ""
    - "REQUIREMENT 04 - {{ req_04 }}:"
    - "  Task: Summarize compliance"
    - "  Command: N/A"
    - "  Exit code: N/A"
    - "  Data: {{ data_04 | default('') | trim }}"
    - "  Status: {{ status_04 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_04 | default('') | trim }}"
    - ""
    - "REQUIREMENT 05 - {{ req_05 }}:"
    - "  Task: Store cis_result"
    - "  Command: N/A"
    - "  Exit code: N/A"
    - "  Data: {{ data_05 | default('') | trim }}"
    - "  Status: {{ status_05 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_05 | default('') | trim }}"
    - ""
    - "========================================================"
    - "OVERALL COMPLIANCE:"
    - "  Result: {{ cis_result }}"
    - "========================================================"
