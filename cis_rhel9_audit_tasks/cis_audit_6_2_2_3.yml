---
- name: Initialize meta data variables
  include_vars: cis_audit_var_6_2_2_3.yml

- name: "Initialize data variables"
  set_fact:
    data_01: "Not collected yet"
    status_01: "ERROR"
    details_01: "Not evaluated"
    data_02: "Not collected yet"
    status_02: "ERROR"
    details_02: "Not evaluated"
    data_03: "Not collected yet"
    status_03: "ERROR"
    details_03: "Not evaluated"
    data_04: "Not collected yet"
    status_04: "ERROR"
    details_04: "Not evaluated"
    task_01_name: "Not executed"
    task_01_cmd: "N/A"
    task_01_rc: -1
    task_02_name: "Not executed"
    task_02_cmd: "N/A"
    task_02_rc: -1
    task_03_name: "Not executed"
    task_03_cmd: "N/A"
    task_03_rc: -1
    task_04_name: "Not executed"
    task_04_cmd: "N/A"
    task_04_rc: -1

- name: "Req 01 - Check if journald binary exists"
  shell: which journalctl
  args:
    executable: /bin/bash
  register: result_01
  failed_when: false
  changed_when: false

- name: "Store requirement 01 details"
  set_fact:
    task_01_name: "Check if journald binary exists"
    task_01_cmd: "which journalctl"
    task_01_rc: "{{ result_01.rc | default(-1) }}"
    data_01: "{{ result_01.stdout | default('') | trim }}"
    status_01: "{{ ('PASS' if result_01.rc | default(-1) == 0 else 'FAIL') | trim }}"
    details_01: "{{ ('journalctl binary found, systemd-journald is available' if result_01.rc | default(-1) == 0 else 'journalctl binary not found, systemd-journald not installed') | trim }}"
    journald_installed: "{{ result_01.rc | default(-1) == 0 }}"

- name: "Req 02 - Check if journald Compress is configured to yes"
  shell: systemd-analyze cat-config systemd/journald.conf systemd/journald.conf.d/* | grep -E '^Compress=yes'
  args:
    executable: /bin/bash
  register: result_02
  failed_when: false
  changed_when: false

- name: "Store requirement 02 details"
  set_fact:
    task_02_name: "Check if journald Compress is configured to yes"
    task_02_cmd: "systemd-analyze cat-config systemd/journald.conf systemd/journald.conf.d/* | grep -E '^Compress=yes'"
    task_02_rc: "{{ result_02.rc | default(-1) }}"
    data_02: "{{ result_02.stdout | default('') | trim }}"
    status_02: >-
      {%- if not journald_installed -%}
        SKIP
      {%- elif result_02.rc | default(-1) == 0 -%}
        PASS
      {%- else -%}
        FAIL
      {%- endif %}
    details_02: >-
      {%- if not journald_installed -%}
        Skipped - systemd-journald not installed
      {%- elif result_02.rc | default(-1) == 0 -%}
        Compress=yes is configured
      {%- else -%}
        Compress is not set to yes or configuration missing
      {%- endif %}

- name: "Req 03 - Determine overall compliance"
  set_fact:
    task_03_name: "Determine overall compliance based on audit results"
    task_03_cmd: "N/A"
    task_03_rc: -1
    data_03: "N/A"
    status_03: >-
      {%- if status_01 | trim == 'FAIL' -%}
        SKIP
      {%- else -%}
        {{ status_02 | trim }}
      {%- endif %}
    details_03: >-
      {%- if status_01 | trim == 'FAIL' -%}
        Overall SKIP - systemd-journald not installed
      {%- else -%}
        {{ details_02 | trim }}
      {%- endif %}

- name: "Req 04 - Store final audit result in cis_result"
  set_fact:
    task_04_name: "Store final audit result in cis_result"
    task_04_cmd: "N/A"
    task_04_rc: -1
    data_04: "{{ status_03 | trim }}"
    status_04: "{{ status_03 | trim }}"
    details_04: "{{ details_03 | trim }}"
    cis_result: "{{ status_03 | trim }}"

- name: "Generate audit report"
  debug:
    msg:
    - "AUDIT REPORT — CIS 6.2.2.3"
    - "Reference: CIS Benchmark checkpoint 6.2.2.3"
    - ""
    - "REQUIREMENT 01 - {{ req_01 }}:"
    - "  Task: {{ task_01_name | default('Not recorded') }}"
    - "  Command: {{ task_01_cmd | default('N/A') }}"
    - "  Exit code: {{ task_01_rc | default(-1) }}"
    - "  Data: {{ data_01 | default('') | trim }}"
    - "  Status: {{ status_01 | default('ERROR') | trim }}"
    - "  Details: {{ details_01 | default('') | trim }}"
    - ""
    - "REQUIREMENT 02 - {{ req_02 }}:"
    - "  Task: {{ task_02_name | default('Not recorded') }}"
    - "  Command: {{ task_02_cmd | default('N/A') }}"
    - "  Exit code: {{ task_02_rc | default(-1) }}"
    - "  Data: {{ data_02 | default('') | trim }}"
    - "  Status: {{ status_02 | default('ERROR') | trim }}"
    - "  Details: {{ details_02 | default('') | trim }}"
    - ""
    - "REQUIREMENT 03 - {{ req_03 }}:"
    - "  Task: {{ task_03_name | default('Not recorded') }}"
    - "  Command: {{ task_03_cmd | default('N/A') }}"
    - "  Exit code: {{ task_03_rc | default(-1) }}"
    - "  Data: {{ data_03 | default('') | trim }}"
    - "  Status: {{ status_03 | default('ERROR') | trim }}"
    - "  Details: {{ details_03 | default('') | trim }}"
    - ""
    - "REQUIREMENT 04 - {{ req_04 }}:"
    - "  Task: {{ task_04_name | default('Not recorded') }}"
    - "  Command: {{ task_04_cmd | default('N/A') }}"
    - "  Exit code: {{ task_04_rc | default(-1) }}"
    - "  Data: {{ data_04 | default('') | trim }}"
    - "  Status: {{ status_04 | default('ERROR') | trim }}"
    - "  Details: {{ details_04 | default('') | trim }}"
    - ""
    - "========================================================"
    - "OVERALL COMPLIANCE:"
    - "  Result: {{ cis_result | default('ERROR') | trim }}"
    - "  Details: {{ details_04 | default('Not evaluated') | trim }}"
    - "========================================================"
