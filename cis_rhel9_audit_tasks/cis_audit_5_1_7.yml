---
- name: Initialize meta data variables
  include_vars: cis_audit_var_5_1_7.yml

- name: "Initialize data variables"
  set_fact:
    data_01: "Not collected yet"
    status_01: "UNKNOWN"
    details_01: "Not evaluated"
    data_02: "Not collected yet"
    status_02: "UNKNOWN"
    details_02: "Not evaluated"
    data_03: "Not collected yet"
    status_03: "UNKNOWN"
    details_03: "Not evaluated"
    data_04: "Not collected yet"
    status_04: "UNKNOWN"
    details_04: "Not evaluated"
    data_05: "Not collected yet"
    status_05: "UNKNOWN"
    details_05: "Not evaluated"
    task_01_name: "Not executed"
    task_01_cmd: "N/A"
    task_01_rc: -1

# Requirement 1: SSH server installation status
- name: "Req 01 - Check if SSH server is installed"
  shell: "which sshd || dpkg -l | grep openssh-server || rpm -q openssh-server"
  args:
    executable: /bin/bash
  register: result_01
  failed_when: false
  changed_when: false

- name: "Store requirement 01 details"
  set_fact:
    task_01_name: "Check SSH server installation"
    task_01_cmd: "which sshd || dpkg -l | grep openssh-server || rpm -q openssh-server"
    task_01_rc: "{{ result_01.rc | default(-1) }}"
    data_01: "{{ result_01.stdout | default('') | trim }}"
    status_01: "{{ ('PASS' if result_01.rc | default(-1) == 0 else 'FAIL') | trim }}"
    details_01: "{{ 'SSH server is installed' if result_01.rc | default(-1) == 0 else 'SSH server is not installed' | trim }}"
    sshd_installed: "{{ result_01.rc | default(-1) == 0 }}"

# Requirement 2: Check for access restrictions
- name: "Req 02 - Check sshd access restrictions"
  shell: |
    sshd -T 2>/dev/null | grep -Pi -- '^\\h*(allow|deny)(users|groups)\\h+\\H+'
  args:
    executable: /bin/bash
  register: result_02
  failed_when: false
  changed_when: false
  when: sshd_installed | default(false)

- name: "Store requirement 02 details"
  set_fact:
    task_02_name: "Check sshd access restrictions"
    task_02_cmd: |
      sshd -T | grep -Pi -- '^\\h*(allow|deny)(users|groups)\\h+\\H+'
    task_02_rc: "{{ result_02.rc | default(-1) if sshd_installed | default(false) else -1 }}"
    data_02: "{{ result_02.stdout | default('') | trim if sshd_installed | default(false) else 'N/A' }}"
    status_02: >-
      {{ 'NOT_APPLICABLE' if not (sshd_installed | default(false)) else
         ('PASS' if result_02.rc | default(-1) == 0 else 'FAIL') | trim }}
    details_02: >-
      {{ 'sshd not installed - not applicable' if not (sshd_installed | default(false)) else
         ('Access restrictions configured' if result_02.rc | default(-1) == 0 else 'No access restrictions found') | trim }}
  when: true

# Requirement 3: Manual review of lists (cannot be fully automated)
- name: "Req 03 - Review access lists for local policy compliance"
  set_fact:
    task_03_name: "Review access lists"
    task_03_cmd: "N/A (manual review)"
    task_03_rc: -1
    data_03: "{{ (result_02.stdout | default('') | trim) if sshd_installed | default(false) else 'N/A' }}"
    status_03: "{{ 'NOT_APPLICABLE' if not (sshd_installed | default(false)) else 'SKIPPED' | trim }}"
    details_03: "{{ 'sshd not installed - not applicable' if not (sshd_installed | default(false)) else 'Manual review required for local policy compliance' | trim }}"
  when: true

# Pre-check for Match blocks
- name: "Check if Match blocks exist in sshd config"
  shell: "grep -q '^Match' /etc/ssh/sshd_config"
  register: match_blocks_exist
  failed_when: false
  changed_when: false
  when: sshd_installed | default(false)

# Requirement 4: Match block check for a specific user
- name: "Req 04 - Check sshd access restrictions for specific user context"
  shell: |
    sshd -T -C user=sshuser 2>/dev/null | grep -Pi -- '^\\h*(allow|deny)(users|groups)\\h+\\H+'
  args:
    executable: /bin/bash
  register: result_04
  failed_when: false
  changed_when: false
  when:
  - sshd_installed | default(false)
  - match_blocks_exist.rc | default(1) == 0

- name: "Store requirement 04 details"
  set_fact:
    task_04_name: "Check sshd access restrictions for user sshuser"
    task_04_cmd: |
      sshd -T -C user=sshuser | grep -Pi -- '^\\h*(allow|deny)(users|groups)\\h+\\H+'
    task_04_rc: "{{ result_04.rc | default(-1) if sshd_installed | default(false) and match_blocks_exist.rc | default(1) == 0 else -1 }}"
    data_04: "{{ result_04.stdout | default('') | trim if sshd_installed | default(false) and match_blocks_exist.rc | default(1) == 0 else 'N/A' }}"
    status_04: >-
      {{ 'NOT_APPLICABLE' if not (sshd_installed | default(false)) else
         ('SKIPPED' if match_blocks_exist.rc | default(1) != 0 else
          ('PASS' if result_04.rc | default(-1) == 0 else 'FAIL')) | trim }}
    details_04: >-
      {{ 'sshd not installed - not applicable' if not (sshd_installed | default(false)) else
         ('No Match blocks configured - skipped' if match_blocks_exist.rc | default(1) != 0 else
          ('Access restrictions found for user context' if result_04.rc | default(-1) == 0 else 'No access restrictions found for user context')) | trim }}
  when: true

# Requirement 5: Overall compliance summary
- name: "Req 05 - Summarize overall compliance"
  set_fact:
    task_05_name: "Overall compliance evaluation"
    task_05_cmd: "N/A"
    task_05_rc: 0
    data_05: "N/A"
    status_05: >-
      {{ 'NOT_APPLICABLE' if not (sshd_installed | default(false)) else
         ('PASS' if ((result_02 is defined and result_02.rc | default(-1) == 0) or
                     (result_04 is defined and result_04.rc | default(-1) == 0)) else 'FAIL') | trim }}
    details_05: >-
      {{ 'sshd not installed - check not applicable' if not (sshd_installed | default(false)) else
         ('At least one access directive is configured. Manual verification of local policy required.' if ((result_02 is defined and result_02.rc | default(-1) == 0) or (result_04 is defined and result_04.rc | default(-1) == 0)) else 'No access restrictions configured') | trim }}
  when: true

# Requirement 6: Store cis_result
- name: "Req 06 - Store overall compliance variable"
  set_fact:
    cis_result: "{{ status_05 | trim }}"
    task_06_name: "Store cis_result"
    task_06_cmd: "N/A"
    task_06_rc: 0
    data_06: "{{ status_05 | trim }}"
    status_06: "{{ status_05 | trim }}"
    details_06: "Overall compliance result stored for reporting"
  when: true

- name: "Generate audit report"
  debug:
    msg:
    - "AUDIT REPORT — CIS 5.1.7"
    - "Reference: CIS Benchmark checkpoint 5.1.7"
    - ""
    - "REQUIREMENT 01 - {{ req_01 }}:"
    - "  Task: {{ task_01_name | default('Not recorded') }}"
    - "  Command: {{ task_01_cmd | default('N/A') }}"
    - "  Exit code: {{ task_01_rc | default(-1) }}"
    - "  Data: {{ data_01 | default('') | trim }}"
    - "  Status: {{ status_01 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_01 | default('') | trim }}"
    - ""
    - "REQUIREMENT 02 - {{ req_02 }}:"
    - "  Task: {{ task_02_name | default('Not recorded') }}"
    - "  Command: {{ task_02_cmd | default('N/A') }}"
    - "  Exit code: {{ task_02_rc | default(-1) }}"
    - "  Data: {{ data_02 | default('') | trim }}"
    - "  Status: {{ status_02 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_02 | default('') | trim }}"
    - ""
    - "REQUIREMENT 03 - {{ req_03 }}:"
    - "  Task: {{ task_03_name | default('Not recorded') }}"
    - "  Command: {{ task_03_cmd | default('N/A') }}"
    - "  Exit code: {{ task_03_rc | default(-1) }}"
    - "  Data: {{ data_03 | default('') | trim }}"
    - "  Status: {{ status_03 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_03 | default('') | trim }}"
    - ""
    - "REQUIREMENT 04 - {{ req_04 }}:"
    - "  Task: {{ task_04_name | default('Not recorded') }}"
    - "  Command: {{ task_04_cmd | default('N/A') }}"
    - "  Exit code: {{ task_04_rc | default(-1) }}"
    - "  Data: {{ data_04 | default('') | trim }}"
    - "  Status: {{ status_04 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_04 | default('') | trim }}"
    - ""
    - "REQUIREMENT 05 - {{ req_05 }}:"
    - "  Task: {{ task_05_name | default('Not recorded') }}"
    - "  Command: {{ task_05_cmd | default('N/A') }}"
    - "  Exit code: {{ task_05_rc | default(-1) }}"
    - "  Data: {{ data_05 | default('') | trim }}"
    - "  Status: {{ status_05 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_05 | default('') | trim }}"
    - ""
    - "REQUIREMENT 06 - {{ req_06 }}:"
    - "  Task: {{ task_06_name | default('Not recorded') }}"
    - "  Command: {{ task_06_cmd | default('N/A') }}"
    - "  Exit code: {{ task_06_rc | default(-1) }}"
    - "  Data: {{ data_06 | default('') | trim }}"
    - "  Status: {{ status_06 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_06 | default('') | trim }}"
    - ""
    - "========================================================"
    - "OVERALL COMPLIANCE:"
    - "  Result: {{ cis_result | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_05 | default('Not evaluated') | trim }}"
    - "========================================================"
