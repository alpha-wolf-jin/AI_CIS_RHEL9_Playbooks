---
- name: Initialize meta data variables
  include_vars: cis_audit_var_5_4_1_1.yml

- name: "Initialize audit variables"
  set_fact:
    data_01: "Not collected"
    status_01: "UNKNOWN"
    details_01: "Not evaluated"
    task_01_name: "Not executed"
    task_01_cmd: "N/A"
    task_01_rc: -1
    data_02: "Not collected"
    status_02: "UNKNOWN"
    details_02: "Not evaluated"
    task_02_name: "Not executed"
    task_02_cmd: "N/A"
    task_02_rc: -1
    data_03: "Not collected"
    status_03: "UNKNOWN"
    details_03: "Not evaluated"
    task_03_name: "Not executed"
    task_03_cmd: "N/A"
    task_03_rc: -1
    data_04: "Not collected"
    status_04: "UNKNOWN"
    details_04: "Not evaluated"
    task_04_name: "Not executed"
    task_04_cmd: "N/A"
    task_04_rc: -1
    data_05: "Not collected"
    status_05: "UNKNOWN"
    details_05: "Not evaluated"
    task_05_name: "Not executed"
    task_05_cmd: "N/A"
    task_05_rc: -1
    data_06: "Not collected"
    status_06: "UNKNOWN"
    details_06: "Not evaluated"
    task_06_name: "Not executed"
    task_06_cmd: "N/A"
    task_06_rc: -1

- name: "Req 01 - Check if /etc/login.defs exists"
  ansible.builtin.stat:
    path: /etc/login.defs
  register: result_01
  failed_when: false

- name: "Store requirement 01 details"
  set_fact:
    task_01_name: "Check if /etc/login.defs exists"
    task_01_cmd: "stat /etc/login.defs"
    task_01_rc: 0
    data_01: "{{ result_01.stat.exists | default(false) }}"
    status_01: "{{ 'PASS' if result_01.stat.exists | default(false) else 'FAIL' }}"
    details_01: "{{ 'File exists' if result_01.stat.exists | default(false) else 'File not found' }}"

- name: "Req 02 - Check if /etc/shadow exists"
  ansible.builtin.stat:
    path: /etc/shadow
  register: result_02
  failed_when: false

- name: "Store requirement 02 details"
  set_fact:
    task_02_name: "Check if /etc/shadow exists"
    task_02_cmd: "stat /etc/shadow"
    task_02_rc: 0
    data_02: "{{ result_02.stat.exists | default(false) }}"
    status_02: "{{ 'PASS' if result_02.stat.exists | default(false) else 'FAIL' }}"
    details_02: "{{ 'File exists' if result_02.stat.exists | default(false) else 'File not found' }}"
    shadow_exists: "{{ result_02.stat.exists | default(false) }}"

- name: "Req 03 - Check PASS_MAX_DAYS value in /etc/login.defs"
  shell: grep -Pi -- '^\h*PASS_MAX_DAYS\h+\d+\b' /etc/login.defs
  args:
    executable: /bin/bash
  register: result_03
  failed_when: false
  changed_when: false

- name: "Extract PASS_MAX_DAYS value from grep output"
  set_fact:
    pass_max_days_value: "{{ (result_03.stdout | default('') | trim).split() | default([]) | last | default('0') }}"

- name: "Store requirement 03 details"
  set_fact:
    task_03_name: "Check PASS_MAX_DAYS in /etc/login.defs"
    task_03_cmd: |-
      grep -Pi -- '^\h*PASS_MAX_DAYS\h+\d+\b' /etc/login.defs
    task_03_rc: "{{ result_03.rc | default(-1) }}"
    data_03: "{{ result_03.stdout | default('') | trim }}"
    status_03: "{{ ('PASS' if (result_03.rc | default(-1) == 0) and (pass_max_days_value | int > 0) and (pass_max_days_value | int <= 365) else 'FAIL') }}"
    details_03: "{{ ('PASS_MAX_DAYS is ' ~ pass_max_days_value ~ ', within acceptable range (1-365)' if (result_03.rc | default(-1) == 0) and (pass_max_days_value | int > 0) and (pass_max_days_value | int <= 365) else ('PASS_MAX_DAYS value ' ~ pass_max_days_value ~ ' is out of range (exceeds 365 or <= 0)' if (result_03.rc | default(-1) == 0) else 'PASS_MAX_DAYS not configured or grep failed')) }}"

- name: "Req 04 - Check all users password expiration in /etc/shadow"
  shell: |
    {% raw %}
    awk -F: '($2~/^\$.+\$/) {if($5 > 365 || $5 < 1)print "User: " $1 " PASS_MAX_DAYS: " $5}' /etc/shadow
    {% endraw %}
  args:
    executable: /bin/bash
  register: result_04
  failed_when: false
  changed_when: false
  when: "shadow_exists | default(false)"

- name: "Store requirement 04 details"
  set_fact:
    task_04_name: "Check password expiration in /etc/shadow"
    task_04_cmd: |-
      awk -F: '($2~/^\$.+\$/) {if($5 > 365 || $5 < 1)print "User: " $1 " PASS_MAX_DAYS: " $5}' /etc/shadow
    task_04_rc: "{{ result_04.rc | default(-1) }}"
    data_04: "{{ result_04.stdout | default('') | trim }}"
    status_04: "{{ 'SKIP' if not (shadow_exists | default(false)) else ('PASS' if (result_04.stdout | default('') | trim) == '' else 'FAIL') }}"
    details_04: "{{ '/etc/shadow does not exist, skipping check' if not (shadow_exists | default(false)) else ('No users with PASS_MAX_DAYS out of 1-365 range' if (result_04.stdout | default('') | trim) == '' else ('Violations found: ' ~ (result_04.stdout | default('') | trim))) }}"

- name: "Req 05 - Determine overall compliance status"
  set_fact:
    status_05: >-
      {%- set login_defs_exists = status_01 | trim == 'PASS' -%}
      {%- set shadow_exists = status_02 | trim == 'PASS' -%}
      {%- if not login_defs_exists or not shadow_exists -%}
        SKIP
      {%- elif status_03 | trim == 'PASS' and status_04 | trim == 'PASS' -%}
        PASS
      {%- else -%}
        FAIL
      {%- endif -%}
    details_05: >-
      {%- set login_defs_exists = status_01 | trim == 'PASS' -%}
      {%- set shadow_exists = status_02 | trim == 'PASS' -%}
      {%- if not login_defs_exists or not shadow_exists -%}
        One or more required files do not exist: /etc/login.defs or /etc/shadow
      {%- elif status_03 | trim == 'PASS' and status_04 | trim == 'PASS' -%}
        All checks passed - password expiration is properly configured
      {%- else -%}
        One or more checks failed - password expiration is not properly configured
      {%- endif -%}
    task_05_name: "Summarize overall compliance"
    task_05_cmd: "N/A"
    task_05_rc: -1
    data_05: "N/A"

- name: "Req 06 - Store final audit result in cis_result"
  set_fact:
    cis_result: "{{ status_05 | default('ERROR') | trim }}"
    task_06_name: "Store final audit result in cis_result"
    task_06_cmd: "set_fact"
    task_06_rc: 0
    data_06: "{{ status_05 | default('ERROR') | trim }}"
    status_06: "PASS"
    details_06: "Overall compliance status stored in cis_result: {{ status_05 | default('ERROR') | trim }}"

- name: "Generate audit report"
  debug:
    msg:
    - "AUDIT REPORT — CIS 5.4.1.1"
    - "Reference: CIS Benchmark checkpoint 5.4.1.1"
    - ""
    - "REQUIREMENT 01 - {{ req_01 }}:"
    - "  Task: {{ task_01_name | default('Not recorded') }}"
    - "  Command: {{ task_01_cmd | default('N/A') }}"
    - "  Exit code: {{ task_01_rc | default(-1) }}"
    - "  Data: {{ data_01 | default('') | trim }}"
    - "  Status: {{ status_01 | default('ERROR') | trim }}"
    - "  Details: {{ details_01 | default('') | trim }}"
    - ""
    - "REQUIREMENT 02 - {{ req_02 }}:"
    - "  Task: {{ task_02_name | default('Not recorded') }}"
    - "  Command: {{ task_02_cmd | default('N/A') }}"
    - "  Exit code: {{ task_02_rc | default(-1) }}"
    - "  Data: {{ data_02 | default('') | trim }}"
    - "  Status: {{ status_02 | default('ERROR') | trim }}"
    - "  Details: {{ details_02 | default('') | trim }}"
    - ""
    - "REQUIREMENT 03 - {{ req_03 }}:"
    - "  Task: {{ task_03_name | default('Not recorded') }}"
    - "  Command: {{ task_03_cmd | default('N/A') }}"
    - "  Exit code: {{ task_03_rc | default(-1) }}"
    - "  Data: {{ data_03 | default('') | trim }}"
    - "  Status: {{ status_03 | default('ERROR') | trim }}"
    - "  Details: {{ details_03 | default('') | trim }}"
    - ""
    - "REQUIREMENT 04 - {{ req_04 }}:"
    - "  Task: {{ task_04_name | default('Not recorded') }}"
    - "  Command: {{ task_04_cmd | default('N/A') }}"
    - "  Exit code: {{ task_04_rc | default(-1) }}"
    - "  Data: {{ data_04 | default('') | trim }}"
    - "  Status: {{ status_04 | default('ERROR') | trim }}"
    - "  Details: {{ details_04 | default('') | trim }}"
    - ""
    - "REQUIREMENT 05 - {{ req_05 }}:"
    - "  Task: {{ task_05_name | default('Not recorded') }}"
    - "  Command: {{ task_05_cmd | default('N/A') }}"
    - "  Exit code: {{ task_05_rc | default(-1) }}"
    - "  Data: {{ data_05 | default('') | trim }}"
    - "  Status: {{ status_05 | default('ERROR') | trim }}"
    - "  Details: {{ details_05 | default('') | trim }}"
    - ""
    - "REQUIREMENT 06 - {{ req_06 }}:"
    - "  Task: {{ task_06_name | default('Not recorded') }}"
    - "  Command: {{ task_06_cmd | default('N/A') }}"
    - "  Exit code: {{ task_06_rc | default(-1) }}"
    - "  Data: {{ data_06 | default('') | trim }}"
    - "  Status: {{ status_06 | default('ERROR') | trim }}"
    - "  Details: {{ details_06 | default('') | trim }}"
    - ""
    - "OVERALL COMPLIANCE:"
    - "  Result: {{ cis_result }}"
