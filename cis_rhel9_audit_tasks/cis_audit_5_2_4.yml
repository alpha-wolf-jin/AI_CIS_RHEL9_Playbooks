---
- name: Initialize meta data variables
  include_vars: cis_audit_var_5_2_4.yml

- name: "Initialize data variables"
  set_fact:
    data_01: "Not collected yet"
    status_01: "ERROR"
    details_01: "Not evaluated"
    data_02: "Not collected yet"
    status_02: "ERROR"
    details_02: "Not evaluated"
    data_03: "Not collected yet"
    status_03: "ERROR"
    details_03: "Not evaluated"
    data_04: "Not collected yet"
    status_04: "ERROR"
    details_04: "Not evaluated"
    task_01_name: "Not executed"
    task_01_cmd: "N/A"
    task_01_rc: -1
    task_02_name: "Not executed"
    task_02_cmd: "N/A"
    task_02_rc: -1
    task_03_name: "Not executed"
    task_03_cmd: "N/A"
    task_03_rc: -1
    task_04_name: "Not executed"
    task_04_cmd: "N/A"
    task_04_rc: -1

# Requirement 01: Check if sudo is installed
- name: "Req 01 - Check if sudo is installed"
  shell: which sudo
  args:
    executable: /bin/bash
  register: sudo_installed
  failed_when: false
  changed_when: false

- name: "Store requirement 01 details"
  set_fact:
    task_01_name: "Check if sudo is installed"
    task_01_cmd: "which sudo"
    task_01_rc: "{{ sudo_installed.rc | default(-1) }}"
    data_01: "{{ sudo_installed.stdout | default('') | trim }}"
    status_01: "{{ 'PASS' if sudo_installed.rc | default(-1) == 0 else 'FAIL' }}"
    details_01: "{{ 'sudo found at: ' + sudo_installed.stdout | trim if sudo_installed.rc | default(-1) == 0 else 'sudo not found' }}"

# Requirement 02: Check for NOPASSWD entries (only if sudo is installed)
- name: "Req 02 - Check for NOPASSWD entries in sudoers files"
  shell: grep -r "^[^#].*NOPASSWD" /etc/sudoers*
  args:
    executable: /bin/bash
  register: result_02
  failed_when: false
  changed_when: false
  when:
  - "sudo_installed.rc | default(-1) == 0"

- name: "Store requirement 02 details"
  set_fact:
    task_02_name: "Check for NOPASSWD entries in sudoers files"
    task_02_cmd: "grep -r '^[^#].*NOPASSWD' /etc/sudoers*"
    task_02_rc: "{{ result_02.rc | default(-1) if result_02 is not skipped else -1 }}"
    data_02: "{{ result_02.stdout | default('') | trim if result_02 is not skipped else 'N/A' }}"
    status_02: "{{ 'SKIP' if result_02 is skipped else ('FAIL' if result_02.rc | default(-1) == 0 else ('PASS' if result_02.rc | default(-1) == 1 else 'ERROR')) }}"
    details_02: "{{ 'Skipped: sudo not installed' if result_02 is skipped else ('NOPASSWD entries found' if result_02.rc | default(-1) == 0 else ('No NOPASSWD entries found' if result_02.rc | default(-1) == 1 else 'Error checking sudoers')) }}"

# Requirement 03: Summarize overall compliance
- name: "Req 03 - Summarize overall compliance"
  set_fact:
    task_03_name: "Summarize overall compliance"
    task_03_cmd: "N/A"
    task_03_rc: -1
    data_03: >-
      {%- set sudo_missing = (sudo_installed.rc | default(-1) != 0) -%}
      {%- if sudo_missing -%}
        Not Applicable
      {%- elif status_02 | default('') == 'PASS' -%}
        Compliant
      {%- elif status_02 | default('') == 'FAIL' -%}
        Not Compliant
      {%- else -%}
        Unknown
      {%- endif -%}
    status_03: >-
      {%- set sudo_missing = (sudo_installed.rc | default(-1) != 0) -%}
      {%- if sudo_missing -%}
        SKIP
      {%- elif status_02 | default('') == 'PASS' -%}
        PASS
      {%- elif status_02 | default('') == 'FAIL' -%}
        FAIL
      {%- else -%}
        ERROR
      {%- endif -%}
    details_03: >-
      {%- set sudo_missing = (sudo_installed.rc | default(-1) != 0) -%}
      {%- if sudo_missing -%}
        Benchmark not applicable: sudo is not installed
      {%- elif status_02 | default('') == 'PASS' -%}
        System is compliant: no NOPASSWD entries found
      {%- elif status_02 | default('') == 'FAIL' -%}
        System is NOT compliant: NOPASSWD entries found
      {%- else -%}
        Unable to determine compliance
      {%- endif -%}

# Requirement 04: Store final audit result in cis_result
- name: "Req 04 - Store final audit result"
  set_fact:
    task_04_name: "Store final audit result in cis_result"
    task_04_cmd: "N/A"
    task_04_rc: -1
    data_04: "{{ status_03 | default('ERROR') | trim }}"
    status_04: "{{ status_03 | default('ERROR') | trim }}"
    details_04: "{{ details_03 | default('Not evaluated') | trim }}"
    cis_result: "{{ status_03 | default('ERROR') | trim }}"

# Final report
- name: "Generate audit report"
  debug:
    msg:
    - "AUDIT REPORT — CIS 5.2.4"
    - "Reference: CIS Benchmark checkpoint 5.2.4"
    - ""
    - "REQUIREMENT 01 - {{ req_01 }}:"
    - "  Task: {{ task_01_name | default('Not recorded') }}"
    - "  Command: {{ task_01_cmd | default('N/A') }}"
    - "  Exit code: {{ task_01_rc | default(-1) }}"
    - "  Data: {{ data_01 | default('') | trim }}"
    - "  Status: {{ status_01 | default('ERROR') | trim }}"
    - "  Details: {{ details_01 | default('') | trim }}"
    - ""
    - "REQUIREMENT 02 - {{ req_02 }}:"
    - "  Task: {{ task_02_name | default('Not recorded') }}"
    - "  Command: {{ task_02_cmd | default('N/A') }}"
    - "  Exit code: {{ task_02_rc | default(-1) }}"
    - "  Data: {{ data_02 | default('') | trim }}"
    - "  Status: {{ status_02 | default('ERROR') | trim }}"
    - "  Details: {{ details_02 | default('') | trim }}"
    - ""
    - "REQUIREMENT 03 - {{ req_03 }}:"
    - "  Task: {{ task_03_name | default('Not recorded') }}"
    - "  Command: {{ task_03_cmd | default('N/A') }}"
    - "  Exit code: {{ task_03_rc | default(-1) }}"
    - "  Data: {{ data_03 | default('') | trim }}"
    - "  Status: {{ status_03 | default('ERROR') | trim }}"
    - "  Details: {{ details_03 | default('') | trim }}"
    - ""
    - "REQUIREMENT 04 - {{ req_04 }}:"
    - "  Task: {{ task_04_name | default('Not recorded') }}"
    - "  Command: {{ task_04_cmd | default('N/A') }}"
    - "  Exit code: {{ task_04_rc | default(-1) }}"
    - "  Data: {{ data_04 | default('') | trim }}"
    - "  Status: {{ status_04 | default('ERROR') | trim }}"
    - "  Details: {{ details_04 | default('') | trim }}"
    - ""
    - "========================================================"
    - "OVERALL COMPLIANCE:"
    - "  Result: {{ cis_result | default('ERROR') | trim }}"
    - "  Details: {{ details_04 | default('Not evaluated') | trim }}"
    - "========================================================"
