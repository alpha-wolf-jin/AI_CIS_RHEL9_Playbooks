---
- name: Initialize meta data variables
  include_vars: cis_audit_var_1_1_2_1_1.yml

- name: "Initialize data variables"
  set_fact:
    data_01: "Not collected yet"
    status_01: "UNKNOWN"
    details_01: "Not evaluated"
    task_01_name: "Not executed"
    task_01_cmd: "N/A"
    task_01_rc: -1
    data_02: "Not collected yet"
    status_02: "UNKNOWN"
    details_02: "Not evaluated"
    task_02_name: "Not executed"
    task_02_cmd: "N/A"
    task_02_rc: -1
    data_03: "Not collected yet"
    status_03: "UNKNOWN"
    details_03: "Not evaluated"
    task_03_name: "Not executed"
    task_03_cmd: "N/A"
    task_03_rc: -1
    data_04: "Not collected yet"
    status_04: "UNKNOWN"
    details_04: "Not evaluated"
    task_04_name: "Not executed"
    task_04_cmd: "N/A"
    task_04_rc: -1

- name: "Req 1 - Check /tmp partition with findmnt"
  ansible.builtin.command: findmnt -kn /tmp
  register: result_01
  failed_when: false
  changed_when: false

- name: "Store requirement 01 details"
  set_fact:
    task_01_name: "Req 1 - Check /tmp partition with findmnt"
    task_01_cmd: "findmnt -kn /tmp"
    task_01_rc: "{{ result_01.rc | default(-1) }}"
    data_01: "{{ result_01.stdout | default('') | trim }}"
    status_01: "{{ 'PASS' if result_01.rc | default(-1) == 0 else 'FAIL' }}"
    details_01: "{{ 'PASS: /tmp is a separate partition' if result_01.rc | default(-1) == 0 else 'FAIL: /tmp is not mounted as separate partition' }}"

- name: "Req 2 - Check systemd tmp.mount status"
  ansible.builtin.command: systemctl is-enabled tmp.mount
  register: result_02
  failed_when: false
  changed_when: false

- name: "Store requirement 02 details"
  set_fact:
    task_02_name: "Req 2 - Check systemd tmp.mount status"
    task_02_cmd: "systemctl is-enabled tmp.mount"
    task_02_rc: "{{ result_02.rc | default(-1) }}"
    data_02: "{{ result_02.stdout | default('') | trim }}"
    status_02: "{{ 'PASS' if (result_02.stdout | default('') | trim) == 'generated' else 'FAIL' }}"
    details_02: "{{ 'PASS: tmp.mount is generated' if (result_02.stdout | default('') | trim) == 'generated' else 'FAIL: tmp.mount output is not generated (got: ' + (result_02.stdout | default('') | trim) + ')' }}"

- name: "Req 3 - Summarize overall compliance"
  set_fact:
    task_03_name: "Req 3 - Summarize overall compliance"
    task_03_cmd: "N/A (evaluation of previous results)"
    task_03_rc: 0
    data_03: "Overall compliance check based on requirements 01 and 02"
    status_03: "{{ ('PASS' if (status_01 | default('UNKNOWN')) == 'PASS' and (status_02 | default('UNKNOWN')) == 'PASS' else 'FAIL') | trim }}"
    details_03: "{{ ('Both checks passed. /tmp is a separate partition and systemd is configured to mount it at boot.' if (status_01 | default('UNKNOWN')) == 'PASS' and (status_02 | default('UNKNOWN')) == 'PASS' else 'One or both checks failed. Non-compliant.') | trim }}"

- name: "Req 4 - Store final audit result in cis_result"
  set_fact:
    task_04_name: "Req 4 - Store final audit result in cis_result"
    task_04_cmd: "set_fact cis_result"
    task_04_rc: 0
    data_04: "{{ status_03 | default('UNKNOWN') }}"
    status_04: "PASS"
    details_04: "Stored cis_result variable for overall compliance."
    cis_result: "{{ status_03 | default('UNKNOWN') }}"

- name: "Generate audit report"
  debug:
    msg:
    - "AUDIT REPORT — CIS 1.1.2.1.1"
    - "Reference: CIS Benchmark checkpoint 1.1.2.1.1"
    - ""
    - "REQUIREMENT 01 - {{ req_01 }}:"
    - "  Task: {{ task_01_name | default('Task not recorded') }}"
    - "  Command: {{ task_01_cmd | default('N/A') }}"
    - "  Exit code: {{ task_01_rc | default(-1) }}"
    - "  Data: {{ data_01 | default('Data collection failed') | trim }}"
    - "  Status: {{ status_01 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_01 | default('Not evaluated') | trim }}"
    - ""
    - "REQUIREMENT 02 - {{ req_02 }}:"
    - "  Task: {{ task_02_name | default('Task not recorded') }}"
    - "  Command: {{ task_02_cmd | default('N/A') }}"
    - "  Exit code: {{ task_02_rc | default(-1) }}"
    - "  Data: {{ data_02 | default('Data collection failed') | trim }}"
    - "  Status: {{ status_02 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_02 | default('Not evaluated') | trim }}"
    - ""
    - "REQUIREMENT 03 - {{ req_03 }}:"
    - "  Task: {{ task_03_name | default('Task not recorded') }}"
    - "  Command: {{ task_03_cmd | default('N/A') }}"
    - "  Exit code: {{ task_03_rc | default(-1) }}"
    - "  Data: {{ data_03 | default('Not evaluated') | trim }}"
    - "  Status: {{ status_03 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_03 | default('Not evaluated') | trim }}"
    - ""
    - "REQUIREMENT 04 - {{ req_04 }}:"
    - "  Task: {{ task_04_name | default('Task not recorded') }}"
    - "  Command: {{ task_04_cmd | default('N/A') }}"
    - "  Exit code: {{ task_04_rc | default(-1) }}"
    - "  Data: {{ data_04 | default('Not evaluated') | trim }}"
    - "  Status: {{ status_04 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_04 | default('Not evaluated') | trim }}"
    - ""
    - "OVERALL COMPLIANCE:"
    - "  Result: {{ cis_result | default('UNKNOWN') }}"
