---
- name: Initialize meta data variables
  include_vars: cis_audit_var_1_3_1_6.yml

- name: "Initialize data variables"
  set_fact:
    data_01: "Not collected yet"
    status_01: "UNKNOWN"
    details_01: "Not evaluated"
    data_02: "Not collected yet"
    status_02: "UNKNOWN"
    details_02: "Not evaluated"
    data_03: "Not collected yet"
    status_03: "UNKNOWN"
    details_03: "Not evaluated"
    task_01_name: "Not executed"
    task_01_cmd: "N/A"
    task_01_rc: -1

- name: "Req 01 - Check for unconfined services"
  ansible.builtin.shell: "ps -eZ | grep {{ selinux_context }}"
  args:
    executable: /bin/bash
  register: result_01
  failed_when: false
  changed_when: false

- name: "Store requirement 01 details"
  set_fact:
    task_01_name: "Check for unconfined services"
    task_01_cmd: "ps -eZ | grep {{ selinux_context }}"
    task_01_rc: "{{ result_01.rc | default(-1) }}"
    data_01: "{{ result_01.stdout | default('') | trim }}"
    status_01: >-
      {{ ('PASS' if (result_01.stdout | default('') | trim) == '' else 'FAIL') | trim }}
    details_01: >-
      {{ ('No unconfined services found' if (result_01.stdout | default('') | trim) == '' else 'Unconfined services exist') | trim }}

- name: "Req 02 - Summarize overall compliance"
  set_fact:
    task_02_name: "Summarize overall compliance"
    task_02_cmd: "N/A"
    task_02_rc: "N/A"
    data_02: "N/A"
    status_02: "{{ status_01 | trim }}"
    details_02: >-
      {{ ('System is compliant with CIS 1.3.1.6' if status_01 | trim == 'PASS' else 'System is non-compliant with CIS 1.3.1.6') | trim }}

- name: "Req 03 - Store final result and prepare report data"
  set_fact:
    cis_result: "{{ status_02 | trim }}"
    task_03_name: "Store final result and prepare report data"
    task_03_cmd: "N/A"
    task_03_rc: "N/A"
    data_03: "{{ status_02 | trim }}"
    status_03: "{{ status_02 | trim }}"
    details_03: "Final audit result stored"

- name: "Generate audit report"
  debug:
    msg:
    - "AUDIT REPORT — CIS 1.3.1.6"
    - "Reference: CIS Benchmark checkpoint 1.3.1.6"
    - ""
    - "REQUIREMENT 01 - {{ req_01 }}:"
    - "  Task: {{ task_01_name | default('Not recorded') }}"
    - "  Command: {{ task_01_cmd | default('N/A') }}"
    - "  Exit code: {{ task_01_rc | default(-1) }}"
    - "  Data: {{ data_01 | default('') | trim }}"
    - "  Status: {{ status_01 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_01 | default('') | trim }}"
    - ""
    - "REQUIREMENT 02 - {{ req_02 }}:"
    - "  Task: {{ task_02_name | default('Not recorded') }}"
    - "  Command: {{ task_02_cmd | default('N/A') }}"
    - "  Exit code: {{ task_02_rc | default(-1) }}"
    - "  Data: {{ data_02 | default('') | trim }}"
    - "  Status: {{ status_02 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_02 | default('') | trim }}"
    - ""
    - "REQUIREMENT 03 - {{ req_03 }}:"
    - "  Task: {{ task_03_name | default('Not recorded') }}"
    - "  Command: {{ task_03_cmd | default('N/A') }}"
    - "  Exit code: {{ task_03_rc | default(-1) }}"
    - "  Data: {{ data_03 | default('') | trim }}"
    - "  Status: {{ status_03 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_03 | default('') | trim }}"
    - ""
    - "========================================================"
    - "OVERALL COMPLIANCE:"
    - "  Result: {{ cis_result | default('UNKNOWN') | trim }}"
    - "========================================================"
