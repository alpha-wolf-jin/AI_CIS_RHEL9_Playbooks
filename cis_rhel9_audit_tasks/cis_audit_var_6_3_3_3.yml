req_01: "Run the audit procedure for Ensure events that modify the sudo log file are collected: Expected output shows compliance status"
req_02: "VERIFY: Summarise compliance status for Ensure events that modify the sudo log file are collected. Expected result: PASS if compliant, SKIP if prerequisite not met (e.g., partition/package does not exist), FAIL if misconfigured"
req_03: "Store the final audit result in a variable named 'cis_result' using set_fact. Set cis_result to the overall compliance status (PASS/FAIL/SKIP/ERROR) derived from the last requirement's status variable."
req_04: "Create a task named 'Generate audit report' using debug msg with EXACTLY this format: AUDIT REPORT — CIS 6.3.3.3, Reference: CIS Benchmark checkpoint 6.3.3.3, then for each requirement: REQUIREMENT NN - {{ req_NN }}: with fields Task, Command, Exit code, Data, Status, Details. End with OVERALL COMPLIANCE: section containing Result: {{ cis_result }}"
audit_script: "/tmp/cis_6333_audit.sh"
audit_script_content: |
  {% raw %}
  #!/usr/bin/env bash
  SUDO_LOG_ESCAPED="${SUDO_LOG_ESCAPED}"
  if [ -z "$SUDO_LOG_ESCAPED" ]; then
    echo "SUDO_LOG_NOT_CONFIGURED"
    exit 0
  fi
  DISK_RULES=$(awk "/^ *-w/ &&/${SUDO_LOG_ESCAPED}/ &&/ +-p *wa/ &&(/ key= *[!-~]* *$/||/ -k *[!-~]* *$/)" /etc/audit/rules.d/*.rules 2>/dev/null)
  RUNNING_RULES=$(auditctl -l 2>/dev/null | awk "/^ *-w/ &&/${SUDO_LOG_ESCAPED}/ &&/ +-p *wa/ &&(/ key= *[!-~]* *$/||/ -k *[!-~]* *$/)")
  if [ -n "$DISK_RULES" ] && [ -n "$RUNNING_RULES" ]; then
    echo "COMPLIANT"
  else
    echo "NON_COMPLIANT"
  fi
  {% endraw %}
