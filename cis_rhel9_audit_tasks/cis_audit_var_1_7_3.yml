req_01: "Check if the /etc/issue.net file exists using command: `test -f /etc/issue.net`. Expected result: file exists."
req_02: "Check the contents of /etc/issue.net using command: `cat /etc/issue.net`. Expected result: contents match site policy."
req_03: |
  Check that /etc/issue.net does not contain system information escape sequences (\\v, \\r, \\m, \\s) or the OS ID using command: `grep -E -i \"(\\\\v|\\\\r|\\\\m|\\\\s|$(grep '^ID=' /etc/os-release | cut -d= -f2 | sed -e 's/\"//g'))\" /etc/issue.net`. Expected result: no results returned.
req_04: "Summarize overall compliance: PASS if all checks pass, SKIP if /etc/issue.net does not exist, FAIL if the file exists but is misconfigured."
req_05: "Store the final audit result in a variable named 'cis_result' using set_fact. Set cis_result to the overall compliance status (PASS/FAIL/SKIP/ERROR) derived from the last requirement's status variable."
expected_banner: "Authorized users only. All activity may be monitored and reported."
