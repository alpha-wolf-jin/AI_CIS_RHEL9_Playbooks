---
- name: Initialize meta data variables
  include_vars: cis_audit_var_5_4_2_1.yml

- name: "Initialize data variables"
  ansible.builtin.set_fact:
    data_01: "Not collected yet"
    status_01: "UNKNOWN"
    details_01: "Not evaluated"
    task_01_name: "Not executed"
    task_01_cmd: "N/A"
    task_01_rc: -1
    data_02: "Not collected yet"
    status_02: "UNKNOWN"
    details_02: "Not evaluated"
    task_02_name: "Not executed"
    task_02_cmd: "N/A"
    task_02_rc: -1
    data_03: "Not collected yet"
    status_03: "UNKNOWN"
    details_03: "Not evaluated"
    task_03_name: "Not executed"
    task_03_cmd: "N/A"
    task_03_rc: -1
    data_04: "Not collected yet"
    status_04: "UNKNOWN"
    details_04: "Not evaluated"
    task_04_name: "Not executed"
    task_04_cmd: "N/A"
    task_04_rc: -1

- name: "Req 01 - Ensure /etc/passwd exists"
  ansible.builtin.shell: test -f /etc/passwd
  args:
    executable: /bin/bash
  register: result_01
  failed_when: false
  changed_when: false

- name: "Store requirement 01 details"
  ansible.builtin.set_fact:
    task_01_name: "Ensure /etc/passwd exists"
    task_01_cmd: "test -f /etc/passwd"
    task_01_rc: "{{ result_01.rc | default(-1) }}"
    data_01: "{{ 'exists' if (result_01.rc | default(-1) | int) == 0 else 'not found' }}"
    status_01: "{{ ('PASS' if (result_01.rc | default(-1) | int) == 0 else 'FAIL') | trim }}"
    details_01: "{{ ('File /etc/passwd exists' if (result_01.rc | default(-1) | int) == 0 else 'File /etc/passwd not found') | trim }}"

- name: "Req 02 - Check UID 0 accounts"
  ansible.builtin.shell: |
    awk -F: '($3 == 0) { print $1 }' /etc/passwd
  args:
    executable: /bin/bash
  register: result_02
  failed_when: false
  changed_when: false

- name: "Store requirement 02 details"
  ansible.builtin.set_fact:
    task_02_name: "Check UID 0 accounts"
    task_02_cmd: "awk -F: '($3 == 0) { print $1 }' /etc/passwd"
    task_02_rc: "{{ result_02.rc | default(-1) }}"
    data_02: "{{ result_02.stdout | default('') | trim }}"
    status_02: "{{ ('PASS' if (result_02.stdout | default('') | trim) == 'root' else 'FAIL') | trim }}"
    details_02: "{{ ('Only root has UID 0' if (result_02.stdout | default('') | trim) == 'root' else 'Multiple UID 0 accounts found or unexpected output: ' + (result_02.stdout | default('') | trim)) | trim }}"

- name: "Req 03 - Summarize compliance"
  ansible.builtin.set_fact:
    task_03_name: "Summarize overall compliance"
    task_03_cmd: "set_fact"
    task_03_rc: 0
    data_03: "{{ ('PASS' if status_01 == 'PASS' and status_02 == 'PASS' else 'FAIL') | trim }}"
    status_03: "{{ ('PASS' if status_01 == 'PASS' and status_02 == 'PASS' else 'FAIL') | trim }}"
    details_03: "{{ ('Compliance: root is the only UID 0 account' if status_01 == 'PASS' and status_02 == 'PASS' else 'Compliance failed: check previous requirements') | trim }}"

- name: "Req 04 - Store final cis_result"
  ansible.builtin.set_fact:
    cis_result: "{{ status_03 | default('UNKNOWN') | trim }}"
    task_04_name: "Store cis_result"
    task_04_cmd: "set_fact"
    task_04_rc: 0
    data_04: "{{ status_03 | default('UNKNOWN') | trim }}"
    status_04: "PASS"
    details_04: "Final audit result stored as cis_result"

- name: "Generate audit report"
  ansible.builtin.debug:
    msg:
    - "AUDIT REPORT — CIS 5.4.2.1"
    - "Reference: CIS Benchmark checkpoint 5.4.2.1"
    - ""
    - "REQUIREMENT 01 - {{ req_01 }}:"
    - "  Task: {{ task_01_name }}"
    - "  Command: {{ task_01_cmd }}"
    - "  Exit code: {{ task_01_rc }}"
    - "  Data: {{ data_01 }}"
    - "  Status: {{ status_01 }}"
    - "  Details: {{ details_01 }}"
    - ""
    - "REQUIREMENT 02 - {{ req_02 }}:"
    - "  Task: {{ task_02_name }}"
    - "  Command: {{ task_02_cmd }}"
    - "  Exit code: {{ task_02_rc }}"
    - "  Data: {{ data_02 }}"
    - "  Status: {{ status_02 }}"
    - "  Details: {{ details_02 }}"
    - ""
    - "REQUIREMENT 03 - {{ req_03 }}:"
    - "  Task: {{ task_03_name }}"
    - "  Command: {{ task_03_cmd }}"
    - "  Exit code: {{ task_03_rc }}"
    - "  Data: {{ data_03 }}"
    - "  Status: {{ status_03 }}"
    - "  Details: {{ details_03 }}"
    - ""
    - "REQUIREMENT 04 - {{ req_04 }}:"
    - "  Task: {{ task_04_name }}"
    - "  Command: {{ task_04_cmd }}"
    - "  Exit code: {{ task_04_rc }}"
    - "  Data: {{ data_04 }}"
    - "  Status: {{ status_04 }}"
    - "  Details: {{ details_04 }}"
    - ""
    - "========================================================"
    - "OVERALL COMPLIANCE:"
    - "  Result: {{ cis_result }}"
    - "========================================================"
