---
- name: Initialize meta data variables
  include_vars: cis_audit_var_6_3_1_4.yml

- name: "Initialize data variables"
  set_fact:
    data_01: "Not collected yet"
    status_01: "UNKNOWN"
    details_01: "Not evaluated"
    task_01_name: "Not executed"
    task_01_cmd: "N/A"
    task_01_rc: -1

    data_02: "Not collected yet"
    status_02: "UNKNOWN"
    details_02: "Not evaluated"
    task_02_name: "Not executed"
    task_02_cmd: "N/A"
    task_02_rc: -1

    data_03: "Not collected yet"
    status_03: "UNKNOWN"
    details_03: "Not evaluated"
    task_03_name: "Not executed"
    task_03_cmd: "N/A"
    task_03_rc: -1

    data_04: "Not collected yet"
    status_04: "UNKNOWN"
    details_04: "Not evaluated"
    task_04_name: "Not executed"
    task_04_cmd: "N/A"
    task_04_rc: -1

    data_05: "Not collected yet"
    status_05: "UNKNOWN"
    details_05: "Not evaluated"
    task_05_name: "Not executed"
    task_05_cmd: "N/A"
    task_05_rc: -1

    auditd_installed: false
  changed_when: false
  failed_when: false

# Requirement 1: Check installation
- name: "Req 01 - Check if {{ service_name }} is installed"
  ansible.builtin.shell: "which {{ service_name }} || dpkg -l {{ service_name }} | grep -q '^ii' || rpm -q {{ service_name }}"
  args:
    executable: /bin/bash
  register: result_01
  failed_when: false
  changed_when: false

- name: "Store requirement 01 details"
  set_fact:
    task_01_name: "Check if {{ service_name }} is installed"
    task_01_cmd: "which {{ service_name }} || dpkg -l {{ service_name }} | grep -q '^ii' || rpm -q {{ service_name }}"
    task_01_rc: "{{ result_01.rc | default(-1) }}"
    data_01: "{{ result_01.stdout | default('') | trim }}"
    status_01: "{{ 'PASS' if result_01.rc | default(-1) == 0 else 'FAIL' }}"
    details_01: "{{ (service_name ~ ' is present') if result_01.rc == 0 else (service_name ~ ' not found') }}"
    auditd_installed: "{{ result_01.rc | default(-1) == 0 }}"
  failed_when: false

- name: "Mark service checks NOT_APPLICABLE when {{ service_name }} not installed"
  set_fact:
    status_02: "NOT_APPLICABLE"
    details_02: "{{ service_name }} is not installed"
    data_02: ""
    task_02_name: "Skipped - prerequisite not met"
    task_02_cmd: "N/A"
    task_02_rc: -1

    status_03: "NOT_APPLICABLE"
    details_03: "{{ service_name }} is not installed"
    data_03: ""
    task_03_name: "Skipped - prerequisite not met"
    task_03_cmd: "N/A"
    task_03_rc: -1
  when: not auditd_installed | bool
  failed_when: false

# Requirement 2: Check enabled
- name: "Req 02 - Check if {{ service_name }} service is enabled"
  ansible.builtin.shell: "systemctl is-enabled {{ service_name }} | grep '^enabled'"
  args:
    executable: /bin/bash
  register: result_02
  failed_when: false
  changed_when: false
  when: auditd_installed | bool

- name: "Store requirement 02 details"
  set_fact:
    task_02_name: "Check if {{ service_name }} is enabled"
    task_02_cmd: "systemctl is-enabled {{ service_name }} | grep '^enabled'"
    task_02_rc: "{{ result_02.rc | default(-1) }}"
    data_02: "{{ result_02.stdout | default('') | trim }}"
    status_02: "{{ 'PASS' if result_02.rc | default(-1) == 0 else 'FAIL' }}"
    details_02: "{{ 'enabled' if result_02.rc | default(-1) == 0 else 'not enabled' }}"
  when: auditd_installed | bool
  failed_when: false

# Requirement 3: Check active
- name: "Req 03 - Check if {{ service_name }} service is active"
  ansible.builtin.shell: "systemctl is-active {{ service_name }} | grep '^active'"
  args:
    executable: /bin/bash
  register: result_03
  failed_when: false
  changed_when: false
  when: auditd_installed | bool

- name: "Store requirement 03 details"
  set_fact:
    task_03_name: "Check if {{ service_name }} is active"
    task_03_cmd: "systemctl is-active {{ service_name }} | grep '^active'"
    task_03_rc: "{{ result_03.rc | default(-1) }}"
    data_03: "{{ result_03.stdout | default('') | trim }}"
    status_03: "{{ 'PASS' if result_03.rc | default(-1) == 0 else 'FAIL' }}"
    details_03: "{{ 'active' if result_03.rc | default(-1) == 0 else 'not active' }}"
  when: auditd_installed | bool
  failed_when: false

# Requirement 4: Overall compliance
- name: "Req 04 - Summarize overall compliance status"
  set_fact:
    status_04: >-
      {%- if not auditd_installed | bool -%}
        NOT_APPLICABLE
      {%- elif status_02 == 'PASS' and status_03 == 'PASS' -%}
        PASS
      {%- else -%}
        FAIL
      {%- endif -%}
    details_04: >-
      {%- if not auditd_installed | bool -%}
        {{ service_name }} is not installed, checkpoint not applicable
      {%- elif status_02 == 'PASS' and status_03 == 'PASS' -%}
        {{ service_name }} is installed, enabled, and active
      {%- else -%}
        {{ service_name }} is installed but not fully compliant: enabled=[{{ status_02 }}] active=[{{ status_03 }}]
      {%- endif -%}
  failed_when: false

# Requirement 5: Store cis_result
- name: "Req 05 - Store final result in cis_result"
  set_fact:
    cis_result: "{{ status_04 }}"
  failed_when: false

- name: "Store requirement 05 details"
  set_fact:
    task_05_name: "Store final audit result in cis_result"
    task_05_cmd: "set_fact cis_result = {{ status_04 }}"
    task_05_rc: 0
    data_05: "{{ cis_result }}"
    status_05: "PASS"
    details_05: "Final compliance result stored as cis_result = {{ cis_result }}"
  failed_when: false

# Report
- name: "Generate audit report"
  debug:
    msg:
    - "AUDIT REPORT — CIS 6.3.1.4"
    - "Reference: CIS Benchmark checkpoint 6.3.1.4"
    - ""
    - "REQUIREMENT 01 - {{ req_01 }}:"
    - "  Task: {{ task_01_name | default('Not recorded') }}"
    - "  Command: {{ task_01_cmd | default('N/A') }}"
    - "  Exit code: {{ task_01_rc | default(-1) }}"
    - "  Data: {{ data_01 | default('') | trim }}"
    - "  Status: {{ status_01 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_01 | default('') | trim }}"
    - ""
    - "REQUIREMENT 02 - {{ req_02 }}:"
    - "  Task: {{ task_02_name | default('Not recorded') }}"
    - "  Command: {{ task_02_cmd | default('N/A') }}"
    - "  Exit code: {{ task_02_rc | default(-1) }}"
    - "  Data: {{ data_02 | default('') | trim }}"
    - "  Status: {{ status_02 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_02 | default('') | trim }}"
    - ""
    - "REQUIREMENT 03 - {{ req_03 }}:"
    - "  Task: {{ task_03_name | default('Not recorded') }}"
    - "  Command: {{ task_03_cmd | default('N/A') }}"
    - "  Exit code: {{ task_03_rc | default(-1) }}"
    - "  Data: {{ data_03 | default('') | trim }}"
    - "  Status: {{ status_03 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_03 | default('') | trim }}"
    - ""
    - "REQUIREMENT 04 - {{ req_04 }}:"
    - "  Task: {{ task_04_name | default('Overall compliance evaluation') }}"
    - "  Command: {{ task_04_cmd | default('N/A') }}"
    - "  Exit code: {{ task_04_rc | default(-1) }}"
    - "  Data: {{ data_04 | default('') | trim }}"
    - "  Status: {{ status_04 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_04 | default('') | trim }}"
    - ""
    - "REQUIREMENT 05 - {{ req_05 }}:"
    - "  Task: {{ task_05_name | default('Not recorded') }}"
    - "  Command: {{ task_05_cmd | default('N/A') }}"
    - "  Exit code: {{ task_05_rc | default(-1) }}"
    - "  Data: {{ data_05 | default('') | trim }}"
    - "  Status: {{ status_05 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_05 | default('') | trim }}"
    - ""
    - "========================================================"
    - "OVERALL RESULT:"
    - "  Result: {{ cis_result | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_04 | default('Not evaluated') | trim }}"
    - "========================================================"
