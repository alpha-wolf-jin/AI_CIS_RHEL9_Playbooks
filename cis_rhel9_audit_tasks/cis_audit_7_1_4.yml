---
- name: Initialize meta data variables
  include_vars: cis_audit_var_7_1_4.yml

- name: "Initialize data variables"
  ansible.builtin.set_fact:
    data_01: "Not collected yet"
    status_01: "ERROR"
    details_01: "Not evaluated"
    task_01_name: "Not executed"
    task_01_cmd: "N/A"
    task_01_rc: -1

    data_02: "Not collected yet"
    status_02: "ERROR"
    details_02: "Not evaluated"
    task_02_name: "Not executed"
    task_02_cmd: "N/A"
    task_02_rc: -1

    data_03: "Not collected yet"
    status_03: "ERROR"
    details_03: "Not evaluated"
    task_03_name: "Not executed"
    task_03_cmd: "N/A"
    task_03_rc: -1

    data_04: "Not collected yet"
    status_04: "ERROR"
    details_04: "Not evaluated"
    task_04_name: "Not executed"
    task_04_cmd: "N/A"
    task_04_rc: -1

    data_05: "Not collected yet"
    status_05: "ERROR"
    details_05: "Not evaluated"
    task_05_name: "Not executed"
    task_05_cmd: "N/A"
    task_05_rc: -1

    data_06: "Not collected yet"
    status_06: "ERROR"
    details_06: "Not evaluated"
    task_06_name: "Not executed"
    task_06_cmd: "N/A"
    task_06_rc: -1

- name: "Req 01 - Check file existence"
  ansible.builtin.shell: test -f "{{ target_file }}"
  args:
    executable: /bin/bash
  register: result_01
  failed_when: false
  changed_when: false

- name: "Store requirement 01 details"
  ansible.builtin.set_fact:
    task_01_name: "Req 01 - Check file existence"
    task_01_cmd: "test -f /etc/group-"
    task_01_rc: "{{ result_01.rc | default(-1) }}"
    data_01: "{{ result_01.stdout | default('') | trim }}"
    status_01: "{{ 'PASS' if result_01.rc | default(-1) == 0 else 'SKIP' | trim }}"
    details_01: "{{ 'File exists' if result_01.rc | default(-1) == 0 else 'File does not exist' | trim }}"

- name: "Req 02 - Check permissions"
  ansible.builtin.shell: stat -Lc '%a' "{{ target_file }}"
  args:
    executable: /bin/bash
  register: result_02
  failed_when: false
  changed_when: false

- name: "Store requirement 02 details"
  ansible.builtin.set_fact:
    task_02_name: "Req 02 - Check permissions"
    task_02_cmd: "stat -Lc '%a' /etc/group-"
    task_02_rc: "{{ result_02.rc | default(-1) }}"
    data_02: "{{ result_02.stdout | default('') | trim }}"
    status_02: >-
      {%- set perms_str = result_02.stdout | default('') | trim -%}
      {%- if result_02.rc | default(-1) == 0 and perms_str | length > 0 -%}
        {%- set perms = perms_str | int(base=8) -%}
        {%- if (perms % 8) not in [2,3,6,7] and ((perms // 8) % 8) not in [2,3,6,7] -%}
          PASS
        {%- else -%}
          FAIL
        {%- endif -%}
      {%- else -%}
        FAIL
      {%- endif -%}
    details_02: >-
      {%- set perms_str = result_02.stdout | default('') | trim -%}
      {%- if result_02.rc | default(-1) == 0 -%}
        {%- if perms_str | length > 0 -%}
          Permission mode: {{ perms_str }}
          {%- set perms = perms_str | int(base=8) -%}
          {%- if (perms % 8) not in [2,3,6,7] and ((perms // 8) % 8) not in [2,3,6,7] -%}
            (compliant)
          {%- else -%}
            (non-compliant)
          {%- endif -%}
        {%- else -%}
          Could not check permissions
        {%- endif -%}
      {%- else -%}
        Could not check permissions
      {%- endif -%}

- name: "Req 03 - Check UID"
  ansible.builtin.shell: stat -Lc '%u' "{{ target_file }}"
  args:
    executable: /bin/bash
  register: result_03
  failed_when: false
  changed_when: false

- name: "Store requirement 03 details"
  ansible.builtin.set_fact:
    task_03_name: "Req 03 - Check UID"
    task_03_cmd: "stat -Lc '%u' /etc/group-"
    task_03_rc: "{{ result_03.rc | default(-1) }}"
    data_03: "{{ result_03.stdout | default('') | trim }}"
    status_03: "{{ 'PASS' if result_03.stdout | default('') | trim == '0' else 'FAIL' | trim }}"
    details_03: "{{ 'UID is root (0)' if result_03.stdout | default('') | trim == '0' else 'UID is not root: ' + (result_03.stdout | default('') | trim) | trim }}"

- name: "Req 04 - Check GID"
  ansible.builtin.shell: stat -Lc '%g' "{{ target_file }}"
  args:
    executable: /bin/bash
  register: result_04
  failed_when: false
  changed_when: false

- name: "Store requirement 04 details"
  ansible.builtin.set_fact:
    task_04_name: "Req 04 - Check GID"
    task_04_cmd: "stat -Lc '%g' /etc/group-"
    task_04_rc: "{{ result_04.rc | default(-1) }}"
    data_04: "{{ result_04.stdout | default('') | trim }}"
    status_04: "{{ 'PASS' if result_04.stdout | default('') | trim == '0' else 'FAIL' | trim }}"
    details_04: "{{ 'GID is root (0)' if result_04.stdout | default('') | trim == '0' else 'GID is not root: ' + (result_04.stdout | default('') | trim) | trim }}"

- name: "Req 05 - Summarize overall compliance (status and details)"
  ansible.builtin.set_fact:
    task_05_name: "Req 05 - Summarize overall compliance"
    task_05_cmd: "N/A"
    task_05_rc: "-1"
    status_05: >-
      {% if status_01 | trim == 'SKIP' -%}
        SKIP
      {%- elif status_02 | trim == 'PASS' and status_03 | trim == 'PASS' and status_04 | trim == 'PASS' -%}
        PASS
      {%- else -%}
        FAIL
      {%- endif -%}
    details_05: >-
      {% if status_01 | trim == 'SKIP' -%}
        File /etc/group- does not exist – SKIP
      {%- elif status_02 | trim == 'PASS' and status_03 | trim == 'PASS' and status_04 | trim == 'PASS' -%}
        All checks passed: permissions 644 or stricter, UID 0, GID 0
      {%- else -%}
        Checks failed:
        {%- if status_01 | trim != 'SKIP' and status_02 | trim != 'PASS' %} permissions not compliant{% endif -%}
        {%- if status_03 | trim != 'PASS' %} UID not root{% endif -%}
        {%- if status_04 | trim != 'PASS' %} GID not root{% endif -%}
      {%- endif -%}

- name: "Req 05 - Set data_05 for report"
  ansible.builtin.set_fact:
    data_05: "{{ status_05 | trim }}"

- name: "Req 06 - Store final audit result"
  ansible.builtin.set_fact:
    cis_result: "{{ status_05 | trim }}"
    task_06_name: "Req 06 - Store cis_result"
    task_06_cmd: "N/A"
    task_06_rc: "-1"
    data_06: "{{ status_05 | trim }}"
    status_06: "{{ status_05 | trim }}"
    details_06: "CIS result stored: {{ status_05 | trim }}"

- name: "Generate audit report"
  debug:
    msg:
    - "AUDIT REPORT — CIS 7.1.4"
    - "Reference: CIS Benchmark checkpoint 7.1.4"
    - ""
    - "REQUIREMENT 01 - {{ req_01 }}:"
    - "  Task: {{ task_01_name | default('Not recorded') }}"
    - "  Command: {{ task_01_cmd | default('N/A') }}"
    - "  Exit code: {{ task_01_rc | default(-1) }}"
    - "  Data: {{ data_01 | default('') | trim }}"
    - "  Status: {{ status_01 | default('ERROR') | trim }}"
    - "  Details: {{ details_01 | default('') | trim }}"
    - ""
    - "REQUIREMENT 02 - {{ req_02 }}:"
    - "  Task: {{ task_02_name | default('Not recorded') }}"
    - "  Command: {{ task_02_cmd | default('N/A') }}"
    - "  Exit code: {{ task_02_rc | default(-1) }}"
    - "  Data: {{ data_02 | default('') | trim }}"
    - "  Status: {{ status_02 | default('ERROR') | trim }}"
    - "  Details: {{ details_02 | default('') | trim }}"
    - ""
    - "REQUIREMENT 03 - {{ req_03 }}:"
    - "  Task: {{ task_03_name | default('Not recorded') }}"
    - "  Command: {{ task_03_cmd | default('N/A') }}"
    - "  Exit code: {{ task_03_rc | default(-1) }}"
    - "  Data: {{ data_03 | default('') | trim }}"
    - "  Status: {{ status_03 | default('ERROR') | trim }}"
    - "  Details: {{ details_03 | default('') | trim }}"
    - ""
    - "REQUIREMENT 04 - {{ req_04 }}:"
    - "  Task: {{ task_04_name | default('Not recorded') }}"
    - "  Command: {{ task_04_cmd | default('N/A') }}"
    - "  Exit code: {{ task_04_rc | default(-1) }}"
    - "  Data: {{ data_04 | default('') | trim }}"
    - "  Status: {{ status_04 | default('ERROR') | trim }}"
    - "  Details: {{ details_04 | default('') | trim }}"
    - ""
    - "REQUIREMENT 05 - {{ req_05 }}:"
    - "  Task: {{ task_05_name | default('Not recorded') }}"
    - "  Command: {{ task_05_cmd | default('N/A') }}"
    - "  Exit code: {{ task_05_rc | default(-1) }}"
    - "  Data: {{ data_05 | default('') | trim }}"
    - "  Status: {{ status_05 | default('ERROR') | trim }}"
    - "  Details: {{ details_05 | default('') | trim }}"
    - ""
    - "REQUIREMENT 06 - {{ req_06 }}:"
    - "  Task: {{ task_06_name | default('Not recorded') }}"
    - "  Command: {{ task_06_cmd | default('N/A') }}"
    - "  Exit code: {{ task_06_rc | default(-1) }}"
    - "  Data: {{ data_06 | default('') | trim }}"
    - "  Status: {{ status_06 | default('ERROR') | trim }}"
    - "  Details: {{ details_06 | default('') | trim }}"
    - ""
    - "========================================================"
    - "OVERALL COMPLIANCE:"
    - "  Result: {{ cis_result | default('ERROR') | trim }}"
    - "========================================================"
