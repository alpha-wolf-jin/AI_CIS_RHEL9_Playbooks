req_01: "Check if /etc/issue.net exists using command: `stat -Lc '%a %u %g' /etc/issue.net 2>/dev/null`. Expected result: file exists and command returns a value."
req_02: "Check that access permissions on /etc/issue.net are 644 or more restrictive using command: `stat -Lc '%a' /etc/issue.net`. Expected result: numeric permissions are 644, 640, 600, 400, 440, or similar (no greater than 644)."
req_03: "Check that Uid of /etc/issue.net is 0/root using command: `stat -Lc '%u' /etc/issue.net`. Expected result: 0."
req_04: "Check that Gid of /etc/issue.net is 0/root using command: `stat -Lc '%g' /etc/issue.net`. Expected result: 0."
req_05: "Summarize overall compliance status: all checks passed (file exists, permissions 644 or more restrictive, Uid 0, Gid 0). Expected result: compliant if all conditions met, otherwise non-compliant."
req_06: "Store the final audit result in a variable named 'cis_result' using set_fact. Set cis_result to the overall compliance status (PASS/FAIL/SKIPPED/UNKNOWN) derived from the last requirement's status variable."
