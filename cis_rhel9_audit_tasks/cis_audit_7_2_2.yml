---
- name: Initialize meta data variables
  include_vars: cis_audit_var_7_2_2.yml

- name: "Req 01 - Check if /etc/shadow exists"
  ansible.builtin.shell: "test -f /etc/shadow && echo 'exists'"
  args:
    executable: /bin/bash
  register: r01
  failed_when: false
  changed_when: false

- name: "Req 02 - Check for empty password fields"
  ansible.builtin.shell: "awk -F: '($2 == \"\" ) { print $1 \" does not have a password \"}' /etc/shadow"
  args:
    executable: /bin/bash
  register: r02
  failed_when: false
  changed_when: false

- name: "Store final audit result"
  ansible.builtin.set_fact:
    cis_result: "{{ 'PASS' if (r01.rc == 0 and r01.stdout | default('') | trim == 'exists') and (r02.stdout | default('') | trim == '') else 'FAIL' }}"

- name: "Generate audit report"
  ansible.builtin.debug:
    msg: |-
      {% set status_01 = 'PASS' if r01.rc == 0 and r01.stdout | default('') | trim == 'exists' else 'FAIL' %}
      {% set status_02 = 'PASS' if (r02.stdout | default('') | trim) == '' else 'FAIL' %}
      AUDIT REPORT — CIS 7.2.2
      Reference: CIS Benchmark checkpoint 7.2.2
      REQUIREMENT 01 - {{ req_01 }}:
        Task: Check if /etc/shadow exists
        Command: test -f /etc/shadow && echo 'exists'
        Exit code: {{ r01.rc }}
        Data: {{ r01.stdout | default('') | trim }}
        Status: {{ status_01 }}
        Details: {{ 'File exists' if status_01 == 'PASS' else 'File does not exist' }}

      REQUIREMENT 02 - {{ req_02 }}:
        Task: Check for empty password fields
        Command: awk -F: '($2 == "" ) { print $1 " does not have a password "}' /etc/shadow
        Exit code: {{ r02.rc }}
        Data: {{ r02.stdout | default('') | trim }}
        Status: {{ status_02 }}
        Details: {{ 'No empty password fields' if status_02 == 'PASS' else ('Empty password fields found: ' ~ (r02.stdout | default('') | trim)) }}

      REQUIREMENT 03 - {{ req_03 }}:
        Task: Evaluate overall compliance
        Command: N/A
        Exit code: 0
        Data: {{ 'Compliant' if cis_result == 'PASS' else 'Not Compliant' }}
        Status: {{ cis_result }}
        Details: {{ 'System is compliant with CIS checkpoint 7.2.2' if cis_result == 'PASS' else 'System is not compliant with CIS checkpoint 7.2.2' }}

      ========================================================
      OVERALL COMPLIANCE:
        Result: {{ cis_result }}
        Details: {{ 'System is compliant with CIS checkpoint 7.2.2' if cis_result == 'PASS' else 'System is not compliant with CIS checkpoint 7.2.2' }}
      ========================================================
