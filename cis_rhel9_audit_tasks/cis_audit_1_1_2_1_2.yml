---
- name: Initialize meta data variables
  include_vars: cis_audit_var_1_1_2_1_2.yml

- name: "Initialize data variables"
  ansible.builtin.set_fact:
        # Requirement 01
    data_01: "Not collected yet"
    status_01: "UNKNOWN"
    details_01: "Not evaluated"
    task_01_name: "Not executed"
    task_01_cmd: "N/A"
    task_01_rc: -1
        # Requirement 02
    data_02: "Not collected yet"
    status_02: "UNKNOWN"
    details_02: "Not evaluated"
    task_02_name: "Not executed"
    task_02_cmd: "N/A"
    task_02_rc: -1
        # Requirement 03
    data_03: "Not collected yet"
    status_03: "UNKNOWN"
    details_03: "Not evaluated"
    task_03_name: "Not executed"
    task_03_cmd: "N/A"
    task_03_rc: -1
        # Requirement 04
    data_04: "Not collected yet"
    status_04: "UNKNOWN"
    details_04: "Not evaluated"
    task_04_name: "Not executed"
    task_04_cmd: "N/A"
    task_04_rc: -1

- name: "Req 01 - Check if a separate partition exists for /tmp"
  ansible.builtin.shell: findmnt -kn /tmp
  args:
    executable: /bin/bash
  register: result_01
  failed_when: false
  changed_when: false

- name: "Store requirement 01 details"
  ansible.builtin.set_fact:
    task_01_name: "Check if a separate partition exists for /tmp"
    task_01_cmd: "findmnt -kn /tmp"
    task_01_rc: "{{ result_01.rc | default(-1) }}"
    data_01: "{{ result_01.stdout | default('') | trim }}"
    status_01: "{{ 'PASS' if (result_01.stdout | default('') | trim | length > 0) else 'FAIL' }}"
    details_01: "{{ 'Separate /tmp partition exists' if (result_01.stdout | default('') | trim | length > 0) else 'No separate /tmp partition found' }}"

- name: "Check if /tmp partition is missing"
  set_fact:
    _tmp_missing: "{{ (result_01.stdout | default('') | trim | length == 0) | bool }}"

- name: "Req 02 - Check if nodev option is set on /tmp partition"
  ansible.builtin.shell: findmnt -kn /tmp | grep -v nodev
  args:
    executable: /bin/bash
  register: result_02
  failed_when: false
  changed_when: false

- name: "Store requirement 02 details"
  ansible.builtin.set_fact:
    task_02_name: "Check if nodev option is set on /tmp partition"
    task_02_cmd: "findmnt -kn /tmp | grep -v nodev"
    task_02_rc: "{{ result_02.rc | default(-1) }}"
    data_02: >-
      {{ 'N/A - no separate /tmp partition' if _tmp_missing else (result_02.stdout | default('') | trim) }}
    status_02: >-
      {{ 'SKIPPED' if _tmp_missing else
         ('PASS' if (result_02.stdout | default('') | trim | length == 0) else 'FAIL') }}
    details_02: >-
      {{ 'No /tmp partition – nodev check not applicable' if _tmp_missing else
         ('nodev option is set on /tmp partition' if (result_02.stdout | default('') | trim | length == 0)
          else 'nodev option is NOT set on /tmp partition') }}

- name: "Req 03 - Summarize overall compliance status"
  ansible.builtin.set_fact:
    task_03_name: "Summarize overall compliance status"
    task_03_cmd: "N/A"
    task_03_rc: "0"
    overall_compliance: >-
      {{ 'SKIPPED' if _tmp_missing else
         ('PASS' if (result_01.stdout | default('') | trim | length > 0) and (result_02.stdout | default('') | trim | length == 0)
          else 'FAIL') }}

- name: "Store requirement 03 details"
  ansible.builtin.set_fact:
    data_03: "{{ overall_compliance | default('UNKNOWN') | trim }}"
    status_03: "PASS"
    details_03: "{{ 'Audit not applicable – no separate /tmp partition' if overall_compliance == 'SKIPPED' else ('System is compliant: /tmp partition exists and nodev option is set' if overall_compliance == 'PASS' else 'System is non-compliant') }}"

- name: "Req 04 - Store final audit result in cis_result"
  ansible.builtin.set_fact:
    cis_result: "{{ overall_compliance | default('UNKNOWN') }}"
    task_04_name: "Store final audit result in cis_result"
    task_04_cmd: "N/A"
    task_04_rc: "0"
    data_04: "{{ overall_compliance | default('UNKNOWN') }}"
    status_04: "PASS"
    details_04: "Audit execution completed successfully"

- name: "Generate audit report"
  ansible.builtin.debug:
    msg:
    - "AUDIT REPORT — CIS 1.1.2.1.2"
    - "Reference: CIS Benchmark checkpoint 1.1.2.1.2"
    - ""
    - "REQUIREMENT 01 - {{ req_01 }}:"
    - "  Task: {{ task_01_name | default('Not recorded') }}"
    - "  Command: {{ task_01_cmd | default('N/A') }}"
    - "  Exit code: {{ task_01_rc | default(-1) }}"
    - "  Data: {{ data_01 | default('') | trim }}"
    - "  Status: {{ status_01 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_01 | default('') | trim }}"
    - ""
    - "REQUIREMENT 02 - {{ req_02 }}:"
    - "  Task: {{ task_02_name | default('Not recorded') }}"
    - "  Command: {{ task_02_cmd | default('N/A') }}"
    - "  Exit code: {{ task_02_rc | default(-1) }}"
    - "  Data: {{ data_02 | default('') | trim }}"
    - "  Status: {{ status_02 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_02 | default('') | trim }}"
    - ""
    - "REQUIREMENT 03 - {{ req_03 }}:"
    - "  Task: {{ task_03_name | default('Not recorded') }}"
    - "  Command: {{ task_03_cmd | default('N/A') }}"
    - "  Exit code: {{ task_03_rc | default(-1) }}"
    - "  Data: {{ data_03 | default('') | trim }}"
    - "  Status: {{ status_03 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_03 | default('') | trim }}"
    - ""
    - "REQUIREMENT 04 - {{ req_04 }}:"
    - "  Task: {{ task_04_name | default('Not recorded') }}"
    - "  Command: {{ task_04_cmd | default('N/A') }}"
    - "  Exit code: {{ task_04_rc | default(-1) }}"
    - "  Data: {{ data_04 | default('') | trim }}"
    - "  Status: {{ status_04 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_04 | default('') | trim }}"
    - ""
    - "========================================================"
    - "OVERALL COMPLIANCE:"
    - "  Result: {{ cis_result | default('UNKNOWN') | trim }}"
    - "========================================================"
  tags: [report]
