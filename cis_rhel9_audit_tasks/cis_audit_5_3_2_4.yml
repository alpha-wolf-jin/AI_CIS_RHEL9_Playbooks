---
- name: Initialize meta data variables
  include_vars: cis_audit_var_5_3_2_4.yml

- name: "Package Facts - Gather installed packages"
  ansible.builtin.package_facts:
    manager: auto
  failed_when: false

- name: "Set PAM installed fact"
  ansible.builtin.set_fact:
    pam_installed: "{{ 'pam' in ansible_facts.packages }}"

- name: "Set applicability"
  ansible.builtin.set_fact:
    is_applicable: "{{ pam_installed | default(false) }}"

- name: "Req 01 - Check PAM configuration files exist"
  ansible.builtin.shell: ls /etc/pam.d/password-auth /etc/pam.d/system-auth 2>/dev/null
  args:
    executable: /bin/bash
  register: result_01
  failed_when: false
  when: is_applicable

- name: "Store requirement 01 details"
  ansible.builtin.set_fact:
    task_01_name: "Check PAM configuration files exist"
    task_01_cmd: "ls /etc/pam.d/password-auth /etc/pam.d/system-auth 2>/dev/null"
    task_01_rc: "{{ result_01.rc | default(-1) if is_applicable else -1 }}"
    data_01: "{{ result_01.stdout | default('') | trim if is_applicable else '' }}"
    status_01: >-
      {%- if not is_applicable -%}SKIP
      {%- elif result_01.rc | default(-1) == 0 -%}PASS
      {%- else -%}FAIL
      {%- endif -%}
    details_01: >-
      {%- if not is_applicable -%}PAM package not installed - SKIP.
      {%- elif result_01.rc | default(-1) == 0 -%}Both files exist.
      {%- else -%}One or both files are missing.
      {%- endif -%}

- name: "Req 02 - Check pam_pwhistory.so enabled in password-auth"
  ansible.builtin.shell: "grep -P -- '\\bpam_pwhistory\\.so\\b' /etc/pam.d/password-auth"
  args:
    executable: /bin/bash
  register: result_02
  failed_when: false
  when: is_applicable

- name: "Store requirement 02 details"
  ansible.builtin.set_fact:
    task_02_name: "Check pam_pwhistory.so enabled in password-auth"
    task_02_cmd: |
      grep -P -- '\\bpam_pwhistory\\.so\\b' /etc/pam.d/password-auth
    task_02_rc: "{{ result_02.rc | default(-1) if is_applicable else -1 }}"
    data_02: "{{ result_02.stdout | default('') | trim if is_applicable else '' }}"
    status_02: >-
      {%- if not is_applicable -%}SKIP
      {%- elif result_02.rc | default(-1) == 0 and (result_02.stdout | default('') | trim) != '' -%}PASS
      {%- else -%}FAIL
      {%- endif -%}
    details_02: >-
      {%- if not is_applicable -%}PAM package not installed - SKIP.
      {%- elif result_02.rc | default(-1) == 0 and (result_02.stdout | default('') | trim) != '' -%}Module found in password-auth.
      {%- else -%}Module not found or command failed.
      {%- endif -%}

- name: "Req 03 - Check pam_pwhistory.so enabled in system-auth"
  ansible.builtin.shell: "grep -P -- '\\bpam_pwhistory\\.so\\b' /etc/pam.d/system-auth"
  args:
    executable: /bin/bash
  register: result_03
  failed_when: false
  when: is_applicable

- name: "Store requirement 03 details"
  ansible.builtin.set_fact:
    task_03_name: "Check pam_pwhistory.so enabled in system-auth"
    task_03_cmd: |
      grep -P -- '\\bpam_pwhistory\\.so\\b' /etc/pam.d/system-auth
    task_03_rc: "{{ result_03.rc | default(-1) if is_applicable else -1 }}"
    data_03: "{{ result_03.stdout | default('') | trim if is_applicable else '' }}"
    status_03: >-
      {%- if not is_applicable -%}SKIP
      {%- elif result_03.rc | default(-1) == 0 and (result_03.stdout | default('') | trim) != '' -%}PASS
      {%- else -%}FAIL
      {%- endif -%}
    details_03: >-
      {%- if not is_applicable -%}PAM package not installed - SKIP.
      {%- elif result_03.rc | default(-1) == 0 and (result_03.stdout | default('') | trim) != '' -%}Module found in system-auth.
      {%- else -%}Module not found or command failed.
      {%- endif -%}

- name: "Req 04 - Summarize overall compliance"
  ansible.builtin.set_fact:
    task_04_name: "Summarize overall compliance"
    task_04_cmd: "N/A"
    task_04_rc: -1
    data_04: ""
    status_04: >-
      {%- if not is_applicable -%}SKIP
      {%- elif status_02 == 'PASS' and status_03 == 'PASS' -%}PASS
      {%- else -%}FAIL
      {%- endif -%}
    details_04: >-
      {%- if not is_applicable -%}PAM package not installed - SKIP.
      {%- elif status_02 == 'PASS' and status_03 == 'PASS' -%}Both password-auth and system-auth contain pam_pwhistory.so with required configuration.
      {%- else -%}One or both files do not contain pam_pwhistory.so with required configuration.
      {%- endif -%}

- name: "Req 05 - Store final result in cis_result"
  ansible.builtin.set_fact:
    cis_result: "{{ status_04 }}"

- name: "Store requirement 05 details"
  ansible.builtin.set_fact:
    task_05_name: "Store final result in cis_result"
    task_05_cmd: "N/A"
    task_05_rc: 0
    data_05: "{{ cis_result }}"
    status_05: "PASS"
    details_05: "CIS result stored as '{{ cis_result }}'"

- name: "Store requirement 06 details"
  ansible.builtin.set_fact:
    task_06_name: "Generate audit report"
    task_06_cmd: "N/A"
    task_06_rc: 0
    data_06: "N/A"
    status_06: "PASS"
    details_06: "Audit report generated successfully"

- name: "Generate audit report"
  ansible.builtin.debug:
    msg:
    - "AUDIT REPORT — CIS 5.3.2.4"
    - "Reference: CIS Benchmark checkpoint 5.3.2.4"
    - "REQUIREMENT 01 - {{ req_01 }}:"
    - "  Task: {{ task_01_name | default('Not recorded') }}"
    - "  Command: {{ task_01_cmd | default('N/A') }}"
    - "  Exit code: {{ task_01_rc | default(-1) }}"
    - "  Data: {{ data_01 | default('') | trim }}"
    - "  Status: {{ status_01 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_01 | default('') | trim }}"
    - ""
    - "REQUIREMENT 02 - {{ req_02 }}:"
    - "  Task: {{ task_02_name | default('Not recorded') }}"
    - "  Command: {{ task_02_cmd | default('N/A') }}"
    - "  Exit code: {{ task_02_rc | default(-1) }}"
    - "  Data: {{ data_02 | default('') | trim }}"
    - "  Status: {{ status_02 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_02 | default('') | trim }}"
    - ""
    - "REQUIREMENT 03 - {{ req_03 }}:"
    - "  Task: {{ task_03_name | default('Not recorded') }}"
    - "  Command: {{ task_03_cmd | default('N/A') }}"
    - "  Exit code: {{ task_03_rc | default(-1) }}"
    - "  Data: {{ data_03 | default('') | trim }}"
    - "  Status: {{ status_03 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_03 | default('') | trim }}"
    - ""
    - "REQUIREMENT 04 - {{ req_04 }}:"
    - "  Task: {{ task_04_name | default('Not recorded') }}"
    - "  Command: {{ task_04_cmd | default('N/A') }}"
    - "  Exit code: {{ task_04_rc | default(-1) }}"
    - "  Data: {{ data_04 | default('') | trim }}"
    - "  Status: {{ status_04 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_04 | default('') | trim }}"
    - ""
    - "REQUIREMENT 05 - {{ req_05 }}:"
    - "  Task: {{ task_05_name | default('Not recorded') }}"
    - "  Command: {{ task_05_cmd | default('N/A') }}"
    - "  Exit code: {{ task_05_rc | default(-1) }}"
    - "  Data: {{ data_05 | default('') | trim }}"
    - "  Status: {{ status_05 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_05 | default('') | trim }}"
    - ""
    - "REQUIREMENT 06 - Generate audit report:"
    - "  Task: {{ task_06_name | default('Not recorded') }}"
    - "  Command: {{ task_06_cmd | default('N/A') }}"
    - "  Exit code: {{ task_06_rc | default(-1) }}"
    - "  Data: {{ data_06 | default('') | trim }}"
    - "  Status: {{ status_06 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_06 | default('') | trim }}"
    - ""
    - "========================================================"
    - "OVERALL COMPLIANCE:"
    - "  Result: {{ cis_result | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_04 | default('Not evaluated') | trim }}"
    - "========================================================"
