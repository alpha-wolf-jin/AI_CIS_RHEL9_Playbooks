---
- name: Initialize meta data variables
  include_vars: cis_audit_var_1_1_2_2_3.yml

- name: "Req 01 - Check if a separate partition exists for /dev/shm using findmnt"
  ansible.builtin.command: findmnt -kn {{ mount_point }}
  register: result_01
  failed_when: false
  changed_when: false

- name: "Store requirement 01 details"
  ansible.builtin.set_fact:
    task_01_name: "Check partition existence"
    task_01_cmd: "findmnt -kn {{ mount_point }}"
    task_01_rc: "{{ result_01.rc | default(-1) }}"
    data_01: "{{ result_01.stdout | default('') | trim }}"
    status_01: "{{ 'PASS' if result_01.rc | default(-1) == 0 and result_01.stdout | default('') | trim | length > 0 else 'FAIL' }}"
    details_01: "{{ 'Partition /dev/shm exists' if result_01.rc | default(-1) == 0 and result_01.stdout | default('') | trim | length > 0 else 'Partition /dev/shm not found or error' }}"

- name: "Req 02 - Check if nosuid option is set on /dev/shm partition"
  ansible.builtin.shell: "findmnt -kn {{ mount_point }} | grep -v 'nosuid'"
  args:
    executable: /bin/bash
  register: result_02
  failed_when: false
  changed_when: false

- name: "Store requirement 02 details"
  ansible.builtin.set_fact:
    task_02_name: "Check nosuid option"
    task_02_cmd: "findmnt -kn {{ mount_point }} | grep -v 'nosuid'"
    task_02_rc: "{{ result_02.rc | default(-1) }}"
    data_02: "{{ result_02.stdout | default('') | trim }}"
    status_02: "{{ 'PASS' if result_02.stdout | default('') | trim == '' else 'FAIL' }}"
    details_02: "{{ 'nosuid option is set (no output)' if result_02.stdout | default('') | trim == '' else 'nosuid option not set or present' }}"

- name: "Req 03 - Summarize overall compliance status"
  ansible.builtin.set_fact:
    task_03_name: "Compliance summary"
    task_03_cmd: "N/A"
    task_03_rc: "N/A"
    status_03: "{{ 'PASS' if status_01 == 'PASS' and status_02 == 'PASS' else 'FAIL' }}"
    details_03: "{{ 'Both checks passed' if status_01 == 'PASS' and status_02 == 'PASS' else 'One or more checks failed' }}"
    data_03: ""

- name: "Req 04 - Store cis_result"
  ansible.builtin.set_fact:
    cis_result: "{{ status_03 }}"
    task_04_name: "Store cis_result"
    task_04_cmd: "N/A"
    task_04_rc: "N/A"
    data_04: ""
    status_04: "{{ status_03 }}"
    details_04: "cis_result set to {{ status_03 }}"

- name: "Generate audit report"
  ansible.builtin.debug:
    msg:
    - "========================================================"
    - "        AUDIT REPORT — CIS 1.1.2.2.3"
    - "        Reference: CIS Benchmark checkpoint 1.1.2.2.3"
    - "========================================================"
    - ""
    - "REQUIREMENT 01 - {{ req_01 }}:"
    - "  Task: {{ task_01_name | default('Task not recorded') }}"
    - "  Command: {{ task_01_cmd | default('N/A') }}"
    - "  Exit code: {{ task_01_rc | default(-1) }}"
    - "  Data: {{ data_01 | default('') | trim }}"
    - "  Status: {{ status_01 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_01 | default('Not evaluated') | trim }}"
    - ""
    - "REQUIREMENT 02 - {{ req_02 }}:"
    - "  Task: {{ task_02_name | default('Task not recorded') }}"
    - "  Command: {{ task_02_cmd | default('N/A') }}"
    - "  Exit code: {{ task_02_rc | default(-1) }}"
    - "  Data: {{ data_02 | default('') | trim }}"
    - "  Status: {{ status_02 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_02 | default('Not evaluated') | trim }}"
    - ""
    - "REQUIREMENT 03 - {{ req_03 }}:"
    - "  Task: {{ task_03_name | default('Task not recorded') }}"
    - "  Command: {{ task_03_cmd | default('N/A') }}"
    - "  Exit code: N/A"
    - "  Data: N/A"
    - "  Status: {{ status_03 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_03 | default('Not evaluated') | trim }}"
    - ""
    - "REQUIREMENT 04 - {{ req_04 }}:"
    - "  Task: {{ task_04_name | default('Store cis_result') }}"
    - "  Command: {{ task_04_cmd | default('N/A') }}"
    - "  Exit code: N/A"
    - "  Data: N/A"
    - "  Status: {{ status_04 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_04 | default('Not evaluated') | trim }}"
    - ""
    - "========================================================"
    - "OVERALL COMPLIANCE RESULT:"
    - "  Result: {{ cis_result | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_03 | default('Not evaluated') | trim }}"
    - "========================================================"
