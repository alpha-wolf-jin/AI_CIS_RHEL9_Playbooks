---
- name: Initialize meta data variables
  include_vars: cis_audit_var_2_1_21.yml

- name: "Initialize data variables"
  set_fact:
    data_01: "Not collected yet"
    status_01: "ERROR"
    details_01: "Not evaluated"
    task_01_name: "Not executed"
    task_01_cmd: "N/A"
    task_01_rc: -1
    data_02: "Not collected yet"
    status_02: "ERROR"
    details_02: "Not evaluated"
    task_02_name: "Not executed"
    task_02_cmd: "N/A"
    task_02_rc: -1
    data_03: "Not collected yet"
    status_03: "ERROR"
    details_03: "Not evaluated"
    task_03_name: "Not executed"
    task_03_cmd: "N/A"
    task_03_rc: -1
    mta_skip: false

- name: "Req 1 - Check if postfix package is installed"
  ansible.builtin.package_facts:
    manager: auto
  failed_when: false

- name: "Req 1 - Set fact for MTA not applicable if postfix not installed"
  ansible.builtin.set_fact:
    mta_skip: "{{ 'postfix' not in ansible_facts.packages }}"
    postfix_installed: "{{ 'postfix' in ansible_facts.packages }}"

- name: "Req 1 - Deploy audit script"
  ansible.builtin.copy:
    dest: "{{ audit_script }}"
    mode: '0700'
    content: "{{ audit_script_content }}"
  changed_when: false
  when: not mta_skip | default(false)

- name: "Req 1 - Run audit script to verify MTA is listening only on loopback addresses"
  ansible.builtin.shell: /bin/bash "{{ audit_script }}"
  args:
    executable: /bin/bash
  register: audit_result
  failed_when: false
  changed_when: false
  when: not mta_skip | default(false)

- name: "Req 1 - Remove temporary audit script"
  ansible.builtin.file:
    path: "{{ audit_script }}"
    state: absent
  changed_when: false
  when: not mta_skip | default(false)

- name: "Req 1 - Set requirement 01 facts"
  set_fact:
    task_01_name: "Run audit script to verify MTA is listening only on loopback addresses"
    task_01_cmd: "/bin/bash {{ audit_script }}"
    task_01_rc: "{{ -1 if mta_skip | default(false) else audit_result.rc | default(-1) }}"
    data_01: "{{ 'MTA (postfix) not installed - audit skipped' if mta_skip | default(false) else audit_result.stdout | default('') }}"
    status_01: "{{ 'SKIP' if mta_skip | default(false) else ('PASS' if audit_result.rc | default(-1) | int == 0 else 'FAIL') }}"
    details_01: "{{ 'MTA not installed - audit skipped' if mta_skip | default(false) else ('Audit script executed successfully' if audit_result.rc | default(-1) | int == 0 else 'Audit script execution failed') }}"

- name: "Req 2 - Set compliance status fact based on audit script output"
  set_fact:
    task_02_name: "Summarise compliance status from audit script output"
    task_02_cmd: "Check output for ** PASS ** or ** FAIL **"
    task_02_rc: "{{ 0 if mta_skip | default(false) else (0 if '** PASS **' in audit_result.stdout | default('') else 1 if '** FAIL **' in audit_result.stdout | default('') else -1) }}"
    data_02: "{{ 'N/A' if mta_skip | default(false) else audit_result.stdout | default('') }}"
    status_02: "{{ 'SKIP' if mta_skip | default(false) else ('PASS' if '** PASS **' in audit_result.stdout | default('') else ('FAIL' if '** FAIL **' in audit_result.stdout | default('') else 'ERROR')) }}"
    details_02: "{{ 'MTA not installed - audit skipped' if mta_skip | default(false) else ('MTA compliant (PASS)' if '** PASS **' in audit_result.stdout | default('') else ('MTA not compliant (FAIL)' if '** FAIL **' in audit_result.stdout | default('') else 'Unable to determine compliance status')) }}"

- name: "Store final audit result in cis_result"
  set_fact:
    cis_result: "{{ status_02 }}"

- name: "Req 3 - Set report facts"
  set_fact:
    task_03_name: "Generate audit report"
    task_03_cmd: "debug module"
    task_03_rc: 0
    data_03: "Report generated"
    status_03: "PASS"
    details_03: "Audit report generated successfully"

- name: "Generate audit report"
  ansible.builtin.debug:
    msg:
    - "AUDIT REPORT — CIS 2.1.21"
    - "Reference: CIS Benchmark checkpoint 2.1.21"
    - ""
    - "REQUIREMENT 01 - {{ req_01 }}:"
    - "  Task: {{ task_01_name | default('Not recorded') }}"
    - "  Command: {{ task_01_cmd | default('N/A') }}"
    - "  Exit code: {{ task_01_rc | default(-1) }}"
    - "  Data: {{ data_01 | default('') | trim }}"
    - "  Status: {{ status_01 | default('ERROR') | trim }}"
    - "  Details: {{ details_01 | default('') | trim }}"
    - ""
    - "REQUIREMENT 02 - {{ req_02 }}:"
    - "  Task: {{ task_02_name | default('Not recorded') }}"
    - "  Command: {{ task_02_cmd | default('N/A') }}"
    - "  Exit code: {{ task_02_rc | default(-1) }}"
    - "  Data: {{ data_02 | default('') | trim }}"
    - "  Status: {{ status_02 | default('ERROR') | trim }}"
    - "  Details: {{ details_02 | default('') | trim }}"
    - ""
    - "REQUIREMENT 03 - {{ req_03 }}:"
    - "  Task: {{ task_03_name | default('Not recorded') }}"
    - "  Command: {{ task_03_cmd | default('N/A') }}"
    - "  Exit code: {{ task_03_rc | default(-1) }}"
    - "  Data: {{ data_03 | default('') | trim }}"
    - "  Status: {{ status_03 | default('ERROR') | trim }}"
    - "  Details: {{ details_03 | default('') | trim }}"
    - ""
    - "========================================================"
    - "OVERALL RESULT:"
    - "  Result: {{ cis_result | default('ERROR') | trim }}"
    - "  Details: {{ details_02 | default('Not evaluated') | trim }}"
    - "========================================================"

