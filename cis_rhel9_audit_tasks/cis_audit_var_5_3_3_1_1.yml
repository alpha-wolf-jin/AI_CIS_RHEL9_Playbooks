req_01: "Check if pam_faillock is installed by verifying /etc/security/faillock.conf exists. Expected result: file exists."
req_02: |
  Check that the deny parameter in /etc/security/faillock.conf is set to 5 or less using command: `grep -Pi -- '^\\h*deny\\h*=\\h*[1-5]\\b' /etc/security/faillock.conf`. Expected result: `deny = 5` (or similar value between 1 and 5).
req_03: |
  Check that no pam_faillock.so deny argument is set to 0 or greater than 5 in /etc/pam.d/system-auth and /etc/pam.d/password-auth using command: `grep -Pi -- '^\\h*auth\\h+(requisite|required|sufficient)\\h+pam_faillock\\.so\\h+([^#\\n\\r]+\\h+)?deny\\h*=\\h*(0|[6-9]|[1-9][0-9]+)\\b' /etc/pam.d/system-auth /etc/pam.d/password-auth`. Expected result: no output (nothing returned).
req_04: "Summarize overall compliance: PASS if all checks pass, SKIP if pam_faillock is not installed, FAIL if any check fails."
req_05: "Store the final audit result in a variable named 'cis_result' using set_fact. Set cis_result to the overall compliance status (PASS/FAIL/SKIP/ERROR) derived from the last requirement's status variable."
