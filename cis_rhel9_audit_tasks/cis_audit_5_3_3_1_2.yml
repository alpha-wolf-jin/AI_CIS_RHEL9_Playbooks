---
- name: Initialize meta data variables
  include_vars: cis_audit_var_5_3_3_1_2.yml

- name: "Initialize data variables"
  set_fact:
    data_01: "Not collected yet"
    status_01: "ERROR"
    details_01: "Not evaluated"
    data_02: "Not collected yet"
    status_02: "ERROR"
    details_02: "Not evaluated"
    data_03: "Not collected yet"
    status_03: "ERROR"
    details_03: "Not evaluated"
    data_04: "Not collected yet"
    status_04: "ERROR"
    details_04: "Not evaluated"
    data_05: "Not collected yet"
    status_05: "ERROR"
    details_05: "Not evaluated"
    data_06: "Not collected yet"
    status_06: "ERROR"
    details_06: "Not evaluated"
    task_01_name: "Not executed"
    task_01_cmd: "N/A"
    task_01_rc: -1
    task_02_name: "Not executed"
    task_02_cmd: "N/A"
    task_02_rc: -1
    task_03_name: "Not executed"
    task_03_cmd: "N/A"
    task_03_rc: -1
    task_04_name: "Not executed"
    task_04_cmd: "N/A"
    task_04_rc: -1
    task_05_name: "Not executed"
    task_05_cmd: "N/A"
    task_05_rc: -1
    task_06_name: "Not executed"
    task_06_cmd: "N/A"
    task_06_rc: -1

# Requirement 1 - check pam_faillock package installation
- name: "Req 01 - Check if pam_faillock package is installed"
  ansible.builtin.shell: dpkg -l | grep -i pam_faillock || rpm -q pam_faillock
  args:
    executable: /bin/bash
  register: result_01
  failed_when: false
  changed_when: false
  tags: audit

- name: "Req 01 - Set pam_faillock installed fact"
  ansible.builtin.set_fact:
    pam_faillock_installed: "{{ result_01.rc == 0 }}"
  tags: audit

- name: "Store requirement 01 details"
  set_fact:
    task_01_name: "Check if pam_faillock package is installed"
    task_01_cmd: "dpkg -l | grep -i pam_faillock || rpm -q pam_faillock"
    task_01_rc: "{{ result_01.rc | default(-1) }}"
    data_01: "{{ result_01.stdout | default('') | trim }}"
    status_01: "{{ ('PASS' if result_01.rc | default(-1) == 0 else 'FAIL') | trim }}"
    details_01: "{{ ('pam_faillock package is installed' if result_01.rc | default(-1) == 0 else 'pam_faillock package is not installed') | trim }}"

# Requirement 2 - check faillock.conf existence
- name: "Req 02 - Check if faillock configuration file exists using test"
  ansible.builtin.shell: |
    test -f /etc/security/faillock.conf && echo 'EXISTS'
  args:
    executable: /bin/bash
  register: result_02
  failed_when: false
  changed_when: false
  tags: audit

- name: "Store requirement 02 details"
  set_fact:
    task_02_name: "Check if faillock.conf exists"
    task_02_cmd: "test -f /etc/security/faillock.conf && echo 'EXISTS'"
    task_02_rc: "{{ result_02.rc | default(-1) }}"
    data_02: "{{ result_02.stdout | default('') | trim }}"
    status_02: "{{ ('PASS' if (result_02.stdout | default('') | trim == 'EXISTS') else 'FAIL') | trim }}"
    details_02: "{{ ('File exists' if (result_02.stdout | default('') | trim == 'EXISTS') else 'File not found or error') | trim }}"

# Requirement 3
- name: "Req 03 - Check unlock_time in faillock.conf"
  ansible.builtin.shell: |
    grep -Pi -- '^\h*unlock_time\h*=\h*(0|9[0-9][0-9]|[1-9][0-9]{3,})\b' /etc/security/faillock.conf
  args:
    executable: /bin/bash
  register: result_03
  failed_when: false
  changed_when: false
  tags: audit

- name: "Store requirement 03 details"
  set_fact:
    task_03_name: "Check unlock_time value in faillock.conf"
    task_03_cmd: |
      grep -Pi -- '^\\h*unlock_time\\h*=\\h*(0|9[0-9][0-9]|[1-9][0-9]{3,})\\b' /etc/security/faillock.conf
    task_03_rc: "{{ result_03.rc | default(-1) }}"
    data_03: "{{ result_03.stdout | default('') | trim }}"
    status_03: "{{ ('PASS' if (result_03.stdout | default('') | trim | length > 0) else 'FAIL') | trim }}"
    details_03: "{{ ('unlock_time is set correctly: ' + (result_03.stdout | default('') | trim)) if (result_03.stdout | default('') | trim | length > 0) else 'unlock_time is not set correctly or missing' | trim }}"

# Requirement 4
- name: "Req 04 - Check unlock_time absent from PAM files"
  ansible.builtin.shell: |
    grep -Pi -- '^\h*auth\h+(requisite|required|sufficient)\h+pam_faillock\.so\h+([^#\n\r]+\h+)?unlock_time\h*=\h*([1-9]|[1-9][0-9]|[1-8][0-9][0-9])\b' /etc/pam.d/system-auth /etc/pam.d/password-auth
  args:
    executable: /bin/bash
  register: result_04
  failed_when: false
  changed_when: false
  tags: audit

- name: "Store requirement 04 details"
  set_fact:
    task_04_name: "Check unlock_time not set to invalid value in PAM files"
    task_04_cmd: |
      grep -Pi -- '^\\h*auth\\h+(requisite|required|sufficient)\\h+pam_faillock\\.so\\h+([^#\\n\\r]+\\h+)?unlock_time\\h*=\\h*([1-9]|[1-9][0-9]|[1-8][0-9][0-9])\\b' /etc/pam.d/system-auth /etc/pam.d/password-auth
    task_04_rc: "{{ result_04.rc | default(-1) }}"
    data_04: "{{ result_04.stdout | default('') | trim }}"
    status_04: "{{ ('PASS' if (result_04.stdout | default('') | trim | length == 0) else 'FAIL') | trim }}"
    details_04: "{{ 'No invalid unlock_time found in PAM files' if (result_04.stdout | default('') | trim | length == 0) else 'Invalid unlock_time found in PAM files: ' + (result_04.stdout | default('') | trim) | trim }}"

# Requirement 5 - Overall compliance
- name: "Req 05 - Evaluate overall compliance"
  ansible.builtin.set_fact:
    data_05: "Overall compliance evaluation"
    status_05: >-
      {%- set installed = pam_faillock_installed | default(false) -%}
      {%- set conf_exists = (status_02 | default('ERROR') | trim) == 'PASS' -%}
      {%- if not installed or not conf_exists -%}
        SKIP
      {%- elif (status_03 | default('ERROR') | trim) == 'PASS' and (status_04 | default('ERROR') | trim) == 'PASS' -%}
        PASS
      {%- else -%}
        FAIL
      {%- endif -%}
    details_05: >-
      {%- set installed = pam_faillock_installed | default(false) -%}
      {%- set conf_exists = (status_02 | default('ERROR') | trim) == 'PASS' -%}
      {%- if not installed or not conf_exists -%}
        SKIPPED because pam_faillock is not installed or faillock.conf does not exist
      {%- elif (status_03 | default('ERROR') | trim) == 'PASS' and (status_04 | default('ERROR') | trim) == 'PASS' -%}
        System is compliant
      {%- else -%}
        System is NOT compliant
      {%- endif -%}
    task_05_name: "Evaluate overall compliance"
    task_05_cmd: "set_fact"
    task_05_rc: "0"

# Requirement 6 - Store cis_result
- name: "Req 06 - Store final audit result in cis_result"
  set_fact:
    cis_result: "{{ status_05 | default('ERROR') | trim }}"

- name: "Store requirement 06 details"
  set_fact:
    task_06_name: "Store final audit result"
    task_06_cmd: "set_fact cis_result = {{ status_05 | default('ERROR') | trim }}"
    task_06_rc: "0"
    data_06: "{{ cis_result | default('ERROR') | trim }}"
    status_06: "{{ cis_result | default('ERROR') | trim }}"
    details_06: "Final compliance result stored"

# Final report
- name: "Generate audit report"
  debug:
    msg:
    - "AUDIT REPORT — CIS 5.3.3.1.2"
    - "Reference: CIS Benchmark checkpoint 5.3.3.1.2"
    - ""
    - "REQUIREMENT 01 - {{ req_01 }}:"
    - "  Task: {{ task_01_name | default('Not recorded') }}"
    - "  Command: {{ task_01_cmd | default('N/A') }}"
    - "  Exit code: {{ task_01_rc | default(-1) }}"
    - "  Data: {{ data_01 | default('') | trim }}"
    - "  Status: {{ status_01 | default('ERROR') | trim }}"
    - "  Details: {{ details_01 | default('') | trim }}"
    - ""
    - "REQUIREMENT 02 - {{ req_02 }}:"
    - "  Task: {{ task_02_name | default('Not recorded') }}"
    - "  Command: {{ task_02_cmd | default('N/A') }}"
    - "  Exit code: {{ task_02_rc | default(-1) }}"
    - "  Data: {{ data_02 | default('') | trim }}"
    - "  Status: {{ status_02 | default('ERROR') | trim }}"
    - "  Details: {{ details_02 | default('') | trim }}"
    - ""
    - "REQUIREMENT 03 - {{ req_03 }}:"
    - "  Task: {{ task_03_name | default('Not recorded') }}"
    - "  Command: {{ task_03_cmd | default('N/A') }}"
    - "  Exit code: {{ task_03_rc | default(-1) }}"
    - "  Data: {{ data_03 | default('') | trim }}"
    - "  Status: {{ status_03 | default('ERROR') | trim }}"
    - "  Details: {{ details_03 | default('') | trim }}"
    - ""
    - "REQUIREMENT 04 - {{ req_04 }}:"
    - "  Task: {{ task_04_name | default('Not recorded') }}"
    - "  Command: {{ task_04_cmd | default('N/A') }}"
    - "  Exit code: {{ task_04_rc | default(-1) }}"
    - "  Data: {{ data_04 | default('') | trim }}"
    - "  Status: {{ status_04 | default('ERROR') | trim }}"
    - "  Details: {{ details_04 | default('') | trim }}"
    - ""
    - "REQUIREMENT 05 - {{ req_05 }}:"
    - "  Task: {{ task_05_name | default('Not recorded') }}"
    - "  Command: {{ task_05_cmd | default('N/A') }}"
    - "  Exit code: {{ task_05_rc | default(-1) }}"
    - "  Data: {{ data_05 | default('') | trim }}"
    - "  Status: {{ status_05 | default('ERROR') | trim }}"
    - "  Details: {{ details_05 | default('') | trim }}"
    - ""
    - "REQUIREMENT 06 - {{ req_06 }}:"
    - "  Task: {{ task_06_name | default('Not recorded') }}"
    - "  Command: {{ task_06_cmd | default('N/A') }}"
    - "  Exit code: {{ task_06_rc | default(-1) }}"
    - "  Data: {{ data_06 | default('') | trim }}"
    - "  Status: {{ status_06 | default('ERROR') | trim }}"
    - "  Details: {{ details_06 | default('') | trim }}"
    - ""
    - "========================================================"
    - "OVERALL COMPLIANCE:"
    - "  Result: {{ cis_result | default('ERROR') | trim }}"
    - "  Details: {{ details_05 | default('Not evaluated') | trim }}"
    - "========================================================"
