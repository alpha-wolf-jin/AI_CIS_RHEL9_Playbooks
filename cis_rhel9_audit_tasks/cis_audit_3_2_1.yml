---
- name: Initialize meta data variables
  include_vars: cis_audit_var_3_2_1.yml

- name: "Snapshot - Create backup directory"
  ansible.builtin.file:
    path: "{{ backup_dir }}"
    state: directory
    mode: '0700'
  tags: [snapshot]
- name: "Snapshot - Check if audit script file exists"
  ansible.builtin.stat:
    path: "{{ audit_script }}"
  register: script_pre_stat
  tags: [snapshot]
- name: "Snapshot - Save original existence state to disk"
  ansible.builtin.copy:
    dest: "{{ backup_dir }}/script_existed_before"
    content: "{{ script_pre_stat.stat.exists | default(false) | string }}"
    mode: '0600'
  tags: [snapshot]

- name: "Initialize data variables"
  set_fact:
    data_01: "Not collected yet"
    status_01: "UNKNOWN"
    details_01: "Not evaluated"
    task_01_name: "Not executed"
    task_01_cmd: "N/A"
    task_01_rc: -1
    data_02: "Not collected yet"
    status_02: "UNKNOWN"
    details_02: "Not evaluated"
    task_02_name: "Not executed"
    task_02_cmd: "N/A"
    task_02_rc: -1
    data_03: "Not collected yet"
    status_03: "UNKNOWN"
    details_03: "Not evaluated"
    task_03_name: "Not executed"
    task_03_cmd: "N/A"
    task_03_rc: -1
  tags: [execute]
- block:
  - name: "Copy audit script to remote"
    ansible.builtin.copy:
      dest: "{{ audit_script }}"
      mode: '0700'
      content: "{{ audit_script_content }}"
    changed_when: false
    failed_when: false
    tags: [execute]

  - name: "Req 01 - Execute audit script"
    ansible.builtin.shell: /bin/bash "{{ audit_script }}"
    args:
      executable: /bin/bash
    register: result_01
    failed_when: false
    changed_when: false
    tags: [execute]

  - name: "Store requirement 01 details"
    set_fact:
      task_01_name: "Execute audit script for dccp"
      task_01_cmd: "/bin/bash {{ audit_script }}"
      task_01_rc: "{{ result_01.rc | default(-1) }}"
      data_01: "{{ result_01.stdout | default('') | trim }}"
      status_01: "{{ 'PASS' if result_01.rc | default(-1) == 0 else 'FAIL' | trim }}"
      details_01: "{{ 'Script executed successfully' if result_01.rc | default(-1) == 0 else 'Script execution failed' | trim }}"
    tags: [execute]

  - name: "Req 02 - Determine compliance status from audit output"
    set_fact:
      task_02_name: "Evaluate compliance status from audit script output"
      task_02_cmd: "Parse audit_result.stdout"
      task_02_rc: "{{ result_01.rc | default(-1) }}"
      data_02: "{{ result_01.stdout | default('') | trim }}"
      status_02: "{{ 'PASS' if ('** PASS **' in result_01.stdout | default('')) else ('FAIL' if ('** FAIL **' in result_01.stdout | default('')) else 'UNKNOWN') | trim }}"
      details_02: "{{ 'Compliance verified - dccp module not available' if ('** PASS **' in result_01.stdout | default('')) else ('Non-compliant - dccp module available or not properly configured' if ('** FAIL **' in result_01.stdout | default('')) else 'Unable to determine compliance') | trim }}"
    tags: [execute]

  - name: "Req 03 - Store final audit result in cis_result"
    set_fact:
      cis_result: "{{ status_02 | trim }}"
      task_03_name: "Set overall compliance variable cis_result"
      task_03_cmd: "set_fact cis_result = status_02"
      task_03_rc: 0
      data_03: "{{ status_02 | trim }}"
      status_03: "PASS"
      details_03: "cis_result set to {{ status_02 | trim }}"
    tags: [execute]

  - name: "Generate audit report"
    debug:
      msg:
      - "AUDIT REPORT — CIS 3.2.1"
      - "Reference: CIS Benchmark checkpoint 3.2.1"
      - ""
      - "REQUIREMENT 01 - {{ req_01 }}:"
      - "  Task: {{ task_01_name | default('Not recorded') }}"
      - "  Command: {{ task_01_cmd | default('N/A') }}"
      - "  Exit code: {{ task_01_rc | default(-1) }}"
      - "  Data: {{ data_01 | default('') | trim }}"
      - "  Status: {{ status_01 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_01 | default('') | trim }}"
      - ""
      - "REQUIREMENT 02 - {{ req_02 }}:"
      - "  Task: {{ task_02_name | default('Not recorded') }}"
      - "  Command: {{ task_02_cmd | default('N/A') }}"
      - "  Exit code: {{ task_02_rc | default(-1) }}"
      - "  Data: {{ data_02 | default('') | trim }}"
      - "  Status: {{ status_02 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_02 | default('') | trim }}"
      - ""
      - "REQUIREMENT 03 - {{ req_03 }}:"
      - "  Task: {{ task_03_name | default('Not recorded') }}"
      - "  Command: {{ task_03_cmd | default('N/A') }}"
      - "  Exit code: {{ task_03_rc | default(-1) }}"
      - "  Data: {{ data_03 | default('') | trim }}"
      - "  Status: {{ status_03 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_03 | default('') | trim }}"
      - ""
      - "========================================================"
      - "OVERALL COMPLIANCE:"
      - "  Result: {{ cis_result | default('UNKNOWN') | trim }}"
      - "========================================================"
    tags: [execute]

  always:
  - name: "Restore - Read original existence state from disk"
    ansible.builtin.slurp:
      src: "{{ backup_dir }}/script_existed_before"
    register: script_existed_before_slurp
    tags: [restore]

  - name: "Restore - Remove temporary script if it was not present originally"
    ansible.builtin.file:
      path: "{{ audit_script }}"
      state: absent
    when:
    - "script_existed_before_slurp.content | default('') | b64decode | trim | lower == 'false'"
    tags: [restore]

  - name: "Restore - Remove backup directory"
    ansible.builtin.file:
      path: "{{ backup_dir }}"
      state: absent
    tags: [restore]
