---
- name: Initialize meta data variables
  include_vars: cis_audit_var_1_8_1.yml

- name: "Req 01 - Check if GDM is installed using rpm -q gdm"
  ansible.builtin.shell: rpm -q gdm
  args:
    executable: /bin/bash
  register: gdm_check
  failed_when: false
  changed_when: false

- name: "Req 02 - Summarize overall compliance and collect details"
  ansible.builtin.set_fact:
    task_01_name: "Check if GDM is installed using rpm -q gdm"
    task_01_cmd: "rpm -q gdm"
    task_01_rc: "{{ gdm_check.rc | default(-1) }}"
    data_01: "{{ gdm_check.stdout | default('') | trim }}"
    status_01: "{{ ('PASS' if (gdm_check.stdout | default('') | trim) == 'package gdm is not installed' else 'FAIL') | trim }}"
    details_01: "{{ ('GDM is not installed — compliant' if (gdm_check.stdout | default('') | trim) == 'package gdm is not installed' else 'GDM appears to be installed or output unexpected') | trim }}"
    task_02_name: "Summarize overall compliance"
    task_02_cmd: "N/A"
    task_02_rc: -1
    data_02: "{{ ('Compliant' if (gdm_check.stdout | default('') | trim) == 'package gdm is not installed' else 'Non-compliant') | trim }}"
    status_02: "{{ ('PASS' if (gdm_check.stdout | default('') | trim) == 'package gdm is not installed' else 'FAIL') | trim }}"
    details_02: "{{ ('System is compliant: GDM not installed' if (gdm_check.stdout | default('') | trim) == 'package gdm is not installed' else 'System is non-compliant: GDM may be installed or output unexpected') | trim }}"
    overall_status: "{{ ('PASS' if (gdm_check.stdout | default('') | trim) == 'package gdm is not installed' else 'FAIL') | trim }}"
    overall_details: "{{ ('GDM is not installed' if (gdm_check.stdout | default('') | trim) == 'package gdm is not installed' else 'GDM is installed or auditing incomplete') | trim }}"

- name: "Req 03 - Store final audit result in cis_result"
  ansible.builtin.set_fact:
    cis_result: "{{ overall_status | default('UNKNOWN') | trim }}"
    task_03_name: "Store final audit result in cis_result"
    task_03_cmd: "N/A"
    task_03_rc: 0
    data_03: "{{ overall_status | default('UNKNOWN') | trim }}"
    status_03: "PASS"
    details_03: "Stored cis_result from overall compliance status"

- name: "Generate audit report"
  ansible.builtin.debug:
    msg:
    - "AUDIT REPORT — CIS 1.8.1"
    - "Reference: CIS Benchmark checkpoint 1.8.1"
    - ""
    - "REQUIREMENT 01 - {{ req_01 }}:"
    - "  Task: {{ task_01_name | default('Not recorded') }}"
    - "  Command: {{ task_01_cmd | default('N/A') }}"
    - "  Exit code: {{ task_01_rc | default(-1) }}"
    - "  Data: {{ data_01 | default('') | trim }}"
    - "  Status: {{ status_01 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_01 | default('') | trim }}"
    - ""
    - "REQUIREMENT 02 - {{ req_02 }}:"
    - "  Task: {{ task_02_name | default('Not recorded') }}"
    - "  Command: {{ task_02_cmd | default('N/A') }}"
    - "  Exit code: {{ task_02_rc | default(-1) }}"
    - "  Data: {{ data_02 | default('') | trim }}"
    - "  Status: {{ status_02 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_02 | default('') | trim }}"
    - ""
    - "REQUIREMENT 03 - {{ req_03 }}:"
    - "  Task: {{ task_03_name | default('Not recorded') }}"
    - "  Command: {{ task_03_cmd | default('N/A') }}"
    - "  Exit code: {{ task_03_rc | default(-1) }}"
    - "  Data: {{ data_03 | default('') | trim }}"
    - "  Status: {{ status_03 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_03 | default('') | trim }}"
    - ""
    - "========================================================"
    - "OVERALL COMPLIANCE:"
    - "  Result: {{ cis_result | default('UNKNOWN') | trim }}"
    - "  Details: {{ overall_details | default('Not evaluated') | trim }}"
    - "========================================================"
