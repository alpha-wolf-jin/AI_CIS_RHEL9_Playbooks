---
- name: Initialize meta data variables
  include_vars: cis_audit_var_1_1_2_7_4.yml

- name: "Initialize data variables"
  set_fact:
    data_01: "Not collected yet"
    status_01: "UNKNOWN"
    details_01: "Not evaluated"
    data_02: "Not collected yet"
    status_02: "UNKNOWN"
    details_02: "Not evaluated"
    data_03: "Not collected yet"
    status_03: "UNKNOWN"
    details_03: "Not evaluated"
    data_04: "Not collected yet"
    status_04: "UNKNOWN"
    details_04: "Not evaluated"
    task_01_name: "Not recorded"
    task_01_cmd: "N/A"
    task_01_rc: -1
    task_02_name: "Not recorded"
    task_02_cmd: "N/A"
    task_02_rc: -1
    task_03_name: "Not recorded"
    task_03_cmd: "N/A"
    task_03_rc: -1
    task_04_name: "Not recorded"
    task_04_cmd: "N/A"
    task_04_rc: -1

- name: "Req 01 - Check if /var/log/audit is a separate partition using findmnt"
  ansible.builtin.command: "findmnt -kn {{ mount_point }}"
  register: result_01
  failed_when: false
  changed_when: false

- name: "Req 02 - Check if noexec option is set on /var/log/audit using findmnt and grep"
  ansible.builtin.shell: "findmnt -kn {{ mount_point }} | grep -v noexec"
  args:
    executable: /bin/bash
  register: result_02
  failed_when: false
  changed_when: false

- name: "Req 01 - Evaluate separate partition check"
  set_fact:
    task_01_name: "Req 01 - Check if /var/log/audit is a separate partition using findmnt"
    task_01_cmd: "findmnt -kn /var/log/audit"
    task_01_rc: "{{ result_01.rc | default(-1) }}"
    data_01: "{{ result_01.stdout | default('') | trim }}"
    status_01: "{{ 'PASS' if (result_01.stdout | default('') | trim) != '' else 'FAIL' }}"
    details_01: "{{ 'Output contains mount point entry' if (result_01.stdout | default('') | trim) != '' else 'No mount point entry found' }}"

- name: "Req 02 - Evaluate noexec option check"
  set_fact:
    task_02_name: "Req 02 - Check if noexec option is set on /var/log/audit using findmnt and grep"
    task_02_cmd: "findmnt -kn /var/log/audit | grep -v noexec"
    task_02_rc: "{{ result_02.rc | default(-1) }}"
    data_02: "{{ result_02.stdout | default('') | trim }}"
    status_02: >-
      {%- if status_01 == 'FAIL' -%}
        SKIPPED
      {%- elif (result_02.stdout | default('') | trim) == '' -%}
        PASS
      {%- else -%}
        FAIL
      {%- endif -%}
    details_02: >-
      {%- if status_01 == 'FAIL' -%}
        Skipped because /var/log/audit is not a separate partition
      {%- elif (result_02.stdout | default('') | trim) == '' -%}
        Empty output, noexec option is set
      {%- else -%}
        Output contains lines without noexec
      {%- endif -%}

- name: "Req 03 - Determine overall compliance"
  set_fact:
    task_03_name: "Req 03 - Determine overall compliance"
    task_03_cmd: "N/A"
    task_03_rc: -1
    data_03: >-
      {%- if status_01 == 'FAIL' -%}
        Prerequisite not met – separate partition does not exist
      {%- elif status_02 == 'SKIPPED' -%}
        Noexec check skipped due to missing partition
      {%- elif status_02 == 'FAIL' -%}
        Noexec not set
      {%- else -%}
        Both checks passed
      {%- endif -%}
    status_03: >-
      {%- if status_01 == 'FAIL' -%}
        SKIPPED
      {%- elif status_01 == 'PASS' and status_02 == 'PASS' -%}
        PASS
      {%- else -%}
        FAIL
      {%- endif -%}
    details_03: >-
      {%- if status_01 == 'FAIL' -%}
        Prerequisite not met – separate partition does not exist; requirement is not applicable
      {%- elif status_01 == 'PASS' and status_02 == 'PASS' -%}
        All checks passed
      {%- elif status_02 == 'SKIPPED' -%}
        Skipped because /var/log/audit is not a separate partition
      {%- elif status_02 == 'FAIL' -%}
        Noexec option not set on /var/log/audit partition
      {%- else -%}
        One or more checks failed
      {%- endif -%}

- name: "Req 04 - Store cis_result for final report"
  set_fact:
    cis_result: "{{ status_03 }}"

- name: "Req 04 - Evaluate requirement 4"
  set_fact:
    task_04_name: "Req 04 - Store cis_result for final report"
    task_04_cmd: "set_fact cis_result = status_03"
    task_04_rc: 0
    data_04: "{{ cis_result }}"
    status_04: "PASS"
    details_04: "cis_result variable stored successfully"

- name: "Generate audit report"
  debug:
    msg:
    - "AUDIT REPORT — CIS 1.1.2.7.4"
    - "Reference: CIS Benchmark checkpoint 1.1.2.7.4"
    - ""
    - "REQUIREMENT 01 - {{ req_01 }}:"
    - "  Task: {{ task_01_name | default('Not recorded') }}"
    - "  Command: {{ task_01_cmd | default('N/A') }}"
    - "  Exit code: {{ task_01_rc | default(-1) }}"
    - "  Data: {{ data_01 | default('') | trim }}"
    - "  Status: {{ status_01 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_01 | default('') | trim }}"
    - ""
    - "REQUIREMENT 02 - {{ req_02 }}:"
    - "  Task: {{ task_02_name | default('Not recorded') }}"
    - "  Command: {{ task_02_cmd | default('N/A') }}"
    - "  Exit code: {{ task_02_rc | default(-1) }}"
    - "  Data: {{ data_02 | default('') | trim }}"
    - "  Status: {{ status_02 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_02 | default('') | trim }}"
    - ""
    - "REQUIREMENT 03 - {{ req_03 }}:"
    - "  Task: {{ task_03_name | default('Not recorded') }}"
    - "  Command: {{ task_03_cmd | default('N/A') }}"
    - "  Exit code: {{ task_03_rc | default(-1) }}"
    - "  Data: {{ data_03 | default('') | trim }}"
    - "  Status: {{ status_03 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_03 | default('') | trim }}"
    - ""
    - "REQUIREMENT 04 - {{ req_04 }}:"
    - "  Task: {{ task_04_name | default('Not recorded') }}"
    - "  Command: {{ task_04_cmd | default('N/A') }}"
    - "  Exit code: {{ task_04_rc | default(-1) }}"
    - "  Data: {{ data_04 | default('') | trim }}"
    - "  Status: {{ status_04 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_04 | default('') | trim }}"
    - ""
    - "========================================================"
    - "OVERALL COMPLIANCE:"
    - "  Result: {{ cis_result | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_03 | default('Not evaluated') | trim }}"
    - "========================================================"
