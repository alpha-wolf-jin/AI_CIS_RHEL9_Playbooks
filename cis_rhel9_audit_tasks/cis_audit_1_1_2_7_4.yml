---
- name: Initialize meta data variables
  include_vars: cis_audit_var_1_1_2_7_4.yml

- name: "Initialize data variables"
  set_fact:
    data_01: "Not collected yet"
    status_01: "ERROR"
    details_01: "Not evaluated"
    data_02: "Not collected yet"
    status_02: "ERROR"
    details_02: "Not evaluated"
    data_03: "Not collected yet"
    status_03: "ERROR"
    details_03: "Not evaluated"
    data_04: "Not collected yet"
    status_04: "ERROR"
    details_04: "Not evaluated"
    task_01_name: "Not executed"
    task_01_cmd: "N/A"
    task_01_rc: -1
    task_02_name: "Not executed"
    task_02_cmd: "N/A"
    task_02_rc: -1
    task_03_name: "Not executed"
    task_03_cmd: "N/A"
    task_03_rc: -1
    task_04_name: "Not executed"
    task_04_cmd: "N/A"
    task_04_rc: -1

# Requirement 1: Check if a separate partition exists for /var/log/audit
- name: "Req 01 - Check if separate partition exists for /var/log/audit"
  ansible.builtin.command: findmnt -kn {{ mount_point }}
  register: result_01
  failed_when: false
  changed_when: false

- name: "Store requirement 01 details"
  set_fact:
    task_01_name: "Check partition existence"
    task_01_cmd: "findmnt -kn /var/log/audit"
    task_01_rc: "{{ result_01.rc | default(-1) }}"
    data_01: "{{ result_01.stdout | default('') | trim }}"
    status_01: "{{ 'PASS' if (result_01.stdout | default('') | trim | length > 0) else 'SKIP' }}"
    details_01: "{{ 'Partition exists' if (result_01.stdout | default('') | trim | length > 0) else 'Partition not found, skipping' }}"

# Requirement 2: Check if noexec option is set
- name: "Req 02 - Check if noexec option is set on /var/log/audit partition"
  ansible.builtin.shell: |
    findmnt -kn {{ mount_point }} | grep -v noexec
  args:
    executable: /bin/bash
  register: result_02
  failed_when: false
  changed_when: false
  when:
  - "status_01 == 'PASS'"

- name: "Set status_02 to SKIP explicitly when partition missing"
  set_fact:
    status_02: "SKIP"
  when:
  - "status_01 == 'SKIP'"

- name: "Store requirement 02 details"
  set_fact:
    task_02_name: "Check noexec option"
    task_02_cmd: "findmnt -kn /var/log/audit | grep -v noexec"
    task_02_rc: "{{ result_02.rc | default(-1) }}"
    data_02: "{{ result_02.stdout | default('') | trim }}"
    status_02: >-
      {%- if status_01 == 'SKIP' -%}
        SKIP
      {%- elif (result_02.stdout | default('') | trim) == '' -%}
        PASS
      {%- else -%}
        FAIL
      {%- endif -%}
    details_02: >-
      {%- if status_01 == 'SKIP' -%}
        Partition not found, skipped
      {%- elif (result_02.stdout | default('') | trim) == '' -%}
        noexec option is set
      {%- else -%}
        noexec option is NOT set
      {%- endif -%}
  when:
  - "status_01 == 'PASS'"

- name: "Set requirement 02 details when skipped"
  set_fact:
    task_02_name: "Check noexec option"
    task_02_cmd: "findmnt -kn /var/log/audit | grep -v noexec"
    task_02_rc: -1
    data_02: ""
    details_02: "Partition not found, skipped"
  when:
  - "status_01 != 'PASS'"

# Requirement 3: Summarize overall compliance
- name: "Req 03 - Summarize overall compliance"
  set_fact:
    task_03_name: "Summarize overall compliance"
    task_03_cmd: "N/A"
    task_03_rc: 0
    data_03: "{{ status_01 | trim }} / {{ status_02 | trim }}"
    status_03: >-
      {%- if status_01 == 'SKIP' -%}
        SKIP
      {%- elif status_01 == 'PASS' and status_02 == 'PASS' -%}
        PASS
      {%- elif status_02 == 'SKIP' -%}
        SKIP
      {%- else -%}
        FAIL
      {%- endif -%}
    details_03: >-
      {%- if status_01 == 'SKIP' -%}
        Partition does not exist, overall SKIP
      {%- elif status_01 == 'PASS' and status_02 == 'PASS' -%}
        Both checks passed, overall PASS
      {%- elif status_02 == 'SKIP' -%}
        Partition check skipped, overall SKIP
      {%- else -%}
        Partition exists but noexec not set, overall FAIL
      {%- endif -%}

# Requirement 4: Store final audit result in cis_result
- name: "Req 04 - Store final audit result in cis_result"
  set_fact:
    task_04_name: "Store final audit result"
    task_04_cmd: "N/A"
    task_04_rc: 0
    data_04: "{{ status_03 | trim }}"
    status_04: "{{ status_03 | trim }}"
    details_04: "{{ details_03 | trim }}"
    cis_result: "{{ status_03 | trim }}"

# Final report
- name: "Generate audit report"
  debug:
    msg:
    - "AUDIT REPORT — CIS 1.1.2.7.4"
    - "Reference: CIS Benchmark checkpoint 1.1.2.7.4"
    - ""
    - "REQUIREMENT 01 - {{ req_01 }}:"
    - "  Task: {{ task_01_name | default('Not recorded') }}"
    - "  Command: {{ task_01_cmd | default('N/A') }}"
    - "  Exit code: {{ task_01_rc | default(-1) }}"
    - "  Data: {{ data_01 | default('') | trim }}"
    - "  Status: {{ status_01 | default('ERROR') | trim }}"
    - "  Details: {{ details_01 | default('') | trim }}"
    - ""
    - "REQUIREMENT 02 - {{ req_02 }}:"
    - "  Task: {{ task_02_name | default('Not recorded') }}"
    - "  Command: {{ task_02_cmd | default('N/A') }}"
    - "  Exit code: {{ task_02_rc | default(-1) }}"
    - "  Data: {{ data_02 | default('') | trim }}"
    - "  Status: {{ status_02 | default('ERROR') | trim }}"
    - "  Details: {{ details_02 | default('') | trim }}"
    - ""
    - "REQUIREMENT 03 - {{ req_03 }}:"
    - "  Task: {{ task_03_name | default('Not recorded') }}"
    - "  Command: {{ task_03_cmd | default('N/A') }}"
    - "  Exit code: {{ task_03_rc | default(-1) }}"
    - "  Data: {{ data_03 | default('') | trim }}"
    - "  Status: {{ status_03 | default('ERROR') | trim }}"
    - "  Details: {{ details_03 | default('') | trim }}"
    - ""
    - "REQUIREMENT 04 - {{ req_04 }}:"
    - "  Task: {{ task_04_name | default('Not recorded') }}"
    - "  Command: {{ task_04_cmd | default('N/A') }}"
    - "  Exit code: {{ task_04_rc | default(-1) }}"
    - "  Data: {{ data_04 | default('') | trim }}"
    - "  Status: {{ status_04 | default('ERROR') | trim }}"
    - "  Details: {{ details_04 | default('') | trim }}"
    - ""
    - "========================================================"
    - "OVERALL COMPLIANCE:"
    - "  Result: {{ cis_result | default('ERROR') | trim }}"
    - "  Details: {{ details_04 | default('Not evaluated') | trim }}"
    - "========================================================"
