---
- name: Initialize meta data variables
  include_vars: cis_audit_var_1_2_1_2.yml

- name: "Initialize audit variables"
  set_fact:
    task_01_name: "Check if dnf is installed"
    task_01_cmd: "{{ cmd_01 }}"
    task_01_rc: -1
    data_01: ""
    status_01: "UNKNOWN"
    details_01: "Not evaluated"

    task_02_name: "Check global gpgcheck is enabled"
    task_02_cmd: "{{ cmd_02 }}"
    task_02_rc: -1
    data_02: ""
    status_02: "NOT_APPLICABLE"
    details_02: "Not evaluated - check skipped"

    task_03_name: "Check no repository file overrides gpgcheck"
    task_03_cmd: "{{ cmd_03 }}"
    task_03_rc: -1
    data_03: ""
    status_03: "NOT_APPLICABLE"
    details_03: "Not evaluated - check skipped"

    task_04_name: "Summarize overall compliance"
    task_04_cmd: "N/A"
    task_04_rc: -1
    data_04: ""
    status_04: "UNKNOWN"
    details_04: "Not evaluated"

    task_05_name: "Store final audit result in cis_result"
    task_05_cmd: "N/A"
    task_05_rc: -1
    data_05: ""
    status_05: "UNKNOWN"
    details_05: "Not evaluated"

- name: "Req 01 - Check if dnf is installed"
  ansible.builtin.shell: "{{ cmd_01 }}"
  args:
    executable: /bin/bash
  register: result_01
  failed_when: false
  changed_when: false

- name: "Store requirement 01 details"
  set_fact:
    task_01_rc: "{{ result_01.rc | default(-1) }}"
    data_01: "{{ result_01.stdout | default('') | trim }}"
    status_01: "{{ 'PASS' if result_01.rc | default(-1) == 0 else 'FAIL' }}"
    details_01: "{{ 'dnf package is installed' if result_01.rc | default(-1) == 0 else 'dnf package is NOT installed' }}"
    dnf_installed: "{{ result_01.rc | default(-1) == 0 }}"

- name: "Req 02 - Check global gpgcheck is enabled"
  ansible.builtin.shell: "{{ cmd_02 }}"
  args:
    executable: /bin/bash
  register: result_02
  failed_when: false
  changed_when: false
  when: dnf_installed | bool

- name: "Store requirement 02 details"
  set_fact:
    task_02_rc: "{{ result_02.rc | default(-1) }}"
    data_02: "{{ result_02.stdout | default('') | trim }}"
    status_02: "{{ 'PASS' if result_02.rc | default(-1) == 0 else 'FAIL' }}"
    details_02: "{{ 'Global gpgcheck is enabled' if result_02.rc | default(-1) == 0 else 'Global gpgcheck is not enabled' }}"
  when: dnf_installed | bool

- name: "Req 03 - Check no repository file overrides gpgcheck"
  ansible.builtin.shell: "{{ cmd_03 }}"
  args:
    executable: /bin/bash
  register: result_03
  failed_when: false
  changed_when: false
  when: dnf_installed | bool

- name: "Store requirement 03 details"
  set_fact:
    task_03_rc: "{{ result_03.rc | default(-1) }}"
    data_03: "{{ result_03.stdout | default('') | trim }}"
    status_03: "{{ 'PASS' if result_03.rc | default(-1) == 1 else 'FAIL' }}"
    details_03: "{{ 'No repository overrides found' if result_03.rc | default(-1) == 1 else 'Repository overrides found' }}"
  when: dnf_installed | bool

- name: "Req 04 - Summarize overall compliance"
  set_fact:
    status_04: >-
      {%- if not (dnf_installed | bool) -%}
        NOT_APPLICABLE
      {%- elif status_02 == 'PASS' and status_03 == 'PASS' -%}
        PASS
      {%- else -%}
        FAIL
      {%- endif -%}
    details_04: >-
      {%- if not (dnf_installed | bool) -%}
        dnf is not installed
      {%- elif status_02 == 'PASS' and status_03 == 'PASS' -%}
        Global gpgcheck is enabled and no repository overrides disable it
      {%- else -%}
        One or more checks failed
      {%- endif -%}

- name: "Req 05 - Store final audit result in cis_result"
  set_fact:
    cis_result: "{{ status_04 | trim }}"
  when: status_04 is defined

- name: "Store requirement 05 details"
  set_fact:
    task_05_rc: 0
    data_05: "cis_result={{ cis_result }}"
    status_05: "PASS"
    details_05: "Final compliance status stored in cis_result"
  when: cis_result is defined

- name: "Generate audit report"
  debug:
    msg:
    - "AUDIT REPORT — CIS 1.2.1.2"
    - "Reference: CIS Benchmark checkpoint 1.2.1.2"
    - ""
    - "REQUIREMENT 01 - {{ req_01 }}:"
    - "  Task: {{ task_01_name }}"
    - "  Command: {{ task_01_cmd }}"
    - "  Exit code: {{ task_01_rc }}"
    - "  Data: {{ data_01 | trim }}"
    - "  Status: {{ status_01 | trim }}"
    - "  Details: {{ details_01 | trim }}"
    - ""
    - "REQUIREMENT 02 - {{ req_02 }}:"
    - "  Task: {{ task_02_name }}"
    - "  Command: {{ task_02_cmd }}"
    - "  Exit code: {{ task_02_rc }}"
    - "  Data: {{ data_02 | trim }}"
    - "  Status: {{ status_02 | trim }}"
    - "  Details: {{ details_02 | trim }}"
    - ""
    - "REQUIREMENT 03 - {{ req_03 }}:"
    - "  Task: {{ task_03_name }}"
    - "  Command: {{ task_03_cmd }}"
    - "  Exit code: {{ task_03_rc }}"
    - "  Data: {{ data_03 | trim }}"
    - "  Status: {{ status_03 | trim }}"
    - "  Details: {{ details_03 | trim }}"
    - ""
    - "REQUIREMENT 04 - {{ req_04 }}:"
    - "  Task: {{ task_04_name }}"
    - "  Command: {{ task_04_cmd }}"
    - "  Exit code: {{ task_04_rc }}"
    - "  Data: {{ data_04 | trim }}"
    - "  Status: {{ status_04 | trim }}"
    - "  Details: {{ details_04 | trim }}"
    - ""
    - "REQUIREMENT 05 - {{ req_05 }}:"
    - "  Task: {{ task_05_name }}"
    - "  Command: {{ task_05_cmd }}"
    - "  Exit code: {{ task_05_rc }}"
    - "  Data: {{ data_05 | trim }}"
    - "  Status: {{ status_05 | trim }}"
    - "  Details: {{ details_05 | trim }}"
    - ""
    - "OVERALL COMPLIANCE:"
    - "  Result: {{ status_04 | trim }}"
