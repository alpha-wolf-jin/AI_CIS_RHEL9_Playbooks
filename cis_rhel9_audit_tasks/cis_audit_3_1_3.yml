---
- name: Initialize meta data variables
  include_vars: cis_audit_var_3_1_3.yml

- name: "Req 01 - Check if bluez package is installed"
  ansible.builtin.shell: "rpm -q {{ package_name }}"
  args:
    executable: /bin/bash
  register: result_01
  failed_when: false
  changed_when: false

- name: "Store requirement 01 details"
  set_fact:
    task_01_name: "Req 01 - Check if bluez package is installed"
    task_01_cmd: "rpm -q {{ package_name }}"
    task_01_rc: "{{ result_01.rc | default(-1) }}"
    data_01: "{{ result_01.stdout | default('') | trim }}"
    status_01: "{{ ('PASS' if (result_01.rc | default(-1)) != 0 else 'FAIL') | trim }}"
    details_01: "{{ ('Package not installed' if (result_01.rc | default(-1)) != 0 else 'Package is installed') | trim }}"

- name: "Req 02 - Check if bluetooth.service is enabled"
  ansible.builtin.shell: |
    systemctl is-enabled {{ service_name }} 2>/dev/null | grep 'enabled'
  args:
    executable: /bin/bash
  register: result_02
  failed_when: false
  changed_when: false
  when: "result_01.rc | default(-1) == 0"

- name: "Store requirement 02 details"
  set_fact:
    task_02_name: "Req 02 - Check if bluetooth.service is enabled"
    task_02_cmd: "systemctl is-enabled {{ service_name }} 2>/dev/null | grep 'enabled'"
    task_02_rc: "{{ result_02.rc | default(-1) }}"
    data_02: "{{ result_02.stdout | default('') | trim }}"
    status_02: >-
      {{ 'SKIP' if (result_02.skipped | default(false)) else
         ('PASS' if (result_02.rc | default(-1)) != 0 else 'FAIL') | trim }}
    details_02: >-
      {{ 'BlueZ not required, skipped' if (result_02.skipped | default(false)) else
         ('Service is not enabled' if (result_02.rc | default(-1)) != 0 else 'Service is enabled') | trim }}

- name: "Req 03 - Check if bluetooth.service is active"
  ansible.builtin.shell: |
    systemctl is-active {{ service_name }} 2>/dev/null | grep '^active'
  args:
    executable: /bin/bash
  register: result_03
  failed_when: false
  changed_when: false
  when: "result_01.rc | default(-1) == 0"

- name: "Store requirement 03 details"
  set_fact:
    task_03_name: "Req 03 - Check if bluetooth.service is active"
    task_03_cmd: "systemctl is-active {{ service_name }} 2>/dev/null | grep '^active'"
    task_03_rc: "{{ result_03.rc | default(-1) }}"
    data_03: "{{ result_03.stdout | default('') | trim }}"
    status_03: >-
      {{ 'SKIP' if (result_03.skipped | default(false)) else
         ('PASS' if (result_03.rc | default(-1)) != 0 else 'FAIL') | trim }}
    details_03: >-
      {{ 'BlueZ not required, skipped' if (result_03.skipped | default(false)) else
         ('Service is not active' if (result_03.rc | default(-1)) != 0 else 'Service is active') | trim }}

- name: "Req 04 - Summarize overall compliance"
  set_fact:
    task_04_name: "Req 04 - Summarize overall compliance"
    task_04_cmd: "N/A"
    task_04_rc: 0
    data_04: "N/A"
    status_04: >-
      {%- if status_01 == 'PASS' -%}
        SKIP
      {%- elif status_02 == 'FAIL' or status_03 == 'FAIL' -%}
        FAIL
      {%- else -%}
        PASS
      {%- endif -%}
    details_04: >-
      {%- if status_01 == 'PASS' -%}
        BlueZ package is not installed; no bluetooth services in use.
      {%- elif status_02 == 'FAIL' or status_03 == 'FAIL' -%}
        BlueZ package is installed and bluetooth.service is enabled or active.
      {%- else -%}
        BlueZ package is installed; bluetooth.service is not enabled and not active.
      {%- endif -%}

- name: "Req 05 - Store final audit result as cis_result"
  set_fact:
    cis_result: "{{ status_04 | trim }}"
    task_05_name: "Req 05 - Store final audit result as cis_result"
    task_05_cmd: "N/A"
    task_05_rc: 0
    data_05: "{{ status_04 | trim }}"
    status_05: "PASS"
    details_05: "Successfully stored overall compliance result"

- name: "Generate audit report"
  debug:
    msg:
    - "AUDIT REPORT — CIS 3.1.3"
    - "Reference: CIS Benchmark checkpoint 3.1.3"
    - ""
    - "REQUIREMENT 01 - {{ req_01 }}:"
    - "  Task: {{ task_01_name | default('Not recorded') }}"
    - "  Command: {{ task_01_cmd | default('N/A') }}"
    - "  Exit code: {{ task_01_rc | default(-1) }}"
    - "  Data: {{ data_01 | default('') | trim }}"
    - "  Status: {{ status_01 | default('ERROR') | trim }}"
    - "  Details: {{ details_01 | default('') | trim }}"
    - ""
    - "REQUIREMENT 02 - {{ req_02 }}:"
    - "  Task: {{ task_02_name | default('Not recorded') }}"
    - "  Command: {{ task_02_cmd | default('N/A') }}"
    - "  Exit code: {{ task_02_rc | default(-1) }}"
    - "  Data: {{ data_02 | default('') | trim }}"
    - "  Status: {{ status_02 | default('ERROR') | trim }}"
    - "  Details: {{ details_02 | default('') | trim }}"
    - ""
    - "REQUIREMENT 03 - {{ req_03 }}:"
    - "  Task: {{ task_03_name | default('Not recorded') }}"
    - "  Command: {{ task_03_cmd | default('N/A') }}"
    - "  Exit code: {{ task_03_rc | default(-1) }}"
    - "  Data: {{ data_03 | default('') | trim }}"
    - "  Status: {{ status_03 | default('ERROR') | trim }}"
    - "  Details: {{ details_03 | default('') | trim }}"
    - ""
    - "REQUIREMENT 04 - {{ req_04 }}:"
    - "  Task: {{ task_04_name | default('Not recorded') }}"
    - "  Command: {{ task_04_cmd | default('N/A') }}"
    - "  Exit code: {{ task_04_rc | default(-1) }}"
    - "  Data: {{ data_04 | default('') | trim }}"
    - "  Status: {{ status_04 | default('ERROR') | trim }}"
    - "  Details: {{ details_04 | default('') | trim }}"
    - ""
    - "REQUIREMENT 05 - {{ req_05 }}:"
    - "  Task: {{ task_05_name | default('Not recorded') }}"
    - "  Command: {{ task_05_cmd | default('N/A') }}"
    - "  Exit code: {{ task_05_rc | default(-1) }}"
    - "  Data: {{ data_05 | default('') | trim }}"
    - "  Status: {{ status_05 | default('ERROR') | trim }}"
    - "  Details: {{ details_05 | default('') | trim }}"
    - ""
    - "OVERALL COMPLIANCE:"
    - "  Result: {{ cis_result | default('ERROR') | trim }}"
