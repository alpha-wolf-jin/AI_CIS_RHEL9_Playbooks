req_01: "Check if GDM is installed using command: `rpm -q gdm`. Expected result: package gdm is not installed"
req_02: "Summarize overall compliance: if the command output is 'package gdm is not installed', the system is compliant; otherwise, it is non-compliant."
req_03: "Store the final audit result in a variable named 'cis_result' using set_fact. Set cis_result to the overall compliance status (PASS/FAIL/SKIPPED/UNKNOWN) derived from the last requirement's status variable."
