req_01: "Check if SELinux is installed using command: `rpm -q libselinux`. Expected result: libselinux-<version>"
req_02: "Summarize overall compliance status: SELinux is installed if the command returns a valid package version."
req_03: "Store the final audit result in a variable named 'cis_result' using set_fact. Set cis_result to the overall compliance status (PASS/FAIL/SKIP/UNKNOWN) derived from the last requirement's status variable."
