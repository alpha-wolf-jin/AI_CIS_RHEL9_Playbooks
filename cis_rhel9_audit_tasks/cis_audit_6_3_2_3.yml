---
- name: Initialize meta data variables
  include_vars: cis_audit_var_6_3_2_3.yml

- name: "Initialize data variables"
  set_fact:
    task_01_name: "Not executed"
    task_01_cmd: "N/A"
    task_01_rc: -1
    data_01: "Not collected yet"
    status_01: "UNKNOWN"
    details_01: "Not evaluated"
    task_02_name: "Not executed"
    task_02_cmd: "N/A"
    task_02_rc: -1
    data_02: "Not collected yet"
    status_02: "UNKNOWN"
    details_02: "Not evaluated"
    task_03_name: "Not executed"
    task_03_cmd: "N/A"
    task_03_rc: -1
    data_03: "Not collected yet"
    status_03: "UNKNOWN"
    details_03: "Not evaluated"
    task_04_name: "Overall compliance evaluation"
    task_04_cmd: "N/A"
    task_04_rc: 0
    data_04: "Not evaluated"
    status_04: "UNKNOWN"
    details_04: "Not evaluated"
    task_05_name: "Not executed"
    task_05_cmd: "N/A"
    task_05_rc: -1
    data_05: "Not collected yet"
    status_05: "UNKNOWN"
    details_05: "Not evaluated"

- name: "Req 01 - Check auditd installation"
  ansible.builtin.shell: dpkg -l auditd 2>/dev/null || rpm -q audit 2>/dev/null
  args:
    executable: /bin/bash
  register: result_01
  failed_when: false
  changed_when: false

- name: "Store Req 01 details"
  set_fact:
    task_01_name: "Check auditd installation"
    task_01_cmd: "dpkg -l auditd 2>/dev/null || rpm -q audit 2>/dev/null"
    task_01_rc: "{{ result_01.rc | default(-1) }}"
    data_01: "{{ result_01.stdout | default('') | trim }}"
    status_01: "{{ ('PASS' if result_01.rc | default(-1) == 0 else 'FAIL') | trim }}"
    details_01: "{{ ('auditd is installed' if result_01.rc | default(-1) == 0 else 'auditd is not installed') | trim }}"
    auditd_installed: "{{ result_01.rc | default(-1) == 0 }}"

- name: "Req 02 - Check disk_full_action"
  ansible.builtin.shell: grep -P -- '^\h*disk_full_action\h*=\h*(halt|single)\b' /etc/audit/auditd.conf
  args:
    executable: /bin/bash
  register: result_02
  when: "auditd_installed | bool"
  failed_when: false
  changed_when: false

- name: "Store Req 02 details"
  set_fact:
    task_02_name: "Check disk_full_action"
    task_02_cmd: |
      grep -P -- '^\\h*disk_full_action\\h*=\\h*(halt|single)\\b' /etc/audit/auditd.conf
    task_02_rc: "{{ result_02.rc | default(-1) }}"
    data_02: "{{ result_02.stdout | default('') | trim }}"
    status_02: >-
      {%- if result_02.rc | default(-1) == 0 -%}
        PASS
      {%- else -%}
        FAIL
      {%- endif -%}
    details_02: >-
      {%- if result_02.rc | default(-1) == 0 -%}
        disk_full_action is correctly configured
      {%- else -%}
        disk_full_action is not correctly configured
      {%- endif -%}
  when: "auditd_installed | bool"

- name: "Set Req 02 details when auditd not installed (skipped)"
  set_fact:
    task_02_name: "Check disk_full_action (skipped)"
    task_02_cmd: "N/A"
    task_02_rc: 0
    data_02: ""
    status_02: "SKIPPED"
    details_02: "auditd not installed, check skipped"
  when: "not auditd_installed | bool"

- name: "Req 03 - Check disk_error_action"
  ansible.builtin.shell: grep -P -- '^\h*disk_error_action\h*=\h*(syslog|single|halt)\b' /etc/audit/auditd.conf
  args:
    executable: /bin/bash
  register: result_03
  when: "auditd_installed | bool"
  failed_when: false
  changed_when: false

- name: "Store Req 03 details"
  set_fact:
    task_03_name: "Check disk_error_action"
    task_03_cmd: |
      grep -P -- '^\\h*disk_error_action\\h*=\\h*(syslog|single|halt)\\b' /etc/audit/auditd.conf
    task_03_rc: "{{ result_03.rc | default(-1) }}"
    data_03: "{{ result_03.stdout | default('') | trim }}"
    status_03: >-
      {%- if result_03.rc | default(-1) == 0 -%}
        PASS
      {%- else -%}
        FAIL
      {%- endif -%}
    details_03: >-
      {%- if result_03.rc | default(-1) == 0 -%}
        disk_error_action is correctly configured
      {%- else -%}
        disk_error_action is not correctly configured
      {%- endif -%}
  when: "auditd_installed | bool"

- name: "Set Req 03 details when auditd not installed (skipped)"
  set_fact:
    task_03_name: "Check disk_error_action (skipped)"
    task_03_cmd: "N/A"
    task_03_rc: 0
    data_03: ""
    status_03: "SKIPPED"
    details_03: "auditd not installed, check skipped"
  when: "not auditd_installed | bool"

- name: "Req 04 - Evaluate overall compliance"
  set_fact:
    status_04: >-
      {%- if not (auditd_installed | bool) -%}
        SKIPPED
      {%- elif status_02 == 'PASS' and status_03 == 'PASS' -%}
        PASS
      {%- else -%}
        FAIL
      {%- endif -%}
    details_04: >-
      {%- if not (auditd_installed | bool) -%}
        auditd not installed, all checks skipped.
      {%- elif status_02 == 'PASS' and status_03 == 'PASS' -%}
        All checks passed. Both disk_full_action and disk_error_action are configured as required.
      {%- else -%}
        One or more checks failed. disk_full_action status: {{ status_02 }}, disk_error_action status: {{ status_03 }}.
      {%- endif -%}

- name: "Set cis_result fact"
  set_fact:
    cis_result: "{{ status_04 | trim }}"

- name: "Store Req 05 details"
  set_fact:
    task_05_name: "Set cis_result fact"
    task_05_cmd: "set_fact: cis_result = {{ status_04 | trim }}"
    task_05_rc: 0
    data_05: "{{ cis_result | trim }}"
    status_05: "PASS"
    details_05: "cis_result set to {{ cis_result | trim }}"

- name: "Generate audit report"
  debug:
    msg:
    - "AUDIT REPORT — CIS 6.3.2.3"
    - "Reference: CIS Benchmark checkpoint 6.3.2.3"
    - "REQUIREMENT 01 - {{ req_01 }}:"
    - "  Task: {{ task_01_name | default('Not recorded') }}"
    - "  Command: {{ task_01_cmd | default('N/A') }}"
    - "  Exit code: {{ task_01_rc | default(-1) }}"
    - "  Data: {{ data_01 | default('') | trim }}"
    - "  Status: {{ status_01 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_01 | default('') | trim }}"
    - ""
    - "REQUIREMENT 02 - {{ req_02 }}:"
    - "  Task: {{ task_02_name | default('Not recorded') }}"
    - "  Command: {{ task_02_cmd | default('N/A') }}"
    - "  Exit code: {{ task_02_rc | default(-1) }}"
    - "  Data: {{ data_02 | default('') | trim }}"
    - "  Status: {{ status_02 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_02 | default('') | trim }}"
    - ""
    - "REQUIREMENT 03 - {{ req_03 }}:"
    - "  Task: {{ task_03_name | default('Not recorded') }}"
    - "  Command: {{ task_03_cmd | default('N/A') }}"
    - "  Exit code: {{ task_03_rc | default(-1) }}"
    - "  Data: {{ data_03 | default('') | trim }}"
    - "  Status: {{ status_03 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_03 | default('') | trim }}"
    - ""
    - "REQUIREMENT 04 - {{ req_04 }}:"
    - "  Task: {{ task_04_name | default('Not recorded') }}"
    - "  Command: {{ task_04_cmd | default('N/A') }}"
    - "  Exit code: {{ task_04_rc | default(-1) }}"
    - "  Data: {{ data_04 | default('') | trim }}"
    - "  Status: {{ status_04 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_04 | default('') | trim }}"
    - ""
    - "REQUIREMENT 05 - {{ req_05 }}:"
    - "  Task: {{ task_05_name | default('Not recorded') }}"
    - "  Command: {{ task_05_cmd | default('N/A') }}"
    - "  Exit code: {{ task_05_rc | default(-1) }}"
    - "  Data: {{ data_05 | default('') | trim }}"
    - "  Status: {{ status_05 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_05 | default('') | trim }}"
    - ""
    - "OVERALL COMPLIANCE:"
    - "  Result: {{ cis_result | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_04 | default('Not evaluated') | trim }}"
