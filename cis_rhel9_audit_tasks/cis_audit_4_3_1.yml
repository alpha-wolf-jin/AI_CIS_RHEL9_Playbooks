    data_04: "{{ result_04.stdout | default('') | trim if result_04 is defined and not result_04.skipped else '' }}"
    status_04: >-
      {%- if not (nft_available | default(false)) -%}
        SKIP
      {%- elif skip_hooks | default(false) -%}
        SKIP
      {%- elif result_04.rc | default(-1) == 0 -%}
        PASS
      {%- else -%}
        FAIL
      {%- endif %}
    details_04: >-
      {%- if not (nft_available | default(false)) -%}
        nft utility not installed - check not applicable
      {%- elif skip_hooks | default(false) -%}
        Firewalld active – check skipped per audit procedure
      {%- elif result_04.rc | default(-1) == 0 -%}
        Base chain for FORWARD filter hook found
      {%- else -%}
        Base chain for FORWARD not found
