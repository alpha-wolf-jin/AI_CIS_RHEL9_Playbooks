---
- name: Initialize meta data variables
  include_vars: cis_audit_var_4_3_1.yml

- name: "Initialize data variables"
  ansible.builtin.set_fact:
    data_01: "Not collected yet"
    status_01: "ERROR"
    details_01: "Not evaluated"
    data_02: "Not collected yet"
    status_02: "ERROR"
    details_02: "Not evaluated"
    data_03: "Not collected yet"
    status_03: "ERROR"
    details_03: "Not evaluated"
    data_04: "Not collected yet"
    status_04: "ERROR"
    details_04: "Not evaluated"
    data_05: "Not collected yet"
    status_05: "ERROR"
    details_05: "Not evaluated"
    data_06: "Not collected yet"
    status_06: "ERROR"
    details_06: "Not evaluated"
    data_07: "Not collected yet"
    status_07: "ERROR"
    details_07: "Not evaluated"
    task_01_name: "Not executed"
    task_01_cmd: "N/A"
    task_01_rc: -1
    task_02_name: "Not executed"
    task_02_cmd: "N/A"
    task_02_rc: -1
    task_03_name: "Not executed"
    task_03_cmd: "N/A"
    task_03_rc: -1
    task_04_name: "Not executed"
    task_04_cmd: "N/A"
    task_04_rc: -1
    task_05_name: "Not executed"
    task_05_cmd: "N/A"
    task_05_rc: -1
    task_06_name: "Not executed"
    task_06_cmd: "N/A"
    task_06_rc: -1
    task_07_name: "Not executed"
    task_07_cmd: "N/A"
    task_07_rc: -1

# Requirement 1 – Check nft availability
- name: "Req 1 - Check if nftables utility is in use"
  ansible.builtin.shell: "command -v nft"
  args:
    executable: /bin/bash
  register: result_01
  failed_when: false
  changed_when: false

- name: "Store requirement 01 details"
  ansible.builtin.set_fact:
    task_01_name: "Check nftables utility installed"
    task_01_cmd: "command -v nft"
    task_01_rc: "{{ result_01.rc | default(-1) }}"
    data_01: "{{ result_01.stdout | default('') | trim }}"
    status_01: "{{ ('PASS' if result_01.rc | default(-1) == 0 else 'FAIL') | trim }}"
    details_01: "{{ ('nft utility found at ' + (result_01.stdout | default('') | trim)) if result_01.rc | default(-1) == 0 else 'nft utility not found' | trim }}"
    nft_available: "{{ result_01.rc | default(-1) == 0 }}"

# Requirement 2 – Check firewalld status
- name: "Req 2 - Check if Firewalld is in use"
  ansible.builtin.shell: "systemctl is-active firewalld 2>/dev/null || echo 'inactive'"
  args:
    executable: /bin/bash
  register: result_02
  failed_when: false
  changed_when: false

- name: "Store requirement 02 details"
  ansible.builtin.set_fact:
    task_02_name: "Check if Firewalld is active"
    task_02_cmd: "systemctl is-active firewalld 2>/dev/null || echo 'inactive'"
    task_02_rc: "{{ result_02.rc | default(-1) }}"
    data_02: "{{ result_02.stdout | default('') | trim }}"
    status_02: "{{ ('SKIP' if ('active' in result_02.stdout | default('') | trim) else 'PASS') | trim }}"
    details_02: "{{ ('Firewalld is active - audit will be skipped' if ('active' in result_02.stdout | default('') | trim) else 'Firewalld is not active - proceed with audit') | trim }}"
    skip_hooks: "{{ 'active' in result_02.stdout | default('') | trim }}"

# Requirement 3 – INPUT hook
- name: "Req 3 - Check if nftables base chain exists for INPUT filter hook"
  ansible.builtin.shell: "nft list ruleset | grep 'hook input'"
  args:
    executable: /bin/bash
  register: result_03
  failed_when: false
  changed_when: false
  when:
  - nft_available | default(false)
  - not (skip_hooks | default(false))

- name: "Store requirement 03 details"
  ansible.builtin.set_fact:
    task_03_name: "Check INPUT filter hook"
    task_03_cmd: "nft list ruleset | grep 'hook input'"
    task_03_rc: "{{ result_03.rc | default(-1) if result_03 is defined and not result_03.skipped else -1 }}"
    data_03: "{{ result_03.stdout | default('') | trim if result_03 is defined and not result_03.skipped else '' }}"
    status_03: >-
      {%- if not (nft_available | default(false)) -%}
        SKIP
      {%- elif skip_hooks | default(false) -%}
        SKIP
      {%- elif result_03.rc | default(-1) == 0 -%}
        PASS
      {%- else -%}
        FAIL
      {%- endif %}
    details_03: >-
      {%- if not (nft_available | default(false)) -%}
        nft utility not installed - check not applicable
      {%- elif skip_hooks | default(false) -%}
        Firewalld active – check skipped per audit procedure
      {%- elif result_03.rc | default(-1) == 0 -%}
        Base chain for INPUT filter hook found
      {%- else -%}
        Base chain for INPUT not found
      {%- endif %}

# Requirement 4 – FORWARD hook
- name: "Req 4 - Check if nftables base chain exists for FORWARD filter hook"
  ansible.builtin.shell: "nft list ruleset | grep 'hook forward'"
