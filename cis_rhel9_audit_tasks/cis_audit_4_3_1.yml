    task_05_cmd: "nft list ruleset | grep 'hook output'"
    task_05_rc: "{{ result_05.rc | default(-1) if result_05 is defined and not result_05.skipped else -1 }}"
    data_05: "{{ result_05.stdout | default('') | trim if result_05 is defined and not result_05.skipped else '' }}"
    status_05: >-
      {%- if not (nft_available | default(false)) -%}
        SKIP
      {%- elif skip_hooks | default(false) -%}
        SKIP
      {%- elif result_05.rc | default(-1) == 0 -%}
        PASS
      {%- else -%}
        FAIL
      {%- endif %}
    details_05: >-
      {%- if not (nft_available | default(false)) -%}
        nft utility not installed - check not applicable
      {%- elif skip_hooks | default(false) -%}
        Firewalld active – check skipped per audit procedure
      {%- elif result_05.rc | default(-1) == 0 -%}
        Base chain for OUTPUT filter hook found
      {%- else -%}
        Base chain for OUTPUT not found
      {%- endif %}

# Requirement 6 – Summarize overall compliance
- name: "Req 6 - Summarize overall compliance"
  ansible.builtin.set_fact:
    status_06: >-
      {%- if not (nft_available | default(false)) -%}
        SKIP
      {%- elif skip_hooks | default(false) -%}
        SKIP
      {%- elif status_03 | trim == 'PASS' and status_04 | trim == 'PASS' and status_05 | trim == 'PASS' -%}
        PASS
      {%- else -%}
        FAIL
      {%- endif %}
    details_06: >-
      {%- if not (nft_available | default(false)) -%}
        nftables utility not installed; no base chain checks performed
      {%- elif skip_hooks | default(false) -%}
        Firewalld is active; base chain checks skipped per audit procedure
      {%- elif status_03 | trim == 'PASS' and status_04 | trim == 'PASS' and status_05 | trim == 'PASS' -%}
        All required base chains exist
      {%- else -%}
        One or more base chains missing
      {%- endif %}
    task_06_name: "Summarize overall compliance"
    task_06_cmd: "N/A"
    task_06_rc: 0
    data_06: ""

# Requirement 7 – Store final audit result
- name: "Req 7 - Store final audit result"
  ansible.builtin.set_fact:
    cis_result: "{{ status_06 | default('ERROR') | trim }}"
    status_07: "{{ status_06 | default('ERROR') | trim }}"
    details_07: "Final audit result stored"
    task_07_name: "Store final audit result"
    task_07_cmd: "set_fact"
    task_07_rc: 0
    data_07: "{{ status_06 | default('ERROR') | trim }}"

