---
- name: Initialize meta data variables
  include_vars: cis_audit_var_3_3_9.yml

- name: "Ensure backup directory exists"
  ansible.builtin.file:
    path: "{{ backup_dir }}"
    state: directory
    mode: '0700'
  changed_when: false

- name: "Check pre-existence of audit script"
  ansible.builtin.stat:
    path: "{{ audit_script }}"
  register: script_pre_stat

- name: "Save pre-existence of audit script"
  ansible.builtin.copy:
    dest: "{{ backup_dir }}/audit_script_preexists.txt"
    content: "{{ script_pre_stat.stat.exists | default(false) | string }}"
    mode: '0600'
  changed_when: false


- name: "Initialize data variables"
  ansible.builtin.set_fact:
    data_01: "Not collected yet"
    status_01: "UNKNOWN"
    details_01: "Not evaluated"
    task_01_name: "Not executed"
    task_01_cmd: "N/A"
    task_01_rc: -1
    data_02: "Not collected yet"
    status_02: "UNKNOWN"
    details_02: "Not evaluated"
    task_02_name: "Not executed"
    task_02_cmd: "N/A"
    task_02_rc: -1
    data_03: "Not collected yet"
    status_03: "UNKNOWN"
    details_03: "Not evaluated"
    task_03_name: "Not executed"
    task_03_cmd: "N/A"
    task_03_rc: -1

- block:
  - name: "Req 01 - Copy audit script to remote"
    ansible.builtin.copy:
      dest: "{{ audit_script }}"
      mode: '0700'
      content: "{{ audit_script_content }}"
    failed_when: false
    changed_when: false

  - name: "Req 01 - Execute audit script to verify suspicious packets logging"
    ansible.builtin.shell: /bin/bash "{{ audit_script }}"
    args:
      executable: /bin/bash
    register: script_result
    failed_when: false
    changed_when: false

  - name: "Store execution details for Requirement 01"
    ansible.builtin.set_fact:
      task_01_name: "Execute audit script to verify suspicious packets logging kernel parameters"
      task_01_cmd: "/bin/bash /tmp/cis_3_3_9_audit.sh"
      status_01: "PASS"
      details_01: >-
        Script executed successfully; system compliance status: {{ 'PASS' if '** PASS **' in script_result.stdout | default('') else 'FAIL' }}
      data_01: "{{ script_result.stdout | default('') | trim }}"

  - name: "Store compliance status from audit output"
    ansible.builtin.set_fact:
      compliance_status: "{{ ('PASS' if '** PASS **' in script_result.stdout | default('') else 'FAIL') | trim }}"

  - name: "Req 02 - Store verification details"
    ansible.builtin.set_fact:
      task_02_name: "Verify compliance status from audit script output"
      task_02_cmd: "N/A"
      task_02_rc: 0
      data_02: "{{ script_result.stdout | default('') | trim }}"
      status_02: "{{ compliance_status | default('UNKNOWN') | trim }}"
      details_02: "Compliance status is {{ compliance_status | default('UNKNOWN') | trim }}"

  - name: "Req 03 - Store final audit result in cis_result"
    ansible.builtin.set_fact:
      cis_result: "{{ compliance_status | default('UNKNOWN') | trim }}"
      task_03_name: "Store final audit result in cis_result using set_fact"
      task_03_cmd: "N/A"
      task_03_rc: 0
      data_03: "cis_result set to {{ compliance_status | default('UNKNOWN') | trim }}"
      status_03: "PASS"
      details_03: "cis_result stored successfully as {{ compliance_status | default('UNKNOWN') | trim }}"

  always:
  - name: "Read pre-existence marker"
    ansible.builtin.slurp:
      src: "{{ backup_dir }}/audit_script_preexists.txt"
    register: preexists_marker
    failed_when: false

  - name: "Remove temporary audit script if it did not pre-exist"
    ansible.builtin.file:
      path: "{{ audit_script }}"
      state: absent
    when:
    - preexists_marker.content is defined
    - "preexists_marker.content | b64decode | trim | lower == 'false'"

- name: "Req 04 - Generate audit report"
  ansible.builtin.debug:
    msg:
    - "AUDIT REPORT — CIS 3.3.9"
    - "Reference: CIS Benchmark checkpoint 3.3.9"
    - "REQUIREMENT 01 - {{ req_01 }}:"
    - "  Task: {{ task_01_name | default('Not recorded') }}"
    - "  Command: {{ task_01_cmd | default('N/A') }}"
    - "  Exit code: {{ script_result.rc | default(-1) }}"
    - "  Data: {{ data_01 | default('') | trim }}"
    - "  Status: {{ status_01 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_01 | default('') | trim }}"
    - ""
    - "REQUIREMENT 02 - {{ req_02 }}:"
    - "  Task: {{ task_02_name | default('Not recorded') }}"
    - "  Command: {{ task_02_cmd | default('N/A') }}"
    - "  Exit code: {{ task_02_rc | default(-1) }}"
    - "  Data: {{ data_02 | default('') | trim }}"
    - "  Status: {{ status_02 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_02 | default('') | trim }}"
    - ""
    - "REQUIREMENT 03 - {{ req_03 }}:"
    - "  Task: {{ task_03_name | default('Not recorded') }}"
    - "  Command: {{ task_03_cmd | default('N/A') }}"
    - "  Exit code: {{ task_03_rc | default(-1) }}"
    - "  Data: {{ data_03 | default('') | trim }}"
    - "  Status: {{ status_03 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_03 | default('') | trim }}"
    - ""
    - "REQUIREMENT 04 - {{ req_04 }}:"
    - "  Task: Generate audit report"
    - "  Command: debug module"
    - "  Exit code: N/A"
    - "  Data: Report generated"
    - "  Status: PASS"
    - "  Details: Audit report generated with overall compliance status {{ cis_result }}"
    - ""
    - "========================================================"
    - "OVERALL COMPLIANCE:"
    - "  Result: {{ cis_result | default('UNKNOWN') | trim }}"
    - "========================================================"
