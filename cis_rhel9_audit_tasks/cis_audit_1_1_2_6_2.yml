---
- name: Initialize meta data variables
  include_vars: cis_audit_var_1_1_2_6_2.yml

- name: "Req 01 - Check if {{ mount_point }} is a separate partition using findmnt"
  ansible.builtin.command: "findmnt -kn {{ mount_point }}"
  register: result_01
  failed_when: false
  changed_when: false
  tags: [audit, cis]
- name: "Req 01 - Set compliance fact for partition existence"
  ansible.builtin.set_fact:
    data_01: "{{ result_01.stdout | default('') | trim }}"
    task_01_name: "Check if {{ mount_point }} is a separate partition"
    task_01_cmd: "findmnt -kn {{ mount_point }}"
    task_01_rc: "{{ result_01.rc | default(-1) }}"
    partition_exists: "{{ result_01.rc == 0 and (result_01.stdout | default('') | trim) != '' }}"
    status_01: "{{ 'PASS' if (result_01.rc == 0 and (result_01.stdout | default('') | trim) != '') else 'FAIL' }}"
    details_01: "{{ ('Partition ' + mount_point + ' exists' if (result_01.rc == 0 and (result_01.stdout | default('') | trim) != '') else 'Partition ' + mount_point + ' not found or command failed') | trim }}"

# Requirement 02
- name: "Req 02 - Check nodev option on {{ mount_point }} using grep"
  ansible.builtin.shell: "findmnt -kn {{ mount_point }} | grep -v {{ mount_option }}"
  args:
    executable: /bin/bash
  register: result_02
  failed_when: false
  changed_when: false
  tags: [audit]
- name: "Req 02 - Set compliance fact for nodev option"
  ansible.builtin.set_fact:
    data_02: "{{ result_02.stdout | default('') | trim }}"
    task_02_name: "Check nodev on {{ mount_point }}"
    task_02_cmd: "findmnt -kn {{ mount_point }} | grep -v nodev"
    task_02_rc: "{{ result_02.rc | default(-1) }}"
    status_02: >-
      {{ 'SKIP' if not partition_exists | default(false)
         else ('PASS' if (result_02.stdout | default('') | trim) == '' else 'FAIL') }}
    details_02: >-
      {{ 'Partition not present, nodev check skipped' if not partition_exists | default(false)
         else ('nodev option present' if (result_02.stdout | default('') | trim) == '' else 'nodev option missing or extra output detected') }}

# Requirement 03 – overall compliance (fixed logic)
- name: "Req 03 - Determine overall compliance for CIS 1.1.2.6.2"
  ansible.builtin.set_fact:
    cis_result: >-
      {{ 'SKIP' if not partition_exists | default(false)
         else ('PASS' if status_02 == 'PASS' else 'FAIL') }}
    overall_details: >-
      {{ 'No separate /var/log partition exists — check skipped' if not partition_exists | default(false)
         else ('Compliant: nodev option set on /var/log' if status_02 == 'PASS'
         else 'Non-compliant: nodev option not set on /var/log') }}

# Requirement 04 – store final audit result in cis_result
- name: "Req 04 - Store final audit result in cis_result"
  ansible.builtin.set_fact:
    task_04_name: "Store final audit result in cis_result"
    task_04_cmd: "set_fact"
    task_04_rc: 0
    data_04: "{{ cis_result | default('UNKNOWN') | trim }}"
    status_04: "PASS"
    details_04: "Variable 'cis_result' set to '{{ cis_result | default('UNKNOWN') | trim }}'"

# Final report
- name: "Generate audit report"
  ansible.builtin.debug:
    msg:
    - "AUDIT REPORT — CIS 1.1.2.6.2"
    - "Reference: CIS Benchmark checkpoint 1.1.2.6.2"
    - ""
    - "REQUIREMENT 01 - {{ req_01 }}:"
    - "  Task: {{ task_01_name | default('Not recorded') }}"
    - "  Command: {{ task_01_cmd | default('N/A') }}"
    - "  Exit code: {{ task_01_rc | default(-1) }}"
    - "  Data: {{ data_01 | default('') | trim }}"
    - "  Status: {{ status_01 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_01 | default('') | trim }}"
    - ""
    - "REQUIREMENT 02 - {{ req_02 }}:"
    - "  Task: {{ task_02_name | default('Not recorded') }}"
    - "  Command: {{ task_02_cmd | default('N/A') }}"
    - "  Exit code: {{ task_02_rc | default(-1) }}"
    - "  Data: {{ data_02 | default('') | trim }}"
    - "  Status: {{ status_02 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_02 | default('') | trim }}"
    - ""
    - "REQUIREMENT 03 - {{ req_03 }}:"
    - "  Task: Summarize overall compliance"
    - "  Command: N/A"
    - "  Exit code: N/A"
    - "  Data: N/A"
    - "  Status: {{ cis_result | default('UNKNOWN') | trim }}"
    - "  Details: {{ overall_details | default('') | trim }}"
    - ""
    - "REQUIREMENT 04 - {{ req_04 }}:"
    - "  Task: {{ task_04_name | default('Not recorded') }}"
    - "  Command: {{ task_04_cmd | default('N/A') }}"
    - "  Exit code: {{ task_04_rc | default(-1) }}"
    - "  Data: {{ data_04 | default('') | trim }}"
    - "  Status: {{ status_04 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_04 | default('') | trim }}"
    - ""
    - "========================================================"
    - "OVERALL COMPLIANCE:"
    - "  Result: {{ cis_result | default('UNKNOWN') | trim }}"
    - "  Details: {{ overall_details | default('Not evaluated') | trim }}"
    - "========================================================"
  tags: [audit, report]
