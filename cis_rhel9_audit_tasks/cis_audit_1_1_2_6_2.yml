---
- name: Initialize meta data variables
  include_vars: cis_audit_var_1_1_2_6_2.yml

- name: "Initialize data variables"
  set_fact:
    data_01: "Not collected yet"
    status_01: "ERROR"
    details_01: "Not evaluated"
    data_02: "Not collected yet"
    status_02: "ERROR"
    details_02: "Not evaluated"
    data_03: "Not collected yet"
    status_03: "ERROR"
    details_03: "Not evaluated"
    data_04: "Not collected yet"
    status_04: "ERROR"
    details_04: "Not evaluated"
    task_01_name: "Not executed"
    task_01_cmd: "N/A"
    task_01_rc: -1
    task_02_name: "Not executed"
    task_02_cmd: "N/A"
    task_02_rc: -1
    task_03_name: "Not executed"
    task_03_cmd: "N/A"
    task_03_rc: -1
    task_04_name: "Not executed"
    task_04_cmd: "N/A"
    task_04_rc: -1

- name: "Req 01 - Check if a separate partition exists for /var/log"
  ansible.builtin.command: findmnt -kn /var/log
  register: result_01
  failed_when: false
  changed_when: false

- name: "Store requirement 01 details"
  set_fact:
    task_01_name: "Check if a separate partition exists for /var/log"
    task_01_cmd: "findmnt -kn /var/log"
    task_01_rc: "{{ result_01.rc | default(-1) }}"
    data_01: "{{ result_01.stdout | default('') | trim }}"
    status_01: "{{ 'PASS' if (result_01.rc | default(-1) == 0 and (result_01.stdout | default('') | trim | length > 0)) else 'SKIP' }}"
    details_01: "{{ 'Separate partition found for /var/log' if (result_01.rc | default(-1) == 0 and (result_01.stdout | default('') | trim | length > 0)) else 'No separate /var/log partition - check skipped' }}"

- name: "Req 02 - Check if nodev option is set on /var/log partition"
  ansible.builtin.shell: findmnt -kn /var/log | grep -v nodev
  args:
    executable: /bin/bash
  register: result_02
  failed_when: false
  changed_when: false
  when:
  - "result_01.rc | default(-1) == 0"
  - "result_01.stdout | default('') | trim | length > 0"

- name: "Store requirement 02 details"
  set_fact:
    task_02_name: "Check if nodev option is set on /var/log partition"
    task_02_cmd: "findmnt -kn /var/log | grep -v nodev"
    task_02_rc: "{{ result_02.rc | default(-1) }}"
    data_02: "{{ result_02.stdout | default('') | trim }}"
    status_02: >-
      {%- if not (result_01.rc | default(-1) == 0 and (result_01.stdout | default('') | trim | length > 0)) -%}
      SKIP
      {%- elif result_02.rc | default(-1) == 1 and (result_02.stdout | default('') | trim | length == 0) -%}
      PASS
      {%- else -%}
      FAIL
      {%- endif -%}
    details_02: >-
      {%- if not (result_01.rc | default(-1) == 0 and (result_01.stdout | default('') | trim | length > 0)) -%}
      No separate /var/log partition
      {%- elif result_02.rc | default(-1) == 1 and (result_02.stdout | default('') | trim | length == 0) -%}
      nodev option is set on /var/log
      {%- else -%}
      nodev option is NOT set on /var/log
      {%- endif -%}

- name: "Req 03 - Summarize overall compliance"
  set_fact:
    task_03_name: "Summarize overall compliance"
    task_03_cmd: "N/A"
    task_03_rc: 0
    data_03: "{{ status_02 | default('ERROR') | trim }}"
    status_03: >-
      {%- if status_02 | default('ERROR') | trim == 'SKIP' -%}
      SKIP
      {%- elif status_02 | default('ERROR') | trim == 'PASS' -%}
      PASS
      {%- elif status_02 | default('ERROR') | trim == 'FAIL' -%}
      FAIL
      {%- else -%}
      ERROR
      {%- endif -%}
    details_03: >-
      {%- if status_02 | default('ERROR') | trim == 'SKIP' -%}
      No separate /var/log partition exists
      {%- elif status_02 | default('ERROR') | trim == 'PASS' -%}
      All checks passed - nodev is set on /var/log
      {%- elif status_02 | default('ERROR') | trim == 'FAIL' -%}
      Partition exists but nodev option is not set
      {%- else -%}
      Unable to determine compliance status
      {%- endif -%}

- name: "Req 04 - Store final audit result in cis_result"
  set_fact:
    task_04_name: "Store final audit result"
    task_04_cmd: "N/A"
    task_04_rc: 0
    data_04: "{{ status_03 | default('ERROR') | trim }}"
    status_04: "{{ status_03 | default('ERROR') | trim }}"
    details_04: "{{ details_03 | default('Not evaluated') | trim }}"
    cis_result: "{{ status_03 | default('ERROR') | trim }}"

- name: "Generate audit report"
  debug:
    msg:
    - "AUDIT REPORT — CIS 1.1.2.6.2"
    - "Reference: CIS Benchmark checkpoint 1.1.2.6.2"
    - ""
    - "REQUIREMENT 01 - {{ req_01 }}:"
    - "  Task: {{ task_01_name | default('Not recorded') }}"
    - "  Command: {{ task_01_cmd | default('N/A') }}"
    - "  Exit code: {{ task_01_rc | default(-1) }}"
    - "  Data: {{ data_01 | default('') | trim }}"
    - "  Status: {{ status_01 | default('ERROR') | trim }}"
    - "  Details: {{ details_01 | default('') | trim }}"
    - ""
    - "REQUIREMENT 02 - {{ req_02 }}:"
    - "  Task: {{ task_02_name | default('Not recorded') }}"
    - "  Command: {{ task_02_cmd | default('N/A') }}"
    - "  Exit code: {{ task_02_rc | default(-1) }}"
    - "  Data: {{ data_02 | default('') | trim }}"
    - "  Status: {{ status_02 | default('ERROR') | trim }}"
    - "  Details: {{ details_02 | default('') | trim }}"
    - ""
    - "REQUIREMENT 03 - {{ req_03 }}:"
    - "  Task: {{ task_03_name | default('Not recorded') }}"
    - "  Command: {{ task_03_cmd | default('N/A') }}"
    - "  Exit code: {{ task_03_rc | default(-1) }}"
    - "  Data: {{ data_03 | default('') | trim }}"
    - "  Status: {{ status_03 | default('ERROR') | trim }}"
    - "  Details: {{ details_03 | default('') | trim }}"
    - ""
    - "REQUIREMENT 04 - {{ req_04 }}:"
    - "  Task: {{ task_04_name | default('Not recorded') }}"
    - "  Command: {{ task_04_cmd | default('N/A') }}"
    - "  Exit code: {{ task_04_rc | default(-1) }}"
    - "  Data: {{ data_04 | default('') | trim }}"
    - "  Status: {{ status_04 | default('ERROR') | trim }}"
    - "  Details: {{ details_04 | default('') | trim }}"
    - ""
    - "========================================================"
    - "OVERALL COMPLIANCE:"
    - "  Result: {{ cis_result | default('ERROR') | trim }}"
    - "  Details: {{ details_04 | default('Not evaluated') | trim }}"
    - "========================================================"
