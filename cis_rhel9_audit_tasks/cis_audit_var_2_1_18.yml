req_01: "Check if httpd is installed using command: `rpm -q httpd`. Expected result: package httpd is not installed"
req_02: "Check if nginx is installed using command: `rpm -q nginx`. Expected result: package nginx is not installed"
req_03: "If httpd or nginx is installed and required for dependencies, check that httpd.socket is not enabled using command: `systemctl is-enabled httpd.socket 2>/dev/null | grep 'enabled'`. Expected result: Nothing should be returned"
req_04: "If httpd or nginx is installed and required for dependencies, check that httpd.service is not enabled using command: `systemctl is-enabled httpd.service 2>/dev/null | grep 'enabled'`. Expected result: Nothing should be returned"
req_05: "If httpd or nginx is installed and required for dependencies, check that nginx.service is not enabled using command: `systemctl is-enabled nginx.service 2>/dev/null | grep 'enabled'`. Expected result: Nothing should be returned"
req_06: "If httpd or nginx is installed and required for dependencies, check that httpd.socket is not active using command: `systemctl is-active httpd.socket 2>/dev/null | grep '^active'`. Expected result: Nothing should be returned"
req_07: "If httpd or nginx is installed and required for dependencies, check that httpd.service is not active using command: `systemctl is-active httpd.service 2>/dev/null | grep '^active'`. Expected result: Nothing should be returned"
req_08: "If httpd or nginx is installed and required for dependencies, check that nginx.service is not active using command: `systemctl is-active nginx.service 2>/dev/null | grep '^active'`. Expected result: Nothing should be returned"
req_09: "Summarize overall compliance: Ensure web server services (httpd, nginx, or other unauthorized web server packages) are not installed, or if installed for dependencies, are not enabled or active per local site policy."
req_10: "Store the final audit result in a variable named 'cis_result' using set_fact. Set cis_result to the overall compliance status (PASS/FAIL/SKIP/ERROR) derived from the last requirement's status variable."
