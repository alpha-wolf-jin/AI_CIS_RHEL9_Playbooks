req_01: "Check if cron is installed on the system using command: `dpkg -l cron 2>/dev/null || rpm -q cron 2>/dev/null`. Expected result: package is installed (non-empty output)."
req_02: "Check permissions on /etc/cron.d using command: `stat -Lc 'Access: (%a/%A) Uid: ( %u/ %U) Gid: ( %g/ %G)' /etc/cron.d/`. Expected result: Access: (700/drwx------) Uid: ( 0/ root) Gid: ( 0/ root)"
req_03: "Verify that Uid is 0/root using command: `stat -Lc '%u %U' /etc/cron.d/`. Expected result: 0 root"
req_04: "Verify that Gid is 0/root using command: `stat -Lc '%g %G' /etc/cron.d/`. Expected result: 0 root"
req_05: "Verify that Access does not grant permissions to group or other using command: `stat -Lc '%a' /etc/cron.d/`. Expected result: 700"
req_06: "Summarize overall compliance status: all checks passed."
target_path: "/etc/cron.d"
expected_full: "Access: (700/drwx------) Uid: ( 0/ root) Gid: ( 0/ root)"
expected_uid: "0 root"
expected_gid: "0 root"
expected_perms: "700"
