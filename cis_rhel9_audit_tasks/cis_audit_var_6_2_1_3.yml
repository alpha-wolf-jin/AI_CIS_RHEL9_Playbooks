req_01: "Check if systemd-journald is installed and active using command: `systemctl is-active systemd-journald`. Expected result: active"
req_02: "Check journald log rotation configuration in /etc/systemd/journald.conf and /etc/systemd/journald.conf.d/*.conf using command: `systemd-analyze cat-config systemd/journald.conf | grep -E '(SystemMaxUse|SystemKeepFree|RuntimeMaxUse|RuntimeKeepFree|MaxFileSec)'`. Expected result: Output shows configured values for SystemMaxUse, SystemKeepFree, RuntimeMaxUse, RuntimeKeepFree, and MaxFileSec according to site policy"
req_03: "Verify that the configured rotation parameters comply with site policy using command: `systemd-analyze cat-config systemd/journald.conf | grep -E '(SystemMaxUse|SystemKeepFree|RuntimeMaxUse|RuntimeKeepFree|MaxFileSec)'`. Expected result: All five parameters are set to values that meet or exceed site policy requirements"
req_04: "Summarize overall compliance status: All checks passed and journald log rotation is configured according to site policy. Expected result: Compliant"
req_05: "Store the final audit result in a variable named 'cis_result' using set_fact. Set cis_result to the overall compliance status (PASS/FAIL/SKIPPED/UNKNOWN) derived from the last requirement's status variable."
