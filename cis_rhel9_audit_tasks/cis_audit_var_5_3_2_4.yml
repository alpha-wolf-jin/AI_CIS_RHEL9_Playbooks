req_01: "Check if pam_pwhistory module is present in the system by verifying the PAM configuration files exist using command: `ls /etc/pam.d/password-auth /etc/pam.d/system-auth 2>/dev/null`. Expected result: Both files exist."
req_02: |
  Check that pam_pwhistory.so is enabled in password-auth using command: `grep -P -- '\\bpam_pwhistory\\.so\\b' /etc/pam.d/password-auth`. Expected result: Output similar to `/etc/pam.d/password-auth:password   required   pam_pwhistory.so use_authtok`.
req_03: |
  Check that pam_pwhistory.so is enabled in system-auth using command: `grep -P -- '\\bpam_pwhistory\\.so\\b' /etc/pam.d/system-auth`. Expected result: Output similar to `/etc/pam.d/system-auth:password   required   pam_pwhistory.so use_authtok`.
req_04: "Summarize overall compliance status: Both password-auth and system-auth files contain the pam_pwhistory.so module with the required configuration."
req_05: "Store the final audit result in a variable named 'cis_result' using set_fact. Set cis_result to the overall compliance status (PASS/FAIL/SKIP/UNKNOWN) derived from the last requirement's status variable."
