req_01: "Check if OpenSSH server is installed using command: `dpkg -l | grep openssh-server` or `rpm -q openssh-server`. Expected result: package is installed."
req_02: "Check if IgnoreRhosts is set to yes in the global sshd configuration using command: `sshd -T | grep ignorerhosts`. Expected result: `ignorerhosts yes`."
req_03: "If Match blocks are used, check IgnoreRhosts for a specific user (e.g., sshuser) using command: `sshd -T -C user=sshuser | grep ignorerhosts`. Expected result: `ignorerhosts yes`."
req_04: "Summarize overall compliance: all checks passed, IgnoreRhosts is enabled as required."
req_05: "Store the final audit result in a variable named 'cis_result' using set_fact. Set cis_result to the overall compliance status (PASS/FAIL/SKIPPED/UNKNOWN) derived from the last requirement's status variable."
target_user: "sshuser"
