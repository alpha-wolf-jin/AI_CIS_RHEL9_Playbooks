---
- name: Initialize meta data variables
  include_vars: cis_audit_var_6_1_2.yml

- name: "Initialize data variables"
  set_fact:
    data_01: "Not collected yet"
    status_01: "ERROR"
    details_01: "Not evaluated"
    data_02: "Not collected yet"
    status_02: "ERROR"
    details_02: "Not evaluated"
    data_03: "Not collected yet"
    status_03: "ERROR"
    details_03: "Not evaluated"
    data_04: "Not collected yet"
    status_04: "ERROR"
    details_04: "Not evaluated"
    data_05: "Not collected yet"
    status_05: "ERROR"
    details_05: "Not evaluated"
    data_06: "Not collected yet"
    status_06: "ERROR"
    details_06: "Not evaluated"
    data_07: "Not collected yet"
    status_07: "ERROR"
    details_07: "Not evaluated"
    task_01_name: "Not executed"
    task_01_cmd: "N/A"
    task_01_rc: -1

- name: "Req 01 - Check if AIDE is installed"
  shell: dpkg -l aide 2>/dev/null || rpm -q aide 2>/dev/null
  args:
    executable: /bin/bash
  register: result_01
  failed_when: false
  changed_when: false

- name: "Store requirement 01 details"
  set_fact:
    task_01_name: "Check AIDE installation"
    task_01_cmd: "dpkg -l aide 2>/dev/null || rpm -q aide 2>/dev/null"
    task_01_rc: "{{ result_01.rc | default(-1) }}"
    data_01: "{{ result_01.stdout | default('') | trim }}"
    status_01: "{{ ('PASS' if result_01.rc | default(-1) == 0 else 'FAIL') | trim }}"
    details_01: "{{ 'AIDE is installed' if result_01.rc | default(-1) == 0 else 'AIDE is not installed' }}"
    aide_installed: "{{ result_01.rc | default(-1) == 0 }}"

- name: "Req 02 - Check for AIDE cron job"
  shell: crontab -u root -l 2>/dev/null | grep -q '/usr/sbin/aide --check'
  args:
    executable: /bin/bash
  register: result_02
  when: aide_installed
  failed_when: false
  changed_when: false

- name: "Store requirement 02 details"
  set_fact:
    task_02_name: "Check AIDE cron job"
    task_02_cmd: "crontab -u root -l 2>/dev/null | grep -q '/usr/sbin/aide --check'"
    task_02_rc: "{{ result_02.rc | default(-1) }}"
    data_02: "{{ result_02.stdout | default('') | trim }}"
    status_02: "{{ ('SKIP' if not aide_installed else ('PASS' if result_02.rc | default(-1) == 0 else 'FAIL')) | trim }}"
    details_02: "{{ 'SKIP: AIDE not installed' if not aide_installed else ('Cron job found' if result_02.rc | default(-1) == 0 else 'No matching cron job for AIDE') }}"

- name: "Req 03 - Check if aidecheck.service is enabled"
  shell: systemctl is-enabled aidecheck.service
  args:
    executable: /bin/bash
  register: result_03
  when: aide_installed
  failed_when: false
  changed_when: false

- name: "Store requirement 03 details"
  set_fact:
    task_03_name: "Check aidecheck.service enabled"
    task_03_cmd: "systemctl is-enabled aidecheck.service"
    task_03_rc: "{{ result_03.rc | default(-1) }}"
    data_03: "{{ result_03.stdout | default('') | trim }}"
    status_03: "{{ ('SKIP' if not aide_installed else ('PASS' if result_03.rc | default(-1) == 0 else 'FAIL')) | trim }}"
    details_03: "{{ 'SKIP: AIDE not installed' if not aide_installed else ('service is enabled' if result_03.rc | default(-1) == 0 else 'service is not enabled') }}"

- name: "Req 04 - Check if aidecheck.timer is enabled"
  shell: systemctl is-enabled aidecheck.timer
  args:
    executable: /bin/bash
  register: result_04
  when: aide_installed
  failed_when: false
  changed_when: false

- name: "Store requirement 04 details"
  set_fact:
    task_04_name: "Check aidecheck.timer enabled"
    task_04_cmd: "systemctl is-enabled aidecheck.timer"
    task_04_rc: "{{ result_04.rc | default(-1) }}"
    data_04: "{{ result_04.stdout | default('') | trim }}"
    status_04: "{{ ('SKIP' if not aide_installed else ('PASS' if result_04.rc | default(-1) == 0 else 'FAIL')) | trim }}"
    details_04: "{{ 'SKIP: AIDE not installed' if not aide_installed else ('timer is enabled' if result_04.rc | default(-1) == 0 else 'timer is not enabled') }}"

- name: "Req 05 - Check if aidecheck.timer is running"
  shell: |
    systemctl status aidecheck.timer 2>/dev/null | grep -E 'Active: active \((running|waiting)\)'
  args:
    executable: /bin/bash
  register: result_05
  when: aide_installed
  failed_when: false
  changed_when: false

- name: "Store requirement 05 details"
  set_fact:
    task_05_name: "Check aidecheck.timer running"
    task_05_cmd: |
      systemctl status aidecheck.timer 2>/dev/null | grep -E 'Active: active \\((running|waiting)\\)'
    task_05_rc: "{{ result_05.rc | default(-1) }}"
    data_05: "{{ result_05.stdout | default('') | trim }}"
    status_05: "{{ ('SKIP' if not aide_installed else ('PASS' if result_05.rc | default(-1) == 0 else 'FAIL')) | trim }}"
    details_05: "{{ 'SKIP: AIDE not installed' if not aide_installed else ('timer is active (running)' if result_05.rc | default(-1) == 0 else 'timer is not active (running)') }}"

- name: "Req 06 - Summarize overall compliance"
  set_fact:
    task_06_name: "Summarize overall compliance"
    task_06_cmd: "N/A"
    task_06_rc: 0
    data_06: "{{ 'AIDE installed' if aide_installed else 'AIDE not installed' }}"
    status_06: "{{ ('SKIP' if not aide_installed else ('FAIL' if (status_02 | default('FAIL') | trim == 'FAIL') or (status_03 | default('FAIL') | trim == 'FAIL') or (status_04 | default('FAIL') | trim == 'FAIL') or (status_05 | default('FAIL') | trim == 'FAIL') else 'PASS')) | trim }}"

- name: "Req 06 - Set overall compliance details"
  set_fact:
    details_06: "{{ 'SKIP: AIDE is not installed' if not aide_installed else ('All checks passed' if status_06 | default('ERROR') | trim == 'PASS' else 'One or more checks failed') }}"

- name: "Req 07 - Store final audit result in cis_result"
  set_fact:
    task_07_name: "Store cis_result"
    task_07_cmd: "N/A"
    task_07_rc: 0
    cis_result: "{{ status_06 | default('ERROR') | trim }}"
    status_07: "{{ 'PASS' if status_06 | default('ERROR') | trim != 'ERROR' else 'ERROR' }}"
    details_07: "{{ 'cis_result set to ' + (status_06 | default('ERROR') | trim) }}"

- name: "Req 07 - Store report data for cis_result"
  set_fact:
    data_07: "{{ cis_result }}"

- name: "Generate audit report"
  debug:
    msg:
    - "AUDIT REPORT — CIS 6.1.2"
    - "Reference: CIS Benchmark checkpoint 6.1.2"
    - ""
    - "REQUIREMENT 01 - {{ req_01 }}:"
    - "  Task: {{ task_01_name | default('Not recorded') }}"
    - "  Command: {{ task_01_cmd | default('N/A') }}"
    - "  Exit code: {{ task_01_rc | default(-1) }}"
    - "  Data: {{ data_01 | default('') | trim }}"
    - "  Status: {{ status_01 | default('ERROR') | trim }}"
    - "  Details: {{ details_01 | default('') | trim }}"
    - ""
    - "REQUIREMENT 02 - {{ req_02 }}:"
    - "  Task: {{ task_02_name | default('Not recorded') }}"
    - "  Command: {{ task_02_cmd | default('N/A') }}"
    - "  Exit code: {{ task_02_rc | default(-1) }}"
    - "  Data: {{ data_02 | default('') | trim }}"
    - "  Status: {{ status_02 | default('ERROR') | trim }}"
    - "  Details: {{ details_02 | default('') | trim }}"
    - ""
    - "REQUIREMENT 03 - {{ req_03 }}:"
    - "  Task: {{ task_03_name | default('Not recorded') }}"
    - "  Command: {{ task_03_cmd | default('N/A') }}"
    - "  Exit code: {{ task_03_rc | default(-1) }}"
    - "  Data: {{ data_03 | default('') | trim }}"
    - "  Status: {{ status_03 | default('ERROR') | trim }}"
    - "  Details: {{ details_03 | default('') | trim }}"
    - ""
    - "REQUIREMENT 04 - {{ req_04 }}:"
    - "  Task: {{ task_04_name | default('Not recorded') }}"
    - "  Command: {{ task_04_cmd | default('N/A') }}"
    - "  Exit code: {{ task_04_rc | default(-1) }}"
    - "  Data: {{ data_04 | default('') | trim }}"
    - "  Status: {{ status_04 | default('ERROR') | trim }}"
    - "  Details: {{ details_04 | default('') | trim }}"
    - ""
    - "REQUIREMENT 05 - {{ req_05 }}:"
    - "  Task: {{ task_05_name | default('Not recorded') }}"
    - "  Command: {{ task_05_cmd | default('N/A') }}"
    - "  Exit code: {{ task_05_rc | default(-1) }}"
    - "  Data: {{ data_05 | default('') | trim }}"
    - "  Status: {{ status_05 | default('ERROR') | trim }}"
    - "  Details: {{ details_05 | default('') | trim }}"
    - ""
    - "REQUIREMENT 06 - {{ req_06 }}:"
    - "  Task: {{ task_06_name | default('Not recorded') }}"
    - "  Command: {{ task_06_cmd | default('N/A') }}"
    - "  Exit code: {{ task_06_rc | default(-1) }}"
    - "  Data: {{ data_06 | default('') | trim }}"
    - "  Status: {{ status_06 | default('ERROR') | trim }}"
    - "  Details: {{ details_06 | default('') | trim }}"
    - ""
    - "REQUIREMENT 07 - {{ req_07 }}:"
    - "  Task: {{ task_07_name | default('Not recorded') }}"
    - "  Command: {{ task_07_cmd | default('N/A') }}"
    - "  Exit code: {{ task_07_rc | default(-1) }}"
    - "  Data: {{ data_07 | default('') | trim }}"
    - "  Status: {{ status_07 | default('ERROR') | trim }}"
    - "  Details: {{ details_07 | default('') | trim }}"
    - ""
    - "========================================================"
    - "OVERALL COMPLIANCE:"
    - "  Result: {{ cis_result | default('ERROR') | trim }}"
    - "========================================================"
