---
- name: Initialize meta data variables
  include_vars: cis_audit_var_5_3_3_3_2.yml

- name: "Initialize data variables"
  set_fact:
    data_01: "Not collected yet"
    status_01: "ERROR"
    details_01: "Not evaluated"
    data_02: "Not collected yet"
    status_02: "ERROR"
    details_02: "Not evaluated"
    data_03: "Not collected yet"
    status_03: "ERROR"
    details_03: "Not evaluated"
    data_04: "Not collected yet"
    status_04: "ERROR"
    details_04: "Not evaluated"
    data_05: "Not collected yet"
    status_05: "ERROR"
    details_05: "Not evaluated"
    task_01_name: "Not executed"
    task_01_cmd: "N/A"
    task_01_rc: -1

# Requirement 01
- name: "Req 01 - Check if pwhistory package is installed"
  ansible.builtin.shell: dpkg -l | grep -iE 'pwhistory|libpam-pwhistory' || rpm -qa | grep -i pwhistory
  args:
    executable: /bin/bash
  register: result_01
  failed_when: false
  changed_when: false

- name: "Store requirement 01 details"
  set_fact:
    task_01_name: "Check if pwhistory package is installed"
    task_01_cmd: "dpkg -l | grep -iE 'pwhistory|libpam-pwhistory' || rpm -qa | grep -i pwhistory"
    task_01_rc: "{{ result_01.rc | default(-1) }}"
    data_01: "{{ result_01.stdout | default('') | trim }}"
    status_01: "{{ 'PASS' if result_01.rc | default(-1) == 0 else 'FAIL' | trim }}"
    details_01: "{{ 'Package installed' if result_01.rc | default(-1) == 0 else 'Package not installed' | trim }}"
    pwhistory_installed: "{{ result_01.rc | default(-1) == 0 }}"

# Requirement 02
- name: "Req 02 - Check if pwhistory configuration file exists"
  ansible.builtin.shell: test -f "{{ pwhistory_conf }}" && echo 'EXISTS'
  args:
    executable: /bin/bash
  register: result_02
  failed_when: false
  changed_when: false

- name: "Store requirement 02 details"
  set_fact:
    task_02_name: "Check if pwhistory configuration file exists"
    task_02_cmd: "test -f {{ pwhistory_conf }} && echo 'EXISTS'"
    task_02_rc: "{{ result_02.rc | default(-1) }}"
    data_02: "{{ result_02.stdout | default('') | trim }}"
    status_02: "{{ 'SKIP' if not (pwhistory_installed | default(false) | bool) else ('PASS' if result_02.rc | default(-1) == 0 and 'EXISTS' in result_02.stdout else 'FAIL') | trim }}"
    details_02: "{{ 'Skipped - pwhistory package not installed' if not (pwhistory_installed | default(false) | bool) else ('File exists' if result_02.rc | default(-1) == 0 else 'File not found') | trim }}"

# Requirement 03
- name: "Req 03 - Check if enforce_for_root option is enabled in pwhistory configuration"
  ansible.builtin.shell: grep -Pi -- '^\h*enforce_for_root\b' "{{ pwhistory_conf }}"
  args:
    executable: /bin/bash
  register: result_03
  failed_when: false
  changed_when: false

- name: "Store requirement 03 details"
  set_fact:
    task_03_name: "Check if enforce_for_root option is enabled in pwhistory configuration"
    task_03_cmd: |
      grep -Pi -- '^\\h*enforce_for_root\\b' {{ pwhistory_conf }}
    task_03_rc: "{{ result_03.rc | default(-1) }}"
    data_03: "{{ result_03.stdout | default('') | trim }}"
    status_03: "{{ 'SKIP' if not (pwhistory_installed | default(false) | bool) else ('PASS' if result_03.rc | default(-1) == 0 else 'FAIL') | trim }}"
    details_03: "{{ 'Skipped - pwhistory package not installed' if not (pwhistory_installed | default(false) | bool) else ('enforce_for_root is set' if result_03.rc | default(-1) == 0 else 'enforce_for_root not found') | trim }}"

# Requirement 04 – Summarize overall compliance
- name: "Req 04 - Summarize overall compliance"
  set_fact:
    status_04: >-
      {%- if not (pwhistory_installed | default(false) | bool) -%}
        SKIP
      {%- elif status_02 | default('ERROR') == 'PASS' and status_03 | default('ERROR') == 'PASS' -%}
        PASS
      {%- else -%}
        FAIL
      {%- endif -%}
    details_04: >-
      {%- if not (pwhistory_installed | default(false) | bool) -%}
        Pwhistory package not installed
      {%- elif status_02 | default('ERROR') == 'PASS' and status_03 | default('ERROR') == 'PASS' -%}
        All checks passed
      {%- else -%}
        One or more checks failed
      {%- endif -%}
    task_04_name: "Summarize overall compliance"
    task_04_cmd: "N/A"
    task_04_rc: -1
    data_04: "N/A"

# Requirement 05 – Store cis_result
- name: "Req 05 - Store final audit result in cis_result"
  set_fact:
    cis_result: "{{ status_04 | default('ERROR') | trim }}"
    task_05_name: "Store final audit result"
    task_05_cmd: "N/A"
    task_05_rc: -1
    data_05: "{{ status_04 | default('ERROR') | trim }}"
    status_05: "{{ status_04 | default('ERROR') | trim }}"
    details_05: "{{ 'cis_result stored as ' + (status_04 | default('ERROR') | trim) }}"

# Final report
- name: "Generate audit report"
  debug:
    msg:
    - "AUDIT REPORT — CIS 5.3.3.3.2"
    - "Reference: CIS Benchmark checkpoint 5.3.3.3.2"
    - ""
    - "REQUIREMENT 01 - {{ req_01 }}:"
    - "  Task: {{ task_01_name | default('Not recorded') }}"
    - "  Command: {{ task_01_cmd | default('N/A') }}"
    - "  Exit code: {{ task_01_rc | default(-1) }}"
    - "  Data: {{ data_01 | default('') | trim }}"
    - "  Status: {{ status_01 | default('ERROR') | trim }}"
    - "  Details: {{ details_01 | default('') | trim }}"
    - ""
    - "REQUIREMENT 02 - {{ req_02 }}:"
    - "  Task: {{ task_02_name | default('Not recorded') }}"
    - "  Command: {{ task_02_cmd | default('N/A') }}"
    - "  Exit code: {{ task_02_rc | default(-1) }}"
    - "  Data: {{ data_02 | default('') | trim }}"
    - "  Status: {{ status_02 | default('ERROR') | trim }}"
    - "  Details: {{ details_02 | default('') | trim }}"
    - ""
    - "REQUIREMENT 03 - {{ req_03 }}:"
    - "  Task: {{ task_03_name | default('Not recorded') }}"
    - "  Command: {{ task_03_cmd | default('N/A') }}"
    - "  Exit code: {{ task_03_rc | default(-1) }}"
    - "  Data: {{ data_03 | default('') | trim }}"
    - "  Status: {{ status_03 | default('ERROR') | trim }}"
    - "  Details: {{ details_03 | default('') | trim }}"
    - ""
    - "REQUIREMENT 04 - {{ req_04 }}:"
    - "  Task: {{ task_04_name | default('Not recorded') }}"
    - "  Command: {{ task_04_cmd | default('N/A') }}"
    - "  Exit code: {{ task_04_rc | default(-1) }}"
    - "  Data: {{ data_04 | default('') | trim }}"
    - "  Status: {{ status_04 | default('ERROR') | trim }}"
    - "  Details: {{ details_04 | default('') | trim }}"
    - ""
    - "REQUIREMENT 05 - {{ req_05 }}:"
    - "  Task: {{ task_05_name | default('Not recorded') }}"
    - "  Command: {{ task_05_cmd | default('N/A') }}"
    - "  Exit code: {{ task_05_rc | default(-1) }}"
    - "  Data: {{ data_05 | default('') | trim }}"
    - "  Status: {{ status_05 | default('ERROR') | trim }}"
    - "  Details: {{ details_05 | default('') | trim }}"
    - ""
    - "========================================================"
    - "OVERALL COMPLIANCE:"
    - "  Result: {{ cis_result | default('ERROR') | trim }}"
    - "  Details: {{ details_04 | default('Not evaluated') | trim }}"
    - "========================================================"
