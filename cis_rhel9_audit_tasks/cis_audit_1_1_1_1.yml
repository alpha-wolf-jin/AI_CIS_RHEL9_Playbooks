---
- name: Initialize meta data variables
  include_vars: cis_audit_var_1_1_1_1.yml

- name: "Req 01 - Execute audit script via heredoc"
  ansible.builtin.shell: |
    /bin/bash <<'EOF'
    {{ audit_script_content }}
    EOF
  args:
    executable: /bin/bash
  register: result_01
  failed_when: false
  changed_when: false

- name: "Req 01 - Store execution details"
  set_fact:
    task_01_name: "Req 01 - Execute audit script"
    task_01_cmd: "/bin/bash heredoc with audit script"
    task_01_rc: "{{ result_01.rc | default(-1) }}"
    data_01: "{{ result_01.stdout | default('') | trim }}"
    status_01: "{{ ('PASS' if result_01.rc | default(-1) == 0 else 'FAIL') | trim }}"
    details_01: "{{ 'Script executed successfully' if result_01.rc | default(-1) == 0 else 'Script execution failed' | trim }}"

# Requirement 02: Summarise compliance status from script output
- name: "Req 02 - Determine compliance status"
  set_fact:
    task_02_name: "Req 02 - Determine compliance status"
    task_02_cmd: "Script output analysis"
    task_02_rc: "0"
    data_02: "{{ result_01.stdout | default('') | trim }}"
    status_02: >-
      {%- set out = result_01.stdout | default('') -%}
      {%- if '** PASS **' in out %}PASS{% elif '** FAIL **' in out %}FAIL{% else %}ERROR{% endif -%}

- name: "Req 02 - Set compliance details"
  set_fact:
    details_02: >-
      {%- if status_02 == 'PASS' -%}Cramfs kernel module is not available or properly disabled
      {%- elif status_02 == 'FAIL' -%}Cramfs kernel module is available and not properly disabled
      {%- else -%}Unable to determine compliance from script output
      {%- endif -%}

# Requirement 03: Store final audit result in cis_result (split to avoid self-reference)
- name: "Req 03 - Store final audit result"
  set_fact:
    cis_result: "{{ status_02 | default('ERROR') | trim }}"
    task_03_name: "Req 03 - Store final audit result"
    task_03_cmd: "set_fact cis_result from status_02"
    task_03_rc: "0"

- name: "Req 03 - Set status and data for requirement 03"
  set_fact:
    status_03: "{{ cis_result | default('ERROR') | trim }}"
    data_03: "{{ cis_result | default('ERROR') | trim }}"
    details_03: "Overall audit result captured"

# Requirement 04: Generate audit report
- name: "Generate audit report"
  debug:
    msg:
    - "AUDIT REPORT — CIS 1.1.1.1"
    - "Reference: CIS Benchmark checkpoint 1.1.1.1"
    - ""
    - "REQUIREMENT 01 - {{ req_01 }}:"
    - "  Task: {{ task_01_name | default('Not recorded') }}"
    - "  Command: {{ task_01_cmd | default('N/A') }}"
    - "  Exit code: {{ task_01_rc | default(-1) }}"
    - "  Data: {{ data_01 | default('') | trim }}"
    - "  Status: {{ status_01 | default('ERROR') | trim }}"
    - "  Details: {{ details_01 | default('') | trim }}"
    - ""
    - "REQUIREMENT 02 - {{ req_02 }}:"
    - "  Task: {{ task_02_name | default('Not recorded') }}"
    - "  Command: {{ task_02_cmd | default('N/A') }}"
    - "  Exit code: {{ task_02_rc | default(-1) }}"
    - "  Data: {{ data_02 | default('') | trim }}"
    - "  Status: {{ status_02 | default('ERROR') | trim }}"
    - "  Details: {{ details_02 | default('') | trim }}"
    - ""
    - "REQUIREMENT 03 - {{ req_03 }}:"
    - "  Task: {{ task_03_name | default('Not recorded') }}"
    - "  Command: {{ task_03_cmd | default('N/A') }}"
    - "  Exit code: {{ task_03_rc | default(-1) }}"
    - "  Data: {{ data_03 | default('') | trim }}"
    - "  Status: {{ status_03 | default('ERROR') | trim }}"
    - "  Details: {{ details_03 | default('') | trim }}"
    - ""
    - "========================================================"
    - "OVERALL COMPLIANCE:"
    - "  Result: {{ cis_result | default('ERROR') | trim }}"
    - "  Details: {{ details_02 | default('Not evaluated') | trim }}"
    - "========================================================"
