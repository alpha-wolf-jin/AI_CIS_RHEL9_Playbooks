req_01: |
  Check if pam_unix.so is configured with a strong password hashing algorithm (sha512 or yescrypt) using command: `grep -P -- '^\\h*password\\h+([^#\\n\\r]+)\\h+pam_unix\\.so\\h+([^#\\n\\r]+\\h+)?(sha512|yescrypt)\\b' /etc/pam.d/{password,system}-auth`. Expected result: Lines similar to '/etc/pam.d/password-auth:password   sufficient   pam_unix.so sha512 shadow use_authtok' and '/etc/pam.d/system-auth:password   sufficient   pam_unix.so sha512 shadow use_authtok' with either 'sha512' or 'yescrypt' present.
req_02: "Check if the pam_unix.so module is present in the system's PAM configuration using command: `ls /etc/pam.d/password-auth /etc/pam.d/system-auth 2>/dev/null`. Expected result: Both files exist."
req_03: "Summarize overall compliance status: If both files contain a line with 'sha512' or 'yescrypt' for pam_unix.so, the system is compliant; otherwise, it is non-compliant."
req_04: "Store the final audit result in a variable named 'cis_result' using set_fact. Set cis_result to the overall compliance status (PASS/FAIL/SKIPPED/UNKNOWN) derived from the last requirement's status variable."
