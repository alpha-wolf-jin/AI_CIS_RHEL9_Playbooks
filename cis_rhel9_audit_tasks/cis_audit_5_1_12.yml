    details_06: "{{ 'HostbasedAuthentication is disabled for laddr=10.0.0.1' if sshd_installed and result_06.rc | default(-1) | int == 0 and (result_06.stdout | default('') | trim) == 'hostbasedauthentication no' else 'HostbasedAuthentication is NOT disabled for laddr=10.0.0.1' if sshd_installed else 'OpenSSH server not installed, check not applicable' }}"

- name: "Req 07 - Check local port HostbasedAuthentication setting"
  ansible.builtin.shell: "sshd -T -C lport=22 | grep hostbasedauthentication"
