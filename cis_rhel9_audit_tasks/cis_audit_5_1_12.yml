    details_04: "{{ 'HostbasedAuthentication is disabled for addr=192.168.1.100' if sshd_installed and result_04.rc | default(-1) | int == 0 and (result_04.stdout | default('') | trim) == 'hostbasedauthentication no' else 'HostbasedAuthentication is NOT disabled for addr=192.168.1.100' if sshd_installed else 'OpenSSH server not installed, check not applicable' }}"

- name: "Req 05 - Check host-specific HostbasedAuthentication setting"
  ansible.builtin.shell: "sshd -T -C host=client.example.com | grep hostbasedauthentication"
  args:
    executable: /bin/bash
  register: result_05
  failed_when: false
  changed_when: false
  when: sshd_installed

