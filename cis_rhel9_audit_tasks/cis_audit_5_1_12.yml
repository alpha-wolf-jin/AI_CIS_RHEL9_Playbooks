    details_03: "{{ 'HostbasedAuthentication is disabled for user sshuser' if sshd_installed and result_03.rc | default(-1) | int == 0 and (result_03.stdout | default('') | trim) == 'hostbasedauthentication no' else 'HostbasedAuthentication is NOT disabled for user sshuser' if sshd_installed else 'OpenSSH server not installed, check not applicable' }}"

