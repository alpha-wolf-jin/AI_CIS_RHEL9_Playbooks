- name: "Req 09 - Evaluate overall compliance"
  ansible.builtin.set_fact:
    status_09: "{{ 'NOT_APPLICABLE' if not sshd_installed else 'PASS' if status_02 == 'PASS' and status_03 == 'PASS' and status_04 == 'PASS' and status_05 == 'PASS' and status_06 == 'PASS' and status_07 == 'PASS' and status_08 == 'PASS' else 'FAIL' | trim }}"
    details_09: >-
      {% if not sshd_installed %}
        OpenSSH server not installed, CIS 5.1.12 not applicable.
      {% elif status_02 == 'PASS' and status_03 == 'PASS' and status_04 == 'PASS' and status_05 == 'PASS' and status_06 == 'PASS' and status_07 == 'PASS' and status_08 == 'PASS' %}
        Compliant: HostbasedAuthentication is disabled in all tested contexts
      {% else %}
        Non-compliant: HostbasedAuthentication is enabled or misconfigured in at least one context
      {% endif %}
    task_09_name: "Evaluate overall compliance"
    task_09_cmd: "N/A"
    task_09_rc: 0
    data_09: "N/A"

- name: "Req 10 - Store final cis_result"
  ansible.builtin.set_fact:
    cis_result: "{{ status_09 }}"
    status_10: "PASS"
    details_10: "cis_result fact set to {{ status_09 }}"
    task_10_name: "Store final cis_result"
    task_10_cmd: "set_fact"
    task_10_rc: 0
    data_10: "cis_result = {{ status_09 }}"

