    details_09: "Not evaluated"
    data_10: "Not collected yet"
    status_10: "UNKNOWN"
    details_10: "Not evaluated"
    task_01_name: "Not executed"
    task_01_cmd: "N/A"
    task_01_rc: -1
    sshd_installed: false

- name: "Req 01 - Check if OpenSSH server package is installed"
  ansible.builtin.shell: "dpkg -l | grep openssh-server || rpm -q openssh-server"
  args:
    executable: /bin/bash
  register: result_01
  failed_when: false
  changed_when: false

- name: "Store requirement 01 details"
  ansible.builtin.set_fact:
    sshd_installed: "{{ result_01.rc == 0 }}"
    task_01_name: "Check if OpenSSH server is installed"
    task_01_cmd: "dpkg -l | grep openssh-server || rpm -q openssh-server"
    task_01_rc: "{{ result_01.rc | int }}"
    data_01: "{{ result_01.stdout | default('') | trim }}"
    status_01: "{{ 'PASS' if result_01.rc == 0 else 'FAIL' }}"
    details_01: "{{ 'OpenSSH server is installed' if result_01.rc == 0 else 'OpenSSH server is NOT installed' }}"

- name: "Req 02 - Check global HostbasedAuthentication setting"
  ansible.builtin.shell: "sshd -T | grep hostbasedauthentication"
  args:
    executable: /bin/bash
  register: result_02
  failed_when: false
  changed_when: false
  when: sshd_installed

- name: "Store requirement 02 details"
  ansible.builtin.set_fact:
    task_02_name: "Check global HostbasedAuthentication"
    task_02_cmd: "sshd -T | grep hostbasedauthentication"
    task_02_rc: "{{ result_02.rc | default(-1) | int }}"
    data_02: "{{ result_02.stdout | default('') | trim }}"
    status_02: "{{ 'PASS' if sshd_installed and result_02.rc | default(-1) | int == 0 and (result_02.stdout | default('') | trim) == 'hostbasedauthentication no' else 'FAIL' if sshd_installed else 'NOT_APPLICABLE' }}"
    details_02: "{{ 'HostbasedAuthentication is globally disabled' if sshd_installed and result_02.rc | default(-1) | int == 0 and (result_02.stdout | default('') | trim) == 'hostbasedauthentication no' else 'HostbasedAuthentication is NOT globally disabled' if sshd_installed else 'OpenSSH server not installed, check not applicable' }}"

- name: "Req 03 - Check user-specific HostbasedAuthentication setting"
  ansible.builtin.shell: "sshd -T -C user=sshuser | grep hostbasedauthentication"
  args:
    executable: /bin/bash
  register: result_03
  failed_when: false
  changed_when: false
  when: sshd_installed

- name: "Store requirement 03 details"
