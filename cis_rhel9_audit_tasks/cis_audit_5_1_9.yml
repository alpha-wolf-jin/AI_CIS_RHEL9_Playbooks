---
- name: Initialize meta data variables
  include_vars: cis_audit_var_5_1_9.yml

- name: "Initialize data variables"
  ansible.builtin.set_fact:
    task_01_name: "Not executed"
    task_01_cmd: "N/A"
    task_01_rc: -1
    data_01: ""
    status_01: "ERROR"
    details_01: ""
    task_02_name: "Not executed"
    task_02_cmd: "N/A"
    task_02_rc: -1
    data_02: ""
    status_02: "ERROR"
    details_02: ""
    task_03_name: "Not executed"
    task_03_cmd: "N/A"
    task_03_rc: -1
    data_03: ""
    status_03: "ERROR"
    details_03: ""
    task_04_name: "Not executed"
    task_04_cmd: "N/A"
    task_04_rc: -1
    data_04: ""
    status_04: "ERROR"
    details_04: ""
    task_05_name: "Not executed"
    task_05_cmd: "N/A"
    task_05_rc: -1
    data_05: ""
    status_05: "ERROR"
    details_05: ""
    task_06_name: "Not executed"
    task_06_cmd: "N/A"
    task_06_rc: -1
    data_06: ""
    status_06: "ERROR"
    details_06: ""
    task_07_name: "Not executed"
    task_07_cmd: "N/A"
    task_07_rc: -1
    data_07: ""
    status_07: "ERROR"
    details_07: ""

# Requirement 1: Check if OpenSSH server is installed
- name: "Req 01 - Check if OpenSSH server package is installed"
  ansible.builtin.shell: dpkg -l openssh-server 2>/dev/null || rpm -q openssh-server 2>/dev/null
  args:
    executable: /bin/bash
  register: result_01
  failed_when: false
  changed_when: false

- name: "Store requirement 01 details"
  ansible.builtin.set_fact:
    task_01_name: "Check if OpenSSH server package is installed"
    task_01_cmd: "dpkg -l openssh-server 2>/dev/null || rpm -q openssh-server 2>/dev/null"
    task_01_rc: "{{ result_01.rc | default(-1) }}"
    data_01: "{{ result_01.stdout | default('') | trim }}"
    sshd_installed: "{{ result_01.rc | default(-1) == 0 }}"
    status_01: "{{ 'SKIP' if result_01.rc | default(-1) != 0 else 'PASS' }}"
    details_01: "{{ 'OpenSSH server is installed' if result_01.rc | default(-1) == 0 else 'OpenSSH server not installed - audit not applicable' }}"

# Requirement 2: Check global ClientAliveInterval > 0
- name: "Req 02 - Check global ClientAliveInterval"
  ansible.builtin.shell: sshd -T | grep -Pi -- 'clientaliveinterval' | awk '{print $2}'
  args:
    executable: /bin/bash
  register: result_02
  when: sshd_installed | bool
  failed_when: false
  changed_when: false

- name: "Store requirement 02 details"
  ansible.builtin.set_fact:
    task_02_name: "Check global ClientAliveInterval"
    task_02_cmd: "sshd -T | grep -Pi -- 'clientaliveinterval' | awk '{print $2}'"
    task_02_rc: "{{ result_02.rc | default(-1) if result_02 is defined else -1 }}"
    data_02: "{{ result_02.stdout | default('') | trim if result_02 is defined else '' }}"
    status_02: >-
      {%- if not sshd_installed %}SKIP
      {%- elif result_02.stdout | default('0') | trim | int > 0 %}PASS
      {%- else %}FAIL
      {%- endif %}
    details_02: >-
      {%- if not sshd_installed %}sshd not installed - audit not applicable
      {%- elif result_02.stdout | default('0') | trim | int > 0 %}ClientAliveInterval is greater than zero ({{ result_02.stdout | trim }})
      {%- else %}ClientAliveInterval is not greater than zero ({{ result_02.stdout | default('') | trim }})
      {%- endif %}
  when: true

# Requirement 3: Check global ClientAliveCountMax > 0
- name: "Req 03 - Check global ClientAliveCountMax"
  ansible.builtin.shell: sshd -T | grep -Pi -- 'clientalivecountmax' | awk '{print $2}'
  args:
    executable: /bin/bash
  register: result_03
  when: sshd_installed | bool
  failed_when: false
  changed_when: false

- name: "Store requirement 03 details"
  ansible.builtin.set_fact:
    task_03_name: "Check global ClientAliveCountMax"
    task_03_cmd: "sshd -T | grep -Pi -- 'clientalivecountmax' | awk '{print $2}'"
    task_03_rc: "{{ result_03.rc | default(-1) if result_03 is defined else -1 }}"
    data_03: "{{ result_03.stdout | default('') | trim if result_03 is defined else '' }}"
    status_03: >-
      {%- if not sshd_installed %}SKIP
      {%- elif result_03.stdout | default('0') | trim | int > 0 %}PASS
      {%- else %}FAIL
      {%- endif %}
    details_03: >-
      {%- if not sshd_installed %}sshd not installed - audit not applicable
      {%- elif result_03.stdout | default('0') | trim | int > 0 %}ClientAliveCountMax is greater than zero ({{ result_03.stdout | trim }})
      {%- else %}ClientAliveCountMax is not greater than zero ({{ result_03.stdout | default('') | trim }})
      {%- endif %}
  when: true

# Check if Match block for sshuser exists (prerequisite for req 04, 05)
- name: "Check if Match block for sshuser exists"
  ansible.builtin.shell: grep -qi '^Match.*user.*sshuser' /etc/ssh/sshd_config
  args:
    executable: /bin/bash
  register: match_result
  when: sshd_installed | bool
  failed_when: false
  changed_when: false

- name: "Set match_block_exists fact"
  ansible.builtin.set_fact:
    match_block_exists: "{{ match_result.rc | default(1) == 0 if sshd_installed else false }}"

# Requirement 4: Match block ClientAliveInterval for sshuser
- name: "Req 04 - Check Match block ClientAliveInterval for sshuser"
  ansible.builtin.shell: sshd -T -C user=sshuser | grep -Pi -- 'clientaliveinterval' | awk '{print $2}'
  args:
    executable: /bin/bash
  register: result_04
  when:
  - sshd_installed | bool
  - match_block_exists | bool
  failed_when: false
  changed_when: false

- name: "Store requirement 04 details"
  ansible.builtin.set_fact:
    task_04_name: "Check Match block ClientAliveInterval for sshuser"
    task_04_cmd: "sshd -T -C user=sshuser | grep -Pi -- 'clientaliveinterval' | awk '{print $2}'"
    task_04_rc: "{{ result_04.rc | default(-1) if result_04 is defined else -1 }}"
    data_04: "{{ result_04.stdout | default('') | trim if result_04 is defined else '' }}"
    status_04: >-
      {%- if not sshd_installed %}SKIP
      {%- elif not match_block_exists %}SKIP
      {%- elif result_04.stdout | default('0') | trim | int > 0 %}PASS
      {%- else %}FAIL
      {%- endif %}
    details_04: >-
      {%- if not sshd_installed %}sshd not installed - audit not applicable
      {%- elif not match_block_exists %}No Match block for sshuser
      {%- elif result_04.stdout | default('0') | trim | int > 0 %}Match block ClientAliveInterval OK ({{ result_04.stdout | trim }})
      {%- else %}Match block ClientAliveInterval missing or zero ({{ result_04.stdout | default('') | trim }})
      {%- endif %}
  when: true

# Requirement 5: Match block ClientAliveCountMax for sshuser
- name: "Req 05 - Check Match block ClientAliveCountMax for sshuser"
  ansible.builtin.shell: sshd -T -C user=sshuser | grep -Pi -- 'clientalivecountmax' | awk '{print $2}'
  args:
    executable: /bin/bash
  register: result_05
  when:
  - sshd_installed | bool
  - match_block_exists | bool
  failed_when: false
  changed_when: false

- name: "Store requirement 05 details"
  ansible.builtin.set_fact:
    task_05_name: "Check Match block ClientAliveCountMax for sshuser"
    task_05_cmd: "sshd -T -C user=sshuser | grep -Pi -- 'clientalivecountmax' | awk '{print $2}'"
    task_05_rc: "{{ result_05.rc | default(-1) if result_05 is defined else -1 }}"
    data_05: "{{ result_05.stdout | default('') | trim if result_05 is defined else '' }}"
    status_05: >-
      {%- if not sshd_installed %}SKIP
      {%- elif not match_block_exists %}SKIP
      {%- elif result_05.stdout | default('0') | trim | int > 0 %}PASS
      {%- else %}FAIL
      {%- endif %}
    details_05: >-
      {%- if not sshd_installed %}sshd not installed - audit not applicable
      {%- elif not match_block_exists %}No Match block for sshuser
      {%- elif result_05.stdout | default('0') | trim | int > 0 %}Match block ClientAliveCountMax OK ({{ result_05.stdout | trim }})
      {%- else %}Match block ClientAliveCountMax missing or zero ({{ result_05.stdout | default('') | trim }})
      {%- endif %}
  when: true

# Requirement 6: Summarize overall compliance
- name: "Req 06 - Summarize overall compliance"
  ansible.builtin.set_fact:
    task_06_name: "Summarize overall compliance"
    task_06_cmd: "N/A"
    task_06_rc: 0
    data_06: "Overall evaluation"
    status_06: >-
      {%- if status_01 == 'SKIP' %}SKIP
      {%- elif status_02 == 'FAIL' or status_03 == 'FAIL' or status_04 == 'FAIL' or status_05 == 'FAIL' %}FAIL
      {%- else %}PASS
      {%- endif %}
    details_06: >-
      {%- if status_01 == 'SKIP' %}OpenSSH not installed - audit not applicable
      {%- elif status_02 == 'FAIL' or status_03 == 'FAIL' or status_04 == 'FAIL' or status_05 == 'FAIL' %}At least one check failed
      {%- else %}All checks passed
      {%- endif %}
  when: true

# Requirement 7: Store final audit result in cis_result
- name: "Req 07 - Store final audit result"
  ansible.builtin.set_fact:
    task_07_name: "Store cis_result"
    task_07_cmd: "N/A"
    task_07_rc: 0
    data_07: "{{ status_06 | default('ERROR') | trim }}"
    status_07: "{{ status_06 | default('ERROR') | trim }}"
    details_07: "{{ details_06 | default('') | trim }}"
    cis_result: "{{ status_06 | default('ERROR') | trim }}"
  when: true

