---
- name: Initialize meta data variables
  include_vars: cis_audit_var_7_1_8.yml

- name: "Initialize data variables"
  set_fact:
    data_01: "Not collected yet"
    status_01: "ERROR"
    details_01: "Not evaluated"
    data_02: "Not collected yet"
    status_02: "ERROR"
    details_02: "Not evaluated"
    data_03: "Not collected yet"
    status_03: "ERROR"
    details_03: "Not evaluated"
    data_04: "Not collected yet"
    status_04: "ERROR"
    details_04: "Not evaluated"
    task_01_name: "Not executed"
    task_01_cmd: "N/A"
    task_01_rc: -1
    task_02_name: "Not executed"
    task_02_cmd: "N/A"
    task_02_rc: -1
    task_03_name: "Not executed"
    task_03_cmd: "N/A"
    task_03_rc: -1
    task_04_name: "Not executed"
    task_04_cmd: "N/A"
    task_04_rc: -1

- name: "Req 01 - Check if /etc/gshadow- file exists"
  shell: test -f /etc/gshadow-
  args:
    executable: /bin/bash
  register: result_01
  failed_when: false

- name: "Store requirement 01 details"
  set_fact:
    task_01_name: "Check if /etc/gshadow- file exists"
    task_01_cmd: "test -f /etc/gshadow-"
    task_01_rc: "{{ result_01.rc | default(-1) }}"
    data_01: "{{ 'File exists' if result_01.rc | default(-1) == 0 else 'File does not exist' }}"
    status_01: "{{ 'PASS' if result_01.rc | default(-1) == 0 else 'FAIL' }}"
    details_01: "{{ 'File exists as expected' if result_01.rc | default(-1) == 0 else 'File does not exist' }}"

- name: "Req 02 - Check permissions on /etc/gshadow-"
  shell: |
    stat -Lc 'Access: (%#a/%A)  Uid: ( %u/ %U) Gid: ( %g/ %G)' /etc/gshadow-
  args:
    executable: /bin/bash
  register: result_02
  failed_when: false

- name: "Store requirement 02 details"
  set_fact:
    task_02_name: "Check permissions on /etc/gshadow-"
    task_02_cmd: "stat -Lc 'Access: (%#a/%A)  Uid: ( %u/ %U) Gid: ( %g/ %G)' /etc/gshadow-"
    task_02_rc: "{{ result_02.rc | default(-1) }}"
    data_02: "{{ result_02.stdout | default('') | trim }}"
    status_02: "{{ 'PASS' if (result_02.stdout | default('') | trim) == 'Access: (0/----------)  Uid: ( 0/ root) Gid: ( 0/ root)' else 'FAIL' }}"
    details_02: "{{ 'Permissions match expected' if (result_02.stdout | default('') | trim) == 'Access: (0/----------)  Uid: ( 0/ root) Gid: ( 0/ root)' else 'Permissions do not match expected' }}"

- name: "Req 03 - Check overall compliance"
  set_fact:
    task_03_name: "Evaluate overall compliance"
    task_03_cmd: "N/A (logic evaluation)"
    task_03_rc: 0
    data_03: "Overall compliance status"
    status_03: >-
      {{ 'SKIP' if status_01 == 'FAIL' else ('FAIL' if status_02 == 'FAIL' else 'PASS') }}
    details_03: >-
      {{ 'File does not exist, audit skipped' if status_01 == 'FAIL' else ('Permissions/Uid/Gid do not match expected' if status_02 == 'FAIL' else 'All checks passed') }}

- name: "Req 04 - Store final audit result"
  set_fact:
    cis_result: "{{ status_03 }}"

- name: "Store requirement 04 details"
  set_fact:
    task_04_name: "Store final audit result in cis_result"
    task_04_cmd: "set_fact"
    task_04_rc: 0
    data_04: "{{ cis_result }}"
    status_04: "PASS"
    details_04: "cis_result set to {{ cis_result }}"

- name: "Generate audit report"
  debug:
    msg:
    - "AUDIT REPORT — CIS 7.1.8"
    - "Reference: CIS Benchmark checkpoint 7.1.8"
    - ""
    - "REQUIREMENT 01 - {{ req_01 }}:"
    - "  Task: {{ task_01_name | default('Not recorded') }}"
    - "  Command: {{ task_01_cmd | default('N/A') }}"
    - "  Exit code: {{ task_01_rc | default(-1) }}"
    - "  Data: {{ data_01 | default('') | trim }}"
    - "  Status: {{ status_01 | default('ERROR') | trim }}"
    - "  Details: {{ details_01 | default('') | trim }}"
    - ""
    - "REQUIREMENT 02 - {{ req_02 }}:"
    - "  Task: {{ task_02_name | default('Not recorded') }}"
    - "  Command: {{ task_02_cmd | default('N/A') }}"
    - "  Exit code: {{ task_02_rc | default(-1) }}"
    - "  Data: {{ data_02 | default('') | trim }}"
    - "  Status: {{ status_02 | default('ERROR') | trim }}"
    - "  Details: {{ details_02 | default('') | trim }}"
    - ""
    - "REQUIREMENT 03 - {{ req_03 }}:"
    - "  Task: {{ task_03_name | default('Not recorded') }}"
    - "  Command: {{ task_03_cmd | default('N/A') }}"
    - "  Exit code: {{ task_03_rc | default(-1) }}"
    - "  Data: {{ data_03 | default('') | trim }}"
    - "  Status: {{ status_03 | default('ERROR') | trim }}"
    - "  Details: {{ details_03 | default('') | trim }}"
    - ""
    - "REQUIREMENT 04 - {{ req_04 }}:"
    - "  Task: {{ task_04_name | default('Not recorded') }}"
    - "  Command: {{ task_04_cmd | default('N/A') }}"
    - "  Exit code: {{ task_04_rc | default(-1) }}"
    - "  Data: {{ data_04 | default('') | trim }}"
    - "  Status: {{ status_04 | default('ERROR') | trim }}"
    - "  Details: {{ details_04 | default('') | trim }}"
    - ""
    - "========================================================"
    - "OVERALL COMPLIANCE:"
    - "  Result: {{ cis_result | default('ERROR') | trim }}"
    - "========================================================"
