req_01: "Check if a separate partition exists for /var/tmp using command: `findmnt -kn /var/tmp`. Expected result: output should show a mount point (e.g., /dev/sdX on /var/tmp) indicating a separate partition exists."
req_02: "Check if the nosuid option is set on /var/tmp partition using command: `findmnt -kn /var/tmp | grep -v nosuid`. Expected result: no output should be returned (empty)."
req_03: "Summarize overall compliance status: if both checks pass, the requirement is compliant; otherwise, it is non-compliant."
