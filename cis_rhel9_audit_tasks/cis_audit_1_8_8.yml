---
- name: Initialize meta data variables
  include_vars: cis_audit_var_1_8_8.yml

- name: "Snapshot - Check if audit script already exists"
  ansible.builtin.stat:
    path: "{{ audit_script }}"
  register: _snapshot_script_stat
  tags: [snapshot]
- name: "Copy audit script to remote"
  ansible.builtin.copy:
    dest: "{{ audit_script }}"
    mode: '0700'
    content: "{{ audit_script_content }}"
  changed_when: false

- name: "Req 1 - Execute audit script for GDM autorun-never"
  ansible.builtin.shell: "/bin/bash {{ audit_script }}"
  args:
    executable: /bin/bash
  register: result_01
  failed_when: false
  changed_when: false

- name: "Remove temporary audit script"
  ansible.builtin.file:
    path: "{{ audit_script }}"
    state: absent
  changed_when: false
  when: not (_snapshot_script_stat.stat.exists | default(false))

- name: "Store requirement 01 details"
  set_fact:
    task_01_name: "Execute CIS audit script for GDM autorun-never"
    task_01_cmd: "/bin/bash {{ audit_script }}"
    task_01_rc: "{{ result_01.rc | default(-1) }}"
    data_01: "{{ result_01.stdout | default('') | trim }}"
    status_01: >-
      {%- set out = result_01.stdout | default('') | trim -%}
      {%- if 'GNOME Desktop Manager package is not installed' in out -%}
        SKIP
      {%- elif result_01.rc | default(-1) == 0 -%}
        PASS
      {%- else -%}
        FAIL
      {%- endif -%}
    details_01: >-
      {%- set out = result_01.stdout | default('') | trim -%}
      {%- if 'GNOME Desktop Manager package is not installed' in out -%}
        GDM not installed - recommendation is not applicable
      {%- elif result_01.rc | default(-1) == 0 -%}
        autorun-never is set to true
      {%- else -%}
        autorun-never is not set correctly or dconf configuration is incomplete
      {%- endif -%}

- name: "Store final audit result in cis_result"
  set_fact:
    cis_result: "{{ status_01 | default('ERROR') | trim }}"

- name: "Generate audit report"
  debug:
    msg:
    - "AUDIT REPORT — CIS 1.8.8"
    - "Reference: CIS Benchmark checkpoint 1.8.8"
    - ""
    - "REQUIREMENT 01 - Run the provided audit script to verify Ensure GDM autorun-never is enabled:"
    - "  Task: {{ task_01_name | default('Not recorded') }}"
    - "  Command: {{ task_01_cmd | default('N/A') }}"
    - "  Exit code: {{ task_01_rc | default(-1) }}"
    - "  Data: {{ data_01 | default('') | trim }}"
    - "  Status: {{ status_01 | default('ERROR') | trim }}"
    - "  Details: {{ details_01 | default('') | trim }}"
    - ""
    - "========================================================"
    - "OVERALL COMPLIANCE:"
    - "  Result: {{ cis_result | default('ERROR') | trim }}"
    - "========================================================"
