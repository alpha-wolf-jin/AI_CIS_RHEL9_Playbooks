---
- name: Initialize meta data variables
  include_vars: cis_audit_var_1_8_8.yml

- name: "Req 01 - Gather package facts"
  ansible.builtin.package_facts:
    manager: auto
  failed_when: false

- name: "Req 01 - Set GDM installation fact"
  ansible.builtin.set_fact:
    gdm_installed: "{{ ('gdm' in ansible_facts.packages) or ('gdm3' in ansible_facts.packages) }}"

- name: "Req 01 - Run audit script"
  ansible.builtin.shell: |
    cat > {{ audit_script }} <<'SCRIPT_EOF'
    {{ audit_script_content }}
    SCRIPT_EOF
    /bin/bash {{ audit_script }}
    rc=$?
    rm -f {{ audit_script }}
    exit $rc
  args:
    executable: /bin/bash
  register: result_01
  when: gdm_installed | bool
  failed_when: false
  changed_when: false

# Requirements 1 & 2 evaluation
- name: "Req 01 & 02 - Store execution details and parse compliance"
  ansible.builtin.set_fact:
    task_01_name: "Run audit script for GDM autorun-never"
    task_01_cmd: "{{ (result_01 | default({})).cmd | default('N/A') }}"
    task_01_rc: "{{ (result_01 | default({})).rc | default(-1) }}"
    data_01: "{{ ((result_01 | default({})).stdout | default('N/A')) | trim }}"
    status_01: >-
      {%- if not gdm_installed | bool -%}
      SKIPPED
      {%- elif (result_01 | default({})).rc | default(-1) == 0 -%}
      PASS
      {%- else -%}
      FAIL
      {%- endif -%}
    details_01: >-
      {%- if not gdm_installed | bool -%}
      GDM not installed; recommendation is not applicable
      {%- elif (result_01 | default({})).rc | default(-1) == 0 -%}
      Script executed successfully
      {%- else -%}
      Script execution failed
      {%- endif -%}

    task_02_name: "Parse audit output for compliance"
    task_02_cmd: "N/A"
    task_02_rc: -1
    data_02: "{{ ((result_01 | default({})).stdout | default('N/A')) | trim }}"
    status_02: >-
      {%- if not gdm_installed | bool -%}
      SKIPPED
      {%- elif '** PASS **' in ((result_01 | default({})).stdout | default('')) -%}
      PASS
      {%- elif '** FAIL **' in ((result_01 | default({})).stdout | default('')) -%}
      FAIL
      {%- else -%}
      UNKNOWN
      {%- endif -%}
    details_02: >-
      {%- if not gdm_installed | bool -%}
      GDM not installed; recommendation is not applicable.
      {%- elif '** PASS **' in ((result_01 | default({})).stdout | default('')) -%}
      System is compliant. GDM autorun-never is set to true.
      {%- elif '** FAIL **' in ((result_01 | default({})).stdout | default('')) -%}
      System is non-compliant. GDM autorun-never is not set correctly.
      {%- else -%}
      Unable to determine compliance from audit output.
      {%- endif -%}

# Requirement 3: Store cis_result
- name: "Req 03 - Store final audit result as cis_result"
  ansible.builtin.set_fact:
    cis_result: "{{ status_02 | default('UNKNOWN') }}"

# Requirement 4: store report metadata (uses cis_result)
- name: "Req 04 - Store report metadata for requirements 03 and 04"
  ansible.builtin.set_fact:
    task_03_name: "Store final audit result as cis_result"
    task_03_cmd: "set_fact"
    task_03_rc: 0
    data_03: "{{ cis_result }}"
    status_03: "PASS"
    details_03: "Final compliance result stored as {{ cis_result }}"

    task_04_name: "Generate audit report"
    task_04_cmd: "debug msg"
    task_04_rc: 0
    data_04: "Report generated"
    status_04: "PASS"
    details_04: "Audit report generated with compliance results"

# Generate audit report
- name: "Req 04 - Generate audit report"
  ansible.builtin.debug:
    msg:
    - "AUDIT REPORT — CIS 1.8.8"
    - "Reference: CIS Benchmark checkpoint 1.8.8"
    - ""
    - "REQUIREMENT 01 - {{ req_01 }}:"
    - "  Task: {{ task_01_name | default('Not recorded') }}"
    - "  Command: {{ task_01_cmd | default('N/A') }}"
    - "  Exit code: {{ task_01_rc | default(-1) }}"
    - "  Data: {{ data_01 | default('N/A') | trim }}"
    - "  Status: {{ status_01 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_01 | default('') | trim }}"
    - ""
    - "REQUIREMENT 02 - {{ req_02 }}:"
    - "  Task: {{ task_02_name | default('Not recorded') }}"
    - "  Command: {{ task_02_cmd | default('N/A') }}"
    - "  Exit code: {{ task_02_rc | default(-1) }}"
    - "  Data: {{ data_02 | default('N/A') | trim }}"
    - "  Status: {{ status_02 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_02 | default('') | trim }}"
    - ""
    - "REQUIREMENT 03 - {{ req_03 }}:"
    - "  Task: {{ task_03_name | default('Not recorded') }}"
    - "  Command: {{ task_03_cmd | default('N/A') }}"
    - "  Exit code: {{ task_03_rc | default(-1) }}"
    - "  Data: {{ data_03 | default('N/A') | trim }}"
    - "  Status: {{ status_03 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_03 | default('') | trim }}"
    - ""
    - "REQUIREMENT 04 - {{ req_04 }}:"
    - "  Task: {{ task_04_name | default('Not recorded') }}"
    - "  Command: {{ task_04_cmd | default('N/A') }}"
    - "  Exit code: {{ task_04_rc | default(-1) }}"
    - "  Data: {{ data_04 | default('N/A') | trim }}"
    - "  Status: {{ status_04 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_04 | default('') | trim }}"
    - ""
    - "========================================================"
    - "OVERALL COMPLIANCE:"
    - "  Result: {{ cis_result | default('UNKNOWN') }}"
    - "========================================================"
