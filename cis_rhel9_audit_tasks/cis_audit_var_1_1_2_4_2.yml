req_01: "Check if /var is a separate partition using command: `findmnt -kn /var`. Expected result: output should contain a mount point entry for /var."
req_02: "Check if the nodev option is set on /var partition using command: `findmnt -kn /var | grep -v nodev`. Expected result: no output returned."
req_03: "Summarize overall compliance: PASS if both checks pass, SKIP if /var is not a separate partition, FAIL if /var partition exists but nodev option is not set."
req_04: "Store the final audit result in a variable named 'cis_result' using set_fact. Set cis_result to the overall compliance status (PASS/FAIL/SKIP/ERROR) derived from the last requirement's status variable."
