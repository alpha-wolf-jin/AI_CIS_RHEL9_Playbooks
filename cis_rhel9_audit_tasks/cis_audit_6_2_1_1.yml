---
- name: Initialize meta data variables
  include_vars: cis_audit_var_6_2_1_1.yml

- name: "Initialize audit variables"
  ansible.builtin.set_fact:
    not_applicable: false
    data_01: ""
    status_01: "UNKNOWN"
    details_01: ""
    task_01_name: "Check if systemd-journald service is installed"
    task_01_cmd: "systemctl list-unit-files | grep systemd-journald.service"
    task_01_rc: -1
    data_02: ""
    status_02: "UNKNOWN"
    details_02: ""
    task_02_name: "Check if systemd-journald is enabled"
    task_02_cmd: "systemctl is-enabled systemd-journald.service"
    task_02_rc: -1
    data_03: ""
    status_03: "UNKNOWN"
    details_03: ""
    task_03_name: "Check if systemd-journald is active"
    task_03_cmd: "systemctl is-active systemd-journald.service"
    task_03_rc: -1

- name: "Req 01 - Check if systemd-journald service is installed"
  ansible.builtin.shell: "systemctl list-unit-files | grep systemd-journald.service"
  args:
    executable: /bin/bash
  register: result_01
  failed_when: false
  changed_when: false

- name: "Store requirement 01 details"
  ansible.builtin.set_fact:
    task_01_rc: "{{ result_01.rc | default(-1) }}"
    data_01: "{{ result_01.stdout | default('') | trim }}"
    status_01: "{{ 'PASS' if (result_01.rc | default(-1) == 0) else 'FAIL' }}"
    details_01: "{{ 'PASS: Package is installed' if (result_01.rc | default(-1) == 0) else 'FAIL: Package not found' }}"
    not_applicable: "{{ true if (result_01.rc | default(-1) != 0) else false }}"

- name: "Req 02 - Check if systemd-journald is enabled"
  ansible.builtin.shell: "systemctl is-enabled systemd-journald.service"
  args:
    executable: /bin/bash
  register: result_02
  failed_when: false
  changed_when: false
  when: "not not_applicable | default(false)"

- name: "Store requirement 02 details - not applicable"
  ansible.builtin.set_fact:
    status_02: "SKIP"
    details_02: "Not applicable - systemd-journald service not installed"
    data_02: ""
    task_02_rc: -1
  when: "not_applicable | default(false)"

- name: "Store requirement 02 details - applicable"
  ansible.builtin.set_fact:
    status_02: "{{ 'PASS' if (result_02.rc | default(-1) == 0) and (result_02.stdout | default('') | trim == 'static') else 'FAIL' }}"
    details_02: "{{ 'PASS: Service is enabled (static)' if (result_02.rc | default(-1) == 0) and (result_02.stdout | default('') | trim == 'static') else 'FAIL: Enabled status is not static' }}"
    data_02: "{{ result_02.stdout | default('') | trim }}"
    task_02_rc: "{{ result_02.rc | default(-1) }}"
  when: "not not_applicable | default(false)"

- name: "Req 03 - Check if systemd-journald is active"
  ansible.builtin.shell: "systemctl is-active systemd-journald.service"
  args:
    executable: /bin/bash
  register: result_03
  failed_when: false
  changed_when: false
  when: "not not_applicable | default(false)"

- name: "Store requirement 03 details - not applicable"
  ansible.builtin.set_fact:
    status_03: "SKIP"
    details_03: "Not applicable - systemd-journald service not installed"
    data_03: ""
    task_03_rc: -1
  when: "not_applicable | default(false)"

- name: "Store requirement 03 details - applicable"
  ansible.builtin.set_fact:
    status_03: "{{ 'PASS' if (result_03.rc | default(-1) == 0) and (result_03.stdout | default('') | trim == 'active') else 'FAIL' }}"
    details_03: "{{ 'PASS: Service is active' if (result_03.rc | default(-1) == 0) and (result_03.stdout | default('') | trim == 'active') else 'FAIL: Service is not active' }}"
    data_03: "{{ result_03.stdout | default('') | trim }}"
    task_03_rc: "{{ result_03.rc | default(-1) }}"
  when: "not not_applicable | default(false)"

- name: "Req 04 - Compute overall compliance"
  ansible.builtin.set_fact:
    status_04: >-
      {{ 'SKIP' if not_applicable | default(false)
         else ('PASS' if (status_02 | default('UNKNOWN') == 'PASS') and (status_03 | default('UNKNOWN') == 'PASS') else 'FAIL') }}
    details_04: >-
      {{ 'Systemd-journald not installed, all checks skipped' if not_applicable | default(false)
         else ('System is compliant: journald installed, enabled (static), active' if (status_02 | default('UNKNOWN') == 'PASS') and (status_03 | default('UNKNOWN') == 'PASS') else 'System is not compliant: one or more criteria not met') }}

- name: "Req 05 - Store final audit result in cis_result"
  ansible.builtin.set_fact:
    cis_result: "{{ status_04 | default('UNKNOWN') | trim }}"

- name: "Generate audit report"
  ansible.builtin.debug:
    msg:
    - "AUDIT REPORT — CIS 6.2.1.1"
    - "Reference: CIS Benchmark checkpoint 6.2.1.1"
    - ""
    - "REQUIREMENT 01 - {{ req_01 }}:"
    - "  Task: {{ task_01_name | default('Not recorded') }}"
    - "  Command: {{ task_01_cmd | default('N/A') }}"
    - "  Exit code: {{ task_01_rc | default(-1) }}"
    - "  Data: {{ data_01 | default('') | trim }}"
    - "  Status: {{ status_01 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_01 | default('') | trim }}"
    - ""
    - "REQUIREMENT 02 - {{ req_02 }}:"
    - "  Task: {{ task_02_name | default('Not recorded') }}"
    - "  Command: {{ task_02_cmd | default('N/A') }}"
    - "  Exit code: {{ task_02_rc | default(-1) }}"
    - "  Data: {{ data_02 | default('') | trim }}"
    - "  Status: {{ status_02 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_02 | default('') | trim }}"
    - ""
    - "REQUIREMENT 03 - {{ req_03 }}:"
    - "  Task: {{ task_03_name | default('Not recorded') }}"
    - "  Command: {{ task_03_cmd | default('N/A') }}"
    - "  Exit code: {{ task_03_rc | default(-1) }}"
    - "  Data: {{ data_03 | default('') | trim }}"
    - "  Status: {{ status_03 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_03 | default('') | trim }}"
    - ""
    - "REQUIREMENT 04 - {{ req_04 }}:"
    - "  Task: Overall compliance evaluation"
    - "  Command: N/A (computed)"
    - "  Exit code: N/A"
    - "  Data: N/A (synthesis)"
    - "  Status: {{ status_04 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_04 | default('Not evaluated') | trim }}"
    - ""
    - "REQUIREMENT 05 - {{ req_05 }}:"
    - "  Task: Store final audit result"
    - "  Command: N/A (set_fact)"
    - "  Exit code: N/A"
    - "  Data: N/A"
    - "  Status: {{ cis_result | default('UNKNOWN') | trim }}"
    - "  Details: Final compliance recorded in cis_result"
    - ""
    - "========================================================"
    - "OVERALL COMPLIANCE:"
    - "  Result: {{ cis_result | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_04 | default('Not evaluated') | trim }}"
    - "========================================================"
