---
- name: Initialize meta data variables
  include_vars: cis_audit_var_6_3_3_11.yml

- name: "Initialize data variables"
  set_fact:
    data_01: "Not collected yet"
    status_01: "UNKNOWN"
    details_01: "Not evaluated"
    data_02: "Not collected yet"
    status_02: "UNKNOWN"
    details_02: "Not evaluated"
    data_03: "Not collected yet"
    status_03: "UNKNOWN"
    details_03: "Not evaluated"
    data_04: "Not collected yet"
    status_04: "UNKNOWN"
    details_04: "Not evaluated"
    data_05: "Not collected yet"
    status_05: "UNKNOWN"
    details_05: "Not evaluated"
    data_06: "Not collected yet"
    status_06: "UNKNOWN"
    details_06: "Not evaluated"
    data_07: "Not collected yet"
    status_07: "UNKNOWN"
    details_07: "Not evaluated"
    data_08: "Not collected yet"
    status_08: "UNKNOWN"
    details_08: "Not evaluated"
    task_01_name: "Not executed"
    task_01_cmd: "N/A"
    task_01_rc: -1
    auditd_installed: false

- name: "Req 01 - Check if auditd package is installed"
  ansible.builtin.shell: dpkg -l auditd || rpm -q audit
  args:
    executable: /bin/bash
  register: result_01
  failed_when: false
  changed_when: false

- name: "Store requirement 01 details"
  set_fact:
    task_01_name: "Req 01 - Check if auditd package is installed"
    task_01_cmd: "dpkg -l auditd || rpm -q audit"
    task_01_rc: "{{ result_01.rc | default(-1) }}"
    data_01: "{{ result_01.stdout | default('') | trim }}"
    status_01: "{{ ('PASS' if (result_01.rc | default(-1) == 0) else 'FAIL') | trim }}"
    details_01: "{{ ('Completed successfully' if result_01.rc | default(-1) == 0 else 'Failed to execute') | trim }}"
    auditd_installed: "{{ result_01.rc == 0 }}"

- name: "Req 02-04 - Check on-disk audit rules for session initiation files"
  ansible.builtin.shell:
    cmd: |
      awk '/^ *-w/ &&(/\/var\/run\/utmp/ ||/\/var\/log\/wtmp/ ||/\/var\/log\/btmp/) &&/ +-p *wa/ &&(/ key= *[!-~]* *$/||/ -k *[!-~]* *$/)' /etc/audit/rules.d/*.rules
  args:
    executable: /bin/bash
  register: result_ondisk
  failed_when: false
  changed_when: false
  when: auditd_installed | bool

- name: "Store requirement 02 details"
  set_fact:
    task_02_name: "Req 02 - Check on-disk audit rules for /var/run/utmp"
    task_02_cmd: |
      awk '/^ *-w/ &&(/\\/var\\/run\\/utmp/ ||/\\/var\\/log\\/wtmp/ ||/\\/var\\/log\\/btmp/) &&/ +-p *wa/ &&(/ key= *[!-~]* *$/||/ -k *[!-~]* *$/)' /etc/audit/rules.d/*.rules
    task_02_rc: "{{ (result_ondisk | default(dict(rc=-1))).rc }}"
    data_02: "{{ (result_ondisk | default(dict(stdout=''))).stdout | trim }}"
    status_02: >-
      {{ 
        'SKIPPED' if not auditd_installed else
        ('PASS' if '-w /var/run/utmp -p wa -k session' in (result_ondisk | default(dict(stdout=''))).stdout else 'FAIL')
        | trim
      }}
    details_02: >-
      {{ 
        'Not applicable - auditd not installed' if not auditd_installed else
        ('Found' if '-w /var/run/utmp -p wa -k session' in (result_ondisk | default(dict(stdout=''))).stdout else 'Missing')
        | trim
      }}
  when: true

- name: "Store requirement 03 details"
  set_fact:
    task_03_name: "Req 03 - Check on-disk audit rules for /var/log/wtmp"
    task_03_cmd: |
      awk '/^ *-w/ &&(/\\/var\\/run\\/utmp/ ||/\\/var\\/log\\/wtmp/ ||/\\/var\\/log\\/btmp/) &&/ +-p *wa/ &&(/ key= *[!-~]* *$/||/ -k *[!-~]* *$/)' /etc/audit/rules.d/*.rules
