- name: "Req 08 - Summarize overall compliance status"
  set_fact:
    task_08_name: "Req 08 - Evaluate overall compliance"
    task_08_cmd: "N/A"
    task_08_rc: 0
    data_08: "All checks evaluated"
    status_08: >-
      {{ 
        ('PASS' if 
          status_01 == 'PASS' and 
          status_02 == 'PASS' and 
          status_03 == 'PASS' and 
          status_04 == 'PASS' and 
          status_05 == 'PASS' and 
          status_06 == 'PASS' and 
          status_07 == 'PASS' 
        else 'FAIL') | trim 
      }}
    details_08: >-
      {{ 
        ('All requirements met' if 
          status_01 == 'PASS' and 
          status_02 == 'PASS' and 
          status_03 == 'PASS' and 
          status_04 == 'PASS' and 
          status_05 == 'PASS' and 
          status_06 == 'PASS' and 
          status_07 == 'PASS' 
        else 'One or more requirements failed') | trim 
      }}

- name: "Store cis_result for external use"
  set_fact:
    cis_result: "{{ status_08 }}"

