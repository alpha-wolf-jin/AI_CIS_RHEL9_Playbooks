req_01: "Check if setroubleshoot package is installed using command: `rpm -q setroubleshoot`. Expected result: package setroubleshoot is not installed"
req_02: "Summarize overall compliance: If the package is not installed, the system is compliant; otherwise, it is non-compliant."
req_03: "Store the final audit result in a variable named 'cis_result' using set_fact. Set cis_result to the overall compliance status (PASS/FAIL/SKIPPED/UNKNOWN) derived from the last requirement's status variable."
