mount_point: "/var/log/audit"
mount_option: "nodev"
req_01: "Check if a separate partition exists for /var/log/audit using command: `findmnt -kn /var/log/audit`. Expected result: output should not be empty (partition exists)."
req_02: "Check if the nodev option is set on /var/log/audit partition using command: `findmnt -kn /var/log/audit | grep -v nodev`. Expected result: no output (nodev is set)."
req_03: "Summarize overall compliance: PASS if both checks pass, SKIP if no separate partition exists for /var/log/audit, FAIL if partition exists but nodev is not set."
req_04: "Store the final audit result in a variable named 'cis_result' using set_fact. Set cis_result to the overall compliance status (PASS/FAIL/SKIP/ERROR) derived from the last requirement's status variable."
