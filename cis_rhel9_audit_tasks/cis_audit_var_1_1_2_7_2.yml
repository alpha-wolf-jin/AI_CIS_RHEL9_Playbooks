mount_point: "/var/log/audit"
mount_option: "nodev"
req_01: "Check if /var/log/audit is a separate partition using command: `findmnt -kn /var/log/audit`. Expected result: output should contain a mount point entry for /var/log/audit."
req_02: "Check if the nodev option is set on /var/log/audit partition using command: `findmnt -kn /var/log/audit | grep -v nodev`. Expected result: no output should be returned."
req_03: "Summarize overall compliance status: if both checks pass, the requirement is compliant; otherwise, it is non-compliant."
req_04: "Store the final audit result in a variable named 'cis_result' using set_fact. Set cis_result to the overall compliance status (PASS/FAIL/SKIPPED/UNKNOWN) derived from the last requirement's status variable."
