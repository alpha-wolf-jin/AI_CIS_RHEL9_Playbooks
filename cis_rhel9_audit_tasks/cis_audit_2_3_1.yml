---
- name: Initialize meta data variables
  include_vars: cis_audit_var_2_3_1.yml

- name: "Initialize audit variables"
  set_fact:
    data_01: "Not collected yet"
    status_01: "ERROR"
    details_01: "Not evaluated"
    data_02: "Not collected yet"
    status_02: "ERROR"
    details_02: "Not evaluated"
    data_03: "Not collected yet"
    status_03: "ERROR"
    details_03: "Not evaluated"
    data_04: "Not collected yet"
    status_04: "ERROR"
    details_04: "Not evaluated"
    data_05: "Not collected yet"
    status_05: "ERROR"
    details_05: "Not evaluated"
    data_06: "Not collected yet"
    status_06: "ERROR"
    details_06: "Not evaluated"
    data_07: "Not collected yet"
    status_07: "ERROR"
    details_07: "Not evaluated"
    task_01_name: "Not executed"
    task_01_cmd: "N/A"
    task_01_rc: -1
    task_02_name: "Not executed"
    task_02_cmd: "N/A"
    task_02_rc: -1
    task_03_name: "Not executed"
    task_03_cmd: "N/A"
    task_03_rc: -1
    task_04_name: "Not executed"
    task_04_cmd: "N/A"
    task_04_rc: -1
    task_05_name: "Not executed"
    task_05_cmd: "N/A"
    task_05_rc: -1
    task_06_name: "Not executed"
    task_06_cmd: "N/A"
    task_06_rc: -1
    task_07_name: "Not executed"
    task_07_cmd: "N/A"
    task_07_rc: -1

- name: "Req 01 - Check if chrony is installed"
  ansible.builtin.shell: rpm -q chrony
  args:
    executable: /bin/bash
  register: result_01
  failed_when: false
  changed_when: false

- name: "Store requirement 01 details"
  set_fact:
    chrony_installed: "{{ result_01.rc == 0 }}"
    status_01: "{{ 'PASS' if result_01.rc == 0 else 'NOT_APPLICABLE' | trim }}"
    data_01: "{{ result_01.stdout | default('') | trim }}"
    details_01: "{{ 'chrony is installed' if result_01.rc == 0 else 'chrony not installed' | trim }}"
    task_01_name: "Req 01 - Check if chrony is installed"
    task_01_cmd: "rpm -q chrony"
    task_01_rc: "{{ result_01.rc }}"

- name: "Set not applicable status for chrony-dependent checks"
  set_fact:
    status_02: "NOT_APPLICABLE"
    data_02: "NOT_APPLICABLE"
    details_02: "chrony not installed"
    task_02_name: "Req 02 - Verify chrony service is active"
    task_02_cmd: "systemctl is-active chronyd"
    task_02_rc: -1
    status_03: "NOT_APPLICABLE"
    data_03: "NOT_APPLICABLE"
    details_03: "chrony not installed"
    task_03_name: "Req 03 - Verify chrony is enabled on boot"
    task_03_cmd: "systemctl is-enabled chronyd"
    task_03_rc: -1
    status_04: "NOT_APPLICABLE"
    data_04: "NOT_APPLICABLE"
    details_04: "chrony not installed"
    task_04_name: "Req 04 - Check chrony time source configuration"
    task_04_cmd: "grep -E '^server|^pool' /etc/chrony.conf"
    task_04_rc: -1
    status_05: "NOT_APPLICABLE"
    data_05: "NOT_APPLICABLE"
    details_05: "chrony not installed"
    task_05_name: "Req 05 - Verify time synchronization tracking"
    task_05_cmd: "chronyc tracking (with validation checks)"
    task_05_rc: -1
  when: not chrony_installed

- name: "Req 02 - Verify chrony service is active"
  ansible.builtin.shell: systemctl is-active chronyd
  args:
    executable: /bin/bash
  register: result_02
  failed_when: false
  changed_when: false
  when: chrony_installed

- name: "Store requirement 02 details"
  set_fact:
    status_02: "{{ 'PASS' if result_02.stdout | default('') | trim == 'active' else 'FAIL' | trim }}"
    data_02: "{{ result_02.stdout | default('') | trim }}"
    details_02: "{{ 'Service is active' if result_02.stdout | default('') | trim == 'active' else 'Service is not active' | trim }}"
    task_02_name: "Req 02 - Verify chrony service is active"
    task_02_cmd: "systemctl is-active chronyd"
    task_02_rc: "{{ result_02.rc }}"
  when: chrony_installed

- name: "Req 03 - Verify chrony is enabled on boot"
  ansible.builtin.shell: systemctl is-enabled chronyd
  args:
    executable: /bin/bash
  register: result_03
  failed_when: false
  changed_when: false
  when: chrony_installed

- name: "Store requirement 03 details"
  set_fact:
    status_03: "{{ 'PASS' if result_03.stdout | default('') | trim == 'enabled' else 'FAIL' | trim }}"
    data_03: "{{ result_03.stdout | default('') | trim }}"
    details_03: "{{ 'Service is enabled' if result_03.stdout | default('') | trim == 'enabled' else 'Service is not enabled' | trim }}"
    task_03_name: "Req 03 - Verify chrony is enabled on boot"
    task_03_cmd: "systemctl is-enabled chronyd"
    task_03_rc: "{{ result_03.rc }}"
  when: chrony_installed

- name: "Req 04 - Check chrony time source configuration"
  ansible.builtin.shell: grep -E '^server|^pool' /etc/chrony.conf || true
  args:
    executable: /bin/bash
  register: result_04
  failed_when: false
  changed_when: false
  when: chrony_installed

- name: "Store requirement 04 details"
  set_fact:
    status_04: "{{ 'PASS' if (result_04.stdout | default('') | trim) != '' else 'FAIL' | trim }}"
    data_04: "{{ result_04.stdout | default('') | trim }}"
    details_04: "{{ 'Time source configured' if (result_04.stdout | default('') | trim) != '' else 'No time source configured' | trim }}"
    task_04_name: "Req 04 - Check chrony time source configuration"
    task_04_cmd: "grep -E '^server|^pool' /etc/chrony.conf || true"
    task_04_rc: "{{ result_04.rc }}"
  when: chrony_installed

- name: "Req 05 - Verify time synchronization tracking"
  ansible.builtin.shell: |
    chronyc tracking | grep -qi 'Leap status\s*:\s*Normal' && chronyc tracking | awk -F: '$1 ~ /Stratum/ {if ($2+0 < 16) exit 0; exit 1}' && echo 'SYNCHRONIZED' || echo 'NOT_SYNCHRONIZED'
  args:
    executable: /bin/bash
  register: result_05
  failed_when: false
  changed_when: false
  when: chrony_installed

- name: "Store requirement 05 details"
  set_fact:
    status_05: "{{ 'PASS' if (result_05.stdout | default('') | trim) == 'SYNCHRONIZED' else 'FAIL' | trim }}"
    data_05: "{{ result_05.stdout | default('') | trim }}"
    details_05: "{{ 'Time synchronized' if (result_05.stdout | default('') | trim) == 'SYNCHRONIZED' else 'Time not synchronized' | trim }}"
    task_05_name: "Req 05 - Verify time synchronization tracking"
    task_05_cmd: "chronyc tracking (with Leap status and Stratum checks)"
    task_05_rc: "{{ result_05.rc }}"
  when: chrony_installed

- name: "Req 06 - Summarize overall compliance"
  set_fact:
    status_06: >-
      {%- if not chrony_installed -%}
        NOT_APPLICABLE
      {%- elif status_01 | trim == 'PASS' and status_02 | trim == 'PASS' and status_03 | trim == 'PASS' and status_04 | trim == 'PASS' and status_05 | trim == 'PASS' -%}
        PASS
      {%- else -%}
        FAIL
      {%- endif -%}
    details_06: >-
      {%- if not chrony_installed -%}
        chrony is not installed
      {%- elif status_01 | trim == 'PASS' and status_02 | trim == 'PASS' and status_03 | trim == 'PASS' and status_04 | trim == 'PASS' and status_05 | trim == 'PASS' -%}
        All checks passed; time synchronization is in use and compliant
      {%- else -%}
        One or more checks failed; time synchronization is not compliant
      {%- endif -%}
    task_06_name: "Req 06 - Summarize overall compliance"
    task_06_cmd: "N/A"
    task_06_rc: 0

- name: "Req 07 - Store final audit result in cis_result"
  set_fact:
    cis_result: "{{ status_06 }}"
    status_07: "{{ status_06 }}"
    data_07: "{{ status_06 }}"
    details_07: "Final audit result stored in cis_result variable"
    task_07_name: "Req 07 - Store final audit result in cis_result"
    task_07_cmd: "N/A"
    task_07_rc: 0

- name: "Generate audit report"
  debug:
    msg:
    - "AUDIT REPORT — CIS 2.3.1"
    - "Reference: CIS Benchmark checkpoint 2.3.1"
    - ""
    - "REQUIREMENT 01 - {{ req_01 }}:"
    - "  Task: {{ task_01_name | default('Not recorded') }}"
    - "  Command: {{ task_01_cmd | default('N/A') }}"
    - "  Exit code: {{ task_01_rc | default(-1) }}"
    - "  Data: {{ data_01 | default('') | trim }}"
    - "  Status: {{ status_01 | default('ERROR') | trim }}"
    - "  Details: {{ details_01 | default('') | trim }}"
    - ""
    - "REQUIREMENT 02 - {{ req_02 }}:"
    - "  Task: {{ task_02_name | default('Not recorded') }}"
    - "  Command: {{ task_02_cmd | default('N/A') }}"
    - "  Exit code: {{ task_02_rc | default(-1) }}"
    - "  Data: {{ data_02 | default('') | trim }}"
    - "  Status: {{ status_02 | default('ERROR') | trim }}"
    - "  Details: {{ details_02 | default('') | trim }}"
    - ""
    - "REQUIREMENT 03 - {{ req_03 }}:"
    - "  Task: {{ task_03_name | default('Not recorded') }}"
    - "  Command: {{ task_03_cmd | default('N/A') }}"
    - "  Exit code: {{ task_03_rc | default(-1) }}"
    - "  Data: {{ data_03 | default('') | trim }}"
    - "  Status: {{ status_03 | default('ERROR') | trim }}"
    - "  Details: {{ details_03 | default('') | trim }}"
    - ""
    - "REQUIREMENT 04 - {{ req_04 }}:"
    - "  Task: {{ task_04_name | default('Not recorded') }}"
    - "  Command: {{ task_04_cmd | default('N/A') }}"
    - "  Exit code: {{ task_04_rc | default(-1) }}"
    - "  Data: {{ data_04 | default('') | trim }}"
    - "  Status: {{ status_04 | default('ERROR') | trim }}"
    - "  Details: {{ details_04 | default('') | trim }}"
    - ""
    - "REQUIREMENT 05 - {{ req_05 }}:"
    - "  Task: {{ task_05_name | default('Not recorded') }}"
    - "  Command: {{ task_05_cmd | default('N/A') }}"
    - "  Exit code: {{ task_05_rc | default(-1) }}"
    - "  Data: {{ data_05 | default('') | trim }}"
    - "  Status: {{ status_05 | default('ERROR') | trim }}"
    - "  Details: {{ details_05 | default('') | trim }}"
    - ""
    - "REQUIREMENT 06 - {{ req_06 }}:"
    - "  Task: {{ task_06_name | default('Not recorded') }}"
    - "  Command: {{ task_06_cmd | default('N/A') }}"
    - "  Exit code: {{ task_06_rc | default(-1) }}"
    - "  Data: {{ data_06 | default('') | trim }}"
    - "  Status: {{ status_06 | default('ERROR') | trim }}"
    - "  Details: {{ details_06 | default('') | trim }}"
    - ""
    - "REQUIREMENT 07 - {{ req_07 }}:"
    - "  Task: {{ task_07_name | default('Not recorded') }}"
    - "  Command: {{ task_07_cmd | default('N/A') }}"
    - "  Exit code: {{ task_07_rc | default(-1) }}"
    - "  Data: {{ data_07 | default('') | trim }}"
    - "  Status: {{ status_07 | default('ERROR') | trim }}"
    - "  Details: {{ details_07 | default('') | trim }}"
    - ""
    - "========================================================"
    - "OVERALL COMPLIANCE:"
    - "  Result: {{ cis_result | default('ERROR') | trim }}"
    - "  Details: {{ details_06 | default('Not evaluated') | trim }}"
    - "========================================================"
