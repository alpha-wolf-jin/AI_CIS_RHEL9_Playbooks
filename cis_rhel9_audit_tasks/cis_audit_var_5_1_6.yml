req_01: "Check if OpenSSH server is installed using command: `dpkg -l | grep -q openssh-server || rpm -q openssh-server 2>/dev/null`. Expected result: exit code 0 (package installed)."
req_02: "Check if sshd is running using command: `systemctl is-active sshd 2>/dev/null || service sshd status 2>/dev/null`. Expected result: active (running)."
req_03: |
  Check that no weak MACs are configured in sshd using command: `sshd -T | grep -Pi -- 'macs\\h+([^#\\n\\r]+,)?(hmac-md5|hmac-md5-96|hmac-ripemd160|hmac-sha1-96|umac-64@openssh\\.com|hmac-md5-etm@openssh\\.com|hmac-md5-96-etm@openssh\\.com|hmac-ripemd160-etm@openssh\\.com|hmac-sha1-96-etm@openssh\\.com|umac-64-etm@openssh\\.com|umac-128-etm@openssh\\.com)\\b'`. Expected result: no output (empty).
req_04: "Check if system is patched for CVE-2023-48795 using command: `dpkg -l | grep -q 'openssh-server' && apt-get changelog openssh-server 2>/dev/null | grep -q 'CVE-2023-48795' || rpm -q --changelog openssh-server 2>/dev/null | grep -q 'CVE-2023-48795'`. Expected result: exit code 0 (patch present)."
req_05: "Summarize overall compliance: PASS if all checks pass, SKIP if OpenSSH server is not installed or not running, FAIL if weak MACs are found or CVE-2023-48795 patch is missing."
req_06: "Store the final audit result in a variable named 'cis_result' using set_fact. Set cis_result to the overall compliance status (PASS/FAIL/SKIP/ERROR) derived from the last requirement's status variable."
