req_01: "Check if /home is a separate partition using command: `findmnt -kn /home`. Expected result: output should contain a mount point entry for /home."
req_02: "Check if the nodev option is set on /home partition using command: `findmnt -n -o OPTIONS /home | grep -q nodev`. Expected result: exit code 0 (nodev found)."
req_03: "Summarize overall compliance: PASS if both checks pass, SKIP if /home is not a separate partition, FAIL if /home partition exists but nodev option is not set."
req_04: "Store the final audit result in a variable named 'cis_result' using set_fact. Set cis_result to the overall compliance status (PASS/FAIL/SKIP/ERROR) derived from the last requirement's status variable."
