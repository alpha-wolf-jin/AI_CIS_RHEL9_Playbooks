---
- name: Initialize meta data variables
  include_vars: cis_audit_var_3_1_1.yml

- name: "Req 1 - Execute audit script to identify IPv6 status"
  ansible.builtin.shell:
    cmd: /bin/bash
    stdin: "{{ audit_script_content }}"
  args:
    executable: /bin/bash
  register: result_01
  failed_when: false
  changed_when: false

- name: "Store requirement 01 details"
  set_fact:
    task_01_name: "Req 1 - Execute audit script"
    task_01_cmd: "/bin/bash (script via stdin)"
    task_01_rc: "{{ result_01.rc | default(-1) }}"
    data_01: "{{ result_01.stdout | default('') | trim }}"
    status_01: "{{ ('PASS' if result_01.rc | default(-1) | int == 0 else 'FAIL') | trim }}"
    details_01: "{{ ('Script executed successfully' if result_01.rc | default(-1) | int == 0 else 'Script execution failed') | trim }}"

- name: "Req 02 - Verify compliance status"
  set_fact:
    task_02_name: "Verify compliance status"
    task_02_cmd: "N/A (evaluation logic)"
    task_02_rc: "0"
    data_02: "{{ result_01.stdout | default('') | trim }}"
    status_02: "{{ ('PASS' if (('IPv6 is enabled' in (result_01.stdout | default('')) or 'IPv6 is not enabled' in (result_01.stdout | default(''))) and (result_01.rc | default(-1) | int == 0)) else 'FAIL') | trim }}"
    details_02: "{{ ('PASS: IPv6 status identified' if (('IPv6 is enabled' in (result_01.stdout | default('')) or 'IPv6 is not enabled' in (result_01.stdout | default(''))) and (result_01.rc | default(-1) | int == 0)) else 'FAIL: IPv6 status not identified') | trim }}"

- name: "Req 03 - Store final audit result"
  set_fact:
    task_03_name: "Store cis_result"
    task_03_cmd: "set_fact: cis_result = status_02"
    task_03_rc: "0"
    data_03: "{{ status_02 | default('UNKNOWN') | trim }}"
    status_03: "{{ status_02 | default('UNKNOWN') | trim }}"
    details_03: "Final compliance status recorded"
    cis_result: "{{ status_02 | default('UNKNOWN') | trim }}"

- name: "Generate audit report"
  debug:
    msg:
    - "AUDIT REPORT — CIS 3.1.1"
    - "Reference: CIS Benchmark checkpoint 3.1.1"
    - ""
    - "REQUIREMENT 01 - {{ req_01 }}:"
    - "  Task: {{ task_01_name | default('Not recorded') }}"
    - "  Command: {{ task_01_cmd | default('N/A') }}"
    - "  Exit code: {{ task_01_rc | default(-1) }}"
    - "  Data: {{ data_01 | default('') | trim }}"
    - "  Status: {{ status_01 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_01 | default('') | trim }}"
    - ""
    - "REQUIREMENT 02 - {{ req_02 }}:"
    - "  Task: {{ task_02_name | default('Not recorded') }}"
    - "  Command: {{ task_02_cmd | default('N/A') }}"
    - "  Exit code: {{ task_02_rc | default(-1) }}"
    - "  Data: {{ data_02 | default('') | trim }}"
    - "  Status: {{ status_02 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_02 | default('') | trim }}"
    - ""
    - "REQUIREMENT 03 - {{ req_03 }}:"
    - "  Task: {{ task_03_name | default('Not recorded') }}"
    - "  Command: {{ task_03_cmd | default('N/A') }}"
    - "  Exit code: {{ task_03_rc | default(-1) }}"
    - "  Data: {{ data_03 | default('') | trim }}"
    - "  Status: {{ status_03 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_03 | default('') | trim }}"
    - ""
    - "========================================================"
    - "OVERALL COMPLIANCE:"
    - "  Result: {{ cis_result | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_03 | default('Not evaluated') | trim }}"
    - "=========================================================="
