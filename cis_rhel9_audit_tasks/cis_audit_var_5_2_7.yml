req_01: "Check if the su command is present on the system using command: `which su`. Expected result: su is installed."
req_02: |
  Check if the pam_wheel.so module is configured in /etc/pam.d/su with the required parameters using command: `grep -Pi '^\\h*auth\\h+(?:required|requisite)\\h+pam_wheel\\.so\\h+(?:[^#\\n\\r]+\\h+)?((?!\\2)(use_uid\\b|group=\\H+\\b))\\h+(?:[^#\\n\\r]+\\h+)?((?!\\1)(use_uid\\b|group=\\H+\\b))(\\h+.*)?$' /etc/pam.d/su`. Expected result: Output matches `auth required pam_wheel.so use_uid group=<group_name>`.
req_03: "Check that the group specified in <group_name> contains no users using command: `grep <group_name> /etc/group`. Expected result: Output format is `<group_name>:x:<GID>:` with no users listed after the Group ID field."
req_04: "Summarize overall compliance: PASS if both checks pass, SKIP if su is not installed, FAIL if su is installed but the pam_wheel.so configuration is missing or the group is not empty."
grep_cmd: |
  grep -Pi '^\h*auth\h+(?:required|requisite)\h+pam_wheel\.so\h+(?:[^#\n\r]+\h+)?((?!\2)(use_uid\b|group=\H+\b))\h+(?:[^#\n\r]+\h+)?((?!\1)(use_uid\b|group=\H+\b))(\h+.*)?$' /etc/pam.d/su
