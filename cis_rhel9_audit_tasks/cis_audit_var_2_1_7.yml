req_01: "Check if vsftpd package is installed using command: `rpm -q vsftpd`. Expected result: package vsftpd is not installed"
req_02: "If vsftpd package is installed and required for dependencies, check if vsftpd service is enabled using command: `systemctl is-enabled vsftpd.service 2>/dev/null | grep 'enabled'`. Expected result: Nothing should be returned"
req_03: "If vsftpd package is installed and required for dependencies, check if vsftpd service is active using command: `systemctl is-active vsftpd.service 2>/dev/null | grep '^active'`. Expected result: Nothing should be returned"
req_04: "Check if any other FTP server packages (e.g., proftpd, pure-ftpd) are installed and not authorized by local site policy using command: `rpm -q proftpd pure-ftpd 2>/dev/null`. Expected result: Packages should not be installed unless authorized"
req_05: "If any FTP server package is required for dependencies, verify that the dependent package is approved by local site policy and that stopping and masking the service and/or socket meets local site policy using command: `systemctl is-enabled <service>.service 2>/dev/null | grep 'enabled'` and `systemctl is-active <service>.service 2>/dev/null | grep '^active'`. Expected result: Service should not be enabled or active unless explicitly authorized"
req_06: "Summarize overall compliance status: Ensure that no unauthorized FTP server services are installed, enabled, or active, and that any required services are properly approved and configured per local site policy. Expected result: All checks pass"
req_07: "Store the final audit result in a variable named 'cis_result' using set_fact. Set cis_result to the overall compliance status (PASS/FAIL/SKIP/ERROR) derived from the last requirement's status variable."
other_ftp_packages: ['proftpd', 'pure-ftpd']
other_ftp_services: ['proftpd.service', 'pure-ftpd.service']
