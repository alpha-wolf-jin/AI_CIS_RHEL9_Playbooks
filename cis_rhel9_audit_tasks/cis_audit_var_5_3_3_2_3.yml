req_01: "Check if pwquality configuration files exist using command: `ls /etc/security/pwquality.conf /etc/security/pwquality.conf.d/*.conf 2>/dev/null`. Expected result: files exist."
req_02: |
  Check password complexity settings in pwquality configuration files using command: `grep -Psi -- '^\\h*(minclass|[dulo]credit)\\b' /etc/security/pwquality.conf /etc/security/pwquality.conf.d/*.conf`. Expected result: output shows minclass >= 4 and/or dcredit, ucredit, lcredit, ocredit set to negative values (e.g., -1).
req_03: |
  Check that minclass is not set to less than 4 and dcredit, ucredit, lcredit, ocredit are not set to 0 or greater in PAM configuration using command: `grep -Psi -- '^\\h*password\\h+(requisite|required|sufficient)\\h+pam_pwquality\\.so\\h+([^#\\n\\r]+\\h+)?(minclass=[0-3]|[dulo]credit=[^-]\\d*)\\b' /etc/pam.d/system-auth /etc/pam.d/password-auth`. Expected result: no output returned.
req_04: "Summarize overall compliance status: password complexity is configured according to policy if all previous checks pass."
req_05: "Store the final audit result in a variable named 'cis_result' using set_fact. Set cis_result to the overall compliance status (PASS/FAIL/SKIP/UNKNOWN) derived from the last requirement's status variable."
