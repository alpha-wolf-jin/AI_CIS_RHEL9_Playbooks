---
- name: Initialize meta data variables
  include_vars: cis_audit_var_3_2_4.yml

- name: "Snapshot - Create backup directory"
  ansible.builtin.file:
    path: "{{ backup_dir }}"
    state: directory
    mode: '0755'
  changed_when: false

- name: "Snapshot - Check if audit script exists"
  ansible.builtin.stat:
    path: "{{ audit_script }}"
  register: script_stat_pre

- name: "Snapshot - Backup audit script if exists"
  ansible.builtin.copy:
    src: "{{ audit_script }}"
    dest: "{{ backup_dir }}/audit_sctp.sh.bak"
    remote_src: yes
  when: "script_stat_pre.stat.exists"
  changed_when: false

- name: "Snapshot - Check if audit script marker exists"
  ansible.builtin.stat:
    path: "{{ audit_script_marker }}"
  register: marker_stat_pre

- name: "Snapshot - Backup audit script marker if exists"
  ansible.builtin.copy:
    src: "{{ audit_script_marker }}"
    dest: "{{ backup_dir }}/audit_sctp.marker.bak"
    remote_src: yes
  when: "marker_stat_pre.stat.exists"
  changed_when: false


- block:
  - name: "Req 01 - Place marker for audit script deployment"
    ansible.builtin.copy:
      dest: "{{ audit_script_marker }}"
      content: ""
      force: false
    changed_when: false
    failed_when: false

  - name: "Req 01 - Copy audit script to remote"
    ansible.builtin.copy:
      dest: "{{ audit_script }}"
      mode: '0700'
      content: "{{ audit_script_content }}"
    changed_when: false

  - name: "Req 01 - Execute audit script for sctp kernel module"
    ansible.builtin.shell: /bin/bash "{{ audit_script }}"
    args:
      executable: /bin/bash
    register: audit_result_01
    failed_when: false
    changed_when: false

  - name: "Req 01 - Store details from audit script execution"
    set_fact:
      task_01_name: "Execute CIS audit script for sctp module"
      task_01_cmd: "/bin/bash {{ audit_script }}"
      task_01_rc: "{{ audit_result_01.rc | default(-1) }}"
      data_01: "{{ audit_result_01.stdout | default('') | trim }}"
      status_01: "{{ ('PASS' if (audit_result_01.rc | default(-1) | int) == 0 else 'FAIL') | trim }}"
      details_01: "{{ ('Script executed successfully' if (audit_result_01.rc | default(-1) | int) == 0 else 'Script execution failed') | trim }}"

  always:
  - name: "Restore - Check if backup script file exists"
    ansible.builtin.stat:
      path: "{{ backup_dir }}/audit_sctp.sh.bak"
    register: script_bak_stat

  - name: "Restore - Overwrite script with original if backup exists"
    ansible.builtin.copy:
      src: "{{ backup_dir }}/audit_sctp.sh.bak"
      dest: "{{ audit_script }}"
      remote_src: yes
    when: "script_bak_stat.stat.exists"
    failed_when: false

  - name: "Restore - Remove backup script file"
    ansible.builtin.file:
      path: "{{ backup_dir }}/audit_sctp.sh.bak"
      state: absent
    changed_when: false

  - name: "Restore - Remove temporary script if no backup existed"
    ansible.builtin.file:
      path: "{{ audit_script }}"
      state: absent
    when: "not script_bak_stat.stat.exists"
    changed_when: false

  - name: "Restore - Check if backup marker file exists"
    ansible.builtin.stat:
      path: "{{ backup_dir }}/audit_sctp.marker.bak"
    register: marker_bak_stat

  - name: "Restore - Overwrite marker with original if backup exists"
    ansible.builtin.copy:
      src: "{{ backup_dir }}/audit_sctp.marker.bak"
      dest: "{{ audit_script_marker }}"
      remote_src: yes
    when: "marker_bak_stat.stat.exists"
    failed_when: false

  - name: "Restore - Remove backup marker file"
    ansible.builtin.file:
      path: "{{ backup_dir }}/audit_sctp.marker.bak"
      state: absent
    changed_when: false

  - name: "Restore - Remove temporary marker if no backup existed"
    ansible.builtin.file:
      path: "{{ audit_script_marker }}"
      state: absent
    when: "not marker_bak_stat.stat.exists"
    changed_when: false

- name: "Req 02 - Determine compliance status from audit output"
  set_fact:
    compliance_status: "{{ ('PASS' if '** PASS **' in (audit_result_01.stdout | default('')) else ('FAIL' if '** FAIL **' in (audit_result_01.stdout | default('')) else 'UNKNOWN')) | trim }}"

- name: "Req 02 - Store compliance details"
  set_fact:
    task_02_name: "Evaluate compliance from script output"
    task_02_cmd: "N/A"
    task_02_rc: "-1"
    data_02: "{{ compliance_status }}"
    status_02: "{{ compliance_status }}"
    details_02: "{{ ('Compliant' if compliance_status == 'PASS' else ('Non-compliant' if compliance_status == 'FAIL' else 'Unable to determine compliance')) | trim }}"

- name: "Req 03 - Store final audit result in cis_result"
  set_fact:
    cis_result: "{{ compliance_status }}"
    task_03_name: "Set cis_result variable"
    task_03_cmd: "N/A"
    task_03_rc: "0"
    data_03: "{{ compliance_status }}"
    status_03: "PASS"
    details_03: "{{ 'cis_result set to ' + compliance_status }}"

- name: "Req 04 - Generate audit report"
  set_fact:
    task_04_name: "Generate audit report via debug"
    task_04_cmd: "debug module"
    task_04_rc: "0"
    data_04: "Report displayed"
    status_04: "PASS"
    details_04: "Execution report generated"

- name: "Generate audit report"
  debug:
    msg:
    - "AUDIT REPORT — CIS 3.2.4"
    - "Reference: CIS Benchmark checkpoint 3.2.4"
    - ""
    - "REQUIREMENT 01 - {{ req_01 }}:"
    - "  Task: {{ task_01_name | default('Not recorded') }}"
    - "  Command: {{ task_01_cmd | default('N/A') }}"
    - "  Exit code: {{ task_01_rc | default(-1) }}"
    - "  Data: {{ data_01 | default('') | trim }}"
    - "  Status: {{ status_01 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_01 | default('') | trim }}"
    - ""
    - "REQUIREMENT 02 - {{ req_02 }}:"
    - "  Task: {{ task_02_name | default('Not recorded') }}"
    - "  Command: {{ task_02_cmd | default('N/A') }}"
    - "  Exit code: {{ task_02_rc | default(-1) }}"
    - "  Data: {{ data_02 | default('') | trim }}"
    - "  Status: {{ status_02 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_02 | default('') | trim }}"
    - ""
    - "REQUIREMENT 03 - {{ req_03 }}:"
    - "  Task: {{ task_03_name | default('Not recorded') }}"
    - "  Command: {{ task_03_cmd | default('N/A') }}"
    - "  Exit code: {{ task_03_rc | default(-1) }}"
    - "  Data: {{ data_03 | default('') | trim }}"
    - "  Status: {{ status_03 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_03 | default('') | trim }}"
    - ""
    - "REQUIREMENT 04 - {{ req_04 }}:"
    - "  Task: {{ task_04_name | default('Not recorded') }}"
    - "  Command: {{ task_04_cmd | default('N/A') }}"
    - "  Exit code: {{ task_04_rc | default(-1) }}"
    - "  Data: {{ data_04 | default('') | trim }}"
    - "  Status: {{ status_04 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_04 | default('') | trim }}"
    - ""
    - "========================================================"
    - "OVERALL COMPLIANCE:"
    - "  Result: {{ cis_result | default('UNKNOWN') | trim }}"
    - "========================================================"
