---
- name: Initialize meta data variables
  include_vars: cis_audit_var_5_3_3_1_1.yml

- name: "Initialize data variables"
  ansible.builtin.set_fact:
    data_01: "Not collected yet"
    status_01: "ERROR"
    details_01: "Not evaluated"
    data_02: "Not collected yet"
    status_02: "ERROR"
    details_02: "Not evaluated"
    data_03: "Not collected yet"
    status_03: "ERROR"
    details_03: "Not evaluated"
    data_04: "Not collected yet"
    status_04: "ERROR"
    details_04: "Not evaluated"
    data_05: "Not collected yet"
    status_05: "ERROR"
    details_05: "Not evaluated"
    task_01_name: "Not executed"
    task_01_cmd: "N/A"
    task_01_rc: -1

- name: "Req 01 - Check if pam_faillock is installed by checking /etc/security/faillock.conf"
  ansible.builtin.stat:
    path: /etc/security/faillock.conf
  register: result_01
  failed_when: false

- name: "Store requirement 01 details"
  ansible.builtin.set_fact:
    task_01_name: "Check if pam_faillock is installed via faillock.conf existence"
    task_01_cmd: "stat /etc/security/faillock.conf"
    task_01_rc: "{{ 0 if result_01.stat.exists | default(false) else 1 }}"
    data_01: "{{ 'faillock.conf exists' if result_01.stat.exists | default(false) else 'faillock.conf not found' }}"
    status_01: "{{ 'PASS' if result_01.stat.exists | default(false) else 'FAIL' }}"
    details_01: "{{ 'pam_faillock is installed' if result_01.stat.exists | default(false) else 'pam_faillock not found' }}"

- name: "Req 02 - Check deny parameter in faillock.conf"
  ansible.builtin.shell:
    cmd: grep -Pi -- '^\h*deny\h*=\h*[1-5]\b' /etc/security/faillock.conf
  args:
    executable: /bin/bash
  register: result_02
  failed_when: false
  changed_when: false
  when: result_01.stat.exists | default(false)

- name: "Store requirement 02 details"
  ansible.builtin.set_fact:
    task_02_name: "Check deny parameter value in faillock configuration file"
    task_02_cmd: |
      grep -Pi -- '^\\h*deny\\h*=\\h*[1-5]\\b' /etc/security/faillock.conf
    task_02_rc: "{{ result_02.rc | default(-1) }}"
    data_02: "{{ result_02.stdout | default('') | trim }}"
    status_02: "{{ 'SKIP' if result_02 is skipped else ('PASS' if (result_02.stdout | default('') | trim) != '' else 'FAIL') }}"
    details_02: "{{ 'Skipped (faillock not installed)' if result_02 is skipped else ('Deny parameter set to 5 or less' if (result_02.stdout | default('') | trim) != '' else 'Deny parameter not found or out of range') }}"

- name: "Req 03 - Check for invalid deny argument in PAM files"
  ansible.builtin.shell:
    cmd: grep -Pi -- '^\h*auth\h+(requisite|required|sufficient)\h+pam_faillock\.so\h+([^#\n\r]+\h+)?deny\h*=\h*(0|[6-9]|[1-9][0-9]+)\b' /etc/pam.d/system-auth /etc/pam.d/password-auth
  args:
    executable: /bin/bash
  register: result_03
  failed_when: false
  changed_when: false
  when: result_01.stat.exists | default(false)

- name: "Store requirement 03 details"
  ansible.builtin.set_fact:
    task_03_name: "Check for invalid deny argument in PAM auth files"
    task_03_cmd: |
      grep -Pi -- '^\\h*auth\\h+(requisite|required|sufficient)\\h+pam_faillock\\.so\\h+([^#\\n\\r]+\\h+)?deny\\h*=\\h*(0|[6-9]|[1-9][0-9]+)\\b' /etc/pam.d/system-auth /etc/pam.d/password-auth
    task_03_rc: "{{ result_03.rc | default(-1) }}"
    data_03: "{{ result_03.stdout | default('') | trim }}"
    status_03: "{{ 'SKIP' if result_03 is skipped else ('PASS' if (result_03.stdout | default('') | trim) == '' else 'FAIL') }}"
    details_03: "{{ 'Skipped (faillock not installed)' if result_03 is skipped else ('No invalid deny argument found' if (result_03.stdout | default('') | trim) == '' else 'Invalid deny argument detected in PAM files') }}"

- name: "Req 04 - Summarize overall compliance"
  ansible.builtin.set_fact:
    status_04: >-
      {%- if status_01 | default('FAIL') | trim == 'FAIL' -%}
        SKIP
      {%- elif status_02 | default('FAIL') | trim == 'PASS' and status_03 | default('FAIL') | trim == 'PASS' -%}
        PASS
      {%- else -%}
        FAIL
      {%- endif %}
    data_04: "Overall compliance determined"
    details_04: >-
      {{ 'pam_faillock not installed, overall compliance is SKIP' if status_01 | default('FAIL') | trim == 'FAIL' else ('All checks passed' if status_02 | default('FAIL') | trim == 'PASS' and status_03 | default('FAIL') | trim == 'PASS' else 'One or more checks failed') }}

- name: "Req 05 - Store final audit result in cis_result"
  ansible.builtin.set_fact:
    cis_result: "{{ status_04 | default('ERROR') | trim }}"
    task_05_name: "Store overall audit result"
    task_05_cmd: "set_fact"
    task_05_rc: 0
    data_05: "cis_result={{ status_04 | default('ERROR') | trim }}"
    status_05: "PASS"
    details_05: "cis_result stored successfully"

- name: "Generate audit report"
  ansible.builtin.debug:
    msg:
    - "AUDIT REPORT — CIS 5.3.3.1.1"
    - "Reference: CIS Benchmark checkpoint 5.3.3.1.1"
    - ""
    - "REQUIREMENT 01 - {{ req_01 }}:"
    - "  Task: {{ task_01_name | default('Not recorded') }}"
    - "  Command: {{ task_01_cmd | default('N/A') }}"
    - "  Exit code: {{ task_01_rc | default(-1) }}"
    - "  Data: {{ data_01 | default('') | trim }}"
    - "  Status: {{ status_01 | default('ERROR') | trim }}"
    - "  Details: {{ details_01 | default('') | trim }}"
    - ""
    - "REQUIREMENT 02 - {{ req_02 }}:"
    - "  Task: {{ task_02_name | default('Not recorded') }}"
    - "  Command: {{ task_02_cmd | default('N/A') }}"
    - "  Exit code: {{ task_02_rc | default(-1) }}"
    - "  Data: {{ data_02 | default('') | trim }}"
    - "  Status: {{ status_02 | default('ERROR') | trim }}"
    - "  Details: {{ details_02 | default('') | trim }}"
    - ""
    - "REQUIREMENT 03 - {{ req_03 }}:"
    - "  Task: {{ task_03_name | default('Not recorded') }}"
    - "  Command: {{ task_03_cmd | default('N/A') }}"
    - "  Exit code: {{ task_03_rc | default(-1) }}"
    - "  Data: {{ data_03 | default('') | trim }}"
    - "  Status: {{ status_03 | default('ERROR') | trim }}"
    - "  Details: {{ details_03 | default('') | trim }}"
    - ""
    - "REQUIREMENT 04 - {{ req_04 }}:"
    - "  Task: {{ task_04_name | default('Not recorded') }}"
    - "  Command: {{ task_04_cmd | default('N/A') }}"
    - "  Exit code: {{ task_04_rc | default(-1) }}"
    - "  Data: {{ data_04 | default('') | trim }}"
    - "  Status: {{ status_04 | default('ERROR') | trim }}"
    - "  Details: {{ details_04 | default('') | trim }}"
    - ""
    - "REQUIREMENT 05 - {{ req_05 }}:"
    - "  Task: {{ task_05_name | default('Not recorded') }}"
    - "  Command: {{ task_05_cmd | default('N/A') }}"
    - "  Exit code: {{ task_05_rc | default(-1) }}"
    - "  Data: {{ data_05 | default('') | trim }}"
    - "  Status: {{ status_05 | default('ERROR') | trim }}"
    - "  Details: {{ details_05 | default('') | trim }}"
    - ""
    - "========================================================"
    - "OVERALL COMPLIANCE:"
    - "  Result: {{ cis_result | default('ERROR') | trim }}"
    - "  Details: {{ details_04 | default('Not evaluated') | trim }}"
    - "========================================================"
