req_01: "Check if /etc/group file exists using command: `test -f /etc/group`. Expected result: exit code 0"
req_02: |
  Check that no group other than root is assigned GID 0 using command: `awk -F: '$3==\"0\"{print $1\":\"$3}' /etc/group`. Expected result: root:0
req_03: "Summarize overall compliance: PASS if all checks pass, SKIP if /etc/group does not exist, FAIL if any group other than root has GID 0."
req_04: "Store the final audit result in a variable named 'cis_result' using set_fact. Set cis_result to the overall compliance status (PASS/FAIL/SKIP/ERROR) derived from the last requirement's status variable."
