req_01: "Check if root user's .bash_profile and .bashrc files exist using command: `ls -la /root/.bash_profile /root/.bashrc 2>/dev/null`. Expected result: Files exist (no error)."
req_02: |
  Check if umask is set in /root/.bash_profile or /root/.bashrc to enforce newly created directories' permissions to be 750 (drwxr-x---) and files' permissions to be 640 (rw-r-----) or more restrictive using command: `grep -Psi -- '^\h*umask\h+(([0-7][0-7][01][0-7]\b|[0-7][0-7][0-7][0-6]\b)|([0-7][01][0-7]\b|[0-7][0-7][0-6]\b)|(u=[rwx]{1,3},)?(((g=[rx]?[rx]?w[rx]?[rx]?\b)(,o=[rwx]{1,3})?)|((g=[wrx]{1,3},)?o=[wrx]{1,3}\b)))' /root/.bash_profile /root/.bashrc`. Expected result: No output (nothing returned).
req_03: "Check the system default umask for root user using command: `umask`. Expected result: umask value is 027 or more restrictive (e.g., 077)."
req_04: "Summarize overall compliance status: If all previous checks pass, the root user umask is configured correctly. Otherwise, it is non-compliant."
req_05: "Store the final audit result in a variable named 'cis_result' using set_fact. Set cis_result to the overall compliance status (PASS/FAIL/SKIP/UNKNOWN) derived from the last requirement's status variable."
