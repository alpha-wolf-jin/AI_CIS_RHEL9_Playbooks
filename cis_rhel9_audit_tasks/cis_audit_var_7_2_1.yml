req_01: "Check if /etc/passwd exists using command: `test -f /etc/passwd`. Expected result: file exists."
req_02: "Check if /etc/shadow exists using command: `test -f /etc/shadow`. Expected result: file exists."
req_03: |
  Check that all accounts in /etc/passwd use shadowed passwords using command: `awk -F: '($2 != \"x\" ) { print \"User: \\\"\" $1 \"\\\" is not set to shadowed passwords \"}' /etc/passwd`. Expected result: no output returned.
req_04: "Summarize overall compliance: if all previous checks pass, the system is compliant with checkpoint 7.2.1."
