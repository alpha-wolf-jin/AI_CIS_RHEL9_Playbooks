---
- name: Initialize meta data variables
  include_vars: cis_audit_var_5_4_2_2.yml

- name: "Initialize data variables"
  set_fact:
    data_01: "Not collected yet"
    status_01: "ERROR"
    details_01: "Not evaluated"
    data_02: "Not collected yet"
    status_02: "ERROR"
    details_02: "Not evaluated"
    data_03: "Not collected yet"
    status_03: "ERROR"
    details_03: "Not evaluated"
    data_04: "Not collected yet"
    status_04: "ERROR"
    details_04: "Not evaluated"
    data_05: "Not collected yet"
    status_05: "ERROR"
    details_05: "Not evaluated"
    task_01_name: "Not executed"
    task_01_cmd: "N/A"
    task_01_rc: -1
    task_02_name: "Not executed"
    task_02_cmd: "N/A"
    task_02_rc: -1
    task_03_name: "Not executed"
    task_03_cmd: "N/A"
    task_03_rc: -1
    task_04_name: "Not executed"
    task_04_cmd: "N/A"
    task_04_rc: -1
    task_05_name: "Not executed"
    task_05_cmd: "N/A"
    task_05_rc: -1

- name: "Req 01 - Check if the system has /etc/passwd file"
  shell: test -f /etc/passwd
  args:
    executable: /bin/bash
  register: result_01
  failed_when: false
  changed_when: false

- name: "Store requirement 01 details"
  set_fact:
    task_01_name: "Check if the system has /etc/passwd file"
    task_01_cmd: "test -f /etc/passwd"
    task_01_rc: "{{ result_01.rc | default(-1) }}"
    data_01: "{{ 'File exists (exit 0)' if result_01.rc | default(-1) == 0 else 'File missing (exit ' ~ (result_01.rc | default(-1) | string) ~ ')' }}"
    status_01: "{{ 'PASS' if result_01.rc | default(-1) == 0 else 'FAIL' }}"
    details_01: "{{ 'Completed successfully' if result_01.rc | default(-1) == 0 else 'Failed to execute' }}"

- name: "Req 02 - Check root user's primary GID is 0"
  shell: |
    awk -F: '($1=="root") {print $1":"$4}' /etc/passwd
  args:
    executable: /bin/bash
  register: result_02
  failed_when: false
  changed_when: false

- name: "Store requirement 02 details"
  set_fact:
    task_02_name: "Check root user's primary GID is 0"
    task_02_cmd: |
      awk -F: '($1=="root") {print $1":"$4}' /etc/passwd
    task_02_rc: "{{ result_02.rc | default(-1) }}"
    data_02: "{{ result_02.stdout | default('') | trim }}"
    status_02: "{{ ('PASS' if (result_02.stdout | default('') | trim) == 'root:0' else 'FAIL') | trim }}"
    details_02: |
      {{ ('Compliant: root GID is 0' if (result_02.stdout | default('') | trim) == 'root:0' else 'Non-compliant: root GID is not 0: \"' ~ (result_02.stdout | default('') | trim) ~ '\"') | trim }}

- name: "Req 03 - Check no other user (excluding sync, shutdown, halt, operator) has GID 0"
  shell: |
    awk -F: '($1 !~ /^(sync|shutdown|halt|operator)/ && $4=="0") {print $1":"$4}' /etc/passwd
  args:
    executable: /bin/bash
  register: result_03
  failed_when: false
  changed_when: false

- name: "Store requirement 03 details"
  set_fact:
    task_03_name: "Check no other user has GID 0"
    task_03_cmd: |
      awk -F: '($1 !~ /^(sync|shutdown|halt|operator)/ && $4=="0") {print $1":"$4}' /etc/passwd
    task_03_rc: "{{ result_03.rc | default(-1) }}"
    data_03: "{{ result_03.stdout | default('') | trim }}"
    status_03: "{{ ('PASS' if (result_03.stdout | default('') | trim) == 'root:0' else 'FAIL') | trim }}"
    details_03: |
      {{ ('Compliant: only root:0 found' if (result_03.stdout | default('') | trim) == 'root:0' else 'Non-compliant: found \"' ~ (result_03.stdout | default('') | trim) ~ '\"') | trim }}

- name: "Req 04 - Summarize overall compliance"
  set_fact:
    task_04_name: "Summarize overall compliance"
    task_04_cmd: "N/A (evaluation)"
    task_04_rc: -1
    data_04: "Overall evaluation"
    status_04: >-
      {%- if status_01 | trim == 'FAIL' -%}
      SKIP
      {%- elif status_02 | trim == 'PASS' and status_03 | trim == 'PASS' -%}
      PASS
      {%- else -%}
      FAIL
      {%- endif -%}
    details_04: >-
      {%- if status_01 | trim == 'FAIL' -%}
      Passwd file does not exist, audit skipped
      {%- elif status_02 | trim == 'PASS' and status_03 | trim == 'PASS' -%}
      All checks passed
      {%- else -%}
      One or more checks failed
      {%- endif -%}

- name: "Req 05 - Store final audit result in cis_result"
  set_fact:
    task_05_name: "Store final audit result in cis_result"
    task_05_cmd: "N/A (evaluation)"
    task_05_rc: -1
    data_05: "Result stored"
    status_05: "{{ status_04 | trim }}"
    details_05: "Cis_result set to {{ status_04 | trim }}"
    cis_result: "{{ status_04 | trim }}"

- name: "Generate audit report"
  debug:
    msg:
    - "AUDIT REPORT — CIS 5.4.2.2"
    - "Reference: CIS Benchmark checkpoint 5.4.2.2"
    - ""
    - "REQUIREMENT 01 - {{ req_01 }}:"
    - "  Task: {{ task_01_name | default('Not recorded') }}"
    - "  Command: {{ task_01_cmd | default('N/A') }}"
    - "  Exit code: {{ task_01_rc | default(-1) }}"
    - "  Data: {{ data_01 | default('') | trim }}"
    - "  Status: {{ status_01 | default('ERROR') | trim }}"
    - "  Details: {{ details_01 | default('') | trim }}"
    - ""
    - "REQUIREMENT 02 - {{ req_02 }}:"
    - "  Task: {{ task_02_name | default('Not recorded') }}"
    - "  Command: {{ task_02_cmd | default('N/A') }}"
    - "  Exit code: {{ task_02_rc | default(-1) }}"
    - "  Data: {{ data_02 | default('') | trim }}"
    - "  Status: {{ status_02 | default('ERROR') | trim }}"
    - "  Details: {{ details_02 | default('') | trim }}"
    - ""
    - "REQUIREMENT 03 - {{ req_03 }}:"
    - "  Task: {{ task_03_name | default('Not recorded') }}"
    - "  Command: {{ task_03_cmd | default('N/A') }}"
    - "  Exit code: {{ task_03_rc | default(-1) }}"
    - "  Data: {{ data_03 | default('') | trim }}"
    - "  Status: {{ status_03 | default('ERROR') | trim }}"
    - "  Details: {{ details_03 | default('') | trim }}"
    - ""
    - "REQUIREMENT 04 - {{ req_04 }}:"
    - "  Task: {{ task_04_name | default('Not recorded') }}"
    - "  Command: {{ task_04_cmd | default('N/A') }}"
    - "  Exit code: {{ task_04_rc | default(-1) }}"
    - "  Data: {{ data_04 | default('') | trim }}"
    - "  Status: {{ status_04 | default('ERROR') | trim }}"
    - "  Details: {{ details_04 | default('') | trim }}"
    - ""
    - "REQUIREMENT 05 - {{ req_05 }}:"
    - "  Task: {{ task_05_name | default('Not recorded') }}"
    - "  Command: {{ task_05_cmd | default('N/A') }}"
    - "  Exit code: {{ task_05_rc | default(-1) }}"
    - "  Data: {{ data_05 | default('') | trim }}"
    - "  Status: {{ status_05 | default('ERROR') | trim }}"
    - "  Details: {{ details_05 | default('') | trim }}"
    - ""
    - "========================================================"
    - "OVERALL COMPLIANCE:"
    - "  Result: {{ cis_result | default('ERROR') | trim }}"
    - "  Details: {{ details_04 | default('Not evaluated') | trim }}"
    - "========================================================"
