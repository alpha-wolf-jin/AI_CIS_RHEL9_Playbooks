---
- name: Initialize meta data variables
  include_vars: cis_audit_var_1_3_1_2.yml

- name: "Initialize data variables"
  ansible.builtin.set_fact:
    data_01: "Not collected yet"
    status_01: "UNKNOWN"
    details_01: "Not evaluated"
    data_02: "Not collected yet"
    status_02: "UNKNOWN"
    details_02: "Not evaluated"
    data_03: "Not collected yet"
    status_03: "UNKNOWN"
    details_03: "Not evaluated"
    data_04: "Not collected yet"
    status_04: "UNKNOWN"
    details_04: "Not evaluated"
    task_01_name: "Not executed"
    task_01_cmd: "N/A"
    task_01_rc: -1
    task_02_name: "Not executed"
    task_02_cmd: "N/A"
    task_02_rc: -1
    task_03_name: "Not executed"
    task_03_cmd: "N/A"
    task_03_rc: -1
    task_04_name: "Not executed"
    task_04_cmd: "N/A"
    task_04_rc: -1

# Requirement 1
- name: "Req 01 - Check if grubby package is installed"
  ansible.builtin.shell: which grubby || rpm -q grubby || dpkg -l grubby
  args:
    executable: /bin/bash
  register: result_01
  failed_when: false
  changed_when: false

- name: "Store requirement 01 details"
  ansible.builtin.set_fact:
    task_01_name: "Check grubby installation"
    task_01_cmd: "which grubby || rpm -q grubby || dpkg -l grubby"
    task_01_rc: "{{ result_01.rc | default(-1) }}"
    data_01: "{{ result_01.stdout | default('') | trim }}"
    status_01: "{{ 'PASS' if (result_01.rc | default(-1)) == 0 and (result_01.stdout | default('') | trim) | length > 0 else 'FAIL' | trim }}"
    details_01: "{{ 'grubby is installed' if (result_01.rc | default(-1)) == 0 and (result_01.stdout | default('') | trim) | length > 0 else 'grubby is NOT installed' | trim }}"

- name: "Set grubby installed flag"
  ansible.builtin.set_fact:
    grubby_installed: "{{ status_01 == 'PASS' }}"

# Requirement 2
- name: "Req 02 - Check SELinux is not disabled in bootloader configuration"
  ansible.builtin.shell: grubby --info=ALL | grep -Po '(selinux|enforcing)=0\b'
  args:
    executable: /bin/bash
  register: result_02
  failed_when: false
  changed_when: false
  when: grubby_installed | bool

- name: "Store requirement 02 details"
  ansible.builtin.set_fact:
    task_02_name: "Check SELinux bootloader parameters"
    task_02_cmd: |
      grubby --info=ALL | grep -Po '(selinux|enforcing)=0\\b'
    task_02_rc: "{{ result_02.rc | default(-1) if grubby_installed | bool else -1 }}"
    data_02: "{{ result_02.stdout | default('') | trim if grubby_installed | bool else 'N/A' }}"
    status_02: "{{ 'NOT_APPLICABLE' if not (grubby_installed | bool) else ('PASS' if result_02.stdout | default('') | trim == '' else 'FAIL') | trim }}"
    details_02: "{{ 'grubby not installed – audit not applicable' if not (grubby_installed | bool) else ('No bootloader disabling parameters found' if result_02.stdout | default('') | trim == '' else 'Bootloader has selinux=0 or enforcing=0 parameters') | trim }}"

# Requirement 3 – overall compliance
- name: "Req 03 - Evaluate overall compliance"
  ansible.builtin.set_fact:
    task_03_name: "Evaluate compliance"
    task_03_cmd: "N/A"
    task_03_rc: 0
    data_03: "Compliance derived from previous checks"
    status_03: "{{ 'NOT_APPLICABLE' if status_02 == 'NOT_APPLICABLE' else ('PASS' if status_01 == 'PASS' and status_02 == 'PASS' else 'FAIL') | trim }}"
    details_03: "{{ 'Audit not applicable – grubby not installed' if status_02 == 'NOT_APPLICABLE' else ('SELinux bootloader configuration is compliant' if status_01 == 'PASS' and status_02 == 'PASS' else 'Non-compliant – ' ~ ('grubby not installed' if status_01 != 'PASS' else 'selinux/enforcing=0 found' if status_02 == 'FAIL' else 'check skipped')) | trim }}"

# Requirement 4 – store cis_result
- name: "Req 04 - Store final cis_result"
  ansible.builtin.set_fact:
    cis_result: "{{ status_03 }}"
    task_04_name: "Store final cis_result"
    task_04_cmd: "set_fact: cis_result = {{ status_03 }}"
    task_04_rc: 0
    data_04: "{{ status_03 | default('') | trim }}"
    status_04: "{{ 'PASS' if status_03 is defined else 'FAIL' | trim }}"
    details_04: "{{ ('cis_result stored as ' ~ status_03) if status_03 is defined else 'Failed to determine overall compliance' | trim }}"

# Generate audit report
- name: "Generate audit report"
  ansible.builtin.debug:
    msg:
    - "AUDIT REPORT — CIS 1.3.1.2"
    - "Reference: CIS Benchmark checkpoint 1.3.1.2"
    - ""
    - "REQUIREMENT 01 - {{ req_01 }}:"
    - "  Task: {{ task_01_name | default('Not recorded') }}"
    - "  Command: {{ task_01_cmd | default('N/A') }}"
    - "  Exit code: {{ task_01_rc | default(-1) }}"
    - "  Data: {{ data_01 | default('') | trim }}"
    - "  Status: {{ status_01 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_01 | default('') | trim }}"
    - ""
    - "REQUIREMENT 02 - {{ req_02 }}:"
    - "  Task: {{ task_02_name | default('Not recorded') }}"
    - "  Command: {{ task_02_cmd | default('N/A') }}"
    - "  Exit code: {{ task_02_rc | default(-1) }}"
    - "  Data: {{ data_02 | default('') | trim }}"
    - "  Status: {{ status_02 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_02 | default('') | trim }}"
    - ""
    - "REQUIREMENT 03 - {{ req_03 }}:"
    - "  Task: {{ task_03_name | default('Not recorded') }}"
    - "  Command: {{ task_03_cmd | default('N/A') }}"
    - "  Exit code: {{ task_03_rc | default(-1) }}"
    - "  Data: {{ data_03 | default('') | trim }}"
    - "  Status: {{ status_03 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_03 | default('') | trim }}"
    - ""
    - "REQUIREMENT 04 - {{ req_04 }}:"
    - "  Task: {{ task_04_name | default('Not recorded') }}"
    - "  Command: {{ task_04_cmd | default('N/A') }}"
    - "  Exit code: {{ task_04_rc | default(-1) }}"
    - "  Data: {{ data_04 | default('') | trim }}"
    - "  Status: {{ status_04 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_04 | default('') | trim }}"
    - ""
    - "========================================================"
    - "OVERALL COMPLIANCE:"
    - "  Result: {{ cis_result | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_03 | default('Not evaluated') | trim }}"
    - "========================================================"
