req_01: "Check if grubby is installed using command: `which grubby`. Expected result: grubby is present."
req_02: "Check if /etc/default/grub exists using command: `test -f /etc/default/grub && echo 'EXISTS'`. Expected result: EXISTS"
req_03: |
  Check audit_backlog_limit parameter in current kernel command line using command: `grubby --info=ALL | grep -Po '\\baudit_backlog_limit=\\d+\\b'`. Expected result: audit_backlog_limit=<BACKLOG SIZE> with value >= 8192.
req_04: |
  Check audit_backlog_limit parameter in /etc/default/grub using command: `grep -Psoi -- '^\\h*GRUB_CMDLINE_LINUX=\"([^#\\n\\r]+\\h+)?\\baudit_backlog_limit=\\d+\\b' /etc/default/grub`. Expected result: GRUB_CMDLINE_LINUX=\"... audit_backlog_limit=8192 ...\" or larger.
req_05: "Summarize overall compliance: PASS if all checks pass, SKIP if grubby is not installed or /etc/default/grub does not exist, FAIL if the feature exists but audit_backlog_limit is missing or less than 8192."
req_06: "Store the final audit result in a variable named 'cis_result' using set_fact. Set cis_result to the overall compliance status (PASS/FAIL/SKIP/ERROR) derived from the last requirement's status variable."
