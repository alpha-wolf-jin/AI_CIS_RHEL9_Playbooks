---
- name: Initialize meta data variables
  include_vars: cis_audit_var_3_3_11.yml

- name: "Snapshot - check if audit script exists"
  ansible.builtin.stat:
    path: "{{ audit_script }}"
  register: audit_script_stat_before
  changed_when: false


- block:
  - name: "Req 01 - Copy audit script to target"
    ansible.builtin.copy:
      dest: "{{ audit_script }}"
      content: "{{ audit_script_content }}"
      mode: '0700'
    changed_when: false

  - name: "Req 01 - Execute audit script"
    ansible.builtin.shell: /bin/bash "{{ audit_script }}"
    args:
      executable: /bin/bash
    register: audit_result
    failed_when: false
    changed_when: false

  - name: "Store requirement 01 details"
    set_fact:
      task_01_name: "Execute CIS 3.3.11 audit script"
      task_01_cmd: "/bin/bash {{ audit_script }}"
      task_01_rc: "{{ audit_result.rc | default(-1) }}"
      data_01: "{{ audit_result.stdout | default('') | trim }}"
      status_01: "{{ 'PASS' if '** PASS **' in audit_result.stdout else 'FAIL' if '** FAIL **' in audit_result.stdout else 'UNKNOWN' }}"
      details_01: "{{ 'Audit script executed successfully and full audit result obtained' if '** PASS **' in audit_result.stdout or '** FAIL **' in audit_result.stdout else 'Audit script failed to produce full audit result' }}"
      compliance_flag: "{{ 'PASS' if '** PASS **' in audit_result.stdout else 'FAIL' if '** FAIL **' in audit_result.stdout else 'UNKNOWN' }}"

  - name: "Req 02 - Verify compliance status"
    set_fact:
      status_02: "{{ compliance_flag | default('UNKNOWN') | trim }}"
      data_02: "{{ audit_result.stdout | default('') | trim }}"
      details_02: "{{ 'System is compliant' if compliance_flag == 'PASS' else 'System is not compliant' if compliance_flag == 'FAIL' else 'Compliance cannot be determined' }}"

  - name: "Req 03 - Store overall compliance result in cis_result"
    set_fact:
      cis_result: "{{ status_02 | default('UNKNOWN') | trim }}"
      task_03_name: "Store cis_result variable"
      task_03_cmd: "set_fact"
      task_03_rc: 0

  - name: "Store requirement 03 details (derived from cis_result)"
    set_fact:
      data_03: "{{ cis_result | default('UNKNOWN') | trim }}"
      status_03: "PASS"
      details_03: "Overall compliance result stored"

  always:
  - name: "Restore - remove audit script if it was not present before"
    ansible.builtin.file:
      path: "{{ audit_script }}"
      state: absent
    when: not audit_script_stat_before.stat.exists
    changed_when: false
    failed_when: false

- name: "Req 04 - Prepare report generation status"
  set_fact:
    task_04_name: "Generate audit report"
    task_04_cmd: "debug msg"
    task_04_rc: 0
    data_04: "Audit report will be generated"
    status_04: "PASS"
    details_04: "Report generation task executed"

- name: "Generate audit report"
  ansible.builtin.debug:
    msg:
    - "AUDIT REPORT — CIS 3.3.11"
    - "Reference: CIS Benchmark checkpoint 3.3.11"
    - ""
    - "REQUIREMENT 01 - {{ req_01 | trim }}:"
    - "  Task: {{ task_01_name | default('Not recorded') }}"
    - "  Command: {{ task_01_cmd | default('N/A') }}"
    - "  Exit code: {{ task_01_rc | default(-1) }}"
    - "  Data: {{ data_01 | default('') | trim }}"
    - "  Status: {{ status_01 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_01 | default('') | trim }}"
    - ""
    - "REQUIREMENT 02 - {{ req_02 }}:"
    - "  Task: Verify compliance"
    - "  Command: N/A"
    - "  Exit code: 0"
    - "  Data: {{ data_02 | default('') | trim }}"
    - "  Status: {{ status_02 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_02 | default('') | trim }}"
    - ""
    - "REQUIREMENT 03 - {{ req_03 }}:"
    - "  Task: {{ task_03_name | default('Not recorded') }}"
    - "  Command: {{ task_03_cmd | default('N/A') }}"
    - "  Exit code: {{ task_03_rc | default(-1) }}"
    - "  Data: {{ data_03 | default('') | trim }}"
    - "  Status: {{ status_03 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_03 | default('') | trim }}"
    - ""
    - "REQUIREMENT 04 - {{ req_04 }}:"
    - "  Task: {{ task_04_name | default('Not recorded') }}"
    - "  Command: {{ task_04_cmd | default('N/A') }}"
    - "  Exit code: {{ task_04_rc | default(-1) }}"
    - "  Data: {{ data_04 | default('') | trim }}"
    - "  Status: {{ status_04 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_04 | default('') | trim }}"
    - ""
    - "========================================================"
    - "OVERALL COMPLIANCE:"
    - "  Result: {{ cis_result | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_02 | default('Not evaluated') | trim }}"
    - "========================================================"
