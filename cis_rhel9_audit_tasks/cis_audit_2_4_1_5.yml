---
- name: Initialize meta data variables
  include_vars: cis_audit_var_2_4_1_5.yml

- name: "Initialize data variables"
  set_fact:
    data_01: ""
    status_01: "ERROR"
    details_01: ""
    data_02: ""
    status_02: "ERROR"
    details_02: ""
    data_03: ""
    status_03: "ERROR"
    details_03: ""
    data_04: ""
    status_04: "ERROR"
    details_04: ""
    task_01_name: ""
    task_01_cmd: ""
    task_01_rc: "-1"
    task_02_name: ""
    task_02_cmd: ""
    task_02_rc: "-1"
    task_03_name: ""
    task_03_cmd: ""
    task_03_rc: "-1"
    task_04_name: ""
    task_04_cmd: ""
    task_04_rc: "-1"

- name: "Req 01 - Check if cron is installed"
  shell: dpkg -l cron 2>/dev/null || rpm -q cron 2>/dev/null
  args:
    executable: /bin/bash
  register: result_01
  failed_when: false
  changed_when: false

- name: "Store requirement 01 details"
  set_fact:
    cron_installed: "{{ result_01.rc == 0 }}"
    data_01: "{{ result_01.stdout | default('') | trim }}"
    status_01: "{{ 'PASS' if result_01.rc == 0 else 'SKIP' }}"
    details_01: "{{ 'cron is installed' if result_01.rc == 0 else 'cron is not installed; audit not applicable' }}"
    task_01_name: "Req 01 - Check if cron is installed"
    task_01_cmd: "dpkg -l cron 2>/dev/null || rpm -q cron 2>/dev/null"
    task_01_rc: "{{ result_01.rc | default(-1) }}"

- name: "Req 02 - Check permissions on /etc/cron.weekly"
  shell: "{{ stat_cmd }}"
  args:
    executable: /bin/bash
  register: result_02
  failed_when: false
  changed_when: false
  when: cron_installed | bool

- name: "Store requirement 02 details"
  set_fact:
    data_02: "{{ 'N/A' if not cron_installed | bool else result_02.stdout | default('') | trim }}"
    status_02: "{{ 'SKIP' if not cron_installed | bool else ('PASS' if (result_02.stdout | default('') | trim) == expected_perms else 'FAIL') }}"
    details_02: "{{ 'cron not installed; audit not applicable' if not cron_installed | bool else ('Permissions match expected' if (result_02.stdout | default('') | trim) == expected_perms else 'Permissions do not match expected') }}"
    task_02_name: "Req 02 - Check permissions on /etc/cron.weekly"
    task_02_cmd: "{{ stat_cmd }}"
    task_02_rc: "{{ '-1' if not cron_installed | bool else result_02.rc | default(-1) }}"

- name: "Req 03 - Determine overall compliance status"
  set_fact:
    status_03: >-
      {{ 'SKIP' if not cron_installed | bool
         else 'PASS' if (status_01 == 'PASS' and status_02 == 'PASS')
         else 'FAIL' }}
    details_03: >-
      {{ 'Cron is not installed; audit not applicable' if not cron_installed | bool
         else 'All checks passed' if (status_01 == 'PASS' and status_02 == 'PASS')
         else 'One or more checks failed' }}
    data_03: "Computed"
    task_03_name: "Req 03 - Summarize overall compliance"
    task_03_cmd: "N/A"
    task_03_rc: "0"

- name: "Req 04 - Store final audit result in cis_result"
  set_fact:
    cis_result: "{{ status_03 }}"
    data_04: "cis_result set to {{ status_03 }}"
    status_04: "PASS"
    details_04: "Variable stored successfully"
    task_04_name: "Req 04 - Store final audit result"
    task_04_cmd: "set_fact cis_result"
    task_04_rc: "0"

- name: "Generate audit report"
  debug:
    msg:
    - "AUDIT REPORT — CIS 2.4.1.5"
    - "Reference: CIS Benchmark checkpoint 2.4.1.5"
    - ""
    - "REQUIREMENT 01 - {{ req_01 }}:"
    - "  Task: {{ task_01_name | default('Not recorded') }}"
    - "  Command: {{ task_01_cmd | default('N/A') }}"
    - "  Exit code: {{ task_01_rc | default('-1') }}"
    - "  Data: {{ data_01 | default('') | trim }}"
    - "  Status: {{ status_01 | default('ERROR') | trim }}"
    - "  Details: {{ details_01 | default('') | trim }}"
    - ""
    - "REQUIREMENT 02 - {{ req_02 }}:"
    - "  Task: {{ task_02_name | default('Not recorded') }}"
    - "  Command: {{ task_02_cmd | default('N/A') }}"
    - "  Exit code: {{ task_02_rc | default('-1') }}"
    - "  Data: {{ data_02 | default('') | trim }}"
    - "  Status: {{ status_02 | default('ERROR') | trim }}"
    - "  Details: {{ details_02 | default('') | trim }}"
    - ""
    - "REQUIREMENT 03 - {{ req_03 }}:"
    - "  Task: {{ task_03_name | default('Not recorded') }}"
    - "  Command: {{ task_03_cmd | default('N/A') }}"
    - "  Exit code: {{ task_03_rc | default('-1') }}"
    - "  Data: {{ data_03 | default('') | trim }}"
    - "  Status: {{ status_03 | default('ERROR') | trim }}"
    - "  Details: {{ details_03 | default('') | trim }}"
    - ""
    - "REQUIREMENT 04 - {{ req_04 }}:"
    - "  Task: {{ task_04_name | default('Not recorded') }}"
    - "  Command: {{ task_04_cmd | default('N/A') }}"
    - "  Exit code: {{ task_04_rc | default('-1') }}"
    - "  Data: {{ data_04 | default('') | trim }}"
    - "  Status: {{ status_04 | default('ERROR') | trim }}"
    - "  Details: {{ details_04 | default('') | trim }}"
    - ""
    - "OVERALL COMPLIANCE:"
    - "  Result: {{ cis_result | default('ERROR') | trim }}"
    - "  Details: {{ details_03 | default('Not evaluated') | trim }}"
