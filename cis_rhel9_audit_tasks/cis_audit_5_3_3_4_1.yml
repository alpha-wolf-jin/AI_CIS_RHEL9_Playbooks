---
- name: Initialize meta data variables
  include_vars: cis_audit_var_5_3_3_4_1.yml

- name: "Initialize data variables"
  set_fact:
    data_01: "Not collected yet"
    status_01: "UNKNOWN"
    details_01: "Not evaluated"
    data_02: "Not collected yet"
    status_02: "UNKNOWN"
    details_02: "Not evaluated"
    data_03: "Not collected yet"
    status_03: "UNKNOWN"
    details_03: "Not evaluated"
    data_04: "Not collected yet"
    status_04: "UNKNOWN"
    details_04: "Not evaluated"
    task_01_name: "Not executed"
    task_01_cmd: "N/A"
    task_01_rc: -1
    task_02_name: "Not executed"
    task_02_cmd: "N/A"
    task_02_rc: -1
    task_03_name: "Not executed"
    task_03_cmd: "N/A"
    task_03_rc: -1
    task_04_name: "Not executed"
    task_04_cmd: "N/A"
    task_04_rc: -1
  tags: [execute]
- name: "Gather package facts"
  ansible.builtin.package_facts:
    manager: auto
  failed_when: false
  tags: [execute]
- name: "Check if PAM package is installed"
  set_fact:
    pam_installed: "{{ 'pam' in ansible_facts.packages }}"
    playbook_skipped: "{{ 'pam' not in ansible_facts.packages }}"
  tags: [execute]
- name: "Req 01 - Check if pam_unix.so is configured in PAM files"
  ansible.builtin.shell: grep -P -- '^\h*(auth|account|password|session)\h+(requisite|required|sufficient)\h+pam_unix\.so\b' /etc/pam.d/password-auth /etc/pam.d/system-auth
  args:
    executable: /bin/bash
  register: result_01
  failed_when: false
  changed_when: false
  when: pam_installed | default(false)
  tags: [execute]
- name: "Store requirement 01 details"
  set_fact:
    task_01_name: "Check if pam_unix.so is configured in PAM files"
    task_01_cmd: |
      grep -P -- '^\\h*(auth|account|password|session)\\h+(requisite|required|sufficient)\\h+pam_unix\\.so\\b' /etc/pam.d/password-auth /etc/pam.d/system-auth
    task_01_rc: "{{ result_01.rc | default(-1) }}"
    data_01: "{{ result_01.stdout | default('') | trim }}"
    status_01: >-
      {%- if not (pam_installed | default(false)) -%}
        SKIP
      {%- elif result_01.rc | default(-1) == 0 -%}
        PASS
      {%- else -%}
        FAIL
      {%- endif -%}
    details_01: >-
      {%- if not (pam_installed | default(false)) -%}
        Skipped: PAM package not installed
      {%- elif result_01.rc | default(-1) == 0 -%}
        Command executed successfully
      {%- else -%}
        Command failed with exit code {{ result_01.rc | default(-1) }}
      {%- endif -%}
  tags: [execute]
- name: "Req 02 - Check that none of the returned lines include nullok"
  ansible.builtin.shell: grep -P -- '^\h*(auth|account|password|session)\h+(requisite|required|sufficient)\h+pam_unix\.so\b' /etc/pam.d/password-auth /etc/pam.d/system-auth | grep nullok
  args:
    executable: /bin/bash
  register: result_02
  failed_when: false
  changed_when: false
  when: pam_installed | default(false)
  tags: [execute]
- name: "Store requirement 02 details"
  set_fact:
    task_02_name: "Check that none of the returned lines include nullok"
    task_02_cmd: |
      grep -P -- '^\\h*(auth|account|password|session)\\h+(requisite|required|sufficient)\\h+pam_unix\\.so\\b' /etc/pam.d/password-auth /etc/pam.d/system-auth | grep nullok
    task_02_rc: "{{ result_02.rc | default(-1) }}"
    data_02: "{{ result_02.stdout | default('') | trim }}"
    status_02: >-
      {%- if not (pam_installed | default(false)) -%}
        SKIP
      {%- elif result_02.rc | default(-1) == 1 -%}
        PASS
      {%- elif result_02.rc | default(-1) == 0 -%}
        FAIL
      {%- else -%}
        UNKNOWN
      {%- endif -%}
    details_02: >-
      {%- if not (pam_installed | default(false)) -%}
        Skipped: PAM package not installed
      {%- elif result_02.rc | default(-1) == 1 -%}
        No nullok argument found
      {%- elif result_02.rc | default(-1) == 0 -%}
        nullok argument found: {{ result_02.stdout | default('') }}
      {%- else -%}
        Command returned unexpected exit code {{ result_02.rc | default(-1) }}
      {%- endif -%}
  tags: [execute]
- name: "Req 03 - Verify overall compliance"
  set_fact:
    task_03_name: "Verify overall compliance"
    task_03_cmd: "N/A (derived from previous checks)"
    task_03_rc: 0
    data_03: >-
      {%- if status_01 == 'SKIP' -%}
        Not applicable (package not installed)
      {%- elif status_02 == 'FAIL' -%}
        nullok argument present in pam_unix.so configuration
      {%- elif status_01 == 'PASS' and status_02 == 'PASS' -%}
        pam_unix.so is configured without nullok argument
      {%- else -%}
        Compliance check completed
      {%- endif -%}
    status_03: >-
      {%- if status_01 == 'SKIP' -%}
        SKIP
      {%- elif status_02 == 'FAIL' -%}
        FAIL
      {%- else -%}
        PASS
      {%- endif -%}
    details_03: >-
      {%- if status_01 == 'SKIP' -%}
        SKIP: PAM not installed
      {%- elif status_02 == 'FAIL' -%}
        FAIL: nullok found in PAM configuration
      {%- elif status_01 == 'PASS' and status_02 == 'PASS' -%}
        PASS: No nullok in pam_unix.so configuration
      {%- else -%}
        COMPLIANCE: Unable to determine fully
      {%- endif -%}
  tags: [execute]
- name: "Req 04 - Store final audit result"
  set_fact:
    cis_result: "{{ status_03 }}"
    task_04_name: "Store final audit result"
    task_04_cmd: "N/A"
    task_04_rc: 0
    data_04: "{{ status_03 }}"
    status_04: "{{ status_03 }}"
    details_04: "{{ details_03 }}"
  tags: [execute]
- name: "Generate audit report"
  debug:
    msg:
    - "AUDIT REPORT — CIS 5.3.3.4.1"
    - "Reference: CIS Benchmark checkpoint 5.3.3.4.1"
    - ""
    - "REQUIREMENT 01 - {{ req_01 }}:"
    - "  Task: {{ task_01_name | default('Not recorded') }}"
    - "  Command: {{ task_01_cmd | default('N/A') }}"
    - "  Exit code: {{ task_01_rc | default(-1) }}"
    - "  Data: {{ data_01 | default('') | trim }}"
    - "  Status: {{ status_01 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_01 | default('') | trim }}"
    - ""
    - "REQUIREMENT 02 - {{ req_02 }}:"
    - "  Task: {{ task_02_name | default('Not recorded') }}"
    - "  Command: {{ task_02_cmd | default('N/A') }}"
    - "  Exit code: {{ task_02_rc | default(-1) }}"
    - "  Data: {{ data_02 | default('') | trim }}"
    - "  Status: {{ status_02 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_02 | default('') | trim }}"
    - ""
    - "REQUIREMENT 03 - {{ req_03 }}:"
    - "  Task: {{ task_03_name | default('Not recorded') }}"
    - "  Command: {{ task_03_cmd | default('N/A') }}"
    - "  Exit code: {{ task_03_rc | default(-1) }}"
    - "  Data: {{ data_03 | default('') | trim }}"
    - "  Status: {{ status_03 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_03 | default('') | trim }}"
    - ""
    - "REQUIREMENT 04 - {{ req_04 }}:"
    - "  Task: {{ task_04_name | default('Not recorded') }}"
    - "  Command: {{ task_04_cmd | default('N/A') }}"
    - "  Exit code: {{ task_04_rc | default(-1) }}"
    - "  Data: {{ data_04 | default('') | trim }}"
    - "  Status: {{ status_04 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_04 | default('') | trim }}"
    - ""
    - "========================================================"
    - "OVERALL COMPLIANCE:"
    - "  Result: {{ cis_result | default('UNKNOWN') }}"
    - "========================================================"
  tags: [execute]
