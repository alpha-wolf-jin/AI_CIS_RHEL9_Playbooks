---
- name: Initialize meta data variables
  include_vars: cis_audit_var_6_3_3_21.yml

- name: "Req 01 - Check auditd package installed"
  ansible.builtin.shell: dpkg -l auditd 2>/dev/null || rpm -q audit 2>/dev/null
  args:
    executable: /bin/bash
  register: result_01
  failed_when: false
  changed_when: false

- name: "Req 02 - Check augenrules availability"
  ansible.builtin.shell: which augenrules
  args:
    executable: /bin/bash
  register: result_02
  failed_when: false
  changed_when: false

- name: "Req 03 - Check rules.d directory"
  ansible.builtin.shell: ls -d /etc/audit/rules.d
  args:
    executable: /bin/bash
  register: result_03
  failed_when: false
  changed_when: false

- name: "Req 04 - Check audit.rules file"
  ansible.builtin.shell: ls -l /etc/audit/audit.rules
  args:
    executable: /bin/bash
  register: result_04
  failed_when: false
  changed_when: false

- name: "Req 05 - Check merged rules with augenrules"
  ansible.builtin.shell: augenrules --check 2>&1
  args:
    executable: /bin/bash
  register: result_05
  failed_when: false
  changed_when: false

- name: "Assess all requirements and set cis_result"
  ansible.builtin.set_fact:
    task_01_name: "Req 01 - Check auditd installed"
    task_01_cmd: "dpkg -l auditd 2>/dev/null || rpm -q audit 2>/dev/null"
    task_01_rc: "{{ result_01.rc | default(-1) }}"
    data_01: "{{ result_01.stdout | default('') | trim }}"
    status_01: "{{ 'PASS' if result_01.rc | default(-1) == 0 else 'FAIL' }}"
    details_01: "{{ 'Package installed' if result_01.rc | default(-1) == 0 else 'Package auditd/audit not found' }}"

    task_02_name: "Req 02 - Check augenrules available"
    task_02_cmd: "which augenrules"
    task_02_rc: "{{ result_02.rc | default(-1) }}"
    data_02: "{{ result_02.stdout | default('') | trim }}"
    status_02: "{{ 'SKIPPED' if result_01.rc | default(-1) != 0 else ('PASS' if result_02.rc | default(-1) == 0 else 'FAIL') }}"
    details_02: "{{ 'NOT_APPLICABLE: auditd missing' if result_01.rc | default(-1) != 0 else ('Binary found: ' + result_02.stdout | default('') | trim if result_02.rc | default(-1) == 0 else 'augenrules not found') }}"

    task_03_name: "Req 03 - Check rules.d directory"
    task_03_cmd: "ls -d /etc/audit/rules.d"
    task_03_rc: "{{ result_03.rc | default(-1) }}"
    data_03: "{{ result_03.stdout | default('') | trim }}"
    status_03: "{{ 'SKIPPED' if result_01.rc | default(-1) != 0 else ('PASS' if result_03.rc | default(-1) == 0 else 'FAIL') }}"
    details_03: "{{ 'NOT_APPLICABLE: auditd missing' if result_01.rc | default(-1) != 0 else ('Directory exists' if result_03.rc | default(-1) == 0 else 'Directory does not exist or inaccessible') }}"

    task_04_name: "Req 04 - Check audit.rules file"
    task_04_cmd: "ls -l /etc/audit/audit.rules"
    task_04_rc: "{{ result_04.rc | default(-1) }}"
    data_04: "{{ result_04.stdout | default('') | trim }}"
    status_04: "{{ 'SKIPPED' if result_01.rc | default(-1) != 0 else ('PASS' if result_04.rc | default(-1) == 0 else 'FAIL') }}"
    details_04: "{{ 'NOT_APPLICABLE: auditd missing' if result_01.rc | default(-1) != 0 else ('File exists' if result_04.rc | default(-1) == 0 else 'File does not exist or inaccessible') }}"

    task_05_name: "Req 05 - Check merged rules"
    task_05_cmd: "augenrules --check"
    task_05_rc: "{{ result_05.rc | default(-1) }}"
    data_05: "{{ result_05.stdout | default('') | trim }}"
    status_05: "{{ 'SKIPPED' if result_01.rc | default(-1) != 0 else ('PASS' if ('No change' in result_05.stdout | default('')) else 'FAIL') }}"
    details_05: "{{ 'NOT_APPLICABLE: auditd missing' if result_01.rc | default(-1) != 0 else ('Rules are merged (No change)' if ('No change' in result_05.stdout | default('')) else 'Drift detected') }}"

    cis_result: "{{ 'SKIPPED' if result_01.rc | default(-1) != 0 else ('PASS' if (result_02.rc | default(-1) == 0 and result_03.rc | default(-1) == 0 and result_04.rc | default(-1) == 0 and ('No change' in result_05.stdout | default(''))) else 'FAIL') }}"

- name: "Generate audit report"
  ansible.builtin.debug:
    msg:
    - "AUDIT REPORT — CIS 6.3.3.21"
    - "Reference: CIS Benchmark checkpoint 6.3.3.21"
    - ""
    - "REQUIREMENT 01 - {{ req_01 }}:"
    - "  Task: {{ task_01_name | default('Not recorded') }}"
    - "  Command: {{ task_01_cmd | default('N/A') }}"
    - "  Exit code: {{ task_01_rc | default(-1) }}"
    - "  Data: {{ data_01 | default('') | trim }}"
    - "  Status: {{ status_01 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_01 | default('') | trim }}"
    - ""
    - "REQUIREMENT 02 - {{ req_02 }}:"
    - "  Task: {{ task_02_name | default('Not recorded') }}"
    - "  Command: {{ task_02_cmd | default('N/A') }}"
    - "  Exit code: {{ task_02_rc | default(-1) }}"
    - "  Data: {{ data_02 | default('') | trim }}"
    - "  Status: {{ status_02 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_02 | default('') | trim }}"
    - ""
    - "REQUIREMENT 03 - {{ req_03 }}:"
    - "  Task: {{ task_03_name | default('Not recorded') }}"
    - "  Command: {{ task_03_cmd | default('N/A') }}"
    - "  Exit code: {{ task_03_rc | default(-1) }}"
    - "  Data: {{ data_03 | default('') | trim }}"
    - "  Status: {{ status_03 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_03 | default('') | trim }}"
    - ""
    - "REQUIREMENT 04 - {{ req_04 }}:"
    - "  Task: {{ task_04_name | default('Not recorded') }}"
    - "  Command: {{ task_04_cmd | default('N/A') }}"
    - "  Exit code: {{ task_04_rc | default(-1) }}"
    - "  Data: {{ data_04 | default('') | trim }}"
    - "  Status: {{ status_04 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_04 | default('') | trim }}"
    - ""
    - "REQUIREMENT 05 - {{ req_05 }}:"
    - "  Task: {{ task_05_name | default('Not recorded') }}"
    - "  Command: {{ task_05_cmd | default('N/A') }}"
    - "  Exit code: {{ task_05_rc | default(-1) }}"
    - "  Data: {{ data_05 | default('') | trim }}"
    - "  Status: {{ status_05 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_05 | default('') | trim }}"
    - ""
    - "REQUIREMENT 06 - {{ req_06 }}:"
    - "  Task: Aggregate compliance assessment"
    - "  Command: N/A (evaluated from previous results)"
    - "  Exit code: N/A"
    - "  Data: {{ cis_result | default('UNKNOWN') | trim }}"
    - "  Status: {{ cis_result | default('UNKNOWN') | trim }}"
    - "  Details: Retrieved from combined checks"
    - ""
    - "REQUIREMENT 07 - {{ req_07 }}:"
    - "  Task: Store final result as cis_result"
    - "  Command: set_fact"
    - "  Exit code: 0"
    - "  Data: {{ cis_result | default('UNKNOWN') | trim }}"
    - "  Status: {{ cis_result | default('UNKNOWN') | trim }}"
    - "  Details: Final compliance verdict stored"
    - ""
    - "========================================================"
    - "OVERALL COMPLIANCE:"
    - "  Result: {{ cis_result | default('UNKNOWN') | trim }}"
    - "========================================================"
