---
- name: Initialize meta data variables
  include_vars: cis_audit_var_5_3_3_2_6.yml

- name: "Initialize data variables"
  set_fact:
    data_01: "Not collected yet"
    status_01: "ERROR"
    details_01: "Not evaluated"
    task_01_name: "Not executed"
    task_01_cmd: "N/A"
    task_01_rc: -1
    data_02: "Not collected yet"
    status_02: "ERROR"
    details_02: "Not evaluated"
    task_02_name: "Not executed"
    task_02_cmd: "N/A"
    task_02_rc: -1
    data_03: "Not collected yet"
    status_03: "ERROR"
    details_03: "Not evaluated"
    task_03_name: "Not executed"
    task_03_cmd: "N/A"
    task_03_rc: -1
    data_04: "Not collected yet"
    status_04: "ERROR"
    details_04: "Not evaluated"
    task_04_name: "Not executed"
    task_04_cmd: "N/A"
    task_04_rc: -1
    data_05: "Not collected yet"
    status_05: "ERROR"
    details_05: "Not evaluated"
    task_05_name: "Not executed"
    task_05_cmd: "N/A"
    task_05_rc: -1
    pwquality_installed: false

- name: "Req 01 - Check if pwquality is installed"
  shell: dpkg -l libpwquality-common 2>/dev/null || rpm -q libpwquality 2>/dev/null
  args:
    executable: /bin/bash
  register: result_01
  failed_when: false
  changed_when: false

- name: "Store requirement 01 details"
  set_fact:
    task_01_name: "Req 01 - Check if pwquality is installed"
    task_01_cmd: "dpkg -l libpwquality-common 2>/dev/null || rpm -q libpwquality 2>/dev/null"
    task_01_rc: "{{ result_01.rc | default(-1) }}"
    data_01: "{{ result_01.stdout | default('') | trim }}"
    status_01: "{{ 'PASS' if (result_01.rc | default(-1)) == 0 else 'SKIP' }}"
    details_01: "{{ 'Package pwquality/libpwquality is installed.' if (result_01.rc | default(-1)) == 0 else 'Package not installed. Audit not applicable.' }}"
    pwquality_installed: "{{ (result_01.rc | default(-1)) == 0 }}"

- name: "Req 02 - Check dictcheck not set to 0 in pwquality configuration files"
  shell: |
    shopt -s nullglob
    grep -Psi -- '^\h*dictcheck\h*=\h*0\b' /etc/security/pwquality.conf /etc/security/pwquality.conf.d/*.conf
  args:
    executable: /bin/bash
  register: result_02
  failed_when: false
  changed_when: false
  when: pwquality_installed | bool

- name: "Store requirement 02 details"
  set_fact:
    task_02_name: "Req 02 - Check dictcheck not set to 0 in pwquality configuration files"
    task_02_cmd: |
      grep -Psi -- '^\h*dictcheck\h*=\h*0\b' /etc/security/pwquality.conf /etc/security/pwquality.conf.d/*.conf
    task_02_rc: "{{ result_02.rc | default(-1) if not (result_02 is skipped) else -1 }}"
    data_02: >-
      {% if pwquality_installed | bool %}
      {{ result_02.stdout | default('') | trim }}
      {% else %}
      Not applicable
      {% endif %}
    status_02: >-
      {% if pwquality_installed | bool %}
        {% if result_02.rc | default(-1) == 1 %}PASS
        {% elif result_02.rc | default(-1) == 0 %}FAIL
        {% else %}UNKNOWN
        {% endif %}
      {% else %}
        SKIP
      {% endif %}
    details_02: >-
      {% if pwquality_installed | bool %}
        {% if result_02.rc | default(-1) == 1 %}dictcheck=0 not found in configuration (good)
        {% elif result_02.rc | default(-1) == 0 %}dictcheck=0 found in configuration (bad)
        {% else %}Error running grep
        {% endif %}
      {% else %}
        Not applicable - pwquality not installed
      {% endif %}

- name: "Req 03 - Check dictcheck not set to 0 in PAM files"
  shell: |
    grep -Psi -- '^\h*password\h+(requisite|required|sufficient)\h+pam_pwquality\.so\h+([^#\n\r]+\h+)?dictcheck\h*=\h*0\b' /etc/pam.d/system-auth /etc/pam.d/password-auth
  args:
    executable: /bin/bash
  register: result_03
  failed_when: false
  changed_when: false
  when: pwquality_installed | bool

- name: "Store requirement 03 details"
  set_fact:
    task_03_name: "Req 03 - Check dictcheck not set to 0 in PAM files"
    task_03_cmd: |
      grep -Psi -- '^\h*password\h+(requisite|required|sufficient)\h+pam_pwquality\.so\h+([^#\n\r]+\h+)?dictcheck\h*=\h*0\b' /etc/pam.d/system-auth /etc/pam.d/password-auth
    task_03_rc: "{{ result_03.rc | default(-1) if not (result_03 is skipped) else -1 }}"
    data_03: >-
      {% if pwquality_installed | bool %}
      {{ result_03.stdout | default('') | trim }}
      {% else %}
      Not applicable
      {% endif %}
    status_03: >-
      {% if pwquality_installed | bool %}
        {% if result_03.rc | default(-1) == 1 %}PASS
        {% elif result_03.rc | default(-1) == 0 %}FAIL
        {% else %}UNKNOWN
        {% endif %}
      {% else %}
        SKIP
      {% endif %}
    details_03: >-
      {% if pwquality_installed | bool %}
        {% if result_03.rc | default(-1) == 1 %}dictcheck=0 not found in PAM (good)
        {% elif result_03.rc | default(-1) == 0 %}dictcheck=0 found in PAM (bad)
        {% else %}Error running grep
        {% endif %}
      {% else %}
        Not applicable - pwquality not installed
      {% endif %}

- name: "Req 04 - Summarize overall compliance"
  set_fact:
    cis_result: "{{ ('SKIP' if not (pwquality_installed | bool) else 'UNKNOWN' if (status_02 | default('UNKNOWN') | trim == 'UNKNOWN') or (status_03 | default('UNKNOWN') | trim == 'UNKNOWN') else 'PASS' if (status_02 | default('UNKNOWN') | trim == 'PASS') and (status_03 | default('UNKNOWN') | trim == 'PASS') else 'FAIL') | trim }}"
    task_04_name: "Req 04 - Summarize overall compliance"
    task_04_cmd: "N/A"
    task_04_rc: 0
    data_04: "Overall compliance"

- name: "Store requirement 04 details"
  set_fact:
    status_04: "{{ cis_result | trim }}"
    details_04: >-
      {%- if (cis_result | trim) == 'SKIP' %}pwquality not installed – audit not applicable
      {%- elif (cis_result | trim) == 'PASS' %}dictcheck is enabled (not set to 0) in all locations
      {%- elif (cis_result | trim) == 'UNKNOWN' %}dictcheck status could not be fully determined due to errors
      {%- else %}dictcheck is disabled in at least one location (set to 0)
      {%- endif %}

- name: "Req 05 - Store final audit result"
  set_fact:
    task_05_name: "Req 05 - Store final audit result"
    task_05_cmd: "N/A"
    task_05_rc: 0
    data_05: "{{ cis_result | trim }}"
    status_05: "{{ cis_result | trim }}"
    details_05: "Final audit result stored in cis_result variable."

- name: "Generate audit report"
  debug:
    msg:
    - "AUDIT REPORT — CIS 5.3.3.2.6"
    - "Reference: CIS Benchmark checkpoint 5.3.3.2.6"
    - ""
    - "REQUIREMENT 01 - {{ req_01 }}:"
    - "  Task: {{ task_01_name | default('Not recorded') }}"
    - "  Command: {{ task_01_cmd | default('N/A') }}"
    - "  Exit code: {{ task_01_rc | default(-1) }}"
    - "  Data: {{ data_01 | default('') | trim }}"
    - "  Status: {{ status_01 | default('ERROR') | trim }}"
    - "  Details: {{ details_01 | default('') | trim }}"
    - ""
    - "REQUIREMENT 02 - {{ req_02 }}:"
    - "  Task: {{ task_02_name | default('Not recorded') }}"
    - "  Command: {{ task_02_cmd | default('N/A') }}"
    - "  Exit code: {{ task_02_rc | default(-1) }}"
    - "  Data: {{ data_02 | default('') | trim }}"
    - "  Status: {{ status_02 | default('ERROR') | trim }}"
    - "  Details: {{ details_02 | default('') | trim }}"
    - ""
    - "REQUIREMENT 03 - {{ req_03 }}:"
    - "  Task: {{ task_03_name | default('Not recorded') }}"
    - "  Command: {{ task_03_cmd | default('N/A') }}"
    - "  Exit code: {{ task_03_rc | default(-1) }}"
    - "  Data: {{ data_03 | default('') | trim }}"
    - "  Status: {{ status_03 | default('ERROR') | trim }}"
    - "  Details: {{ details_03 | default('') | trim }}"
    - ""
    - "REQUIREMENT 04 - {{ req_04 }}:"
    - "  Task: {{ task_04_name | default('Not recorded') }}"
    - "  Command: {{ task_04_cmd | default('N/A') }}"
    - "  Exit code: {{ task_04_rc | default(-1) }}"
    - "  Data: {{ data_04 | default('') | trim }}"
    - "  Status: {{ status_04 | default('ERROR') | trim }}"
    - "  Details: {{ details_04 | default('') | trim }}"
    - ""
    - "REQUIREMENT 05 - {{ req_05 }}:"
    - "  Task: {{ task_05_name | default('Not recorded') }}"
    - "  Command: {{ task_05_cmd | default('N/A') }}"
    - "  Exit code: {{ task_05_rc | default(-1) }}"
    - "  Data: {{ data_05 | default('') | trim }}"
    - "  Status: {{ status_05 | default('ERROR') | trim }}"
    - "  Details: {{ details_05 | default('') | trim }}"
    - ""
    - "========================================================"
    - "OVERALL COMPLIANCE:"
    - "  Result: {{ cis_result | default('ERROR') | trim }}"
    - "  Details: {{ details_04 | default('Not evaluated') | trim }}"
    - "========================================================"
