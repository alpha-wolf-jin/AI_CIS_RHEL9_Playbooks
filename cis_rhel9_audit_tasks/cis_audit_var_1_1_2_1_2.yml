req_01: "Check if a separate partition exists for /tmp using command: `findmnt -kn /tmp`. Expected result: output should show a mount point for /tmp."
req_02: "Check if the nodev option is set on /tmp partition using command: `findmnt -kn /tmp | grep -v nodev`. Expected result: no output should be returned."
req_03: "Summarize overall compliance status: if the previous checks pass, the system is compliant; otherwise, it is non-compliant."
req_04: "Store the final audit result in a variable named 'cis_result' using set_fact. Set cis_result to the overall compliance status (PASS/FAIL/SKIPPED/UNKNOWN) derived from the last requirement's status variable."
