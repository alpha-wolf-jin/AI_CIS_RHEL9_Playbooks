req_01: "Run the provided audit script to verify Ensure accounts without a valid login shell are locked. Run the following script to verify all non-root accounts without a valid login shell are locked. Execute the COMPLETE script as-is: [script omitted]"
req_02: "VERIFY: Summarise compliance status for Ensure accounts without a valid login shell are locked. Expected result: PASS if compliant, FAIL otherwise"
req_03: "Store the final audit result in a variable named 'cis_result' using set_fact. Set cis_result to the overall compliance status (PASS/FAIL/SKIP/UNKNOWN) derived from the last requirement's status variable."
req_04: "{% raw %}Create a task named 'Generate audit report' using debug msg with EXACTLY this format: AUDIT REPORT — CIS 5.4.2.8 Reference: CIS Benchmark checkpoint 5.4.2.8 Then for each requirement: REQUIREMENT NN - {{ req_NN }}: With fields: Task, Command, Exit code, Data, Status (PASS/FAIL/SKIP/UNKNOWN), Details. End with OVERALL COMPLIANCE: section containing Result: {{{ cis_result }}}{% endraw %}"
audit_script: "/tmp/audit_cis_5_4_2_8.sh"
audit_script_content: |
  {% raw %}
  #!/usr/bin/env bash
  {
     l_valid_shells="^($(awk -F\/ '$NF != "nologin" {print}' /etc/shells | sed -rn '/^\//{s,/,\\\\/,g;p}' | paste -s -d '|' - ))$"
     while IFS= read -r l_user; do
        passwd -S "$l_user" | awk '$2 !~ /^L/ {print "Account: \"" $1 "\" does not have a valid login shell and is not locked"}'
     done < <(awk -v pat="$l_valid_shells" -F: '($1 != "root" && $(NF) !~ pat) {print $1}' /etc/passwd)
  }
  {% endraw %}
