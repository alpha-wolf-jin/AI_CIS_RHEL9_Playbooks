---
- name: Initialize meta data variables
  include_vars: cis_audit_var_5_3_3_2_1.yml

- name: "Initialize data variables"
  set_fact:
    data_01: ""
    status_01: "ERROR"
    details_01: "Not evaluated"
    data_02: ""
    status_02: "SKIP"
    details_02: "Skipped - pam_pwquality not installed"
    data_03: ""
    status_03: "SKIP"
    details_03: "Skipped - pam_pwquality not installed"
    data_04: ""
    status_04: "ERROR"
    details_04: "Not evaluated"
    data_05: ""
    status_05: "ERROR"
    details_05: "Not evaluated"
    task_01_name: "Not executed"
    task_01_cmd: "N/A"
    task_01_rc: -1
    task_02_name: "Not executed"
    task_02_cmd: "N/A"
    task_02_rc: -1
    task_03_name: "Not executed"
    task_03_cmd: "N/A"
    task_03_rc: -1
    task_04_name: "Not executed"
    task_04_cmd: "N/A"
    task_04_rc: -1
    task_05_name: "Not executed"
    task_05_cmd: "N/A"
    task_05_rc: -1

- name: "Req 01 - Check if pam_pwquality package is installed"
  ansible.builtin.package_facts:
    manager: auto
  failed_when: false

- name: "Determine if pam_pwquality is installed"
  set_fact:
    pam_pwquality_installed: "{{ (('libpam-pwquality' in ansible_facts.packages) or ('libpwquality' in ansible_facts.packages) or ('pam_pwquality' in ansible_facts.packages)) }}"
    playbook_skipped: "{{ not (('libpam-pwquality' in ansible_facts.packages) or ('libpwquality' in ansible_facts.packages) or ('pam_pwquality' in ansible_facts.packages)) }}"

- name: "Store requirement 01 details"
  set_fact:
    task_01_name: "Check if pam_pwquality package is installed"
    task_01_cmd: "package_facts (manager: auto)"
    task_01_rc: 0
    data_01: "Package installed: {{ pam_pwquality_installed }}"
    status_01: "{{ 'PASS' if pam_pwquality_installed else 'FAIL' }}"
    details_01: "{{ 'pam_pwquality package is installed' if pam_pwquality_installed else 'pam_pwquality package not found' }}"

- name: "Req 02 - Check difok in pwquality configuration"
  ansible.builtin.shell: |
    grep -Psi -- '^\h*difok\h*=\h*([2-9]|[1-9][0-9]+)\b' /etc/security/pwquality.conf /etc/security/pwquality.conf.d/*.conf 2>/dev/null || true
  args:
    executable: /bin/bash
  register: result_02
  failed_when: false
  changed_when: false
  when: not playbook_skipped

- name: "Store requirement 02 details"
  set_fact:
    task_02_name: "Check difok in pwquality configuration"
    task_02_cmd: |
      grep -Psi -- '^\\h*difok\\h*=\\h*([2-9]|[1-9][0-9]+)\\b' /etc/security/pwquality.conf /etc/security/pwquality.conf.d/*.conf
    task_02_rc: "{{ result_02.rc | default(-1) }}"
    data_02: "{{ result_02.stdout | default('') | trim }}"
    status_02: "{{ 'PASS' if (result_02.stdout | default('') | trim | length > 0) else 'FAIL' }}"
    details_02: "{{ 'difok >=2 found in pwquality config' if (result_02.stdout | default('') | trim | length > 0) else 'difok >=2 not found in pwquality config' }}"
  when: not playbook_skipped

- name: "Req 03 - Check that difok is not set to 0 or 1 in PAM arguments"
  ansible.builtin.shell: |
    grep -Psi -- '^\h*password\h+(requisite|required|sufficient)\h+pam_pwquality\.so\h+([^#\n\r]+\h+)?difok\h*=\h*([0-1])\b' /etc/pam.d/system-auth /etc/pam.d/password-auth 2>/dev/null || true
  args:
    executable: /bin/bash
  register: result_03
  failed_when: false
  changed_when: false
  when: not playbook_skipped

- name: "Store requirement 03 details"
  set_fact:
    task_03_name: "Check that difok is not set to 0 or 1 in PAM module arguments"
    task_03_cmd: |
      grep -Psi -- '^\\h*password\\h+(requisite|required|sufficient)\\h+pam_pwquality\\.so\\h+([^#\\n\\r]+\\h+)?difok\\h*=\\h*([0-1])\\b' /etc/pam.d/system-auth /etc/pam.d/password-auth
    task_03_rc: "{{ result_03.rc | default(-1) }}"
    data_03: "{{ result_03.stdout | default('') | trim }}"
    status_03: "{{ 'PASS' if (result_03.stdout | default('') | trim | length == 0) else 'FAIL' }}"
    details_03: "{{ 'No insecure difok values found in PAM modules' if (result_03.stdout | default('') | trim | length == 0) else 'Insecure difok (0 or 1) found in PAM modules' }}"
  when: not playbook_skipped

- name: "Req 04 - Determine overall compliance"
  set_fact:
    status_04: >-
      {%- if playbook_skipped | default(false) -%}
        SKIP
      {%- elif status_02 | default('ERROR') | trim == 'PASS' and status_03 | default('ERROR') | trim == 'PASS' -%}
        PASS
      {%- else -%}
        FAIL
      {%- endif %}
    details_04: >-
      {%- if playbook_skipped | default(false) -%}
        "Audit skipped: pam_pwquality package not installed"
      {%- elif status_02 | default('ERROR') | trim == 'PASS' and status_03 | default('ERROR') | trim == 'PASS' -%}
        "System is compliant"
      {%- else -%}
        "System is not compliant"
      {%- endif %}

- name: "Store requirement 04 details"
  ansible.builtin.set_fact:
    task_04_name: "Determine overall compliance"
    task_04_cmd: "set_fact"
    task_04_rc: 0
    data_04: "{{ status_04 | default('') | trim }}"

- name: "Store final audit result"
  set_fact:
    cis_result: "{{ status_04 | default('ERROR') | trim }}"
    task_05_name: "Store final audit result in cis_result"
    task_05_cmd: "N/A"
    task_05_rc: 0
    data_05: "{{ status_04 | default('ERROR') | trim }}"
    status_05: "PASS"
    details_05: "Final audit result stored"

- name: "Generate audit report"
  debug:
    msg:
    - "=========================================================="
    - "        AUDIT REPORT — CIS 5.3.3.2.1"
    - "=========================================================="
    - "Reference: CIS Benchmark checkpoint 5.3.3.2.1"
    - ""
    - "REQUIREMENT 01 - {{ req_01 }}:"
    - "  Task: {{ task_01_name | default('Not recorded') }}"
    - "  Command: {{ task_01_cmd | default('N/A') }}"
    - "  Exit code: {{ task_01_rc | default(-1) }}"
    - "  Data: {{ data_01 | default('') | trim }}"
    - "  Status: {{ status_01 | default('ERROR') | trim }}"
    - "  Details: {{ details_01 | default('') | trim }}"
    - ""
    - "REQUIREMENT 02 - {{ req_02 }}:"
    - "  Task: {{ task_02_name | default('Not recorded') }}"
    - "  Command: {{ task_02_cmd | default('N/A') }}"
    - "  Exit code: {{ task_02_rc | default(-1) }}"
    - "  Data: {{ data_02 | default('') | trim }}"
    - "  Status: {{ status_02 | default('ERROR') | trim }}"
    - "  Details: {{ details_02 | default('') | trim }}"
    - ""
    - "REQUIREMENT 03 - {{ req_03 }}:"
    - "  Task: {{ task_03_name | default('Not recorded') }}"
    - "  Command: {{ task_03_cmd | default('N/A') }}"
    - "  Exit code: {{ task_03_rc | default(-1) }}"
    - "  Data: {{ data_03 | default('') | trim }}"
    - "  Status: {{ status_03 | default('ERROR') | trim }}"
    - "  Details: {{ details_03 | default('') | trim }}"
    - ""
    - "REQUIREMENT 04 - {{ req_04 }}:"
    - "  Task: {{ task_04_name | default('Not recorded') }}"
    - "  Command: {{ task_04_cmd | default('N/A') }}"
    - "  Exit code: {{ task_04_rc | default(-1) }}"
    - "  Data: {{ data_04 | default('') | trim }}"
    - "  Status: {{ status_04 | default('ERROR') | trim }}"
    - "  Details: {{ details_04 | default('') | trim }}"
    - ""
    - "REQUIREMENT 05 - {{ req_05 }}:"
    - "  Task: {{ task_05_name | default('Not recorded') }}"
    - "  Command: {{ task_05_cmd | default('N/A') }}"
    - "  Exit code: {{ task_05_rc | default(-1) }}"
    - "  Data: {{ data_05 | default('') | trim }}"
    - "  Status: {{ status_05 | default('ERROR') | trim }}"
    - "  Details: {{ details_05 | default('') | trim }}"
    - ""
    - "=========================================================="
    - "OVERALL COMPLIANCE:"
    - "  Result: {{ cis_result | default('ERROR') | trim }}"
    - "  Details: {{ details_04 | default('Not evaluated') | trim }}"
    - "=========================================================="
