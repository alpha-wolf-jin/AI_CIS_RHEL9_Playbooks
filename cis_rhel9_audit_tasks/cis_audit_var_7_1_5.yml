req_01: "Check if /etc/shadow exists using command: `stat -Lc '%a' /etc/shadow 2>/dev/null || echo 'NOT_FOUND'`. Expected result: a numeric permission string (e.g., 0) or 'NOT_FOUND'."
req_02: "Check that /etc/shadow permissions are set to mode 000 using command: `stat -Lc '%a' /etc/shadow`. Expected result: 0"
req_03: "Check that /etc/shadow owner UID is 0 (root) using command: `stat -Lc '%u' /etc/shadow`. Expected result: 0"
req_04: "Check that /etc/shadow owner name is root using command: `stat -Lc '%U' /etc/shadow`. Expected result: root"
req_05: "Check that /etc/shadow group GID is 0 (root) using command: `stat -Lc '%g' /etc/shadow`. Expected result: 0"
req_06: "Check that /etc/shadow group name is root using command: `stat -Lc '%G' /etc/shadow`. Expected result: root"
req_07: "Summarize overall compliance: if all above checks pass, then /etc/shadow is correctly configured with mode 000, owner root, and group root. Expected result: compliant"
req_08: "Store the final audit result in a variable named 'cis_result' using set_fact. Set cis_result to the overall compliance status (PASS/FAIL/SKIP/UNKNOWN) derived from the last requirement's status variable."
