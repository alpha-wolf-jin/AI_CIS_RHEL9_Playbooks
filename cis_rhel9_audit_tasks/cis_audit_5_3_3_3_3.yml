---
- name: Initialize meta data variables
  include_vars: cis_audit_var_5_3_3_3_3.yml

- name: "Gather package facts"
  ansible.builtin.package_facts:
    manager: auto
  tags: [audit]
- name: "Set pam installation fact"
  ansible.builtin.set_fact:
    pam_installed: "{{ 'pam' in ansible_facts.packages }}"
  tags: [audit]
- name: "Req 01 - Check if pam_pwhistory module files exist"
  ansible.builtin.shell: "{{ cmd_01 }}"
  args:
    executable: /bin/bash
  register: result_01
  failed_when: false
  changed_when: false
  tags: [audit]
- name: "Store requirement 01 details"
  ansible.builtin.set_fact:
    task_01_name: "Check if pam_pwhistory module files exist"
    task_01_cmd: "{{ cmd_01 }}"
    task_01_rc: "{{ result_01.rc | default(-1) }}"
    data_01: "{{ result_01.stdout | default('') | trim }}"
    status_01: "{{ 'NOT_APPLICABLE' if not (pam_installed | bool) else 'PASS' if (result_01.rc | default(-1)) == 0 else 'FAIL' | trim }}"
    details_01: "{{ 'PAM package not installed' if not (pam_installed | bool) else 'Both files exist' if (result_01.rc | default(-1)) == 0 else 'One or both files missing' | trim }}"
    pam_files_exist: "{{ (result_01.rc | default(-1)) == 0 }}"
  tags: [audit]
- name: "Req 02 - Check use_authtok in pam_pwhistory.so in password-auth"
  ansible.builtin.shell: "{{ cmd_02 }}"
  args:
    executable: /bin/bash
  register: result_02
  failed_when: false
  changed_when: false
  tags: [audit]
- name: "Store requirement 02 details"
  ansible.builtin.set_fact:
    task_02_name: "Check pam_pwhistory.so includes use_authtok in password-auth"
    task_02_cmd: "{{ cmd_02 }}"
    task_02_rc: "{{ result_02.rc | default(-1) }}"
    data_02: "{{ result_02.stdout | default('') | trim }}"
    status_02: "{{ 'NOT_APPLICABLE' if not (pam_installed | bool) else 'FAIL' if not (pam_files_exist | bool) else 'PASS' if (result_02.rc | default(-1)) == 0 else 'FAIL' | trim }}"
    details_02: "{{ 'PAM package not installed' if not (pam_installed | bool) else 'Configuration file /etc/pam.d/password-auth missing' if not (pam_files_exist | bool) else 'use_authtok found' if (result_02.rc | default(-1)) == 0 else 'use_authtok not found' | trim }}"
  tags: [audit]
- name: "Req 03 - Check use_authtok in pam_pwhistory.so in system-auth"
  ansible.builtin.shell: "{{ cmd_03 }}"
  args:
    executable: /bin/bash
  register: result_03
  failed_when: false
  changed_when: false
  tags: [audit]
- name: "Store requirement 03 details"
  ansible.builtin.set_fact:
    task_03_name: "Check pam_pwhistory.so includes use_authtok in system-auth"
    task_03_cmd: "{{ cmd_03 }}"
    task_03_rc: "{{ result_03.rc | default(-1) }}"
    data_03: "{{ result_03.stdout | default('') | trim }}"
    status_03: "{{ 'NOT_APPLICABLE' if not (pam_installed | bool) else 'FAIL' if not (pam_files_exist | bool) else 'PASS' if (result_03.rc | default(-1)) == 0 else 'FAIL' | trim }}"
    details_03: "{{ 'PAM package not installed' if not (pam_installed | bool) else 'Configuration file /etc/pam.d/system-auth missing' if not (pam_files_exist | bool) else 'use_authtok found' if (result_03.rc | default(-1)) == 0 else 'use_authtok not found' | trim }}"
  tags: [audit]
- name: "Req 04 - Summarize overall compliance"
  ansible.builtin.set_fact:
    status_04: "{{ 'NOT_APPLICABLE' if not (pam_installed | bool) else 'PASS' if (status_02 == 'PASS' and status_03 == 'PASS') else 'FAIL' | trim }}"
    details_04: "{{ 'PAM package not installed' if not (pam_installed | bool) else 'Both files have use_authtok set' if (status_02 == 'PASS' and status_03 == 'PASS') else 'One or both files missing use_authtok' | trim }}"
    task_04_name: "Summarize overall compliance"
    task_04_cmd: "N/A"
    task_04_rc: 0
    data_04: "{{ status_02 ~ ' for password-auth, ' ~ status_03 ~ ' for system-auth' }}"
  tags: [audit]
- name: "Req 05 - Set cis_result"
  ansible.builtin.set_fact:
    cis_result: "{{ status_04 | trim }}"
    task_05_name: "Set cis_result"
    task_05_cmd: "N/A"
    task_05_rc: 0
    data_05: "{{ status_04 | trim }}"
    status_05: "{{ status_04 | trim }}"
    details_05: "Final audit result"
  tags: [audit]
- name: "Req 06 - Set audit report status"
  ansible.builtin.set_fact:
    task_06_name: "Generate audit report"
    task_06_cmd: "N/A"
    task_06_rc: 0
    data_06: "Report generated"
    status_06: "PASS"
    details_06: "Audit report will be printed"
  tags: [audit]
- name: "Generate audit report"
  ansible.builtin.debug:
    msg:
    - "AUDIT REPORT — CIS 5.3.3.3.3"
    - "Reference: CIS Benchmark checkpoint 5.3.3.3.3"
    - ""
    - "REQUIREMENT 01 - {{ req_01 }}:"
    - "  Task: {{ task_01_name | default('Not recorded') }}"
    - "  Command: {{ task_01_cmd | default('N/A') }}"
    - "  Exit code: {{ task_01_rc | default(-1) }}"
    - "  Data: {{ data_01 | default('') | trim }}"
    - "  Status: {{ status_01 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_01 | default('') | trim }}"
    - ""
    - "REQUIREMENT 02 - {{ req_02 | trim }}:"
    - "  Task: {{ task_02_name | default('Not recorded') }}"
    - "  Command: {{ task_02_cmd | default('N/A') | trim }}"
    - "  Exit code: {{ task_02_rc | default(-1) }}"
    - "  Data: {{ data_02 | default('') | trim }}"
    - "  Status: {{ status_02 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_02 | default('') | trim }}"
    - ""
    - "REQUIREMENT 03 - {{ req_03 | trim }}:"
    - "  Task: {{ task_03_name | default('Not recorded') }}"
    - "  Command: {{ task_03_cmd | default('N/A') | trim }}"
    - "  Exit code: {{ task_03_rc | default(-1) }}"
    - "  Data: {{ data_03 | default('') | trim }}"
    - "  Status: {{ status_03 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_03 | default('') | trim }}"
    - ""
    - "REQUIREMENT 04 - {{ req_04 }}:"
    - "  Task: {{ task_04_name | default('Not recorded') }}"
    - "  Command: {{ task_04_cmd | default('N/A') }}"
    - "  Exit code: {{ task_04_rc | default(-1) }}"
    - "  Data: {{ data_04 | default('') | trim }}"
    - "  Status: {{ status_04 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_04 | default('') | trim }}"
    - ""
    - "REQUIREMENT 05 - {{ req_05 }}:"
    - "  Task: {{ task_05_name | default('Not recorded') }}"
    - "  Command: {{ task_05_cmd | default('N/A') }}"
    - "  Exit code: {{ task_05_rc | default(-1) }}"
    - "  Data: {{ data_05 | default('') | trim }}"
    - "  Status: {{ status_05 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_05 | default('') | trim }}"
    - ""
    - "REQUIREMENT 06 - {{ req_06 }}:"
    - "  Task: {{ task_06_name | default('Not recorded') }}"
    - "  Command: {{ task_06_cmd | default('N/A') }}"
    - "  Exit code: {{ task_06_rc | default(-1) }}"
    - "  Data: {{ data_06 | default('') | trim }}"
    - "  Status: {{ status_06 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_06 | default('') | trim }}"
    - ""
    - "========================================================"
    - "OVERALL COMPLIANCE:"
    - "  Result: {{ cis_result | default('UNKNOWN') | trim }}"
    - "========================================================"
  tags: [audit]
