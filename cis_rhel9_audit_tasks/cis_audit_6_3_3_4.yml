# Requirement 1
- name: "Req 01 - Check if auditd is installed"
  shell: dpkg -l auditd 2>/dev/null || rpm -q audit 2>/dev/null
  args:
    executable: /bin/bash
  register: result_01
  failed_when: false
  changed_when: false

- name: "Store requirement 01 details"
  set_fact:
    task_01_name: "Req 01 - Check if auditd is installed"
    task_01_cmd: "dpkg -l auditd 2>/dev/null || rpm -q audit 2>/dev/null"
    task_01_rc: "{{ result_01.rc | default(-1) }}"
    data_01: "{{ result_01.stdout | default('') | trim }}"
    status_01: "{{ 'PASS' if result_01.rc | default(-1) == 0 else 'NOT_APPLICABLE' }}"
    details_01: "{{ 'auditd package found' if result_01.rc | default(-1) == 0 else 'auditd package not found; audit not applicable' }}"

- name: "Set auditd_installed fact"
  set_fact:
    auditd_installed: "{{ result_01.rc == 0 }}"

# Requirement 2
- name: "Req 02 - Check on-disk audit rules for adjtimex and settimeofday syscalls 64-bit"
  shell: "{{ awk_syscall_on_disk_cmd }}"
  args:
    executable: /bin/bash
  register: result_02
  failed_when: false
  changed_when: false
  when: auditd_installed | default(false)

- name: "Store requirement 02 details"
  set_fact:
    task_02_name: "Req 02 - Check on-disk audit rules for adjtimex and settimeofday syscalls 64-bit"
    task_02_cmd: "{{ awk_syscall_on_disk_cmd }}"
    task_02_rc: "{{ result_02.rc | default(-1) if result_02 is defined else -1 }}"
    data_02: "{{ result_02.stdout | default('') | trim if result_02 is defined else '' }}"
    status_02: >-
      {%- if not (auditd_installed | default(false)) -%}
        NOT_APPLICABLE
      {%- elif expected_02 in result_02.stdout | default('') -%}
        PASS
      {%- else -%}
        FAIL
      {%- endif %}
    details_02: >-
      {%- if not (auditd_installed | default(false)) -%}
        Skipped: auditd not installed
      {%- elif expected_02 in result_02.stdout | default('') -%}
        Expected rule found
      {%- else -%}
        Expected rule not found in output
      {%- endif %}

