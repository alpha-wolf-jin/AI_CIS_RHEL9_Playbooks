# Requirement 12 (summary)
- name: "Store requirement 12 details"
  set_fact:
    task_12_name: "Req 12 - Summarize overall compliance status"
    task_12_cmd: "Internal evaluation"
    task_12_rc: 0
    data_12: "N/A"

- name: "Compute overall compliance status"
  set_fact:
    status_12: >-
      {%- set statuses = [status_01, status_02, status_03, status_04, status_05, status_06, status_07, status_08, status_09, status_10, status_11] -%}
      {%- if 'FAIL' in statuses -%} FAIL
      {%- elif 'NOT_APPLICABLE' in statuses and 'FAIL' not in statuses -%} NOT_APPLICABLE
      {%- elif statuses | select('equalto', 'PASS') | list | length == 11 -%} PASS
      {%- else -%} UNKNOWN
      {%- endif %}

- name: "Compute overall compliance details"
  set_fact:
    details_12: >-
      {%- if status_12 == 'PASS' -%} All audit rules for time-change events are present
      {%- elif status_12 == 'FAIL' -%} One or more required audit rules are missing or incorrect
      {%- elif status_12 == 'NOT_APPLICABLE' -%} auditd not installed; audit not applicable
      {%- else -%} Unable to determine compliance
      {%- endif %}

