---
- name: Initialize meta data variables
  include_vars: cis_audit_var_6_3_1_2.yml

- name: "Initialize data variables"
  set_fact:
    data_01: "Not collected yet"
    status_01: "ERROR"
    details_01: "Not evaluated"
    task_01_name: "Not executed"
    task_01_cmd: "N/A"
    task_01_rc: -1
    data_02: "Not collected yet"
    status_02: "ERROR"
    details_02: "Not evaluated"
    task_02_name: "Not executed"
    task_02_cmd: "N/A"
    task_02_rc: -1
    data_03: "Not collected yet"
    status_03: "ERROR"
    details_03: "Not evaluated"
    task_03_name: "Not executed"
    task_03_cmd: "N/A"
    task_03_rc: -1

- name: "Req 01 - Check if grubby is installed"
  ansible.builtin.shell: command -v grubby
  args:
    executable: /bin/bash
  register: result_01
  failed_when: false
  changed_when: false

- name: "Store requirement 01 details"
  set_fact:
    task_01_name: "Check grubby existence"
    task_01_cmd: "command -v grubby"
    task_01_rc: "{{ result_01.rc | default(-1) }}"
    data_01: "{{ result_01.stdout | default('') | trim }}"
    status_01: "{{ 'PASS' if result_01.rc | default(-1) == 0 else 'FAIL' | trim }}"
    details_01: "{{ 'grubby available' if result_01.rc | default(-1) == 0 else 'grubby not found' | trim }}"
    grubby_available: "{{ result_01.rc | default(-1) == 0 }}"

- name: "Req 02 - Check if audit=1 is set in kernel command line via grubby"
  ansible.builtin.shell: grubby --info=ALL | grep -Po '\baudit=1\b'
  args:
    executable: /bin/bash
  register: result_02
  when: grubby_available | default(false) | bool
  failed_when: false
  changed_when: false

- name: "Store requirement 02 details"
  set_fact:
    task_02_name: "Check audit=1 in kernel cmdline"
    task_02_cmd: |
      grubby --info=ALL | grep -Po '\baudit=1\b'
    task_02_rc: "{{ result_02.rc | default(-1) if grubby_available | default(false) else 'SKIPPED' }}"
    data_02: "{{ result_02.stdout | default('') | trim if grubby_available | default(false) else 'skipped' }}"
    status_02: >-
      {%- if not (grubby_available | default(false)) -%}
        SKIP
      {%- elif 'audit=1' in (result_02.stdout | default('')) -%}
        PASS
      {%- else -%}
        FAIL
      {%- endif -%}
    details_02: >-
      {%- if not (grubby_available | default(false)) -%}
        grubby not installed, skipped
      {%- elif 'audit=1' in (result_02.stdout | default('')) -%}
        audit=1 found in kernel command line
      {%- else -%}
        audit=1 not found in kernel command line
      {%- endif -%}

- name: "Req 03 - Summarize overall compliance"
  set_fact:
    status_03: >-
      {%- if not (grubby_available | default(false)) -%}
        SKIP
      {%- elif status_02 | default('ERROR') | trim == 'PASS' -%}
        PASS
      {%- else -%}
        FAIL
      {%- endif -%}
    details_03: >-
      {%- if not (grubby_available | default(false)) -%}
        grubby not installed, audit cannot proceed
      {%- elif status_02 | default('ERROR') | trim == 'PASS' -%}
        audit=1 is set in kernel command line
      {%- else -%}
        audit=1 is NOT set in kernel command line
      {%- endif -%}

- name: "Store final audit result in cis_result"
  set_fact:
    cis_result: "{{ status_03 | default('ERROR') | trim }}"

- name: "Generate audit report"
  debug:
    msg:
    - "AUDIT REPORT — CIS 6.3.1.2"
    - "Reference: CIS Benchmark checkpoint 6.3.1.2"
    - ""
    - "REQUIREMENT 01 - {{ req_01 }}:"
    - "  Task: {{ task_01_name | default('Not recorded') }}"
    - "  Command: {{ task_01_cmd | default('N/A') }}"
    - "  Exit code: {{ task_01_rc | default(-1) }}"
    - "  Data: {{ data_01 | default('') | trim }}"
    - "  Status: {{ status_01 | default('ERROR') | trim }}"
    - "  Details: {{ details_01 | default('') | trim }}"
    - ""
    - "REQUIREMENT 02 - {{ req_02 }}:"
    - "  Task: {{ task_02_name | default('Not recorded') }}"
    - "  Command: {{ task_02_cmd | default('N/A') }}"
    - "  Exit code: {{ task_02_rc | default(-1) }}"
    - "  Data: {{ data_02 | default('') | trim }}"
    - "  Status: {{ status_02 | default('ERROR') | trim }}"
    - "  Details: {{ details_02 | default('') | trim }}"
    - ""
    - "REQUIREMENT 03 - {{ req_03 }}:"
    - "  Task: {{ task_03_name | default('Not recorded') }}"
    - "  Command: {{ task_03_cmd | default('N/A') }}"
    - "  Exit code: {{ task_03_rc | default(-1) }}"
    - "  Data: {{ data_03 | default('') | trim }}"
    - "  Status: {{ status_03 | default('ERROR') | trim }}"
    - "  Details: {{ details_03 | default('') | trim }}"
    - ""
    - "========================================================"
    - "OVERALL COMPLIANCE:"
    - "  Result: {{ cis_result | default('ERROR') | trim }}"
    - "  Details: {{ details_03 | default('Not evaluated') | trim }}"
    - "========================================================"
