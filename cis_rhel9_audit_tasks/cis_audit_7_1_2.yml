---
- name: Initialize meta data variables
  include_vars: cis_audit_var_7_1_2.yml

- name: "Req 01 - Check if /etc/passwd- file exists with stat metadata"
  ansible.builtin.shell:
    cmd: "stat -Lc 'Access: (%#a/%A)  Uid: ( %u/ %U) Gid: { %g/ %G)' /etc/passwd-"
  args:
    executable: /bin/bash
  register: result_01
  failed_when: false
  changed_when: false

- name: "Req 02 - Check permissions on /etc/passwd- are 644 or more restrictive"
  ansible.builtin.shell:
    cmd: "stat -Lc '%#a' /etc/passwd-"
  args:
    executable: /bin/bash
  register: result_02
  failed_when: false
  changed_when: false

- name: "Req 03 - Check owner of /etc/passwd- is root (UID 0)"
  ansible.builtin.shell:
    cmd: "stat -Lc '%u' /etc/passwd-"
  args:
    executable: /bin/bash
  register: result_03
  failed_when: false
  changed_when: false

- name: "Req 04 - Check group owner of /etc/passwd- is root (GID 0)"
  ansible.builtin.shell:
    cmd: "stat -Lc '%g' /etc/passwd-"
  args:
    executable: /bin/bash
  register: result_04
  failed_when: false
  changed_when: false

- name: "Req 05 - Evaluate overall compliance"
  ansible.builtin.set_fact:
    task_01_name: "Req 01 - Check if /etc/passwd- file exists with stat metadata"
    task_01_cmd: "stat -Lc 'Access: (%#a/%A)  Uid: ( %u/ %U) Gid: { %g/ %G)' /etc/passwd-"
    task_01_rc: "{{ result_01.rc | default(-1) }}"
    data_01: "{{ result_01.stdout | default('') | trim }}"
    status_01: "{{ 'PASS' if result_01.rc | default(-1) == 0 else 'FAIL' }}"
    details_01: "{{ 'Command executed successfully' if result_01.rc | default(-1) == 0 else 'Command failed' }}"

    task_02_name: "Req 02 - Check permissions on /etc/passwd- are 644 or more restrictive"
    task_02_cmd: "stat -Lc '%#a' /etc/passwd-"
    task_02_rc: "{{ result_02.rc | default(-1) }}"
    data_02: "{{ result_02.stdout | default('') | trim }}"
    status_02: "{{ 'PASS' if (result_02.rc | default(-1) == 0) and ((result_02.stdout | trim | default('9999')) | int <= 644) else 'FAIL' }}"
    details_02: "{{ 'Permissions are ' + (result_02.stdout | trim) + ' which is 644 or more restrictive' if (result_02.rc | default(-1) == 0) and ((result_02.stdout | trim | default('9999')) | int <= 644) else 'Permissions do not meet requirement or command failed' }}"

    task_03_name: "Req 03 - Check owner of /etc/passwd- is root (UID 0)"
    task_03_cmd: "stat -Lc '%u' /etc/passwd-"
    task_03_rc: "{{ result_03.rc | default(-1) }}"
    data_03: "{{ result_03.stdout | default('') | trim }}"
    status_03: "{{ 'PASS' if (result_03.rc | default(-1) == 0) and (result_03.stdout | trim == '0') else 'FAIL' }}"
    details_03: "{{ 'Owner UID is 0' if (result_03.rc | default(-1) == 0) and (result_03.stdout | trim == '0') else 'Owner UID is not 0 or command failed' }}"

    task_04_name: "Req 04 - Check group owner of /etc/passwd- is root (GID 0)"
    task_04_cmd: "stat -Lc '%g' /etc/passwd-"
    task_04_rc: "{{ result_04.rc | default(-1) }}"
    data_04: "{{ result_04.stdout | default('') | trim }}"
    status_04: "{{ 'PASS' if (result_04.rc | default(-1) == 0) and (result_04.stdout | trim == '0') else 'FAIL' }}"
    details_04: "{{ 'Group GID is 0' if (result_04.rc | default(-1) == 0) and (result_04.stdout | trim == '0') else 'Group GID is not 0 or command failed' }}"

    status_05: >-
      {{ 'PASS' if
        (result_01.rc | default(-1) == 0)
        and (result_02.rc | default(-1) == 0) and ((result_02.stdout | trim | default('9999')) | int <= 644)
        and (result_03.rc | default(-1) == 0) and (result_03.stdout | trim == '0')
        and (result_04.rc | default(-1) == 0) and (result_04.stdout | trim == '0')
      else 'FAIL' }}
    details_05: >-
      {{ 'All checks passed' if
        (result_01.rc | default(-1) == 0)
        and (result_02.rc | default(-1) == 0) and ((result_02.stdout | trim | default('9999')) | int <= 644)
        and (result_03.rc | default(-1) == 0) and (result_03.stdout | trim == '0')
        and (result_04.rc | default(-1) == 0) and (result_04.stdout | trim == '0')
      else 'One or more checks failed' }}
    cis_result: >-
      {{ 'PASS' if
        (result_01.rc | default(-1) == 0)
        and (result_02.rc | default(-1) == 0) and ((result_02.stdout | trim | default('9999')) | int <= 644)
        and (result_03.rc | default(-1) == 0) and (result_03.stdout | trim == '0')
        and (result_04.rc | default(-1) == 0) and (result_04.stdout | trim == '0')
      else 'FAIL' }}

- name: "Req 06 - Store final audit result"
  ansible.builtin.set_fact:
    task_06_name: "Req 06 - Store final audit result"
    task_06_cmd: "set_fact"
    task_06_rc: 0
    data_06: "{{ cis_result }}"
    status_06: "PASS"
    details_06: "cis_result stored successfully"

- name: "Generate audit report"
  ansible.builtin.debug:
    msg:
    - "AUDIT REPORT — CIS 7.1.2"
    - "Reference: CIS Benchmark checkpoint 7.1.2"
    - ""
    - "REQUIREMENT 01 - {{ req_01 }}:"
    - "  Task: {{ task_01_name | default('Not recorded') }}"
    - "  Command: {{ task_01_cmd | default('N/A') }}"
    - "  Exit code: {{ task_01_rc | default(-1) }}"
    - "  Data: {{ data_01 | default('') | trim }}"
    - "  Status: {{ status_01 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_01 | default('') | trim }}"
    - ""
    - "REQUIREMENT 02 - {{ req_02 }}:"
    - "  Task: {{ task_02_name | default('Not recorded') }}"
    - "  Command: {{ task_02_cmd | default('N/A') }}"
    - "  Exit code: {{ task_02_rc | default(-1) }}"
    - "  Data: {{ data_02 | default('') | trim }}"
    - "  Status: {{ status_02 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_02 | default('') | trim }}"
    - ""
    - "REQUIREMENT 03 - {{ req_03 }}:"
    - "  Task: {{ task_03_name | default('Not recorded') }}"
    - "  Command: {{ task_03_cmd | default('N/A') }}"
    - "  Exit code: {{ task_03_rc | default(-1) }}"
    - "  Data: {{ data_03 | default('') | trim }}"
    - "  Status: {{ status_03 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_03 | default('') | trim }}"
    - ""
    - "REQUIREMENT 04 - {{ req_04 }}:"
    - "  Task: {{ task_04_name | default('Not recorded') }}"
    - "  Command: {{ task_04_cmd | default('N/A') }}"
    - "  Exit code: {{ task_04_rc | default(-1) }}"
    - "  Data: {{ data_04 | default('') | trim }}"
    - "  Status: {{ status_04 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_04 | default('') | trim }}"
    - ""
    - "REQUIREMENT 05 - {{ req_05 }}:"
    - "  Task: {{ task_05_name | default('Not recorded') }}"
    - "  Command: {{ task_05_cmd | default('N/A') }}"
    - "  Exit code: {{ task_05_rc | default(-1) }}"
    - "  Data: {{ data_05 | default('') | trim }}"
    - "  Status: {{ status_05 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_05 | default('') | trim }}"
    - ""
    - "REQUIREMENT 06 - {{ req_06 }}:"
    - "  Task: {{ task_06_name | default('Not recorded') }}"
    - "  Command: {{ task_06_cmd | default('N/A') }}"
    - "  Exit code: {{ task_06_rc | default(-1) }}"
    - "  Data: {{ data_06 | default('') | trim }}"
    - "  Status: {{ status_06 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_06 | default('') | trim }}"
    - ""
    - "OVERALL COMPLIANCE:"
    - "  Result: {{ cis_result | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_05 | default('Not evaluated') | trim }}"
