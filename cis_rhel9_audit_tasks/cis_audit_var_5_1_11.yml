req_01: "Check if OpenSSH server is installed using command: `which sshd || dpkg -l | grep openssh-server || rpm -q openssh-server`. Expected result: sshd binary or package is present."
req_02: "Check the global GSSAPIAuthentication setting using command: `sshd -T | grep gssapiauthentication`. Expected result: gssapiauthentication no"
req_03: "If Match blocks are used, check GSSAPIAuthentication for a specific user (e.g., sshuser) using command: `sshd -T -C user=sshuser | grep gssapiauthentication`. Expected result: gssapiauthentication no"
req_04: "If Match blocks are used, check GSSAPIAuthentication for a specific source address using command: `sshd -T -C addr=192.168.1.1 | grep gssapiauthentication`. Expected result: gssapiauthentication no"
req_05: "If Match blocks are used, check GSSAPIAuthentication for a specific host using command: `sshd -T -C host=example.com | grep gssapiauthentication`. Expected result: gssapiauthentication no"
req_06: "If Match blocks are used, check GSSAPIAuthentication for a specific local address using command: `sshd -T -C laddr=10.0.0.1 | grep gssapiauthentication`. Expected result: gssapiauthentication no"
req_07: "If Match blocks are used, check GSSAPIAuthentication for a specific local port using command: `sshd -T -C lport=22 | grep gssapiauthentication`. Expected result: gssapiauthentication no"
req_08: "If Match blocks are used, check GSSAPIAuthentication for a specific routing domain using command: `sshd -T -C rdomain=example | grep gssapiauthentication`. Expected result: gssapiauthentication no"
req_09: "Summarize overall compliance: GSSAPIAuthentication must be disabled (set to no) in all applicable contexts. Expected result: All checks return 'gssapiauthentication no'."
