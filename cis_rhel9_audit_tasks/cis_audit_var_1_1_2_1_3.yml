mount_point: "/tmp"
mount_option: "nosuid"
cis_ref: "CIS Benchmark checkpoint 1.1.2.1.3"
req_01: "Check if a separate partition exists for /tmp using command: `findmnt -n /tmp`. Expected result: output should show a mount point for /tmp."
req_02: "Check if the nosuid option is set on /tmp partition using command: `findmnt -kn /tmp | grep -v nosuid`. Expected result: no output should be returned."
req_03: "Summarize overall compliance: if both checks pass, the system is compliant; otherwise, it is non-compliant."
req_04: "Store the final audit result in a variable named 'cis_result' using set_fact. Set cis_result to the overall compliance status (PASS/FAIL/SKIP/UNKNOWN) derived from the last requirement's status variable."
