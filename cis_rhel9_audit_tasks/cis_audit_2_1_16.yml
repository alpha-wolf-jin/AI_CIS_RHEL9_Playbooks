---
- name: Initialize meta data variables
  include_vars: cis_audit_var_2_1_16.yml

- name: "Initialize data variables"
  set_fact:
    task_01_name: "Not executed"
    task_01_cmd: "N/A"
    task_01_rc: -1
    data_01: "Not collected yet"
    status_01: "ERROR"
    details_01: "Not evaluated"
    task_02_name: "Not executed"
    task_02_cmd: "N/A"
    task_02_rc: -1
    data_02: "Not collected yet"
    status_02: "ERROR"
    details_02: "Not evaluated"
    task_03_name: "Not executed"
    task_03_cmd: "N/A"
    task_03_rc: -1
    data_03: "Not collected yet"
    status_03: "ERROR"
    details_03: "Not evaluated"
    task_04_name: "Not executed"
    task_04_cmd: "N/A"
    task_04_rc: -1
    data_04: "Not collected yet"
    status_04: "ERROR"
    details_04: "Not evaluated"

- name: "Req 1 - Check if tftp-server package is installed using rpm"
  ansible.builtin.shell: rpm -q tftp-server
  args:
    executable: /bin/bash
  register: result_01
  failed_when: false
  changed_when: false

- name: "Store requirement 01 details"
  set_fact:
    task_01_name: "Check if tftp-server package is installed using rpm"
    task_01_cmd: "rpm -q tftp-server"
    task_01_rc: "{{ result_01.rc | default(-1) }}"
    data_01: "{{ result_01.stdout | default('') | trim }}"
    status_01: "{{ 'PASS' if result_01.rc | default(-1) != 0 else 'FAIL' }}"
    details_01: >-
      {{ 'tftp-server is not installed' if result_01.rc | default(-1) != 0 else 'Package tftp-server is installed' }}

- name: "Set statuses when tftp-server is not installed"
  set_fact:
    status_02: "SKIP"
    details_02: "tftp-server is not installed, check skipped"
    task_02_name: "Not applicable - package not installed"
    task_02_cmd: "systemctl is-enabled tftp.socket tftp.service 2>/dev/null | grep 'enabled'"
    status_03: "SKIP"
    details_03: "tftp-server is not installed, check skipped"
    task_03_name: "Not applicable - package not installed"
    task_03_cmd: "systemctl is-active tftp.socket tftp.service 2>/dev/null | grep '^active'"
    status_04: "PASS"
    details_04: "Overall PASS: tftp-server is not installed"
    task_04_name: "Overall compliance summary"
    task_04_cmd: "N/A"
    task_04_rc: 0
    data_04: "N/A"
  when: "result_01.rc | default(-1) != 0"

- name: "Req 2 - Check if tftp.socket and tftp.service are enabled"
  ansible.builtin.shell: systemctl is-enabled tftp.socket tftp.service 2>/dev/null | grep 'enabled'
  args:
    executable: /bin/bash
  register: result_02
  failed_when: false
  changed_when: false
  when: "result_01.rc | default(-1) == 0"

- name: "Store requirement 02 details"
  set_fact:
    task_02_name: "Check if tftp.socket and tftp.service are enabled"
    task_02_cmd: "systemctl is-enabled tftp.socket tftp.service 2>/dev/null | grep 'enabled'"
    task_02_rc: "{{ result_02.rc | default(-1) }}"
    data_02: "{{ result_02.stdout | default('') | trim }}"
    status_02: >-
      {{ 'PASS' if (result_02.stdout | default('') | trim == '') else 'FAIL' }}
    details_02: >-
      {{ 'No enabled units found' if (result_02.stdout | default('') | trim == '') else 'Enabled units found: ' + result_02.stdout | default('') | trim }}
  when: "result_02 is defined and result_02.skipped is not defined"

- name: "Req 3 - Check if tftp.socket and tftp.service are active"
  ansible.builtin.shell: systemctl is-active tftp.socket tftp.service 2>/dev/null | grep '^active'
  args:
    executable: /bin/bash
  register: result_03
  failed_when: false
  changed_when: false
  when: "result_01.rc | default(-1) == 0"

- name: "Store requirement 03 details"
  set_fact:
    task_03_name: "Check if tftp.socket and tftp.service are active"
    task_03_cmd: "systemctl is-active tftp.socket tftp.service 2>/dev/null | grep '^active'"
    task_03_rc: "{{ result_03.rc | default(-1) }}"
    data_03: "{{ result_03.stdout | default('') | trim }}"
    status_03: >-
      {{ 'PASS' if (result_03.stdout | default('') | trim == '') else 'FAIL' }}
    details_03: >-
      {{ 'No active units found' if (result_03.stdout | default('') | trim == '') else 'Active units found: ' + result_03.stdout | default('') | trim }}
  when: "result_03 is defined and result_03.skipped is not defined"

- name: "Req 4 - Set overall compliance status"
  set_fact:
    task_04_name: "Overall compliance summary"
    task_04_cmd: "N/A"
    task_04_rc: 0
    data_04: "N/A"
    status_04: >-
      {{ 'PASS' if ((status_02 | default('ERROR') == 'PASS') and (status_03 | default('ERROR') == 'PASS')) else 'FAIL' }}
  when: "result_01.rc | default(-1) == 0"

- name: "Req 4 - Set overall compliance details"
  set_fact:
    details_04: >-
      {{ 'Overall PASS: tftp server services not in use (services not enabled/active)' if status_04 == 'PASS'
         else 'Overall FAIL: tftp server services are in use' }}
  when: "result_01.rc | default(-1) == 0"

- name: "Store final result in cis_result"
  set_fact:
    cis_result: "{{ status_04 | default('ERROR') | trim }}"

- name: "Generate audit report"
  debug:
    msg:
    - "AUDIT REPORT — CIS 2.1.16"
    - "Reference: CIS Benchmark checkpoint 2.1.16"
    - ""
    - "REQUIREMENT 01 - {{ req_01 }}:"
    - "  Task: {{ task_01_name | default('Not recorded') }}"
    - "  Command: {{ task_01_cmd | default('N/A') }}"
    - "  Exit code: {{ task_01_rc | default(-1) }}"
    - "  Data: {{ data_01 | default('') | trim }}"
    - "  Status: {{ status_01 | default('ERROR') | trim }}"
    - "  Details: {{ details_01 | default('') | trim }}"
    - ""
    - "REQUIREMENT 02 - {{ req_02 }}:"
    - "  Task: {{ task_02_name | default('Not recorded') }}"
    - "  Command: {{ task_02_cmd | default('N/A') }}"
    - "  Exit code: {{ task_02_rc | default(-1) }}"
    - "  Data: {{ data_02 | default('') | trim }}"
    - "  Status: {{ status_02 | default('ERROR') | trim }}"
    - "  Details: {{ details_02 | default('') | trim }}"
    - ""
    - "REQUIREMENT 03 - {{ req_03 }}:"
    - "  Task: {{ task_03_name | default('Not recorded') }}"
    - "  Command: {{ task_03_cmd | default('N/A') }}"
    - "  Exit code: {{ task_03_rc | default(-1) }}"
    - "  Data: {{ data_03 | default('') | trim }}"
    - "  Status: {{ status_03 | default('ERROR') | trim }}"
    - "  Details: {{ details_03 | default('') | trim }}"
    - ""
    - "REQUIREMENT 04 - {{ req_04 }}:"
    - "  Task: {{ task_04_name | default('Not recorded') }}"
    - "  Command: {{ task_04_cmd | default('N/A') }}"
    - "  Exit code: {{ task_04_rc | default(-1) }}"
    - "  Data: {{ data_04 | default('') | trim }}"
    - "  Status: {{ status_04 | default('ERROR') | trim }}"
    - "  Details: {{ details_04 | default('') | trim }}"
    - ""
    - "OVERALL COMPLIANCE:"
    - "  Result: {{ cis_result | default('ERROR') | trim }}"
    - "  Details: {{ details_04 | default('Not evaluated') | trim }}"
