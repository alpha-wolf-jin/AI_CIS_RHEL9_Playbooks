---
- name: Initialize meta data variables
  include_vars: cis_audit_var_2_1_7.yml

- name: "Initialize data variables"
  set_fact:
    data_01: "Not collected yet"
    status_01: "ERROR"
    details_01: "Not evaluated"
    data_02: "Not collected yet"
    status_02: "ERROR"
    details_02: "Not evaluated"
    data_03: "Not collected yet"
    status_03: "ERROR"
    details_03: "Not evaluated"
    data_04: "Not collected yet"
    status_04: "ERROR"
    details_04: "Not evaluated"
    data_05: "Not collected yet"
    status_05: "ERROR"
    details_05: "Not evaluated"
    data_06: "Not collected yet"
    status_06: "ERROR"
    details_06: "Not evaluated"
    data_07: "Not collected yet"
    status_07: "ERROR"
    details_07: "Not evaluated"
    task_01_name: "Not executed"
    task_01_cmd: "N/A"
    task_01_rc: -1

# Requirement 1
- name: "Req 01 - Check if vsftpd package is installed"
  shell: rpm -q vsftpd
  args:
    executable: /bin/bash
  register: result_01
  failed_when: false
  changed_when: false

- name: "Store requirement 01 details"
  set_fact:
    task_01_name: "Req 01 - Check if vsftpd package is installed"
    task_01_cmd: "rpm -q vsftpd"
    task_01_rc: "{{ result_01.rc | default(-1) }}"
    data_01: "{{ result_01.stdout | default('') | trim }}"
    status_01: "{{ ('PASS' if result_01.rc | default(-1) != 0 else 'FAIL') | trim }}"
    details_01: "{{ ('Package not installed' if result_01.rc | default(-1) != 0 else 'Package installed') | trim }}"

- name: "Set vsftpd_installed fact"
  set_fact:
    vsftpd_installed: "{{ result_01.rc | default(1) == 0 }}"

# Requirement 2
- name: "Req 02 - Check if vsftpd service is enabled"
  shell: 'systemctl is-enabled vsftpd.service 2>/dev/null | grep ''enabled'''
  args:
    executable: /bin/bash
  register: result_02
  failed_when: false
  changed_when: false
  when: vsftpd_installed | bool

- name: "Store requirement 02 details"
  set_fact:
    task_02_name: "Req 02 - Check if vsftpd service is enabled"
    task_02_cmd: "systemctl is-enabled vsftpd.service 2>/dev/null | grep 'enabled'"
    task_02_rc: "{{ result_02.rc | default(-1) }}"
    data_02: "{{ result_02.stdout | default('') | trim }}"
    status_02: "{{ ('SKIP' if not vsftpd_installed else ('PASS' if result_02.rc | default(1) != 0 else 'FAIL')) | trim }}"
    details_02: "{{ ('Not applicable - vsftpd package not installed' if not vsftpd_installed else ('Service not enabled' if result_02.rc | default(1) != 0 else 'Service enabled')) | trim }}"

# Requirement 3
- name: "Req 03 - Check if vsftpd service is active"
  shell: 'systemctl is-active vsftpd.service 2>/dev/null | grep ''^active'''
  args:
    executable: /bin/bash
  register: result_03
  failed_when: false
  changed_when: false
  when: vsftpd_installed | bool

- name: "Store requirement 03 details"
  set_fact:
    task_03_name: "Req 03 - Check if vsftpd service is active"
    task_03_cmd: "systemctl is-active vsftpd.service 2>/dev/null | grep '^active'"
    task_03_rc: "{{ result_03.rc | default(-1) }}"
    data_03: "{{ result_03.stdout | default('') | trim }}"
    status_03: "{{ ('SKIP' if not vsftpd_installed else ('PASS' if result_03.rc | default(1) != 0 else 'FAIL')) | trim }}"
    details_03: "{{ ('Not applicable - vsftpd package not installed' if not vsftpd_installed else ('Service not active' if result_03.rc | default(1) != 0 else 'Service active')) | trim }}"

# Requirement 4
- name: "Req 04 - Check if other FTP server packages are installed"
  shell: "rpm -q {{ item }} 2>/dev/null"
  with_items: "{{ other_ftp_packages }}"
  register: result_04
  failed_when: false
  changed_when: false

- name: "Set other_ftp_installed fact"
  set_fact:
    other_ftp_installed: "{{ result_04.results | selectattr('rc', 'equalto', 0) | list | length > 0 }}"

- name: "Store requirement 04 details"
  set_fact:
    task_04_name: "Req 04 - Check if other FTP server packages are installed"
    task_04_cmd: "rpm -q {{ other_ftp_packages | join(' ') }} 2>/dev/null"
    task_04_rc: "n/a (loop)"
    data_04: "{{ result_04.results | map(attribute='stdout') | join(', ') | trim }}"
    status_04: "{{ 'PASS' if (result_04.results | selectattr('rc', 'equalto', 0) | list | length) == 0 else 'FAIL' }}"
    details_04: "{{ 'No unauthorized FTP packages installed' if (result_04.results | selectattr('rc', 'equalto', 0) | list | length) == 0 else 'Unauthorized packages found' }}"

# Requirement 5
- name: "Req 05a - Check if other FTP services are enabled"
  shell: "systemctl is-enabled {{ item }} 2>/dev/null | grep 'enabled'"
  with_items: "{{ other_ftp_services }}"
  register: result_05_enabled
  failed_when: false
  changed_when: false
  when: other_ftp_installed | bool

- name: "Req 05b - Check if other FTP services are active"
  shell: "systemctl is-active {{ item }} 2>/dev/null | grep '^active'"
  with_items: "{{ other_ftp_services }}"
  register: result_05_active
  failed_when: false
  changed_when: false
  when: other_ftp_installed | bool

- name: "Store requirement 05 details"
  set_fact:
    task_05_name: "Req 05 - Verify other FTP services are not enabled or active"
    task_05_cmd: "systemctl is-enabled / is-active on {{ other_ftp_services | join(', ') }}"
    task_05_rc: "combined"
    data_05: >-
      {% set enabled_out = (result_05_enabled.results | default([]) | rejectattr('skipped', 'true') | map(attribute='stdout') | join(', ')) %}
      {% set active_out = (result_05_active.results | default([]) | rejectattr('skipped', 'true') | map(attribute='stdout') | join(', ')) %}
      Enabled: {{ enabled_out }}; Active: {{ active_out }}
    status_05: >-
      {%- if not (other_ftp_installed | bool) -%} SKIP
      {%- else -%}
        {%- set enabled_count = (result_05_enabled.results | default([]) | rejectattr('skipped', 'true') | selectattr('rc', 'equalto', 0) | list | length) -%}
        {%- set active_count = (result_05_active.results | default([]) | rejectattr('skipped', 'true') | selectattr('rc', 'equalto', 0) | list | length) -%}
        {%- if enabled_count == 0 and active_count == 0 -%} PASS
        {%- else -%} FAIL
        {%- endif %}
      {%- endif %}
    details_05: >-
      {%- if not (other_ftp_installed | bool) -%} Not applicable - no other FTP packages installed
      {%- else -%}
        {%- set enabled_count = (result_05_enabled.results | default([]) | rejectattr('skipped', 'true') | selectattr('rc', 'equalto', 0) | list | length) -%}
        {%- set active_count = (result_05_active.results | default([]) | rejectattr('skipped', 'true') | selectattr('rc', 'equalto', 0) | list | length) -%}
        {%- if enabled_count == 0 and active_count == 0 -%} All other FTP services are not enabled or active
        {%- else -%} Some FTP services are enabled or active
        {%- endif %}
      {%- endif %}

# Requirement 6
- name: "Req 06 - Determine overall compliance status"
  set_fact:
    cis_result: >-
      {%- if 'FAIL' in [status_01, status_02, status_03, status_04, status_05] -%} FAIL
      {%- elif 'ERROR' in [status_01, status_02, status_03, status_04, status_05] -%} ERROR
      {%- elif not vsftpd_installed | bool and not (other_ftp_installed | bool) -%} SKIP
      {%- else -%} PASS
      {%- endif %}

- name: "Store requirement 06 details"
  set_fact:
    task_06_name: "Req 06 - Summarize overall compliance status"
    task_06_cmd: "Aggregate status_01..05"
    task_06_rc: "n/a"
    data_06: "{{ cis_result }}"
    status_06: "{{ cis_result }}"
    details_06: "Overall compliance determined"

# Requirement 7
- name: "Req 07 - Store final audit result in cis_result"
  set_fact:
    cis_result: "{{ cis_result }}"
  register: result_07

- name: "Store requirement 07 details"
  set_fact:
    task_07_name: "Req 07 - Store final audit result"
    task_07_cmd: "set_fact cis_result"
    task_07_rc: "0"
    data_07: "{{ cis_result }}"
    status_07: "{{ cis_result }}"
    details_07: "cis_result stored"

# Final report
- name: "Generate audit report"
  debug:
    msg:
    - "AUDIT REPORT — CIS 2.1.7"
    - "Reference: CIS Benchmark checkpoint 2.1.7"
    - ""
    - "REQUIREMENT 01 - {{ req_01 }}:"
    - "  Task: {{ task_01_name | default('Not recorded') }}"
    - "  Command: {{ task_01_cmd | default('N/A') }}"
    - "  Exit code: {{ task_01_rc | default(-1) }}"
    - "  Data: {{ data_01 | default('') | trim }}"
    - "  Status: {{ status_01 | default('ERROR') | trim }}"
    - "  Details: {{ details_01 | default('') | trim }}"
    - ""
    - "REQUIREMENT 02 - {{ req_02 }}:"
    - "  Task: {{ task_02_name | default('Not recorded') }}"
    - "  Command: {{ task_02_cmd | default('N/A') }}"
    - "  Exit code: {{ task_02_rc | default(-1) }}"
    - "  Data: {{ data_02 | default('') | trim }}"
    - "  Status: {{ status_02 | default('ERROR') | trim }}"
    - "  Details: {{ details_02 | default('') | trim }}"
    - ""
    - "REQUIREMENT 03 - {{ req_03 }}:"
    - "  Task: {{ task_03_name | default('Not recorded') }}"
    - "  Command: {{ task_03_cmd | default('N/A') }}"
    - "  Exit code: {{ task_03_rc | default(-1) }}"
    - "  Data: {{ data_03 | default('') | trim }}"
    - "  Status: {{ status_03 | default('ERROR') | trim }}"
    - "  Details: {{ details_03 | default('') | trim }}"
    - ""
    - "REQUIREMENT 04 - {{ req_04 }}:"
    - "  Task: {{ task_04_name | default('Not recorded') }}"
    - "  Command: {{ task_04_cmd | default('N/A') }}"
    - "  Exit code: {{ task_04_rc | default(-1) }}"
    - "  Data: {{ data_04 | default('') | trim }}"
    - "  Status: {{ status_04 | default('ERROR') | trim }}"
    - "  Details: {{ details_04 | default('') | trim }}"
    - ""
    - "REQUIREMENT 05 - {{ req_05 }}:"
    - "  Task: {{ task_05_name | default('Not recorded') }}"
    - "  Command: {{ task_05_cmd | default('N/A') }}"
    - "  Exit code: {{ task_05_rc | default(-1) }}"
    - "  Data: {{ data_05 | default('') | trim }}"
    - "  Status: {{ status_05 | default('ERROR') | trim }}"
    - "  Details: {{ details_05 | default('') | trim }}"
    - ""
    - "REQUIREMENT 06 - {{ req_06 }}:"
    - "  Task: {{ task_06_name | default('Not recorded') }}"
    - "  Command: {{ task_06_cmd | default('N/A') }}"
    - "  Exit code: {{ task_06_rc | default(-1) }}"
    - "  Data: {{ data_06 | default('') | trim }}"
    - "  Status: {{ status_06 | default('ERROR') | trim }}"
    - "  Details: {{ details_06 | default('') | trim }}"
    - ""
    - "REQUIREMENT 07 - {{ req_07 }}:"
    - "  Task: {{ task_07_name | default('Not recorded') }}"
    - "  Command: {{ task_07_cmd | default('N/A') }}"
    - "  Exit code: {{ task_07_rc | default(-1) }}"
    - "  Data: {{ data_07 | default('') | trim }}"
