---
- name: Initialize meta data variables
  include_vars: cis_audit_var_5_4_3_2.yml

- name: "Gather package facts"
  ansible.builtin.package_facts:
    manager: auto
  failed_when: false

- name: "Check if bash package is installed"
  set_fact:
    bash_installed: "{{ 'bash' in ansible_facts.packages }}"

- name: "Req 01 - Run audit script to verify TMOUT configuration"
  block:
  - name: "Req 01 - Copy audit script to remote"
    ansible.builtin.copy:
      dest: "{{ audit_script }}"
      mode: '0700'
      content: "{{ audit_script_content }}"
    changed_when: false
    failed_when: false

  - name: "Req 01 - Execute audit script"
    ansible.builtin.shell: /bin/bash "{{ audit_script }}"
    args:
      executable: /bin/bash
    register: audit_result
    failed_when: false
    changed_when: false

  always:
  - name: "Req 01 - Remove temporary audit script"
    ansible.builtin.file:
      path: "{{ audit_script }}"
      state: absent
    changed_when: false
    failed_when: false

  when: bash_installed | bool

- name: "Store audit results when bash is installed"
  set_fact:
    task_01_name: "Run provided audit script for TMOUT configuration"
    task_01_cmd: "/bin/bash {{ audit_script }}"
    task_01_rc: "{{ audit_result.rc | default(-1) }}"
    data_01: "{{ audit_result.stdout | default('') | trim }}"
    status_01: "{{ ('PASS' if '** PASS **' in audit_result.stdout | default('') else 'FAIL') | trim }}"
    details_01: "{{ ('Audit script completed successfully' if audit_result.rc | default(-1) == 0 else 'Audit script produced non‑zero exit code') | trim }}"
  when: bash_installed | bool

- name: "Set default audit results when bash is not installed"
  set_fact:
    task_01_name: "Run provided audit script for TMOUT configuration"
    task_01_cmd: "N/A"
    task_01_rc: -1
    data_01: "N/A (bash not installed)"
    status_01: "NOT_APPLICABLE"
    details_01: "Bash is not installed on this system; CIS 5.4.3.2 is not applicable"
  when: not bash_installed | bool

- name: "Store requirement 02 details"
  set_fact:
    task_02_name: "Summarise compliance status from audit script output"
    task_02_cmd: "Evaluated from audit script result"
    task_02_rc: "{{ task_01_rc }}"
    data_02: "{{ data_01 }}"
    status_02: "{{ status_01 }}"
    details_02: "{{ details_01 }}"

- name: "Store requirement 03 details - set cis_result"
  set_fact:
    task_03_name: "Store final audit result in cis_result"
    task_03_cmd: "cis_result = status_02"
    task_03_rc: 0
    data_03: "cis_result set to {{ status_02 | trim }}"
    status_03: "{{ status_02 | trim }}"
    details_03: "Variable cis_result stored successfully"
    cis_result: "{{ status_02 | trim }}"

- name: "Generate audit report"
  debug:
    msg:
    - "AUDIT REPORT — CIS 5.4.3.2"
    - "Reference: CIS Benchmark checkpoint 5.4.3.2"
    - ""
    - "REQUIREMENT 01 - {{ req_01 }}:"
    - "  Task: {{ task_01_name | default('Not recorded') }}"
    - "  Command: {{ task_01_cmd | default('N/A') }}"
    - "  Exit code: {{ task_01_rc | default(-1) }}"
    - "  Data: {{ data_01 | default('') | trim }}"
    - "  Status: {{ status_01 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_01 | default('') | trim }}"
    - ""
    - "REQUIREMENT 02 - {{ req_02 }}:"
    - "  Task: {{ task_02_name | default('Not recorded') }}"
    - "  Command: {{ task_02_cmd | default('N/A') }}"
    - "  Exit code: {{ task_02_rc | default(-1) }}"
    - "  Data: {{ data_02 | default('') | trim }}"
    - "  Status: {{ status_02 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_02 | default('') | trim }}"
    - ""
    - "REQUIREMENT 03 - {{ req_03 }}:"
    - "  Task: {{ task_03_name | default('Not recorded') }}"
    - "  Command: {{ task_03_cmd | default('N/A') }}"
    - "  Exit code: {{ task_03_rc | default(-1) }}"
    - "  Data: {{ data_03 | default('') | trim }}"
    - "  Status: {{ status_03 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_03 | default('') | trim }}"
    - ""
    - "========================================================"
    - "OVERALL COMPLIANCE:"
    - "  Result: {{ cis_result | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_02 | default('Not evaluated') | trim }}"
    - "========================================================"
