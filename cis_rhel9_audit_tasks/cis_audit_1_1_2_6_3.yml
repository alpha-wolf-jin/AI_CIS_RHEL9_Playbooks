---
- name: Initialize meta data variables
  include_vars: cis_audit_var_1_1_2_6_3.yml

- name: "Initialize data variables"
  set_fact:
    data_01: "Not collected yet"
    status_01: "ERROR"
    details_01: "Not evaluated"
    data_02: "Not collected yet"
    status_02: "ERROR"
    details_02: "Not evaluated"
    data_03: "Not collected yet"
    status_03: "ERROR"
    details_03: "Not evaluated"
    data_04: "Not collected yet"
    status_04: "ERROR"
    details_04: "Not evaluated"
    task_01_name: "Not executed"
    task_01_cmd: "N/A"
    task_01_rc: -1
    task_02_name: "Not executed"
    task_02_cmd: "N/A"
    task_02_rc: -1
    task_03_name: "Not executed"
    task_03_cmd: "N/A"
    task_03_rc: -1
    task_04_name: "Not executed"
    task_04_cmd: "N/A"
    task_04_rc: -1

- name: "Req 01 - Check if a separate partition exists for /var/log"
  ansible.builtin.command: "findmnt -kn /var/log"
  register: result_01
  failed_when: false
  changed_when: false

- name: "Store requirement 01 details"
  set_fact:
    task_01_name: "Check if a separate partition exists for /var/log"
    task_01_cmd: "findmnt -kn /var/log"
    task_01_rc: "{{ result_01.rc | default(-1) }}"
    data_01: "{{ result_01.stdout | default('') | trim }}"
    status_01: "{{ 'SKIP' if (result_01.stdout | default('') | trim) == '' else 'PASS' }}"
    details_01: "{{ 'No separate partition found for /var/log - audit not applicable' if (result_01.stdout | default('') | trim) == '' else 'Partition exists for /var/log' }}"

- name: "Req 02 - Check if nosuid option is set on /var/log partition"
  ansible.builtin.shell: |
    findmnt -kn /var/log | grep -v nosuid
  args:
    executable: /bin/bash
  register: result_02
  failed_when: false
  changed_when: false
  when: "status_01 | trim == 'PASS'"

- name: "Store requirement 02 details"
  set_fact:
    task_02_name: "Check if nosuid option is set on /var/log partition"
    task_02_cmd: "findmnt -kn /var/log | grep -v nosuid"
    task_02_rc: "{{ result_02.rc | default(-1) if result_02 is defined else -1 }}"
    data_02: "{{ result_02.stdout | default('') | trim if result_02 is defined else '' }}"
    status_02: "{{ 'SKIP' if status_01 | trim == 'SKIP' else ('PASS' if result_02 is defined and (result_02.stdout | default('') | trim) == '' else 'FAIL') }}"
    details_02: "{{ 'Skipped - no separate partition' if status_01 | trim == 'SKIP' else ('nosuid option is set on /var/log partition' if result_02 is defined and (result_02.stdout | default('') | trim) == '' else 'nosuid option is NOT set on /var/log partition') }}"

- name: "Req 03 - Summarize overall compliance"
  set_fact:
    task_03_name: "Summarize overall compliance"
    task_03_cmd: "set_fact"
    task_03_rc: 0
    data_03: "{{ status_02 | default('ERROR') | trim }}"
    status_03: "{{ status_02 | default('ERROR') | trim }}"
    details_03: "{{ details_02 | default('Not evaluated') | trim }}"

- name: "Req 04 - Store final audit result in cis_result"
  set_fact:
    cis_result: "{{ status_03 | default('ERROR') | trim }}"
    task_04_name: "Store final audit result in cis_result"
    task_04_cmd: "set_fact"
    task_04_rc: 0
    data_04: "{{ status_03 | default('ERROR') | trim }}"
    status_04: "PASS"
    details_04: "cis_result set to {{ status_03 | default('ERROR') | trim }}"

- name: "Generate audit report"
  debug:
    msg:
    - "AUDIT REPORT — CIS 1.1.2.6.3"
    - "Reference: CIS Benchmark checkpoint 1.1.2.6.3"
    - ""
    - "REQUIREMENT 01 - {{ req_01 }}:"
    - "  Task: {{ task_01_name | default('Not recorded') }}"
    - "  Command: {{ task_01_cmd | default('N/A') }}"
    - "  Exit code: {{ task_01_rc | default(-1) }}"
    - "  Data: {{ data_01 | default('') | trim }}"
    - "  Status: {{ status_01 | default('ERROR') | trim }}"
    - "  Details: {{ details_01 | default('') | trim }}"
    - ""
    - "REQUIREMENT 02 - {{ req_02 }}:"
    - "  Task: {{ task_02_name | default('Not recorded') }}"
    - "  Command: {{ task_02_cmd | default('N/A') }}"
    - "  Exit code: {{ task_02_rc | default(-1) }}"
    - "  Data: {{ data_02 | default('') | trim }}"
    - "  Status: {{ status_02 | default('ERROR') | trim }}"
    - "  Details: {{ details_02 | default('') | trim }}"
    - ""
    - "REQUIREMENT 03 - {{ req_03 }}:"
    - "  Task: {{ task_03_name | default('Not recorded') }}"
    - "  Command: {{ task_03_cmd | default('N/A') }}"
    - "  Exit code: {{ task_03_rc | default(-1) }}"
    - "  Data: {{ data_03 | default('') | trim }}"
    - "  Status: {{ status_03 | default('ERROR') | trim }}"
    - "  Details: {{ details_03 | default('') | trim }}"
    - ""
    - "REQUIREMENT 04 - {{ req_04 }}:"
    - "  Task: {{ task_04_name | default('Not recorded') }}"
    - "  Command: {{ task_04_cmd | default('N/A') }}"
    - "  Exit code: {{ task_04_rc | default(-1) }}"
    - "  Data: {{ data_04 | default('') | trim }}"
    - "  Status: {{ status_04 | default('ERROR') | trim }}"
    - "  Details: {{ details_04 | default('') | trim }}"
    - ""
    - "========================================================"
    - "OVERALL COMPLIANCE:"
    - "  Result: {{ cis_result | default('ERROR') | trim }}"
    - "  Details: {{ details_03 | default('Not evaluated') | trim }}"
    - "========================================================"
