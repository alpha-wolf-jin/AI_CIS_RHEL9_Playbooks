---
- name: Initialize meta data variables
  include_vars: cis_audit_var_1_1_2_6_3.yml

- name: "Req 01 - Check if a separate partition exists for /var/log using findmnt command"
  ansible.builtin.command: findmnt -kn /var/log
  register: result_01
  failed_when: false
  changed_when: false

- name: "Req 02 - Check if nosuid option is set on /var/log partition using findmnt and grep"
  ansible.builtin.shell: findmnt -kn /var/log | grep -v nosuid
  args:
    executable: /bin/bash
  register: result_02
  failed_when: false
  changed_when: false

- name: "Req 03 - Determine overall compliance status"
  set_fact:
    status_01: "{{ ('PASS' if (result_01.stdout | default('') | trim) != '' else 'FAIL') | trim }}"
    details_01: "{{ ('Partition exists for /var/log' if (result_01.stdout | default('') | trim) != '' else 'No separate partition found for /var/log') | trim }}"
    status_02: "{{ ('SKIPPED' if (result_01.stdout | default('') | trim) == '' else ('PASS' if (result_02.stdout | default('') | trim) == '' else 'FAIL')) | trim }}"
    details_02: "{{ ('No partition to check - skipped' if (result_01.stdout | default('') | trim) == '' else ('nosuid option is set (no output from grep -v nosuid)' if (result_02.stdout | default('') | trim) == '' else 'nosuid option is NOT set - output contains mount info')) | trim }}"
    status_03: "{{ ('SKIPPED' if (result_01.stdout | default('') | trim) == '' else ('PASS' if (result_02.stdout | default('') | trim) == '' else 'FAIL')) | trim }}"
    details_03: "{{ ('No separate partition exists for /var/log - requirement not applicable' if (result_01.stdout | default('') | trim) == '' else ('nosuid option is set on /var/log partition - compliant' if (result_02.stdout | default('') | trim) == '' else 'nosuid option is NOT set on /var/log partition - non-compliant')) | trim }}"

- name: "Req 04 - Store final audit result in cis_result"
  set_fact:
    cis_result: "{{ status_03 }}"
    task_04_name: "Store final audit result in cis_result"
    task_04_cmd: "set_fact"
    task_04_rc: 0
    data_04: "{{ status_03 }}"
    status_04: "PASS"
    details_04: "cis_result set to {{ status_03 }}"

- name: "Generate audit report"
  debug:
    msg:
    - "AUDIT REPORT — CIS 1.1.2.6.3"
    - "Reference: CIS Benchmark checkpoint 1.1.2.6.3"
    - ""
    - "REQUIREMENT 01 - {{ req_01 }}:"
    - "  Task: Check if a separate partition exists for /var/log"
    - "  Command: findmnt -kn /var/log"
    - "  Exit code: {{ result_01.rc | default(-1) }}"
    - "  Data: {{ result_01.stdout | default('') | trim }}"
    - "  Status: {{ status_01 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_01 | default('Not evaluated') | trim }}"
    - ""
    - "REQUIREMENT 02 - {{ req_02 }}:"
    - "  Task: Check if nosuid option is set on /var/log partition"
    - "  Command: findmnt -kn /var/log | grep -v nosuid"
    - "  Exit code: {{ result_02.rc | default(-1) }}"
    - "  Data: {{ result_02.stdout | default('') | trim }}"
    - "  Status: {{ status_02 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_02 | default('Not evaluated') | trim }}"
    - ""
    - "REQUIREMENT 03 - {{ req_03 }}:"
    - "  Task: Determine overall compliance status"
    - "  Command: N/A (computed from results above)"
    - "  Exit code: 0"
    - "  Data: {{ status_03 | default('UNKNOWN') | trim }}"
    - "  Status: {{ status_03 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_03 | default('Not evaluated') | trim }}"
    - ""
    - "REQUIREMENT 04 - {{ req_04 }}:"
    - "  Task: {{ task_04_name | default('Not recorded') }}"
    - "  Command: {{ task_04_cmd | default('N/A') }}"
    - "  Exit code: {{ task_04_rc | default(-1) }}"
    - "  Data: {{ data_04 | default('') | trim }}"
    - "  Status: {{ status_04 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_04 | default('') | trim }}"
    - ""
    - "OVERALL COMPLIANCE:"
    - "  Result: {{ cis_result | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_03 | default('Not evaluated') | trim }}"
