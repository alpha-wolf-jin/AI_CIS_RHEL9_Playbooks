---
- name: Initialize meta data variables
  include_vars: cis_audit_var_5_1_19.yml

- name: "Initialize data variables"
  set_fact:
    data_01: "Not collected yet"
    status_01: "UNKNOWN"
    details_01: "Not evaluated"
    data_02: "Not collected yet"
    status_02: "UNKNOWN"
    details_02: "Not evaluated"
    data_03: "Not collected yet"
    status_03: "UNKNOWN"
    details_03: "Not evaluated"
    data_04: "Not collected yet"
    status_04: "UNKNOWN"
    details_04: "Not evaluated"
    data_05: "Not collected yet"
    status_05: "UNKNOWN"
    details_05: "Not evaluated"
    task_01_name: "Not executed"
    task_01_cmd: "N/A"
    task_01_rc: -1
    task_02_name: "Not executed"
    task_02_cmd: "N/A"
    task_02_rc: -1
    task_03_name: "Not executed"
    task_03_cmd: "N/A"
    task_03_rc: -1
    task_04_name: "Not executed"
    task_04_cmd: "N/A"
    task_04_rc: -1
    task_05_name: "Not executed"
    task_05_cmd: "N/A"
    task_05_rc: -1

- name: "Req 01 - Check OpenSSH server installation"
  shell: |
    which sshd || dpkg -l | grep openssh-server || rpm -q openssh-server
  args:
    executable: /bin/bash
  register: result_01
  failed_when: false
  changed_when: false

- name: "Store requirement 01 details and set sshd_installed fact"
  set_fact:
    task_01_name: "Check OpenSSH server installation"
    task_01_cmd: "which sshd || dpkg -l | grep openssh-server || rpm -q openssh-server"
    task_01_rc: "{{ result_01.rc | default(-1) }}"
    data_01: "{{ result_01.stdout | default('') | trim }}"
    status_01: "{{ 'PASS' if (result_01.rc | default(-1)) == 0 else 'FAIL' }}"
    details_01: "{{ 'OpenSSH server is installed' if (result_01.rc | default(-1)) == 0 else 'OpenSSH server not found' }}"
    sshd_installed: "{{ (result_01.rc | default(-1)) == 0 }}"

- name: "Mark requirement 02 and 03 as skipped if sshd not installed"
  set_fact:
    status_02: "SKIP"
    details_02: "OpenSSH server not installed"
    data_02: ""
    status_03: "SKIP"
    details_03: "OpenSSH server not installed"
    data_03: ""
  when: not (sshd_installed | default(false) | bool)

- name: "Req 02 - Check global PermitEmptyPasswords"
  shell: "sshd -T | grep permitemptypasswords"
  args:
    executable: /bin/bash
  register: result_02
  failed_when: false
  changed_when: false
  when: sshd_installed | default(false) | bool

- name: "Store requirement 02 details"
  set_fact:
    task_02_name: "Check global PermitEmptyPasswords"
    task_02_cmd: "sshd -T | grep permitemptypasswords"
    task_02_rc: "{{ result_02.rc | default(-1) }}"
    data_02: "{{ result_02.stdout | default('') | trim }}"
    status_02: >-
      {% if result_02.rc | default(-1) == 0 and 'permitemptypasswords no' in result_02.stdout | default('') | lower %}
        PASS
      {% else %}
        FAIL
      {% endif %}
    details_02: >-
      {% if result_02.rc | default(-1) == 0 and 'permitemptypasswords no' in result_02.stdout | default('') | lower %}
        Global configuration correct
      {% else %}
        Global configuration incorrect or command failed
      {% endif %}
  when: sshd_installed | default(false) | bool

- name: "Req 03 - Check user-specific PermitEmptyPasswords"
  shell: "sshd -T -C user={{ user_match }} | grep permitemptypasswords"
  args:
    executable: /bin/bash
  register: result_03
  failed_when: false
  changed_when: false
  when: sshd_installed | default(false) | bool

- name: "Store requirement 03 details"
  set_fact:
    task_03_name: "Check user-specific PermitEmptyPasswords"
    task_03_cmd: "sshd -T -C user={{ user_match }} | grep permitemptypasswords"
    task_03_rc: "{{ result_03.rc | default(-1) }}"
    data_03: "{{ result_03.stdout | default('') | trim }}"
    status_03: >-
      {% if result_03.rc | default(-1) == 0 and 'permitemptypasswords no' in result_03.stdout | default('') | lower %}
        PASS
      {% else %}
        FAIL
      {% endif %}
    details_03: >-
      {% if result_03.rc | default(-1) == 0 and 'permitemptypasswords no' in result_03.stdout | default('') | lower %}
        User-specific configuration correct
      {% else %}
        User-specific configuration incorrect or command failed
      {% endif %}
  when: sshd_installed | default(false) | bool

- name: "Req 04 - Summarize overall compliance status"
  set_fact:
    task_04_name: "Summarize overall compliance"
    task_04_cmd: "N/A"
    task_04_rc: 0
    status_04: >-
      {%- set s02 = status_02 | default('UNKNOWN') | trim -%}
      {%- set s03 = status_03 | default('UNKNOWN') | trim -%}
      {%- if not (sshd_installed | default(false) | bool) -%}
        NOT_APPLICABLE
      {%- elif s02 == 'FAIL' or s03 == 'FAIL' -%}
        FAIL
      {%- elif s02 == 'PASS' and s03 == 'PASS' -%}
        PASS
      {%- elif s02 == 'SKIP' or s03 == 'SKIP' -%}
        FAIL
      {%- else -%}
        UNKNOWN
      {%- endif -%}

- name: "Store requirement 04 data and details"
  set_fact:
    data_04: "{{ status_04 | trim }}"
    details_04: >-
      {%- if not (sshd_installed | default(false) | bool) -%}
        SSHD not installed, compliance not applicable
      {%- elif status_04 == 'PASS' -%}
        All checks passed
      {%- elif status_04 == 'FAIL' -%}
        One or more checks failed
      {%- else -%}
        Unknown compliance state
      {%- endif -%}

- name: "Req 05 - Store final audit result as cis_result"
  set_fact:
    cis_result: "{{ status_04 | default('UNKNOWN') | trim }}"
    task_05_name: "Store final audit result"
    task_05_cmd: "N/A"
    task_05_rc: 0
    status_05: "{{ status_04 | default('UNKNOWN') | trim }}"
    data_05: "{{ status_04 | default('UNKNOWN') | trim }}"
    details_05: "{{ details_04 | default('Not evaluated') | trim }}"

- name: "Generate audit report"
  debug:
    msg:
    - "AUDIT REPORT — CIS 5.1.19"
    - "Reference: CIS Benchmark checkpoint 5.1.19"
    - ""
    - "REQUIREMENT 01 - {{ req_01 }}:"
    - "  Task: {{ task_01_name | default('Not recorded') }}"
    - "  Command: {{ task_01_cmd | default('N/A') }}"
    - "  Exit code: {{ task_01_rc | default(-1) }}"
    - "  Data: {{ data_01 | default('') | trim }}"
    - "  Status: {{ status_01 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_01 | default('') | trim }}"
    - ""
    - "REQUIREMENT 02 - {{ req_02 }}:"
    - "  Task: {{ task_02_name | default('Not recorded') }}"
    - "  Command: {{ task_02_cmd | default('N/A') }}"
    - "  Exit code: {{ task_02_rc | default(-1) }}"
    - "  Data: {{ data_02 | default('') | trim }}"
    - "  Status: {{ status_02 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_02 | default('') | trim }}"
    - ""
    - "REQUIREMENT 03 - {{ req_03 }}:"
    - "  Task: {{ task_03_name | default('Not recorded') }}"
    - "  Command: {{ task_03_cmd | default('N/A') }}"
    - "  Exit code: {{ task_03_rc | default(-1) }}"
    - "  Data: {{ data_03 | default('') | trim }}"
    - "  Status: {{ status_03 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_03 | default('') | trim }}"
    - ""
    - "REQUIREMENT 04 - {{ req_04 }}:"
    - "  Task: {{ task_04_name | default('Not recorded') }}"
    - "  Command: {{ task_04_cmd | default('N/A') }}"
    - "  Exit code: {{ task_04_rc | default(-1) }}"
    - "  Data: {{ data_04 | default('') | trim }}"
    - "  Status: {{ status_04 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_04 | default('') | trim }}"
    - ""
    - "REQUIREMENT 05 - {{ req_05 }}:"
    - "  Task: {{ task_05_name | default('Not recorded') }}"
    - "  Command: {{ task_05_cmd | default('N/A') }}"
    - "  Exit code: {{ task_05_rc | default(-1) }}"
    - "  Data: {{ data_05 | default('') | trim }}"
    - "  Status: {{ status_05 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_05 | default('') | trim }}"
    - ""
    - "========================================================"
    - "OVERALL COMPLIANCE:"
    - "  Result: {{ cis_result | default('UNKNOWN') | trim }}"
    - "========================================================"
