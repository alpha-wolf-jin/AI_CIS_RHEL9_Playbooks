---
- name: Initialize meta data variables
  include_vars: cis_audit_var_5_1_11.yml

- name: "Req 01 - Check OpenSSH server installation"
  ansible.builtin.shell: which sshd || dpkg -l | grep openssh-server || rpm -q openssh-server
  args:
    executable: /bin/bash
  register: result_01
  failed_when: false
  changed_when: false

- name: "Set sshd installation flag"
  ansible.builtin.set_fact:
    sshd_installed: "{{ (result_01.rc == 0 and (result_01.stdout | default('') | trim) != '') | bool }}"

- name: "Req 02 - Check global GSSAPIAuthentication"
  ansible.builtin.shell: sshd -T | grep -i gssapiauthentication || echo 'NOT_FOUND'
  args:
    executable: /bin/bash
  register: result_02
  failed_when: false
  changed_when: false
  when: sshd_installed | bool

- name: "Req 03 - Check GSSAPIAuthentication for user match"
  ansible.builtin.shell: sshd -T -C user=sshuser | grep -i gssapiauthentication || echo 'NOT_FOUND'
  args:
    executable: /bin/bash
  register: result_03
  failed_when: false
  changed_when: false
  when: sshd_installed | bool

- name: "Req 04 - Check GSSAPIAuthentication for source address"
  ansible.builtin.shell: sshd -T -C addr=192.168.1.1 | grep -i gssapiauthentication || echo 'NOT_FOUND'
  args:
    executable: /bin/bash
  register: result_04
  failed_when: false
  changed_when: false
  when: sshd_installed | bool

- name: "Req 05 - Check GSSAPIAuthentication for host"
  ansible.builtin.shell: sshd -T -C host=example.com | grep -i gssapiauthentication || echo 'NOT_FOUND'
  args:
    executable: /bin/bash
  register: result_05
  failed_when: false
  changed_when: false
  when: sshd_installed | bool

- name: "Req 06 - Check GSSAPIAuthentication for local address"
  ansible.builtin.shell: sshd -T -C laddr=10.0.0.1 | grep -i gssapiauthentication || echo 'NOT_FOUND'
  args:
    executable: /bin/bash
  register: result_06
  failed_when: false
  changed_when: false
  when: sshd_installed | bool

- name: "Req 07 - Check GSSAPIAuthentication for local port"
  ansible.builtin.shell: sshd -T -C lport=22 | grep -i gssapiauthentication || echo 'NOT_FOUND'
  args:
    executable: /bin/bash
  register: result_07
  failed_when: false
  changed_when: false
  when: sshd_installed | bool

- name: "Req 08 - Check GSSAPIAuthentication for routing domain"
  ansible.builtin.shell: sshd -T -C rdomain=example | grep -i gssapiauthentication || echo 'NOT_FOUND'
  args:
    executable: /bin/bash
  register: result_08
  failed_when: false
  changed_when: false
  when: sshd_installed | bool

- name: "Set cis_result"
  ansible.builtin.set_fact:
    cis_result: >-
      {{ 
        ('SKIP' if not sshd_installed | bool 
         else ('PASS' if ( ('gssapiauthentication no' in (result_02.stdout | default('') | lower)) 
                           and ('gssapiauthentication no' in (result_03.stdout | default('') | lower)) 
                           and ('gssapiauthentication no' in (result_04.stdout | default('') | lower)) 
                           and ('gssapiauthentication no' in (result_05.stdout | default('') | lower)) 
                           and ('gssapiauthentication no' in (result_06.stdout | default('') | lower)) 
                           and ('gssapiauthentication no' in (result_07.stdout | default('') | lower)) 
                           and ('gssapiauthentication no' in (result_08.stdout | default('') | lower)) ) 
               else 'FAIL'))
      }}
  tags: always
  when: sshd_installed is defined

- name: "Generate audit report"
  ansible.builtin.debug:
    msg:
    - "AUDIT REPORT — CIS 5.1.11"
    - "Reference: CIS Benchmark checkpoint 5.1.11"
    - ""
    - "REQUIREMENT 01 - {{ req_01 }}:"
    - "  Task: Req 01 - Check OpenSSH server installation"
    - "  Command: which sshd || dpkg -l | grep openssh-server || rpm -q openssh-server"
    - "  Exit code: {{ result_01.rc | default(-1) }}"
    - "  Data: {{ result_01.stdout | default('') | trim }}"
    - "  Status: {{ ('PASS' if (result_01.rc == 0 and (result_01.stdout | default('') | trim) != '') else 'FAIL') | trim }}"
    - "  Details: {{ 'SSH server found' if (result_01.rc == 0 and (result_01.stdout | default('') | trim) != '') else 'SSH server not found' | trim }}"
    - ""
    - "REQUIREMENT 02 - {{ req_02 }}:"
    - "  Task: Req 02 - Check global GSSAPIAuthentication"
    - "  Command: sshd -T | grep -i gssapiauthentication || echo 'NOT_FOUND'"
    - "  Exit code: {{ result_02.rc | default(-1) if result_02 is defined else -1 }}"
    - "  Data: {{ result_02.stdout | default('N/A') | trim if result_02 is defined else 'N/A' }}"
    - "  Status: {{ ('SKIP' if not sshd_installed | bool else ('PASS' if (result_02 is defined and 'gssapiauthentication no' in (result_02.stdout | default('') | lower)) else 'FAIL')) | trim }}"
    - "  Details: {{ ('OpenSSH server not installed' if not sshd_installed | bool else ('Global setting is disabled' if (result_02 is defined and 'gssapiauthentication no' in (result_02.stdout | default('') | lower)) else 'Global setting not disabled or not found')) | trim }}"
    - ""
    - "REQUIREMENT 03 - {{ req_03 }}:"
    - "  Task: Req 03 - Check GSSAPIAuthentication for user match"
    - "  Command: sshd -T -C user=sshuser | grep -i gssapiauthentication || echo 'NOT_FOUND'"
    - "  Exit code: {{ result_03.rc | default(-1) if result_03 is defined else -1 }}"
    - "  Data: {{ result_03.stdout | default('N/A') | trim if result_03 is defined else 'N/A' }}"
    - "  Status: {{ ('SKIP' if not sshd_installed | bool else ('PASS' if (result_03 is defined and 'gssapiauthentication no' in (result_03.stdout | default('') | lower)) else 'FAIL')) | trim }}"
    - "  Details: {{ ('OpenSSH server not installed' if not sshd_installed | bool else ('User match setting is disabled' if (result_03 is defined and 'gssapiauthentication no' in (result_03.stdout | default('') | lower)) else 'User match setting not disabled or not found')) | trim }}"
    - ""
    - "REQUIREMENT 04 - {{ req_04 }}:"
    - "  Task: Req 04 - Check GSSAPIAuthentication for source address"
    - "  Command: sshd -T -C addr=192.168.1.1 | grep -i gssapiauthentication || echo 'NOT_FOUND'"
    - "  Exit code: {{ result_04.rc | default(-1) if result_04 is defined else -1 }}"
    - "  Data: {{ result_04.stdout | default('N/A') | trim if result_04 is defined else 'N/A' }}"
    - "  Status: {{ ('SKIP' if not sshd_installed | bool else ('PASS' if (result_04 is defined and 'gssapiauthentication no' in (result_04.stdout | default('') | lower)) else 'FAIL')) | trim }}"
    - "  Details: {{ ('OpenSSH server not installed' if not sshd_installed | bool else ('Source address setting is disabled' if (result_04 is defined and 'gssapiauthentication no' in (result_04.stdout | default('') | lower)) else 'Source address setting not disabled or not found')) | trim }}"
    - ""
    - "REQUIREMENT 05 - {{ req_05 }}:"
    - "  Task: Req 05 - Check GSSAPIAuthentication for host"
    - "  Command: sshd -T -C host=example.com | grep -i gssapiauthentication || echo 'NOT_FOUND'"
    - "  Exit code: {{ result_05.rc | default(-1) if result_05 is defined else -1 }}"
    - "  Data: {{ result_05.stdout | default('N/A') | trim if result_05 is defined else 'N/A' }}"
    - "  Status: {{ ('SKIP' if not sshd_installed | bool else ('PASS' if (result_05 is defined and 'gssapiauthentication no' in (result_05.stdout | default('') | lower)) else 'FAIL')) | trim }}"
    - "  Details: {{ ('OpenSSH server not installed' if not sshd_installed | bool else ('Host setting is disabled' if (result_05 is defined and 'gssapiauthentication no' in (result_05.stdout | default('') | lower)) else 'Host setting not disabled or not found')) | trim }}"
    - ""
    - "REQUIREMENT 06 - {{ req_06 }}:"
    - "  Task: Req 06 - Check GSSAPIAuthentication for local address"
    - "  Command: sshd -T -C laddr=10.0.0.1 | grep -i gssapiauthentication || echo 'NOT_FOUND'"
    - "  Exit code: {{ result_06.rc | default(-1) if result_06 is defined else -1 }}"
    - "  Data: {{ result_06.stdout | default('N/A') | trim if result_06 is defined else 'N/A' }}"
    - "  Status: {{ ('SKIP' if not sshd_installed | bool else ('PASS' if (result_06 is defined and 'gssapiauthentication no' in (result_06.stdout | default('') | lower)) else 'FAIL')) | trim }}"
    - "  Details: {{ ('OpenSSH server not installed' if not sshd_installed | bool else ('Local address setting is disabled' if (result_06 is defined and 'gssapiauthentication no' in (result_06.stdout | default('') | lower)) else 'Local address setting not disabled or not found')) | trim }}"
    - ""
    - "REQUIREMENT 07 - {{ req_07 }}:"
    - "  Task: Req 07 - Check GSSAPIAuthentication for local port"
    - "  Command: sshd -T -C lport=22 | grep -i gssapiauthentication || echo 'NOT_FOUND'"
    - "  Exit code: {{ result_07.rc | default(-1) if result_07 is defined else -1 }}"
    - "  Data: {{ result_07.stdout | default('N/A') | trim if result_07 is defined else 'N/A' }}"
    - "  Status: {{ ('SKIP' if not sshd_installed | bool else ('PASS' if (result_07 is defined and 'gssapiauthentication no' in (result_07.stdout | default('') | lower)) else 'FAIL')) | trim }}"
    - "  Details: {{ ('OpenSSH server not installed' if not sshd_installed | bool else ('Local port setting is disabled' if (result_07 is defined and 'gssapiauthentication no' in (result_07.stdout | default('') | lower)) else 'Local port setting not disabled or not found')) | trim }}"
    - ""
    - "REQUIREMENT 08 - {{ req_08 }}:"
    - "  Task: Req 08 - Check GSSAPIAuthentication for routing domain"
    - "  Command: sshd -T -C rdomain=example | grep -i gssapiauthentication || echo 'NOT_FOUND'"
    - "  Exit code: {{ result_08.rc | default(-1) if result_08 is defined else -1 }}"
    - "  Data: {{ result_08.stdout | default('N/A') | trim if result_08 is defined else 'N/A' }}"
    - "  Status: {{ ('SKIP' if not sshd_installed | bool else ('PASS' if (result_08 is defined and 'gssapiauthentication no' in (result_08.stdout | default('') | lower)) else 'FAIL')) | trim }}"
    - "  Details: {{ ('OpenSSH server not installed' if not sshd_installed | bool else ('Routing domain setting is disabled' if (result_08 is defined and 'gssapiauthentication no' in (result_08.stdout | default('') | lower)) else 'Routing domain setting not disabled or not found')) | trim }}"
    - ""
    - "REQUIREMENT 09 - {{ req_09 }}:"
    - "  Task: Overall compliance evaluation"
    - "  Command: N/A"
    - "  Exit code: N/A"
    - "  Data: N/A"
    - "  Status: {{ ('SKIP' if not sshd_installed | bool else ('PASS' if ( ('gssapiauthentication no' in (result_02.stdout | default('') | lower)) and ('gssapiauthentication no' in (result_03.stdout | default('') | lower)) and ('gssapiauthentication no' in (result_04.stdout | default('') | lower)) and ('gssapiauthentication no' in (result_05.stdout | default('') | lower)) and ('gssapiauthentication no' in (result_06.stdout | default('') | lower)) and ('gssapiauthentication no' in (result_07.stdout | default('') | lower)) and ('gssapiauthentication no' in (result_08.stdout | default('') | lower)) ) else 'FAIL')) | trim }}"
    - "  Details: {{ 'OpenSSH server not installed' if not sshd_installed | bool else ('All applicable checks passed' if ( ('gssapiauthentication no' in (result_02.stdout | default('') | lower)) and ('gssapiauthentication no' in (result_03.stdout | default('') | lower)) and ('gssapiauthentication no' in (result_04.stdout | default('') | lower)) and ('gssapiauthentication no' in (result_05.stdout | default('') | lower)) and ('gssapiauthentication no' in (result_06.stdout | default('') | lower)) and ('gssapiauthentication no' in (result_07.stdout | default('') | lower)) and ('gssapiauthentication no' in (result_08.stdout | default('') | lower)) ) else 'Some checks failed') | trim }}"
    - ""
    - "========================================================"
    - "OVERALL COMPLIANCE:"
    - "  Result: {{ cis_result | default('UNKNOWN') | trim }}"
    - "  Details: {{ 'OpenSSH server not installed' if not sshd_installed | bool else ('All applicable checks passed' if cis_result == 'PASS' else 'Some checks failed') | trim }}"
    - "========================================================"
