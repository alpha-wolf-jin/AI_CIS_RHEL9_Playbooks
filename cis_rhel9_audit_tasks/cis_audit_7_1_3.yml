---
- name: Initialize meta data variables
  include_vars: cis_audit_var_7_1_3.yml

- name: "Initialize data variables"
  set_fact:
    data_01: "Not collected yet"
    status_01: "UNKNOWN"
    details_01: "Not evaluated"
    task_01_name: "Not executed"
    task_01_cmd: "N/A"
    task_01_rc: -1
    data_02: "Not collected yet"
    status_02: "UNKNOWN"
    details_02: "Not evaluated"
    task_02_name: "Not executed"
    task_02_cmd: "N/A"
    task_02_rc: -1
    data_03: "Not collected yet"
    status_03: "UNKNOWN"
    details_03: "Not evaluated"
    task_03_name: "Not executed"
    task_03_cmd: "N/A"
    task_03_rc: -1
    data_04: "Not collected yet"
    status_04: "UNKNOWN"
    details_04: "Not evaluated"
    task_04_name: "Not executed"
    task_04_cmd: "N/A"
    task_04_rc: -1
    data_05: "Not collected yet"
    status_05: "UNKNOWN"
    details_05: "Not evaluated"
    task_05_name: "Not executed"
    task_05_cmd: "N/A"
    task_05_rc: -1
    data_06: "Not collected yet"
    status_06: "UNKNOWN"
    details_06: "Not evaluated"
    task_06_name: "Not executed"
    task_06_cmd: "N/A"
    task_06_rc: -1

- name: "Req 01 - Check if /etc/group exists"
  ansible.builtin.shell: "stat -Lc '%a' /etc/group 2>/dev/null || echo 'NOT_FOUND'"
  args:
    executable: /bin/bash
  register: result_01
  failed_when: false
  changed_when: false

- name: "Store requirement 01 details"
  set_fact:
    task_01_name: "Check if /etc/group exists"
    task_01_cmd: "stat -Lc '%a' /etc/group 2>/dev/null || echo 'NOT_FOUND'"
    task_01_rc: "{{ result_01.rc | default(-1) }}"
    data_01: "{{ result_01.stdout | default('') | trim }}"
    status_01: "{{ 'PASS' if (result_01.stdout | default('NOT_FOUND') | trim) != 'NOT_FOUND' and (result_01.stdout | default('') | trim) | length > 0 else 'FAIL' }}"
    details_01: "{{ 'File exists with permissions: ' + (result_01.stdout | default('') | trim) if (result_01.stdout | default('NOT_FOUND') | trim) != 'NOT_FOUND' else 'File not found' }}"

- name: "Req 02 - Check /etc/group permissions"
  ansible.builtin.shell: "stat -Lc '%a' /etc/group"
  args:
    executable: /bin/bash
  register: result_02
  failed_when: false
  changed_when: false

- name: "Store requirement 02 details"
  set_fact:
    task_02_name: "Check /etc/group permissions"
    task_02_cmd: "stat -Lc '%a' /etc/group"
    task_02_rc: "{{ result_02.rc | default(-1) }}"
    data_02: "{{ result_02.stdout | default('') | trim }}"
    status_02: "{{ 'PASS' if (result_02.stdout | default('') | trim) in ['644','640','600','400','440'] else 'FAIL' }}"
    details_02: "{{ 'Permissions ' + (result_02.stdout | default('') | trim) + ' are compliant' if (result_02.stdout | default('') | trim) in ['644','640','600','400','440'] else 'Permissions ' + (result_02.stdout | default('') | trim) + ' are not restrictive enough' }}"

- name: "Req 03 - Check /etc/group owner UID"
  ansible.builtin.shell: "stat -Lc '%u' /etc/group"
  args:
    executable: /bin/bash
  register: result_03
  failed_when: false
  changed_when: false

- name: "Store requirement 03 details"
  set_fact:
    task_03_name: "Check /etc/group owner UID"
    task_03_cmd: "stat -Lc '%u' /etc/group"
    task_03_rc: "{{ result_03.rc | default(-1) }}"
    data_03: "{{ result_03.stdout | default('') | trim }}"
    status_03: "{{ 'PASS' if (result_03.stdout | default('') | trim) == '0' else 'FAIL' }}"
    details_03: "{{ 'Owner UID is root' if (result_03.stdout | default('') | trim) == '0' else 'Owner UID is not root: ' + (result_03.stdout | default('') | trim) }}"

- name: "Req 04 - Check /etc/group group GID"
  ansible.builtin.shell: "stat -Lc '%g' /etc/group"
  args:
    executable: /bin/bash
  register: result_04
  failed_when: false
  changed_when: false

- name: "Store requirement 04 details"
  set_fact:
    task_04_name: "Check /etc/group group GID"
    task_04_cmd: "stat -Lc '%g' /etc/group"
    task_04_rc: "{{ result_04.rc | default(-1) }}"
    data_04: "{{ result_04.stdout | default('') | trim }}"
    status_04: "{{ 'PASS' if (result_04.stdout | default('') | trim) == '0' else 'FAIL' }}"
    details_04: "{{ 'Group GID is root' if (result_04.stdout | default('') | trim) == '0' else 'Group GID is not root: ' + (result_04.stdout | default('') | trim) }}"

- name: "Req 05 - Determine overall compliance"
  set_fact:
    task_05_name: "Summarize overall compliance"
    task_05_cmd: "N/A"
    task_05_rc: "0"
    data_05: "Overall compliance status"
    status_05: "{{ 'PASS' if status_01 == 'PASS' and status_02 == 'PASS' and status_03 == 'PASS' and status_04 == 'PASS' else 'FAIL' }}"
    details_05: "{{ 'All checks passed' if status_01 == 'PASS' and status_02 == 'PASS' and status_03 == 'PASS' and status_04 == 'PASS' else 'One or more checks failed' }}"

- name: "Req 06 - Store cis_result"
  set_fact:
    cis_result: "{{ status_05 }}"
    task_06_name: "Store cis_result"
    task_06_cmd: "N/A"
    task_06_rc: "0"
    data_06: "cis_result = {{ status_05 }}"
    status_06: "PASS"
    details_06: "cis_result stored as {{ status_05 }}"

- name: "Generate audit report"
  debug:
    msg:
    - "AUDIT REPORT — CIS 7.1.3"
    - "Reference: CIS Benchmark checkpoint 7.1.3"
    - ""
    - "REQUIREMENT 01 - {{ req_01 }}:"
    - "  Task: {{ task_01_name | default('Not recorded') }}"
    - "  Command: {{ task_01_cmd | default('N/A') }}"
    - "  Exit code: {{ task_01_rc | default(-1) }}"
    - "  Data: {{ data_01 | default('') | trim }}"
    - "  Status: {{ status_01 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_01 | default('') | trim }}"
    - ""
    - "REQUIREMENT 02 - {{ req_02 }}:"
    - "  Task: {{ task_02_name | default('Not recorded') }}"
    - "  Command: {{ task_02_cmd | default('N/A') }}"
    - "  Exit code: {{ task_02_rc | default(-1) }}"
    - "  Data: {{ data_02 | default('') | trim }}"
    - "  Status: {{ status_02 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_02 | default('') | trim }}"
    - ""
    - "REQUIREMENT 03 - {{ req_03 }}:"
    - "  Task: {{ task_03_name | default('Not recorded') }}"
    - "  Command: {{ task_03_cmd | default('N/A') }}"
    - "  Exit code: {{ task_03_rc | default(-1) }}"
    - "  Data: {{ data_03 | default('') | trim }}"
    - "  Status: {{ status_03 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_03 | default('') | trim }}"
    - ""
    - "REQUIREMENT 04 - {{ req_04 }}:"
    - "  Task: {{ task_04_name | default('Not recorded') }}"
    - "  Command: {{ task_04_cmd | default('N/A') }}"
    - "  Exit code: {{ task_04_rc | default(-1) }}"
    - "  Data: {{ data_04 | default('') | trim }}"
    - "  Status: {{ status_04 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_04 | default('') | trim }}"
    - ""
    - "REQUIREMENT 05 - {{ req_05 }}:"
    - "  Task: {{ task_05_name | default('Not recorded') }}"
    - "  Command: {{ task_05_cmd | default('N/A') }}"
    - "  Exit code: {{ task_05_rc | default(-1) }}"
    - "  Data: {{ data_05 | default('') | trim }}"
    - "  Status: {{ status_05 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_05 | default('') | trim }}"
    - ""
    - "REQUIREMENT 06 - {{ req_06 }}:"
    - "  Task: {{ task_06_name | default('Not recorded') }}"
    - "  Command: {{ task_06_cmd | default('N/A') }}"
    - "  Exit code: {{ task_06_rc | default(-1) }}"
    - "  Data: {{ data_06 | default('') | trim }}"
    - "  Status: {{ status_06 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_06 | default('') | trim }}"
    - ""
    - "OVERALL COMPLIANCE:"
    - "  Result: {{ cis_result | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_05 | default('Not evaluated') | trim }}"
