req_01: "Check if nftables package is installed using command: `rpm -q nftables`. Expected result: nftables-<version>"
req_02: "Summarize overall compliance: PASS if nftables is installed, SKIP if the package is not installed (prerequisite not met), FAIL if the package is installed but the version cannot be determined or the command fails."
req_03: "Store the final audit result in a variable named 'cis_result' using set_fact. Set cis_result to the overall compliance status (PASS/FAIL/SKIP/ERROR) derived from the last requirement's status variable."
