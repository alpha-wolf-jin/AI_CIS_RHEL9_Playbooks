---
- name: Initialize meta data variables
  include_vars: cis_audit_var_1_2_1_4.yml

- name: "Initialize data variables"
  set_fact:
    task_01_name: "Not executed"
    task_01_cmd: "N/A"
    task_01_rc: -1
    data_01: "Not collected yet"
    status_01: "UNKNOWN"
    details_01: "Not evaluated"
    task_02_name: "Not executed"
    task_02_cmd: "N/A"
    task_02_rc: -1
    data_02: "Not collected yet"
    status_02: "UNKNOWN"
    details_02: "Not evaluated"
    task_03_name: "Not executed"
    task_03_cmd: "N/A"
    task_03_rc: -1
    data_03: "Not collected yet"
    status_03: "UNKNOWN"
    details_03: "Not evaluated"
    task_04_name: "Not executed"
    task_04_cmd: "N/A"
    task_04_rc: -1
    data_04: "Not collected yet"
    status_04: "UNKNOWN"
    details_04: "Not evaluated"
    task_05_name: "Not executed"
    task_05_cmd: "N/A"
    task_05_rc: -1
    data_05: "Not collected yet"
    status_05: "UNKNOWN"
    details_05: "Not evaluated"
    task_06_name: "Not executed"
    task_06_cmd: "N/A"
    task_06_rc: -1
    data_06: "Not collected yet"
    status_06: "UNKNOWN"
    details_06: "Not evaluated"

- name: "Req 01 - Check if dnf package manager is installed"
  shell: which dnf || rpm -q dnf
  args:
    executable: /bin/bash
  register: result_01
  failed_when: false
  changed_when: false

- name: "Store requirement 01 details"
  set_fact:
    task_01_name: "Check if dnf package manager is installed"
    task_01_cmd: "which dnf || rpm -q dnf"
    task_01_rc: "{{ result_01.rc | default(-1) }}"
    data_01: "{{ result_01.stdout | default('') | trim }}"
    status_01: "{{ 'PASS' if (result_01.rc | default(-1)) == 0 else 'FAIL' }}"
    details_01: "{{ 'dnf found' if (result_01.rc | default(-1)) == 0 else 'dnf not installed' }}"
    dnf_installed: "{{ (result_01.rc | default(-1)) == 0 }}"

- name: "Req 02 - Check if repositories are configured and accessible"
  shell: dnf repolist
  args:
    executable: /bin/bash
  register: result_02
  failed_when: false
  changed_when: false
  when: dnf_installed | default(false)

- name: "Store requirement 02 details"
  set_fact:
    task_02_name: "Check if repositories are configured and accessible"
    task_02_cmd: "dnf repolist"
    task_02_rc: "{{ result_02.rc | default(-1) if not (result_02 is skipped) else -1 }}"
    data_02: "{{ result_02.stdout | default('') | trim if not (result_02 is skipped) else 'N/A - dnf not installed' }}"
    status_02: >-
      {{ 'NOT_APPLICABLE' if (result_02 is skipped) else
         ('PASS' if (result_02.rc | default(-1) == 0) else 'FAIL') }}
    details_02: >-
      {{ 'NOT_APPLICABLE: dnf not installed' if (result_02 is skipped) else
         ('Repositories listed' if (result_02.rc | default(-1) == 0) else 'Failed to list repositories') }}

- name: "Req 03 - Check repository configuration files exist and are readable"
  shell: cat /etc/yum.repos.d/*.repo
  args:
    executable: /bin/bash
  register: result_03
  failed_when: false
  changed_when: false
  when: dnf_installed | default(false)

- name: "Store requirement 03 details"
  set_fact:
    task_03_name: "Check repository configuration files exist and are readable"
    task_03_cmd: "cat /etc/yum.repos.d/*.repo"
    task_03_rc: "{{ result_03.rc | default(-1) if not (result_03 is skipped) else -1 }}"
    data_03: "{{ result_03.stdout | default('') | trim if not (result_03 is skipped) else 'N/A - dnf not installed' }}"
    status_03: >-
      {{ 'NOT_APPLICABLE' if (result_03 is skipped) else
         ('PASS' if (result_03.rc | default(-1) == 0) else 'FAIL') }}
    details_03: >-
      {{ 'NOT_APPLICABLE: dnf not installed' if (result_03 is skipped) else
         ('Configuration files found and readable' if (result_03.rc | default(-1) == 0) else 'No configuration files found or not readable') }}

- name: "Req 04 - Verify repository configuration settings comply with site policy"
  shell: grep -E '^(baseurl|mirrorlist|gpgcheck|enabled)' /etc/yum.repos.d/*.repo
  args:
    executable: /bin/bash
  register: result_04
  failed_when: false
  changed_when: false
  when: dnf_installed | default(false)

- name: "Store requirement 04 details"
  set_fact:
    task_04_name: "Verify repository configuration settings comply with site policy"
    task_04_cmd: "grep -E '^(baseurl|mirrorlist|gpgcheck|enabled)' /etc/yum.repos.d/*.repo"
    task_04_rc: "{{ result_04.rc | default(-1) if not (result_04 is skipped) else -1 }}"
    data_04: "{{ result_04.stdout | default('') | trim if not (result_04 is skipped) else 'N/A - dnf not installed' }}"
    status_04: >-
      {{ 'NOT_APPLICABLE' if (result_04 is skipped) else
         ('PASS' if (result_04.rc | default(-1) == 0) and
                    ('gpgcheck=0' not in result_04.stdout | default('')) and
                    ('enabled=0' not in result_04.stdout | default(''))
          else 'FAIL') }}
    details_04: >-
      {{ 'NOT_APPLICABLE: dnf not installed' if (result_04 is skipped) else
         ('gpgcheck=1 and enabled=1 found for all repositories' if (result_04.rc | default(-1) == 0) and
                    ('gpgcheck=0' not in result_04.stdout | default('')) and
                    ('enabled=0' not in result_04.stdout | default(''))
          else 'gpgcheck and/or enabled not set to 1 in some repository configs') }}

- name: "Req 05 - Summarize overall compliance status"
  set_fact:
    task_05_name: "Summarize overall compliance status"
    task_05_cmd: "N/A"
    task_05_rc: 0
    data_05: "Overall status derived from previous checks"
    status_05: >-
      {% if not dnf_installed | default(false) %}
        NOT_APPLICABLE
      {% else %}
        {% if (status_02 | trim == 'PASS') and (status_03 | trim == 'PASS') and (status_04 | trim == 'PASS') %}
          PASS
        {% else %}
          FAIL
        {% endif %}
      {% endif %}
    details_05: >-
      {% if not dnf_installed | default(false) %}
        NOT_APPLICABLE: dnf package manager not installed; CIS control not applicable
      {% elif (status_02 | trim == 'PASS') and (status_03 | trim == 'PASS') and (status_04 | trim == 'PASS') %}
        All repository checks passed
      {% else %}
        One or more repository checks failed
      {% endif %}

- name: "Req 06 - Store final audit result in cis_result"
  set_fact:
    cis_result: "{{ status_05 | trim }}"

- name: "Store requirement 06 details"
  set_fact:
    task_06_name: "Store final audit result in cis_result"
    task_06_cmd: "set_fact cis_result"
    task_06_rc: 0
    data_06: "cis_result set to {{ status_05 | trim }}"
    status_06: "{{ status_05 | trim }}"
    details_06: "Final compliance result stored"

- name: "Generate audit report"
  debug:
    msg:
    - "AUDIT REPORT — CIS 1.2.1.4"
    - "Reference: CIS Benchmark checkpoint 1.2.1.4"
    - ""
    - "REQUIREMENT 01 - {{ req_01 }}:"
    - "  Task: {{ task_01_name | default('Not recorded') }}"
    - "  Command: {{ task_01_cmd | default('N/A') }}"
    - "  Exit code: {{ task_01_rc | default(-1) }}"
    - "  Data: {{ data_01 | default('') | trim }}"
    - "  Status: {{ status_01 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_01 | default('') | trim }}"
    - ""
    - "REQUIREMENT 02 - {{ req_02 }}:"
    - "  Task: {{ task_02_name | default('Not recorded') }}"
    - "  Command: {{ task_02_cmd | default('N/A') }}"
    - "  Exit code: {{ task_02_rc | default(-1) }}"
    - "  Data: {{ data_02 | default('') | trim }}"
    - "  Status: {{ status_02 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_02 | default('') | trim }}"
    - ""
    - "REQUIREMENT 03 - {{ req_03 }}:"
    - "  Task: {{ task_03_name | default('Not recorded') }}"
    - "  Command: {{ task_03_cmd | default('N/A') }}"
    - "  Exit code: {{ task_03_rc | default(-1) }}"
    - "  Data: {{ data_03 | default('') | trim }}"
    - "  Status: {{ status_03 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_03 | default('') | trim }}"
    - ""
    - "REQUIREMENT 04 - {{ req_04 }}:"
    - "  Task: {{ task_04_name | default('Not recorded') }}"
    - "  Command: {{ task_04_cmd | default('N/A') }}"
    - "  Exit code: {{ task_04_rc | default(-1) }}"
    - "  Data: {{ data_04 | default('') | trim }}"
    - "  Status: {{ status_04 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_04 | default('') | trim }}"
    - ""
    - "REQUIREMENT 05 - {{ req_05 }}:"
    - "  Task: {{ task_05_name | default('Not recorded') }}"
    - "  Command: {{ task_05_cmd | default('N/A') }}"
    - "  Exit code: {{ task_05_rc | default(-1) }}"
    - "  Data: {{ data_05 | default('') | trim }}"
    - "  Status: {{ status_05 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_05 | default('') | trim }}"
    - ""
    - "REQUIREMENT 06 - {{ req_06 }}:"
    - "  Task: {{ task_06_name | default('Not recorded') }}"
    - "  Command: {{ task_06_cmd | default('N/A') }}"
    - "  Exit code: {{ task_06_rc | default(-1) }}"
    - "  Data: {{ data_06 | default('') | trim }}"
    - "  Status: {{ status_06 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_06 | default('') | trim }}"
    - ""
    - "OVERALL COMPLIANCE:"
    - "  Result: {{ cis_result | default('UNKNOWN') | trim }}"
