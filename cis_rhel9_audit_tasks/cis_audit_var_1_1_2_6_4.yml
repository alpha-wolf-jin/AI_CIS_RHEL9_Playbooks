mount_point: "/var/log"
req_01: "Check if a separate partition exists for /var/log using command: `findmnt -kn /var/log`. Expected result: output should contain a mount point for /var/log."
req_02: "Check if the noexec option is set on the /var/log partition using command: `findmnt -kn /var/log | grep -v noexec`. Expected result: no output should be returned."
req_03: "Summarize overall compliance: if both checks pass, the system is compliant; otherwise, it is non-compliant."
req_04: "Store the final audit result in a variable named 'cis_result' using set_fact. Set cis_result to the overall compliance status (PASS/FAIL/SKIPPED/UNKNOWN) derived from the last requirement's status variable."
