req_01: "Check if /etc/shadow- file exists using command: `test -f /etc/shadow-`. Expected result: file exists (exit code 0)."
req_02: "Check permissions on /etc/shadow- are 000 using command: `stat -Lc '%a' /etc/shadow-`. Expected result: 0"
req_03: "Check UID of /etc/shadow- is 0 using command: `stat -Lc '%u' /etc/shadow-`. Expected result: 0"
req_04: "Check GID of /etc/shadow- is 0 using command: `stat -Lc '%g' /etc/shadow-`. Expected result: 0"
req_05: "Check overall compliance: PASS if all checks pass, SKIP if /etc/shadow- does not exist, FAIL if file exists but permissions/ownership are incorrect."
req_06: "Store the final audit result in a variable named 'cis_result' using set_fact. Set cis_result to the overall compliance status (PASS/FAIL/SKIP/ERROR) derived from the last requirement's status variable."
