req_01: "Check if OpenSSH server is installed using command: `dpkg -l | grep openssh-server` or `rpm -q openssh-server`. Expected result: package is installed."
req_02: "Check if sshd HostbasedAuthentication is disabled globally using command: `sshd -T | grep hostbasedauthentication`. Expected result: `hostbasedauthentication no`."
req_03: "Check if sshd HostbasedAuthentication is disabled for a specific user (e.g., sshuser) using command: `sshd -T -C user=sshuser | grep hostbasedauthentication`. Expected result: `hostbasedauthentication no`."
req_04: "Check if sshd HostbasedAuthentication is disabled for a specific source address using command: `sshd -T -C addr=192.168.1.100 | grep hostbasedauthentication`. Expected result: `hostbasedauthentication no`."
req_05: "Check if sshd HostbasedAuthentication is disabled for a specific host using command: `sshd -T -C host=client.example.com | grep hostbasedauthentication`. Expected result: `hostbasedauthentication no`."
req_06: "Check if sshd HostbasedAuthentication is disabled for a specific local address using command: `sshd -T -C laddr=10.0.0.1 | grep hostbasedauthentication`. Expected result: `hostbasedauthentication no`."
req_07: "Check if sshd HostbasedAuthentication is disabled for a specific local port using command: `sshd -T -C lport=22 | grep hostbasedauthentication`. Expected result: `hostbasedauthentication no`."
req_08: "Check if sshd HostbasedAuthentication is disabled for a specific routing domain using command: `sshd -T -C rdomain=example | grep hostbasedauthentication`. Expected result: `hostbasedauthentication no`."
req_09: "Summarize overall compliance status: All checks passed, HostbasedAuthentication is disabled in all applicable contexts. Expected result: compliant."
req_10: "Store the final audit result in a variable named 'cis_result' using set_fact. Set cis_result to the overall compliance status (PASS/FAIL/SKIP/UNKNOWN) derived from the last requirement's status variable."
