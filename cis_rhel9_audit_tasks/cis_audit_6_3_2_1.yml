---
- name: Initialize meta data variables
  include_vars: cis_audit_var_6_3_2_1.yml

- name: "Req 1 - Check if auditd package is installed"
  ansible.builtin.shell: dpkg -l auditd 2>/dev/null || rpm -q auditd 2>/dev/null
  args:
    executable: /bin/bash
  register: result_01
  failed_when: false
  changed_when: false

- name: "Store requirement 01 details"
  ansible.builtin.set_fact:
    task_01_name: "Requirement 1 - Check if auditd is installed"
    task_01_cmd: "dpkg -l auditd 2>/dev/null || rpm -q auditd 2>/dev/null"
    task_01_rc: "{{ result_01.rc | default(-1) }}"
    data_01: "{{ result_01.stdout | default('') | trim }}"
    status_01: "{{ 'PASS' if result_01.rc | default(-1) == 0 else 'NOT_APPLICABLE' }}"
    details_01: "{{ 'Package is installed' if result_01.rc | default(-1) == 0 else 'Package not installed – auditd checks not applicable' }}"

# 2. Check auditd service
- name: "Req 2 - Check if auditd service is active"
  ansible.builtin.shell: systemctl is-active auditd
  args:
    executable: /bin/bash
  register: result_02
  failed_when: false
  changed_when: false
  when: "result_01.rc == 0"

- name: "Store requirement 02 details"
  ansible.builtin.set_fact:
    task_02_name: "Requirement 2 - Check if auditd service is active"
    task_02_cmd: "systemctl is-active auditd"
    task_02_rc: "{{ 0 if result_02.skipped | default(false) else result_02.rc | default(-1) }}"
    data_02: "{{ 'Service check not applicable' if result_02.skipped | default(false) else result_02.stdout | default('') | trim }}"
    status_02: "{{ 'NOT_APPLICABLE' if result_02.skipped | default(false) else ('PASS' if result_02.rc | default(-1) == 0 else 'FAIL') }}"
    details_02: "{{ 'Service check not applicable because package not installed' if result_02.skipped | default(false) else ('Service is active' if result_02.rc | default(-1) == 0 else 'Service is not active') }}"

# 3. Check /etc/audit/auditd.conf existence
- name: "Req 3 - Check if /etc/audit/auditd.conf exists"
  ansible.builtin.shell: |
    test -f /etc/audit/auditd.conf && echo 'EXISTS'
  args:
    executable: /bin/bash
  register: result_03
  failed_when: false
  changed_when: false
  when: "result_01.rc == 0"

- name: "Store requirement 03 details"
  ansible.builtin.set_fact:
    task_03_name: "Requirement 3 - Check /etc/audit/auditd.conf existence"
    task_03_cmd: "test -f /etc/audit/auditd.conf && echo 'EXISTS'"
    task_03_rc: "{{ 0 if result_03.skipped | default(false) else result_03.rc | default(-1) }}"
    data_03: "{{ 'File check not applicable' if result_03.skipped | default(false) else result_03.stdout | default('') | trim }}"
    status_03: "{{ 'NOT_APPLICABLE' if result_03.skipped | default(false) else ('PASS' if result_03.rc | default(-1) == 0 else 'FAIL') }}"
    details_03: "{{ 'File check not applicable because package not installed' if result_03.skipped | default(false) else ('File exists' if result_03.rc | default(-1) == 0 else 'File does not exist') }}"

# 4. Check max_log_file configuration
- name: "Req 4 - Check configured maximum audit log file size"
  ansible.builtin.shell: |
    grep -Po -- '^\h*max_log_file\h*=\h*\d+\b' /etc/audit/auditd.conf
  args:
    executable: /bin/bash
  register: result_04
  failed_when: false
  changed_when: false
  when: "result_01.rc == 0"

- name: "Store requirement 04 details"
  ansible.builtin.set_fact:
    task_04_name: "Requirement 4 - Check max_log_file configuration"
    task_04_cmd: |
      grep -Po -- '^\h*max_log_file\h*=\h*\d+\b' /etc/audit/auditd.conf
    task_04_rc: "{{ 0 if result_04.skipped | default(false) else result_04.rc | default(-1) }}"
    data_04: "{{ 'Configuration check not applicable' if result_04.skipped | default(false) else result_04.stdout | default('') | trim }}"
    status_04: "{{ 'NOT_APPLICABLE' if result_04.skipped | default(false) else ('PASS' if result_04.rc | default(-1) == 0 else 'FAIL') }}"
    details_04: "{{ 'Configuration check not applicable because package not installed' if result_04.skipped | default(false) else ('max_log_file is set' if result_04.rc | default(-1) == 0 else 'max_log_file is NOT set') }}"

# 5. Summarize overall compliance
- name: "Req 5 - Summarize overall compliance status"
  ansible.builtin.set_fact:
    cis_result: >-
      {% if status_01 == 'NOT_APPLICABLE' or status_02 == 'NOT_APPLICABLE' or status_02 == 'FAIL' %}
      SKIP
      {% elif status_01 == 'FAIL' or status_03 == 'FAIL' or status_04 == 'FAIL' %}
      FAIL
      {% else %}
      PASS
      {% endif %}

- name: "Store requirement 05 details"
  ansible.builtin.set_fact:
    task_05_name: "Requirement 5 - Summarize overall compliance status"
    task_05_cmd: "set_fact cis_result"
    task_05_rc: 0
    data_05: "Overall compliance determination"
    status_05: "{{ cis_result }}"
    details_05: "Compliance status derived from prior checks"

# 6. Store final audit result
- name: "Req 6 - Store final audit result"
  ansible.builtin.set_fact:
    cis_result: "{{ cis_result | trim }}"
    task_06_name: "Requirement 6 - Store final audit result"
    task_06_cmd: "set_fact cis_result"
    task_06_rc: 0
    data_06: "cis_result = {{ cis_result | trim }}"
    status_06: "PASS"
    details_06: "Variable stored"

# Final audit report
- name: "Generate audit report"
  ansible.builtin.debug:
    msg:
    - "AUDIT REPORT — CIS 6.3.2.1"
    - "Reference: CIS Benchmark checkpoint 6.3.2.1"
    - ""
    - "REQUIREMENT 01 - {{ req_01 }}:"
    - "  Task: {{ task_01_name | default('Not recorded') }}"
    - "  Command: {{ task_01_cmd | default('N/A') }}"
    - "  Exit code: {{ task_01_rc | default(-1) }}"
    - "  Data: {{ data_01 | default('') | trim }}"
    - "  Status: {{ status_01 | default('ERROR') | trim }}"
    - "  Details: {{ details_01 | default('') | trim }}"
    - ""
    - "REQUIREMENT 02 - {{ req_02 }}:"
    - "  Task: {{ task_02_name | default('Not recorded') }}"
    - "  Command: {{ task_02_cmd | default('N/A') }}"
    - "  Exit code: {{ task_02_rc | default(-1) }}"
    - "  Data: {{ data_02 | default('') | trim }}"
    - "  Status: {{ status_02 | default('ERROR') | trim }}"
    - "  Details: {{ details_02 | default('') | trim }}"
    - ""
    - "REQUIREMENT 03 - {{ req_03 }}:"
    - "  Task: {{ task_03_name | default('Not recorded') }}"
    - "  Command: {{ task_03_cmd | default('N/A') }}"
    - "  Exit code: {{ task_03_rc | default(-1) }}"
    - "  Data: {{ data_03 | default('') | trim }}"
    - "  Status: {{ status_03 | default('ERROR') | trim }}"
    - "  Details: {{ details_03 | default('') | trim }}"
    - ""
    - "REQUIREMENT 04 - {{ req_04 }}:"
    - "  Task: {{ task_04_name | default('Not recorded') }}"
    - "  Command: {{ task_04_cmd | default('N/A') }}"
    - "  Exit code: {{ task_04_rc | default(-1) }}"
    - "  Data: {{ data_04 | default('') | trim }}"
    - "  Status: {{ status_04 | default('ERROR') | trim }}"
    - "  Details: {{ details_04 | default('') | trim }}"
    - ""
    - "REQUIREMENT 05 - {{ req_05 }}:"
    - "  Task: {{ task_05_name | default('Not recorded') }}"
    - "  Command: {{ task_05_cmd | default('N/A') }}"
    - "  Exit code: {{ task_05_rc | default(-1) }}"
    - "  Data: {{ data_05 | default('') | trim }}"
    - "  Status: {{ status_05 | default('ERROR') | trim }}"
    - "  Details: {{ details_05 | default('') | trim }}"
    - ""
    - "REQUIREMENT 06 - {{ req_06 }}:"
    - "  Task: {{ task_06_name | default('Not recorded') }}"
    - "  Command: {{ task_06_cmd | default('N/A') }}"
    - "  Exit code: {{ task_06_rc | default(-1) }}"
    - "  Data: {{ data_06 | default('') | trim }}"
    - "  Status: {{ status_06 | default('ERROR') | trim }}"
    - "  Details: {{ details_06 | default('') | trim }}"
    - ""
    - "OVERALL COMPLIANCE:"
    - "  Result: {{ cis_result | default('ERROR') | trim }}"
