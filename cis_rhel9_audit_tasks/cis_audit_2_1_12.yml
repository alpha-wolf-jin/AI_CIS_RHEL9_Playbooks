---
- name: Initialize meta data variables
  include_vars: cis_audit_var_2_1_12.yml

- name: "Initialize data variables"
  set_fact:
    data_01: "Not collected yet"
    status_01: "ERROR"
    details_01: "Not evaluated"
    data_02: "Not collected yet"
    status_02: "ERROR"
    details_02: "Not evaluated"
    data_03: "Not collected yet"
    status_03: "ERROR"
    details_03: "Not evaluated"
    data_04: "Not collected yet"
    status_04: "ERROR"
    details_04: "Not evaluated"
    data_05: "Not collected yet"
    status_05: "ERROR"
    details_05: "Not evaluated"
    data_06: "Not collected yet"
    status_06: "ERROR"
    details_06: "Not evaluated"
    data_07: "Not collected yet"
    status_07: "ERROR"
    details_07: "Not evaluated"
    task_01_name: "Not executed"
    task_01_cmd: "N/A"
    task_01_rc: -1
    task_02_name: "Not executed"
    task_02_cmd: "N/A"
    task_02_rc: -1
    task_03_name: "Not executed"
    task_03_cmd: "N/A"
    task_03_rc: -1
    task_04_name: "Not executed"
    task_04_cmd: "N/A"
    task_04_rc: -1
    task_05_name: "Not executed"
    task_05_cmd: "N/A"
    task_05_rc: -1
    task_06_name: "Not executed"
    task_06_cmd: "N/A"
    task_06_rc: -1
    task_07_name: "Not executed"
    task_07_cmd: "N/A"
    task_07_rc: -1

# Requirement 1
- name: "Req 01 - Check if rpcbind package is installed"
  ansible.builtin.shell: rpm -q rpcbind
  args:
    executable: /bin/bash
  register: result_01
  failed_when: false
  changed_when: false

- name: "Store requirement 01 details"
  set_fact:
    rpcbind_installed: "{{ result_01.rc == 0 }}"
    task_01_name: "Check if rpcbind package is installed"
    task_01_cmd: "rpm -q rpcbind"
    task_01_rc: "{{ result_01.rc }}"
    data_01: "{{ result_01.stdout | default('') | trim }}"
    status_01: "{{ 'PASS' if result_01.rc != 0 else 'FAIL' }}"
    details_01: "{{ 'Package rpcbind is not installed' if result_01.rc != 0 else 'Package rpcbind is installed' }}"

# Requirement 2
- name: "Req 02 - Check if rpcbind socket and service are enabled"
  ansible.builtin.shell: systemctl is-enabled rpcbind.socket rpcbind.service 2>/dev/null | grep 'enabled'
  args:
    executable: /bin/bash
  register: result_02
  failed_when: false
  changed_when: false
  when: rpcbind_installed

- name: "Store requirement 02 details"
  set_fact:
    task_02_name: "Check if rpcbind socket and service are enabled"
    task_02_cmd: "systemctl is-enabled rpcbind.socket rpcbind.service 2>/dev/null | grep 'enabled'"
    task_02_rc: "{{ (result_02.rc | default(-1)) if rpcbind_installed else -1 }}"
    data_02: "{{ (result_02.stdout | default('') | trim) if rpcbind_installed else 'N/A - rpcbind package not installed' }}"
    status_02: "{{ ('SKIP' if not rpcbind_installed else ('PASS' if (result_02.stdout | default('') | trim) == '' else 'FAIL')) | trim }}"
    details_02: "{{ ('Rpcbind package not installed – check not applicable' if not rpcbind_installed else ('No enabled services found' if (result_02.stdout | default('') | trim) == '' else 'Enabled services detected: ' ~ (result_02.stdout | default('') | trim))) | trim }}"

# Requirement 3
- name: "Req 03 - Check if rpcbind socket and service are active"
  ansible.builtin.shell: systemctl is-active rpcbind.socket rpcbind.service 2>/dev/null | grep '^active'
  args:
    executable: /bin/bash
  register: result_03
  failed_when: false
  changed_when: false
  when: rpcbind_installed

- name: "Store requirement 03 details"
  set_fact:
    task_03_name: "Check if rpcbind socket and service are active"
    task_03_cmd: "systemctl is-active rpcbind.socket rpcbind.service 2>/dev/null | grep '^active'"
    task_03_rc: "{{ (result_03.rc | default(-1)) if rpcbind_installed else -1 }}"
    data_03: "{{ (result_03.stdout | default('') | trim) if rpcbind_installed else 'N/A - rpcbind package not installed' }}"
    status_03: "{{ ('SKIP' if not rpcbind_installed else ('PASS' if (result_03.stdout | default('') | trim) == '' else 'FAIL')) | trim }}"
    details_03: "{{ ('Rpcbind package not installed – check not applicable' if not rpcbind_installed else ('No active services found' if (result_03.stdout | default('') | trim) == '' else 'Active services detected: ' ~ (result_03.stdout | default('') | trim))) | trim }}"

# Requirement 4 – policy check (manual)
- name: "Req 04 - Check dependent package approval per local site policy"
  ansible.builtin.set_fact:
    task_04_name: "Verify dependent package is approved by local site policy"
    task_04_cmd: "Manual verification required"
    task_04_rc: -1
    data_04: "{{ 'N/A - rpcbind package not installed' if not rpcbind_installed else 'Manual check required' }}"
    status_04: "{{ 'SKIP' if not rpcbind_installed else 'ERROR' }}"
    details_04: "{{ 'Rpcbind not installed – check not applicable.' if not rpcbind_installed else 'Cannot be verified automatically – site policy check required.' }}"

# Requirement 5 – stopping/masking policy check (manual)
- name: "Req 05 - Check stopping/masking meets local site policy"
  ansible.builtin.set_fact:
    task_05_name: "Verify stopping/masking meets local site policy"
    task_05_cmd: "Manual verification required"
    task_05_rc: -1
    data_05: "{{ 'N/A - rpcbind package not installed' if not rpcbind_installed else 'Manual check required' }}"
    status_05: "{{ 'SKIP' if not rpcbind_installed else 'ERROR' }}"
    details_05: "{{ 'Rpcbind not installed – check not applicable.' if not rpcbind_installed else 'Cannot be verified automatically – site policy check required.' }}"

# Requirement 6 – Overall compliance
- name: "Req 06 - Determine overall compliance"
  set_fact:
    task_06_name: "Overall compliance evaluation"
    task_06_cmd: "N/A"
    task_06_rc: -1
    data_06: "N/A"
    status_06: "{{ ('PASS' if (status_01 == 'PASS') and (status_02 in ['PASS','SKIP']) and (status_03 in ['PASS','SKIP']) and (status_04 != 'FAIL') and (status_05 != 'FAIL') else 'FAIL') | trim }}"
    details_06: "{{ ('Compliant - rpcbind not installed or services disabled and policy non-violating' if (status_01 == 'PASS') and (status_02 in ['PASS','SKIP']) and (status_03 in ['PASS','SKIP']) and (status_04 != 'FAIL') and (status_05 != 'FAIL') else 'Non-compliant') | trim }}"

# Requirement 7 – Store final audit result
- name: "Req 07 - Store final audit result in cis_result"
  set_fact:
    cis_result: "{{ status_06 | default('ERROR') }}"
    task_07_name: "Store final audit result in cis_result"
    task_07_cmd: "set_fact: cis_result = {{ status_06 | default('ERROR') }}"
    task_07_rc: 0
    data_07: "{{ status_06 | default('ERROR') }}"
    status_07: "PASS"
    details_07: "cis_result set to {{ status_06 | default('ERROR') }}"

# Final audit report
- name: "Generate audit report"
  debug:
    msg:
    - "AUDIT REPORT — CIS 2.1.12"
    - "Reference: CIS Benchmark checkpoint 2.1.12"
    - "REQUIREMENT 01 - {{ req_01 }}:"
    - "  Task: {{ task_01_name | default('Not recorded') }}"
    - "  Command: {{ task_01_cmd | default('N/A') }}"
    - "  Exit code: {{ task_01_rc | default(-1) }}"
    - "  Data: {{ data_01 | default('') | trim }}"
    - "  Status: {{ status_01 | default('ERROR') | trim }}"
    - "  Details: {{ details_01 | default('') | trim }}"
    - ""
    - "REQUIREMENT 02 - {{ req_02 }}:"
    - "  Task: {{ task_02_name | default('Not recorded') }}"
    - "  Command: {{ task_02_cmd | default('N/A') }}"
    - "  Exit code: {{ task_02_rc | default(-1) }}"
    - "  Data: {{ data_02 | default('') | trim }}"
    - "  Status: {{ status_02 | default('ERROR') | trim }}"
    - "  Details: {{ details_02 | default('') | trim }}"
    - ""
    - "REQUIREMENT 03 - {{ req_03 }}:"
