---
- name: Initialize meta data variables
  include_vars: cis_audit_var_2_2_2.yml

- name: "Req 01 - Check openldap-clients installed status"
  ansible.builtin.shell: rpm -q openldap-clients
  args:
    executable: /bin/bash
  register: rpm_result
  failed_when: false
  changed_when: false

- name: "Store requirement 01 details"
  ansible.builtin.set_fact:
    task_01_name: "Check openldap-clients installed status"
    task_01_cmd: "rpm -q openldap-clients"
    task_01_rc: "{{ rpm_result.rc }}"
    data_01: "{{ rpm_result.stdout | default('') | trim }}"
    status_01: "{{ ('PASS' if rpm_result.rc != 0 and 'not installed' in (rpm_result.stdout | default('')) else 'FAIL' if rpm_result.rc == 0 else 'ERROR') | trim }}"
    details_01: "{{ ('Package openldap-clients is not installed' if rpm_result.rc != 0 and 'not installed' in (rpm_result.stdout | default('')) else 'Package openldap-clients is installed' if rpm_result.rc == 0 else 'Unexpected rpm output') | trim }}"

- name: "Store requirement 02 details (overall compliance)"
  ansible.builtin.set_fact:
    task_02_name: "Verify overall compliance"
    task_02_cmd: "rpm -q openldap-clients"
    task_02_rc: "{{ rpm_result.rc }}"
    data_02: "{{ rpm_result.stdout | default('') | trim }}"
    status_02: "{{ ('PASS' if rpm_result.rc != 0 and 'not installed' in (rpm_result.stdout | default('')) else 'FAIL' if rpm_result.rc == 0 else 'ERROR') | trim }}"
    details_02: "{{ ('Overall compliance: PASS — openldap-clients is not installed' if rpm_result.rc != 0 and 'not installed' in (rpm_result.stdout | default('')) else 'Overall compliance: FAIL — openldap-clients is installed' if rpm_result.rc == 0 else 'Overall compliance: ERROR — rpm output unexpected') | trim }}"

- name: "Req 03 - Store final audit result in cis_result"
  ansible.builtin.set_fact:
    cis_result: "{{ status_02 | default('ERROR') | trim }}"

- name: "Store requirement 03 details"
  ansible.builtin.set_fact:
    task_03_name: "Store final audit result in cis_result"
    task_03_cmd: "set_fact: cis_result = status_02"
    task_03_rc: "0"
    data_03: "cis_result = {{ cis_result }}"
    status_03: "{{ 'PASS' }}"
    details_03: "Successfully stored cis_result"

- name: "Generate audit report"
  ansible.builtin.debug:
    msg:
    - "AUDIT REPORT — CIS 2.2.2"
    - "Reference: CIS Benchmark checkpoint 2.2.2"
    - ""
    - "REQUIREMENT 01 - {{ req_01 }}:"
    - "  Task: {{ task_01_name | default('Not recorded') }}"
    - "  Command: {{ task_01_cmd | default('N/A') }}"
    - "  Exit code: {{ task_01_rc | default(-1) }}"
    - "  Data: {{ data_01 | default('') | trim }}"
    - "  Status: {{ status_01 | default('ERROR') | trim }}"
    - "  Details: {{ details_01 | default('') | trim }}"
    - ""
    - "REQUIREMENT 02 - {{ req_02 }}:"
    - "  Task: {{ task_02_name | default('Not recorded') }}"
    - "  Command: {{ task_02_cmd | default('N/A') }}"
    - "  Exit code: {{ task_02_rc | default(-1) }}"
    - "  Data: {{ data_02 | default('') | trim }}"
    - "  Status: {{ status_02 | default('ERROR') | trim }}"
    - "  Details: {{ details_02 | default('') | trim }}"
    - ""
    - "REQUIREMENT 03 - {{ req_03 }}:"
    - "  Task: {{ task_03_name | default('Not recorded') }}"
    - "  Command: {{ task_03_cmd | default('N/A') }}"
    - "  Exit code: {{ task_03_rc | default(-1) }}"
    - "  Data: {{ data_03 | default('') | trim }}"
    - "  Status: {{ status_03 | default('ERROR') | trim }}"
    - "  Details: {{ details_03 | default('') | trim }}"
    - ""
    - "========================================================"
    - "OVERALL COMPLIANCE:"
    - "  Result: {{ cis_result }}"
    - "  Details: {{ details_02 | default('Not evaluated') | trim }}"
    - "========================================================"
