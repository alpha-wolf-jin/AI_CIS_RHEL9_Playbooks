req_01: "Check if rsyslog is installed using command: `dpkg -l rsyslog 2>/dev/null | grep -E '^ii' || rpm -q rsyslog 2>/dev/null`. Expected result: package is installed (non-empty output)."
req_02: "Check if rsyslog.service is enabled using command: `systemctl is-enabled rsyslog`. Expected result: enabled"
req_03: "Check if rsyslog.service is active using command: `systemctl is-active rsyslog.service`. Expected result: active"
req_04: "Summarize overall compliance: PASS if all checks pass, SKIP if rsyslog is not installed, FAIL if rsyslog is installed but not enabled or active."
req_05: "Store the final audit result in a variable named 'cis_result' using set_fact. Set cis_result to the overall compliance status (PASS/FAIL/SKIP/ERROR) derived from the last requirement's status variable."
