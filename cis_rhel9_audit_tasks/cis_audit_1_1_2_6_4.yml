---
- name: Initialize meta data variables
  include_vars: cis_audit_var_1_1_2_6_4.yml

- name: "Initialize data variables"
  set_fact:
    data_01: "Not collected yet"
    status_01: "ERROR"
    details_01: "Not evaluated"
    data_02: "Not collected yet"
    status_02: "ERROR"
    details_02: "Not evaluated"
    data_03: "Not collected yet"
    status_03: "ERROR"
    details_03: "Not evaluated"
    data_04: "Not collected yet"
    status_04: "ERROR"
    details_04: "Not evaluated"
    task_01_name: "Not executed"
    task_01_cmd: "N/A"
    task_01_rc: -1
    task_02_name: "Not executed"
    task_02_cmd: "N/A"
    task_02_rc: -1
    task_03_name: "Not executed"
    task_03_cmd: "N/A"
    task_03_rc: -1
    task_04_name: "Not executed"
    task_04_cmd: "N/A"
    task_04_rc: -1

- name: "Req 01 - Check if /var/log is a separate partition"
  ansible.builtin.command: "findmnt -kn {{ mount_point }}"
  register: result_01
  failed_when: false
  changed_when: false

- name: "Store requirement 01 details"
  set_fact:
    task_01_name: "Check if /var/log is a separate partition"
    task_01_cmd: "findmnt -kn {{ mount_point }}"
    task_01_rc: "{{ result_01.rc | default(-1) }}"
    data_01: "{{ result_01.stdout | default('') | trim }}"
    status_01: "{{ 'PASS' if (result_01.rc | default(-1) == 0 and (result_01.stdout | default('') | trim | length > 0)) else 'SKIP' }}"
    details_01: "{{ 'Partition exists' if (result_01.rc | default(-1) == 0 and (result_01.stdout | default('') | trim | length > 0)) else 'No separate partition, audit skipped' }}"

- name: "Req 02 - Check if noexec option is set on /var/log"
  ansible.builtin.shell: "mount | grep {{ mount_point }} | grep -o {{ mount_option }}"
  args:
    executable: /bin/bash
  register: result_02
  failed_when: false
  changed_when: false
  when:
  - "status_01 | trim == 'PASS'"

- name: "Store requirement 02 details"
  set_fact:
    task_02_name: "Check if noexec option is set on /var/log"
    task_02_cmd: "mount | grep {{ mount_point }} | grep -o {{ mount_option }}"
    task_02_rc: "{{ result_02.rc | default(-1) if status_01 | trim == 'PASS' else 'N/A' }}"
    data_02: "{{ result_02.stdout | default('') | trim if status_01 | trim == 'PASS' else 'N/A' }}"
    status_02: "{{ 'PASS' if (status_01 | trim == 'PASS' and (result_02.rc | default(-1) == 0) and (result_02.stdout | default('') | trim == mount_option)) else ('SKIP' if status_01 | trim != 'PASS' else 'FAIL') }}"
    details_02: "{{ 'noexec option is set' if (status_01 | trim == 'PASS' and (result_02.rc | default(-1) == 0) and (result_02.stdout | default('') | trim == mount_option)) else ('noexec option is NOT set' if status_01 | trim == 'PASS' else 'Skipped: no separate /var/log partition') }}"

- name: "Store requirement 03 details"
  set_fact:
    task_03_name: "Summarize overall compliance"
    task_03_cmd: "N/A"
    task_03_rc: "N/A"
    data_03: "N/A"
    status_03: "{{ status_02 | default('ERROR') | trim }}"
    details_03: "{{ details_02 | default('Not evaluated') | trim }}"

- name: "Store requirement 04 details"
  set_fact:
    task_04_name: "Store final audit result"
    task_04_cmd: "N/A"
    task_04_rc: "N/A"
    data_04: "N/A"
    status_04: "{{ status_02 | default('ERROR') | trim }}"
    details_04: "{{ details_02 | default('Not evaluated') | trim }}"

- name: "Store final audit result"
  set_fact:
    cis_result: "{{ status_04 | default('ERROR') | trim }}"

- name: "Generate audit report"
  debug:
    msg:
    - "AUDIT REPORT — CIS 1.1.2.6.4"
    - "Reference: CIS Benchmark checkpoint 1.1.2.6.4"
    - ""
    - "REQUIREMENT 01 - {{ req_01 }}:"
    - "  Task: {{ task_01_name | default('Not recorded') }}"
    - "  Command: {{ task_01_cmd | default('N/A') }}"
    - "  Exit code: {{ task_01_rc | default(-1) }}"
    - "  Data: {{ data_01 | default('') | trim }}"
    - "  Status: {{ status_01 | default('ERROR') | trim }}"
    - "  Details: {{ details_01 | default('') | trim }}"
    - ""
    - "REQUIREMENT 02 - {{ req_02 }}:"
    - "  Task: {{ task_02_name | default('Not recorded') }}"
    - "  Command: {{ task_02_cmd | default('N/A') }}"
    - "  Exit code: {{ task_02_rc | default(-1) }}"
    - "  Data: {{ data_02 | default('') | trim }}"
    - "  Status: {{ status_02 | default('ERROR') | trim }}"
    - "  Details: {{ details_02 | default('') | trim }}"
    - ""
    - "REQUIREMENT 03 - {{ req_03 }}:"
    - "  Task: {{ task_03_name | default('Not recorded') }}"
    - "  Command: {{ task_03_cmd | default('N/A') }}"
    - "  Exit code: {{ task_03_rc | default(-1) }}"
    - "  Data: {{ data_03 | default('') | trim }}"
    - "  Status: {{ status_03 | default('ERROR') | trim }}"
    - "  Details: {{ details_03 | default('') | trim }}"
    - ""
    - "REQUIREMENT 04 - {{ req_04 }}:"
    - "  Task: {{ task_04_name | default('Not recorded') }}"
    - "  Command: {{ task_04_cmd | default('N/A') }}"
    - "  Exit code: {{ task_04_rc | default(-1) }}"
    - "  Data: {{ data_04 | default('') | trim }}"
    - "  Status: {{ status_04 | default('ERROR') | trim }}"
    - "  Details: {{ details_04 | default('') | trim }}"
    - ""
    - "========================================================"
    - "OVERALL COMPLIANCE:"
    - "  Result: {{ cis_result | default('ERROR') | trim }}"
    - "  Details: {{ details_04 | default('Not evaluated') | trim }}"
    - "========================================================"
