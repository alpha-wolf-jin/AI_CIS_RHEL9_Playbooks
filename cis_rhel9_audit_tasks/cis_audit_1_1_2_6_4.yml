---
- name: Initialize meta data variables
  include_vars: cis_audit_var_1_1_2_6_4.yml

- name: "Initialize data variables"
  set_fact:
    data_01: "Not collected yet"
    status_01: "UNKNOWN"
    details_01: "Not evaluated"
    data_02: "Not collected yet"
    status_02: "UNKNOWN"
    details_02: "Not evaluated"
    data_03: "Not collected yet"
    status_03: "UNKNOWN"
    details_03: "Not evaluated"
    data_04: "Not collected yet"
    status_04: "UNKNOWN"
    details_04: "Not evaluated"
    task_01_name: "Not executed"
    task_01_cmd: "N/A"
    task_01_rc: -1
    task_02_name: "Not executed"
    task_02_cmd: "N/A"
    task_02_rc: -1
    task_03_name: "Not executed"
    task_03_cmd: "N/A"
    task_03_rc: -1
    task_04_name: "Not executed"
    task_04_cmd: "N/A"
    task_04_rc: -1

# Requirement 1 – partition existence
- name: "Req 01 - Check if a separate partition exists for /var/log"
  ansible.builtin.command: "findmnt -kn {{ mount_point }}"
  register: result_01
  failed_when: false
  changed_when: false

- name: "Store partition existence flag"
  set_fact:
    partition_exists: "{{ result_01.rc == 0 and result_01.stdout | default('') | trim != '' }}"

- name: "Store requirement 01 details"
  set_fact:
    task_01_name: "Check if a separate partition exists for /var/log using findmnt"
    task_01_cmd: "findmnt -kn {{ mount_point }}"
    task_01_rc: "{{ result_01.rc | default(-1) }}"
    data_01: "{{ result_01.stdout | default('') | trim }}"
    status_01: "{{ 'PASS' if partition_exists else 'SKIPPED' }}"
    details_01: "{{ 'Partition exists and output is non-empty' if partition_exists else 'Partition not found, further checks skipped' }}"

# Requirement 2 – noexec check (only if partition exists)
- name: "Req 02 - Check if noexec option is set on /var/log partition"
  ansible.builtin.shell: "findmnt -kn {{ mount_point }} | grep -v noexec"
  args:
    executable: /bin/bash
  register: result_02
  failed_when: false
  changed_when: false
  when: partition_exists

- name: "Store requirement 02 details"
  set_fact:
    task_02_name: "Check if noexec option is set using findmnt and grep"
    task_02_cmd: "{{ 'findmnt -kn ' + mount_point + ' | grep -v noexec' if partition_exists else 'N/A (no separate partition)' }}"
    task_02_rc: "{{ result_02.rc | default(-1) if partition_exists else 'N/A' }}"
    data_02: "{{ result_02.stdout | default('') | trim if partition_exists else 'N/A' }}"
    status_02: >-
      {{ 'SKIPPED' if not partition_exists else ('PASS' if (result_02.rc | default(-1)) != 0 else 'FAIL') }}
    details_02: >-
      {{ 'Partition does not exist, check not applicable' if not partition_exists else ('noexec option is set (no output from grep)' if (result_02.rc | default(-1)) != 0 else 'noexec option is missing') }}

# Requirement 3 – overall compliance
- name: "Set compliance fact for overall compliance"
  set_fact:
    status_03: >-
      {{ 'PASS' if status_01 == 'PASS' and status_02 == 'PASS' else
         'SKIPPED' if not partition_exists else 'FAIL' }}
    details_03: >-
      {{ 'Both partition exists and noexec option set' if status_01 == 'PASS' and status_02 == 'PASS'
         else 'No separate /var/log partition, requirement not applicable' if not partition_exists
         else 'Partition exists but noexec option not set' }}
    task_03_name: "Overall compliance evaluation"
    task_03_cmd: "N/A"
    task_03_rc: 0
    data_03: "Partition existence: {{ status_01 }}; noexec status: {{ status_02 }}"

# Requirement 4 – store cis_result
- name: "Req 04 - Store cis_result variable"
  set_fact:
    cis_result: "{{ status_03 | trim }}"
    task_04_name: "Store cis_result"
    task_04_cmd: "N/A"
    task_04_rc: 0
    data_04: "{{ status_03 | trim }}"
    status_04: "{{ status_03 | trim }}"
    details_04: "Stored cis_result from overall compliance status"

# Audit report
- name: "Generate audit report"
  debug:
    msg:
    - "AUDIT REPORT — CIS 1.1.2.6.4"
    - "Reference: CIS Benchmark checkpoint 1.1.2.6.4"
    - ""
    - "REQUIREMENT 01 - {{ req_01 }}:"
    - "  Task: {{ task_01_name | default('Not recorded') }}"
    - "  Command: {{ task_01_cmd | default('N/A') }}"
    - "  Exit code: {{ task_01_rc | default(-1) }}"
    - "  Data: {{ data_01 | default('') | trim }}"
    - "  Status: {{ status_01 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_01 | default('') | trim }}"
    - ""
    - "REQUIREMENT 02 - {{ req_02 }}:"
    - "  Task: {{ task_02_name | default('Not recorded') }}"
    - "  Command: {{ task_02_cmd | default('N/A') }}"
    - "  Exit code: {{ task_02_rc | default(-1) }}"
    - "  Data: {{ data_02 | default('') | trim }}"
    - "  Status: {{ status_02 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_02 | default('') | trim }}"
    - ""
    - "REQUIREMENT 03 - {{ req_03 }}:"
    - "  Task: {{ task_03_name | default('Not recorded') }}"
    - "  Command: {{ task_03_cmd | default('N/A') }}"
    - "  Exit code: {{ task_03_rc | default(-1) }}"
    - "  Data: {{ data_03 | default('') | trim }}"
    - "  Status: {{ status_03 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_03 | default('') | trim }}"
    - ""
    - "REQUIREMENT 04 - {{ req_04 }}:"
    - "  Task: {{ task_04_name | default('Not recorded') }}"
    - "  Command: {{ task_04_cmd | default('N/A') }}"
    - "  Exit code: {{ task_04_rc | default(-1) }}"
    - "  Data: {{ data_04 | default('') | trim }}"
    - "  Status: {{ status_04 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_04 | default('') | trim }}"
    - ""
    - "========================================================"
    - "OVERALL COMPLIANCE:"
    - "  Result: {{ cis_result | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_03 | default('Not evaluated') | trim }}"
    - "========================================================"
