req_01: "Check if sudo is installed using command: `which sudo || dpkg -l sudo || rpm -q sudo`. Expected result: sudo is present."
req_02: "Check if /etc/sudoers or /etc/sudoers.d files exist using command: `ls -l /etc/sudoers*`. Expected result: at least one file exists."
req_03: |
  Check if sudo has a custom log file configured using command: `grep -rPsi \"^\\h*Defaults\\h+([^#]+,\\h*)?logfile\\h*=\\h*(\\\"|\\')?\\H+(\\\"|\\')?(,\\h*\\H+\\h*)*\\h*(#.*)?$\" /etc/sudoers*`. Expected result: output like `Defaults logfile=\"/var/log/sudo.log\"`.
req_04: "Summarize overall compliance: PASS if all checks pass, SKIP if sudo is not installed or no sudoers files exist, FAIL if sudo is installed but no custom log file is configured."
req_05: "Store the final audit result in a variable named 'cis_result' using set_fact. Set cis_result to the overall compliance status (PASS/FAIL/SKIP/ERROR) derived from the last requirement's status variable."
