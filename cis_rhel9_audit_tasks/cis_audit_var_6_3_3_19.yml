req_01: "Run the provided audit script to verify kernel module loading unloading and modification is collected"
req_02: "Summarise compliance status for Ensure kernel module loading unloading and modification is collected. Expected result: PASS if compliant, FAIL otherwise"
req_03: "Generate audit report with CIS checkpoint details"
ondisk_script_content: |
  {% raw %}
  #!/usr/bin/env bash
  {
    awk '/^ *-a *always,exit/ \
    &&/ -F *arch=b(32|64)/ \
    &&(/ -F auid!=unset/||/ -F auid!=-1/||/ -F auid!=4294967295/) \
    &&/ -S/ \
    &&(/init_module/ \
      ||/finit_module/ \
      ||/delete_module/ \
      ||/create_module/ \
      ||/query_module/) \
    &&(/ key= *[!-~]* *$/||/ -k *[!-~]* *$/)' /etc/audit/rules.d/*.rules

    UID_MIN=$(awk '/^\s*UID_MIN/{print $2}' /etc/login.defs)
    [ -n "${UID_MIN}" ] && awk "/^ *-a *always,exit/ \
    &&(/ -F *auid!=unset/||/ -F *auid!=-1/||/ -F *auid!=4294967295/) \
    &&/ -F *auid>=${UID_MIN}/ \
    &&/ -F *perm=x/ \
    &&/ -F *path=\/usr\/bin\/kmod/ \
    &&(/ key= *[!-~]* *$/||/ -k *[!-~]* *$/)" /etc/audit/rules.d/*.rules \
    || printf "ERROR: Variable 'UID_MIN' is unset.\n"
  }
  {% endraw %}
