---
- name: Initialize meta data variables
  include_vars: cis_audit_var_1_6_2.yml

- name: "Initialize data variables"
  ansible.builtin.set_fact:
    data_01: "Not collected yet"
    status_01: "UNKNOWN"
    details_01: "Not evaluated"
    data_02: "Not collected yet"
    status_02: "UNKNOWN"
    details_02: "Not evaluated"
    data_03: "Not collected yet"
    status_03: "UNKNOWN"
    details_03: "Not evaluated"
    data_04: "Not collected yet"
    status_04: "UNKNOWN"
    details_04: "Not evaluated"
    task_01_name: "Not executed"
    task_01_cmd: "N/A"
    task_01_rc: -1

- name: "Req 01 - Check if OpenSSH server is installed"
  ansible.builtin.shell: rpm -q openssh-server 2>/dev/null || dpkg -l openssh-server 2>/dev/null
  args:
    executable: /bin/bash
  register: result_01
  failed_when: false
  changed_when: false

- name: "Req 01 - Store installation check results"
  ansible.builtin.set_fact:
    sshd_installed: "{{ result_01.rc == 0 }}"
    task_01_name: "Check if OpenSSH server is installed"
    task_01_cmd: "rpm -q openssh-server 2>/dev/null || dpkg -l openssh-server 2>/dev/null"
    task_01_rc: "{{ result_01.rc }}"
    data_01: "{{ result_01.stdout | default('') | trim }}"
    status_01: "{{ 'PASS' if result_01.rc == 0 else 'FAIL' }}"
    details_01: "{{ 'Package is installed' if result_01.rc == 0 else 'Package is not installed' }}"

- name: "Req 02 - Check for CRYPTO_POLICY in sshd config"
  ansible.builtin.shell: |
    grep -Pi '^\h*CRYPTO_POLICY\h*=' /etc/sysconfig/sshd
  args:
    executable: /bin/bash
  register: result_02
  failed_when: false
  changed_when: false
  when: sshd_installed | bool

- name: "Req 02 - Store crypto policy check results"
  ansible.builtin.set_fact:
    task_02_name: "Check if system-wide crypto policy is set in sshd configuration"
    task_02_cmd: |
      grep -Pi '^\\h*CRYPTO_POLICY\\h*=' /etc/sysconfig/sshd
    task_02_rc: "{{ result_02.rc | default(-1) }}"
    data_02: "{{ result_02.stdout | default('') | trim }}"
    status_02: >-
      {%- if not sshd_installed -%}
      SKIPPED
      {%- elif result_02.rc | default(-1) == 1 and (result_02.stdout | default('') | trim) == '' -%}
      PASS
      {%- else -%}
      FAIL
      {%- endif -%}
    details_02: >-
      {%- if not sshd_installed -%}
      NOT_APPLICABLE: openssh-server not installed
      {%- elif result_02.rc | default(-1) == 1 and (result_02.stdout | default('') | trim) == '' -%}
      Crypto policy not set in /etc/sysconfig/sshd
      {%- elif result_02.rc | default(-1) == 0 -%}
      Crypto policy found: {{ result_02.stdout | default('') | trim }}
      {%- else -%}
      Error checking crypto policy (rc={{ result_02.rc | default(-1) }})
      {%- endif -%}

- name: "Req 03 - Determine overall compliance"
  ansible.builtin.set_fact:
    task_03_name: "Summarize overall compliance"
    task_03_cmd: "N/A"
    task_03_rc: -1
    data_03: >-
      {{ 'Installed and CRYPTO_POLICY not set' if sshd_installed and status_02 == 'PASS' else
         ('CRYPTO_POLICY set' if sshd_installed and status_02 == 'FAIL' else
         'Package not installed') }}
    status_03: >-
      {{ 'SKIPPED' if not sshd_installed else
         ('PASS' if status_02 == 'PASS' else 'FAIL') }}
    details_03: >-
      {{ 'NOT_APPLICABLE: openssh-server not installed' if not sshd_installed else
         ('System is compliant: openssh-server installed and no CRYPTO_POLICY set' if status_02 == 'PASS' else
         'System is non-compliant: CRYPTO_POLICY is set in /etc/sysconfig/sshd') }}

- name: "Req 04 - Store final audit result in cis_result"
  ansible.builtin.set_fact:
    cis_result: "{{ status_03 | default('UNKNOWN') | trim }}"
    task_04_name: "Store final audit result in cis_result"
    task_04_cmd: "N/A"
    task_04_rc: -1
    data_04: "{{ status_03 | default('UNKNOWN') | trim }}"
    status_04: "PASS"
    details_04: "cis_result stored as {{ status_03 | default('UNKNOWN') | trim }}"

- name: "Generate audit report"
  ansible.builtin.debug:
    msg:
    - "AUDIT REPORT — CIS 1.6.2"
    - "Reference: CIS Benchmark checkpoint 1.6.2"
    - "REQUIREMENT 01 - {{ req_01 }}:"
    - "  Task: {{ task_01_name | default('Not recorded') }}"
    - "  Command: {{ task_01_cmd | default('N/A') }}"
    - "  Exit code: {{ task_01_rc | default(-1) }}"
    - "  Data: {{ data_01 | default('') | trim }}"
    - "  Status: {{ status_01 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_01 | default('') | trim }}"
    - ""
    - "REQUIREMENT 02 - {{ req_02 }}:"
    - "  Task: {{ task_02_name | default('Not recorded') }}"
    - "  Command: {{ task_02_cmd | default('N/A') }}"
    - "  Exit code: {{ task_02_rc | default(-1) }}"
    - "  Data: {{ data_02 | default('') | trim }}"
    - "  Status: {{ status_02 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_02 | default('') | trim }}"
    - ""
    - "REQUIREMENT 03 - {{ req_03 }}:"
    - "  Task: {{ task_03_name | default('Not recorded') }}"
    - "  Command: {{ task_03_cmd | default('N/A') }}"
    - "  Exit code: {{ task_03_rc | default(-1) }}"
    - "  Data: {{ data_03 | default('') | trim }}"
    - "  Status: {{ status_03 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_03 | default('') | trim }}"
    - ""
    - "REQUIREMENT 04 - {{ req_04 }}:"
    - "  Task: {{ task_04_name | default('Not recorded') }}"
    - "  Command: {{ task_04_cmd | default('N/A') }}"
    - "  Exit code: {{ task_04_rc | default(-1) }}"
    - "  Data: {{ data_04 | default('') | trim }}"
    - "  Status: {{ status_04 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_04 | default('') | trim }}"
    - ""
    - "========================================================"
    - "OVERALL COMPLIANCE:"
    - "  Result: {{ cis_result | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_03 | default('Not evaluated') | trim }}"
    - "========================================================"
