---
- name: Initialize meta data variables
  include_vars: cis_audit_var_2_4_1_1.yml

- name: "Initialize data variables"
  set_fact:
    data_01: "Not collected yet"
    status_01: "ERROR"
    details_01: "Not evaluated"
    data_02: "Not collected yet"
    status_02: "ERROR"
    details_02: "Not evaluated"
    data_03: "Not collected yet"
    status_03: "ERROR"
    details_03: "Not evaluated"
    data_04: "Not collected yet"
    status_04: "ERROR"
    details_04: "Not evaluated"
    data_05: "Not collected yet"
    status_05: "ERROR"
    details_05: "Not evaluated"
    task_01_name: "Not executed"
    task_01_cmd: "N/A"
    task_01_rc: -1
    task_02_name: "Not executed"
    task_02_cmd: "N/A"
    task_02_rc: -1
    task_03_name: "Not executed"
    task_03_cmd: "N/A"
    task_03_rc: -1
    task_04_name: "Not executed"
    task_04_cmd: "N/A"
    task_04_rc: -1
    task_05_name: "Not executed"
    task_05_cmd: "N/A"
    task_05_rc: -1

- name: "Req 01 - Check if cron is installed"
  shell: systemctl list-unit-files | awk '$1~/^crond?\.service/{print $2}'
  args:
    executable: /bin/bash
  register: result_01
  failed_when: false
  changed_when: false

- name: "Store requirement 01 details"
  set_fact:
    task_01_name: "Check if cron package is installed"
    task_01_cmd: |
      systemctl list-unit-files | awk '$1~/^crond?\\.service/{print $2}'
    task_01_rc: "{{ result_01.rc | default(-1) }}"
    data_01: "{{ result_01.stdout | default('') | trim }}"
    status_01: "{{ 'PASS' if (result_01.rc == 0 and (result_01.stdout | default('') | trim) == 'enabled') else 'SKIP' }}"
    details_01: "{{ 'Cron is installed and enabled.' if (result_01.rc == 0 and (result_01.stdout | default('') | trim) == 'enabled') else 'cron not installed, not applicable to this system.' }}"
    cron_installed: "{{ (result_01.rc == 0 and (result_01.stdout | default('') | trim) == 'enabled') }}"

- name: "Req 02 - Check if cron daemon is enabled"
  shell: systemctl list-unit-files | awk '$1~/^crond?\.service/{print $2}'
  args:
    executable: /bin/bash
  register: result_02
  when: cron_installed | default(false)
  failed_when: false
  changed_when: false

- name: "Store requirement 02 details"
  set_fact:
    task_02_name: "Check if cron daemon is enabled"
    task_02_cmd: |
      systemctl list-unit-files | awk '$1~/^crond?\\.service/{print $2}'
    task_02_rc: "{{ result_02.rc | default(-1) if result_02 is defined else -1 }}"
    data_02: "{{ result_02.stdout | default('') | trim if result_02 is defined else 'N/A' }}"
    status_02: "{{ 'PASS' if (cron_installed | default(false) and result_02.rc | default(1) == 0 and (result_02.stdout | default('') | trim) == 'enabled') else 'SKIP' if not (cron_installed | default(false)) else 'FAIL' }}"
    details_02: "{{ 'Cron daemon is enabled.' if (cron_installed | default(false) and result_02.rc | default(1) == 0 and (result_02.stdout | default('') | trim) == 'enabled') else 'Cron not installed, check skipped.' if not (cron_installed | default(false)) else 'Cron daemon is not enabled.' }}"

- name: "Req 03 - Check if cron daemon is active"
  shell: systemctl list-units | awk '$1~/^crond?\.service/{print $3}'
  args:
    executable: /bin/bash
  register: result_03
  when: cron_installed | default(false)
  failed_when: false
  changed_when: false

- name: "Store requirement 03 details"
  set_fact:
    task_03_name: "Check if cron daemon is active"
    task_03_cmd: |
      systemctl list-units | awk '$1~/^crond?\\.service/{print $3}'
    task_03_rc: "{{ result_03.rc | default(-1) if result_03 is defined else -1 }}"
    data_03: "{{ result_03.stdout | default('') | trim if result_03 is defined else 'N/A' }}"
    status_03: "{{ 'PASS' if (cron_installed | default(false) and result_03.rc | default(1) == 0 and (result_03.stdout | default('') | trim) == 'active') else 'SKIP' if not (cron_installed | default(false)) else 'FAIL' }}"
    details_03: "{{ 'Cron daemon is active.' if (cron_installed | default(false) and result_03.rc | default(1) == 0 and (result_03.stdout | default('') | trim) == 'active') else 'Cron not installed, check skipped.' if not (cron_installed | default(false)) else 'Cron daemon is not active.' }}"

- name: "Req 04 - Summarize overall compliance"
  set_fact:
    task_04_name: "Summarize overall compliance"
    task_04_cmd: "N/A"
    task_04_rc: 0
    data_04: "Summarized"
    status_04: >-
      {{ 
        'NOT_APPLICABLE' if (status_01 | default('ERROR') | trim == 'SKIP') else
        'PASS' if (status_01 | default('ERROR') | trim == 'PASS' and status_02 | default('ERROR') | trim == 'PASS' and status_03 | default('ERROR') | trim == 'PASS') else
        'FAIL'
      }}
    details_04: >-
      {{ 
        'Cron is not installed, not applicable.' if (status_01 | default('ERROR') | trim == 'SKIP') else
        'All checks passed.' if (status_01 | default('ERROR') | trim == 'PASS' and status_02 | default('ERROR') | trim == 'PASS' and status_03 | default('ERROR') | trim == 'PASS') else
        'One or more checks failed.'
      }}

- name: "Req 05 - Store cis_result"
  set_fact:
    task_05_name: "Store final audit result in cis_result"
    task_05_cmd: "N/A"
    task_05_rc: 0
    data_05: "{{ status_04 }}"
    status_05: "{{ status_04 }}"
    details_05: "{{ details_04 }}"
    cis_result: "{{ status_04 }}"

- name: "Generate audit report"
  debug:
    msg:
    - "AUDIT REPORT — CIS 2.4.1.1"
    - "Reference: CIS Benchmark checkpoint 2.4.1.1"
    - ""
    - "REQUIREMENT 01 - {{ req_01 }}:"
    - "  Task: {{ task_01_name | default('Not recorded') }}"
    - "  Command: {{ task_01_cmd | default('N/A') }}"
    - "  Exit code: {{ task_01_rc | default(-1) }}"
    - "  Data: {{ data_01 | default('') | trim }}"
    - "  Status: {{ status_01 | default('ERROR') | trim }}"
    - "  Details: {{ details_01 | default('') | trim }}"
    - ""
    - "REQUIREMENT 02 - {{ req_02 }}:"
    - "  Task: {{ task_02_name | default('Not recorded') }}"
    - "  Command: {{ task_02_cmd | default('N/A') }}"
    - "  Exit code: {{ task_02_rc | default(-1) }}"
    - "  Data: {{ data_02 | default('') | trim }}"
    - "  Status: {{ status_02 | default('ERROR') | trim }}"
    - "  Details: {{ details_02 | default('') | trim }}"
    - ""
    - "REQUIREMENT 03 - {{ req_03 }}:"
    - "  Task: {{ task_03_name | default('Not recorded') }}"
    - "  Command: {{ task_03_cmd | default('N/A') }}"
    - "  Exit code: {{ task_03_rc | default(-1) }}"
    - "  Data: {{ data_03 | default('') | trim }}"
    - "  Status: {{ status_03 | default('ERROR') | trim }}"
    - "  Details: {{ details_03 | default('') | trim }}"
    - ""
    - "REQUIREMENT 04 - {{ req_04 }}:"
    - "  Task: {{ task_04_name | default('Not recorded') }}"
    - "  Command: {{ task_04_cmd | default('N/A') }}"
    - "  Exit code: {{ task_04_rc | default(-1) }}"
    - "  Data: {{ data_04 | default('') | trim }}"
    - "  Status: {{ status_04 | default('ERROR') | trim }}"
    - "  Details: {{ details_04 | default('') | trim }}"
    - ""
    - "REQUIREMENT 05 - {{ req_05 }}:"
    - "  Task: {{ task_05_name | default('Not recorded') }}"
    - "  Command: {{ task_05_cmd | default('N/A') }}"
    - "  Exit code: {{ task_05_rc | default(-1) }}"
    - "  Data: {{ data_05 | default('') | trim }}"
    - "  Status: {{ status_05 | default('ERROR') | trim }}"
    - "  Details: {{ details_05 | default('') | trim }}"
    - ""
    - "OVERALL COMPLIANCE:"
    - "  Result: {{ cis_result }}"
    - "  Details: {{ details_04 | default('Not evaluated') | trim }}"
