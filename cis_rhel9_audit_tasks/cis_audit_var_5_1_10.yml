req_01: "Check if OpenSSH server is installed using command: `dpkg -l | grep -q openssh-server || rpm -q openssh-server 2>/dev/null`. Expected result: package is installed."
req_02: "Check if sshd is running using command: `systemctl is-active sshd 2>/dev/null || service sshd status 2>/dev/null`. Expected result: active/running."
req_03: "Check DisableForwarding is set to yes using command: `sshd -T | grep -i disableforwarding`. Expected result: `disableforwarding yes`."
req_04: "Summarize overall compliance: PASS if all checks pass, SKIP if OpenSSH server is not installed or not running, FAIL if DisableForwarding is not set to yes."
req_05: "Store the final audit result in a variable named 'cis_result' using set_fact. Set cis_result to the overall compliance status (PASS/FAIL/SKIP/ERROR) derived from the last requirement's status variable."
req_06: "Generate audit report showing all requirement details and overall compliance."
