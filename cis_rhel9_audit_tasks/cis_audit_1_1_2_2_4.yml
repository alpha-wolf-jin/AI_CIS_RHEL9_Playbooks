---
- name: Initialize meta data variables
  include_vars: cis_audit_var_1_1_2_2_4.yml

- name: "Req 01 - Check if /dev/shm is a separate partition"
  ansible.builtin.command: findmnt -kn /dev/shm
  register: result_01
  failed_when: false
  changed_when: false

- name: "Store requirement 01 details"
  ansible.builtin.set_fact:
    dev_shm_partition_exists: "{{ result_01.rc == 0 and result_01.stdout | default('') | trim != '' }}"
    task_01_name: "Check /dev/shm partition"
    task_01_cmd: "findmnt -kn /dev/shm"
    task_01_rc: "{{ result_01.rc | default(-1) }}"
    data_01: "{{ result_01.stdout | default('') | trim }}"
    status_01: "{{ 'PASS' if (result_01.stdout | default('') | trim != '') else 'FAIL' }}"
    details_01: "{{ 'Partition exists' if (result_01.stdout | default('') | trim != '') else 'No separate partition found' }}"

- name: "Req 02 - Check if noexec option is set on /dev/shm"
  ansible.builtin.shell: findmnt -kn /dev/shm | grep -v 'noexec'
  args:
    executable: /bin/bash
  register: result_02
  failed_when: false
  changed_when: false
  when:
  - "dev_shm_partition_exists | default(false) | bool"

- name: "Store requirement 02 details"
  ansible.builtin.set_fact:
    noexec_present: >-
      {%- if not (dev_shm_partition_exists | default(false) | bool) -%}
      false
      {%- else -%}
      {{ (result_02.stdout | default('') | trim == '') | bool }}
      {%- endif -%}
    task_02_name: "Check noexec option"
    task_02_cmd: "findmnt -kn /dev/shm | grep -v 'noexec'"
    task_02_rc: "{{ result_02.rc | default(-1) }}"
    data_02: "{{ result_02.stdout | default('') | trim }}"
    status_02: >-
      {%- if not (dev_shm_partition_exists | default(false) | bool) -%}
      SKIP
      {%- elif (result_02.stdout | default('') | trim == '') -%}
      PASS
      {%- else -%}
      FAIL
      {%- endif -%}
    details_02: >-
      {%- if not (dev_shm_partition_exists | default(false) | bool) -%}
      No separate /dev/shm partition; check not applicable
      {%- elif (result_02.stdout | default('') | trim == '') -%}
      noexec option is SET
      {%- else -%}
      noexec option MISSING
      {%- endif -%}

- name: "Req 03 - Summarize overall compliance and set cis_result"
  ansible.builtin.set_fact:
    cis_result: "{{ 'SKIP' if not (dev_shm_partition_exists | default(false) | bool) else ('PASS' if noexec_present | default(false) | bool else 'FAIL') }}"

- name: "Req 04 - Store report variables for requirements 3 and 4"
  ansible.builtin.set_fact:
    task_03_name: "Summarize overall compliance"
    task_03_cmd: "Logical evaluation"
    task_03_rc: "0"
    data_03: "Compliance derived from checks"
    status_03: "{{ 'PASS' }}"
    details_03: "Overall compliance derived: {{ cis_result }}"
    task_04_name: "Store cis_result variable"
    task_04_cmd: "set_fact cis_result"
    task_04_rc: "0"
    data_04: "cis_result = {{ cis_result }}"
    status_04: "{{ 'PASS' }}"
    details_04: "Saved final audit status as cis_result"

- name: "Generate audit report"
  ansible.builtin.debug:
    msg:
    - "AUDIT REPORT — CIS 1.1.2.2.4"
    - "Reference: CIS Benchmark checkpoint 1.1.2.2.4"
    - ""
    - "REQUIREMENT 01 - {{ req_01 }}:"
    - "  Task: {{ task_01_name | default('Not recorded') }}"
    - "  Command: {{ task_01_cmd | default('N/A') }}"
    - "  Exit code: {{ task_01_rc | default(-1) }}"
    - "  Data: {{ data_01 | default('') | trim }}"
    - "  Status: {{ status_01 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_01 | default('') | trim }}"
    - ""
    - "REQUIREMENT 02 - {{ req_02 }}:"
    - "  Task: {{ task_02_name | default('Not recorded') }}"
    - "  Command: {{ task_02_cmd | default('N/A') }}"
    - "  Exit code: {{ task_02_rc | default(-1) }}"
    - "  Data: {{ data_02 | default('') | trim }}"
    - "  Status: {{ status_02 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_02 | default('') | trim }}"
    - ""
    - "REQUIREMENT 03 - {{ req_03 }}:"
    - "  Task: {{ task_03_name | default('Not recorded') }}"
    - "  Command: {{ task_03_cmd | default('N/A') }}"
    - "  Exit code: {{ task_03_rc | default(-1) }}"
    - "  Data: {{ data_03 | default('') | trim }}"
    - "  Status: {{ status_03 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_03 | default('') | trim }}"
    - ""
    - "REQUIREMENT 04 - {{ req_04 }}:"
    - "  Task: {{ task_04_name | default('Not recorded') }}"
    - "  Command: {{ task_04_cmd | default('N/A') }}"
    - "  Exit code: {{ task_04_rc | default(-1) }}"
    - "  Data: {{ data_04 | default('') | trim }}"
    - "  Status: {{ status_04 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_04 | default('') | trim }}"
    - ""
    - "OVERALL COMPLIANCE:"
    - "  Result: {{ cis_result | default('UNKNOWN') }}"
