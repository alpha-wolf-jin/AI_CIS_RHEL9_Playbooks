req_01: "Run the provided audit script to verify Ensure bootloader password is set"
req_02: "VERIFY: Summarise compliance status for Ensure bootloader password is set. Expected result: PASS if compliant, FAIL otherwise"
req_03: "Store the final audit result in a variable named 'cis_result' using set_fact. Set cis_result to the overall compliance status (PASS/FAIL/SKIPPED/UNKNOWN) derived from the last requirement's status variable."
req_04: "Create a task named 'Generate audit report' using debug msg with EXACTLY this format"
audit_script: "/tmp/audit_grub_password.sh"
audit_script_content: |
  {% raw %}
  #!/usr/bin/env bash
  {
     l_grub_password_file="$(find /boot -type f -name 'user.cfg' ! -empty)"
     if [ -f "$l_grub_password_file" ]; then
        awk -F. '/^\s*GRUB2_PASSWORD=\S+/ {print $1"."$2"."$3}' "$l_grub_password_file"
     fi
  }
  {% endraw %}
