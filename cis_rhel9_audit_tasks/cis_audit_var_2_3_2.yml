req_01: "Check if chrony is installed using command: `dpkg -l chrony 2>/dev/null || rpm -q chrony 2>/dev/null`. Expected result: package is installed."
req_02: "Check if chrony service is active using command: `systemctl is-active chronyd 2>/dev/null || systemctl is-active chrony 2>/dev/null`. Expected result: active"
req_03: "Check if chrony configuration file exists using command: `test -f /etc/chrony.conf && echo 'exists'`. Expected result: exists"
req_04: |
  Check if remote NTP server is configured in /etc/chrony.conf or /etc/chrony.d/ using command: `grep -Prs -- '^\\h*(server|pool)\\h+[^#\\n\\r]+' /etc/chrony.conf /etc/chrony.d/`. Expected result: output contains at least one line with 'server <remote-server>' or 'pool <remote-pool>'
req_05: "Verify that the configured remote server is reachable using command: `chronyc sources -v 2>/dev/null`. Expected result: output shows at least one source with a status of '^*' (synchronized) or '^+' (candidate)"
req_06: "Summarize overall compliance status: chrony is installed, active, configured with a remote server, and the server is reachable."
req_07: "Store the final audit result in a variable named 'cis_result' using set_fact. Set cis_result to the overall compliance status (PASS/FAIL/SKIP/ERROR) derived from the last requirement's status variable."
cis_result: "ERROR"
