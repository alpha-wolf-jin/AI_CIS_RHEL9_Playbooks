---
- name: Initialize meta data variables
  include_vars: cis_audit_var_1_1_2_5_3.yml

- name: "Initialize data variables and defaults"
  set_fact:
    status_01: "UNKNOWN"
    data_01: ""
    details_01: ""
    task_01_name: "Req 1 - Check if a separate partition exists for /var/tmp"
    task_01_cmd: "findmnt -kn /var/tmp"
    task_01_rc: -1
    status_02: "SKIPPED"
    data_02: "Not applicable"
    details_02: "No separate /var/tmp partition exists"
    task_02_name: "Req 2 - Check if nosuid option is set on /var/tmp partition"
    task_02_cmd: "findmnt -kn /var/tmp | grep -v nosuid"
    task_02_rc: -1
    status_03: "UNKNOWN"
    data_03: ""
    details_03: ""
    task_03_name: "Req 3 - Summarize overall compliance status"
    task_03_cmd: "set_fact evaluation"
    task_03_rc: 0
    partition_exists: false
    cis_result: "UNKNOWN"

- name: "Req 1 - Check if a separate partition exists for /var/tmp"
  ansible.builtin.command: findmnt -kn /var/tmp
  register: result_01
  failed_when: false
  changed_when: false

- name: "Store requirement 01 details"
  set_fact:
    task_01_rc: "{{ result_01.rc | default(-1) }}"
    data_01: "{{ result_01.stdout | default('') | trim }}"
    partition_exists: "{{ (result_01.stdout | default('') | trim | length > 0) | bool }}"
    status_01: "{{ 'PASS' if (result_01.stdout | default('') | trim | length > 0) else 'FAIL' }}"
    details_01: "{{ 'Separate partition found for /var/tmp' if (result_01.stdout | default('') | trim | length > 0) else 'No separate partition found for /var/tmp' }}"

- name: "Req 2 - Check if nosuid option is set on /var/tmp partition"
  ansible.builtin.shell: findmnt -kn /var/tmp | grep -v nosuid
  args:
    executable: /bin/bash
  register: result_02
  failed_when: false
  changed_when: false
  when: partition_exists | default(false) | bool

- name: "Store requirement 02 details (when partition exists)"
  set_fact:
    task_02_rc: "{{ result_02.rc | default(-1) }}"
    data_02: "{{ result_02.stdout | default('') | trim }}"
    status_02: "{{ 'PASS' if (result_02.stdout | default('') | trim == '') else 'FAIL' }}"
    details_02: "{{ 'nosuid option is set (no output returned)' if (result_02.stdout | default('') | trim == '') else 'nosuid option is missing (unexpected output returned)' }}"
  when: partition_exists | default(false) | bool

- name: "Req 3 - Summarize overall compliance status"
  set_fact:
    status_03: >-
      {{ 'SKIPPED' if not partition_exists else
         ('PASS' if status_02 == 'PASS' else 'FAIL') }}
    details_03: >-
      {{ 'No separate /var/tmp partition exists, check not applicable' if not partition_exists else
         ('Compliant — nosuid option is set on /var/tmp' if status_02 == 'PASS' else 'Non-compliant — nosuid option is missing on /var/tmp') }}
    data_03: "N/A"
    cis_result: >-
      {{ 'SKIPPED' if not partition_exists else
         ('PASS' if status_02 == 'PASS' else 'FAIL') }}

- name: "Generate audit report"
  debug:
    msg:
    - "AUDIT REPORT — CIS 1.1.2.5.3"
    - "Reference: CIS Benchmark checkpoint 1.1.2.5.3"
    - ""
    - "REQUIREMENT 01 - {{ req_01 }}:"
    - "  Task: {{ task_01_name | default('Not recorded') }}"
    - "  Command: {{ task_01_cmd | default('N/A') }}"
    - "  Exit code: {{ task_01_rc | default(-1) }}"
    - "  Data: {{ data_01 | default('') | trim }}"
    - "  Status: {{ status_01 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_01 | default('') | trim }}"
    - ""
    - "REQUIREMENT 02 - {{ req_02 }}:"
    - "  Task: {{ task_02_name | default('Not recorded') }}"
    - "  Command: {{ task_02_cmd | default('N/A') }}"
    - "  Exit code: {{ task_02_rc | default(-1) }}"
    - "  Data: {{ data_02 | default('') | trim }}"
    - "  Status: {{ status_02 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_02 | default('') | trim }}"
    - ""
    - "REQUIREMENT 03 - {{ req_03 }}:"
    - "  Task: {{ task_03_name | default('Not recorded') }}"
    - "  Command: {{ task_03_cmd | default('N/A') }}"
    - "  Exit code: {{ task_03_rc | default(-1) }}"
    - "  Data: {{ data_03 | default('') | trim }}"
    - "  Status: {{ status_03 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_03 | default('') | trim }}"
    - ""
    - "OVERALL COMPLIANCE:"
    - "  Result: {{ cis_result | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_03 | default('Not evaluated') | trim }}"
