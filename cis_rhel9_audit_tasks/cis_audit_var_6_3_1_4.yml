req_01: "Check if auditd is installed using command: `which auditd || dpkg -l auditd || rpm -q auditd`. Expected result: auditd is present."
req_02: "Check if auditd service is enabled using command: `systemctl is-enabled auditd | grep '^enabled'`. Expected result: enabled"
req_03: "Check if auditd service is active using command: `systemctl is-active auditd | grep '^active'`. Expected result: active"
req_04: "Summarize overall compliance status: auditd is installed, enabled, and active."
req_05: "Store the final audit result in a variable named 'cis_result' using set_fact. Set cis_result to the overall compliance status (PASS/FAIL/SKIP/UNKNOWN) derived from the last requirement's status variable."
service_name: "auditd"
