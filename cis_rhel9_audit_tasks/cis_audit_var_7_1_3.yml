req_01: "Check if /etc/group exists using command: `stat -Lc '%a' /etc/group 2>/dev/null || echo 'NOT_FOUND'`. Expected result: a numeric permission string (e.g., 644) or the file exists."
req_02: "Check permissions on /etc/group are 644 or more restrictive using command: `stat -Lc '%a' /etc/group`. Expected result: 644, 640, 600, 400, or 440 (i.e., no world-writable or group-writable beyond read)."
req_03: "Check owner of /etc/group is root (UID 0) using command: `stat -Lc '%u' /etc/group`. Expected result: 0"
req_04: "Check group owner of /etc/group is root (GID 0) using command: `stat -Lc '%g' /etc/group`. Expected result: 0"
req_05: "Summarize overall compliance status: if all above checks pass, the system is compliant; otherwise, non-compliant."
req_06: "Store the final audit result in a variable named 'cis_result' using set_fact. Set cis_result to the overall compliance status (PASS/FAIL/SKIPPED/UNKNOWN) derived from the last requirement's status variable."
