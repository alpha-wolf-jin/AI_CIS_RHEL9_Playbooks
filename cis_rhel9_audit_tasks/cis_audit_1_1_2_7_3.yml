---
- name: Initialize meta data variables
  include_vars: cis_audit_var_1_1_2_7_3.yml

- name: "Initialize data variables"
  ansible.builtin.set_fact:
    data_01: "Not collected yet"
    status_01: "ERROR"
    details_01: "Not evaluated"
    data_02: "Not collected yet"
    status_02: "ERROR"
    details_02: "Not evaluated"
    data_03: "Not collected yet"
    status_03: "ERROR"
    details_03: "Not evaluated"
    data_04: "Not collected yet"
    status_04: "ERROR"
    details_04: "Not evaluated"
    task_01_name: "Not executed"
    task_01_cmd: "N/A"
    task_01_rc: -1
    task_02_name: "Not executed"
    task_02_cmd: "N/A"
    task_02_rc: -1
    task_03_name: "Not executed"
    task_03_cmd: "N/A"
    task_03_rc: -1
    task_04_name: "Not executed"
    task_04_cmd: "N/A"
    task_04_rc: -1

- name: "Req 01 - Check if a separate partition exists for /var/log/audit"
  ansible.builtin.command: "findmnt -kn {{ mount_point }}"
  register: result_01
  failed_when: false
  changed_when: false

- name: "Store requirement 01 details"
  ansible.builtin.set_fact:
    task_01_name: "Check if a separate partition exists for /var/log/audit"
    task_01_cmd: "findmnt -kn {{ mount_point }}"
    task_01_rc: "{{ result_01.rc | default(-1) }}"
    data_01: "{{ result_01.stdout | default('') | trim }}"
    status_01: "{{ ('PASS' if (result_01.rc | default(-1) == 0 and (result_01.stdout | default('') | trim | length > 0)) else 'FAIL') | trim }}"
    details_01: "{{ ('Partition exists' if (result_01.rc | default(-1) == 0 and (result_01.stdout | default('') | trim | length > 0)) else 'Partition does not exist') | trim }}"

- name: "Req 02 - Check if nosuid option is set on /var/log/audit partition"
  ansible.builtin.shell: |
    findmnt -kn {{ mount_point }} | grep -v nosuid
  args:
    executable: /bin/bash
  register: result_02
  failed_when: false
  changed_when: false
  when:
  - "result_01.rc | default(-1) == 0"
  - "(result_01.stdout | default('') | trim | length > 0)"

- name: "Store requirement 02 details"
  ansible.builtin.set_fact:
    task_02_name: "Check if nosuid option is set on /var/log/audit partition"
    task_02_cmd: "findmnt -kn {{ mount_point }} | grep -v nosuid"
    task_02_rc: "{{ result_02.rc | default(-1) if (result_01.rc | default(-1) == 0 and (result_01.stdout | default('') | trim | length > 0)) else -1 }}"
    data_02: "{{ result_02.stdout | default('') | trim if (result_01.rc | default(-1) == 0 and (result_01.stdout | default('') | trim | length > 0)) else '' }}"
    status_02: >-
      {{ ('SKIP' if not (result_01.rc | default(-1) == 0 and (result_01.stdout | default('') | trim | length > 0))
      else ('PASS' if (result_02.rc | default(-1) != 0)
      else 'FAIL')) | trim }}
    details_02: >-
      {{ ('SKIP - Partition does not exist' if not (result_01.rc | default(-1) == 0 and (result_01.stdout | default('') | trim | length > 0))
      else ('nosuid option is set' if (result_02.rc | default(-1) != 0)
      else 'nosuid option is NOT set')) | trim }}

- name: "Req 03 - Summarize overall compliance"
  ansible.builtin.set_fact:
    task_03_name: "Summarize overall compliance"
    task_03_cmd: "N/A"
    task_03_rc: 0
    data_03: "{{ status_02 | default('ERROR') | trim }}"
    status_03: "{{ status_02 | default('ERROR') | trim }}"
    details_03: "{{ details_02 | default('Not evaluated') | trim }}"

- name: "Req 04 - Store final audit result in cis_result"
  ansible.builtin.set_fact:
    task_04_name: "Store final audit result in cis_result"
    task_04_cmd: "N/A"
    task_04_rc: 0
    data_04: "{{ status_03 | default('ERROR') | trim }}"
    status_04: "{{ status_03 | default('ERROR') | trim }}"
    details_04: "{{ details_03 | default('Not evaluated') | trim }}"
    cis_result: "{{ status_03 | default('ERROR') | trim }}"

- name: "Generate audit report"
  ansible.builtin.debug:
    msg:
    - "AUDIT REPORT — CIS 1.1.2.7.3"
    - "Reference: CIS Benchmark checkpoint 1.1.2.7.3"
    - ""
    - "REQUIREMENT 01 - {{ req_01 }}:"
    - "  Task: {{ task_01_name | default('Not recorded') }}"
    - "  Command: {{ task_01_cmd | default('N/A') }}"
    - "  Exit code: {{ task_01_rc | default(-1) }}"
    - "  Data: {{ data_01 | default('') | trim }}"
    - "  Status: {{ status_01 | default('ERROR') | trim }}"
    - "  Details: {{ details_01 | default('') | trim }}"
    - ""
    - "REQUIREMENT 02 - {{ req_02 }}:"
    - "  Task: {{ task_02_name | default('Not recorded') }}"
    - "  Command: {{ task_02_cmd | default('N/A') }}"
    - "  Exit code: {{ task_02_rc | default(-1) }}"
    - "  Data: {{ data_02 | default('') | trim }}"
    - "  Status: {{ status_02 | default('ERROR') | trim }}"
    - "  Details: {{ details_02 | default('') | trim }}"
    - ""
    - "REQUIREMENT 03 - {{ req_03 }}:"
    - "  Task: {{ task_03_name | default('Not recorded') }}"
    - "  Command: {{ task_03_cmd | default('N/A') }}"
    - "  Exit code: {{ task_03_rc | default(-1) }}"
    - "  Data: {{ data_03 | default('') | trim }}"
    - "  Status: {{ status_03 | default('ERROR') | trim }}"
    - "  Details: {{ details_03 | default('') | trim }}"
    - ""
    - "REQUIREMENT 04 - {{ req_04 }}:"
    - "  Task: {{ task_04_name | default('Not recorded') }}"
    - "  Command: {{ task_04_cmd | default('N/A') }}"
    - "  Exit code: {{ task_04_rc | default(-1) }}"
    - "  Data: {{ data_04 | default('') | trim }}"
    - "  Status: {{ status_04 | default('ERROR') | trim }}"
    - "  Details: {{ details_04 | default('') | trim }}"
    - ""
    - "========================================================"
    - "OVERALL COMPLIANCE:"
    - "  Result: {{ cis_result | default('ERROR') | trim }}"
    - "  Details: {{ details_04 | default('Not evaluated') | trim }}"
    - "========================================================"
