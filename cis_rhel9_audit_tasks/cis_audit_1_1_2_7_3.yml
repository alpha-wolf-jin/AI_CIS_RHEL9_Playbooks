---
- name: Initialize meta data variables
  include_vars: cis_audit_var_1_1_2_7_3.yml

- name: "Initialize data variables"
  set_fact:
    data_01: "Not collected yet"
    status_01: "UNKNOWN"
    details_01: "Not evaluated"
    data_02: "Not collected yet"
    status_02: "UNKNOWN"
    details_02: "Not evaluated"
    data_03: "Not collected yet"
    status_03: "UNKNOWN"
    details_03: "Not evaluated"
    data_04: "Not collected yet"
    status_04: "UNKNOWN"
    details_04: "Not evaluated"
    task_01_name: "Not executed"
    task_01_cmd: "N/A"
    task_01_rc: -1

- name: "Req 01 - Check if a separate partition exists for /var/log/audit"
  ansible.builtin.command: "findmnt -kn {{ mount_point }}"
  register: result_01
  failed_when: false
  changed_when: false

- name: "Req 01 - Evaluate partition existence compliance"
  ansible.builtin.set_fact:
    task_01_name: "Check partition existence"
    task_01_cmd: "findmnt -kn /var/log/audit"
    task_01_rc: "{{ result_01.rc | default(-1) }}"
    data_01: "{{ result_01.stdout | default('') | trim }}"
    status_01: >-
      {{ ('PASS' if (result_01.stdout | default('') | trim) != '' else 'FAIL') | trim }}
    details_01: >-
      {{ ('Separate partition exists' if (result_01.stdout | default('') | trim) != '' else 'No separate partition found for /var/log/audit') | trim }}
    partition_exists: "{{ (result_01.stdout | default('') | trim) != '' }}"

- name: "Req 02 - Check if the nosuid option is set on /var/log/audit partition"
  ansible.builtin.shell: "findmnt -kn {{ mount_point }} | grep -v {{ mount_option }}"
  args:
    executable: /bin/bash
  register: result_02
  failed_when: false
  changed_when: false
  when: partition_exists | bool

- name: "Req 02 - Evaluate nosuid compliance (if partition exists)"
  ansible.builtin.set_fact:
    task_02_name: "Check nosuid option"
    task_02_cmd: "findmnt -kn /var/log/audit | grep -v nosuid"
    task_02_rc: "{{ result_02.rc | default(-1) }}"
    data_02: "{{ result_02.stdout | default('') | trim }}"
    status_02: >-
      {{ ('PASS' if (result_02.stdout | default('') | trim) == '' else 'FAIL') | trim }}
    details_02: >-
      {{ ('nosuid option is set' if (result_02.stdout | default('') | trim) == '' else 'nosuid option is NOT set') | trim }}
  when: partition_exists | bool

- name: "Req 02 - Mark nosuid check as skipped (no partition)"
  ansible.builtin.set_fact:
    task_02_name: "Check nosuid option"
    task_02_cmd: "findmnt -kn /var/log/audit | grep -v nosuid"
    task_02_rc: -1
    data_02: "N/A"
    status_02: "SKIPPED"
    details_02: "Not applicable: no separate partition for /var/log/audit"
  when: not (partition_exists | bool)

- name: "Req 03 - Determine overall compliance"
  ansible.builtin.set_fact:
    task_03_name: "Overall compliance"
    task_03_cmd: "N/A"
    task_03_rc: 0
    data_03: "Combined: partition={{ status_01 }}, nosuid={{ status_02 }}"
    status_03: >-
      {{ 'PASS' if status_01 == 'PASS' and status_02 == 'PASS'
         else 'SKIPPED' if status_01 == 'FAIL'
         else 'FAIL' }}
    details_03: >-
      {{ 'All checks passed' if status_01 == 'PASS' and status_02 == 'PASS'
         else 'Audit not applicable: no separate /var/log/audit partition' if status_01 == 'FAIL'
         else 'nosuid option not set' }}

- name: "Store final result in cis_result"
  ansible.builtin.set_fact:
    cis_result: "{{ status_03 | default('UNKNOWN') | trim }}"

- name: "Req 04 - Evaluate storage of cis_result"
  ansible.builtin.set_fact:
    task_04_name: "Store final audit result"
    task_04_cmd: "N/A"
    task_04_rc: 0
    data_04: "cis_result = {{ cis_result | default('UNKNOWN') | trim }}"
    status_04: "{{ 'PASS' if cis_result is defined else 'FAIL' }}"
    details_04: "{{ 'Successfully stored cis_result' if cis_result is defined else 'Failed to set cis_result' }}"

- name: "Generate audit report"
  ansible.builtin.debug:
    msg:
    - "AUDIT REPORT — CIS 1.1.2.7.3"
    - "Reference: CIS Benchmark checkpoint 1.1.2.7.3"
    - ""
    - "REQUIREMENT 01 - {{ req_01 }}:"
    - "  Task: {{ task_01_name | default('Not recorded') }}"
    - "  Command: {{ task_01_cmd | default('N/A') }}"
    - "  Exit code: {{ task_01_rc | default(-1) }}"
    - "  Data: {{ data_01 | default('') | trim }}"
    - "  Status: {{ status_01 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_01 | default('') | trim }}"
    - ""
    - "REQUIREMENT 02 - {{ req_02 }}:"
    - "  Task: {{ task_02_name | default('Not recorded') }}"
    - "  Command: {{ task_02_cmd | default('N/A') }}"
    - "  Exit code: {{ task_02_rc | default(-1) }}"
    - "  Data: {{ data_02 | default('') | trim }}"
    - "  Status: {{ status_02 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_02 | default('') | trim }}"
    - ""
    - "REQUIREMENT 03 - {{ req_03 }}:"
    - "  Task: {{ task_03_name | default('Not recorded') }}"
    - "  Command: {{ task_03_cmd | default('N/A') }}"
    - "  Exit code: {{ task_03_rc | default(-1) }}"
    - "  Data: {{ data_03 | default('') | trim }}"
    - "  Status: {{ status_03 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_03 | default('') | trim }}"
    - ""
    - "REQUIREMENT 04 - {{ req_04 }}:"
    - "  Task: {{ task_04_name | default('Not recorded') }}"
    - "  Command: {{ task_04_cmd | default('N/A') }}"
    - "  Exit code: {{ task_04_rc | default(-1) }}"
    - "  Data: {{ data_04 | default('') | trim }}"
    - "  Status: {{ status_04 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_04 | default('') | trim }}"
    - ""
    - "========================================================"
    - "OVERALL COMPLIANCE:"
    - "  Result: {{ cis_result | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_03 | default('Not evaluated') | trim }}"
    - "========================================================"
