req_01: "Check if auditd is installed using command: `dpkg -l auditd 2>/dev/null || rpm -q audit 2>/dev/null`. Expected result: package is installed."
req_02: "Check on-disk audit rules for adjtimex and settimeofday syscalls (64-bit) using command: `awk '/^ *-a *always,exit/ &&/ -F *arch=b(32|64)/ &&/ -S/ &&(/adjtimex/ ||/settimeofday/ ||/clock_settime/ ) &&(/ key= *[!-~]* *$/||/ -k *[!-~]* *$/)' /etc/audit/rules.d/*.rules`. Expected result: output includes `-a always,exit -F arch=b64 -S adjtimex,settimeofday -k time-change`."
req_03: "Check on-disk audit rules for adjtimex and settimeofday syscalls (32-bit) using command: `awk '/^ *-a *always,exit/ &&/ -F *arch=b(32|64)/ &&/ -S/ &&(/adjtimex/ ||/settimeofday/ ||/clock_settime/ ) &&(/ key= *[!-~]* *$/||/ -k *[!-~]* *$/)' /etc/audit/rules.d/*.rules`. Expected result: output includes `-a always,exit -F arch=b32 -S adjtimex,settimeofday -k time-change`."
req_04: "Check on-disk audit rules for clock_settime syscall (64-bit) using command: `awk '/^ *-a *always,exit/ &&/ -F *arch=b(32|64)/ &&/ -S/ &&(/adjtimex/ ||/settimeofday/ ||/clock_settime/ ) &&(/ key= *[!-~]* *$/||/ -k *[!-~]* *$/)' /etc/audit/rules.d/*.rules`. Expected result: output includes `-a always,exit -F arch=b64 -S clock_settime -F a0=0x0 -k time-change`."
req_05: "Check on-disk audit rules for clock_settime syscall (32-bit) using command: `awk '/^ *-a *always,exit/ &&/ -F *arch=b(32|64)/ &&/ -S/ &&(/adjtimex/ ||/settimeofday/ ||/clock_settime/ ) &&(/ key= *[!-~]* *$/||/ -k *[!-~]* *$/)' /etc/audit/rules.d/*.rules`. Expected result: output includes `-a always,exit -F arch=b32 -S clock_settime -F a0=0x0 -k time-change`."
req_06: |
  Check on-disk audit rule for /etc/localtime using command: `awk '/^ *-w/ &&/\\/etc\\/localtime/ &&/ +-p *wa/ &&(/ key= *[!-~]* *$/||/ -k *[!-~]* *$/)' /etc/audit/rules.d/*.rules`. Expected result: output includes `-w /etc/localtime -p wa -k time-change`.
req_07: "Check running audit rules for adjtimex and settimeofday syscalls (64-bit) using command: `auditctl -l | awk '/^ *-a *always,exit/ &&/ -F *arch=b(32|64)/ &&/ -S/ &&(/adjtimex/ ||/settimeofday/ ||/clock_settime/ ) &&(/ key= *[!-~]* *$/||/ -k *[!-~]* *$/)'`. Expected result: output includes `-a always,exit -F arch=b64 -S adjtimex,settimeofday -F key=time-change`."
req_08: "Check running audit rules for adjtimex and settimeofday syscalls (32-bit) using command: `auditctl -l | awk '/^ *-a *always,exit/ &&/ -F *arch=b(32|64)/ &&/ -S/ &&(/adjtimex/ ||/settimeofday/ ||/clock_settime/ ) &&(/ key= *[!-~]* *$/||/ -k *[!-~]* *$/)'`. Expected result: output includes `-a always,exit -F arch=b32 -S settimeofday,adjtimex -F key=time-change`."
req_09: "Check running audit rules for clock_settime syscall (64-bit) using command: `auditctl -l | awk '/^ *-a *always,exit/ &&/ -F *arch=b(32|64)/ &&/ -S/ &&(/adjtimex/ ||/settimeofday/ ||/clock_settime/ ) &&(/ key= *[!-~]* *$/||/ -k *[!-~]* *$/)'`. Expected result: output includes `-a always,exit -F arch=b64 -S clock_settime -F a0=0x0 -F key=time-change`."
req_10: "Check running audit rules for clock_settime syscall (32-bit) using command: `auditctl -l | awk '/^ *-a *always,exit/ &&/ -F *arch=b(32|64)/ &&/ -S/ &&(/adjtimex/ ||/settimeofday/ ||/clock_settime/ ) &&(/ key= *[!-~]* *$/||/ -k *[!-~]* *$/)'`. Expected result: output includes `-a always,exit -F arch=b32 -S clock_settime -F a0=0x0 -F key=time-change`."
req_11: |
  Check running audit rule for /etc/localtime using command: `auditctl -l | awk '/^ *-w/ &&/\\/etc\\/localtime/ &&/ +-p *wa/ &&(/ key= *[!-~]* *$/||/ -k *[!-~]* *$/)'`. Expected result: output includes `-w /etc/localtime -p wa -k time-change`.
req_12: "Summarize overall compliance status: all on-disk and running audit rules for date/time modification events (adjtimex, settimeofday, clock_settime, /etc/localtime) must match the expected rules with key 'time-change'."
req_13: "Store the final audit result in a variable named 'cis_result' using set_fact. Set cis_result to the overall compliance status (PASS/FAIL/SKIP/UNKNOWN) derived from the last requirement's status variable."

expected_02: "-a always,exit -F arch=b64 -S adjtimex,settimeofday -k time-change"
expected_03: "-a always,exit -F arch=b32 -S adjtimex,settimeofday -k time-change"
expected_04: "-a always,exit -F arch=b64 -S clock_settime -F a0=0x0 -k time-change"
expected_05: "-a always,exit -F arch=b32 -S clock_settime -F a0=0x0 -k time-change"
expected_06: "-w /etc/localtime -p wa -k time-change"
expected_07: "-a always,exit -F arch=b64 -S adjtimex,settimeofday -F key=time-change"
expected_08: "-a always,exit -F arch=b32 -S settimeofday,adjtimex -F key=time-change"
expected_09: "-a always,exit -F arch=b64 -S clock_settime -F a0=0x0 -F key=time-change"
expected_10: "-a always,exit -F arch=b32 -S clock_settime -F a0=0x0 -F key=time-change"
expected_11: "-w /etc/localtime -p wa -k time-change"

awk_syscall_on_disk_cmd: |
  set -o pipefail
  awk '/^ *-a *always,exit/ &&/ -F *arch=b(32|64)/ &&/ -S/ &&(/adjtimex/ ||/settimeofday/ ||/clock_settime/ ) &&(/ key= *[!-~]* *$/||/ -k *[!-~]* *$/)' /etc/audit/rules.d/*.rules 2>/dev/null || true
awk_localtime_on_disk_cmd: |
  set -o pipefail
  awk '/^ *-w/ &&/\/etc\/localtime/ &&/ +-p *wa/ &&(/ key= *[!-~]* *$/||/ -k *[!-~]* *$/)' /etc/audit/rules.d/*.rules || true
awk_syscall_running_cmd: |
  set -o pipefail
  auditctl -l 2>/dev/null | awk '/^ *-a *always,exit/ &&/ -F *arch=b(32|64)/ &&/ -S/ &&(/adjtimex/ ||/settimeofday/ ||/clock_settime/ ) &&(/ key= *[!-~]* *$/||/ -k *[!-~]* *$/)' || true
awk_localtime_running_cmd: |
  set -o pipefail
  auditctl -l 2>/dev/null | awk '/^ *-w/ &&/\/etc\/localtime/ &&/ +-p *wa/ &&(/ key= *[!-~]* *$/||/ -k *[!-~]* *$/)' || true
