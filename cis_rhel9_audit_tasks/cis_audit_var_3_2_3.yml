audit_script: "/tmp/audit_rds_cis_3_2_3.sh"
backup_dir: "/var/log/ai-playbooks-backup/cis_3.2.3"
req_01: |
  1. Run the provided audit script to verify Ensure rds kernel module is not available. Run the following script to verify:\n- IF - the rds kernel module is available in ANY installed kernel, verify:\n  • An entry including /bin/true or /bin/false exists in a file within the /etc/modprobe.d/ directory\n  • The module is deny listed in a file within the /etc/modprobe.d/ directory\n  • The module is not loaded in the running kernel\n- IF - the rds kernel module is not available on the system, or pre-compiled into the kernel, no additional configuration is necessary
req_02: "2. VERIFY: Summarise compliance status for Ensure rds kernel module is not available. Expected result: PASS if compliant, FAIL otherwise"
req_03: "3. Store the final audit result in a variable named 'cis_result' using set_fact. Set cis_result to the overall compliance status (PASS/FAIL/SKIP/UNKNOWN) derived from the last requirement's status variable."
req_04: !unsafe "4. Create a task named 'Generate audit report' using debug msg with EXACTLY this format:\nAUDIT REPORT — CIS 3.2.3\nReference: CIS Benchmark checkpoint 3.2.3\nThen for each requirement: REQUIREMENT NN - {{ req_NN }}:\n  With fields: Task, Command, Exit code, Data, Status (PASS/FAIL/SKIP/UNKNOWN), Details.\nEnd with OVERALL COMPLIANCE: section containing Result: {{ cis_result }}\n"
audit_script_content: |
  {% raw %}
  #!/usr/bin/env bash

  {
     l_output3="" l_dl="" # clear variables
     unset a_output; unset a_output2 # unset arrays
     l_mod_name="rds" # set module name
     l_mod_type="net" # set module type
     l_mod_path="$(readlink -f /lib/modules/**/kernel/$l_mod_type | sort -u)"
     f_module_chk()
     {
        l_dl="y" # Set to ignore duplicate checks
        a_showconfig=() # Create array with modprobe output
        while IFS= read -r l_showconfig; do
           a_showconfig+=("$l_showconfig")
        done < <(modprobe --showconfig | grep -P -- '\b(install|blacklist)\h+'"${l_mod_name//-/_}"'\b')
        if ! lsmod | grep "$l_mod_name" &> /dev/null; then # Check if the module is currently loaded
           a_output+=("  - kernel module: \"$l_mod_name\" is not loaded")
        else
           a_output2+=("  - kernel module: \"$l_mod_name\" is loaded")
        fi
        if grep -Pq -- '\binstall\h+'"${l_mod_name//-/_}"'\h+\/bin\/(true|false)\b' <<< "${a_showconfig[*]}"; then
           a_output+=("  - kernel module: \"$l_mod_name\" is not loadable")
        else
           a_output2+=("  - kernel module: \"$l_mod_name\" is loadable")
        fi
        if grep -Pq -- '\bblacklist\h+'"${l_mod_name//-/_}"'\b' <<< "${a_showconfig[*]}"; then
           a_output+=("  - kernel module: \"$l_mod_name\" is deny listed")
        else
           a_output2+=("  - kernel module: \"$l_mod_name\" is not deny listed")
        fi
     }
     for l_mod_base_directory in $l_mod_path; do # Check if the module exists on the system
        if [ -d "$l_mod_base_directory/${l_mod_name/-/\/}" ] && [ -n "$(ls -A $l_mod_base_directory/${l_mod_name/-/\/})" ]; then
           l_output3="$l_output3\n  - \"$l_mod_base_directory\""
           [[ "$l_mod_name" =~ overlay ]] && l_mod_name="${l_mod_name::-2}"
           [ "$l_dl" != "y" ] && f_module_chk
        else
           a_output+=(" - kernel module: \"$l_mod_name\" doesn't exist in \"$l_mod_base_directory\"")
        fi
     done
     [ -n "$l_output3" ] && echo -e "\n\n -- INFO --\n - module: \"$l_mod_name\" exists in:$l_output3"
     if [ "${#a_output2[@]}" -le 0 ]; then
        printf '%s\n' "" "- Audit Result:" "  ** PASS **" "${a_output[@]}"
     else
        printf '%s\n' "" "- Audit Result:" "  ** FAIL **" " - Reason(s) for audit failure:" "${a_output2[@]}"
        [ "${#a_output[@]}" -gt 0 ] && printf '%s\n' "- Correctly set:" "${a_output[@]}"
     fi
  }
  {% endraw %}
