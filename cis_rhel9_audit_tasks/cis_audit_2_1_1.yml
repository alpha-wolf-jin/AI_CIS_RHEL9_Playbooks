---
- name: Initialize meta data variables
  include_vars: cis_audit_var_2_1_1.yml

- name: "Initialize data variables"
  set_fact:
    data_01: "Not collected yet"
    status_01: "ERROR"
    details_01: "Not evaluated"
    task_01_name: "Not executed"
    task_01_cmd: "N/A"
    task_01_rc: -1
    data_02: "Not collected yet"
    status_02: "ERROR"
    details_02: "Not evaluated"
    task_02_name: "Not executed"
    task_02_cmd: "N/A"
    task_02_rc: -1
    data_03: "Not collected yet"
    status_03: "ERROR"
    details_03: "Not evaluated"
    task_03_name: "Not executed"
    task_03_cmd: "N/A"
    task_03_rc: -1
    data_04: "Not collected yet"
    status_04: "ERROR"
    details_04: "Not evaluated"
    task_04_name: "Not executed"
    task_04_cmd: "N/A"
    task_04_rc: -1
    data_05: "Not collected yet"
    status_05: "ERROR"
    details_05: "Not evaluated"
    task_05_name: "Not executed"
    task_05_cmd: "N/A"
    task_05_rc: "N/A"

- name: "Req 01 - Check autofs package installation"
  shell: "rpm -q {{ autofs_package }}"
  args:
    executable: /bin/bash
  register: result_01
  failed_when: false
  changed_when: false

- name: "Check if autofs is required for dependencies"
  shell: "rpm -q --whatrequires {{ autofs_package }}"
  args:
    executable: /bin/bash
  register: result_deps
  failed_when: false
  changed_when: false

- name: "Store requirement 01 details"
  set_fact:
    autofs_installed: "{{ result_01.rc == 0 }}"
    autofs_needed: "{{ result_deps.rc == 0 }}"
    task_01_name: "Check autofs package installation"
    task_01_cmd: "rpm -q {{ autofs_package }}"
    task_01_rc: "{{ result_01.rc }}"
    data_01: "{{ result_01.stdout | default('') | trim }}"
    status_01: "{{ 'PASS' if result_01.rc != 0 else 'FAIL' }}"
    details_01: "{{ 'Package not installed, as expected.' if result_01.rc != 0 else 'Package is installed, which may be non-compliant.' }}"

- name: "Set SKIP for requirements 2-4 when autofs is not installed"
  set_fact:
    status_02: "SKIP"
    details_02: "Package not installed – check skipped"
    task_02_name: "Not applicable (package not installed)"
    task_02_cmd: "N/A"
    data_02: "N/A"
    task_02_rc: -1
    status_03: "SKIP"
    details_03: "Package not installed – check skipped"
    task_03_name: "Not applicable (package not installed)"
    task_03_cmd: "N/A"
    data_03: "N/A"
    task_03_rc: -1
    status_04: "SKIP"
    details_04: "Package not installed – check skipped"
    task_04_name: "Not applicable (package not installed)"
    task_04_cmd: "N/A"
    data_04: "N/A"
    task_04_rc: -1
  when: "not (autofs_installed | bool)"

- name: "Set SKIP for requirements 2-4 when autofs is installed but not a required dependency"
  set_fact:
    status_02: "SKIP"
    details_02: "Package installed but no package requires it – checks skipped"
    task_02_name: "Not applicable (not a dependency)"
    task_02_cmd: "N/A"
    data_02: "N/A"
    task_02_rc: -1
    status_03: "SKIP"
    details_03: "Package installed but no package requires it – checks skipped"
    task_03_name: "Not applicable (not a dependency)"
    task_03_cmd: "N/A"
    data_03: "N/A"
    task_03_rc: -1
    status_04: "SKIP"
    details_04: "Package installed but no package requires it – checks skipped"
    task_04_name: "Not applicable (not a dependency)"
    task_04_cmd: "N/A"
    data_04: "N/A"
    task_04_rc: -1
  when: "autofs_installed | bool and not (autofs_needed | bool)"

- name: "Req 02 - Check if autofs.service is enabled"
  shell: "systemctl is-enabled {{ autofs_package }}.service 2>/dev/null | grep 'enabled'"
  args:
    executable: /bin/bash
  register: result_02
  failed_when: false
  when: "autofs_installed | bool and autofs_needed | bool"

- name: "Store requirement 02 details"
  set_fact:
    task_02_name: "Check if autofs.service is enabled"
    task_02_cmd: "systemctl is-enabled {{ autofs_package }}.service 2>/dev/null | grep 'enabled'"
    task_02_rc: "{{ result_02.rc | default(-1) }}"
    data_02: "{{ result_02.stdout | default('') | trim }}"
    status_02: "{{ 'PASS' if (result_02.stdout | default('') | trim | length == 0) else 'FAIL' }}"
    details_02: "{{ 'Service not enabled, as expected.' if (result_02.stdout | default('') | trim | length == 0) else 'Service appears to be enabled.' }}"
  when: "autofs_installed | bool and autofs_needed | bool"

- name: "Req 03 - Check if autofs.service is active"
  shell: "systemctl is-active {{ autofs_package }}.service 2>/dev/null | grep '^active'"
  args:
    executable: /bin/bash
  register: result_03
  failed_when: false
  when: "autofs_installed | bool and autofs_needed | bool"

- name: "Store requirement 03 details"
  set_fact:
    task_03_name: "Check if autofs.service is active"
    task_03_cmd: "systemctl is-active {{ autofs_package }}.service 2>/dev/null | grep '^active'"
    task_03_rc: "{{ result_03.rc | default(-1) }}"
    data_03: "{{ result_03.stdout | default('') | trim }}"
    status_03: "{{ 'PASS' if (result_03.stdout | default('') | trim | length == 0) else 'FAIL' }}"
    details_03: "{{ 'Service not active, as expected.' if (result_03.stdout | default('') | trim | length == 0) else 'Service appears to be active.' }}"
  when: "autofs_installed | bool and autofs_needed | bool"

- name: "Req 04 - Verify service compliance with site policy"
  shell: |
    set -o pipefail
    is_masked=$(systemctl is-masked {{ autofs_package }}.service 2>/dev/null)
    is_active=$(systemctl is-active {{ autofs_package }}.service 2>/dev/null)
    if [[ "$is_masked" == "masked" && "$is_active" != "active" ]]; then
      echo "COMPLIANT: masked and inactive"
    else
      echo "NON-COMPLIANT: masked=$is_masked active=$is_active"
      exit 1
    fi
  args:
    executable: /bin/bash
  register: result_04
  failed_when: false
  when: "autofs_installed | bool and autofs_needed | bool"

- name: "Store requirement 04 details"
  set_fact:
    task_04_name: "Verify service compliance with site policy"
    task_04_cmd: "systemctl is-masked {{ autofs_package }}.service ; systemctl is-active {{ autofs_package }}.service (policy evaluation)"
    task_04_rc: "{{ result_04.rc | default(-1) }}"
    data_04: "{{ result_04.stdout | default('') | trim }}"
    status_04: "{{ 'PASS' if (result_04.rc | default(-1) == 0) else 'FAIL' }}"
    details_04: "{{ 'Service is masked and inactive, compliant with typical site policy.' if (result_04.rc | default(-1) == 0) else 'Service not masked/inactive, or policy not met.' }}"
  when: "autofs_installed | bool and autofs_needed | bool"

- name: "Summarize overall compliance"
  set_fact:
    status_05: >-
      {% if not (autofs_installed | bool) %}PASS
      {% elif (autofs_needed | bool) and (status_02 == 'PASS' and status_03 == 'PASS' and status_04 == 'PASS') %}PASS
      {% elif (autofs_needed | bool) %}FAIL
      {% else %}FAIL
      {% endif %}
    details_05: >-
      {% if not (autofs_installed | bool) %}Autofs package not installed — compliant.
      {% elif (autofs_needed | bool) and (status_02 == 'PASS' and status_03 == 'PASS' and status_04 == 'PASS') %}Autofs is installed as a dependency but services are properly masked and not active — compliant.
      {% elif (autofs_needed | bool) %}Autofs installed as a dependency but service checks failed — non-compliant.
      {% else %}Autofs installed but no package requires it — non-compliant.
      {% endif %}
    task_05_name: "Summarize overall compliance"
    task_05_cmd: "N/A"
    task_05_rc: "N/A"
    data_05: "N/A"

- name: "Store cis_result for report"
  set_fact:
    cis_result: "{{ status_05 | trim }}"

- name: "Generate audit report"
  debug:
    msg:
    - "AUDIT REPORT — CIS 2.1.1"
    - "Reference: CIS Benchmark checkpoint 2.1.1"
    - ""
    - "REQUIREMENT 01 - {{ req_01 }}:"
    - "  Task: {{ task_01_name | default('Not recorded') }}"
    - "  Command: {{ task_01_cmd | default('N/A') }}"
    - "  Exit code: {{ task_01_rc | default(-1) }}"
    - "  Data: {{ data_01 | default('') | trim }}"
    - "  Status: {{ status_01 | default('ERROR') | trim }}"
    - "  Details: {{ details_01 | default('') | trim }}"
    - ""
    - "REQUIREMENT 02 - {{ req_02 }}:"
    - "  Task: {{ task_02_name | default('Not recorded') }}"
    - "  Command: {{ task_02_cmd | default('N/A') }}"
    - "  Exit code: {{ task_02_rc | default(-1) }}"
    - "  Data: {{ data_02 | default('') | trim }}"
    - "  Status: {{ status_02 | default('ERROR') | trim }}"
    - "  Details: {{ details_02 | default('') | trim }}"
    - ""
    - "REQUIREMENT 03 - {{ req_03 }}:"
    - "  Task: {{ task_03_name | default('Not recorded') }}"
    - "  Command: {{ task_03_cmd | default('N/A') }}"
    - "  Exit code: {{ task_03_rc | default(-1) }}"
    - "  Data: {{ data_03 | default('') | trim }}"
    - "  Status: {{ status_03 | default('ERROR') | trim }}"
    - "  Details: {{ details_03 | default('') | trim }}"
    - ""
    - "REQUIREMENT 04 - {{ req_04 }}:"
    - "  Task: {{ task_04_name | default('Not recorded') }}"
    - "  Command: {{ task_04_cmd | default('N/A') }}"
    - "  Exit code: {{ task_04_rc | default(-1) }}"
    - "  Data: {{ data_04 | default('') | trim }}"
    - "  Status: {{ status_04 | default('ERROR') | trim }}"
    - "  Details: {{ details_04 | default('') | trim }}"
    - ""
    - "REQUIREMENT 05 - {{ req_05 }}:"
    - "  Task: {{ task_05_name | default('Not recorded') }}"
    - "  Command: {{ task_05_cmd | default('N/A') }}"
    - "  Exit code: {{ task_05_rc | default(-1) }}"
    - "  Data: {{ data_05 | default('') | trim }}"
    - "  Status: {{ status_05 | default('ERROR') | trim }}"
    - "  Details: {{ details_05 | default('') | trim }}"
    - ""
    - "========================================================"
    - "OVERALL COMPLIANCE:"
    - "  Result: {{ cis_result | default('ERROR') | trim }}"
    - "  Details: {{ details_05 | default('Not evaluated') | trim }}"
    - "========================================================"
