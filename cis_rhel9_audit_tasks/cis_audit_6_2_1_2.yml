---
- name: Initialize meta data variables
  include_vars: cis_audit_var_6_2_1_2.yml

- name: "Gather package facts"
  ansible.builtin.package_facts:
    manager: auto
  failed_when: false

- name: "Check if systemd is installed"
  ansible.builtin.set_fact:
    journald_installed: "{{ 'systemd' in ansible_facts.packages }}"

- name: "Req 01 - Execute audit script for journald log file access"
  ansible.builtin.shell: /bin/bash
  args:
    stdin: "{{ audit_script_content }}"
    executable: /bin/bash
  register: audit_result
  failed_when: false
  changed_when: false
  when:
  - journald_installed | default(false) | bool

- name: "Req 01 - Store audit execution details"
  ansible.builtin.set_fact:
    task_01_name: "Execute audit script to verify journald log file access"
    task_01_cmd: "/bin/bash (stdin script)"
    task_01_rc: "{{ audit_result.rc | default(-1) }}"
    data_01: "{{ audit_result.stdout | default('') | trim }}"
    status_01: >-
      {%- if not (journald_installed | default(false) | bool) -%}
        NOT_APPLICABLE
      {%- elif audit_result.rc | default(-1) == 0 -%}
        PASS
      {%- else -%}
        FAIL
      {%- endif -%}
    details_01: >-
      {%- if not (journald_installed | default(false) | bool) -%}
        Systemd-journald not installed; audit not applicable
      {%- elif audit_result.rc | default(-1) == 0 -%}
        Audit script executed successfully
      {%- else -%}
        Audit script execution failed with rc={{ audit_result.rc | default('unknown') }}
      {%- endif -%}
  when: true

- name: "Req 02 - Verify compliance status for journald log file access"
  ansible.builtin.set_fact:
    status_02: >-
      {%- if not (journald_installed | default(false) | bool) -%}
        NOT_APPLICABLE
      {%- elif '** PASS **' in audit_result.stdout | default('') -%}
        PASS
      {%- elif '** REVIEW **' in audit_result.stdout | default('') -%}
        FAIL
      {%- else -%}
        UNKNOWN
      {%- endif -%}
    task_02_name: "Evaluate compliance from audit script output"
    task_02_cmd: "Parsed audit script output"
    task_02_rc: "N/A"
    data_02: "{{ audit_result.stdout | default('') | trim }}"
    details_02: >-
      {%- if not (journald_installed | default(false) | bool) -%}
        Journald not installed; audit not applicable
      {%- elif '** PASS **' in audit_result.stdout | default('') -%}
        Journald log file access permissions are compliant (mode 0640 or more restrictive)
      {%- elif '** REVIEW **' in audit_result.stdout | default('') -%}
        Journald log file access permissions NOT compliant; review required
      {%- else -%}
        Unable to determine compliance from audit script output
      {%- endif -%}
  when: true

- name: "Req 03 - Store final audit result as cis_result"
  ansible.builtin.set_fact:
    cis_result: "{{ status_02 }}"
    task_03_name: "Store cis_result"
    task_03_cmd: "set_fact cis_result"
    task_03_rc: "N/A"
    data_03: "{{ status_02 }}"
    status_03: "{{ status_02 }}"
    details_03: "Final compliance result stored as cis_result variable"

- name: "Generate audit report"
  ansible.builtin.debug:
    msg:
    - "AUDIT REPORT — CIS 6.2.1.2"
    - "Reference: CIS Benchmark checkpoint 6.2.1.2"
    - ""
    - "REQUIREMENT 01 - {{ req_01 | default('') }}:"
    - "  Task: {{ task_01_name | default('Not recorded') }}"
    - "  Command: {{ task_01_cmd | default('N/A') }}"
    - "  Exit code: {{ task_01_rc | default('N/A') }}"
    - "  Data: {{ data_01 | default('') | trim }}"
    - "  Status: {{ status_01 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_01 | default('') | trim }}"
    - ""
    - "REQUIREMENT 02 - {{ req_02 | default('') }}:"
    - "  Task: {{ task_02_name | default('Not recorded') }}"
    - "  Command: {{ task_02_cmd | default('N/A') }}"
    - "  Exit code: {{ task_02_rc | default('N/A') }}"
    - "  Data: {{ data_02 | default('') | trim }}"
    - "  Status: {{ status_02 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_02 | default('') | trim }}"
    - ""
    - "REQUIREMENT 03 - {{ req_03 | default('') }}:"
    - "  Task: {{ task_03_name | default('Not recorded') }}"
    - "  Command: {{ task_03_cmd | default('N/A') }}"
    - "  Exit code: {{ task_03_rc | default('N/A') }}"
    - "  Data: {{ data_03 | default('') | trim }}"
    - "  Status: {{ status_03 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_03 | default('') | trim }}"
    - ""
    - "========================================================================"
    - "OVERALL COMPLIANCE:"
    - "  Result: {{ cis_result | default('UNKNOWN') | trim }}"
    - "========================================================================"
