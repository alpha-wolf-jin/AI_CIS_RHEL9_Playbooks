---
- name: Initialize meta data variables
  include_vars: cis_audit_var_5_3_3_3_1.yml

- name: "Gather package facts"
  ansible.builtin.package_facts:
    manager: auto
  failed_when: false

- name: "Set pam installed status and initialize report variables"
  set_fact:
    pam_installed: "{{ 'pam' in ansible_facts.packages }}"
    task_01_name: "Not executed"
    task_01_cmd: "N/A"
    task_01_rc: "-1"
    data_01: "Not collected"
    status_01: "ERROR"
    details_01: "Not evaluated"
    task_02_name: "Not executed"
    task_02_cmd: "N/A"
    task_02_rc: "-1"
    data_02: "Not collected"
    status_02: "ERROR"
    details_02: "Not evaluated"
    task_03_name: "Not executed"
    task_03_cmd: "N/A"
    task_03_rc: "-1"
    data_03: "Not collected"
    status_03: "ERROR"
    details_03: "Not evaluated"
    task_04_name: "Not executed"
    task_04_cmd: "N/A"
    task_04_rc: "-1"
    data_04: "Not collected"
    status_04: "ERROR"
    details_04: "Not evaluated"
    task_05_name: "Not executed"
    task_05_cmd: "N/A"
    task_05_rc: "-1"
    data_05: "Not collected"
    status_05: "ERROR"
    details_05: "Not evaluated"
    task_06_name: "Not executed"
    task_06_cmd: "N/A"
    task_06_rc: "-1"
    data_06: "Not collected"
    status_06: "ERROR"
    details_06: "Not evaluated"

- name: "Req 01 - Check if /etc/security/pwhistory.conf exists"
  ansible.builtin.stat:
    path: /etc/security/pwhistory.conf
  register: result_01
  failed_when: false
  when: "pam_installed | bool"

- name: "Store requirement 01 details"
  set_fact:
    task_01_name: "Req 01 - Check if /etc/security/pwhistory.conf exists"
    task_01_cmd: "test -f /etc/security/pwhistory.conf"
    task_01_rc: "{{ 0 if (result_01.stat.exists | default(false)) else 1 }}"
    data_01: "{{ 'File exists' if (result_01.stat.exists | default(false)) else 'File does not exist' }}"
    status_01: "{{ 'PASS' if (result_01.stat.exists | default(false)) else 'FAIL' }}"
    details_01: "{{ 'File exists as expected' if (result_01.stat.exists | default(false)) else 'File not found - prerequisite not met' }}"
  when: "pam_installed | bool"

- name: "Set file existence flag"
  set_fact:
    file_exists: "{{ result_01.stat.exists | default(false) }}"
  when: "pam_installed | bool"

- name: "Req 02 - Check pam_pwhistory module configured in PAM files"
  shell: |
    grep -Pi -- 'pam_pwhistory\.so' /etc/pam.d/password-auth /etc/pam.d/system-auth
  args:
    executable: /bin/bash
  register: result_02
  failed_when: false
  when: "pam_installed | bool"

- name: "Store requirement 02 details"
  set_fact:
    task_02_name: "Req 02 - Check pam_pwhistory module configured"
    task_02_cmd: |
      grep -Pi -- 'pam_pwhistory\.so' /etc/pam.d/password-auth /etc/pam.d/system-auth
    task_02_rc: "{{ result_02.rc | default(-1) }}"
    data_02: "{{ result_02.stdout | default('') | trim }}"
    status_02: "{{ 'PASS' if (result_02.rc | default(-1)) == 0 else 'FAIL' }}"
    details_02: "{{ 'pam_pwhistory module found in PAM configuration' if (result_02.rc | default(-1)) == 0 else 'pam_pwhistory module not configured' }}"
  when: "pam_installed | bool"

- name: "Set pwhistory configured flag"
  set_fact:
    pwhistory_configured: "{{ (result_02.rc | default(1)) == 0 }}"
  when: "pam_installed | bool"

- name: "Req 03 - Check remember >= 24 in /etc/security/pwhistory.conf"
  shell: |
    grep -Pi -- '^\h*remember\h*=\h*(2[4-9]|[3-9][0-9]|[1-9][0-9]{2,})\b' /etc/security/pwhistory.conf
  args:
    executable: /bin/bash
  register: result_03
  failed_when: false
  when: "pam_installed | bool"

- name: "Store requirement 03 details"
  set_fact:
    task_03_name: "Req 03 - Check remember >= 24 in pwhistory.conf"
    task_03_cmd: |
      grep -Pi -- '^\h*remember\h*=\h*(2[4-9]|[3-9][0-9]|[1-9][0-9]{2,})\b' /etc/security/pwhistory.conf
    task_03_rc: "{{ result_03.rc | default(-1) }}"
    data_03: "{{ result_03.stdout | default('') | trim }}"
    status_03: "{{ 'PASS' if (file_exists | default(false) and (result_03.rc | default(-1)) == 0) else ('FAIL' if (file_exists | default(false)) else 'SKIP') }}"
    details_03: "{{ 'remember option set to 24 or more' if (file_exists | default(false) and (result_03.rc | default(-1)) == 0) else ('remember option not set to 24 or more' if (file_exists | default(false)) else 'File not found - check skipped') }}"
  when: "pam_installed | bool"

- name: "Req 04 - Check remember not <24 in both PAM files"
  shell: |
    grep -Pi -- '^\h*password\h+(requisite|required|sufficient)\h+pam_pwhistory\.so\h+([^#\n\r]+\h+)?remember=(2[0-3]|1[0-9]|[0-9])\b' /etc/pam.d/system-auth /etc/pam.d/password-auth
  args:
    executable: /bin/bash
  register: result_04
  failed_when: false
  when:
  - "pam_installed | bool"
  - "pwhistory_configured | default(false)"

- name: "Store requirement 04 details"
  set_fact:
    task_04_name: "Req 04 - Check remember not <24 in PAM files"
    task_04_cmd: |
      grep -Pi -- '^\h*password\h+(requisite|required|sufficient)\h+pam_pwhistory\.so\h+([^#\n\r]+\h+)?remember=(2[0-3]|1[0-9]|[0-9])\b' /etc/pam.d/system-auth /etc/pam.d/password-auth
    task_04_rc: "{{ result_04.rc | default(-1) }}"
    data_04: "{{ result_04.stdout | default('') | trim }}"
    status_04: "{{ 'PASS' if (pwhistory_configured | default(false) and (result_04.rc | default(-1)) != 0) else ('FAIL' if (pwhistory_configured | default(false)) else 'SKIP') }}"
    details_04: "{{ 'No lower remember value found in PAM files' if (pwhistory_configured | default(false) and (result_04.rc | default(-1)) != 0) else ('Lower remember value found in PAM files' if (pwhistory_configured | default(false)) else 'Module not configured - check skipped') }}"
  when: "pam_installed | bool"

- name: "Req 05 - Determine overall compliance status"
  set_fact:
    overall_status: >-
      {%- if not pam_installed | bool -%}
      SKIP
      {%- elif not (file_exists | default(false)) or not (pwhistory_configured | default(false)) -%}
      SKIP
      {%- elif status_03 | trim == 'PASS' and status_04 | trim == 'PASS' -%}
      PASS
      {%- else -%}
      FAIL
      {%- endif -%}
    overall_details: >-
      {%- if not pam_installed | bool -%}
      PAM package not installed — audit not applicable
      {%- elif not (file_exists | default(false)) -%}
      /etc/security/pwhistory.conf does not exist — audit skipped
      {%- elif not (pwhistory_configured | default(false)) -%}
      pam_pwhistory module is not configured — audit skipped
      {%- elif status_03 | trim == 'PASS' and status_04 | trim == 'PASS' -%}
      All checks passed — password history remember is configured correctly
      {%- else -%}
      One or more checks failed — password history remember is not configured correctly
      {%- endif -%}

- name: "Store requirement 05 details"
  set_fact:
    task_05_name: "Req 05 - Summarize overall compliance"
    task_05_cmd: "N/A (set_fact evaluation)"
    task_05_rc: "-1"
    data_05: "N/A"
    status_05: "{{ overall_status }}"
    details_05: "{{ overall_details }}"

- name: "Req 06 - Store cis_result"
  set_fact:
    cis_result: "{{ overall_status }}"
    task_06_name: "Req 06 - Store cis_result"
    task_06_cmd: "set_fact"
    task_06_rc: "0"
    data_06: "cis_result = {{ overall_status }}"
    status_06: "PASS"
    details_06: "cis_result stored as {{ overall_status }}"

- name: "Generate audit report"
  debug:
    msg:
    - "AUDIT REPORT — CIS 5.3.3.3.1"
    - "Reference: CIS Benchmark checkpoint 5.3.3.3.1"
    - ""
    - "REQUIREMENT 01 - {{ req_01 }}:"
    - "  Task: {{ task_01_name | default('Not recorded') }}"
    - "  Command: {{ task_01_cmd | default('N/A') }}"
    - "  Exit code: {{ task_01_rc | default(-1) }}"
    - "  Data: {{ data_01 | default('') | trim }}"
    - "  Status: {{ status_01 | default('ERROR') | trim }}"
    - "  Details: {{ details_01 | default('') | trim }}"
    - ""
    - "REQUIREMENT 02 - {{ req_02 }}:"
    - "  Task: {{ task_02_name | default('Not recorded') }}"
    - "  Command: {{ task_02_cmd | default('N/A') }}"
    - "  Exit code: {{ task_02_rc | default(-1) }}"
    - "  Data: {{ data_02 | default('') | trim }}"
    - "  Status: {{ status_02 | default('ERROR') | trim }}"
    - "  Details: {{ details_02 | default('') | trim }}"
    - ""
    - "REQUIREMENT 03 - {{ req_03 }}:"
    - "  Task: {{ task_03_name | default('Not recorded') }}"
    - "  Command: {{ task_03_cmd | default('N/A') }}"
    - "  Exit code: {{ task_03_rc | default(-1) }}"
    - "  Data: {{ data_03 | default('') | trim }}"
    - "  Status: {{ status_03 | default('ERROR') | trim }}"
    - "  Details: {{ details_03 | default('') | trim }}"
    - ""
    - "REQUIREMENT 04 - {{ req_04 }}:"
    - "  Task: {{ task_04_name | default('Not recorded') }}"
    - "  Command: {{ task_04_cmd | default('N/A') }}"
    - "  Exit code: {{ task_04_rc | default(-1) }}"
    - "  Data: {{ data_04 | default('') | trim }}"
    - "  Status: {{ status_04 | default('ERROR') | trim }}"
    - "  Details: {{ details_04 | default('') | trim }}"
    - ""
    - "REQUIREMENT 05 - {{ req_05 }}:"
    - "  Task: {{ task_05_name | default('Not recorded') }}"
    - "  Command: {{ task_05_cmd | default('N/A') }}"
    - "  Exit code: {{ task_05_rc | default(-1) }}"
    - "  Data: {{ data_05 | default('') | trim }}"
    - "  Status: {{ status_05 | default('ERROR') | trim }}"
    - "  Details: {{ details_05 | default('') | trim }}"
    - ""
    - "REQUIREMENT 06 - {{ req_06 }}:"
    - "  Task: {{ task_06_name | default('Not recorded') }}"
    - "  Command: {{ task_06_cmd | default('N/A') }}"
    - "  Exit code: {{ task_06_rc | default(-1) }}"
    - "  Data: {{ data_06 | default('') | trim }}"
    - "  Status: {{ status_06 | default('ERROR') | trim }}"
    - "  Details: {{ details_06 | default('') | trim }}"
    - ""
    - "========================================================"
    - "OVERALL COMPLIANCE:"
    - "  Result: {{ cis_result | default('ERROR') | trim }}"
    - "  Details: {{ overall_details | default('Not evaluated') | trim }}"
    - "========================================================"
