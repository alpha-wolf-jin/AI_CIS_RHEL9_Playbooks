playbook_name: "cis_1_7_6"
backup_dir: "/var/log/ai-playbooks-backup/{{ playbook_name }}"
target_file: "/etc/issue.net"
req_01: "Apply ownership to /etc/issue.net using command: `chown root:root $(readlink -e /etc/issue.net)`. Expected result: The file /etc/issue.net is owned by root:root."
req_02: "Apply permissions to /etc/issue.net using command: `chmod u-x,go-wx $(readlink -e /etc/issue.net)`. Expected result: The file /etc/issue.net has permissions u-x,go-wx (e.g., 644 or similar, with execute removed for owner and write/execute removed for group and others)."
req_03: "Verify ownership and permissions using command: `stat -L -c '%a %U:%G' /etc/issue.net`. Expected result: Output shows permissions (e.g., 644) and owner:group as root:root."
req_04: "Store the final remediation result in a variable named 'cis_result' using set_fact. Set cis_result to the overall remediation status (PASS/FAIL/SKIP/ERROR) derived from the last requirement's status variable."
