---
- name: Initialize meta data variables
  include_vars: cis_remediation_var_5_1_11.yml

- name: "Snapshot - Create backup directory"
  ansible.builtin.file:
    path: "{{ backup_dir }}"
    state: directory
    mode: '0700'
  tags: [snapshot]
- name: "Snapshot - Check if config file exists"
  ansible.builtin.stat:
    path: "{{ config_file }}"
  register: _snap_config_stat
  tags: [snapshot]
- name: "Snapshot - Backup config file if exists"
  ansible.builtin.copy:
    src: "{{ config_file }}"
    dest: "{{ backup_dir }}/sshd_config.orig"
    remote_src: true
  when: _snap_config_stat.stat.exists | default(false)
  tags: [snapshot]

- name: "Initialize report variables"
  ansible.builtin.set_fact:
    task_01_name: "Not executed"
    task_01_cmd: "N/A"
    task_01_rc: -1
    data_01: "Not collected yet"
    status_01: "UNKNOWN"
    details_01: "Not evaluated"
    task_02_name: "Not executed"
    task_02_cmd: "N/A"
    task_02_rc: -1
    data_02: "Not collected yet"
    status_02: "UNKNOWN"
    details_02: "Not evaluated"
    task_03_name: "Not executed"
    task_03_cmd: "N/A"
    task_03_rc: -1
    data_03: "Not collected yet"
    status_03: "UNKNOWN"
    details_03: "Not evaluated"
    task_04_name: "Not executed"
    task_04_cmd: "N/A"
    task_04_rc: -1
    data_04: "Not collected yet"
    status_04: "UNKNOWN"
    details_04: "Not evaluated"
    task_05_name: "Not executed"
    task_05_cmd: "N/A"
    task_05_rc: -1
    data_05: "Not collected yet"
    status_05: "UNKNOWN"
    details_05: "Not evaluated"
    playbook_skipped: false
  tags: [always]
- block:
  - name: "Req 01 - Check if openssh-server is installed"
    ansible.builtin.package_facts:
      manager: auto
    failed_when: false
    tags: [execute]

  - name: "Req 01 - Set skip fact if openssh-server not installed"
    ansible.builtin.set_fact:
      playbook_skipped: "{{ 'openssh-server' not in ansible_facts.packages }}"
      status_01: "{{ 'SKIP' if 'openssh-server' not in ansible_facts.packages else 'APPLIED' }}"
      details_01: "{{ 'openssh-server is installed' if 'openssh-server' in ansible_facts.packages else 'openssh-server not installed - skipping remediation' }}"
      data_01: "{{ 'openssh-server found' if 'openssh-server' in ansible_facts.packages else 'openssh-server not found' }}"
      task_01_name: "Check openssh-server installation"
      task_01_cmd: "package_facts"
      task_01_rc: 0
    tags: [execute]

  - name: "Req 02 - Remove all existing GSSAPIAuthentication lines"
    ansible.builtin.lineinfile:
      path: "{{ config_file }}"
      regexp: '^GSSAPIAuthentication'
      state: absent
    register: result_02
    failed_when: false
    when: "not playbook_skipped | default(false)"
    tags: [execute]

  - name: "Req 02 - Store result"
    ansible.builtin.set_fact:
      task_02_name: "Remove all existing GSSAPIAuthentication lines"
      task_02_cmd: "lineinfile regexp=^GSSAPIAuthentication state=absent"
      task_02_rc: "{{ 0 if not playbook_skipped else -1 }}"
      data_02: "{{ 'lineinfile changed=' ~ (result_02.changed | default(false) | string) if not playbook_skipped else 'Skipped' }}"
      status_02: "{{ 'APPLIED' if not playbook_skipped else 'SKIP' }}"
      details_02: "{{ 'All existing GSSAPIAuthentication lines removed' if not playbook_skipped else 'Skipped - openssh-server not installed' }}"
    when: "not playbook_skipped | default(false)"
    tags: [execute]

  - name: "Req 03 - Insert GSSAPIAuthentication no before first Include or Match"
    ansible.builtin.lineinfile:
      path: "{{ config_file }}"
      line: "GSSAPIAuthentication {{ config_value }}"
      insertbefore: '^Include|^Match'
    register: result_03
    failed_when: false
    when: "not playbook_skipped | default(false)"
    tags: [execute]

  - name: "Req 03 - Store result"
    ansible.builtin.set_fact:
      task_03_name: "Insert GSSAPIAuthentication no before first Include/Match"
      task_03_cmd: "lineinfile line='GSSAPIAuthentication no' insertbefore='^Include|^Match'"
      task_03_rc: "{{ 0 if not playbook_skipped else -1 }}"
      data_03: "{{ 'lineinfile changed=' ~ (result_03.changed | default(false) | string) if not playbook_skipped else 'Skipped' }}"
      status_03: "{{ 'APPLIED' if not playbook_skipped else 'SKIP' }}"
      details_03: "{{ 'Line inserted before Include/Match' if not playbook_skipped else 'Skipped - openssh-server not installed' }}"
    when: "not playbook_skipped | default(false)"
    tags: [execute]

  - name: "Req 04 - Restart sshd service"
    ansible.builtin.service:
      name: "{{ service_name }}"
      state: restarted
    register: result_04
    failed_when: false
    when: "not playbook_skipped | default(false)"
    tags: [execute]

  - name: "Req 04 - Store result"
    ansible.builtin.set_fact:
      task_04_name: "Restart sshd service"
      task_04_cmd: "systemctl restart sshd"
      task_04_rc: "{{ 0 if result_04 is not skipped else -1 }}"
      data_04: "{{ 'sshd restarted' if result_04 is not skipped and result_04.state | default('') == 'started' else 'Skipped' }}"
      status_04: "{{ 'APPLIED' if result_04 is not skipped and result_04.state | default('') == 'started' else 'FAILED' if result_04 is not skipped else 'SKIP' }}"
      details_04: "{{ 'Service restarted successfully' if result_04 is not skipped and result_04.state | default('') == 'started' else 'Service restart failed' if result_04 is not skipped else 'Skipped - openssh-server not installed' }}"
    when: "not playbook_skipped | default(false)"
    tags: [execute]

  - name: "Req 05 - Verify GSSAPIAuthentication is disabled"
    ansible.builtin.shell: "sshd -T | grep -i gssapiauthentication"
    args:
      executable: /bin/bash
    register: result_05
    failed_when: false
    changed_when: false
    when: "not playbook_skipped | default(false)"
    tags: [execute]

  - name: "Req 05 - Store result"
    ansible.builtin.set_fact:
      task_05_name: "Verify GSSAPIAuthentication disabled"
      task_05_cmd: "sshd -T | grep -i gssapiauthentication"
      task_05_rc: "{{ result_05.rc | default(-1) }}"
      data_05: "{{ result_05.stdout | default('') | trim }}"
      status_05: "{{ 'APPLIED' if (result_05.stdout | default('') | trim | lower) == 'gssapiauthentication no' else 'FAILED' if result_05 is not skipped else 'SKIP' }}"
      details_05: "{{ 'Verification passed - GSSAPIAuthentication is no' if (result_05.stdout | default('') | trim | lower) == 'gssapiauthentication no' else 'Verification failed - unexpected output: ' ~ (result_05.stdout | default('') | trim) if result_05 is not skipped else 'Skipped - openssh-server not installed' }}"
    when: "not playbook_skipped | default(false)"
    tags: [execute]

# FIX: Map requirement 5 status to PASS/FAIL/SKIP/ERROR as required
  - name: "Store overall remediation result"
    ansible.builtin.set_fact:
      cis_result: >-
        {%- if status_05 == 'APPLIED' -%}PASS
        {%- elif status_05 == 'FAILED' -%}FAIL
        {%- elif status_05 == 'SKIP' -%}SKIP
        {%- else -%}ERROR
        {%- endif -%}
    tags: [execute]

  - name: "Generate remediation report"
    ansible.builtin.debug:
      msg:
      - "========================================================"
      - "REMEDIATION REPORT — CIS 5.1.11"
      - "Reference: CIS Benchmark checkpoint 5.1.11"
      - "========================================================"
      - ""
      - "REQUIREMENT 01 - {{ req_01 }}:"
      - "  Task: {{ task_01_name | default('Task not recorded') }}"
      - "  Command: {{ task_01_cmd | default('N/A') }}"
      - "  Exit code: {{ task_01_rc | default(-1) }}"
      - "  Data: {{ data_01 | default('') | trim }}"
      - "  Status: {{ status_01 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_01 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 02 - {{ req_02 }}:"
      - "  Task: {{ task_02_name | default('Task not recorded') }}"
      - "  Command: {{ task_02_cmd | default('N/A') }}"
      - "  Exit code: {{ task_02_rc | default(-1) }}"
      - "  Data: {{ data_02 | default('') | trim }}"
      - "  Status: {{ status_02 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_02 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 03 - {{ req_03 }}:"
      - "  Task: {{ task_03_name | default('Task not recorded') }}"
      - "  Command: {{ task_03_cmd | default('N/A') }}"
      - "  Exit code: {{ task_03_rc | default(-1) }}"
      - "  Data: {{ data_03 | default('') | trim }}"
      - "  Status: {{ status_03 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_03 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 04 - {{ req_04 }}:"
      - "  Task: {{ task_04_name | default('Task not recorded') }}"
      - "  Command: {{ task_04_cmd | default('N/A') }}"
      - "  Exit code: {{ task_04_rc | default(-1) }}"
      - "  Data: {{ data_04 | default('') | trim }}"
      - "  Status: {{ status_04 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_04 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 05 - {{ req_05 }}:"
      - "  Task: {{ task_05_name | default('Task not recorded') }}"
      - "  Command: {{ task_05_cmd | default('N/A') }}"
      - "  Exit code: {{ task_05_rc | default(-1) }}"
      - "  Data: {{ data_05 | default('') | trim }}"
      - "  Status: {{ status_05 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_05 | default('Not evaluated') | trim }}"
      - ""
      - "========================================================"
      - "OVERALL REMEDIATION:"
      - "  Result: {{ cis_result | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_05 | default('Not evaluated') | trim }}"
      - "========================================================"
    tags: [execute]

  always:
  - name: "Restore - Check if backup exists"
    ansible.builtin.stat:
      path: "{{ backup_dir }}/sshd_config.orig"
    register: _restore_stat
    failed_when: false
    tags: [restore]

  - name: "Restore - Overwrite with original"
    ansible.builtin.copy:
      src: "{{ backup_dir }}/sshd_config.orig"
      dest: "{{ config_file }}"
      remote_src: true
    when: _restore_stat.stat.exists | default(false)
    failed_when: false
    tags: [restore]

  - name: "Restore - Remove backup directory"
    ansible.builtin.file:
      path: "{{ backup_dir }}"
      state: absent
    failed_when: false
    tags: [restore]
