playbook_name: "cis_1_6_4"
backup_dir: "/var/log/ai-playbooks-backup/{{ playbook_name }}"
req_01: "Apply prerequisite check for crypto-policies package using command: `rpm -q crypto-policies`. Expected result: package is installed."
req_02: |
  Apply creation of subpolicy file to disable weak MACs using command: `printf '%s\n' \"# This is a subpolicy to disable weak macs\" \"mac = -*-64\" >> /etc/crypto-policies/policies/modules/NO-WEAKMAC.pmod`. Expected result: file /etc/crypto-policies/policies/modules/NO-WEAKMAC.pmod is created with the specified content.
req_03: "Apply update of system-wide cryptographic policy to include the NO-WEAKMAC subpolicy using command: `update-crypto-policies --set DEFAULT:NO-SHA1:NO-WEAKMAC`. Expected result: system-wide crypto policy is updated to include the NO-WEAKMAC subpolicy."
req_04: "Apply reboot to make cryptographic settings effective using command: `reboot`. Expected result: system reboots and cryptographic settings are applied to running services."
req_05: "Verify that weak MACs are disabled using command: `update-crypto-policies --show`. Expected result: output includes 'NO-WEAKMAC' in the active policy list."
