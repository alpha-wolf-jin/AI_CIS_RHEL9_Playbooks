playbook_name: "cis_remediation_1_6_4"
backup_dir: "/var/log/ai-playbooks-backup/{{ playbook_name }}"
req_01: "Apply prerequisite check for crypto-policies package using command: `rpm -q crypto-policies`. Expected result: package is installed."
req_02: |
  Create or edit subpolicy file to disable weak MACs using command: `printf '%s\\n' '# This is a subpolicy to disable weak macs' 'mac = -*-64' >> /etc/crypto-policies/policies/modules/NO-WEAKMAC.pmod`. Expected result: file created with content disabling weak MACs.
req_03: "Apply the system-wide crypto policy with the NO-WEAKMAC subpolicy using command: `update-crypto-policies --set DEFAULT:NO-WEAKMAC`. Expected result: policy updated successfully."
req_04: "Reboot the system to apply cryptographic settings using command: `reboot`. Expected result: system restarts and settings take effect."
req_05: "Verify that weak MACs are disabled using command: `update-crypto-policies --show`. Expected result: output includes 'NO-WEAKMAC' in the active policy."
req_06: "Store the final remediation result in a variable named 'cis_result' using set_fact. Set cis_result to the overall remediation status (PASS/FAIL/SKIP/ERROR) derived from the last requirement's status variable."
policy_file: "/etc/crypto-policies/state/CURRENT.pol"
subpolicy_file: "/etc/crypto-policies/policies/modules/NO-WEAKMAC.pmod"
