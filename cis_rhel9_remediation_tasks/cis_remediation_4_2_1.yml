---
- name: Initialize meta data variables
  include_vars: cis_remediation_var_4_2_1.yml

- name: "Snapshot - Create backup directory"
  ansible.builtin.file:
    path: "{{ backup_dir }}"
    state: directory
    mode: '0755'
  tags: [snapshot]
- name: "Snapshot - Check if firewalld configuration directory exists"
  ansible.builtin.stat:
    path: "/etc/firewalld"
  register: _snap_fw_conf_stat
  tags: [snapshot]
- name: "Snapshot - Check if firewall backup already exists"
  ansible.builtin.stat:
    path: "{{ backup_dir }}/firewalld-backup"
  register: _snap_backup_stat
  tags: [snapshot]
- name: "Snapshot - Backup firewalld configuration to backup directory"
  ansible.builtin.copy:
    src: "/etc/firewalld"
    dest: "{{ backup_dir }}/firewalld-backup"
    remote_src: true
    force: false
  when:
  - _snap_fw_conf_stat.stat.exists | default(false)
  - not (_snap_backup_stat.stat.exists | default(false))
  failed_when: false
  tags: [snapshot]
- name: "Snapshot - Save current firewall configuration listing (runtime)"
  ansible.builtin.shell: firewall-cmd --list-all > "{{ backup_dir }}/firewall-runtime.txt"
  args:
    executable: /bin/bash
    creates: "{{ backup_dir }}/firewall-runtime.txt"
  failed_when: false
  tags: [snapshot]
- name: "Snapshot - Save current firewall configuration listing (permanent)"
  ansible.builtin.shell: firewall-cmd --list-all --permanent > "{{ backup_dir }}/firewall-permanent.txt"
  args:
    executable: /bin/bash
    creates: "{{ backup_dir }}/firewall-permanent.txt"
  failed_when: false
  tags: [snapshot]

- block:
  - name: "Initialize data variables"
    set_fact:
      data_01: "Not collected yet"
      status_01: "UNKNOWN"
      details_01: "Not evaluated"
      data_02: "Not collected yet"
      status_02: "UNKNOWN"
      details_02: "Not evaluated"
      data_03: "Not collected yet"
      status_03: "UNKNOWN"
      details_03: "Not evaluated"
      data_04: "Not collected yet"
      status_04: "UNKNOWN"
      details_04: "Not evaluated"
      data_05: "Not collected yet"
      status_05: "UNKNOWN"
      details_05: "Not evaluated"
    tags: [execute]

  - name: "Req 8 - Gather package facts"
    ansible.builtin.package_facts:
      manager: auto
    tags: [execute]
    failed_when: false

  - name: "Req 8 - Set skip fact if firewalld not installed"
    set_fact:
      firewalld_installed: "{{ 'firewalld' in ansible_facts.packages }}"
      skip_remediation: "{{ not ('firewalld' in ansible_facts.packages) }}"
    when: ansible_facts.packages is defined
    tags: [execute]

  - name: "Req 1 - Check if firewalld is active"
    shell: systemctl is-active firewalld
    args:
      executable: /bin/bash
    register: result_01
    failed_when: false
    when: not skip_remediation | default(false)
    tags: [execute]

  - name: "Store requirement 01 details"
    set_fact:
      task_01_name: "Check firewalld active"
      task_01_cmd: "systemctl is-active firewalld"
      task_01_rc: "{{ result_01.rc | default(-1) }}"
      data_01: "{{ result_01.stdout | default('') | trim }}"
      status_01: "{{ 'APPLIED' if result_01.rc | default(-1) == 0 and 'active' in result_01.stdout | default('') else 'FAILED' }}"
      details_01: "{{ 'Firewalld is active' if result_01.rc | default(-1) == 0 and 'active' in result_01.stdout | default('') else 'Firewalld is not active' }}"
      firewalld_active: "{{ result_01.rc | default(-1) == 0 and 'active' in result_01.stdout | default('') }}"
    when: not skip_remediation | default(false)
    tags: [execute]

  - name: "Store requirement 01 details (skipped)"
    set_fact:
      task_01_name: "Check firewalld active"
      task_01_cmd: "systemctl is-active firewalld"
      task_01_rc: -1
      data_01: "N/A"
      status_01: "SKIP"
      details_01: "Firewalld package not installed"
      firewalld_active: false
    when: skip_remediation | default(false)
    tags: [execute]

  - name: "Req 2 - Remove unnecessary service"
    shell: firewall-cmd --remove-service={{ unnecessary_service }}
    args:
      executable: /bin/bash
    register: result_02
    failed_when: false
    when: not skip_remediation | default(false) and firewalld_active | default(false)
    tags: [execute]

  - name: "Store requirement 02 details"
    set_fact:
      task_02_name: "Remove unnecessary service"
      task_02_cmd: "firewall-cmd --remove-service={{ unnecessary_service }}"
      task_02_rc: "{{ result_02.rc | default(-1) }}"
      data_02: "{{ result_02.stdout | default('') | trim }}"
      status_02: "{{ 'APPLIED' if result_02.rc | default(-1) == 0 else 'FAILED' }}"
      details_02: "{{ 'Success' if result_02.rc | default(-1) == 0 else 'Failed' }}"
    when: not skip_remediation | default(false) and firewalld_active | default(false)
    tags: [execute]

  - name: "Store requirement 02 details (skipped)"
    set_fact:
      task_02_name: "Remove unnecessary service"
      task_02_cmd: "firewall-cmd --remove-service={{ unnecessary_service }}"
      task_02_rc: -1
      data_02: "N/A"
      status_02: "SKIP"
      details_02: "Firewalld not available or not active"
    when: skip_remediation | default(false) or not firewalld_active | default(false)
    tags: [execute]

  - name: "Req 3 - Remove unnecessary port"
    shell: firewall-cmd --remove-port={{ unnecessary_port }}
    args:
      executable: /bin/bash
    register: result_03
    failed_when: false
    when: not skip_remediation | default(false) and firewalld_active | default(false)
    tags: [execute]

  - name: "Store requirement 03 details"
    set_fact:
      task_03_name: "Remove unnecessary port"
      task_03_cmd: "firewall-cmd --remove-port={{ unnecessary_port }}"
      task_03_rc: "{{ result_03.rc | default(-1) }}"
      data_03: "{{ result_03.stdout | default('') | trim }}"
      status_03: "{{ 'APPLIED' if result_03.rc | default(-1) == 0 else 'FAILED' }}"
      details_03: "{{ 'Success' if result_03.rc | default(-1) == 0 else 'Failed' }}"
    when: not skip_remediation | default(false) and firewalld_active | default(false)
    tags: [execute]

  - name: "Store requirement 03 details (skipped)"
    set_fact:
      task_03_name: "Remove unnecessary port"
      task_03_cmd: "firewall-cmd --remove-port={{ unnecessary_port }}"
      task_03_rc: -1
      data_03: "N/A"
      status_03: "SKIP"
      details_03: "Firewalld not available or not active"
    when: skip_remediation | default(false) or not firewalld_active | default(false)
    tags: [execute]

  - name: "Req 4 - Make settings persistent"
    shell: firewall-cmd --runtime-to-permanent
    args:
      executable: /bin/bash
    register: result_04
    failed_when: false
    when: not skip_remediation | default(false) and firewalld_active | default(false)
    tags: [execute]

  - name: "Store requirement 04 details"
    set_fact:
      task_04_name: "Make settings persistent"
      task_04_cmd: "firewall-cmd --runtime-to-permanent"
      task_04_rc: "{{ result_04.rc | default(-1) }}"
      data_04: "{{ result_04.stdout | default('') | trim }}"
      status_04: "{{ 'APPLIED' if result_04.rc | default(-1) == 0 else 'FAILED' }}"
      details_04: "{{ 'Success' if result_04.rc | default(-1) == 0 else 'Failed' }}"
    when: not skip_remediation | default(false) and firewalld_active | default(false)
    tags: [execute]

  - name: "Store requirement 04 details (skipped)"
    set_fact:
      task_04_name: "Make settings persistent"
      task_04_cmd: "firewall-cmd --runtime-to-permanent"
      task_04_rc: -1
      data_04: "N/A"
      status_04: "SKIP"
      details_04: "Firewalld not available or not active"
    when: skip_remediation | default(false) or not firewalld_active | default(false)
    tags: [execute]

  - name: "Req 5 - Verify dropped services and ports"
    shell: firewall-cmd --list-all
    args:
      executable: /bin/bash
    register: result_05
    failed_when: false
    when: not skip_remediation | default(false) and firewalld_active | default(false)
    tags: [execute]

  - name: "Store requirement 05 details"
    set_fact:
      task_05_name: "Verify dropped services and ports"
      task_05_cmd: "firewall-cmd --list-all"
      task_05_rc: "{{ result_05.rc | default(-1) }}"
      data_05: "{{ result_05.stdout | default('') | trim }}"
      status_05: "{{ 'APPLIED' if result_05.rc | default(-1) == 0 else 'FAILED' }}"
      details_05: "{{ 'Success' if result_05.rc | default(-1) == 0 else 'Failed' }}"
    when: not skip_remediation | default(false) and firewalld_active | default(false)
    tags: [execute]

  - name: "Store requirement 05 details (skipped)"
    set_fact:
      task_05_name: "Verify dropped services and ports"
      task_05_cmd: "firewall-cmd --list-all"
      task_05_rc: -1
      data_05: "N/A"
      status_05: "SKIP"
      details_05: "Firewalld not available or not active"
    when: skip_remediation | default(false) or not firewalld_active | default(false)
    tags: [execute]

  - name: "Generate remediation report"
    debug:
      msg:
      - "========================================================"
      - "        REMEDIATION REPORT — CIS 4.2.1"
      - "Reference: CIS Benchmark checkpoint 4.2.1"
      - "========================================================"
      - ""
      - "REQUIREMENT 01 - {{ req_01 }}:"
      - "  Task: {{ task_01_name | default('Not recorded') }}"
      - "  Command: {{ task_01_cmd | default('N/A') }}"
      - "  Exit code: {{ task_01_rc | default(-1) }}"
      - "  Data: {{ data_01 | default('N/A') | trim }}"
      - "  Status: {{ status_01 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_01 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 02 - {{ req_02 }}:"
      - "  Task: {{ task_02_name | default('Not recorded') }}"
      - "  Command: {{ task_02_cmd | default('N/A') }}"
      - "  Exit code: {{ task_02_rc | default(-1) }}"
      - "  Data: {{ data_02 | default('N/A') | trim }}"
      - "  Status: {{ status_02 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_02 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 03 - {{ req_03 }}:"
      - "  Task: {{ task_03_name | default('Not recorded') }}"
      - "  Command: {{ task_03_cmd | default('N/A') }}"
      - "  Exit code: {{ task_03_rc | default(-1) }}"
      - "  Data: {{ data_03 | default('N/A') | trim }}"
      - "  Status: {{ status_03 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_03 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 04 - {{ req_04 }}:"
      - "  Task: {{ task_04_name | default('Not recorded') }}"
      - "  Command: {{ task_04_cmd | default('N/A') }}"
      - "  Exit code: {{ task_04_rc | default(-1) }}"
      - "  Data: {{ data_04 | default('N/A') | trim }}"
      - "  Status: {{ status_04 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_04 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 05 - {{ req_05 }}:"
      - "  Task: {{ task_05_name | default('Not recorded') }}"
      - "  Command: {{ task_05_cmd | default('N/A') }}"
      - "  Exit code: {{ task_05_rc | default(-1) }}"
      - "  Data: {{ data_05 | default('N/A') | trim }}"
      - "  Status: {{ status_05 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_05 | default('Not evaluated') | trim }}"
      - ""
      - "========================================================"
      - "OVERALL REMEDIATION:"
      - "  Result: {{ status_05 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_05 | default('Not evaluated') | trim }}"
      - "========================================================"
    tags: [execute]

  always:
  - name: "Restore - Check if firewall configuration backup exists"
    ansible.builtin.stat:
      path: "{{ backup_dir }}/firewalld-backup"
    register: _restore_fw_backup_stat
    failed_when: false
    tags: [restore]

  - name: "Restore - Restore firewall configuration from backup"
    ansible.builtin.copy:
      src: "{{ backup_dir }}/firewalld-backup"
      dest: "/etc/firewalld"
      remote_src: true
    when: _restore_fw_backup_stat.stat.exists | default(false)
    failed_when: false
    tags: [restore]

  - name: "Restore - Restart firewalld to apply restored configuration"
    ansible.builtin.systemd:
      name: firewalld
      state: restarted
    when: _restore_fw_backup_stat.stat.exists | default(false)
    failed_when: false
    tags: [restore]

  - name: "Restore - Remove backup directory"
    ansible.builtin.file:
      path: "{{ backup_dir }}"
      state: absent
    failed_when: false
    tags: [restore]
