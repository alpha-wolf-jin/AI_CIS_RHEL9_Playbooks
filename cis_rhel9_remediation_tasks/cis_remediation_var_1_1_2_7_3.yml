playbook_name: "cis_1_1_2_7_3_remediation"
checkpoint_id: "cis_1_1_2_7_3"
state_guard_dir: "/usr/local/bin/cis/.cis_state_guard/{{ checkpoint_id }}"
state_guard_flag: "{{ state_guard_dir }}/checkpoint.flag"
mount_point: "/var/log/audit"
fstab_file: "/etc/fstab"
req_01: "Apply the nosuid mount option to the /var/log/audit partition by editing /etc/fstab and adding nosuid to the fourth field for the /var/log/audit entry. Expected result: The /etc/fstab file contains nosuid in the options for /var/log/audit."
req_02: "Remount the /var/log/audit partition with the updated options using command: `mount -o remount /var/log/audit`. Expected result: The /var/log/audit partition is remounted with the nosuid option."
req_03: "Verify the nosuid option is active on the /var/log/audit partition using command: `mount | grep /var/log/audit`. Expected result: The output includes 'nosuid' in the mount options for /var/log/audit."
req_04: "Store the final remediation result in a variable named 'cis_result' using set_fact. Set cis_result to the overall remediation status (PASS/FAIL/SKIP/ERROR) derived from the last requirement's status variable."
