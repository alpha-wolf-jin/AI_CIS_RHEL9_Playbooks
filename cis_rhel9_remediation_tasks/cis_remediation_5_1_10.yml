---
- name: Initialize meta data variables
  include_vars: cis_remediation_var_5_1_10.yml

- name: "Snapshot - Create backup directory"
  ansible.builtin.file:
    path: "{{ backup_dir }}"
    state: directory
    mode: '0700'
  tags: [snapshot]
- name: "Snapshot - Check if sshd_config exists"
  ansible.builtin.stat:
    path: "{{ config_file }}"
  register: _snap_config_stat
  tags: [snapshot]
- name: "Snapshot - Check if backup already exists"
  ansible.builtin.stat:
    path: "{{ backup_dir }}/sshd_config.orig"
  register: _snap_backup_exists
  tags: [snapshot]
- name: "Snapshot - Backup sshd_config if exists"
  ansible.builtin.copy:
    src: "{{ config_file }}"
    dest: "{{ backup_dir }}/sshd_config.orig"
    remote_src: true
  when:
  - "_snap_config_stat.stat.exists | default(false)"
  - "not (_snap_backup_exists.stat.exists | default(false))"
  failed_when: false
  tags: [snapshot]

- block:
  - name: "Req 01 - Check if openssh-server is installed"
    ansible.builtin.package_facts:
      manager: auto
    failed_when: false
    tags: [execute]

  - name: "Store requirement 01 details"
    ansible.builtin.set_fact:
      task_01_name: "Check if openssh-server is installed"
      task_01_cmd: "package_facts: manager=auto"
      task_01_rc: 0
      data_01: "{{ 'installed' if package_name in ansible_facts.packages else 'not_installed' }}"
      status_01: "{{ 'SKIP' if package_name not in ansible_facts.packages else 'PASS' }}"
      details_01: "{{ 'openssh-server is installed' if package_name in ansible_facts.packages else 'openssh-server is NOT installed - skipping remediation' }}"
      playbook_skipped: "{{ package_name not in ansible_facts.packages }}"
    tags: [execute]

  - name: "Req 02 - Backup sshd_config"
    ansible.builtin.copy:
      src: "{{ config_file }}"
      dest: "{{ config_file }}.bak"
      remote_src: true
    register: result_02
    failed_when: false
    when: "not (playbook_skipped | default(false) | bool)"
    tags: [execute]

  - name: "Store requirement 02 details"
    ansible.builtin.set_fact:
      task_02_name: "Backup sshd_config"
      task_02_cmd: "cp {{ config_file }} {{ config_file }}.bak"
      task_02_rc: "{{ result_02.rc | default(-1) if result_02 is defined else -1 }}"
      data_02: >-
        {{ 'backup exists (created or already present)' if (result_02 is defined and not result_02.failed | default(true))
           else ('backup skipped' if (playbook_skipped | default(false) | bool) else 'backup failed') }}
      status_02: "{{ 'SKIP' if (playbook_skipped | default(false) | bool) else ('PASS' if (result_02 is defined and not result_02.failed | default(true)) else 'FAIL') }}"
      details_02: >-
        {{ 'Backup file exists at ' + config_file + '.bak' if (result_02 is defined and not result_02.failed | default(true))
           else ('Skipped - openssh-server not installed' if (playbook_skipped | default(false) | bool)
           else 'Failed to create backup') }}
    tags: [execute]

  - name: "Req 03 - Insert DisableForwarding yes before Include entries"
    ansible.builtin.lineinfile:
      path: "{{ config_file }}"
      regexp: '^DisableForwarding yes'
      line: 'DisableForwarding yes'
      insertbefore: '^Include'
      state: present
    register: result_03
    failed_when: false
    when: "not (playbook_skipped | default(false) | bool)"
    tags: [execute]

  - name: "Store requirement 03 details"
    ansible.builtin.set_fact:
      task_03_name: "Insert DisableForwarding yes before Include entries"
      task_03_cmd: "lineinfile: insert DisableForwarding yes before ^Include in {{ config_file }}"
      task_03_rc: "{{ result_03.rc | default(0) if result_03 is defined else -1 }}"
      data_03: "{{ 'DisableForwarding yes inserted' if (result_03.changed | default(false)) else ('already present' if (result_03 is defined and not result_03.failed | default(true)) else 'not executed') }}"
      status_03: "{{ 'SKIP' if (playbook_skipped | default(false) | bool) else ('PASS' if (result_03 is defined and not result_03.failed | default(true)) else 'FAIL') }}"
      details_03: "{{ 'DisableForwarding yes added before Include entries' if (result_03.changed | default(false)) else ('DisableForwarding yes already present' if (result_03 is defined and not result_03.failed | default(true)) else ('Skipped - openssh-server not installed' if (playbook_skipped | default(false) | bool) else 'Failed to insert directive')) }}"
    tags: [execute]

  - name: "Req 04 - Remove conflicting DisableForwarding no entries"
    ansible.builtin.lineinfile:
      path: "{{ config_file }}"
      regexp: '^DisableForwarding no'
      state: absent
    register: result_04
    failed_when: false
    when: "not (playbook_skipped | default(false) | bool)"
    tags: [execute]

  - name: "Store requirement 04 details"
    ansible.builtin.set_fact:
      task_04_name: "Remove conflicting DisableForwarding no entries"
      task_04_cmd: "lineinfile: remove ^DisableForwarding no from {{ config_file }}"
      task_04_rc: "{{ result_04.rc | default(0) if result_04 is defined else -1 }}"
      data_04: "{{ 'conflicting entries removed' if (result_04.changed | default(false)) else ('no conflicting entries found' if (result_04 is defined and not result_04.failed | default(true)) else 'not executed') }}"
      status_04: "{{ 'SKIP' if (playbook_skipped | default(false) | bool) else ('PASS' if (result_04 is defined and not result_04.failed | default(true)) else 'FAIL') }}"
      details_04: "{{ 'Conflicting DisableForwarding no entries removed' if (result_04.changed | default(false)) else ('No conflicting entries to remove' if (result_04 is defined and not result_04.failed | default(true)) else ('Skipped - openssh-server not installed' if (playbook_skipped | default(false) | bool) else 'Failed to remove entries')) }}"
    tags: [execute]

  - name: "Req 05 - Restart sshd service"
    ansible.builtin.service:
      name: "{{ service_name }}"
      state: restarted
    register: result_05
    failed_when: false
    when: "not (playbook_skipped | default(false) | bool)"
    tags: [execute]

  - name: "Store requirement 05 details"
    ansible.builtin.set_fact:
      task_05_name: "Restart sshd service"
      task_05_cmd: "systemctl restart {{ service_name }}"
      task_05_rc: "{{ result_05.rc | default(0) if result_05 is defined else -1 }}"
      data_05: "{{ 'sshd restarted' if (result_05.state | default('') == 'started') else ('not executed' if (playbook_skipped | default(false) | bool) else 'restart failed') }}"
      status_05: "{{ 'SKIP' if (playbook_skipped | default(false) | bool) else ('PASS' if (result_05 is defined and not result_05.failed | default(true)) else 'FAIL') }}"
      details_05: "{{ 'sshd service restarted successfully' if (result_05 is defined and not result_05.failed | default(true)) else ('Skipped - openssh-server not installed' if (playbook_skipped | default(false) | bool) else 'Failed to restart sshd') }}"
    tags: [execute]

  - name: "Req 06 - Verify DisableForwarding is enabled"
    ansible.builtin.shell: "sshd -T | grep -i disableforwarding"
    args:
      executable: /bin/bash
    register: result_06
    failed_when: false
    changed_when: false
    when: "not (playbook_skipped | default(false) | bool)"
    tags: [execute]

  - name: "Store requirement 06 details"
    ansible.builtin.set_fact:
      task_06_name: "Verify DisableForwarding is enabled"
      task_06_cmd: "sshd -T | grep -i disableforwarding"
      task_06_rc: "{{ result_06.rc | default(-1) if result_06 is defined else -1 }}"
      data_06: "{{ result_06.stdout | default('') | trim if result_06 is defined else 'not executed' }}"
      status_06: "{{ 'SKIP' if (playbook_skipped | default(false) | bool) else ('PASS' if (result_06 is defined and result_06.rc | default(-1) == 0 and 'disableforwarding yes' in (result_06.stdout | default('') | lower)) else 'FAIL') }}"
      details_06: "{{ 'DisableForwarding is enabled (yes)' if (result_06 is defined and result_06.rc | default(-1) == 0 and 'disableforwarding yes' in (result_06.stdout | default('') | lower)) else ('DisableForwarding is NOT enabled' if (result_06 is defined and result_06.rc | default(-1) == 0) else ('Skipped - openssh-server not installed' if (playbook_skipped | default(false) | bool) else 'Verification failed')) }}"
    tags: [execute]

  - name: "Req 07 - Store final remediation result (aggregated)"
    ansible.builtin.set_fact:
      cis_result: >-
        {{ 'SKIP' if (playbook_skipped | default(false) | bool) else
           'FAIL' if ('FAIL' in [status_01, status_02, status_03, status_04, status_05, status_06] | map('default','ERROR')) else
           'ERROR' if ('ERROR' in [status_01, status_02, status_03, status_04, status_05, status_06] | map('default','ERROR')) else
           'PASS' }}
    tags: [execute]

  - name: "Store requirement 07 details"
    ansible.builtin.set_fact:
      task_07_name: "Store final remediation result (aggregated)"
      task_07_cmd: "set_fact: cis_result = aggregation of all statuses"
      task_07_rc: 0
      data_07: "{{ cis_result }}"
      status_07: "{{ 'PASS' if cis_result in ['PASS','FAIL','SKIP','ERROR'] else 'ERROR' }}"
      details_07: "Overall remediation status: {{ cis_result }}"
    tags: [execute]

  - name: "Generate remediation report"
    ansible.builtin.debug:
      msg:
      - "========================================================"
      - "        REMEDIATION REPORT — CIS 5.1.10"
      - "========================================================"
      - "Reference: CIS Benchmark checkpoint 5.1.10"
      - ""
      - "REQUIREMENT 01 - {{ req_01 }}:"
      - "  Task: {{ task_01_name | default('Task not recorded') }}"
      - "  Command: {{ task_01_cmd | default('N/A') }}"
      - "  Exit code: {{ task_01_rc | default(-1) }}"
      - "  Data: {{ data_01 | default('') | trim }}"
      - "  Status: {{ status_01 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_01 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 02 - {{ req_02 }}:"
      - "  Task: {{ task_02_name | default('Task not recorded') }}"
      - "  Command: {{ task_02_cmd | default('N/A') }}"
      - "  Exit code: {{ task_02_rc | default(-1) }}"
      - "  Data: {{ data_02 | default('') | trim }}"
      - "  Status: {{ status_02 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_02 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 03 - {{ req_03 }}:"
      - "  Task: {{ task_03_name | default('Task not recorded') }}"
      - "  Command: {{ task_03_cmd | default('N/A') }}"
      - "  Exit code: {{ task_03_rc | default(-1) }}"
      - "  Data: {{ data_03 | default('') | trim }}"
      - "  Status: {{ status_03 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_03 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 04 - {{ req_04 }}:"
      - "  Task: {{ task_04_name | default('Task not recorded') }}"
      - "  Command: {{ task_04_cmd | default('N/A') }}"
      - "  Exit code: {{ task_04_rc | default(-1) }}"
      - "  Data: {{ data_04 | default('') | trim }}"
      - "  Status: {{ status_04 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_04 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 05 - {{ req_05 }}:"
      - "  Task: {{ task_05_name | default('Task not recorded') }}"
      - "  Command: {{ task_05_cmd | default('N/A') }}"
      - "  Exit code: {{ task_05_rc | default(-1) }}"
      - "  Data: {{ data_05 | default('') | trim }}"
      - "  Status: {{ status_05 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_05 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 06 - {{ req_06 }}:"
      - "  Task: {{ task_06_name | default('Task not recorded') }}"
      - "  Command: {{ task_06_cmd | default('N/A') }}"
      - "  Exit code: {{ task_06_rc | default(-1) }}"
      - "  Data: {{ data_06 | default('') | trim }}"
      - "  Status: {{ status_06 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_06 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 07 - {{ req_07 }}:"
      - "  Task: {{ task_07_name | default('Task not recorded') }}"
      - "  Command: {{ task_07_cmd | default('N/A') }}"
      - "  Exit code: {{ task_07_rc | default(-1) }}"
      - "  Data: {{ data_07 | default('') | trim }}"
      - "  Status: {{ status_07 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_07 | default('Not evaluated') | trim }}"
      - ""
      - "========================================================"
      - "OVERALL REMEDIATION:"
      - "  Result: {{ cis_result | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_06 | default('Not evaluated') | trim }}"
      - "========================================================"
    tags: [execute]

  always:
  - name: "Restore - Check if sshd_config snapshot backup exists"
    ansible.builtin.stat:
      path: "{{ backup_dir }}/sshd_config.orig"
    register: _restore_config_check
    failed_when: false
    tags: [restore]

  - name: "Restore - Restore original sshd_config from snapshot"
    ansible.builtin.copy:
      src: "{{ backup_dir }}/sshd_config.orig"
      dest: "{{ config_file }}"
      remote_src: true
    when:
    - _restore_config_check.stat.exists | default(false)
    failed_when: false
    tags: [restore]

  - name: "Restore - Remove sshd_config.bak created during remediation"
    ansible.builtin.file:
      path: "{{ config_file }}.bak"
      state: absent
    failed_when: false
    tags: [restore]

  - name: "Restore - Restart sshd to apply original configuration"
    ansible.builtin.service:
      name: "{{ service_name }}"
      state: restarted
    when:
    - _restore_config_check.stat.exists | default(false)
    failed_when: false
    tags: [restore]

  - name: "Restore - Remove backup directory"
    ansible.builtin.file:
      path: "{{ backup_dir }}"
      state: absent
    failed_when: false
    tags: [restore]
