req_01: "Apply stop squid.service using command: `systemctl stop squid.service`. Expected result: The squid service is stopped."
req_02: "Apply remove squid package using command: `dnf remove squid`. Expected result: The squid package is removed."
req_03: "Apply mask squid.service using command: `systemctl mask squid.service`. Expected result: The squid service is masked and cannot be started."
req_04: "Verify squid service is not active using command: `systemctl is-active squid.service`. Expected result: inactive"
req_05: "Verify squid package is not installed using command: `rpm -q squid`. Expected result: package squid is not installed"
req_06: "Store the final remediation result in a variable named 'cis_result' using set_fact. Set cis_result to the overall remediation status (PASS/FAIL/SKIP/ERROR) derived from the last requirement's status variable."
