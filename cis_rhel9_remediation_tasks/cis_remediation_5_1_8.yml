---
- name: Initialize meta data variables
  include_vars: cis_remediation_var_5_1_8.yml

- name: "Snapshot - Create backup directory"
  ansible.builtin.file:
    path: "{{ backup_dir }}"
    state: directory
    mode: '0700'
  tags: [snapshot]
- name: "Snapshot - Check if sshd_config exists"
  ansible.builtin.stat:
    path: /etc/ssh/sshd_config
  register: _sshd_config_stat
  tags: [snapshot]
- name: "Snapshot - Backup sshd_config if exists"
  ansible.builtin.copy:
    src: /etc/ssh/sshd_config
    dest: "{{ backup_dir }}/sshd_config.bak"
    remote_src: true
  when: "_sshd_config_stat.stat.exists | default(false)"
  tags: [snapshot]
- name: "Snapshot - Check if issue.net exists"
  ansible.builtin.stat:
    path: /etc/issue.net
  register: _issue_net_stat
  tags: [snapshot]
- name: "Snapshot - Backup issue.net if exists"
  ansible.builtin.copy:
    src: /etc/issue.net
    dest: "{{ backup_dir }}/issue.net.bak"
    remote_src: true
  when: "_issue_net_stat.stat.exists | default(false)"
  tags: [snapshot]

- block:
  - name: "Initialize data variables"
    ansible.builtin.set_fact:
      data_01: "Not collected yet"
      status_01: "ERROR"
      details_01: "Not evaluated"
      task_01_name: "Not executed"
      task_01_cmd: "N/A"
      task_01_rc: -1
      data_02: "Not collected yet"
      status_02: "ERROR"
      details_02: "Not evaluated"
      task_02_name: "Not executed"
      task_02_cmd: "N/A"
      task_02_rc: -1
      data_03: "Not collected yet"
      status_03: "ERROR"
      details_03: "Not evaluated"
      task_03_name: "Not executed"
      task_03_cmd: "N/A"
      task_03_rc: -1
      data_04: "Not collected yet"
      status_04: "ERROR"
      details_04: "Not evaluated"
      task_04_name: "Not executed"
      task_04_cmd: "N/A"
      task_04_rc: -1
      data_05: "Not collected yet"
      status_05: "ERROR"
      details_05: "Not evaluated"
      task_05_name: "Not executed"
      task_05_cmd: "N/A"
      task_05_rc: -1
      data_06: "Not collected yet"
      status_06: "ERROR"
      details_06: "Not evaluated"
      task_06_name: "Not executed"
      task_06_cmd: "N/A"
      task_06_rc: -1
      data_07: "Not collected yet"
      status_07: "ERROR"
      details_07: "Not evaluated"
      task_07_name: "Not executed"
      task_07_cmd: "N/A"
      task_07_rc: -1
      data_08: "Not collected yet"
      status_08: "ERROR"
      details_08: "Not evaluated"
      task_08_name: "Not executed"
      task_08_cmd: "N/A"
      task_08_rc: -1
    tags: [execute]

  - name: "Req 01 - Check if openssh-server is installed"
    ansible.builtin.package_facts:
      manager: auto
    failed_when: false
    tags: [execute]

  - name: "Req 01 - Set skip fact if sshd not installed"
    ansible.builtin.set_fact:
      sshd_installed: "{{ 'openssh-server' in ansible_facts.packages }}"
      playbook_skipped: "{{ 'openssh-server' not in ansible_facts.packages }}"
    tags: [execute]

  - name: "Req 01 - Verify sshd binary exists and config syntax is valid"
    ansible.builtin.shell: |
      which sshd && sshd -t
    args:
      executable: /bin/bash
    register: result_01
    failed_when: false
    changed_when: false
    when: "sshd_installed | default(false)"
    tags: [execute]

  - name: "Req 01 - Store details"
    ansible.builtin.set_fact:
      task_01_name: "Verify openssh-server installation"
      task_01_cmd: "dpkg -l | grep -q openssh-server || apt-get install -y openssh-server; which sshd && sshd -t"
      task_01_rc: "{{ result_01.rc | default(-1) }}"
      data_01: "{{ result_01.stdout | default('') | trim }}"
      status_01: "{{ 'PASS' if (sshd_installed | default(false)) and (result_01.rc | default(-1)) == 0 else 'FAIL' }}"
      details_01: "{{ 'openssh-server installed and sshd syntax OK' if (sshd_installed | default(false)) and (result_01.rc | default(-1)) == 0 else 'openssh-server not installed or sshd check failed' }}"
    tags: [execute]

  - name: "Req 02 - Set Banner parameter in sshd_config"
    ansible.builtin.shell: |
      sed -i 's/^#*Banner.*/Banner \/etc\/issue.net/' /etc/ssh/sshd_config
    args:
      executable: /bin/bash
    register: result_02
    failed_when: false
    when: "sshd_installed | default(false)"
    tags: [execute]

  - name: "Req 02 - Store details"
    ansible.builtin.set_fact:
      task_02_name: "Set Banner in sshd_config"
      task_02_cmd: |
        sed -i 's/^#*Banner.*/Banner \\/etc\\/issue.net/' /etc/ssh/sshd_config
      task_02_rc: "{{ result_02.rc | default(-1) }}"
      data_02: "{{ result_02.stdout | default('') | trim }}"
      status_02: "{{ 'PASS' if (result_02.rc | default(-1)) == 0 else 'FAIL' }}"
      details_02: "{{ 'Banner line updated to /etc/issue.net' if (result_02.rc | default(-1)) == 0 else 'Failed to update Banner line' }}"
    tags: [execute]

  - name: "Req 03 - Place Banner before Include/Match entries"
    ansible.builtin.shell: |
      awk '/^Include|^Match/{if(!found){print "Banner /etc/issue.net"; found=1}}1' /etc/ssh/sshd_config > /tmp/sshd_config && mv /tmp/sshd_config /etc/ssh/sshd_config
    args:
      executable: /bin/bash
    register: result_03
    failed_when: false
    when: "sshd_installed | default(false)"
    tags: [execute]

  - name: "Req 03 - Store details"
    ansible.builtin.set_fact:
      task_03_name: "Ensure Banner before Include/Match"
      task_03_cmd: |
        awk '/^Include|^Match/{if(!found){print \"Banner /etc/issue.net\"; found=1}}1' /etc/ssh/sshd_config > /tmp/sshd_config && mv /tmp/sshd_config /etc/ssh/sshd_config
      task_03_rc: "{{ result_03.rc | default(-1) }}"
      data_03: "{{ result_03.stdout | default('') | trim }}"
      status_03: "{{ 'PASS' if (result_03.rc | default(-1)) == 0 else 'FAIL' }}"
      details_03: "{{ 'Banner moved before Include/Match' if (result_03.rc | default(-1)) == 0 else 'Failed to reorder Banner line' }}"
    tags: [execute]

  - name: "Req 04 - Create banner content file"
    ansible.builtin.shell: |
      printf '%s\n' "Authorized users only. All activity may be monitored and reported." > /etc/issue.net
    args:
      executable: /bin/bash
    register: result_04
    failed_when: false
    when: "sshd_installed | default(false)"
    tags: [execute]

  - name: "Req 04 - Store details"
    ansible.builtin.set_fact:
      task_04_name: "Create /etc/issue.net banner file"
      task_04_cmd: |
        printf '%s\\n' \"Authorized users only. All activity may be monitored and reported.\" > /etc/issue.net
      task_04_rc: "{{ result_04.rc | default(-1) }}"
      data_04: "{{ result_04.stdout | default('') | trim }}"
      status_04: "{{ 'PASS' if (result_04.rc | default(-1)) == 0 else 'FAIL' }}"
      details_04: "{{ 'Banner content written' if (result_04.rc | default(-1)) == 0 else 'Failed to write banner content' }}"
    tags: [execute]

  - name: "Req 05 - Remove escape sequences from banner"
    ansible.builtin.shell: |
      sed -i -e 's/\\m//g' -e 's/\\r//g' -e 's/\\s//g' -e 's/\\v//g' -e '/[Uu]buntu/d' -e '/[Dd]ebian/d' /etc/issue.net
    args:
      executable: /bin/bash
    register: result_05
    failed_when: false
    when: "sshd_installed | default(false)"
    tags: [execute]

  - name: "Req 05 - Store details"
    ansible.builtin.set_fact:
      task_05_name: "Remove escape sequences"
      task_05_cmd: |
        sed -i -e 's/\\\\m//g' -e 's/\\\\r//g' -e 's/\\\\s//g' -e 's/\\\\v//g' -e '/[Uu]buntu/d' -e '/[Dd]ebian/d' /etc/issue.net
      task_05_rc: "{{ result_05.rc | default(-1) }}"
      data_05: "{{ result_05.stdout | default('') | trim }}"
      status_05: "{{ 'PASS' if (result_05.rc | default(-1)) == 0 else 'FAIL' }}"
      details_05: "{{ 'Escape sequences removed' if (result_05.rc | default(-1)) == 0 else 'Failed to remove escape sequences' }}"
    tags: [execute]

  - name: "Req 06 - Restart SSH service"
    ansible.builtin.service:
      name: sshd
      state: restarted
    register: result_06
    failed_when: false
    when: "sshd_installed | default(false)"
    tags: [execute]

  - name: "Req 06 - Store details"
    ansible.builtin.set_fact:
      task_06_name: "Restart sshd service"
      task_06_cmd: "systemctl restart sshd"
      task_06_rc: "{{ 0 if result_06 is not failed else 1 }}"
      data_06: "{{ result_06.state | default('') }}"
      status_06: "{{ 'PASS' if result_06 is not failed else 'FAIL' }}"
      details_06: "{{ 'SSH service restarted' if result_06 is not failed else 'SSH restart failed' }}"
    tags: [execute]

  - name: "Req 07 - Verify Banner configuration"
    ansible.builtin.shell: |
      sshd -T | grep -i banner
    args:
      executable: /bin/bash
    register: result_07
    failed_when: false
    changed_when: false
    when: "sshd_installed | default(false)"
    tags: [execute]

  - name: "Req 07 - Store details"
    ansible.builtin.set_fact:
      task_07_name: "Verify Banner configuration"
      task_07_cmd: "sshd -T | grep -i banner"
      task_07_rc: "{{ result_07.rc | default(-1) }}"
      data_07: "{{ result_07.stdout | default('') | trim }}"
      status_07: "{{ 'PASS' if (result_07.rc | default(-1)) == 0 and ('banner /etc/issue.net' in (result_07.stdout | default('') | trim)) else 'FAIL' }}"
      details_07: "{{ 'Banner verification: ' ~ (result_07.stdout | default('') | trim) if (result_07.rc | default(-1)) == 0 else 'Verification failed' }}"
    tags: [execute]

  - name: "Req 08 - Store overall cis_result"
    ansible.builtin.set_fact:
      cis_result: >-
        {%- set statuses = [status_01, status_02, status_03, status_04, status_05, status_06, status_07] -%}
        {%- if 'FAIL' in statuses -%}FAIL
        {%- elif 'ERROR' in statuses -%}ERROR
        {%- elif 'SKIP' in statuses -%}SKIP
        {%- else -%}PASS
        {%- endif -%}
    tags: [execute]

  - name: "Req 08 - Store requirement 08 execution details"
    ansible.builtin.set_fact:
      task_08_name: "Set overall cis_result"
      task_08_cmd: "set_fact cis_result = {{ cis_result }}"
      task_08_rc: 0
      data_08: "{{ cis_result }}"
      status_08: "PASS"
      details_08: "Overall remediation result recorded"
    tags: [execute]

  - name: "Generate remediation report"
    ansible.builtin.debug:
      msg:
      - "========================================================"
      - "        REMEDIATION REPORT — CIS 5.1.8"
      - "        Reference: CIS Benchmark checkpoint 5.1.8"
      - "========================================================"
      - ""
      - "REQUIREMENT 01 - {{ req_01 }}:"
      - "  Task: {{ task_01_name | default('Not executed') }}"
      - "  Command: {{ task_01_cmd | default('N/A') }}"
      - "  Exit code: {{ task_01_rc | default(-1) }}"
      - "  Data: {{ data_01 | default('') | trim }}"
      - "  Status: {{ status_01 | default('ERROR') | trim }}"
      - "  Details: {{ details_01 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 02 - {{ req_02 }}:"
      - "  Task: {{ task_02_name | default('Not executed') }}"
      - "  Command: {{ task_02_cmd | default('N/A') }}"
      - "  Exit code: {{ task_02_rc | default(-1) }}"
      - "  Data: {{ data_02 | default('') | trim }}"
      - "  Status: {{ status_02 | default('ERROR') | trim }}"
      - "  Details: {{ details_02 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 03 - {{ req_03 }}:"
      - "  Task: {{ task_03_name | default('Not executed') }}"
      - "  Command: {{ task_03_cmd | default('N/A') }}"
      - "  Exit code: {{ task_03_rc | default(-1) }}"
      - "  Data: {{ data_03 | default('') | trim }}"
      - "  Status: {{ status_03 | default('ERROR') | trim }}"
      - "  Details: {{ details_03 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 04 - {{ req_04 }}:"
      - "  Task: {{ task_04_name | default('Not executed') }}"
      - "  Command: {{ task_04_cmd | default('N/A') }}"
      - "  Exit code: {{ task_04_rc | default(-1) }}"
      - "  Data: {{ data_04 | default('') | trim }}"
      - "  Status: {{ status_04 | default('ERROR') | trim }}"
      - "  Details: {{ details_04 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 05 - {{ req_05 }}:"
      - "  Task: {{ task_05_name | default('Not executed') }}"
      - "  Command: {{ task_05_cmd | default('N/A') }}"
      - "  Exit code: {{ task_05_rc | default(-1) }}"
      - "  Data: {{ data_05 | default('') | trim }}"
      - "  Status: {{ status_05 | default('ERROR') | trim }}"
      - "  Details: {{ details_05 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 06 - {{ req_06 }}:"
      - "  Task: {{ task_06_name | default('Not executed') }}"
      - "  Command: {{ task_06_cmd | default('N/A') }}"
      - "  Exit code: {{ task_06_rc | default(-1) }}"
      - "  Data: {{ data_06 | default('') | trim }}"
      - "  Status: {{ status_06 | default('ERROR') | trim }}"
