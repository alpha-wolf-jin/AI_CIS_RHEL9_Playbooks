playbook_name: "cis_6_1_1_aide"
checkpoint_id: "cis_6_1_1"
state_guard_dir: "/usr/local/bin/cis/.cis_state_guard/{{ checkpoint_id }}"
state_guard_flag: "{{ state_guard_dir }}/checkpoint.flag"
req_01: "Apply prerequisite check: ensure dnf package manager is available using command: `which dnf`. Expected result: path to dnf is returned."
req_02: "Apply install AIDE using command: `dnf install aide`. Expected result: AIDE is installed successfully."
req_03: "Apply configure AIDE as appropriate for your environment using command: `# manual configuration per aide documentation`. Expected result: AIDE configuration is set."
req_04: "Apply initialize AIDE database using command: `aide --init`. Expected result: AIDE database file /var/lib/aide/aide.db.new.gz is created."
req_05: "Apply move the new AIDE database to the active location using command: `mv /var/lib/aide/aide.db.new.gz /var/lib/aide/aide.db.gz`. Expected result: AIDE database is now active at /var/lib/aide/aide.db.gz."
req_06: "Verify AIDE is installed and database exists using command: `rpm -q aide && ls -l /var/lib/aide/aide.db.gz`. Expected result: AIDE package version is displayed and the database file exists."
