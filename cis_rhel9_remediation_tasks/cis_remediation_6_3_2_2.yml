---
- name: Initialize meta data variables
  include_vars: cis_remediation_var_6_3_2_2.yml

- name: "Snapshot - Create backup directory"
  ansible.builtin.file:
    path: "{{ backup_dir }}"
    state: directory
    mode: '0700'
  tags: [snapshot]
- name: "Snapshot - Stat config file"
  ansible.builtin.stat:
    path: "{{ config_file }}"
  register: _snap_config_stat
  tags: [snapshot]
- name: "Snapshot - Check if backup file already exists"
  ansible.builtin.stat:
    path: "{{ backup_dir }}/auditd.conf.orig"
  register: _snap_backup_stat
  tags: [snapshot]
- name: "Snapshot - Backup config file if exists and no backup yet"
  ansible.builtin.copy:
    src: "{{ config_file }}"
    dest: "{{ backup_dir }}/auditd.conf.orig"
    remote_src: true
  when:
  - _snap_config_stat.stat.exists | default(false)
  - not (_snap_backup_stat.stat.exists | default(false))
  tags: [snapshot]

- block:
# === EXECUTE PHASE (tag: execute) ===
  - name: "Initialize data variables"
    set_fact:
      data_01: "Not collected yet"
      status_01: "UNKNOWN"
      details_01: "Not evaluated"
      data_02: "Not collected yet"
      status_02: "UNKNOWN"
      details_02: "Not evaluated"
      data_03: "Not collected yet"
      status_03: "UNKNOWN"
      details_03: "Not evaluated"
      data_04: "Not collected yet"
      status_04: "UNKNOWN"
      details_04: "Not evaluated"
      task_01_name: "Not executed"
      task_01_cmd: "N/A"
      task_01_rc: -1
      task_02_name: "Not executed"
      task_02_cmd: "N/A"
      task_02_rc: -1
      task_03_name: "Not executed"
      task_03_cmd: "N/A"
      task_03_rc: -1
      task_04_name: "Not executed"
      task_04_cmd: "N/A"
      task_04_rc: -1
      playbook_skipped: false
    tags: [execute]

  - name: "Req 01 - Check if auditd package is installed"
    ansible.builtin.package_facts:
      manager: auto
    failed_when: false
    tags: [execute]

  - name: "Store requirement 01 details"
    set_fact:
      task_01_name: "Check if auditd package is installed"
      task_01_cmd: "package_facts module"
      task_01_rc: 0
      data_01: "{{ ansible_facts.packages[package_name] | default([]) | length > 0 }}"
      status_01: "{{ 'PASS' if (ansible_facts.packages[package_name] | default([]) | length > 0) else 'SKIPPED' }}"
      details_01: "{{ 'Package audit is installed' if (ansible_facts.packages[package_name] | default([]) | length > 0) else 'Package audit is NOT installed - skipping remediation' }}"
      playbook_skipped: "{{ not (ansible_facts.packages[package_name] | default([]) | length > 0) }}"
    tags: [execute]

  - name: "Req 02 - Set max_log_file_action to keep_logs in auditd.conf"
    ansible.builtin.lineinfile:
      path: "{{ config_file }}"
      regexp: |
        ^max_log_file_action\s*=.*
      line: "max_log_file_action = {{ config_value }}"
      state: present
      backrefs: false
      backup: true
    register: result_02
    failed_when: false
    when: "not playbook_skipped | bool"
    tags: [execute]

  - name: "Req 02b - Remove duplicate max_log_file_action lines"
    ansible.builtin.shell: |
      sed -i '/^max_log_file_action\s*=/{
        /keep_logs/!d
        :a
        n
        /^max_log_file_action\s*=/d
        ba
      }' {{ config_file }}
    args:
      executable: /bin/bash
    failed_when: false
    changed_when: false
    when: "not playbook_skipped | bool"
    tags: [execute]

  - name: "Store requirement 02 details"
    set_fact:
      task_02_name: "Set max_log_file_action to keep_logs in auditd.conf"
      task_02_cmd: |
        lineinfile: regexp='^max_log_file_action\\s*=.*' line='max_log_file_action = keep_logs' path={{ config_file }}
      task_02_rc: "{{ 0 if not (playbook_skipped | bool) else -1 }}"
      data_02: "{{ 'max_log_file_action = keep_logs' if not (playbook_skipped | bool) else 'SKIPPED' }}"
      status_02: "{{ 'APPLIED' if not (playbook_skipped | bool) else 'SKIPPED' }}"
      details_02: "{{ 'Configuration parameter set successfully' if not (playbook_skipped | bool) else 'Skipped - auditd package not installed' }}"
    tags: [execute]

  - name: "Req 03 - Restart auditd service"
    ansible.builtin.systemd:
      name: "{{ service_name }}"
      state: restarted
    register: result_03
    failed_when: false
    when: "not playbook_skipped | bool"
    tags: [execute]

  - name: "Store requirement 03 details"
    set_fact:
      task_03_name: "Restart auditd service"
      task_03_cmd: "systemctl restart auditd"
      task_03_rc: "{{ 0 if (not (playbook_skipped | bool) and result_03 is defined and not (result_03.failed | default(false))) else -1 }}"
      data_03: "{{ result_03.state | default('restarted') if not (playbook_skipped | bool) else 'SKIPPED' }}"
      status_03: "{{ 'APPLIED' if (not (playbook_skipped | bool) and result_03 is defined and not (result_03.failed | default(false))) else ('SKIPPED' if (playbook_skipped | bool) else 'FAILED') }}"
      details_03: "{{ 'Service restarted successfully' if (not (playbook_skipped | bool) and result_03 is defined and not (result_03.failed | default(false))) else ('Skipped - auditd package not installed' if (playbook_skipped | bool) else 'Service restart failed') }}"
    tags: [execute]

  - name: "Req 04 - Verify max_log_file_action setting"
    ansible.builtin.shell: |
      grep '^max_log_file_action' {{ config_file }}
    args:
      executable: /bin/bash
    register: result_04
    failed_when: false
    changed_when: false
    when: "not playbook_skipped | bool"
    tags: [execute]

  - name: "Store requirement 04 details"
    set_fact:
      task_04_name: "Verify max_log_file_action setting"
      task_04_cmd: "grep '^max_log_file_action' {{ config_file }}"
      task_04_rc: "{{ result_04.rc | default(-1) if not (playbook_skipped | bool) else -1 }}"
      data_04: "{{ result_04.stdout | default('') | trim if not (playbook_skipped | bool) else 'SKIPPED' }}"
      status_04: "{{ 'PASS' if (not (playbook_skipped | bool) and (result_04.stdout | default('') | trim == 'max_log_file_action = keep_logs')) else ('SKIPPED' if (playbook_skipped | bool) else 'FAILED') }}"
      details_04: "{{ 'Verification successful - max_log_file_action = keep_logs' if (not (playbook_skipped | bool) and (result_04.stdout | default('') | trim == 'max_log_file_action = keep_logs')) else ('Skipped - auditd package not installed' if (playbook_skipped | bool) else 'Verification failed - expected max_log_file_action = keep_logs') }}"
    tags: [execute]

  - name: "Set overall remediation result"
    set_fact:
      cis_result: "{{ status_04 }}"
    tags: [execute]

  - name: "Generate remediation report"
    debug:
      msg:
      - "========================================================"
      - "        REMEDIATION REPORT — CIS 6.3.2.2"
      - "========================================================"
      - ""
      - "Reference: CIS Benchmark checkpoint 6.3.2.2"
      - ""
      - "REQUIREMENT 01 - {{ req_01 }}:"
      - "  Task: {{ task_01_name | default('Task not recorded') }}"
      - "  Command: {{ task_01_cmd | default('N/A') }}"
      - "  Exit code: {{ task_01_rc | default(-1) }}"
      - "  Data: {{ data_01 | default('') | trim }}"
      - "  Status: {{ status_01 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_01 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 02 - {{ req_02 }}:"
      - "  Task: {{ task_02_name | default('Task not recorded') }}"
      - "  Command: {{ task_02_cmd | default('N/A') }}"
      - "  Exit code: {{ task_02_rc | default(-1) }}"
      - "  Data: {{ data_02 | default('') | trim }}"
      - "  Status: {{ status_02 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_02 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 03 - {{ req_03 }}:"
      - "  Task: {{ task_03_name | default('Task not recorded') }}"
      - "  Command: {{ task_03_cmd | default('N/A') }}"
      - "  Exit code: {{ task_03_rc | default(-1) }}"
      - "  Data: {{ data_03 | default('') | trim }}"
      - "  Status: {{ status_03 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_03 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 04 - {{ req_04 }}:"
      - "  Task: {{ task_04_name | default('Task not recorded') }}"
      - "  Command: {{ task_04_cmd | default('N/A') }}"
      - "  Exit code: {{ task_04_rc | default(-1) }}"
      - "  Data: {{ data_04 | default('') | trim }}"
      - "  Status: {{ status_04 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_04 | default('Not evaluated') | trim }}"
      - ""
      - "========================================================"
      - "OVERALL REMEDIATION:"
      - "  Result: {{ cis_result | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_04 | default('Not evaluated') | trim }}"
      - "========================================================"
    tags: [execute]

  always:
# === RESTORE PHASE (tag: restore) ===
  - name: "Restore - Check if config backup exists"
    ansible.builtin.stat:
      path: "{{ backup_dir }}/auditd.conf.orig"
    register: _restore_backup_check
    failed_when: false
    tags: [restore]

  - name: "Restore - Overwrite config with original"
    ansible.builtin.copy:
      src: "{{ backup_dir }}/auditd.conf.orig"
      dest: "{{ config_file }}"
      remote_src: true
    when: _restore_backup_check.stat.exists | default(false)
    failed_when: false
    tags: [restore]

  - name: "Restore - Remove backup directory"
    ansible.builtin.file:
      path: "{{ backup_dir }}"
      state: absent
    failed_when: false
    tags: [restore]
