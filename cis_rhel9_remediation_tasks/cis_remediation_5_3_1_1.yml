---
- name: Initialize meta data variables
  include_vars: cis_remediation_var_5_3_1_1.yml

- name: "State Guard - Check for existing checkpoint"
  ansible.builtin.stat:
    path: "{{ state_guard_flag }}"
  register: _sg_flag
  tags: [snapshot]
- name: "State Guard - Remove old checkpoint"
  ansible.builtin.file:
    path: "{{ state_guard_dir }}"
    state: absent
  when: _sg_flag.stat.exists | default(false)
  tags: [snapshot]
- name: "State Guard - Create checkpoint directory"
  ansible.builtin.file:
    path: "{{ state_guard_dir }}"
    state: directory
    mode: '0700'
  tags: [snapshot]
- name: "State Guard - Save current pam version"
  ansible.builtin.shell: rpm -q pam 2>/dev/null || echo "not_installed"
  args:
    executable: /bin/bash
  register: _sg_pam_version
  failed_when: false
  changed_when: false
  tags: [snapshot]
- name: "State Guard - Persist pam version to file"
  ansible.builtin.copy:
    content: "{{ _sg_pam_version.stdout | default('not_installed') | trim }}"
    dest: "{{ state_guard_dir }}/pam_version.state"
  tags: [snapshot]
- name: "State Guard - Create checkpoint flag"
  ansible.builtin.copy:
    content: "checkpoint"
    dest: "{{ state_guard_flag }}"
  tags: [snapshot]

- block:
# === STATE GUARD — EXECUTE PHASE ===
  - name: "Initialize data variables"
    ansible.builtin.set_fact:
      data_01: "Not collected yet"
      status_01: "UNKNOWN"
      details_01: "Not evaluated"
      task_01_name: "Not executed"
      task_01_cmd: "N/A"
      task_01_rc: -1
      data_02: "Not collected yet"
      status_02: "UNKNOWN"
      details_02: "Not evaluated"
      task_02_name: "Not executed"
      task_02_cmd: "N/A"
      task_02_rc: -1
      data_03: "Not collected yet"
      status_03: "UNKNOWN"
      details_03: "Not evaluated"
      task_03_name: "Not executed"
      task_03_cmd: "N/A"
      task_03_rc: -1
    tags: [execute]

  - name: "Req 01 - Check if pam is installed"
    ansible.builtin.package_facts:
      manager: auto
    failed_when: false
    tags: [execute]

  - name: "Req 01 - Check if pam version is less than pam-1.5.1-19"
    ansible.builtin.shell: |
      {% raw %}rpm -q pam 2>/dev/null | grep -E '^pam-1\.([0-4]\.|[0-4][^0-9]|5\.0\.|5\.1\.0|5\.1\.1[0-8])' || true{% endraw %}
    args:
      executable: /bin/bash
    register: result_01
    failed_when: false
    changed_when: false
    when: "'pam' in ansible_facts.packages"
    tags: [execute]

  - name: "Store requirement 01 details"
    ansible.builtin.set_fact:
      task_01_name: "Check pam version against pam-1.5.1-19"
      task_01_cmd: |
        rpm -q pam | grep -E '^pam-1\\.([0-4]\\.|[0-4][^0-9]|5\\.0\\.|5\\.1\\.0|5\\.1\\.1[0-8])'
      task_01_rc: "{{ result_01.rc | default(-1) }}"
      data_01: "{{ result_01.stdout | default('') | trim }}"
      status_01: "{{ 'SKIPPED' if ('pam' not in ansible_facts.packages) else ('PASS' if (result_01.stdout | default('') | trim) == '' else 'FAIL') }}"
      details_01: "{{ 'SKIPPED: pam package is not installed' if ('pam' not in ansible_facts.packages) else ('PASS: pam version is at least pam-1.5.1-19' if (result_01.stdout | default('') | trim) == '' else 'FAIL: pam version is less than pam-1.5.1-19 - upgrade needed') }}"
    tags: [execute]

  - name: "Req 02 - Upgrade pam to latest version"
    ansible.builtin.dnf:
      name: pam
      state: latest
    register: result_02
    failed_when: false
    when:
    - "'pam' in ansible_facts.packages"
    - "result_01.stdout | default('') | trim != ''"
    tags: [execute]

  - name: "Store requirement 02 details"
    ansible.builtin.set_fact:
      task_02_name: "Upgrade pam package to latest version"
      task_02_cmd: "dnf upgrade pam"
      task_02_rc: "{{ result_02.rc | default(-1) }}"
      data_02: "{{ result_02.results | default([]) | selectattr('name', 'equalto', 'pam') | map(attribute='version') | first | default('') | trim }}"
      status_02: "{{ 'SKIPPED' if (result_02.skipped | default(false)) else ('PASS' if result_02.rc | default(-1) == 0 else 'FAIL') }}"
      details_02: "{{ 'SKIPPED: pam not installed or already at target version' if (result_02.skipped | default(false)) else ('PASS: pam upgraded successfully' if result_02.rc | default(-1) == 0 else 'FAIL: upgrade failed') }}"
    tags: [execute]

  - name: "Req 03 - Verify pam version is at least pam-1.5.1-19"
    ansible.builtin.shell: |
      {% raw %}rpm -q pam 2>/dev/null | grep -E '^pam-1\.5\.1-19' || rpm -q pam 2>/dev/null | grep -E '^pam-1\.([5-9]\.|[6-9])' || echo "version_not_met"{% endraw %}
    args:
      executable: /bin/bash
    register: result_03
    failed_when: false
    changed_when: false
    when: "'pam' in ansible_facts.packages"
    tags: [execute]

  - name: "Store requirement 03 details"
    ansible.builtin.set_fact:
      task_03_name: "Verify pam version is at least pam-1.5.1-19"
      task_03_cmd: |
        rpm -q pam | grep -E '^pam-1\\.5\\.1-19' || rpm -q pam | grep -E '^pam-1\\.([5-9]\\.|[6-9])'
      task_03_rc: "{{ result_03.rc | default(-1) }}"
      data_03: "{{ result_03.stdout | default('') | trim }}"
      status_03: "{{ 'SKIPPED' if ('pam' not in ansible_facts.packages) else ('PASS' if (result_03.stdout | default('') | trim) != 'version_not_met' else 'FAIL') }}"
      details_03: "{{ 'SKIPPED: pam package is not installed' if ('pam' not in ansible_facts.packages) else ('PASS: pam version meets or exceeds pam-1.5.1-19' if (result_03.stdout | default('') | trim) != 'version_not_met' else 'FAIL: pam version is still below pam-1.5.1-19') }}"
    tags: [execute]

  - name: "Store final remediation result in cis_result"
    ansible.builtin.set_fact:
      cis_result: "{{ status_03 | default('UNKNOWN') | trim }}"
    tags: [execute]

  - name: "Generate remediation report"
    ansible.builtin.debug:
      msg:
      - "========================================================"
      - "        REMEDIATION REPORT — CIS 5.3.1.1"
      - "========================================================"
      - "Reference: CIS Benchmark checkpoint 5.3.1.1"
      - ""
      - "REQUIREMENT 01 - {{ req_01 }}:"
      - "  Task: {{ task_01_name | default('Task not recorded') }}"
      - "  Command: {{ task_01_cmd | default('N/A') }}"
      - "  Exit code: {{ task_01_rc | default(-1) }}"
      - "  Data: {{ data_01 | default('') | trim }}"
      - "  Status: {{ status_01 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_01 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 02 - {{ req_02 }}:"
      - "  Task: {{ task_02_name | default('Task not recorded') }}"
      - "  Command: {{ task_02_cmd | default('N/A') }}"
      - "  Exit code: {{ task_02_rc | default(-1) }}"
      - "  Data: {{ data_02 | default('') | trim }}"
      - "  Status: {{ status_02 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_02 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 03 - {{ req_03 }}:"
      - "  Task: {{ task_03_name | default('Task not recorded') }}"
      - "  Command: {{ task_03_cmd | default('N/A') }}"
      - "  Exit code: {{ task_03_rc | default(-1) }}"
      - "  Data: {{ data_03 | default('') | trim }}"
      - "  Status: {{ status_03 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_03 | default('Not evaluated') | trim }}"
      - ""
      - "========================================================"
      - "OVERALL REMEDIATION:"
      - "  Result: {{ cis_result | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_03 | default('Not evaluated') | trim }}"
      - "========================================================"
    tags: [execute]

  always:
# === STATE GUARD — RESTORE PHASE (GUARANTEED) ===
  - name: "State Guard Restore - Check if checkpoint exists"
    ansible.builtin.stat:
      path: "{{ state_guard_flag }}"
    register: _sg_restore_flag
    failed_when: false
    tags: [restore]

  - name: "State Guard Restore - Read saved pam version"
    ansible.builtin.slurp:
      src: "{{ state_guard_dir }}/pam_version.state"
    register: _sg_restore_pam_data
    failed_when: false
    when: "_sg_restore_flag.stat.exists | default(false)"
    tags: [restore]

  - name: "State Guard Restore - Downgrade pam to original version"
    ansible.builtin.shell: |
      saved_version="{{ _sg_restore_pam_data.content | b64decode | trim }}"
      if [ "$saved_version" != "not_installed" ] && [ -n "$saved_version" ]; then
        dnf downgrade -y pam-"${saved_version#pam-}" 2>/dev/null || true
      fi
    args:
      executable: /bin/bash
    when:
    - "_sg_restore_flag.stat.exists | default(false)"
    - "_sg_restore_pam_data is not failed"
    - "_sg_restore_pam_data.content is defined"
    failed_when: false
    tags: [restore]

  - name: "State Guard Restore - Remove checkpoint"
    ansible.builtin.file:
      path: "{{ state_guard_dir }}"
      state: absent
    when: "_sg_restore_flag.stat.exists | default(false)"
    failed_when: false
    tags: [restore]
