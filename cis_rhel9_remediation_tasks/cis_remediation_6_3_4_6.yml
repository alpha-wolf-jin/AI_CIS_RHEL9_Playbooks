---
- name: Initialize meta data variables
  include_vars: cis_remediation_var_6_3_4_6.yml

- name: "State Guard - Check for existing checkpoint"
  ansible.builtin.stat:
    path: "{{ state_guard_flag }}"
  register: _sg_flag
  tags: [snapshot]
- name: "State Guard - Restore audit config files from prior checkpoint"
  ansible.builtin.shell: |
    if [ -f "{{ state_guard_dir }}/audit_files.list" ]; then
      while IFS= read -r f; do
        if [ -f "{{ state_guard_dir }}/$(echo "$f" | sed 's|/|_|g').backup" ]; then
          cp "{{ state_guard_dir }}/$(echo "$f" | sed 's|/|_|g').backup" "$f"
        fi
      done < "{{ state_guard_dir }}/audit_files.list"
    fi
  args:
    executable: /bin/bash
  when: "_sg_flag.stat.exists"
  failed_when: false
  tags: [snapshot]
- name: "State Guard - Remove old checkpoint"
  ansible.builtin.file:
    path: "{{ state_guard_dir }}"
    state: absent
  when: "_sg_flag.stat.exists"
  tags: [snapshot]
- name: "State Guard - Create checkpoint directory"
  ansible.builtin.file:
    path: "{{ state_guard_dir }}"
    state: directory
    mode: '0700'
  tags: [snapshot]
- name: "State Guard - List audit config files and backup"
  ansible.builtin.shell: |
    find /etc/audit/ -type f \( -name '*.conf' -o -name '*.rules' \) 2>/dev/null > "{{ state_guard_dir }}/audit_files.list"
    while IFS= read -r f; do
      cp "$f" "{{ state_guard_dir }}/$(echo "$f" | sed 's|/|_|g').backup"
    done < "{{ state_guard_dir }}/audit_files.list"
  args:
    executable: /bin/bash
  failed_when: false
  tags: [snapshot]
- name: "State Guard - Create checkpoint flag"
  ansible.builtin.copy:
    content: "checkpoint"
    dest: "{{ state_guard_flag }}"
  tags: [snapshot]

- block:
# === STATE GUARD — EXECUTE PHASE ===
  - name: "Initialize data variables"
    ansible.builtin.set_fact:
      data_01: "Not collected yet"
      status_01: "UNKNOWN"
      details_01: "Not evaluated"
      data_02: "Not collected yet"
      status_02: "UNKNOWN"
      details_02: "Not evaluated"
      data_03: "Not collected yet"
      status_03: "UNKNOWN"
      details_03: "Not evaluated"
      task_01_name: "Not executed"
      task_01_cmd: "N/A"
      task_01_rc: -1
      task_02_name: "Not executed"
      task_02_cmd: "N/A"
      task_02_rc: -1
      task_03_name: "Not executed"
      task_03_cmd: "N/A"
      task_03_rc: -1
    tags: [execute]

  - name: "Req 01 - Check if auditd package is installed"
    ansible.builtin.package_facts:
      manager: auto
    failed_when: false
    tags: [execute]

  - name: "Req 01 - Check if find and chown commands are available"
    ansible.builtin.shell: "command -v find && command -v chown"
    args:
      executable: /bin/bash
    register: result_01
    failed_when: false
    changed_when: false
    when: "'audit' in ansible_facts.packages"
    tags: [execute]

  - name: "Store requirement 01 details"
    ansible.builtin.set_fact:
      task_01_name: "Check prerequisite commands"
      task_01_cmd: "command -v find && command -v chown"
      task_01_rc: "{{ result_01.rc | default(-1) }}"
      data_01: "{{ result_01.stdout | default('') | trim }}"
      status_01: "{{ 'SKIPPED' if result_01 is skipped else ('PASS' if result_01.rc | default(-1) == 0 else 'FAIL') }}"
      details_01: "{{ 'audit package not installed' if result_01 is skipped else ('Both commands available' if result_01.rc | default(-1) == 0 else 'Commands not found') }}"
    when: "result_01 is defined"
    tags: [execute]

  - name: "Store requirement 01 details - skipped"
    ansible.builtin.set_fact:
      task_01_name: "Check prerequisite commands"
      task_01_cmd: "command -v find && command -v chown"
      task_01_rc: -1
      data_01: ""
      status_01: "SKIPPED"
      details_01: "audit package not installed"
    when: "result_01 is not defined"
    tags: [execute]

  - name: "Req 02 - Change ownership of audit configuration files to root"
    ansible.builtin.shell: "find /etc/audit/ -type f \\( -name '*.conf' -o -name '*.rules' \\) ! -user root -exec chown root {} +"
    args:
      executable: /bin/bash
    register: result_02
    failed_when: false
    changed_when: false
    when: "status_01 == 'PASS'"
    tags: [execute]

  - name: "Store requirement 02 details"
    ansible.builtin.set_fact:
      task_02_name: "Change ownership to root"
      task_02_cmd: |
        find /etc/audit/ -type f \\( -name '*.conf' -o -name '*.rules' \\) ! -user root -exec chown root {} +
      task_02_rc: "{{ result_02.rc | default(-1) }}"
      data_02: "{{ result_02.stdout | default('') | trim }}"
      status_02: "{{ 'SKIPPED' if result_02 is skipped else ('PASS' if result_02.rc | default(-1) == 0 else 'FAIL') }}"
      details_02: "{{ 'Prerequisites not met' if result_02 is skipped else ('Ownership changed successfully' if result_02.rc | default(-1) == 0 else 'Failed to change ownership') }}"
    when: "result_02 is defined"
    tags: [execute]

  - name: "Store requirement 02 details - skipped"
    ansible.builtin.set_fact:
      task_02_name: "Change ownership to root"
      task_02_cmd: |
        find /etc/audit/ -type f \\( -name '*.conf' -o -name '*.rules' \\) ! -user root -exec chown root {} +
      task_02_rc: -1
      data_02: ""
      status_02: "SKIPPED"
      details_02: "Prerequisites not met"
    when: "result_02 is not defined"
    tags: [execute]

  - name: "Req 03 - Verify ownership of audit configuration files is root"
    ansible.builtin.shell: "find /etc/audit/ -type f \\( -name '*.conf' -o -name '*.rules' \\) ! -user root"
    args:
      executable: /bin/bash
    register: result_03
    failed_when: false
    changed_when: false
    when: "status_02 == 'PASS'"
    tags: [execute]

  - name: "Store requirement 03 details"
    ansible.builtin.set_fact:
      task_03_name: "Verify ownership is root"
      task_03_cmd: |
        find /etc/audit/ -type f \\( -name '*.conf' -o -name '*.rules' \\) ! -user root
      task_03_rc: "{{ result_03.rc | default(-1) }}"
      data_03: "{{ result_03.stdout | default('') | trim }}"
      status_03: "{{ 'SKIPPED' if result_03 is skipped else ('PASS' if (result_03.stdout | default('') | trim) == '' else 'FAIL') }}"
      details_03: "{{ 'Previous step failed or skipped' if result_03 is skipped else ('All files owned by root' if (result_03.stdout | default('') | trim) == '' else 'Files found with non-root ownership: ' + (result_03.stdout | default('') | trim)) }}"
    when: "result_03 is defined"
    tags: [execute]

  - name: "Store requirement 03 details - skipped"
    ansible.builtin.set_fact:
      task_03_name: "Verify ownership is root"
      task_03_cmd: |
        find /etc/audit/ -type f \\( -name '*.conf' -o -name '*.rules' \\) ! -user root
      task_03_rc: -1
      data_03: ""
      status_03: "SKIPPED"
      details_03: "Previous step failed or skipped"
    when: "result_03 is not defined"
    tags: [execute]

  - name: "Set final remediation result variable"
    ansible.builtin.set_fact:
      cis_result: "{{ status_03 | default('UNKNOWN') | trim }}"
    tags: [execute]

  - name: "Generate remediation report"
    ansible.builtin.debug:
      msg:
      - "========================================================"
      - "        REMEDIATION REPORT — CIS 6.3.4.6"
      - "========================================================"
      - "Reference: CIS Benchmark checkpoint 6.3.4.6"
      - ""
      - "REQUIREMENT 01 - {{ req_01 }}:"
      - "  Task: {{ task_01_name | default('Task not recorded') }}"
      - "  Command: {{ task_01_cmd | default('N/A') }}"
      - "  Exit code: {{ task_01_rc | default(-1) }}"
      - "  Data: {{ data_01 | default('') | trim }}"
      - "  Status: {{ status_01 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_01 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 02 - {{ req_02 }}:"
      - "  Task: {{ task_02_name | default('Task not recorded') }}"
      - "  Command: {{ task_02_cmd | default('N/A') }}"
      - "  Exit code: {{ task_02_rc | default(-1) }}"
      - "  Data: {{ data_02 | default('') | trim }}"
      - "  Status: {{ status_02 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_02 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 03 - {{ req_03 }}:"
      - "  Task: {{ task_03_name | default('Task not recorded') }}"
      - "  Command: {{ task_03_cmd | default('N/A') }}"
      - "  Exit code: {{ task_03_rc | default(-1) }}"
      - "  Data: {{ data_03 | default('') | trim }}"
      - "  Status: {{ status_03 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_03 | default('Not evaluated') | trim }}"
      - ""
      - "========================================================"
      - "OVERALL REMEDIATION:"
      - "  Result: {{ cis_result | default('UNKNOWN') }}"
      - "  Details: {{ details_03 | default('Not evaluated') | trim }}"
      - "========================================================"
    tags: [execute]

  always:
# === STATE GUARD — RESTORE PHASE (GUARANTEED) ===
  - name: "State Guard Restore - Check if checkpoint exists"
    ansible.builtin.stat:
      path: "{{ state_guard_flag }}"
    register: _sg_restore_flag
    failed_when: false
    tags: [restore]

  - name: "State Guard Restore - Restore audit config files from backup"
    ansible.builtin.shell: |
      if [ -f "{{ state_guard_dir }}/audit_files.list" ]; then
        while IFS= read -r f; do
          backup_file="{{ state_guard_dir }}/$(echo "$f" | sed 's|/|_|g').backup"
          if [ -f "$backup_file" ]; then
            cp "$backup_file" "$f"
          fi
        done < "{{ state_guard_dir }}/audit_files.list"
      fi
    args:
      executable: /bin/bash
    when: "_sg_restore_flag.stat.exists | default(false)"
    failed_when: false
    tags: [restore]

  - name: "State Guard Restore - Remove checkpoint"
    ansible.builtin.file:
      path: "{{ state_guard_dir }}"
      state: absent
    when: "_sg_restore_flag.stat.exists | default(false)"
    failed_when: false
    tags: [restore]
