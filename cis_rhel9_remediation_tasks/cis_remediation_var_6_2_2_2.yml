playbook_name: "cis_6_2_2_2"
backup_dir: "/var/log/ai-playbooks-backup/{{ playbook_name }}"
config_file: "/etc/systemd/journald.conf.d/60-journald.conf"
req_01: "1. Run the provided remediation script to fix Ensure journald ForwardToSyslog is disabled. IF - rsyslog is the preferred method for capturing logs, this section and Recommendation should be skipped and the Configure rsyslog section followed. IF - journald is the preferred method for capturing logs: Set the following parameter in the [Journal] section in /etc/systemd/journald.conf or a file in /etc/systemd/journald.conf.d/ ending in .conf: ForwardToSyslog=no Execute the script and then reload journald. Expected result: Script applies the required changes"
req_02: "2. VERIFY: Run audit check to confirm Ensure journald ForwardToSyslog is disabled is properly configured. Expected result: System is compliant"
req_03: "3. Store the final remediation result in a variable named 'cis_result' using set_fact. Set cis_result to the overall remediation status (PASS/FAIL/SKIP/ERROR) derived from the last requirement's status variable."
req_04: "4. Create a task named 'Generate remediation report' using debug msg with the exact format: REMEDIATION REPORT — CIS 6.2.2.2, Reference, then each requirement with fields, ending with OVERALL REMEDIATION Result"
