---
- name: Initialize meta data variables
  include_vars: cis_remediation_var_5_4_1_2.yml

- name: "State Guard - Check for existing checkpoint"
  ansible.builtin.stat:
    path: "{{ state_guard_flag }}"
  register: _sg_flag
  tags: [snapshot]
- name: "State Guard - Restore /etc/login.defs from prior checkpoint"
  ansible.builtin.copy:
    src: "{{ state_guard_dir }}/login_defs.present"
    dest: "{{ config_file }}"
    remote_src: true
  when: "_sg_flag.stat.exists"
  failed_when: false
  tags: [snapshot]
- name: "State Guard - Remove old checkpoint"
  ansible.builtin.file:
    path: "{{ state_guard_dir }}"
    state: absent
  when: "_sg_flag.stat.exists"
  tags: [snapshot]
- name: "State Guard - Create checkpoint directory"
  ansible.builtin.file:
    path: "{{ state_guard_dir }}"
    state: directory
    mode: '0700'
  tags: [snapshot]
- name: "State Guard - Check if /etc/login.defs exists"
  ansible.builtin.stat:
    path: "{{ config_file }}"
  register: _sg_login_defs_stat
  tags: [snapshot]
- name: "State Guard - Backup /etc/login.defs"
  ansible.builtin.copy:
    src: "{{ config_file }}"
    dest: "{{ state_guard_dir }}/login_defs.present"
    remote_src: true
  when: "_sg_login_defs_stat.stat.exists"
  tags: [snapshot]
- name: "State Guard - Create checkpoint flag"
  ansible.builtin.copy:
    content: "checkpoint"
    dest: "{{ state_guard_flag }}"
  tags: [snapshot]

- name: "Initialize data variables"
  ansible.builtin.set_fact:
    data_01: "Not collected yet"
    status_01: "UNKNOWN"
    details_01: "Not evaluated"
    task_01_name: "Not executed"
    task_01_cmd: "N/A"
    task_01_rc: -1
    data_02: "Not collected yet"
    status_02: "UNKNOWN"
    details_02: "Not evaluated"
    task_02_name: "Not executed"
    task_02_cmd: "N/A"
    task_02_rc: -1
    data_03: "Not collected yet"
    status_03: "UNKNOWN"
    details_03: "Not evaluated"
    task_03_name: "Not executed"
    task_03_cmd: "N/A"
    task_03_rc: -1
    data_04: "Not collected yet"
    status_04: "UNKNOWN"
    details_04: "Not evaluated"
    task_04_name: "Not executed"
    task_04_cmd: "N/A"
    task_04_rc: -1
  tags: [execute]
- block:
        # === STATE GUARD — EXECUTE PHASE ===

# Requirement 1 - Prerequisite check for required tools
  - name: "Req 01 - Check if required tools chage and awk are available"
    ansible.builtin.shell: "which chage awk"
    args:
      executable: /bin/bash
    register: result_01
    failed_when: false
    changed_when: false
    tags: [execute]

  - name: "Store requirement 01 details"
    ansible.builtin.set_fact:
      task_01_name: "Check if required tools chage and awk are available"
      task_01_cmd: "which chage awk"
      task_01_rc: "{{ result_01.rc | default(-1) }}"
      data_01: "{{ result_01.stdout | default('') | trim }}"
      status_01: "{{ 'PASS' if (result_01.rc | default(-1)) == 0 else 'FAIL' }}"
      details_01: "{{ 'Tools found: ' ~ (result_01.stdout | default('') | trim) if (result_01.rc | default(-1)) == 0 else 'Required tools not found' }}"
    tags: [execute]

# Requirement 2 - Apply PASS_MIN_DAYS configuration in /etc/login.defs
  - name: "Req 02 - Set PASS_MIN_DAYS to {{ min_days_value }} in {{ config_file }}"
    ansible.builtin.lineinfile:
      path: "{{ config_file }}"
      regexp: |
        ^PASS_MIN_DAYS\s+.*
      line: "PASS_MIN_DAYS {{ min_days_value }}"
      backup: false
    register: result_02
    failed_when: false
    tags: [execute]

  - name: "Store requirement 02 details"
    ansible.builtin.set_fact:
      task_02_name: "Set PASS_MIN_DAYS to {{ min_days_value }} in {{ config_file }}"
      task_02_cmd: |
        lineinfile: regexp='^PASS_MIN_DAYS\\s+.*' line='PASS_MIN_DAYS {{ min_days_value }}'
      task_02_rc: "{{ 0 if result_02 is not failed else -1 }}"
      data_02: "{{ 'PASS_MIN_DAYS ' ~ min_days_value }}"
      status_02: "{{ 'APPLIED' if result_02 is not failed else 'FAILED' }}"
      details_02: "{{ 'Configuration updated' if result_02 is not failed else 'Failed to update configuration' }}"
    tags: [execute]

# Requirement 3 - Apply minimum password days for all users with a password set
  - name: "Req 03 - Apply minimum password days for all users with passwords"
    ansible.builtin.shell: |
      {% raw %}awk -F: '($2~/^\$.+\$/) {if($4 < 1) system ("chage --mindays 1 " $1)}' /etc/shadow{% endraw %}
    args:
      executable: /bin/bash
    register: result_03
    failed_when: false
    changed_when: false
    tags: [execute]

  - name: "Store requirement 03 details"
    ansible.builtin.set_fact:
      task_03_name: "Apply minimum password days for all users with passwords"
      task_03_cmd: |
        awk -F: '($2~/^\\$.+\\$/) {if($4 < 1) system (\"chage --mindays 1 \" $1)}' /etc/shadow
      task_03_rc: "{{ result_03.rc | default(-1) }}"
      data_03: "{{ result_03.stdout | default('No output') | trim }}"
      status_03: "{{ 'APPLIED' if (result_03.rc | default(-1)) == 0 else 'FAILED' }}"
      details_03: "{{ 'User password minimum days updated' if (result_03.rc | default(-1)) == 0 else 'Failed to update user password minimum days' }}"
    tags: [execute]

# Requirement 4 - Verify minimum password days configuration
  - name: "Req 04 - Verify minimum password days configuration"
    ansible.builtin.shell: |
      grep ^PASS_MIN_DAYS {{ config_file }} && awk -F: '($2~/^\$.+\$/) {print $1":"$4}' {{ shadow_file }}
    args:
      executable: /bin/bash
    register: result_04
    failed_when: false
    changed_when: false
    tags: [execute]

  - name: "Store requirement 04 details"
    ansible.builtin.set_fact:
      task_04_name: "Verify minimum password days configuration"
      task_04_cmd: |
        grep ^PASS_MIN_DAYS {{ config_file }} && awk -F: '($2~/^\\$.+\\$/) {print $1\":\"$4}' {{ shadow_file }}
      task_04_rc: "{{ result_04.rc | default(-1) }}"
      data_04: "{{ result_04.stdout | default('') | trim }}"
      status_04: "{{ 'APPLIED' if (result_04.rc | default(-1)) == 0 else 'FAILED' }}"
      details_04: "{{ 'Verification passed - PASS_MIN_DAYS set and all users have mindays >= 1' if (result_04.rc | default(-1)) == 0 else 'Verification failed' }}"
    tags: [execute]

# Requirement 5 - Generate remediation report
  - name: "Generate remediation report"
    ansible.builtin.debug:
      msg:
      - "REMEDIATION REPORT — CIS 5.4.1.2"
      - "Reference: CIS Benchmark checkpoint 5.4.1.2"
      - ""
      - "REQUIREMENT 01 - {{ req_01 }}:"
      - "  Task: {{ task_01_name | default('Task not recorded') }}"
      - "  Command: {{ task_01_cmd | default('N/A') }}"
      - "  Exit code: {{ task_01_rc | default(-1) }}"
      - "  Data: {{ data_01 | default('Data collection failed') | trim }}"
      - "  Status: {{ status_01 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_01 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 02 - {{ req_02 }}:"
      - "  Task: {{ task_02_name | default('Task not recorded') }}"
      - "  Command: {{ task_02_cmd | default('N/A') }}"
      - "  Exit code: {{ task_02_rc | default(-1) }}"
      - "  Data: {{ data_02 | default('Data collection failed') | trim }}"
      - "  Status: {{ status_02 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_02 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 03 - {{ req_03 }}:"
      - "  Task: {{ task_03_name | default('Task not recorded') }}"
      - "  Command: {{ task_03_cmd | default('N/A') }}"
      - "  Exit code: {{ task_03_rc | default(-1) }}"
      - "  Data: {{ data_03 | default('Data collection failed') | trim }}"
      - "  Status: {{ status_03 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_03 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 04 - {{ req_04 }}:"
      - "  Task: {{ task_04_name | default('Task not recorded') }}"
      - "  Command: {{ task_04_cmd | default('N/A') }}"
      - "  Exit code: {{ task_04_rc | default(-1) }}"
      - "  Data: {{ data_04 | default('Data collection failed') | trim }}"
      - "  Status: {{ status_04 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_04 | default('Not evaluated') | trim }}"
      - ""
      - "========================================================"
      - "OVERALL REMEDIATION:"
      - "  Result: {{ status_04 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_04 | default('Not evaluated') | trim }}"
      - "========================================================"
    tags: [execute]

  always:
# === STATE GUARD — RESTORE PHASE (GUARANTEED) ===
  - name: "State Guard Restore - Check if checkpoint exists"
    ansible.builtin.stat:
      path: "{{ state_guard_flag }}"
    register: _sg_restore_flag
    failed_when: false
    tags: [restore]

  - name: "State Guard Restore - Check if login.defs backup exists"
    ansible.builtin.stat:
      path: "{{ state_guard_dir }}/login_defs.present"
    register: _sg_restore_login_defs
    failed_when: false
    tags: [restore]

  - name: "State Guard Restore - Restore /etc/login.defs from backup"
    ansible.builtin.copy:
      src: "{{ state_guard_dir }}/login_defs.present"
      dest: "{{ config_file }}"
      remote_src: true
    when: "_sg_restore_login_defs.stat.exists | default(false)"
    failed_when: false
    tags: [restore]

  - name: "State Guard Restore - Remove checkpoint"
    ansible.builtin.file:
      path: "{{ state_guard_dir }}"
      state: absent
    when: "_sg_restore_flag.stat.exists | default(false)"
    failed_when: false
    tags: [restore]
