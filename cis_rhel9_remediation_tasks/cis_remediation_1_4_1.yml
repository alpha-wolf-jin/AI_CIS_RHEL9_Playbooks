---
- name: Initialize meta data variables
  include_vars: cis_remediation_var_1_4_1.yml

- name: "Snapshot - Create backup directory"
  ansible.builtin.file:
    path: "{{ backup_dir }}"
    state: directory
    mode: '0700'
  tags: [snapshot]
- name: "Snapshot - Check if user.cfg exists"
  ansible.builtin.stat:
    path: /boot/grub2/user.cfg
  register: _snap_user_cfg_stat
  tags: [snapshot]
- name: "Snapshot - Backup user.cfg if exists"
  ansible.builtin.copy:
    src: /boot/grub2/user.cfg
    dest: "{{ backup_dir }}/user.cfg.present"
    remote_src: true
  when: _snap_user_cfg_stat.stat.exists
  tags: [snapshot]
- name: "Snapshot - Mark user.cfg as absent"
  ansible.builtin.copy:
    content: "absent"
    dest: "{{ backup_dir }}/user.cfg.absent"
  when: not _snap_user_cfg_stat.stat.exists
  tags: [snapshot]

- block:
  - name: "Initialize data variables"
    ansible.builtin.set_fact:
      data_01: "Not collected yet"
      status_01: "ERROR"
      details_01: "Not evaluated"
      data_02: "Not collected yet"
      status_02: "ERROR"
      details_02: "Not evaluated"
      data_03: "Not collected yet"
      status_03: "ERROR"
      details_03: "Not evaluated"
      data_04: "Not collected yet"
      status_04: "ERROR"
      details_04: "Not evaluated"
      task_01_name: "Not executed"
      task_01_cmd: "N/A"
      task_01_rc: -1
    tags: [execute]

  - name: "Req 01 - Check if grub2-tools package is installed"
    ansible.builtin.package_facts:
      manager: auto
    failed_when: false
    tags: [execute]

  - name: "Req 01 - Check if grub2-setpassword binary exists"
    ansible.builtin.shell: which grub2-setpassword
    args:
      executable: /bin/bash
    register: result_01
    failed_when: false
    changed_when: false
    when: "'grub2-tools' in ansible_facts.packages"
    tags: [execute]

  - name: "Store requirement 01 details"
    ansible.builtin.set_fact:
      task_01_name: "Check grub2-setpassword binary"
      task_01_cmd: "which grub2-setpassword"
      task_01_rc: "{{ result_01.rc | default(-1) }}"
      data_01: "{{ result_01.stdout | default('') | trim }}"
      status_01: "{{ 'SKIP' if 'grub2-tools' not in ansible_facts.packages else ('PASS' if result_01.rc | default(-1) == 0 else 'FAIL') | trim }}"
      details_01: "{{ 'Skipped: grub2-tools package not installed' if 'grub2-tools' not in ansible_facts.packages else ('Binary found at ' + result_01.stdout | default('') | trim if result_01.rc | default(-1) == 0 else 'grub2-setpassword not found') | trim }}"
    tags: [execute]

  - name: "Req 02 - Generate bootloader password hash"
    ansible.builtin.shell: |
      printf '%s\n%s\n' "{{ bootloader_password }}" "{{ bootloader_password }}" | grub2-mkpasswd-pbkdf2 2>/dev/null | grep 'grub.pbkdf2' | awk '{print $NF}'
    args:
      executable: /bin/bash
    register: result_02_hash
    failed_when: false
    changed_when: false
    no_log: true
    when:
    - "'grub2-tools' in ansible_facts.packages"
    - "result_01.rc | default(-1) == 0"
    tags: [execute]

  - name: "Req 02 - Write bootloader password to user.cfg"
    ansible.builtin.lineinfile:
      path: /boot/grub2/user.cfg
      regexp: '^GRUB2_PASSWORD='
      line: 'GRUB2_PASSWORD={{ result_02_hash.stdout | trim }}'
      create: yes
      mode: '0600'
    register: result_02
    failed_when: false
    when:
    - "'grub2-tools' in ansible_facts.packages"
    - "result_01.rc | default(-1) == 0"
    - "result_02_hash.rc | default(-1) == 0"
    tags: [execute]

  - name: "Store requirement 02 details"
    ansible.builtin.set_fact:
      task_02_name: "Set bootloader password"
      task_02_cmd: "grub2-mkpasswd-pbkdf2 + lineinfile to /boot/grub2/user.cfg"
      task_02_rc: "{{ result_02_hash.rc | default(-1) }}"
      data_02: "{{ (result_02_hash.stdout | default('') | trim) }}"
      status_02: "{{ 'SKIP' if status_01 | trim == 'SKIP' or status_01 | trim == 'FAIL' else ('PASS' if result_02_hash.rc | default(-1) == 0 else 'FAIL') | trim }}"
      details_02: "{{ 'Skipped: prerequisite not met' if status_01 | trim == 'SKIP' or status_01 | trim == 'FAIL' else ('Password hash generated and written to user.cfg' if result_02_hash.rc | default(-1) == 0 else 'Failed to generate password hash: ' + (result_02_hash.stderr | default('no error output') | trim)) | trim }}"
    tags: [execute]

  - name: "Req 03 - Verify bootloader password is set"
    ansible.builtin.shell: grep -q '^GRUB2_PASSWORD' /boot/grub2/user.cfg
    args:
      executable: /bin/bash
    register: result_03
    failed_when: false
    changed_when: false
    when:
    - "'grub2-tools' in ansible_facts.packages"
    - "result_01.rc | default(-1) == 0"
    - "result_02_hash.rc | default(-1) == 0"
    tags: [execute]

  - name: "Store requirement 03 details"
    ansible.builtin.set_fact:
      task_03_name: "Verify bootloader password"
      task_03_cmd: "grep -q '^GRUB2_PASSWORD' /boot/grub2/user.cfg"
      task_03_rc: "{{ result_03.rc | default(-1) }}"
      data_03: "{{ result_03.stdout | default('') | trim }}"
      status_03: "{{ 'SKIP' if 'grub2-tools' not in ansible_facts.packages or result_01.rc | default(-1) != 0 or result_02_hash.rc | default(-1) != 0 else ('PASS' if result_03.rc | default(-1) == 0 else 'FAIL') | trim }}"
      details_03: "{{ 'Skipped: prerequisite not met or password set failed' if 'grub2-tools' not in ansible_facts.packages or result_01.rc | default(-1) != 0 or result_02_hash.rc | default(-1) != 0 else ('Password verified in user.cfg' if result_03.rc | default(-1) == 0 else 'Password not found in user.cfg') | trim }}"
    tags: [execute]

  - name: "Req 04 - Store final remediation result"
    ansible.builtin.set_fact:
      task_04_name: "Store cis_result"
      task_04_cmd: "set_fact cis_result"
      task_04_rc: 0
      cis_result: >-
        {{ 'SKIP' if status_01 | trim == 'SKIP'
           else ('FAIL' if status_01 | trim == 'FAIL' or status_02 | trim == 'FAIL' or status_03 | trim == 'FAIL'
           else ('PASS' if status_01 | trim == 'PASS' and status_02 | trim == 'PASS' and status_03 | trim == 'PASS'
           else 'ERROR')) | trim }}
    tags: [execute]

  - name: "Store requirement 04 details"
    ansible.builtin.set_fact:
      data_04: "{{ cis_result | trim }}"
      status_04: "PASS"
      details_04: "cis_result stored as {{ cis_result | trim }}"
    tags: [execute]

  - name: "Generate remediation report"
    ansible.builtin.debug:
      msg:
      - "REMEDIATION REPORT — CIS 1.4.1"
      - "Reference: CIS Benchmark checkpoint 1.4.1"
      - ""
      - "REQUIREMENT 01 - {{ req_01 }}:"
      - "  Task: {{ task_01_name | default('Not recorded') }}"
      - "  Command: {{ task_01_cmd | default('N/A') }}"
      - "  Exit code: {{ task_01_rc | default(-1) }}"
      - "  Data: {{ data_01 | default('') | trim }}"
      - "  Status: {{ status_01 | default('ERROR') | trim }}"
      - "  Details: {{ details_01 | default('') | trim }}"
      - ""
      - "REQUIREMENT 02 - {{ req_02 }}:"
      - "  Task: {{ task_02_name | default('Not recorded') }}"
      - "  Command: {{ task_02_cmd | default('N/A') }}"
      - "  Exit code: {{ task_02_rc | default(-1) }}"
      - "  Data: {{ data_02 | default('') | trim }}"
      - "  Status: {{ status_02 | default('ERROR') | trim }}"
      - "  Details: {{ details_02 | default('') | trim }}"
      - ""
      - "REQUIREMENT 03 - {{ req_03 }}:"
      - "  Task: {{ task_03_name | default('Not recorded') }}"
      - "  Command: {{ task_03_cmd | default('N/A') }}"
      - "  Exit code: {{ task_03_rc | default(-1) }}"
      - "  Data: {{ data_03 | default('') | trim }}"
      - "  Status: {{ status_03 | default('ERROR') | trim }}"
      - "  Details: {{ details_03 | default('') | trim }}"
      - ""
      - "REQUIREMENT 04 - {{ req_04 }}:"
      - "  Task: {{ task_04_name | default('Not recorded') }}"
      - "  Command: {{ task_04_cmd | default('N/A') }}"
      - "  Exit code: {{ task_04_rc | default(-1) }}"
      - "  Data: {{ data_04 | default('') | trim }}"
      - "  Status: {{ status_04 | default('ERROR') | trim }}"
      - "  Details: {{ details_04 | default('') | trim }}"
      - ""
      - "========================================================"
      - "OVERALL REMEDIATION:"
      - "  Result: {{ cis_result | default('ERROR') | trim }}"
      - "  Details: {{ details_03 | default('Not evaluated') | trim }}"
      - "========================================================"
    tags: [execute]

  always:
  - name: "Restore - Check if user.cfg backup exists"
    ansible.builtin.stat:
      path: "{{ backup_dir }}/user.cfg.present"
    register: _restore_backup_stat
    tags: [restore]

  - name: "Restore - Overwrite user.cfg with original"
    ansible.builtin.copy:
      src: "{{ backup_dir }}/user.cfg.present"
      dest: /boot/grub2/user.cfg
      remote_src: true
    when: _restore_backup_stat.stat.exists | default(false)
    failed_when: false
    tags: [restore]

  - name: "Restore - Check if user.cfg was absent before"
    ansible.builtin.stat:
      path: "{{ backup_dir }}/user.cfg.absent"
    register: _restore_absent_stat
    tags: [restore]

  - name: "Restore - Remove user.cfg if it was absent before"
    ansible.builtin.file:
      path: /boot/grub2/user.cfg
      state: absent
    when: _restore_absent_stat.stat.exists | default(false)
    failed_when: false
    tags: [restore]

  - name: "Restore - Remove backup directory"
    ansible.builtin.file:
      path: "{{ backup_dir }}"
      state: absent
    failed_when: false
    tags: [restore]
