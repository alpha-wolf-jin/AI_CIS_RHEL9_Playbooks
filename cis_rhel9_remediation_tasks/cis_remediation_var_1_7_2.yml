playbook_name: "CIS_1.7.2_remediation"
backup_dir: "/var/log/ai-playbooks-backup/{{ playbook_name }}"
expected_banner: "Authorized users only. All activity may be monitored and reported."
req_01: |
  Apply the site policy warning banner to /etc/issue using command: `echo \"Authorized users only. All activity may be monitored and reported.\" > /etc/issue`. Expected result: The /etc/issue file contains only the approved warning text.
req_02: |
  Remove any instances of \\m, \\r, \\s, \\v or OS platform references from /etc/issue using command: `sed -i 's/\\\\m//g; s/\\\\r//g; s/\\\\s//g; s/\\\\v//g; s/[Ll]inux//g; s/[Uu]buntu//g; s/[Dd]ebian//g; s/[Rr]ed [Hh]at//g; s/[Cc]ent[Oo][Ss]//g' /etc/issue`. Expected result: No OS version or architecture escape sequences remain in /etc/issue.
req_03: |
  Verify the /etc/issue file contains only the expected banner and no OS information using command: `cat /etc/issue`. Expected result: The output shows only the site policy warning text, with no \\m, \\r, \\s, \\v or OS name references.
