---
- name: Initialize meta data variables
  include_vars: cis_remediation_var_1_1_2_7_3.yml

- name: "Snapshot - Create backup directory"
  ansible.builtin.file:
    path: "{{ backup_dir }}"
    state: directory
    mode: '0700'
  tags: [snapshot]
- name: "Snapshot - Check if /etc/fstab exists"
  ansible.builtin.stat:
    path: "{{ fstab_path }}"
  register: fstab_stat
  tags: [snapshot]
- name: "Snapshot - Backup /etc/fstab if exists"
  ansible.builtin.copy:
    src: "{{ fstab_path }}"
    dest: "{{ backup_dir }}/fstab.bak"
    remote_src: true
  when: fstab_stat.stat.exists | default(false)
  tags: [snapshot]

- block:
  - name: "Req 1 - Check if partition exists for /var/log/audit"
    ansible.builtin.shell: "mount | grep '{{ mount_point }}'"
    args:
      executable: /bin/bash
    register: part_check
    failed_when: false
    changed_when: false
    tags: [execute]

  - name: "Set partition_exists fact"
    ansible.builtin.set_fact:
      partition_exists: "{{ part_check.rc == 0 }}"
    tags: [execute]

  - name: "Req 2 - Add nosuid to /var/log/audit in /etc/fstab"
    ansible.builtin.lineinfile:
      path: "{{ fstab_path }}"
      regexp: |
        ^\s*(\S+\s+{{ mount_point | regex_escape }}\s+\S+\s+)((?!\S*\bnosuid\b)\S+)(\s+\S+\s+\S+)\s*$
      line: |
        \1\2,nosuid\3
      backrefs: true
    register: fstab_edit
    failed_when: false
    when: partition_exists | default(false) | bool
    tags: [execute]

  - name: "Verify - Check /etc/fstab entry for /var/log/audit after edit"
    ansible.builtin.shell: "grep '{{ mount_point }}' {{ fstab_path }}"
    args:
      executable: /bin/bash
    register: fstab_line_check
    failed_when: false
    changed_when: false
    when: partition_exists | default(false) | bool
    tags: [execute]

  - name: "Req 3 - Remount /var/log/audit with updated options"
    ansible.builtin.shell: "mount -o remount {{ mount_point }}"
    args:
      executable: /bin/bash
    register: remount_result
    failed_when: false
    when: partition_exists | default(false) | bool
    tags: [execute]

  - name: "Req 4 - Verify nosuid option is set on partition"
    ansible.builtin.shell: "mount | grep '{{ mount_point }}' | grep nosuid"
    args:
      executable: /bin/bash
    register: verify_result
    failed_when: false
    changed_when: false
    when: partition_exists | default(false) | bool
    tags: [execute]

  - name: "Store requirement 01 details"
    ansible.builtin.set_fact:
      task_01_name: "Check if partition exists for /var/log/audit"
      task_01_cmd: "mount | grep '{{ mount_point }}'"
      task_01_rc: "{{ part_check.rc | default(-1) }}"
      data_01: "{{ part_check.stdout | default('') | trim }}"
      status_01: "{{ ('PASS' if part_check.rc | default(-1) == 0 else 'FAIL') | trim }}"
      details_01: "{{ ('Partition exists' if part_check.rc | default(-1) == 0 else 'Partition does not exist') | trim }}"
    tags: [execute]

  - name: "Store requirement 02 details"
    ansible.builtin.set_fact:
      task_02_name: "Add nosuid to /var/log/audit mount options in /etc/fstab using lineinfile"
      task_02_cmd: "ansible.builtin.lineinfile: add nosuid to /etc/fstab for /var/log/audit"
      task_02_rc: "{{ fstab_edit.rc | default(0) if partition_exists | default(false) | bool else -1 }}"
      data_02: "{{ fstab_line_check.stdout | default('') | trim if partition_exists | default(false) | bool else '' }}"
      status_02: >-
        {{ ('SKIPPED' if not (partition_exists | default(false) | bool)
        else ('PASS' if ('nosuid' in (fstab_line_check.stdout | default('') | trim))
        else 'FAIL')) | trim }}
      details_02: >-
        {{ ('SKIPPED - Partition does not exist' if not (partition_exists | default(false) | bool)
        else ('nosuid option present in fstab' if ('nosuid' in (fstab_line_check.stdout | default('') | trim))
        else 'nosuid option missing or modification failed')) | trim }}
    tags: [execute]

  - name: "Store requirement 03 details"
    ansible.builtin.set_fact:
      task_03_name: "Remount /var/log/audit with updated options"
      task_03_cmd: "mount -o remount {{ mount_point }}"
      task_03_rc: "{{ remount_result.rc | default(-1) if partition_exists | default(false) | bool else -1 }}"
      data_03: "{{ remount_result.stdout | default('') | trim if partition_exists | default(false) | bool else '' }}"
      status_03: >-
        {{ ('SKIPPED' if not (partition_exists | default(false) | bool)
        else ('PASS' if remount_result.rc | default(-1) == 0 else 'FAIL')) | trim }}
      details_03: >-
        {{ ('SKIPPED - Partition does not exist' if not (partition_exists | default(false) | bool)
        else ('Remount succeeded' if remount_result.rc | default(-1) == 0 else 'Remount failed')) | trim }}
    tags: [execute]

  - name: "Store requirement 04 details"
    ansible.builtin.set_fact:
      task_04_name: "Verify nosuid option is set on partition"
      task_04_cmd: "mount | grep '{{ mount_point }}' | grep nosuid"
      task_04_rc: "{{ verify_result.rc | default(-1) if partition_exists | default(false) | bool else -1 }}"
      data_04: "{{ verify_result.stdout | default('') | trim if partition_exists | default(false) | bool else '' }}"
      status_04: >-
        {{ ('SKIPPED' if not (partition_exists | default(false) | bool)
        else ('PASS' if (verify_result.rc | default(-1) == 0 and verify_result.stdout | default('') | trim)
        else 'FAIL')) | trim }}
      details_04: >-
        {{ ('SKIPPED - Partition does not exist' if not (partition_exists | default(false) | bool)
        else ('Verified nosuid present' if (verify_result.rc | default(-1) == 0 and verify_result.stdout | default('') | trim)
        else 'Verification failed')) | trim }}
    tags: [execute]

  - name: "Generate remediation report"
    ansible.builtin.debug:
      msg:
      - "REMEDIATION REPORT — CIS 1.1.2.7.3"
      - "Reference: CIS Benchmark checkpoint 1.1.2.7.3"
      - ""
      - "REQUIREMENT 01 - {{ req_01 }}:"
      - "  Task: {{ task_01_name | default('Task not recorded') }}"
      - "  Command: {{ task_01_cmd | default('N/A') }}"
      - "  Exit code: {{ task_01_rc | default(-1) }}"
      - "  Data: {{ data_01 | default('') | trim }}"
      - "  Status: {{ status_01 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_01 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 02 - {{ req_02 }}:"
      - "  Task: {{ task_02_name | default('Task not recorded') }}"
      - "  Command: {{ task_02_cmd | default('N/A') }}"
      - "  Exit code: {{ task_02_rc | default(-1) }}"
      - "  Data: {{ data_02 | default('') | trim }}"
      - "  Status: {{ status_02 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_02 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 03 - {{ req_03 }}:"
      - "  Task: {{ task_03_name | default('Task not recorded') }}"
      - "  Command: {{ task_03_cmd | default('N/A') }}"
      - "  Exit code: {{ task_03_rc | default(-1) }}"
      - "  Data: {{ data_03 | default('') | trim }}"
      - "  Status: {{ status_03 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_03 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 04 - {{ req_04 }}:"
      - "  Task: {{ task_04_name | default('Task not recorded') }}"
      - "  Command: {{ task_04_cmd | default('N/A') }}"
      - "  Exit code: {{ task_04_rc | default(-1) }}"
      - "  Data: {{ data_04 | default('') | trim }}"
      - "  Status: {{ status_04 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_04 | default('Not evaluated') | trim }}"
      - ""
      - "========================================================"
      - "OVERALL REMEDIATION:"
      - "  Result: {{ status_04 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_04 | default('Not evaluated') | trim }}"
      - "========================================================"
    tags: [execute]

  always:
  - name: "Restore - Check if backup exists"
    ansible.builtin.stat:
      path: "{{ backup_dir }}/fstab.bak"
    register: restore_stat
    failed_when: false
    tags: [restore]

  - name: "Restore - Overwrite /etc/fstab with original"
    ansible.builtin.copy:
      src: "{{ backup_dir }}/fstab.bak"
      dest: "{{ fstab_path }}"
      remote_src: true
    when: restore_stat.stat.exists | default(false)
    failed_when: false
    tags: [restore]

  - name: "Restore - Remount /var/log/audit to revert mount options"
    ansible.builtin.shell: "mount -o remount {{ mount_point }}"
    args:
      executable: /bin/bash
    failed_when: false
    when: restore_stat.stat.exists | default(false)
    tags: [restore]

  - name: "Restore - Remove backup directory"
    ansible.builtin.file:
      path: "{{ backup_dir }}"
      state: absent
    failed_when: false
    tags: [restore]
