playbook_name: "cis_5_4_2_3"
backup_dir: "/var/log/ai-playbooks-backup/{{ playbook_name }}"
req_01: "Apply the root group GID to 0 using command: `groupmod -g 0 root`. Expected result: The root group's GID is set to 0."
req_02: |
  Remove any groups other than root with GID 0 using command: `for g in $(getent group | awk -F: '$3==0 && $1!=\"root\" {print $1}'); do groupdel \"$g\"; done`. Expected result: All non-root groups with GID 0 are deleted.
req_03: "Verify that only the root group has GID 0 using command: `getent group | awk -F: '$3==0 {print $1}'`. Expected result: The output contains only 'root'."
req_04: "Store the final remediation result in a variable named 'cis_result' using set_fact. Set cis_result to the overall remediation status (PASS/FAIL/SKIP/ERROR) derived from the last requirement's status variable."
