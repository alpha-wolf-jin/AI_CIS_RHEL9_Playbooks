---
- name: Initialize meta data variables
  include_vars: cis_remediation_var_6_3_3_16.yml

- name: "Snapshot - Create backup directory"
  ansible.builtin.file:
    path: "{{ backup_dir }}"
    state: directory
    mode: '0700'
  tags: [snapshot]
- name: "Snapshot - Check if audit rules file exists"
  ansible.builtin.stat:
    path: "{{ audit_rules_file }}"
  register: _snap_rules_stat
  tags: [snapshot]
- name: "Snapshot - Backup audit rules file if exists"
  ansible.builtin.copy:
    src: "{{ audit_rules_file }}"
    dest: "{{ backup_dir }}/50-perm_chng.rules.orig"
    remote_src: true
  when: "_snap_rules_stat.stat.exists | default(false)"
  failed_when: false
  tags: [snapshot]

- block:
  - name: "Req 01 - Check if auditd package is installed"
    ansible.builtin.package_facts:
      manager: auto
    failed_when: false
    tags: [execute]

  - name: "Req 01 - Set auditd installed fact"
    ansible.builtin.set_fact:
      auditd_installed: "{{ 'audit' in ansible_facts.packages }}"
      playbook_skipped: "{{ 'audit' not in ansible_facts.packages }}"
    tags: [execute]

  - name: "Req 01 - Check if setfacl binary exists"
    ansible.builtin.stat:
      path: /usr/bin/setfacl
    register: setfacl_bin_stat
    failed_when: false
    tags: [execute]

  - name: "Req 01 - Set setfacl available fact"
    ansible.builtin.set_fact:
      setfacl_available: "{{ setfacl_bin_stat.stat.exists | default(false) }}"
    tags: [execute]

  - name: "Req 01 - Extract UID_MIN from /etc/login.defs"
    ansible.builtin.shell: |
      awk '/^\s*UID_MIN/{print $2}' /etc/login.defs
    args:
      executable: /bin/bash
    register: uid_min_result
    failed_when: false
    changed_when: false
    when:
    - "auditd_installed | default(false) | bool"
    - "setfacl_available | default(false) | bool"
    tags: [execute]

  - name: "Req 01 - Set UID_MIN fact"
    ansible.builtin.set_fact:
      uid_min_value: "{{ uid_min_result.stdout | default('') | trim }}"
    when:
    - "auditd_installed | default(false) | bool"
    - "setfacl_available | default(false) | bool"
    tags: [execute]

  - name: "Req 01 - Add audit rule for setfacl (idempotent)"
    ansible.builtin.lineinfile:
      path: "{{ audit_rules_file }}"
      line: "-a always,exit -F path=/usr/bin/setfacl -F perm=x -F auid>={{ uid_min_value }} -F auid!=unset -k perm_chng"
      create: yes
      regexp: '^-a always,exit -F path=/usr/bin/setfacl -F perm=x -F auid>=.* -F auid!=unset -k perm_chng$'
    register: result_01
    failed_when: false
    when:
    - "auditd_installed | default(false) | bool"
    - "setfacl_available | default(false) | bool"
    - "uid_min_value | default('') | length > 0"
    tags: [execute]

  - name: "Req 01 - Load audit rules with augenrules"
    ansible.builtin.shell: augenrules --load
    args:
      executable: /bin/bash
    register: augenrules_result
    failed_when: false
    when:
    - "auditd_installed | default(false) | bool"
    - "setfacl_available | default(false) | bool"
    tags: [execute]

  - name: "Req 01 - Check if reboot is required"
    ansible.builtin.shell: |
      set -o pipefail
      if [[ $(auditctl -s | grep "enabled") =~ "2" ]]; then
        echo "REBOOT_REQUIRED"
      else
        echo "NO_REBOOT"
      fi
    args:
      executable: /bin/bash
    register: reboot_check
    failed_when: false
    when:
    - "auditd_installed | default(false) | bool"
    - "setfacl_available | default(false) | bool"
    tags: [execute]

  - name: "Req 01 - Reboot if required"
    ansible.builtin.reboot:
      reboot_timeout: 180
    when:
    - "auditd_installed | default(false) | bool"
    - "setfacl_available | default(false) | bool"
    - "reboot_check.stdout | default('') | trim == 'REBOOT_REQUIRED'"
    tags: [execute]

  - name: "Req 02 - Verify setfacl audit rule is active"
    ansible.builtin.shell: |
      set -o pipefail
      auditctl -l | grep -E 'path=/usr/bin/setfacl.*perm=x.*perm_chng' || echo 'VERIFY_FAILED'
    args:
      executable: /bin/bash
    register: result_02
    failed_when: false
    when:
    - "auditd_installed | default(false) | bool"
    - "setfacl_available | default(false) | bool"
    tags: [execute]

  - name: "Store requirement 01 details"
    ansible.builtin.set_fact:
      task_01_name: "Add audit rule for setfacl (idempotent lineinfile)"
      task_01_cmd: |
        lineinfile: path={{ audit_rules_file }} line=\"-a always,exit -F path=/usr/bin/setfacl -F perm=x -F auid>={{ uid_min_value }} -F auid!=unset -k perm_chng\"
      task_01_rc: "{{ result_01.rc | default(-1) }}"
      data_01: "{{ 'RULE_PRESENT' if (result_01 is not skipped and result_01.failed == false) else (result_01.msg | default('SKIPPED') | trim) }}"
      status_01: "{{ 'SKIPPED' if (playbook_skipped | default(false) | bool) or not (setfacl_available | default(false) | bool) or (result_01 is skipped) else ('APPLIED' if (result_01.failed | default(true) == false) else 'FAILED') }}"
      details_01: "{{ 'auditd or setfacl not available, or UID_MIN unset - skipped' if (playbook_skipped | default(false) | bool) or not (setfacl_available | default(false) | bool) or (result_01 is skipped) else ('Rule added or already present' if (result_01.failed | default(true) == false) else 'Failed to apply rule') }}"
    tags: [execute]

  - name: "Store requirement 02 details"
    ansible.builtin.set_fact:
      task_02_name: "Verify setfacl audit rule is active"
      task_02_cmd: "auditctl -l | grep -E 'path=/usr/bin/setfacl.*perm=x.*perm_chng'"
      task_02_rc: "{{ result_02.rc | default(-1) }}"
      data_02: "{{ result_02.stdout | default('SKIPPED') | trim }}"
      status_02: "{{ 'SKIPPED' if (playbook_skipped | default(false) | bool) or not (setfacl_available | default(false) | bool) else ('APPLIED' if 'VERIFY_FAILED' not in (result_02.stdout | default('VERIFY_FAILED')) else 'FAILED') }}"
      details_02: "{{ 'auditd or setfacl not available - skipped' if (playbook_skipped | default(false) | bool) or not (setfacl_available | default(false) | bool) else ('Rule is active in auditctl' if 'VERIFY_FAILED' not in (result_02.stdout | default('VERIFY_FAILED')) else 'Rule not found in active audit rules') }}"
    tags: [execute]

  - name: "Set final remediation result variable"
    ansible.builtin.set_fact:
      cis_result: >-
        {%- if status_02 == 'APPLIED' -%}PASS
        {%- elif status_02 == 'FAILED' -%}FAIL
        {%- elif status_02 == 'SKIPPED' -%}SKIP
        {%- else -%}ERROR
        {%- endif -%}
    tags: [execute]

  - name: "Store requirement 03 details"
    ansible.builtin.set_fact:
      task_03_name: "Set final remediation result variable"
      task_03_cmd: "set_fact: cis_result derived from status_02"
      task_03_rc: 0
      data_03: "cis_result set to {{ cis_result | default('ERROR') }}"
      status_03: "PASS"
      details_03: "cis_result variable successfully set"
    tags: [execute]

  - name: "Generate remediation report"
    ansible.builtin.debug:
      msg:
      - "REMEDIATION REPORT — CIS 6.3.3.16"
      - "Reference: CIS Benchmark checkpoint 6.3.3.16"
      - ""
      - "REQUIREMENT 01 - {{ req_01 }}:"
      - "  Task: {{ task_01_name | default('Task not recorded') }}"
      - "  Command: {{ task_01_cmd | default('N/A') }}"
      - "  Exit code: {{ task_01_rc | default(-1) }}"
      - "  Data: {{ data_01 | default('Data collection failed') | trim }}"
      - "  Status: {{ status_01 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_01 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 02 - {{ req_02 }}:"
      - "  Task: {{ task_02_name | default('Task not recorded') }}"
      - "  Command: {{ task_02_cmd | default('N/A') }}"
      - "  Exit code: {{ task_02_rc | default(-1) }}"
      - "  Data: {{ data_02 | default('Data collection failed') | trim }}"
      - "  Status: {{ status_02 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_02 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 03 - {{ req_03 }}:"
      - "  Task: {{ task_03_name | default('Task not recorded') }}"
      - "  Command: {{ task_03_cmd | default('N/A') }}"
      - "  Exit code: {{ task_03_rc | default(-1) }}"
      - "  Data: {{ data_03 | default('Data collection failed') | trim }}"
      - "  Status: {{ status_03 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_03 | default('Not evaluated') | trim }}"
      - ""
      - "========================================================"
      - "OVERALL REMEDIATION:"
      - "  Result: {{ cis_result | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_02 | default('Not evaluated') | trim }}"
      - "========================================================"
    tags: [execute]

  always:
  - name: "Restore - Check if audit rules backup exists"
    ansible.builtin.stat:
      path: "{{ backup_dir }}/50-perm_chng.rules.orig"
    register: _restore_rules_check
    failed_when: false
    tags: [restore]

  - name: "Restore - Overwrite audit rules with original"
    ansible.builtin.copy:
      src: "{{ backup_dir }}/50-perm_chng.rules.orig"
      dest: "{{ audit_rules_file }}"
      remote_src: true
    when: "_restore_rules_check.stat.exists | default(false)"
    failed_when: false
    tags: [restore]

  - name: "Restore - Reload audit rules after restore"
    ansible.builtin.shell: augenrules --load
    args:
      executable: /bin/bash
    when: "_restore_rules_check.stat.exists | default(false)"
    failed_when: false
    tags: [restore]

  - name: "Restore - Remove backup directory"
    ansible.builtin.file:
      path: "{{ backup_dir }}"
      state: absent
    failed_when: false
    tags: [restore]
