---
- name: Initialize meta data variables
  include_vars: cis_remediation_var_1_6_4.yml

- name: "Snapshot - Create backup directory"
  ansible.builtin.file:
    path: "{{ backup_dir }}"
    state: directory
    mode: '0700'
  tags: [snapshot]
- name: "Snapshot - Check if subpolicy file exists"
  ansible.builtin.stat:
    path: "{{ subpolicy_file }}"
  register: _snap_subpolicy_stat
  tags: [snapshot]
- name: "Snapshot - Backup subpolicy file if exists"
  ansible.builtin.copy:
    src: "{{ subpolicy_file }}"
    dest: "{{ backup_dir }}/NO-WEAKMAC.pmod.present"
    remote_src: true
  when: _snap_subpolicy_stat.stat.exists
  tags: [snapshot]
- name: "Snapshot - Mark subpolicy file as absent if not exists"
  ansible.builtin.copy:
    content: "absent"
    dest: "{{ backup_dir }}/NO-WEAKMAC.pmod.absent"
  when: not _snap_subpolicy_stat.stat.exists
  tags: [snapshot]

- block:
  - name: "Initialize data variables"
    set_fact:
      data_01: "Not collected yet"
      status_01: "ERROR"
      details_01: "Not evaluated"
      data_02: "Not collected yet"
      status_02: "ERROR"
      details_02: "Not evaluated"
      data_03: "Not collected yet"
      status_03: "ERROR"
      details_03: "Not evaluated"
      data_04: "Not collected yet"
      status_04: "ERROR"
      details_04: "Not evaluated"
      data_05: "Not collected yet"
      status_05: "ERROR"
      details_05: "Not evaluated"
      data_06: "Not collected yet"
      status_06: "ERROR"
      details_06: "Not evaluated"
      task_01_name: "Not executed"
      task_01_cmd: "N/A"
      task_01_rc: -1
    tags: [execute]

  - name: "Req 01 - Check if crypto-policies package is installed"
    ansible.builtin.shell: rpm -q crypto-policies
    args:
      executable: /bin/bash
    register: result_01
    failed_when: false
    tags: [execute]

  - name: "Store requirement 01 details"
    set_fact:
      task_01_name: "Check if crypto-policies package is installed"
      task_01_cmd: "rpm -q crypto-policies"
      task_01_rc: "{{ result_01.rc | default(-1) }}"
      data_01: "{{ result_01.stdout | default('') | trim }}"
      status_01: "{{ 'PASS' if result_01.rc | default(-1) == 0 else 'FAIL' }}"
      details_01: "{{ 'Package installed: ' + (result_01.stdout | default('') | trim) if result_01.rc | default(-1) == 0 else 'Package not installed' }}"
    tags: [execute]

  - name: "Req 02 - Create subpolicy file to disable weak MACs"
    ansible.builtin.shell: |
      printf '%s\n' '# This is a subpolicy to disable weak macs' 'mac = -*-64' > /etc/crypto-policies/policies/modules/NO-WEAKMAC.pmod
    args:
      executable: /bin/bash
    register: result_02
    failed_when: false
    when: result_01.rc | default(-1) == 0
    tags: [execute]

  - name: "Store requirement 02 details"
    set_fact:
      task_02_name: "Create subpolicy file to disable weak MACs"
      task_02_cmd: |
        printf '%s\\n' '# This is a subpolicy to disable weak macs' 'mac = -*-64' > /etc/crypto-policies/policies/modules/NO-WEAKMAC.pmod
      task_02_rc: "{{ result_02.rc | default(-1) }}"
      data_02: "{{ result_02.stdout | default('') | trim }}"
      status_02: "{{ 'PASS' if result_02.rc | default(-1) == 0 else ('SKIP' if result_01.rc | default(-1) != 0 else 'FAIL') }}"
      details_02: "{{ 'Subpolicy file created' if result_02.rc | default(-1) == 0 else ('Skipped: crypto-policies not installed' if result_01.rc | default(-1) != 0 else 'Failed to create subpolicy file') }}"
    tags: [execute]

  - name: "Req 03 - Apply system-wide crypto policy with NO-WEAKMAC"
    ansible.builtin.shell: update-crypto-policies --set DEFAULT:NO-WEAKMAC
    args:
      executable: /bin/bash
    register: result_03
    failed_when: false
    when: result_01.rc | default(-1) == 0
    tags: [execute]

  - name: "Store requirement 03 details"
    set_fact:
      task_03_name: "Apply system-wide crypto policy with NO-WEAKMAC"
      task_03_cmd: "update-crypto-policies --set DEFAULT:NO-WEAKMAC"
      task_03_rc: "{{ result_03.rc | default(-1) }}"
      data_03: "{{ result_03.stdout | default('') | trim }}"
      status_03: "{{ 'PASS' if result_03.rc | default(-1) == 0 else ('SKIP' if result_01.rc | default(-1) != 0 else 'FAIL') }}"
      details_03: "{{ 'Policy updated successfully' if result_03.rc | default(-1) == 0 else ('Skipped: crypto-policies not installed' if result_01.rc | default(-1) != 0 else 'Failed to update policy') }}"
    tags: [execute]

  - name: "Req 04 - Reboot the system to apply cryptographic settings"
    ansible.builtin.reboot:
      reboot_timeout: 180
    register: result_04
    failed_when: false
    when: result_01.rc | default(-1) == 0
    tags: [execute]

  - name: "Store requirement 04 details"
    set_fact:
      task_04_name: "Reboot the system to apply cryptographic settings"
      task_04_cmd: "reboot"
      task_04_rc: "{{ result_04.rc | default(-1) }}"
      data_04: "{{ result_04.msg | default('') | trim }}"
      status_04: "{{ 'PASS' if result_04.rc | default(-1) == 0 else ('SKIP' if result_01.rc | default(-1) != 0 else 'FAIL') }}"
      details_04: "{{ 'System rebooted successfully' if result_04.rc | default(-1) == 0 else ('Skipped: crypto-policies not installed' if result_01.rc | default(-1) != 0 else 'Reboot failed') }}"
    tags: [execute]

  - name: "Req 05 - Verify weak MACs are disabled in active crypto policy"
    ansible.builtin.shell: update-crypto-policies --show
    args:
      executable: /bin/bash
    register: result_05
    failed_when: false
    when: result_01.rc | default(-1) == 0
    tags: [execute]

  - name: "Store requirement 05 details"
    set_fact:
      task_05_name: "Verify weak MACs are disabled in active crypto policy"
      task_05_cmd: "update-crypto-policies --show"
      task_05_rc: "{{ result_05.rc | default(-1) }}"
      data_05: "{{ result_05.stdout | default('') | trim }}"
      status_05: "{{ 'PASS' if (result_05.stdout | default('') | trim is search('NO-WEAKMAC')) else ('SKIP' if result_01.rc | default(-1) != 0 else 'FAIL') }}"
      details_05: "{{ 'NO-WEAKMAC found in active policy' if (result_05.stdout | default('') | trim is search('NO-WEAKMAC')) else ('Skipped: crypto-policies not installed' if result_01.rc | default(-1) != 0 else 'NO-WEAKMAC not found in active policy') }}"
    tags: [execute]

  - name: "Req 06 - Store final remediation result"
    set_fact:
      cis_result: "{{ status_05 | default('ERROR') | trim }}"
      task_06_name: "Store final remediation result"
      task_06_cmd: "N/A"
      task_06_rc: 0
      data_06: "N/A"
      status_06: "{{ status_05 | default('ERROR') | trim }}"
      details_06: "{{ details_05 | default('Not evaluated') | trim }}"
    tags: [execute]

  - name: "Generate remediation report"
    debug:
      msg:
      - "REMEDIATION REPORT — CIS 1.6.4"
      - "Reference: CIS Benchmark checkpoint 1.6.4"
      - ""
      - "REQUIREMENT 01 - {{ req_01 }}:"
      - "  Task: {{ task_01_name | default('Not recorded') }}"
      - "  Command: {{ task_01_cmd | default('N/A') }}"
      - "  Exit code: {{ task_01_rc | default(-1) }}"
      - "  Data: {{ data_01 | default('') | trim }}"
      - "  Status: {{ status_01 | default('ERROR') | trim }}"
      - "  Details: {{ details_01 | default('') | trim }}"
      - ""
      - "REQUIREMENT 02 - {{ req_02 }}:"
      - "  Task: {{ task_02_name | default('Not recorded') }}"
      - "  Command: {{ task_02_cmd | default('N/A') }}"
      - "  Exit code: {{ task_02_rc | default(-1) }}"
      - "  Data: {{ data_02 | default('') | trim }}"
      - "  Status: {{ status_02 | default('ERROR') | trim }}"
      - "  Details: {{ details_02 | default('') | trim }}"
      - ""
      - "REQUIREMENT 03 - {{ req_03 }}:"
      - "  Task: {{ task_03_name | default('Not recorded') }}"
      - "  Command: {{ task_03_cmd | default('N/A') }}"
      - "  Exit code: {{ task_03_rc | default(-1) }}"
      - "  Data: {{ data_03 | default('') | trim }}"
      - "  Status: {{ status_03 | default('ERROR') | trim }}"
      - "  Details: {{ details_03 | default('') | trim }}"
      - ""
      - "REQUIREMENT 04 - {{ req_04 }}:"
      - "  Task: {{ task_04_name | default('Not recorded') }}"
      - "  Command: {{ task_04_cmd | default('N/A') }}"
      - "  Exit code: {{ task_04_rc | default(-1) }}"
      - "  Data: {{ data_04 | default('') | trim }}"
      - "  Status: {{ status_04 | default('ERROR') | trim }}"
      - "  Details: {{ details_04 | default('') | trim }}"
      - ""
      - "REQUIREMENT 05 - {{ req_05 }}:"
      - "  Task: {{ task_05_name | default('Not recorded') }}"
      - "  Command: {{ task_05_cmd | default('N/A') }}"
      - "  Exit code: {{ task_05_rc | default(-1) }}"
      - "  Data: {{ data_05 | default('') | trim }}"
      - "  Status: {{ status_05 | default('ERROR') | trim }}"
      - "  Details: {{ details_05 | default('') | trim }}"
      - ""
      - "REQUIREMENT 06 - {{ req_06 }}:"
      - "  Task: {{ task_06_name | default('Not recorded') }}"
      - "  Command: {{ task_06_cmd | default('N/A') }}"
      - "  Exit code: {{ task_06_rc | default(-1) }}"
      - "  Data: {{ data_06 | default('') | trim }}"
      - "  Status: {{ status_06 | default('ERROR') | trim }}"
      - "  Details: {{ details_06 | default('') | trim }}"
      - ""
      - "========================================================"
      - "OVERALL REMEDIATION:"
      - "  Result: {{ cis_result | default('ERROR') | trim }}"
      - "  Details: {{ details_06 | default('Not evaluated') | trim }}"
      - "========================================================"
    tags: [execute]

  always:
  - name: "Restore - Check if subpolicy backup exists"
    ansible.builtin.stat:
      path: "{{ backup_dir }}/NO-WEAKMAC.pmod.present"
    register: _restore_present
    failed_when: false
    tags: [restore]

  - name: "Restore - Restore subpolicy file from backup"
    ansible.builtin.copy:
      src: "{{ backup_dir }}/NO-WEAKMAC.pmod.present"
      dest: "{{ subpolicy_file }}"
      remote_src: true
    when: _restore_present.stat.exists | default(false)
    failed_when: false
    tags: [restore]

  - name: "Restore - Check if subpolicy absent marker exists"
    ansible.builtin.stat:
      path: "{{ backup_dir }}/NO-WEAKMAC.pmod.absent"
    register: _restore_absent
    failed_when: false
    tags: [restore]

  - name: "Restore - Delete subpolicy file if it was absent before"
    ansible.builtin.file:
      path: "{{ subpolicy_file }}"
      state: absent
    when: _restore_absent.stat.exists | default(false)
    failed_when: false
    tags: [restore]

  - name: "Restore - Remove backup directory"
    ansible.builtin.file:
      path: "{{ backup_dir }}"
      state: absent
    failed_when: false
    tags: [restore]
