---
- name: Initialize meta data variables
  include_vars: cis_remediation_var_5_3_3_3_1.yml

- name: "Snapshot - Create backup directory"
  ansible.builtin.file:
    path: "{{ backup_dir }}"
    state: directory
    mode: '0700'
  tags: [snapshot]
- name: "Snapshot - Check if pwhistory.conf exists"
  ansible.builtin.stat:
    path: "{{ pwhistory_conf }}"
  register: _snap_pwhistory_stat
  failed_when: false
  tags: [snapshot]
- name: "Snapshot - Backup pwhistory.conf if exists"
  ansible.builtin.copy:
    src: "{{ pwhistory_conf }}"
    dest: "{{ backup_dir }}/pwhistory.conf.backup"
    remote_src: true
  when: "_snap_pwhistory_stat.stat.exists | default(false)"
  failed_when: false
  tags: [snapshot]
- name: "Snapshot - Check if authselect directory exists"
  ansible.builtin.stat:
    path: "{{ authselect_dir }}"
  register: _snap_authselect_stat
  failed_when: false
  tags: [snapshot]
- name: "Snapshot - Backup authselect directory if exists"
  ansible.builtin.copy:
    src: "{{ authselect_dir }}/"
    dest: "{{ backup_dir }}/authselect/"
    remote_src: true
  when: "_snap_authselect_stat.stat.exists | default(false) and _snap_authselect_stat.stat.isdir | default(false)"
  failed_when: false
  tags: [snapshot]
- name: "Snapshot - Check if remediation script exists"
  ansible.builtin.stat:
    path: "/tmp/remediate_pwhistory_remember.sh"
  register: _snap_script_stat
  failed_when: false
  tags: [snapshot]
- name: "Snapshot - Record script existence marker"
  ansible.builtin.copy:
    content: "{{ _snap_script_stat.stat.exists | default(false) }}"
    dest: "{{ backup_dir }}/script_existed"
    force: false
  failed_when: false
  tags: [snapshot]

- block:
  - name: "Initialize data variables"
    ansible.builtin.set_fact:
      task_01_name: "Not executed"
      task_01_cmd: "N/A"
      task_01_rc: -1
      data_01: ""
      status_01: "UNKNOWN"
      details_01: ""
      task_02_name: "Not executed"
      task_02_cmd: "N/A"
      task_02_rc: -1
      data_02: ""
      status_02: "UNKNOWN"
      details_02: ""
      task_03_name: "Not executed"
      task_03_cmd: "N/A"
      task_03_rc: -1
      data_03: ""
      status_03: "UNKNOWN"
      details_03: ""
      task_04_name: "Not executed"
      task_04_cmd: "N/A"
      task_04_rc: -1
      data_04: ""
      status_04: "UNKNOWN"
      details_04: ""
    tags: [execute]

  - name: "Req 01 - Check if authselect package is installed"
    ansible.builtin.package_facts:
      manager: auto
    failed_when: false
    tags: [execute]

  - name: "Req 01 - Set authselect installed fact"
    ansible.builtin.set_fact:
      authselect_installed: "{{ 'authselect' in ansible_facts.packages }}"
      playbook_skipped: "{{ 'authselect' not in ansible_facts.packages }}"
    tags: [execute]

  - name: "Req 01 - Set remember parameter in pwhistory.conf"
    ansible.builtin.lineinfile:
      path: "{{ pwhistory_conf }}"
      regexp: |
        ^\s*remember\s*=
      line: "remember = {{ remember_value }}"
      create: true
      mode: '0644'
    register: result_01_lineinfile
    failed_when: false
    when: "not (playbook_skipped | default(false) | bool)"
    tags: [execute]

  - name: "Req 01 - Deploy remediation script to remove remember from PAM"
    ansible.builtin.copy:
      content: |
        #!/usr/bin/env bash
        profile_dir=$(authselect current -r 2>/dev/null | head -1)
        if [ -z "$profile_dir" ]; then
          echo "ERROR: could not determine authselect profile"
          exit 1
        fi
        for l_pam_file in system-auth password-auth; do
          l_authselect_file="/etc/authselect/$profile_dir/$l_pam_file"
          if [ -f "$l_authselect_file" ]; then
            sed -ri 's/(^\s*password\s+(requisite|required|sufficient)\s+pam_pwhistory\.so.*)(\s+ remember\s*=\s*\S+)(.*$)/\1\4/' "$l_authselect_file"
          fi
        done
        authselect apply-changes
      dest: "/tmp/remediate_pwhistory_remember.sh"
      mode: '0700'
    when: "not (playbook_skipped | default(false) | bool)"
    failed_when: false
    tags: [execute]

  - name: "Req 01 - Execute remediation script"
    ansible.builtin.shell: /bin/bash /tmp/remediate_pwhistory_remember.sh
    args:
      executable: /bin/bash
    register: result_01_script
    failed_when: false
    changed_when: false
    when: "not (playbook_skipped | default(false) | bool)"
    tags: [execute]

  - name: "Req 01 - Clean up remediation script"
    ansible.builtin.file:
      path: "/tmp/remediate_pwhistory_remember.sh"
      state: absent
    failed_when: false
    when: "not (playbook_skipped | default(false) | bool)"
    tags: [execute]

  - name: "Req 02 - Verify password history remember is configured"
    ansible.builtin.shell: |
      pwhistory_ok=0
      if grep -Pq '^\s*remember\s*=\s*{{ remember_value }}\s*$' {{ pwhistory_conf }}; then
        echo "pwhistory.conf: remember={{ remember_value }} - OK"
      else
        echo "pwhistory.conf: remember={{ remember_value }} - MISSING"
        pwhistory_ok=1
      fi
      for f in system-auth password-auth; do
        actual=$(readlink -f /etc/pam.d/$f 2>/dev/null || echo /etc/pam.d/$f)
        if [ -f "$actual" ] && grep -Pq '^\s*password\s+(requisite|required|sufficient)\s+pam_pwhistory\.so.*\s+remember\s*=' "$actual"; then
          echo "$f ($actual): remember argument still present - FAIL"
          pwhistory_ok=1
        else
          echo "$f ($actual): no remember argument - OK"
        fi
      done
      if [ "$pwhistory_ok" -eq 0 ]; then
        echo "COMPLIANT"
      else
        echo "NONCOMPLIANT"
      fi
    args:
      executable: /bin/bash
    register: result_02
    failed_when: false
    changed_when: false
    when: "not (playbook_skipped | default(false) | bool)"
    tags: [execute]

  - name: "Req 02 - Store verification details"
    ansible.builtin.set_fact:
      task_02_name: "Verify password history remember is configured"
      task_02_cmd: "grep remember in pwhistory.conf and check real PAM files for remember argument"
      task_02_rc: "{{ result_02.rc | default(-1) }}"
      data_02: "{{ result_02.stdout | default('') | trim }}"
      status_02: "{{ 'PASS' if ('COMPLIANT' in (result_02.stdout | default(''))) else 'FAIL' }}"
      details_02: "{{ 'System is compliant' if ('COMPLIANT' in (result_02.stdout | default(''))) else 'System is not compliant' }}"
    when: "not (playbook_skipped | default(false) | bool)"
    tags: [execute]

  - name: "Req 02 - Store skipped verification details"
    ansible.builtin.set_fact:
      task_02_name: "Verify password history remember is configured"
      task_02_cmd: "N/A"
      task_02_rc: -1
      data_02: "SKIP"
      status_02: "SKIP"
      details_02: "authselect package not installed"
    when: "playbook_skipped | default(false) | bool"
    tags: [execute]

  - name: "Req 01 - Store remediation details"
    ansible.builtin.set_fact:
      task_01_name: "Run remediation script and set remember in pwhistory.conf"
      task_01_cmd: "lineinfile + /tmp/remediate_pwhistory_remember.sh"
      task_01_rc: "{{ result_01_script.rc | default(0) }}"
      data_01: "{{ result_01_script.stdout | default('') | trim }}"
      status_01: "{{ status_02 | default('ERROR') | trim }}"
      details_01: >-
        {% if playbook_skipped | default(false) | bool %}
          authselect not installed - skipped
        {% elif (result_01_script.rc | default(-1) | int) != 0 and status_02 | default('') | trim == 'PASS' %}
          Remediation script exited with non-zero code {{ result_01_script.rc }} but verification passed
        {% elif (result_01_script.rc | default(-1) | int) != 0 %}
          Remediation script failed with exit code {{ result_01_script.rc }}
        {% else %}
          Remediation script executed successfully
        {% endif %}
    tags: [execute]

  - name: "Req 03a - Compute cis_result"
    ansible.builtin.set_fact:
      cis_result: "{{ 'PASS' if status_02 == 'PASS' else 'FAIL' if status_02 == 'FAIL' else 'SKIP' if status_02 == 'SKIP' else 'ERROR' }}"
    tags: [execute]

  - name: "Req 03b - Store cis_result details"
    ansible.builtin.set_fact:
      task_03_name: "Store final remediation result"
      task_03_cmd: "set_fact cis_result based on verification status"
      task_03_rc: 0
      data_03: "cis_result = {{ cis_result }}"
      status_03: "{{ 'PASS' if cis_result in ['PASS', 'FAIL', 'SKIP', 'ERROR'] else 'ERROR' }}"
      details_03: "cis_result stored successfully"
    tags: [execute]

  - name: "Req 04 - Generate remediation report"
    ansible.builtin.debug:
      msg:
      - "========================================================"
      - "REMEDIATION REPORT — CIS 5.3.3.3.1"
      - "Reference: CIS Benchmark checkpoint 5.3.3.3.1"
      - "========================================================"
      - ""
      - "REQUIREMENT 01 - {{ req_01 }}:"
      - "  Task: {{ task_01_name | default('Not recorded') }}"
      - "  Command: {{ task_01_cmd | default('N/A') }}"
      - "  Exit code: {{ task_01_rc | default(-1) }}"
      - "  Data: {{ data_01 | default('') | trim }}"
      - "  Status: {{ status_01 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_01 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 02 - {{ req_02 }}:"
      - "  Task: {{ task_02_name | default('Not recorded') }}"
      - "  Command: {{ task_02_cmd | default('N/A') }}"
      - "  Exit code: {{ task_02_rc | default(-1) }}"
      - "  Data: {{ data_02 | default('') | trim }}"
      - "  Status: {{ status_02 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_02 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 03 - {{ req_03 }}:"
      - "  Task: {{ task_03_name | default('Not recorded') }}"
      - "  Command: {{ task_03_cmd | default('N/A') }}"
      - "  Exit code: {{ task_03_rc | default(-1) }}"
      - "  Data: {{ data_03 | default('') | trim }}"
      - "  Status: {{ status_03 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_03 | default('Not evaluated') | trim }}"
      - ""
      - "========================================================"
      - "OVERALL REMEDIATION:"
      - "  Result: {{ cis_result | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_02 | default('Not evaluated') | trim }}"
      - "========================================================"
    tags: [execute]

  always:
  - name: "Restore - Check if pwhistory.conf backup exists"
    ansible.builtin.stat:
      path: "{{ backup_dir }}/pwhistory.conf.backup"
    register: _restore_pwhistory
    failed_when: false
    tags: [restore]

  - name: "Restore - Restore pwhistory.conf from backup"
    ansible.builtin.copy:
      src: "{{ backup_dir }}/pwhistory.conf.backup"
      dest: "{{ pwhistory_conf }}"
      remote_src: true
    when: "_restore_pwhistory.stat.exists | default(false)"
    failed_when: false
    tags: [restore]

  - name: "Restore - Check if authselect backup exists"
    ansible.builtin.stat:
      path: "{{ backup_dir }}/authselect"
    register: _restore_authselect
    failed_when: false
    tags: [restore]

  - name: "Restore - Restore authselect directory from backup"
    ansible.builtin.shell: |
      if [ -d "{{ backup_dir }}/authselect" ]; then
        rm -rf {{ authselect_dir }}/*
        cp -r "{{ backup_dir }}/authselect/"* {{ authselect_dir }}/
      fi
    args:
      executable: /bin/bash
    when: "_restore_authselect.stat.exists | default(false) and _restore_authselect.stat.isdir | default(false)"
    failed_when: false
    tags: [restore]

  - name: "Restore - Read script existence marker"
    ansible.builtin.slurp:
      src: "{{ backup_dir }}/script_existed"
    register: _restore_script_existed
    failed_when: false
    tags: [restore]

  - name: "Restore - Delete remediation script if it did not exist originally"
    ansible.builtin.file:
      path: "/tmp/remediate_pwhistory_remember.sh"
      state: absent
    when:
    - "_restore_script_existed.content is defined"
    - "(_restore_script_existed.content | b64decode | trim) == 'False'"
    failed_when: false
    tags: [restore]

  - name: "Restore - Remove backup directory"
    ansible.builtin.file:
      path: "{{ backup_dir }}"
      state: absent
    failed_when: false
    tags: [restore]
