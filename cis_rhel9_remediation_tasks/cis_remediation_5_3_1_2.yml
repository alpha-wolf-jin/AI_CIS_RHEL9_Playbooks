---
- name: Initialize meta data variables
  include_vars: cis_remediation_var_5_3_1_2.yml

- name: "Snapshot - Create backup directory"
  ansible.builtin.file:
    path: "{{ backup_dir }}"
    state: directory
    mode: '0700'
  tags: [snapshot]

- block:
  - name: "Initialize data variables"
    set_fact:
      data_01: "Not collected yet"
      status_01: "UNKNOWN"
      details_01: "Not evaluated"
      data_02: "Not collected yet"
      status_02: "UNKNOWN"
      details_02: "Not evaluated"
      data_03: "Not collected yet"
      status_03: "UNKNOWN"
      details_03: "Not evaluated"
      data_04: "Not collected yet"
      status_04: "UNKNOWN"
      details_04: "Not evaluated"
      data_05: "Not collected yet"
      status_05: "UNKNOWN"
      details_05: "Not evaluated"
      task_01_name: "Not executed"
      task_01_cmd: "N/A"
      task_01_rc: -1
      task_02_name: "Not executed"
      task_02_cmd: "N/A"
      task_02_rc: -1
      task_03_name: "Not executed"
      task_03_cmd: "N/A"
      task_03_rc: -1
      task_04_name: "Not executed"
      task_04_cmd: "N/A"
      task_04_rc: -1
      task_05_name: "Not executed"
      task_05_cmd: "N/A"
      task_05_rc: -1
    tags: [execute]

# Requirement 1 - Prerequisite check for dnf
  - name: "Req 01 - Check if dnf package manager is available"
    ansible.builtin.shell: which dnf
    args:
      executable: /bin/bash
    register: result_01
    failed_when: false
    changed_when: false
    tags: [execute]

  - name: "Store requirement 01 details"
    set_fact:
      task_01_name: "Check if dnf package manager is available"
      task_01_cmd: "which dnf"
      task_01_rc: "{{ result_01.rc | default(-1) }}"
      data_01: "{{ result_01.stdout | default('') | trim }}"
      status_01: "{{ ('PASS' if (result_01.rc | default(-1)) == 0 else 'FAIL') | trim }}"
      details_01: "{{ ('dnf found at ' + (result_01.stdout | default('') | trim)) if (result_01.rc | default(-1)) == 0 else 'dnf not found' }}"
    tags: [execute]

# Pre-check - authselect presence (do NOT install if absent)
  - name: "Pre-check - Check if authselect package is installed"
    ansible.builtin.shell: rpm -q authselect
    args:
      executable: /bin/bash
    register: authselect_installed
    failed_when: false
    changed_when: false
    when: "result_01 is defined and result_01.rc | default(-1) == 0"
    tags: [execute]

# Requirement 2 - Install authselect (only if already present)
  - name: "Req 02 - Install authselect package"
    ansible.builtin.dnf:
      name: "{{ package_name }}"
      state: present
    register: result_02
    failed_when: false
    when:
    - "result_01 is defined and result_01.rc | default(-1) == 0"
    - "authselect_installed.rc | default(1) == 0"
    tags: [execute]

  - name: "Store requirement 02 details"
    set_fact:
      task_02_name: "Install authselect package"
      task_02_cmd: "dnf install -y authselect"
      task_02_rc: "{{ (result_02 | default({})).rc | default(-1) }}"
      data_02: >-
        {%- if result_02 is defined and not result_02.skipped | default(false) -%}
          {{ result_02.results | default([]) | selectattr('name', 'equalto', package_name) | map(attribute='version') | first | default('') }}
        {%- else -%}
          
        {%- endif -%}
      status_02: >-
        {%- if not authselect_installed is defined or authselect_installed.rc | default(1) != 0 -%}
          SKIP
        {%- elif not result_02 is defined -%}
          SKIP
        {%- elif result_02.skipped | default(false) -%}
          SKIP
        {%- elif (result_02.rc | default(-1)) == 0 -%}
          PASS
        {%- else -%}
          FAIL
        {%- endif -%}
      details_02: >-
        {%- if not authselect_installed is defined or authselect_installed.rc | default(1) != 0 -%}
          Skipped - authselect is not installed on the system
        {%- elif not result_02 is defined -%}
          Prerequisite not met
        {%- elif result_02.skipped | default(false) -%}
          Skipped - dnf not available
        {%- elif (result_02.rc | default(-1)) == 0 -%}
          Installed successfully (or already present)
        {%- else -%}
          Installation failed
        {%- endif -%}
    tags: [execute]

# Requirement 3a – Retrieve current authselect version using rpm
  - name: "Req 03a - Retrieve current authselect version"
    ansible.builtin.shell: rpm -q --queryformat '%{VERSION}-%{RELEASE}' authselect
    args:
      executable: /bin/bash
    register: result_03a
    failed_when: false
    changed_when: false
    when:
    - "result_01 is defined and result_01.rc | default(-1) == 0"
    - "authselect_installed.rc | default(1) == 0"
    tags: [execute]

# Determine if upgrade is needed
  - name: "Determine if authselect upgrade is needed"
    set_fact:
      authselect_upgrade_needed: >-
        {%- if result_03a is defined and result_03a.stdout | default('') | trim != '' -%}
          {%- set ver = (result_03a.stdout | default('') | trim) -%}
          {{ ver is version(min_version_ver, '<') }}
        {%- else -%}
          False
        {%- endif -%}
    tags: [execute]

# Requirement 3 - Upgrade authselect if needed
  - name: "Req 03 - Upgrade authselect to latest version"
    ansible.builtin.dnf:
      name: "{{ package_name }}"
      state: latest
    register: result_03
    failed_when: false
    when:
    - "result_01 is defined and result_01.rc | default(-1) == 0"
    - "authselect_installed.rc | default(1) == 0"
    - "authselect_upgrade_needed | default(false) | bool"
    tags: [execute]

  - name: "Store requirement 03 details"
    set_fact:
      task_03_name: "Upgrade authselect to latest version"
      task_03_cmd: "dnf upgrade -y authselect"
      task_03_rc: "{{ (result_03 | default({})).rc | default(-1) }}"
      data_03: >-
        {%- if result_03 is defined and not result_03.skipped | default(false) -%}
          {{ result_03.results | default([]) | selectattr('name', 'equalto', package_name) | map(attribute='version') | first | default('') }}
        {%- else -%}
          
        {%- endif -%}
      status_03: >-
        {%- if not authselect_installed is defined or authselect_installed.rc | default(1) != 0 -%}
          SKIP
        {%- elif not result_03 is defined -%}
          SKIP
        {%- elif result_03.skipped | default(false) -%}
          SKIP
        {%- elif (result_03.rc | default(-1)) == 0 -%}
          PASS
        {%- else -%}
          FAIL
        {%- endif -%}
      details_03: >-
        {%- if not authselect_installed is defined or authselect_installed.rc | default(1) != 0 -%}
          Skipped - authselect not installed
        {%- elif not result_03 is defined -%}
          Prerequisite not met
        {%- elif result_03.skipped | default(false) -%}
          Skipped - dnf not available or version already >= {{ min_version_ver }}
        {%- elif (result_03.rc | default(-1)) == 0 -%}
          Upgraded successfully
        {%- else -%}
          Upgrade failed
        {%- endif -%}
    tags: [execute]

# Requirement 4 - Verify installed authselect version using rpm
  - name: "Req 04 - Verify installed authselect version"
    ansible.builtin.shell: rpm -q --queryformat '%{VERSION}-%{RELEASE}' authselect
    args:
      executable: /bin/bash
    register: result_04
    failed_when: false
    changed_when: false
    when:
    - "result_01 is defined and result_01.rc | default(-1) == 0"
    - "authselect_installed.rc | default(1) == 0"
    tags: [execute]

  - name: "Store requirement 04 details"
    set_fact:
      task_04_name: "Verify installed authselect version"
      task_04_cmd: "rpm -q --queryformat '%{VERSION}-%{RELEASE}' authselect"
      task_04_rc: "{{ (result_04 | default({})).rc | default(-1) }}"
      data_04: "{{ (result_04 | default({})).stdout | default('') | trim }}"
      status_04: >-
        {% if not authselect_installed is defined or authselect_installed.rc | default(1) != 0 %}
          SKIP
        {% elif not result_04 is defined or result_04.skipped | default(false) %}
          SKIP
        {% else %}
          {% set cv = (result_04.stdout | default('') | trim) %}
          {% if cv != '' and cv is version(min_version_ver, '>=') %}
            PASS
          {% else %}
            FAIL
          {% endif %}
        {% endif %}
      details_04: >-
        {% if not authselect_installed is defined or authselect_installed.rc | default(1) != 0 %}
          Verification skipped - authselect not installed
        {% elif not result_04 is defined or result_04.skipped | default(false) %}
          Verification skipped
        {% else %}
          {% set cv = (result_04.stdout | default('') | trim) %}
          {% if cv == '' %}
            authselect not installed or version unknown
          {% elif cv is version(min_version_ver, '>=') %}
            Version {{ cv }} meets minimum {{ min_version_ver }}
          {% else %}
            Version {{ cv }} is below {{ min_version_ver }}
          {% endif %}
        {% endif %}
    tags: [execute]

# Requirement 5 - Store final remediation result (cis_result)
  - name: "Req 05 - Store final remediation result"
    set_fact:
      cis_result: "{{ status_04 | default('ERROR') | trim }}"
    tags: [execute]

  - name: "Store requirement 05 details"
    set_fact:
      task_05_name: "Store final remediation result"
      task_05_cmd: "set_fact cis_result"
      task_05_rc: "0"
      data_05: "{{ cis_result | default('ERROR') | trim }}"
      status_05: "PASS"
      details_05: "CIS result stored as '{{ cis_result | default('ERROR') | trim }}'"
    tags: [execute]

# Generate remediation report
  - name: "Generate remediation report"
    debug:
      msg:
      - "========================================================"
      - "        REMEDIATION REPORT — CIS 5.3.1.2"
      - "========================================================"
      - "Reference: CIS Benchmark checkpoint 5.3.1.2"
      - ""
      - "REQUIREMENT 01 - {{ req_01 }}:"
      - "  Task: {{ task_01_name | default('Task not recorded') }}"
      - "  Command: {{ task_01_cmd | default('N/A') }}"
      - "  Exit code: {{ task_01_rc | default(-1) }}"
      - "  Data: {{ data_01 | default('') | trim }}"
      - "  Status: {{ status_01 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_01 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 02 - {{ req_02 }}:"
      - "  Task: {{ task_02_name | default('Task not recorded') }}"
      - "  Command: {{ task_02_cmd | default('N/A') }}"
      - "  Exit code: {{ task_02_rc | default(-1) }}"
      - "  Data: {{ data_02 | default('') | trim }}"
      - "  Status: {{ status_02 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_02 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 03 - {{ req_03 }}:"
      - "  Task: {{ task_03_name | default('Task not recorded') }}"
      - "  Command: {{ task_03_cmd | default('N/A') }}"
      - "  Exit code: {{ task_03_rc | default(-1) }}"
      - "  Data: {{ data_03 | default('') | trim }}"
      - "  Status: {{ status_03 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_03 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 04 - {{ req_04 }}:"
      - "  Task: {{ task_04_name | default('Task not recorded') }}"
      - "  Command: {{ task_04_cmd | default('N/A') }}"
      - "  Exit code: {{ task_04_rc | default(-1) }}"
      - "  Data: {{ data_04 | default('') | trim }}"
      - "  Status: {{ status_04 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_04 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 05 - {{ req_05 }}:"
      - "  Task: {{ task_05_name | default('Task not recorded') }}"
      - "  Command: {{ task_05_cmd | default('N/A') }}"
      - "  Exit code: {{ task_05_rc | default(-1) }}"
      - "  Data: {{ data_05 | default('') | trim }}"
      - "  Status: {{ status_05 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_05 | default('Not evaluated') | trim }}"
      - ""
      - "========================================================"
      - "OVERALL REMEDIATION:"
      - "  Result: {{ cis_result | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_04 | default('Not evaluated') | trim }}"
      - "========================================================"
    tags: [execute]

  always:
  - name: "Restore - Remove backup directory"
    ansible.builtin.file:
      path: "{{ backup_dir }}"
      state: absent
    failed_when: false
    tags: [restore]
