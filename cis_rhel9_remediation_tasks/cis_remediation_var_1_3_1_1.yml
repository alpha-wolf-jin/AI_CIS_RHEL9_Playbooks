playbook_name: "cis_1_3_1_1_selinux_installed"
backup_dir: "/var/log/ai-playbooks-backup/{{ playbook_name }}"
req_01: "Apply SELinux installation using command: `dnf install libselinux`. Expected result: SELinux package is installed successfully."
req_02: "Verify SELinux installation using command: `rpm -q libselinux`. Expected result: Package version is displayed, confirming SELinux is installed."
req_03: "Store the final remediation result in a variable named 'cis_result' using set_fact. Set cis_result to the overall remediation status (PASS/FAIL/SKIP/ERROR) derived from the last requirement's status variable."
