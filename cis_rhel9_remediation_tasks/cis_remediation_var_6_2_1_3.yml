playbook_name: "cis_6_2_1_3_journald_rotation"
backup_dir: "/var/log/ai-playbooks-backup/{{ playbook_name }}"
journald_conf: "/etc/systemd/journald.conf"
journald_params:
  - "SystemMaxUse=1G"
  - "SystemKeepFree=500M"
  - "RuntimeMaxUse=200M"
  - "RuntimeKeepFree=50M"
  - "MaxFileSec=1month"
req_01: "Ensure the systemd package is installed using command: dpkg -l systemd || rpm -q systemd. Expected result: systemd is installed."
req_02: "Create or edit the journald configuration file using command: sudo nano /etc/systemd/journald.conf or sudo nano /etc/systemd/journald.conf.d/custom.conf. Expected result: file is opened for editing."
req_03: "Set SystemMaxUse to 1G in the [Journal] section using command: echo 'SystemMaxUse=1G' | sudo tee -a /etc/systemd/journald.conf. Expected result: parameter is added."
req_04: "Set SystemKeepFree to 500M in the [Journal] section using command: echo 'SystemKeepFree=500M' | sudo tee -a /etc/systemd/journald.conf. Expected result: parameter is added."
req_05: "Set RuntimeMaxUse to 200M in the [Journal] section using command: echo 'RuntimeMaxUse=200M' | sudo tee -a /etc/systemd/journald.conf. Expected result: parameter is added."
req_06: "Set RuntimeKeepFree to 50M in the [Journal] section using command: echo 'RuntimeKeepFree=50M' | sudo tee -a /etc/systemd/journald.conf. Expected result: parameter is added."
req_07: "Set MaxFileSec to 1month in the [Journal] section using command: echo 'MaxFileSec=1month' | sudo tee -a /etc/systemd/journald.conf. Expected result: parameter is added."
req_08: "Restart the systemd-journald service to apply changes using command: sudo systemctl restart systemd-journald. Expected result: service restarts without errors."
req_09: "Verify the journald log rotation configuration using command: sudo journalctl --header | grep -E 'SystemMaxUse|SystemKeepFree|RuntimeMaxUse|RuntimeKeepFree|MaxFileSec'. Expected result: configured values are displayed."
