---
- name: Initialize meta data variables
  include_vars: cis_remediation_var_7_1_9.yml

- name: "Snapshot - Create backup directory"
  ansible.builtin.file:
    path: "{{ backup_dir }}"
    state: directory
    mode: '0700'
  tags: [snapshot]
- name: "Snapshot - Check if config file exists"
  ansible.builtin.stat:
    path: "{{ target_file }}"
  register: _snapshot_stat
  failed_when: false
  tags: [snapshot]
- name: "Snapshot - Backup config file if exists"
  ansible.builtin.copy:
    src: "{{ target_file }}"
    dest: "{{ backup_dir }}/{{ target_file | basename }}.backup"
    remote_src: true
  when: "_snapshot_stat.stat.exists | default(false)"
  failed_when: false
  tags: [snapshot]

- name: "Initialize data variables"
  set_fact:
    data_01: "Not collected yet"
    status_01: "UNKNOWN"
    details_01: "Not evaluated"
    data_02: "Not collected yet"
    status_02: "UNKNOWN"
    details_02: "Not evaluated"
    data_03: "Not collected yet"
    status_03: "UNKNOWN"
    details_03: "Not evaluated"
    data_04: "Not collected yet"
    status_04: "UNKNOWN"
    details_04: "Not evaluated"
    task_01_name: "Not executed"
    task_01_cmd: "N/A"
    task_01_rc: -1
    task_02_name: "Not executed"
    task_02_cmd: "N/A"
    task_02_rc: -1
    task_03_name: "Not executed"
    task_03_cmd: "N/A"
    task_03_rc: -1
    task_04_name: "Not executed"
    task_04_cmd: "N/A"
    task_04_rc: -1
  tags: [execute]
- block:
  - name: "Req 01 - Remove excess permissions on /etc/shells"
    ansible.builtin.file:
      path: "{{ target_file }}"
      mode: "{{ expected_mode }}"
    register: result_01
    failed_when: false
    tags: [execute]

  - name: "Store requirement 01 details"
    set_fact:
      task_01_name: "Remove excess permissions on /etc/shells"
      task_01_cmd: "chmod u-x,go-wx /etc/shells"
      task_01_rc: "{{ 0 if not (result_01.failed | default(false)) else 1 }}"
      data_01: "{{ result_01.mode | default('') | trim }}"
      status_01: "{{ 'PASS' if not (result_01.failed | default(false)) else 'FAIL' }}"
      details_01: "{{ 'Permissions set to ' + expected_mode if not (result_01.failed | default(false)) else 'Failed to set permissions: ' + (result_01.msg | default('unknown error')) }}"
    tags: [execute]

  - name: "Req 02 - Set owner and group to root on /etc/shells"
    ansible.builtin.file:
      path: "{{ target_file }}"
      owner: "{{ expected_owner }}"
      group: "{{ expected_group }}"
    register: result_02
    failed_when: false
    tags: [execute]

  - name: "Store requirement 02 details"
    set_fact:
      task_02_name: "Set owner and group to root on /etc/shells"
      task_02_cmd: "chown root:root /etc/shells"
      task_02_rc: "{{ 0 if not (result_02.failed | default(false)) else 1 }}"
      data_02: "{{ result_02.owner | default('') }}:{{ result_02.group | default('') }}"
      status_02: "{{ 'PASS' if not (result_02.failed | default(false)) else 'FAIL' }}"
      details_02: "{{ 'Owner and group set to root:root' if not (result_02.failed | default(false)) else 'Failed to set owner/group: ' + (result_02.msg | default('unknown error')) }}"
    tags: [execute]

  - name: "Req 03 - Verify permissions and ownership on /etc/shells"
    ansible.builtin.shell: "stat -c '%a %U:%G' {{ target_file }}"
    args:
      executable: /bin/bash
    register: result_03
    failed_when: false
    changed_when: false
    tags: [execute]

  - name: "Store requirement 03 details"
    set_fact:
      task_03_name: "Verify permissions and ownership on /etc/shells"
      task_03_cmd: "stat -c '%a %U:%G' /etc/shells"
      task_03_rc: "{{ result_03.rc | default(-1) }}"
      data_03: "{{ result_03.stdout | default('') | trim }}"
      status_03: "{{ 'PASS' if (result_03.stdout | default('') | trim) == '644 root:root' else 'FAIL' }}"
      details_03: "{{ 'Verification passed: ' + (result_03.stdout | default('') | trim) if (result_03.stdout | default('') | trim) == '644 root:root' else 'Verification failed: expected 644 root:root, got ' + (result_03.stdout | default('') | trim) }}"
    tags: [execute]

  - name: "Set overall cis_result"
    set_fact:
      cis_result: "{{ 'PASS' if status_03 | default('FAIL') == 'PASS' else ('FAIL' if status_03 == 'FAIL' else ('SKIP' if status_03 == 'SKIP' else 'ERROR')) }}"
    tags: [execute]

  - name: "Store requirement 04 details"
    set_fact:
      task_04_name: "Store overall remediation result in cis_result"
      task_04_cmd: "set_fact cis_result from status_03"
      task_04_rc: 0
      data_04: "{{ cis_result | default('') | trim }}"
      status_04: "PASS"
      details_04: "Overall remediation result stored: {{ cis_result }}"
    tags: [execute]

  - name: "Generate remediation report"
    debug:
      msg:
      - "========================================================"
      - "REMEDIATION REPORT — CIS 7.1.9"
      - "Reference: CIS Benchmark checkpoint 7.1.9"
      - "========================================================"
      - ""
      - "REQUIREMENT 01 - {{ req_01 }}:"
      - "  Task: {{ task_01_name | default('Task not recorded') }}"
      - "  Command: {{ task_01_cmd | default('N/A') }}"
      - "  Exit code: {{ task_01_rc | default(-1) }}"
      - "  Data: {{ data_01 | default('Data collection failed') | trim }}"
      - "  Status: {{ status_01 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_01 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 02 - {{ req_02 }}:"
      - "  Task: {{ task_02_name | default('Task not recorded') }}"
      - "  Command: {{ task_02_cmd | default('N/A') }}"
      - "  Exit code: {{ task_02_rc | default(-1) }}"
      - "  Data: {{ data_02 | default('Data collection failed') | trim }}"
      - "  Status: {{ status_02 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_02 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 03 - {{ req_03 }}:"
      - "  Task: {{ task_03_name | default('Task not recorded') }}"
      - "  Command: {{ task_03_cmd | default('N/A') }}"
      - "  Exit code: {{ task_03_rc | default(-1) }}"
      - "  Data: {{ data_03 | default('Data collection failed') | trim }}"
      - "  Status: {{ status_03 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_03 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 04 - {{ req_04 }}:"
      - "  Task: {{ task_04_name | default('Task not recorded') }}"
      - "  Command: {{ task_04_cmd | default('N/A') }}"
      - "  Exit code: {{ task_04_rc | default(-1) }}"
      - "  Data: {{ data_04 | default('Data collection failed') | trim }}"
      - "  Status: {{ status_04 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_04 | default('Not evaluated') | trim }}"
      - ""
      - "========================================================"
      - "OVERALL REMEDIATION:"
      - "  Result: {{ cis_result | default('ERROR') | trim }}"
      - "  Details: {{ details_03 | default('Not evaluated') | trim }}"
      - "========================================================"
    tags: [execute]

  always:
  - name: "Restore - Check if backup exists"
    ansible.builtin.stat:
      path: "{{ backup_dir }}/{{ target_file | basename }}.backup"
    register: _restore_stat
    failed_when: false
    tags: [restore]

  - name: "Restore - Overwrite with original"
    ansible.builtin.copy:
      src: "{{ backup_dir }}/{{ target_file | basename }}.backup"
      dest: "{{ target_file }}"
      remote_src: true
    when: "_restore_stat.stat.exists | default(false)"
    failed_when: false
    tags: [restore]

  - name: "Restore - Remove backup directory"
    ansible.builtin.file:
      path: "{{ backup_dir }}"
      state: absent
    failed_when: false
    tags: [restore]
