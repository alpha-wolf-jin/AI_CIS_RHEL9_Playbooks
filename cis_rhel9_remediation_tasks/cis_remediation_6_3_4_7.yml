---
- name: Initialize meta data variables
  include_vars: cis_remediation_var_6_3_4_7.yml

- name: "Snapshot - Create backup directory"
  ansible.builtin.file:
    path: "{{ backup_dir }}"
    state: directory
    mode: '0700'
  tags: [snapshot]
- name: "Snapshot - Check if /etc/audit directory exists"
  ansible.builtin.stat:
    path: /etc/audit
  register: _audit_dir_stat
  tags: [snapshot]
- name: "Snapshot - Backup audit configuration files if directory exists"
  ansible.builtin.shell: |
    mkdir -p "{{ backup_dir }}/etc/audit"
    find /etc/audit/ -type f \( -name '*.conf' -o -name '*.rules' \) -exec cp --parents {} "{{ backup_dir }}/" \;
  args:
    executable: /bin/bash
  when: _audit_dir_stat.stat.exists | default(false)
  failed_when: false
  tags: [snapshot]

- block:
  - name: "Initialize data variables"
    ansible.builtin.set_fact:
      data_01: "Not collected yet"
      status_01: "UNKNOWN"
      details_01: "Not evaluated"
      data_02: "Not collected yet"
      status_02: "UNKNOWN"
      details_02: "Not evaluated"
      data_03: "Not collected yet"
      status_03: "UNKNOWN"
      details_03: "Not evaluated"
      data_04: "Not collected yet"
      status_04: "UNKNOWN"
      details_04: "Not evaluated"
      task_01_name: "Not executed"
      task_01_cmd: "N/A"
      task_01_rc: -1
      task_02_name: "Not executed"
      task_02_cmd: "N/A"
      task_02_rc: -1
      task_03_name: "Not executed"
      task_03_cmd: "N/A"
      task_03_rc: -1
      task_04_name: "Not executed"
      task_04_cmd: "N/A"
      task_04_rc: -1
    tags: [execute]

  - name: "Check if auditd package is installed"
    ansible.builtin.package_facts:
      manager: auto
    failed_when: false
    tags: [execute]

  - name: "Req 01 - Check if find and chgrp commands are available"
    ansible.builtin.shell: "which find && which chgrp"
    args:
      executable: /bin/bash
    register: result_01
    failed_when: false
    changed_when: false
    when: "'audit' in ansible_facts.packages | default({})"
    tags: [execute]

  - name: "Store requirement 01 details"
    ansible.builtin.set_fact:
      task_01_name: "Check if find and chgrp commands are available"
      task_01_cmd: "which find && which chgrp"
      task_01_rc: "{{ result_01.rc | default(-1) }}"
      data_01: "{{ result_01.stdout | default('') | trim }}"
      status_01: "{{ 'PASS' if (result_01.rc | default(-1)) == 0 else 'FAIL' }}"
      details_01: "{{ 'Both executables found' if (result_01.rc | default(-1)) == 0 else 'Prerequisite check failed' }}"
    when: result_01 is defined
    tags: [execute]

  - name: "Req 02 - Change group owner to root for audit configuration files"
    ansible.builtin.shell: "find /etc/audit/ -type f \\( -name '*.conf' -o -name '*.rules' \\) ! -group root -exec chgrp root {} +"
    args:
      executable: /bin/bash
    register: result_02
    failed_when: false
    when:
    - "'audit' in ansible_facts.packages | default({})"
    - "(result_01.rc | default(-1)) == 0"
    tags: [execute]

  - name: "Store requirement 02 details"
    ansible.builtin.set_fact:
      task_02_name: "Change group owner to root for audit configuration files"
      task_02_cmd: |
        find /etc/audit/ -type f \( -name '*.conf' -o -name '*.rules' \) ! -group root -exec chgrp root {} +
      task_02_rc: "{{ result_02.rc | default(-1) }}"
      data_02: "{{ result_02.stdout | default('') | trim }}"
      status_02: "{{ 'PASS' if (result_02.rc | default(-1)) == 0 else 'FAIL' }}"
      details_02: "{{ 'Group owner changed to root' if (result_02.rc | default(-1)) == 0 else 'Failed to change group owner' }}"
    when: result_02 is defined
    tags: [execute]

  - name: "Req 03 - Verify audit configuration files group owner is root"
    ansible.builtin.shell: "find /etc/audit/ -type f \\( -name '*.conf' -o -name '*.rules' \\) -exec stat -c '%G' {} + | sort -u"
    args:
      executable: /bin/bash
    register: result_03
    failed_when: false
    changed_when: false
    when:
    - "'audit' in ansible_facts.packages | default({})"
    - "(result_01.rc | default(-1)) == 0"
    tags: [execute]

  - name: "Store requirement 03 details"
    ansible.builtin.set_fact:
      task_03_name: "Verify audit configuration files group owner is root"
      task_03_cmd: |
        find /etc/audit/ -type f \( -name '*.conf' -o -name '*.rules' \) -exec stat -c '%G' {} + | sort -u
      task_03_rc: "{{ result_03.rc | default(-1) }}"
      data_03: "{{ result_03.stdout | default('') | trim }}"
      status_03: "{{ 'PASS' if (result_03.stdout | default('') | trim) == 'root' else 'FAIL' }}"
      details_03: "{{ 'Group owner is root on all files' if (result_03.stdout | default('') | trim) == 'root' else 'Files found with non-root group owner: ' + (result_03.stdout | default('') | trim) }}"
    when: result_03 is defined
    tags: [execute]

  - name: "Req 04 - Store overall remediation result in cis_result"
    ansible.builtin.set_fact:
      cis_result: "{{ status_03 | default('ERROR') }}"
    when: status_03 is defined
    tags: [execute]

  - name: "Store requirement 04 details"
    ansible.builtin.set_fact:
      task_04_name: "Store overall remediation result in cis_result"
      task_04_cmd: "set_fact cis_result = status_03"
      task_04_rc: 0
      data_04: "{{ cis_result | default('ERROR') }}"
      status_04: "{{ cis_result | default('ERROR') | trim }}"
      details_04: "{{ 'cis_result set to ' + (cis_result | default('ERROR')) if cis_result is defined else 'FAIL: cis_result not set' }}"
    when: cis_result is defined
    tags: [execute]

  - name: "Generate remediation report"
    ansible.builtin.debug:
      msg:
      - "========================================================"
      - "        REMEDIATION REPORT — CIS 6.3.4.7"
      - "========================================================"
      - "Reference: CIS Benchmark checkpoint 6.3.4.7"
      - ""
      - "REQUIREMENT 01 - {{ req_01 }}:"
      - "  Task: {{ task_01_name | default('Task not recorded') }}"
      - "  Command: {{ task_01_cmd | default('N/A') }}"
      - "  Exit code: {{ task_01_rc | default(-1) }}"
      - "  Data: {{ data_01 | default('Data collection failed') | trim }}"
      - "  Status: {{ status_01 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_01 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 02 - {{ req_02 }}:"
      - "  Task: {{ task_02_name | default('Task not recorded') }}"
      - "  Command: {{ task_02_cmd | default('N/A') }}"
      - "  Exit code: {{ task_02_rc | default(-1) }}"
      - "  Data: {{ data_02 | default('Data collection failed') | trim }}"
      - "  Status: {{ status_02 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_02 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 03 - {{ req_03 }}:"
      - "  Task: {{ task_03_name | default('Task not recorded') }}"
      - "  Command: {{ task_03_cmd | default('N/A') }}"
      - "  Exit code: {{ task_03_rc | default(-1) }}"
      - "  Data: {{ data_03 | default('Data collection failed') | trim }}"
      - "  Status: {{ status_03 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_03 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 04 - {{ req_04 }}:"
      - "  Task: {{ task_04_name | default('Task not recorded') }}"
      - "  Command: {{ task_04_cmd | default('N/A') }}"
      - "  Exit code: {{ task_04_rc | default(-1) }}"
      - "  Data: {{ data_04 | default('Data collection failed') | trim }}"
      - "  Status: {{ status_04 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_04 | default('Not evaluated') | trim }}"
      - ""
      - "========================================================"
      - "OVERALL REMEDIATION:"
      - "  Result: {{ cis_result | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_03 | default('Not evaluated') | trim }}"
      - "========================================================"
    tags: [execute]

  always:
  - name: "Restore - Check if backup directory exists"
    ansible.builtin.stat:
      path: "{{ backup_dir }}/etc/audit"
    register: _restore_backup_stat
    failed_when: false
    tags: [restore]

  - name: "Restore - Restore audit configuration files from backup"
    ansible.builtin.shell: |
      if [ -d "{{ backup_dir }}/etc/audit" ]; then
        find "{{ backup_dir }}/etc/audit/" -type f \( -name '*.conf' -o -name '*.rules' \) | while read f; do
          dest="/${f#{{ backup_dir }}/}"
          cp "$f" "$dest"
        done
      fi
    args:
      executable: /bin/bash
    when: _restore_backup_stat.stat.exists | default(false)
    failed_when: false
    tags: [restore]

  - name: "Restore - Remove backup directory"
    ansible.builtin.file:
      path: "{{ backup_dir }}"
      state: absent
    failed_when: false
    tags: [restore]
