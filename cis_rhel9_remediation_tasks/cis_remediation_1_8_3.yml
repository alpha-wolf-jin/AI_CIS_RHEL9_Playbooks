---
- name: Initialize meta data variables
  include_vars: cis_remediation_var_1_8_3.yml

- name: "State Guard - Check for existing checkpoint flag"
  ansible.builtin.stat:
    path: "{{ state_guard_flag }}"
  register: _sg_flag
  tags: [snapshot]
- name: "State Guard - Restore profile from prior checkpoint"
  ansible.builtin.copy:
    src: "{{ state_guard_dir }}/gdm_profile.present"
    dest: "{{ profile_file }}"
    remote_src: true
  when: _sg_flag.stat.exists
  failed_when: false
  tags: [snapshot]
- name: "State Guard - Check profile absent marker (prior run)"
  ansible.builtin.stat:
    path: "{{ state_guard_dir }}/gdm_profile.absent"
  register: _sg_profile_absent_prev
  when: _sg_flag.stat.exists
  tags: [snapshot]
- name: "State Guard - Delete profile if absent marker exists"
  ansible.builtin.file:
    path: "{{ profile_file }}"
    state: absent
  when:
  - _sg_flag.stat.exists
  - _sg_profile_absent_prev.stat.exists | default(false)
  failed_when: false
  tags: [snapshot]
- name: "State Guard - Restore db directory from prior tar backup"
  ansible.builtin.shell: |
    if [ -f "{{ state_guard_dir }}/gdm_db_dir.tar.gz" ]; then
      rm -rf "{{ db_dir }}"
      mkdir -p "{{ db_dir }}"
      tar xzf "{{ state_guard_dir }}/gdm_db_dir.tar.gz" -C /
    fi
  args:
    executable: /bin/bash
  when: _sg_flag.stat.exists
  failed_when: false
  tags: [snapshot]
- name: "State Guard - Delete db directory if absent marker exists (prior run)"
  ansible.builtin.file:
    path: "{{ db_dir }}"
    state: absent
  when:
  - _sg_flag.stat.exists
  - _sg_db_dir_absent_prev.stat.exists | default(false)
  failed_when: false
  tags: [snapshot]
  vars:
    _sg_db_dir_absent_prev: "{{ lookup('ansible.builtin.stat', state_guard_dir + '/gdm_db_dir.absent') }}"

- name: "State Guard - Recompile dconf database after prior restoration"
  ansible.builtin.shell: dconf update
  args:
    executable: /bin/bash
  when: _sg_flag.stat.exists
  failed_when: false
  tags: [snapshot]
- name: "State Guard - Remove old checkpoint directory"
  ansible.builtin.file:
    path: "{{ state_guard_dir }}"
    state: absent
  when: _sg_flag.stat.exists
  tags: [snapshot]
- name: "State Guard - Create checkpoint directory"
  ansible.builtin.file:
    path: "{{ state_guard_dir }}"
    state: directory
    mode: '0700'
  tags: [snapshot]
- name: "State Guard - Check if profile file exists"
  ansible.builtin.stat:
    path: "{{ profile_file }}"
  register: _sg_profile_stat
  tags: [snapshot]
- name: "State Guard - Backup profile file (present)"
  ansible.builtin.copy:
    src: "{{ profile_file }}"
    dest: "{{ state_guard_dir }}/gdm_profile.present"
    remote_src: true
  when: _sg_profile_stat.stat.exists
  tags: [snapshot]
- name: "State Guard - Mark profile as absent (if not present)"
  ansible.builtin.copy:
    content: "absent"
    dest: "{{ state_guard_dir }}/gdm_profile.absent"
  when: not _sg_profile_stat.stat.exists
  tags: [snapshot]
- name: "State Guard - Check if gdm db directory exists"
  ansible.builtin.stat:
    path: "{{ db_dir }}"
  register: _sg_db_dir_stat
  tags: [snapshot]
- name: "State Guard - Backup gdm db directory (if exists)"
  ansible.builtin.shell: "tar czf {{ state_guard_dir }}/gdm_db_dir.tar.gz -C / etc/dconf/db/gdm.d"
  args:
    executable: /bin/bash
  when: _sg_db_dir_stat.stat.exists
  tags: [snapshot]
- name: "State Guard - Mark gdm db directory as absent (if not present)"
  ansible.builtin.copy:
    content: "absent"
    dest: "{{ state_guard_dir }}/gdm_db_dir.absent"
  when: not _sg_db_dir_stat.stat.exists
  tags: [snapshot]
- name: "State Guard - Create checkpoint flag"
  ansible.builtin.copy:
    content: "checkpoint"
    dest: "{{ state_guard_flag }}"
  tags: [snapshot]

- block:
# ======================== EXECUTE ========================
  - name: "Req 1 - Check if GDM package is installed"
    ansible.builtin.package_facts:
      manager: auto
    failed_when: false
    tags: [execute]

  - name: "Req 1 - Set package installed fact"
    ansible.builtin.set_fact:
      gdm_installed: "{{ 'gdm' in ansible_facts.packages }}"
      playbook_skipped: "{{ 'gdm' not in ansible_facts.packages }}"
    tags: [execute]

  - name: "Req 1 - Deploy remediation script"
    ansible.builtin.copy:
      content: "{{ script_content }}"
      dest: "/tmp/disable_user_list.sh"
      mode: '0700'
    when: not playbook_skipped
    failed_when: false
    tags: [execute]

  - name: "Req 1 - Execute remediation script"
    ansible.builtin.shell: "/bin/bash /tmp/disable_user_list.sh"
    args:
      executable: /bin/bash
    register: result_1
    failed_when: false
    when: not playbook_skipped
    tags: [execute]

  - name: "Store requirement 1 details"
    ansible.builtin.set_fact:
      task_1_name: "Run remediation script to enable disable-user-list"
      task_1_cmd: "/bin/bash /tmp/disable_user_list.sh"
      task_1_rc: "{{ result_1.rc | default(-1) }}"
      data_1: "{{ result_1.stdout | default('') | trim }}"
      status_1: "{{ ('APPLIED' if result_1.rc | default(-1) == 0 else 'FAILED') | trim }}"
      details_1: "{{ ('Script executed successfully' if result_1.rc | default(-1) == 0 else 'Script failed') | trim }}"
    when: not playbook_skipped
    tags: [execute]

  - name: "Req 2 - Verify disable-user-list is set to true"
    ansible.builtin.shell: "grep -Pi '^\\h*disable-user-list\\h*=\\h*true\\b' /etc/dconf/db/gdm.d/*"
    args:
      executable: /bin/bash
    register: result_2
    failed_when: false
    when: not playbook_skipped
    tags: [execute]

  - name: "Store requirement 2 details"
    ansible.builtin.set_fact:
      task_2_name: "Verify disable-user-list option is enabled"
      task_2_cmd: |
        grep -Pi '^\\h*disable-user-list\\h*=\\h*true\\b' /etc/dconf/db/gdm.d/*
      task_2_rc: "{{ result_2.rc | default(-1) }}"
      data_2: "{{ result_2.stdout | default('') | trim }}"
      status_2: "{{ ('APPLIED' if result_2.rc | default(-1) == 0 else 'FAILED') | trim }}"
      details_2: "{{ ('disable-user-list=true found' if result_2.rc | default(-1) == 0 else 'Not found') | trim }}"
    when: not playbook_skipped
    tags: [execute]

  - name: "Req 3 - Generate remediation report"
    ansible.builtin.debug:
      msg:
      - "========================================================"
      - "        REMEDIATION REPORT — CIS 1.8.3"
      - "========================================================"
      - "Reference: CIS Benchmark checkpoint 1.8.3"
      - ""
      - "REQUIREMENT 1 - Run the provided remediation script to enable disable-user-list option:"
      - "  Task: {{ task_1_name | default('Not executed') }}"
      - "  Command: {{ task_1_cmd | default('N/A') }}"
      - "  Exit code: {{ task_1_rc | default(-1) }}"
      - "  Data: {{ data_1 | default('') | trim }}"
      - "  Status: {{ status_1 | default('SKIPPED') | trim }}"
      - "  Details: {{ details_1 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 2 - VERIFY: disable-user-list option is enabled:"
      - "  Task: {{ task_2_name | default('Not executed') }}"
      - "  Command: {{ task_2_cmd | default('N/A') }}"
      - "  Exit code: {{ task_2_rc | default(-1) }}"
      - "  Data: {{ data_2 | default('') | trim }}"
      - "  Status: {{ status_2 | default('SKIPPED') | trim }}"
      - "  Details: {{ details_2 | default('Not evaluated') | trim }}"
      - ""
      - "========================================================"
      - "OVERALL REMEDIATION:"
      - "  Result: {{ (status_2 | default('SKIPPED') if playbook_skipped | default(false) else status_2 | default('FAILED')) | trim }}"
      - "  Details: {{ (details_2 | default('Not evaluated') if not playbook_skipped | default(true) else 'GDM not installed') | trim }}"
      - "========================================================"
    tags: [execute]

  always:
# ======================== RESTORE ========================
  - name: "State Guard Restore - Check if checkpoint exists"
    ansible.builtin.stat:
      path: "{{ state_guard_flag }}"
    register: _sg_restore_flag
    failed_when: false
    tags: [restore]

  - name: "State Guard Restore - Check profile backup"
    ansible.builtin.stat:
      path: "{{ state_guard_dir }}/gdm_profile.present"
    register: _sg_restore_profile_backup
    failed_when: false
    tags: [restore]

  - name: "State Guard Restore - Restore profile file from backup"
    ansible.builtin.copy:
      src: "{{ state_guard_dir }}/gdm_profile.present"
      dest: "{{ profile_file }}"
      remote_src: true
    when: _sg_restore_profile_backup.stat.exists | default(false)
    failed_when: false
    tags: [restore]

  - name: "State Guard Restore - Check profile absent marker"
    ansible.builtin.stat:
      path: "{{ state_guard_dir }}/gdm_profile.absent"
    register: _sg_restore_profile_absent
    failed_when: false
    tags: [restore]

  - name: "State Guard Restore - Remove profile if absent marker exists"
    ansible.builtin.file:
      path: "{{ profile_file }}"
      state: absent
    when: _sg_restore_profile_absent.stat.exists | default(false)
    failed_when: false
    tags: [restore]

  - name: "State Guard Restore - Check db dir tar backup"
    ansible.builtin.stat:
      path: "{{ state_guard_dir }}/gdm_db_dir.tar.gz"
    register: _sg_restore_db_tar
    failed_when: false
    tags: [restore]

  - name: "State Guard Restore - Restore db directory from tar"
    ansible.builtin.shell: |
      if [ -f "{{ state_guard_dir }}/gdm_db_dir.tar.gz" ]; then
        rm -rf "{{ db_dir }}"
        mkdir -p "{{ db_dir }}"
        tar xzf "{{ state_guard_dir }}/gdm_db_dir.tar.gz" -C /
      fi
    args:
      executable: /bin/bash
    when: _sg_restore_db_tar.stat.exists | default(false)
    failed_when: false
    tags: [restore]

  - name: "State Guard Restore - Check db dir absent marker"
    ansible.builtin.stat:
      path: "{{ state_guard_dir }}/gdm_db_dir.absent"
    register: _sg_restore_db_absent
    failed_when: false
    tags: [restore]

  - name: "State Guard Restore - Remove db directory if absent marker exists"
    ansible.builtin.file:
      path: "{{ db_dir }}"
      state: absent
    when: _sg_restore_db_absent.stat.exists | default(false)
    failed_when: false
    tags: [restore]

  - name: "State Guard Restore - Recompile dconf database"
    ansible.builtin.shell: dconf update
    args:
      executable: /bin/bash
    when: _sg_restore_flag.stat.exists | default(false)
    failed_when: false
    tags: [restore]

  - name: "State Guard Restore - Remove checkpoint directory"
    ansible.builtin.file:
      path: "{{ state_guard_dir }}"
      state: absent
    when: _sg_restore_flag.stat.exists | default(false)
    failed_when: false
    tags: [restore]
