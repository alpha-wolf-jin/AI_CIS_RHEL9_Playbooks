---
- name: Initialize meta data variables
  include_vars: cis_remediation_var_7_1_7.yml

- name: "Snapshot - Create backup directory"
  ansible.builtin.file:
    path: "{{ backup_dir }}"
    state: directory
    mode: '0700'
  tags: [snapshot]
- name: "Snapshot - Check if config file exists"
  ansible.builtin.stat:
    path: "{{ target_file }}"
  register: _backup_stat
  failed_when: false
  tags: [snapshot]
- name: "Snapshot - Backup config file if exists"
  ansible.builtin.copy:
    src: "{{ target_file }}"
    dest: "{{ backup_dir }}/gshadow.backup"
    remote_src: true
  when: "_backup_stat.stat.exists | default(false)"
  failed_when: false
  tags: [snapshot]

- block:
  - name: "Initialize data variables"
    ansible.builtin.set_fact:
      data_01: "Not collected yet"
      status_01: "UNKNOWN"
      details_01: "Not evaluated"
      data_02: "Not collected yet"
      status_02: "UNKNOWN"
      details_02: "Not evaluated"
      data_03: "Not collected yet"
      status_03: "UNKNOWN"
      details_03: "Not evaluated"
      data_04: "Not collected yet"
      status_04: "UNKNOWN"
      details_04: "Not evaluated"
      task_01_name: "Not executed"
      task_01_cmd: "N/A"
      task_01_rc: -1
      task_02_name: "Not executed"
      task_02_cmd: "N/A"
      task_02_rc: -1
      task_03_name: "Not executed"
      task_03_cmd: "N/A"
      task_03_rc: -1
      task_04_name: "Not executed"
      task_04_cmd: "N/A"
      task_04_rc: -1
    tags: [execute]

  - name: "Req 1 - Set ownership of /etc/gshadow to root:root"
    ansible.builtin.file:
      path: "{{ target_file }}"
      owner: "{{ expected_owner }}"
      group: "{{ expected_group }}"
    register: result_01
    failed_when: false
    tags: [execute]

  - name: "Store requirement 01 details"
    ansible.builtin.set_fact:
      task_01_name: "Set ownership of /etc/gshadow to root:root"
      task_01_cmd: "chown root:root /etc/gshadow"
      task_01_rc: "{{ 0 if not (result_01.failed | default(false)) else 1 }}"
      data_01: "{{ 'Ownership set to root:root' if not (result_01.failed | default(false)) else result_01.msg | default('Failed') }}"
      status_01: "{{ 'PASS' if not (result_01.failed | default(false)) else 'FAIL' }}"
      details_01: "{{ 'Ownership changed successfully' if not (result_01.failed | default(false)) else 'Failed to set ownership' }}"
    tags: [execute]

  - name: "Req 2 - Set permissions of /etc/gshadow to 0000"
    ansible.builtin.file:
      path: "{{ target_file }}"
      mode: "{{ expected_mode }}"
    register: result_02
    failed_when: false
    tags: [execute]

  - name: "Store requirement 02 details"
    ansible.builtin.set_fact:
      task_02_name: "Set permissions of /etc/gshadow to 0000"
      task_02_cmd: "chmod 0000 /etc/gshadow"
      task_02_rc: "{{ 0 if not (result_02.failed | default(false)) else 1 }}"
      data_02: "{{ 'Permissions set to 0000' if not (result_02.failed | default(false)) else result_02.msg | default('Failed') }}"
      status_02: "{{ 'PASS' if not (result_02.failed | default(false)) else 'FAIL' }}"
      details_02: "{{ 'Permissions changed successfully' if not (result_02.failed | default(false)) else 'Failed to set permissions' }}"
    tags: [execute]

  - name: "Req 3 - Verify ownership and permissions of /etc/gshadow"
    ansible.builtin.shell: "stat -c '%U:%G %a' {{ target_file }}"
    args:
      executable: /bin/bash
    register: result_03
    failed_when: false
    changed_when: false
    tags: [execute]

  - name: "Store requirement 03 details"
    ansible.builtin.set_fact:
      task_03_name: "Verify ownership and permissions of /etc/gshadow"
      task_03_cmd: "stat -c '%U:%G %a' /etc/gshadow"
      task_03_rc: "{{ result_03.rc | default(-1) }}"
      data_03: "{{ result_03.stdout | default('') | trim }}"
      status_03: "{{ 'PASS' if (result_03.stdout | default('') | trim) == 'root:root 0' else 'FAIL' }}"
      details_03: "{{ 'Verification passed - root:root 0' if (result_03.stdout | default('') | trim) == 'root:root 0' else 'Verification failed - expected root:root 0, got ' ~ (result_03.stdout | default('') | trim) }}"
    tags: [execute]

  - name: "Req 4 - Store overall remediation result"
    ansible.builtin.set_fact:
      cis_result: "{{ 'PASS' if status_03 | trim == 'PASS' else ('FAIL' if status_03 | trim == 'FAIL' else 'ERROR') }}"
    tags: [execute]

  - name: "Store requirement 04 details"
    ansible.builtin.set_fact:
      task_04_name: "Store overall remediation result"
      task_04_cmd: "set_fact cis_result from status_03"
      task_04_rc: 0
      data_04: "{{ cis_result }}"
      status_04: "PASS"
      details_04: "cis_result set to {{ cis_result }}"
    tags: [execute]

  - name: "Generate remediation report"
    ansible.builtin.debug:
      msg:
      - "========================================================"
      - "REMEDIATION REPORT — CIS 7.1.7"
      - "Reference: CIS Benchmark checkpoint 7.1.7"
      - "========================================================"
      - ""
      - "REQUIREMENT 01 - {{ req_01 }}:"
      - "  Task: {{ task_01_name | default('Task not recorded') }}"
      - "  Command: {{ task_01_cmd | default('N/A') }}"
      - "  Exit code: {{ task_01_rc | default(-1) }}"
      - "  Data: {{ data_01 | default('Data collection failed') | trim }}"
      - "  Status: {{ status_01 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_01 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 02 - {{ req_02 }}:"
      - "  Task: {{ task_02_name | default('Task not recorded') }}"
      - "  Command: {{ task_02_cmd | default('N/A') }}"
      - "  Exit code: {{ task_02_rc | default(-1) }}"
      - "  Data: {{ data_02 | default('Data collection failed') | trim }}"
      - "  Status: {{ status_02 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_02 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 03 - {{ req_03 }}:"
      - "  Task: {{ task_03_name | default('Task not recorded') }}"
      - "  Command: {{ task_03_cmd | default('N/A') }}"
      - "  Exit code: {{ task_03_rc | default(-1) }}"
      - "  Data: {{ data_03 | default('Data collection failed') | trim }}"
      - "  Status: {{ status_03 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_03 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 04 - {{ req_04 }}:"
      - "  Task: {{ task_04_name | default('Task not recorded') }}"
      - "  Command: {{ task_04_cmd | default('N/A') }}"
      - "  Exit code: {{ task_04_rc | default(-1) }}"
      - "  Data: {{ data_04 | default('Data collection failed') | trim }}"
      - "  Status: {{ status_04 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_04 | default('Not evaluated') | trim }}"
      - ""
      - "========================================================"
      - "OVERALL REMEDIATION:"
      - "  Result: {{ cis_result }}"
      - "  Details: {{ details_04 | default('Not evaluated') | trim }}"
      - "========================================================"
    tags: [execute]

  always:
  - name: "Restore - Check if backup exists"
    ansible.builtin.stat:
      path: "{{ backup_dir }}/gshadow.backup"
    register: _restore_stat
    failed_when: false
    tags: [restore]

  - name: "Restore - Overwrite with original"
    ansible.builtin.copy:
      src: "{{ backup_dir }}/gshadow.backup"
      dest: "{{ target_file }}"
      remote_src: true
    when: "_restore_stat.stat.exists | default(false)"
    failed_when: false
    tags: [restore]

  - name: "Restore - Remove backup directory"
    ansible.builtin.file:
      path: "{{ backup_dir }}"
      state: absent
    failed_when: false
    tags: [restore]
