playbook_name: "cis_1_4_2"
backup_dir: "/var/log/ai-playbooks-backup/{{ playbook_name }}"
req_01: "Apply prerequisite check: verify that the system uses either UEFI or BIOS boot mode. Expected result: identification of boot mode."
req_02: "Apply UEFI boot configuration: edit /etc/fstab to add fmask=0077,uid=0,gid=0 options to the /boot/efi mount entry using command: `echo '<device> /boot/efi vfat defaults,umask=0027,fmask=0077,uid=0,gid=0 0 0' >> /etc/fstab`. Expected result: fstab entry updated with secure mount options."
req_03: "Apply BIOS boot configuration: set ownership and permissions on /boot/grub2/grub.cfg using command: `[ -f /boot/grub2/grub.cfg ] && chown root:root /boot/grub2/grub.cfg && chmod u-x,go-rwx /boot/grub2/grub.cfg`. Expected result: file owned by root:root with permissions 0400."
req_04: "Apply BIOS boot configuration: set ownership and permissions on /boot/grub2/grubenv using command: `[ -f /boot/grub2/grubenv ] && chown root:root /boot/grub2/grubenv && chmod u-x,go-rwx /boot/grub2/grubenv`. Expected result: file owned by root:root with permissions 0400."
req_05: "Apply BIOS boot configuration: set ownership and permissions on /boot/grub2/user.cfg using command: `[ -f /boot/grub2/user.cfg ] && chown root:root /boot/grub2/user.cfg && chmod u-x,go-rwx /boot/grub2/user.cfg`. Expected result: file owned by root:root with permissions 0400."
req_06: "Verify UEFI configuration: check that /etc/fstab contains fmask=0077,uid=0,gid=0 for the /boot/efi mount using command: `grep -E 'fmask=0077,uid=0,gid=0' /etc/fstab`. Expected result: matching line present."
req_07: "Verify BIOS configuration: check ownership and permissions of /boot/grub2/grub.cfg using command: `stat -c '%U:%G %a' /boot/grub2/grub.cfg`. Expected result: root:root 400."
req_08: "Verify BIOS configuration: check ownership and permissions of /boot/grub2/grubenv using command: `stat -c '%U:%G %a' /boot/grub2/grubenv`. Expected result: root:root 400."
req_09: "Verify BIOS configuration: check ownership and permissions of /boot/grub2/user.cfg using command: `stat -c '%U:%G %a' /boot/grub2/user.cfg`. Expected result: root:root 400."
req_10: "Check if GRUB2 bootloader is installed; if not, skip BIOS remediation. Expected result: GRUB2 installation status determined."
