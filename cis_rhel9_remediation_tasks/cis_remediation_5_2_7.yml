---
- name: Initialize meta data variables
  include_vars: cis_remediation_var_5_2_7.yml

- name: "Snapshot - Create backup directory"
  ansible.builtin.file:
    path: "{{ backup_dir }}"
    state: directory
    mode: '0700'
  tags: [snapshot]
- name: "Snapshot - Check if config file exists"
  ansible.builtin.stat:
    path: "{{ su_pam_file }}"
  register: _snap_su_stat
  tags: [snapshot]
- name: "Snapshot - Backup config file if exists"
  ansible.builtin.copy:
    src: "{{ su_pam_file }}"
    dest: "{{ backup_dir }}/su.present"
    remote_src: true
  when: "_snap_su_stat.stat.exists"
  tags: [snapshot]

- name: "Initialize data variables"
  set_fact:
    data_01: "Not collected yet"
    status_01: "UNKNOWN"
    details_01: "Not evaluated"
    data_02: "Not collected yet"
    status_02: "UNKNOWN"
    details_02: "Not evaluated"
    data_03: "Not collected yet"
    status_03: "UNKNOWN"
    details_03: "Not evaluated"
    task_01_name: "Not executed"
    task_01_cmd: "N/A"
    task_01_rc: -1
    task_02_name: "Not executed"
    task_02_cmd: "N/A"
    task_02_rc: -1
    task_03_name: "Not executed"
    task_03_cmd: "N/A"
    task_03_rc: -1

- block:
  - name: "Req 01 - Create empty group for su restriction"
    ansible.builtin.group:
      name: "{{ su_group }}"
      state: present
    register: result_01
    failed_when: false
    tags: [execute]

  - name: "Store requirement 01 details"
    set_fact:
      task_01_name: "Create empty group for su restriction"
      task_01_cmd: "groupadd {{ su_group }}"
      task_01_rc: "{{ 0 if result_01.state | default('') == 'present' else -1 }}"
      data_01: "{{ result_01.state | default('') | trim }}"
      status_01: "{{ 'APPLIED' if result_01.state | default('') == 'present' else 'FAILED' }}"
      details_01: "{{ 'Group created successfully' if result_01.state | default('') == 'present' else 'Failed to create group' }}"
    tags: [execute]

  - name: "Req 02 - Add pam_wheel.so configuration to /etc/pam.d/su"
    ansible.builtin.lineinfile:
      path: "{{ su_pam_file }}"
      line: "{{ pam_line }}"
      state: present
      insertafter: EOF
    register: result_02
    failed_when: false
    tags: [execute]

  - name: "Store requirement 02 details"
    set_fact:
      task_02_name: "Add pam_wheel.so configuration to /etc/pam.d/su"
      task_02_cmd: "lineinfile: add '{{ pam_line }}' to {{ su_pam_file }}"
      task_02_rc: "{{ 0 if result_02 is not failed else -1 }}"
      data_02: "{{ result_02.msg | default('') | trim }}"
      status_02: "{{ 'APPLIED' if result_02 is not failed else 'FAILED' }}"
      details_02: "{{ 'Line added successfully' if result_02 is not failed else 'Failed to add line' }}"
    tags: [execute]

  - name: "Req 03 - Verify su command is restricted to the empty group"
    ansible.builtin.shell: |
      grep 'pam_wheel.so' {{ su_pam_file }} 2>/dev/null || echo "NOT_FOUND"
    args:
      executable: /bin/bash
    register: result_03
    failed_when: false
    changed_when: false
    tags: [execute]

  - name: "Store requirement 03 details"
    set_fact:
      task_03_name: "Verify su command is restricted to the empty group"
      task_03_cmd: "grep 'pam_wheel.so' {{ su_pam_file }}"
      task_03_rc: "{{ result_03.rc | default(-1) }}"
      data_03: "{{ result_03.stdout | default('') | trim }}"
      status_03: "{{ 'APPLIED' if (pam_line in (result_03.stdout | default(''))) else 'FAILED' }}"
      details_03: "{{ 'Verification passed' if (pam_line in (result_03.stdout | default(''))) else 'Verification failed' }}"
    tags: [execute]

  - name: "Set overall remediation result"
    set_fact:
      cis_result: "{{ 'PASS' if status_03 == 'APPLIED' else 'FAIL' }}"
    tags: [execute]

  - name: "Generate remediation report"
    debug:
      msg:
      - "========================================================"
      - "        REMEDIATION REPORT — CIS 5.2.7"
      - "========================================================"
      - "Reference: CIS Benchmark checkpoint 5.2.7"
      - ""
      - "REQUIREMENT 01 - {{ req_01 }}:"
      - "  Task: {{ task_01_name | default('Task not recorded') }}"
      - "  Command: {{ task_01_cmd | default('N/A') }}"
      - "  Exit code: {{ task_01_rc | default(-1) }}"
      - "  Data: {{ data_01 | default('Data collection failed') | trim }}"
      - "  Status: {{ status_01 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_01 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 02 - {{ req_02 }}:"
      - "  Task: {{ task_02_name | default('Task not recorded') }}"
      - "  Command: {{ task_02_cmd | default('N/A') }}"
      - "  Exit code: {{ task_02_rc | default(-1) }}"
      - "  Data: {{ data_02 | default('Data collection failed') | trim }}"
      - "  Status: {{ status_02 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_02 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 03 - {{ req_03 }}:"
      - "  Task: {{ task_03_name | default('Task not recorded') }}"
      - "  Command: {{ task_03_cmd | default('N/A') }}"
      - "  Exit code: {{ task_03_rc | default(-1) }}"
      - "  Data: {{ data_03 | default('Data collection failed') | trim }}"
      - "  Status: {{ status_03 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_03 | default('Not evaluated') | trim }}"
      - ""
      - "========================================================"
      - "OVERALL REMEDIATION:"
      - "  Result: {{ cis_result | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_03 | default('Not evaluated') | trim }}"
      - "========================================================"
    tags: [execute]

  always:
  - name: "Restore - Check if backup exists"
    ansible.builtin.stat:
      path: "{{ backup_dir }}/su.present"
    register: _restore_su_backup
    failed_when: false
    tags: [restore]

  - name: "Restore - Overwrite with original"
    ansible.builtin.copy:
      src: "{{ backup_dir }}/su.present"
      dest: "{{ su_pam_file }}"
      remote_src: true
    when:
    - "_restore_su_backup.stat.exists | default(false)"
    - "rollback | default(false) | bool"
    failed_when: false
    tags: [restore]

  - name: "Restore - Remove backup directory"
    ansible.builtin.file:
      path: "{{ backup_dir }}"
      state: absent
    when: "rollback | default(false) | bool"
    failed_when: false
    tags: [restore]
