---
- name: Initialize meta data variables
  include_vars: cis_remediation_var_1_8_9.yml

- name: "Snapshot - Create backup directory"
  ansible.builtin.file:
    path: "{{ backup_dir }}"
    state: directory
    mode: '0700'
  tags: [snapshot]
- name: "Snapshot - Check if /etc/dconf/db exists"
  ansible.builtin.stat:
    path: /etc/dconf/db
  register: dconf_db_stat
  tags: [snapshot]
- name: "Snapshot - Backup /etc/dconf/db"
  shell: "tar czf {{ backup_dir }}/dconf_db.tar.gz -C /etc dconf/db"
  args:
    executable: /bin/bash
  when: dconf_db_stat.stat.exists
  tags: [snapshot]

- block:
  - name: "Gather installed package facts"
    ansible.builtin.package_facts:
      manager: auto
    tags: [execute]

  - name: "Req 1 - Determine if GDM is installed"
    ansible.builtin.set_fact:
      gdm_installed: "{{ 'gdm' in ansible_facts.packages or 'gdm3' in ansible_facts.packages }}"
    tags: [execute]

  - name: "Req 1 - Create remediation script"
    ansible.builtin.copy:
      dest: /tmp/remediate_1_8_9.sh
      content: |
        {% raw %}
        #!/usr/bin/env bash
        {
           # Check if GNOME Desktop Manager is installed.  If package isn't installed, recommendation is Not Applicable\n
           # determine system's package manager
           l_pkgoutput=""
           if command -v dpkg-query > /dev/null 2>&1; then
              l_pq="dpkg-query -W"
           elif command -v rpm > /dev/null 2>&1; then
              l_pq="rpm -q"
           fi
           # Check if GDM is installed
           l_pcl="gdm gdm3" # Space separated list of packages to check
           for l_pn in $l_pcl; do
              $l_pq "$l_pn" > /dev/null 2>&1 && l_pkgoutput="y" && echo -e "\n - Package: \"$l_pn\" exists on the system\n - remediating configuration if needed"
           done
           # Check configuration (If applicable)
           if [ -n "$l_pkgoutput" ]; then
              # Look for autorun to determine profile in use, needed for remaining tests
              l_kfd="/etc/dconf/db/$(grep -Psril '^\h*autorun-never\b' /etc/dconf/db/*/ | awk -F'/' '{split($(NF-1),a,".");print a[1]}').d" #set directory of key file to be locked
              if [ -d "$l_kfd" ]; then # If key file directory doesn't exist, options can't be locked
                 if grep -Priq '^\h*\/org/gnome\/desktop\/media-handling\/autorun-never\b' "$l_kfd"; then
                    echo " - \"autorun-never\" is locked in \"$(grep -Pril '^\h*\/org/gnome\/desktop\/media-handling\/autorun-never\b' "$l_kfd")\""
                 else
                    echo " - creating entry to lock \"autorun-never\""
                    [ ! -d "$l_kfd"/locks ] && echo "creating directory $l_kfd/locks" && mkdir "$l_kfd"/locks
                    {
                       echo -e '\n# Lock desktop media-handling autorun-never setting'
                       echo '/org/gnome/desktop/media-handling/autorun-never'
                    } >> "$l_kfd"/locks/00-media-autorun
                 fi
              else
                 echo -e " - \"autorun-never\" is not set so it can not be locked\n - Please follow Recommendation \"Ensure GDM autorun-never is enabled\" and follow this Recommendation again"
              fi
              # update dconf database
              dconf update
           else
              echo -e " - GNOME Desktop Manager package is not installed on the system\n  - Recommendation is not applicable"
           fi
        }
        {% endraw %}
      mode: '0700'
    when: gdm_installed | default(false) | bool
    failed_when: false
    tags: [execute]

  - name: "Req 1 - Run remediation script"
    ansible.builtin.shell: "/bin/bash /tmp/remediate_1_8_9.sh"
    args:
      executable: /bin/bash
    register: remediate_result
    failed_when: false
    when: gdm_installed | default(false) | bool
    tags: [execute]

  - name: "Req 1 - Set remediation status"
    ansible.builtin.set_fact:
      task_01_name: "Run remediation script for CIS 1.8.9"
      task_01_cmd: "/bin/bash /tmp/remediate_1_8_9.sh"
      task_01_rc: "{{ remediate_result.rc if gdm_installed | default(false) else -1 }}"
      data_01: "{{ remediate_result.stdout | default('') | trim if gdm_installed | default(false) else 'N/A' }}"
      status_01: "{{ 'SKIPPED' if not (gdm_installed | default(false)) else ('APPLIED' if remediate_result.rc == 0 else 'FAILED') }}"
      details_01: "{{ 'GDM not installed - remediation skipped' if not (gdm_installed | default(false)) else ('Script executed successfully' if remediate_result.rc == 0 else 'Script failed with exit code ' ~ remediate_result.rc) }}"
    tags: [execute]

  - name: "Req 2 - Verify autorun-never lock"
    ansible.builtin.shell: |
      set -e
      PROFILE=$(grep -Psril '^\h*autorun-never\b' /etc/dconf/db/*/ 2>/dev/null | head -1)
      if [ -z "$PROFILE" ]; then
        echo "FAILED: autorun-never setting not found"
        exit 1
      fi
      PROFILE_DIR=$(dirname "$PROFILE")
      LOCK_FILE="$PROFILE_DIR/locks/00-media-autorun"
      if [ -f "$LOCK_FILE" ] && grep -q '/org/gnome/desktop/media-handling/autorun-never' "$LOCK_FILE"; then
        echo "PASSED: autorun-never is locked"
        exit 0
      else
        echo "FAILED: autorun-never not locked correctly"
        exit 1
      fi
    args:
      executable: /bin/bash
    register: verify_result
    failed_when: false
    changed_when: false
    when: gdm_installed | default(false) | bool
    tags: [execute]

  - name: "Req 2 - Set verification status"
    ansible.builtin.set_fact:
      task_02_name: "Verify autorun-never is locked"
      task_02_cmd: "grep -Psril ... (dconf lock verification)"
      task_02_rc: "{{ verify_result.rc if gdm_installed | default(false) and verify_result.rc is defined else -1 }}"
      data_02: "{{ verify_result.stdout | default('') | trim if (gdm_installed | default(false)) and (verify_result.stdout is defined) else 'N/A' }}"
      status_02: "{{ 'SKIPPED' if not (gdm_installed | default(false)) else ('APPLIED' if verify_result.rc == 0 else 'FAILED') }}"
      details_02: "{{ 'GDM not installed - verification skipped' if not (gdm_installed | default(false)) else (verify_result.stdout | default('') | trim if verify_result.rc == 0 else 'Verification failed: ' ~ (verify_result.stderr | default('') | trim)) }}"
    tags: [execute]

  - name: "Generate remediation report"
    ansible.builtin.debug:
      msg:
      - "========================================================"
      - "           REMEDIATION REPORT — CIS 1.8.9"
      - "========================================================"
      - "Reference: CIS Benchmark checkpoint 1.8.9"
      - ""
      - "REQUIREMENT 01 - {{ req_01 }}:"
      - "  Task: {{ task_01_name | default('N/A') }}"
      - "  Command: {{ task_01_cmd | default('N/A') }}"
      - "  Exit code: {{ task_01_rc | default(-1) }}"
      - "  Data: {{ data_01 | default('') | trim }}"
      - "  Status: {{ status_01 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_01 | default('') | trim }}"
      - ""
      - "REQUIREMENT 02 - {{ req_02 }}:"
      - "  Task: {{ task_02_name | default('N/A') }}"
      - "  Command: {{ task_02_cmd | default('N/A') }}"
      - "  Exit code: {{ task_02_rc | default(-1) }}"
      - "  Data: {{ data_02 | default('') | trim }}"
      - "  Status: {{ status_02 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_02 | default('') | trim }}"
      - ""
      - "========================================================"
      - "  OVERALL REMEDIATION:"
      - "  Result: {{ status_02 | default('UNKNOWN') | trim }}"
      - "  Details: {{ 'System compliant' if status_02 | default('') | trim == 'APPLIED' else 'System not compliant or skipped' }}"
      - "========================================================"
    tags: [execute]

  always:
  - name: "Restore - Check if backup exists"
    ansible.builtin.stat:
      path: "{{ backup_dir }}/dconf_db.tar.gz"
    register: restore_backup
    tags: [restore]

  - name: "Restore - Restore /etc/dconf/db from backup"
    shell: "tar xzf {{ backup_dir }}/dconf_db.tar.gz -C /etc"
    args:
      executable: /bin/bash
    when: restore_backup.stat.exists | default(false)
    failed_when: false
    tags: [restore]

  - name: "Restore - Remove backup directory"
    ansible.builtin.file:
      path: "{{ backup_dir }}"
      state: absent
    when: restore_backup.stat.exists | default(false)
    failed_when: false
    tags: [restore]
