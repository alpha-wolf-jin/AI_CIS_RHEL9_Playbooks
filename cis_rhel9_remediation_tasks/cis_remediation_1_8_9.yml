---
- name: Initialize meta data variables
  include_vars: cis_remediation_var_1_8_9.yml

- name: "Snapshot - Create backup directory"
  ansible.builtin.file:
    path: "{{ backup_dir }}"
    state: directory
    mode: '0700'
  tags: [snapshot]
- name: "Snapshot - Check if dconf database directory exists"
  ansible.builtin.stat:
    path: "/etc/dconf/db/gdm.d"
  register: _snap_gdm_d
  tags: [snapshot]
- name: "Snapshot - Backup dconf database directory if exists"
  ansible.builtin.archive:
    path: "/etc/dconf/db/gdm.d"
    dest: "{{ backup_dir }}/gdm.d.tar.gz"
  when: _snap_gdm_d.stat.exists | default(false)
  tags: [snapshot]
- name: "Snapshot - Mark dconf database directory as absent"
  ansible.builtin.copy:
    content: "absent"
    dest: "{{ backup_dir }}/gdm.d.absent"
  when: not (_snap_gdm_d.stat.exists | default(false))
  tags: [snapshot]
- name: "Snapshot - Check if remediation script exists"
  ansible.builtin.stat:
    path: "{{ remediate_script }}"
  register: _snap_remediate_script_stat
  tags: [snapshot]
- name: "Snapshot - Mark remediation script as absent"
  ansible.builtin.copy:
    content: "absent"
    dest: "{{ backup_dir }}/remediate_script.absent"
  when: not _snap_remediate_script_stat.stat.exists
  tags: [snapshot]

- block:
  - name: "Initialize data variables"
    ansible.builtin.set_fact:
      data_02: "Not collected yet"
      status_02: "ERROR"
      details_02: "Not evaluated"
      data_03: "Not collected yet"
      status_03: "ERROR"
      details_03: "Not evaluated"
      task_02_name: "Not executed"
      task_02_cmd: "N/A"
      task_02_rc: -1
    tags: [execute]

  - name: "Gather installed package facts"
    ansible.builtin.package_facts:
      manager: auto
    failed_when: false
    tags: [execute]

  - name: "Determine if GDM is installed"
    ansible.builtin.set_fact:
      gdm_installed: "{{ 'gdm' in ansible_facts.packages or 'gdm3' in ansible_facts.packages }}"
    tags: [execute]

  - name: "Req 01 - Copy remediation script to remote"
    ansible.builtin.copy:
      dest: "{{ remediate_script }}"
      mode: '0700'
      content: "{{ remediate_script_content }}"
    when: gdm_installed | default(false) | bool
    failed_when: false
    changed_when: false
    tags: [execute]

  - name: "Req 01 - Execute remediation script for GDM autorun-never"
    ansible.builtin.shell: /bin/bash "{{ remediate_script }}"
    args:
      executable: /bin/bash
    register: result_01
    when: gdm_installed | default(false) | bool
    failed_when: false
    changed_when: false
    tags: [execute]

  - name: "Req 01 - Remove temporary remediation script"
    ansible.builtin.file:
      path: "{{ remediate_script }}"
      state: absent
    when: gdm_installed | default(false) | bool
    failed_when: false
    changed_when: false
    tags: [execute]

  - name: "Store requirement 01 details"
    ansible.builtin.set_fact:
      task_01_name: "Execute remediation script for GDM autorun-never"
      task_01_cmd: "/bin/bash {{ remediate_script }}"
      task_01_rc: "{{ result_01.rc | default(-1) if gdm_installed | default(false) else -1 }}"
      data_01: "{{ result_01.stdout | default('') | trim if gdm_installed | default(false) else '' }}"
      status_01: "{{ 'SKIP' if not (gdm_installed | default(false)) else ('PASS' if '** PASS **' in (result_01.stdout | default('')) else 'FAIL') }}"
      details_01: "{{ 'GDM not installed; remediation skipped' if not (gdm_installed | default(false)) else ('Remediation script executed successfully: autorun-never locked' if '** PASS **' in (result_01.stdout | default('')) else 'Remediation script failed: autorun-never not locked') }}"
    tags: [execute]

  - name: "Store requirement 02 details"
    ansible.builtin.set_fact:
      task_02_name: "Verify remediation via script output"
      task_02_cmd: "/bin/bash {{ remediate_script }}"
      task_02_rc: "{{ result_01.rc | default(-1) if gdm_installed | default(false) else -1 }}"
      data_02: "{{ result_01.stdout | default('') | trim if gdm_installed | default(false) else '' }}"
      status_02: "{{ 'SKIP' if not (gdm_installed | default(false)) else ('PASS' if '** PASS **' in (result_01.stdout | default('')) else 'FAIL') }}"
      details_02: "{{ 'GDM not installed; verification skipped' if not (gdm_installed | default(false)) else ('Verification passed: autorun-never is locked' if '** PASS **' in (result_01.stdout | default('')) else 'Verification failed: autorun-never is not locked') }}"
    tags: [execute]

  - name: "Store final remediation result in cis_result"
    ansible.builtin.set_fact:
      cis_result: "{{ status_02 | default('ERROR') | trim }}"
      task_03_name: "Store cis_result from status_02"
      task_03_cmd: "set_fact"
      task_03_rc: 0
      data_03: "{{ status_02 | default('ERROR') | trim }}"
      status_03: "PASS"
      details_03: "cis_result set to {{ status_02 | default('ERROR') | trim }}"
    tags: [execute]

  - name: "Generate remediation report"
    ansible.builtin.debug:
      msg:
      - "REMEDIATION REPORT — CIS 1.8.9"
      - "Reference: CIS Benchmark checkpoint 1.8.9"
      - ""
      - "REQUIREMENT 01 - Run the provided remediation script to fix Ensure GDM autorun-never is not overridden:"
      - "  Task: {{ task_01_name | default('Not recorded') }}"
      - "  Command: {{ task_01_cmd | default('N/A') }}"
      - "  Exit code: {{ task_01_rc | default(-1) }}"
      - "  Data: {{ data_01 | default('') | trim }}"
      - "  Status: {{ status_01 | default('ERROR') | trim }}"
      - "  Details: {{ details_01 | default('') | trim }}"
      - ""
      - "REQUIREMENT 02 - {{ req_02 }}:"
      - "  Task: {{ task_02_name | default('Not recorded') }}"
      - "  Command: {{ task_02_cmd | default('N/A') }}"
      - "  Exit code: {{ task_02_rc | default(-1) }}"
      - "  Data: {{ data_02 | default('') | trim }}"
      - "  Status: {{ status_02 | default('ERROR') | trim }}"
      - "  Details: {{ details_02 | default('') | trim }}"
      - ""
      - "REQUIREMENT 03 - {{ req_03 }}:"
      - "  Task: {{ task_03_name | default('Not recorded') }}"
      - "  Command: {{ task_03_cmd | default('N/A') }}"
      - "  Exit code: {{ task_03_rc | default(-1) }}"
      - "  Data: {{ data_03 | default('') | trim }}"
      - "  Status: {{ status_03 | default('ERROR') | trim }}"
      - "  Details: {{ details_03 | default('') | trim }}"
      - ""
      - "========================================================"
      - "OVERALL REMEDIATION:"
      - "  Result: {{ cis_result | default('ERROR') | trim }}"
      - "  Details: {{ details_02 | default('Not evaluated') | trim }}"
      - "========================================================"
    tags: [execute]

  always:
  - name: "Restore - Check if dconf backup exists"
    ansible.builtin.stat:
      path: "{{ backup_dir }}/gdm.d.tar.gz"
    register: _restore_gdm_d
    failed_when: false
    tags: [restore]

  - name: "Restore - Remove current dconf database directory"
    ansible.builtin.file:
      path: "/etc/dconf/db/gdm.d"
      state: absent
    when: _restore_gdm_d.stat.exists | default(false)
    failed_when: false
    tags: [restore]

  - name: "Restore - Restore dconf database directory from backup"
    ansible.builtin.unarchive:
      src: "{{ backup_dir }}/gdm.d.tar.gz"
      dest: "/etc/dconf/db/"
      remote_src: true
    when: _restore_gdm_d.stat.exists | default(false)
    failed_when: false
    tags: [restore]

  - name: "Restore - Check if dconf absent marker exists"
    ansible.builtin.stat:
      path: "{{ backup_dir }}/gdm.d.absent"
    register: _restore_gdm_d_absent
    failed_when: false
    tags: [restore]

  - name: "Restore - Delete dconf database directory if it was absent before"
    ansible.builtin.file:
      path: "/etc/dconf/db/gdm.d"
      state: absent
    when: _restore_gdm_d_absent.stat.exists | default(false)
    failed_when: false
    tags: [restore]

  - name: "Restore - Update dconf database"
    ansible.builtin.shell: dconf update
    args:
      executable: /bin/bash
    failed_when: false
    tags: [restore]

  - name: "Restore - Check if remediation script absent marker exists"
    ansible.builtin.stat:
      path: "{{ backup_dir }}/remediate_script.absent"
    register: _restore_remediate_script_absent
    failed_when: false
    tags: [restore]

  - name: "Restore - Remove remediation script if it was absent before"
    ansible.builtin.file:
      path: "{{ remediate_script }}"
      state: absent
    when: _restore_remediate_script_absent.stat.exists | default(false)
    failed_when: false
    tags: [restore]

  - name: "Restore - Remove backup directory"
    ansible.builtin.file:
      path: "{{ backup_dir }}"
      state: absent
    failed_when: false
    tags: [restore]
