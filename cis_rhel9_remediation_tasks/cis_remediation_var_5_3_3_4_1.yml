playbook_name: "cis_5_3_3_4_1"
backup_dir: "/var/log/ai-playbooks-backup/{{ playbook_name }}"
req_01: "Run the provided remediation script to fix Ensure pam_unix does not include nullok"
req_02: "VERIFY: Run audit check to confirm Ensure pam_unix does not include nullok is properly configured. Expected result: System is compliant"
req_03: "Store the final remediation result in a variable named 'cis_result' using set_fact. Set cis_result to the overall remediation status (PASS/FAIL/SKIP/ERROR) derived from the last requirement's status variable."
req_04: "Generate remediation report"
removal_script: "/tmp/cis_5_3_3_4_1_removal.sh"
removal_script_content: |
  {% raw %}
  #!/usr/bin/env bash
  {
     for l_pam_file in system-auth password-auth; do
        l_file="/etc/authselect/$(head -1 /etc/authselect/authselect.conf | grep 'custom/')/$l_pam_file"
        if [ -f "$l_file" ]; then
           sed -ri 's/(^\s*password\s+(requisite|required|sufficient)\s+pam_unix\.so\s+.*)(nullok)(\s*.*)$/\1\4/g' "$l_file"
        fi
     done
     authselect apply-changes 2>&1
  }
  {% endraw %}
