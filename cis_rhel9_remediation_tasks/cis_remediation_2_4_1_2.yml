---
- name: Initialize meta data variables
  include_vars: cis_remediation_var_2_4_1_2.yml

- name: "Snapshot - Create backup directory"
  ansible.builtin.file:
    path: "{{ backup_dir }}"
    state: directory
    mode: '0700'
  tags: [snapshot]
- name: "Snapshot - Check if /etc/crontab exists"
  ansible.builtin.stat:
    path: /etc/crontab
  register: _crontab_stat_snapshot
  tags: [snapshot]
- name: "Snapshot - Backup /etc/crontab if exists"
  ansible.builtin.copy:
    src: /etc/crontab
    dest: "{{ backup_dir }}/crontab.bak"
    remote_src: true
  when: _crontab_stat_snapshot.stat.exists | default(false)
  tags: [snapshot]

- block:
# === EXECUTE (tag: execute) ===
  - name: "Initialize data variables"
    ansible.builtin.set_fact:
      data_01: "Not collected yet"
      status_01: "ERROR"
      details_01: "Not evaluated"
      data_02: "Not collected yet"
      status_02: "ERROR"
      details_02: "Not evaluated"
      data_03: "Not collected yet"
      status_03: "ERROR"
      details_03: "Not evaluated"
      data_04: "Not collected yet"
      status_04: "ERROR"
      details_04: "Not evaluated"
      data_05: "Not collected yet"
      status_05: "ERROR"
      details_05: "Not evaluated"
      task_01_name: "Not executed"
      task_01_cmd: "N/A"
      task_01_rc: -1
      task_02_name: "Not executed"
      task_02_cmd: "N/A"
      task_02_rc: -1
      task_03_name: "Not executed"
      task_03_cmd: "N/A"
      task_03_rc: -1
      task_04_name: "Not executed"
      task_04_cmd: "N/A"
      task_04_rc: -1
      task_05_name: "Not executed"
      task_05_cmd: "N/A"
      task_05_rc: -1
      cron_installed: false
    tags: [execute]

  - name: "Req 01 - Check if cron is installed"
    ansible.builtin.shell: |
      if command -v cron >/dev/null 2>&1; then echo 'cron installed'; else echo 'cron not installed'; fi
    args:
      executable: /bin/bash
    register: result_01
    failed_when: false
    changed_when: false
    tags: [execute]

  - name: "Store requirement 01 details"
    ansible.builtin.set_fact:
      task_01_name: "Req 01 - Check if cron is installed"
      task_01_cmd: "if command -v cron >/dev/null 2>&1; then echo 'cron installed'; else echo 'cron not installed'; fi"
      task_01_rc: "{{ result_01.rc | default(-1) }}"
      data_01: "{{ result_01.stdout | default('') | trim }}"
      status_01: "{{ ('PASS' if (result_01.stdout | default('') | trim) == 'cron installed' else 'SKIP') | trim }}"
      details_01: "{{ ('Cron is installed' if (result_01.stdout | default('') | trim) == 'cron installed' else 'Cron not installed - skipping remediation') | trim }}"
      cron_installed: "{{ (result_01.stdout | default('') | trim) == 'cron installed' }}"
    tags: [execute]

  - name: "Set skipped status for requirements 2-4 when cron not installed"
    ansible.builtin.set_fact:
      task_02_name: "Req 02 - Apply ownership change on /etc/crontab"
      task_02_cmd: "chown root:root /etc/crontab"
      task_02_rc: -1
      data_02: "N/A (cron not installed)"
      status_02: "SKIP"
      details_02: "Cron not installed - skipping remediation"
      task_03_name: "Req 03 - Apply permission change on /etc/crontab"
      task_03_cmd: "chmod og-rwx /etc/crontab"
      task_03_rc: -1
      data_03: "N/A (cron not installed)"
      status_03: "SKIP"
      details_03: "Cron not installed - skipping remediation"
      task_04_name: "Req 04 - Verify ownership and permissions on /etc/crontab"
      task_04_cmd: "stat -c '%U:%G %A' /etc/crontab"
      task_04_rc: -1
      data_04: "N/A (cron not installed)"
      status_04: "SKIP"
      details_04: "Cron not installed - skipping remediation"
    when: not cron_installed
    tags: [execute]

  - name: "Check if /etc/crontab exists"
    ansible.builtin.stat:
      path: /etc/crontab
    register: crontab_stat
    when: cron_installed
    failed_when: false
    tags: [execute]

  - name: "Req 02 - Apply ownership change on /etc/crontab"
    ansible.builtin.shell: chown root:root /etc/crontab
    args:
      executable: /bin/bash
    when:
    - cron_installed
    - crontab_stat.stat.exists | default(false)
    register: result_02
    failed_when: false
    tags: [execute]

  - name: "Store requirement 02 details"
    ansible.builtin.set_fact:
      task_02_name: "Req 02 - Apply ownership change on /etc/crontab"
      task_02_cmd: "chown root:root /etc/crontab"
      task_02_rc: "{{ result_02.rc | default(-1) }}"
      data_02: "{{ result_02.stdout | default('') | trim }}"
      status_02: "{{ ('PASS' if result_02.rc | default(-1) == 0 else 'FAIL') | trim }}"
      details_02: "{{ ('Ownership set to root:root' if result_02.rc | default(-1) == 0 else 'Failed to set ownership') | trim }}"
    when: cron_installed
    tags: [execute]

  - name: "Req 03 - Apply permission change on /etc/crontab"
    ansible.builtin.shell: chmod og-rwx /etc/crontab
    args:
      executable: /bin/bash
    when:
    - cron_installed
    - crontab_stat.stat.exists | default(false)
    - result_02.rc | default(-1) == 0
    register: result_03
    failed_when: false
    tags: [execute]

  - name: "Store requirement 03 details"
    ansible.builtin.set_fact:
      task_03_name: "Req 03 - Apply permission change on /etc/crontab"
      task_03_cmd: "chmod og-rwx /etc/crontab"
      task_03_rc: "{{ result_03.rc | default(-1) }}"
      data_03: "{{ result_03.stdout | default('') | trim }}"
      status_03: "{{ ('PASS' if result_03.rc | default(-1) == 0 else 'FAIL') | trim }}"
      details_03: "{{ ('Permissions set (group and others removed rwx)' if result_03.rc | default(-1) == 0 else 'Failed to set permissions') | trim }}"
    when: cron_installed
    tags: [execute]

  - name: "Req 04 - Verify ownership and permissions on /etc/crontab"
    ansible.builtin.shell: "stat -c '%U:%G %A' /etc/crontab"
    args:
      executable: /bin/bash
    when:
    - cron_installed
    - crontab_stat.stat.exists | default(false)
    register: result_04
    failed_when: false
    changed_when: false
    tags: [execute]

  - name: "Store requirement 04 details"
    ansible.builtin.set_fact:
      task_04_name: "Req 04 - Verify ownership and permissions on /etc/crontab"
      task_04_cmd: "stat -c '%U:%G %A' /etc/crontab"
      task_04_rc: "{{ result_04.rc | default(-1) }}"
      data_04: "{{ result_04.stdout | default('') | trim }}"
      status_04: "{{ ('PASS' if (result_04.stdout | default('') | trim) == 'root:root -rw-------' else 'FAIL') | trim }}"
      details_04: "{{ ('Ownership and permissions correct (root:root 600)' if (result_04.stdout | default('') | trim) == 'root:root -rw-------' else 'Ownership/permissions mismatch') | trim }}"
    when: cron_installed
    tags: [execute]

  - name: "Req 05 - Store final remediation result in cis_result"
    ansible.builtin.set_fact:
      cis_result: >-
        {%- if not cron_installed -%}SKIP
        {%- elif status_02 | default('FAIL') | trim == 'FAIL' or status_03 | default('FAIL') | trim == 'FAIL' or status_04 | default('FAIL') | trim == 'FAIL' -%}FAIL
        {%- elif status_04 | default('FAIL') | trim == 'PASS' -%}PASS
        {%- else -%}ERROR
        {%- endif -%}
    tags: [execute]

  - name: "Store requirement 05 details"
    ansible.builtin.set_fact:
      task_05_name: "Req 05 - Store final remediation result"
      task_05_cmd: "set_fact: cis_result"
      task_05_rc: "0"
      data_05: "{{ cis_result }}"
      status_05: "{{ cis_result }}"
      details_05: "{{ 'Overall result: ' + cis_result }}"
    tags: [execute]

  - name: "Generate remediation report"
    ansible.builtin.debug:
      msg:
      - "REMEDIATION REPORT — CIS 2.4.1.2"
      - "Reference: CIS Benchmark checkpoint 2.4.1.2"
      - ""
      - "REQUIREMENT 01 - {{ req_01 }}:"
      - "  Task: {{ task_01_name | default('Not recorded') }}"
      - "  Command: {{ task_01_cmd | default('N/A') }}"
      - "  Exit code: {{ task_01_rc | default(-1) }}"
      - "  Data: {{ data_01 | default('') | trim }}"
      - "  Status: {{ status_01 | default('ERROR') | trim }}"
      - "  Details: {{ details_01 | default('') | trim }}"
      - ""
      - "REQUIREMENT 02 - {{ req_02 }}:"
      - "  Task: {{ task_02_name | default('Not recorded') }}"
      - "  Command: {{ task_02_cmd | default('N/A') }}"
      - "  Exit code: {{ task_02_rc | default(-1) }}"
      - "  Data: {{ data_02 | default('') | trim }}"
      - "  Status: {{ status_02 | default('ERROR') | trim }}"
      - "  Details: {{ details_02 | default('') | trim }}"
      - ""
      - "REQUIREMENT 03 - {{ req_03 }}:"
      - "  Task: {{ task_03_name | default('Not recorded') }}"
      - "  Command: {{ task_03_cmd | default('N/A') }}"
      - "  Exit code: {{ task_03_rc | default(-1) }}"
      - "  Data: {{ data_03 | default('') | trim }}"
      - "  Status: {{ status_03 | default('ERROR') | trim }}"
      - "  Details: {{ details_03 | default('') | trim }}"
      - ""
      - "REQUIREMENT 04 - {{ req_04 }}:"
      - "  Task: {{ task_04_name | default('Not recorded') }}"
      - "  Command: {{ task_04_cmd | default('N/A') }}"
      - "  Exit code: {{ task_04_rc | default(-1) }}"
      - "  Data: {{ data_04 | default('') | trim }}"
      - "  Status: {{ status_04 | default('ERROR') | trim }}"
      - "  Details: {{ details_04 | default('') | trim }}"
      - ""
      - "REQUIREMENT 05 - {{ req_05 }}:"
      - "  Task: {{ task_05_name | default('Not recorded') }}"
      - "  Command: {{ task_05_cmd | default('N/A') }}"
      - "  Exit code: {{ task_05_rc | default(-1) }}"
      - "  Data: {{ data_05 | default('') | trim }}"
      - "  Status: {{ status_05 | default('ERROR') | trim }}"
      - "  Details: {{ details_05 | default('') | trim }}"
      - ""
      - "========================================================"
      - "OVERALL REMEDIATION:"
      - "  Result: {{ cis_result | default('ERROR') | trim }}"
      - "========================================================"
    tags: [execute]

  always:
# === RESTORE (tag: restore) ===
  - name: "Restore - Check if backup exists"
    ansible.builtin.stat:
      path: "{{ backup_dir }}/crontab.bak"
    register: _restore_backup_stat
    failed_when: false
    tags: [restore]

  - name: "Restore - Restore /etc/crontab from backup"
    ansible.builtin.copy:
      src: "{{ backup_dir }}/crontab.bak"
      dest: /etc/crontab
      remote_src: true
    when: _restore_backup_stat.stat.exists | default(false)
    failed_when: false
    tags: [restore]

  - name: "Restore - Remove backup directory"
    ansible.builtin.file:
      path: "{{ backup_dir }}"
      state: absent
    when: _restore_backup_stat.stat.exists | default(false)
    failed_when: false
    tags: [restore]
