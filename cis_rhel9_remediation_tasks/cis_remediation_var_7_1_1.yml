playbook_name: "cis_7_1_1_passwd_perms"
backup_dir: "/var/log/ai-playbooks-backup/{{ playbook_name }}"
target_file: "/etc/passwd"
expected_perms: "644"
expected_owner: "root"
expected_group: "root"
req_01: "Apply remove excess permissions on /etc/passwd using command: `chmod u-x,go-wx /etc/passwd`. Expected result: The file /etc/passwd has permissions 644 (owner read/write, group read, others read)."
req_02: "Apply set owner and group to root on /etc/passwd using command: `chown root:root /etc/passwd`. Expected result: The file /etc/passwd is owned by root:root."
req_03: "Verify permissions and ownership on /etc/passwd using command: `stat -c '%a %U:%G' /etc/passwd`. Expected result: Output is `644 root:root`."
req_04: "Store the final remediation result in a variable named 'cis_result' using set_fact. Set cis_result to the overall remediation status (PASS/FAIL/SKIP/ERROR) derived from the last requirement's status variable."
