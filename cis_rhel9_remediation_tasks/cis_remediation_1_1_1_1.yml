---
- name: Initialize meta data variables
  include_vars: cis_remediation_var_1_1_1_1.yml

- name: "Snapshot - Create backup directory"
  ansible.builtin.file:
    path: "{{ backup_dir }}"
    state: directory
    mode: '0700'
  tags: [snapshot]
- name: "Snapshot - Check if config file exists"
  ansible.builtin.stat:
    path: "{{ config_file }}"
  register: _snap_config_stat
  tags: [snapshot]
- name: "Snapshot - Backup config file if exists"
  ansible.builtin.copy:
    src: "{{ config_file }}"
    dest: "{{ backup_dir }}/cramfs.conf.present"
    remote_src: true
  when: _snap_config_stat.stat.exists
  tags: [snapshot]
- name: "Snapshot - Mark config file as absent"
  ansible.builtin.copy:
    content: "absent"
    dest: "{{ backup_dir }}/cramfs.conf.absent"
  when: not _snap_config_stat.stat.exists
  tags: [snapshot]
- name: "Snapshot - Check if check script already exists"
  ansible.builtin.stat:
    path: "{{ check_script }}"
  register: _snap_check_script_stat
  tags: [snapshot]
- name: "Snapshot - Mark check script as absent if not present"
  ansible.builtin.copy:
    content: "absent"
    dest: "{{ backup_dir }}/check_script.absent"
  when: not _snap_check_script_stat.stat.exists
  tags: [snapshot]
- name: "Snapshot - Check if remediate script already exists"
  ansible.builtin.stat:
    path: "{{ remediate_script }}"
  register: _snap_remediate_script_stat
  tags: [snapshot]
- name: "Snapshot - Mark remediate script as absent if not present"
  ansible.builtin.copy:
    content: "absent"
    dest: "{{ backup_dir }}/remediate_script.absent"
  when: not _snap_remediate_script_stat.stat.exists
  tags: [snapshot]

- block:
# === EXECUTE ===
  - name: "Check if cramfs kernel module is available"
    ansible.builtin.copy:
      dest: "{{ check_script }}"
      mode: '0700'
      content: "{{ check_script_content }}"
    changed_when: false
    tags: [execute]

  - name: "Execute check script"
    ansible.builtin.shell: /bin/bash "{{ check_script }}"
    args:
      executable: /bin/bash
    register: check_result
    failed_when: false
    changed_when: false
    tags: [execute]

  - name: "Remove check script"
    ansible.builtin.file:
      path: "{{ check_script }}"
      state: absent
    changed_when: false
    tags: [execute]

  - name: "Store module availability"
    ansible.builtin.set_fact:
      cramfs_available: "{{ (check_result.stdout | trim) == 'AVAILABLE' }}"
    tags: [execute]

  - name: "Req 1 - Run remediation script for cramfs"
    ansible.builtin.copy:
      dest: "{{ remediate_script }}"
      mode: '0700'
      content: "{{ remediate_script_content }}"
    changed_when: false
    tags: [execute]

  - name: "Req 1 - Execute remediation script"
    ansible.builtin.shell: /bin/bash "{{ remediate_script }}"
    args:
      executable: /bin/bash
    register: remediate_result
    failed_when: false
    changed_when: false
    when: cramfs_available | bool
    tags: [execute]

  - name: "Req 1 - Remove remediation script"
    ansible.builtin.file:
      path: "{{ remediate_script }}"
      state: absent
    changed_when: false
    tags: [execute]

  - name: "Req 1 - Store remediation details"
    ansible.builtin.set_fact:
      task_01_name: "Execute remediation script for cramfs"
      task_01_cmd: "/bin/bash /tmp/cis_remediate_cramfs.sh"
      task_01_rc: "{{ remediate_result.rc | default(-1) }}"
      data_01: >-
        {{ remediate_result.stdout | default('Module not available - no action needed') | trim }}
      status_01: >-
        {{ 'PASS' if (remediate_result.rc | default(-1)) == 0 else 'SKIP' if remediate_result is skipped else 'FAIL' }}
      details_01: >-
        {{ 'Remediation completed' if (remediate_result.rc | default(-1)) == 0 else 'No action required - module not available' if remediate_result is skipped else 'Remediation failed' }}
    tags: [execute]

  - name: "Req 2 - Verify cramfs kernel module is not available"
    ansible.builtin.shell: |
      MODULE="cramfs"
      if lsmod | grep -q "^${MODULE} "; then
        echo "FAIL - module loaded"
        exit 1
      fi
      MOD_PATH="/lib/modules/$(uname -r)/kernel/fs/${MODULE}"
      if [ -d "${MOD_PATH}" ] && [ -n "$(ls -A "${MOD_PATH}" 2>/dev/null)" ]; then
        if [ -f /etc/modprobe.d/${MODULE}.conf ]; then
          if grep -q "^install ${MODULE} /bin/false" /etc/modprobe.d/${MODULE}.conf && \
             grep -q "^blacklist ${MODULE}" /etc/modprobe.d/${MODULE}.conf; then
            echo "COMPLIANT"
            exit 0
          else
            echo "FAIL - conf file missing required lines"
            exit 1
          fi
        else
          echo "FAIL - conf file not found"
          exit 1
        fi
      else
        echo "COMPLIANT (module not available)"
        exit 0
      fi
    args:
      executable: /bin/bash
    register: verify_result
    failed_when: false
    changed_when: false
    tags: [execute]

  - name: "Req 2 - Store verification details"
    ansible.builtin.set_fact:
      task_02_name: "Verify cramfs module not available"
      task_02_cmd: "Verify cramfs kernel module not available script"
      task_02_rc: "{{ verify_result.rc | default(-1) }}"
      data_02: "{{ verify_result.stdout | default('') | trim }}"
      status_02: "{{ ('PASS' if (verify_result.rc | default(-1)) == 0 and 'COMPLIANT' in verify_result.stdout else 'FAIL') | trim }}"
      details_02: "Verification completed"
    tags: [execute]

  - name: "Req 3 - Store cis_result"
    ansible.builtin.set_fact:
      cis_result: "{{ status_02 | default('ERROR') | trim }}"
      task_03_name: "Store cis_result"
      task_03_cmd: "set_fact: cis_result = {{ status_02 | default('ERROR') | trim }}"
      task_03_rc: 0
      data_03: "{{ status_02 | default('ERROR') | trim }}"
      status_03: "PASS"
      details_03: "cis_result set to status_02"
    tags: [execute]

  - name: "Req 4 - Generate remediation report"
    ansible.builtin.debug:
      msg:
      - "REMEDIATION REPORT — CIS 1.1.1.1"
      - "Reference: CIS Benchmark checkpoint 1.1.1.1"
      - ""
      - "REQUIREMENT 01 - {{ req_01 }}:"
      - "  Task: {{ task_01_name | default('Not recorded') }}"
      - "  Command: {{ task_01_cmd | default('N/A') }}"
      - "  Exit code: {{ task_01_rc | default(-1) }}"
      - "  Data: {{ data_01 | default('') | trim }}"
      - "  Status: {{ status_01 | default('ERROR') | trim }}"
      - "  Details: {{ details_01 | default('') | trim }}"
      - ""
      - "REQUIREMENT 02 - {{ req_02 }}:"
      - "  Task: {{ task_02_name | default('Not recorded') }}"
      - "  Command: {{ task_02_cmd | default('N/A') }}"
      - "  Exit code: {{ task_02_rc | default(-1) }}"
      - "  Data: {{ data_02 | default('') | trim }}"
      - "  Status: {{ status_02 | default('ERROR') | trim }}"
      - "  Details: {{ details_02 | default('') | trim }}"
      - ""
      - "REQUIREMENT 03 - {{ req_03 }}:"
      - "  Task: {{ task_03_name | default('Not recorded') }}"
      - "  Command: {{ task_03_cmd | default('N/A') }}"
      - "  Exit code: {{ task_03_rc | default(-1) }}"
      - "  Data: {{ data_03 | default('') | trim }}"
      - "  Status: {{ status_03 | default('ERROR') | trim }}"
      - "  Details: {{ details_03 | default('') | trim }}"
      - ""
      - "OVERALL REMEDIATION:"
      - "  Result: {{ cis_result | default('ERROR') | trim }}"
    tags: [execute]

  always:
# === RESTORE ===
  - name: "Restore - Check if backup directory exists"
    ansible.builtin.stat:
      path: "{{ backup_dir }}"
    register: _restore_dir_stat
    failed_when: false
    tags: [restore]

  - name: "Restore - Check if config backup exists"
    ansible.builtin.stat:
      path: "{{ backup_dir }}/cramfs.conf.present"
    register: _restore_present
    failed_when: false
    tags: [restore]

  - name: "Restore - Restore original config file"
    ansible.builtin.copy:
      src: "{{ backup_dir }}/cramfs.conf.present"
      dest: "{{ config_file }}"
      remote_src: true
    when: _restore_present.stat.exists | default(false)
    failed_when: false
    tags: [restore]

  - name: "Restore - Check if config absent marker exists"
    ansible.builtin.stat:
      path: "{{ backup_dir }}/cramfs.conf.absent"
    register: _restore_absent
    failed_when: false
    tags: [restore]

  - name: "Restore - Delete config file (was absent before remediation)"
    ansible.builtin.file:
      path: "{{ config_file }}"
      state: absent
    when: _restore_absent.stat.exists | default(false)
    failed_when: false
    tags: [restore]

  - name: "Restore - Remove check script (if it exists)"
    ansible.builtin.file:
      path: "{{ check_script }}"
      state: absent
    failed_when: false
    tags: [restore]

  - name: "Restore - Remove remediation script (if it exists)"
    ansible.builtin.file:
      path: "{{ remediate_script }}"
      state: absent
    failed_when: false
    tags: [restore]

  - name: "Restore - Check if check script absent marker exists"
    ansible.builtin.stat:
      path: "{{ backup_dir }}/check_script.absent"
    register: _restore_check_script_absent
    failed_when: false
    tags: [restore]

  - name: "Restore - Remove check script if it was absent before"
    ansible.builtin.file:
      path: "{{ check_script }}"
      state: absent
    when: _restore_check_script_absent.stat.exists | default(false)
    failed_when: false
    tags: [restore]

  - name: "Restore - Check if remediate script absent marker exists"
    ansible.builtin.stat:
      path: "{{ backup_dir }}/remediate_script.absent"
    register: _restore_remediate_script_absent
    failed_when: false
    tags: [restore]

  - name: "Restore - Remove remediate script if it was absent before"
    ansible.builtin.file:
      path: "{{ remediate_script }}"
      state: absent
    when: _restore_remediate_script_absent.stat.exists | default(false)
    failed_when: false
    tags: [restore]

  - name: "Restore - Remove backup directory"
    ansible.builtin.file:
      path: "{{ backup_dir }}"
      state: absent
    when: _restore_dir_stat.stat.exists | default(false)
    failed_when: false
    tags: [restore]
