---
- name: Initialize meta data variables
  include_vars: cis_remediation_var_1_1_1_1.yml

- name: "State Guard - Check for existing checkpoint"
  ansible.builtin.stat:
    path: "{{ state_guard_flag }}"
  register: _sg_flag
  tags: [snapshot]
- name: "State Guard - Restore /etc/modprobe.d/cramfs.conf from prior checkpoint"
  ansible.builtin.copy:
    src: "{{ state_guard_dir }}/cramfs.conf.present"
    dest: "/etc/modprobe.d/cramfs.conf"
    remote_src: true
  when: _sg_flag.stat.exists
  failed_when: false
  tags: [snapshot]
- name: "State Guard - Check for absent marker"
  ansible.builtin.stat:
    path: "{{ state_guard_dir }}/cramfs.conf.absent"
  register: _sg_absent_marker
  when: _sg_flag.stat.exists
  failed_when: false
  tags: [snapshot]
- name: "State Guard - Delete /etc/modprobe.d/cramfs.conf (absent from prior run)"
  ansible.builtin.file:
    path: "/etc/modprobe.d/cramfs.conf"
    state: absent
  when:
  - _sg_flag.stat.exists
  - _sg_absent_marker.stat.exists | default(false)
  failed_when: false
  tags: [snapshot]
- name: "State Guard - Remove old checkpoint"
  ansible.builtin.file:
    path: "{{ state_guard_dir }}"
    state: absent
  when: _sg_flag.stat.exists
  tags: [snapshot]
- name: "State Guard - Create checkpoint directory"
  ansible.builtin.file:
    path: "{{ state_guard_dir }}"
    state: directory
    mode: '0700'
  tags: [snapshot]
- name: "State Guard - Check if /etc/modprobe.d/cramfs.conf exists"
  ansible.builtin.stat:
    path: "/etc/modprobe.d/cramfs.conf"
  register: _sg_conf_stat
  tags: [snapshot]
- name: "State Guard - Backup /etc/modprobe.d/cramfs.conf (present)"
  ansible.builtin.copy:
    src: "/etc/modprobe.d/cramfs.conf"
    dest: "{{ state_guard_dir }}/cramfs.conf.present"
    remote_src: true
  when: _sg_conf_stat.stat.exists
  tags: [snapshot]
- name: "State Guard - Mark /etc/modprobe.d/cramfs.conf as absent"
  ansible.builtin.copy:
    content: "absent"
    dest: "{{ state_guard_dir }}/cramfs.conf.absent"
  when: not _sg_conf_stat.stat.exists
  tags: [snapshot]
- name: "State Guard - Check if kernel module is currently loaded"
  ansible.builtin.shell: |
    lsmod | grep -q '^{{ kernel_module }} ' && echo loaded || echo not_loaded
  args:
    executable: /bin/bash
  register: _sg_mod_state
  changed_when: false
  failed_when: false
  tags: [snapshot]
- name: "State Guard - Persist kernel module load state to file"
  ansible.builtin.copy:
    content: "{{ _sg_mod_state.stdout | trim }}"
    dest: "{{ state_guard_dir }}/{{ kernel_module }}_load_state"
  tags: [snapshot]
- name: "State Guard - Create checkpoint flag"
  ansible.builtin.copy:
    content: "checkpoint"
    dest: "{{ state_guard_flag }}"
  tags: [snapshot]

- block:
# === EXECUTE (tag: execute) ===
  - name: "Copy remediation script to target"
    ansible.builtin.copy:
      content: "{{ remediation_script }}"
      dest: "{{ script_dest }}"
      mode: '0700'
    failed_when: false
    tags: [execute]

  - name: "Req 01 - Run the provided remediation script"
    ansible.builtin.shell: "/bin/bash {{ script_dest }}"
    args:
      executable: /bin/bash
    register: result_01
    failed_when: false
    tags: [execute]

  - name: "Req 02 - Verify cramfs kernel module is not available"
    ansible.builtin.shell: |
      if ! find /lib/modules -type d -name cramfs -path "*/kernel/fs/*" 2>/dev/null | grep -q cramfs; then
        echo "COMPLIANT: cramfs module not found on filesystem"
        exit 0
      fi
      if modprobe --showconfig | grep -q 'install cramfs /bin/false' && \
         modprobe --showconfig | grep -q 'blacklist cramfs' && \
         ! lsmod | grep -q '^cramfs '; then
        echo "COMPLIANT: cramfs is properly configured and not loaded"
        exit 0
      fi
      echo "NON-COMPLIANT: cramfs configuration or load state is incorrect"
      exit 1
    args:
      executable: /bin/bash
    register: result_02
    failed_when: false
    changed_when: false
    tags: [execute]

  - name: "Store requirement details for report"
    set_fact:
      task_01_name: "Req 01 - {{ req_01 }}"
      task_01_cmd: "/bin/bash {{ script_dest }}"
      task_01_rc: "{{ result_01.rc | default(-1) }}"
      data_01: "{{ result_01.stdout | default('') | trim }}"
      status_01: "{{ ('APPLIED' if result_01.rc | default(-1) == 0 else 'FAILED') | trim }}"
      details_01: "{{ ('Remediation script executed successfully' if result_01.rc | default(-1) == 0 else 'Remediation script failed with exit code ' ~ (result_01.rc | default(-1))) | trim }}"
      task_02_name: "Req 02 - {{ req_02 }}"
      task_02_cmd: "verify script (find + modprobe + lsmod)"
      task_02_rc: "{{ result_02.rc | default(-1) }}"
      data_02: "{{ result_02.stdout | default('') | trim }}"
      status_02: "{{ ('PASS' if result_02.rc | default(-1) == 0 else 'FAIL') | trim }}"
      details_02: "{{ ('Compliance verified' if result_02.rc | default(-1) == 0 else 'Verification failed') | trim }}"
    tags: [execute]

  - name: "Req 03 - Generate remediation report"
    ansible.builtin.debug:
      msg:
      - "REMEDIATION REPORT — CIS 1.1.1.1"
      - "Reference: CIS Benchmark checkpoint 1.1.1.1"
      - ""
      - "REQUIREMENT 01 - {{ req_01 }}:"
      - "  Task: {{ task_01_name | default('Task not recorded') }}"
      - "  Command: {{ task_01_cmd | default('N/A') }}"
      - "  Exit code: {{ task_01_rc | default(-1) }}"
      - "  Data: {{ data_01 | default('') | trim }}"
      - "  Status: {{ status_01 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_01 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 02 - {{ req_02 }}:"
      - "  Task: {{ task_02_name | default('Task not recorded') }}"
      - "  Command: {{ task_02_cmd | default('N/A') }}"
      - "  Exit code: {{ task_02_rc | default(-1) }}"
      - "  Data: {{ data_02 | default('') | trim }}"
      - "  Status: {{ status_02 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_02 | default('Not evaluated') | trim }}"
      - ""
      - "OVERALL REMEDIATION"
      - "  Result: {{ status_02 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_02 | default('Not evaluated') | trim }}"
    tags: [execute]

  always:
# === STATE GUARD — RESTORE (tag: restore) ===
  - name: "State Guard Restore - Check if checkpoint exists"
    ansible.builtin.stat:
      path: "{{ state_guard_flag }}"
    register: _sg_restore_flag
    failed_when: false
    tags: [restore]

  - name: "State Guard Restore - Check if backup exists"
    ansible.builtin.stat:
      path: "{{ state_guard_dir }}/cramfs.conf.present"
    register: _sg_restore_backup
    failed_when: false
    tags: [restore]

  - name: "State Guard Restore - Restore /etc/modprobe.d/cramfs.conf from backup"
    ansible.builtin.copy:
      src: "{{ state_guard_dir }}/cramfs.conf.present"
      dest: "/etc/modprobe.d/cramfs.conf"
      remote_src: true
    when: _sg_restore_backup.stat.exists | default(false)
    failed_when: false
    tags: [restore]

  - name: "State Guard Restore - Check for absent marker"
    ansible.builtin.stat:
      path: "{{ state_guard_dir }}/cramfs.conf.absent"
    register: _sg_restore_absent
    failed_when: false
    tags: [restore]

  - name: "State Guard Restore - Delete /etc/modprobe.d/cramfs.conf (absent)"
    ansible.builtin.file:
      path: "/etc/modprobe.d/cramfs.conf"
      state: absent
    when: _sg_restore_absent.stat.exists | default(false)
    failed_when: false
    tags: [restore]

  - name: "State Guard Restore - Read saved module load state"
    ansible.builtin.slurp:
      src: "{{ state_guard_dir }}/{{ kernel_module }}_load_state"
    register: _sg_restore_mod_state
    failed_when: false
    tags: [restore]

  - name: "State Guard Restore - Reload kernel module if previously loaded"
    ansible.builtin.shell: "modprobe {{ kernel_module }} 2>/dev/null || true"
    args:
      executable: /bin/bash
    when:
    - _sg_restore_mod_state.content is defined
    - (_sg_restore_mod_state.content | b64decode | trim) == 'loaded'
    failed_when: false
    tags: [restore]

  - name: "State Guard Restore - Remove checkpoint"
    ansible.builtin.file:
      path: "{{ state_guard_dir }}"
      state: absent
    when: _sg_restore_flag.stat.exists | default(false)
    failed_when: false
    tags: [restore]
