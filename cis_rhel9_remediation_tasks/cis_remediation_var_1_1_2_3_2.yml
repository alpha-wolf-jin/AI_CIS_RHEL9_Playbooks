playbook_name: "cis_1_1_2_3_2_remediation"
backup_dir: "/var/log/ai-playbooks-backup/{{ playbook_name }}"
req_01: |
  Apply check for separate /home partition using command: `mount | grep -E '\\s/home\\s'`. Expected result: output contains a line with /home partition.
req_02: |
  Apply nodev mount option to /home in /etc/fstab using command: `sed -i 's|\\(\\s/home\\s\\+\\S\\+\\s\\+\\S\\+\\)\\s\\+[^ ]*|\\1 defaults,rw,nosuid,nodev,noexec,relatime|' /etc/fstab`. Expected result: /etc/fstab entry for /home includes nodev in the options.
req_03: "Apply remount of /home with new options using command: `mount -o remount /home`. Expected result: no error output, /home is remounted with nodev."
req_04: |
  Verify nodev option is active on /home using command: `mount | grep -E '\\s/home\\s' | grep -o 'nodev'`. Expected result: output contains 'nodev'.
req_05: "Store the final remediation result in a variable named 'cis_result' using set_fact. Set cis_result to the overall remediation status (PASS/FAIL/SKIP/ERROR) derived from the last requirement's status variable."
