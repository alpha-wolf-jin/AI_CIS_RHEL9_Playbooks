playbook_name: "cis_5_1_9"
checkpoint_id: "cis_5_1_9"
state_guard_dir: "/usr/local/bin/cis/.cis_state_guard/{{ checkpoint_id }}"
state_guard_flag: "{{ state_guard_dir }}/checkpoint.flag"
config_file: "/etc/ssh/sshd_config"
service_name: "sshd"
req_01: "Ensure sshd is installed using command: `which sshd`. Expected result: path to sshd binary."
req_02: "Set ClientAliveInterval to 15 in /etc/ssh/sshd_config using command: `grep -q '^ClientAliveInterval' /etc/ssh/sshd_config && sudo sed -i 's/^ClientAliveInterval.*/ClientAliveInterval 15/' /etc/ssh/sshd_config || echo 'ClientAliveInterval 15' | sudo tee -a /etc/ssh/sshd_config`. Expected result: parameter set before any Include or Match entries."
req_03: "Set ClientAliveCountMax to 3 in /etc/ssh/sshd_config using command: `grep -q '^ClientAliveCountMax' /etc/ssh/sshd_config && sudo sed -i 's/^ClientAliveCountMax.*/ClientAliveCountMax 3/' /etc/ssh/sshd_config || echo 'ClientAliveCountMax 3' | sudo tee -a /etc/ssh/sshd_config`. Expected result: parameter set before any Include or Match entries."
req_04: "Verify the configuration using command: `sshd -T | grep -E 'clientaliveinterval|clientalivecountmax'`. Expected result: clientaliveinterval 15 and clientalivecountmax 3."
req_05: "Store the final remediation result in a variable named 'cis_result' using set_fact. Set cis_result to the overall remediation status (PASS/FAIL/SKIP/ERROR) derived from the last requirement's status variable."
