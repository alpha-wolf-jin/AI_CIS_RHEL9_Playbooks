playbook_name: "cis_1.1.2.6.3_nosuid_var_log"
checkpoint_id: "cis_1_1_2_6_3"
state_guard_dir: "/usr/local/bin/cis/.cis_state_guard/{{ checkpoint_id }}"
state_guard_flag: "{{ state_guard_dir }}/checkpoint.flag"
mount_point: "/var/log"
fstab_path: "/etc/fstab"
req_01: |
  Check if a separate partition exists for /var/log using command: `mount | grep -E '\\s/var/log\\s'`. Expected result: output showing /var/log partition details.
req_02: |
  Edit the /etc/fstab file and add nosuid to the fourth field (mounting options) for the /var/log partition using command: `sed -i 's|\\(/var/log\\s\\+\\S\\+\\s\\+\\S\\+\\s\\+\\)\\(\\S\\+\\)|\\1defaults,rw,nosuid,nodev,noexec,relatime|' /etc/fstab`. Expected result: the /var/log entry in /etc/fstab now includes nosuid in the options.
req_03: "Remount /var/log with the configured options using command: `mount -o remount /var/log`. Expected result: no error output, partition remounted successfully."
req_04: |
  Verify the nosuid option is set on /var/log partition using command: `mount | grep -E '\\s/var/log\\s' | grep -o 'nosuid'`. Expected result: output contains 'nosuid'.
