---
- name: Initialize meta data variables
  include_vars: cis_remediation_var_6_3_3_10.yml

- name: "Snapshot - Create backup directory"
  ansible.builtin.file:
    path: "{{ backup_dir }}"
    state: directory
    mode: '0700'
  tags: [snapshot]
- name: "Snapshot - Check if audit rules file exists"
  ansible.builtin.stat:
    path: "{{ audit_rules_file }}"
  register: _snap_audit_file
  tags: [snapshot]
- name: "Snapshot - Backup audit rules file if exists"
  ansible.builtin.copy:
    src: "{{ audit_rules_file }}"
    dest: "{{ backup_dir }}/50-mounts.rules.orig"
    remote_src: true
  when: "_snap_audit_file.stat.exists | default(false)"
  failed_when: false
  tags: [snapshot]
- name: "Snapshot - Record whether audit rules file existed"
  ansible.builtin.copy:
    content: "{{ _snap_audit_file.stat.exists | default(false) }}"
    dest: "{{ backup_dir }}/audit_file_existed"
  tags: [snapshot]

- block:
  - name: "Req 01 - Check if auditd is installed"
    ansible.builtin.package_facts:
      manager: auto
    failed_when: false
    tags: [execute]

  - name: "Req 01 - Set auditd installed fact"
    ansible.builtin.set_fact:
      auditd_installed: "{{ 'audit' in ansible_facts.packages }}"
      playbook_skipped: "{{ 'audit' not in ansible_facts.packages }}"
    tags: [execute]

  - name: "Req 01 - Apply audit rules for successful file system mounts"
    ansible.builtin.shell: |
      set -o pipefail
      UID_MIN=$(awk '/^\s*UID_MIN/{print $2}' /etc/login.defs)
      if [ -n "${UID_MIN}" ]; then
        printf "\n-a always,exit -F arch=b32 -S mount -F auid>=%s -F auid!=unset -k mounts\n-a always,exit -F arch=b64 -S mount -F auid>=%s -F auid!=unset -k mounts\n" "$UID_MIN" "$UID_MIN" > /etc/audit/rules.d/50-mounts.rules
        augenrules --load
        echo "RULES_APPLIED"
      else
        echo "ERROR: Variable 'UID_MIN' is unset."
        exit 1
      fi
    args:
      executable: /bin/bash
    register: result_01
    failed_when: false
    changed_when: false
    when: "auditd_installed | default(false) | bool"
    tags: [execute]

  - name: "Req 01 - Check if reboot is required"
    ansible.builtin.shell: |
      set -o pipefail
      if [[ $(auditctl -s | grep "enabled") =~ "2" ]]; then
        echo "REBOOT_REQUIRED"
      else
        echo "NO_REBOOT"
      fi
    args:
      executable: /bin/bash
    register: result_01_reboot
    failed_when: false
    changed_when: false
    when: "auditd_installed | default(false) | bool"
    tags: [execute]

  - name: "Req 01 - Reboot if required"
    ansible.builtin.reboot:
      reboot_timeout: 180
    when:
    - "auditd_installed | default(false) | bool"
    - "'REBOOT_REQUIRED' in result_01_reboot.stdout | default('')"
    tags: [execute]

  - name: "Req 02 - Verify successful file system mounts audit rule is active"
    ansible.builtin.shell: |
      set -o pipefail
      auditctl -l | grep -E 'always,exit.*mount.*key=mounts' || echo 'VERIFY_FAILED'
    args:
      executable: /bin/bash
    register: result_02
    failed_when: false
    changed_when: false
    when: "auditd_installed | default(false) | bool"
    tags: [execute]

  - name: "Store requirement 01 details"
    ansible.builtin.set_fact:
      task_01_name: "Apply audit rules for successful file system mounts"
      task_01_cmd: "printf rules to /etc/audit/rules.d/50-mounts.rules and augenrules --load"
      task_01_rc: "{{ result_01.rc | default(-1) if auditd_installed | default(false) | bool else -1 }}"
      data_01: "{{ result_01.stdout | default('SKIPPED - auditd not installed') | trim if auditd_installed | default(false) | bool else 'SKIPPED - auditd not installed' }}"
      status_01: "{{ 'APPLIED' if (auditd_installed | default(false) | bool) and (result_01.rc | default(-1) == 0) else ('SKIPPED' if not (auditd_installed | default(false) | bool) else 'FAILED') }}"
      details_01: "{{ 'Audit rules written and loaded successfully' if (auditd_installed | default(false) | bool) and (result_01.rc | default(-1) == 0) else ('auditd package not installed - remediation skipped' if not (auditd_installed | default(false) | bool) else 'Failed to apply audit rules: ' + result_01.stderr | default('unknown error') | trim) }}"
    tags: [execute]

  - name: "Store requirement 02 details"
    ansible.builtin.set_fact:
      task_02_name: "Verify successful file system mounts audit rule is active"
      task_02_cmd: "auditctl -l | grep -E 'always,exit.*mount.*key=mounts'"
      task_02_rc: "{{ result_02.rc | default(-1) if auditd_installed | default(false) | bool else -1 }}"
      data_02: "{{ result_02.stdout | default('SKIPPED - auditd not installed') | trim if auditd_installed | default(false) | bool else 'SKIPPED - auditd not installed' }}"
      status_02: "{{ 'APPLIED' if (auditd_installed | default(false) | bool) and (result_02.rc | default(-1) == 0) and ('VERIFY_FAILED' not in result_02.stdout | default('')) else ('SKIPPED' if not (auditd_installed | default(false) | bool) else 'FAILED') }}"
      details_02: "{{ 'Audit rule for mounts is active' if (auditd_installed | default(false) | bool) and (result_02.rc | default(-1) == 0) and ('VERIFY_FAILED' not in result_02.stdout | default('')) else ('auditd package not installed - verification skipped' if not (auditd_installed | default(false) | bool) else 'Audit rule not found or verification failed') }}"
    tags: [execute]

  - name: "Req 03 - Store final cis_result variable"
    ansible.builtin.set_fact:
      cis_result: >-
        {%- if status_02 == 'APPLIED' -%}PASS
        {%- elif status_02 == 'FAILED' -%}FAIL
        {%- elif status_02 == 'SKIPPED' -%}SKIP
        {%- else -%}ERROR
        {%- endif -%}
    tags: [execute]

  - name: "Store requirement 03 details"
    ansible.builtin.set_fact:
      task_03_name: "Store final remediation result"
      task_03_cmd: "Set cis_result variable mapping status_02 to PASS/FAIL/SKIP/ERROR"
      task_03_rc: "0"
      data_03: "{{ cis_result | default('ERROR') | trim }}"
      status_03: "PASS"
      details_03: "{{ 'Final result stored as ' + cis_result | default('ERROR') | trim }}"
    tags: [execute]

  - name: "Req 04 - Generate remediation report"
    ansible.builtin.debug:
      msg:
      - "========================================================"
      - "REMEDIATION REPORT — CIS 6.3.3.10"
      - "Reference: CIS Benchmark checkpoint 6.3.3.10"
      - "========================================================"
      - ""
      - "REQUIREMENT 01 - {{ req_01 }}:"
      - "  Task: {{ task_01_name | default('Task not recorded') }}"
      - "  Command: {{ task_01_cmd | default('N/A') }}"
      - "  Exit code: {{ task_01_rc | default(-1) }}"
      - "  Data: {{ data_01 | default('Data collection failed') | trim }}"
      - "  Status: {{ status_01 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_01 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 02 - {{ req_02 }}:"
      - "  Task: {{ task_02_name | default('Task not recorded') }}"
      - "  Command: {{ task_02_cmd | default('N/A') }}"
      - "  Exit code: {{ task_02_rc | default(-1) }}"
      - "  Data: {{ data_02 | default('Data collection failed') | trim }}"
      - "  Status: {{ status_02 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_02 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 03 - {{ req_03 }}:"
      - "  Task: {{ task_03_name | default('Task not recorded') }}"
      - "  Command: {{ task_03_cmd | default('N/A') }}"
      - "  Exit code: {{ task_03_rc | default(-1) }}"
      - "  Data: {{ data_03 | default('Data collection failed') | trim }}"
      - "  Status: {{ status_03 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_03 | default('Not evaluated') | trim }}"
      - ""
      - "========================================================"
      - "OVERALL REMEDIATION:"
      - "  Result: {{ cis_result | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_02 | default('Not evaluated') | trim }}"
      - "========================================================"
    tags: [execute]

  always:
  - name: "Restore - Check if backup exists"
    ansible.builtin.stat:
      path: "{{ backup_dir }}/50-mounts.rules.orig"
    register: _restore_backup_check
    failed_when: false
    tags: [restore]

  - name: "Restore - Overwrite audit rules file with original"
    ansible.builtin.copy:
      src: "{{ backup_dir }}/50-mounts.rules.orig"
      dest: "{{ audit_rules_file }}"
      remote_src: true
    when: "_restore_backup_check.stat.exists | default(false)"
    failed_when: false
    tags: [restore]

  - name: "Restore - Read existence marker"
    ansible.builtin.slurp:
      src: "{{ backup_dir }}/audit_file_existed"
    register: _restore_existed
    failed_when: false
    tags: [restore]

  - name: "Restore - Remove audit rules file if it was created by remediation"
    ansible.builtin.file:
      path: "{{ audit_rules_file }}"
      state: absent
    when:
    - "_restore_existed.content is defined"
    - "(_restore_existed.content | b64decode | trim) == 'False'"
    failed_when: false
    tags: [restore]

  - name: "Restore - Reload audit rules after restore"
    ansible.builtin.shell: augenrules --load 2>/dev/null || true
    args:
      executable: /bin/bash
    when: "_restore_backup_check.stat.exists | default(false)"
    failed_when: false
    tags: [restore]

  - name: "Restore - Remove backup directory"
    ansible.builtin.file:
      path: "{{ backup_dir }}"
      state: absent
    failed_when: false
    tags: [restore]
