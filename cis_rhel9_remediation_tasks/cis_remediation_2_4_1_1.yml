---
- name: Initialize meta data variables
  include_vars: cis_remediation_var_2_4_1_1.yml

- name: "Snapshot - Create backup directory"
  ansible.builtin.file:
    path: "{{ backup_dir }}"
    state: directory
    mode: '0700'
  tags: [snapshot]
- name: "Snapshot - Detect cron unit name"
  ansible.builtin.shell: |
    systemctl list-unit-files | awk '$1~/^crond?\.service/{print $1}'
  args:
    executable: /bin/bash
  register: _snap_cron_unit
  changed_when: false
  failed_when: false
  tags: [snapshot]
- name: "Snapshot - Save cron unit name to file"
  ansible.builtin.copy:
    content: "{{ _snap_cron_unit.stdout | default('') | trim }}"
    dest: "{{ backup_dir }}/cron_unit.txt"
  tags: [snapshot]
- name: "Snapshot - Capture cron enabled state"
  ansible.builtin.shell: |
    unit="{{ _snap_cron_unit.stdout | trim }}"
    systemctl is-enabled "$unit" 2>/dev/null || echo "unknown"
  args:
    executable: /bin/bash
  register: _snap_cron_enabled
  changed_when: false
  failed_when: false
  when: _snap_cron_unit.stdout | default('') | trim | length > 0
  tags: [snapshot]
- name: "Snapshot - Save cron enabled state to file"
  ansible.builtin.copy:
    content: "{{ _snap_cron_enabled.stdout | default('unknown') | trim }}"
    dest: "{{ backup_dir }}/cron_is_enabled.txt"
  when: _snap_cron_unit.stdout | default('') | trim | length > 0
  tags: [snapshot]
- name: "Snapshot - Capture cron active state"
  ansible.builtin.shell: |
    unit="{{ _snap_cron_unit.stdout | trim }}"
    systemctl is-active "$unit" 2>/dev/null || echo "unknown"
  args:
    executable: /bin/bash
  register: _snap_cron_active
  changed_when: false
  failed_when: false
  when: _snap_cron_unit.stdout | default('') | trim | length > 0
  tags: [snapshot]
- name: "Snapshot - Save cron active state to file"
  ansible.builtin.copy:
    content: "{{ _snap_cron_active.stdout | default('unknown') | trim }}"
    dest: "{{ backup_dir }}/cron_is_active.txt"
  when: _snap_cron_unit.stdout | default('') | trim | length > 0
  tags: [snapshot]

- block:
  - name: "Initialize data variables"
    set_fact:
      data_01: "Not collected yet"
      status_01: "ERROR"
      details_01: "Not evaluated"
      data_02: "Not collected yet"
      status_02: "ERROR"
      details_02: "Not evaluated"
      data_03: "Not collected yet"
      status_03: "ERROR"
      details_03: "Not evaluated"
      data_04: "Not collected yet"
      status_04: "ERROR"
      details_04: "Not evaluated"
      data_05: "Not collected yet"
      status_05: "ERROR"
      details_05: "Not evaluated"
      data_06: "Not collected yet"
      status_06: "ERROR"
      details_06: "Not evaluated"
      task_01_name: "Not executed"
      task_01_cmd: "N/A"
      task_01_rc: -1
      task_02_name: "Not executed"
      task_02_cmd: "N/A"
      task_02_rc: -1
      task_03_name: "Not executed"
      task_03_cmd: "N/A"
      task_03_rc: -1
      task_04_name: "Not executed"
      task_04_cmd: "N/A"
      task_04_rc: -1
      task_05_name: "Not executed"
      task_05_cmd: "N/A"
      task_05_rc: -1
      task_06_name: "Not executed"
      task_06_cmd: "N/A"
      task_06_rc: -1
    tags: [execute]

# Requirement 1: Check if cron is installed
  - name: "Req 01 - Check if cron is installed"
    ansible.builtin.shell: which cron || which crond || dpkg -l cron 2>/dev/null || rpm -q cron 2>/dev/null
    args:
      executable: /bin/bash
    register: result_01
    failed_when: false
    changed_when: false
    tags: [execute]

  - name: "Store requirement 01 details"
    set_fact:
      task_01_name: "Check cron installation with which/dpkg/rpm"
      task_01_cmd: "which cron || which crond || dpkg -l cron 2>/dev/null || rpm -q cron 2>/dev/null"
      task_01_rc: "{{ result_01.rc | default(-1) }}"
      data_01: "{{ result_01.stdout | default('') | trim }}"
      status_01: "{{ ('PASS' if result_01.rc | default(-1) == 0 else 'SKIP') | trim }}"
      details_01: "{{ ('cron package found: ' + (result_01.stdout | default('') | trim)) if result_01.rc | default(-1) == 0 else 'cron not installed — skipping remediation' | trim }}"
    tags: [execute]

  - name: "Set cron_installed flag"
    set_fact:
      cron_installed: "{{ result_01.rc | default(-1) == 0 }}"
    tags: [execute]

# Requirement 2: Unmask cron service
  - name: "Req 02 - Unmask cron service"
    ansible.builtin.shell: |
      systemctl unmask "$(systemctl list-unit-files | awk '$1~/^crond?\.service/{print $1}')"
    args:
      executable: /bin/bash
    register: result_02
    failed_when: false
    changed_when: false
    when: cron_installed | default(false)
    tags: [execute]

  - name: "Store requirement 02 details"
    set_fact:
      task_02_name: "Unmask cron service"
      task_02_cmd: |
        systemctl unmask \"$(systemctl list-unit-files | awk '$1~/^crond?\.service/{print $1}')\"
      task_02_rc: "{{ result_02.rc | default(-1) }}"
      data_02: "{{ result_02.stdout | default('') | trim }}"
      status_02: "{{ 'SKIP' if not cron_installed else ('PASS' if result_02.rc | default(-1) == 0 else 'FAIL') | trim }}"
      details_02: "{{ 'Skipped — cron not installed' if not cron_installed else ('Unmask succeeded' if result_02.rc | default(-1) == 0 else 'Unmask failed') | trim }}"
    tags: [execute]

# Requirement 3: Enable and start cron
  - name: "Req 03 - Enable and start cron service"
    ansible.builtin.shell: |
      systemctl --now enable "$(systemctl list-unit-files | awk '$1~/^crond?\.service/{print $1}')"
    args:
      executable: /bin/bash
    register: result_03
    failed_when: false
    changed_when: false
    when: cron_installed | default(false)
    tags: [execute]

  - name: "Store requirement 03 details"
    set_fact:
      task_03_name: "Enable and start cron"
      task_03_cmd: |
        systemctl --now enable \"$(systemctl list-unit-files | awk '$1~/^crond?\.service/{print $1}')\"
      task_03_rc: "{{ result_03.rc | default(-1) }}"
      data_03: "{{ result_03.stdout | default('') | trim }}"
      status_03: "{{ 'SKIP' if not cron_installed else ('PASS' if result_03.rc | default(-1) == 0 else 'FAIL') | trim }}"
      details_03: "{{ 'Skipped — cron not installed' if not cron_installed else ('Enable succeeded' if result_03.rc | default(-1) == 0 else 'Enable failed') | trim }}"
    tags: [execute]

# Requirement 4: Verify cron daemon status
  - name: "Req 04 - Verify cron daemon is enabled and active"
    ansible.builtin.shell: |
      systemctl is-enabled "$(systemctl list-unit-files | awk '$1~/^crond?\.service/{print $1}')" && systemctl is-active "$(systemctl list-unit-files | awk '$1~/^crond?\.service/{print $1}')"
    args:
      executable: /bin/bash
    register: result_04
    failed_when: false
    changed_when: false
    when: cron_installed | default(false)
    tags: [execute]

  - name: "Store requirement 04 details"
    set_fact:
      task_04_name: "Verify cron enabled and active"
      task_04_cmd: |
        systemctl is-enabled \"$(systemctl list-unit-files | awk '$1~/^crond?\.service/{print $1}')\" && systemctl is-active \"$(systemctl list-unit-files | awk '$1~/^crond?\.service/{print $1}')\"
      task_04_rc: "{{ result_04.rc | default(-1) }}"
      data_04: "{{ result_04.stdout | default('') | trim }}"
      status_04: "{{ 'SKIP' if not cron_installed else ('PASS' if result_04.rc | default(-1) == 0 else 'FAIL') | trim }}"
      details_04: "{{ 'Skipped — cron not installed' if not cron_installed else ('cron is enabled and active' if result_04.rc | default(-1) == 0 else 'verification failed') | trim }}"
    tags: [execute]

# Requirement 5: Store final remediation result
  - name: "Req 05 - Store final remediation result (cis_result)"
    set_fact:
      cis_result: "{{ status_04 | default('ERROR') | trim }}"
      task_05_name: "Store cis_result"
      task_05_cmd: "set_fact: cis_result = {{ status_04 | default('ERROR') | trim }}"
      task_05_rc: 0
      data_05: "{{ status_04 | default('ERROR') | trim }}"
      status_05: "PASS"
      details_05: "Overall remediation status recorded"
    tags: [execute]

# Requirement 6: Generate report
  - name: "Req 06 - Generate remediation report"
    debug:
      msg:
      - "REMEDIATION REPORT — CIS 2.4.1.1"
      - "Reference: CIS Benchmark checkpoint 2.4.1.1"
      - ""
      - "REQUIREMENT 01 - {{ req_01 }}:"
      - "  Task: {{ task_01_name }}"
      - "  Command: {{ task_01_cmd }}"
      - "  Exit code: {{ task_01_rc }}"
      - "  Data: {{ data_01 }}"
      - "  Status: {{ status_01 }}"
      - "  Details: {{ details_01 }}"
      - ""
      - "REQUIREMENT 02 - {{ req_02 }}:"
      - "  Task: {{ task_02_name }}"
      - "  Command: {{ task_02_cmd }}"
      - "  Exit code: {{ task_02_rc }}"
      - "  Data: {{ data_02 }}"
      - "  Status: {{ status_02 }}"
      - "  Details: {{ details_02 }}"
      - ""
      - "REQUIREMENT 03 - {{ req_03 }}:"
      - "  Task: {{ task_03_name }}"
      - "  Command: {{ task_03_cmd }}"
      - "  Exit code: {{ task_03_rc }}"
      - "  Data: {{ data_03 }}"
      - "  Status: {{ status_03 }}"
      - "  Details: {{ details_03 }}"
      - ""
      - "REQUIREMENT 04 - {{ req_04 }}:"
      - "  Task: {{ task_04_name }}"
      - "  Command: {{ task_04_cmd }}"
      - "  Exit code: {{ task_04_rc }}"
      - "  Data: {{ data_04 }}"
      - "  Status: {{ status_04 }}"
      - "  Details: {{ details_04 }}"
      - ""
      - "REQUIREMENT 05 - {{ req_05 }}:"
      - "  Task: {{ task_05_name }}"
      - "  Command: {{ task_05_cmd }}"
      - "  Exit code: {{ task_05_rc }}"
      - "  Data: {{ data_05 }}"
      - "  Status: {{ status_05 }}"
      - "  Details: {{ details_05 }}"
      - ""
      - "========================================================"
      - "OVERALL REMEDIATION:"
      - "  Result: {{ cis_result }}"
      - "========================================================"
    tags: [execute]

  always:
  - name: "Restore - Check if backup directory exists"
    ansible.builtin.stat:
      path: "{{ backup_dir }}"
    register: backup_dir_stat
    failed_when: false
    tags: [restore]

  - name: "Restore - Stat cron unit name file"
    ansible.builtin.stat:
      path: "{{ backup_dir }}/cron_unit.txt"
    register: _restore_unit_stat
    failed_when: false
    when: backup_dir_stat.stat.exists | default(false)
    tags: [restore]

  - name: "Restore - Read cron unit name"
    ansible.builtin.slurp:
      src: "{{ backup_dir }}/cron_unit.txt"
    register: _restore_unit_slurp
    failed_when: false
    when:
    - backup_dir_stat.stat.exists | default(false)
    - _restore_unit_stat.stat.exists | default(false)
    tags: [restore]

  - name: "Restore - Read cron enabled state"
    ansible.builtin.slurp:
      src: "{{ backup_dir }}/cron_is_enabled.txt"
    register: _restore_enabled_slurp
    failed_when: false
    when:
    - backup_dir_stat.stat.exists | default(false)
    - _restore_unit_stat.stat.exists | default(false)
    tags: [restore]

  - name: "Restore - Read cron active state"
    ansible.builtin.slurp:
      src: "{{ backup_dir }}/cron_is_active.txt"
    register: _restore_active_slurp
    failed_when: false
    when:
    - backup_dir_stat.stat.exists | default(false)
    - _restore_unit_stat.stat.exists | default(false)
    tags: [restore]

  - name: "Restore - Set unit_name and state variables from slurp"
    set_fact:
      _restore_unit: "{{ _restore_unit_slurp.content | b64decode | trim }}"
      _restore_enabled_state: "{{ _restore_enabled_slurp.content | b64decode | trim }}"
      _restore_active_state: "{{ _restore_active_slurp.content | b64decode | trim }}"
    when:
    - _restore_unit_slurp.content is defined
    - _restore_enabled_slurp.content is defined
    - _restore_active_slurp.content is defined
    tags: [restore]

  - name: "Restore - Mask cron if originally masked"
    ansible.builtin.shell: "systemctl mask {{ _restore_unit }}"
    args:
      executable: /bin/bash
    when:
    - _restore_unit | default('') | length > 0
    - _restore_enabled_state | default('') == 'masked'
    failed_when: false
    tags: [restore]

  - name: "Restore - Disable cron if originally disabled"
    ansible.builtin.shell: "systemctl disable {{ _restore_unit }}"
    args:
      executable: /bin/bash
    when:
    - _restore_unit | default('') | length > 0
    - _restore_enabled_state | default('') == 'disabled'
    failed_when: false
    tags: [restore]

  - name: "Restore - Stop cron if originally inactive"
    ansible.builtin.shell: "systemctl stop {{ _restore_unit }}"
    args:
      executable: /bin/bash
    when:
    - _restore_unit | default('') | length > 0
    - _restore_active_state | default('') == 'inactive'
    failed_when: false
    tags: [restore]

  - name: "Restore - Remove backup directory"
    ansible.builtin.file:
      path: "{{ backup_dir }}"
      state: absent
    when: backup_dir_stat.stat.exists | default(false)
    failed_when: false
    tags: [restore]
