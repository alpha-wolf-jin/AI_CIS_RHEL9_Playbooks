playbook_name: "cis_7_1_12"
checkpoint_id: "cis_7_1_12"
state_guard_dir: "/usr/local/bin/cis/.cis_state_guard/{{ checkpoint_id }}"
state_guard_flag: "{{ state_guard_dir }}/checkpoint.flag"
req_01: "Apply prerequisite check for find command using: `command -v find`. Expected result: find is available."
req_02: "Apply identification of files without an owner using command: `find / -nouser -o -nogroup 2>/dev/null`. Expected result: list of files and directories without owner or group."
req_03: "Apply ownership change for each file without an owner using command: `find / -nouser -exec chown root:root {} + 2>/dev/null`. Expected result: all files without an owner are reassigned to root:root."
req_04: "Apply group ownership change for each file without a group using command: `find / -nogroup -exec chgrp root {} + 2>/dev/null`. Expected result: all files without a group are reassigned to group root."
req_05: "Verify no files or directories without an owner and a group exist using command: `find / -nouser -o -nogroup 2>/dev/null`. Expected result: no output (empty list)."
req_06: "Store the final remediation result in a variable named 'cis_result' using set_fact. Set cis_result to the overall remediation status (PASS/FAIL/SKIP/ERROR) derived from the last requirement's status variable."
