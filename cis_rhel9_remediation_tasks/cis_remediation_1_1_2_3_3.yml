---
- name: Initialize meta data variables
  include_vars: cis_remediation_var_1_1_2_3_3.yml

- name: "Snapshot - Create backup directory"
  ansible.builtin.file:
    path: "{{ backup_dir }}"
    state: directory
    mode: '0700'
  tags: [snapshot]
- name: "Snapshot - Check if /etc/fstab exists"
  ansible.builtin.stat:
    path: /etc/fstab
  register: _fstab_stat
  tags: [snapshot]
- name: "Snapshot - Check if backup of /etc/fstab already exists"
  ansible.builtin.stat:
    path: "{{ backup_dir }}/fstab.bak"
  register: _fstab_backup_exists
  tags: [snapshot]
- name: "Snapshot - Backup /etc/fstab"
  ansible.builtin.copy:
    src: /etc/fstab
    dest: "{{ backup_dir }}/fstab.bak"
    remote_src: true
  when:
  - _fstab_stat.stat.exists
  - not (_fstab_backup_exists.stat.exists | default(false))
  tags: [snapshot]

- block:
  - name: "Req 01 - Check if /home is a separate partition"
    ansible.builtin.shell: mount | grep ' /home '
    args:
      executable: /bin/bash
    register: result_01
    failed_when: false
    tags: [execute]

  - name: "Set requirement 01 facts"
    ansible.builtin.set_fact:
      task_01_name: "Check /home partition with mount"
      task_01_cmd: "mount | grep ' /home '"
      task_01_rc: "{{ result_01.rc }}"
      data_01: "{{ result_01.stdout | default('') | trim }}"
      status_01: "{{ 'PASS' if result_01.rc == 0 else 'SKIP' }}"
      details_01: "{{ 'Separate /home partition found' if result_01.rc == 0 else 'No separate /home partition found' }}"
    tags: [execute]

  - name: "Req 02 - Ensure nosuid option in /etc/fstab for /home"
    ansible.builtin.shell: |
      if grep ' /home ' /etc/fstab | grep -q nosuid; then
        echo "nosuid already present in fstab"
      else
        sed -i 's|^\([^ ]*[[:space:]]*/home[[:space:]]*[^ ]*[[:space:]]*\)[^ ]*|\1defaults,rw,nosuid,nodev,noexec,relatime|' /etc/fstab
      fi
      grep ' /home ' /etc/fstab | grep -q nosuid
    args:
      executable: /bin/bash
    register: result_02
    failed_when: false
    when: result_01.rc == 0
    tags: [execute]

  - name: "Set requirement 02 facts"
    ansible.builtin.set_fact:
      task_02_name: "Ensure nosuid option in /etc/fstab for /home"
      task_02_cmd: "sed to set nosuid options on /home in /etc/fstab"
      task_02_rc: "{{ result_02.rc | default(-1) }}"
      data_02: "{{ result_02.stdout | default('') | trim }}"
      status_02: "{{ 'SKIP' if result_02.skipped | default(false) else ('PASS' if result_02.rc | default(-1) == 0 else 'FAIL') }}"
      details_02: "{{ 'Skipped because no /home partition' if result_02.skipped | default(false) else ('nosuid is set in fstab' if result_02.rc | default(-1) == 0 else 'nosuid not set in fstab') }}"
    tags: [execute]

  - name: "Req 03 - Remount /home with updated options"
    ansible.builtin.shell: mount -o remount /home
    args:
      executable: /bin/bash
    register: result_03
    when: result_01.rc == 0
    failed_when: false
    tags: [execute]

  - name: "Set requirement 03 facts"
    ansible.builtin.set_fact:
      task_03_name: "Remount /home"
      task_03_cmd: "mount -o remount /home"
      task_03_rc: "{{ result_03.rc | default(-1) }}"
      data_03: "{{ result_03.stdout | default('') | trim }}"
      status_03: "{{ 'SKIP' if result_03.skipped | default(false) else ('PASS' if result_03.rc | default(-1) == 0 else 'FAIL') }}"
      details_03: "{{ 'Skipped because no /home partition' if result_03.skipped | default(false) else ('Remounted successfully' if result_03.rc | default(-1) == 0 else 'Remount failed') }}"
    tags: [execute]

  - name: "Req 04 - Verify nosuid option is active on /home"
    ansible.builtin.shell: |
      findmnt -n -o OPTIONS /home | grep -q nosuid && echo 'nosuid is set'
    args:
      executable: /bin/bash
    register: result_04
    when: result_01.rc == 0
    failed_when: false
    tags: [execute]

  - name: "Set requirement 04 facts"
    ansible.builtin.set_fact:
      task_04_name: "Verify nosuid on /home"
      task_04_cmd: "findmnt -n -o OPTIONS /home | grep -q nosuid && echo 'nosuid is set'"
      task_04_rc: "{{ result_04.rc | default(-1) }}"
      data_04: "{{ result_04.stdout | default('') | trim }}"
      status_04: "{{ 'SKIP' if result_04.skipped | default(false) else ('PASS' if result_04.rc | default(-1) == 0 else 'FAIL') }}"
      details_04: "{{ 'Skipped because no /home partition' if result_04.skipped | default(false) else ('nosuid is active' if result_04.rc | default(-1) == 0 else 'nosuid is NOT active') }}"
    tags: [execute]

  - name: "Set cis_result"
    ansible.builtin.set_fact:
      cis_result: "{{ status_04 | trim }}"
    tags: [execute]

  - name: "Generate remediation report"
    ansible.builtin.debug:
      msg: |
        REMEDIATION REPORT — CIS 1.1.2.3.3
        Reference: CIS Benchmark checkpoint 1.1.2.3.3

        Requirement 01 - {{ req_01 }}:
          Task: {{ task_01_name }}
          Command: {{ task_01_cmd }}
          Exit code: {{ task_01_rc }}
          Data: {{ data_01 }}
          Status: {{ status_01 }}
          Details: {{ details_01 }}

        Requirement 02 - {{ req_02 }}:
          Task: {{ task_02_name }}
          Command: {{ task_02_cmd }}
          Exit code: {{ task_02_rc }}
          Data: {{ data_02 }}
          Status: {{ status_02 }}
          Details: {{ details_02 }}

        Requirement 03 - {{ req_03 }}:
          Task: {{ task_03_name }}
          Command: {{ task_03_cmd }}
          Exit code: {{ task_03_rc }}
          Data: {{ data_03 }}
          Status: {{ status_03 }}
          Details: {{ details_03 }}

        Requirement 04 - {{ req_04 }}:
          Task: {{ task_04_name }}
          Command: {{ task_04_cmd }}
          Exit code: {{ task_04_rc }}
          Data: {{ data_04 }}
          Status: {{ status_04 }}
          Details: {{ details_04 }}

        OVERALL REMEDIATION:
          Result: {{ cis_result }}
          Details: {{ details_04 }}
    tags: [execute]

  always:
  - name: "Restore - Check if backup exists"
    ansible.builtin.stat:
      path: "{{ backup_dir }}/fstab.bak"
    register: _restore_fstab_stat
    tags: [restore]

  - name: "Restore - Overwrite /etc/fstab with original"
    ansible.builtin.copy:
      src: "{{ backup_dir }}/fstab.bak"
      dest: /etc/fstab
      remote_src: true
    when: _restore_fstab_stat.stat.exists | default(false)
    failed_when: false
    tags: [restore]

  - name: "Restore - Remount /home with original options"
    ansible.builtin.shell: mount -o remount /home
    args:
      executable: /bin/bash
    when: _restore_fstab_stat.stat.exists | default(false)
    failed_when: false
    tags: [restore]

  - name: "Restore - Remove backup directory"
    ansible.builtin.file:
      path: "{{ backup_dir }}"
      state: absent
    failed_when: false
    tags: [restore]
