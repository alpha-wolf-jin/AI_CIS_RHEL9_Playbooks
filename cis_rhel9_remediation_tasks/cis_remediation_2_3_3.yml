---
- name: Initialize meta data variables
  include_vars: cis_remediation_var_2_3_3.yml

- name: "Snapshot - Create backup directory"
  ansible.builtin.file:
    path: "{{ backup_dir }}"
    state: directory
    mode: '0700'
  tags: [snapshot]
- name: "Snapshot - Check if config file exists"
  ansible.builtin.stat:
    path: /etc/sysconfig/chronyd
  register: chronyd_config_stat
  tags: [snapshot]
- name: "Snapshot - Backup config file if exists"
  ansible.builtin.copy:
    src: /etc/sysconfig/chronyd
    dest: "{{ backup_dir }}/chronyd.backup"
    remote_src: true
  when: chronyd_config_stat.stat.exists
  tags: [snapshot]

- block:
  - name: "Initialize data variables"
    set_fact:
      data_01: "Not collected yet"
      status_01: "ERROR"
      details_01: "Not evaluated"
      data_02: "Not collected yet"
      status_02: "ERROR"
      details_02: "Not evaluated"
      data_03: "Not collected yet"
      status_03: "ERROR"
      details_03: "Not evaluated"
      task_01_name: "Not executed"
      task_01_cmd: "N/A"
      task_01_rc: -1
      task_02_name: "Not executed"
      task_02_cmd: "N/A"
      task_02_rc: -1
      task_03_name: "Not executed"
      task_03_cmd: "N/A"
      task_03_rc: -1
    tags: [execute]

  - name: "Check if chrony is installed"
    ansible.builtin.package_facts:
      manager: auto
    failed_when: false
    tags: [execute]

  - name: "Set skip if chrony not installed"
    set_fact:
      skip_remediation: "{{ 'chrony' not in ansible_facts.packages }}"
    tags: [execute]

  - name: "Set skip details when not installed"
    set_fact:
      status_01: "SKIP"
      status_02: "SKIP"
      status_03: "SKIP"
      details_01: "Chrony not installed"
      details_02: "Chrony not installed"
      details_03: "Chrony not installed"
    when: skip_remediation
    tags: [execute]

  - name: "Req 01 - Remove -u root from chronyd config"
    shell: |
      sed -i 's/-u root//g' /etc/sysconfig/chronyd
      cat /etc/sysconfig/chronyd
      grep -q -- '-u root' /etc/sysconfig/chronyd && exit 1 || exit 0
    args:
      executable: /bin/bash
    register: result_01
    failed_when: false
    when: not skip_remediation
    tags: [execute]

  - name: "Store requirement 01 details"
    set_fact:
      task_01_name: "Req 01 - Remove -u root from chronyd config"
      task_01_cmd: "sed -i 's/-u root//g' /etc/sysconfig/chronyd; cat /etc/sysconfig/chronyd; grep -q -- '-u root' /etc/sysconfig/chronyd && exit 1 || exit 0"
      task_01_rc: "{{ result_01.rc | default(-1) }}"
      data_01: "{{ result_01.stdout | default('') | trim }}"
      status_01: "{{ ('PASS' if (result_01.rc | default(-1)) == 0 else 'FAIL') | trim }}"
      details_01: "{{ ('File no longer contains -u root' if (result_01.rc | default(-1)) == 0 else 'File still contains -u root or operation failed') | trim }}"
    when: not skip_remediation
    tags: [execute]

  - name: "Req 02 - Reload chronyd service"
    shell: systemctl reload-or-restart chronyd.service
    args:
      executable: /bin/bash
    register: result_02
    failed_when: false
    when: not skip_remediation
    tags: [execute]

  - name: "Store requirement 02 details"
    set_fact:
      task_02_name: "Req 02 - Reload chronyd service"
      task_02_cmd: "systemctl reload-or-restart chronyd.service"
      task_02_rc: "{{ result_02.rc | default(-1) }}"
      data_02: "{{ result_02.stdout | default('') | trim }}"
      status_02: "{{ ('PASS' if (result_02.rc | default(-1)) == 0 else 'FAIL') | trim }}"
      details_02: "{{ ('Service reloaded/restarted successfully' if (result_02.rc | default(-1)) == 0 else 'Service reload/restart failed') | trim }}"
    when: not skip_remediation
    tags: [execute]

  - name: "Req 03 - Verify chronyd not running as root"
    shell: ps aux | grep chronyd | grep -v grep | awk '{print $1}' | head -1
    args:
      executable: /bin/bash
    register: result_03
    failed_when: false
    when: not skip_remediation
    tags: [execute]

  - name: "Store requirement 03 details"
    set_fact:
      task_03_name: "Req 03 - Verify chronyd user"
      task_03_cmd: "ps aux | grep chronyd | grep -v grep | awk '{print $1}' | head -1"
      task_03_rc: "{{ result_03.rc | default(-1) }}"
      data_03: "{{ result_03.stdout | default('') | trim }}"
      status_03: >-
        {%- set user = result_03.stdout | default('') | trim %}
        {%- if result_03.rc | default(-1) == 0 and user != '' and user != 'root' -%}
          PASS
        {%- else -%}
          FAIL
        {%- endif -%}
      details_03: >-
        {%- set user = result_03.stdout | default('') | trim %}
        {%- if result_03.rc | default(-1) == 0 and user != '' and user != 'root' -%}
          chrony running as non-root user {{ user }}
        {%- else -%}
          chrony running as root or not running
        {%- endif -%}
    when: not skip_remediation
    tags: [execute]

  - name: "Store overall remediation result"
    set_fact:
      cis_result: >-
        {%- if skip_remediation | default(false) -%}
          SKIP
        {%- else -%}
          {{ status_03 | trim }}
        {%- endif -%}
    tags: [execute]

  - name: "Generate remediation report"
    debug:
      msg:
      - "REMEDIATION REPORT — CIS 2.3.3"
      - "Reference: CIS Benchmark checkpoint 2.3.3"
      - ""
      - "REQUIREMENT 01 - {{ req_01 }}:"
      - "  Task: {{ task_01_name | default('Not recorded') }}"
      - "  Command: {{ task_01_cmd | default('N/A') }}"
      - "  Exit code: {{ task_01_rc | default(-1) }}"
      - "  Data: {{ data_01 | default('') | trim }}"
      - "  Status: {{ status_01 | default('ERROR') | trim }}"
      - "  Details: {{ details_01 | default('') | trim }}"
      - ""
      - "REQUIREMENT 02 - {{ req_02 }}:"
      - "  Task: {{ task_02_name | default('Not recorded') }}"
      - "  Command: {{ task_02_cmd | default('N/A') }}"
      - "  Exit code: {{ task_02_rc | default(-1) }}"
      - "  Data: {{ data_02 | default('') | trim }}"
      - "  Status: {{ status_02 | default('ERROR') | trim }}"
      - "  Details: {{ details_02 | default('') | trim }}"
      - ""
      - "REQUIREMENT 03 - {{ req_03 }}:"
      - "  Task: {{ task_03_name | default('Not recorded') }}"
      - "  Command: {{ task_03_cmd | default('N/A') }}"
      - "  Exit code: {{ task_03_rc | default(-1) }}"
      - "  Data: {{ data_03 | default('') | trim }}"
      - "  Status: {{ status_03 | default('ERROR') | trim }}"
      - "  Details: {{ details_03 | default('') | trim }}"
      - ""
      - "OVERALL REMEDIATION:"
      - "  Result: {{ cis_result | default('ERROR') | trim }}"
    tags: [execute]

  always:
  - name: "Restore - Check if backup exists"
    ansible.builtin.stat:
      path: "{{ backup_dir }}/chronyd.backup"
    register: restore_backup_stat
    failed_when: false
    tags: [restore]

  - name: "Restore - Overwrite with original"
    ansible.builtin.copy:
      src: "{{ backup_dir }}/chronyd.backup"
      dest: /etc/sysconfig/chronyd
      remote_src: true
    when: restore_backup_stat.stat.exists
    failed_when: false
    tags: [restore]

  - name: "Restore - Reload chronyd service with original config"
    ansible.builtin.shell: systemctl reload-or-restart chronyd.service
    args:
      executable: /bin/bash
    when: restore_backup_stat.stat.exists
    failed_when: false
    tags: [restore]

  - name: "Restore - Remove backup directory"
    ansible.builtin.file:
      path: "{{ backup_dir }}"
      state: absent
    failed_when: false
    tags: [restore]
