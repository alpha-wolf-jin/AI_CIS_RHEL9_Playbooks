---
- name: Initialize meta data variables
  include_vars: cis_remediation_var_7_2_7.yml

- name: "Snapshot - Create backup directory"
  ansible.builtin.file:
    path: "{{ backup_dir }}"
    state: directory
    mode: '0700'
  tags: [snapshot]
- name: "Snapshot - Check if /etc/group exists"
  ansible.builtin.stat:
    path: /etc/group
  register: _group_stat
  tags: [snapshot]
- name: "Snapshot - Backup /etc/group if exists"
  ansible.builtin.copy:
    src: /etc/group
    dest: "{{ backup_dir }}/group.backup"
    remote_src: true
  when: _group_stat.stat.exists
  tags: [snapshot]

- block:
  - name: "Initialize data variables"
    set_fact:
      data_01: "Not collected yet"
      status_01: "UNKNOWN"
      details_01: "Not evaluated"
      data_02: "Not collected yet"
      status_02: "UNKNOWN"
      details_02: "Not evaluated"
      data_03: "Not collected yet"
      status_03: "UNKNOWN"
      details_03: "Not evaluated"
      data_04: "Not collected yet"
      status_04: "UNKNOWN"
      details_04: "Not evaluated"
      data_05: "Not collected yet"
      status_05: "UNKNOWN"
      details_05: "Not evaluated"
      task_01_name: "Not executed"
      task_01_cmd: "N/A"
      task_01_rc: -1
      task_02_name: "Not executed"
      task_02_cmd: "N/A"
      task_02_rc: -1
      task_03_name: "Not executed"
      task_03_cmd: "N/A"
      task_03_rc: -1
      task_04_name: "Not executed"
      task_04_cmd: "N/A"
      task_04_rc: -1
      task_05_name: "Not executed"
      task_05_cmd: "N/A"
      task_05_rc: -1
    tags: [execute]

  - name: "Req 01 - Check if group management tools are available"
    ansible.builtin.shell: "which groupadd groupmod groupdel"
    args:
      executable: /bin/bash
    register: result_01
    failed_when: false
    changed_when: false
    tags: [execute]

  - name: "Store requirement 01 details"
    set_fact:
      task_01_name: "Check if group management tools are available"
      task_01_cmd: "which groupadd groupmod groupdel"
      task_01_rc: "{{ result_01.rc | default(-1) }}"
      data_01: "{{ result_01.stdout | default('') | trim }}"
      status_01: "{{ 'PASS' if (result_01.rc | default(-1)) == 0 else 'FAIL' }}"
      details_01: "{{ 'Tools found' if (result_01.rc | default(-1)) == 0 else 'Tools not found' }}"
    tags: [execute]

  - name: "Req 02 - Identify duplicate group names"
    ansible.builtin.shell: "awk -F: '{print $1}' /etc/group | sort | uniq -d"
    args:
      executable: /bin/bash
    register: result_02
    failed_when: false
    changed_when: false
    when: "(result_01.rc | default(-1)) == 0"
    tags: [execute]

  - name: "Store requirement 02 details"
    set_fact:
      task_02_name: "Identify duplicate group names"
      task_02_cmd: "awk -F: '{print $1}' /etc/group | sort | uniq -d"
      task_02_rc: "{{ result_02.rc | default(-1) }}"
      data_02: "{{ result_02.stdout | default('') | trim }}"
      status_02: "{{ 'PASS' if (result_02.rc | default(-1)) == 0 else 'FAIL' }}"
      details_02: "{{ 'Duplicates found: ' + (result_02.stdout | default('') | trim) if (result_02.stdout | default('') | trim) != '' else 'No duplicates found' }}"
    when: result_02 is defined
    tags: [execute]

  - name: "Req 03 - Rename duplicate groups to unique names"
    ansible.builtin.shell: |
      DUP_NAMES=$(awk -F: '{print $1}' /etc/group | sort | uniq -d)
      if [ -n "$DUP_NAMES" ]; then
        for dup in $DUP_NAMES; do
          NEW_NAME="${dup}_unique_$(date +%s)"
          groupmod -n "$NEW_NAME" "$dup"
        done
      fi
    args:
      executable: /bin/bash
    register: result_03
    failed_when: false
    when:
    - "(result_01.rc | default(-1)) == 0"
    - "result_02.stdout | default('') | trim != ''"
    tags: [execute]

  - name: "Store requirement 03 details"
    set_fact:
      task_03_name: "Rename duplicate groups to unique names"
      task_03_cmd: "groupmod -n <new_unique_name> <old_duplicate_name>"
      task_03_rc: "{{ result_03.rc | default(-1) }}"
      data_03: "{{ result_03.stdout | default('') | trim }}"
      status_03: "{{ 'PASS' if (result_03.skipped | default(false)) or (result_03.rc | default(-1)) == 0 else 'FAIL' }}"
      details_03: "{{ 'No duplicates to rename — PASS' if (result_03.skipped | default(false)) else ('Groups renamed successfully' if (result_03.rc | default(-1)) == 0 else 'Rename failed') }}"
    when: result_03 is defined
    tags: [execute]

  - name: "Req 04 - Verify no duplicate group names exist"
    ansible.builtin.shell: "awk -F: '{print $1}' /etc/group | sort | uniq -d | wc -l"
    args:
      executable: /bin/bash
    register: result_04
    failed_when: false
    changed_when: false
    when: "(result_01.rc | default(-1)) == 0"
    tags: [execute]

  - name: "Store requirement 04 details"
    set_fact:
      task_04_name: "Verify no duplicate group names exist"
      task_04_cmd: "awk -F: '{print $1}' /etc/group | sort | uniq -d | wc -l"
      task_04_rc: "{{ result_04.rc | default(-1) }}"
      data_04: "{{ result_04.stdout | default('') | trim }}"
      status_04: "{{ 'PASS' if (result_04.stdout | default('') | trim) == '0' else 'FAIL' }}"
      details_04: "{{ 'No duplicates remain' if (result_04.stdout | default('') | trim) == '0' else 'Duplicates still exist' }}"
    when: result_04 is defined
    tags: [execute]

  - name: "Set cis_result to overall remediation status"
    set_fact:
      cis_result: "{{ status_04 }}"
    tags: [execute]

  - name: "Store requirement 05 details"
    set_fact:
      task_05_name: "Store final remediation result"
      task_05_cmd: "set_fact cis_result = status_04"
      task_05_rc: 0
      data_05: "{{ cis_result }}"
      status_05: "PASS"
      details_05: "Overall result derived from status_04 is {{ cis_result }}"
    tags: [execute]

  - name: "Generate remediation report"
    debug:
      msg:
      - "========================================================"
      - "        REMEDIATION REPORT — CIS 7.2.7"
      - "========================================================"
      - "Reference: CIS Benchmark checkpoint 7.2.7"
      - ""
      - "REQUIREMENT 01 - {{ req_01 }}:"
      - "  Task: {{ task_01_name | default('Task not recorded') }}"
      - "  Command: {{ task_01_cmd | default('N/A') }}"
      - "  Exit code: {{ task_01_rc | default(-1) }}"
      - "  Data: {{ data_01 | default('') | trim }}"
      - "  Status: {{ status_01 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_01 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 02 - {{ req_02 }}:"
      - "  Task: {{ task_02_name | default('Task not recorded') }}"
      - "  Command: {{ task_02_cmd | default('N/A') }}"
      - "  Exit code: {{ task_02_rc | default(-1) }}"
      - "  Data: {{ data_02 | default('') | trim }}"
      - "  Status: {{ status_02 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_02 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 03 - {{ req_03 }}:"
      - "  Task: {{ task_03_name | default('Task not recorded') }}"
      - "  Command: {{ task_03_cmd | default('N/A') }}"
      - "  Exit code: {{ task_03_rc | default(-1) }}"
      - "  Data: {{ data_03 | default('') | trim }}"
      - "  Status: {{ status_03 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_03 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 04 - {{ req_04 }}:"
      - "  Task: {{ task_04_name | default('Task not recorded') }}"
      - "  Command: {{ task_04_cmd | default('N/A') }}"
      - "  Exit code: {{ task_04_rc | default(-1) }}"
      - "  Data: {{ data_04 | default('') | trim }}"
      - "  Status: {{ status_04 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_04 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 05 - {{ req_05 }}:"
      - "  Task: {{ task_05_name | default('Task not recorded') }}"
      - "  Command: {{ task_05_cmd | default('N/A') }}"
      - "  Exit code: {{ task_05_rc | default(-1) }}"
      - "  Data: {{ data_05 | default('') | trim }}"
      - "  Status: {{ status_05 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_05 | default('Not evaluated') | trim }}"
      - ""
      - "========================================================"
      - "OVERALL REMEDIATION:"
      - "  Result: {{ cis_result | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_04 | default('Not evaluated') | trim }}"
      - "========================================================"
    tags: [execute]

  always:
  - name: "Restore - Check if backup exists"
    ansible.builtin.stat:
      path: "{{ backup_dir }}/group.backup"
    register: _restore_stat
    failed_when: false
    tags: [restore]

  - name: "Restore - Overwrite /etc/group with original"
    ansible.builtin.copy:
      src: "{{ backup_dir }}/group.backup"
      dest: /etc/group
      remote_src: true
    when: _restore_stat.stat.exists | default(false)
    failed_when: false
    tags: [restore]

  - name: "Restore - Remove backup directory"
    ansible.builtin.file:
      path: "{{ backup_dir }}"
      state: absent
    failed_when: false
    tags: [restore]
