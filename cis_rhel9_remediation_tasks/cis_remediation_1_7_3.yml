---
- name: Initialize meta data variables
  include_vars: cis_remediation_var_1_7_3.yml

- name: "Snapshot - Create backup directory"
  ansible.builtin.file:
    path: "{{ backup_dir }}"
    state: directory
    mode: "0700"
  tags: [snapshot]
- name: "Snapshot - Check if /etc/issue.net exists"
  ansible.builtin.stat:
    path: /etc/issue.net
  register: _issue_stat
  tags: [snapshot]
- name: "Snapshot - Check if backup already exists"
  ansible.builtin.stat:
    path: "{{ backup_dir }}/issue.net.backup"
  register: _issue_backup_exists
  tags: [snapshot]
- name: "Snapshot - Backup /etc/issue.net"
  ansible.builtin.copy:
    src: /etc/issue.net
    dest: "{{ backup_dir }}/issue.net.backup"
    remote_src: true
  when:
  - _issue_stat.stat.exists
  - not _issue_backup_exists.stat.exists | default(false)
  tags: [snapshot]

- block:
  - name: "Check current /etc/issue.net content"
    ansible.builtin.shell: cat /etc/issue.net
    args:
      executable: /bin/bash
    register: _banner_check
    changed_when: false
    failed_when: false
    tags: [execute]

  - name: "Req 01 - Write banner to /etc/issue.net"
    ansible.builtin.shell: 'echo "Authorized users only. All activity may be monitored and reported." > /etc/issue.net'
    args:
      executable: /bin/bash
    register: result_01
    failed_when: false
    when: "_banner_check.stdout | default('') | trim != expected_banner"
    tags: [execute]

  - name: "Req 02 - Remove escape sequences from /etc/issue.net"
    ansible.builtin.shell: sed -i 's/\\\\m//g; s/\\\\r//g; s/\\\\s//g; s/\\\\v//g' /etc/issue.net
    args:
      executable: /bin/bash
    register: result_02
    failed_when: false
    when: "_banner_check.stdout | default('') | trim != expected_banner"
    tags: [execute]

  - name: "Req 03 - Verify /etc/issue.net contents"
    ansible.builtin.shell: cat /etc/issue.net
    args:
      executable: /bin/bash
    register: result_03
    changed_when: false
    failed_when: false
    tags: [execute]

  - name: "Compute statuses for report"
    set_fact:
      status_01: "{{ 'APPLIED' if (result_01 is defined and (result_01.skipped | default(false) or result_01.rc | default(-1) == 0)) else 'FAILED' }}"
      status_02: "{{ 'APPLIED' if (result_02.skipped | default(false) or result_02.rc | default(-1) == 0) else 'FAILED' }}"
      status_03: "{{ 'APPLIED' if (result_03.stdout | default('') | trim == expected_banner) else 'FAILED' }}"
      data_01: "{{ 'Banner already correct' if (result_01 is defined and result_01.skipped | default(false)) else result_01.stdout | default('') | trim }}"
      data_02: "{{ 'No action needed' if result_02.skipped | default(false) else result_02.stdout | default('') | trim }}"
      data_03: "{{ result_03.stdout | default('') | trim }}"
    tags: [execute]

  - name: "Set overall and cis result"
    set_fact:
      overall_result: "{{ 'APPLIED' if (status_01 | default('FAILED') | trim == 'APPLIED' and status_02 | default('FAILED') | trim == 'APPLIED' and status_03 | default('FAILED') | trim == 'APPLIED') else 'FAILED' }}"
      cis_result: "{{ 'PASS' if (status_03 | default('FAILED') | trim == 'APPLIED') else 'FAIL' }}"
    tags: [execute]

  - name: "Generate remediation report"
    debug:
      msg:
      - "REMEDIATION REPORT — CIS 1.7.3"
      - "Reference: CIS Benchmark checkpoint 1.7.3"
      - ""
      - 'Requirement 01 - {{ req_01 }}:'
      - '  Task: Write banner to /etc/issue.net'
      - '  Command: echo "Authorized users only. All activity may be monitored and reported." > /etc/issue.net'
      - "  Exit code: {{ result_01.rc | default(0) if result_01 is defined else 0 }}"
      - "  Data: {{ data_01 }}"
      - "  Status: {{ status_01 }}"
      - "  Details: {{ 'Banner written successfully' if status_01 == 'APPLIED' else 'Failed to write banner' }}"
      - ""
      - 'Requirement 02 - {{ req_02 }}:'
      - '  Task: Remove escape sequences from /etc/issue.net'
      - "  Command: sed -i 's/\\\\m//g; s/\\\\r//g; s/\\\\s//g; s/\\\\v//g' /etc/issue.net"
      - "  Exit code: {{ result_02.rc | default(-1) }}"
      - "  Data: {{ data_02 }}"
      - "  Status: {{ status_02 }}"
      - "  Details: {{ 'Escape sequences removed successfully' if status_02 == 'APPLIED' else 'Failed to remove sequences' }}"
      - ""
      - 'Requirement 03 - {{ req_03 }}:'
      - '  Task: Verify /etc/issue.net contents'
      - "  Command: cat /etc/issue.net"
      - "  Exit code: {{ result_03.rc | default(-1) }}"
      - "  Data: {{ data_03 }}"
      - "  Status: {{ status_03 }}"
      - "  Details: {{ 'Verification passed - banner matches expected content' if status_03 == 'APPLIED' else 'Verification failed - content does not match expected banner' }}"
      - ""
      - "OVERALL REMEDIATION:"
      - "  Result: {{ cis_result }}"
      - "  Details: {{ 'All requirements applied successfully' if cis_result == 'PASS' else 'One or more requirements failed' }}"
    tags: [execute]

  always:
  - name: "Restore - Check if backup exists"
    ansible.builtin.stat:
      path: "{{ backup_dir }}/issue.net.backup"
    register: _restore_stat
    failed_when: false
    tags: [restore]

  - name: "Restore - Overwrite /etc/issue.net with original"
    ansible.builtin.copy:
      src: "{{ backup_dir }}/issue.net.backup"
      dest: /etc/issue.net
      remote_src: true
    when:
    - "_restore_stat.stat.exists | default(false)"
    - "(overall_result | default('FAILED')) != 'APPLIED'"
    failed_when: false
    tags: [restore]

  - name: "Restore - Remove backup directory"
    ansible.builtin.file:
      path: "{{ backup_dir }}"
      state: absent
    failed_when: false
    tags: [restore]
