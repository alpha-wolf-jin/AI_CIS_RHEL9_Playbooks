---
- name: Initialize meta data variables
  include_vars: cis_remediation_var_6_3_4_1.yml

- name: "State Guard - Check for existing checkpoint"
  ansible.builtin.stat:
    path: "{{ state_guard_flag }}"
  register: _sg_flag
  tags: [snapshot]
- name: "State Guard - Restore auditd.conf from prior checkpoint"
  ansible.builtin.copy:
    src: "{{ state_guard_dir }}/auditd.conf.present"
    dest: "{{ auditd_conf }}"
    remote_src: true
  when: "_sg_flag.stat.exists"
  failed_when: false
  tags: [snapshot]
- name: "State Guard - Remove old checkpoint"
  ansible.builtin.file:
    path: "{{ state_guard_dir }}"
    state: absent
  when: "_sg_flag.stat.exists"
  tags: [snapshot]
- name: "State Guard - Create checkpoint directory"
  ansible.builtin.file:
    path: "{{ state_guard_dir }}"
    state: directory
    mode: '0700'
  tags: [snapshot]
- name: "State Guard - Check if auditd.conf exists"
  ansible.builtin.stat:
    path: "{{ auditd_conf }}"
  register: _sg_auditd_conf_stat
  tags: [snapshot]
- name: "State Guard - Backup auditd.conf"
  ansible.builtin.copy:
    src: "{{ auditd_conf }}"
    dest: "{{ state_guard_dir }}/auditd.conf.present"
    remote_src: true
  when: "_sg_auditd_conf_stat.stat.exists"
  tags: [snapshot]
- name: "State Guard - Create checkpoint flag"
  ansible.builtin.copy:
    content: "checkpoint"
    dest: "{{ state_guard_flag }}"
  tags: [snapshot]

- name: "Initialize data variables"
  ansible.builtin.set_fact:
    data_01: "Not collected yet"
    status_01: "UNKNOWN"
    details_01: "Not evaluated"
    data_02: "Not collected yet"
    status_02: "UNKNOWN"
    details_02: "Not evaluated"
    data_03: "Not collected yet"
    status_03: "UNKNOWN"
    details_03: "Not evaluated"
    data_04: "Not collected yet"
    status_04: "UNKNOWN"
    details_04: "Not evaluated"
    task_01_name: "Not executed"
    task_01_cmd: "N/A"
    task_01_rc: -1
    task_02_name: "Not executed"
    task_02_cmd: "N/A"
    task_02_rc: -1
    task_03_name: "Not executed"
    task_03_cmd: "N/A"
    task_03_rc: -1
    task_04_name: "Not executed"
    task_04_cmd: "N/A"
    task_04_rc: -1
  tags: [execute]
- block:
        # === EXECUTE PHASE ===

# Requirement 1 - Prerequisite check for required tools
  - name: "Req 01 - Check for required commands (awk, chmod, dirname, xargs)"
    ansible.builtin.shell: which awk chmod dirname xargs
    args:
      executable: /bin/bash
    register: result_01
    failed_when: false
    changed_when: false
    tags: [execute]

  - name: "Store requirement 01 details"
    ansible.builtin.set_fact:
      task_01_name: "Check for required commands (awk, chmod, dirname, xargs)"
      task_01_cmd: "which awk chmod dirname xargs"
      task_01_rc: "{{ result_01.rc | default(-1) }}"
      data_01: "{{ result_01.stdout | default('') | trim }}"
      status_01: "{{ 'PASS' if (result_01.rc | default(-1)) == 0 else 'SKIPPED' }}"
      details_01: "{{ 'All required commands found' if (result_01.rc | default(-1)) == 0 else 'Missing required commands - remediation skipped' }}"
    tags: [execute]

# Requirement 2 - Apply mode 0750 to audit log directory
  - name: "Req 02 - Extract audit log directory and set mode 0750"
    ansible.builtin.shell: |
      {% raw %}
      log_dir=$(dirname "$(awk -F= '/^\s*log_file\s*/{print $2}' /etc/audit/auditd.conf | xargs)")
      if [ -n "$log_dir" ] && [ -d "$log_dir" ]; then
        chmod g-w,o-rwx "$log_dir"
        echo "MODE_SET:$log_dir"
      else
        echo "DIR_NOT_FOUND"
      fi
      {% endraw %}
    args:
      executable: /bin/bash
    register: result_02
    failed_when: false
    when: "status_01 == 'PASS'"
    tags: [execute]

  - name: "Store requirement 02 details"
    ansible.builtin.set_fact:
      task_02_name: "Set audit log directory mode to 0750 or less permissive"
      task_02_cmd: "chmod g-w,o-rwx on audit log directory from auditd.conf"
      task_02_rc: "{{ result_02.rc | default(-1) if result_02 is defined else -1 }}"
      data_02: "{{ result_02.stdout | default('SKIPPED') | trim if result_02 is defined else 'SKIPPED' }}"
      status_02: >-
        {{ ('PASS' if (result_02.rc | default(-1)) == 0 and 'MODE_SET' in (result_02.stdout | default(''))
        else ('SKIPPED' if 'DIR_NOT_FOUND' in (result_02.stdout | default('')) or status_01 != 'PASS'
        else 'FAILED')) | trim }}
      details_02: >-
        {{ ('Audit log directory permissions updated' if (result_02.rc | default(-1)) == 0 and 'MODE_SET' in (result_02.stdout | default(''))
        else ('Skipped - audit directory not found or prereq not met' if 'DIR_NOT_FOUND' in (result_02.stdout | default('')) or status_01 != 'PASS'
        else 'Failed to set directory permissions')) | trim }}
    tags: [execute]

# Requirement 3 - Verify audit log directory mode
  - name: "Req 03 - Verify audit log directory mode is 0750 or less"
    ansible.builtin.shell: |
      {% raw %}
      log_dir=$(dirname "$(awk -F= '/^\s*log_file\s*/{print $2}' /etc/audit/auditd.conf | xargs)")
      if [ -n "$log_dir" ] && [ -d "$log_dir" ]; then
        stat -c "%a %n" "$log_dir"
      else
        echo "DIR_NOT_FOUND"
      fi
      {% endraw %}
    args:
      executable: /bin/bash
    register: result_03
    failed_when: false
    changed_when: false
    when: "status_01 == 'PASS'"
    tags: [execute]

  - name: "Store requirement 03 details"
    ansible.builtin.set_fact:
      task_03_name: "Verify audit log directory mode"
      task_03_cmd: "stat -c '%a %n' on audit log directory from auditd.conf"
      task_03_rc: "{{ result_03.rc | default(-1) if result_03 is defined else -1 }}"
      data_03: "{{ result_03.stdout | default('SKIPPED') | trim if result_03 is defined else 'SKIPPED' }}"
      status_03: >-
        {{ ('PASS' if (result_03.stdout | default('') | regex_search('^0?[0-7][0-5][0] '))
        else ('SKIPPED' if 'DIR_NOT_FOUND' in (result_03.stdout | default('')) or status_01 != 'PASS'
        else 'FAILED')) | trim }}
      details_03: >-
        {{ ('Directory mode is 0750 or less permissive' if (result_03.stdout | default('') | regex_search('^0?[0-7][0-5][0] '))
        else ('Skipped - audit directory not found or prereq not met' if 'DIR_NOT_FOUND' in (result_03.stdout | default('')) or status_01 != 'PASS'
        else 'Directory mode is too permissive or not found')) | trim }}
    tags: [execute]

# Requirement 4 - Store overall remediation result
  - name: "Req 04 - Store final remediation result"
    ansible.builtin.set_fact:
      cis_result: "{{ status_03 if status_03 in ['PASS','FAIL','SKIPPED','ERROR'] else 'ERROR' }}"
    tags: [execute]

  - name: "Store requirement 04 details"
    ansible.builtin.set_fact:
      task_04_name: "Store final remediation result"
      task_04_cmd: "set_fact cis_result derived from status_03"
      task_04_rc: 0
      data_04: "{{ cis_result }}"
      status_04: "{{ cis_result }}"
      details_04: "Overall remediation status stored as {{ cis_result }}"
    tags: [execute]

# Final report
  - name: "Generate remediation report"
    ansible.builtin.debug:
      msg:
      - "========================================================"
      - "        REMEDIATION REPORT — CIS 6.3.4.1"
      - "========================================================"
      - "Reference: CIS Benchmark checkpoint 6.3.4.1"
      - ""
      - "REQUIREMENT 01 - {{ req_01 }}:"
      - "  Task: {{ task_01_name | default('Task not recorded') }}"
      - "  Command: {{ task_01_cmd | default('N/A') }}"
      - "  Exit code: {{ task_01_rc | default(-1) }}"
      - "  Data: {{ data_01 | default('') | trim }}"
      - "  Status: {{ status_01 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_01 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 02 - {{ req_02 }}:"
      - "  Task: {{ task_02_name | default('Task not recorded') }}"
      - "  Command: {{ task_02_cmd | default('N/A') }}"
      - "  Exit code: {{ task_02_rc | default(-1) }}"
      - "  Data: {{ data_02 | default('') | trim }}"
      - "  Status: {{ status_02 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_02 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 03 - {{ req_03 }}:"
      - "  Task: {{ task_03_name | default('Task not recorded') }}"
      - "  Command: {{ task_03_cmd | default('N/A') }}"
      - "  Exit code: {{ task_03_rc | default(-1) }}"
      - "  Data: {{ data_03 | default('') | trim }}"
      - "  Status: {{ status_03 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_03 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 04 - {{ req_04 }}:"
      - "  Task: {{ task_04_name | default('Task not recorded') }}"
      - "  Command: {{ task_04_cmd | default('N/A') }}"
      - "  Exit code: {{ task_04_rc | default(-1) }}"
      - "  Data: {{ data_04 | default('') | trim }}"
      - "  Status: {{ status_04 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_04 | default('Not evaluated') | trim }}"
      - ""
      - "========================================================"
      - "OVERALL REMEDIATION:"
      - "  Result: {{ cis_result | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_04 | default('Not evaluated') | trim }}"
      - "========================================================"
    tags: [execute]

  always:
# === STATE GUARD — RESTORE PHASE ===
  - name: "State Guard Restore - Check if checkpoint exists"
    ansible.builtin.stat:
      path: "{{ state_guard_flag }}"
    register: _sg_restore_flag
    failed_when: false
    tags: [restore]

  - name: "State Guard Restore - Check if auditd.conf backup exists"
    ansible.builtin.stat:
      path: "{{ state_guard_dir }}/auditd.conf.present"
    register: _sg_restore_auditd_conf
    failed_when: false
    tags: [restore]

  - name: "State Guard Restore - Restore auditd.conf from backup"
    ansible.builtin.copy:
      src: "{{ state_guard_dir }}/auditd.conf.present"
      dest: "{{ auditd_conf }}"
      remote_src: true
    when: "_sg_restore_auditd_conf.stat.exists | default(false)"
    failed_when: false
    tags: [restore]

  - name: "State Guard Restore - Remove checkpoint"
    ansible.builtin.file:
      path: "{{ state_guard_dir }}"
      state: absent
    when: "_sg_restore_flag.stat.exists | default(false)"
    failed_when: false
    tags: [restore]
