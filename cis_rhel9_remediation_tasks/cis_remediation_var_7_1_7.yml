playbook_name: "cis_7_1_7_gshadow_perms"
backup_dir: "/var/log/ai-playbooks-backup/{{ playbook_name }}"
target_file: "/etc/gshadow"
expected_owner: "root"
expected_group: "root"
expected_mode: "0000"
req_01: "Apply ownership change using command: chown root:root /etc/gshadow. Expected result: /etc/gshadow is owned by root:root."
req_02: "Apply permission change using command: chmod 0000 /etc/gshadow. Expected result: /etc/gshadow has permissions 0000 (no read, write, or execute for any user)."
req_03: "Verify ownership and permissions using command: stat -c '%U:%G %a' /etc/gshadow. Expected result: Output is 'root:root 0'."
req_04: "Store the final remediation result in a variable named 'cis_result' using set_fact. Set cis_result to the overall remediation status (PASS/FAIL/SKIP/ERROR) derived from the last requirement's status variable."
