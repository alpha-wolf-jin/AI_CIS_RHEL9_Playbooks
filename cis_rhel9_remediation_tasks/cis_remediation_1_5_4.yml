---
- name: Initialize meta data variables
  include_vars: cis_remediation_var_1_5_4.yml

- name: "Snapshot - Create backup directory"
  ansible.builtin.file:
    path: "{{ backup_dir }}"
    state: directory
    mode: '0700'
  tags: [snapshot]
- name: "Snapshot - Check if /etc/systemd/coredump.conf.d/60-coredump.conf exists"
  ansible.builtin.stat:
    path: /etc/systemd/coredump.conf.d/60-coredump.conf
  register: _no_space_stat
  failed_when: false
  tags: [snapshot]
- name: "Snapshot - Backup 60-coredump.conf if it exists"
  ansible.builtin.copy:
    src: /etc/systemd/coredump.conf.d/60-coredump.conf
    dest: "{{ backup_dir }}/60-coredump.conf.backup"
    remote_src: true
    force: false
  when: _no_space_stat.stat.exists | default(false)
  failed_when: false
  tags: [snapshot]
- name: "Snapshot - Save existence marker for 60-coredump.conf"
  ansible.builtin.copy:
    content: "{{ _no_space_stat.stat.exists | default(false) }}"
    dest: "{{ backup_dir }}/60-coredump.conf.existed"
  tags: [snapshot]
- name: "Snapshot - Check if /etc/systemd/coredump.conf.d/60- coredump.conf exists"
  ansible.builtin.stat:
    path: "/etc/systemd/coredump.conf.d/60- coredump.conf"
  register: _space_stat
  failed_when: false
  tags: [snapshot]
- name: "Snapshot - Backup 60- coredump.conf if it exists"
  ansible.builtin.copy:
    src: "/etc/systemd/coredump.conf.d/60- coredump.conf"
    dest: "{{ backup_dir }}/60- coredump.conf.backup"
    remote_src: true
    force: false
  when: _space_stat.stat.exists | default(false)
  failed_when: false
  tags: [snapshot]
- name: "Snapshot - Save existence marker for 60- coredump.conf"
  ansible.builtin.copy:
    content: "{{ _space_stat.stat.exists | default(false) }}"
    dest: "{{ backup_dir }}/60- coredump.conf.existed"
  tags: [snapshot]

- block:
  - name: "Initialize data variables"
    set_fact:
      data_01: "Not collected yet"
      status_01: "UNKNOWN"
      details_01: "Not evaluated"
      task_01_name: "Not executed"
      task_01_cmd: "N/A"
      task_01_rc: -1
      data_02: "Not collected yet"
      status_02: "UNKNOWN"
      details_02: "Not evaluated"
      task_02_name: "Not executed"
      task_02_cmd: "N/A"
      task_02_rc: -1
    tags: [execute]

  - name: "Check if systemd package is installed"
    ansible.builtin.package_facts:
      manager: auto
    when: ansible_facts.packages is not defined
    failed_when: false
    tags: [execute]

  - name: "Set skip flag if systemd is not installed"
    set_fact:
      playbook_skipped: "{{ 'systemd' not in ansible_facts.packages }}"
    tags: [execute]

  - name: "Check if Storage=none already present in coredump.conf.d"
    shell: grep -rq '^Storage=none' /etc/systemd/coredump.conf.d/
    args:
      executable: /bin/bash
    register: storage_check
    when: not (playbook_skipped | default(false) | bool)
    failed_when: false
    tags: [execute]

  - name: "Set fact whether script execution is needed"
    set_fact:
      script_needed: "{{ storage_check.rc | default(1) | int != 0 }}"
    when: not (playbook_skipped | default(false) | bool)
    tags: [execute]

  - name: "Req 1 - Copy remediation script to target"
    ansible.builtin.copy:
      content: |
        {% raw %}#!/usr/bin/env bash

        {
           [ ! -d /etc/systemd/coredump.conf.d/ ] && mkdir /etc/systemd/coredump.conf.d/
           if grep -Psq -- '^\h*\[Coredump\]' /etc/systemd/coredump.conf.d/60- coredump.conf; then
              printf '%s\n' "Storage=none" >> /etc/systemd/coredump.conf.d/60- coredump.conf
           else
              printf '%s\n' "[Coredump]" "Storage=none" >> /etc/systemd/coredump.conf.d/60-coredump.conf
           fi
        }{% endraw %}
      dest: /tmp/remediate_core_dump.sh
      mode: '0700'
    when:
    - not (playbook_skipped | default(false) | bool)
    - script_needed | default(true) | bool
    failed_when: false
    tags: [execute]

  - name: "Req 1 - Execute remediation script"
    ansible.builtin.shell: /bin/bash /tmp/remediate_core_dump.sh
    args:
      executable: /bin/bash
    register: result_01
    when:
    - not (playbook_skipped | default(false) | bool)
    - script_needed | default(true) | bool
    failed_when: false
    tags: [execute]

  - name: "Req 1 - Remove temporary script"
    ansible.builtin.file:
      path: /tmp/remediate_core_dump.sh
      state: absent
    when:
    - not (playbook_skipped | default(false) | bool)
    - script_needed | default(true) | bool
    failed_when: false
    tags: [execute]

  - name: "Store requirement 01 details"
    set_fact:
      task_01_name: "Req 1 - Execute provided remediation script"
      task_01_cmd: "/bin/bash /tmp/remediate_core_dump.sh"
      task_01_rc: "{{ result_01.rc | default(-1) }}"
      data_01: "{{ (result_01.stdout | default('') ~ ' ' ~ result_01.stderr | default('')) | trim }}"
      status_01: >-
        {%- if playbook_skipped | default(false) | bool -%}
        SKIPPED
        {%- elif not (script_needed | default(true) | bool) -%}
        SKIPPED
        {%- elif result_01.rc | default(-1) == 0 -%}
        PASS
        {%- else -%}
        FAIL
        {%- endif -%}
      details_01: >-
        {%- if playbook_skipped | default(false) | bool -%}
        Skipped because systemd is not installed
        {%- elif not (script_needed | default(true) | bool) -%}
        Storage=none already present, no remedial action needed
        {%- elif result_01.rc | default(-1) == 0 -%}
        Script executed successfully
        {%- else -%}
        Script failed with exit code {{ result_01.rc | default(-1) }} and stderr: {{ result_01.stderr | default('None') }}
        {%- endif -%}
    tags: [execute]

  - name: "Req 2 - Verify core dump storage is disabled"
    ansible.builtin.shell: grep -rq '^Storage=none' /etc/systemd/coredump.conf.d/
    args:
      executable: /bin/bash
    register: result_02
    when: not (playbook_skipped | default(false) | bool)
    failed_when: false
    tags: [execute]

  - name: "Store requirement 02 details"
    set_fact:
      task_02_name: "Req 2 - Verify Storage=none in coredump.conf.d"
      task_02_cmd: "grep -rq '^Storage=none' /etc/systemd/coredump.conf.d/"
      task_02_rc: "{{ result_02.rc | default(-1) }}"
      data_02: "{{ result_02.stdout | default('') | trim }}"
      status_02: >-
        {%- if playbook_skipped | default(false) | bool -%}
        SKIPPED
        {%- elif result_02.rc | default(-1) == 0 -%}
        PASS
        {%- else -%}
        FAIL
        {%- endif -%}
      details_02: >-
        {%- if playbook_skipped | default(false) | bool -%}
        Skipped because systemd is not installed
        {%- elif result_02.rc | default(-1) == 0 -%}
        Compliant: Storage=none found
        {%- else -%}
        Non-compliant: Storage=none not found in any .conf file under /etc/systemd/coredump.conf.d/
        {%- endif -%}
    tags: [execute]

  - name: "Generate remediation report"
    debug:
      msg:
      - "========================================================"
      - "        REMEDIATION REPORT — CIS 1.5.4"
      - "Reference: CIS Benchmark checkpoint 1.5.4"
      - "========================================================"
      - ""
      - "REQUIREMENT 01 - {{ req_01 }}:"
      - "  Task: {{ task_01_name | default('Task not recorded') }}"
      - "  Command: {{ task_01_cmd | default('N/A') }}"
      - "  Exit code: {{ task_01_rc | default(-1) }}"
      - "  Data: {{ data_01 | default('') | trim }}"
      - "  Status: {{ status_01 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_01 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 02 - {{ req_02 }}:"
      - "  Task: {{ task_02_name | default('Task not recorded') }}"
      - "  Command: {{ task_02_cmd | default('N/A') }}"
      - "  Exit code: {{ task_02_rc | default(-1) }}"
      - "  Data: {{ data_02 | default('') | trim }}"
      - "  Status: {{ status_02 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_02 | default('Not evaluated') | trim }}"
      - ""
      - "========================================================"
      - "OVERALL REMEDIATION:"
      - "  Result: {{ status_02 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_02 | default('Not evaluated') | trim }}"
      - "========================================================"
    tags: [execute]

  always:
  - name: "Restore - Check if backup of 60-coredump.conf exists"
    ansible.builtin.stat:
      path: "{{ backup_dir }}/60-coredump.conf.backup"
    register: _restore_no_space_backup
    failed_when: false
    tags: [restore]

  - name: "Restore - Read existence marker for 60-coredump.conf"
    ansible.builtin.slurp:
      src: "{{ backup_dir }}/60-coredump.conf.existed"
    register: _restore_no_space_existed
    failed_when: false
    tags: [restore]

  - name: "Restore - Restore 60-coredump.conf if backup exists"
    ansible.builtin.copy:
      src: "{{ backup_dir }}/60-coredump.conf.backup"
      dest: /etc/systemd/coredump.conf.d/60-coredump.conf
      remote_src: true
    when: _restore_no_space_backup.stat.exists | default(false)
    failed_when: false
    tags: [restore]

  - name: "Restore - Delete 60-coredump.conf if it was created during remediation"
    ansible.builtin.file:
      path: /etc/systemd/coredump.conf.d/60-coredump.conf
      state: absent
    when:
    - _restore_no_space_existed.content is defined
    - (_restore_no_space_existed.content | b64decode | trim) == 'False'
    failed_when: false
    tags: [restore]

  - name: "Restore - Check if backup of 60- coredump.conf exists"
    ansible.builtin.stat:
      path: "{{ backup_dir }}/60- coredump.conf.backup"
    register: _restore_space_backup
    failed_when: false
    tags: [restore]

  - name: "Restore - Read existence marker for 60- coredump.conf"
    ansible.builtin.slurp:
      src: "{{ backup_dir }}/60- coredump.conf.existed"
    register: _restore_space_existed
    failed_when: false
    tags: [restore]

  - name: "Restore - Restore 60- coredump.conf if backup exists"
    ansible.builtin.copy:
      src: "{{ backup_dir }}/60- coredump.conf.backup"
      dest: "/etc/systemd/coredump.conf.d/60- coredump.conf"
      remote_src: true
    when: _restore_space_backup.stat.exists | default(false)
    failed_when: false
    tags: [restore]

  - name: "Restore - Delete 60- coredump.conf if it was created during remediation"
    ansible.builtin.file:
      path: "/etc/systemd/coredump.conf.d/60- coredump.conf"
      state: absent
    when:
    - _restore_space_existed.content is defined
    - (_restore_space_existed.content | b64decode | trim) == 'False'
    failed_when: false
    tags: [restore]

  - name: "Restore - Remove backup directory"
    ansible.builtin.file:
      path: "{{ backup_dir }}"
      state: absent
    failed_when: false
    tags: [restore]
