---
- name: Initialize meta data variables
  include_vars: cis_remediation_var_1_5_4.yml

- name: "Snapshot - Create backup directory"
  ansible.builtin.file:
    path: "{{ backup_dir }}"
    state: directory
    mode: '0700'
  tags: [snapshot]
- name: "Snapshot - Check if coredump config file exists"
  ansible.builtin.stat:
    path: "/etc/systemd/coredump.conf.d/60-coredump.conf"
  register: _snap_conf_stat
  tags: [snapshot]
- name: "Snapshot - Backup coredump config file if exists"
  ansible.builtin.copy:
    src: "/etc/systemd/coredump.conf.d/60-coredump.conf"
    dest: "{{ backup_dir }}/60-coredump.conf.present"
    remote_src: true
  when: _snap_conf_stat.stat.exists
  tags: [snapshot]
- name: "Snapshot - Mark coredump config file as absent"
  ansible.builtin.copy:
    content: "absent"
    dest: "{{ backup_dir }}/60-coredump.conf.absent"
  when: not _snap_conf_stat.stat.exists
  tags: [snapshot]
- name: "Snapshot - Mark remediation script as absent"
  ansible.builtin.copy:
    content: "absent"
    dest: "{{ backup_dir }}/remediation_script.absent"
  tags: [snapshot]
- name: "Snapshot - Mark audit script as absent"
  ansible.builtin.copy:
    content: "absent"
    dest: "{{ backup_dir }}/audit_script.absent"
  tags: [snapshot]

- block:
  - name: "Initialize data variables"
    ansible.builtin.set_fact:
      data_01: "Not collected"
      status_01: "ERROR"
      details_01: "Not evaluated"
      task_01_name: "Not executed"
      task_01_cmd: "N/A"
      task_01_rc: -1
      data_02: "Not collected"
      status_02: "ERROR"
      details_02: "Not evaluated"
      task_02_name: "Not executed"
      task_02_cmd: "N/A"
      task_02_rc: -1
      data_03: "Not collected"
      status_03: "ERROR"
      details_03: "Not evaluated"
      task_03_name: "Not executed"
      task_03_cmd: "N/A"
      task_03_rc: -1
    tags: [execute]

  - name: "Gather package facts"
    ansible.builtin.package_facts:
      manager: auto
    failed_when: false
    tags: [execute]

  - name: "Check if systemd is installed"
    ansible.builtin.set_fact:
      systemd_installed: "{{ 'systemd' in ansible_facts.packages }}"
    tags: [execute]

  - name: "Req 01 - Deploy remediation script"
    ansible.builtin.copy:
      dest: "{{ remediation_script }}"
      mode: '0700'
      content: "{{ remediation_script_content }}"
    when: systemd_installed | bool
    failed_when: false
    tags: [execute]

  - name: "Req 01 - Execute remediation script"
    ansible.builtin.shell: /bin/bash "{{ remediation_script }}"
    args:
      executable: /bin/bash
    register: result_01
    failed_when: false
    changed_when: false
    when: systemd_installed | bool
    tags: [execute]

  - name: "Req 01 - Remove remediation script"
    ansible.builtin.file:
      path: "{{ remediation_script }}"
      state: absent
    when: systemd_installed | bool
    failed_when: false
    tags: [execute]

  - name: "Store requirement 01 details"
    ansible.builtin.set_fact:
      task_01_name: "Execute remediation script for CIS 1.5.4"
      task_01_cmd: "/bin/bash {{ remediation_script }}"
      task_01_rc: "{{ result_01.rc | default(-1) }}"
      data_01: "{{ result_01.stdout | default('') | trim }}"
      status_01: "{{ 'SKIP' if not systemd_installed else ('PASS' if result_01.rc | default(-1) == 0 else 'FAIL') | trim }}"
      details_01: "{{ 'Systemd not installed - remediation skipped' if not systemd_installed else ('Remediation script executed successfully' if result_01.rc | default(-1) == 0 else 'Remediation script failed') | trim }}"
    tags: [execute]

  - name: "Req 02 - Deploy audit script"
    ansible.builtin.copy:
      dest: "{{ audit_script }}"
      mode: '0700'
      content: "{{ audit_script_content }}"
    when: systemd_installed | bool
    failed_when: false
    tags: [execute]

  - name: "Req 02 - Execute audit script"
    ansible.builtin.shell: /bin/bash "{{ audit_script }}"
    args:
      executable: /bin/bash
    register: result_02
    failed_when: false
    changed_when: false
    when: systemd_installed | bool
    tags: [execute]

  - name: "Req 02 - Remove audit script"
    ansible.builtin.file:
      path: "{{ audit_script }}"
      state: absent
    when: systemd_installed | bool
    failed_when: false
    tags: [execute]

  - name: "Store requirement 02 details"
    ansible.builtin.set_fact:
      task_02_name: "Execute audit script for CIS 1.5.4"
      task_02_cmd: "/bin/bash {{ audit_script }}"
      task_02_rc: "{{ result_02.rc | default(-1) }}"
      data_02: "{{ result_02.stdout | default('') | trim }}"
      status_02: "{{ 'SKIP' if not systemd_installed else ('PASS' if ('** PASS **' in (result_02.stdout | default(''))) else 'FAIL') | trim }}"
      details_02: "{{ 'Systemd not installed - audit skipped' if not systemd_installed else ('Core dump storage is set to none' if ('** PASS **' in (result_02.stdout | default(''))) else 'Core dump storage is not set to none or not configured') | trim }}"
    tags: [execute]

  - name: "Req 03 - Store final remediation result in cis_result"
    ansible.builtin.set_fact:
      cis_result: "{{ status_02 | default('ERROR') | trim }}"
      task_03_name: "Store final remediation result in cis_result"
      task_03_cmd: "N/A (set_fact)"
      task_03_rc: 0
      data_03: "{{ status_02 | default('ERROR') | trim }}"
      status_03: "{{ status_02 | default('ERROR') | trim }}"
      details_03: "cis_result set to overall remediation status"
    tags: [execute]

  - name: "Generate remediation report"
    ansible.builtin.debug:
      msg:
      - "REMEDIATION REPORT — CIS 1.5.4"
      - "Reference: CIS Benchmark checkpoint 1.5.4"
      - ""
      - "REQUIREMENT 01 - {{ req_01 }}:"
      - "  Task: {{ task_01_name | default('Not recorded') }}"
      - "  Command: {{ task_01_cmd | default('N/A') }}"
      - "  Exit code: {{ task_01_rc | default(-1) }}"
      - "  Data: {{ data_01 | default('') | trim }}"
      - "  Status: {{ status_01 | default('ERROR') | trim }}"
      - "  Details: {{ details_01 | default('') | trim }}"
      - ""
      - "REQUIREMENT 02 - {{ req_02 }}:"
      - "  Task: {{ task_02_name | default('Not recorded') }}"
      - "  Command: {{ task_02_cmd | default('N/A') }}"
      - "  Exit code: {{ task_02_rc | default(-1) }}"
      - "  Data: {{ data_02 | default('') | trim }}"
      - "  Status: {{ status_02 | default('ERROR') | trim }}"
      - "  Details: {{ details_02 | default('') | trim }}"
      - ""
      - "REQUIREMENT 03 - {{ req_03 }}:"
      - "  Task: {{ task_03_name | default('Not recorded') }}"
      - "  Command: {{ task_03_cmd | default('N/A') }}"
      - "  Exit code: {{ task_03_rc | default(-1) }}"
      - "  Data: {{ data_03 | default('') | trim }}"
      - "  Status: {{ status_03 | default('ERROR') | trim }}"
      - "  Details: {{ details_03 | default('') | trim }}"
      - ""
      - "========================================================"
      - "OVERALL REMEDIATION:"
      - "  Result: {{ cis_result | default('ERROR') | trim }}"
      - "  Details: {{ details_02 | default('Not evaluated') | trim }}"
      - "========================================================"
    tags: [execute]

  always:
  - name: "Restore - Check if coredump config backup exists"
    ansible.builtin.stat:
      path: "{{ backup_dir }}/60-coredump.conf.present"
    register: _restore_present
    failed_when: false
    tags: [restore]

  - name: "Restore - Restore coredump config from backup"
    ansible.builtin.copy:
      src: "{{ backup_dir }}/60-coredump.conf.present"
      dest: "/etc/systemd/coredump.conf.d/60-coredump.conf"
      remote_src: true
    when: _restore_present.stat.exists | default(false)
    failed_when: false
    tags: [restore]

  - name: "Restore - Check if coredump config absent marker exists"
    ansible.builtin.stat:
      path: "{{ backup_dir }}/60-coredump.conf.absent"
    register: _restore_absent
    failed_when: false
    tags: [restore]

  - name: "Restore - Delete coredump config if it was absent before"
    ansible.builtin.file:
      path: "/etc/systemd/coredump.conf.d/60-coredump.conf"
      state: absent
    when: _restore_absent.stat.exists | default(false)
    failed_when: false
    tags: [restore]

  - name: "Restore - Check if remediation script absent marker exists"
    ansible.builtin.stat:
      path: "{{ backup_dir }}/remediation_script.absent"
    register: _restore_remediation_script_absent
    failed_when: false
    tags: [restore]

  - name: "Restore - Remove remediation script if it was absent before"
    ansible.builtin.file:
      path: "{{ remediation_script }}"
      state: absent
    when: _restore_remediation_script_absent.stat.exists | default(false)
    failed_when: false
    tags: [restore]

  - name: "Restore - Check if audit script absent marker exists"
    ansible.builtin.stat:
      path: "{{ backup_dir }}/audit_script.absent"
    register: _restore_audit_script_absent
    failed_when: false
    tags: [restore]

  - name: "Restore - Remove audit script if it was absent before"
    ansible.builtin.file:
      path: "{{ audit_script }}"
      state: absent
    when: _restore_audit_script_absent.stat.exists | default(false)
    failed_when: false
    tags: [restore]

  - name: "Restore - Remove backup directory"
    ansible.builtin.file:
      path: "{{ backup_dir }}"
      state: absent
    failed_when: false
    tags: [restore]
