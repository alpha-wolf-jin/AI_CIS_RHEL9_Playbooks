---
- name: Initialize meta data variables
  include_vars: cis_remediation_var_5_1_21.yml

- name: "State Guard - Check for existing checkpoint"
  ansible.builtin.stat:
    path: "{{ state_guard_flag }}"
  register: _sg_flag
  tags: [snapshot]
- name: "State Guard - Restore sshd_config from prior checkpoint"
  ansible.builtin.copy:
    src: "{{ state_guard_dir }}/sshd_config.present"
    dest: "{{ config_file }}"
    remote_src: true
  when: _sg_flag.stat.exists
  failed_when: false
  tags: [snapshot]
- name: "State Guard - Remove old checkpoint"
  ansible.builtin.file:
    path: "{{ state_guard_dir }}"
    state: absent
  when: _sg_flag.stat.exists
  tags: [snapshot]
- name: "State Guard - Create checkpoint directory"
  ansible.builtin.file:
    path: "{{ state_guard_dir }}"
    state: directory
    mode: '0700'
  tags: [snapshot]
- name: "State Guard - Check if sshd_config exists"
  ansible.builtin.stat:
    path: "{{ config_file }}"
  register: _sg_sshd_stat
  tags: [snapshot]
- name: "State Guard - Backup sshd_config"
  ansible.builtin.copy:
    src: "{{ config_file }}"
    dest: "{{ state_guard_dir }}/sshd_config.present"
    remote_src: true
  when: _sg_sshd_stat.stat.exists
  tags: [snapshot]
- name: "State Guard - Create checkpoint flag"
  ansible.builtin.copy:
    content: "checkpoint"
    dest: "{{ state_guard_flag }}"
  tags: [snapshot]

- name: "Initialize data variables"
  ansible.builtin.set_fact:
    data_01: "Not collected yet"
    status_01: "ERROR"
    details_01: "Not evaluated"
    data_02: "Not collected yet"
    status_02: "ERROR"
    details_02: "Not evaluated"
    data_03: "Not collected yet"
    status_03: "ERROR"
    details_03: "Not evaluated"
    data_04: "Not collected yet"
    status_04: "ERROR"
    details_04: "Not evaluated"
    data_05: "Not collected yet"
    status_05: "ERROR"
    details_05: "Not evaluated"
    data_06: "Not collected yet"
    status_06: "ERROR"
    details_06: "Not evaluated"
    task_01_name: "Not executed"
    task_01_cmd: "N/A"
    task_01_rc: -1
    task_02_name: "Not executed"
    task_02_cmd: "N/A"
    task_02_rc: -1
    task_03_name: "Not executed"
    task_03_cmd: "N/A"
    task_03_rc: -1
    task_04_name: "Not executed"
    task_04_cmd: "N/A"
    task_04_rc: -1
    task_05_name: "Not executed"
    task_05_cmd: "N/A"
    task_05_rc: -1
    task_06_name: "Not executed"
    task_06_cmd: "N/A"
    task_06_rc: -1
    playbook_skipped: false
  tags: [always]
- name: "Check if {{ package_name }} is installed"
  ansible.builtin.package_facts:
    manager: auto
  failed_when: false
  tags: [always]
- name: "Set skip flag if package not installed"
  ansible.builtin.set_fact:
    playbook_skipped: true
  when: package_name not in ansible_facts.packages
  tags: [always]
- block:
# === STATE GUARD — EXECUTE PHASE ===
  - name: "Req 01 - Verify sshd binary exists and configuration syntax is valid"
    ansible.builtin.shell: |
      which sshd && sshd -t 2>/dev/null
    args:
      executable: /bin/bash
    register: result_01
    failed_when: false
    changed_when: false
    when: not playbook_skipped
    tags: [execute]

  - name: "Store requirement 01 details"
    ansible.builtin.set_fact:
      task_01_name: "Verify sshd binary and config syntax"
      task_01_cmd: "which sshd && sshd -t 2>/dev/null"
      task_01_rc: "{{ result_01.rc | default(-1) }}"
      data_01: "{{ result_01.stdout | default('') | trim }}"
      status_01: "{{ 'PASS' if (result_01.rc | default(-1)) == 0 else 'FAIL' }}"
      details_01: "{{ 'sshd binary found and config syntax valid' if (result_01.rc | default(-1)) == 0 else 'Prerequisite check failed' }}"
    when: not playbook_skipped
    tags: [execute]

  - name: "Req 02 - Disable PermitUserEnvironment in sshd_config"
    ansible.builtin.lineinfile:
      path: "{{ config_file }}"
      regexp: |
        ^#?{{ config_param }}\s
      line: "{{ config_param }} {{ config_value }}"
      state: present
    register: result_02
    failed_when: false
    when: not playbook_skipped
    tags: [execute]

  - name: "Store requirement 02 details"
    ansible.builtin.set_fact:
      task_02_name: "Set PermitUserEnvironment to no"
      task_02_cmd: |
        lineinfile: regexp='^#?PermitUserEnvironment\\\\s' line='PermitUserEnvironment no'
      task_02_rc: "{{ 0 if result_02 is not failed else 1 }}"
      data_02: "{{ 'PermitUserEnvironment no' if result_02 is not failed else 'Failed' }}"
      status_02: "{{ 'PASS' if result_02 is not failed else 'FAIL' }}"
      details_02: "{{ 'Line set in sshd_config' if result_02 is not failed else 'Failed to set line' }}"
    when: not playbook_skipped
    tags: [execute]

  - name: "Req 03 - Ensure PermitUserEnvironment appears before Include directives"
    ansible.builtin.shell: |
      awk '/^Include/{exit} {print}' {{ config_file }} | grep -q '^{{ config_param }} {{ config_value }}' || sed -i '/^Include/i {{ config_param }} {{ config_value }}' {{ config_file }}
    args:
      executable: /bin/bash
    register: result_03
    failed_when: false
    changed_when: false
    when: not playbook_skipped
    tags: [execute]

  - name: "Store requirement 03 details"
    ansible.builtin.set_fact:
      task_03_name: "Ensure directive before Include"
      task_03_cmd: "awk '/^Include/{exit} {print}' /etc/ssh/sshd_config | grep -q '^PermitUserEnvironment no' || sed -i '/^Include/i PermitUserEnvironment no' /etc/ssh/sshd_config"
      task_03_rc: "{{ result_03.rc | default(-1) }}"
      data_03: "{{ result_03.stdout | default('') | trim }}"
      status_03: "{{ 'PASS' if (result_03.rc | default(-1)) == 0 else 'FAIL' }}"
      details_03: "{{ 'Directive placed before Include' if (result_03.rc | default(-1)) == 0 else 'Failed to ensure ordering' }}"
    when: not playbook_skipped
    tags: [execute]

  - name: "Req 04 - Restart sshd service"
    ansible.builtin.service:
      name: "{{ service_name }}"
      state: restarted
    register: result_04
    failed_when: false
    when: not playbook_skipped
    tags: [execute]

  - name: "Store requirement 04 details"
    ansible.builtin.set_fact:
      task_04_name: "Restart sshd service"
      task_04_cmd: "systemctl restart sshd || service sshd restart"
      task_04_rc: "{{ 0 if result_04 is not failed else 1 }}"
      data_04: "{{ 'sshd restarted' if result_04 is not failed else 'Failed' }}"
      status_04: "{{ 'PASS' if result_04 is not failed else 'FAIL' }}"
      details_04: "{{ 'SSH daemon restarted successfully' if result_04 is not failed else 'Failed to restart sshd' }}"
    when: not playbook_skipped
    tags: [execute]

  - name: "Req 05 - Verify PermitUserEnvironment is disabled"
    ansible.builtin.shell: |
      sshd -T 2>/dev/null | grep -i permituserenvironment
    args:
      executable: /bin/bash
    register: result_05
    failed_when: false
    changed_when: false
    when: not playbook_skipped
    tags: [execute]

  - name: "Store requirement 05 details"
    ansible.builtin.set_fact:
      task_05_name: "Verify PermitUserEnvironment disabled"
      task_05_cmd: "sshd -T | grep -i permituserenvironment"
      task_05_rc: "{{ result_05.rc | default(-1) }}"
      data_05: "{{ result_05.stdout | default('') | trim }}"
      status_05: "{{ 'PASS' if (result_05.stdout | default('') | trim | lower) == 'permituserenvironment no' else 'FAIL' }}"
      details_05: "{{ 'Verification passed: permituserenvironment no' if (result_05.stdout | default('') | trim | lower) == 'permituserenvironment no' else 'Verification failed' }}"
    when: not playbook_skipped
    tags: [execute]

  - name: "Req 06 - Store final remediation result in cis_result"
    ansible.builtin.set_fact:
      cis_result: >-
        {% if status_05 == 'PASS' %}PASS
        {% elif status_05 == 'FAIL' %}FAIL
        {% else %}ERROR
        {% endif %}
    when: not playbook_skipped
    tags: [execute]

  - name: "Store requirement 06 details"
    ansible.builtin.set_fact:
      task_06_name: "Set cis_result variable"
      task_06_cmd: "set_fact cis_result based on status_05"
      task_06_rc: 0
      data_06: "cis_result set to {{ cis_result | default('ERROR') | trim }}"
      status_06: "PASS"
      details_06: "cis_result variable stored successfully"
    when: not playbook_skipped
    tags: [execute]

  - name: "Set skipped status when package not installed"
    ansible.builtin.set_fact:
      status_01: "SKIP"
      details_01: "{{ package_name }} not installed"
      status_02: "SKIP"
      details_02: "{{ package_name }} not installed"
      status_03: "SKIP"
      details_03: "{{ package_name }} not installed"
      status_04: "SKIP"
      details_04: "{{ package_name }} not installed"
      status_05: "SKIP"
      details_05: "{{ package_name }} not installed"
      status_06: "SKIP"
      details_06: "{{ package_name }} not installed"
      cis_result: "SKIP"
    when: playbook_skipped
    tags: [execute]

  - name: "Generate remediation report"
    ansible.builtin.debug:
      msg:
      - "========================================================"
      - "        REMEDIATION REPORT — CIS 5.1.21"
      - "========================================================"
      - "Reference: CIS Benchmark checkpoint 5.1.21"
      - ""
      - "REQUIREMENT 01 - {{ req_01 }}:"
      - "  Task: {{ task_01_name | default('Task not recorded') }}"
      - "  Command: {{ task_01_cmd | default('N/A') }}"
      - "  Exit code: {{ task_01_rc | default(-1) }}"
      - "  Data: {{ data_01 | default('') | trim }}"
      - "  Status: {{ status_01 | default('ERROR') | trim }}"
      - "  Details: {{ details_01 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 02 - {{ req_02 }}:"
      - "  Task: {{ task_02_name | default('Task not recorded') }}"
      - "  Command: {{ task_02_cmd | default('N/A') }}"
      - "  Exit code: {{ task_02_rc | default(-1) }}"
      - "  Data: {{ data_02 | default('') | trim }}"
      - "  Status: {{ status_02 | default('ERROR') | trim }}"
      - "  Details: {{ details_02 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 03 - {{ req_03 }}:"
      - "  Task: {{ task_03_name | default('Task not recorded') }}"
      - "  Command: {{ task_03_cmd | default('N/A') }}"
      - "  Exit code: {{ task_03_rc | default(-1) }}"
      - "  Data: {{ data_03 | default('') | trim }}"
      - "  Status: {{ status_03 | default('ERROR') | trim }}"
      - "  Details: {{ details_03 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 04 - {{ req_04 }}:"
      - "  Task: {{ task_04_name | default('Task not recorded') }}"
      - "  Command: {{ task_04_cmd | default('N/A') }}"
      - "  Exit code: {{ task_04_rc | default(-1) }}"
      - "  Data: {{ data_04 | default('') | trim }}"
      - "  Status: {{ status_04 | default('ERROR') | trim }}"
      - "  Details: {{ details_04 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 05 - {{ req_05 }}:"
      - "  Task: {{ task_05_name | default('Task not recorded') }}"
      - "  Command: {{ task_05_cmd | default('N/A') }}"
      - "  Exit code: {{ task_05_rc | default(-1) }}"
      - "  Data: {{ data_05 | default('') | trim }}"
      - "  Status: {{ status_05 | default('ERROR') | trim }}"
      - "  Details: {{ details_05 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 06 - {{ req_06 }}:"
      - "  Task: {{ task_06_name | default('Task not recorded') }}"
      - "  Command: {{ task_06_cmd | default('N/A') }}"
      - "  Exit code: {{ task_06_rc | default(-1) }}"
      - "  Data: {{ data_06 | default('') | trim }}"
      - "  Status: {{ status_06 | default('ERROR') | trim }}"
      - "  Details: {{ details_06 | default('Not evaluated') | trim }}"
      - ""
      - "========================================================"
      - "OVERALL REMEDIATION:"
      - "  Result: {{ cis_result | default('ERROR') | trim }}"
      - "  Details: {{ details_05 | default('Not evaluated') | trim }}"
      - "========================================================"
    tags: [execute]

  always:
# === STATE GUARD — RESTORE PHASE (GUARANTEED) ===
  - name: "State Guard Restore - Conditional restore block"
    block:
    - name: "State Guard Restore - Check if checkpoint exists"
      ansible.builtin.stat:
        path: "{{ state_guard_flag }}"
      register: _sg_restore_flag
      failed_when: false

    - name: "State Guard Restore - Check if sshd_config backup exists"
      ansible.builtin.stat:
        path: "{{ state_guard_dir }}/sshd_config.present"
      register: _sg_restore_sshd
      failed_when: false

    - name: "State Guard Restore - Restore sshd_config from backup"
      ansible.builtin.copy:
        src: "{{ state_guard_dir }}/sshd_config.present"
        dest: "{{ config_file }}"
        remote_src: true
      when: _sg_restore_sshd.stat.exists | default(false)
      failed_when: false

    - name: "State Guard Restore - Remove checkpoint"
      ansible.builtin.file:
        path: "{{ state_guard_dir }}"
        state: absent
      when: _sg_restore_flag.stat.exists | default(false)
      failed_when: false
    when:
    - cis_result is defined
    - cis_result not in ['PASS', 'SKIP']
    tags: [restore]
