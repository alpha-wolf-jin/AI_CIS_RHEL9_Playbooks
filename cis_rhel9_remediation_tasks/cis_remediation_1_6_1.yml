---
- name: Initialize meta data variables
  include_vars: cis_remediation_var_1_6_1.yml

- name: "Snapshot - Create backup directory"
  ansible.builtin.file:
    path: "{{ backup_dir }}"
    state: directory
    mode: '0700'
  tags: [snapshot]
- name: "Snapshot - Check if /etc/crypto-policies/config exists"
  ansible.builtin.stat:
    path: /etc/crypto-policies/config
  register: _snapshot_config_stat
  tags: [snapshot]
- name: "Snapshot - Backup /etc/crypto-policies/config if exists"
  ansible.builtin.copy:
    src: /etc/crypto-policies/config
    dest: "{{ backup_dir }}/config.present"
    remote_src: true
    force: false
  when: _snapshot_config_stat.stat.exists | default(false)
  tags: [snapshot]
- name: "Snapshot - Mark config as absent"
  ansible.builtin.file:
    path: "{{ backup_dir }}/config.absent"
    state: touch
  when: not _snapshot_config_stat.stat.exists | default(false)
  tags: [snapshot]

- block:
  - name: "Check if crypto-policies package is installed"
    ansible.builtin.package_facts:
      manager: auto
    failed_when: false
    tags: [execute]

  - name: "Set crypto_policies_installed fact"
    ansible.builtin.set_fact:
      crypto_policies_installed: "{{ 'crypto-policies' in ansible_facts.packages }}"
      playbook_skipped: "{{ 'crypto-policies' not in ansible_facts.packages }}"
    tags: [execute]

  - name: "Req 1 - Apply system-wide crypto policy to DEFAULT"
    ansible.builtin.shell: "update-crypto-policies --set {{ crypto_policy }}"
    args:
      executable: /bin/bash
    register: result_01
    failed_when: false
    when: crypto_policies_installed | default(false)
    tags: [execute]

  - name: "Req 2 - Activate updated system-wide crypto policy"
    ansible.builtin.shell: "update-crypto-policies"
    args:
      executable: /bin/bash
    register: result_02
    failed_when: false
    when: crypto_policies_installed | default(false)
    tags: [execute]

  - name: "Req 3 - Verify current system-wide crypto policy"
    ansible.builtin.shell: "update-crypto-policies --show"
    args:
      executable: /bin/bash
    register: result_03
    failed_when: false
    when: crypto_policies_installed | default(false)
    tags: [execute]

  - name: "Store requirement 01 details"
    ansible.builtin.set_fact:
      task_01_name: "Apply system-wide crypto policy"
      task_01_cmd: "update-crypto-policies --set {{ crypto_policy }}"
      task_01_rc: "{{ result_01.rc | default(-1) }}"
      data_01: "{{ result_01.stdout | default('') | trim }}"
      status_01: "{{ ('APPLIED' if (result_01.rc | default(-1)) == 0 else 'FAILED') | trim }}"
      details_01: "{{ ('Crypto policy set to ' + crypto_policy if (result_01.rc | default(-1)) == 0 else 'Failed to set policy') | trim }}"
    when: crypto_policies_installed | default(false) and result_01 is defined
    failed_when: false
    tags: [execute]

  - name: "Store requirement 02 details"
    ansible.builtin.set_fact:
      task_02_name: "Activate crypto policy"
      task_02_cmd: "update-crypto-policies"
      task_02_rc: "{{ result_02.rc | default(-1) }}"
      data_02: "{{ result_02.stdout | default('') | trim }}"
      status_02: "{{ ('APPLIED' if (result_02.rc | default(-1)) == 0 else 'FAILED') | trim }}"
      details_02: "{{ ('Policy activated' if (result_02.rc | default(-1)) == 0 else 'Failed to activate') | trim }}"
    when: crypto_policies_installed | default(false) and result_02 is defined
    failed_when: false
    tags: [execute]

  - name: "Store requirement 03 details"
    ansible.builtin.set_fact:
      task_03_name: "Verify crypto policy"
      task_03_cmd: "update-crypto-policies --show"
      task_03_rc: "{{ result_03.rc | default(-1) }}"
      data_03: "{{ result_03.stdout | default('') | trim }}"
      status_03: "{{ ('APPLIED' if 'LEGACY' not in (result_03.stdout | default('') | trim) else 'FAILED') | trim }}"
      details_03: "{{ ('Policy is not LEGACY' if 'LEGACY' not in (result_03.stdout | default('') | trim) else 'Policy is still LEGACY') | trim }}"
    when: crypto_policies_installed | default(false) and result_03 is defined
    failed_when: false
    tags: [execute]

  - name: "Generate remediation report"
    ansible.builtin.debug:
      msg: |
        REMEDIATION REPORT — CIS 1.6.1
        Reference: CIS Benchmark checkpoint 1.6.1
        REQUIREMENT 01 - {{ req_01 }}:
          Task: {{ task_01_name | default('Not executed') }}
          Command: {{ task_01_cmd | default('N/A') }}
          Exit code: {{ task_01_rc | default(-1) }}
          Data: {{ data_01 | default('Not collected') }}
          Status: {{ status_01 | default('SKIPPED') }}
          Details: {{ details_01 | default('Not evaluated') }}

        REQUIREMENT 02 - {{ req_02 }}:
          Task: {{ task_02_name | default('Not executed') }}
          Command: {{ task_02_cmd | default('N/A') }}
          Exit code: {{ task_02_rc | default(-1) }}
          Data: {{ data_02 | default('Not collected') }}
          Status: {{ status_02 | default('SKIPPED') }}
          Details: {{ details_02 | default('Not evaluated') }}

        REQUIREMENT 03 - {{ req_03 }}:
          Task: {{ task_03_name | default('Not executed') }}
          Command: {{ task_03_cmd | default('N/A') }}
          Exit code: {{ task_03_rc | default(-1) }}
          Data: {{ data_03 | default('Not collected') }}
          Status: {{ status_03 | default('SKIPPED') }}
          Details: {{ details_03 | default('Not evaluated') }}

        OVERALL REMEDIATION:
          Result: {{ status_03 | default('SKIPPED') }}
          Details: {{ details_03 | default('') }}
    tags: [execute]

  always:
  - name: "Restore - Check if backup exists"
    ansible.builtin.stat:
      path: "{{ backup_dir }}/config.present"
    register: _restore_backup_stat
    failed_when: false
    tags: [restore]

  - name: "Restore - Overwrite with original"
    ansible.builtin.copy:
      src: "{{ backup_dir }}/config.present"
      dest: /etc/crypto-policies/config
      remote_src: true
    when: _restore_backup_stat.stat.exists | default(false)
    failed_when: false
    tags: [restore]

  - name: "Restore - Activate restored crypto policy"
    ansible.builtin.shell: "update-crypto-policies"
    args:
      executable: /bin/bash
    when: _restore_backup_stat.stat.exists | default(false)
    failed_when: false
    tags: [restore]

  - name: "Restore - Check if config was originally absent"
    ansible.builtin.stat:
      path: "{{ backup_dir }}/config.absent"
    register: _restore_absent_marker
    failed_when: false
    tags: [restore]

  - name: "Restore - Remove created config file"
    ansible.builtin.file:
      path: /etc/crypto-policies/config
      state: absent
    when: _restore_absent_marker.stat.exists | default(false)
    failed_when: false
    tags: [restore]

  - name: "Restore - Activate default policy after config removal"
    ansible.builtin.shell: "update-crypto-policies"
    args:
      executable: /bin/bash
    when: _restore_absent_marker.stat.exists | default(false)
    failed_when: false
    tags: [restore]

  - name: "Restore - Remove backup directory"
    ansible.builtin.file:
      path: "{{ backup_dir }}"
      state: absent
    failed_when: false
    tags: [restore]
