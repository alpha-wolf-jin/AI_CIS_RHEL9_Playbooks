---
- name: Initialize meta data variables
  include_vars: cis_remediation_var_1_6_1.yml

- name: "Snapshot - Create backup directory"
  ansible.builtin.file:
    path: "{{ backup_dir }}"
    state: directory
    mode: '0700'
  tags: [snapshot]
- name: "Snapshot - Check if /etc/crypto-policies/config exists"
  ansible.builtin.stat:
    path: /etc/crypto-policies/config
  register: _snap_config_stat
  tags: [snapshot]
- name: "Snapshot - Backup /etc/crypto-policies/config if exists"
  ansible.builtin.copy:
    src: /etc/crypto-policies/config
    dest: "{{ backup_dir }}/crypto-policies.config.present"
    remote_src: true
  when: _snap_config_stat.stat.exists
  tags: [snapshot]
- name: "Snapshot - Mark /etc/crypto-policies/config as absent"
  ansible.builtin.copy:
    content: "absent"
    dest: "{{ backup_dir }}/crypto-policies.config.absent"
  when: not _snap_config_stat.stat.exists
  tags: [snapshot]

- block:
  - name: "Initialize data variables"
    ansible.builtin.set_fact:
      data_01: "Not collected yet"
      status_01: "ERROR"
      details_01: "Not evaluated"
      data_02: "Not collected yet"
      status_02: "ERROR"
      details_02: "Not evaluated"
      data_03: "Not collected yet"
      status_03: "ERROR"
      details_03: "Not evaluated"
      data_04: "Not collected yet"
      status_04: "ERROR"
      details_04: "Not evaluated"
      task_01_name: "Not executed"
      task_01_cmd: "N/A"
      task_01_rc: -1
      task_02_name: "Not executed"
      task_02_cmd: "N/A"
      task_02_rc: -1
      task_03_name: "Not executed"
      task_03_cmd: "N/A"
      task_03_rc: -1
      task_04_name: "Not executed"
      task_04_cmd: "N/A"
      task_04_rc: -1
    tags: [execute]

  - name: "Gather package facts"
    ansible.builtin.package_facts:
      manager: auto
    failed_when: false
    tags: [execute]

  - name: "Set crypto-policies installed fact"
    ansible.builtin.set_fact:
      crypto_policies_installed: "{{ 'crypto-policies' in ansible_facts.packages | default({}) }}"
    tags: [execute]

  - name: "Req 01 - Set system-wide crypto policy to DEFAULT"
    ansible.builtin.shell: update-crypto-policies --set DEFAULT
    args:
      executable: /bin/bash
    register: result_01
    failed_when: false
    when: crypto_policies_installed | bool
    tags: [execute]

  - name: "Store requirement 01 details"
    ansible.builtin.set_fact:
      task_01_name: "Set system-wide crypto policy to DEFAULT"
      task_01_cmd: "update-crypto-policies --set DEFAULT"
      task_01_rc: "{{ result_01.rc | default(-1) }}"
      data_01: "{{ result_01.stdout | default('') | trim }}"
      status_01: "{{ ('PASS' if result_01.rc | default(-1) == 0 else 'FAIL') | trim }}"
      details_01: "{{ 'Policy set to DEFAULT successfully' if result_01.rc | default(-1) == 0 else 'Failed to set policy' | trim }}"
    when: crypto_policies_installed | bool
    tags: [execute]

  - name: "Store requirement 01 details - SKIP"
    ansible.builtin.set_fact:
      task_01_name: "Set system-wide crypto policy to DEFAULT"
      task_01_cmd: "update-crypto-policies --set DEFAULT"
      task_01_rc: -1
      data_01: "N/A"
      status_01: "SKIP"
      details_01: "crypto-policies package not installed"
    when: not crypto_policies_installed | bool
    tags: [execute]

  - name: "Req 02 - Activate updated system-wide crypto policy"
    ansible.builtin.shell: update-crypto-policies
    args:
      executable: /bin/bash
    register: result_02
    failed_when: false
    when:
    - crypto_policies_installed | bool
    - result_01.rc | default(-1) == 0
    tags: [execute]

  - name: "Store requirement 02 details"
    ansible.builtin.set_fact:
      task_02_name: "Activate updated system-wide crypto policy"
      task_02_cmd: "update-crypto-policies"
      task_02_rc: "{{ result_02.rc | default(-1) }}"
      data_02: "{{ result_02.stdout | default('') | trim }}"
      status_02: "{{ ('PASS' if result_02.rc | default(-1) == 0 else 'FAIL') | trim }}"
      details_02: "{{ 'Policy activated successfully' if result_02.rc | default(-1) == 0 else 'Failed to activate policy' | trim }}"
    when:
    - crypto_policies_installed | bool
    - result_01.rc | default(-1) == 0
    tags: [execute]

  - name: "Store requirement 02 details - SKIP"
    ansible.builtin.set_fact:
      task_02_name: "Activate updated system-wide crypto policy"
      task_02_cmd: "update-crypto-policies"
      task_02_rc: -1
      data_02: "N/A"
      status_02: "SKIP"
      details_02: "{{ 'crypto-policies package not installed' if not crypto_policies_installed | bool else 'Req 01 did not succeed' }}"
    when: not crypto_policies_installed | bool or result_01.rc | default(-1) != 0
    tags: [execute]

  - name: "Req 03 - Verify current system-wide crypto policy"
    ansible.builtin.shell: update-crypto-policies --show
    args:
      executable: /bin/bash
    register: result_03
    failed_when: false
    when: crypto_policies_installed | bool
    tags: [execute]

  - name: "Store requirement 03 details"
    ansible.builtin.set_fact:
      task_03_name: "Verify current system-wide crypto policy"
      task_03_cmd: "update-crypto-policies --show"
      task_03_rc: "{{ result_03.rc | default(-1) }}"
      data_03: "{{ result_03.stdout | default('') | trim }}"
      status_03: "{{ ('PASS' if (result_03.rc | default(-1) == 0 and 'LEGACY' not in (result_03.stdout | default(''))) else 'FAIL') | trim }}"
      details_03: "{{ 'Policy verified: LEGACY not present' if (result_03.rc | default(-1) == 0 and 'LEGACY' not in (result_03.stdout | default(''))) else 'Verification failed or LEGACY policy detected' | trim }}"
    when: crypto_policies_installed | bool
    tags: [execute]

  - name: "Store requirement 03 details - SKIP"
    ansible.builtin.set_fact:
      task_03_name: "Verify current system-wide crypto policy"
      task_03_cmd: "update-crypto-policies --show"
      task_03_rc: -1
      data_03: "N/A"
      status_03: "SKIP"
      details_03: "crypto-policies package not installed"
    when: not crypto_policies_installed | bool
    tags: [execute]

  - name: "Req 04 - Store final remediation result in cis_result"
    ansible.builtin.set_fact:
      cis_result: "{{ status_03 | default('ERROR') | trim }}"
      task_04_name: "Store final remediation result in cis_result"
      task_04_cmd: "N/A"
      task_04_rc: 0
      data_04: "N/A"
      status_04: "{{ status_03 | default('ERROR') | trim }}"
      details_04: "{{ details_03 | default('Not evaluated') | trim }}"
    tags: [execute]

  - name: "Generate remediation report"
    ansible.builtin.debug:
      msg:
      - "REMEDIATION REPORT — CIS 1.6.1"
      - "Reference: CIS Benchmark checkpoint 1.6.1"
      - ""
      - "REQUIREMENT 01 - {{ req_01 }}:"
      - "  Task: {{ task_01_name | default('Not recorded') }}"
      - "  Command: {{ task_01_cmd | default('N/A') }}"
      - "  Exit code: {{ task_01_rc | default(-1) }}"
      - "  Data: {{ data_01 | default('') | trim }}"
      - "  Status: {{ status_01 | default('ERROR') | trim }}"
      - "  Details: {{ details_01 | default('') | trim }}"
      - ""
      - "REQUIREMENT 02 - {{ req_02 }}:"
      - "  Task: {{ task_02_name | default('Not recorded') }}"
      - "  Command: {{ task_02_cmd | default('N/A') }}"
      - "  Exit code: {{ task_02_rc | default(-1) }}"
      - "  Data: {{ data_02 | default('') | trim }}"
      - "  Status: {{ status_02 | default('ERROR') | trim }}"
      - "  Details: {{ details_02 | default('') | trim }}"
      - ""
      - "REQUIREMENT 03 - {{ req_03 }}:"
      - "  Task: {{ task_03_name | default('Not recorded') }}"
      - "  Command: {{ task_03_cmd | default('N/A') }}"
      - "  Exit code: {{ task_03_rc | default(-1) }}"
      - "  Data: {{ data_03 | default('') | trim }}"
      - "  Status: {{ status_03 | default('ERROR') | trim }}"
      - "  Details: {{ details_03 | default('') | trim }}"
      - ""
      - "REQUIREMENT 04 - {{ req_04 }}:"
      - "  Task: {{ task_04_name | default('Not recorded') }}"
      - "  Command: {{ task_04_cmd | default('N/A') }}"
      - "  Exit code: {{ task_04_rc | default(-1) }}"
      - "  Data: {{ data_04 | default('') | trim }}"
      - "  Status: {{ status_04 | default('ERROR') | trim }}"
      - "  Details: {{ details_04 | default('') | trim }}"
      - ""
      - "========================================================"
      - "OVERALL REMEDIATION:"
      - "  Result: {{ cis_result | default('ERROR') | trim }}"
      - "  Details: {{ details_04 | default('Not evaluated') | trim }}"
      - "========================================================"
    tags: [execute]

  always:
  - name: "Restore - Check if backup exists"
    ansible.builtin.stat:
      path: "{{ backup_dir }}/crypto-policies.config.present"
    register: _restore_present
    failed_when: false
    tags: [restore]

  - name: "Restore - Overwrite /etc/crypto-policies/config with original"
    ansible.builtin.copy:
      src: "{{ backup_dir }}/crypto-policies.config.present"
      dest: /etc/crypto-policies/config
      remote_src: true
    when: _restore_present.stat.exists | default(false)
    failed_when: false
    tags: [restore]

  - name: "Restore - Check if config was absent before remediation"
    ansible.builtin.stat:
      path: "{{ backup_dir }}/crypto-policies.config.absent"
    register: _restore_absent
    failed_when: false
    tags: [restore]

  - name: "Restore - Delete /etc/crypto-policies/config if it was absent"
    ansible.builtin.file:
      path: /etc/crypto-policies/config
      state: absent
    when: _restore_absent.stat.exists | default(false)
    failed_when: false
    tags: [restore]

  - name: "Restore - Remove backup directory"
    ansible.builtin.file:
      path: "{{ backup_dir }}"
      state: absent
    failed_when: false
    tags: [restore]
