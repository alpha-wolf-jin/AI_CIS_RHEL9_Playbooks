---
- name: Initialize meta data variables
  include_vars: cis_remediation_var_6_2_1_3.yml

- name: "Snapshot - Create backup directory"
  ansible.builtin.file:
    path: "{{ backup_dir }}"
    state: directory
    mode: '0700'
  tags: [snapshot]
- name: "Snapshot - Check if journald config file exists"
  ansible.builtin.stat:
    path: "{{ journald_conf }}"
  register: _snap_conf_stat
  tags: [snapshot]
- name: "Snapshot - Backup journald config file if exists"
  ansible.builtin.copy:
    src: "{{ journald_conf }}"
    dest: "{{ backup_dir }}/journald.conf.present"
    remote_src: true
  when: "_snap_conf_stat.stat.exists"
  tags: [snapshot]

- block:
  - name: "Req 01 - Check if systemd package is installed"
    ansible.builtin.shell: |
      if command -v dpkg > /dev/null 2>&1; then
        dpkg -l systemd 2>/dev/null || echo "not_installed"
      elif command -v rpm > /dev/null 2>&1; then
        rpm -q systemd 2>/dev/null || echo "not_installed"
      else
        echo "not_installed"
      fi
    args:
      executable: /bin/bash
    register: result_01
    failed_when: false
    changed_when: false
    tags: [execute]

  - name: "Store requirement 01 details"
    ansible.builtin.set_fact:
      task_01_name: "Check if systemd package is installed"
      task_01_cmd: "dpkg -l systemd || rpm -q systemd"
      task_01_rc: "{{ result_01.rc | default(-1) }}"
      data_01: "{{ result_01.stdout | default('') | trim }}"
      status_01: "{{ 'SKIPPED' if ('not_installed' in (result_01.stdout | default(''))) else ('PASS' if (result_01.rc | default(-1) == 0) else 'FAIL') }}"
      details_01: "{{ 'Systemd not installed - all remediation steps skipped' if ('not_installed' in (result_01.stdout | default(''))) else ('Systemd is installed' if (result_01.rc | default(-1) == 0) else 'Failed to verify systemd installation') }}"
      playbook_skipped: "{{ 'not_installed' in (result_01.stdout | default('')) }}"
    tags: [execute]

  - name: "Req 02 - Backup journald configuration file"
    ansible.builtin.copy:
      src: "{{ journald_conf }}"
      dest: "{{ backup_dir }}/journald.conf.before"
      remote_src: true
    when: "not (playbook_skipped | default(false))"
    failed_when: false
    register: result_02
    tags: [execute]

  - name: "Store requirement 02 details"
    ansible.builtin.set_fact:
      task_02_name: "Backup journald configuration file"
      task_02_cmd: "copy {{ journald_conf }} to {{ backup_dir }}/journald.conf.before"
      task_02_rc: "{{ result_02.rc | default(0) if not (playbook_skipped | default(false)) else -1 }}"
      data_02: "{{ 'Backup created' if (result_02.changed | default(false)) else ('File does not exist' if not (playbook_skipped | default(false)) else 'Skipped') }}"
      status_02: "{{ 'SKIPPED' if (playbook_skipped | default(false)) else ('PASS' if (result_02.changed | default(false)) or (result_02 is not skipped) else 'FAIL') }}"
      details_02: "{{ 'Skipped - systemd not installed' if (playbook_skipped | default(false)) else ('Configuration file backed up' if (result_02.changed | default(false)) else 'No existing config to backup') }}"
    tags: [execute]

  - name: "Req 03-07 - Set journald rotation parameters"
    ansible.builtin.lineinfile:
      path: "{{ journald_conf }}"
      line: "{{ item }}"
      regexp: "^{{ item.split('=')[0] | regex_escape }}="
      state: present
      create: yes
      mode: '0644'
    loop: "{{ journald_params }}"
    register: result_03_07
    failed_when: false
    when: "not (playbook_skipped | default(false))"
    tags: [execute]

  - name: "Store requirement 03-07 details"
    ansible.builtin.set_fact:
      task_03_name: "Set SystemMaxUse=1G in journald.conf"
      task_03_cmd: "lineinfile: SystemMaxUse=1G"
      task_03_rc: "{{ 0 if not (playbook_skipped | default(false)) else -1 }}"
      data_03: "{{ 'SystemMaxUse=1G configured' if not (playbook_skipped | default(false)) else 'Skipped' }}"
      status_03: "{{ 'SKIPPED' if (playbook_skipped | default(false)) else 'APPLIED' }}"
      details_03: "{{ 'Skipped - systemd not installed' if (playbook_skipped | default(false)) else 'Parameter set in journald.conf' }}"
      task_04_name: "Set SystemKeepFree=500M in journald.conf"
      task_04_cmd: "lineinfile: SystemKeepFree=500M"
      task_04_rc: "{{ 0 if not (playbook_skipped | default(false)) else -1 }}"
      data_04: "{{ 'SystemKeepFree=500M configured' if not (playbook_skipped | default(false)) else 'Skipped' }}"
      status_04: "{{ 'SKIPPED' if (playbook_skipped | default(false)) else 'APPLIED' }}"
      details_04: "{{ 'Skipped - systemd not installed' if (playbook_skipped | default(false)) else 'Parameter set in journald.conf' }}"
      task_05_name: "Set RuntimeMaxUse=200M in journald.conf"
      task_05_cmd: "lineinfile: RuntimeMaxUse=200M"
      task_05_rc: "{{ 0 if not (playbook_skipped | default(false)) else -1 }}"
      data_05: "{{ 'RuntimeMaxUse=200M configured' if not (playbook_skipped | default(false)) else 'Skipped' }}"
      status_05: "{{ 'SKIPPED' if (playbook_skipped | default(false)) else 'APPLIED' }}"
      details_05: "{{ 'Skipped - systemd not installed' if (playbook_skipped | default(false)) else 'Parameter set in journald.conf' }}"
      task_06_name: "Set RuntimeKeepFree=50M in journald.conf"
      task_06_cmd: "lineinfile: RuntimeKeepFree=50M"
      task_06_rc: "{{ 0 if not (playbook_skipped | default(false)) else -1 }}"
      data_06: "{{ 'RuntimeKeepFree=50M configured' if not (playbook_skipped | default(false)) else 'Skipped' }}"
      status_06: "{{ 'SKIPPED' if (playbook_skipped | default(false)) else 'APPLIED' }}"
      details_06: "{{ 'Skipped - systemd not installed' if (playbook_skipped | default(false)) else 'Parameter set in journald.conf' }}"
      task_07_name: "Set MaxFileSec=1month in journald.conf"
      task_07_cmd: "lineinfile: MaxFileSec=1month"
      task_07_rc: "{{ 0 if not (playbook_skipped | default(false)) else -1 }}"
      data_07: "{{ 'MaxFileSec=1month configured' if not (playbook_skipped | default(false)) else 'Skipped' }}"
      status_07: "{{ 'SKIPPED' if (playbook_skipped | default(false)) else 'APPLIED' }}"
      details_07: "{{ 'Skipped - systemd not installed' if (playbook_skipped | default(false)) else 'Parameter set in journald.conf' }}"
    tags: [execute]

  - name: "Req 08 - Restart systemd-journald service"
    ansible.builtin.systemd:
      name: systemd-journald
      state: restarted
    register: result_08
    failed_when: false
    when: "not (playbook_skipped | default(false))"
    tags: [execute]

  - name: "Store requirement 08 details"
    ansible.builtin.set_fact:
      task_08_name: "Restart systemd-journald service"
      task_08_cmd: "systemctl restart systemd-journald"
      task_08_rc: "{{ result_08.rc | default(0) if not (playbook_skipped | default(false)) else -1 }}"
      data_08: "{{ result_08.state | default('N/A') if not (playbook_skipped | default(false)) else 'Skipped' }}"
      status_08: "{{ 'SKIPPED' if (playbook_skipped | default(false)) else ('APPLIED' if (result_08.state | default('') == 'started') else 'FAILED') }}"
      details_08: "{{ 'Skipped - systemd not installed' if (playbook_skipped | default(false)) else ('Service restarted successfully' if (result_08.state | default('') == 'started') else 'Service restart failed') }}"
    tags: [execute]

  - name: "Req 09 - Verify journald log rotation configuration"
    ansible.builtin.shell: |
      grep -E '^(SystemMaxUse|SystemKeepFree|RuntimeMaxUse|RuntimeKeepFree|MaxFileSec)=' /etc/systemd/journald.conf || echo "VERIFY_FAILED"
    args:
      executable: /bin/bash
    register: result_09
    failed_when: false
    changed_when: false
    when: "not (playbook_skipped | default(false))"
    tags: [execute]

  - name: "Store requirement 09 details"
    ansible.builtin.set_fact:
      task_09_name: "Verify journald log rotation configuration"
      task_09_cmd: "grep -E '^(SystemMaxUse|SystemKeepFree|RuntimeMaxUse|RuntimeKeepFree|MaxFileSec)=' /etc/systemd/journald.conf"
      task_09_rc: "{{ result_09.rc | default(-1) if not (playbook_skipped | default(false)) else -1 }}"
      data_09: "{{ result_09.stdout | default('') | trim if not (playbook_skipped | default(false)) else 'Skipped' }}"
      status_09: "{{ 'SKIPPED' if (playbook_skipped | default(false)) else ('APPLIED' if ('VERIFY_FAILED' not in (result_09.stdout | default('VERIFY_FAILED'))) else 'FAILED') }}"
      details_09: "{{ 'Skipped - systemd not installed' if (playbook_skipped | default(false)) else ('Configuration verified successfully' if ('VERIFY_FAILED' not in (result_09.stdout | default('VERIFY_FAILED'))) else 'Verification failed - expected parameters not found') }}"
    tags: [execute]

  - name: "Generate remediation report"
    ansible.builtin.debug:
      msg:
      - "========================================================"
      - "        REMEDIATION REPORT — CIS 6.2.1.3"
      - "========================================================"
      - "Reference: CIS Benchmark checkpoint 6.2.1.3"
      - ""
      - "REQUIREMENT 01 - {{ req_01 }}:"
      - "  Task: {{ task_01_name | default('Task not recorded') }}"
      - "  Command: {{ task_01_cmd | default('N/A') }}"
      - "  Exit code: {{ task_01_rc | default(-1) }}"
      - "  Data: {{ data_01 | default('') | trim }}"
      - "  Status: {{ status_01 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_01 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 02 - {{ req_02 }}:"
      - "  Task: {{ task_02_name | default('Task not recorded') }}"
      - "  Command: {{ task_02_cmd | default('N/A') }}"
      - "  Exit code: {{ task_02_rc | default(-1) }}"
      - "  Data: {{ data_02 | default('') | trim }}"
      - "  Status: {{ status_02 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_02 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 03 - {{ req_03 }}:"
      - "  Task: {{ task_03_name | default('Task not recorded') }}"
      - "  Command: {{ task_03_cmd | default('N/A') }}"
      - "  Exit code: {{ task_03_rc | default(-1) }}"
      - "  Data: {{ data_03 | default('') | trim }}"
      - "  Status: {{ status_03 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_03 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 04 - {{ req_04 }}:"
      - "  Task: {{ task_04_name | default('Task not recorded') }}"
      - "  Command: {{ task_04_cmd | default('N/A') }}"
      - "  Exit code: {{ task_04_rc | default(-1) }}"
      - "  Data: {{ data_04 | default('') | trim }}"
      - "  Status: {{ status_04 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_04 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 05 - {{ req_05 }}:"
      - "  Task: {{ task_05_name | default('Task not recorded') }}"
      - "  Command: {{ task_05_cmd | default('N/A') }}"
      - "  Exit code: {{ task_05_rc | default(-1) }}"
      - "  Data: {{ data_05 | default('') | trim }}"
      - "  Status: {{ status_05 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_05 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 06 - {{ req_06 }}:"
      - "  Task: {{ task_06_name | default('Task not recorded') }}"
      - "  Command: {{ task_06_cmd | default('N/A') }}"
      - "  Exit code: {{ task_06_rc | default(-1) }}"
      - "  Data: {{ data_06 | default('') | trim }}"
      - "  Status: {{ status_06 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_06 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 07 - {{ req_07 }}:"
      - "  Task: {{ task_07_name | default('Task not recorded') }}"
      - "  Command: {{ task_07_cmd | default('N/A') }}"
      - "  Exit code: {{ task_07_rc | default(-1) }}"
      - "  Data: {{ data_07 | default('') | trim }}"
      - "  Status: {{ status_07 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_07 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 08 - {{ req_08 }}:"
      - "  Task: {{ task_08_name | default('Task not recorded') }}"
      - "  Command: {{ task_08_cmd | default('N/A') }}"
      - "  Exit code: {{ task_08_rc | default(-1) }}"
      - "  Data: {{ data_08 | default('') | trim }}"
      - "  Status: {{ status_08 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_08 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 09 - {{ req_09 }}:"
      - "  Task: {{ task_09_name | default('Task not recorded') }}"
      - "  Command: {{ task_09_cmd | default('N/A') }}"
      - "  Exit code: {{ task_09_rc | default(-1) }}"
      - "  Data: {{ data_09 | default('') | trim }}"
      - "  Status: {{ status_09 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_09 | default('Not evaluated') | trim }}"
      - ""
      - "========================================================"
      - "OVERALL REMEDIATION:"
      - "  Result: {{ status_09 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_09 | default('Not evaluated') | trim }}"
      - "========================================================"
    tags: [execute]

  always:
  - name: "Restore - Check if backup exists"
    ansible.builtin.stat:
      path: "{{ backup_dir }}/journald.conf.present"
    register: _restore_backup_stat
    failed_when: false
    tags: [restore]

  - name: "Restore - Overwrite journald.conf with original"
    ansible.builtin.copy:
      src: "{{ backup_dir }}/journald.conf.present"
      dest: "{{ journald_conf }}"
      remote_src: true
    when: "_restore_backup_stat.stat.exists | default(false)"
    failed_when: false
    tags: [restore]

  - name: "Restore - Remove backup directory"
    ansible.builtin.file:
      path: "{{ backup_dir }}"
      state: absent
    failed_when: false
    tags: [restore]
