---
- name: Initialize meta data variables
  include_vars: cis_remediation_var_6_3_1_4.yml

- name: "Snapshot - Create backup directory"
  ansible.builtin.file:
    path: "{{ backup_dir }}"
    state: directory
    mode: '0700'
  tags: [snapshot]
- name: "Snapshot - Check if auditd service unit file exists"
  ansible.builtin.stat:
    path: "/usr/lib/systemd/system/auditd.service"
  register: _snap_auditd_unit
  tags: [snapshot]
- name: "Snapshot - Backup auditd service unit if exists"
  ansible.builtin.copy:
    src: "/usr/lib/systemd/system/auditd.service"
    dest: "{{ backup_dir }}/auditd.service.present"
    remote_src: true
  when: _snap_auditd_unit.stat.exists
  tags: [snapshot]

- name: "Initialize data variables"
  set_fact:
    data_01: "Not collected yet"
    status_01: "UNKNOWN"
    details_01: "Not evaluated"
    data_02: "Not collected yet"
    status_02: "UNKNOWN"
    details_02: "Not evaluated"
    data_03: "Not collected yet"
    status_03: "UNKNOWN"
    details_03: "Not evaluated"
    data_04: "Not collected yet"
    status_04: "UNKNOWN"
    details_04: "Not evaluated"
    data_05: "Not collected yet"
    status_05: "UNKNOWN"
    details_05: "Not evaluated"
    data_06: "Not collected yet"
    status_06: "UNKNOWN"
    details_06: "Not evaluated"
    task_01_name: "Not executed"
    task_01_cmd: "N/A"
    task_01_rc: -1
    task_02_name: "Not executed"
    task_02_cmd: "N/A"
    task_02_rc: -1
    task_03_name: "Not executed"
    task_03_cmd: "N/A"
    task_03_rc: -1
    task_04_name: "Not executed"
    task_04_cmd: "N/A"
    task_04_rc: -1
    task_05_name: "Not executed"
    task_05_cmd: "N/A"
    task_05_rc: -1
    task_06_name: "Not executed"
    task_06_cmd: "N/A"
    task_06_rc: -1
    cis_result: "UNKNOWN"
    playbook_skipped: false
  tags: [execute]
- block:
  - name: "Req 01 - Check if auditd package is installed"
    ansible.builtin.package_facts:
      manager: auto
    failed_when: false
    tags: [execute]

  - name: "Req 01 - Set skip flag if auditd not installed"
    set_fact:
      playbook_skipped: true
    when: "'audit' not in ansible_facts.packages"
    tags: [execute]

  - name: "Req 01 - Check systemctl binary exists"
    ansible.builtin.shell: which systemctl
    args:
      executable: /bin/bash
    register: result_01
    failed_when: false
    changed_when: false
    when: "not playbook_skipped"
    tags: [execute]

  - name: "Store requirement 01 details"
    set_fact:
      task_01_name: "Req 01 - Check systemctl binary exists"
      task_01_cmd: "which systemctl"
      task_01_rc: "{{ result_01.rc | default(-1) }}"
      data_01: "{{ result_01.stdout | default('') | trim }}"
      status_01: "{{ 'SKIP' if playbook_skipped else ('PASS' if result_01.rc | default(-1) == 0 else 'FAIL') }}"
      details_01: "{{ 'Skipped - auditd package not installed' if playbook_skipped else ('systemctl found at ' + result_01.stdout | default('') | trim if result_01.rc | default(-1) == 0 else 'systemctl not found') }}"
    tags: [execute]

  - name: "Req 02 - Unmask auditd service"
    ansible.builtin.systemd:
      name: "{{ service_name }}"
      masked: false
    register: result_02
    failed_when: false
    when: "not playbook_skipped"
    tags: [execute]

  - name: "Store requirement 02 details"
    set_fact:
      task_02_name: "Req 02 - Unmask auditd service"
      task_02_cmd: "systemctl unmask auditd"
      task_02_rc: "{{ 0 if (result_02 is defined and not result_02.failed | default(false)) else -1 }}"
      data_02: "{{ 'unmasked' if (result_02 is defined and not result_02.failed | default(false)) else (result_02.msg | default('')) }}"
      status_02: "{{ 'SKIP' if playbook_skipped else ('PASS' if (result_02 is defined and not result_02.failed | default(false)) else 'FAIL') }}"
      details_02: "{{ 'Skipped - auditd package not installed' if playbook_skipped else ('Service unmasked successfully' if (result_02 is defined and not result_02.failed | default(false)) else 'Failed to unmask service') }}"
    tags: [execute]

  - name: "Req 03 - Enable auditd service"
    ansible.builtin.systemd:
      name: "{{ service_name }}"
      enabled: true
    register: result_03
    failed_when: false
    when: "not playbook_skipped"
    tags: [execute]

  - name: "Store requirement 03 details"
    set_fact:
      task_03_name: "Req 03 - Enable auditd service"
      task_03_cmd: "systemctl enable auditd"
      task_03_rc: "{{ 0 if (result_03 is defined and not result_03.failed | default(false)) else -1 }}"
      data_03: "{{ result_03.enabled | default('') if result_03 is defined else '' }}"
      status_03: "{{ 'SKIP' if playbook_skipped else ('PASS' if (result_03 is defined and not result_03.failed | default(false)) else 'FAIL') }}"
      details_03: "{{ 'Skipped - auditd package not installed' if playbook_skipped else ('Service enabled successfully' if (result_03 is defined and not result_03.failed | default(false)) else 'Failed to enable service') }}"
    tags: [execute]

  - name: "Req 04 - Start auditd service"
    ansible.builtin.systemd:
      name: "{{ service_name }}"
      state: started
    register: result_04
    failed_when: false
    when: "not playbook_skipped"
    tags: [execute]

  - name: "Store requirement 04 details"
    set_fact:
      task_04_name: "Req 04 - Start auditd service"
      task_04_cmd: "systemctl start auditd"
      task_04_rc: "{{ 0 if (result_04 is defined and not result_04.failed | default(false)) else -1 }}"
      data_04: "{{ result_04.state | default('') if result_04 is defined else '' }}"
      status_04: "{{ 'SKIP' if playbook_skipped else ('PASS' if (result_04 is defined and not result_04.failed | default(false)) else 'FAIL') }}"
      details_04: "{{ 'Skipped - auditd package not installed' if playbook_skipped else ('Service started successfully' if (result_04 is defined and not result_04.failed | default(false)) else 'Failed to start service') }}"
    tags: [execute]

  - name: "Req 05 - Verify auditd service is enabled and active"
    ansible.builtin.shell: |
      systemctl is-enabled auditd 2>/dev/null
      systemctl is-active auditd 2>/dev/null
    args:
      executable: /bin/bash
    register: result_05
    failed_when: false
    changed_when: false
    when: "not playbook_skipped"
    tags: [execute]

  - name: "Store requirement 05 details"
    set_fact:
      task_05_name: "Req 05 - Verify auditd service is enabled and active"
      task_05_cmd: "systemctl is-enabled auditd && systemctl is-active auditd"
      task_05_rc: "{{ result_05.rc | default(-1) if result_05 is defined else -1 }}"
      data_05: "{{ result_05.stdout | default('') | trim if result_05 is defined else '' }}"
      status_05: "{{ 'SKIP' if playbook_skipped else ('PASS' if ('enabled' in result_05.stdout | default('') and 'active' in result_05.stdout | default('')) else 'FAIL') }}"
      details_05: "{{ 'Skipped - auditd package not installed' if playbook_skipped else ('Service is enabled and active' if ('enabled' in result_05.stdout | default('') and 'active' in result_05.stdout | default('')) else 'Service is not enabled and active') }}"
    tags: [execute]

  - name: "Req 06 - Store final remediation result"
    set_fact:
      cis_result: "{{ status_05 }}"
    tags: [execute]

  - name: "Store requirement 06 details"
    set_fact:
      task_06_name: "Req 06 - Store final remediation result"
      task_06_cmd: "N/A"
      task_06_rc: 0
      data_06: "{{ cis_result }}"
      status_06: "PASS"
      details_06: "CIS result stored as {{ cis_result }}"
    tags: [execute]

  - name: "Generate remediation report"
    debug:
      msg:
      - "========================================================"
      - "        REMEDIATION REPORT — CIS 6.3.1.4"
      - "========================================================"
      - "Reference: CIS Benchmark checkpoint 6.3.1.4"
      - ""
      - "REQUIREMENT 01 - {{ req_01 }}:"
      - "  Task: {{ task_01_name | default('Task not recorded') }}"
      - "  Command: {{ task_01_cmd | default('N/A') }}"
      - "  Exit code: {{ task_01_rc | default(-1) }}"
      - "  Data: {{ data_01 | default('') | trim }}"
      - "  Status: {{ status_01 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_01 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 02 - {{ req_02 }}:"
      - "  Task: {{ task_02_name | default('Task not recorded') }}"
      - "  Command: {{ task_02_cmd | default('N/A') }}"
      - "  Exit code: {{ task_02_rc | default(-1) }}"
      - "  Data: {{ data_02 | default('') | trim }}"
      - "  Status: {{ status_02 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_02 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 03 - {{ req_03 }}:"
      - "  Task: {{ task_03_name | default('Task not recorded') }}"
      - "  Command: {{ task_03_cmd | default('N/A') }}"
      - "  Exit code: {{ task_03_rc | default(-1) }}"
      - "  Data: {{ data_03 | default('') | trim }}"
      - "  Status: {{ status_03 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_03 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 04 - {{ req_04 }}:"
      - "  Task: {{ task_04_name | default('Task not recorded') }}"
      - "  Command: {{ task_04_cmd | default('N/A') }}"
      - "  Exit code: {{ task_04_rc | default(-1) }}"
      - "  Data: {{ data_04 | default('') | trim }}"
      - "  Status: {{ status_04 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_04 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 05 - {{ req_05 }}:"
      - "  Task: {{ task_05_name | default('Task not recorded') }}"
      - "  Command: {{ task_05_cmd | default('N/A') }}"
      - "  Exit code: {{ task_05_rc | default(-1) }}"
      - "  Data: {{ data_05 | default('') | trim }}"
      - "  Status: {{ status_05 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_05 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 06 - {{ req_06 }}:"
      - "  Task: {{ task_06_name | default('Task not recorded') }}"
      - "  Command: {{ task_06_cmd | default('N/A') }}"
      - "  Exit code: {{ task_06_rc | default(-1) }}"
      - "  Data: {{ data_06 | default('') | trim }}"
      - "  Status: {{ status_06 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_06 | default('Not evaluated') | trim }}"
      - ""
      - "========================================================"
      - "OVERALL REMEDIATION:"
      - "  Result: {{ cis_result | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_05 | default('Not evaluated') | trim }}"
      - "========================================================"
    tags: [execute]

  always:
  - name: "Restore - Check if backup exists"
    ansible.builtin.stat:
      path: "{{ backup_dir }}/auditd.service.present"
    register: _restore_backup
    failed_when: false
    tags: [restore]

  - name: "Restore - Overwrite auditd service unit with original"
    ansible.builtin.copy:
      src: "{{ backup_dir }}/auditd.service.present"
      dest: "/usr/lib/systemd/system/auditd.service"
      remote_src: true
    when: _restore_backup.stat.exists | default(false)
    failed_when: false
    tags: [restore]

  - name: "Restore - Remove backup directory"
    ansible.builtin.file:
      path: "{{ backup_dir }}"
      state: absent
    failed_when: false
    tags: [restore]
