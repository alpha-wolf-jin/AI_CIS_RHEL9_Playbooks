---
- name: Initialize meta data variables
  include_vars: cis_remediation_var_3_1_1.yml

- name: "Snapshot - Create backup directory"
  ansible.builtin.file:
    path: "{{ backup_dir }}"
    state: directory
    mode: '0700'
  failed_when: false
  tags: [snapshot]
- name: "Snapshot - Check if config file exists"
  ansible.builtin.stat:
    path: "{{ ipv6_config_file }}"
  register: _snap_config_stat
  tags: [snapshot]
- name: "Snapshot - Backup config file if exists"
  ansible.builtin.copy:
    src: "{{ ipv6_config_file }}"
    dest: "{{ backup_dir }}/ipv6_sysctl.conf.orig"
    remote_src: true
    force: false
  when: _snap_config_stat.stat.exists | default(false)
  failed_when: false
  tags: [snapshot]
- name: "Snapshot - Save current sysctl parameter value (numeric)"
  ansible.builtin.shell: "sysctl -n {{ sysctl_param }}"
  args:
    executable: /bin/bash
  register: _snap_sysctl_value
  changed_when: false
  failed_when: false
  tags: [snapshot]
- name: "Snapshot - Persist sysctl value to file"
  ansible.builtin.copy:
    content: "{{ _snap_sysctl_value.stdout | default('') | trim }}"
    dest: "{{ backup_dir }}/sysctl_param.orig"
    force: false
  tags: [snapshot]
- name: "Snapshot - Save existence marker for config file"
  ansible.builtin.copy:
    content: "{{ _snap_config_stat.stat.exists | string | lower }}"
    dest: "{{ backup_dir }}/conf_existed"
    force: false
  tags: [snapshot]

- block:
# === EXECUTE PHASE (tag: execute) ===
  - name: "Initialize data variables"
    set_fact:
      data_01: "Not collected yet"
      status_01: "UNKNOWN"
      details_01: "Not evaluated"
      data_02: "Not collected yet"
      status_02: "UNKNOWN"
      details_02: "Not evaluated"
      data_03: "Not collected yet"
      status_03: "UNKNOWN"
      details_03: "Not evaluated"
      data_04: "Not collected yet"
      status_04: "UNKNOWN"
      details_04: "Not evaluated"
      data_05: "Not collected yet"
      status_05: "UNKNOWN"
      details_05: "Not evaluated"

# Requirement 1: Check tools
  - name: "Req 01 - Check for necessary tools"
    ansible.builtin.shell: "which sysctl nmcli ip"
    args:
      executable: /bin/bash
    register: result_01
    failed_when: false
    tags: [execute]

  - name: "Store requirement 01 details"
    set_fact:
      data_01: "{{ result_01.stdout | default('') | trim }}"
      status_01: "{{ ('PASS' if result_01.rc | default(-1) == 0 else 'FAIL') | trim }}"
      details_01: "{{ ('Tools found: ' + (result_01.stdout | default('') | trim)) if result_01.rc == 0 else ('No tools found (exit code ' + (result_01.rc | default(-1) | string) + ')') }}"
    tags: [execute]

# Requirement 2: Get current IPv6 status
  - name: "Req 02 - Get current IPv6 status"
    ansible.builtin.shell: "sysctl {{ sysctl_param }}"
    args:
      executable: /bin/bash
    register: result_02
    failed_when: false
    tags: [execute]

# FIX: Reference result_02 directly, avoid circular reference
  - name: "Store requirement 02 details"
    set_fact:
      data_02: "{{ result_02.stdout | default('') | trim | regex_replace('^.*= ', '') }}"
      status_02: "{{ ('PASS' if result_02.rc | default(-1) == 0 else 'FAIL') | trim }}"
      details_02: "{{ ('Current value: ' + (result_02.stdout | default('') | trim | regex_replace('^.*= ', ''))) if result_02.rc == 0 else 'Failed to read sysctl' }}"
    tags: [execute]

# Requirement 3: Apply setting
  - name: "Req 03 - Apply IPv6 setting"
    ansible.builtin.shell: "sysctl -w {{ sysctl_param }}={{ ipv6_disable_target }}"
    args:
      executable: /bin/bash
    register: result_03
    failed_when: false
    tags: [execute]

# FIX: Reference result_03 directly, avoid circular reference
  - name: "Store requirement 03 details"
    set_fact:
      data_03: "{{ result_03.stdout | default('') | trim | regex_replace('^.*= ', '') }}"
      status_03: "{{ ('PASS' if result_03.rc | default(-1) == 0 and (result_03.stdout | default('') | trim | regex_replace('^.*= ', '') | int) == ipv6_disable_target else 'FAIL') | trim }}"
      details_03: "{{ ('Set to ' + (result_03.stdout | default('') | trim | regex_replace('^.*= ', ''))) if result_03.rc == 0 else 'Failed to apply setting' }}"
    tags: [execute]

# Requirement 4: Persist setting
  - name: "Req 04 - Persist IPv6 setting in sysctl configuration"
    ansible.builtin.lineinfile:
      path: "{{ ipv6_config_file }}"
      regexp: |
        ^net\\.ipv6\\.conf\\.all\\.disable_ipv6\\s*=
      line: "{{ sysctl_param }}={{ ipv6_disable_target }}"
      state: present
      create: yes
    register: result_04
    failed_when: false
    tags: [execute]

  - name: "Store requirement 04 details"
    set_fact:
      data_04: "{{ 'Line added/updated in ' + ipv6_config_file }}"
      status_04: "{{ ('PASS' if result_04 is not failed else 'FAIL') | trim }}"
      details_04: "{{ 'Configuration file modified' if result_04.changed else 'Setting already present' }}"
    tags: [execute]

# Requirement 5: Verify setting
  - name: "Req 05 - Verify IPv6 setting"
    ansible.builtin.shell: "sysctl {{ sysctl_param }}"
    args:
      executable: /bin/bash
    register: result_05
    failed_when: false
    tags: [execute]

# FIX: Reference result_05 directly, avoid circular reference
  - name: "Store requirement 05 details"
    set_fact:
      data_05: "{{ result_05.stdout | default('') | trim | regex_replace('^.*= ', '') }}"
      status_05: "{{ ('PASS' if result_05.rc | default(-1) == 0 and (result_05.stdout | default('') | trim | regex_replace('^.*= ', '') | int) == ipv6_disable_target else 'FAIL') | trim }}"
      details_05: "{{ ('Current value ' + (result_05.stdout | default('') | trim | regex_replace('^.*= ', '')) + ', expected ' + (ipv6_disable_target | string)) if result_05.rc == 0 else 'Failed to read sysctl' }}"
    tags: [execute]

# Generate remediation report
  - name: "Generate remediation report"
    debug:
      msg:
      - "========================================================"
      - "        REMEDIATION REPORT — CIS 3.1.1"
      - "========================================================"
      - "Reference: CIS Benchmark checkpoint 3.1.1"
      - ""
      - "REQUIREMENT 01 - {{ req_01 }}:"
      - "  Task: Req 01 - Check for necessary tools"
      - "  Command: `which sysctl nmcli ip`"
      - "  Exit code: {{ result_01.rc | default(-1) }}"
      - "  Data: {{ data_01 | default('') }}"
      - "  Status: {{ status_01 | default('UNKNOWN') }}"
      - "  Details: {{ details_01 | default('Not evaluated') }}"
      - ""
      - "REQUIREMENT 02 - {{ req_02 }}:"
      - "  Task: Req 02 - Get current IPv6 status"
      - "  Command: `sysctl {{ sysctl_param }}`"
      - "  Exit code: {{ result_02.rc | default(-1) }}"
      - "  Data: {{ data_02 | default('') }}"
      - "  Status: {{ status_02 | default('UNKNOWN') }}"
      - "  Details: {{ details_02 | default('Not evaluated') }}"
      - ""
      - "REQUIREMENT 03 - {{ req_03 }}:"
      - "  Task: Req 03 - Apply IPv6 setting"
      - "  Command: `sysctl -w {{ sysctl_param }}={{ ipv6_disable_target }}`"
      - "  Exit code: {{ result_03.rc | default(-1) }}"
      - "  Data: {{ data_03 | default('') }}"
      - "  Status: {{ status_03 | default('UNKNOWN') }}"
      - "  Details: {{ details_03 | default('Not evaluated') }}"
      - ""
      - "REQUIREMENT 04 - {{ req_04 }}:"
      - "  Task: Req 04 - Persist IPv6 setting in sysctl configuration"
      - "  Command: `lineinfile` on {{ ipv6_config_file }}"
      - "  Exit code: N/A"
      - "  Data: {{ data_04 | default('') }}"
      - "  Status: {{ status_04 | default('UNKNOWN') }}"
      - "  Details: {{ details_04 | default('Not evaluated') }}"
      - ""
      - "REQUIREMENT 05 - {{ req_05 }}:"
      - "  Task: Req 05 - Verify IPv6 setting"
      - "  Command: `sysctl {{ sysctl_param }}`"
      - "  Exit code: {{ result_05.rc | default(-1) }}"
      - "  Data: {{ data_05 | default('') }}"
      - "  Status: {{ status_05 | default('UNKNOWN') }}"
      - "  Details: {{ details_05 | default('Not evaluated') }}"
      - ""
      - "========================================================"
      - "OVERALL REMEDIATION:"
      - "  Result: {{ status_05 | default('UNKNOWN') }}"
      - "  Details: {{ ('IPv6 setting applied and verified' if status_05 == 'PASS' else 'Remediation may have failed') }}"
      - "========================================================"
    tags: [execute]

  always:
# === RESTORE PHASE (tag: restore) ===
  - name: "Restore - Check if backup directory exists"
    ansible.builtin.stat:
      path: "{{ backup_dir }}"
    register: _restore_backup_dir
    failed_when: false
    tags: [restore]

  - name: "Restore - Check if config file backup exists"
    ansible.builtin.stat:
      path: "{{ backup_dir }}/ipv6_sysctl.conf.orig"
    register: _restore_config_backup
    failed_when: false
    tags: [restore]

  - name: "Restore - Overwrite config file with original backup"
    ansible.builtin.copy:
      src: "{{ backup_dir }}/ipv6_sysctl.conf.orig"
      dest: "{{ ipv6_config_file }}"
      remote_src: true
    when: _restore_config_backup.stat.exists | default(false)
    failed_when: false
    tags: [restore]

  - name: "Restore - Read saved sysctl parameter value"
    ansible.builtin.slurp:
      src: "{{ backup_dir }}/sysctl_param.orig"
    register: _restore_sysctl_data
    failed_when: false
    tags: [restore]

  - name: "Restore - Restore original sysctl value"
    ansible.builtin.shell: "sysctl -w {{ sysctl_param }}={{ _restore_sysctl_data.content | b64decode | default('0') | trim }}"
    args:
      executable: /bin/bash
    when:
    - _restore_backup_dir.stat.exists | default(false)
    - _restore_sysctl_data.content is defined
    - (_restore_sysctl_data.content | b64decode | trim) != ''
    failed_when: false
    tags: [restore]

  - name: "Restore - Read existence marker"
    ansible.builtin.slurp:
      src: "{{ backup_dir }}/conf_existed"
    register: _restore_existed
    failed_when: false
    tags: [restore]

  - name: "Restore - Remove config file if it was created by tasks"
    ansible.builtin.file:
      path: "{{ ipv6_config_file }}"
      state: absent
    when:
    - _restore_existed.content is defined
    - (_restore_existed.content | b64decode | trim) == 'false'
    failed_when: false
    tags: [restore]

  - name: "Restore - Remove backup directory"
    ansible.builtin.file:
      path: "{{ backup_dir }}"
      state: absent
    when: _restore_backup_dir.stat.exists | default(false)
    failed_when: false
    tags: [restore]
