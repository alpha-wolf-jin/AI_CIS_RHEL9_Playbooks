mount_point: "/var"
mount_option: "nosuid"
checkpoint_id: "cis_1_1_2_4_3"
state_guard_dir: "/usr/local/bin/cis/.cis_state_guard/{{ checkpoint_id }}"
state_guard_flag: "{{ state_guard_dir }}/checkpoint.flag"
req_01: "Check if a separate partition exists for /var using command: `mount | grep ' /var '`. Expected result: output shows a line with /var partition details."
req_02: "Apply nosuid mount option to /var partition by editing /etc/fstab and adding nosuid to the fourth field for the /var entry. Expected result: /etc/fstab contains a line like '<device> /var <fstype> defaults,rw,nosuid,nodev,noexec,relatime 0 0'."
req_03: "Remount /var with the configured options using command: `mount -o remount /var`. Expected result: no error output and /var is remounted with nosuid."
req_04: "Verify the nosuid option is set on /var partition using command: `mount | grep ' /var ' | grep nosuid`. Expected result: output shows the /var mount line containing 'nosuid'."
