---
- name: Initialize meta data variables
  include_vars: cis_remediation_var_6_3_4_10.yml

- name: "Snapshot - Create backup directory"
  ansible.builtin.file:
    path: "{{ backup_dir }}"
    state: directory
    mode: '0700'
  tags: [snapshot]
- name: "Snapshot - Check if audit tools exist and capture permissions"
  ansible.builtin.stat:
    path: "{{ item }}"
  loop: "{{ audit_tools }}"
  register: _snapshot_stat
  tags: [snapshot]
- name: "Snapshot - Backup audit tool permissions"
  ansible.builtin.copy:
    content: "{{ _snapshot_stat.results | to_json }}"
    dest: "{{ backup_dir }}/audit_tools_perms.json"
    mode: '0600'
  tags: [snapshot]

- name: "Initialize report variables"
  ansible.builtin.set_fact:
    task_01_name: "Not executed"
    task_01_cmd: "N/A"
    task_01_rc: -1
    data_01: "Not collected yet"
    status_01: "UNKNOWN"
    details_01: "Not evaluated"
    task_02_name: "Not executed"
    task_02_cmd: "N/A"
    task_02_rc: -1
    data_02: "Not collected yet"
    status_02: "UNKNOWN"
    details_02: "Not evaluated"
    task_03_name: "Not executed"
    task_03_cmd: "N/A"
    task_03_rc: -1
    data_03: "Not collected yet"
    status_03: "UNKNOWN"
    details_03: "Not evaluated"
    task_04_name: "Not executed"
    task_04_cmd: "N/A"
    task_04_rc: -1
    data_04: "Not collected yet"
    status_04: "UNKNOWN"
    details_04: "Not evaluated"
  tags: [execute]
- block:
  - name: "Req 01 - Check if audit tools exist and chgrp is available"
    ansible.builtin.shell: "which chgrp && ls {{ audit_tools | join(' ') }}"
    args:
      executable: /bin/bash
    register: result_01
    failed_when: false
    changed_when: false
    tags: [execute]

  - name: "Store requirement 01 details"
    ansible.builtin.set_fact:
      task_01_name: "Check if audit tools exist and chgrp is available"
      task_01_cmd: "which chgrp && ls {{ audit_tools | join(' ') }}"
      task_01_rc: "{{ result_01.rc | default(-1) }}"
      data_01: "{{ result_01.stdout | default('') | trim }}"
      status_01: "{{ 'PASS' if (result_01.rc | default(-1)) == 0 else 'FAIL' }}"
      details_01: "{{ 'All audit tools found and chgrp available' if (result_01.rc | default(-1)) == 0 else 'Prerequisite check failed - some tools missing or chgrp not available' }}"
    tags: [execute]

  - name: "Req 02 - Change group ownership of audit tools to root"
    ansible.builtin.file:
      path: "{{ item }}"
      group: root
    loop: "{{ audit_tools }}"
    register: result_02
    failed_when: false
    when: "result_01.rc | default(-1) == 0"
    tags: [execute]

  - name: "Store requirement 02 details"
    ansible.builtin.set_fact:
      task_02_name: "Change group ownership of audit tools to root"
      task_02_cmd: "chgrp root {{ audit_tools | join(' ') }}"
      task_02_rc: "{{ 0 if not (result_02 is failed) else 1 }}"
      data_02: "{{ audit_tools | join(', ') }}"
      status_02: "{{ 'APPLIED' if not (result_02 is failed) and (result_01.rc | default(-1)) == 0 else ('SKIPPED' if (result_01.rc | default(-1)) != 0 else 'FAIL') }}"
      details_02: "{{ 'Group ownership changed to root for all audit tools' if not (result_02 is failed) and (result_01.rc | default(-1)) == 0 else ('Skipped - prerequisite check failed' if (result_01.rc | default(-1)) != 0 else 'Failed to change group ownership') }}"
    tags: [execute]

  - name: "Req 03 - Verify group ownership of audit tools is root"
    ansible.builtin.shell: "stat -c '%g %n' {{ audit_tools | join(' ') }} | awk '$1 != 0 {exit 1}'"
    args:
      executable: /bin/bash
    register: result_03
    failed_when: false
    changed_when: false
    when: "result_01.rc | default(-1) == 0"
    tags: [execute]

  - name: "Store requirement 03 details"
    ansible.builtin.set_fact:
      task_03_name: "Verify group ownership of audit tools is root"
      task_03_cmd: "stat -c '%g %n' {{ audit_tools | join(' ') }} | awk '$1 != 0 {exit 1}'"
      task_03_rc: "{{ result_03.rc | default(-1) }}"
      data_03: "{{ result_03.stdout | default('') | trim }}"
      status_03: "{{ 'PASS' if (result_03.rc | default(-1)) == 0 else ('SKIPPED' if (result_01.rc | default(-1)) != 0 else 'FAIL') }}"
      details_03: "{{ 'All audit tools have group ID 0 (root)' if (result_03.rc | default(-1)) == 0 else ('Skipped - prerequisite check failed' if (result_01.rc | default(-1)) != 0 else 'Verification failed - some tools do not have root group ownership') }}"
    tags: [execute]

  - name: "Req 04 - Store final remediation result (cis_result)"
    ansible.builtin.set_fact:
      cis_result: "{{ status_03 | default('UNKNOWN') | trim }}"
      task_04_name: "Store final remediation result"
      task_04_cmd: "set_fact: cis_result = status_03"
      task_04_rc: 0
      data_04: "{{ status_03 | default('UNKNOWN') | trim }}"
      status_04: "{{ status_03 | default('UNKNOWN') | trim }}"
      details_04: "Overall remediation status derived from requirement 03 verification."
    tags: [execute]

  - name: "Generate remediation report"
    ansible.builtin.debug:
      msg:
      - "========================================================"
      - "        REMEDIATION REPORT — CIS 6.3.4.10"
      - "========================================================"
      - "Reference: CIS Benchmark checkpoint 6.3.4.10"
      - ""
      - "REQUIREMENT 01 - {{ req_01 }}:"
      - "  Task: {{ task_01_name | default('Task not recorded') }}"
      - "  Command: {{ task_01_cmd | default('N/A') }}"
      - "  Exit code: {{ task_01_rc | default(-1) }}"
      - "  Data: {{ data_01 | default('Data collection failed') | trim }}"
      - "  Status: {{ status_01 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_01 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 02 - {{ req_02 }}:"
      - "  Task: {{ task_02_name | default('Task not recorded') }}"
      - "  Command: {{ task_02_cmd | default('N/A') }}"
      - "  Exit code: {{ task_02_rc | default(-1) }}"
      - "  Data: {{ data_02 | default('Data collection failed') | trim }}"
      - "  Status: {{ status_02 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_02 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 03 - {{ req_03 }}:"
      - "  Task: {{ task_03_name | default('Task not recorded') }}"
      - "  Command: {{ task_03_cmd | default('N/A') }}"
      - "  Exit code: {{ task_03_rc | default(-1) }}"
      - "  Data: {{ data_03 | default('Data collection failed') | trim }}"
      - "  Status: {{ status_03 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_03 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 04 - {{ req_04 }}:"
      - "  Task: {{ task_04_name | default('Task not recorded') }}"
      - "  Command: {{ task_04_cmd | default('N/A') }}"
      - "  Exit code: {{ task_04_rc | default(-1) }}"
      - "  Data: {{ data_04 | default('Data collection failed') | trim }}"
      - "  Status: {{ status_04 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_04 | default('Not evaluated') | trim }}"
      - ""
      - "========================================================"
      - "OVERALL REMEDIATION:"
      - "  Result: {{ cis_result | default('UNKNOWN') | trim }}"
      - "========================================================"
    tags: [execute]

  always:
  - name: "Restore - Check if backup exists"
    ansible.builtin.stat:
      path: "{{ backup_dir }}/audit_tools_perms.json"
    register: _restore_backup_stat
    failed_when: false
    tags: [restore]

  - name: "Restore - Restore audit tool permissions from backup"
    ansible.builtin.shell: |
      python3 -c "
      import json, os, pwd, grp
      with open('{{ backup_dir }}/audit_tools_perms.json') as f:
          data = json.load(f)
      for item in data:
          stat_info = item['stat']
          path = item['item']
          if stat_info['exists']:
              uid = stat_info['uid']
              gid = stat_info['gid']
              mode = stat_info['mode']
              os.chown(path, uid, gid)
              os.chmod(path, mode)
      "
    args:
      executable: /bin/bash
    when: "_restore_backup_stat.stat.exists | default(false)"
    failed_when: false
    tags: [restore]

  - name: "Restore - Remove backup directory"
    ansible.builtin.file:
      path: "{{ backup_dir }}"
      state: absent
    failed_when: false
    tags: [restore]
