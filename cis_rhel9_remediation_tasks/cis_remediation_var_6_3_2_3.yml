playbook_name: "cis_6_3_2_3"
backup_dir: "/var/log/ai-playbooks-backup/{{ playbook_name }}"
config_file: "/etc/audit/auditd.conf"
disk_full_action_value: "halt"
disk_error_action_value: "halt"
req_01: "Apply prerequisite check for auditd package using command: `dpkg -l auditd || rpm -q audit`. Expected result: package is installed."
req_02: "Apply disk_full_action parameter set to halt or single in /etc/audit/auditd.conf using command: `sed -i 's/^disk_full_action.*/disk_full_action = halt/' /etc/audit/auditd.conf`. Expected result: parameter is set to halt (or single as per policy)."
req_03: "Apply disk_error_action parameter set to syslog, single, or halt in /etc/audit/auditd.conf using command: `sed -i 's/^disk_error_action.*/disk_error_action = halt/' /etc/audit/auditd.conf`. Expected result: parameter is set to halt (or syslog/single as per policy)."
req_04: "Verify the configuration by checking /etc/audit/auditd.conf using command: `grep -E '^disk_full_action|^disk_error_action' /etc/audit/auditd.conf`. Expected result: both parameters are set to the required values."
