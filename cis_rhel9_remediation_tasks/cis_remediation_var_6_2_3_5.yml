playbook_name: "cis_remediation_6_2_3_5"
backup_dir: "/var/log/ai-playbooks-backup/{{ playbook_name }}"
config_file: "/etc/rsyslog.conf"
req_01: "Apply prerequisite check for rsyslog using command: `which rsyslogd`. Expected result: path to rsyslogd binary."
req_02: "Apply configuration for *.emerg using command: `echo '*.emerg :omusrmsg:*' >> /etc/rsyslog.conf`. Expected result: line added to /etc/rsyslog.conf."
req_03: "Apply configuration for auth,authpriv.* using command: `echo 'auth,authpriv.* /var/log/secure' >> /etc/rsyslog.conf`. Expected result: line added to /etc/rsyslog.conf."
req_04: "Apply configuration for mail.* using command: `echo 'mail.* -/var/log/mail' >> /etc/rsyslog.conf`. Expected result: line added to /etc/rsyslog.conf."
req_05: "Apply configuration for mail.info using command: `echo 'mail.info -/var/log/mail.info' >> /etc/rsyslog.conf`. Expected result: line added to /etc/rsyslog.conf."
req_06: "Apply configuration for mail.warning using command: `echo 'mail.warning -/var/log/mail.warn' >> /etc/rsyslog.conf`. Expected result: line added to /etc/rsyslog.conf."
req_07: "Apply configuration for mail.err using command: `echo 'mail.err /var/log/mail.err' >> /etc/rsyslog.conf`. Expected result: line added to /etc/rsyslog.conf."
req_08: "Apply configuration for cron.* using command: `echo 'cron.* /var/log/cron' >> /etc/rsyslog.conf`. Expected result: line added to /etc/rsyslog.conf."
req_09: "Apply configuration for *.=warning;*.=err using command: `echo '*.=warning;*.=err -/var/log/warn' >> /etc/rsyslog.conf`. Expected result: line added to /etc/rsyslog.conf."
req_10: "Apply configuration for *.crit using command: `echo '*.crit /var/log/warn' >> /etc/rsyslog.conf`. Expected result: line added to /etc/rsyslog.conf."
req_11: "Apply configuration for *.*;mail.none;news.none using command: `echo '*.*;mail.none;news.none -/var/log/messages' >> /etc/rsyslog.conf`. Expected result: line added to /etc/rsyslog.conf."
req_12: "Apply configuration for local0,local1.* using command: `echo 'local0,local1.* -/var/log/localmessages' >> /etc/rsyslog.conf`. Expected result: line added to /etc/rsyslog.conf."
req_13: "Apply configuration for local2,local3.* using command: `echo 'local2,local3.* -/var/log/localmessages' >> /etc/rsyslog.conf`. Expected result: line added to /etc/rsyslog.conf."
req_14: "Apply configuration for local4,local5.* using command: `echo 'local4,local5.* -/var/log/localmessages' >> /etc/rsyslog.conf`. Expected result: line added to /etc/rsyslog.conf."
req_15: "Apply configuration for local6,local7.* using command: `echo 'local6,local7.* -/var/log/localmessages' >> /etc/rsyslog.conf`. Expected result: line added to /etc/rsyslog.conf."
req_16: "Apply reload of rsyslog configuration using command: `systemctl restart rsyslog`. Expected result: rsyslog service restarted successfully."
req_17: "Verify rsyslog logging configuration using command: `rsyslogd -N1`. Expected result: configuration is valid with no errors."
