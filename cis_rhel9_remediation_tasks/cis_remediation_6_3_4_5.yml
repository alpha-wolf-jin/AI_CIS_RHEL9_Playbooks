---
- name: Initialize meta data variables
  include_vars: cis_remediation_var_6_3_4_5.yml

- name: "Snapshot - Create backup directory"
  ansible.builtin.file:
    path: "{{ backup_dir }}"
    state: directory
    mode: '0700'
  tags: [snapshot]
- name: "Snapshot - Check if /etc/audit directory exists"
  ansible.builtin.stat:
    path: "/etc/audit"
  register: _audit_dir_stat
  tags: [snapshot]
- name: "Snapshot - Backup audit configuration files if directory exists"
  ansible.builtin.shell: |
    find /etc/audit/ -type f \( -name '*.conf' -o -name '*.rules' \) -exec cp --parents {} {{ backup_dir }}/ \;
  args:
    executable: /bin/bash
  when: _audit_dir_stat.stat.exists and _audit_dir_stat.stat.isdir
  failed_when: false
  tags: [snapshot]

- block:
        # -------------------------------------------------------------------
        # Pre-check: audit package installed?
# -------------------------------------------------------------------
  - name: "Pre-check - Verify audit package is installed"
    ansible.builtin.shell: "rpm -q audit"
    args:
      executable: /bin/bash
    register: pre_audit_check
    failed_when: false
    changed_when: false
    tags: [execute]

  - name: "Set audit installed fact"
    set_fact:
      audit_installed: "{{ pre_audit_check.rc == 0 }}"
    tags: [execute]

  - name: "Pre-check - Set SKIP statuses when audit not installed"
    set_fact:
      status_01: "SKIP"
      status_02: "SKIP"
      status_03: "SKIP"
      status_04: "SKIP"
      cis_result: "SKIP"
      details_01: "Audit package not installed"
      details_02: "Audit package not installed"
      details_03: "Audit package not installed"
      details_04: "Audit package not installed"
      data_01: "N/A"
      data_02: "N/A"
      data_03: "N/A"
      data_04: "N/A"
      task_01_cmd: "N/A"
      task_02_cmd: "N/A"
      task_03_cmd: "N/A"
      task_04_cmd: "N/A"
      task_01_rc: -1
      task_02_rc: -1
      task_03_rc: -1
      task_04_rc: -1
      task_01_name: "Check find and chmod"
      task_02_name: "Apply restrictive permissions"
      task_03_name: "Verify permissions"
      task_04_name: "Store final remediation result"
    when: not audit_installed
    tags: [execute]

        # -------------------------------------------------------------------
        # Requirement 1 - Check find and chmod availability
# -------------------------------------------------------------------
  - name: "Req 01 - Check if find and chmod commands are available"
    ansible.builtin.shell: "which find && which chmod"
    args:
      executable: /bin/bash
    register: result_01
    failed_when: false
    changed_when: false
    when: audit_installed | default(false)
    tags: [execute]

  - name: "Store requirement 01 details"
    set_fact:
      task_01_name: "Check if find and chmod commands are available"
      task_01_cmd: "which find && which chmod"
      task_01_rc: "{{ result_01.rc | default(-1) }}"
      data_01: "{{ result_01.stdout | default('') | trim }}"
      status_01: >-
        {%- if not (audit_installed | default(false)) -%}
          SKIP
        {%- elif (result_01.rc | default(-1)) == 0 -%}
          PASS
        {%- else -%}
          FAIL
        {%- endif -%}
      details_01: >-
        {%- if not (audit_installed | default(false)) -%}
          Audit package not installed
        {%- elif (result_01.rc | default(-1)) == 0 -%}
          Both executables found
        {%- else -%}
          One or both executables missing
        {%- endif -%}
    when: audit_installed | default(false)
    tags: [execute]

        # -------------------------------------------------------------------
        # Requirement 2 - Apply restrictive permissions
# -------------------------------------------------------------------
  - name: "Req 02 - Apply restrictive permissions to audit configuration files"
    ansible.builtin.shell: "find /etc/audit/ -type f \\( -name '*.conf' -o -name '*.rules' \\) -exec chmod u-x,g-wx,o-rwx {} +"
    args:
      executable: /bin/bash
    register: result_02
    failed_when: false
    when: audit_installed | default(false)
    tags: [execute]

  - name: "Store requirement 02 details"
    set_fact:
      task_02_name: "Apply restrictive permissions to audit configuration files"
      task_02_cmd: |
        find /etc/audit/ -type f \\( -name '*.conf' -o -name '*.rules' \\) -exec chmod u-x,g-wx,o-rwx {} +
      task_02_rc: "{{ result_02.rc | default(-1) }}"
      data_02: "{{ result_02.stdout | default('') | trim }}"
      status_02: >-
        {%- if not (audit_installed | default(false)) -%}
          SKIP
        {%- elif result_01.rc | default(-1) != 0 -%}
          SKIP
        {%- elif (result_02.rc | default(-1)) == 0 -%}
          PASS
        {%- else -%}
          FAIL
        {%- endif -%}
      details_02: >-
        {%- if not (audit_installed | default(false)) -%}
          Audit package not installed
        {%- elif result_01.rc | default(-1) != 0 -%}
          Prerequisite check failed
        {%- elif (result_02.rc | default(-1)) == 0 -%}
          Permissions applied successfully
        {%- else -%}
          Failed to apply permissions
        {%- endif -%}
    when: audit_installed | default(false)
    tags: [execute]

        # -------------------------------------------------------------------
        # Requirement 3 - Verify permissions
# -------------------------------------------------------------------
  - name: "Req 03 - Verify audit configuration files permissions"
    ansible.builtin.shell: "find /etc/audit/ -type f \\( -name '*.conf' -o -name '*.rules' \\) -exec stat -c '%a %n' {} +"
    args:
      executable: /bin/bash
    register: result_03
    failed_when: false
    changed_when: false
    when: audit_installed | default(false)
    tags: [execute]

  - name: "Store requirement 03 details"
    set_fact:
      task_03_name: "Verify audit configuration files permissions"
      task_03_cmd: |
        find /etc/audit/ -type f \\( -name '*.conf' -o -name '*.rules' \\) -exec stat -c '%a %n' {} +
      task_03_rc: "{{ result_03.rc | default(-1) }}"
      data_03: "{{ result_03.stdout | default('') | trim }}"
      status_03: >-
        {%- if not (audit_installed | default(false)) -%}
          SKIP
        {%- elif result_01.rc | default(-1) != 0 -%}
          SKIP
        {%- elif (result_03.rc | default(-1)) == 0 -%}
          PASS
        {%- else -%}
          FAIL
        {%- endif -%}
      details_03: >-
        {%- if not (audit_installed | default(false)) -%}
          Audit package not installed
        {%- elif result_01.rc | default(-1) != 0 -%}
          Prerequisite check failed
        {%- elif (result_03.rc | default(-1)) == 0 -%}
          Permissions verified
        {%- else -%}
          Verification failed
        {%- endif -%}
    when: audit_installed | default(false)
    tags: [execute]

        # -------------------------------------------------------------------
        # Requirement 4 - Store final remediation result
# -------------------------------------------------------------------
  - name: "Req 04 - Store final remediation result"
    set_fact:
      cis_result: "{{ status_03 | default('ERROR') | trim }}"
    when: audit_installed | default(false)
    tags: [execute]

  - name: "Store requirement 04 details"
    set_fact:
      task_04_name: "Store final remediation result"
      task_04_cmd: "set_fact: cis_result = {{ status_03 | default('ERROR') | trim }}"
      task_04_rc: 0
      data_04: "cis_result = {{ cis_result | default('UNKNOWN') | trim }}"
      status_04: "PASS"
      details_04: "Overall status captured as {{ cis_result | default('UNKNOWN') | trim }}"
    when: audit_installed | default(false)
    tags: [execute]

        # -------------------------------------------------------------------
        # Generate remediation report
# -------------------------------------------------------------------
  - name: "Generate remediation report"
    debug:
      msg:
      - "========================================================"
      - "        REMEDIATION REPORT — CIS 6.3.4.5"
      - "        Reference: CIS Benchmark checkpoint 6.3.4.5"
      - "========================================================"
      - ""
      - "REQUIREMENT 01 - {{ req_01 }}:"
      - "  Task: {{ task_01_name | default('Not recorded') }}"
      - "  Command: {{ task_01_cmd | default('N/A') }}"
      - "  Exit code: {{ task_01_rc | default(-1) }}"
      - "  Data: {{ data_01 | default('Data collection failed') | trim }}"
      - "  Status: {{ status_01 | default('ERROR') | trim }}"
      - "  Details: {{ details_01 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 02 - {{ req_02 }}:"
      - "  Task: {{ task_02_name | default('Not recorded') }}"
      - "  Command: {{ task_02_cmd | default('N/A') }}"
      - "  Exit code: {{ task_02_rc | default(-1) }}"
      - "  Data: {{ data_02 | default('Data collection failed') | trim }}"
      - "  Status: {{ status_02 | default('ERROR') | trim }}"
      - "  Details: {{ details_02 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 03 - {{ req_03 }}:"
      - "  Task: {{ task_03_name | default('Not recorded') }}"
      - "  Command: {{ task_03_cmd | default('N/A') }}"
      - "  Exit code: {{ task_03_rc | default(-1) }}"
      - "  Data: {{ data_03 | default('Data collection failed') | trim }}"
      - "  Status: {{ status_03 | default('ERROR') | trim }}"
      - "  Details: {{ details_03 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 04 - {{ req_04 }}:"
      - "  Task: {{ task_04_name | default('Not recorded') }}"
      - "  Command: {{ task_04_cmd | default('N/A') }}"
      - "  Exit code: {{ task_04_rc | default(-1) }}"
      - "  Data: {{ data_04 | default('Data collection failed') | trim }}"
      - "  Status: {{ status_04 | default('ERROR') | trim }}"
      - "  Details: {{ details_04 | default('Not evaluated') | trim }}"
      - ""
      - "========================================================"
      - "OVERALL REMEDIATION:"
      - "  Result: {{ cis_result | default('ERROR') | trim }}"
      - "  Details: {{ details_04 | default('Not evaluated') | trim }}"
      - "========================================================"
    tags: [execute]

  always:
  - name: "Restore - Check if backup directory exists"
    ansible.builtin.stat:
      path: "{{ backup_dir }}"
    register: _restore_backup_stat
    failed_when: false
    tags: [restore]

  - name: "Restore - Restore audit configuration files from backup"
    ansible.builtin.shell: |
      if [ -d "{{ backup_dir }}/etc/audit" ]; then
        cp -r "{{ backup_dir }}/etc/audit/"* /etc/audit/
      fi
    args:
      executable: /bin/bash
    when: _restore_backup_stat.stat.exists | default(false)
    failed_when: false
    tags: [restore]

  - name: "Restore - Remove backup directory"
    ansible.builtin.file:
      path: "{{ backup_dir }}"
      state: absent
    when: _restore_backup_stat.stat.exists | default(false)
    failed_when: false
    tags: [restore]
