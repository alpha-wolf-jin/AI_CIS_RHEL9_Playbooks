playbook_name: "cis_5_1_21_permituserenvironment"
checkpoint_id: "cis_5_1_21"
state_guard_dir: "/usr/local/bin/cis/.cis_state_guard/{{ checkpoint_id }}"
state_guard_flag: "{{ state_guard_dir }}/checkpoint.flag"
config_file: "/etc/ssh/sshd_config"
config_param: "PermitUserEnvironment"
config_value: "no"
service_name: "sshd"
package_name: "openssh-server"
req_01: "Apply prerequisite check using command: `which sshd && sshd -t 2>/dev/null`. Expected result: sshd binary exists and configuration syntax is valid."
req_02: "Apply disable PermitUserEnvironment by setting it to 'no' in /etc/ssh/sshd_config using command: `sudo sed -i 's/^#*PermitUserEnvironment.*/PermitUserEnvironment no/' /etc/ssh/sshd_config`. Expected result: The line 'PermitUserEnvironment no' is present in the file."
req_03: "Apply ensure the setting appears before any Include directives using command: `sudo awk '/^Include/{exit} {print}' /etc/ssh/sshd_config | grep -q '^PermitUserEnvironment no' || sudo sed -i '/^Include/i PermitUserEnvironment no' /etc/ssh/sshd_config`. Expected result: The directive is placed before any Include lines."
req_04: "Apply restart SSH service to apply changes using command: `sudo systemctl restart sshd || sudo service sshd restart`. Expected result: SSH daemon restarts successfully."
req_05: "Verify PermitUserEnvironment is disabled using command: `sudo sshd -T | grep -i permituserenvironment`. Expected result: Output contains 'permituserenvironment no'."
req_06: "Store the final remediation result in a variable named 'cis_result' using set_fact. Set cis_result to the overall remediation status (PASS/FAIL/SKIP/ERROR) derived from the last requirement's status variable."
