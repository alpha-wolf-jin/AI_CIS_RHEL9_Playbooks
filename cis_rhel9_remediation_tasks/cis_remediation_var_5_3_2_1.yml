playbook_name: "cis_5_3_2_1_authselect_pam"
backup_dir: "/var/log/ai-playbooks-backup/{{ playbook_name }}"
custom_profile_name: "custom-profile"
req_01: "Ensure the pam and authselect packages are version pam-1.3.1-25 and authselect-1.2.6-1 or newer using command: `rpm -q pam authselect`. Expected result: pam-1.3.1-25 or newer and authselect-1.2.6-1 or newer."
req_02: "Create a custom authselect profile by copying a default profile using command: `authselect create-profile <custom-profile-name> -b sssd`. Expected result: Custom profile created successfully."
req_03: "Select the custom authselect profile with backup and force options using command: `authselect select custom/<CUSTOM_PROFILE_NAME> --backup=PAM_CONFIG_BACKUP --force`. Expected result: Profile selected and configuration applied."
req_04: "If the custom profile templates are later updated, apply changes using command: `authselect apply-changes`. Expected result: Changes applied to /etc/pam.d/ files."
req_05: "Verify the active authselect profile includes the required PAM modules using command: `authselect current`. Expected result: Shows the active custom profile and its options."
req_06: "Store the final remediation result in a variable named 'cis_result' using set_fact. Set cis_result to the overall remediation status (PASS/FAIL/SKIP/ERROR) derived from the last requirement's status variable."
