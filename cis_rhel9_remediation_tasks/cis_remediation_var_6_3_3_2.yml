playbook_name: "cis_6_3_3_2_user_emulation_logging"
backup_dir: "/var/log/ai-playbooks-backup/{{ playbook_name }}"
req_01: "Apply remediation for: Ensure actions as another user are always logged. Expected result: System is compliant"
req_02: "VERIFY: Confirm Ensure actions as another user are always logged is properly configured. Expected result: Compliant"
req_03: "Store the final remediation result in a variable named 'cis_result' using set_fact. Set cis_result to the overall remediation status (PASS/FAIL/SKIP/ERROR) derived from the last requirement's status variable."
req_04: "Create a task named 'Generate remediation report' using debug msg with EXACTLY this format: REMEDIATION REPORT — CIS 6.3.3.2 ..."
audit_rules_file: "/etc/audit/rules.d/50-user_emulation.rules"
audit_rule_b64: "-a always,exit -F arch=b64 -C euid!=uid -F auid!=unset -S execve -k user_emulation"
audit_rule_b32: "-a always,exit -F arch=b32 -C euid!=uid -F auid!=unset -S execve -k user_emulation"
