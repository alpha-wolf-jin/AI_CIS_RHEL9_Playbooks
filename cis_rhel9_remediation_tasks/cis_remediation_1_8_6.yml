---
- name: Initialize meta data variables
  include_vars: cis_remediation_var_1_8_6.yml

- name: "Snapshot - Create backup directory"
  ansible.builtin.file:
    path: "{{ backup_dir }}"
    state: directory
    mode: '0700'
  tags: [snapshot]
- name: "Snapshot - Check if dconf profile directory exists"
  ansible.builtin.stat:
    path: "/etc/dconf/profile"
  register: _sg_profile_dir
  tags: [snapshot]
- name: "Snapshot - Backup dconf profile directory"
  ansible.builtin.copy:
    src: "/etc/dconf/profile"
    dest: "{{ backup_dir }}/dconf_profile"
    remote_src: true
  when: _sg_profile_dir.stat.exists and _sg_profile_dir.stat.isdir
  tags: [snapshot]
- name: "Snapshot - Check if dconf db directory exists"
  ansible.builtin.stat:
    path: "/etc/dconf/db"
  register: _sg_db_dir
  tags: [snapshot]
- name: "Snapshot - Backup dconf db directory"
  ansible.builtin.copy:
    src: "/etc/dconf/db"
    dest: "{{ backup_dir }}/dconf_db"
    remote_src: true
  when: _sg_db_dir.stat.exists and _sg_db_dir.stat.isdir
  tags: [snapshot]
- name: "Snapshot - Mark remediation script as absent"
  ansible.builtin.copy:
    content: "absent"
    dest: "{{ backup_dir }}/remediate_script.absent"
  tags: [snapshot]
- name: "Snapshot - Mark audit script as absent"
  ansible.builtin.copy:
    content: "absent"
    dest: "{{ backup_dir }}/audit_script.absent"
  tags: [snapshot]

- block:
  - name: "Initialize data variables"
    ansible.builtin.set_fact:
      data_02: "Not collected yet"
      status_02: "ERROR"
      details_02: "Not evaluated"
      data_03: "Not collected yet"
      status_03: "ERROR"
      details_03: "Not evaluated"
      task_02_name: "Not executed"
      task_02_cmd: "N/A"
      task_02_rc: -1
      task_03_name: "Not executed"
      task_03_cmd: "N/A"
      task_03_rc: -1
    tags: [execute]

  - name: "Req 1 - Check if GDM is installed"
    ansible.builtin.package_facts:
      manager: auto
    tags: [execute]

  - name: "Req 1 - Set GDM installed fact"
    ansible.builtin.set_fact:
      gdm_installed: "{{ ('gdm' in ansible_facts.packages) or ('gdm3' in ansible_facts.packages) }}"
    tags: [execute]

  - name: "Req 1 - Copy remediation script to remote"
    ansible.builtin.copy:
      dest: "{{ remediate_script }}"
      mode: '0700'
      content: "{{ remediate_script_content }}"
    when: gdm_installed | bool
    tags: [execute]

  - name: "Req 1 - Execute remediation script"
    ansible.builtin.shell: /bin/bash "{{ remediate_script }}"
    args:
      executable: /bin/bash
    register: result_01
    when: gdm_installed | bool
    failed_when: false
    tags: [execute]

  - name: "Req 1 - Remove temporary remediation script"
    ansible.builtin.file:
      path: "{{ remediate_script }}"
      state: absent
    when: gdm_installed | bool
    changed_when: false
    tags: [execute]

  - name: "Req 2 - Copy audit script to remote"
    ansible.builtin.copy:
      dest: "{{ audit_script }}"
      mode: '0700'
      content: "{{ audit_script_content }}"
    changed_when: false
    tags: [execute]

  - name: "Req 2 - Execute audit script"
    ansible.builtin.shell: /bin/bash "{{ audit_script }}"
    args:
      executable: /bin/bash
    register: result_02
    failed_when: false
    changed_when: false
    tags: [execute]

  - name: "Req 2 - Remove temporary audit script"
    ansible.builtin.file:
      path: "{{ audit_script }}"
      state: absent
    changed_when: false
    tags: [execute]

  - name: "Req 2 - Store verification details"
    ansible.builtin.set_fact:
      task_02_name: "Verify GDM automount settings via audit script"
      task_02_cmd: "/bin/bash {{ audit_script }}"
      task_02_rc: "{{ result_02.rc | default(-1) }}"
      data_02: "{{ result_02.stdout | default('') | trim }}"
      status_02: "{{ ('SKIP' if ('** SKIP **' in (result_02.stdout | default('')) or 'not applicable' in (result_02.stdout | default(''))) else ('PASS' if ('** PASS **' in (result_02.stdout | default(''))) else 'FAIL')) | trim }}"
      details_02: "{{ ('SKIP: GDM not installed, recommendation not applicable' if ('** SKIP **' in (result_02.stdout | default('')) or 'not applicable' in (result_02.stdout | default(''))) else ('PASS: System is compliant with CIS 1.8.6' if ('** PASS **' in (result_02.stdout | default(''))) else 'FAIL: System is not compliant with CIS 1.8.6')) | trim }}"
    tags: [execute]

  - name: "Req 3 - Store final remediation result"
    ansible.builtin.set_fact:
      cis_result: "{{ status_02 | default('ERROR') | trim }}"
      task_03_name: "Store final remediation result in cis_result"
      task_03_cmd: "set_fact cis_result = '{{ status_02 | default('ERROR') | trim }}'"
      task_03_rc: 0
      data_03: "cis_result={{ status_02 | default('ERROR') | trim }}"
      status_03: "PASS"
      details_03: "cis_result variable set to {{ status_02 | default('ERROR') | trim }}"
    tags: [execute]

  - name: "Req 4 - Generate remediation report"
    ansible.builtin.debug:
      msg:
      - "REMEDIATION REPORT — CIS 1.8.6"
      - "Reference: CIS Benchmark checkpoint 1.8.6"
      - ""
      - "REQUIREMENT 01 - Run the provided remediation script to fix Ensure GDM automatic mounting of removable media is disabled:"
      - "  Task: Execute remediation script"
      - "  Command: /bin/bash {{ remediate_script }}"
      - "  Exit code: {{ result_01.rc | default(-1) if gdm_installed | default(false) | bool else 0 }}"
      - "  Data: {{ result_01.stdout | default('SKIP: GDM not installed') | trim if gdm_installed | default(false) | bool else 'SKIP: GDM not installed' }}"
      - "  Status: {{ 'PASS' if (gdm_installed | default(false) | bool and result_01.rc | default(-1) == 0) else ('SKIP' if not (gdm_installed | default(false) | bool) else 'FAIL') }}"
      - "  Details: {{ 'Remediation script executed successfully' if (gdm_installed | default(false) | bool and result_01.rc | default(-1) == 0) else ('SKIP: GDM not installed' if not (gdm_installed | default(false) | bool) else 'Remediation script execution failed') }}"
      - ""
      - "REQUIREMENT 02 - {{ req_02 }}:"
      - "  Task: {{ task_02_name | default('Not recorded') }}"
      - "  Command: {{ task_02_cmd | default('N/A') }}"
      - "  Exit code: {{ task_02_rc | default(-1) }}"
      - "  Data: {{ data_02 | default('') | trim }}"
      - "  Status: {{ status_02 | default('ERROR') | trim }}"
      - "  Details: {{ details_02 | default('') | trim }}"
      - ""
      - "REQUIREMENT 03 - {{ req_03 }}:"
      - "  Task: {{ task_03_name | default('Not recorded') }}"
      - "  Command: {{ task_03_cmd | default('N/A') }}"
      - "  Exit code: {{ task_03_rc | default(-1) }}"
      - "  Data: {{ data_03 | default('') | trim }}"
      - "  Status: {{ status_03 | default('ERROR') | trim }}"
      - "  Details: {{ details_03 | default('') | trim }}"
      - ""
      - "========================================================"
      - "OVERALL REMEDIATION:"
      - "  Result: {{ cis_result | default('ERROR') | trim }}"
      - "  Details: {{ details_02 | default('Not evaluated') | trim }}"
      - "========================================================"
    tags: [execute]

  always:
  - name: "Restore - Check if dconf profile backup exists"
    ansible.builtin.stat:
      path: "{{ backup_dir }}/dconf_profile"
    register: _restore_profile
    failed_when: false
    tags: [restore]

  - name: "Restore - Restore dconf profile directory"
    ansible.builtin.copy:
      src: "{{ backup_dir }}/dconf_profile"
      dest: "/etc/dconf/profile"
      remote_src: true
    when: _restore_profile.stat.exists | default(false)
    failed_when: false
    tags: [restore]

  - name: "Restore - Check if dconf db backup exists"
    ansible.builtin.stat:
      path: "{{ backup_dir }}/dconf_db"
    register: _restore_db
    failed_when: false
    tags: [restore]

  - name: "Restore - Restore dconf db directory"
    ansible.builtin.copy:
      src: "{{ backup_dir }}/dconf_db"
      dest: "/etc/dconf/db"
      remote_src: true
    when: _restore_db.stat.exists | default(false)
    failed_when: false
    tags: [restore]

  - name: "Restore - Check if remediation script absent marker exists"
    ansible.builtin.stat:
      path: "{{ backup_dir }}/remediate_script.absent"
    register: _restore_remediate_absent
    failed_when: false
    tags: [restore]

  - name: "Restore - Remove remediation script if it was absent before"
    ansible.builtin.file:
      path: "{{ remediate_script }}"
      state: absent
    when: _restore_remediate_absent.stat.exists | default(false)
    failed_when: false
    tags: [restore]

  - name: "Restore - Check if audit script absent marker exists"
    ansible.builtin.stat:
      path: "{{ backup_dir }}/audit_script.absent"
    register: _restore_audit_absent
    failed_when: false
    tags: [restore]

  - name: "Restore - Remove audit script if it was absent before"
    ansible.builtin.file:
      path: "{{ audit_script }}"
      state: absent
    when: _restore_audit_absent.stat.exists | default(false)
    failed_when: false
    tags: [restore]

  - name: "Restore - Remove backup directory"
    ansible.builtin.file:
      path: "{{ backup_dir }}"
      state: absent
    failed_when: false
    tags: [restore]
