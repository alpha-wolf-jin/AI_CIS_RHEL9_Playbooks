playbook_name: "cis_5_1_16"
backup_dir: "/var/log/ai-playbooks-backup/{{ playbook_name }}"
config_file: "/etc/ssh/sshd_config"
config_param: "MaxAuthTries"
config_value: "4"
service_name: "sshd"
req_01: "Apply prerequisite check for sshd configuration using command: `which sshd && sshd -t 2>/dev/null`. Expected result: command returns path to sshd and no syntax errors."
req_02: "Apply MaxAuthTries setting to 4 in /etc/ssh/sshd_config using command: `grep -q '^MaxAuthTries' /etc/ssh/sshd_config && sed -i 's/^MaxAuthTries.*/MaxAuthTries 4/' /etc/ssh/sshd_config || echo 'MaxAuthTries 4' >> /etc/ssh/sshd_config`. Expected result: MaxAuthTries is set to 4 in the configuration file."
req_03: "Apply verification that MaxAuthTries is set to 4 using command: `sshd -T | grep -i maxauthtries`. Expected result: output shows 'maxauthtries 4'."
req_04: "Store the final remediation result in a variable named 'cis_result' using set_fact. Set cis_result to the overall remediation status (PASS/FAIL/SKIP/ERROR) derived from the last requirement's status variable."
