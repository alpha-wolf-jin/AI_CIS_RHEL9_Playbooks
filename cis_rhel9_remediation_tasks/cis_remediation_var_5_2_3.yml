playbook_name: "cis_5_2_3_sudo_logfile"
backup_dir: "/var/log/ai-playbooks-backup/{{ playbook_name }}"
req_01: "Apply prerequisite check for visudo using command: `which visudo`. Expected result: path to visudo binary."
req_02: |
  Apply sudo log file configuration by adding 'Defaults logfile=\"/var/log/sudo.log\"' to /etc/sudoers using command: `echo 'Defaults logfile=\"/var/log/sudo.log\"' | sudo visudo -f /etc/sudoers`. Expected result: no errors and line added.
req_03: |
  Verify sudo log file configuration using command: `sudo grep -E '^Defaults.*logfile' /etc/sudoers /etc/sudoers.d/* 2>/dev/null`. Expected result: output contains 'Defaults logfile=\"/var/log/sudo.log\"'.
req_04: "Store the final remediation result in a variable named 'cis_result' using set_fact. Set cis_result to the overall remediation status (PASS/FAIL/SKIP/ERROR) derived from the last requirement's status variable."
sudo_log_line: 'Defaults logfile="/var/log/sudo.log"'
sudoers_file: "/etc/sudoers"
