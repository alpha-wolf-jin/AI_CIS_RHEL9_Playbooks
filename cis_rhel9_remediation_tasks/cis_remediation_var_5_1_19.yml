playbook_name: "cis_5_1_19_permitemptypasswords"
backup_dir: "/var/log/ai-playbooks-backup/{{ playbook_name }}"
config_file: "/etc/ssh/sshd_config"
config_param: "PermitEmptyPasswords"
config_value: "no"
service_binary: "sshd"
package_name: "openssh-server"
req_01: "Apply prerequisite check using command: `which sshd && sshd -t 2>/dev/null`. Expected result: sshd binary exists and configuration syntax is valid."
req_02: "Apply change to disable PermitEmptyPasswords using command: `sudo sed -i 's/^#*PermitEmptyPasswords.*/PermitEmptyPasswords no/' /etc/ssh/sshd_config && if ! grep -q '^PermitEmptyPasswords no' /etc/ssh/sshd_config; then echo 'PermitEmptyPasswords no' | sudo tee -a /etc/ssh/sshd_config > /dev/null; fi`. Expected result: PermitEmptyPasswords is set to 'no' in /etc/ssh/sshd_config."
req_03: "Apply restart of SSH service using command: `sudo systemctl restart sshd || sudo service sshd restart`. Expected result: SSH service restarts successfully."
req_04: "Apply verification step using command: `sudo sshd -T | grep -i permitemptypasswords`. Expected result: 'permitemptypasswords no'."
req_05: "Store the final remediation result in a variable named 'cis_result' using set_fact. Set cis_result to the overall remediation status (PASS/FAIL/SKIP/ERROR) derived from the last requirement's status variable."
