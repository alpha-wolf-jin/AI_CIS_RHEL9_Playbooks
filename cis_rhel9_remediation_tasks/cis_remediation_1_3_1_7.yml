---
- name: Initialize meta data variables
  include_vars: cis_remediation_var_1_3_1_7.yml

- name: "Snapshot - Create backup directory"
  ansible.builtin.file:
    path: "{{ backup_dir }}"
    state: directory
    mode: '0700'
  tags: [snapshot]

- block:
# Requirement 1
  - name: "Req 1 - Check if dnf package manager is available"
    ansible.builtin.shell: which dnf
    args:
      executable: /bin/bash
    register: result_01
    failed_when: false
    changed_when: false
    tags: [execute]

  - name: "Set fact for dnf prerequisite check"
    set_fact:
      dnf_available: "{{ result_01.rc == 0 }}"
      task_01_name: "Check dnf availability"
      task_01_cmd: "which dnf"
      task_01_rc: "{{ result_01.rc }}"
      data_01: "{{ result_01.stdout | default('') | trim }}"
      status_01: "{{ 'APPLIED' if result_01.rc == 0 else 'FAILED' }}"
      details_01: "{{ 'dnf found at ' + result_01.stdout if result_01.rc == 0 else 'dnf command not found' }}"
    tags: [execute]

# Requirement 2: check if mcstrans is installed, then remove it
  - name: "Req 2 - Check if mcstrans is installed"
    ansible.builtin.shell: rpm -q mcstrans
    args:
      executable: /bin/bash
    register: _mcstrans_check
    failed_when: false
    changed_when: false
    tags: [execute]

  - name: "Set mcstrans installed fact"
    set_fact:
      mcstrans_installed: "{{ _mcstrans_check.rc == 0 }}"
    tags: [execute]

  - name: "Req 2 - Remove mcstrans package"
    ansible.builtin.dnf:
      name: mcstrans
      state: absent
    register: result_02
    failed_when: false
    when:
    - dnf_available | default(false)
    - mcstrans_installed | default(false)
    tags: [execute]

  - name: "Set fact for mcstrans removal"
    set_fact:
      task_02_name: "Remove mcstrans package"
      task_02_cmd: "dnf remove -y mcstrans"
      task_02_rc: "{{ result_02.rc | default(-1) }}"
      data_02: "{{ result_02.stdout | default('') | trim }}"
      status_02: "{{ 'SKIPPED' if (result_02.skipped | default(false)) else ('APPLIED' if (result_02.rc | default(-1) == 0) else 'FAILED') }}"
      details_02: "{{ 'Skipped: mcstrans not installed or dnf not available' if (result_02.skipped | default(false)) else ('Package removed successfully' if (result_02.rc | default(-1) == 0) else 'Failed to remove package') }}"
    tags: [execute]

# Requirement 3: verify mcstrans is not installed
  - name: "Req 3 - Verify mcstrans is not installed"
    ansible.builtin.shell: rpm -q mcstrans
    args:
      executable: /bin/bash
    register: result_03
    failed_when: false
    changed_when: false
    tags: [execute]

  - name: "Set fact for mcstrans verification"
    set_fact:
      task_03_name: "Verify mcstrans not installed"
      task_03_cmd: "rpm -q mcstrans"
      task_03_rc: "{{ result_03.rc }}"
      data_03: "{{ result_03.stdout | default('') | trim }}"
      status_03: "{{ 'APPLIED' if result_03.rc != 0 else 'FAILED' }}"
      details_03: "{{ 'mcstrans is not installed' if result_03.rc != 0 else 'mcstrans is still installed' }}"
    tags: [execute]

# Requirement 4: report
  - name: "Generate remediation report"
    debug:
      msg: |
        REMEDIATION REPORT — CIS 1.3.1.7
        Reference: CIS Benchmark checkpoint 1.3.1.7
        Requirement 1: {{ req_01 }}
          Task: {{ task_01_name }}
          Command: {{ task_01_cmd }}
          Exit code: {{ task_01_rc }}
          Data: {{ data_01 }}
          Status: {{ status_01 }}
          Details: {{ details_01 }}
        Requirement 2: {{ req_02 }}
          Task: {{ task_02_name }}
          Command: {{ task_02_cmd }}
          Exit code: {{ task_02_rc }}
          Data: {{ data_02 }}
          Status: {{ status_02 }}
          Details: {{ details_02 }}
        Requirement 3: {{ req_03 }}
          Task: {{ task_03_name }}
          Command: {{ task_03_cmd }}
          Exit code: {{ task_03_rc }}
          Data: {{ data_03 }}
          Status: {{ status_03 }}
          Details: {{ details_03 }}
        OVERALL REMEDIATION:
          Result: {{ status_03 }}
          Details: {{ details_03 }}
    tags: [execute]

  always:
  - name: "Restore - Remove backup directory"
    ansible.builtin.file:
      path: "{{ backup_dir }}"
      state: absent
    failed_when: false
    tags: [restore]
