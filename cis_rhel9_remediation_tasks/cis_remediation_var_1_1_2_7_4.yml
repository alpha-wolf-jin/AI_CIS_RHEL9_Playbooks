playbook_name: "cis_1_1_2_7_4_remediation"
backup_dir: "/var/log/ai-playbooks-backup/{{ playbook_name }}"
mount_point: "/var/log/audit"
mount_option: "noexec"
req_01: "Verify that a separate partition exists for /var/log/audit using command: `mount | grep /var/log/audit`. Expected result: The partition is listed."
req_02: "Edit the /etc/fstab file and add noexec to the fourth field (mounting options) for the /var/log/audit partition. Expected result: The line for /var/log/audit includes noexec in the options."
req_03: "Remount /var/log/audit with the configured options using command: `mount -o remount /var/log/audit`. Expected result: The partition is remounted successfully."
req_04: "Verify the noexec option is set on /var/log/audit using command: `mount | grep /var/log/audit | grep noexec`. Expected result: The output includes noexec."
req_05: "Store the final remediation result in a variable named 'cis_result' using set_fact. Set cis_result to the overall remediation status (PASS/FAIL/SKIP/ERROR) derived from the last requirement's status variable."
