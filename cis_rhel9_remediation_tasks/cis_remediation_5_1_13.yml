---
- name: Initialize meta data variables
  include_vars: cis_remediation_var_5_1_13.yml

- name: "Snapshot - Create backup directory"
  ansible.builtin.file:
    path: "{{ backup_dir }}"
    state: directory
    mode: '0700'
  tags: [snapshot]
- name: "Snapshot - Check if config file exists"
  ansible.builtin.stat:
    path: "{{ config_file }}"
  register: _snap_config_stat
  tags: [snapshot]
- name: "Snapshot - Backup config file if exists"
  ansible.builtin.copy:
    src: "{{ config_file }}"
    dest: "{{ backup_dir }}/sshd_config.bak"
    remote_src: true
  when: "_snap_config_stat.stat.exists | default(false)"
  tags: [snapshot]

- block:
  - name: "Initialize report variables"
    ansible.builtin.set_fact:
      task_01_name: "Not executed"
      task_01_cmd: "N/A"
      task_01_rc: -1
      data_01: "Not collected yet"
      status_01: "UNKNOWN"
      details_01: "Not evaluated"
      task_02_name: "Not executed"
      task_02_cmd: "N/A"
      task_02_rc: -1
      data_02: "Not collected yet"
      status_02: "UNKNOWN"
      details_02: "Not evaluated"
      task_03_name: "Not executed"
      task_03_cmd: "N/A"
      task_03_rc: -1
      data_03: "Not collected yet"
      status_03: "UNKNOWN"
      details_03: "Not evaluated"
      task_04_name: "Not executed"
      task_04_cmd: "N/A"
      task_04_rc: -1
      data_04: "Not collected yet"
      status_04: "UNKNOWN"
      details_04: "Not evaluated"
      task_05_name: "Not executed"
      task_05_cmd: "N/A"
      task_05_rc: -1
      data_05: "Not collected yet"
      status_05: "UNKNOWN"
      details_05: "Not evaluated"
      task_06_name: "Not executed"
      task_06_cmd: "N/A"
      task_06_rc: -1
      data_06: "Not collected yet"
      status_06: "UNKNOWN"
      details_06: "Not evaluated"
      playbook_skipped: false
      cis_result: "UNKNOWN"
    tags: [execute]

  - name: "Check if openssh-server is installed"
    ansible.builtin.shell: "rpm -q {{ package_name }}"
    args:
      executable: /bin/bash
    register: result_01
    failed_when: false
    changed_when: false
    tags: [execute]

  - name: "Store requirement 01 details"
    ansible.builtin.set_fact:
      task_01_name: "Check openssh-server is installed"
      task_01_cmd: "rpm -q openssh-server"
      task_01_rc: "{{ result_01.rc | default(-1) }}"
      data_01: "{{ result_01.stdout | default('') | trim }}"
      status_01: "{{ 'PASS' if (result_01.rc | default(-1)) == 0 else 'SKIPPED' }}"
      details_01: "{{ 'openssh-server is installed' if (result_01.rc | default(-1)) == 0 else 'openssh-server is NOT installed – skipping remediation' }}"
      playbook_skipped: "{{ (result_01.rc | default(-1)) != 0 }}"
    tags: [execute]

  - name: "Req 02 - Set IgnoreRhosts to yes"
    ansible.builtin.shell: "sed -i 's/^#*IgnoreRhosts.*/IgnoreRhosts yes/' {{ config_file }}"
    args:
      executable: /bin/bash
    register: result_02
    failed_when: false
    when: "not playbook_skipped | bool"
    tags: [execute]

  - name: "Store requirement 02 details"
    ansible.builtin.set_fact:
      task_02_name: "Set IgnoreRhosts to yes"
      task_02_cmd: "sed -i 's/^#*IgnoreRhosts.*/IgnoreRhosts yes/' /etc/ssh/sshd_config"
      task_02_rc: "{{ result_02.rc | default(-1) }}"
      data_02: "{{ result_02.stdout | default('') | trim }}"
      status_02: "{{ 'PASS' if (result_02.rc | default(-1)) == 0 else 'FAIL' }}"
      details_02: "{{ 'IgnoreRhosts set to yes' if (result_02.rc | default(-1)) == 0 else 'Failed to set IgnoreRhosts' }}"
    when: "not playbook_skipped | bool"
    tags: [execute]

  - name: "Req 03 - Ensure IgnoreRhosts before Include/Match"
    ansible.builtin.shell: |
      awk '/^Include|^Match/{exit} {print}' {{ config_file }} | grep -q '^IgnoreRhosts yes' || sed -i '1s/^/IgnoreRhosts yes\n/' {{ config_file }}
    args:
      executable: /bin/bash
    register: result_03
    failed_when: false
    when: "not playbook_skipped | bool"
    tags: [execute]

  - name: "Store requirement 03 details"
    ansible.builtin.set_fact:
      task_03_name: "Position IgnoreRhosts before Include/Match"
      task_03_cmd: |
        awk '/^Include|^Match/{exit} {print}' /etc/ssh/sshd_config | grep -q '^IgnoreRhosts yes' || sed -i '1s/^/IgnoreRhosts yes\\n/' /etc/ssh/sshd_config
      task_03_rc: "{{ result_03.rc | default(-1) }}"
      data_03: "{{ result_03.stdout | default('') | trim }}"
      status_03: "{{ 'PASS' if (result_03.rc | default(-1)) == 0 else 'FAIL' }}"
      details_03: "{{ 'IgnoreRhosts positioned correctly' if (result_03.rc | default(-1)) == 0 else 'Failed to adjust position' }}"
    when: "not playbook_skipped | bool"
    tags: [execute]

  - name: "Req 04 - Restart sshd service"
    ansible.builtin.service:
      name: "{{ service_name }}"
      state: restarted
    register: result_04
    failed_when: false
    when: "not playbook_skipped | bool"
    tags: [execute]

  - name: "Store requirement 04 details"
    ansible.builtin.set_fact:
      task_04_name: "Restart sshd service"
      task_04_cmd: "systemctl restart sshd"
      task_04_rc: "{{ result_04.rc | default(-1) }}"
      data_04: "{{ 'sshd restarted successfully' if result_04 is not failed else 'Failed to restart sshd' }}"
      status_04: "{{ 'PASS' if result_04 is not failed else 'FAIL' }}"
      details_04: "{{ 'sshd service restarted' if result_04 is not failed else 'sshd restart failed' }}"
    when: "not playbook_skipped | bool"
    tags: [execute]

  - name: "Req 05 - Verify IgnoreRhosts is enabled"
    ansible.builtin.shell: "sshd -T | grep -i ignorerhosts"
    args:
      executable: /bin/bash
    register: result_05
    failed_when: false
    changed_when: false
    when: "not playbook_skipped | bool"
    tags: [execute]

  - name: "Store requirement 05 details"
    ansible.builtin.set_fact:
      task_05_name: "Verify IgnoreRhosts via sshd -T"
      task_05_cmd: "sshd -T | grep -i ignorerhosts"
      task_05_rc: "{{ result_05.rc | default(-1) }}"
      data_05: "{{ result_05.stdout | default('') | trim }}"
      status_05: "{{ 'PASS' if (result_05.rc | default(-1)) == 0 and 'ignorerhosts yes' in (result_05.stdout | default('') | lower) else 'FAIL' }}"
      details_05: "{{ 'IgnoreRhosts is enabled' if (result_05.rc | default(-1)) == 0 and 'ignorerhosts yes' in (result_05.stdout | default('') | lower) else 'IgnoreRhosts is NOT enabled or verification failed' }}"
    when: "not playbook_skipped | bool"
    tags: [execute]

  - name: "Set skipped status when package not installed"
    ansible.builtin.set_fact:
      status_01: "SKIPPED"
      details_01: "openssh-server is not installed"
      status_02: "SKIPPED"
      details_02: "openssh-server is not installed"
      status_03: "SKIPPED"
      details_03: "openssh-server is not installed"
      status_04: "SKIPPED"
      details_04: "openssh-server is not installed"
      status_05: "SKIPPED"
      details_05: "openssh-server is not installed"
    when: "playbook_skipped | bool"
    tags: [execute]

  - name: "Req 06 - Compute final remediation result"
    ansible.builtin.set_fact:
      cis_result: "{{ status_05 | default('ERROR') | trim }}"
    tags: [execute]

  - name: "Store requirement 06 details"
    ansible.builtin.set_fact:
      task_06_name: "Store cis_result from status_05"
      task_06_cmd: "set_fact cis_result = status_05"
      task_06_rc: 0
      data_06: "{{ cis_result }}"
      status_06: "{{ cis_result }}"
      details_06: "Overall result stored: {{ cis_result }}"
    tags: [execute]

  - name: "Generate remediation report"
    ansible.builtin.debug:
      msg:
      - "========================================================"
      - "        REMEDIATION REPORT — CIS 5.1.13"
      - "========================================================"
      - "Reference: CIS Benchmark checkpoint 5.1.13"
      - ""
      - "REQUIREMENT 01 - {{ req_01 }}:"
      - "  Task: {{ task_01_name | default('Not recorded') }}"
      - "  Command: {{ task_01_cmd | default('N/A') }}"
      - "  Exit code: {{ task_01_rc | default(-1) }}"
      - "  Data: {{ data_01 | default('Data collection failed') | trim }}"
      - "  Status: {{ status_01 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_01 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 02 - {{ req_02 }}:"
      - "  Task: {{ task_02_name | default('Not recorded') }}"
      - "  Command: {{ task_02_cmd | default('N/A') }}"
      - "  Exit code: {{ task_02_rc | default(-1) }}"
      - "  Data: {{ data_02 | default('Data collection failed') | trim }}"
      - "  Status: {{ status_02 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_02 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 03 - {{ req_03 }}:"
      - "  Task: {{ task_03_name | default('Not recorded') }}"
      - "  Command: {{ task_03_cmd | default('N/A') }}"
      - "  Exit code: {{ task_03_rc | default(-1) }}"
      - "  Data: {{ data_03 | default('Data collection failed') | trim }}"
      - "  Status: {{ status_03 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_03 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 04 - {{ req_04 }}:"
      - "  Task: {{ task_04_name | default('Not recorded') }}"
      - "  Command: {{ task_04_cmd | default('N/A') }}"
      - "  Exit code: {{ task_04_rc | default(-1) }}"
      - "  Data: {{ data_04 | default('Data collection failed') | trim }}"
      - "  Status: {{ status_04 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_04 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 05 - {{ req_05 }}:"
      - "  Task: {{ task_05_name | default('Not recorded') }}"
      - "  Command: {{ task_05_cmd | default('N/A') }}"
      - "  Exit code: {{ task_05_rc | default(-1) }}"
      - "  Data: {{ data_05 | default('Data collection failed') | trim }}"
      - "  Status: {{ status_05 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_05 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 06 - {{ req_06 }}:"
      - "  Task: {{ task_06_name | default('Not recorded') }}"
      - "  Command: {{ task_06_cmd | default('N/A') }}"
      - "  Exit code: {{ task_06_rc | default(-1) }}"
      - "  Data: {{ data_06 | default('Data collection failed') | trim }}"
      - "  Status: {{ status_06 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_06 | default('Not evaluated') | trim }}"
      - ""
      - "========================================================"
      - "OVERALL REMEDIATION:"
      - "  Result: {{ cis_result | default('ERROR') | trim }}"
      - "  Details: {{ details_05 | default('Not evaluated') | trim }}"
      - "========================================================"
    tags: [execute]

  always:
  - name: "Restore - Check if backup exists"
    ansible.builtin.stat:
      path: "{{ backup_dir }}/sshd_config.bak"
    register: _restore_backup_check
    failed_when: false
    tags: [restore]

  - name: "Restore - Restore sshd_config from backup"
    ansible.builtin.copy:
      src: "{{ backup_dir }}/sshd_config.bak"
      dest: "{{ config_file }}"
      remote_src: true
    register: _restore_result
    when: _restore_backup_check.stat.exists | default(false)
    failed_when: false
    tags: [restore]

  - name: "Restore - Restart sshd service after config restore"
    ansible.builtin.service:
      name: "{{ service_name }}"
      state: restarted
    when:
    - _restore_backup_check.stat.exists | default(false)
    - _restore_result.rc | default(0) == 0
    failed_when: false
    tags: [restore]

  - name: "Restore - Clean up backup directory"
    ansible.builtin.file:
      path: "{{ backup_dir }}"
      state: absent
    failed_when: false
    tags: [restore]
