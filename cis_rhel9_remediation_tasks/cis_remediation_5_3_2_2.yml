---
- name: Initialize meta data variables
  include_vars: cis_remediation_var_5_3_2_2.yml

- name: "Req 01 - Check if authselect package is installed"
  ansible.builtin.package_facts:
    manager: auto
  failed_when: false
  tags: [execute]
- name: "Req 01 - Set authselect installed fact"
  ansible.builtin.set_fact:
    authselect_installed: "{{ 'authselect' in ansible_facts.packages }}"
    playbook_skipped: "{{ 'authselect' not in ansible_facts.packages }}"
  tags: [execute]
- name: "Req 01 - Run remediation script to verify and enable pam_faillock"
  ansible.builtin.shell: |
    #!/usr/bin/env bash
    {
       l_module_name="faillock"
       l_pam_profile="$(head -1 /etc/authselect/authselect.conf)"
       if grep -Pq -- '^custom\/' <<< "$l_pam_profile"; then
          l_pam_profile_path="/etc/authselect/$l_pam_profile"
       else
          l_pam_profile_path="/usr/share/authselect/default/$l_pam_profile"
       fi
       grep -P -- "\bpam_$l_module_name\.so\b" "$l_pam_profile_path"/{password,system}-auth
    }
  args:
    executable: /bin/bash
  register: result_01_check
  failed_when: false
  changed_when: false
  when: authselect_installed | default(false)
  tags: [execute]
- name: "Req 01 - Enable with-faillock feature if conditional include present"
  ansible.builtin.shell: authselect enable-feature with-faillock
  args:
    executable: /bin/bash
  register: result_01_enable
  failed_when: false
  when:
  - authselect_installed | default(false)
  - "'with-faillock' in result_01_check.stdout | default('')"
  tags: [execute]
- name: "Req 01 - Apply authselect changes if lines exist without conditional"
  ansible.builtin.shell: authselect apply-changes
  args:
    executable: /bin/bash
  register: result_01_apply
  failed_when: false
  when:
  - authselect_installed | default(false)
  - "result_01_check.stdout | default('') | trim | length > 0"
  - "'with-faillock' not in result_01_check.stdout | default('')"
  tags: [execute]
- name: "Req 01 - Store remediation result"
  ansible.builtin.set_fact:
    task_01_name: "Run remediation script and apply authselect changes"
    task_01_cmd: "authselect enable-feature with-faillock / authselect apply-changes"
    task_01_rc: "{{ 0 if (result_01_enable.rc | default(0)) == 0 or (result_01_apply.rc | default(0)) == 0 else (result_01_enable.rc | default(result_01_apply.rc | default(-1))) }}"
    data_01: "{{ (result_01_enable.stdout | default('') + ' ' + result_01_apply.stdout | default('')) | trim }}"
    status_01: "{{ 'SKIPPED' if not (authselect_installed | default(false)) else ('PASS' if (result_01_enable.rc | default(-1)) == 0 or (result_01_apply.rc | default(-1)) == 0 else 'FAIL') }}"
    details_01: "{{ 'authselect not installed' if not (authselect_installed | default(false)) else ('Feature enabled or changes applied' if (result_01_enable.rc | default(-1)) == 0 or (result_01_apply.rc | default(-1)) == 0 else 'Remediation failed') }}"
  tags: [execute]
- name: "Req 02 - Verify pam_faillock module is enabled in PAM configuration"
  ansible.builtin.shell: |
    grep -P 'pam_faillock\.so' /etc/pam.d/password-auth /etc/pam.d/system-auth 2>/dev/null
  args:
    executable: /bin/bash
  register: result_02
  failed_when: false
  changed_when: false
  tags: [execute]
- name: "Req 02 - Store verification details"
  ansible.builtin.set_fact:
    task_02_name: "Verify pam_faillock module in PAM configuration"
    task_02_cmd: |
      grep -P 'pam_faillock\\.so' /etc/pam.d/password-auth /etc/pam.d/system-auth
    task_02_rc: "{{ result_02.rc | default(-1) }}"
    data_02: "{{ result_02.stdout | default('') | trim }}"
    status_02: "{{ 'PASS' if (result_02.rc | default(-1)) == 0 else 'FAIL' }}"
    details_02: "{{ 'pam_faillock.so found in PAM configuration' if (result_02.rc | default(-1)) == 0 else 'pam_faillock.so not found' }}"
  tags: [execute]
- name: "Req 03 - Store final cis_result fact"
  ansible.builtin.set_fact:
    cis_result: "{{ status_02 }}"
  tags: [execute]
- name: "Req 03 - Store requirement 03 details"
  ansible.builtin.set_fact:
    task_03_name: "Store final remediation result in cis_result"
    task_03_cmd: "set_fact: cis_result = status_02"
    task_03_rc: 0
    data_03: "cis_result = {{ cis_result }}"
    status_03: "PASS"
    details_03: "cis_result set to {{ cis_result }}"
  tags: [execute]
- name: "Req 04 - Generate remediation report"
  ansible.builtin.debug:
    msg:
    - "========================================================"
    - "        REMEDIATION REPORT — CIS 5.3.2.2"
    - "========================================================"
    - "Reference: CIS Benchmark checkpoint 5.3.2.2"
    - ""
    - "REQUIREMENT 01 - {{ req_01 }}:"
    - "  Task: {{ task_01_name | default('Not executed') }}"
    - "  Command: {{ task_01_cmd | default('N/A') }}"
    - "  Exit code: {{ task_01_rc | default(-1) }}"
    - "  Data: {{ data_01 | default('') | trim }}"
    - "  Status: {{ status_01 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_01 | default('Not evaluated') | trim }}"
    - ""
    - "REQUIREMENT 02 - {{ req_02 }}:"
    - "  Task: {{ task_02_name | default('Not executed') }}"
    - "  Command: {{ task_02_cmd | default('N/A') }}"
    - "  Exit code: {{ task_02_rc | default(-1) }}"
    - "  Data: {{ data_02 | default('') | trim }}"
    - "  Status: {{ status_02 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_02 | default('Not evaluated') | trim }}"
    - ""
    - "REQUIREMENT 03 - {{ req_03 }}:"
    - "  Task: {{ task_03_name | default('Not executed') }}"
    - "  Command: {{ task_03_cmd | default('N/A') }}"
    - "  Exit code: {{ task_03_rc | default(-1) }}"
    - "  Data: {{ data_03 | default('') | trim }}"
    - "  Status: {{ status_03 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_03 | default('Not evaluated') | trim }}"
    - ""
    - "========================================================"
    - "OVERALL REMEDIATION:"
    - "  Result: {{ cis_result | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_02 | default('Not evaluated') | trim }}"
    - "========================================================"
  tags: [execute]
