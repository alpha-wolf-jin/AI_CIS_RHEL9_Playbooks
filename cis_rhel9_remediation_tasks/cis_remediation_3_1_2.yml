---
- name: Initialize meta data variables
  include_vars: cis_remediation_var_3_1_2.yml

- name: "Snapshot - Check if wireless interfaces exist"
  ansible.builtin.shell: |
    if [ -n "$(find /sys/class/net/*/ -type d -name wireless 2>/dev/null)" ]; then
      echo "present"
    else
      echo "absent"
    fi
  args:
    executable: /bin/bash
  register: _snap_wireless_check
  changed_when: false
  failed_when: false
  tags: [snapshot]
- name: "Snapshot - Set remediation_needed flag"
  ansible.builtin.set_fact:
    remediation_needed: "{{ 'true' if _snap_wireless_check.stdout | trim == 'present' else 'false' }}"
  tags: [snapshot]
- name: "Snapshot - Create backup directory"
  ansible.builtin.file:
    path: "{{ backup_dir }}"
    state: directory
    mode: '0700'
  tags: [snapshot]
- name: "Snapshot - Backup existing /etc/modprobe.d directory"
  ansible.builtin.copy:
    src: /etc/modprobe.d/
    dest: "{{ backup_dir }}/modprobe.d/"
    remote_src: true
  when: _snap_wireless_check.stdout | trim == 'present'
  tags: [snapshot]
- name: "Snapshot - Enumerate loaded wireless modules"
  ansible.builtin.shell: |
    if [ -n "$(find /sys/class/net/*/ -type d -name wireless 2>/dev/null)" ]; then
      for driverdir in $(find /sys/class/net/*/ -type d -name wireless | xargs -0 dirname); do
        basename "$(readlink -f "$driverdir"/device/driver/module)" 2>/dev/null
      done | sort -u
    fi
  args:
    executable: /bin/bash
  register: _snap_loaded_modules
  changed_when: false
  failed_when: false
  when: _snap_wireless_check.stdout | trim == 'present'
  tags: [snapshot]
- name: "Snapshot - Persist loaded module list to file"
  ansible.builtin.copy:
    content: "{{ _snap_loaded_modules.stdout | default('') }}"
    dest: "{{ backup_dir }}/loaded_modules.txt"
  when: _snap_wireless_check.stdout | trim == 'present'
  tags: [snapshot]

- block:
        # === EXECUTE ===

  - name: "Initialize data variables"
    ansible.builtin.set_fact:
      data_01: "Not collected yet"
      status_01: "ERROR"
      details_01: "Not evaluated"
      data_02: "Not collected yet"
      status_02: "ERROR"
      details_02: "Not evaluated"
      task_01_name: "Not executed"
      task_01_cmd: "N/A"
      task_01_rc: -1
      task_02_name: "Not executed"
      task_02_cmd: "N/A"
      task_02_rc: -1
    tags: [execute]

  - name: "Req 1 - Check if wireless interfaces are present (execute)"
    ansible.builtin.shell: |
      if [ -n "$(find /sys/class/net/*/ -type d -name wireless 2>/dev/null)" ]; then
        echo "present"
      else
        echo "absent"
      fi
    args:
      executable: /bin/bash
    register: _exec_wireless_check
    failed_when: false
    tags: [execute]

  - name: "Set need_remediation fact"
    ansible.builtin.set_fact:
      need_remediation: "{{ _exec_wireless_check.stdout | trim == 'present' }}"
    tags: [execute]

  - name: "Req 1 - Deploy remediation script"
    ansible.builtin.copy:
      dest: "{{ script_path }}"
      content: |
        #!/usr/bin/env bash
        {
           module_fix()
           {
              if ! modprobe -n -v "$l_mname" | grep -P -- '^\h*install \/bin\/(true|false)'; then
                 echo -e " - setting module: \"$l_mname\" to be un-loadable"
                 echo -e "install $l_mname /bin/false" >> /etc/modprobe.d/"$l_mname".conf
              fi
              if lsmod | grep "$l_mname" > /dev/null 2>&1; then
                 echo -e " - unloading module \"$l_mname\""
                 modprobe -r "$l_mname"
              fi
              if ! grep -Pq -- "^\h*blacklist\h+$l_mname\b" /etc/modprobe.d/*; then
                 echo -e " - deny listing \"$l_mname\""
                 echo -e "blacklist $l_mname" >> /etc/modprobe.d/"$l_mname".conf
              fi
           }
           if [ -n "$(find /sys/class/net/*/ -type d -name wireless)" ]; then
              l_dname=$(for driverdir in $(find /sys/class/net/*/ -type d -name wireless | xargs -0 dirname); do basename "$(readlink -f "$driverdir"/device/driver/module)";done | sort -u)
              for l_mname in $l_dname; do
                 module_fix
              done
           fi
        }
      mode: '0700'
    failed_when: false
    when: need_remediation | bool
    tags: [execute]

  - name: "Req 1 - Execute remediation script"
    ansible.builtin.shell: "/bin/bash {{ script_path }}"
    args:
      executable: /bin/bash
    register: result_01
    failed_when: false
    when: need_remediation | bool
    tags: [execute]

  - name: "Req 2 - Verify wireless interfaces are disabled"
    ansible.builtin.shell: |
      if [ -n "$(find /sys/class/net/*/ -type d -name wireless 2>/dev/null)" ]; then
        echo "FAIL: Wireless interfaces detected"
      else
        echo "PASS: No wireless interfaces detected"
      fi
    args:
      executable: /bin/bash
    register: result_02
    failed_when: false
    tags: [execute]

  - name: "Store requirement 01 details"
    ansible.builtin.set_fact:
      task_01_name: "Execute remediation script"
      task_01_cmd: "/bin/bash {{ script_path }}"
      task_01_rc: "{{ result_01.rc | default(-1) if need_remediation | bool else -1 }}"
      data_01: "{{ result_01.stdout | default('') | trim if need_remediation | bool else 'SKIP' }}"
      status_01: "{{ 'PASS' if (need_remediation | bool) and (result_01.rc | default(-1) == 0) else ('SKIP' if not (need_remediation | bool) else 'FAIL') }}"
      details_01: "{{ 'Remediation script executed successfully' if (need_remediation | bool) and (result_01.rc | default(-1) == 0) else ('No wireless interfaces present – remediation not required' if not (need_remediation | bool) else 'Script failed') }}"
    tags: [execute]

  - name: "Store requirement 02 details"
    ansible.builtin.set_fact:
      task_02_name: "Verify wireless interfaces disabled"
      task_02_cmd: "Custom verification (find /sys/class/net)"
      task_02_rc: "{{ result_02.rc | default(-1) }}"
      data_02: "{{ result_02.stdout | default('') | trim }}"
      status_02: "{{ 'PASS' if result_02.stdout | default('') is search('PASS') else 'FAIL' }}"
      details_02: "{{ 'System is compliant' if result_02.stdout | default('') is search('PASS') else 'Wireless interfaces still present' }}"
    tags: [execute]

  - name: "Set cis_result from verification status"
    ansible.builtin.set_fact:
      cis_result: "{{ status_02 | trim }}"
    tags: [execute]

  - name: "Generate remediation report"
    ansible.builtin.debug:
      msg: |
        REMEDIATION REPORT — CIS 3.1.2
        Reference: CIS Benchmark checkpoint 3.1.2
        Requirement 1 - {{ req_01 }}:
          Task: {{ task_01_name | default('Task not recorded') }}
          Command: {{ task_01_cmd | default('N/A') }}
          Exit code: {{ task_01_rc | default(-1) }}
          Data: {{ data_01 | default('') | trim }}
          Status: {{ status_01 | default('ERROR') | trim }}
          Details: {{ details_01 | default('Not evaluated') | trim }}
        Requirement 2 - {{ req_02 }}:
          Task: {{ task_02_name | default('Task not recorded') }}
          Command: {{ task_02_cmd | default('N/A') }}
          Exit code: {{ task_02_rc | default(-1) }}
          Data: {{ data_02 | default('') | trim }}
          Status: {{ status_02 | default('ERROR') | trim }}
          Details: {{ details_02 | default('Not evaluated') | trim }}
        OVERALL REMEDIATION:
          Result: {{ cis_result }}
    tags: [execute]

  always:
# === RESTORE ===
  - name: "Restore - Check if backup directory exists"
    ansible.builtin.stat:
      path: "{{ backup_dir }}"
    register: _restore_backup_exists
    failed_when: false
    tags: [restore]

  - name: "Restore - Check if modprobe.d backup exists"
    ansible.builtin.stat:
      path: "{{ backup_dir }}/modprobe.d"
    register: _restore_modprobe_stat
    failed_when: false
    when: _restore_backup_exists.stat.exists | default(false)
    tags: [restore]

  - name: "Restore - Overwrite /etc/modprobe.d with original"
    ansible.builtin.copy:
      src: "{{ backup_dir }}/modprobe.d/"
      dest: /etc/modprobe.d/
      remote_src: true
    when: _restore_modprobe_stat.stat.exists | default(false)
    failed_when: false
    tags: [restore]

  - name: "Restore - Check if loaded modules file exists"
    ansible.builtin.stat:
      path: "{{ backup_dir }}/loaded_modules.txt"
    register: _restore_loaded_stat
    failed_when: false
    when: _restore_backup_exists.stat.exists | default(false)
    tags: [restore]

  - name: "Restore - Read loaded modules file"
    ansible.builtin.slurp:
      src: "{{ backup_dir }}/loaded_modules.txt"
    register: _restore_loaded_content
    when: _restore_loaded_stat.stat.exists | default(false)
    failed_when: false
    tags: [restore]

  - name: "Restore - Reload previously loaded wireless modules"
    ansible.builtin.shell: |
      for mod in {{ (_restore_loaded_content.content | b64decode | trim).split('\n') | reject('equalto','') | join(' ') }}; do
        modprobe "$mod" 2>/dev/null || true
      done
    args:
      executable: /bin/bash
    when:
    - _restore_loaded_stat.stat.exists | default(false)
    - _restore_loaded_content.content is defined
    - (_restore_loaded_content.content | b64decode | trim) | length > 0
    failed_when: false
    tags: [restore]

  - name: "Restore - Remove backup directory"
    ansible.builtin.file:
      path: "{{ backup_dir }}"
      state: absent
    when: _restore_backup_exists.stat.exists | default(false)
    failed_when: false
    tags: [restore]

  - name: "Restore - Remove remediation script"
    ansible.builtin.file:
      path: "{{ script_path }}"
      state: absent
    failed_when: false
    tags: [restore]
