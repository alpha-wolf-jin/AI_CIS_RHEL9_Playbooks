---
- name: Initialize meta data variables
  include_vars: cis_remediation_var_5_3_3_3_3.yml

- name: "State Guard - Check for existing checkpoint"
  ansible.builtin.stat:
    path: "{{ state_guard_flag }}"
  register: _sg_flag
  tags: [snapshot]
- name: "State Guard - Restore previous checkpoint if exists"
  ansible.builtin.shell: |
    if [ -f "{{ state_guard_dir }}/authselect_profile.state" ]; then
      l_old_profile="$(cat "{{ state_guard_dir }}/authselect_profile.state")"
      if [ -n "$l_old_profile" ]; then
        authselect select "$l_old_profile" --force 2>/dev/null || true
      fi
    fi
    for f in password-auth system-auth; do
      if [ -f "{{ state_guard_dir }}/${f}.present" ]; then
        cp "{{ state_guard_dir }}/${f}.present" "/etc/authselect/$(head -1 /etc/authselect/authselect.conf)/${f}" 2>/dev/null || true
      fi
    done
    authselect apply-changes 2>/dev/null || true
  args:
    executable: /bin/bash
  when: "_sg_flag.stat.exists | default(false)"
  failed_when: false
  tags: [snapshot]
- name: "State Guard - Remove old checkpoint"
  ansible.builtin.file:
    path: "{{ state_guard_dir }}"
    state: absent
  when: "_sg_flag.stat.exists | default(false)"
  tags: [snapshot]
- name: "State Guard - Create checkpoint directory"
  ansible.builtin.file:
    path: "{{ state_guard_dir }}"
    state: directory
    mode: '0700'
  tags: [snapshot]
- name: "State Guard - Save current authselect profile"
  ansible.builtin.shell: head -1 /etc/authselect/authselect.conf 2>/dev/null || echo ""
  args:
    executable: /bin/bash
  register: _sg_profile
  failed_when: false
  tags: [snapshot]
- name: "State Guard - Persist authselect profile to file"
  ansible.builtin.copy:
    content: "{{ _sg_profile.stdout | default('') | trim }}"
    dest: "{{ state_guard_dir }}/authselect_profile.state"
  when: "_sg_profile.stdout | default('') | trim | length > 0"
  tags: [snapshot]
- name: "State Guard - Determine authselect profile path"
  ansible.builtin.shell: |
    l_pam_profile="$(head -1 /etc/authselect/authselect.conf)"
    if grep -Pq -- '^custom\/' <<< "$l_pam_profile"; then
      echo "/etc/authselect/$l_pam_profile"
    else
      echo "/usr/share/authselect/default/$l_pam_profile"
    fi
  args:
    executable: /bin/bash
  register: _sg_profile_path
  failed_when: false
  tags: [snapshot]
- name: "State Guard - Backup password-auth"
  ansible.builtin.copy:
    src: "{{ _sg_profile_path.stdout | trim }}/password-auth"
    dest: "{{ state_guard_dir }}/password-auth.present"
    remote_src: true
  when: "_sg_profile_path.stdout | default('') | trim | length > 0"
  failed_when: false
  tags: [snapshot]
- name: "State Guard - Backup system-auth"
  ansible.builtin.copy:
    src: "{{ _sg_profile_path.stdout | trim }}/system-auth"
    dest: "{{ state_guard_dir }}/system-auth.present"
    remote_src: true
  when: "_sg_profile_path.stdout | default('') | trim | length > 0"
  failed_when: false
  tags: [snapshot]
- name: "State Guard - Create checkpoint flag"
  ansible.builtin.copy:
    content: "checkpoint"
    dest: "{{ state_guard_flag }}"
  tags: [snapshot]

- block:
        # === STATE GUARD — EXECUTE PHASE ===

  - name: "Initialize data variables"
    ansible.builtin.set_fact:
      data_01: "Not collected yet"
      status_01: "UNKNOWN"
      details_01: "Not evaluated"
      task_01_name: "Not executed"
      task_01_cmd: "N/A"
      task_01_rc: -1
      data_02: "Not collected yet"
      status_02: "UNKNOWN"
      details_02: "Not evaluated"
      task_02_name: "Not executed"
      task_02_cmd: "N/A"
      task_02_rc: -1
      data_03: "Not collected yet"
      status_03: "UNKNOWN"
      details_03: "Not evaluated"
      task_03_name: "Not executed"
      task_03_cmd: "N/A"
      task_03_rc: -1
      data_04: "Not collected yet"
      status_04: "UNKNOWN"
      details_04: "Not evaluated"
      task_04_name: "Not executed"
      task_04_cmd: "N/A"
      task_04_rc: -1
    tags: [execute]

  - name: "Req 01 - Check if authselect is installed"
    ansible.builtin.package_facts:
      manager: auto
    failed_when: false
    tags: [execute]

  - name: "Req 01 - Set authselect installed fact"
    ansible.builtin.set_fact:
      authselect_installed: "{{ 'authselect' in ansible_facts.packages }}"
      playbook_skipped: "{{ 'authselect' not in ansible_facts.packages }}"
    tags: [execute]

  - name: "Req 01 - Check current authselect profile for use_authtok"
    ansible.builtin.shell: |
      l_pam_profile="$(head -1 /etc/authselect/authselect.conf)"
      if grep -Pq -- '^custom\/' <<< "$l_pam_profile"; then
        l_pam_profile_path="/etc/authselect/$l_pam_profile"
      else
        l_pam_profile_path="/usr/share/authselect/default/$l_pam_profile"
      fi
      grep -P -- '^\h*password\h+(requisite|required|sufficient)\h+pam_pwhistory\.so\h+([^#\n\r]+\h+)?use_authtok\b' "$l_pam_profile_path"/{password,system}-auth 2>/dev/null || true
    args:
      executable: /bin/bash
    register: _check_use_authtok
    failed_when: false
    changed_when: false
    when: "authselect_installed | default(false)"
    tags: [execute]

  - name: "Req 01 - Remediate pam_pwhistory.so to include use_authtok"
    ansible.builtin.shell: |
      l_pam_profile="$(head -1 /etc/authselect/authselect.conf)"
      if grep -Pq -- '^custom\/' <<< "$l_pam_profile"; then
        l_pam_profile_path="/etc/authselect/$l_pam_profile"
      else
        l_pam_profile_path="/usr/share/authselect/default/$l_pam_profile"
      fi
      for l_authselect_file in "$l_pam_profile_path"/password-auth "$l_pam_profile_path"/system-auth; do
        if grep -Pq '^\h*password\h+([^#\n\r]+)\h+pam_pwhistory\.so\h+([^#\n\r]+\h+)?use_authtok\b' "$l_authselect_file"; then
          echo "- \"use_authtok\" is already set in $l_authselect_file"
        else
          echo "- \"use_authtok\" is not set in $l_authselect_file. Updating template"
          sed -ri 's/(^\s*password\s+(requisite|required|sufficient)\s+pam_pwhistory\.so\s+.*)$/\1 use_authtok/g' "$l_authselect_file"
        fi
      done
    args:
      executable: /bin/bash
    register: result_01
    failed_when: false
    when: "authselect_installed | default(false)"
    tags: [execute]

  - name: "Req 01 - Apply authselect changes"
    ansible.builtin.shell: authselect apply-changes
    args:
      executable: /bin/bash
    register: _apply_changes
    failed_when: false
    when: "authselect_installed | default(false)"
    tags: [execute]

  - name: "Req 01 - Store requirement 01 details"
    ansible.builtin.set_fact:
      task_01_name: "Remediate pam_pwhistory.so to include use_authtok and apply authselect changes"
      task_01_cmd: |
        sed -ri 's/(^\\s*password\\s+(requisite|required|sufficient)\\s+pam_pwhistory\\.so\\s+.*)$/\\1 use_authtok/g' + authselect apply-changes
      task_01_rc: "{{ result_01.rc | default(-1) }}"
      data_01: "{{ result_01.stdout | default('') | trim }}"
      status_01: "{{ 'SKIPPED' if not (authselect_installed | default(false)) else ('APPLIED' if result_01.rc | default(-1) == 0 else 'FAILED') }}"
      details_01: "{{ 'authselect not installed - skipped' if not (authselect_installed | default(false)) else ('Remediation completed successfully' if result_01.rc | default(-1) == 0 else 'Remediation script failed') }}"
    tags: [execute]

# Requirement 2: VERIFY
  - name: "Req 02 - Verify pam_pwhistory.so includes use_authtok"
    ansible.builtin.shell: |
      l_pam_profile="$(head -1 /etc/authselect/authselect.conf)"
      if grep -Pq -- '^custom\/' <<< "$l_pam_profile"; then
        l_pam_profile_path="/etc/authselect/$l_pam_profile"
      else
        l_pam_profile_path="/usr/share/authselect/default/$l_pam_profile"
      fi
      grep -P -- '^\h*password\h+(requisite|required|sufficient)\h+pam_pwhistory\.so\h+([^#\n\r]+\h+)?use_authtok\b' "$l_pam_profile_path"/{password,system}-auth 2>/dev/null || true
    args:
      executable: /bin/bash
    register: result_02
    failed_when: false
    changed_when: false
    when: "authselect_installed | default(false)"
    tags: [execute]

  - name: "Req 02 - Store requirement 02 details"
    ansible.builtin.set_fact:
      task_02_name: "Verify pam_pwhistory.so includes use_authtok in authselect profile"
      task_02_cmd: |
        grep -P -- '^\\h*password\\h+(requisite|required|sufficient)\\h+pam_pwhistory\\.so\\h+([^#\\n\\r]+\\h+)?use_authtok\\b' <profile_path>/{password,system}-auth
      task_02_rc: "{{ result_02.rc | default(-1) }}"
      data_02: "{{ result_02.stdout | default('') | trim }}"
      status_02: "{{ 'SKIPPED' if not (authselect_installed | default(false)) else ('PASS' if (result_02.stdout | default('') | trim | length > 0) else 'FAIL') }}"
      details_02: "{{ 'authselect not installed - skipped' if not (authselect_installed | default(false)) else ('use_authtok is configured' if (result_02.stdout | default('') | trim | length > 0) else 'use_authtok is NOT configured') }}"
    tags: [execute]

  - name: "Req 03 - Store overall remediation status as cis_result"
    ansible.builtin.set_fact:
      cis_result: "{{ status_02 | default('UNKNOWN') | trim }}"
      task_03_name: "Set cis_result from verification status"
      task_03_cmd: "set_fact: cis_result = status_02"
      task_03_rc: 0
      data_03: "{{ status_02 | default('UNKNOWN') | trim }}"
      status_03: "PASS"
      details_03: "cis_result set to {{ status_02 | default('UNKNOWN') | trim }}"
    tags: [execute]

  - name: "Req 04 - Store report metadata"
    ansible.builtin.set_fact:
      task_04_name: "Generate remediation report"
      task_04_cmd: "debug: msg containing report"
      task_04_rc: 0
      data_04: "Report displayed"
      status_04: "PASS"
      details_04: "Remediation report generated successfully"
    tags: [execute]

  - name: "Req 04 - Generate remediation report"
    ansible.builtin.debug:
      msg:
      - "========================================================"
      - "        REMEDIATION REPORT — CIS 5.3.3.3.3"
      - "========================================================"
      - "Reference: CIS Benchmark checkpoint 5.3.3.3.3"
      - ""
      - "REQUIREMENT 01 - {{ req_01 }}:"
      - "  Task: {{ task_01_name | default('Task not recorded') }}"
      - "  Command: {{ task_01_cmd | default('N/A') }}"
      - "  Exit code: {{ task_01_rc | default(-1) }}"
      - "  Data: {{ data_01 | default('') | trim }}"
      - "  Status: {{ status_01 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_01 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 02 - {{ req_02 }}:"
      - "  Task: {{ task_02_name | default('Task not recorded') }}"
      - "  Command: {{ task_02_cmd | default('N/A') }}"
      - "  Exit code: {{ task_02_rc | default(-1) }}"
      - "  Data: {{ data_02 | default('') | trim }}"
      - "  Status: {{ status_02 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_02 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 03 - {{ req_03 }}:"
      - "  Task: {{ task_03_name | default('Task not recorded') }}"
      - "  Command: {{ task_03_cmd | default('N/A') }}"
      - "  Exit code: {{ task_03_rc | default(-1) }}"
      - "  Data: {{ data_03 | default('') | trim }}"
      - "  Status: {{ status_03 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_03 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 04 - {{ req_04 }}:"
      - "  Task: {{ task_04_name | default('Task not recorded') }}"
      - "  Command: {{ task_04_cmd | default('N/A') }}"
      - "  Exit code: {{ task_04_rc | default(-1) }}"
      - "  Data: {{ data_04 | default('') | trim }}"
      - "  Status: {{ status_04 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_04 | default('Not evaluated') | trim }}"
      - ""
      - "========================================================"
      - "OVERALL REMEDIATION:"
      - "  Result: {{ cis_result | default('ERROR') | trim }}"
      - "  Details: {{ details_02 | default('Not evaluated') | trim }}"
      - "========================================================"
    tags: [execute]

  always:
        # === STATE GUARD — RESTORE PHASE (GUARANTEED) ===

  - name: "State Guard Restore - Check if checkpoint exists"
    ansible.builtin.stat:
      path: "{{ state_guard_flag }}"
    register: _sg_restore_flag
    failed_when: false
    tags: [restore]

  - name: "State Guard Restore - Read saved authselect profile"
    ansible.builtin.slurp:
      src: "{{ state_guard_dir }}/authselect_profile.state"
    register: _sg_restore_profile_data
    failed_when: false
    tags: [restore]

  - name: "State Guard Restore - Restore authselect profile"
    ansible.builtin.shell: |
      l_profile="{{ _sg_restore_profile_data.content | b64decode | trim }}"
      if [ -n "$l_profile" ]; then
        authselect select "$l_profile" --force 2>/dev/null || true
      fi
    args:
      executable: /bin/bash
    when: "_sg_restore_profile_data is not failed and _sg_restore_profile_data.content is defined"
    failed_when: false
    tags: [restore]

  - name: "State Guard Restore - Check if password-auth backup exists"
    ansible.builtin.stat:
      path: "{{ state_guard_dir }}/password-auth.present"
    register: _sg_restore_pass_auth
    failed_when: false
    tags: [restore]

  - name: "State Guard Restore - Restore password-auth from backup"
    ansible.builtin.copy:
      src: "{{ state_guard_dir }}/password-auth.present"
      dest: "/etc/authselect/{{ _sg_restore_profile_data.content | b64decode | trim }}/password-auth"
      remote_src: true
    when: "_sg_restore_pass_auth.stat.exists | default(false)"
    failed_when: false
    tags: [restore]

  - name: "State Guard Restore - Check if system-auth backup exists"
    ansible.builtin.stat:
      path: "{{ state_guard_dir }}/system-auth.present"
    register: _sg_restore_sys_auth
    failed_when: false
    tags: [restore]

  - name: "State Guard Restore - Restore system-auth from backup"
    ansible.builtin.copy:
      src: "{{ state_guard_dir }}/system-auth.present"
      dest: "/etc/authselect/{{ _sg_restore_profile_data.content | b64decode | trim }}/system-auth"
      remote_src: true
    when: "_sg_restore_sys_auth.stat.exists | default(false)"
    failed_when: false
    tags: [restore]

  - name: "State Guard Restore - Apply authselect changes after restore"
    ansible.builtin.shell: authselect apply-changes 2>/dev/null || true
    args:
      executable: /bin/bash
    when: "_sg_restore_flag.stat.exists | default(false)"
    failed_when: false
    tags: [restore]

  - name: "State Guard Restore - Remove checkpoint"
    ansible.builtin.file:
      path: "{{ state_guard_dir }}"
      state: absent
    when: "_sg_restore_flag.stat.exists | default(false)"
    failed_when: false
    tags: [restore]
