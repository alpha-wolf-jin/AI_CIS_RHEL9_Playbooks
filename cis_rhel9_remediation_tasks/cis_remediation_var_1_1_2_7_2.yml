playbook_name: "cis_remediation_1_1_2_7_2"
backup_dir: "/var/log/ai-playbooks-backup/{{ playbook_name }}"
mount_point: "/var/log/audit"
mount_option: "nodev"
req_01: |
  Apply prerequisite check: ensure /var/log/audit is a separate partition using command: `mount | grep -E '\\s/var/log/audit\\s'`. Expected result: output contains a line with /var/log/audit.
req_02: |
  Apply nodev mount option to /var/log/audit in /etc/fstab using command: `sed -i 's|\\(\\s/var/log/audit\\s\\+\\S\\+\\s\\+\\)\\S\\+|\\1defaults,rw,nosuid,nodev,noexec,relatime|' /etc/fstab`. Expected result: the fourth field for /var/log/audit partition includes nodev.
req_03: "Apply remount of /var/log/audit with updated options using command: `mount -o remount /var/log/audit`. Expected result: no error output."
req_04: |
  Verify nodev option is active on /var/log/audit using command: `mount | grep -E '\\s/var/log/audit\\s' | grep -o 'nodev'`. Expected result: output contains 'nodev'.
