playbook_name: "cis_5_1_11"
backup_dir: "/var/log/ai-playbooks-backup/{{ playbook_name }}"
config_file: "/etc/ssh/sshd_config"
service_name: "sshd"
config_param: "GSSAPIAuthentication"
config_value: "no"
req_01: "Apply prerequisite check: ensure openssh-server is installed using command: `dpkg -l | grep -q openssh-server || apt-get install -y openssh-server`. Expected result: openssh-server is installed."
req_02: "Apply configuration change to disable GSSAPIAuthentication in /etc/ssh/sshd_config using command: `sed -i '/^GSSAPIAuthentication/d' /etc/ssh/sshd_config && echo 'GSSAPIAuthentication no' >> /etc/ssh/sshd_config`. Expected result: GSSAPIAuthentication is set to no."
req_03: "Apply removal of any duplicate GSSAPIAuthentication entries before Include or Match statements using command: `sed -i '0,/^GSSAPIAuthentication no$/!{/^GSSAPIAuthentication/d}' /etc/ssh/sshd_config`. Expected result: Only the first occurrence of GSSAPIAuthentication no remains."
req_04: "Apply restart of sshd service to apply changes using command: `systemctl restart sshd`. Expected result: sshd service restarts successfully."
req_05: "Verify GSSAPIAuthentication is disabled using command: `sshd -T | grep -i gssapiauthentication`. Expected result: gssapiauthentication no"
