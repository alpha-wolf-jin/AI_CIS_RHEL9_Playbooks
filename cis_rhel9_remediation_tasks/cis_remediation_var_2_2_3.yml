playbook_name: "cis_2.2.3_remediate_nis"
backup_dir: "/var/log/ai-playbooks-backup/{{ playbook_name }}"
package_name: "ypbind"
req_01: "Apply removal of ypbind package using command: `dnf remove ypbind`. Expected result: Package ypbind is removed from the system."
req_02: "Verify that the nis client is not installed using command: `rpm -q ypbind`. Expected result: package ypbind is not installed (return code non-zero or message 'package ypbind is not installed')."
req_03: "Store the final remediation result in a variable named 'cis_result' using set_fact. Set cis_result to the overall remediation status (PASS/FAIL/SKIP/ERROR) derived from the last requirement's status variable."
