playbook_name: "cis_2_1_6"
backup_dir: "/var/log/ai-playbooks-backup/{{ playbook_name }}"
package_name: "samba"
service_unit: "smb.service"
req_01: "Apply stop smb.service using command: `systemctl stop smb.service`. Expected result: The smb service is stopped."
req_02: "Apply remove samba package using command: `dnf remove samba`. Expected result: The samba package is removed from the system."
req_03: "Apply mask smb.service using command: `systemctl mask smb.service`. Expected result: The smb service is masked and cannot be started."
req_04: "Verify that smb.service is not running or masked using command: `systemctl status smb.service`. Expected result: The service is either inactive (dead) or masked."
req_05: "Store the final remediation result in a variable named 'cis_result' using set_fact. Set cis_result to the overall remediation status (PASS/FAIL/SKIP/ERROR) derived from the last requirement's status variable."
