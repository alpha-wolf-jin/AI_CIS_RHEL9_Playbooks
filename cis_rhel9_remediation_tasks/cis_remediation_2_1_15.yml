---
- name: Initialize meta data variables
  include_vars: cis_remediation_var_2_1_15.yml

- name: "Snapshot - Create backup directory"
  ansible.builtin.file:
    path: "{{ backup_dir }}"
    state: directory
    mode: '0700'
  tags: [snapshot]

- block:
  - name: "Initialize data variables"
    set_fact:
      data_01: "Not collected yet"
      status_01: "ERROR"
      details_01: "Not evaluated"
      data_02: "Not collected yet"
      status_02: "ERROR"
      details_02: "Not evaluated"
      data_03: "Not collected yet"
      status_03: "ERROR"
      details_03: "Not evaluated"
      data_04: "Not collected yet"
      status_04: "ERROR"
      details_04: "Not evaluated"
      data_05: "Not collected yet"
      status_05: "ERROR"
      details_05: "Not evaluated"
      task_01_name: "Not executed"
      task_01_cmd: "N/A"
      task_01_rc: -1
    tags: [execute]

  - name: "Prerequisite check - Gather package facts"
    ansible.builtin.package_facts:
      manager: auto
    tags: [execute]

  - name: "Set skip_all fact if telnet-server not installed"
    set_fact:
      skip_all: "{{ 'telnet-server' not in ansible_facts.packages }}"
    tags: [execute]

  - name: "Set statuses to SKIP when prerequisite not met"
    set_fact:
      status_01: "SKIP"
      details_01: "Skipped: telnet-server package not installed"
      status_02: "SKIP"
      details_02: "Skipped: telnet-server package not installed"
      status_03: "SKIP"
      details_03: "Skipped: telnet-server package not installed"
      status_04: "SKIP"
      details_04: "Skipped: telnet-server package not installed"
      status_05: "SKIP"
      details_05: "Skipped: telnet-server package not installed"
    when: skip_all | default(false)
    tags: [execute]

  - name: "Req 01 - Stop telnet.socket"
    ansible.builtin.systemd:
      name: telnet.socket
      state: stopped
    register: result_01
    failed_when: false
    when: not skip_all | default(false)
    tags: [execute]

  - name: "Store requirement 01 details"
    set_fact:
      task_01_name: "Stop telnet.socket"
      task_01_cmd: "systemctl stop telnet.socket"
      task_01_rc: "{{ result_01.rc | default(-1) }}"
      data_01: "{{ result_01.stdout | default('') | trim }}"
      status_01: "{{ ('PASS' if result_01.rc | default(-1) == 0 else 'FAIL') | trim }}"
      details_01: "{{ ('Stopped successfully' if result_01.rc | default(-1) == 0 else 'Failed to stop') | trim }}"
    when: not skip_all | default(false)
    tags: [execute]

  - name: "Req 02 - Remove telnet-server package"
    ansible.builtin.dnf:
      name: telnet-server
      state: absent
    register: result_02
    failed_when: false
    when: not skip_all | default(false)
    tags: [execute]

  - name: "Store requirement 02 details"
    set_fact:
      task_02_name: "Remove telnet-server package"
      task_02_cmd: "dnf remove telnet-server"
      task_02_rc: "{{ result_02.rc | default(-1) }}"
      data_02: "{{ result_02.stdout | default('') | trim }}"
      status_02: "{{ ('PASS' if result_02.rc | default(-1) == 0 else 'FAIL') | trim }}"
      details_02: "{{ ('Removed successfully' if result_02.rc | default(-1) == 0 else 'Failed to remove') | trim }}"
    when: not skip_all | default(false)
    tags: [execute]

  - name: "Req 03 - Mask telnet.socket"
    ansible.builtin.systemd:
      name: telnet.socket
      masked: true
    register: result_03
    failed_when: false
    when: not skip_all | default(false)
    tags: [execute]

  - name: "Store requirement 03 details"
    set_fact:
      task_03_name: "Mask telnet.socket"
      task_03_cmd: "systemctl mask telnet.socket"
      task_03_rc: "{{ result_03.rc | default(-1) }}"
      data_03: "{{ result_03.stdout | default('') | trim }}"
      status_03: "{{ ('PASS' if result_03.rc | default(-1) == 0 else 'FAIL') | trim }}"
      details_03: "{{ ('Masked successfully' if result_03.rc | default(-1) == 0 else 'Failed to mask') | trim }}"
    when: not skip_all | default(false)
    tags: [execute]

  - name: "Req 04 - Verify telnet.socket is inactive"
    ansible.builtin.shell: systemctl is-active telnet.socket
    args:
      executable: /bin/bash
    register: result_04
    failed_when: false
    changed_when: false
    when: not skip_all | default(false)
    tags: [execute]

  - name: "Store requirement 04 details"
    set_fact:
      task_04_name: "Verify telnet.socket inactive"
      task_04_cmd: "systemctl is-active telnet.socket"
      task_04_rc: "{{ result_04.rc | default(-1) }}"
      data_04: "{{ result_04.stdout | default('') | trim }}"
      status_04: "{{ ('PASS' if (result_04.stdout | default('') | trim == 'inactive') else 'FAIL') | trim }}"
      details_04: "{{ ('Verified inactive' if (result_04.stdout | default('') | trim == 'inactive') else 'Not inactive') | trim }}"
    when: not skip_all | default(false)
    tags: [execute]

  - name: "Req 05 - Verify telnet-server package not installed"
    ansible.builtin.shell: rpm -q telnet-server
    args:
      executable: /bin/bash
    register: result_05
    failed_when: false
    changed_when: false
    when: not skip_all | default(false)
    tags: [execute]

  - name: "Store requirement 05 details"
    set_fact:
      task_05_name: "Verify telnet-server not installed"
      task_05_cmd: "rpm -q telnet-server"
      task_05_rc: "{{ result_05.rc | default(-1) }}"
      data_05: "{{ result_05.stdout | default('') | trim }}"
      status_05: "{{ ('PASS' if result_05.rc | default(-1) != 0 else 'FAIL') | trim }}"
      details_05: "{{ ('Package not installed' if result_05.rc | default(-1) != 0 else 'Package still installed') | trim }}"
    when: not skip_all | default(false)
    tags: [execute]

  - name: "Req 06 - Store final remediation result"
    set_fact:
      cis_result: "{{ status_05 | default('ERROR') | trim }}"
    tags: [execute]

  - name: "Generate remediation report"
    debug:
      msg:
      - "REMEDIATION REPORT — CIS 2.1.15"
      - "Reference: CIS Benchmark checkpoint 2.1.15"
      - ""
      - "REQUIREMENT 01 - {{ req_01 }}:"
      - "  Task: {{ task_01_name | default('Not recorded') }}"
      - "  Command: {{ task_01_cmd | default('N/A') }}"
      - "  Exit code: {{ task_01_rc | default(-1) }}"
      - "  Data: {{ data_01 | default('') | trim }}"
      - "  Status: {{ status_01 | default('ERROR') | trim }}"
      - "  Details: {{ details_01 | default('') | trim }}"
      - ""
      - "REQUIREMENT 02 - {{ req_02 }}:"
      - "  Task: {{ task_02_name | default('Not recorded') }}"
      - "  Command: {{ task_02_cmd | default('N/A') }}"
      - "  Exit code: {{ task_02_rc | default(-1) }}"
      - "  Data: {{ data_02 | default('') | trim }}"
      - "  Status: {{ status_02 | default('ERROR') | trim }}"
      - "  Details: {{ details_02 | default('') | trim }}"
      - ""
      - "REQUIREMENT 03 - {{ req_03 }}:"
      - "  Task: {{ task_03_name | default('Not recorded') }}"
      - "  Command: {{ task_03_cmd | default('N/A') }}"
      - "  Exit code: {{ task_03_rc | default(-1) }}"
      - "  Data: {{ data_03 | default('') | trim }}"
      - "  Status: {{ status_03 | default('ERROR') | trim }}"
      - "  Details: {{ details_03 | default('') | trim }}"
      - ""
      - "REQUIREMENT 04 - {{ req_04 }}:"
      - "  Task: {{ task_04_name | default('Not recorded') }}"
      - "  Command: {{ task_04_cmd | default('N/A') }}"
      - "  Exit code: {{ task_04_rc | default(-1) }}"
      - "  Data: {{ data_04 | default('') | trim }}"
      - "  Status: {{ status_04 | default('ERROR') | trim }}"
      - "  Details: {{ details_04 | default('') | trim }}"
      - ""
      - "REQUIREMENT 05 - {{ req_05 }}:"
      - "  Task: {{ task_05_name | default('Not recorded') }}"
      - "  Command: {{ task_05_cmd | default('N/A') }}"
      - "  Exit code: {{ task_05_rc | default(-1) }}"
      - "  Data: {{ data_05 | default('') | trim }}"
      - "  Status: {{ status_05 | default('ERROR') | trim }}"
      - "  Details: {{ details_05 | default('') | trim }}"
      - ""
      - "========================================================"
      - "OVERALL REMEDIATION:"
      - "  Result: {{ cis_result | default('ERROR') | trim }}"
      - "========================================================"
    tags: [execute]

  always:
  - name: "Restore - Remove backup directory"
    ansible.builtin.file:
      path: "{{ backup_dir }}"
      state: absent
    tags: [restore]
