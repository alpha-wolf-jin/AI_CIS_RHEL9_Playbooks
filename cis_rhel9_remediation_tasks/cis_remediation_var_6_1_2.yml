playbook_name: "cis_6_1_2"
backup_dir: "/var/log/ai-playbooks-backup/{{ playbook_name }}"
req_01: "Apply prerequisite check for aide package using command: `if ! command -v aide &>/dev/null; then echo 'AIDE not installed'; exit 1; fi`. Expected result: No output if AIDE is installed."
req_02: "Apply cron job for aide check using command: `crontab -u root -l | grep -q '/usr/sbin/aide --check' || (crontab -u root -l; echo '0 5 * * * /usr/sbin/aide --check') | crontab -u root -`. Expected result: Cron job added for daily aide check at 5 AM."
req_03: "Apply systemd service file for aide check using command: `cat > /etc/systemd/system/aidecheck.service << 'EOF' ...`. Expected result: File /etc/systemd/system/aidecheck.service created with correct content."
req_04: "Apply systemd timer file for aide check using command: `cat > /etc/systemd/system/aidecheck.timer << 'EOF' ...`. Expected result: File /etc/systemd/system/aidecheck.timer created with correct content."
req_05: "Apply ownership and permissions for systemd files using command: `chown root:root /etc/systemd/system/aidecheck.* && chmod 0644 /etc/systemd/system/aidecheck.*`. Expected result: Files owned by root:root with permissions 0644."
req_06: "Apply systemd daemon reload using command: `systemctl daemon-reload`. Expected result: Systemd configuration reloaded."
req_07: "Apply enable aidecheck service using command: `systemctl enable aidecheck.service`. Expected result: Service aidecheck.service enabled."
req_08: "Apply enable and start aidecheck timer using command: `systemctl --now enable aidecheck.timer`. Expected result: Timer aidecheck.timer enabled and started."
req_09: "Verify aide check scheduling using command: `systemctl is-active aidecheck.timer && systemctl is-enabled aidecheck.timer`. Expected result: Both commands return 'active' and 'enabled' respectively, or cron job is listed with `crontab -u root -l | grep '/usr/sbin/aide --check'`."
req_10: "Store the final remediation result in a variable named 'cis_result' using set_fact. Set cis_result to the overall remediation status (PASS/FAIL/SKIP/ERROR) derived from the last requirement's status variable."
