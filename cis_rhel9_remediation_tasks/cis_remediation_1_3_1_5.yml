---
- name: Initialize meta data variables
  include_vars: cis_remediation_var_1_3_1_5.yml

- name: "Snapshot - Create backup directory"
  ansible.builtin.file:
    path: "{{ backup_dir }}"
    state: directory
    mode: '0700'
  tags: [snapshot]
- name: "Snapshot - Check if /etc/selinux/config exists"
  ansible.builtin.stat:
    path: "/etc/selinux/config"
  register: _sg_config_stat
  tags: [snapshot]
- name: "Snapshot - Backup /etc/selinux/config if exists"
  ansible.builtin.copy:
    src: "/etc/selinux/config"
    dest: "{{ backup_dir }}/selinux_config.present"
    remote_src: true
  when: _sg_config_stat.stat.exists
  tags: [snapshot]

- block:
  - name: "Initialize data variables"
    set_fact:
      selinux_installed: false
      data_01: "Not collected yet"
      status_01: "ERROR"
      details_01: "Not evaluated"
      data_02: "Not collected yet"
      status_02: "ERROR"
      details_02: "Not evaluated"
      data_03: "Not collected yet"
      status_03: "ERROR"
      details_03: "Not evaluated"
      data_04: "Not collected yet"
      status_04: "ERROR"
      details_04: "Not evaluated"
      task_01_name: "Not executed"
      task_01_cmd: "N/A"
      task_01_rc: -1
    tags: [execute]

  - name: "Req 01 - Check if SELinux tools are installed"
    ansible.builtin.shell: which getenforce
    args:
      executable: /bin/bash
    register: result_01
    failed_when: false
    changed_when: false
    tags: [execute]

  - name: "Store requirement 01 details"
    set_fact:
      selinux_installed: "{{ (result_01.rc == 0 and result_01.stdout | default('') | trim | length > 0) }}"
      task_01_name: "Check if SELinux tools are installed"
      task_01_cmd: "which getenforce"
      task_01_rc: "{{ result_01.rc | default(-1) }}"
      data_01: "{{ result_01.stdout | default('') | trim }}"
      status_01: "{{ ('PASS' if (result_01.rc == 0 and result_01.stdout | default('') | trim | length > 0) else 'FAIL') | trim }}"
      details_01: "{{ ('SELinux tools installed: ' + result_01.stdout | default('') | trim if (result_01.rc == 0 and result_01.stdout | default('') | trim | length > 0) else 'getenforce not found') | trim }}"
    tags: [execute]

  - name: "Req 02 - Apply SELinux enforcing mode immediately"
    ansible.builtin.command: setenforce 1
    register: result_02
    failed_when: false
    changed_when: false
    when: "selinux_installed | default(false) | bool"
    tags: [execute]

  - name: "Store requirement 02 details"
    set_fact:
      task_02_name: "Apply SELinux enforcing mode immediately"
      task_02_cmd: "setenforce 1"
      task_02_rc: "{{ result_02.rc | default(-1) }}"
      data_02: "{{ result_02.stdout | default('') | trim }}"
      status_02: "{{ ('PASS' if result_02.rc | default(-1) == 0 else 'FAIL') | trim }}"
      details_02: "{{ ('SELinux enforcing mode applied immediately' if result_02.rc | default(-1) == 0 else 'Failed to apply enforcing mode') | trim }}"
    when: "selinux_installed | default(false) | bool"
    tags: [execute]

  - name: "Req 03 - Set SELINUX=enforcing in config file"
    ansible.builtin.lineinfile:
      path: /etc/selinux/config
      regexp: '^SELINUX='
      line: SELINUX=enforcing
    register: result_03
    failed_when: false
    when: "selinux_installed | default(false) | bool"
    tags: [execute]

  - name: "Store requirement 03 details"
    set_fact:
      task_03_name: "Set SELINUX=enforcing in config file"
      task_03_cmd: "lineinfile: /etc/selinux/config"
      task_03_rc: "{{ 0 if result_03 is not failed else -1 }}"
      data_03: "{{ result_03.diff | default('') | trim }}"
      status_03: "{{ ('PASS' if result_03 is not failed else 'FAIL') | trim }}"
      details_03: "{{ ('SELINUX=enforcing set in /etc/selinux/config' if result_03 is not failed else 'Failed to update config file') | trim }}"
    when: "selinux_installed | default(false) | bool"
    tags: [execute]

  - name: "Req 04 - Verify SELinux mode is enforcing"
    ansible.builtin.command: getenforce
    register: result_04
    failed_when: false
    changed_when: false
    when: "selinux_installed | default(false) | bool"
    tags: [execute]

  - name: "Store requirement 04 details"
    set_fact:
      task_04_name: "Verify SELinux mode is enforcing"
      task_04_cmd: "getenforce"
      task_04_rc: "{{ result_04.rc | default(-1) }}"
      data_04: "{{ result_04.stdout | default('') | trim }}"
      status_04: "{{ ('PASS' if (result_04.stdout | default('') | trim) == 'Enforcing' else 'FAIL') | trim }}"
      details_04: "{{ ('SELinux is enforcing' if (result_04.stdout | default('') | trim) == 'Enforcing' else 'SELinux is not enforcing') | trim }}"
    when: "selinux_installed | default(false) | bool"
    tags: [execute]

  - name: "Mark not applicable statuses if SELinux not installed"
    set_fact:
      status_02: "{{ 'SKIP' if not (selinux_installed | default(false) | bool) else status_02 }}"
      details_02: "{{ 'SELinux tools not found — remediation skipped' if not (selinux_installed | default(false) | bool) else details_02 }}"
      status_03: "{{ 'SKIP' if not (selinux_installed | default(false) | bool) else status_03 }}"
      details_03: "{{ 'SELinux tools not found — remediation skipped' if not (selinux_installed | default(false) | bool) else details_03 }}"
      status_04: "{{ 'SKIP' if not (selinux_installed | default(false) | bool) else status_04 }}"
      details_04: "{{ 'SELinux tools not found — remediation skipped' if not (selinux_installed | default(false) | bool) else details_04 }}"
    tags: [execute]

  - name: "Store the final remediation result"
    set_fact:
      cis_result: "{{ status_04 | default('ERROR') | trim }}"
    tags: [execute]

  - name: "Generate remediation report"
    debug:
      msg:
      - "REMEDIATION REPORT — CIS 1.3.1.5"
      - "Reference: CIS Benchmark checkpoint 1.3.1.5"
      - ""
      - "REQUIREMENT 01 - {{ req_01 }}:"
      - "  Task: {{ task_01_name | default('Not recorded') }}"
      - "  Command: {{ task_01_cmd | default('N/A') }}"
      - "  Exit code: {{ task_01_rc | default(-1) }}"
      - "  Data: {{ data_01 | default('') | trim }}"
      - "  Status: {{ status_01 | default('ERROR') | trim }}"
      - "  Details: {{ details_01 | default('') | trim }}"
      - ""
      - "REQUIREMENT 02 - {{ req_02 }}:"
      - "  Task: {{ task_02_name | default('Not recorded') }}"
      - "  Command: {{ task_02_cmd | default('N/A') }}"
      - "  Exit code: {{ task_02_rc | default(-1) }}"
      - "  Data: {{ data_02 | default('') | trim }}"
      - "  Status: {{ status_02 | default('ERROR') | trim }}"
      - "  Details: {{ details_02 | default('') | trim }}"
      - ""
      - "REQUIREMENT 03 - {{ req_03 }}:"
      - "  Task: {{ task_03_name | default('Not recorded') }}"
      - "  Command: {{ task_03_cmd | default('N/A') }}"
      - "  Exit code: {{ task_03_rc | default(-1) }}"
      - "  Data: {{ data_03 | default('') | trim }}"
      - "  Status: {{ status_03 | default('ERROR') | trim }}"
      - "  Details: {{ details_03 | default('') | trim }}"
      - ""
      - "REQUIREMENT 04 - {{ req_04 }}:"
      - "  Task: {{ task_04_name | default('Not recorded') }}"
      - "  Command: {{ task_04_cmd | default('N/A') }}"
      - "  Exit code: {{ task_04_rc | default(-1) }}"
      - "  Data: {{ data_04 | default('') | trim }}"
      - "  Status: {{ status_04 | default('ERROR') | trim }}"
      - "  Details: {{ details_04 | default('') | trim }}"
      - ""
      - "========================================================"
      - "OVERALL REMEDIATION:"
      - "  Result: {{ cis_result | default('ERROR') | trim }}"
      - "  Details: {{ details_04 | default('Not evaluated') | trim }}"
      - "========================================================"
    tags: [execute]

  always:
  - name: "Restore - Check if backup exists"
    ansible.builtin.stat:
      path: "{{ backup_dir }}/selinux_config.present"
    register: _restore_check
    failed_when: false
    tags: [restore]

  - name: "Restore - Overwrite with original"
    ansible.builtin.copy:
      src: "{{ backup_dir }}/selinux_config.present"
      dest: "/etc/selinux/config"
      remote_src: true
    when: _restore_check.stat.exists | default(false)
    failed_when: false
    tags: [restore]

  - name: "Restore - Remove backup directory"
    ansible.builtin.file:
      path: "{{ backup_dir }}"
      state: absent
    failed_when: false
    tags: [restore]
