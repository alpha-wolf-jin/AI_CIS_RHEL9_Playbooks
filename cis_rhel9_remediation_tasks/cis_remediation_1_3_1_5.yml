---
- name: Initialize meta data variables
  include_vars: cis_remediation_var_1_3_1_5.yml

- name: "Snapshot - Create backup directory"
  ansible.builtin.file:
    path: "{{ backup_dir }}"
    state: directory
    mode: '0700'
  tags: [snapshot]
- name: "Snapshot - Check if config file exists"
  ansible.builtin.stat:
    path: "{{ selinux_config }}"
  register: _snapshot_config_stat
  tags: [snapshot]
- name: "Snapshot - Backup config file if exists"
  ansible.builtin.copy:
    src: "{{ selinux_config }}"
    dest: "{{ backup_dir }}/selinux_config.bak"
    remote_src: true
  when: _snapshot_config_stat.stat.exists
  tags: [snapshot]

- block:
  - name: "Check if selinux-policy package is installed"
    ansible.builtin.package_facts:
      manager: auto
    failed_when: false
    tags: [execute]

  - name: "Set playbook_skipped if selinux-policy not installed"
    ansible.builtin.set_fact:
      playbook_skipped: "{{ 'selinux-policy' not in ansible_facts.packages }}"
    tags: [execute]

  - name: "Get current SELinux mode"
    ansible.builtin.command: getenforce
    register: current_selinux_mode
    failed_when: false
    when: not (playbook_skipped | default(false) | bool)
    tags: [execute]

  - name: "Req 01 - Apply SELinux enforcing mode immediately"
    ansible.builtin.command: setenforce 1
    register: result_01
    failed_when: false
    changed_when: false
    when:
    - not (playbook_skipped | default(false) | bool)
    - (current_selinux_mode.stdout | default('') | trim | lower) != 'enforcing'
    tags: [execute]

  - name: "Req 02 - Set SELINUX=enforcing in config file"
    ansible.builtin.lineinfile:
      path: "{{ selinux_config }}"
      regexp: '^SELINUX='
      line: 'SELINUX=enforcing'
    register: result_02
    failed_when: false
    when: not (playbook_skipped | default(false) | bool)
    tags: [execute]

  - name: "Req 03 - Verify SELinux mode is enforcing"
    ansible.builtin.command: getenforce
    register: result_03
    failed_when: false
    when: not (playbook_skipped | default(false) | bool)
    tags: [execute]

  - name: "Store requirement 01 details"
    ansible.builtin.set_fact:
      task_01_name: "Apply SELinux enforcing mode immediately"
      task_01_cmd: "setenforce 1"
      task_01_rc: "{{ result_01.rc | default(-1) }}"
      data_01: "{{ result_01.stdout | default('') | trim }}"
      status_01: >-
        {{-
          "SKIPPED" if (playbook_skipped | default(false)) else
          ("APPLIED" if (result_01.skipped | default(false) or (result_01.rc | default(-1) == 0)) else "FAILED")
        }}
      details_01: >-
        {{-
          "SELinux package not installed" if (playbook_skipped | default(false)) else
          ("Already enforcing – nothing to do" if (result_01.skipped | default(false)) else
          ("SELinux enforcing mode applied" if result_01.rc | default(-1) == 0 else "Failed to apply setenforce 1"))
        }}
    tags: [execute]

  - name: "Store requirement 02 details"
    ansible.builtin.set_fact:
      task_02_name: "Set SELINUX=enforcing in config file"
      task_02_cmd: "lineinfile: /etc/selinux/config"
      task_02_rc: "{{ (result_02.failed | default(true)) | ternary(1, 0) }}"
      data_02: "{{ 'SELINUX=enforcing set' if (not (playbook_skipped | default(false)) and not (result_02.failed | default(true))) else '' }}"
      status_02: >-
        {{-
          "SKIPPED" if (playbook_skipped | default(false)) else
          ("APPLIED" if not (result_02.failed | default(true)) else "FAILED")
        }}
      details_02: >-
        {{-
          "SELinux package not installed" if (playbook_skipped | default(false)) else
          ("Config line updated" if not (result_02.failed | default(true)) else "Failed to update config")
        }}
    tags: [execute]

  - name: "Store requirement 03 details"
    ansible.builtin.set_fact:
      task_03_name: "Verify SELinux mode is enforcing"
      task_03_cmd: "getenforce"
      task_03_rc: "{{ result_03.rc | default(-1) }}"
      data_03: "{{ result_03.stdout | default('') | trim }}"
      status_03: >-
        {{-
          "SKIPPED" if (playbook_skipped | default(false)) else
          ("APPLIED" if (result_03.stdout | default('') | trim == 'Enforcing') else "FAILED")
        }}
      details_03: >-
        {{-
          "SELinux package not installed" if (playbook_skipped | default(false)) else
          ("SELinux is in enforcing mode" if (result_03.stdout | default('') | trim == 'Enforcing') else "Mode is not enforcing")
        }}
    tags: [execute]

  - name: "Generate remediation report"
    ansible.builtin.debug:
      msg:
      - "========================================================================"
      - "  REMEDIATION REPORT — CIS 1.3.1.5"
      - "  Reference: CIS Benchmark checkpoint 1.3.1.5"
      - "========================================================================"
      - ""
      - "REQUIREMENT 01 - {{ req_01 }}"
      - "  Task: {{ task_01_name | default('Not executed') }}"
      - "  Command: {{ task_01_cmd | default('N/A') }}"
      - "  Exit code: {{ task_01_rc | default(-1) }}"
      - "  Data: {{ data_01 | default('') | trim }}"
      - "  Status: {{ status_01 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_01 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 02 - {{ req_02 }}"
      - "  Task: {{ task_02_name | default('Not executed') }}"
      - "  Command: {{ task_02_cmd | default('N/A') }}"
      - "  Exit code: {{ task_02_rc | default(-1) }}"
      - "  Data: {{ data_02 | default('') | trim }}"
      - "  Status: {{ status_02 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_02 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 03 - {{ req_03 }}"
      - "  Task: {{ task_03_name | default('Not executed') }}"
      - "  Command: {{ task_03_cmd | default('N/A') }}"
      - "  Exit code: {{ task_03_rc | default(-1) }}"
      - "  Data: {{ data_03 | default('') | trim }}"
      - "  Status: {{ status_03 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_03 | default('Not evaluated') | trim }}"
      - ""
      - "  OVERALL REMEDIATION RESULT"
      - "  Result: {{ status_03 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_03 | default('Not evaluated') | trim }}"
      - "========================================================================"
    tags: [execute]

  always:
  - name: "Restore - Check if backup exists"
    ansible.builtin.stat:
      path: "{{ backup_dir }}/selinux_config.bak"
    register: _restore_backup_stat
    failed_when: false
    tags: [restore]

  - name: "Restore - Overwrite with original config"
    ansible.builtin.copy:
      src: "{{ backup_dir }}/selinux_config.bak"
      dest: "{{ selinux_config }}"
      remote_src: true
    when: _restore_backup_stat.stat.exists | default(false)
    failed_when: false
    tags: [restore]

  - name: "Restore - Remove backup directory"
    ansible.builtin.file:
      path: "{{ backup_dir }}"
      state: absent
    failed_when: false
    tags: [restore]
