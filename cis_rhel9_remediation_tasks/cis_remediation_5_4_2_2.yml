---
- name: Initialize meta data variables
  include_vars: cis_remediation_var_5_4_2_2.yml

- name: "State Guard - Check for existing checkpoint"
  ansible.builtin.stat:
    path: "{{ state_guard_flag }}"
  register: _sg_flag
  tags: [snapshot]
- name: "State Guard - Restore /etc/passwd from prior checkpoint"
  ansible.builtin.copy:
    src: "{{ state_guard_dir }}/passwd.present"
    dest: "/etc/passwd"
    remote_src: true
  when: "_sg_flag.stat.exists"
  failed_when: false
  tags: [snapshot]
- name: "State Guard - Restore /etc/group from prior checkpoint"
  ansible.builtin.copy:
    src: "{{ state_guard_dir }}/group.present"
    dest: "/etc/group"
    remote_src: true
  when: "_sg_flag.stat.exists"
  failed_when: false
  tags: [snapshot]
- name: "State Guard - Remove old checkpoint"
  ansible.builtin.file:
    path: "{{ state_guard_dir }}"
    state: absent
  when: "_sg_flag.stat.exists"
  tags: [snapshot]
- name: "State Guard - Create checkpoint directory"
  ansible.builtin.file:
    path: "{{ state_guard_dir }}"
    state: directory
    mode: '0700'
  tags: [snapshot]
- name: "State Guard - Backup /etc/passwd"
  ansible.builtin.copy:
    src: "/etc/passwd"
    dest: "{{ state_guard_dir }}/passwd.present"
    remote_src: true
  tags: [snapshot]
- name: "State Guard - Backup /etc/group"
  ansible.builtin.copy:
    src: "/etc/group"
    dest: "{{ state_guard_dir }}/group.present"
    remote_src: true
  tags: [snapshot]
- name: "State Guard - Create checkpoint flag"
  ansible.builtin.copy:
    content: "checkpoint"
    dest: "{{ state_guard_flag }}"
  tags: [snapshot]

- name: "Initialize data variables"
  ansible.builtin.set_fact:
    data_01: "Not collected yet"
    status_01: "UNKNOWN"
    details_01: "Not evaluated"
    data_02: "Not collected yet"
    status_02: "UNKNOWN"
    details_02: "Not evaluated"
    data_03: "Not collected yet"
    status_03: "UNKNOWN"
    details_03: "Not evaluated"
    data_04: "Not collected yet"
    status_04: "UNKNOWN"
    details_04: "Not evaluated"
    data_05: "Not collected yet"
    status_05: "UNKNOWN"
    details_05: "Not evaluated"
    task_01_name: "Not executed"
    task_01_cmd: "N/A"
    task_01_rc: -1
    task_02_name: "Not executed"
    task_02_cmd: "N/A"
    task_02_rc: -1
    task_03_name: "Not executed"
    task_03_cmd: "N/A"
    task_03_rc: -1
    task_04_name: "Not executed"
    task_04_cmd: "N/A"
    task_04_rc: -1
    task_05_name: "Not executed"
    task_05_cmd: "N/A"
    task_05_rc: -1

- block:
  - name: "Req 01 - Check if usermod and groupmod commands are available"
    ansible.builtin.shell: "command -v usermod && command -v groupmod"
    args:
      executable: /bin/bash
    register: result_01
    failed_when: false
    changed_when: false
    tags: [execute]

  - name: "Store requirement 01 details"
    ansible.builtin.set_fact:
      task_01_name: "Check prerequisite commands"
      task_01_cmd: "command -v usermod && command -v groupmod"
      task_01_rc: "{{ result_01.rc | default(-1) }}"
      data_01: "{{ result_01.stdout | default('') | trim }}"
      status_01: "{{ 'PASS' if (result_01.rc | default(-1)) == 0 else 'FAIL' }}"
      details_01: "{{ 'Both commands available' if (result_01.rc | default(-1)) == 0 else 'One or both commands missing' }}"

  - name: "Req 02 - Set root user GID to 0"
    ansible.builtin.shell: "usermod -g 0 root"
    args:
      executable: /bin/bash
    register: result_02
    failed_when: false
    when: "(result_01.rc | default(-1)) == 0"
    tags: [execute]

  - name: "Store requirement 02 details"
    ansible.builtin.set_fact:
      task_02_name: "Set root user GID to 0"
      task_02_cmd: "usermod -g 0 root"
      task_02_rc: "{{ result_02.rc | default(-1) }}"
      data_02: "{{ result_02.stdout | default('') | trim }}"
      status_02: "{{ 'PASS' if (result_02.rc | default(-1)) == 0 else 'FAIL' }}"
      details_02: "{{ 'Root user GID set to 0' if (result_02.rc | default(-1)) == 0 else 'Failed to set root user GID' }}"
    when: "result_02 is defined"

  - name: "Req 03 - Set root group GID to 0"
    ansible.builtin.shell: "groupmod -g 0 root"
    args:
      executable: /bin/bash
    register: result_03
    failed_when: false
    when: "(result_01.rc | default(-1)) == 0"
    tags: [execute]

  - name: "Store requirement 03 details"
    ansible.builtin.set_fact:
      task_03_name: "Set root group GID to 0"
      task_03_cmd: "groupmod -g 0 root"
      task_03_rc: "{{ result_03.rc | default(-1) }}"
      data_03: "{{ result_03.stdout | default('') | trim }}"
      status_03: "{{ 'PASS' if (result_03.rc | default(-1)) == 0 else 'FAIL' }}"
      details_03: "{{ 'Root group GID set to 0' if (result_03.rc | default(-1)) == 0 else 'Failed to set root group GID' }}"
    when: "result_03 is defined"

  - name: "Req 04 - Remove or reassign non-root users with GID 0"
    ansible.builtin.shell: |
      awk -F: '($3 == 0 && $1 != "root") {print $1}' /etc/passwd | while read user; do usermod -g 9999 "$user" || userdel "$user"; done
    args:
      executable: /bin/bash
    register: result_04
    failed_when: false
    when: "(result_01.rc | default(-1)) == 0"
    tags: [execute]

  - name: "Store requirement 04 details"
    ansible.builtin.set_fact:
      task_04_name: "Remove or reassign non-root GID 0 users"
      task_04_cmd: |
        awk -F: '($3 == 0 && $1 != \"root\") {print $1}' /etc/passwd | while read user; do usermod -g 9999 \"$user\" || userdel \"$user\"; done
      task_04_rc: "{{ result_04.rc | default(-1) }}"
      data_04: "{{ result_04.stdout | default('') | trim }}"
      status_04: "{{ 'PASS' if (result_04.rc | default(-1)) == 0 else 'FAIL' }}"
      details_04: "{{ 'Non-root GID 0 users removed or reassigned' if (result_04.rc | default(-1)) == 0 else 'Failed to process non-root GID 0 users' }}"
    when: "result_04 is defined"

  - name: "Req 05 - Verify only root has GID 0"
    ansible.builtin.shell: "awk -F: '($3 == 0)' /etc/passwd"
    args:
      executable: /bin/bash
    register: result_05
    failed_when: false
    changed_when: false
    tags: [execute]

  - name: "Store requirement 05 details"
    ansible.builtin.set_fact:
      task_05_name: "Verify only root has GID 0"
      task_05_cmd: "awk -F: '($3 == 0)' /etc/passwd"
      task_05_rc: "{{ result_05.rc | default(-1) }}"
      data_05: "{{ result_05.stdout | default('') | trim }}"
      status_05: "{{ 'PASS' if (result_05.stdout | default('') | trim) == 'root:x:0:0:root:/root:/bin/bash' else 'FAIL' }}"
      details_05: "{{ 'Only root has GID 0' if (result_05.stdout | default('') | trim) == 'root:x:0:0:root:/root:/bin/bash' else 'Other users have GID 0 or verification failed' }}"

  - name: "Set final remediation result"
    ansible.builtin.set_fact:
      cis_result: "{{ status_05 | trim }}"
    tags: [execute]

  - name: "Generate remediation report"
    ansible.builtin.debug:
      msg:
      - "========================================================"
      - "        REMEDIATION REPORT — CIS 5.4.2.2"
      - "========================================================"
      - "Reference: CIS Benchmark checkpoint 5.4.2.2"
      - ""
      - "REQUIREMENT 01 - {{ req_01 }}:"
      - "  Task: {{ task_01_name | default('Task not recorded') }}"
      - "  Command: {{ task_01_cmd | default('N/A') }}"
      - "  Exit code: {{ task_01_rc | default(-1) }}"
      - "  Data: {{ data_01 | default('') | trim }}"
      - "  Status: {{ status_01 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_01 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 02 - {{ req_02 }}:"
      - "  Task: {{ task_02_name | default('Task not recorded') }}"
      - "  Command: {{ task_02_cmd | default('N/A') }}"
      - "  Exit code: {{ task_02_rc | default(-1) }}"
      - "  Data: {{ data_02 | default('') | trim }}"
      - "  Status: {{ status_02 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_02 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 03 - {{ req_03 }}:"
      - "  Task: {{ task_03_name | default('Task not recorded') }}"
      - "  Command: {{ task_03_cmd | default('N/A') }}"
      - "  Exit code: {{ task_03_rc | default(-1) }}"
      - "  Data: {{ data_03 | default('') | trim }}"
      - "  Status: {{ status_03 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_03 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 04 - {{ req_04 }}:"
      - "  Task: {{ task_04_name | default('Task not recorded') }}"
      - "  Command: {{ task_04_cmd | default('N/A') }}"
      - "  Exit code: {{ task_04_rc | default(-1) }}"
      - "  Data: {{ data_04 | default('') | trim }}"
      - "  Status: {{ status_04 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_04 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 05 - {{ req_05 }}:"
      - "  Task: {{ task_05_name | default('Task not recorded') }}"
      - "  Command: {{ task_05_cmd | default('N/A') }}"
      - "  Exit code: {{ task_05_rc | default(-1) }}"
      - "  Data: {{ data_05 | default('') | trim }}"
      - "  Status: {{ status_05 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_05 | default('Not evaluated') | trim }}"
      - ""
      - "========================================================"
      - "OVERALL REMEDIATION:"
      - "  Result: {{ cis_result | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_05 | default('Not evaluated') | trim }}"
      - "========================================================"
    tags: [execute]

  always:
  - name: "State Guard Restore - Check if checkpoint exists"
    ansible.builtin.stat:
      path: "{{ state_guard_flag }}"
    register: _sg_restore_flag
    failed_when: false
    tags: [restore]

  - name: "State Guard Restore - Check if passwd backup exists"
    ansible.builtin.stat:
      path: "{{ state_guard_dir }}/passwd.present"
    register: _sg_restore_passwd
    failed_when: false
    tags: [restore]

  - name: "State Guard Restore - Restore /etc/passwd from backup"
    ansible.builtin.copy:
      src: "{{ state_guard_dir }}/passwd.present"
      dest: "/etc/passwd"
      remote_src: true
    when: "_sg_restore_passwd.stat.exists | default(false)"
    failed_when: false
    tags: [restore]

  - name: "State Guard Restore - Check if group backup exists"
    ansible.builtin.stat:
      path: "{{ state_guard_dir }}/group.present"
    register: _sg_restore_group
    failed_when: false
    tags: [restore]

  - name: "State Guard Restore - Restore /etc/group from backup"
    ansible.builtin.copy:
      src: "{{ state_guard_dir }}/group.present"
      dest: "/etc/group"
      remote_src: true
    when: "_sg_restore_group.stat.exists | default(false)"
    failed_when: false
    tags: [restore]

  - name: "State Guard Restore - Remove checkpoint"
    ansible.builtin.file:
      path: "{{ state_guard_dir }}"
      state: absent
    when: "_sg_restore_flag.stat.exists | default(false)"
    failed_when: false
    tags: [restore]
