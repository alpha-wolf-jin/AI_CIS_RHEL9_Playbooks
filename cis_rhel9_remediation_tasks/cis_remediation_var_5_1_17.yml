playbook_name: "cis_5_1_17_maxstartups"
backup_dir: "/var/log/ai-playbooks-backup/{{ playbook_name }}"
config_file: "/etc/ssh/sshd_config"
config_param: "MaxStartups"
config_value: "10:30:60"
req_01: "Apply prerequisite check for sshd configuration using command: `which sshd && sshd -t`. Expected result: sshd binary exists and configuration syntax is valid."
req_02: "Apply MaxStartups setting to /etc/ssh/sshd_config using command: `grep -q '^MaxStartups' /etc/ssh/sshd_config && sed -i 's/^MaxStartups.*/MaxStartups 10:30:60/' /etc/ssh/sshd_config || echo 'MaxStartups 10:30:60' >> /etc/ssh/sshd_config`. Expected result: MaxStartups parameter is set to 10:30:60 in /etc/ssh/sshd_config."
req_03: "Apply removal of any duplicate MaxStartups entries after the first occurrence using command: `awk '!seen[$0]++' /etc/ssh/sshd_config > /tmp/sshd_config && mv /tmp/sshd_config /etc/ssh/sshd_config`. Expected result: Only the first occurrence of MaxStartups remains in the file."
req_04: "Apply restart of sshd service to apply changes using command: `systemctl restart sshd || service sshd restart`. Expected result: sshd service restarts successfully."
req_05: "Verify MaxStartups configuration using command: `sshd -T | grep -i maxstartups`. Expected result: Output shows 'maxstartups 10:30:60'."
req_06: "Store the final remediation result in a variable named 'cis_result' using set_fact. Set cis_result to the overall remediation status (PASS/FAIL/SKIP/ERROR) derived from the last requirement's status variable."
req_07: "Generate remediation report with OVERALL REMEDIATION and details for every requirement."
