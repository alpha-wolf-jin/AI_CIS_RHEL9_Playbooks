playbook_name: "cis_6_3_2_4"
backup_dir: "/var/log/ai-playbooks-backup/{{ playbook_name }}"
config_file: "/etc/audit/auditd.conf"
space_left_action_value: "email"
admin_space_left_action_value: "single"
req_01: "Apply prerequisite check: Ensure a Mail Transfer Agent (MTA) is installed and configured if setting space_left_action to email. Expected result: MTA is operational."
req_02: "Apply space_left_action parameter in /etc/audit/auditd.conf to email, exec, single, or halt using command: `sed -i 's/^space_left_action.*/space_left_action = email/' /etc/audit/auditd.conf`. Expected result: Parameter set to email (or chosen value)."
req_03: "Apply admin_space_left_action parameter in /etc/audit/auditd.conf to single or halt using command: `sed -i 's/^admin_space_left_action.*/admin_space_left_action = single/' /etc/audit/auditd.conf`. Expected result: Parameter set to single (or chosen value)."
req_04: "Verify the configuration by running: `grep -E '^space_left_action|^admin_space_left_action' /etc/audit/auditd.conf`. Expected result: Both parameters are set to the required values."
req_05: "Store the final remediation result in a variable named 'cis_result' using set_fact. Set cis_result to the overall remediation status (PASS/FAIL/SKIP/ERROR) derived from the last requirement's status variable."
