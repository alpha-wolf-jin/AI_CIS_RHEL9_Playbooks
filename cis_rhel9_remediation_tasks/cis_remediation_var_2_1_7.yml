playbook_name: "cis_2_1_7_ftp_server_services"
backup_dir: "/var/log/ai-playbooks-backup/{{ playbook_name }}"
req_01: "Apply check if vsftpd package is installed using command: `rpm -q vsftpd`. Expected result: package vsftpd is not installed or is listed."
req_02: "Apply stop vsftpd.service using command: `systemctl stop vsftpd.service`. Expected result: service is stopped."
req_03: "Apply remove vsftpd package using command: `dnf remove -y vsftpd`. Expected result: package is removed."
req_04: "Apply mask vsftpd.service (if package is required as dependency) using command: `systemctl mask vsftpd.service`. Expected result: service is masked."
req_05: "Apply check for other FTP server packages (e.g., proftpd, pure-ftpd) using command: `rpm -qa | grep -E '^vsftpd|proftpd|pure-ftpd'`. Expected result: no unauthorized FTP packages are installed."
req_06: "Apply verify that vsftpd.service is not active using command: `systemctl is-active vsftpd.service`. Expected result: inactive or masked."
req_07: "Store the final remediation result in a variable named 'cis_result' using set_fact. Set cis_result to the overall remediation status (PASS/FAIL/SKIP/ERROR) derived from the last requirement's status variable."
