---
- name: Initialize meta data variables
  include_vars: cis_remediation_var_1_8_1.yml

- name: "Snapshot - Check for existing checkpoint"
  ansible.builtin.stat:
    path: "{{ state_guard_flag }}"
  register: _sg_flag
  tags: [snapshot]
- name: "Snapshot - Check if previous gdm state file exists"
  ansible.builtin.stat:
    path: "{{ state_guard_dir }}/gdm_installed.state"
  register: _sg_state_stat
  when: _sg_flag.stat.exists
  tags: [snapshot]
- name: "Snapshot - Read previous gdm state"
  ansible.builtin.slurp:
    src: "{{ state_guard_dir }}/gdm_installed.state"
  register: _sg_state_slurp
  when: _sg_state_stat.stat.exists | default(false)
  tags: [snapshot]
- name: "Snapshot - Reinstall gdm if previously installed"
  ansible.builtin.dnf:
    name: "{{ package_name }}"
    state: present
  failed_when: false
  when:
  - _sg_flag.stat.exists
  - _sg_state_slurp.content | default('') | b64decode | trim == 'installed'
  tags: [snapshot]
- name: "Snapshot - Remove old checkpoint"
  ansible.builtin.file:
    path: "{{ state_guard_dir }}"
    state: absent
  when: _sg_flag.stat.exists
  tags: [snapshot]
- name: "Snapshot - Create checkpoint directory"
  ansible.builtin.file:
    path: "{{ state_guard_dir }}"
    state: directory
    mode: '0700'
  tags: [snapshot]
- name: "Snapshot - Capture gdm installed status"
  ansible.builtin.shell: "rpm -q {{ package_name }}"
  args:
    executable: /bin/bash
  register: _sg_gdm_status
  failed_when: false
  changed_when: false
  tags: [snapshot]
- name: "Snapshot - Write gdm status to file"
  ansible.builtin.copy:
    content: "{{ 'installed' if _sg_gdm_status.rc == 0 else 'not_installed' }}"
    dest: "{{ state_guard_dir }}/gdm_installed.state"
  tags: [snapshot]
- name: "Snapshot - Create checkpoint flag"
  ansible.builtin.copy:
    content: "checkpoint"
    dest: "{{ state_guard_flag }}"
  tags: [snapshot]

- block:
# === STATE GUARD – EXECUTE PHASE ===
  - name: "Req 01 - Check if {{ package_name }} is installed"
    ansible.builtin.shell: "rpm -q {{ package_name }}"
    args:
      executable: /bin/bash
    register: gdm_check_result
    failed_when: false
    changed_when: false
    tags: [execute]

  - name: "Set fact - gdm installed status"
    ansible.builtin.set_fact:
      gdm_is_installed: "{{ gdm_check_result.rc == 0 }}"
    tags: [execute]

  - name: "Req 01 - Remove {{ package_name }} package"
    ansible.builtin.dnf:
      name: "{{ package_name }}"
      state: absent
    register: remove_result
    failed_when: false
    when: gdm_is_installed
    tags: [execute]

  - name: "Req 02 - Verify {{ package_name }} is removed"
    ansible.builtin.shell: "rpm -q {{ package_name }}"
    args:
      executable: /bin/bash
    register: verify_result
    failed_when: false
    changed_when: false
    when: gdm_is_installed | default(false)
    tags: [execute]

  - name: "Set fact - requirement 01 details"
    ansible.builtin.set_fact:
      task_01_cmd: "dnf remove {{ package_name }}"
      exit_code_01: "{{ remove_result.rc | default(-1) if gdm_is_installed else -1 }}"
      data_01: "{{ remove_result.stdout | default('') if gdm_is_installed else '' }}"
      status_01: "{{ 'APPLIED' if (gdm_is_installed | default(false)) and (remove_result is defined and remove_result.failed == false) else ('SKIPPED' if not (gdm_is_installed | default(false)) else 'FAIL') }}"
      details_01: "{{ 'Package removed successfully' if (gdm_is_installed | default(false)) and (remove_result is defined and remove_result.failed == false) else ('Skipped because package not installed' if not (gdm_is_installed | default(false)) else 'Removal failed') }}"
    tags: [execute]

  - name: "Set fact - requirement 02 details"
    ansible.builtin.set_fact:
      task_02_cmd: "rpm -q {{ package_name }}"
      exit_code_02: "{{ verify_result.rc | default(-1) }}"
      data_02: "{{ verify_result.stdout | default('') }}"
      status_02: "{{ 'SKIPPED' if not (gdm_is_installed | default(false)) else ('APPLIED' if verify_result.rc != 0 else 'FAIL') }}"
      details_02: "{{ 'Skipped because package not installed' if not (gdm_is_installed | default(false)) else ('Package not installed (verified)' if verify_result.rc != 0 else 'Package still installed') }}"
    tags: [execute]

  - name: "Set fact - overall status"
    ansible.builtin.set_fact:
      overall_status: "{{ 'FAIL' if 'FAIL' in [status_01, status_02] else ('SKIPPED' if status_01 == 'SKIPPED' and status_02 == 'SKIPPED' else 'APPLIED') }}"
    tags: [execute]

  - name: "Generate remediation report"
    ansible.builtin.debug:
      msg:
      - "========================================================"
      - "        REMEDIATION REPORT — CIS 1.8.1"
      - "========================================================"
      - "Reference: CIS Benchmark checkpoint 1.8.1"
      - ""
      - "REQUIREMENT 01 - {{ req_01 }}:"
      - "  Task: Remove {{ package_name }} package"
      - "  Command: {{ task_01_cmd }}"
      - "  Exit code: {{ exit_code_01 }}"
      - "  Data: {{ data_01 | trim }}"
      - "  Status: {{ status_01 }}"
      - "  Details: {{ details_01 }}"
      - ""
      - "REQUIREMENT 02 - {{ req_02 }}:"
      - "  Task: Verify {{ package_name }} removed"
      - "  Command: {{ task_02_cmd }}"
      - "  Exit code: {{ exit_code_02 }}"
      - "  Data: {{ data_02 | trim }}"
      - "  Status: {{ status_02 }}"
      - "  Details: {{ details_02 }}"
      - ""
      - "========================================================"
      - "OVERALL REMEDIATION:"
      - "  Result: {{ overall_status }}"
      - "  Details:"
      - "    Requirement 01: {{ status_01 }}"
      - "    Requirement 02: {{ status_02 }}"
      - "========================================================"
    tags: [execute]

  always:
# === STATE GUARD – RESTORE PHASE (GUARANTEED) ===
  - name: "Restore - Check if checkpoint exists"
    ansible.builtin.stat:
      path: "{{ state_guard_flag }}"
    register: _sg_restore_flag
    failed_when: false
    tags: [restore]

  - name: "Restore - Read original gdm state"
    ansible.builtin.slurp:
      src: "{{ state_guard_dir }}/gdm_installed.state"
    register: _sg_restore_state
    when: _sg_restore_flag.stat.exists
    failed_when: false
    tags: [restore]

  - name: "Restore - Reinstall gdm if originally installed"
    ansible.builtin.dnf:
      name: "{{ package_name }}"
      state: present
    when:
    - _sg_restore_flag.stat.exists
    - _sg_restore_state.content | default('') | b64decode | trim == 'installed'
    failed_when: false
    tags: [restore]

  - name: "Restore - Remove checkpoint"
    ansible.builtin.file:
      path: "{{ state_guard_dir }}"
      state: absent
    when: _sg_restore_flag.stat.exists
    failed_when: false
    tags: [restore]
