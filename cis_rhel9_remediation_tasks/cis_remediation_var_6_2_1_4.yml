playbook_name: "cis_6_2_1_4"
checkpoint_id: "cis_6_2_1_4"
state_guard_dir: "/usr/local/bin/cis/.cis_state_guard/{{ checkpoint_id }}"
state_guard_flag: "{{ state_guard_dir }}/checkpoint.flag"
req_01: "Apply prerequisite check for systemd-journald using command: dpkg -l | grep -E 'systemd-journald|rsyslog'. Expected result: systemd-journald or rsyslog is installed."
req_02: "Apply decision to use either journald or rsyslog based on site needs. Expected result: one logging system is selected."
req_03: "Apply configuration of systemd-journald.service using command: systemctl edit systemd-journald.service. Expected result: systemd-journald.service is configured as per site policy."
req_04: "Apply configuration of only one logging system (journald or rsyslog) and complete recommendations in the corresponding subsection. Expected result: only one logging system is active and configured."
req_05: "Apply verification that only one logging service is active using command: systemctl is-active systemd-journald.service && systemctl is-active rsyslog.service. Expected result: only one service shows 'active' status."
req_06: "Apply configuration of systemd-journal-remote (if journald is selected) using command: systemctl edit systemd-journal-upload.service. Expected result: systemd-journal-remote is configured for remote logging."
req_07: "Apply restart of systemd-journald after configuration changes using command: systemctl restart systemd-journald. Expected result: systemd-journald restarts successfully."
req_08: "Apply verify step: ensure only one logging system is in use using command: systemctl list-units --type=service | grep -E 'systemd-journald|rsyslog'. Expected result: only one logging service is listed as active."
selected_logging: "journald"
