---
- name: Initialize meta data variables
  include_vars: cis_remediation_var_6_3_4_2.yml

- name: "State Guard - Check for existing checkpoint"
  ansible.builtin.stat:
    path: "{{ state_guard_flag }}"
  register: _sg_flag
  tags: [snapshot]
- name: "State Guard - Restore auditd.conf from prior checkpoint"
  ansible.builtin.copy:
    src: "{{ state_guard_dir }}/auditd.conf.present"
    dest: "{{ audit_conf }}"
    remote_src: true
  when: "_sg_flag.stat.exists"
  failed_when: false
  tags: [snapshot]
- name: "State Guard - Remove old checkpoint"
  ansible.builtin.file:
    path: "{{ state_guard_dir }}"
    state: absent
  when: "_sg_flag.stat.exists"
  tags: [snapshot]
- name: "State Guard - Create checkpoint directory"
  ansible.builtin.file:
    path: "{{ state_guard_dir }}"
    state: directory
    mode: '0700'
  tags: [snapshot]
- name: "State Guard - Check if auditd.conf exists"
  ansible.builtin.stat:
    path: "{{ audit_conf }}"
  register: _sg_conf_stat
  tags: [snapshot]
- name: "State Guard - Backup auditd.conf"
  ansible.builtin.copy:
    src: "{{ audit_conf }}"
    dest: "{{ state_guard_dir }}/auditd.conf.present"
    remote_src: true
  when: "_sg_conf_stat.stat.exists"
  tags: [snapshot]
- name: "State Guard - Create checkpoint flag"
  ansible.builtin.copy:
    content: "checkpoint"
    dest: "{{ state_guard_flag }}"
  tags: [snapshot]

- block:
  - name: "Req 01 - Check if auditd configuration file exists"
    ansible.builtin.stat:
      path: "{{ audit_conf }}"
    register: result_01
    failed_when: false
    tags: [execute]

  - name: "Store requirement 01 details"
    ansible.builtin.set_fact:
      task_01_name: "Check if auditd configuration file exists"
      task_01_cmd: "stat {{ audit_conf }}"
      task_01_rc: "{{ result_01.stat.exists | ternary(0, 1) }}"
      data_01: "{{ result_01.stat.exists | ternary('File exists', 'File not found') }}"
      status_01: "{{ 'PASS' if result_01.stat.exists else 'FAIL' }}"
      details_01: "{{ 'auditd.conf found' if result_01.stat.exists else 'auditd.conf not found' }}"
    tags: [execute]

  - name: "Req 02 - Remove permissive modes from audit log files"
    ansible.builtin.shell: |
      find "$(dirname $(awk -F "=" '/^\s*log_file/ {print $2}' {{ audit_conf }} | xargs))" -type f -perm /0137 -exec chmod u-x,g-wx,o-rwx {} +
    args:
      executable: /bin/bash
    register: result_02
    failed_when: false
    changed_when: false
    when: "result_01.stat.exists | default(false)"
    tags: [execute]

  - name: "Store requirement 02 details"
    ansible.builtin.set_fact:
      task_02_name: "Remove permissive modes from audit log files"
      task_02_cmd: |
        find \"$(dirname $(awk -F \"=\" '/^\\s*log_file/ {print $2}' {{ audit_conf }} | xargs))\" -type f -perm /0137 -exec chmod u-x,g-wx,o-rwx {} +
      task_02_rc: "{{ result_02.rc | default(-1) }}"
      data_02: "{{ result_02.stdout | default('') | trim }}"
      status_02: "{{ 'SKIP' if not (result_01.stat.exists | default(false)) else ('PASS' if result_02.rc | default(-1) == 0 else 'FAIL') }}"
      details_02: "{{ 'Skipped - auditd.conf not found' if not (result_01.stat.exists | default(false)) else ('Permissions corrected' if result_02.rc | default(-1) == 0 else 'Failed to correct permissions') }}"
    tags: [execute]

  - name: "Req 03 - Verify audit log file modes are correctly configured"
    ansible.builtin.shell: |
      find "$(dirname $(awk -F "=" '/^\s*log_file/ {print $2}' {{ audit_conf }} | xargs))" -type f -perm /0137
    args:
      executable: /bin/bash
    register: result_03
    failed_when: false
    changed_when: false
    when: "result_01.stat.exists | default(false)"
    tags: [execute]

  - name: "Store requirement 03 details"
    ansible.builtin.set_fact:
      task_03_name: "Verify audit log file modes"
      task_03_cmd: |
        find \"$(dirname $(awk -F \"=\" '/^\\s*log_file/ {print $2}' {{ audit_conf }} | xargs))\" -type f -perm /0137
      task_03_rc: "{{ result_03.rc | default(-1) }}"
      data_03: "{{ result_03.stdout | default('') | trim }}"
      status_03: "{{ 'SKIP' if not (result_01.stat.exists | default(false)) else ('PASS' if (result_03.stdout | default('') | trim | length == 0) else 'FAIL') }}"
      details_03: "{{ 'Skipped - auditd.conf not found' if not (result_01.stat.exists | default(false)) else ('No overly permissive files found' if (result_03.stdout | default('') | trim | length == 0) else 'Overly permissive files remain') }}"
    tags: [execute]

  - name: "Store final remediation result as cis_result"
    ansible.builtin.set_fact:
      cis_result: "{{ status_03 | default('UNKNOWN') | trim }}"
    tags: [execute]

  - name: "Generate remediation report"
    ansible.builtin.debug:
      msg:
      - "========================================================"
      - "        REMEDIATION REPORT — CIS 6.3.4.2"
      - "Reference: CIS Benchmark checkpoint 6.3.4.2"
      - "========================================================"
      - ""
      - "REQUIREMENT 01 - {{ req_01 }}:"
      - "  Task: {{ task_01_name | default('Task not recorded') }}"
      - "  Command: {{ task_01_cmd | default('N/A') }}"
      - "  Exit code: {{ task_01_rc | default(-1) }}"
      - "  Data: {{ data_01 | default('Data collection failed') | trim }}"
      - "  Status: {{ status_01 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_01 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 02 - {{ req_02 }}:"
      - "  Task: {{ task_02_name | default('Task not recorded') }}"
      - "  Command: {{ task_02_cmd | default('N/A') }}"
      - "  Exit code: {{ task_02_rc | default(-1) }}"
      - "  Data: {{ data_02 | default('Data collection failed') | trim }}"
      - "  Status: {{ status_02 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_02 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 03 - {{ req_03 }}:"
      - "  Task: {{ task_03_name | default('Task not recorded') }}"
      - "  Command: {{ task_03_cmd | default('N/A') }}"
      - "  Exit code: {{ task_03_rc | default(-1) }}"
      - "  Data: {{ data_03 | default('Data collection failed') | trim }}"
      - "  Status: {{ status_03 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_03 | default('Not evaluated') | trim }}"
      - ""
      - "========================================================"
      - "OVERALL REMEDIATION:"
      - "  Result: {{ cis_result | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_03 | default('Not evaluated') | trim }}"
      - "========================================================"
    tags: [execute]

  always:
  - name: "State Guard Restore - Check if checkpoint exists"
    ansible.builtin.stat:
      path: "{{ state_guard_flag }}"
    register: _sg_restore_flag
    failed_when: false
    tags: [restore]

  - name: "State Guard Restore - Check if auditd.conf backup exists"
    ansible.builtin.stat:
      path: "{{ state_guard_dir }}/auditd.conf.present"
    register: _sg_restore_conf
    failed_when: false
    tags: [restore]

  - name: "State Guard Restore - Restore auditd.conf from backup"
    ansible.builtin.copy:
      src: "{{ state_guard_dir }}/auditd.conf.present"
      dest: "{{ audit_conf }}"
      remote_src: true
    when: "_sg_restore_conf.stat.exists | default(false)"
    failed_when: false
    tags: [restore]

  - name: "State Guard Restore - Remove checkpoint"
    ansible.builtin.file:
      path: "{{ state_guard_dir }}"
      state: absent
    when: "_sg_restore_flag.stat.exists | default(false)"
    failed_when: false
    tags: [restore]
