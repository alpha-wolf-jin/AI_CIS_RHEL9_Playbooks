---
- name: Initialize meta data variables
  include_vars: cis_remediation_var_6_2_3_6.yml

- name: "State Guard - Check for existing checkpoint"
  ansible.builtin.stat:
    path: "{{ state_guard_flag }}"
  register: _sg_flag
  tags: [snapshot]
- name: "State Guard - Restore {{ rsyslog_conf }} from prior checkpoint"
  ansible.builtin.copy:
    src: "{{ state_guard_dir }}/rsyslog.conf.present"
    dest: "{{ rsyslog_conf }}"
    remote_src: true
  when: "_sg_flag.stat.exists"
  failed_when: false
  tags: [snapshot]
- name: "State Guard - Remove old checkpoint"
  ansible.builtin.file:
    path: "{{ state_guard_dir }}"
    state: absent
  when: "_sg_flag.stat.exists"
  tags: [snapshot]
- name: "State Guard - Create checkpoint directory"
  ansible.builtin.file:
    path: "{{ state_guard_dir }}"
    state: directory
    mode: '0700'
  tags: [snapshot]
- name: "State Guard - Check if {{ rsyslog_conf }} exists"
  ansible.builtin.stat:
    path: "{{ rsyslog_conf }}"
  register: _sg_rsyslog_conf_stat
  tags: [snapshot]
- name: "State Guard - Backup {{ rsyslog_conf }}"
  ansible.builtin.copy:
    src: "{{ rsyslog_conf }}"
    dest: "{{ state_guard_dir }}/rsyslog.conf.present"
    remote_src: true
  when: "_sg_rsyslog_conf_stat.stat.exists"
  tags: [snapshot]
- name: "State Guard - Create checkpoint flag"
  ansible.builtin.copy:
    content: "checkpoint"
    dest: "{{ state_guard_flag }}"
  tags: [snapshot]

- name: "Initialize data variables"
  ansible.builtin.set_fact:
    data_01: "Not collected yet"
    status_01: "UNKNOWN"
    details_01: "Not evaluated"
    task_01_name: "Not executed"
    task_01_cmd: "N/A"
    task_01_rc: -1
    data_02: "Not collected yet"
    status_02: "UNKNOWN"
    details_02: "Not evaluated"
    task_02_name: "Not executed"
    task_02_cmd: "N/A"
    task_02_rc: -1
    data_03: "Not collected yet"
    status_03: "UNKNOWN"
    details_03: "Not evaluated"
    task_03_name: "Not executed"
    task_03_cmd: "N/A"
    task_03_rc: -1
    data_04: "Not collected yet"
    status_04: "UNKNOWN"
    details_04: "Not evaluated"
    task_04_name: "Not executed"
    task_04_cmd: "N/A"
    task_04_rc: -1
    playbook_skipped: false
  tags: [execute]
- block:
        # === STATE GUARD — EXECUTE PHASE ===

  - name: "Req 01 - Check if rsyslog is installed and operational"
    ansible.builtin.shell: "which rsyslogd && systemctl is-active rsyslog"
    args:
      executable: /bin/bash
    register: result_01
    failed_when: false
    changed_when: false
    tags: [execute]

  - name: "Store requirement 01 details"
    ansible.builtin.set_fact:
      task_01_name: "Check if rsyslog is installed and operational"
      task_01_cmd: "which rsyslogd && systemctl is-active rsyslog"
      task_01_rc: "{{ result_01.rc | default(-1) }}"
      data_01: "{{ result_01.stdout | default('') | trim }}"
      status_01: "{{ 'PASS' if (result_01.rc | default(-1)) == 0 else 'FAIL' }}"
      details_01: "{{ 'rsyslogd found and service active' if (result_01.rc | default(-1)) == 0 else 'rsyslog not installed or not active' }}"
      playbook_skipped: "{{ (result_01.rc | default(-1)) != 0 }}"
    tags: [execute]

  - name: "Req 02 - Add remote log forwarding configuration"
    ansible.builtin.lineinfile:
      path: "{{ rsyslog_conf }}"
      line: "{{ rsyslog_forward_line }}"
      create: yes
      backup: yes
    register: result_02
    failed_when: false
    when: "not playbook_skipped"
    tags: [execute]

  - name: "Store requirement 02 details"
    ansible.builtin.set_fact:
      task_02_name: "Add remote log forwarding configuration"
      task_02_cmd: "lineinfile: add '{{ rsyslog_forward_line }}' to {{ rsyslog_conf }}"
      task_02_rc: "{{ 0 if not result_02.failed else 1 }}"
      data_02: "{{ 'Line added/verified in ' + rsyslog_conf if not result_02.failed else 'Failed to add line' }}"
      status_02: "{{ 'PASS' if not result_02.failed else 'FAIL' }}"
      details_02: "{{ 'Remote log forwarding configured' if not result_02.failed else 'Configuration failed' }}"
    when: "not playbook_skipped"
    tags: [execute]

  - name: "Req 03 - Reload rsyslog service"
    ansible.builtin.systemd:
      name: rsyslog
      state: reloaded
    register: result_03
    failed_when: false
    when: "not playbook_skipped"
    tags: [execute]

  - name: "Store requirement 03 details"
    ansible.builtin.set_fact:
      task_03_name: "Reload rsyslog service"
      task_03_cmd: "systemctl reload-or-restart rsyslog.service"
      task_03_rc: "{{ 0 if not result_03.failed else 1 }}"
      data_03: "{{ 'Service reloaded' if not result_03.failed else 'Failed to reload' }}"
      status_03: "{{ 'PASS' if not result_03.failed else 'FAIL' }}"
      details_03: "{{ 'rsyslog service reloaded successfully' if not result_03.failed else 'Service reload failed' }}"
    when: "not playbook_skipped"
    tags: [execute]

  - name: "Req 04 - Verify remote log host configuration and service status"
    ansible.builtin.shell: "grep -r '{{ remote_log_host }}' {{ rsyslog_conf }} {{ rsyslog_conf_d }}/ 2>/dev/null && systemctl status rsyslog"
    args:
      executable: /bin/bash
    register: result_04
    failed_when: false
    changed_when: false
    when: "not playbook_skipped"
    tags: [execute]

  - name: "Store requirement 04 details"
    ansible.builtin.set_fact:
      task_04_name: "Verify remote log host configuration and service status"
      task_04_cmd: "grep -r '{{ remote_log_host }}' {{ rsyslog_conf }} {{ rsyslog_conf_d }}/ && systemctl status rsyslog"
      task_04_rc: "{{ result_04.rc | default(-1) }}"
      data_04: "{{ result_04.stdout | default('') | trim }}"
      status_04: "{{ 'PASS' if (result_04.rc | default(-1)) == 0 else 'FAIL' }}"
      details_04: "{{ 'Remote host configured and service active' if (result_04.rc | default(-1)) == 0 else 'Verification failed' }}"
    when: "not playbook_skipped"
    tags: [execute]

  - name: "Generate remediation report"
    ansible.builtin.debug:
      msg:
      - "========================================================"
      - "        REMEDIATION REPORT — CIS 6.2.3.6"
      - "========================================================"
      - "Reference: CIS Benchmark checkpoint 6.2.3.6"
      - ""
      - "REQUIREMENT 01 - {{ req_01 }}:"
      - "  Task: {{ task_01_name | default('Task not recorded') }}"
      - "  Command: {{ task_01_cmd | default('N/A') }}"
      - "  Exit code: {{ task_01_rc | default(-1) }}"
      - "  Data: {{ data_01 | default('Data collection failed') | trim }}"
      - "  Status: {{ status_01 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_01 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 02 - {{ req_02 }}:"
      - "  Task: {{ task_02_name | default('Task not recorded') }}"
      - "  Command: {{ task_02_cmd | default('N/A') }}"
      - "  Exit code: {{ task_02_rc | default(-1) }}"
      - "  Data: {{ data_02 | default('Data collection failed') | trim }}"
      - "  Status: {{ status_02 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_02 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 03 - {{ req_03 }}:"
      - "  Task: {{ task_03_name | default('Task not recorded') }}"
      - "  Command: {{ task_03_cmd | default('N/A') }}"
      - "  Exit code: {{ task_03_rc | default(-1) }}"
      - "  Data: {{ data_03 | default('Data collection failed') | trim }}"
      - "  Status: {{ status_03 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_03 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 04 - {{ req_04 }}:"
      - "  Task: {{ task_04_name | default('Task not recorded') }}"
      - "  Command: {{ task_04_cmd | default('N/A') }}"
      - "  Exit code: {{ task_04_rc | default(-1) }}"
      - "  Data: {{ data_04 | default('Data collection failed') | trim }}"
      - "  Status: {{ status_04 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_04 | default('Not evaluated') | trim }}"
      - ""
      - "========================================================"
      - "OVERALL REMEDIATION:"
      - "  Result: {{ status_04 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_04 | default('Not evaluated') | trim }}"
      - "========================================================"
    tags: [execute]

  always:
# === STATE GUARD — RESTORE PHASE (GUARANTEED) ===
  - name: "State Guard Restore - Check if checkpoint exists"
    ansible.builtin.stat:
      path: "{{ state_guard_flag }}"
    register: _sg_restore_flag
    failed_when: false
    tags: [restore]

  - name: "State Guard Restore - Check if rsyslog.conf backup exists"
    ansible.builtin.stat:
      path: "{{ state_guard_dir }}/rsyslog.conf.present"
    register: _sg_restore_rsyslog_conf
    failed_when: false
    tags: [restore]

  - name: "State Guard Restore - Restore {{ rsyslog_conf }} from backup"
    ansible.builtin.copy:
      src: "{{ state_guard_dir }}/rsyslog.conf.present"
      dest: "{{ rsyslog_conf }}"
      remote_src: true
    when: "_sg_restore_rsyslog_conf.stat.exists | default(false)"
    failed_when: false
    tags: [restore]

  - name: "State Guard Restore - Remove checkpoint"
    ansible.builtin.file:
      path: "{{ state_guard_dir }}"
      state: absent
    when: "_sg_restore_flag.stat.exists | default(false)"
    failed_when: false
    tags: [restore]
