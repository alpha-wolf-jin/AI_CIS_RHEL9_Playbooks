---
- name: Initialize meta data variables
  include_vars: cis_remediation_var_1_3_1_2.yml

- name: "Snapshot - Create backup directory"
  ansible.builtin.file:
    path: "{{ backup_dir }}"
    state: directory
    mode: '0700'
  tags: [snapshot]
- name: "Snapshot - Backup bootloader directories"
  ansible.builtin.shell: |
    tar czf {{ backup_dir }}/bootloader_backup.tar.gz /boot/grub2 /boot/efi --ignore-failed-read 2>/dev/null || true
  args:
    executable: /bin/bash
  changed_when: false
  tags: [snapshot]

- block:
  - name: "Req 1 - Check grubby is installed"
    ansible.builtin.shell: which grubby
    args:
      executable: /bin/bash
    register: result_01
    failed_when: false
    changed_when: false
    tags: [execute]

  - name: "Store requirement 01 details"
    set_fact:
      grubby_available: "{{ result_01.rc == 0 }}"
      task_01_name: "Check grubby installed"
      task_01_cmd: "which grubby"
      task_01_rc: "{{ result_01.rc }}"
      data_01: "{{ result_01.stdout | default('') | trim }}"
      status_01: "{{ 'APPLIED' if result_01.rc == 0 else 'SKIPPED' }}"
      details_01: "{{ 'grubby found at ' + result_01.stdout if result_01.rc == 0 else 'grubby not installed, skipping remediation' }}"
    tags: [execute]

  - name: "Req 2 - Remove selinux=0 and enforcing=0 from all kernels"
    ansible.builtin.shell: grubby --update-kernel ALL --remove-args "selinux=0 enforcing=0"
    args:
      executable: /bin/bash
    register: result_02
    failed_when: false
    when: grubby_available
    tags: [execute]

  - name: "Store requirement 02 details"
    set_fact:
      task_02_name: "Remove selinux and enforcing boot parameters"
      task_02_cmd: 'grubby --update-kernel ALL --remove-args "selinux=0 enforcing=0"'
      task_02_rc: "{{ result_02.rc | default(-1) }}"
      data_02: "{{ result_02.stdout | default('') | trim }}"
      status_02: "{{ 'APPLIED' if result_02.rc | default(-1) == 0 else 'FAILED' if grubby_available else 'SKIPPED' }}"
      details_02: "{{ 'Parameters removed' if result_02.rc | default(-1) == 0 else 'Failed to remove parameters' if grubby_available else 'Skipped because grubby not available' }}"
    when: grubby_available
    tags: [execute]

  - name: "Req 3 - Check for deprecated kernelopts in grub config"
    ansible.builtin.shell: |
      grep -Prsq -- '\h*([^#\n\r]+\h+)?kernelopts=([^#\n\r]+\h+)?(selinux|enforcing)=0\b' /boot/grub2 /boot/efi
    args:
      executable: /bin/bash
    register: result_03
    failed_when: false
    changed_when: false
    when: grubby_available
    tags: [execute]

  - name: "Store requirement 03 details"
    set_fact:
      deprecated_found: "{{ result_03.rc == 0 }}"
      task_03_name: "Check deprecated kernelopts"
      task_03_cmd: |
        grep -Prsq -- '\\h*([^#\\n\\r]+\\h+)?kernelopts=([^#\\n\\r]+\\h+)?(selinux|enforcing)=0\\b' /boot/grub2 /boot/efi
      task_03_rc: "{{ result_03.rc }}"
      data_03: "{{ result_03.stdout | default('') | trim }}"
      status_03: "{{ 'PASS' if result_03.rc == 1 else 'DEPRECATED' if result_03.rc == 0 else 'ERROR' }}"
      details_03: "{{ 'No deprecated entries found' if result_03.rc == 1 else 'Deprecated entries found' if result_03.rc == 0 else 'Error checking' }}"
    when: grubby_available
    tags: [execute]

  - name: "Req 4 - Regenerate grub config if deprecated kernelopts found"
    ansible.builtin.shell: |
      grub2-mkconfig -o "$(grep -Prl -- '\h*([^#\n\r]+\h+)?kernelopts=([^#\n\r]+\h+)?(selinux|enforcing)=0\b' /boot/grub2 /boot/efi)"
    args:
      executable: /bin/bash
    register: result_04
    failed_when: false
    when:
    - grubby_available
    - deprecated_found | default(false)
    tags: [execute]

  - name: "Store requirement 04 details"
    set_fact:
      task_04_name: "Regenerate grub configuration"
      task_04_cmd: |
        grub2-mkconfig -o "$(grep -Prl -- \'\\h*([^#\\n\\r]+\\h+)?kernelopts=([^#\\n\\r]+\\h+)?(selinux|enforcing)=0\\b\' /boot/grub2 /boot/efi)"
      task_04_rc: "{{ result_04.rc | default(-1) }}"
      data_04: "{{ result_04.stdout | default('') | trim }}"
      status_04: "{{ 'APPLIED' if result_04.rc | default(-1) == 0 else 'FAILED' if deprecated_found | default(false) and grubby_available else 'SKIPPED' }}"
      details_04: "{{ 'Grub config regenerated' if result_04.rc | default(-1) == 0 else 'Failed to regenerate' if deprecated_found | default(false) else 'No deprecated entries to fix' }}"
    when:
    - grubby_available
    - deprecated_found | default(false)
    tags: [execute]

  - name: "Req 5 - Verify SELinux not disabled in bootloader configuration"
    ansible.builtin.shell: |
      grubby --info=ALL | grep -E 'selinux=0|enforcing=0'
    args:
      executable: /bin/bash
    register: result_05
    failed_when: false
    changed_when: false
    when: grubby_available
    tags: [execute]

  - name: "Store requirement 05 details"
    set_fact:
      task_05_name: "Verify SELinux boot parameters absent"
      task_05_cmd: "grubby --info=ALL | grep -E 'selinux=0|enforcing=0'"
      task_05_rc: "{{ result_05.rc | default(-1) }}"
      data_05: "{{ result_05.stdout | default('') | trim }}"
      status_05: "{{ 'PASS' if result_05.rc | default(-1) != 0 else 'FAIL' if grubby_available else 'SKIPPED' }}"
      details_05: "{{ 'No selinux=0 or enforcing=0 found' if result_05.rc | default(-1) != 0 else 'Parameters still present' if grubby_available else 'Skipped' }}"
    when: grubby_available
    tags: [execute]

  - name: "Generate remediation report"
    debug:
      msg:
      - "REMEDIATION REPORT — CIS 1.3.1.2"
      - "Reference: CIS Benchmark checkpoint 1.3.1.2"
      - ""
      - "Requirement 1 - {{ req_01 }}"
      - "  Task: {{ task_01_name }}"
      - "  Command: {{ task_01_cmd }}"
      - "  Exit code: {{ task_01_rc }}"
      - "  Data: {{ data_01 }}"
      - "  Status: {{ status_01 }}"
      - "  Details: {{ details_01 }}"
      - ""
      - "Requirement 2 - {{ req_02 }}"
      - "  Task: {{ task_02_name | default('Not executed') }}"
      - "  Command: {{ task_02_cmd | default('N/A') }}"
      - "  Exit code: {{ task_02_rc | default(-1) }}"
      - "  Data: {{ data_02 | default('') }}"
      - "  Status: {{ status_02 | default('SKIPPED') }}"
      - "  Details: {{ details_02 | default('Skipped') }}"
      - ""
      - "Requirement 3 - {{ req_03 }}"
      - "  Task: {{ task_03_name | default('Not executed') }}"
      - "  Command: {{ task_03_cmd | default('N/A') }}"
      - "  Exit code: {{ task_03_rc | default(-1) }}"
      - "  Data: {{ data_03 | default('') }}"
      - "  Status: {{ status_03 | default('SKIPPED') }}"
      - "  Details: {{ details_03 | default('Skipped') }}"
      - ""
      - "Requirement 4 - {{ req_04 }}"
      - "  Task: {{ task_04_name | default('Not executed') }}"
      - "  Command: {{ task_04_cmd | default('N/A') }}"
      - "  Exit code: {{ task_04_rc | default(-1) }}"
      - "  Data: {{ data_04 | default('') }}"
      - "  Status: {{ status_04 | default('SKIPPED') }}"
      - "  Details: {{ details_04 | default('Skipped') }}"
      - ""
      - "Requirement 5 - {{ req_05 }}"
      - "  Task: {{ task_05_name | default('Not executed') }}"
      - "  Command: {{ task_05_cmd | default('N/A') }}"
      - "  Exit code: {{ task_05_rc | default(-1) }}"
      - "  Data: {{ data_05 | default('') }}"
      - "  Status: {{ status_05 | default('SKIPPED') }}"
      - "  Details: {{ details_05 | default('Skipped') }}"
      - ""
      - ""
      - "OVERALL REMEDIATION"
      - "  Result: {{ status_05 | default('SKIPPED') }}"
      - "  Details: {{ details_05 | default('No verification performed') }}"
    tags: [execute]

  always:
  - name: "Restore - Check if backup exists"
    ansible.builtin.stat:
      path: "{{ backup_dir }}/bootloader_backup.tar.gz"
    register: _restore_backup_stat
    failed_when: false
    tags: [restore]

  - name: "Restore - Extract backup to restore original bootloader configs"
    ansible.builtin.shell: "tar xzf {{ backup_dir }}/bootloader_backup.tar.gz -C /"
    args:
      executable: /bin/bash
    when: _restore_backup_stat.stat.exists | default(false)
    failed_when: false
    tags: [restore]

  - name: "Restore - Remove backup directory"
    ansible.builtin.file:
      path: "{{ backup_dir }}"
      state: absent
    failed_when: false
    tags: [restore]
