---
- name: Initialize meta data variables
  include_vars: cis_remediation_var_1_3_1_2.yml

- name: "Snapshot - Create backup directory"
  ansible.builtin.file:
    path: "{{ backup_dir }}"
    state: directory
    mode: '0700'
  tags: [snapshot]

- block:
  - name: "Initialize data variables"
    ansible.builtin.set_fact:
      data_01: "Not collected yet"
      status_01: "ERROR"
      details_01: "Not evaluated"
      data_02: "Not collected yet"
      status_02: "ERROR"
      details_02: "Not evaluated"
      data_03: "Not collected yet"
      status_03: "ERROR"
      details_03: "Not evaluated"
      data_04: "Not collected yet"
      status_04: "ERROR"
      details_04: "Not evaluated"
      data_05: "Not collected yet"
      status_05: "ERROR"
      details_05: "Not evaluated"
      data_06: "Not collected yet"
      status_06: "ERROR"
      details_06: "Not evaluated"
      task_01_name: "Not executed"
      task_01_cmd: "N/A"
      task_01_rc: -1
      task_02_name: "Not executed"
      task_02_cmd: "N/A"
      task_02_rc: -1
      task_03_name: "Not executed"
      task_03_cmd: "N/A"
      task_03_rc: -1
      task_04_name: "Not executed"
      task_04_cmd: "N/A"
      task_04_rc: -1
      task_05_name: "Not executed"
      task_05_cmd: "N/A"
      task_05_rc: -1
      task_06_name: "Not executed"
      task_06_cmd: "N/A"
      task_06_rc: -1
    tags: [execute]

  - name: "Req 01 - Ensure grubby is installed"
    ansible.builtin.shell: which grubby || dnf install -y grubby
    args:
      executable: /bin/bash
    register: result_01
    failed_when: false
    tags: [execute]

  - name: "Store requirement 01 details"
    ansible.builtin.set_fact:
      task_01_name: "Ensure grubby is installed"
      task_01_cmd: "which grubby || dnf install -y grubby"
      task_01_rc: "{{ result_01.rc | default(-1) }}"
      data_01: "{{ result_01.stdout | default('') | trim }}"
      status_01: "{{ 'PASS' if result_01.rc | default(-1) == 0 else 'FAIL' | trim }}"
      details_01: "{{ 'grubby is available' if result_01.rc | default(-1) == 0 else 'Failed to ensure grubby is installed' | trim }}"
    tags: [execute]

  - name: "Req 02 - Remove selinux=0 and enforcing=0 from all kernels"
    ansible.builtin.shell: grubby --update-kernel ALL --remove-args "selinux=0 enforcing=0"
    args:
      executable: /bin/bash
    register: result_02
    failed_when: false
    when: status_01 == 'PASS'
    tags: [execute]

  - name: "Store requirement 02 details"
    ansible.builtin.set_fact:
      task_02_name: "Remove selinux=0 and enforcing=0 from all kernels"
      task_02_cmd: 'grubby --update-kernel ALL --remove-args "selinux=0 enforcing=0"'
      task_02_rc: "{{ result_02.rc | default(-1) if status_01 == 'PASS' else -1 }}"
      data_02: "{{ result_02.stdout | default('') | trim if status_01 == 'PASS' else 'N/A' }}"
      status_02: "{{ 'SKIP' if status_01 != 'PASS' else ('PASS' if result_02.rc | default(-1) == 0 else 'FAIL') | trim }}"
      details_02: "{{ 'Skipped - grubby not installed' if status_01 != 'PASS' else ('SELinux boot parameters removed' if result_02.rc | default(-1) == 0 else 'Failed to remove boot parameters') | trim }}"
    tags: [execute]

  - name: "Req 03 - Check for deprecated kernelopts"
    ansible.builtin.shell: |
      grep -Prsq -- '\h*([^#\n\r]+\h+)?kernelopts=([^#\n\r]+\h+)?(selinux|enforcing)=0\b' /boot/grub2 /boot/efi
    args:
      executable: /bin/bash
    register: result_03
    failed_when: false
    changed_when: false
    when: status_01 == 'PASS'
    tags: [execute]

  - name: "Store requirement 03 details"
    ansible.builtin.set_fact:
      task_03_name: "Check for deprecated kernelopts"
      task_03_cmd: |
        grep -Prsq -- '\\h*([^#\\n\\r]+\\h+)?kernelopts=([^#\\n\\r]+\\h+)?(selinux|enforcing)=0\\b' /boot/grub2 /boot/efi
      task_03_rc: "{{ result_03.rc | default(-1) if status_01 == 'PASS' else -1 }}"
      data_03: "{{ result_03.stdout | default('') | trim if status_01 == 'PASS' else 'N/A' }}"
      status_03: "{{ 'SKIP' if status_01 != 'PASS' else ('PASS' if result_03.rc | default(-1) != 0 else 'FAIL') | trim }}"
      details_03: "{{ 'Skipped - grubby not installed' if status_01 != 'PASS' else ('No deprecated kernelopts found' if result_03.rc | default(-1) != 0 else 'Deprecated kernelopts found') | trim }}"
    tags: [execute]

  - name: "Req 04 - Regenerate grub configuration if deprecated kernelopts found"
    ansible.builtin.shell: |
      grub2-mkconfig -o "$(grep -Prl -- '\h*([^#\n\r]+\h+)?kernelopts=([^#\n\r]+\h+)?(selinux|enforcing)=0\b' /boot/grub2 /boot/efi)"
    args:
      executable: /bin/bash
    register: result_04
    failed_when: false
    when:
    - status_01 == 'PASS'
    - status_03 == 'FAIL'
    tags: [execute]

  - name: "Store requirement 04 details"
    ansible.builtin.set_fact:
      task_04_name: "Regenerate grub configuration"
      task_04_cmd: |
        grub2-mkconfig -o \"$(grep -Prl -- '\\h*([^#\\n\\r]+\\h+)?kernelopts=([^#\\n\\r]+\\h+)?(selinux|enforcing)=0\\b' /boot/grub2 /boot/efi)\"
      task_04_rc: "{{ result_04.rc | default(-1) if (status_01 == 'PASS' and status_03 == 'FAIL') else -1 }}"
      data_04: "{{ result_04.stdout | default('') | trim if (status_01 == 'PASS' and status_03 == 'FAIL') else 'N/A' }}"
      status_04: "{{ 'SKIP' if status_01 != 'PASS' or status_03 != 'FAIL' else ('PASS' if result_04.rc | default(-1) == 0 else 'FAIL') | trim }}"
      details_04: "{{ 'Skipped - no deprecated kernelopts or grubby not installed' if status_01 != 'PASS' or status_03 != 'FAIL' else ('Grub configuration regenerated' if result_04.rc | default(-1) == 0 else 'Failed to regenerate grub configuration') | trim }}"
    tags: [execute]

  - name: "Req 05 - Verify SELinux is not disabled in bootloader configuration"
    ansible.builtin.shell: grubby --info=ALL | grep -E 'selinux=0|enforcing=0'
    args:
      executable: /bin/bash
    register: result_05
    failed_when: false
    changed_when: false
    when: status_01 == 'PASS'
    tags: [execute]

  - name: "Store requirement 05 details"
    ansible.builtin.set_fact:
      task_05_name: "Verify SELinux is not disabled in bootloader configuration"
      task_05_cmd: "grubby --info=ALL | grep -E 'selinux=0|enforcing=0'"
      task_05_rc: "{{ result_05.rc | default(-1) if status_01 == 'PASS' else -1 }}"
      data_05: "{{ result_05.stdout | default('') | trim if status_01 == 'PASS' else 'N/A' }}"
      status_05: "{{ 'SKIP' if status_01 != 'PASS' else ('PASS' if result_05.rc | default(-1) != 0 else 'FAIL') | trim }}"
      details_05: "{{ 'Skipped - grubby not installed' if status_01 != 'PASS' else ('No disabling parameters found' if result_05.rc | default(-1) != 0 else 'Bootloader still has selinux=0 or enforcing=0') | trim }}"
    tags: [execute]

  - name: "Req 06 - Store final remediation result"
    ansible.builtin.set_fact:
      task_06_name: "Store final remediation result"
      task_06_cmd: "set_fact: cis_result = {{ status_05 }}"
      task_06_rc: 0
      data_06: "{{ status_05 | default('ERROR') | trim }}"
      status_06: "{{ status_05 | default('ERROR') | trim }}"
      details_06: "{{ 'Remediation result stored as ' ~ (status_05 | default('ERROR') | trim) }}"
      cis_result: "{{ status_05 | default('ERROR') | trim }}"
    tags: [execute]

  - name: "Generate remediation report"
    ansible.builtin.debug:
      msg:
      - "REMEDIATION REPORT — CIS 1.3.1.2"
      - "Reference: CIS Benchmark checkpoint 1.3.1.2"
      - ""
      - "REQUIREMENT 01 - {{ req_01 }}:"
      - "  Task: {{ task_01_name | default('Not recorded') }}"
      - "  Command: {{ task_01_cmd | default('N/A') }}"
      - "  Exit code: {{ task_01_rc | default(-1) }}"
      - "  Data: {{ data_01 | default('') | trim }}"
      - "  Status: {{ status_01 | default('ERROR') | trim }}"
      - "  Details: {{ details_01 | default('') | trim }}"
      - ""
      - "REQUIREMENT 02 - {{ req_02 }}:"
      - "  Task: {{ task_02_name | default('Not recorded') }}"
      - "  Command: {{ task_02_cmd | default('N/A') }}"
      - "  Exit code: {{ task_02_rc | default(-1) }}"
      - "  Data: {{ data_02 | default('') | trim }}"
      - "  Status: {{ status_02 | default('ERROR') | trim }}"
      - "  Details: {{ details_02 | default('') | trim }}"
      - ""
      - "REQUIREMENT 03 - {{ req_03 }}:"
      - "  Task: {{ task_03_name | default('Not recorded') }}"
      - "  Command: {{ task_03_cmd | default('N/A') }}"
      - "  Exit code: {{ task_03_rc | default(-1) }}"
      - "  Data: {{ data_03 | default('') | trim }}"
      - "  Status: {{ status_03 | default('ERROR') | trim }}"
      - "  Details: {{ details_03 | default('') | trim }}"
      - ""
      - "REQUIREMENT 04 - {{ req_04 }}:"
      - "  Task: {{ task_04_name | default('Not recorded') }}"
      - "  Command: {{ task_04_cmd | default('N/A') }}"
      - "  Exit code: {{ task_04_rc | default(-1) }}"
      - "  Data: {{ data_04 | default('') | trim }}"
      - "  Status: {{ status_04 | default('ERROR') | trim }}"
      - "  Details: {{ details_04 | default('') | trim }}"
      - ""
      - "REQUIREMENT 05 - {{ req_05 }}:"
      - "  Task: {{ task_05_name | default('Not recorded') }}"
      - "  Command: {{ task_05_cmd | default('N/A') }}"
      - "  Exit code: {{ task_05_rc | default(-1) }}"
      - "  Data: {{ data_05 | default('') | trim }}"
      - "  Status: {{ status_05 | default('ERROR') | trim }}"
      - "  Details: {{ details_05 | default('') | trim }}"
      - ""
      - "REQUIREMENT 06 - {{ req_06 }}:"
      - "  Task: {{ task_06_name | default('Not recorded') }}"
      - "  Command: {{ task_06_cmd | default('N/A') }}"
      - "  Exit code: {{ task_06_rc | default(-1) }}"
      - "  Data: {{ data_06 | default('') | trim }}"
      - "  Status: {{ status_06 | default('ERROR') | trim }}"
      - "  Details: {{ details_06 | default('') | trim }}"
      - ""
      - "========================================================"
      - "OVERALL REMEDIATION:"
      - "  Result: {{ cis_result | default('ERROR') | trim }}"
      - "  Details: {{ details_06 | default('Not evaluated') | trim }}"
      - "========================================================"
    tags: [execute]

  always:
  - name: "Restore - Remove backup directory"
    ansible.builtin.file:
      path: "{{ backup_dir }}"
      state: absent
    failed_when: false
    tags: [restore]
