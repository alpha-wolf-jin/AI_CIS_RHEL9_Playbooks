playbook_name: "cis_5_1_22_sshd_usepam"
backup_dir: "/var/log/ai-playbooks-backup/{{ playbook_name }}"
req_01: "Ensure OpenSSH server is installed using command: `dpkg -l | grep -q openssh-server || apt-get install -y openssh-server`. Expected result: OpenSSH server is installed."
req_02: "Check if UsePAM is already set to yes in /etc/ssh/sshd_config using command: `grep -E '^UsePAM[[:space:]]+yes' /etc/ssh/sshd_config`. Expected result: If found, no change needed."
req_03: "If UsePAM is not set to yes, edit /etc/ssh/sshd_config to set UsePAM yes above any Include entries using command: `sed -i '/^Include/i UsePAM yes' /etc/ssh/sshd_config`. Expected result: The line 'UsePAM yes' is inserted before any Include directives."
req_04: "If no Include entries exist, append UsePAM yes to the file using command: `grep -q '^UsePAM' /etc/ssh/sshd_config || echo 'UsePAM yes' >> /etc/ssh/sshd_config`. Expected result: The line 'UsePAM yes' is added at the end of the file."
req_05: "Restart the SSH service to apply changes using command: `systemctl restart sshd`. Expected result: SSH service restarts successfully."
req_06: "Verify UsePAM is enabled using command: `sshd -T | grep -i usepam`. Expected result: Output shows 'usepam yes'."
req_07: "Store the final remediation result in a variable named 'cis_result' using set_fact. Set cis_result to the overall remediation status (PASS/FAIL/SKIP/ERROR) derived from the last requirement's status variable."
