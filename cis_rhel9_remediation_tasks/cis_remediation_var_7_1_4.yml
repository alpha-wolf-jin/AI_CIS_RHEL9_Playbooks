playbook_name: "cis_7_1_4"
backup_dir: "/var/log/ai-playbooks-backup/{{ playbook_name }}"
target_file: "/etc/group-"
expected_perms: "644"
expected_owner: "root"
expected_group: "root"
req_01: "Apply remove excess permissions on /etc/group- using command: chmod u-x,go-wx /etc/group-. Expected result: Permissions are set to u-x,go-wx."
req_02: "Apply set owner and group to root on /etc/group- using command: chown root:root /etc/group-. Expected result: Owner and group are set to root."
req_03: "Verify permissions and ownership on /etc/group- using command: stat -c '%a %U:%G' /etc/group-. Expected result: Output shows permissions 644 and owner:group root:root."
req_04: "Store the final remediation result in a variable named 'cis_result' using set_fact. Set cis_result to the overall remediation status (PASS/FAIL/SKIP/ERROR) derived from the last requirement's status variable."
