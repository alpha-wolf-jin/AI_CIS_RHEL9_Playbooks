playbook_name: "cis_5_1_10_disableforwarding"
backup_dir: "/var/log/ai-playbooks-backup/{{ playbook_name }}"
config_file: "/etc/ssh/sshd_config"
service_name: "sshd"
package_name: "openssh-server"
req_01: "Ensure openssh-server is installed using command: `dpkg -l | grep -q openssh-server`. Expected result: package is installed."
req_02: "Backup the current sshd_config file using command: `cp /etc/ssh/sshd_config /etc/ssh/sshd_config.bak`. Expected result: backup file created."
req_03: "Set DisableForwarding to yes in /etc/ssh/sshd_config before any Include directive using command: `sed -i '/^Include/ i DisableForwarding yes' /etc/ssh/sshd_config`. Expected result: parameter added before Include entries."
req_04: "Remove any existing DisableForwarding lines after the first occurrence using command: `sed -i '0,/DisableForwarding yes/!{/DisableForwarding/d}' /etc/ssh/sshd_config`. Expected result: only the first occurrence remains."
req_05: "Restart sshd service using command: `systemctl restart sshd`. Expected result: service restarts without error."
req_06: "Verify DisableForwarding is set to yes using command: `sshd -T | grep -i disableforwarding`. Expected result: output shows 'disableforwarding yes'."
req_07: "Store the final remediation result in a variable named 'cis_result' using set_fact. Set cis_result to the overall remediation status (PASS/FAIL/SKIP/ERROR) derived from the last requirement's status variable."
