---
- name: Initialize meta data variables
  include_vars: cis_remediation_var_4_3_2.yml

- name: "State Guard - Check for existing checkpoint"
  ansible.builtin.stat:
    path: "{{ state_guard_flag }}"
  register: _sg_flag
  tags: [snapshot]
- name: "State Guard - Undo previous checkpoint - delete tcp rule"
  ansible.builtin.shell: |
    nft delete rule inet filter input ip protocol tcp ct state established accept 2>/dev/null || true
  args:
    executable: /bin/bash
  when: "_sg_flag.stat.exists"
  failed_when: false
  tags: [snapshot]
- name: "State Guard - Undo previous checkpoint - delete udp rule"
  ansible.builtin.shell: |
    nft delete rule inet filter input ip protocol udp ct state established accept 2>/dev/null || true
  args:
    executable: /bin/bash
  when: "_sg_flag.stat.exists"
  failed_when: false
  tags: [snapshot]
- name: "State Guard - Undo previous checkpoint - delete icmp rule"
  ansible.builtin.shell: |
    nft delete rule inet filter input ip protocol icmp ct state established accept 2>/dev/null || true
  args:
    executable: /bin/bash
  when: "_sg_flag.stat.exists"
  failed_when: false
  tags: [snapshot]
- name: "State Guard - Remove old checkpoint"
  ansible.builtin.file:
    path: "{{ state_guard_dir }}"
    state: absent
  when: "_sg_flag.stat.exists"
  tags: [snapshot]
- name: "State Guard - Create checkpoint directory"
  ansible.builtin.file:
    path: "{{ state_guard_dir }}"
    state: directory
    mode: '0700'
  tags: [snapshot]
- name: "State Guard - Backup current nftables ruleset"
  ansible.builtin.shell: |
    nft list ruleset > {{ state_guard_dir }}/ruleset.backup
  args:
    executable: /bin/bash
  failed_when: false
  tags: [snapshot]
- name: "State Guard - Create checkpoint flag"
  ansible.builtin.copy:
    content: "checkpoint"
    dest: "{{ state_guard_flag }}"
  tags: [snapshot]

- block:
  - name: "Initialize data variables"
    set_fact:
      data_01: "Not collected yet"
      status_01: "UNKNOWN"
      details_01: "Not evaluated"
      data_02: "Not collected yet"
      status_02: "UNKNOWN"
      details_02: "Not evaluated"
      data_03: "Not collected yet"
      status_03: "UNKNOWN"
      details_03: "Not evaluated"
      data_04: "Not collected yet"
      status_04: "UNKNOWN"
      details_04: "Not evaluated"
      data_05: "Not collected yet"
      status_05: "UNKNOWN"
      details_05: "Not evaluated"
      task_01_name: "Not executed"
      task_01_cmd: "N/A"
      task_01_rc: -1
    tags: [execute]

  - name: "Check if nftables package is installed"
    ansible.builtin.shell: |
      if command -v rpm > /dev/null 2>&1; then
        rpm -q nftables 2>/dev/null
      elif command -v dpkg-query > /dev/null 2>&1; then
        dpkg-query -W nftables 2>/dev/null
      else
        echo "No package manager found"
      fi
    args:
      executable: /bin/bash
    register: _pkg_check
    failed_when: false
    changed_when: false
    tags: [execute]

  - name: "Set fact nftables_installed"
    set_fact:
      nftables_installed: "{{ ('not installed' not in _pkg_check.stdout | default('')) and ('No package manager found' not in _pkg_check.stdout | default('')) }}"
    tags: [execute]

  - name: "Req 01 - Check if nftables service is enabled"
    ansible.builtin.shell: |
      systemctl is-enabled nftables.service | grep -q 'enabled'
    args:
      executable: /bin/bash
    register: result_01
    failed_when: false
    changed_when: false
    when: "nftables_installed | default(false)"
    tags: [execute]

  - name: "Set fact nftables_enabled"
    set_fact:
      nftables_enabled: "{{ result_01.rc | default(1) == 0 }}"
    when: "nftables_installed | default(false)"
    tags: [execute]

  - name: "Set skip_remediation flag"
    set_fact:
      skip_remediation: "{{ not (nftables_installed | default(false) and nftables_enabled | default(false)) }}"
    tags: [execute]

  - name: "Req 02 - Apply rule to accept established TCP connections on input"
    ansible.builtin.shell: |
      if ! systemctl is-enabled nftables.service | grep -q 'enabled'; then
        exit 0
      fi
      nft list ruleset inet filter input | grep -q 'ip protocol tcp ct state established accept' && exit 0
      nft add rule inet filter input ip protocol tcp ct state established accept
    args:
      executable: /bin/bash
    register: result_02
    failed_when: false
    changed_when: false
    when: "not skip_remediation"
    tags: [execute]

  - name: "Req 03 - Apply rule to accept established UDP connections on input"
    ansible.builtin.shell: |
      if ! systemctl is-enabled nftables.service | grep -q 'enabled'; then
        exit 0
      fi
      nft list ruleset inet filter input | grep -q 'ip protocol udp ct state established accept' && exit 0
      nft add rule inet filter input ip protocol udp ct state established accept
    args:
      executable: /bin/bash
    register: result_03
    failed_when: false
    changed_when: false
    when: "not skip_remediation"
    tags: [execute]

  - name: "Req 04 - Apply rule to accept established ICMP connections on input"
    ansible.builtin.shell: |
      if ! systemctl is-enabled nftables.service | grep -q 'enabled'; then
        exit 0
      fi
      nft list ruleset inet filter input | grep -q 'ip protocol icmp ct state established accept' && exit 0
      nft add rule inet filter input ip protocol icmp ct state established accept
    args:
      executable: /bin/bash
    register: result_04
    failed_when: false
    changed_when: false
    when: "not skip_remediation"
    tags: [execute]

  - name: "Req 05 - Verify that nftables established connection rules are configured"
    ansible.builtin.shell: |
      if nft list ruleset inet filter input | grep -q 'ip protocol tcp ct state established accept' &&
         nft list ruleset inet filter input | grep -q 'ip protocol udp ct state established accept' &&
         nft list ruleset inet filter input | grep -q 'ip protocol icmp ct state established accept'; then
        nft list ruleset inet filter input | grep -E 'ct state established accept'
        exit 0
      else
        exit 1
      fi
    args:
      executable: /bin/bash
    register: result_05
    failed_when: false
    changed_when: false
    when: "not skip_remediation"
    tags: [execute]

  - name: "Store requirement details"
    set_fact:
      task_01_name: "Check if nftables service is enabled"
      task_01_cmd: "systemctl is-enabled nftables.service | grep -q 'enabled'"
      task_01_rc: "{{ result_01.rc | default(-1) }}"
      data_01: "{{ result_01.stdout | default('') | trim }}"
      status_01: "{{ (nftables_installed | default(false) and nftables_enabled | default(false)) | ternary('APPLIED', 'FAILED') if nftables_installed | default(false) else 'SKIP' }}"
      details_01: "{{ 'Service is enabled' if (nftables_installed | default(false) and nftables_enabled | default(false)) else 'Service is not enabled' if nftables_installed | default(false) else 'nftables package not installed' }}"
      task_02_name: "Apply rule to accept established TCP connections on input"
      task_02_cmd: "systemctl is-enabled nftables.service | grep -q 'enabled' && nft add rule inet filter input ip protocol tcp ct state established accept"
      task_02_rc: "{{ result_02.rc | default(-1) }}"
      data_02: "{{ result_02.stdout | default('') | trim }}"
      status_02: "{{ 'SKIP' if skip_remediation else ('APPLIED' if result_02.rc | default(-1) == 0 else 'FAILED') }}"
      details_02: "{{ 'Skipped due to nftables not enabled/installed' if skip_remediation else ('Rule present' if result_02.rc | default(-1) == 0 else 'Rule not present or failed') }}"
      task_03_name: "Apply rule to accept established UDP connections on input"
      task_03_cmd: "systemctl is-enabled nftables.service | grep -q 'enabled' && nft add rule inet filter input ip protocol udp ct state established accept"
      task_03_rc: "{{ result_03.rc | default(-1) }}"
      data_03: "{{ result_03.stdout | default('') | trim }}"
      status_03: "{{ 'SKIP' if skip_remediation else ('APPLIED' if result_03.rc | default(-1) == 0 else 'FAILED') }}"
      details_03: "{{ 'Skipped due to nftables not enabled/installed' if skip_remediation else ('Rule present' if result_03.rc | default(-1) == 0 else 'Rule not present or failed') }}"
      task_04_name: "Apply rule to accept established ICMP connections on input"
      task_04_cmd: "systemctl is-enabled nftables.service | grep -q 'enabled' && nft add rule inet filter input ip protocol icmp ct state established accept"
      task_04_rc: "{{ result_04.rc | default(-1) }}"
      data_04: "{{ result_04.stdout | default('') | trim }}"
      status_04: "{{ 'SKIP' if skip_remediation else ('APPLIED' if result_04.rc | default(-1) == 0 else 'FAILED') }}"
      details_04: "{{ 'Skipped due to nftables not enabled/installed' if skip_remediation else ('Rule present' if result_04.rc | default(-1) == 0 else 'Rule not present or failed') }}"
      task_05_name: "Verify nftables established connection rules"
      task_05_cmd: "nft list ruleset inet filter input | grep -E 'ct state established accept'"
      task_05_rc: "{{ result_05.rc | default(-1) }}"
      data_05: "{{ result_05.stdout | default('') | trim }}"
      status_05: "{{ 'SKIP' if skip_remediation else ('APPLIED' if result_05.rc | default(-1) == 0 else 'FAILED') }}"
      details_05: "{{ 'Skipped due to nftables not enabled/installed' if skip_remediation else ('All required rules present' if result_05.rc | default(-1) == 0 else 'Not all rules present') }}"
    tags: [execute]

  - name: "Generate remediation report"
    ansible.builtin.debug:
      msg:
      - "========================================================"
      - "        REMEDIATION REPORT — CIS 4.3.2"
      - "        Reference: CIS Benchmark checkpoint 4.3.2"
      - "========================================================"
      - ""
      - "REQUIREMENT 01 - {{ req_01 }}:"
      - "  Task: {{ task_01_name }}"
      - "  Command: {{ task_01_cmd }}"
      - "  Exit code: {{ task_01_rc }}"
      - "  Data: {{ data_01 }}"
      - "  Status: {{ status_01 }}"
      - "  Details: {{ details_01 }}"
      - ""
      - "REQUIREMENT 02 - {{ req_02 }}:"
      - "  Task: {{ task_02_name }}"
      - "  Command: {{ task_02_cmd }}"
      - "  Exit code: {{ task_02_rc }}"
      - "  Data: {{ data_02 }}"
      - "  Status: {{ status_02 }}"
      - "  Details: {{ details_02 }}"
      - ""
      - "REQUIREMENT 03 - {{ req_03 }}:"
      - "  Task: {{ task_03_name }}"
      - "  Command: {{ task_03_cmd }}"
      - "  Exit code: {{ task_03_rc }}"
      - "  Data: {{ data_03 }}"
      - "  Status: {{ status_03 }}"
      - "  Details: {{ details_03 }}"
      - ""
      - "REQUIREMENT 04 - {{ req_04 }}:"
      - "  Task: {{ task_04_name }}"
      - "  Command: {{ task_04_cmd }}"
      - "  Exit code: {{ task_04_rc }}"
      - "  Data: {{ data_04 }}"
      - "  Status: {{ status_04 }}"
      - "  Details: {{ details_04 }}"
      - ""
      - "REQUIREMENT 05 - {{ req_05 }}:"
      - "  Task: {{ task_05_name }}"
      - "  Command: {{ task_05_cmd }}"
      - "  Exit code: {{ task_05_rc }}"
      - "  Data: {{ data_05 }}"
      - "  Status: {{ status_05 }}"
      - "  Details: {{ details_05 }}"
      - ""
      - "========================================================"
      - "OVERALL REMEDIATION:"
      - "  Result: {{ status_05 }}"
      - "  Details: {{ details_05 }}"
      - "========================================================"
    tags: [execute]

  always:
  - name: "State Guard Restore - Check if checkpoint exists"
    ansible.builtin.stat:
      path: "{{ state_guard_flag }}"
    register: _sg_restore_flag
    failed_when: false
    tags: [restore]

  - name: "State Guard Restore - Check if ruleset backup exists"
    ansible.builtin.stat:
      path: "{{ state_guard_dir }}/ruleset.backup"
    register: _sg_restore_ruleset
    failed_when: false
    tags: [restore]

  - name: "State Guard Restore - Restore nftables ruleset from backup"
    ansible.builtin.shell: |
      nft -f {{ state_guard_dir }}/ruleset.backup 2>/dev/null || true
    args:
      executable: /bin/bash
    when:
    - "_sg_restore_flag.stat.exists | default(false)"
    - "_sg_restore_ruleset.stat.exists | default(false)"
    failed_when: false
    tags: [restore]

  - name: "State Guard Restore - Remove checkpoint"
    ansible.builtin.file:
      path: "{{ state_guard_dir }}"
      state: absent
    when: "_sg_restore_flag.stat.exists | default(false)"
    failed_when: false
    tags: [restore]
