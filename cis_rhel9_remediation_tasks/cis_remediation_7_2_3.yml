---
- name: Initialize meta data variables
  include_vars: cis_remediation_var_7_2_3.yml

- name: "Snapshot - Create backup directory"
  ansible.builtin.file:
    path: "{{ backup_dir }}"
    state: directory
    mode: '0700'
  tags: [snapshot]
- name: "Snapshot - Check if /etc/group exists"
  ansible.builtin.stat:
    path: /etc/group
  register: _group_stat
  tags: [snapshot]
- name: "Snapshot - Backup /etc/group if exists"
  ansible.builtin.copy:
    src: /etc/group
    dest: "{{ backup_dir }}/group.backup"
    remote_src: true
  when: "_group_stat.stat.exists | default(false)"
  tags: [snapshot]

- block:
  - name: "Req 01 - Check if awk and cut utilities are available"
    ansible.builtin.shell: "which awk && which cut"
    args:
      executable: /bin/bash
    register: result_01
    failed_when: false
    changed_when: false
    tags: [execute]

  - name: "Store requirement 01 details"
    ansible.builtin.set_fact:
      task_01_name: "Check if awk and cut utilities are available"
      task_01_cmd: "which awk && which cut"
      task_01_rc: "{{ result_01.rc | default(-1) }}"
      data_01: "{{ result_01.stdout | default('') | trim }}"
      status_01: "{{ 'PASS' if (result_01.rc | default(-1)) == 0 else 'FAIL' }}"
      details_01: "{{ 'Both awk and cut found' if (result_01.rc | default(-1)) == 0 else 'awk or cut not found' }}"
    tags: [execute]

  - name: "Req 02 - Identify GIDs in /etc/passwd missing from /etc/group"
    ansible.builtin.shell: |
      awk -F: '{print $4}' /etc/passwd | sort -u | while read gid; do
        if ! cut -d: -f3 /etc/group | grep -qx "${gid}"; then
          echo "Missing GID: ${gid}"
        fi
      done
    args:
      executable: /bin/bash
    register: result_02
    failed_when: false
    changed_when: false
    tags: [execute]

  - name: "Store requirement 02 details"
    ansible.builtin.set_fact:
      task_02_name: "Identify GIDs in /etc/passwd missing from /etc/group"
      task_02_cmd: |
        awk -F: '{print $4}' /etc/passwd | sort -u | while read gid; do
          if ! cut -d: -f3 /etc/group | grep -qx "${gid}"; then
            echo "Missing GID: ${gid}"
          fi
        done
      task_02_rc: "{{ result_02.rc | default(-1) }}"
      data_02: "{{ result_02.stdout | default('') | trim }}"
      status_02: "{{ 'PASS' if (result_02.rc | default(-1)) == 0 else 'FAIL' }}"
      details_02: "{{ 'Missing GIDs identified' if (result_02.rc | default(-1)) == 0 else 'Failed to identify missing GIDs' }}"
    tags: [execute]

  - name: "Req 03 - Create missing groups for each missing GID"
    ansible.builtin.shell: |
      for gid in $(awk -F: '{print $4}' /etc/passwd | sort -u | while read gid; do
        if ! cut -d: -f3 /etc/group | grep -qx "${gid}"; then
          echo "${gid}"
        fi
      done); do
        groupadd -g "${gid}" "group_${gid}"
      done
    args:
      executable: /bin/bash
    register: result_03
    failed_when: false
    tags: [execute]

  - name: "Store requirement 03 details"
    ansible.builtin.set_fact:
      task_03_name: "Create missing groups for each missing GID"
      task_03_cmd: |
        for gid in $(awk -F: '{print $4}' /etc/passwd | sort -u | while read gid; do
          if ! cut -d: -f3 /etc/group | grep -qx "${gid}"; then
            echo "${gid}"
          fi
        done); do
          groupadd -g "${gid}" "group_${gid}"
        done
      task_03_rc: "{{ result_03.rc | default(-1) }}"
      data_03: "{{ result_03.stdout | default('') | trim }}"
      status_03: "{{ 'PASS' if (result_03.rc | default(-1)) == 0 else 'FAIL' }}"
      details_03: "{{ 'Missing groups created' if (result_03.rc | default(-1)) == 0 else 'Failed to create missing groups' }}"
    tags: [execute]

  - name: "Req 04 - Verify all groups in /etc/passwd now exist in /etc/group"
    ansible.builtin.shell: |
      awk -F: '{print $4}' /etc/passwd | sort -u | while read gid; do
        if ! cut -d: -f3 /etc/group | grep -qx "${gid}"; then
          echo "FAIL: GID ${gid} missing"
        fi
      done
      echo "VERIFY: All groups in /etc/passwd exist in /etc/group"
    args:
      executable: /bin/bash
    register: result_04
    failed_when: false
    changed_when: false
    tags: [execute]

  - name: "Store requirement 04 details"
    ansible.builtin.set_fact:
      task_04_name: "Verify all groups in /etc/passwd now exist in /etc/group"
      task_04_cmd: |
        awk -F: '{print $4}' /etc/passwd | sort -u | while read gid; do
          if ! cut -d: -f3 /etc/group | grep -qx "${gid}"; then
            echo "FAIL: GID ${gid} missing"
          fi
        done
        echo "VERIFY: All groups in /etc/passwd exist in /etc/group"
      task_04_rc: "{{ result_04.rc | default(-1) }}"
      data_04: "{{ result_04.stdout | default('') | trim }}"
      status_04: "{{ 'PASS' if ('VERIFY: All groups in /etc/passwd exist in /etc/group' in (result_04.stdout | default('') | trim)) and ('FAIL:' not in (result_04.stdout | default('') | trim)) else 'FAIL' }}"
      details_04: "{{ 'All GIDs exist in /etc/group' if ('VERIFY: All groups in /etc/passwd exist in /etc/group' in (result_04.stdout | default('') | trim)) and ('FAIL:' not in (result_04.stdout | default('') | trim)) else 'Missing GIDs remain' }}"
    tags: [execute]

  - name: "Req 05 - Store overall remediation result"
    ansible.builtin.set_fact:
      cis_result: "{{ status_04 | default('ERROR') | trim }}"
      task_05_name: "Store overall remediation result"
      task_05_cmd: "set_fact cis_result from status_04"
      task_05_rc: "0"
      data_05: "cis_result = {{ status_04 | default('ERROR') | trim }}"
      status_05: "{{ 'PASS' }}"
      details_05: "Cis_result set to {{ status_04 | default('ERROR') | trim }}"
    tags: [execute]

  - name: "Generate remediation report"
    ansible.builtin.debug:
      msg:
      - "========================================================"
      - "        REMEDIATION REPORT — CIS 7.2.3"
      - "========================================================"
      - "Reference: CIS Benchmark checkpoint 7.2.3"
      - ""
      - "REQUIREMENT 01 - {{ req_01 }}:"
      - "  Task: {{ task_01_name | default('Task not recorded') }}"
      - "  Command: {{ task_01_cmd | default('N/A') }}"
      - "  Exit code: {{ task_01_rc | default(-1) }}"
      - "  Data: {{ data_01 | default('') | trim }}"
      - "  Status: {{ status_01 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_01 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 02 - {{ req_02 }}:"
      - "  Task: {{ task_02_name | default('Task not recorded') }}"
      - "  Command: {{ task_02_cmd | default('N/A') }}"
      - "  Exit code: {{ task_02_rc | default(-1) }}"
      - "  Data: {{ data_02 | default('') | trim }}"
      - "  Status: {{ status_02 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_02 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 03 - {{ req_03 }}:"
      - "  Task: {{ task_03_name | default('Task not recorded') }}"
      - "  Command: {{ task_03_cmd | default('N/A') }}"
      - "  Exit code: {{ task_03_rc | default(-1) }}"
      - "  Data: {{ data_03 | default('') | trim }}"
      - "  Status: {{ status_03 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_03 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 04 - {{ req_04 }}:"
      - "  Task: {{ task_04_name | default('Task not recorded') }}"
      - "  Command: {{ task_04_cmd | default('N/A') }}"
      - "  Exit code: {{ task_04_rc | default(-1) }}"
      - "  Data: {{ data_04 | default('') | trim }}"
      - "  Status: {{ status_04 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_04 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 05 - {{ req_05 }}:"
      - "  Task: {{ task_05_name | default('Task not recorded') }}"
      - "  Command: {{ task_05_cmd | default('N/A') }}"
      - "  Exit code: {{ task_05_rc | default(-1) }}"
      - "  Data: {{ data_05 | default('') | trim }}"
      - "  Status: {{ status_05 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_05 | default('Not evaluated') | trim }}"
      - ""
      - "========================================================"
      - "OVERALL REMEDIATION:"
      - "  Result: {{ cis_result | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_04 | default('Not evaluated') | trim }}"
      - "========================================================"
    tags: [execute]

  always:
  - name: "Restore - Check if backup exists"
    ansible.builtin.stat:
      path: "{{ backup_dir }}/group.backup"
    register: _restore_stat
    failed_when: false
    tags: [restore]

  - name: "Restore - Overwrite /etc/group with original"
    ansible.builtin.copy:
      src: "{{ backup_dir }}/group.backup"
      dest: /etc/group
      remote_src: true
    when: "_restore_stat.stat.exists | default(false)"
    failed_when: false
    tags: [restore]

  - name: "Restore - Remove backup directory"
    ansible.builtin.file:
      path: "{{ backup_dir }}"
      state: absent
    failed_when: false
    tags: [restore]
