---
- name: Initialize meta data variables
  include_vars: cis_remediation_var_5_3_3_2_7.yml

- name: "State Guard - Check for existing checkpoint"
  ansible.builtin.stat:
    path: "{{ state_guard_flag }}"
  register: _sg_flag
  tags: [snapshot]
- name: "State Guard - Restore {{ config_target }} from prior checkpoint"
  ansible.builtin.copy:
    src: "{{ state_guard_dir }}/50-pwroot.conf.present"
    dest: "{{ config_target }}"
    remote_src: true
  when: "_sg_flag.stat.exists"
  failed_when: false
  tags: [snapshot]
- name: "State Guard - Delete {{ config_target }} (from prior run)"
  ansible.builtin.file:
    path: "{{ config_target }}"
    state: absent
  when: "_sg_flag.stat.exists"
  failed_when: false
  tags: [snapshot]
- name: "State Guard - Remove old checkpoint"
  ansible.builtin.file:
    path: "{{ state_guard_dir }}"
    state: absent
  when: "_sg_flag.stat.exists"
  tags: [snapshot]
- name: "State Guard - Create checkpoint directory"
  ansible.builtin.file:
    path: "{{ state_guard_dir }}"
    state: directory
    mode: '0700'
  tags: [snapshot]
- name: "State Guard - Check if {{ config_target }} exists"
  ansible.builtin.stat:
    path: "{{ config_target }}"
  register: _sg_config_stat
  tags: [snapshot]
- name: "State Guard - Backup {{ config_target }} (present)"
  ansible.builtin.copy:
    src: "{{ config_target }}"
    dest: "{{ state_guard_dir }}/50-pwroot.conf.present"
    remote_src: true
  when: "_sg_config_stat.stat.exists"
  tags: [snapshot]
- name: "State Guard - Mark {{ config_target }} as absent"
  ansible.builtin.copy:
    content: "absent"
    dest: "{{ state_guard_dir }}/50-pwroot.conf.absent"
  when: "not _sg_config_stat.stat.exists"
  tags: [snapshot]
- name: "State Guard - Create checkpoint flag"
  ansible.builtin.copy:
    content: "checkpoint"
    dest: "{{ state_guard_flag }}"
  tags: [snapshot]

- block:
        # === STATE GUARD — EXECUTE PHASE ===

  - name: "Initialize data variables"
    ansible.builtin.set_fact:
      data_01: "Not collected yet"
      status_01: "UNKNOWN"
      details_01: "Not evaluated"
      data_02: "Not collected yet"
      status_02: "UNKNOWN"
      details_02: "Not evaluated"
      data_03: "Not collected yet"
      status_03: "UNKNOWN"
      details_03: "Not evaluated"
      data_04: "Not collected yet"
      status_04: "UNKNOWN"
      details_04: "Not evaluated"
      task_01_name: "Not executed"
      task_01_cmd: "N/A"
      task_01_rc: -1
      task_02_name: "Not executed"
      task_02_cmd: "N/A"
      task_02_rc: -1
      task_03_name: "Not executed"
      task_03_cmd: "N/A"
      task_03_rc: -1
      task_04_name: "Not executed"
      task_04_cmd: "N/A"
      task_04_rc: -1
      playbook_skipped: false
    tags: [execute]

# Requirement 01: Ensure pwquality configuration directory exists
  - name: "Req 01 - Ensure pwquality configuration directory exists"
    ansible.builtin.shell: |
      if test -d /etc/security/pwquality.conf.d; then
        echo "exists"
        exit 0
      else
        mkdir -p /etc/security/pwquality.conf.d && echo "created"
        exit 0
      fi
    args:
      executable: /bin/bash
    register: result_01
    failed_when: false
    changed_when: false
    tags: [execute]

  - name: "Store requirement 01 details"
    ansible.builtin.set_fact:
      task_01_name: "Ensure pwquality configuration directory exists"
      task_01_cmd: "test -d /etc/security/pwquality.conf.d || mkdir -p /etc/security/pwquality.conf.d"
      task_01_rc: "0"
      data_01: "{{ result_01.stdout | default('') | trim }}"
      status_01: "PASS"
      details_01: "Directory /etc/security/pwquality.conf.d is present"
    tags: [execute]

# Requirement 02: Check if libpwquality package is installed
  - name: "Req 02 - Check if libpwquality package is installed"
    ansible.builtin.shell: |
      if dpkg -l 2>/dev/null | grep -q '^ii.*libpwquality'; then
        echo "installed"
        exit 0
      elif rpm -q libpwquality >/dev/null 2>&1; then
        echo "installed"
        exit 0
      else
        echo "not_installed"
        exit 1
      fi
    args:
      executable: /bin/bash
    register: result_02
    failed_when: false
    changed_when: false
    tags: [execute]

  - name: "Store requirement 02 details"
    ansible.builtin.set_fact:
      task_02_name: "Check if libpwquality package is installed"
      task_02_cmd: "dpkg -l | grep -q libpwquality || rpm -q libpwquality"
      task_02_rc: "{{ result_02.rc | default(-1) }}"
      data_02: "{{ result_02.stdout | default('') | trim }}"
      status_02: "{{ 'PASS' if (result_02.rc | default(-1)) == 0 else 'FAIL' }}"
      details_02: "{{ 'libpwquality is installed' if (result_02.rc | default(-1)) == 0 else 'libpwquality is NOT installed' }}"
      playbook_skipped: "{{ (result_02.rc | default(-1)) != 0 }}"
    tags: [execute]

# Requirement 03: Apply enforce_for_root in 50-pwroot.conf
  - name: "Req 03 - Apply enforce_for_root in {{ config_target }}"
    ansible.builtin.lineinfile:
      path: "{{ config_target }}"
      regexp: ^\s*enforce_for_root\s*$
      line: "enforce_for_root"
      create: true
      mode: '0644'
    register: result_03
    failed_when: false
    when: "not (playbook_skipped | default(false) | bool)"
    tags: [execute]

  - name: "Store requirement 03 details"
    ansible.builtin.set_fact:
      task_03_name: "Apply enforce_for_root in {{ config_target }}"
      task_03_cmd: |
        lineinfile: path={{ config_target }} regexp='^\\s*enforce_for_root\\s*$' line='enforce_for_root' create=true
      task_03_rc: "{{ 0 if (result_03.changed | default(false)) or (result_03 is not failed and not result_03.changed) else 1 }}"
      data_03: "{{ 'enforce_for_root line ensured in ' + config_target if (result_03 is not failed) else (result_03.msg | default('Failed')) }}"
      status_03: "{{ 'SKIP' if (playbook_skipped | default(false) | bool) else ('PASS' if (result_03 is not failed) else 'FAIL') }}"
      details_03: "{{ 'Skipped - libpwquality not installed' if (playbook_skipped | default(false) | bool) else ('enforce_for_root configured successfully' if (result_03 is not failed) else 'Failed to configure enforce_for_root') }}"
    tags: [execute]

# Requirement 04: Verify enforce_for_root is set
  - name: "Req 04 - Verify enforce_for_root is set"
    ansible.builtin.shell: |
      if grep -q "^enforce_for_root" "{{ config_target }}" 2>/dev/null; then
        echo "found_in_dropin"
        exit 0
      elif grep -q "^enforce_for_root" "{{ config_file }}" 2>/dev/null; then
        echo "found_in_main"
        exit 0
      else
        echo "not_found"
        exit 1
      fi
    args:
      executable: /bin/bash
    register: result_04
    failed_when: false
    changed_when: false
    when: "not (playbook_skipped | default(false) | bool)"
    tags: [execute]

  - name: "Store requirement 04 details"
    ansible.builtin.set_fact:
      task_04_name: "Verify enforce_for_root is set"
      task_04_cmd: |
        grep -q \"^enforce_for_root\" {{ config_target }} || grep -q \"^enforce_for_root\" {{ config_file }}
      task_04_rc: "{{ result_04.rc | default(-1) }}"
      data_04: "{{ result_04.stdout | default('') | trim }}"
      status_04: "{{ 'SKIP' if (playbook_skipped | default(false) | bool) else ('PASS' if (result_04.rc | default(-1)) == 0 else 'FAIL') }}"
      details_04: "{{ 'Skipped - libpwquality not installed' if (playbook_skipped | default(false) | bool) else ('enforce_for_root is set' if (result_04.rc | default(-1)) == 0 else 'enforce_for_root is NOT set') }}"
    tags: [execute]

  - name: "Store final remediation result"
    ansible.builtin.set_fact:
      cis_result: "{{ 'SKIP' if (playbook_skipped | default(false) | bool) else (status_04 | default('ERROR') | trim) }}"
    tags: [execute]

  - name: "Generate remediation report"
    ansible.builtin.debug:
      msg:
      - "========================================================"
      - "        REMEDIATION REPORT — CIS 5.3.3.2.7"
      - "========================================================"
      - "Reference: CIS Benchmark checkpoint 5.3.3.2.7"
      - ""
      - "REQUIREMENT 01 - {{ req_01 }}:"
      - "  Task: {{ task_01_name | default('Task not recorded') }}"
      - "  Command: {{ task_01_cmd | default('N/A') }}"
      - "  Exit code: {{ task_01_rc | default(-1) }}"
      - "  Data: {{ data_01 | default('') | trim }}"
      - "  Status: {{ status_01 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_01 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 02 - {{ req_02 }}:"
      - "  Task: {{ task_02_name | default('Task not recorded') }}"
      - "  Command: {{ task_02_cmd | default('N/A') }}"
      - "  Exit code: {{ task_02_rc | default(-1) }}"
      - "  Data: {{ data_02 | default('') | trim }}"
      - "  Status: {{ status_02 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_02 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 03 - {{ req_03 }}:"
      - "  Task: {{ task_03_name | default('Task not recorded') }}"
      - "  Command: {{ task_03_cmd | default('N/A') }}"
      - "  Exit code: {{ task_03_rc | default(-1) }}"
      - "  Data: {{ data_03 | default('') | trim }}"
      - "  Status: {{ status_03 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_03 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 04 - {{ req_04 }}:"
      - "  Task: {{ task_04_name | default('Task not recorded') }}"
      - "  Command: {{ task_04_cmd | default('N/A') }}"
      - "  Exit code: {{ task_04_rc | default(-1) }}"
      - "  Data: {{ data_04 | default('') | trim }}"
      - "  Status: {{ status_04 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_04 | default('Not evaluated') | trim }}"
      - ""
      - "========================================================"
      - "OVERALL REMEDIATION:"
      - "  Result: {{ cis_result | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_04 | default('Not evaluated') | trim }}"
      - "========================================================"
    tags: [execute]

  always:
        # === STATE GUARD — RESTORE PHASE (GUARANTEED) ===

  - name: "State Guard Restore - Check if checkpoint exists"
    ansible.builtin.stat:
      path: "{{ state_guard_flag }}"
    register: _sg_restore_flag
    failed_when: false
    tags: [restore]

  - name: "State Guard Restore - Check if config backup exists"
    ansible.builtin.stat:
      path: "{{ state_guard_dir }}/50-pwroot.conf.present"
    register: _sg_restore_config
    failed_when: false
    tags: [restore]

  - name: "State Guard Restore - Restore {{ config_target }} from backup"
    ansible.builtin.copy:
      src: "{{ state_guard_dir }}/50-pwroot.conf.present"
      dest: "{{ config_target }}"
      remote_src: true
    when: "_sg_restore_config.stat.exists | default(false)"
    failed_when: false
    tags: [restore]

  - name: "State Guard Restore - Check for absent marker"
    ansible.builtin.stat:
      path: "{{ state_guard_dir }}/50-pwroot.conf.absent"
    register: _sg_restore_absent
    failed_when: false
    tags: [restore]

  - name: "State Guard Restore - Delete {{ config_target }}"
    ansible.builtin.file:
      path: "{{ config_target }}"
      state: absent
    when: "_sg_restore_absent.stat.exists | default(false)"
    failed_when: false
    tags: [restore]

  - name: "State Guard Restore - Remove checkpoint"
    ansible.builtin.file:
      path: "{{ state_guard_dir }}"
      state: absent
    when: "_sg_restore_flag.stat.exists | default(false)"
    failed_when: false
    tags: [restore]
