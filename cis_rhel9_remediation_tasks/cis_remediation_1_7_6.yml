---
- name: Initialize meta data variables
  include_vars: cis_remediation_var_1_7_6.yml

- name: "Snapshot - Create backup directory"
  ansible.builtin.file:
    path: "{{ backup_dir }}"
    state: directory
    mode: '0700'
  tags: [snapshot]
- name: "Snapshot - Check if /etc/issue.net exists"
  ansible.builtin.stat:
    path: "/etc/issue.net"
  register: _file_stat
  tags: [snapshot]
- name: "Snapshot - Check if backup file already exists"
  ansible.builtin.stat:
    path: "{{ backup_dir }}/issue.net"
  register: _backup_file_stat
  tags: [snapshot]
- name: "Snapshot - Backup /etc/issue.net if exists"
  ansible.builtin.copy:
    src: "/etc/issue.net"
    dest: "{{ backup_dir }}/issue.net"
    remote_src: true
  when:
  - "_file_stat.stat.exists | default(false)"
  - "not (_backup_file_stat.stat.exists | default(false))"
  tags: [snapshot]

- block:
  - name: "Req 01 - Apply ownership to /etc/issue.net"
    ansible.builtin.file:
      path: "/etc/issue.net"
      owner: root
      group: root
      follow: yes
    register: result_01
    failed_when: false
    tags: [execute]

  - name: "Store requirement 01 details"
    set_fact:
      task_01_name: "Set ownership of /etc/issue.net to root:root (follow=yes)"
      task_01_cmd: "ansible.builtin.file: path=/etc/issue.net owner=root group=root follow=yes"
      task_01_rc: "{{ 0 if not result_01.failed else 1 }}"
      data_01: "Ownership set to root:root (changed: {{ result_01.changed | default(false) }})"
      status_01: "{{ 'APPLIED' if not result_01.failed else 'FAILED' }}"
      details_01: "{{ 'Successfully set ownership' if not result_01.failed else 'Failed to set ownership: ' + result_01.msg | default('Unknown error') }}"
    tags: [execute]

  - name: "Req 02 - Apply permissions to /etc/issue.net"
    ansible.builtin.file:
      path: "/etc/issue.net"
      mode: 'u-x,go-wx'
      follow: yes
    register: result_02
    failed_when: false
    tags: [execute]

  - name: "Store requirement 02 details"
    set_fact:
      task_02_name: "Set permissions on /etc/issue.net to u-x,go-wx (follow=yes)"
      task_02_cmd: "ansible.builtin.file: path=/etc/issue.net mode='u-x,go-wx' follow=yes"
      task_02_rc: "{{ 0 if not result_02.failed else 1 }}"
      data_02: "Permissions set to u-x,go-wx (changed: {{ result_02.changed | default(false) }})"
      status_02: "{{ 'APPLIED' if not result_02.failed else 'FAILED' }}"
      details_02: "{{ 'Successfully set permissions' if not result_02.failed else 'Failed to set permissions: ' + result_02.msg | default('') }}"
    tags: [execute]

  - name: "Req 03 - Verify ownership and permissions of /etc/issue.net"
    ansible.builtin.shell:
      cmd: "stat -L -c '%a %U:%G' /etc/issue.net"
    args:
      executable: /bin/bash
    register: result_03
    failed_when: false
    changed_when: false
    tags: [execute]

  - name: "Store requirement 03 details"
    set_fact:
      task_03_name: "Verify ownership and permissions using stat"
      task_03_cmd: "stat -L -c '%a %U:%G' /etc/issue.net"
      task_03_rc: "{{ result_03.rc | default(-1) }}"
      data_03: "{{ result_03.stdout | default('') | trim }}"
      status_03: "{{ 'APPLIED' if (result_03.stdout | default('') | trim | regex_search('^[0246][04][04] root:root$')) else 'FAILED' }}"
      details_03: "{{ 'Verification passed: permissions and ownership correct' if (result_03.stdout | default('') | trim | regex_search('^[0246][04][04] root:root$')) else 'Verification failed: expected root:root and no execute for owner and no write/execute for group/others, got ' + (result_03.stdout | default('') | trim) }}"
    tags: [execute]

  - name: "Generate remediation report"
    ansible.builtin.debug:
      msg:
      - "REMEDIATION REPORT — CIS 1.7.6"
      - "Reference: CIS Benchmark checkpoint 1.7.6"
      - ""
      - "REQUIREMENT 01 - {{ req_01 }}:"
      - "  Task: {{ task_01_name }}"
      - "  Command: {{ task_01_cmd }}"
      - "  Exit code: {{ task_01_rc }}"
      - "  Data: {{ data_01 }}"
      - "  Status: {{ status_01 }}"
      - "  Details: {{ details_01 }}"
      - ""
      - "REQUIREMENT 02 - {{ req_02 }}:"
      - "  Task: {{ task_02_name }}"
      - "  Command: {{ task_02_cmd }}"
      - "  Exit code: {{ task_02_rc }}"
      - "  Data: {{ data_02 }}"
      - "  Status: {{ status_02 }}"
      - "  Details: {{ details_02 }}"
      - ""
      - "REQUIREMENT 03 - {{ req_03 }}:"
      - "  Task: {{ task_03_name }}"
      - "  Command: {{ task_03_cmd }}"
      - "  Exit code: {{ task_03_rc }}"
      - "  Data: {{ data_03 }}"
      - "  Status: {{ status_03 }}"
      - "  Details: {{ details_03 }}"
      - ""
      - "OVERALL REMEDIATION:"
      - "  Result: {{ status_03 }}"
      - "  Details: {{ details_03 }}"
    tags: [execute]

  always:
  - name: "Restore - Check if backup exists"
    ansible.builtin.stat:
      path: "{{ backup_dir }}/issue.net"
    register: _restore_backup_stat
    failed_when: false
    tags: [restore]

  - name: "Restore - Restore /etc/issue.net from backup"
    ansible.builtin.copy:
      src: "{{ backup_dir }}/issue.net"
      dest: "/etc/issue.net"
      remote_src: true
    when: _restore_backup_stat.stat.exists | default(false)
    failed_when: false
    tags: [restore]

  - name: "Restore - Remove backup directory"
    ansible.builtin.file:
      path: "{{ backup_dir }}"
      state: absent
    failed_when: false
    tags: [restore]
