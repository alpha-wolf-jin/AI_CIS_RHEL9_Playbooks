---
- name: Initialize meta data variables
  include_vars: cis_remediation_var_1_7_6.yml

- name: "Snapshot - Create backup directory"
  ansible.builtin.file:
    path: "{{ backup_dir }}"
    state: directory
    mode: '0700'
  tags: [snapshot]
- name: "Snapshot - Check if target file exists"
  ansible.builtin.stat:
    path: "{{ target_file }}"
  register: _sg_file_stat
  tags: [snapshot]
- name: "Snapshot - Backup target file if exists"
  ansible.builtin.copy:
    src: "{{ target_file }}"
    dest: "{{ backup_dir }}/issue.net.present"
    remote_src: true
  when: _sg_file_stat.stat.exists
  tags: [snapshot]
- name: "Snapshot - Mark target file as absent if not exists"
  ansible.builtin.copy:
    content: "absent"
    dest: "{{ backup_dir }}/issue.net.absent"
  when: not _sg_file_stat.stat.exists
  tags: [snapshot]

- block:
  - name: "Initialize data variables"
    ansible.builtin.set_fact:
      data_01: "Not collected yet"
      status_01: "ERROR"
      details_01: "Not evaluated"
      data_02: "Not collected yet"
      status_02: "ERROR"
      details_02: "Not evaluated"
      data_03: "Not collected yet"
      status_03: "ERROR"
      details_03: "Not evaluated"
      data_04: "Not collected yet"
      status_04: "ERROR"
      details_04: "Not evaluated"
      task_01_name: "Not executed"
      task_01_cmd: "N/A"
      task_01_rc: -1
    tags: [execute]

  - name: "Req 01 - Pre-check - Verify target file exists"
    ansible.builtin.stat:
      path: "{{ target_file }}"
    register: pre_check_stat
    failed_when: false
    tags: [execute]

  - name: "Req 01 - Apply ownership to /etc/issue.net"
    ansible.builtin.file:
      path: "{{ target_file }}"
      owner: root
      group: root
    register: result_01
    failed_when: false
    when: pre_check_stat.stat.exists
    tags: [execute]

  - name: "Store requirement 01 details"
    ansible.builtin.set_fact:
      task_01_name: "Apply ownership to /etc/issue.net"
      task_01_cmd: "chown root:root {{ target_file }}"
      task_01_rc: "{{ result_01.rc | default(-1) if pre_check_stat.stat.exists else -1 }}"
      data_01: "{{ 'ownership set' if (pre_check_stat.stat.exists and result_01 is not failed) else 'file missing' }}"
      status_01: "{{ 'PASS' if (pre_check_stat.stat.exists and result_01 is not failed) else ('SKIP' if not pre_check_stat.stat.exists else 'FAIL') }}"
      details_01: "{{ 'Ownership applied successfully' if (pre_check_stat.stat.exists and result_01 is not failed) else ('File does not exist - skipped' if not pre_check_stat.stat.exists else 'Failed to apply ownership') }}"
    tags: [execute]

  - name: "Req 02 - Apply permissions to /etc/issue.net"
    ansible.builtin.file:
      path: "{{ target_file }}"
      mode: 'u-x,go-wx'
    register: result_02
    failed_when: false
    when: pre_check_stat.stat.exists
    tags: [execute]

  - name: "Store requirement 02 details"
    ansible.builtin.set_fact:
      task_02_name: "Apply permissions to /etc/issue.net"
      task_02_cmd: "chmod u-x,go-wx {{ target_file }}"
      task_02_rc: "{{ result_02.rc | default(-1) if pre_check_stat.stat.exists else -1 }}"
      data_02: "{{ 'permissions set' if (pre_check_stat.stat.exists and result_02 is not failed) else 'file missing' }}"
      status_02: "{{ 'PASS' if (pre_check_stat.stat.exists and result_02 is not failed) else ('SKIP' if not pre_check_stat.stat.exists else 'FAIL') }}"
      details_02: "{{ 'Permissions applied successfully' if (pre_check_stat.stat.exists and result_02 is not failed) else ('File does not exist - skipped' if not pre_check_stat.stat.exists else 'Failed to apply permissions') }}"
    tags: [execute]

  - name: "Req 03 - Verify ownership and permissions"
    ansible.builtin.shell: stat -L -c '%a %U:%G' {{ target_file }}
    args:
      executable: /bin/bash
    register: result_03
    failed_when: false
    when: pre_check_stat.stat.exists
    tags: [execute]

  - name: "Store requirement 03 details"
    ansible.builtin.set_fact:
      task_03_name: "Verify ownership and permissions"
      task_03_cmd: "stat -L -c '%a %U:%G' {{ target_file }}"
      task_03_rc: "{{ result_03.rc | default(-1) if pre_check_stat.stat.exists else -1 }}"
      data_03: "{{ result_03.stdout | default('') | trim if pre_check_stat.stat.exists else 'file missing' }}"
      status_03: >-
        {%- if not pre_check_stat.stat.exists -%}
          SKIP
        {%- elif result_03.rc | default(-1) == 0 -%}
          {%- set output = result_03.stdout | default('') | trim -%}
          {%- set parts = output.split(' ') -%}
          {%- if parts | length == 2 and parts[1] == 'root:root' -%}
            {%- set mode = parts[0] | int(base=8) -%}
            {%- if mode <= 420 -%}
              PASS
            {%- else -%}
              FAIL
            {%- endif -%}
          {%- else -%}
            FAIL
          {%- endif -%}
        {%- else -%}
          FAIL
        {%- endif -%}
      details_03: >-
        {%- if not pre_check_stat.stat.exists -%}
          File does not exist - skipped
        {%- elif result_03.rc | default(-1) == 0 -%}
          {%- set output = result_03.stdout | default('') | trim -%}
          {%- set parts = output.split(' ') -%}
          {%- if parts | length == 2 and parts[1] == 'root:root' -%}
            {%- set mode = parts[0] | int(base=8) -%}
            {%- if mode <= 420 -%}
              Verification passed - permissions {{ parts[0] }}, owner root:root
            {%- else -%}
              Permissions not restrictive enough - got {{ parts[0] }}
            {%- endif -%}
          {%- else -%}
            Ownership incorrect - got {{ output }}
          {%- endif -%}
        {%- else -%}
          Verification command failed
        {%- endif -%}
    tags: [execute]

  - name: "Req 04 - Store final remediation result in cis_result"
    ansible.builtin.set_fact:
      cis_result: "{{ status_03 | default('ERROR') | trim }}"
      status_04: "{{ status_03 | default('ERROR') | trim }}"
      details_04: "{{ details_03 | default('Not evaluated') | trim }}"
      data_04: "{{ data_03 | default('') | trim }}"
      task_04_name: "Store cis_result"
      task_04_cmd: "set_fact"
      task_04_rc: "0"
    tags: [execute]

  - name: "Generate remediation report"
    ansible.builtin.debug:
      msg:
      - "REMEDIATION REPORT — CIS 1.7.6"
      - "Reference: CIS Benchmark checkpoint 1.7.6"
      - ""
      - "REQUIREMENT 01 - {{ req_01 }}:"
      - "  Task: {{ task_01_name | default('Not recorded') }}"
      - "  Command: {{ task_01_cmd | default('N/A') }}"
      - "  Exit code: {{ task_01_rc | default(-1) }}"
      - "  Data: {{ data_01 | default('') | trim }}"
      - "  Status: {{ status_01 | default('ERROR') | trim }}"
      - "  Details: {{ details_01 | default('') | trim }}"
      - ""
      - "REQUIREMENT 02 - {{ req_02 }}:"
      - "  Task: {{ task_02_name | default('Not recorded') }}"
      - "  Command: {{ task_02_cmd | default('N/A') }}"
      - "  Exit code: {{ task_02_rc | default(-1) }}"
      - "  Data: {{ data_02 | default('') | trim }}"
      - "  Status: {{ status_02 | default('ERROR') | trim }}"
      - "  Details: {{ details_02 | default('') | trim }}"
      - ""
      - "REQUIREMENT 03 - {{ req_03 }}:"
      - "  Task: {{ task_03_name | default('Not recorded') }}"
      - "  Command: {{ task_03_cmd | default('N/A') }}"
      - "  Exit code: {{ task_03_rc | default(-1) }}"
      - "  Data: {{ data_03 | default('') | trim }}"
      - "  Status: {{ status_03 | default('ERROR') | trim }}"
      - "  Details: {{ details_03 | default('') | trim }}"
      - ""
      - "REQUIREMENT 04 - {{ req_04 }}:"
      - "  Task: {{ task_04_name | default('Not recorded') }}"
      - "  Command: {{ task_04_cmd | default('N/A') }}"
      - "  Exit code: {{ task_04_rc | default(-1) }}"
      - "  Data: {{ data_04 | default('') | trim }}"
      - "  Status: {{ status_04 | default('ERROR') | trim }}"
      - "  Details: {{ details_04 | default('') | trim }}"
      - ""
      - "========================================================"
      - "OVERALL REMEDIATION:"
      - "  Result: {{ cis_result | default('ERROR') | trim }}"
      - "  Details: {{ details_04 | default('Not evaluated') | trim }}"
      - "========================================================"
    tags: [execute]

  always:
  - name: "Restore - Check if backup exists"
    ansible.builtin.stat:
      path: "{{ backup_dir }}/issue.net.present"
    register: _restore_present
    failed_when: false
    tags: [restore]

  - name: "Restore - Overwrite with original"
    ansible.builtin.copy:
      src: "{{ backup_dir }}/issue.net.present"
      dest: "{{ target_file }}"
      remote_src: true
    when: _restore_present.stat.exists | default(false)
    failed_when: false
    tags: [restore]

  - name: "Restore - Check if absent marker exists"
    ansible.builtin.stat:
      path: "{{ backup_dir }}/issue.net.absent"
    register: _restore_absent
    failed_when: false
    tags: [restore]

  - name: "Restore - Delete file if it was absent before"
    ansible.builtin.file:
      path: "{{ target_file }}"
      state: absent
    when: _restore_absent.stat.exists | default(false)
    failed_when: false
    tags: [restore]

  - name: "Restore - Remove backup directory"
    ansible.builtin.file:
      path: "{{ backup_dir }}"
      state: absent
    failed_when: false
    tags: [restore]
