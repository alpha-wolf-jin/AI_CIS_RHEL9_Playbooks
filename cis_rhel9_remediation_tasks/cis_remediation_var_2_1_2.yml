playbook_name: "cis_2_1_2_remediation"
backup_dir: "/var/log/ai-playbooks-backup/{{ playbook_name }}"
req_01: "Apply stop avahi-daemon services using command: `systemctl stop avahi-daemon.socket avahi-daemon.service`. Expected result: The avahi-daemon.socket and avahi-daemon.service are stopped."
req_02: "Apply remove avahi package using command: `dnf remove avahi`. Expected result: The avahi package is removed from the system."
req_03: "Apply mask avahi-daemon services using command: `systemctl mask avahi-daemon.socket avahi-daemon.service`. Expected result: The avahi-daemon.socket and avahi-daemon.service are masked and cannot be started."
req_04: "Verify avahi daemon services are not active using command: `systemctl is-active avahi-daemon.socket avahi-daemon.service`. Expected result: Output shows 'inactive' for both services."
req_05: "Store the final remediation result in a variable named 'cis_result' using set_fact. Set cis_result to the overall remediation status (PASS/FAIL/SKIP/ERROR) derived from the last requirement's status variable."
