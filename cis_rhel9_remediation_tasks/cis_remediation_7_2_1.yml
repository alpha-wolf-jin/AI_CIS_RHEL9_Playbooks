---
- name: Initialize meta data variables
  include_vars: cis_remediation_var_7_2_1.yml

- name: "State Guard - Check for existing checkpoint"
  ansible.builtin.stat:
    path: "{{ state_guard_flag }}"
  register: _sg_flag
  tags: [snapshot]
- name: "State Guard - Restore /etc/passwd from prior checkpoint"
  ansible.builtin.copy:
    src: "{{ state_guard_dir }}/passwd.present"
    dest: "/etc/passwd"
    remote_src: true
  when: "_sg_flag.stat.exists"
  failed_when: false
  tags: [snapshot]
- name: "State Guard - Restore /etc/shadow from prior checkpoint"
  ansible.builtin.copy:
    src: "{{ state_guard_dir }}/shadow.present"
    dest: "/etc/shadow"
    remote_src: true
  when: "_sg_flag.stat.exists"
  failed_when: false
  tags: [snapshot]
- name: "State Guard - Remove old checkpoint"
  ansible.builtin.file:
    path: "{{ state_guard_dir }}"
    state: absent
  when: "_sg_flag.stat.exists"
  tags: [snapshot]
- name: "State Guard - Create checkpoint directory"
  ansible.builtin.file:
    path: "{{ state_guard_dir }}"
    state: directory
    mode: '0700'
  tags: [snapshot]
- name: "State Guard - Backup /etc/passwd"
  ansible.builtin.copy:
    src: "/etc/passwd"
    dest: "{{ state_guard_dir }}/passwd.present"
    remote_src: true
  tags: [snapshot]
- name: "State Guard - Backup /etc/shadow"
  ansible.builtin.copy:
    src: "/etc/shadow"
    dest: "{{ state_guard_dir }}/shadow.present"
    remote_src: true
  tags: [snapshot]
- name: "State Guard - Create checkpoint flag"
  ansible.builtin.copy:
    content: "checkpoint"
    dest: "{{ state_guard_flag }}"
  tags: [snapshot]

- name: "Initialize data variables"
  ansible.builtin.set_fact:
    data_01: "Not collected yet"
    status_01: "UNKNOWN"
    details_01: "Not evaluated"
    data_02: "Not collected yet"
    status_02: "UNKNOWN"
    details_02: "Not evaluated"
    data_03: "Not collected yet"
    status_03: "UNKNOWN"
    details_03: "Not evaluated"
    data_04: "Not collected yet"
    status_04: "UNKNOWN"
    details_04: "Not evaluated"
    task_01_name: "Not executed"
    task_01_cmd: "N/A"
    task_01_rc: -1
    task_02_name: "Not executed"
    task_02_cmd: "N/A"
    task_02_rc: -1
    task_03_name: "Not executed"
    task_03_cmd: "N/A"
    task_03_rc: -1
    task_04_name: "Not executed"
    task_04_cmd: "N/A"
    task_04_rc: -1
    cis_result: "UNKNOWN"
  tags: [execute]
- block:
# === EXECUTE PHASE ===
  - name: "Req 01 - Check if pwconv command is available"
    ansible.builtin.shell: "which pwconv"
    args:
      executable: /bin/bash
    register: result_01
    failed_when: false
    changed_when: false
    tags: [execute]

  - name: "Store requirement 01 details"
    ansible.builtin.set_fact:
      task_01_name: "Check pwconv availability"
      task_01_cmd: "which pwconv"
      task_01_rc: "{{ result_01.rc | default(-1) }}"
      data_01: "{{ result_01.stdout | default('') | trim }}"
      status_01: "{{ 'PASS' if (result_01.rc | default(-1)) == 0 else 'FAIL' }}"
      details_01: "{{ 'pwconv found at: ' ~ (result_01.stdout | default('') | trim) if (result_01.rc | default(-1)) == 0 else 'pwconv not found' }}"
    tags: [execute]

  - name: "Req 02 - Migrate passwords to shadowed format using pwconv"
    ansible.builtin.shell: "pwconv"
    args:
      executable: /bin/bash
    register: result_02
    failed_when: false
    changed_when: false
    when: "(result_01.rc | default(-1)) == 0"
    tags: [execute]

  - name: "Store requirement 02 details"
    ansible.builtin.set_fact:
      task_02_name: "Run pwconv to migrate passwords"
      task_02_cmd: "pwconv"
      task_02_rc: "{{ result_02.rc | default(-1) if result_02 is defined else -1 }}"
      data_02: "{{ result_02.stdout | default('') | trim if result_02 is defined else 'Skipped - pwconv not available' }}"
      status_02: "{{ 'PASS' if (result_02.rc | default(-1)) == 0 else ('SKIP' if result_02 is not defined else 'FAIL') }}"
      details_02: "{{ 'Passwords migrated to shadow format' if (result_02.rc | default(-1)) == 0 else ('Skipped - pwconv not available' if result_02 is not defined else 'pwconv command failed') }}"
    tags: [execute]

  - name: "Req 03 - Investigate accounts without shadowed passwords"
    ansible.builtin.shell: |
      {% raw %}
      awk -F: '$2!="x"{print $1}' /etc/passwd
      {% endraw %}
    args:
      executable: /bin/bash
    register: result_03
    failed_when: false
    changed_when: false
    tags: [execute]

  - name: "Store requirement 03 details"
    ansible.builtin.set_fact:
      task_03_name: "Investigate non-shadowed accounts"
      task_03_cmd: |
        awk -F: '$2!=\"x\"{print $1}' /etc/passwd
      task_03_rc: "{{ result_03.rc | default(-1) }}"
      data_03: "{{ result_03.stdout | default('') | trim }}"
      status_03: "{{ 'PASS' if (result_03.stdout | default('') | trim) == '' else 'FAIL' }}"
      details_03: "{{ 'No non-shadowed accounts found' if (result_03.stdout | default('') | trim) == '' else 'Non-shadowed accounts: ' ~ (result_03.stdout | default('') | trim) }}"
    tags: [execute]

  - name: "Req 04 - Verify all accounts use shadowed passwords"
    ansible.builtin.shell: |
      {% raw %}
      awk -F: '$2=="x"{count++} END{print count " accounts use shadowed passwords"}' /etc/passwd
      {% endraw %}
    args:
      executable: /bin/bash
    register: result_04
    failed_when: false
    changed_when: false
    tags: [execute]

  - name: "Store requirement 04 details"
    ansible.builtin.set_fact:
      task_04_name: "Verify shadowed password count"
      task_04_cmd: |
        awk -F: '$2==\"x\"{count++} END{print count \" accounts use shadowed passwords\"}' /etc/passwd
      task_04_rc: "{{ result_04.rc | default(-1) }}"
      data_04: "{{ result_04.stdout | default('') | trim }}"
      status_04: "{{ 'PASS' if (result_04.rc | default(-1)) == 0 else 'FAIL' }}"
      details_04: "{{ 'Verification complete: ' ~ (result_04.stdout | default('') | trim) if (result_04.rc | default(-1)) == 0 else 'Verification failed' }}"
    tags: [execute]

  - name: "Store overall remediation result"
    ansible.builtin.set_fact:
      cis_result: "{{ status_04 | trim }}"
    tags: [execute]

  - name: "Generate remediation report"
    ansible.builtin.debug:
      msg:
      - "========================================================"
      - "        REMEDIATION REPORT — CIS 7.2.1"
      - "        Reference: CIS Benchmark checkpoint 7.2.1"
      - "========================================================"
      - ""
      - "REQUIREMENT 01 - {{ req_01 }}:"
      - "  Task: {{ task_01_name | default('Task not recorded') }}"
      - "  Command: {{ task_01_cmd | default('N/A') }}"
      - "  Exit code: {{ task_01_rc | default(-1) }}"
      - "  Data: {{ data_01 | default('') | trim }}"
      - "  Status: {{ status_01 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_01 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 02 - {{ req_02 }}:"
      - "  Task: {{ task_02_name | default('Task not recorded') }}"
      - "  Command: {{ task_02_cmd | default('N/A') }}"
      - "  Exit code: {{ task_02_rc | default(-1) }}"
      - "  Data: {{ data_02 | default('') | trim }}"
      - "  Status: {{ status_02 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_02 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 03 - {{ req_03 }}:"
      - "  Task: {{ task_03_name | default('Task not recorded') }}"
      - "  Command: {{ task_03_cmd | default('N/A') }}"
      - "  Exit code: {{ task_03_rc | default(-1) }}"
      - "  Data: {{ data_03 | default('') | trim }}"
      - "  Status: {{ status_03 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_03 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 04 - {{ req_04 }}:"
      - "  Task: {{ task_04_name | default('Task not recorded') }}"
      - "  Command: {{ task_04_cmd | default('N/A') }}"
      - "  Exit code: {{ task_04_rc | default(-1) }}"
      - "  Data: {{ data_04 | default('') | trim }}"
      - "  Status: {{ status_04 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_04 | default('Not evaluated') | trim }}"
      - ""
      - "========================================================"
      - "OVERALL REMEDIATION:"
      - "  Result: {{ cis_result | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_04 | default('Not evaluated') | trim }}"
      - "========================================================"
    tags: [execute]

  always:
# === STATE GUARD — RESTORE PHASE ===
  - name: "State Guard Restore - Check if checkpoint exists"
    ansible.builtin.stat:
      path: "{{ state_guard_flag }}"
    register: _sg_restore_flag
    failed_when: false
    tags: [restore]

  - name: "State Guard Restore - Check if passwd backup exists"
    ansible.builtin.stat:
      path: "{{ state_guard_dir }}/passwd.present"
    register: _sg_restore_passwd
    failed_when: false
    tags: [restore]

  - name: "State Guard Restore - Restore /etc/passwd from backup"
    ansible.builtin.copy:
      src: "{{ state_guard_dir }}/passwd.present"
      dest: "/etc/passwd"
      remote_src: true
    when: "_sg_restore_passwd.stat.exists | default(false)"
    failed_when: false
    tags: [restore]

  - name: "State Guard Restore - Check if shadow backup exists"
    ansible.builtin.stat:
      path: "{{ state_guard_dir }}/shadow.present"
    register: _sg_restore_shadow
    failed_when: false
    tags: [restore]

  - name: "State Guard Restore - Restore /etc/shadow from backup"
    ansible.builtin.copy:
      src: "{{ state_guard_dir }}/shadow.present"
      dest: "/etc/shadow"
      remote_src: true
    when: "_sg_restore_shadow.stat.exists | default(false)"
    failed_when: false
    tags: [restore]

  - name: "State Guard Restore - Remove checkpoint"
    ansible.builtin.file:
      path: "{{ state_guard_dir }}"
      state: absent
    when: "_sg_restore_flag.stat.exists | default(false)"
    failed_when: false
    tags: [restore]
