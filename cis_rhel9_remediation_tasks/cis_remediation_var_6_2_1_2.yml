playbook_name: "cis_6_2_1_2_journald_log_access"
backup_dir: "/var/log/ai-playbooks-backup/{{ playbook_name }}"
req_01: "Check if the default configuration is appropriate for site specific requirements. If not, proceed with the following steps."
req_02: "Copy /usr/lib/tmpfiles.d/systemd.conf to /etc/tmpfiles.d/systemd.conf using command: `cp /usr/lib/tmpfiles.d/systemd.conf /etc/tmpfiles.d/systemd.conf`. Expected result: The file is copied to /etc/tmpfiles.d/systemd.conf."
req_03: "Modify the permissions in /etc/tmpfiles.d/systemd.conf to 0640 or a less restrictive site policy using command: `sed -i 's/^f /var/log/journal.*/f /var/log/journal 0640 root root -/' /etc/tmpfiles.d/systemd.conf`. Expected result: The log file access permissions are set to 0640 (or site policy) in the configuration."
req_04: "Verify the configuration by checking the permissions setting in /etc/tmpfiles.d/systemd.conf using command: `grep '^f /var/log/journal' /etc/tmpfiles.d/systemd.conf`. Expected result: The output shows the line with the correct permissions (e.g., 'f /var/log/journal 0640 root root -')."
source_config: "/usr/lib/tmpfiles.d/systemd.conf"
target_config: "/etc/tmpfiles.d/systemd.conf"
desired_perms: "0640"
desired_owner: "root"
desired_group: "root"
