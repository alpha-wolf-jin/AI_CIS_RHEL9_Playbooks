---
- name: Initialize meta data variables
  include_vars: cis_remediation_var_5_4_2_8.yml

- name: "Snapshot - Create backup directory"
  ansible.builtin.file:
    path: "{{ backup_dir }}"
    state: directory
    mode: '0700'
  tags: [snapshot]
- name: "Snapshot - Check if /etc/passwd exists"
  ansible.builtin.stat:
    path: "/etc/passwd"
  register: _passwd_stat
  tags: [snapshot]
- name: "Snapshot - Backup /etc/passwd"
  ansible.builtin.copy:
    src: "/etc/passwd"
    dest: "{{ backup_dir }}/passwd.present"
    remote_src: true
    force: false
  when: "_passwd_stat.stat.exists | default(false)"
  tags: [snapshot]
- name: "Snapshot - Check if /etc/shadow exists"
  ansible.builtin.stat:
    path: "/etc/shadow"
  register: _shadow_stat
  tags: [snapshot]
- name: "Snapshot - Backup /etc/shadow"
  ansible.builtin.copy:
    src: "/etc/shadow"
    dest: "{{ backup_dir }}/shadow.present"
    remote_src: true
    force: false
  when: "_shadow_stat.stat.exists | default(false)"
  tags: [snapshot]
- name: "Snapshot - Check if remediation script exists"
  ansible.builtin.stat:
    path: "/tmp/remediate_cis_5_4_2_8.sh"
  register: _snap_script_stat
  tags: [snapshot]
- name: "Snapshot - Record remediation script existence"
  ansible.builtin.copy:
    content: "{{ _snap_script_stat.stat.exists | default(false) }}"
    dest: "{{ backup_dir }}/remediate_script_exists"
    force: false
  tags: [snapshot]

- block:
  - name: "Req 01 - Check if shadow-utils is installed"
    ansible.builtin.package_facts:
      manager: auto
    failed_when: false
    tags: [execute]

  - name: "Req 01 - Set skip fact if shadow-utils not installed"
    ansible.builtin.set_fact:
      playbook_skipped: "{{ 'shadow-utils' not in ansible_facts.packages }}"
    tags: [execute]

  - name: "Req 01 - Deploy remediation script"
    ansible.builtin.copy:
      content: |
        #!/usr/bin/env bash
        {
           l_valid_shells="^($(awk -F\/ '$NF != "nologin" {print}' /etc/shells | sed -rn '/^\//{s,/,\\\\/,g;p}' | paste -s -d '|' - ))$"
           while IFS= read -r l_user; do
              passwd -S "$l_user" | awk '$2 !~ /^L/ {system ("usermod -L " $1)}'
           done < <(awk -v pat="$l_valid_shells" -F: '($1 != "root" && $(NF) !~ pat) {print $1}' /etc/passwd)
        }
      dest: "/tmp/remediate_cis_5_4_2_8.sh"
      mode: '0700'
    when: "not (playbook_skipped | default(false))"
    tags: [execute]

  - name: "Req 01 - Execute remediation script"
    ansible.builtin.shell: "/bin/bash /tmp/remediate_cis_5_4_2_8.sh"
    args:
      executable: /bin/bash
    register: result_01
    failed_when: false
    changed_when: false
    when: "not (playbook_skipped | default(false))"
    tags: [execute]

  - name: "Req 01 - Clean up remediation script"
    ansible.builtin.file:
      path: "/tmp/remediate_cis_5_4_2_8.sh"
      state: absent
    failed_when: false
    tags: [execute]

  - name: "Req 02 - Verify no unlocked accounts without valid login shell"
    ansible.builtin.shell: |
      l_valid_shells="^($(awk -F\/ '$NF != "nologin" {print}' /etc/shells | sed -rn '/^\//{s,/,\\\\/,g;p}' | paste -s -d '|' - ))$"
      awk -v pat="$l_valid_shells" -F: '($1 != "root" && $(NF) !~ pat) {print $1}' /etc/passwd | while read -r l_user; do
        passwd -S "$l_user" | awk '$2 !~ /^L/ {print $1}'
      done
    args:
      executable: /bin/bash
    register: result_02
    failed_when: false
    changed_when: false
    tags: [execute]

  - name: "Req 03 - Store final remediation result in cis_result"
    ansible.builtin.set_fact:
      cis_result: >-
        {{ 'SKIP' if (playbook_skipped | default(false))
           else ('PASS' if (result_02.stdout | default('') | trim | length == 0)
           else 'FAIL') }}
    tags: [execute]

  - name: "Req 04 - Generate remediation report"
    ansible.builtin.debug:
      msg:
      - "========================================================"
      - "        REMEDIATION REPORT — CIS 5.4.2.8"
      - "========================================================"
      - "Reference: CIS Benchmark checkpoint 5.4.2.8"
      - ""
      - "REQUIREMENT 01 - {{ req_01 }}:"
      - "  Task: Execute remediation script to lock accounts"
      - "  Command: /bin/bash /tmp/remediate_cis_5_4_2_8.sh"
      - "  Exit code: {{ result_01.rc | default(-1) }}"
      - "  Data: {{ result_01.stdout | default('') | trim }}"
      - "  Status: {{ ('SKIP' if (playbook_skipped | default(false)) else ('PASS' if (result_01.rc | default(-1)) == 0 else 'FAIL')) | trim }}"
      - "  Details: {{ ('shadow-utils not installed' if (playbook_skipped | default(false)) else ('Script executed successfully' if (result_01.rc | default(-1)) == 0 else 'Script execution failed')) | trim }}"
      - ""
      - "REQUIREMENT 02 - {{ req_02 }}:"
      - "  Task: Verify no unlocked accounts without valid login shell"
      - "  Command: awk/passwd verification pipeline"
      - "  Exit code: {{ result_02.rc | default(-1) }}"
      - "  Data: {{ result_02.stdout | default('') | trim }}"
      - "  Status: {{ ('SKIP' if (playbook_skipped | default(false)) else ('PASS' if (result_02.stdout | default('') | trim | length == 0) else 'FAIL')) | trim }}"
      - "  Details: {{ ('shadow-utils not installed' if (playbook_skipped | default(false)) else ('No unlocked accounts found — compliant' if (result_02.stdout | default('') | trim | length == 0) else 'Unlocked accounts remain: ' + (result_02.stdout | default('') | trim))) | trim }}"
      - ""
      - "REQUIREMENT 03 - {{ req_03 }}:"
      - "  Task: Store final remediation result in cis_result"
      - "  Command: ansible.builtin.set_fact"
      - "  Exit code: 0"
      - "  Data: {{ cis_result }}"
      - "  Status: PASS"
      - "  Details: cis_result stored as {{ cis_result }}"
      - ""
      - "========================================================"
      - "OVERALL REMEDIATION:"
      - "  Result: {{ cis_result }}"
      - "  Details: {{ ('shadow-utils not installed — remediation skipped' if (playbook_skipped | default(false)) else ('All non-root accounts without valid login shell are locked' if (cis_result | trim == 'PASS') else 'Some accounts remain unlocked')) | trim }}"
      - "========================================================"
    tags: [execute]

  always:
        # === State Guard Restore: clean up temporary artifacts only ===
        # Intentionally NOT restoring /etc/passwd or /etc/shadow —
# remediation must persist after playbook completion
  - name: "Restore - Read remediation script existence marker"
    ansible.builtin.slurp:
      src: "{{ backup_dir }}/remediate_script_exists"
    register: _restore_script_marker
    failed_when: false
    tags: [restore]

  - name: "Restore - Remove remediation script if it was created"
    ansible.builtin.file:
      path: "/tmp/remediate_cis_5_4_2_8.sh"
      state: absent
    when:
    - "_restore_script_marker.content is defined"
    - "(_restore_script_marker.content | b64decode | trim) == 'False'"
    failed_when: false
    tags: [restore]

  - name: "Restore - Remove backup directory"
    ansible.builtin.file:
      path: "{{ backup_dir }}"
      state: absent
    failed_when: false
    tags: [restore]
