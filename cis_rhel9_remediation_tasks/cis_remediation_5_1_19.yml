---
- name: Initialize meta data variables
  include_vars: cis_remediation_var_5_1_19.yml

- name: "Snapshot - Create backup directory"
  ansible.builtin.file:
    path: "{{ backup_dir }}"
    state: directory
    mode: '0700'
  tags: [snapshot]
- name: "Snapshot - Check if config file exists"
  ansible.builtin.stat:
    path: "{{ config_file }}"
  register: _snapshot_config_stat
  failed_when: false
  tags: [snapshot]
- name: "Snapshot - Backup config file if exists"
  ansible.builtin.copy:
    src: "{{ config_file }}"
    dest: "{{ backup_dir }}/{{ config_file | basename }}.backup"
    remote_src: true
  when: _snapshot_config_stat.stat.exists | default(false)
  failed_when: false
  tags: [snapshot]

- block:
  - name: "Initialize data variables"
    ansible.builtin.set_fact:
      data_01: "Not collected yet"
      status_01: "ERROR"
      details_01: "Not evaluated"
      data_02: "Not collected yet"
      status_02: "ERROR"
      details_02: "Not evaluated"
      data_03: "Not collected yet"
      status_03: "ERROR"
      details_03: "Not evaluated"
      data_04: "Not collected yet"
      status_04: "ERROR"
      details_04: "Not evaluated"
      data_05: "Not collected yet"
      status_05: "ERROR"
      details_05: "Not evaluated"
      task_01_name: "Not executed"
      task_01_cmd: "N/A"
      task_01_rc: -1
      task_02_name: "Not executed"
      task_02_cmd: "N/A"
      task_02_rc: -1
      task_03_name: "Not executed"
      task_03_cmd: "N/A"
      task_03_rc: -1
      task_04_name: "Not executed"
      task_04_cmd: "N/A"
      task_04_rc: -1
      task_05_name: "Not executed"
      task_05_cmd: "N/A"
      task_05_rc: -1
    tags: [execute]

  - name: "Req 01 - Check if {{ package_name }} is installed"
    ansible.builtin.package_facts:
      manager: auto
    failed_when: false
    tags: [execute]

  - name: "Req 01 - Set skip fact if package not installed"
    ansible.builtin.set_fact:
      playbook_skipped: "{{ package_name not in ansible_facts.packages }}"
    tags: [execute]

  - name: "Req 01 - Check sshd binary exists and config syntax is valid"
    ansible.builtin.shell: |
      which {{ service_binary }} && {{ service_binary }} -t 2>/dev/null
    args:
      executable: /bin/bash
    register: result_01
    failed_when: false
    changed_when: false
    when: "not (playbook_skipped | default(false) | bool)"
    tags: [execute]

  - name: "Req 01 - Store prerequisite check details"
    ansible.builtin.set_fact:
      task_01_name: "Check sshd binary and config syntax"
      task_01_cmd: "which sshd && sshd -t 2>/dev/null"
      task_01_rc: "{{ result_01.rc | default(-1) }}"
      data_01: "{{ result_01.stdout | default('') | trim }}"
      status_01: "{{ 'SKIP' if (playbook_skipped | default(false) | bool) else ('PASS' if result_01.rc | default(-1) == 0 else 'FAIL') }}"
      details_01: "{{ 'Package not installed' if (playbook_skipped | default(false) | bool) else ('sshd binary found and config syntax valid' if result_01.rc | default(-1) == 0 else 'sshd binary not found or config syntax invalid') }}"
    tags: [execute]

  - name: "Req 02 - Capture config before change"
    ansible.builtin.slurp:
      src: "{{ config_file }}"
    register: _before_config
    failed_when: false
    when: "not (playbook_skipped | default(false) | bool)"
    tags: [execute]

  - name: "Req 02 - Apply change to disable PermitEmptyPasswords"
    ansible.builtin.shell: |
      sed -i 's/^#*PermitEmptyPasswords.*/PermitEmptyPasswords no/' /etc/ssh/sshd_config && if ! grep -q '^PermitEmptyPasswords no' /etc/ssh/sshd_config; then echo 'PermitEmptyPasswords no' | tee -a /etc/ssh/sshd_config > /dev/null; fi
    args:
      executable: /bin/bash
    register: result_02
    failed_when: false
    when: "not (playbook_skipped | default(false) | bool)"
    tags: [execute]

  - name: "Req 02 - Capture config after change"
    ansible.builtin.slurp:
      src: "{{ config_file }}"
    register: _after_config
    failed_when: false
    when: "not (playbook_skipped | default(false) | bool)"
    tags: [execute]

  - name: "Req 02 - Store config change details"
    ansible.builtin.set_fact:
      task_02_name: "Set PermitEmptyPasswords to no in sshd_config"
      task_02_cmd: "sed -i 's/^#*PermitEmptyPasswords.*/PermitEmptyPasswords no/' /etc/ssh/sshd_config && if ! grep -q '^PermitEmptyPasswords no' /etc/ssh/sshd_config; then echo 'PermitEmptyPasswords no' | tee -a /etc/ssh/sshd_config > /dev/null; fi"
      task_02_rc: "{{ result_02.rc | default(-1) }}"
      data_02: "{{ (_after_config.content | default('') | b64decode | trim) if not (playbook_skipped | default(false) | bool) else 'N/A' }}"
      status_02: "{{ 'SKIP' if (playbook_skipped | default(false) | bool) else ('APPLIED' if result_02.rc | default(-1) == 0 else 'FAIL') }}"
      details_02: >-
        {{ 'Package not installed' if (playbook_skipped | default(false) | bool) else
           ('Before: ' ~ (_before_config.content | default('') | b64decode | trim) ~ ' | After: ' ~ (_after_config.content | default('') | b64decode | trim))
           if result_02.rc | default(-1) == 0 else 'Change failed' }}
    tags: [execute]

  - name: "Req 03 - Restart sshd service"
    ansible.builtin.service:
      name: sshd
      state: restarted
    register: result_03
    failed_when: false
    when: "not (playbook_skipped | default(false) | bool)"
    tags: [execute]

  - name: "Req 03 - Store restart details"
    ansible.builtin.set_fact:
      task_03_name: "Restart sshd service"
      task_03_cmd: "systemctl restart sshd"
      task_03_rc: "{{ 0 if result_03 is succeeded else 1 }}"
      data_03: "{{ 'Restarted' if result_03 is succeeded else 'Failed to restart' }}"
      status_03: "{{ 'SKIP' if (playbook_skipped | default(false) | bool) else ('PASS' if result_03 is succeeded else 'FAIL') }}"
      details_03: "{{ 'Package not installed' if (playbook_skipped | default(false) | bool) else ('SSH service restarted successfully' if result_03 is succeeded else 'SSH service restart failed') }}"
    tags: [execute]

  - name: "Req 04 - Verify PermitEmptyPasswords is set to no"
    ansible.builtin.shell: |
      {{ service_binary }} -T 2>/dev/null | grep -i permitemptypasswords || echo 'VERIFY_FAILED'
    args:
      executable: /bin/bash
    register: result_04
    failed_when: false
    changed_when: false
    when: "not (playbook_skipped | default(false) | bool)"
    tags: [execute]

  - name: "Req 04 - Store verification details"
    ansible.builtin.set_fact:
      task_04_name: "Verify PermitEmptyPasswords is set to no"
      task_04_cmd: "sshd -T | grep -i permitemptypasswords"
      task_04_rc: "{{ result_04.rc | default(-1) }}"
      data_04: "{{ result_04.stdout | default('') | trim }}"
      status_04: "{{ 'SKIP' if (playbook_skipped | default(false) | bool) else ('PASS' if 'permitemptypasswords no' in (result_04.stdout | default('') | lower) else 'FAIL') }}"
      details_04: "{{ 'Package not installed' if (playbook_skipped | default(false) | bool) else ('Verification passed: permitemptypasswords no' if 'permitemptypasswords no' in (result_04.stdout | default('') | lower) else 'Verification failed') }}"
    tags: [execute]

  - name: "Req 05 - Store final remediation result"
    ansible.builtin.set_fact:
      cis_result: "{{ status_04 | default('ERROR') | trim }}"
      task_05_name: "Set cis_result from verification status"
      task_05_cmd: "set_fact cis_result = {{ status_04 | default('ERROR') | trim }}"
      task_05_rc: 0
      data_05: "{{ status_04 | default('ERROR') | trim }}"
      status_05: "{{ status_04 | default('ERROR') | trim }}"
      details_05: "Overall remediation status derived from requirement 04"
    tags: [execute]

  - name: "Generate remediation report"
    ansible.builtin.debug:
      msg:
      - "========================================================"
      - "        REMEDIATION REPORT — CIS 5.1.19"
      - "========================================================"
      - "Reference: CIS Benchmark checkpoint 5.1.19"
      - ""
      - "REQUIREMENT 01 - {{ req_01 }}:"
      - "  Task: {{ task_01_name | default('Task not recorded') }}"
      - "  Command: {{ task_01_cmd | default('N/A') }}"
      - "  Exit code: {{ task_01_rc | default(-1) }}"
      - "  Data: {{ data_01 | default('') | trim }}"
      - "  Status: {{ status_01 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_01 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 02 - {{ req_02 }}:"
      - "  Task: {{ task_02_name | default('Task not recorded') }}"
      - "  Command: {{ task_02_cmd | default('N/A') }}"
      - "  Exit code: {{ task_02_rc | default(-1) }}"
      - "  Data: {{ (data_02 | default('') | trim)[:200] ~ '...' if (data_02 | default('') | length > 200) else (data_02 | default('') | trim) }}"
      - "  Status: {{ status_02 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_02 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 03 - {{ req_03 }}:"
      - "  Task: {{ task_03_name | default('Task not recorded') }}"
      - "  Command: {{ task_03_cmd | default('N/A') }}"
      - "  Exit code: {{ task_03_rc | default(-1) }}"
      - "  Data: {{ data_03 | default('') | trim }}"
      - "  Status: {{ status_03 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_03 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 04 - {{ req_04 }}:"
      - "  Task: {{ task_04_name | default('Task not recorded') }}"
      - "  Command: {{ task_04_cmd | default('N/A') }}"
      - "  Exit code: {{ task_04_rc | default(-1) }}"
      - "  Data: {{ data_04 | default('') | trim }}"
      - "  Status: {{ status_04 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_04 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 05 - {{ req_05 }}:"
      - "  Task: {{ task_05_name | default('Task not recorded') }}"
      - "  Command: {{ task_05_cmd | default('N/A') }}"
      - "  Exit code: {{ task_05_rc | default(-1) }}"
      - "  Data: {{ data_05 | default('') | trim }}"
      - "  Status: {{ status_05 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_05 | default('Not evaluated') | trim }}"
      - ""
      - "========================================================"
      - "OVERALL REMEDIATION:"
      - "  Result: {{ cis_result | default('ERROR') | trim }}"
      - "  Details: {{ details_05 | default('Not evaluated') | trim }}"
      - "========================================================"
    tags: [execute]

  always:
  - name: "Restore - Check if backup exists"
    ansible.builtin.stat:
      path: "{{ backup_dir }}/{{ config_file | basename }}.backup"
    register: _restore_backup_stat
    failed_when: false
    tags: [restore]

  - name: "Restore - Overwrite with original"
    ansible.builtin.copy:
      src: "{{ backup_dir }}/{{ config_file | basename }}.backup"
      dest: "{{ config_file }}"
      remote_src: true
    when: _restore_backup_stat.stat.exists | default(false)
    failed_when: false
    tags: [restore]

  - name: "Restore - Restart sshd to apply original config"
    ansible.builtin.service:
      name: sshd
      state: restarted
    when: _restore_backup_stat.stat.exists | default(false)
    failed_when: false
    tags: [restore]

  - name: "Restore - Remove backup directory"
    ansible.builtin.file:
      path: "{{ backup_dir }}"
      state: absent
    failed_when: false
    tags: [restore]
