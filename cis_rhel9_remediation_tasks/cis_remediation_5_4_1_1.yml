---
- name: Initialize meta data variables
  include_vars: cis_remediation_var_5_4_1_1.yml

- name: "Snapshot - Create backup directory"
  ansible.builtin.file:
    path: "{{ backup_dir }}"
    state: directory
    mode: '0700'
  tags: [snapshot]
- name: "Snapshot - Check if /etc/login.defs exists"
  ansible.builtin.stat:
    path: /etc/login.defs
  register: _snap_login_defs_stat
  tags: [snapshot]
- name: "Snapshot - Backup /etc/login.defs if exists"
  ansible.builtin.copy:
    src: /etc/login.defs
    dest: "{{ backup_dir }}/login.defs.present"
    remote_src: true
  when: "_snap_login_defs_stat.stat.exists | default(false)"
  tags: [snapshot]
- name: "Snapshot - Backup /etc/shadow"
  ansible.builtin.copy:
    src: /etc/shadow
    dest: "{{ backup_dir }}/shadow.present"
    remote_src: true
  tags: [snapshot]

- block:
  - name: "Req 01 - Check if chage and awk are available"
    ansible.builtin.shell: which chage awk
    args:
      executable: /bin/bash
    register: result_01
    failed_when: false
    changed_when: false
    tags: [execute]

  - name: "Store requirement 01 details"
    set_fact:
      task_01_name: "Check if chage and awk are available"
      task_01_cmd: "which chage awk"
      task_01_rc: "{{ result_01.rc | default(-1) }}"
      data_01: "{{ result_01.stdout | default('') | trim }}"
      status_01: "{{ 'PASS' if (result_01.rc | default(-1)) == 0 else 'FAIL' }}"
      details_01: "{{ 'Both executables found' if (result_01.rc | default(-1)) == 0 else 'One or both executables missing' }}"
    tags: [execute]

  - name: "Req 02 - Set PASS_MAX_DAYS to 365 in /etc/login.defs"
    ansible.builtin.lineinfile:
      path: /etc/login.defs
      regexp: '^PASS_MAX_DAYS'
      line: 'PASS_MAX_DAYS 365'
      backup: false
    register: result_02
    failed_when: false
    tags: [execute]

  - name: "Store requirement 02 details"
    set_fact:
      task_02_name: "Set PASS_MAX_DAYS to 365 in /etc/login.defs"
      task_02_cmd: "lineinfile: regexp=^PASS_MAX_DAYS line='PASS_MAX_DAYS 365'"
      task_02_rc: "{{ 0 if not result_02.failed else 1 }}"
      data_02: "{{ 'PASS_MAX_DAYS 365' if not result_02.failed else result_02.msg | default('Failed') }}"
      status_02: "{{ 'PASS' if not result_02.failed else 'FAIL' }}"
      details_02: "{{ 'Line updated successfully' if not result_02.failed else 'Failed to update line' }}"
    tags: [execute]

  - name: "Req 03 - Set password max age for all users with a password"
    ansible.builtin.shell: |
      {% raw %}
      awk -F: '($2~/^\$.+\$/) {if($5 > 365 || $5 < 1) system ("chage --maxdays 365 " $1)}' /etc/shadow
      {% endraw %}
    args:
      executable: /bin/bash
    register: result_03
    failed_when: false
    changed_when: false
    tags: [execute]

  - name: "Store requirement 03 details"
    set_fact:
      task_03_name: "Set password max age for all users with a password"
      task_03_cmd: |
        awk -F: '($2~/^\\$.+\\$/) {if($5 > 365 || $5 < 1) system (\"chage --maxdays 365 \" $1)}' /etc/shadow
      task_03_rc: "{{ result_03.rc | default(-1) }}"
      data_03: "{{ result_03.stdout | default('') | trim }}"
      status_03: "{{ 'PASS' if (result_03.rc | default(-1)) == 0 else 'FAIL' }}"
      details_03: "{{ 'User max age updated' if (result_03.rc | default(-1)) == 0 else 'Failed to update user max age' }}"
    tags: [execute]

  - name: "Req 04 - Set last change date for users with unset field"
    ansible.builtin.shell: |
      {% raw %}
      awk -F: '($2~/^\$.+\$/) {if($3 == "" || $3 == 0) system ("chage -d \"$(date +%Y-%m-%d)\" " $1)}' /etc/shadow
      {% endraw %}
    args:
      executable: /bin/bash
    register: result_04
    failed_when: false
    changed_when: false
    tags: [execute]

  - name: "Store requirement 04 details"
    set_fact:
      task_04_name: "Set last change date for users with unset field"
      task_04_cmd: |
        awk -F: '($2~/^\\$.+\\$/) {if($3 == \"\" || $3 == 0) system (\"chage -d \\\"$(date +%Y-%m-%d)\\\" \" $1)}' /etc/shadow
      task_04_rc: "{{ result_04.rc | default(-1) }}"
      data_04: "{{ result_04.stdout | default('') | trim }}"
      status_04: "{{ 'PASS' if (result_04.rc | default(-1)) == 0 else 'FAIL' }}"
      details_04: "{{ 'Last change date set' if (result_04.rc | default(-1)) == 0 else 'Failed to set last change date' }}"
    tags: [execute]

  - name: "Req 05 - Verify PASS_MAX_DAYS in /etc/login.defs"
    ansible.builtin.shell: grep ^PASS_MAX_DAYS /etc/login.defs
    args:
      executable: /bin/bash
    register: result_05
    failed_when: false
    changed_when: false
    tags: [execute]

  - name: "Store requirement 05 details"
    set_fact:
      task_05_name: "Verify PASS_MAX_DAYS in /etc/login.defs"
      task_05_cmd: "grep ^PASS_MAX_DAYS /etc/login.defs"
      task_05_rc: "{{ result_05.rc | default(-1) }}"
      data_05: "{{ result_05.stdout | default('') | trim }}"
      status_05: "{{ 'PASS' if (result_05.stdout | default('') | trim) == 'PASS_MAX_DAYS 365' else 'FAIL' }}"
      details_05: "{{ 'PASS_MAX_DAYS is set to 365' if (result_05.stdout | default('') | trim) == 'PASS_MAX_DAYS 365' else 'PASS_MAX_DAYS not set correctly' }}"
    tags: [execute]

  - name: "Req 06 - Verify user password maximum age"
    ansible.builtin.shell: |
      {% raw %}
      awk -F: '($2~/^\$.+\$/) {print $1, $5}' /etc/shadow
      {% endraw %}
    args:
      executable: /bin/bash
    register: result_06
    failed_when: false
    changed_when: false
    tags: [execute]

  - name: "Store requirement 06 details"
    set_fact:
      task_06_name: "Verify user password maximum age"
      task_06_cmd: |
        awk -F: '($2~/^\\$.+\\$/) {print $1, $5}' /etc/shadow
      task_06_rc: "{{ result_06.rc | default(-1) }}"
      data_06: "{{ result_06.stdout | default('') | trim }}"
      status_06: "{{ 'PASS' if (result_06.rc | default(-1)) == 0 else 'FAIL' }}"
      details_06: "{{ 'User password age verified' if (result_06.rc | default(-1)) == 0 else 'Failed to verify user password age' }}"
    tags: [execute]

  - name: "Store overall remediation result in cis_result"
    set_fact:
      cis_result: "{{ status_06 | default('UNKNOWN') }}"
    tags: [execute]

  - name: "Generate remediation report"
    debug:
      msg:
      - "REMEDIATION REPORT — CIS 5.4.1.1"
      - "Reference: CIS Benchmark checkpoint 5.4.1.1"
      - ""
      - "REQUIREMENT 01 - {{ req_01 }}:"
      - "  Task: {{ task_01_name | default('Task not recorded') }}"
      - "  Command: {{ task_01_cmd | default('N/A') }}"
      - "  Exit code: {{ task_01_rc | default(-1) }}"
      - "  Data: {{ data_01 | default('') | trim }}"
      - "  Status: {{ status_01 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_01 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 02 - {{ req_02 }}:"
      - "  Task: {{ task_02_name | default('Task not recorded') }}"
      - "  Command: {{ task_02_cmd | default('N/A') }}"
      - "  Exit code: {{ task_02_rc | default(-1) }}"
      - "  Data: {{ data_02 | default('') | trim }}"
      - "  Status: {{ status_02 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_02 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 03 - {{ req_03 }}:"
      - "  Task: {{ task_03_name | default('Task not recorded') }}"
      - "  Command: {{ task_03_cmd | default('N/A') }}"
      - "  Exit code: {{ task_03_rc | default(-1) }}"
      - "  Data: {{ data_03 | default('') | trim }}"
      - "  Status: {{ status_03 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_03 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 04 - {{ req_04 }}:"
      - "  Task: {{ task_04_name | default('Task not recorded') }}"
      - "  Command: {{ task_04_cmd | default('N/A') }}"
      - "  Exit code: {{ task_04_rc | default(-1) }}"
      - "  Data: {{ data_04 | default('') | trim }}"
      - "  Status: {{ status_04 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_04 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 05 - {{ req_05 }}:"
      - "  Task: {{ task_05_name | default('Task not recorded') }}"
      - "  Command: {{ task_05_cmd | default('N/A') }}"
      - "  Exit code: {{ task_05_rc | default(-1) }}"
      - "  Data: {{ data_05 | default('') | trim }}"
      - "  Status: {{ status_05 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_05 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 06 - {{ req_06 }}:"
      - "  Task: {{ task_06_name | default('Task not recorded') }}"
      - "  Command: {{ task_06_cmd | default('N/A') }}"
      - "  Exit code: {{ task_06_rc | default(-1) }}"
      - "  Data: {{ data_06 | default('') | trim }}"
      - "  Status: {{ status_06 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_06 | default('Not evaluated') | trim }}"
      - ""
      - "========================================================"
      - "OVERALL REMEDIATION:"
      - "  Result: {{ cis_result | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_06 | default('Not evaluated') | trim }}"
      - "========================================================"
    tags: [execute]

  always:
  - name: "Restore - Check if backup exists"
    ansible.builtin.stat:
      path: "{{ backup_dir }}/login.defs.present"
    register: _restore_login_defs
    failed_when: false
    tags: [restore]

  - name: "Restore - Overwrite /etc/login.defs with original"
    ansible.builtin.copy:
      src: "{{ backup_dir }}/login.defs.present"
      dest: /etc/login.defs
      remote_src: true
    when: "_restore_login_defs.stat.exists | default(false)"
    failed_when: false
    tags: [restore]

  - name: "Restore - Check if shadow backup exists"
    ansible.builtin.stat:
      path: "{{ backup_dir }}/shadow.present"
    register: _restore_shadow
    failed_when: false
    tags: [restore]

  - name: "Restore - Overwrite /etc/shadow with original"
    ansible.builtin.copy:
      src: "{{ backup_dir }}/shadow.present"
      dest: /etc/shadow
      remote_src: true
    when: "_restore_shadow.stat.exists | default(false)"
    failed_when: false
    tags: [restore]

  - name: "Restore - Remove backup directory"
    ansible.builtin.file:
      path: "{{ backup_dir }}"
      state: absent
    failed_when: false
    tags: [restore]
