---
- name: Initialize meta data variables
  include_vars: cis_remediation_var_6_3_3_18.yml

- name: "Snapshot - Create backup directory"
  ansible.builtin.file:
    path: "{{ backup_dir }}"
    state: directory
    mode: '0700'
  tags: [snapshot]
- name: "Snapshot - Check if audit rules file exists"
  ansible.builtin.stat:
    path: "{{ audit_rules_file }}"
  register: _snap_rules_stat
  tags: [snapshot]
- name: "Snapshot - Backup audit rules file if exists"
  ansible.builtin.copy:
    src: "{{ audit_rules_file }}"
    dest: "{{ backup_dir }}/50-usermod.rules.orig"
    remote_src: true
  when: "_snap_rules_stat.stat.exists | default(false)"
  failed_when: false
  tags: [snapshot]
- name: "Snapshot - Record whether audit rules file existed"
  ansible.builtin.copy:
    content: "{{ _snap_rules_stat.stat.exists | default(false) }}"
    dest: "{{ backup_dir }}/rules_existed"
  tags: [snapshot]

- block:
  - name: "Req 01 - Check if auditd package is installed"
    ansible.builtin.package_facts:
      manager: auto
    failed_when: false
    tags: [execute]

  - name: "Req 01 - Set auditd installed fact"
    ansible.builtin.set_fact:
      auditd_installed: "{{ 'audit' in ansible_facts.packages }}"
      playbook_skipped: "{{ 'audit' not in ansible_facts.packages }}"
    tags: [execute]

  - name: "Req 01 - Add audit rule for usermod command"
    ansible.builtin.lineinfile:
      path: "{{ audit_rules_file }}"
      line: '-a always,exit -F path=/usr/sbin/usermod -F perm=x -F auid>=1000 -F auid!=unset -k usermod'
      create: yes
      mode: '0640'
    when: "auditd_installed | default(false) | bool"
    register: result_01_lineinfile
    failed_when: false
    tags: [execute]

  - name: "Req 01 - Load audit rules using augenrules"
    ansible.builtin.shell: augenrules --load
    args:
      executable: /bin/bash
    when: "auditd_installed | default(false) | bool"
    register: result_01_augenrules
    failed_when: false
    tags: [execute]

  - name: "Req 02 - Verify usermod audit rule in running configuration"
    ansible.builtin.shell: |
      set -o pipefail
      auditctl -l | grep -E 'path=/usr/sbin/usermod.*perm=x.*key=usermod' || echo "VERIFY_FAILED"
    args:
      executable: /bin/bash
    when: "auditd_installed | default(false) | bool"
    register: result_02_auditctl
    failed_when: false
    tags: [execute]

  - name: "Req 02 - Verify usermod audit rule in rules file"
    ansible.builtin.shell: |
      set -o pipefail
      grep -E 'path=/usr/sbin/usermod.*perm=x.*(-k usermod|key=usermod)' {{ audit_rules_file }} || echo "VERIFY_FAILED"
    args:
      executable: /bin/bash
    when: "auditd_installed | default(false) | bool"
    register: result_02_grep
    failed_when: false
    tags: [execute]

  - name: "Store requirement 01 details"
    ansible.builtin.set_fact:
      task_01_name: "Add audit rule for usermod and load rules"
      task_01_cmd: "lineinfile: path={{ audit_rules_file }} line='-a always,exit -F path=/usr/sbin/usermod -F perm=x -F auid>=1000 -F auid!=unset -k usermod'; augenrules --load"
      task_01_rc: "{{ 0 if (auditd_installed | default(false) | bool) and (result_01_lineinfile is not failed) and (result_01_augenrules.rc | default(-1) == 0) else (result_01_augenrules.rc | default(-1)) }}"
      data_01: "{{ 'Lineinfile: ' + (result_01_lineinfile.diff | default('no diff') | string) + ' | Augenrules: ' + (result_01_augenrules.stdout | default('') | trim) }}"
      status_01: "{{ 'APPLIED' if (auditd_installed | default(false) | bool) and (result_01_lineinfile is not failed) and (result_01_augenrules.rc | default(-1) == 0) else ('SKIP' if not (auditd_installed | default(false) | bool) else 'FAILED') }}"
      details_01: "{{ 'Audit rule added and loaded successfully' if (auditd_installed | default(false) | bool) and (result_01_lineinfile is not failed) and (result_01_augenrules.rc | default(-1) == 0) else ('auditd not installed - skipped' if not (auditd_installed | default(false) | bool) else 'Failed to add or load audit rule') }}"
    tags: [execute]

  - name: "Store requirement 02 details"
    ansible.builtin.set_fact:
      task_02_name: "Verify usermod audit rule in running config and rules file"
      task_02_cmd: "auditctl -l | grep usermod; grep -E 'path=/usr/sbin/usermod.*perm=x.*(-k usermod|key=usermod)' {{ audit_rules_file }}"
      task_02_rc: "{{ 0 if ('VERIFY_FAILED' not in (result_02_auditctl.stdout | default('')) and 'VERIFY_FAILED' not in (result_02_grep.stdout | default(''))) else 1 }}"
      data_02: "{{ 'Running: ' + (result_02_auditctl.stdout | default('') | trim) + ' | File: ' + (result_02_grep.stdout | default('') | trim) }}"
      status_02: "{{ 'APPLIED' if (auditd_installed | default(false) | bool) and ('VERIFY_FAILED' not in (result_02_auditctl.stdout | default('')) and 'VERIFY_FAILED' not in (result_02_grep.stdout | default(''))) else ('SKIP' if not (auditd_installed | default(false) | bool) else 'FAILED') }}"
      details_02: "{{ 'usermod audit rule verified in running config and rules file' if (auditd_installed | default(false) | bool) and ('VERIFY_FAILED' not in (result_02_auditctl.stdout | default('')) and 'VERIFY_FAILED' not in (result_02_grep.stdout | default(''))) else ('auditd not installed - skipped' if not (auditd_installed | default(false) | bool) else 'Verification failed - rule not found') }}"
    tags: [execute]

  - name: "Set final cis_result variable"
    ansible.builtin.set_fact:
      cis_result: "{{ status_02 | default('ERROR') | replace('APPLIED', 'PASS') | replace('SKIP', 'SKIP') | replace('FAILED', 'FAIL') }}"
    tags: [execute]

  - name: "Store requirement 03 details"
    ansible.builtin.set_fact:
      task_03_name: "Set cis_result from status_02"
      task_03_cmd: "set_fact: cis_result = status_02 mapping (APPLIED->PASS, SKIP->SKIP, FAILED->FAIL)"
      task_03_rc: "0"
      data_03: "{{ cis_result | default('UNKNOWN') }}"
      status_03: "PASS"
      details_03: "{{ 'cis_result set to ' + (cis_result | default('UNKNOWN')) }}"
    tags: [execute]

  - name: "Generate remediation report"
    ansible.builtin.debug:
      msg:
      - "REMEDIATION REPORT — CIS 6.3.3.18"
      - "Reference: CIS Benchmark checkpoint 6.3.3.18"
      - ""
      - "REQUIREMENT 01 - {{ req_01 }}:"
      - "  Task: {{ task_01_name | default('Not executed') }}"
      - "  Command: {{ task_01_cmd | default('N/A') }}"
      - "  Exit code: {{ task_01_rc | default(-1) }}"
      - "  Data: {{ data_01 | default('') | trim }}"
      - "  Status: {{ status_01 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_01 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 02 - {{ req_02 }}:"
      - "  Task: {{ task_02_name | default('Not executed') }}"
      - "  Command: {{ task_02_cmd | default('N/A') }}"
      - "  Exit code: {{ task_02_rc | default(-1) }}"
      - "  Data: {{ data_02 | default('') | trim }}"
      - "  Status: {{ status_02 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_02 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 03 - {{ req_03 }}:"
      - "  Task: {{ task_03_name | default('Not executed') }}"
      - "  Command: {{ task_03_cmd | default('N/A') }}"
      - "  Exit code: {{ task_03_rc | default(-1) }}"
      - "  Data: {{ data_03 | default('') | trim }}"
      - "  Status: {{ status_03 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_03 | default('Not evaluated') | trim }}"
      - ""
      - "OVERALL REMEDIATION:"
      - "  Result: {{ cis_result | default('UNKNOWN') | trim }}"
    tags: [execute]

  always:
  - name: "Restore - Check if backup exists"
    ansible.builtin.stat:
      path: "{{ backup_dir }}/50-usermod.rules.orig"
    register: _restore_backup_check
    failed_when: false
    tags: [restore]

  - name: "Restore - Overwrite audit rules file with original"
    ansible.builtin.copy:
      src: "{{ backup_dir }}/50-usermod.rules.orig"
      dest: "{{ audit_rules_file }}"
      remote_src: true
    when: "_restore_backup_check.stat.exists | default(false)"
    failed_when: false
    tags: [restore]

  - name: "Restore - Read existence marker"
    ansible.builtin.slurp:
      src: "{{ backup_dir }}/rules_existed"
    register: _restore_existed
    failed_when: false
    tags: [restore]

  - name: "Restore - Remove audit rules file if it was created by playbook"
    ansible.builtin.file:
      path: "{{ audit_rules_file }}"
      state: absent
    when:
    - "_restore_existed.content is defined"
    - "(_restore_existed.content | b64decode | trim) == 'False'"
    failed_when: false
    tags: [restore]

  - name: "Restore - Reload audit rules after restore"
    ansible.builtin.shell: augenrules --load
    args:
      executable: /bin/bash
    when: "_restore_backup_check.stat.exists | default(false)"
    failed_when: false
    tags: [restore]

  - name: "Restore - Remove backup directory"
    ansible.builtin.file:
      path: "{{ backup_dir }}"
      state: absent
    failed_when: false
    tags: [restore]
