playbook_name: "cis_3.3.4_icmp_broadcasts_remediate"
backup_dir: "/var/log/ai-playbooks-backup/{{ playbook_name }}"
checkpoint_id: "cis_3_3_4"
config_file: "/etc/sysctl.d/60-netipv4_sysctl.conf"
config_param: "net.ipv4.icmp_echo_ignore_broadcasts"
config_value: "1"
script_path: "/tmp/cis_3.3.4_icmp_broadcasts.sh"
req_01: "Run the provided remediation script to fix Ensure broadcast icmp requests are ignored.         Set the following parameter in /etc/sysctl.conf or a file in /etc/sysctl.d/ ending in .conf:         • net.ipv4.icmp_echo_ignore_broadcasts = 1         Run the following script to set the active kernel parameters:         Execute the COMPLETE script as-is:         #!/usr/bin/env bash         {            sysctl -w net.ipv4.icmp_echo_ignore_broadcasts=1            sysctl -w net.ipv4.route.flush=1         }         Note: If these settings appear in a canonically later file, or later in the same file, these settings will be overwritten"
req_02: "VERIFY: Run audit check to confirm Ensure broadcast icmp requests are ignored is properly configured. Expected result: System is compliant"
