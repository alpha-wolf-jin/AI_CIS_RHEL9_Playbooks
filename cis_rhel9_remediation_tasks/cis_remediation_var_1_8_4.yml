playbook_name: "cis_remediation_1_8_4"
backup_dir: "/var/log/ai-playbooks-backup/{{ playbook_name }}"
req_01: |
  1. Run the provided remediation script to fix Ensure GDM screen locks when the user is idle. Create or edit a file in the /etc/dconf/profile/ and verify it includes the following: user-db:user system-db:{NAME_OF_DCONF_DATABASE}. Note: local is the name of a dconf database used in the examples. Example: # echo -e '\nuser-db:user\nsystem-db:local' >> /etc/dconf/profile/user. Create the directory /etc/dconf/db/{NAME_OF_DCONF_DATABASE}.d/ if it doesn't already exist: Example: # mkdir /etc/dconf/db/local.d. Create the key file /etc/dconf/db/{NAME_OF_DCONF_DATABASE}.d/{FILE_NAME} to provide info Execute the COMPLETE script as-is. Additional notes: Note: You must include the uint32 along with the integer key values as shown. Run the following command to update the system databases: # dconf update. Note: Users must log out and back in again before the system-wide settings take effect. Expected result: Script applies the required changes
req_02: "2. VERIFY: Run audit check to confirm Ensure GDM screen locks when the user is idle is properly configured. Expected result: System is compliant"
req_03: "3. Store the final remediation result in a variable named 'cis_result' using set_fact. Set cis_result to the overall remediation status (PASS/FAIL/SKIP/ERROR) derived from the last requirement's status variable."
req_04: "4. Create a task named 'Generate remediation report' using debug msg with EXACTLY this format: REMEDIATION REPORT — CIS 1.8.4 Reference: CIS Benchmark checkpoint 1.8.4 Then for each requirement: REQUIREMENT NN - {{ req_NN }}: With fields: Task, Command, Exit code, Data, Status (PASS/FAIL/SKIP/ERROR), Details. End with OVERALL REMEDIATION: section containing Result: {{ cis_result }}"
dconf_profile_dir: "/etc/dconf/profile"
dconf_profile_file: "/etc/dconf/profile/user"
dconf_db_name: "local"
dconf_db_dir: "/etc/dconf/db/{{ dconf_db_name }}.d"
dconf_key_file: "/etc/dconf/db/{{ dconf_db_name }}.d/00-screensaver"
idle_delay_max: "900"
lock_delay_max: "5"
remediation_script: "/tmp/remediate_gdm_screen_lock.sh"
remediation_script_content: |
  {% raw %}
  #!/usr/bin/env bash
  {
     l_key_file="/etc/dconf/db/local.d/00-screensaver"
     l_idmv="900" # Set max value for idle-delay in seconds (between 1 and 900)
     l_ldmv="5" # Set max value for lock-delay in seconds (between 0 and 5)
     {
        echo '# Specify the dconf path'
        echo '[org/gnome/desktop/session]'
        echo ''
        echo '# Number of seconds of inactivity before the screen goes blank'
        echo '# Set to 0 seconds if you want to deactivate the screensaver.'
        echo "idle-delay=uint32 $l_idmv"
        echo ''
        echo '# Specify the dconf path'
        echo '[org/gnome/desktop/screensaver]'
        echo ''
        echo '# Number of seconds after the screen is blank before locking the screen'
        echo "lock-delay=uint32 $l_ldmv"
     } > "$l_key_file"
  }
  {% endraw %}
audit_script: "/tmp/audit_gdm_screen_lock.sh"
audit_script_content: |
  {% raw %}
  #!/usr/bin/env bash
  {
     # Check if GNMOE Desktop Manager is installed.  If package isn't installed, recommendation is Not Applicable
     # determine system's package manager
     l_pkgoutput=""
     if command -v dpkg-query > /dev/null 2>&1; then
        l_pq="dpkg-query -W"
     elif command -v rpm > /dev/null 2>&1; then
        l_pq="rpm -q"
     fi
     # Check if GDM is installed
     l_pcl="gdm gdm3" # Space separated list of packages to check
     for l_pn in $l_pcl; do
        $l_pq "$l_pn" > /dev/null 2>&1 && l_pkgoutput="$l_pkgoutput\n - Package: \"$l_pn\" exists on the system\n - checking configuration"
     done
     # Check configuration (If applicable)
     if [ -n "$l_pkgoutput" ]; then
        l_output="" l_output2=""
        l_idmv="900" # Set for max value for idle-delay in seconds
        l_ldmv="5" # Set for max value for lock-delay in seconds
        # Look for idle-delay to determine profile in use, needed for remaining tests
        l_kfile="$(grep -Psril '^\h*idle-delay\h*=\h*uint32\h+\d+\b' /etc/dconf/db/*/)" # Determine file containing idle-delay key
        if [ -n "$l_kfile" ]; then
           # set profile name (This is the name of a dconf database)
           l_profile="$(awk -F'/' '{split($(NF-1),a,".");print a[1]}' <<< "$l_kfile")" #Set the key profile name
           l_pdbdir="/etc/dconf/db/$l_profile.d" # Set the key file dconf db directory
           # Confirm that idle-delay exists, includes unit32, and value is between 1 and max value for idle-delay
           l_idv="$(awk -F 'uint32' '/idle-delay/{print $2}' "$l_kfile" | xargs)"
           if [ -n "$l_idv" ]; then
              [ "$l_idv" -gt "0" -a "$l_idv" -le "$l_idmv" ] && l_output="$l_output\n - The \"idle-delay\" option is set to \"$l_idv\" seconds in \"$l_kfile\""
              [ "$l_idv" = "0" ] && l_output2="$l_output2\n - The \"idle- delay\" option is set to \"$l_idv\" (disabled) in \"$l_kfile\""
              [ "$l_idv" -gt "$l_idmv" ] && l_output2="$l_output2\n - The \"idle-delay\" option is set to \"$l_idv\" seconds (greater than $l_idmv) in \"$l_kfile\""
           else
              l_output2="$l_output2\n - The \"idle-delay\" option is not set in \"$l_kfile\""
           fi
           # Confirm that lock-delay exists, includes unit32, and value is between 0 and max value for lock-delay
           l_ldv="$(awk -F 'uint32' '/lock-delay/{print $2}' "$l_kfile" | xargs)"
           if [ -n "$l_ldv" ]; then
              [ "$l_ldv" -ge "0" -a "$l_ldv" -le "$l_ldmv" ] && l_output="$l_output\n - The \"lock-delay\" option is set to \"$l_ldv\" seconds in \"$l_kfile\""
              [ "$l_ldv" -gt "$l_ldmv" ] && l_output2="$l_output2\n - The \"lock-delay\" option is set to \"$l_ldv\" seconds (greater than $l_ldmv) in \"$l_kfile\""
           else
              l_output2="$l_output2\n - The \"lock-delay\" option is not set in \"$l_kfile\""
           fi
           # Confirm that dconf profile exists
           if grep -Psq "^\h*system-db:$l_profile" /etc/dconf/profile/*; then
              l_output="$l_output\n - The \"$l_profile\" profile exists"
           else
              l_output2="$l_output2\n - The \"$l_profile\" doesn't exist"
           fi
           # Confirm that dconf profile database file exists
           if [ -f "/etc/dconf/db/$l_profile" ]; then
              l_output="$l_output\n - The \"$l_profile\" profile exists in the dconf database"
           else
              l_output2="$l_output2\n - The \"$l_profile\" profile doesn't exist in the dconf database"
           fi
        else
           l_output2="$l_output2\n - The \"idle-delay\" option doesn't exist, remaining tests skipped"
        fi
     else
        l_output="$l_output\n - GNOME Desktop Manager package is not installed on the system\n  - Recommendation is not applicable"
     fi
     # Report results. If no failures output in l_output2, we pass
     [ -n "$l_pkgoutput" ] && echo -e "\n$l_pkgoutput"
     if [ -z "$l_output2" ]; then
        echo -e "\n- Audit Result:\n  ** PASS **\n$l_output\n"
     else
        echo -e "\n- Audit Result:\n  ** FAIL **\n - Reason(s) for audit failure:\n$l_output2\n"
        [ -n "$l_output" ] && echo -e "\n- Correctly set:\n$l_output\n"
     fi
  }
  {% endraw %}
