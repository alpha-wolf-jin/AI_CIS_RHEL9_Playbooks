---
- name: Initialize meta data variables
  include_vars: cis_remediation_var_5_4_1_6.yml

- name: "Snapshot - Create backup directory"
  ansible.builtin.file:
    path: "{{ backup_dir }}"
    state: directory
    mode: '0700'
  tags: [snapshot]
- name: "Snapshot - Check if /etc/shadow exists"
  ansible.builtin.stat:
    path: /etc/shadow
  register: _shadow_stat
  tags: [snapshot]
- name: "Snapshot - Backup /etc/shadow if exists"
  ansible.builtin.copy:
    src: /etc/shadow
    dest: "{{ backup_dir }}/shadow.present"
    remote_src: true
  when: _shadow_stat.stat.exists
  tags: [snapshot]

- name: "Initialize data variables"
  set_fact:
    data_01: "Not collected yet"
    status_01: "UNKNOWN"
    details_01: "Not evaluated"
    data_02: "Not collected yet"
    status_02: "UNKNOWN"
    details_02: "Not evaluated"
    data_03: "Not collected yet"
    status_03: "UNKNOWN"
    details_03: "Not evaluated"
    data_04: "Not collected yet"
    status_04: "UNKNOWN"
    details_04: "Not evaluated"
    data_05: "Not collected yet"
    status_05: "UNKNOWN"
    details_05: "Not evaluated"
    data_06: "Not collected yet"
    status_06: "UNKNOWN"
    details_06: "Not evaluated"
    task_01_name: "Not executed"
    task_01_cmd: "N/A"
    task_01_rc: -1
    task_02_name: "Not executed"
    task_02_cmd: "N/A"
    task_02_rc: -1
    task_03_name: "Not executed"
    task_03_cmd: "N/A"
    task_03_rc: -1
    task_04_name: "Not executed"
    task_04_cmd: "N/A"
    task_04_rc: -1
    task_05_name: "Not executed"
    task_05_cmd: "N/A"
    task_05_rc: -1
    task_06_name: "Not executed"
    task_06_cmd: "N/A"
    task_06_rc: -1
  tags: [execute]
- block:
  - name: "Req 01 - Check if passwd command is available"
    ansible.builtin.shell: "which passwd"
    args:
      executable: /bin/bash
    register: result_01
    failed_when: false
    changed_when: false
    tags: [execute]

  - name: "Store requirement 01 details"
    set_fact:
      task_01_name: "Check if passwd command is available"
      task_01_cmd: "which passwd"
      task_01_rc: "{{ result_01.rc | default(-1) }}"
      data_01: "{{ result_01.stdout | default('') | trim }}"
      status_01: "{{ 'PASS' if (result_01.rc | default(-1)) == 0 else 'FAIL' }}"
      details_01: "{{ 'passwd found at ' + (result_01.stdout | default('') | trim) if (result_01.rc | default(-1)) == 0 else 'passwd not found' }}"
    tags: [execute]

  - name: "Req 02 - Identify users with future password change date"
    ansible.builtin.shell: |
      {% raw %}
      for user in $(awk -F: '($2~/^\$.+\$/) {print $1}' /etc/shadow); do
        last_change=$(chage -l "$user" 2>/dev/null | grep 'Last password change' | awk -F: '{print $2}' | sed 's/^[[:space:]]*//')
        if [ -n "$last_change" ]; then
          last_epoch=$(date -d "$last_change" +%s 2>/dev/null)
          now_epoch=$(date +%s)
          if [ -n "$last_epoch" ] && [ "$last_epoch" -gt "$now_epoch" ]; then
            echo "$user"
          fi
        fi
      done
      {% endraw %}
    args:
      executable: /bin/bash
    register: result_02
    failed_when: false
    changed_when: false
    tags: [execute]

  - name: "Store requirement 02 details"
    set_fact:
      task_02_name: "Identify users with future password change date"
      task_02_cmd: "chage -l <user> | grep 'Last password change' | date comparison"
      task_02_rc: "{{ result_02.rc | default(-1) }}"
      data_02: "{{ result_02.stdout | default('') | trim }}"
      status_02: "{{ 'PASS' if (result_02.stdout | default('') | trim) == '' else 'FAIL' }}"
      details_02: "{{ 'No users with future password change date' if (result_02.stdout | default('') | trim) == '' else 'Users found: ' + (result_02.stdout | default('') | trim) }}"
      future_users: "{{ result_02.stdout_lines | default([]) | select('!=', '') | list }}"
    tags: [execute]

  - name: "Req 03 - Lock accounts with future password change dates"
    ansible.builtin.shell: "passwd -l {{ item }}"
    args:
      executable: /bin/bash
    loop: "{{ future_users | default([]) }}"
    register: result_03
    failed_when: false
    when: "future_users | default([]) | length > 0"
    tags: [execute]

  - name: "Store requirement 03 details"
    set_fact:
      task_03_name: "Lock accounts with future password change dates"
      task_03_cmd: "passwd -l <username>"
      task_03_rc: "{{ result_03.results[0].rc | default(-1) if result_03.results is defined else -1 }}"
      data_03: "{{ future_users | default([]) | join(', ') if future_users | default([]) | length > 0 else 'No users to lock' }}"
      status_03: "{{ 'APPLIED' if (future_users | default([]) | length > 0) and (result_03 is not failed) else 'SKIP' if (future_users | default([]) | length == 0) else 'FAIL' }}"
      details_03: "{{ 'Locked users: ' + (future_users | default([]) | join(', ')) if (future_users | default([]) | length > 0) and (result_03 is not failed) else 'No users required locking' if (future_users | default([]) | length == 0) else 'Failed to lock users' }}"
    tags: [execute]

  - name: "Req 04 - Expire passwords for users with future password change dates"
    ansible.builtin.shell: "passwd -e {{ item }}"
    args:
      executable: /bin/bash
    loop: "{{ future_users | default([]) }}"
    register: result_04
    failed_when: false
    when: "future_users | default([]) | length > 0"
    tags: [execute]

  - name: "Store requirement 04 details"
    set_fact:
      task_04_name: "Expire passwords for users with future password change dates"
      task_04_cmd: "passwd -e <username>"
      task_04_rc: "{{ result_04.results[0].rc | default(-1) if result_04.results is defined else -1 }}"
      data_04: "{{ future_users | default([]) | join(', ') if future_users | default([]) | length > 0 else 'No users to expire' }}"
      status_04: "{{ 'APPLIED' if (future_users | default([]) | length > 0) and (result_04 is not failed) else 'SKIP' if (future_users | default([]) | length == 0) else 'FAIL' }}"
      details_04: "{{ 'Expired passwords for: ' + (future_users | default([]) | join(', ')) if (future_users | default([]) | length > 0) and (result_04 is not failed) else 'No users required password expiry' if (future_users | default([]) | length == 0) else 'Failed to expire passwords' }}"
    tags: [execute]

  - name: "Req 05 - Reset passwords for users with future password change dates"
    ansible.builtin.shell: "echo 'TempP@ssw0rd!2024' | passwd --stdin {{ item }}"
    args:
      executable: /bin/bash
    loop: "{{ future_users | default([]) }}"
    register: result_05
    failed_when: false
    no_log: true
    when: "future_users | default([]) | length > 0"
    tags: [execute]

  - name: "Store requirement 05 details"
    set_fact:
      task_05_name: "Reset passwords for users with future password change dates"
      task_05_cmd: "echo '<new_secure_password>' | passwd --stdin <username>"
      task_05_rc: "{{ result_05.results[0].rc | default(-1) if result_05.results is defined else -1 }}"
      data_05: "{{ future_users | default([]) | join(', ') if future_users | default([]) | length > 0 else 'No users to reset' }}"
      status_05: "{{ 'APPLIED' if (future_users | default([]) | length > 0) and (result_05 is not failed) else 'SKIP' if (future_users | default([]) | length == 0) else 'FAIL' }}"
      details_05: "{{ 'Reset passwords for: ' + (future_users | default([]) | join(', ')) if (future_users | default([]) | length > 0) and (result_05 is not failed) else 'No users required password reset' if (future_users | default([]) | length == 0) else 'Failed to reset passwords' }}"
    tags: [execute]

  - name: "Req 06 - Verify no users have future password change date"
    ansible.builtin.shell: |
      {% raw %}
      for user in $(awk -F: '($2~/^\$.+\$/) {print $1}' /etc/shadow); do
        last_change=$(chage -l "$user" 2>/dev/null | grep 'Last password change' | awk -F: '{print $2}' | sed 's/^[[:space:]]*//')
        if [ -n "$last_change" ]; then
          last_epoch=$(date -d "$last_change" +%s 2>/dev/null)
          now_epoch=$(date +%s)
          if [ -n "$last_epoch" ] && [ "$last_epoch" -gt "$now_epoch" ]; then
            echo "FAIL: $user"
          fi
        fi
      done
      {% endraw %}
    args:
      executable: /bin/bash
    register: result_06
    failed_when: false
    changed_when: false
    tags: [execute]

  - name: "Store requirement 06 details"
    set_fact:
      task_06_name: "Verify no users have future password change date"
      task_06_cmd: "chage -l <user> | grep 'Last password change' | date comparison"
      task_06_rc: "{{ result_06.rc | default(-1) }}"
      data_06: "{{ result_06.stdout | default('') | trim }}"
      status_06: "{{ 'PASS' if (result_06.stdout | default('') | trim) == '' else 'FAIL' }}"
      details_06: "{{ 'All password change dates are in the past' if (result_06.stdout | default('') | trim) == '' else 'Users still with future dates: ' + (result_06.stdout | default('') | trim) }}"
    tags: [execute]

  - name: "Set cis_result for overall remediation status"
    ansible.builtin.set_fact:
      cis_result: "{{ status_06 | default('ERROR') | trim }}"
    tags: [execute]

  - name: "Generate remediation report"
    debug:
      msg:
      - "========================================================"
      - "        REMEDIATION REPORT — CIS 5.4.1.6"
      - "========================================================"
      - ""
      - "Reference: CIS Benchmark checkpoint 5.4.1.6"
      - ""
      - "REQUIREMENT 01 - {{ req_01 }}:"
      - "  Task: {{ task_01_name | default('Task not recorded') }}"
      - "  Command: {{ task_01_cmd | default('N/A') }}"
      - "  Exit code: {{ task_01_rc | default(-1) }}"
      - "  Data: {{ data_01 | default('') | trim }}"
      - "  Status: {{ status_01 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_01 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 02 - {{ req_02 }}:"
      - "  Task: {{ task_02_name | default('Task not recorded') }}"
      - "  Command: {{ task_02_cmd | default('N/A') }}"
      - "  Exit code: {{ task_02_rc | default(-1) }}"
      - "  Data: {{ data_02 | default('') | trim }}"
      - "  Status: {{ status_02 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_02 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 03 - {{ req_03 }}:"
      - "  Task: {{ task_03_name | default('Task not recorded') }}"
      - "  Command: {{ task_03_cmd | default('N/A') }}"
      - "  Exit code: {{ task_03_rc | default(-1) }}"
      - "  Data: {{ data_03 | default('') | trim }}"
      - "  Status: {{ status_03 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_03 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 04 - {{ req_04 }}:"
      - "  Task: {{ task_04_name | default('Task not recorded') }}"
      - "  Command: {{ task_04_cmd | default('N/A') }}"
      - "  Exit code: {{ task_04_rc | default(-1) }}"
      - "  Data: {{ data_04 | default('') | trim }}"
      - "  Status: {{ status_04 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_04 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 05 - {{ req_05 }}:"
      - "  Task: {{ task_05_name | default('Task not recorded') }}"
      - "  Command: {{ task_05_cmd | default('N/A') }}"
      - "  Exit code: {{ task_05_rc | default(-1) }}"
      - "  Data: {{ data_05 | default('') | trim }}"
      - "  Status: {{ status_05 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_05 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 06 - {{ req_06 }}:"
      - "  Task: {{ task_06_name | default('Task not recorded') }}"
      - "  Command: {{ task_06_cmd | default('N/A') }}"
      - "  Exit code: {{ task_06_rc | default(-1) }}"
      - "  Data: {{ data_06 | default('') | trim }}"
      - "  Status: {{ status_06 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_06 | default('Not evaluated') | trim }}"
      - ""
      - "========================================================"
      - "OVERALL REMEDIATION:"
      - "  Result: {{ cis_result | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_06 | default('Not evaluated') | trim }}"
      - "========================================================"
    tags: [execute]

  always:
  - name: "Restore - Check if backup exists"
    ansible.builtin.stat:
      path: "{{ backup_dir }}/shadow.present"
    register: _restore_shadow
    failed_when: false
    tags: [restore]

  - name: "Restore - Overwrite /etc/shadow with original"
    ansible.builtin.copy:
      src: "{{ backup_dir }}/shadow.present"
      dest: /etc/shadow
      remote_src: true
    when: _restore_shadow.stat.exists | default(false)
    failed_when: false
    tags: [restore]

  - name: "Restore - Remove backup directory"
    ansible.builtin.file:
      path: "{{ backup_dir }}"
      state: absent
    failed_when: false
    tags: [restore]
