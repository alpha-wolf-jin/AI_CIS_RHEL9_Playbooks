---
- name: Initialize meta data variables
  include_vars: cis_remediation_var_1_8_2.yml

- name: "Snapshot - Create backup directory"
  ansible.builtin.file:
    path: "{{ backup_dir }}"
    state: directory
    mode: '0700'
  tags: [snapshot]
- name: "Snapshot - Check if GDM or GDM3 is installed"
  ansible.builtin.package_facts:
    manager: auto
  failed_when: false
  tags: [snapshot]
- name: "Snapshot - Set GDM installed status fact"
  ansible.builtin.set_fact:
    gdm_installed_snapshot: "{{ 'gdm' in ansible_facts.packages or 'gdm3' in ansible_facts.packages }}"
  tags: [snapshot]
- name: "Snapshot - Check if /etc/dconf/profile/gdm exists"
  ansible.builtin.stat:
    path: /etc/dconf/profile/gdm
  register: _sg_profile_stat
  tags: [snapshot]
- name: "Snapshot - Backup /etc/dconf/profile/gdm"
  ansible.builtin.copy:
    src: /etc/dconf/profile/gdm
    dest: "{{ backup_dir }}/profile_gdm.present"
    remote_src: true
  when: _sg_profile_stat.stat.exists
  tags: [snapshot]
- name: "Snapshot - Mark /etc/dconf/profile/gdm as absent"
  ansible.builtin.copy:
    content: "absent"
    dest: "{{ backup_dir }}/profile_gdm.absent"
  when:
  - not _sg_profile_stat.stat.exists
  - gdm_installed_snapshot | default(false) | bool
  tags: [snapshot]
- name: "Snapshot - Check if /etc/dconf/db/gdm.d/01-banner-message exists"
  ansible.builtin.stat:
    path: /etc/dconf/db/gdm.d/01-banner-message
  register: _sg_banner_stat
  tags: [snapshot]
- name: "Snapshot - Backup /etc/dconf/db/gdm.d/01-banner-message"
  ansible.builtin.copy:
    src: /etc/dconf/db/gdm.d/01-banner-message
    dest: "{{ backup_dir }}/01-banner-message.present"
    remote_src: true
  when: _sg_banner_stat.stat.exists
  tags: [snapshot]
- name: "Snapshot - Mark /etc/dconf/db/gdm.d/01-banner-message as absent"
  ansible.builtin.copy:
    content: "absent"
    dest: "{{ backup_dir }}/01-banner-message.absent"
  when:
  - not _sg_banner_stat.stat.exists
  - gdm_installed_snapshot | default(false) | bool
  tags: [snapshot]

- block:
# === EXECUTE (tag: execute) ===
  - name: "Check if GDM or GDM3 is installed"
    ansible.builtin.package_facts:
      manager: auto
    failed_when: false
    tags: [execute]

  - name: "Set GDM installed status fact"
    ansible.builtin.set_fact:
      gdm_installed: "{{ 'gdm' in ansible_facts.packages or 'gdm3' in ansible_facts.packages }}"
      playbook_skipped: "{{ not ('gdm' in ansible_facts.packages or 'gdm3' in ansible_facts.packages) }}"
    tags: [execute]

  - name: "Req 1 - Deploy GDM banner remediation script"
    ansible.builtin.copy:
      content: |
        #!/usr/bin/env bash
        {
           l_pkgoutput=""
           if command -v dpkg-query > /dev/null 2>&1; then
              l_pq="dpkg-query -W"
           elif command -v rpm > /dev/null 2>&1; then
              l_pq="rpm -q"
           fi
           l_pcl="gdm gdm3"
           for l_pn in $l_pcl; do
              $l_pq "$l_pn" > /dev/null 2>&1 && l_pkgoutput="$l_pkgoutput\n - Package: \"$l_pn\" exists on the system\n - checking configuration"
           done
           if [ -n "$l_pkgoutput" ]; then
              l_gdmprofile="{{ gdm_profile }}"
              l_bmessage="{{ banner_message }}"
              if [ ! -f "/etc/dconf/profile/$l_gdmprofile" ]; then
                 echo "Creating profile \"$l_gdmprofile\""
                 echo -e "user-db:user\nsystem-db:$l_gdmprofile\nfile- db:/usr/share/$l_gdmprofile/greeter-dconf-defaults" > /etc/dconf/profile/$l_gdmprofile
              fi
              if [ ! -d "/etc/dconf/db/$l_gdmprofile.d/" ]; then
                 echo "Creating dconf database directory \"/etc/dconf/db/$l_gdmprofile.d/\""
                 mkdir /etc/dconf/db/$l_gdmprofile.d/
              fi
              if ! grep -Piq '^\h*banner-message-enable\h*=\h*true\b' /etc/dconf/db/$l_gdmprofile.d/*; then
                 echo "creating gdm keyfile for machine-wide settings"
                 if ! grep -Piq -- '^\h*banner-message-enable\h*=\h*' /etc/dconf/db/$l_gdmprofile.d/*; then
                    l_kfile="/etc/dconf/db/$l_gdmprofile.d/01-banner-message"
                    echo -e "\n[org/gnome/login-screen]\nbanner-message-enable=true" >> "$l_kfile"
                 else
                    l_kfile="$(grep -Pil -- '^\h*banner-message-enable\h*=\h*' /etc/dconf/db/$l_gdmprofile.d/*)"
                    ! grep -Pq '^\h*\[org\/gnome\/login-screen\]' "$l_kfile" && sed -ri '/^\s*banner- message-enable/ i\[org/gnome/login-screen]' "$l_kfile"
                    ! grep -Pq '^\h*banner-message-enable\h*=\h*true\b' "$l_kfile" && sed -ri 's/^\s*(banner-message-enable\s*=\s*)(\S+)(\s*.*$)/\1true \3//' "$l_kfile"
                 fi
              fi
              if ! grep -Piq "^\h*banner-message-text=[\'\"]+\S+" "$l_kfile"; then
                 sed -ri "/^\s*banner-message-enable/ a\banner-message-text=$l_bmessage" "$l_kfile"
              fi
              dconf update
           else
              echo -e "\n\n - GNOME Desktop Manager isn't installed\n - Recommendation is Not Applicable\n - No remediation required\n"
           fi
        }
      dest: /tmp/remediate_gdm_banner.sh
      mode: '0700'
    when: not (playbook_skipped | default(false) | bool)
    failed_when: false
    tags: [execute]

  - name: "Req 1 - Execute remediation script"
    ansible.builtin.shell: /bin/bash /tmp/remediate_gdm_banner.sh
    args:
      executable: /bin/bash
    register: result_01
    when: not (playbook_skipped | default(false) | bool)
    failed_when: false
    tags: [execute]

  - name: "Req 2 - Verify GDM login banner configuration"
    ansible.builtin.shell: |
      if [ -f "/etc/dconf/profile/gdm" ] && [ -d "/etc/dconf/db/gdm.d" ]; then
         if grep -Piq '^\h*banner-message-enable\h*=\h*true\b' /etc/dconf/db/gdm.d/* && \
            grep -Piq '^\h*banner-message-text=[\x27"]+\S+' /etc/dconf/db/gdm.d/*; then
            echo "COMPLIANT"
         else
            echo "NOT_COMPLIANT"
         fi
      else
         echo "NOT_COMPLIANT"
      fi
    args:
      executable: /bin/bash
    register: result_02
    when: not (playbook_skipped | default(false) | bool)
    failed_when: false
    tags: [execute]

  - name: "Store requirement 01 details"
    ansible.builtin.set_fact:
      task_01_name: "Run remediation script for GDM login banner"
      task_01_cmd: "/bin/bash /tmp/remediate_gdm_banner.sh"
      task_01_rc: "{{ result_01.rc | default(-1) }}"
      data_01: "{{ result_01.stdout | default('') | trim }}"
      status_01: >-
        {%- if playbook_skipped | default(false) | bool %}SKIPPED
        {%- elif result_01.rc | default(-1) == 0 %}APPLIED
        {%- else %}FAILED{%- endif %}
      details_01: >-
        {%- if playbook_skipped | default(false) | bool %}GDM not installed - skipped
        {%- elif result_01.rc | default(-1) == 0 %}Script executed successfully
        {%- else %}Script failed with rc {{ result_01.rc | default(-1) }}{%- endif %}
    tags: [execute]

  - name: "Store requirement 02 details"
    ansible.builtin.set_fact:
      task_02_name: "Verify GDM login banner configuration"
      task_02_cmd: "grep checks for banner-message-enable and banner-message-text in dconf"
      task_02_rc: "{{ result_02.rc | default(-1) }}"
      data_02: "{{ result_02.stdout | default('') | trim }}"
      status_02: >-
        {%- if playbook_skipped | default(false) | bool %}SKIPPED
        {%- elif result_02.stdout | default('') | trim == 'COMPLIANT' %}APPLIED
        {%- else %}FAILED{%- endif %}
      details_02: >-
        {%- if playbook_skipped | default(false) | bool %}GDM not installed - skipped
        {%- elif result_02.stdout | default('') | trim == 'COMPLIANT' %}System is compliant
        {%- else %}System is not compliant{%- endif %}
    tags: [execute]

  - name: "Req 3 - Generate remediation report"
    ansible.builtin.debug:
      msg:
      - "REMEDIATION REPORT — CIS 1.8.2"
      - "Reference: CIS Benchmark checkpoint 1.8.2"
      - ""
      - "Requirement 1 - Run remediation script to configure GDM login banner:"
      - "  Task: {{ task_01_name }}"
      - "  Command: {{ task_01_cmd }}"
      - "  Exit code: {{ task_01_rc }}"
      - "  Data: {{ data_01 }}"
      - "  Status: {{ status_01 }}"
      - "  Details: {{ details_01 }}"
      - ""
      - "Requirement 2 - Verify GDM login banner is configured:"
      - "  Task: {{ task_02_name }}"
      - "  Command: {{ task_02_cmd }}"
      - "  Exit code: {{ task_02_rc }}"
      - "  Data: {{ data_02 }}"
      - "  Status: {{ status_02 }}"
      - "  Details: {{ details_02 }}"
      - ""
      - "========================================================"
      - "OVERALL REMEDIATION:"
      - "  Result: {{ status_02 }}"
      - "  Details: {{ details_02 }}"
      - "========================================================"
    tags: [execute]

  always:
        # === RESTORE (tag: restore) ===
        # All restore tasks discover state from disk (no references to pre_tasks or block registers)

  - name: "Restore - Check if backup directory exists"
    ansible.builtin.stat:
      path: "{{ backup_dir }}"
    register: _restore_backup_dir
    failed_when: false
    tags: [restore]

  - name: "Restore - Check if profile backup exists"
    ansible.builtin.stat:
      path: "{{ backup_dir }}/profile_gdm.present"
    register: _restore_profile_backup
    failed_when: false
    tags: [restore]

  - name: "Restore - Restore /etc/dconf/profile/gdm from backup"
    ansible.builtin.copy:
      src: "{{ backup_dir }}/profile_gdm.present"
      dest: /etc/dconf/profile/gdm
      remote_src: true
    when: _restore_profile_backup.stat.exists | default(false)
    failed_when: false
    tags: [restore]

  - name: "Restore - Check if profile absent marker exists"
    ansible.builtin.stat:
      path: "{{ backup_dir }}/profile_gdm.absent"
    register: _restore_profile_absent
    failed_when: false
    tags: [restore]

  - name: "Restore - Delete /etc/dconf/profile/gdm if it was created"
    ansible.builtin.file:
      path: /etc/dconf/profile/gdm
      state: absent
    when: _restore_profile_absent.stat.exists | default(false)
    failed_when: false
    tags: [restore]

  - name: "Restore - Check if banner keyfile backup exists"
    ansible.builtin.stat:
      path: "{{ backup_dir }}/01-banner-message.present"
    register: _restore_banner_backup
    failed_when: false
    tags: [restore]

  - name: "Restore - Restore /etc/dconf/db/gdm.d/01-banner-message from backup"
    ansible.builtin.copy:
      src: "{{ backup_dir }}/01-banner-message.present"
      dest: /etc/dconf/db/gdm.d/01-banner-message
      remote_src: true
    when: _restore_banner_backup.stat.exists | default(false)
    failed_when: false
    tags: [restore]

  - name: "Restore - Check if banner keyfile absent marker exists"
    ansible.builtin.stat:
      path: "{{ backup_dir }}/01-banner-message.absent"
    register: _restore_banner_absent
    failed_when: false
    tags: [restore]

  - name: "Restore - Delete /etc/dconf/db/gdm.d/01-banner-message if it was created"
    ansible.builtin.file:
      path: /etc/dconf/db/gdm.d/01-banner-message
      state: absent
    when: _restore_banner_absent.stat.exists | default(false)
    failed_when: false
    tags: [restore]

  - name: "Restore - Remove backup directory"
    ansible.builtin.file:
      path: "{{ backup_dir }}"
      state: absent
    when: _restore_backup_dir.stat.exists | default(false)
    failed_when: false
    tags: [restore]
