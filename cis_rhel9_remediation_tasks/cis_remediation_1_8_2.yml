---
- name: Initialize meta data variables
  include_vars: cis_remediation_var_1_8_2.yml

- name: "Snapshot - Create backup directory"
  ansible.builtin.file:
    path: "{{ backup_dir }}"
    state: directory
    mode: '0700'
  tags: [snapshot]
- name: "Snapshot - Check if GDM profile exists"
  ansible.builtin.stat:
    path: "/etc/dconf/profile/gdm"
  register: _sg_profile_stat
  tags: [snapshot]
- name: "Snapshot - Backup GDM profile if exists"
  ansible.builtin.copy:
    src: "/etc/dconf/profile/gdm"
    dest: "{{ backup_dir }}/gdm_profile.present"
    remote_src: true
  when: _sg_profile_stat.stat.exists
  tags: [snapshot]
- name: "Snapshot - Mark GDM profile as absent"
  ansible.builtin.copy:
    content: "absent"
    dest: "{{ backup_dir }}/gdm_profile.absent"
  when: not _sg_profile_stat.stat.exists
  tags: [snapshot]
- name: "Snapshot - Check if GDM dconf db directory exists"
  ansible.builtin.stat:
    path: "/etc/dconf/db/gdm.d"
  register: _sg_dbdir_stat
  tags: [snapshot]
- name: "Snapshot - Backup GDM dconf db directory if exists"
  ansible.builtin.shell: "tar czf {{ backup_dir }}/gdm_dbdir.present.tar.gz -C /etc/dconf/db gdm.d"
  args:
    executable: /bin/bash
  when: _sg_dbdir_stat.stat.exists
  tags: [snapshot]
- name: "Snapshot - Mark GDM dconf db directory as absent"
  ansible.builtin.copy:
    content: "absent"
    dest: "{{ backup_dir }}/gdm_dbdir.absent"
  when: not _sg_dbdir_stat.stat.exists
  tags: [snapshot]
- name: "Snapshot - Check if remediation script exists"
  ansible.builtin.stat:
    path: "{{ remediate_script }}"
  register: _sg_script_stat
  tags: [snapshot]
- name: "Snapshot - Mark remediation script as absent"
  ansible.builtin.copy:
    content: "absent"
    dest: "{{ backup_dir }}/remediate_script.absent"
  when: not _sg_script_stat.stat.exists
  tags: [snapshot]

- block:
  - name: "Initialize data variables"
    ansible.builtin.set_fact:
      data_02: "Not collected yet"
      status_02: "ERROR"
      details_02: "Not evaluated"
      data_03: "Not collected yet"
      status_03: "ERROR"
      details_03: "Not evaluated"
      task_02_name: "Not executed"
      task_02_cmd: "N/A"
      task_02_rc: -1
      task_03_name: "Not executed"
      task_03_cmd: "N/A"
      task_03_rc: -1
    tags: [execute]

  - name: "Req 1 - Check if GDM package is installed"
    ansible.builtin.package_facts:
      manager: auto
    failed_when: false
    tags: [execute]

  - name: "Req 1 - Set GDM installation status fact"
    ansible.builtin.set_fact:
      gdm_installed: "{{ ('gdm' in ansible_facts.packages or 'gdm3' in ansible_facts.packages) | bool }}"
    tags: [execute]

  - name: "Req 1 - Copy remediation script to remote"
    ansible.builtin.copy:
      dest: "{{ remediate_script }}"
      mode: '0700'
      content: "{{ remediate_script_content }}"
    when: gdm_installed | bool
    tags: [execute]

  - name: "Req 1 - Execute remediation script"
    ansible.builtin.shell: /bin/bash "{{ remediate_script }}"
    args:
      executable: /bin/bash
    register: remediate_result
    when: gdm_installed | bool
    failed_when: false
    tags: [execute]

  - name: "Req 1 - Remove temporary remediation script"
    ansible.builtin.file:
      path: "{{ remediate_script }}"
      state: absent
    when: gdm_installed | bool
    tags: [execute]

  - name: "Req 2 - Verify GDM login banner is enabled"
    ansible.builtin.shell: |
      l_output=""
      l_output2=""
      l_gdmfile="$(grep -Prils '^\h*banner-message-enable\b' /etc/dconf/db/*.d)"
      if [ -n "$l_gdmfile" ]; then
         l_gdmprofile="$(awk -F\/ '{split($(NF-1),a,".");print a[1]}' <<< "$l_gdmfile")"
         if grep -Pisq '^\h*banner-message-enable=true\b' "$l_gdmfile"; then
            l_output="$l_output\n - The \"banner-message-enable\" option is enabled in \"$l_gdmfile\""
         else
            l_output2="$l_output2\n - The \"banner-message-enable\" option is not enabled"
         fi
         l_lsbt="$(grep -Pios '^\h*banner-message-text=.*$' "$l_gdmfile")"
         if [ -n "$l_lsbt" ]; then
            l_output="$l_output\n - The \"banner-message-text\" option is set in \"$l_gdmfile\"\n - banner-message-text is set to:\n  - \"$l_lsbt\""
         else
            l_output2="$l_output2\n - The \"banner-message-text\" option is not set"
         fi
         if grep -Pq "^\h*system-db:$l_gdmprofile" /etc/dconf/profile/"$l_gdmprofile"; then
            l_output="$l_output\n - The \"$l_gdmprofile\" profile exists"
         else
            l_output2="$l_output2\n - The \"$l_gdmprofile\" profile doesn't exist"
         fi
         if [ -f "/etc/dconf/db/$l_gdmprofile" ]; then
            l_output="$l_output\n - The \"$l_gdmprofile\" profile exists in the dconf database"
         else
            l_output2="$l_output2\n - The \"$l_gdmprofile\" profile doesn't exist in the dconf database"
         fi
      else
         l_output2="$l_output2\n - The \"banner-message-enable\" option isn't configured"
      fi
      if [ -z "$l_output2" ]; then
         echo -e "\n- Audit Result:\n  ** PASS **\n$l_output\n"
      else
         echo -e "\n- Audit Result:\n  ** FAIL **\n - Reason(s) for audit failure:\n$l_output2\n"
         [ -n "$l_output" ] && echo -e "\n- Correctly set:\n$l_output\n"
      fi
    args:
      executable: /bin/bash
    register: verify_result
    when: gdm_installed | bool
    failed_when: false
    changed_when: false
    tags: [execute]

  - name: "Req 2 - Store verification details"
    ansible.builtin.set_fact:
      task_02_name: "Verify GDM login banner configuration"
      task_02_cmd: "bash script (verify CIS 1.8.2)"
      task_02_rc: "{{ verify_result.rc | default(-1) }}"
      data_02: "{{ verify_result.stdout | default('') | trim }}"
      status_02: "{{ ('PASS' if '** PASS **' in verify_result.stdout | default('') else 'FAIL' if '** FAIL **' in verify_result.stdout | default('') else 'ERROR') | trim }}"
      details_02: "{{ ('Verification passed' if '** PASS **' in verify_result.stdout | default('') else 'Verification failed' if '** FAIL **' in verify_result.stdout | default('') else 'Unable to determine compliance from script output') | trim }}"
    when: gdm_installed | bool
    tags: [execute]

  - name: "Req 2 - Set SKIP when GDM not installed"
    ansible.builtin.set_fact:
      task_02_name: "Verify GDM login banner configuration"
      task_02_cmd: "bash script (verify CIS 1.8.2)"
      task_02_rc: 0
      data_02: "GDM is not installed - verification not applicable"
      status_02: "SKIP"
      details_02: "GDM or GDM3 package not found"
    when: not gdm_installed | bool
    tags: [execute]

  - name: "Req 3 - Store final remediation result in cis_result"
    ansible.builtin.set_fact:
      cis_result: "{{ status_02 | default('ERROR') | trim }}"
      task_03_name: "Set cis_result variable"
      task_03_cmd: "set_fact from status_02"
      task_03_rc: 0
      data_03: "{{ status_02 | default('ERROR') | trim }}"
      status_03: "{{ status_02 | default('ERROR') | trim }}"
      details_03: "Overall remediation status stored from status_02"
    tags: [execute]

  - name: "Generate remediation report"
    ansible.builtin.debug:
      msg:
      - "REMEDIATION REPORT — CIS 1.8.2"
      - "Reference: CIS Benchmark checkpoint 1.8.2"
      - ""
      - "REQUIREMENT 02 - {{ req_02 }}:"
      - "  Task: {{ task_02_name | default('Not recorded') }}"
      - "  Command: {{ task_02_cmd | default('N/A') }}"
      - "  Exit code: {{ task_02_rc | default(-1) }}"
      - "  Data: {{ data_02 | default('') | trim }}"
      - "  Status: {{ status_02 | default('ERROR') | trim }}"
      - "  Details: {{ details_02 | default('') | trim }}"
      - ""
      - "REQUIREMENT 03 - {{ req_03 }}:"
      - "  Task: {{ task_03_name | default('Not recorded') }}"
      - "  Command: {{ task_03_cmd | default('N/A') }}"
      - "  Exit code: {{ task_03_rc | default(-1) }}"
      - "  Data: {{ data_03 | default('') | trim }}"
      - "  Status: {{ status_03 | default('ERROR') | trim }}"
      - "  Details: {{ details_03 | default('') | trim }}"
      - ""
      - "========================================================"
      - "OVERALL REMEDIATION:"
      - "  Result: {{ cis_result | default('ERROR') | trim }}"
      - "  Details: {{ details_02 | default('Not evaluated') | trim }}"
      - "========================================================"
    tags: [execute]

  always:
  - name: "Restore - Check if backup directory exists"
    ansible.builtin.stat:
      path: "{{ backup_dir }}"
    register: _restore_dir
    failed_when: false
    tags: [restore]

  - name: "Restore - Check if GDM profile backup exists"
    ansible.builtin.stat:
      path: "{{ backup_dir }}/gdm_profile.present"
    register: _restore_profile
    failed_when: false
    tags: [restore]

  - name: "Restore - Restore GDM profile from backup"
    ansible.builtin.copy:
      src: "{{ backup_dir }}/gdm_profile.present"
      dest: "/etc/dconf/profile/gdm"
      remote_src: true
    when: _restore_profile.stat.exists | default(false)
    failed_when: false
    tags: [restore]

  - name: "Restore - Check if GDM profile absent marker exists"
    ansible.builtin.stat:
      path: "{{ backup_dir }}/gdm_profile.absent"
    register: _restore_profile_absent
    failed_when: false
    tags: [restore]

  - name: "Restore - Delete GDM profile if it was absent before"
    ansible.builtin.file:
      path: "/etc/dconf/profile/gdm"
      state: absent
    when: _restore_profile_absent.stat.exists | default(false)
    failed_when: false
    tags: [restore]

  - name: "Restore - Check if GDM dconf db backup exists"
    ansible.builtin.stat:
      path: "{{ backup_dir }}/gdm_dbdir.present.tar.gz"
    register: _restore_dbdir
    failed_when: false
    tags: [restore]

  - name: "Restore - Restore GDM dconf db directory from backup"
    ansible.builtin.shell: "rm -rf /etc/dconf/db/gdm.d && tar xzf {{ backup_dir }}/gdm_dbdir.present.tar.gz -C /etc/dconf/db"
    args:
      executable: /bin/bash
    when: _restore_dbdir.stat.exists | default(false)
    failed_when: false
    tags: [restore]

  - name: "Restore - Check if GDM dconf db absent marker exists"
    ansible.builtin.stat:
      path: "{{ backup_dir }}/gdm_dbdir.absent"
    register: _restore_dbdir_absent
    failed_when: false
    tags: [restore]

  - name: "Restore - Delete GDM dconf db directory if it was absent before"
    ansible.builtin.file:
      path: "/etc/dconf/db/gdm.d"
      state: absent
    when: _restore_dbdir_absent.stat.exists | default(false)
    failed_when: false
    tags: [restore]

  - name: "Restore - Check if remediation script absent marker exists"
    ansible.builtin.stat:
      path: "{{ backup_dir }}/remediate_script.absent"
    register: _restore_script_absent
    failed_when: false
    tags: [restore]

  - name: "Restore - Delete remediation script if it was absent before"
    ansible.builtin.file:
      path: "{{ remediate_script }}"
      state: absent
    when: _restore_script_absent.stat.exists | default(false)
    failed_when: false
    tags: [restore]

  - name: "Restore - Remove backup directory"
    ansible.builtin.file:
      path: "{{ backup_dir }}"
      state: absent
    when: _restore_dir.stat.exists | default(false)
    failed_when: false
    tags: [restore]
