---
- name: Initialize meta data variables
  include_vars: cis_remediation_var_1_7_4.yml

- name: "Snapshot - Create backup directory"
  ansible.builtin.file:
    path: "{{ backup_dir }}"
    state: directory
    mode: '0700'
  tags: [snapshot]
- name: "Snapshot - Check if motd file exists"
  ansible.builtin.stat:
    path: "{{ motd_path }}"
  register: _snapshot_motd_stat
  tags: [snapshot]
- name: "Snapshot - Backup motd if exists"
  ansible.builtin.copy:
    src: "{{ motd_path }}"
    dest: "{{ backup_dir }}/motd"
    remote_src: true
  when: _snapshot_motd_stat.stat.exists
  tags: [snapshot]

- block:
  - name: "Check if /etc/motd exists"
    ansible.builtin.stat:
      path: "{{ motd_path }}"
    register: motd_stat
    tags: [execute]

  - name: "Resolve symlink target of /etc/motd"
    ansible.builtin.shell: "readlink -e {{ motd_path }}"
    args:
      executable: /bin/bash
    register: motd_real
    changed_when: false
    failed_when: false
    when: motd_stat.stat.exists
    tags: [execute]

  - name: "Req 1 - Apply ownership root:root to /etc/motd"
    ansible.builtin.file:
      path: "{{ motd_real.stdout }}"
      owner: root
      group: root
    when:
    - not (remove_motd | default(false))
    - motd_stat.stat.exists
    - motd_real is not failed
    register: result_01
    failed_when: false
    tags: [execute]

  - name: "Req 2 - Apply permissions u-x,go-wx to /etc/motd"
    ansible.builtin.file:
      path: "{{ motd_real.stdout }}"
      mode: 'u-x,go-wx'
    when:
    - not (remove_motd | default(false))
    - motd_stat.stat.exists
    - motd_real is not failed
    register: result_02
    failed_when: false
    tags: [execute]

  - name: "Req 3 - Remove /etc/motd"
    ansible.builtin.file:
      path: "{{ motd_path }}"
      state: absent
    when: remove_motd | default(false)
    register: result_03
    failed_when: false
    tags: [execute]

  - name: "Req 4 - Verify /etc/motd configuration"
    ansible.builtin.shell: "stat /etc/motd 2>/dev/null || echo '/etc/motd does not exist'"
    args:
      executable: /bin/bash
    register: result_04
    changed_when: false
    failed_when: false
    tags: [execute]

  - name: "Set report facts for requirements 1-4 (except details_04)"
    set_fact:
      task_01_name: "Apply chown root:root to motd"
      task_01_cmd: "chown root:root $(readlink -e /etc/motd)"
      task_01_rc: "{{ 0 if result_01 is not failed else result_01.rc | default(-1) }}"
      data_01: "{{ 'ownership set to root:root' if result_01 is not failed else 'N/A' }}"
      status_01: "{{ 'SKIPPED' if not (motd_stat.stat.exists and not (remove_motd | default(false))) else ('PASS' if result_01 is not failed else 'FAIL') }}"
      details_01: >-
        {%- if not motd_stat.stat.exists -%} Motd file does not exist
        {%- elif remove_motd | default(false) -%} Removal mode selected, ownership step skipped
        {%- elif result_01 is not failed -%} Ownership set correctly
        {%- else -%} Failed to set ownership
        {%- endif -%}

      task_02_name: "Apply chmod u-x,go-wx to motd"
      task_02_cmd: "chmod u-x,go-wx $(readlink -e /etc/motd)"
      task_02_rc: "{{ 0 if result_02 is not failed else result_02.rc | default(-1) }}"
      data_02: "{{ 'permissions set' if result_02 is not failed else 'N/A' }}"
      status_02: "{{ 'SKIPPED' if not (motd_stat.stat.exists and not (remove_motd | default(false))) else ('PASS' if result_02 is not failed else 'FAIL') }}"
      details_02: >-
        {%- if not motd_stat.stat.exists -%} Motd file does not exist
        {%- elif remove_motd | default(false) -%} Removal mode selected, permissions step skipped
        {%- elif result_02 is not failed -%} Permissions set correctly
        {%- else -%} Failed to set permissions
        {%- endif -%}

      task_03_name: "Remove /etc/motd"
      task_03_cmd: "rm /etc/motd"
      task_03_rc: "{{ 0 if result_03 is not failed else result_03.rc | default(-1) }}"
      data_03: "{{ 'file removed' if result_03 is not failed else 'N/A' }}"
      status_03: "{{ 'SKIPPED' if not (remove_motd | default(false)) else ('PASS' if result_03 is not failed else 'FAIL') }}"
      details_03: "{{ 'Removal not requested' if not (remove_motd | default(false)) else ('File removed' if result_03 is not failed else 'Failed to remove file') }}"

      task_04_name: "Verify /etc/motd configuration"
      task_04_cmd: "stat /etc/motd 2>/dev/null || echo '/etc/motd does not exist'"
      task_04_rc: "{{ result_04.rc | default(-1) }}"
      data_04: "{{ result_04.stdout | default('N/A') | trim }}"
      status_04: >-
        {%- set output = result_04.stdout | default('') | trim -%}
        {%- if remove_motd | default(false) -%}
          {%- if output == '/etc/motd does not exist' -%} PASS {%- else -%} FAIL {%- endif -%}
        {%- else -%}
          {%- if result_04.rc | default(1) == 0 and output | length > 0 -%}
            {%- set mode_list = output | regex_findall('Access: \\(0?([0-7]+)/') -%}
            {%- set uid_list = output | regex_findall('Uid: \\(\\s*([0-9]+)/') -%}
            {%- set gid_list = output | regex_findall('Gid: \\(\\s*([0-9]+)/') -%}
            {%- if mode_list and uid_list and gid_list -%}
              {%- set mode_str = mode_list[0] -%}
              {%- set uid_str = uid_list[0] -%}
              {%- set gid_str = gid_list[0] -%}
              {%- set mode_int = mode_str | int(base=8) -%}
              {%- set u_perm = (mode_int // 64) % 8 -%}
              {%- set g_perm = (mode_int // 8) % 8 -%}
              {%- set o_perm = mode_int % 8 -%}
              {%- if uid_str | int == 0 and gid_str | int == 0 and u_perm in [4, 6] and g_perm in [0, 4] and o_perm in [0, 4] -%} PASS {%- else -%} FAIL {%- endif -%}
            {%- else -%} ERROR {%- endif -%}
          {%- else -%} FAIL {%- endif -%}
        {%- endif -%}
    tags: [execute]

  - name: "Set details for requirement 04"
    set_fact:
      details_04: >-
        {%- if remove_motd | default(false) -%}
          {%- if result_04.stdout | default('') | trim == '/etc/motd does not exist' -%} File removed successfully
          {%- else -%} File still exists after removal attempt
          {%- endif -%}
        {%- else -%}
          {%- if status_04 | trim == 'PASS' -%} Ownership and permissions are correct
          {%- else -%} Verification failed: {{ result_04.stdout | default('') | trim }}
          {%- endif -%}
        {%- endif %}
    tags: [execute]

  - name: "Req 5 - Store final remediation result as cis_result"
    set_fact:
      cis_result: "{{ status_04 | default('ERROR') | trim }}"
    tags: [execute]

  - name: "Set report facts for requirement 5"
    set_fact:
      task_05_name: "Set cis_result"
      task_05_cmd: "set_fact: cis_result = {{ status_04 | default('ERROR') | trim }}"
      task_05_rc: 0
      data_05: "{{ cis_result }}"
      status_05: "PASS"
      details_05: "cis_result stored as {{ cis_result }}"
    tags: [execute]

  - name: "Generate remediation report"
    debug:
      msg:
      - "REMEDIATION REPORT — CIS 1.7.4"
      - "Reference: CIS Benchmark checkpoint 1.7.4"
      - ""
      - "REQUIREMENT 01 - {{ req_01 }}:"
      - "  Task: {{ task_01_name | default('Task not recorded') }}"
      - "  Command: {{ task_01_cmd | default('N/A') }}"
      - "  Exit code: {{ task_01_rc | default(-1) }}"
      - "  Data: {{ data_01 | default('N/A') }}"
      - "  Status: {{ status_01 | default('ERROR') }}"
      - "  Details: {{ details_01 | default('None') }}"
      - ""
      - "REQUIREMENT 02 - {{ req_02 }}:"
      - "  Task: {{ task_02_name | default('Task not recorded') }}"
      - "  Command: {{ task_02_cmd | default('N/A') }}"
      - "  Exit code: {{ task_02_rc | default(-1) }}"
      - "  Data: {{ data_02 | default('N/A') }}"
      - "  Status: {{ status_02 | default('ERROR') }}"
      - "  Details: {{ details_02 | default('None') }}"
      - ""
      - "REQUIREMENT 03 - {{ req_03 }}:"
      - "  Task: {{ task_03_name | default('Task not recorded') }}"
      - "  Command: {{ task_03_cmd | default('N/A') }}"
      - "  Exit code: {{ task_03_rc | default(-1) }}"
      - "  Data: {{ data_03 | default('N/A') }}"
      - "  Status: {{ status_03 | default('ERROR') }}"
      - "  Details: {{ details_03 | default('None') }}"
      - ""
      - "REQUIREMENT 04 - {{ req_04 }}:"
      - "  Task: {{ task_04_name | default('Task not recorded') }}"
      - "  Command: {{ task_04_cmd | default('N/A') }}"
      - "  Exit code: {{ task_04_rc | default(-1) }}"
      - "  Data: {{ data_04 | default('N/A') }}"
      - "  Status: {{ status_04 | default('ERROR') }}"
      - "  Details: {{ details_04 | default('None') }}"
      - ""
      - "REQUIREMENT 05 - {{ req_05 }}:"
      - "  Task: {{ task_05_name | default('Task not recorded') }}"
      - "  Command: {{ task_05_cmd | default('N/A') }}"
      - "  Exit code: {{ task_05_rc | default(-1) }}"
      - "  Data: {{ data_05 | default('N/A') }}"
      - "  Status: {{ status_05 | default('ERROR') }}"
      - "  Details: {{ details_05 | default('None') }}"
      - ""
      - "OVERALL REMEDIATION:"
      - "  Result: {{ cis_result | default('ERROR') }}"
    tags: [execute]

  always:
  - name: "Restore - Check if backup exists"
    ansible.builtin.stat:
      path: "{{ backup_dir }}/motd"
    register: _restore_backup_stat
    tags: [restore]

  - name: "Restore - Overwrite /etc/motd with backup"
    ansible.builtin.copy:
      src: "{{ backup_dir }}/motd"
      dest: "{{ motd_path }}"
      remote_src: true
    when: _restore_backup_stat.stat.exists
    failed_when: false
    tags: [restore]

  - name: "Restore - Remove backup directory"
    ansible.builtin.file:
      path: "{{ backup_dir }}"
      state: absent
    when: _restore_backup_stat.stat.exists
    failed_when: false
    tags: [restore]
