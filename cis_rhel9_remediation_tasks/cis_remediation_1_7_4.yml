---
- name: Initialize meta data variables
  include_vars: cis_remediation_var_1_7_4.yml

- name: "Snapshot - Create backup directory"
  ansible.builtin.file:
    path: "{{ backup_dir }}"
    state: directory
    mode: '0700'
  tags: [snapshot]
- name: "Snapshot - Check if /etc/motd exists"
  ansible.builtin.stat:
    path: "{{ motd_file }}"
  register: _sg_motd_stat
  tags: [snapshot]
- name: "Snapshot - Backup /etc/motd if exists"
  ansible.builtin.copy:
    src: "{{ motd_file }}"
    dest: "{{ backup_dir }}/motd.present"
    remote_src: true
  when: _sg_motd_stat.stat.exists
  tags: [snapshot]
- name: "Snapshot - Mark /etc/motd as absent if not exists"
  ansible.builtin.copy:
    content: "absent"
    dest: "{{ backup_dir }}/motd.absent"
  when: not _sg_motd_stat.stat.exists
  tags: [snapshot]

- block:
  - name: "Initialize data variables"
    set_fact:
      data_01: "Not collected yet"
      status_01: "ERROR"
      details_01: "Not evaluated"
      data_02: "Not collected yet"
      status_02: "ERROR"
      details_02: "Not evaluated"
      data_03: "Not collected yet"
      status_03: "ERROR"
      details_03: "Not evaluated"
      data_04: "Not collected yet"
      status_04: "ERROR"
      details_04: "Not evaluated"
      data_05: "Not collected yet"
      status_05: "ERROR"
      details_05: "Not evaluated"
      task_01_name: "Not executed"
      task_01_cmd: "N/A"
      task_01_rc: -1

# Requirement 1
  - name: "Req 01 - Check if /etc/motd exists"
    ansible.builtin.stat:
      path: "{{ motd_file }}"
    register: motd_stat
    failed_when: false
    tags: [execute]

  - name: "Store requirement 01 details"
    set_fact:
      task_01_name: "Check if /etc/motd exists"
      task_01_cmd: "stat module on /etc/motd"
      task_01_rc: "0"
      data_01: "{{ 'exists' if motd_stat.stat.exists else 'does not exist' }}"
      status_01: "PASS"
      details_01: "{{ 'File exists' if motd_stat.stat.exists else 'File does not exist - no further checks needed' }}"
    tags: [execute]

# Requirement 2
  - name: "Req 02 - Apply ownership root:root to /etc/motd"
    ansible.builtin.file:
      path: "{{ motd_file }}"
      owner: root
      group: root
    when:
    - motd_stat.stat.exists
    - not (remove_motd | bool)
    register: result_02
    failed_when: false
    tags: [execute]

  - name: "Store requirement 02 details"
    set_fact:
      task_02_name: "Apply ownership root:root to /etc/motd"
      task_02_cmd: "chown root:root /etc/motd"
      task_02_rc: "{{ result_02.rc | default(0) }}"
      data_02: "{{ 'Ownership set to root:root' if not result_02.failed | default(false) else 'Failed to set ownership' }}"
      status_02: "{{ 'SKIP' if result_02.skipped | default(false) else ('PASS' if not result_02.failed | default(false) else 'FAIL') }}"
      details_02: "{{ 'File does not exist - ownership not needed' if result_02.skipped | default(false) else ('Ownership applied successfully' if not result_02.failed | default(false) else 'Failed to apply ownership') }}"
    tags: [execute]

# Requirement 3
  - name: "Req 03 - Apply permissions u-x,go-wx to /etc/motd"
    ansible.builtin.file:
      path: "{{ motd_file }}"
      mode: 'u-x,go-wx'
    when:
    - motd_stat.stat.exists
    - not (remove_motd | bool)
    register: result_03
    failed_when: false
    tags: [execute]

  - name: "Store requirement 03 details"
    set_fact:
      task_03_name: "Apply permissions u-x,go-wx to /etc/motd"
      task_03_cmd: "chmod u-x,go-wx /etc/motd"
      task_03_rc: "{{ result_03.rc | default(0) }}"
      data_03: "{{ 'Permissions set to u-x,go-wx' if not result_03.failed | default(false) else 'Failed to set permissions' }}"
      status_03: "{{ 'SKIP' if result_03.skipped | default(false) else ('PASS' if not result_03.failed | default(false) else 'FAIL') }}"
      details_03: "{{ 'File does not exist - permissions not needed' if result_03.skipped | default(false) else ('Permissions applied successfully' if not result_03.failed | default(false) else 'Failed to apply permissions') }}"
    tags: [execute]

# Requirement 4
  - name: "Req 04 - Verify /etc/motd configuration"
    shell: |
      if [ ! -e /etc/motd ]; then
        echo "PASS"
        exit 0
      fi
      mode=$(stat -Lc '%a' /etc/motd)
      uid=$(stat -Lc '%u' /etc/motd)
      gid=$(stat -Lc '%g' /etc/motd)
      if [ "$uid" != "0" ] || [ "$gid" != "0" ]; then
        echo "FAIL"
        exit 0
      fi
      perm_dec=$((8#$mode))
      if [ $(( perm_dec & 022 )) -ne 0 ] ||
         [ $(( perm_dec & 0111 )) -ne 0 ] ||
         [ $perm_dec -gt $((8#0644)) ]; then
        echo "FAIL"
      else
        echo "PASS"
      fi
      exit 0
    args:
      executable: /bin/bash
    register: verify_result
    failed_when: false
    changed_when: false
    tags: [execute]

  - name: "Store requirement 04 details"
    set_fact:
      task_04_name: "Verify /etc/motd configuration"
      task_04_cmd: "Shell script to verify motd ownership and permissions"
      task_04_rc: "{{ verify_result.rc | default(-1) }}"
      data_04: "{{ verify_result.stdout | default('') | trim }}"
      status_04: "{{ verify_result.stdout | default('FAIL') | trim }}"
      details_04: >-
        {%- if not motd_stat.stat.exists -%}
        File does not exist - compliant by default
        {%- elif verify_result.stdout | default('FAIL') | trim == 'PASS' -%}
        Ownership and permissions are compliant
        {%- else -%}
        Non-compliant ownership or permissions detected
        {%- endif %}
    tags: [execute]

# Requirement 5
  - name: "Store final remediation result in cis_result"
    set_fact:
      cis_result: "{{ status_04 | default('ERROR') | trim }}"
    tags: [execute]

# Requirement 6
  - name: "Generate remediation report"
    debug:
      msg:
      - "REMEDIATION REPORT — CIS 1.7.4"
      - "Reference: CIS Benchmark checkpoint 1.7.4"
      - ""
      - "REQUIREMENT 01 - {{ req_01 }}:"
      - "  Task: {{ task_01_name | default('Not recorded') }}"
      - "  Command: {{ task_01_cmd | default('N/A') }}"
      - "  Exit code: {{ task_01_rc | default(-1) }}"
      - "  Data: {{ data_01 | default('') | trim }}"
      - "  Status: {{ status_01 | default('ERROR') | trim }}"
      - "  Details: {{ details_01 | default('') | trim }}"
      - ""
      - "REQUIREMENT 02 - {{ req_02 }}:"
      - "  Task: {{ task_02_name | default('Not recorded') }}"
      - "  Command: {{ task_02_cmd | default('N/A') }}"
      - "  Exit code: {{ task_02_rc | default(-1) }}"
      - "  Data: {{ data_02 | default('') | trim }}"
      - "  Status: {{ status_02 | default('ERROR') | trim }}"
      - "  Details: {{ details_02 | default('') | trim }}"
      - ""
      - "REQUIREMENT 03 - {{ req_03 }}:"
      - "  Task: {{ task_03_name | default('Not recorded') }}"
      - "  Command: {{ task_03_cmd | default('N/A') }}"
      - "  Exit code: {{ task_03_rc | default(-1) }}"
      - "  Data: {{ data_03 | default('') | trim }}"
      - "  Status: {{ status_03 | default('ERROR') | trim }}"
      - "  Details: {{ details_03 | default('') | trim }}"
      - ""
      - "REQUIREMENT 04 - {{ req_04 }}:"
      - "  Task: {{ task_04_name | default('Not recorded') }}"
      - "  Command: {{ task_04_cmd | default('N/A') }}"
      - "  Exit code: {{ task_04_rc | default(-1) }}"
      - "  Data: {{ data_04 | default('') | trim }}"
      - "  Status: {{ status_04 | default('ERROR') | trim }}"
      - "  Details: {{ details_04 | default('') | trim }}"
      - ""
      - "========================================================"
      - "OVERALL REMEDIATION:"
      - "  Result: {{ cis_result | default('ERROR') | trim }}"
      - "  Details: {{ details_04 | default('Not evaluated') | trim }}"
      - "========================================================"
    tags: [execute]

  always:
  - name: "Restore - Check if motd backup exists"
    ansible.builtin.stat:
      path: "{{ backup_dir }}/motd.present"
    register: _restore_present
    failed_when: false
    tags: [restore]

  - name: "Restore - Restore /etc/motd from backup"
    ansible.builtin.copy:
      src: "{{ backup_dir }}/motd.present"
      dest: "{{ motd_file }}"
      remote_src: true
    when: _restore_present.stat.exists | default(false)
    failed_when: false
    tags: [restore]

  - name: "Restore - Check if motd absent marker exists"
    ansible.builtin.stat:
      path: "{{ backup_dir }}/motd.absent"
    register: _restore_absent
    failed_when: false
    tags: [restore]

  - name: "Restore - Delete /etc/motd if it was absent before"
    ansible.builtin.file:
      path: "{{ motd_file }}"
      state: absent
    when: _restore_absent.stat.exists | default(false)
    failed_when: false
    tags: [restore]

  - name: "Restore - Remove backup directory"
    ansible.builtin.file:
      path: "{{ backup_dir }}"
      state: absent
    failed_when: false
    tags: [restore]
