---
- name: Initialize meta data variables
  include_vars: cis_remediation_var_7_1_2.yml

- name: "Snapshot - Create backup directory"
  ansible.builtin.file:
    path: "{{ backup_dir }}"
    state: directory
    mode: '0700'
  tags: [snapshot]
- name: "Snapshot - Check if config file exists"
  ansible.builtin.stat:
    path: "{{ target_file }}"
  register: _snapshot_stat
  tags: [snapshot]
- name: "Snapshot - Backup config file if exists"
  ansible.builtin.copy:
    src: "{{ target_file }}"
    dest: "{{ backup_dir }}/passwd-.backup"
    remote_src: true
  when: "_snapshot_stat.stat.exists"
  tags: [snapshot]

- block:
  - name: "Req 01 - Remove excess permissions on {{ target_file }}"
    ansible.builtin.file:
      path: "{{ target_file }}"
      mode: 'u-x,go-wx'
    register: result_01
    failed_when: false
    tags: [execute]

  - name: "Req 02 - Set owner and group to root on {{ target_file }}"
    ansible.builtin.file:
      path: "{{ target_file }}"
      owner: root
      group: root
    register: result_02
    failed_when: false
    tags: [execute]

  - name: "Req 03 - Verify permissions and ownership on {{ target_file }}"
    ansible.builtin.shell: |
      set -o pipefail
      mode=$(stat -c '%#a' {{ target_file }})
      own_grp=$(stat -c '%U:%G' {{ target_file }})
      # check: no execute bits anywhere, group/others have no write
      if [ $(( mode & 0111 )) -eq 0 ] && [ $(( mode & 022 )) -eq 0 ] && [ "$own_grp" = "root:root" ]; then
        echo "PASS $mode $own_grp"
      else
        echo "FAIL $mode $own_grp"
      fi
    args:
      executable: /bin/bash
    register: result_03
    failed_when: false
    changed_when: false
    tags: [execute]

  - name: "Store requirement details"
    set_fact:
      task_01_name: "Req 01 - Remove excess permissions on {{ target_file }}"
      task_01_cmd: "chmod u-x,go-wx {{ target_file }}"
      task_01_rc: "{{ result_01.rc | default(-1) }}"
      data_01: "{{ result_01.diff | default('No diff available') }}"
      status_01: "{{ 'PASS' if result_01 is not failed else 'FAIL' }}"
      details_01: "{{ 'Permissions set to u-x,go-wx' if result_01 is not failed else 'Failed to set permissions' }}"
      task_02_name: "Req 02 - Set owner and group to root on {{ target_file }}"
      task_02_cmd: "chown root:root {{ target_file }}"
      task_02_rc: "{{ result_02.rc | default(-1) }}"
      data_02: "{{ result_02.diff | default('No diff available') }}"
      status_02: "{{ 'PASS' if result_02 is not failed else 'FAIL' }}"
      details_02: "{{ 'Owner and group set to root:root' if result_02 is not failed else 'Failed to set ownership' }}"
      task_03_name: "Req 03 - Verify permissions and ownership on {{ target_file }}"
      task_03_cmd: "stat -c '%#a' {{ target_file }}; stat -c '%U:%G' {{ target_file }}; bitwise check"
      task_03_rc: "{{ result_03.rc | default(-1) }}"
      data_03: "{{ result_03.stdout | default('') | trim }}"
      status_03: "{{ 'PASS' if (result_03.stdout | default('') | trim).startswith('PASS') else 'FAIL' }}"
      details_03: "{{ result_03.stdout | default('') | trim }}"
    tags: [execute]

  - name: "Set final remediation result"
    set_fact:
      cis_result: "{{ 'PASS' if (status_01 | trim == 'PASS' and status_02 | trim == 'PASS' and status_03 | trim == 'PASS') else 'FAIL' }}"
    tags: [execute]

  - name: "Generate remediation report"
    debug:
      msg:
      - "========================================================"
      - "REMEDIATION REPORT — CIS 7.1.2"
      - "Reference: CIS Benchmark checkpoint 7.1.2"
      - "========================================================"
      - ""
      - "REQUIREMENT 01 - {{ req_01 }}:"
      - "  Task: {{ task_01_name | default('Task not recorded') }}"
      - "  Command: {{ task_01_cmd | default('N/A') }}"
      - "  Exit code: {{ task_01_rc | default(-1) }}"
      - "  Data: {{ data_01 | default('Data collection failed') | trim }}"
      - "  Status: {{ status_01 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_01 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 02 - {{ req_02 }}:"
      - "  Task: {{ task_02_name | default('Task not recorded') }}"
      - "  Command: {{ task_02_cmd | default('N/A') }}"
      - "  Exit code: {{ task_02_rc | default(-1) }}"
      - "  Data: {{ data_02 | default('Data collection failed') | trim }}"
      - "  Status: {{ status_02 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_02 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 03 - {{ req_03 }}:"
      - "  Task: {{ task_03_name | default('Task not recorded') }}"
      - "  Command: {{ task_03_cmd | default('N/A') }}"
      - "  Exit code: {{ task_03_rc | default(-1) }}"
      - "  Data: {{ data_03 | default('Data collection failed') | trim }}"
      - "  Status: {{ status_03 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_03 | default('Not evaluated') | trim }}"
      - ""
      - "========================================================"
      - "OVERALL REMEDIATION:"
      - "  Result: {{ cis_result | default('UNKNOWN') }}"
      - "  Details: {{ details_03 | default('Not evaluated') | trim }}"
      - "========================================================"
    tags: [execute]

  always:
  - name: "Restore - Check if backup exists"
    ansible.builtin.stat:
      path: "{{ backup_dir }}/passwd-.backup"
    register: _restore_stat
    failed_when: false
    tags: [restore]

  - name: "Restore - Overwrite with original"
    ansible.builtin.copy:
      src: "{{ backup_dir }}/passwd-.backup"
      dest: "{{ target_file }}"
      remote_src: true
    when: "_restore_stat.stat.exists | default(false)"
    failed_when: false
    tags: [restore]

  - name: "Restore - Remove backup directory"
    ansible.builtin.file:
      path: "{{ backup_dir }}"
      state: absent
    failed_when: false
    tags: [restore]
