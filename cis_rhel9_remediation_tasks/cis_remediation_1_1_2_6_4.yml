---
- name: Initialize meta data variables
  include_vars: cis_remediation_var_1_1_2_6_4.yml

- name: "Snapshot - Create backup directory"
  ansible.builtin.file:
    path: "{{ backup_dir }}"
    state: directory
    mode: '0700'
  tags: [snapshot]
- name: "Snapshot - Check if /etc/fstab exists"
  ansible.builtin.stat:
    path: "/etc/fstab"
  register: _sg_fstab_stat
  tags: [snapshot]
- name: "Snapshot - Backup /etc/fstab if exists"
  ansible.builtin.copy:
    src: "/etc/fstab"
    dest: "{{ backup_dir }}/fstab.present"
    remote_src: true
  when: _sg_fstab_stat.stat.exists
  tags: [snapshot]

- block:
  - name: "Initialize data variables"
    set_fact:
      data_01: "Not collected yet"
      status_01: "ERROR"
      details_01: "Not evaluated"
      data_02: "Not collected yet"
      status_02: "ERROR"
      details_02: "Not evaluated"
      data_03: "Not collected yet"
      status_03: "ERROR"
      details_03: "Not evaluated"
      data_04: "Not collected yet"
      status_04: "ERROR"
      details_04: "Not evaluated"
      task_01_name: "Not executed"
      task_01_cmd: "N/A"
      task_01_rc: -1
      task_02_name: "Not executed"
      task_02_cmd: "N/A"
      task_02_rc: -1
      task_03_name: "Not executed"
      task_03_cmd: "N/A"
      task_03_rc: -1
      task_04_name: "Not executed"
      task_04_cmd: "N/A"
      task_04_rc: -1
    tags: [execute]

  - name: "Req 01 - Check if /var/log is a separate partition"
    ansible.builtin.command: "findmnt -kn {{ mount_point }}"
    register: result_01
    failed_when: false
    changed_when: false
    tags: [execute]

  - name: "Store requirement 01 details"
    set_fact:
      task_01_name: "Check if /var/log is a separate partition"
      task_01_cmd: "findmnt -kn {{ mount_point }}"
      task_01_rc: "{{ result_01.rc | default(-1) }}"
      data_01: "{{ result_01.stdout | default('') | trim }}"
      status_01: "{{ 'PASS' if (result_01.rc | default(-1) == 0 and (result_01.stdout | default('') | trim | length > 0)) else 'SKIP' }}"
      details_01: "{{ 'Partition exists' if (result_01.rc | default(-1) == 0 and (result_01.stdout | default('') | trim | length > 0)) else 'No separate partition, remediation skipped' }}"
    tags: [execute]

  - name: "Req 02 - Check if noexec option is already present in fstab entry"
    ansible.builtin.shell: "findmnt -kn {{ mount_point }} | grep -v noexec"
    args:
      executable: /bin/bash
    register: result_02_precheck
    failed_when: false
    changed_when: false
    when:
    - "status_01 | trim == 'PASS'"
    tags: [execute]

  - name: "Req 02 - Add noexec to /var/log in /etc/fstab"
    ansible.builtin.lineinfile:
      path: "/etc/fstab"
      regexp: |
        ^(\S+)\s+{{ mount_point | regex_escape() }}\s+(\S+)\s+(\S+)(\s+.*)?$
      line: |
        \1 {{ mount_point }} \2 \3,noexec\4
      backrefs: true
      backup: false
    register: result_02
    failed_when: false
    when:
    - "status_01 | trim == 'PASS'"
    - "result_02_precheck.rc | default(-1) == 0"
    tags: [execute]

  - name: "Store requirement 02 details"
    set_fact:
      task_02_name: "Add noexec mount option to /var/log in /etc/fstab"
      task_02_cmd: "lineinfile: add noexec to /var/log fstab entry"
      task_02_rc: "{{ result_02.rc | default(-1) if status_01 | trim == 'PASS' else 'N/A' }}"
      data_02: "{{ 'fstab updated' if (status_01 | trim == 'PASS' and result_02 is changed) else ('fstab already had noexec' if (status_01 | trim == 'PASS' and not result_02 is changed) else 'N/A') }}"
      status_02: "{{ 'PASS' if status_01 | trim == 'PASS' else 'SKIP' }}"
      details_02: "{{ 'noexec added to /var/log fstab entry' if (status_01 | trim == 'PASS' and result_02 is changed) else ('noexec already present in /var/log fstab entry' if (status_01 | trim == 'PASS' and not result_02 is changed) else 'Skipped: no separate /var/log partition') }}"
    tags: [execute]

  - name: "Req 03 - Remount /var/log with updated options"
    ansible.builtin.shell: "mount -o remount {{ mount_point }}"
    args:
      executable: /bin/bash
    register: result_03
    failed_when: false
    when:
    - "status_01 | trim == 'PASS'"
    tags: [execute]

  - name: "Store requirement 03 details"
    set_fact:
      task_03_name: "Remount /var/log with updated options"
      task_03_cmd: "mount -o remount {{ mount_point }}"
      task_03_rc: "{{ result_03.rc | default(-1) if status_01 | trim == 'PASS' else 'N/A' }}"
      data_03: "{{ result_03.stdout | default('') | trim if status_01 | trim == 'PASS' else 'N/A' }}"
      status_03: "{{ 'PASS' if (status_01 | trim == 'PASS' and (result_03.rc | default(-1) == 0)) else ('SKIP' if status_01 | trim != 'PASS' else 'FAIL') }}"
      details_03: "{{ 'Remounted successfully' if (status_01 | trim == 'PASS' and (result_03.rc | default(-1) == 0)) else ('Remount failed' if status_01 | trim == 'PASS' else 'Skipped: no separate /var/log partition') }}"
    tags: [execute]

  - name: "Req 04 - Verify noexec option is set on /var/log"
    ansible.builtin.shell: "mount | grep {{ mount_point }} | grep -o noexec"
    args:
      executable: /bin/bash
    register: result_04
    failed_when: false
    changed_when: false
    when:
    - "status_01 | trim == 'PASS'"
    tags: [execute]

  - name: "Store requirement 04 details"
    set_fact:
      task_04_name: "Verify noexec option is set on /var/log"
      task_04_cmd: "mount | grep {{ mount_point }} | grep -o noexec"
      task_04_rc: "{{ result_04.rc | default(-1) if status_01 | trim == 'PASS' else 'N/A' }}"
      data_04: "{{ result_04.stdout | default('') | trim if status_01 | trim == 'PASS' else 'N/A' }}"
      status_04: "{{ 'PASS' if (status_01 | trim == 'PASS' and (result_04.rc | default(-1) == 0) and (result_04.stdout | default('') | trim == 'noexec')) else ('SKIP' if status_01 | trim != 'PASS' else 'FAIL') }}"
      details_04: "{{ 'noexec option verified' if (status_01 | trim == 'PASS' and (result_04.rc | default(-1) == 0) and (result_04.stdout | default('') | trim == 'noexec')) else ('noexec option not found' if status_01 | trim == 'PASS' else 'Skipped: no separate /var/log partition') }}"
    tags: [execute]

  - name: "Store final remediation result"
    set_fact:
      cis_result: "{{ status_04 | default('ERROR') | trim }}"
    tags: [execute]

  - name: "Generate remediation report"
    debug:
      msg:
      - "REMEDIATION REPORT — CIS 1.1.2.6.4"
      - "Reference: CIS Benchmark checkpoint 1.1.2.6.4"
      - ""
      - "REQUIREMENT 01 - {{ req_01 }}:"
      - "  Task: {{ task_01_name | default('Not recorded') }}"
      - "  Command: {{ task_01_cmd | default('N/A') }}"
      - "  Exit code: {{ task_01_rc | default(-1) }}"
      - "  Data: {{ data_01 | default('') | trim }}"
      - "  Status: {{ status_01 | default('ERROR') | trim }}"
      - "  Details: {{ details_01 | default('') | trim }}"
      - ""
      - "REQUIREMENT 02 - {{ req_02 }}:"
      - "  Task: {{ task_02_name | default('Not recorded') }}"
      - "  Command: {{ task_02_cmd | default('N/A') }}"
      - "  Exit code: {{ task_02_rc | default(-1) }}"
      - "  Data: {{ data_02 | default('') | trim }}"
      - "  Status: {{ status_02 | default('ERROR') | trim }}"
      - "  Details: {{ details_02 | default('') | trim }}"
      - ""
      - "REQUIREMENT 03 - {{ req_03 }}:"
      - "  Task: {{ task_03_name | default('Not recorded') }}"
      - "  Command: {{ task_03_cmd | default('N/A') }}"
      - "  Exit code: {{ task_03_rc | default(-1) }}"
      - "  Data: {{ data_03 | default('') | trim }}"
      - "  Status: {{ status_03 | default('ERROR') | trim }}"
      - "  Details: {{ details_03 | default('') | trim }}"
      - ""
      - "REQUIREMENT 04 - {{ req_04 }}:"
      - "  Task: {{ task_04_name | default('Not recorded') }}"
      - "  Command: {{ task_04_cmd | default('N/A') }}"
      - "  Exit code: {{ task_04_rc | default(-1) }}"
      - "  Data: {{ data_04 | default('') | trim }}"
      - "  Status: {{ status_04 | default('ERROR') | trim }}"
      - "  Details: {{ details_04 | default('') | trim }}"
      - ""
      - "========================================================"
      - "OVERALL REMEDIATION:"
      - "  Result: {{ cis_result | default('ERROR') | trim }}"
      - "  Details: {{ details_04 | default('Not evaluated') | trim }}"
      - "========================================================"
    tags: [execute]

  always:
  - name: "Restore - Check if fstab backup exists"
    ansible.builtin.stat:
      path: "{{ backup_dir }}/fstab.present"
    register: _restore_fstab
    failed_when: false
    tags: [restore]

  - name: "Restore - Restore /etc/fstab from backup"
    ansible.builtin.copy:
      src: "{{ backup_dir }}/fstab.present"
      dest: "/etc/fstab"
      remote_src: true
    register: _restore_fstab_result
    when: _restore_fstab.stat.exists | default(false)
    failed_when: false
    tags: [restore]

  - name: "Restore - Remount /var/log to apply restored fstab options"
    ansible.builtin.shell: "mount -o remount {{ mount_point }}"
    args:
      executable: /bin/bash
    when: _restore_fstab_result is not failed | default(false)
    failed_when: false
    tags: [restore]

  - name: "Restore - Remove backup directory"
    ansible.builtin.file:
      path: "{{ backup_dir }}"
      state: absent
    failed_when: false
    tags: [restore]
