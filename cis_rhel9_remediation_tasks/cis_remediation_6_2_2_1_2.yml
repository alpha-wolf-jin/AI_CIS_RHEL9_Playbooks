---
- name: Initialize meta data variables
  include_vars: cis_remediation_var_6_2_2_1_2.yml

- name: "Snapshot - Create backup directory"
  ansible.builtin.file:
    path: "{{ backup_dir }}"
    state: directory
    mode: '0700'
  tags: [snapshot]
- name: "Snapshot - Check if config file exists"
  ansible.builtin.stat:
    path: "{{ config_file }}"
  register: _snap_config_stat
  tags: [snapshot]
- name: "Snapshot - Backup config file if exists"
  ansible.builtin.copy:
    src: "{{ config_file }}"
    dest: "{{ backup_dir }}/journal-upload.conf.present"
    remote_src: true
  when: "_snap_config_stat.stat.exists"
  tags: [snapshot]

- block:
  - name: "Req 01 - Check if {{ package_name }} is installed"
    ansible.builtin.shell: |
      if command -v rpm > /dev/null 2>&1; then
        rpm -q {{ package_name }} 2>/dev/null && echo "INSTALLED" || echo "NOT_INSTALLED"
      elif command -v dpkg-query > /dev/null 2>&1; then
        dpkg-query -W {{ package_name }} 2>/dev/null && echo "INSTALLED" || echo "NOT_INSTALLED"
      else
        echo "UNKNOWN"
      fi
    args:
      executable: /bin/bash
    register: result_01
    failed_when: false
    changed_when: false
    tags: [execute]

  - name: "Store requirement 01 details"
    ansible.builtin.set_fact:
      task_01_name: "Check if {{ package_name }} is installed"
      task_01_cmd: "rpm -q {{ package_name }} || dpkg-query -W {{ package_name }}"
      task_01_rc: "{{ result_01.rc | default(-1) }}"
      data_01: "{{ result_01.stdout | default('') | trim }}"
      status_01: "{{ 'SKIPPED' if 'NOT_INSTALLED' in (result_01.stdout | default('')) else ('PASS' if result_01.rc | default(-1) == 0 else 'FAIL') }}"
      details_01: "{{ 'Package not installed - all remediation steps skipped' if 'NOT_INSTALLED' in (result_01.stdout | default('')) else ('Package is installed' if result_01.rc | default(-1) == 0 else 'Failed to check package') }}"
      playbook_skipped: "{{ 'NOT_INSTALLED' in (result_01.stdout | default('')) }}"
    tags: [execute]

  - name: "Req 02 - Set URL in {{ config_file }}"
    ansible.builtin.lineinfile:
      path: "{{ config_file }}"
      regexp: '^URL='
      line: "URL={{ url_value }}"
      state: present
      create: yes
      mode: '0644'
    register: result_02
    failed_when: false
    when: "not (playbook_skipped | default(false))"
    tags: [execute]

  - name: "Store requirement 02 details"
    ansible.builtin.set_fact:
      task_02_name: "Set URL in {{ config_file }}"
      task_02_cmd: "lineinfile: regexp=^URL= line=URL={{ url_value }}"
      task_02_rc: "{{ 0 if not (playbook_skipped | default(false)) else -1 }}"
      data_02: "{{ 'URL={{ url_value }}' if not (playbook_skipped | default(false)) else 'SKIPPED' }}"
      status_02: "{{ 'SKIPPED' if (playbook_skipped | default(false)) else ('PASS' if result_02 is not failed else 'FAIL') }}"
      details_02: "{{ 'Skipped - package not installed' if (playbook_skipped | default(false)) else ('URL configured' if result_02 is not failed else 'Failed to configure URL') }}"
    tags: [execute]

  - name: "Req 03 - Set ServerKeyFile in {{ config_file }}"
    ansible.builtin.lineinfile:
      path: "{{ config_file }}"
      regexp: '^ServerKeyFile='
      line: "ServerKeyFile={{ server_key_file }}"
      state: present
      create: yes
      mode: '0644'
    register: result_03
    failed_when: false
    when: "not (playbook_skipped | default(false))"
    tags: [execute]

  - name: "Store requirement 03 details"
    ansible.builtin.set_fact:
      task_03_name: "Set ServerKeyFile in {{ config_file }}"
      task_03_cmd: "lineinfile: regexp=^ServerKeyFile= line=ServerKeyFile={{ server_key_file }}"
      task_03_rc: "{{ 0 if not (playbook_skipped | default(false)) else -1 }}"
      data_03: "{{ 'ServerKeyFile={{ server_key_file }}' if not (playbook_skipped | default(false)) else 'SKIPPED' }}"
      status_03: "{{ 'SKIPPED' if (playbook_skipped | default(false)) else ('PASS' if result_03 is not failed else 'FAIL') }}"
      details_03: "{{ 'Skipped - package not installed' if (playbook_skipped | default(false)) else ('ServerKeyFile configured' if result_03 is not failed else 'Failed to configure ServerKeyFile') }}"
    tags: [execute]

  - name: "Req 04 - Set ServerCertificateFile in {{ config_file }}"
    ansible.builtin.lineinfile:
      path: "{{ config_file }}"
      regexp: '^ServerCertificateFile='
      line: "ServerCertificateFile={{ server_cert_file }}"
      state: present
      create: yes
      mode: '0644'
    register: result_04
    failed_when: false
    when: "not (playbook_skipped | default(false))"
    tags: [execute]

  - name: "Store requirement 04 details"
    ansible.builtin.set_fact:
      task_04_name: "Set ServerCertificateFile in {{ config_file }}"
      task_04_cmd: "lineinfile: regexp=^ServerCertificateFile= line=ServerCertificateFile={{ server_cert_file }}"
      task_04_rc: "{{ 0 if not (playbook_skipped | default(false)) else -1 }}"
      data_04: "{{ 'ServerCertificateFile={{ server_cert_file }}' if not (playbook_skipped | default(false)) else 'SKIPPED' }}"
      status_04: "{{ 'SKIPPED' if (playbook_skipped | default(false)) else ('PASS' if result_04 is not failed else 'FAIL') }}"
      details_04: "{{ 'Skipped - package not installed' if (playbook_skipped | default(false)) else ('ServerCertificateFile configured' if result_04 is not failed else 'Failed to configure ServerCertificateFile') }}"
    tags: [execute]

  - name: "Req 05 - Set TrustedCertificateFile in {{ config_file }}"
    ansible.builtin.lineinfile:
      path: "{{ config_file }}"
      regexp: '^TrustedCertificateFile='
      line: "TrustedCertificateFile={{ trusted_cert_file }}"
      state: present
      create: yes
      mode: '0644'
    register: result_05
    failed_when: false
    when: "not (playbook_skipped | default(false))"
    tags: [execute]

  - name: "Store requirement 05 details"
    ansible.builtin.set_fact:
      task_05_name: "Set TrustedCertificateFile in {{ config_file }}"
      task_05_cmd: "lineinfile: regexp=^TrustedCertificateFile= line=TrustedCertificateFile={{ trusted_cert_file }}"
      task_05_rc: "{{ 0 if not (playbook_skipped | default(false)) else -1 }}"
      data_05: "{{ 'TrustedCertificateFile={{ trusted_cert_file }}' if not (playbook_skipped | default(false)) else 'SKIPPED' }}"
      status_05: "{{ 'SKIPPED' if (playbook_skipped | default(false)) else ('PASS' if result_05 is not failed else 'FAIL') }}"
      details_05: "{{ 'Skipped - package not installed' if (playbook_skipped | default(false)) else ('TrustedCertificateFile configured' if result_05 is not failed else 'Failed to configure TrustedCertificateFile') }}"
    tags: [execute]

  - name: "Req 06 - Restart {{ service_name }} service"
    ansible.builtin.systemd:
      name: "{{ service_name }}"
      state: restarted
    register: result_06
    failed_when: false
    when: "not (playbook_skipped | default(false))"
    tags: [execute]

  - name: "Store requirement 06 details"
    ansible.builtin.set_fact:
      task_06_name: "Restart {{ service_name }} service"
      task_06_cmd: "systemctl restart {{ service_name }}"
      task_06_rc: "{{ result_06.rc | default(0) if not (playbook_skipped | default(false)) else -1 }}"
      data_06: "{{ result_06.state | default('SKIPPED') if not (playbook_skipped | default(false)) else 'SKIPPED' }}"
      status_06: "{{ 'SKIPPED' if (playbook_skipped | default(false)) else ('PASS' if result_06 is not failed else 'FAIL') }}"
      details_06: "{{ 'Skipped - package not installed' if (playbook_skipped | default(false)) else ('Service restarted' if result_06 is not failed else 'Failed to restart service') }}"
    tags: [execute]

  - name: "Req 07 - Verify {{ service_name }} service status and logs"
    ansible.builtin.shell: |
      systemctl status {{ service_name }} --no-pager 2>&1
      echo "---LOG_TAIL---"
      journalctl -u {{ service_name }} --no-pager 2>&1 | tail -20
    args:
      executable: /bin/bash
    register: result_07
    failed_when: false
    changed_when: false
    when: "not (playbook_skipped | default(false))"
    tags: [execute]

  - name: "Store requirement 07 details"
    ansible.builtin.set_fact:
      task_07_name: "Verify {{ service_name }} service status and logs"
      task_07_cmd: "systemctl status {{ service_name }} && journalctl -u {{ service_name }} --no-pager | tail -20"
      task_07_rc: "{{ result_07.rc | default(-1) if not (playbook_skipped | default(false)) else -1 }}"
      data_07: "{{ result_07.stdout | default('SKIPPED') | trim if not (playbook_skipped | default(false)) else 'SKIPPED' }}"
      status_07: "{{ 'SKIPPED' if (playbook_skipped | default(false)) else ('PASS' if result_07.rc | default(-1) == 0 else 'FAIL') }}"
      details_07: "{{ 'Skipped - package not installed' if (playbook_skipped | default(false)) else ('Service verified' if result_07.rc | default(-1) == 0 else 'Verification failed') }}"
    tags: [execute]

  - name: "Generate remediation report"
    ansible.builtin.debug:
      msg:
      - "========================================================"
      - "        REMEDIATION REPORT — CIS 6.2.2.1.2"
      - "Reference: CIS Benchmark checkpoint 6.2.2.1.2"
      - "========================================================"
      - ""
      - "REQUIREMENT 01 - {{ req_01 }}:"
      - "  Task: {{ task_01_name | default('Task not recorded') }}"
      - "  Command: {{ task_01_cmd | default('N/A') }}"
      - "  Exit code: {{ task_01_rc | default(-1) }}"
      - "  Data: {{ data_01 | default('Data collection failed') | trim }}"
      - "  Status: {{ status_01 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_01 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 02 - {{ req_02 }}:"
      - "  Task: {{ task_02_name | default('Task not recorded') }}"
      - "  Command: {{ task_02_cmd | default('N/A') }}"
      - "  Exit code: {{ task_02_rc | default(-1) }}"
      - "  Data: {{ data_02 | default('Data collection failed') | trim }}"
      - "  Status: {{ status_02 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_02 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 03 - {{ req_03 }}:"
      - "  Task: {{ task_03_name | default('Task not recorded') }}"
      - "  Command: {{ task_03_cmd | default('N/A') }}"
      - "  Exit code: {{ task_03_rc | default(-1) }}"
      - "  Data: {{ data_03 | default('Data collection failed') | trim }}"
      - "  Status: {{ status_03 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_03 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 04 - {{ req_04 }}:"
      - "  Task: {{ task_04_name | default('Task not recorded') }}"
      - "  Command: {{ task_04_cmd | default('N/A') }}"
      - "  Exit code: {{ task_04_rc | default(-1) }}"
      - "  Data: {{ data_04 | default('Data collection failed') | trim }}"
      - "  Status: {{ status_04 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_04 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 05 - {{ req_05 }}:"
      - "  Task: {{ task_05_name | default('Task not recorded') }}"
      - "  Command: {{ task_05_cmd | default('N/A') }}"
      - "  Exit code: {{ task_05_rc | default(-1) }}"
      - "  Data: {{ data_05 | default('Data collection failed') | trim }}"
      - "  Status: {{ status_05 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_05 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 06 - {{ req_06 }}:"
      - "  Task: {{ task_06_name | default('Task not recorded') }}"
      - "  Command: {{ task_06_cmd | default('N/A') }}"
      - "  Exit code: {{ task_06_rc | default(-1) }}"
      - "  Data: {{ data_06 | default('Data collection failed') | trim }}"
      - "  Status: {{ status_06 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_06 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 07 - {{ req_07 }}:"
      - "  Task: {{ task_07_name | default('Task not recorded') }}"
      - "  Command: {{ task_07_cmd | default('N/A') }}"
      - "  Exit code: {{ task_07_rc | default(-1) }}"
      - "  Data: {{ data_07 | default('Data collection failed') | trim }}"
      - "  Status: {{ status_07 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_07 | default('Not evaluated') | trim }}"
      - ""
      - "========================================================"
      - "OVERALL REMEDIATION:"
      - "  Result: {{ status_07 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_07 | default('Not evaluated') | trim }}"
      - "========================================================"
    tags: [execute]

  always:
  - name: "Restore - Check if backup exists"
    ansible.builtin.stat:
      path: "{{ backup_dir }}/journal-upload.conf.present"
    register: _restore_backup_stat
    failed_when: false
    tags: [restore]

  - name: "Restore - Overwrite with original"
    ansible.builtin.copy:
      src: "{{ backup_dir }}/journal-upload.conf.present"
      dest: "{{ config_file }}"
      remote_src: true
    when: "_restore_backup_stat.stat.exists | default(false)"
    failed_when: false
    tags: [restore]

  - name: "Restore - Remove backup directory"
    ansible.builtin.file:
      path: "{{ backup_dir }}"
      state: absent
    failed_when: false
    tags: [restore]
