---
- name: Initialize meta data variables
  include_vars: cis_remediation_var_5_1_17.yml

- name: "Snapshot - Create backup directory"
  ansible.builtin.file:
    path: "{{ backup_dir }}"
    state: directory
    mode: '0700'
  tags: [snapshot]
- name: "Snapshot - Check if sshd_config exists"
  ansible.builtin.stat:
    path: "{{ config_file }}"
  register: _snap_sshd_stat
  failed_when: false
  tags: [snapshot]
- name: "Snapshot - Backup sshd_config if exists"
  ansible.builtin.copy:
    src: "{{ config_file }}"
    dest: "{{ backup_dir }}/sshd_config.orig"
    remote_src: true
  when: _snap_sshd_stat.stat.exists | default(false)
  failed_when: false
  tags: [snapshot]

- block:
  - name: "Initialize report variables"
    ansible.builtin.set_fact:
      data_01: "Not collected yet"
      status_01: "UNKNOWN"
      details_01: "Not evaluated"
      task_01_name: "Not executed"
      task_01_cmd: "N/A"
      task_01_rc: -1
      data_02: "Not collected yet"
      status_02: "UNKNOWN"
      details_02: "Not evaluated"
      task_02_name: "Not executed"
      task_02_cmd: "N/A"
      task_02_rc: -1
      data_03: "Not collected yet"
      status_03: "UNKNOWN"
      details_03: "Not evaluated"
      task_03_name: "Not executed"
      task_03_cmd: "N/A"
      task_03_rc: -1
      data_04: "Not collected yet"
      status_04: "UNKNOWN"
      details_04: "Not evaluated"
      task_04_name: "Not executed"
      task_04_cmd: "N/A"
      task_04_rc: -1
      data_05: "Not collected yet"
      status_05: "UNKNOWN"
      details_05: "Not evaluated"
      task_05_name: "Not executed"
      task_05_cmd: "N/A"
      task_05_rc: -1
      playbook_skipped: false
    tags: [execute]

  - name: "Req 01 - Prerequisite check: sshd binary and config syntax"
    ansible.builtin.shell: "which sshd && sshd -t"
    args:
      executable: /bin/bash
    register: result_01
    failed_when: false
    changed_when: false
    tags: [execute]

  - name: "Req 01 - Store prerequisite check result"
    ansible.builtin.set_fact:
      task_01_name: "Prerequisite check: which sshd && sshd -t"
      task_01_cmd: "which sshd && sshd -t"
      task_01_rc: "{{ result_01.rc | default(1) }}"
      data_01: "{{ result_01.stdout | default('') | trim }}"
      status_01: "{{ 'PASS' if result_01.rc | default(1) == 0 else 'FAIL' }}"
      details_01: "{{ 'sshd binary exists and config syntax valid' if result_01.rc | default(1) == 0 else 'Prerequisite check failed' }}"
      playbook_skipped: "{{ true if result_01.rc | default(1) != 0 else false }}"
    tags: [execute]

  - name: "Req 02 - Apply MaxStartups setting in sshd_config"
    ansible.builtin.shell: "grep -q '^MaxStartups' {{ config_file }} && sed -i 's/^MaxStartups.*/MaxStartups 10:30:60/' {{ config_file }} || echo 'MaxStartups 10:30:60' >> {{ config_file }}"
    args:
      executable: /bin/bash
    register: result_02
    failed_when: false
    when: not playbook_skipped | bool
    tags: [execute]

  - name: "Req 02 - Store set result"
    ansible.builtin.set_fact:
      task_02_name: "Apply MaxStartups setting in sshd_config"
      task_02_cmd: "grep -q '^MaxStartups' /etc/ssh/sshd_config && sed -i 's/^MaxStartups.*/MaxStartups 10:30:60/' /etc/ssh/sshd_config || echo 'MaxStartups 10:30:60' >> /etc/ssh/sshd_config"
      task_02_rc: "{{ result_02.rc | default(0) }}"
      data_02: "{{ result_02.stdout | default('') | trim }}"
      status_02: "{{ 'PASS' if result_02 is not failed else 'SKIP' if playbook_skipped | bool else 'FAIL' }}"
      details_02: "{{ 'MaxStartups set to 10:30:60' if result_02 is not failed else 'Skipped - prerequisite not met' if playbook_skipped | bool else 'Failed to set MaxStartups' }}"
    tags: [execute]

  - name: "Req 03 - Remove duplicate MaxStartups entries"
    ansible.builtin.shell: "awk '!seen[$0]++' {{ config_file }} > /tmp/sshd_config && mv /tmp/sshd_config {{ config_file }}"
    args:
      executable: /bin/bash
    register: result_03
    failed_when: false
    when: not playbook_skipped | bool
    tags: [execute]

  - name: "Req 03 - Store dedup result"
    ansible.builtin.set_fact:
      task_03_name: "Remove duplicate MaxStartups entries"
      task_03_cmd: "awk '!seen[$0]++' /etc/ssh/sshd_config > /tmp/sshd_config && mv /tmp/sshd_config /etc/ssh/sshd_config"
      task_03_rc: "{{ result_03.rc | default(0) }}"
      data_03: "{{ result_03.stdout | default('') | trim }}"
      status_03: "{{ 'PASS' if result_03 is not failed else 'SKIP' if playbook_skipped | bool else 'FAIL' }}"
      details_03: "{{ 'Duplicates removed successfully' if result_03 is not failed else 'Skipped - prerequisite not met' if playbook_skipped | bool else 'Failed to remove duplicates' }}"
    tags: [execute]

  - name: "Req 04 - Restart sshd service"
    ansible.builtin.shell: "systemctl restart sshd || service sshd restart"
    args:
      executable: /bin/bash
    register: result_04
    failed_when: false
    when: not playbook_skipped | bool
    tags: [execute]

  - name: "Req 04 - Store restart result"
    ansible.builtin.set_fact:
      task_04_name: "Restart sshd service"
      task_04_cmd: "systemctl restart sshd || service sshd restart"
      task_04_rc: "{{ result_04.rc | default(0) }}"
      data_04: "{{ result_04.stdout | default('') | trim }}"
      status_04: "{{ 'PASS' if result_04.rc | default(1) == 0 else 'SKIP' if playbook_skipped | bool else 'FAIL' }}"
      details_04: "{{ 'sshd service restarted successfully' if result_04.rc | default(1) == 0 else 'Skipped - prerequisite not met' if playbook_skipped | bool else 'Failed to restart sshd' }}"
    tags: [execute]

  - name: "Req 05 - Verify MaxStartups configuration"
    ansible.builtin.shell: "sshd -T 2>/dev/null | grep -i maxstartups || echo 'VERIFY_FAILED'"
    args:
      executable: /bin/bash
    register: result_05
    failed_when: false
    changed_when: false
    when: not playbook_skipped | bool
    tags: [execute]

  - name: "Req 05 - Store verification result"
    ansible.builtin.set_fact:
      task_05_name: "Verify MaxStartups configuration"
      task_05_cmd: "sshd -T | grep -i maxstartups"
      task_05_rc: "{{ result_05.rc | default(1) }}"
      data_05: "{{ result_05.stdout | default('') | trim }}"
      status_05: "{{ 'PASS' if ('maxstartups 10:30:60' in (result_05.stdout | default('') | lower)) else 'SKIP' if playbook_skipped | bool else 'FAIL' }}"
      details_05: "{{ 'Verified: maxstartups 10:30:60' if ('maxstartups 10:30:60' in (result_05.stdout | default('') | lower)) else 'Skipped - prerequisite not met' if playbook_skipped | bool else 'Verification failed' }}"
    tags: [execute]

  - name: "Req 06 - Store final remediation result (cis_result)"
    ansible.builtin.set_fact:
      cis_result: "{{ status_05 | default('ERROR') | trim }}"
    tags: [execute]

  - name: "Req 07 - Generate remediation report"
    ansible.builtin.debug:
      msg:
      - "REMEDIATION REPORT — CIS 5.1.17"
      - "Reference: CIS Benchmark checkpoint 5.1.17"
      - ""
      - "REQUIREMENT 01 - {{ req_01 }}:"
      - "  Task: {{ task_01_name | default('Not recorded') }}"
      - "  Command: {{ task_01_cmd | default('N/A') }}"
      - "  Exit code: {{ task_01_rc | default(-1) }}"
      - "  Data: {{ data_01 | default('') | trim }}"
      - "  Status: {{ status_01 | default('ERROR') | trim }}"
      - "  Details: {{ details_01 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 02 - {{ req_02 }}:"
      - "  Task: {{ task_02_name | default('Not recorded') }}"
      - "  Command: {{ task_02_cmd | default('N/A') }}"
      - "  Exit code: {{ task_02_rc | default(-1) }}"
      - "  Data: {{ data_02 | default('') | trim }}"
      - "  Status: {{ status_02 | default('ERROR') | trim }}"
      - "  Details: {{ details_02 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 03 - {{ req_03 }}:"
      - "  Task: {{ task_03_name | default('Not recorded') }}"
      - "  Command: {{ task_03_cmd | default('N/A') }}"
      - "  Exit code: {{ task_03_rc | default(-1) }}"
      - "  Data: {{ data_03 | default('') | trim }}"
      - "  Status: {{ status_03 | default('ERROR') | trim }}"
      - "  Details: {{ details_03 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 04 - {{ req_04 }}:"
      - "  Task: {{ task_04_name | default('Not recorded') }}"
      - "  Command: {{ task_04_cmd | default('N/A') }}"
      - "  Exit code: {{ task_04_rc | default(-1) }}"
      - "  Data: {{ data_04 | default('') | trim }}"
      - "  Status: {{ status_04 | default('ERROR') | trim }}"
      - "  Details: {{ details_04 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 05 - {{ req_05 }}:"
      - "  Task: {{ task_05_name | default('Not recorded') }}"
      - "  Command: {{ task_05_cmd | default('N/A') }}"
      - "  Exit code: {{ task_05_rc | default(-1) }}"
      - "  Data: {{ data_05 | default('') | trim }}"
      - "  Status: {{ status_05 | default('ERROR') | trim }}"
      - "  Details: {{ details_05 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 06 - {{ req_06 }}:"
      - "  Task: Store final remediation result (cis_result)"
      - "  Command: set_fact"
      - "  Exit code: 0"
      - "  Data: {{ cis_result | default('ERROR') | trim }}"
      - "  Status: {{ cis_result | default('ERROR') | trim }}"
      - "  Details: cis_result set to overall status"
      - ""
      - "========================================================"
      - "OVERALL REMEDIATION:"
      - "  Result: {{ cis_result | default('ERROR') | trim }}"
      - "========================================================"
    tags: [execute]

  always:
  - name: "Restore - Remove backup directory"
    ansible.builtin.file:
      path: "{{ backup_dir }}"
      state: absent
    failed_when: false
    tags: [restore]
