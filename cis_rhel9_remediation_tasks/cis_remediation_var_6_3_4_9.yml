playbook_name: "cis_6_3_4_9"
backup_dir: "/var/log/ai-playbooks-backup/{{ playbook_name }}"
audit_tools:
  - /sbin/auditctl
  - /sbin/aureport
  - /sbin/ausearch
  - /sbin/autrace
  - /sbin/auditd
  - /sbin/augenrules
req_01: "Apply ownership change to audit tools using command: `chown root /sbin/auditctl /sbin/aureport /sbin/ausearch /sbin/autrace /sbin/auditd /sbin/augenrules`. Expected result: The owner of each specified audit tool file is set to root."
req_02: "Verify ownership of audit tools using command: `stat -c '%U %n' /sbin/auditctl /sbin/aureport /sbin/ausearch /sbin/autrace /sbin/auditd /sbin/augenrules`. Expected result: Each file shows 'root' as the owner."
req_03: "Store the final remediation result in a variable named 'cis_result' using set_fact. Set cis_result to the overall remediation status (PASS/FAIL/SKIP/ERROR) derived from the last requirement's status variable."
