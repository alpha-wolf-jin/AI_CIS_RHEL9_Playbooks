---
- name: Initialize meta data variables
  include_vars: cis_remediation_var_6_2_4_1.yml

- name: "Snapshot - Create backup directory"
  ansible.builtin.file:
    path: "{{ backup_dir }}"
    state: directory
    mode: '0700'
  tags: [snapshot]
- name: "Snapshot - Check if /var/log exists"
  ansible.builtin.stat:
    path: "/var/log"
  register: _varlog_stat
  tags: [snapshot]
- name: "Snapshot - Backup /var/log permissions snapshot"
  ansible.builtin.shell: |
    find /var/log -type f -exec stat -Lc '%n^%#a^%U^%u^%G^%g' {} \; 2>/dev/null
  args:
    executable: /bin/bash
  register: _varlog_snapshot
  failed_when: false
  changed_when: false
  tags: [snapshot]
- name: "Snapshot - Save permissions snapshot to file"
  ansible.builtin.copy:
    content: "{{ _varlog_snapshot.stdout | default('') }}"
    dest: "{{ backup_dir }}/varlog_perms.snapshot"
  when: "_varlog_snapshot.stdout | default('') | trim != ''"
  tags: [snapshot]
- name: "Snapshot - Check if remediation script already exists"
  ansible.builtin.stat:
    path: "{{ script_path }}"
  register: _snap_script_stat
  failed_when: false
  tags: [snapshot]
- name: "Snapshot - Record remediation script existence marker"
  ansible.builtin.copy:
    content: "{{ _snap_script_stat.stat.exists | default(false) }}"
    dest: "{{ backup_dir }}/script_existed"
  when: not (_snap_script_stat.stat.exists | default(false))
  tags: [snapshot]

- name: "Initialize data variables"
  set_fact:
    data_01: "Not collected yet"
    status_01: "UNKNOWN"
    details_01: "Not evaluated"
    task_01_name: "Not executed"
    task_01_cmd: "N/A"
    task_01_rc: -1
    data_02: "Not collected yet"
    status_02: "UNKNOWN"
    details_02: "Not evaluated"
    task_02_name: "Not executed"
    task_02_cmd: "N/A"
    task_02_rc: -1

- block:
  - name: "Req 01 - Deploy remediation script to target"
    ansible.builtin.copy:
      content: "{{ remediate_script_content }}"
      dest: "{{ script_path }}"
      mode: '0700'
    failed_when: false
    tags: [execute]

  - name: "Req 01 - Execute remediation script"
    ansible.builtin.shell: "/bin/bash {{ script_path }}"
    args:
      executable: /bin/bash
    register: result_01
    failed_when: false
    tags: [execute]

  - name: "Req 01 - Clean up remediation script"
    ansible.builtin.file:
      path: "{{ script_path }}"
      state: absent
    failed_when: false
    tags: [execute]

  - name: "Debug - Capture permissions of non-compliant files after remediation"
    ansible.builtin.shell: |
      find -L /var/log -type f \( -perm /0137 -o ! -user root -o ! -group root \) -not -path '/var/log/ai-playbooks-backup/*' -print0 2>/dev/null | while IFS= read -r -d $'\0' f; do
        stat -Lc '%n %a %U %G' "$f" 2>/dev/null
      done
    args:
      executable: /bin/bash
    register: _debug_perms
    failed_when: false
    changed_when: false
    tags: [execute]

  - name: "Req 01 - Fix permissions on all non-compliant /var/log files"
    ansible.builtin.shell: |
      find -L /var/log -type f \( -perm /0137 -o ! -user root -o ! -group root \) -not -path '/var/log/ai-playbooks-backup/*' -print0 2>/dev/null | while IFS= read -r -d $'\0' f; do
        chown root:root "$f" 2>/dev/null
        chmod u-x,g-wx,o-rwx "$f" 2>/dev/null
      done
      for f in /var/log/wtmp /var/log/btmp /var/log/lastlog /var/log/wtmp-* /var/log/btmp-* /var/log/lastlog*; do
        [ -e "$f" ] && chown root:root "$f" && chmod ug-x,o-wx "$f" 2>/dev/null
      done
    args:
      executable: /bin/bash
    register: result_01_force
    failed_when: false
    tags: [execute]

  - name: "Store requirement 01 details"
    set_fact:
      task_01_name: "Execute remediation script and force-fix permissions on /var/log files"
      task_01_cmd: "/bin/bash {{ script_path }}; force-fix find/chmod/chown pass"
      task_01_rc: "{{ result_01.rc | default(-1) }}"
      data_01: "{{ result_01.stdout | default('') | trim }}"
      status_01: "{{ 'PASS' if (result_01.rc | default(-1)) == 0 else 'FAIL' }}"
      details_01: "{{ 'Script executed successfully; force-fix applied to all non-compliant files' if (result_01.rc | default(-1)) == 0 else 'Script execution failed with rc=' ~ (result_01.rc | default(-1)) }}"

  - name: "Req 02 - Verify log file permissions and ownership compliance"
    ansible.builtin.shell: |
      issues=0
      while IFS= read -r -d $'\0' l_file; do
        [ -e "$l_file" ] || continue
        issues=$((issues + 1))
        echo "ISSUE: $l_file"
      done < <(find -L /var/log -type f \( -perm /0137 -o ! -user root -o ! -group root \) -not -path '/var/log/ai-playbooks-backup/*' -print0 2>/dev/null)
      if [ "$issues" -eq 0 ]; then
        echo "COMPLIANT: All files in /var/log have appropriate permissions and ownership"
      else
        echo "NONCOMPLIANT: $issues file(s) with incorrect permissions or ownership found"
      fi
    args:
      executable: /bin/bash
    register: result_02
    failed_when: false
    changed_when: false
    tags: [execute]

  - name: "Store requirement 02 details"
    set_fact:
      task_02_name: "Verify log file permissions and ownership compliance"
      task_02_cmd: |
        find -L /var/log -type f \\( -perm /0137 -o ! -user root -o ! -group root \\) -not -path '/var/log/ai-playbooks-backup/*' -print0
      task_02_rc: "{{ result_02.rc | default(-1) }}"
      data_02: "{{ result_02.stdout | default('') | trim }}"
      status_02: "{{ 'PASS' if 'COMPLIANT' in (result_02.stdout | default('')) and 'NONCOMPLIANT' not in (result_02.stdout | default('')) else 'FAIL' }}"
      details_02: "{{ 'System is compliant' if 'COMPLIANT' in (result_02.stdout | default('')) and 'NONCOMPLIANT' not in (result_02.stdout | default('')) else 'System is not compliant - files with incorrect permissions/ownership detected' }}"

  - name: "Store cis_result fact"
    set_fact:
      cis_result: "{{ status_02 }}"
    tags: [execute]

  - name: "Req 03 - Generate remediation report"
    debug:
      msg:
      - "========================================================"
      - "        REMEDIATION REPORT — CIS 6.2.4.1"
      - "        Reference: CIS Benchmark checkpoint 6.2.4.1"
      - "========================================================"
      - ""
      - "REQUIREMENT 01 - {{ req_01 }}:"
      - "  Task: {{ task_01_name | default('Task not recorded') }}"
      - "  Command: {{ task_01_cmd | default('N/A') }}"
      - "  Exit code: {{ task_01_rc | default(-1) }}"
      - "  Data: {{ data_01 | default('Data collection failed') | trim }}"
      - "  Status: {{ status_01 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_01 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 02 - {{ req_02 }}:"
      - "  Task: {{ task_02_name | default('Task not recorded') }}"
      - "  Command: {{ task_02_cmd | default('N/A') }}"
      - "  Exit code: {{ task_02_rc | default(-1) }}"
      - "  Data: {{ data_02 | default('Data collection failed') | trim }}"
      - "  Status: {{ status_02 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_02 | default('Not evaluated') | trim }}"
      - ""
      - "========================================================"
      - "OVERALL REMEDIATION:"
      - "  Result: {{ cis_result | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_02 | default('Not evaluated') | trim }}"
      - "========================================================"
    tags: [execute]

  always:
  - name: "Restore - Check if backup snapshot exists"
    ansible.builtin.stat:
      path: "{{ backup_dir }}/varlog_perms.snapshot"
    register: _restore_snapshot
    failed_when: false
    tags: [restore]

  - name: "Restore - Read remediation script existence marker"
    ansible.builtin.slurp:
      src: "{{ backup_dir }}/script_existed"
    register: _restore_script_existed
    failed_when: false
    tags: [restore]

  - name: "Restore - Remove remediation script if it was created by remediation"
    ansible.builtin.file:
      path: "{{ script_path }}"
      state: absent
    when:
    - _restore_script_existed.content is defined
    - (_restore_script_existed.content | b64decode | trim) == 'False'
    failed_when: false
    tags: [restore]

  - name: "Restore - Remove backup directory"
    ansible.builtin.file:
      path: "{{ backup_dir }}"
      state: absent
    failed_when: false
    tags: [restore]
