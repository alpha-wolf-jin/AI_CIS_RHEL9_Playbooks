---
- name: Initialize meta data variables
  include_vars: cis_remediation_var_2_1_16.yml

- name: "Snapshot - Create backup directory"
  ansible.builtin.file:
    path: "{{ backup_dir }}"
    state: directory
    mode: '0700'
  tags: [snapshot]

- block:
  - name: "Initialize data variables"
    ansible.builtin.set_fact:
      data_01: "Not collected yet"
      status_01: "ERROR"
      details_01: "Not evaluated"
      data_02: "Not collected yet"
      status_02: "ERROR"
      details_02: "Not evaluated"
      data_03: "Not collected yet"
      status_03: "ERROR"
      details_03: "Not evaluated"
      data_04: "Not collected yet"
      status_04: "ERROR"
      details_04: "Not evaluated"
      data_05: "Not collected yet"
      status_05: "ERROR"
      details_05: "Not evaluated"
      data_06: "Not collected yet"
      status_06: "ERROR"
      details_06: "Not evaluated"
      task_01_name: "Not executed"
      task_01_cmd: "N/A"
      task_01_rc: -1
      task_02_name: "Not executed"
      task_02_cmd: "N/A"
      task_02_rc: -1
      task_03_name: "Not executed"
      task_03_cmd: "N/A"
      task_03_rc: -1
      task_04_name: "Not executed"
      task_04_cmd: "N/A"
      task_04_rc: -1
      task_05_name: "Not executed"
      task_05_cmd: "N/A"
      task_05_rc: -1
      task_06_name: "Not executed"
      task_06_cmd: "N/A"
      task_06_rc: -1
    tags: [execute]

  - name: "Gather package facts"
    ansible.builtin.package_facts:
      manager: auto
    failed_when: false
    tags: [execute]

  - name: "Set tftp-server installation fact"
    ansible.builtin.set_fact:
      tftp_installed: "{{ 'tftp-server' in ansible_facts.packages }}"
    tags: [execute]

  - block:
    - name: "Req 01 - Check systemctl and dnf availability"
      ansible.builtin.shell: "which systemctl && which dnf"
      args:
        executable: /bin/bash
      register: result_01
      failed_when: false
      tags: [execute]

    - name: "Store Req 01 details"
      ansible.builtin.set_fact:
        task_01_name: "Check systemctl and dnf availability"
        task_01_cmd: "which systemctl && which dnf"
        task_01_rc: "{{ result_01.rc | default(-1) }}"
        data_01: "{{ result_01.stdout | default('') | trim }}"
        status_01: "{{ ('PASS' if result_01.rc | default(-1) == 0 else 'FAIL') | trim }}"
        details_01: "{{ 'Both commands found' if result_01.rc | default(-1) == 0 else 'One or both commands missing' }}"
      tags: [execute]

    - name: "Req 02 - Stop tftp.socket and tftp.service"
      ansible.builtin.shell: "systemctl stop tftp.socket tftp.service"
      args:
        executable: /bin/bash
      register: result_02
      failed_when: false
      tags: [execute]

    - name: "Store Req 02 details"
      ansible.builtin.set_fact:
        task_02_name: "Stop tftp services"
        task_02_cmd: "systemctl stop tftp.socket tftp.service"
        task_02_rc: "{{ result_02.rc | default(-1) }}"
        data_02: "{{ result_02.stdout | default('') | trim }}{{ result_02.stderr | default('') | trim }}"
        status_02: "{{ ('PASS' if result_02.rc | default(-1) == 0 else 'FAIL') | trim }}"
        details_02: "{{ 'Services stopped' if result_02.rc | default(-1) == 0 else 'Failed to stop services' }}"
      tags: [execute]

    - name: "Req 03 - Remove tftp-server package"
      ansible.builtin.shell: "dnf remove -y tftp-server"
      args:
        executable: /bin/bash
      register: result_03
      failed_when: false
      when: tftp_installed | bool
      tags: [execute]

    - name: "Store Req 03 details"
      ansible.builtin.set_fact:
        task_03_name: "Remove tftp-server"
        task_03_cmd: "dnf remove -y tftp-server"
        task_03_rc: "{{ result_03.rc if result_03 is defined else -1 }}"
        data_03: >-
          {{ (result_03.stdout if result_03 is defined else '') | default('') | trim }}
          {{ (result_03.stderr if result_03 is defined else '') | default('') | trim }}
        status_03: >-
          {% if not tftp_installed %}
            SKIP
          {% elif result_03 is defined and result_03.rc == 0 %}
            PASS
          {% else %}
            FAIL
          {% endif %}
        details_03: >-
          {% if not tftp_installed %}
            tftp-server is not installed
          {% elif result_03 is defined and result_03.rc == 0 %}
            Package removed
          {% else %}
            Removal failed or package is a dependency
          {% endif %}
      tags: [execute]

    - name: "Req 04 - Mask tftp services if package required as dependency"
      ansible.builtin.shell: "systemctl mask tftp.socket tftp.service"
      args:
        executable: /bin/bash
      register: result_04
      failed_when: false
      when:
      - tftp_installed | bool
      - result_03 is not defined or result_03.rc != 0
      tags: [execute]

    - name: "Store Req 04 details"
      ansible.builtin.set_fact:
        task_04_name: "Mask tftp services"
        task_04_cmd: "systemctl mask tftp.socket tftp.service"
        task_04_rc: "{{ result_04.rc if result_04 is defined else -1 }}"
        data_04: >-
          {{ (result_04.stdout if result_04 is defined else '') | default('') | trim }}
          {{ (result_04.stderr if result_04 is defined else '') | default('') | trim }}
        status_04: >-
          {% if not tftp_installed %}
            SKIP
          {% elif result_04 is defined and result_04.rc == 0 %}
            PASS
          {% else %}
            FAIL
          {% endif %}
        details_04: >-
          {% if not tftp_installed %}
            tftp-server not installed, masking not required
          {% elif result_04 is defined and result_04.rc == 0 %}
            Services masked
          {% else %}
            Masking failed
          {% endif %}
      tags: [execute]

    - name: "Req 05 - Verify tftp services state"
      ansible.builtin.shell: |
        printf "socket_active=%s service_active=%s socket_enabled=%s service_enabled=%s" \
          $(systemctl is-active tftp.socket 2>/dev/null || echo "not-found") \
          $(systemctl is-active tftp.service 2>/dev/null || echo "not-found") \
          $(systemctl is-enabled tftp.socket 2>/dev/null || echo "not-found") \
          $(systemctl is-enabled tftp.service 2>/dev/null || echo "not-found")
      args:
        executable: /bin/bash
      register: result_05
      failed_when: false
      tags: [execute]

    - name: "Store Req 05 details"
      ansible.builtin.set_fact:
        task_05_name: "Verify tftp services state"
        task_05_cmd: "systemctl is-active / is-enabled checks"
        task_05_rc: "{{ result_05.rc | default(-1) }}"
        data_05: "{{ result_05.stdout | default('') | trim }}"
        status_05: >-
          {% set out = result_05.stdout | default('') | trim %}
          {% set socket_active = (out | regex_findall('socket_active=([^ ]+)'))[0] | default('') %}
          {% set service_active = (out | regex_findall('service_active=([^ ]+)'))[0] | default('') %}
          {% set socket_enabled = (out | regex_findall('socket_enabled=([^ ]+)'))[0] | default('') %}
          {% set service_enabled = (out | regex_findall('service_enabled=([^ ]+)'))[0] | default('') %}
          {% if socket_active in ['inactive', 'not-found'] and service_active in ['inactive', 'not-found'] and socket_enabled in ['masked', 'disabled', 'not-found'] and service_enabled in ['masked', 'disabled', 'not-found'] %}
            PASS
          {% else %}
            FAIL
          {% endif %}
        details_05: >-
          {% set out = result_05.stdout | default('') | trim %}
          {% set socket_active = (out | regex_findall('socket_active=([^ ]+)'))[0] | default('') %}
          {% set service_active = (out | regex_findall('service_active=([^ ]+)'))[0] | default('') %}
          {% set socket_enabled = (out | regex_findall('socket_enabled=([^ ]+)'))[0] | default('') %}
          {% set service_enabled = (out | regex_findall('service_enabled=([^ ]+)'))[0] | default('') %}
          socket_active={{ socket_active }}, service_active={{ service_active }}, socket_enabled={{ socket_enabled }}, service_enabled={{ service_enabled }}
      tags: [execute]

    - name: "Store final remediation result (cis_result)"
      ansible.builtin.set_fact:
        cis_result: "{{ status_05 | default('ERROR') | trim }}"
        data_06: "{{ cis_result }}"
        status_06: "{{ cis_result }}"
        details_06: "Derived from requirement 05 verification"
        task_06_name: "Store final result"
        task_06_cmd: "set_fact"
        task_06_rc: 0
      tags: [execute]

    when: tftp_installed | bool
    tags: [execute]

  - name: "Set SKIP results when tftp-server is not installed"
    ansible.builtin.set_fact:
      status_01: "SKIP"
      details_01: "tftp-server not installed, remediation skipped"
      data_01: "N/A"
      task_01_name: "Check systemctl and dnf availability"
      task_01_cmd: "which systemctl && which dnf"
      task_01_rc: 0
      status_02: "SKIP"
      details_02: "tftp-server not installed, remediation skipped"
      data_02: "N/A"
      task_02_name: "Stop tftp services"
      task_02_cmd: "systemctl stop tftp.socket tftp.service"
      task_02_rc: 0
      status_03: "SKIP"
      details_03: "tftp-server not installed, remediation skipped"
      data_03: "N/A"
      task_03_name: "Remove tftp-server"
      task_03_cmd: "dnf remove -y tftp-server"
      task_03_rc: 0
      status_04: "SKIP"
      details_04: "tftp-server not installed, masking not required"
      data_04: "N/A"
      task_04_name: "Mask tftp services"
      task_04_cmd: "systemctl mask tftp.socket tftp.service"
      task_04_rc: 0
      status_05: "SKIP"
      details_05: "tftp-server not installed, verification skipped"
      data_05: "N/A"
      task_05_name: "Verify tftp services state"
      task_05_cmd: "systemctl is-active / is-enabled checks"
      task_05_rc: 0
      status_06: "SKIP"
      details_06: "tftp-server not installed, remediation skipped"
      data_06: "SKIP"
      task_06_name: "Store final result"
      task_06_cmd: "set_fact"
      task_06_rc: 0
      cis_result: "SKIP"
    when: not tftp_installed
    tags: [execute]

  - name: "Generate remediation report"
    ansible.builtin.debug:
      msg:
      - "REMEDIATION REPORT — CIS 2.1.16"
      - "Reference: CIS Benchmark checkpoint 2.1.16"
      - ""
      - "REQUIREMENT 01 - {{ req_01 }}:"
      - "  Task: {{ task_01_name | default('Not recorded') }}"
      - "  Command: {{ task_01_cmd | default('N/A') }}"
      - "  Exit code: {{ task_01_rc | default(-1) }}"
      - "  Data: {{ data_01 | default('') | trim }}"
      - "  Status: {{ status_01 | default('ERROR') | trim }}"
      - "  Details: {{ details_01 | default('') | trim }}"
      - ""
      - "REQUIREMENT 02 - {{ req_02 }}:"
      - "  Task: {{ task_02_name | default('Not recorded') }}"
      - "  Command: {{ task_02_cmd | default('N/A') }}"
      - "  Exit code: {{ task_02_rc | default(-1) }}"
      - "  Data: {{ data_02 | default('') | trim }}"
      - "  Status: {{ status_02 | default('ERROR') | trim }}"
      - "  Details: {{ details_02 | default('') | trim }}"
      - ""
      - "REQUIREMENT 03 - {{ req_03 }}:"
      - "  Task: {{ task_03_name | default('Not recorded') }}"
      - "  Command: {{ task_03_cmd | default('N/A') }}"
      - "  Exit code: {{ task_03_rc | default(-1) }}"
      - "  Data: {{ data_03 | default('') | trim }}"
      - "  Status: {{ status_03 | default('ERROR') | trim }}"
      - "  Details: {{ details_03 | default('') | trim }}"
      - ""
      - "REQUIREMENT 04 - {{ req_04 }}:"
      - "  Task: {{ task_04_name | default('Not recorded') }}"
      - "  Command: {{ task_04_cmd | default('N/A') }}"
      - "  Exit code: {{ task_04_rc | default(-1) }}"
      - "  Data: {{ data_04 | default('') | trim }}"
      - "  Status: {{ status_04 | default('ERROR') | trim }}"
      - "  Details: {{ details_04 | default('') | trim }}"
      - ""
      - "REQUIREMENT 05 - {{ req_05 }}:"
      - "  Task: {{ task_05_name | default('Not recorded') }}"
      - "  Command: {{ task_05_cmd | default('N/A') }}"
      - "  Exit code: {{ task_05_rc | default(-1) }}"
      - "  Data: {{ data_05 | default('') | trim }}"
      - "  Status: {{ status_05 | default('ERROR') | trim }}"
      - "  Details: {{ details_05 | default('') | trim }}"
      - ""
      - "REQUIREMENT 06 - {{ req_06 }}:"
      - "  Task: {{ task_06_name | default('Not recorded') }}"
      - "  Command: {{ task_06_cmd | default('N/A') }}"
      - "  Exit code: {{ task_06_rc | default(-1) }}"
      - "  Data: {{ data_06 | default('') | trim }}"
      - "  Status: {{ status_06 | default('ERROR') | trim }}"
      - "  Details: {{ details_06 | default('') | trim }}"
      - ""
      - "========================================================"
      - "OVERALL REMEDIATION:"
      - "  Result: {{ cis_result | default('ERROR') | trim }}"
      - "========================================================"
    tags: [execute]

  always:
  - name: "Restore - Check if backup directory exists"
    ansible.builtin.stat:
      path: "{{ backup_dir }}"
    register: backup_dir_stat
    failed_when: false
    tags: [restore]

  - name: "Restore - Remove backup directory"
    ansible.builtin.file:
      path: "{{ backup_dir }}"
      state: absent
    when: backup_dir_stat.stat.exists | default(false)
    failed_when: false
    tags: [restore]
