---
- name: Initialize meta data variables
  include_vars: cis_remediation_var_1_8_5.yml

- name: "Snapshot - Create backup directory"
  ansible.builtin.file:
    path: "{{ backup_dir }}"
    state: directory
    mode: '0700'
  tags: [snapshot]

- block:
  - name: "Initialize data variables"
    set_fact:
      data_02: "Not collected yet"
      status_02: "ERROR"
      details_02: "Not evaluated"
      data_03: "Not collected yet"
      status_03: "ERROR"
      details_03: "Not evaluated"
      task_02_name: "Not executed"
      task_02_cmd: "N/A"
      task_02_rc: -1
      task_03_name: "Not executed"
      task_03_cmd: "N/A"
      task_03_rc: -1
    tags: [execute]

  - name: "Gather package facts"
    ansible.builtin.package_facts:
      manager: auto
    failed_when: false
    tags: [execute]

  - name: "Set GDM installation status"
    set_fact:
      gdm_installed: "{{ 'gdm' in ansible_facts.packages or 'gdm3' in ansible_facts.packages }}"
    tags: [execute]

  - name: "Copy remediation script to remote"
    ansible.builtin.copy:
      dest: "{{ remediate_script }}"
      mode: '0700'
      content: "{{ remediate_script_content }}"
    changed_when: false
    when: gdm_installed | bool
    tags: [execute]

  - name: "Req 1 - Run remediation script to lock GDM screen lock settings"
    ansible.builtin.shell: /bin/bash "{{ remediate_script }}"
    args:
      executable: /bin/bash
    register: remediate_result
    failed_when: false
    changed_when: false
    when: gdm_installed | bool
    tags: [execute]

  - name: "Update dconf system databases"
    ansible.builtin.shell: dconf update
    args:
      executable: /bin/bash
    register: dconf_update_result
    failed_when: false
    changed_when: false
    when: gdm_installed | bool
    tags: [execute]

  - name: "Req 2 - Verify idle-delay setting is locked in dconf profile"
    ansible.builtin.shell: |
      grep -Pril '/org/gnome/desktop/session/idle-delay' /etc/dconf/db/*/locks/ 2>/dev/null > /dev/null && echo "LOCKED" || echo "NOT_LOCKED"
    args:
      executable: /bin/bash
    register: verify_idle_delay
    failed_when: false
    changed_when: false
    when: gdm_installed | bool
    tags: [execute]

  - name: "Req 2 - Verify lock-delay setting is locked in dconf profile"
    ansible.builtin.shell: |
      grep -Pril '/org/gnome/desktop/screensaver/lock-delay' /etc/dconf/db/*/locks/ 2>/dev/null > /dev/null && echo "LOCKED" || echo "NOT_LOCKED"
    args:
      executable: /bin/bash
    register: verify_lock_delay
    failed_when: false
    changed_when: false
    when: gdm_installed | bool
    tags: [execute]

  - name: "Store requirement 02 details"
    set_fact:
      task_02_name: "Verify GDM screen lock settings are locked"
      task_02_cmd: "grep -Pril for idle-delay and lock-delay in /etc/dconf/db/*/locks/"
      task_02_rc: 0
      data_02: "{{ ('idle-delay: ' + verify_idle_delay.stdout | default('NOT_LOCKED') | trim + ', lock-delay: ' + verify_lock_delay.stdout | default('NOT_LOCKED') | trim) if gdm_installed | bool else 'GDM not installed - SKIP' }}"
      status_02: "{{ 'SKIP' if not (gdm_installed | bool) else ('PASS' if (verify_idle_delay.stdout | default('NOT_LOCKED') | trim == 'LOCKED' and verify_lock_delay.stdout | default('NOT_LOCKED') | trim == 'LOCKED') else 'FAIL') }}"
      details_02: "{{ 'GDM not installed - recommendation not applicable' if not (gdm_installed | bool) else ('Both idle-delay and lock-delay are locked' if (verify_idle_delay.stdout | default('NOT_LOCKED') | trim == 'LOCKED' and verify_lock_delay.stdout | default('NOT_LOCKED') | trim == 'LOCKED') else 'One or both lock settings are missing') }}"
    tags: [execute]

  - name: "Req 3 - Store final remediation result in cis_result"
    set_fact:
      cis_result: "{{ status_02 | default('ERROR') | trim }}"
      task_03_name: "Store final remediation result"
      task_03_cmd: "set_fact cis_result = status_02"
      task_03_rc: 0
      data_03: "{{ status_02 | default('ERROR') | trim }}"
      status_03: "PASS"
      details_03: "cis_result stored as {{ status_02 | default('ERROR') | trim }}"
    tags: [execute]

  - name: "Generate remediation report"
    debug:
      msg:
      - "REMEDIATION REPORT — CIS 1.8.5"
      - "Reference: CIS Benchmark checkpoint 1.8.5"
      - ""
      - "REQUIREMENT 02 - {{ req_02 }}:"
      - "  Task: {{ task_02_name | default('Not recorded') }}"
      - "  Command: {{ task_02_cmd | default('N/A') }}"
      - "  Exit code: {{ task_02_rc | default(-1) }}"
      - "  Data: {{ data_02 | default('') | trim }}"
      - "  Status: {{ status_02 | default('ERROR') | trim }}"
      - "  Details: {{ details_02 | default('') | trim }}"
      - ""
      - "REQUIREMENT 03 - {{ req_03 }}:"
      - "  Task: {{ task_03_name | default('Not recorded') }}"
      - "  Command: {{ task_03_cmd | default('N/A') }}"
      - "  Exit code: {{ task_03_rc | default(-1) }}"
      - "  Data: {{ data_03 | default('') | trim }}"
      - "  Status: {{ status_03 | default('ERROR') | trim }}"
      - "  Details: {{ details_03 | default('') | trim }}"
      - ""
      - "========================================================"
      - "OVERALL REMEDIATION:"
      - "  Result: {{ cis_result | default('ERROR') | trim }}"
      - "  Details: {{ details_02 | default('Not evaluated') | trim }}"
      - "========================================================"
    tags: [execute]

  always:
  - name: "Restore - Remove temporary remediation script"
    ansible.builtin.file:
      path: "{{ remediate_script }}"
      state: absent
    failed_when: false
    changed_when: false
    tags: [restore]

  - name: "Restore - Remove backup directory"
    ansible.builtin.file:
      path: "{{ backup_dir }}"
      state: absent
    failed_when: false
    tags: [restore]
