playbook_name: "Remediate CIS checkpoint 1.7.4: Ensure access to /etc/motd is configured"
backup_dir: "/var/log/ai-playbooks-backup/{{ playbook_name | regex_replace('[: ]', '_') }}"
req_01: "Apply ownership to /etc/motd using command: `chown root:root $(readlink -e /etc/motd)`. Expected result: /etc/motd is owned by root:root."
req_02: "Apply permissions to /etc/motd using command: `chmod u-x,go-wx $(readlink -e /etc/motd)`. Expected result: /etc/motd has permissions u-x,go-wx."
req_03: "Apply removal of /etc/motd using command: `rm /etc/motd`. Expected result: /etc/motd is removed."
req_04: "Verify /etc/motd configuration using command: `stat /etc/motd 2>/dev/null || echo '/etc/motd does not exist'`. Expected result: Either /etc/motd has correct ownership and permissions, or the file does not exist."
req_05: "Store the final remediation result in a variable named 'cis_result' using set_fact. Set cis_result to the overall remediation status (PASS/FAIL/SKIP/ERROR) derived from the last requirement's status variable."
motd_path: "/etc/motd"
remove_motd: false   # Set to true to remove /etc/motd instead of setting permissions
