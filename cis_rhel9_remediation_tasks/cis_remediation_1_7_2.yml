---
- name: Initialize meta data variables
  include_vars: cis_remediation_var_1_7_2.yml

- name: "Snapshot - Create backup directory"
  ansible.builtin.file:
    path: "{{ backup_dir }}"
    state: directory
    mode: '0700'
  tags: [snapshot]
- name: "Snapshot - Check if /etc/issue exists"
  ansible.builtin.stat:
    path: /etc/issue
  register: _issue_backup_stat
  tags: [snapshot]
- name: "Snapshot - Backup /etc/issue if exists"
  ansible.builtin.copy:
    src: /etc/issue
    dest: "{{ backup_dir }}/issue.present"
    remote_src: true
  when: "_issue_backup_stat.stat.exists"
  tags: [snapshot]

- block:
  - name: "Initialize tracking variables"
    set_fact:
      task_01_name: "Not executed"
      task_01_cmd: "N/A"
      task_01_rc: -1
      data_01: "Not collected yet"
      status_01: "UNKNOWN"
      details_01: "Not evaluated"
      task_02_name: "Not executed"
      task_02_cmd: "N/A"
      task_02_rc: -1
      data_02: "Not collected yet"
      status_02: "UNKNOWN"
      details_02: "Not evaluated"
      task_03_name: "Not executed"
      task_03_cmd: "N/A"
      task_03_rc: -1
      data_03: "Not collected yet"
      status_03: "UNKNOWN"
      details_03: "Not evaluated"
    tags: [execute]

  - name: "Check if /etc/issue exists"
    ansible.builtin.stat:
      path: /etc/issue
    register: issue_exists
    tags: [execute]

  - name: "Set remediation applicability"
    set_fact:
      remediation_applicable: "{{ issue_exists.stat.exists }}"
    tags: [execute]

  - name: "Read current /etc/issue content"
    ansible.builtin.shell: cat /etc/issue
    args:
      executable: /bin/bash
    register: current_banner
    changed_when: false
    failed_when: false
    when: "remediation_applicable"
    tags: [execute]

  - name: "Req 1 - Write site policy warning banner"
    shell: echo "{{ expected_banner | trim }}" > /etc/issue
    args:
      executable: /bin/bash
    register: banner_result
    failed_when: false
    when:
    - "remediation_applicable"
    - "current_banner.stdout | default('') | trim != expected_banner | trim"
    tags: [execute]

  - name: "Check if escape sequences exist in /etc/issue"
    ansible.builtin.shell: |
      grep -qE '\\[mrsv]|[Ll]inux|[Uu]buntu|[Dd]ebian|[Rr]ed [Hh]at|[Cc]ent[Oo][Ss]' /etc/issue
    args:
      executable: /bin/bash
    register: _escapes_present
    failed_when: false
    changed_when: false
    when: "remediation_applicable"
    tags: [execute]

  - name: "Req 2 - Remove escape sequences and OS references"
    shell: |
      {% raw %}sed -i 's/\\m//g; s/\\r//g; s/\\s//g; s/\\v//g; s/[Ll]inux//g; s/[Uu]buntu//g; s/[Dd]ebian//g; s/[Rr]ed [Hh]at//g; s/[Cc]ent[Oo][Ss]//g' /etc/issue{% endraw %}
    args:
      executable: /bin/bash
    register: cleanup_result
    failed_when: false
    when:
    - "remediation_applicable"
    - "_escapes_present.rc == 0"
    tags: [execute]

  - name: "Req 3 - Verify /etc/issue content"
    shell: cat /etc/issue
    args:
      executable: /bin/bash
    register: verify_result
    failed_when: false
    changed_when: false
    when: "remediation_applicable"
    tags: [execute]

  - name: "Store detailed results"
    set_fact:
      task_01_name: "Write site policy warning banner"
      task_01_cmd: "echo '{{ expected_banner | trim }}' > /etc/issue"
      task_01_rc: "{{ banner_result.rc | default(-1) }}"
      data_01: "{{ banner_result.stdout | default('') | trim }}"
      status_01: >-
        {% if not remediation_applicable %}
          SKIPPED
        {% elif (current_banner.stdout | default('') | trim == expected_banner | trim) or (banner_result.rc | default(-1) == 0) %}
          APPLIED
        {% else %}
          FAILED
        {% endif %}
      details_01: >-
        {% if not remediation_applicable %}
          /etc/issue does not exist on this system
        {% elif current_banner.stdout is defined and (current_banner.stdout | trim) == (expected_banner | trim) %}
          Banner already correct, no change needed
        {% elif banner_result.rc | default(-1) == 0 %}
          File written successfully
        {% else %}
          Failed to write banner
        {% endif %}

      task_02_name: "Remove escape sequences and OS references"
      task_02_cmd: |
        sed -i 's/\\\\m//g; s/\\\\r//g; s/\\\\s//g; s/\\\\v//g; s/[Ll]inux//g; s/[Uu]buntu//g; s/[Dd]ebian//g; s/[Rr]ed [Hh]at//g; s/[Cc]ent[Oo][Ss]//g' /etc/issue
      task_02_rc: "{{ cleanup_result.rc | default(-1) }}"
      data_02: "{{ cleanup_result.stdout | default('') | trim }}"
      status_02: >-
        {% if not remediation_applicable %}SKIPPED
        {% elif cleanup_result is skipped %}APPLIED
        {% elif cleanup_result.rc | default(-1) == 0 %}APPLIED
        {% else %}FAILED
        {% endif %}
      details_02: >-
        {% if not remediation_applicable %}Skipped: /etc/issue not present
        {% elif cleanup_result is skipped %}No escape sequences found, already compliant
        {% elif cleanup_result.rc | default(-1) == 0 %}Escape sequences removed successfully
        {% else %}Failed to run sed command
        {% endif %}

      task_03_name: "Verify /etc/issue content"
      task_03_cmd: "cat /etc/issue"
      task_03_rc: "{{ verify_result.rc | default(-1) }}"
      data_03: "{{ verify_result.stdout | default('') | trim }}"
      status_03: >-
        {{ 'APPLIED' if remediation_applicable and
           (verify_result.stdout | default('') | trim == expected_banner | trim)
           else ('SKIPPED' if not remediation_applicable else 'FAILED') }}
      details_03: >-
        {{ 'Content matches expected banner' if
           (verify_result.stdout | default('') | trim == expected_banner | trim)
           else ('/etc/issue not found, verification skipped' if not remediation_applicable
           else 'Content does not match expected banner') }}
    tags: [execute]

  - name: "Generate remediation report"
    debug:
      msg:
      - "========================================================"
      - "        REMEDIATION REPORT — CIS 1.7.2"
      - "        Reference: CIS Benchmark checkpoint 1.7.2"
      - "========================================================"
      - ""
      - "REQUIREMENT 01 - {{ req_01 }}:"
      - "  Task: {{ task_01_name }}"
      - "  Command: {{ task_01_cmd }}"
      - "  Exit code: {{ task_01_rc }}"
      - "  Data: {{ data_01 }}"
      - "  Status: {{ status_01 }}"
      - "  Details: {{ details_01 }}"
      - ""
      - "REQUIREMENT 02 - {{ req_02 }}:"
      - "  Task: {{ task_02_name }}"
      - "  Command: {{ task_02_cmd }}"
      - "  Exit code: {{ task_02_rc }}"
      - "  Data: {{ data_02 }}"
      - "  Status: {{ status_02 }}"
      - "  Details: {{ details_02 }}"
      - ""
      - "REQUIREMENT 03 - {{ req_03 }}:"
      - "  Task: {{ task_03_name }}"
      - "  Command: {{ task_03_cmd }}"
      - "  Exit code: {{ task_03_rc }}"
      - "  Data: {{ data_03 }}"
      - "  Status: {{ status_03 }}"
      - "  Details: {{ details_03 }}"
      - ""
      - "========================================================"
      - "OVERALL REMEDIATION:"
      - "  Result: {{ status_03 }}"
      - "  Details: {{ details_03 }}"
      - "========================================================"
    tags: [execute]

  always:
  - name: "Restore - Check if backup directory exists"
    stat:
      path: "{{ backup_dir }}"
    register: _restore_dir
    failed_when: false
    tags: [restore]

  - name: "Restore - Check if /etc/issue backup exists"
    stat:
      path: "{{ backup_dir }}/issue.present"
    register: _restore_backup
    failed_when: false
    tags: [restore]

  - name: "Restore - Revert /etc/issue to original state"
    copy:
      src: "{{ backup_dir }}/issue.present"
      dest: /etc/issue
      remote_src: true
    when: "_restore_backup.stat.exists | default(false)"
    failed_when: false
    tags: [restore]

  - name: "Restore - Remove backup directory"
    file:
      path: "{{ backup_dir }}"
      state: absent
    when: "_restore_dir.stat.exists | default(false)"
    failed_when: false
    tags: [restore]
