---
- name: Initialize meta data variables
  include_vars: cis_remediation_var_1_7_2.yml

- name: "Snapshot - Create backup directory"
  ansible.builtin.file:
    path: "{{ backup_dir }}"
    state: directory
    mode: '0755'
  tags: [snapshot]
- name: "Snapshot - Check if /etc/issue exists"
  ansible.builtin.stat:
    path: /etc/issue
  register: _snap_issue_stat
  tags: [snapshot]
- name: "Snapshot - Backup /etc/issue if present"
  ansible.builtin.copy:
    src: /etc/issue
    dest: "{{ backup_dir }}/issue.present"
    remote_src: true
  when: _snap_issue_stat.stat.exists | default(false)
  tags: [snapshot]
- name: "Snapshot - Mark /etc/issue as absent if not present"
  ansible.builtin.copy:
    content: "absent"
    dest: "{{ backup_dir }}/issue.absent"
  when: not (_snap_issue_stat.stat.exists | default(false))
  tags: [snapshot]

- block:
  - name: "Initialize data variables"
    ansible.builtin.set_fact:
      data_01: "Not collected yet"
      status_01: "ERROR"
      details_01: "Not evaluated"
      data_02: "Not collected yet"
      status_02: "ERROR"
      details_02: "Not evaluated"
      data_03: "Not collected yet"
      status_03: "ERROR"
      details_03: "Not evaluated"
      task_01_name: "Not executed"
      task_01_cmd: "N/A"
      task_01_rc: -1
      task_02_name: "Not executed"
      task_02_cmd: "N/A"
      task_02_rc: -1
      task_03_name: "Not executed"
      task_03_cmd: "N/A"
      task_03_rc: -1
    tags: [execute]

  - name: "Req 01 - Write site policy warning banner to /etc/issue"
    ansible.builtin.shell: 'echo "{{ expected_banner }}" > /etc/issue'
    args:
      executable: /bin/bash
    register: result_01
    failed_when: false
    tags: [execute]

  - name: "Store requirement 01 details"
    ansible.builtin.set_fact:
      task_01_name: "Write site policy warning banner to /etc/issue"
      task_01_cmd: 'echo "{{ expected_banner }}" > /etc/issue'
      task_01_rc: "{{ result_01.rc | default(-1) }}"
      data_01: "{{ result_01.stdout | default('') | trim }}"
      status_01: "{{ ('PASS' if result_01.rc | default(-1) == 0 else 'FAIL') | trim }}"
      details_01: "{{ ('Banner written successfully' if result_01.rc | default(-1) == 0 else 'Failed to write banner') | trim }}"
    tags: [execute]

  - name: "Req 02 - Remove OS escape sequences and platform references from /etc/issue"
    ansible.builtin.shell: |
      sed -i 's/\\m//g; s/\\r//g; s/\\s//g; s/\\v//g; s/[Ll]inux//g; s/[Uu]buntu//g; s/[Dd]ebian//g; s/[Rr]ed [Hh]at//g; s/[Cc]ent[Oo][Ss]//g' /etc/issue
    args:
      executable: /bin/bash
    register: result_02
    failed_when: false
    tags: [execute]

  - name: "Store requirement 02 details"
    ansible.builtin.set_fact:
      task_02_name: "Remove OS escape sequences and platform references from /etc/issue"
      task_02_cmd: |
        sed -i 's/\\\\m//g; s/\\\\r//g; s/\\\\s//g; s/\\\\v//g; s/[Ll]inux//g; s/[Uu]buntu//g; s/[Dd]ebian//g; s/[Rr]ed [Hh]at//g; s/[Cc]ent[Oo][Ss]//g' /etc/issue
      task_02_rc: "{{ result_02.rc | default(-1) }}"
      data_02: "{{ result_02.stdout | default('') | trim }}"
      status_02: "{{ ('PASS' if result_02.rc | default(-1) == 0 else 'FAIL') | trim }}"
      details_02: "{{ ('Escape sequences removed successfully' if result_02.rc | default(-1) == 0 else 'Failed to remove escape sequences') | trim }}"
    tags: [execute]

  - name: "Req 03 - Verify /etc/issue contains only the approved banner"
    ansible.builtin.shell: cat /etc/issue
    args:
      executable: /bin/bash
    register: result_03
    failed_when: false
    changed_when: false
    tags: [execute]

  - name: "Store requirement 03 details"
    ansible.builtin.set_fact:
      task_03_name: "Verify /etc/issue contains only the approved banner"
      task_03_cmd: "cat /etc/issue"
      task_03_rc: "{{ result_03.rc | default(-1) }}"
      data_03: "{{ result_03.stdout | default('') | trim }}"
      status_03: "{{ ('PASS' if (result_03.stdout | default('') | trim) == expected_banner else 'FAIL') | trim }}"
      details_03: "{{ ('File content matches expected banner' if (result_03.stdout | default('') | trim) == expected_banner else 'File content does not match expected banner') | trim }}"
    tags: [execute]

  - name: "Req 04 - Store final remediation result in cis_result"
    ansible.builtin.set_fact:
      cis_result: "{{ status_03 | default('ERROR') | trim }}"
    tags: [execute]

  - name: "Generate remediation report"
    ansible.builtin.debug:
      msg:
      - "REMEDIATION REPORT — CIS 1.7.2"
      - "Reference: CIS Benchmark checkpoint 1.7.2"
      - ""
      - "REQUIREMENT 01 - {{ req_01 }}:"
      - "  Task: {{ task_01_name | default('Not recorded') }}"
      - "  Command: {{ task_01_cmd | default('N/A') }}"
      - "  Exit code: {{ task_01_rc | default(-1) }}"
      - "  Data: {{ data_01 | default('') | trim }}"
      - "  Status: {{ status_01 | default('ERROR') | trim }}"
      - "  Details: {{ details_01 | default('') | trim }}"
      - ""
      - "REQUIREMENT 02 - {{ req_02 }}:"
      - "  Task: {{ task_02_name | default('Not recorded') }}"
      - "  Command: {{ task_02_cmd | default('N/A') }}"
      - "  Exit code: {{ task_02_rc | default(-1) }}"
      - "  Data: {{ data_02 | default('') | trim }}"
      - "  Status: {{ status_02 | default('ERROR') | trim }}"
      - "  Details: {{ details_02 | default('') | trim }}"
      - ""
      - "REQUIREMENT 03 - {{ req_03 }}:"
      - "  Task: {{ task_03_name | default('Not recorded') }}"
      - "  Command: {{ task_03_cmd | default('N/A') }}"
      - "  Exit code: {{ task_03_rc | default(-1) }}"
      - "  Data: {{ data_03 | default('') | trim }}"
      - "  Status: {{ status_03 | default('ERROR') | trim }}"
      - "  Details: {{ details_03 | default('') | trim }}"
      - ""
      - "========================================================"
      - "OVERALL REMEDIATION:"
      - "  Result: {{ cis_result | default('ERROR') | trim }}"
      - "  Details: {{ details_03 | default('Not evaluated') | trim }}"
      - "========================================================"
    tags: [execute]

  always:
  - name: "Restore - Check if /etc/issue backup exists"
    ansible.builtin.stat:
      path: "{{ backup_dir }}/issue.present"
    register: _restore_present
    failed_when: false
    tags: [restore]

  - name: "Restore - Restore /etc/issue from backup"
    ansible.builtin.copy:
      src: "{{ backup_dir }}/issue.present"
      dest: /etc/issue
      remote_src: true
    when: _restore_present.stat.exists | default(false)
    failed_when: false
    tags: [restore]

  - name: "Restore - Check if /etc/issue absent marker exists"
    ansible.builtin.stat:
      path: "{{ backup_dir }}/issue.absent"
    register: _restore_absent
    failed_when: false
    tags: [restore]

  - name: "Restore - Delete /etc/issue if it was absent before"
    ansible.builtin.file:
      path: /etc/issue
      state: absent
    when: _restore_absent.stat.exists | default(false)
    failed_when: false
    tags: [restore]

  - name: "Restore - Remove backup directory"
    ansible.builtin.file:
      path: "{{ backup_dir }}"
      state: absent
    failed_when: false
    tags: [restore]
