---
- name: Initialize meta data variables
  include_vars: cis_remediation_var_1_3_1_3.yml

- name: "Snapshot - Create backup directory"
  ansible.builtin.file:
    path: "{{ backup_dir }}"
    state: directory
    mode: '0700'
  tags: [snapshot]
- name: "Snapshot - Check if config file exists"
  ansible.builtin.stat:
    path: "{{ config_file }}"
  register: _sg_config_stat
  tags: [snapshot]
- name: "Snapshot - Backup config file if exists"
  ansible.builtin.copy:
    src: "{{ config_file }}"
    dest: "{{ backup_dir }}/selinux_config.present"
    remote_src: true
  when: _sg_config_stat.stat.exists
  tags: [snapshot]
- name: "Snapshot - Mark config file as absent"
  ansible.builtin.copy:
    content: "absent"
    dest: "{{ backup_dir }}/selinux_config.absent"
  when: not _sg_config_stat.stat.exists
  tags: [snapshot]

- block:
  - name: "Initialize data variables"
    set_fact:
      data_01: "Not collected yet"
      status_01: "ERROR"
      details_01: "Not evaluated"
      data_02: "Not collected yet"
      status_02: "ERROR"
      details_02: "Not evaluated"
      data_03: "Not collected yet"
      status_03: "ERROR"
      details_03: "Not evaluated"
      data_04: "Not collected yet"
      status_04: "ERROR"
      details_04: "Not evaluated"
      task_01_name: "Not executed"
      task_01_cmd: "N/A"
      task_01_rc: -1
      task_02_name: "Not executed"
      task_02_cmd: "N/A"
      task_02_rc: -1
      task_03_name: "Not executed"
      task_03_cmd: "N/A"
      task_03_rc: -1
      task_04_name: "Not executed"
      task_04_cmd: "N/A"
      task_04_rc: -1

  - name: "Req 01 - Check if prerequisite commands sed and grep exist"
    ansible.builtin.shell: "which sed && which grep"
    args:
      executable: /bin/bash
    register: result_01
    failed_when: false
    changed_when: false
    tags: [execute]

  - name: "Store requirement 01 details"
    set_fact:
      task_01_name: "Check if prerequisite commands sed and grep exist"
      task_01_cmd: "which sed && which grep"
      task_01_rc: "{{ result_01.rc | default(-1) }}"
      data_01: "{{ result_01.stdout | default('') | trim }}"
      status_01: "{{ ('PASS' if result_01.rc | default(-1) == 0 else 'FAIL') | trim }}"
      details_01: "{{ ('Prerequisite commands found.' if result_01.rc | default(-1) == 0 else 'Prerequisite commands not found.') | trim }}"

  - name: "Req 02 - Apply SELinux policy configuration to targeted"
    ansible.builtin.lineinfile:
      path: "{{ config_file }}"
      regexp: '^SELINUXTYPE='
      line: 'SELINUXTYPE=targeted'
    register: result_02
    failed_when: false
    when: "status_01 | default('ERROR') | trim == 'PASS'"
    tags: [execute]

  - name: "Store requirement 02 details"
    set_fact:
      task_02_name: "Apply SELinux policy configuration to targeted"
      task_02_cmd: "lineinfile: regexp='^SELINUXTYPE=' line='SELINUXTYPE=targeted' path={{ config_file }}"
      task_02_rc: "{{ 0 if (result_02 is not skipped | default(false)) else -1 }}"
      data_02: "{{ 'SELINUXTYPE=targeted' if (result_02 is not skipped | default(false)) else '' }}"
      status_02: "{{ ('PASS' if (result_02 is not skipped | default(false)) else 'SKIP') | trim }}"
      details_02: "{{ ('SELINUXTYPE set to targeted.' if (result_02 is not skipped | default(false)) else 'Skipped because prerequisite check failed.') | trim }}"

  - name: "Req 03 - Verify SELinux policy is set to targeted"
    ansible.builtin.shell: "grep '^SELINUXTYPE=targeted' {{ config_file }}"
    args:
      executable: /bin/bash
    register: result_03
    failed_when: false
    changed_when: false
    when: "status_02 | default('ERROR') | trim == 'PASS'"
    tags: [execute]

  - name: "Store requirement 03 details"
    set_fact:
      task_03_name: "Verify SELinux policy is set to targeted"
      task_03_cmd: "grep '^SELINUXTYPE=targeted' {{ config_file }}"
      task_03_rc: "{{ result_03.rc | default(-1) }}"
      data_03: "{{ result_03.stdout | default('') | trim }}"
      status_03: "{{ ('PASS' if (result_03.rc | default(-1)) == 0 else ('SKIP' if (result_03.skipped | default(false)) else 'FAIL')) | trim }}"
      details_03: "{{ ('Configuration verified.' if (result_03.rc | default(-1)) == 0 else ('Verification skipped because configuration was not applied.' if (result_03.skipped | default(false)) else 'Verification failed.')) | trim }}"

  - name: "Req 04 - Store final remediation result in cis_result"
    set_fact:
      cis_result: "{{ status_03 | default('ERROR') | trim }}"
      task_04_name: "Store final remediation result"
      task_04_cmd: "N/A"
      task_04_rc: 0
      data_04: "{{ status_03 | default('ERROR') | trim }}"
      status_04: "{{ status_03 | default('ERROR') | trim }}"
      details_04: "{{ ('Overall remediation completed successfully.' if (status_03 | default('ERROR') | trim) == 'PASS' else ('Remediation skipped.' if (status_03 | default('ERROR') | trim) == 'SKIP' else 'Remediation failed.')) | trim }}"

  - name: "Generate remediation report"
    debug:
      msg:
      - "REMEDIATION REPORT — CIS 1.3.1.3"
      - "Reference: CIS Benchmark checkpoint 1.3.1.3"
      - ""
      - "REQUIREMENT 01 - {{ req_01 }}:"
      - "  Task: {{ task_01_name | default('Not recorded') }}"
      - "  Command: {{ task_01_cmd | default('N/A') }}"
      - "  Exit code: {{ task_01_rc | default(-1) }}"
      - "  Data: {{ data_01 | default('') | trim }}"
      - "  Status: {{ status_01 | default('ERROR') | trim }}"
      - "  Details: {{ details_01 | default('') | trim }}"
      - ""
      - "REQUIREMENT 02 - {{ req_02 }}:"
      - "  Task: {{ task_02_name | default('Not recorded') }}"
      - "  Command: {{ task_02_cmd | default('N/A') }}"
      - "  Exit code: {{ task_02_rc | default(-1) }}"
      - "  Data: {{ data_02 | default('') | trim }}"
      - "  Status: {{ status_02 | default('ERROR') | trim }}"
      - "  Details: {{ details_02 | default('') | trim }}"
      - ""
      - "REQUIREMENT 03 - {{ req_03 }}:"
      - "  Task: {{ task_03_name | default('Not recorded') }}"
      - "  Command: {{ task_03_cmd | default('N/A') }}"
      - "  Exit code: {{ task_03_rc | default(-1) }}"
      - "  Data: {{ data_03 | default('') | trim }}"
      - "  Status: {{ status_03 | default('ERROR') | trim }}"
      - "  Details: {{ details_03 | default('') | trim }}"
      - ""
      - "REQUIREMENT 04 - {{ req_04 }}:"
      - "  Task: {{ task_04_name | default('Not recorded') }}"
      - "  Command: {{ task_04_cmd | default('N/A') }}"
      - "  Exit code: {{ task_04_rc | default(-1) }}"
      - "  Data: {{ data_04 | default('') | trim }}"
      - "  Status: {{ status_04 | default('ERROR') | trim }}"
      - "  Details: {{ details_04 | default('') | trim }}"
      - ""
      - "========================================================"
      - "OVERALL REMEDIATION:"
      - "  Result: {{ cis_result | default('ERROR') | trim }}"
      - "  Details: {{ details_04 | default('Not evaluated') | trim }}"
      - "========================================================"
    tags: [execute]

  always:
  - name: "Restore - Check if backup exists"
    ansible.builtin.stat:
      path: "{{ backup_dir }}/selinux_config.present"
    register: _restore_present
    failed_when: false
    tags: [restore]

  - name: "Restore - Overwrite with original"
    ansible.builtin.copy:
      src: "{{ backup_dir }}/selinux_config.present"
      dest: "{{ config_file }}"
      remote_src: true
    when: _restore_present.stat.exists | default(false)
    failed_when: false
    tags: [restore]

  - name: "Restore - Check if absent marker exists"
    ansible.builtin.stat:
      path: "{{ backup_dir }}/selinux_config.absent"
    register: _restore_absent
    failed_when: false
    tags: [restore]

  - name: "Restore - Delete config if it was absent before"
    ansible.builtin.file:
      path: "{{ config_file }}"
      state: absent
    when: _restore_absent.stat.exists | default(false)
    failed_when: false
    tags: [restore]

  - name: "Restore - Remove backup directory"
    ansible.builtin.file:
      path: "{{ backup_dir }}"
      state: absent
    failed_when: false
    tags: [restore]
