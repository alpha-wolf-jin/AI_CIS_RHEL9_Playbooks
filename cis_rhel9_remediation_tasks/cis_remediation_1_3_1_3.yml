---
- name: Initialize meta data variables
  include_vars: cis_remediation_var_1_3_1_3.yml

- name: "Snapshot - Create backup directory"
  ansible.builtin.file:
    path: "{{ backup_dir }}"
    state: directory
    mode: "0700"
  tags: [snapshot]
- name: "Snapshot - Check if /etc/selinux/config exists"
  ansible.builtin.stat:
    path: "/etc/selinux/config"
  register: _sg_config_stat
  tags: [snapshot]
- name: "Snapshot - Backup /etc/selinux/config if exists"
  ansible.builtin.copy:
    src: "/etc/selinux/config"
    dest: "{{ backup_dir }}/selinux_config.bak"
    remote_src: true
    force: false
  when: _sg_config_stat.stat.exists
  failed_when: false
  tags: [snapshot]

- block:
# Requirement 1 - Check package
  - name: "Req 1 - Check if selinux-policy-targeted is installed"
    ansible.builtin.shell: "rpm -q selinux-policy-targeted"
    args:
      executable: /bin/bash
    register: result_01
    failed_when: false
    tags: [execute]

  - name: "Store requirement 01 details and package status"
    ansible.builtin.set_fact:
      task_01_name: "Check package installed"
      task_01_cmd: "rpm -q selinux-policy-targeted"
      task_01_rc: "{{ result_01.rc }}"
      data_01: "{{ result_01.stdout | default('') | trim }}"
      status_01: "{{ 'APPLIED' if result_01.rc == 0 else 'FAILED' | trim }}"
      details_01: "{{ 'Package installed' if result_01.rc == 0 else 'Package not installed' | trim }}"
      policy_installed: "{{ result_01.rc == 0 }}"
    tags: [execute]

  - name: "Pre-fill skipped status for subsequent requirements when package missing"
    ansible.builtin.set_fact:
      status_02: "SKIPPED"
      data_02: "N/A"
      details_02: "Skipped because selinux-policy-targeted not installed"
      task_02_name: "Apply policy type"
      task_02_cmd: "ansible.builtin.lineinfile: path=/etc/selinux/config regexp='^SELINUXTYPE=' line='SELINUXTYPE=targeted'"
      task_02_rc: -1
      status_03: "SKIPPED"
      data_03: "N/A"
      details_03: "Skipped because package not installed"
      task_03_name: "Verify policy config"
      task_03_cmd: "grep -E '^SELINUXTYPE=' /etc/selinux/config"
      task_03_rc: -1
    when: not policy_installed
    tags: [execute]

# Requirement 2 - Apply SELinux policy (using lineinfile for idempotency)
  - name: "Req 2 - Apply SELinux policy type to targeted"
    ansible.builtin.lineinfile:
      path: /etc/selinux/config
      regexp: '^SELINUXTYPE='
      line: 'SELINUXTYPE=targeted'
    register: result_02
    failed_when: false
    when: policy_installed | bool
    tags: [execute]

  - name: "Store requirement 02 details"
    ansible.builtin.set_fact:
      task_02_name: "Apply policy type"
      task_02_cmd: "ansible.builtin.lineinfile: path=/etc/selinux/config regexp='^SELINUXTYPE=' line='SELINUXTYPE=targeted'"
      task_02_rc: "{{ 0 if not result_02.failed else 1 }}"
      data_02: "{{ 'SELINUXTYPE set to targeted' if not result_02.failed else 'Failed to apply' | trim }}"
      status_02: "{{ 'APPLIED' if not result_02.failed else 'FAILED' | trim }}"
      details_02: "{{ 'Configuration applied (lineinfile)' if not result_02.failed else 'Failed to apply' | trim }}"
    when: policy_installed | bool
    tags: [execute]

# Requirement 3 - Verify
  - name: "Req 3 - Verify SELinux policy configuration"
    ansible.builtin.shell: "grep -E '^SELINUXTYPE=' /etc/selinux/config"
    args:
      executable: /bin/bash
    register: result_03
    failed_when: false
    when: policy_installed | bool
    tags: [execute]

  - name: "Store requirement 03 details"
    ansible.builtin.set_fact:
      task_03_name: "Verify policy config"
      task_03_cmd: "grep -E '^SELINUXTYPE=' /etc/selinux/config"
      task_03_rc: "{{ result_03.rc | default(-1) }}"
      data_03: "{{ result_03.stdout | default('') | trim }}"
      status_03: >-
        {{ 'APPLIED' if result_03.rc == 0 and result_03.stdout is search('SELINUXTYPE=targeted') else 'FAILED' | trim }}
      details_03: >-
        {{ 'SELINUXTYPE correctly set to targeted' if result_03.rc == 0 and result_03.stdout is search('SELINUXTYPE=targeted') else 'SELINUXTYPE not correctly configured' | trim }}
    when: policy_installed | bool
    tags: [execute]

# Requirement 4 - Report
  - name: "Generate remediation report"
    ansible.builtin.debug:
      msg:
      - "REMEDIATION REPORT — CIS 1.3.1.3"
      - "Reference: CIS Benchmark checkpoint 1.3.1.3"
      - ""
      - "Requirement 1 - {{ req_01 }}:"
      - "  Task: {{ task_01_name | default('Task not recorded') }}"
      - "  Command: {{ task_01_cmd | default('N/A') }}"
      - "  Exit code: {{ task_01_rc | default(-1) }}"
      - "  Data: {{ data_01 | default('') | trim }}"
      - "  Status: {{ status_01 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_01 | default('Not evaluated') | trim }}"
      - ""
      - "Requirement 2 - {{ req_02 }}:"
      - "  Task: {{ task_02_name | default('Task not recorded') }}"
      - "  Command: {{ task_02_cmd | default('N/A') }}"
      - "  Exit code: {{ task_02_rc | default(-1) }}"
      - "  Data: {{ data_02 | default('') | trim }}"
      - "  Status: {{ status_02 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_02 | default('Not evaluated') | trim }}"
      - ""
      - "Requirement 3 - {{ req_03 }}:"
      - "  Task: {{ task_03_name | default('Task not recorded') }}"
      - "  Command: {{ task_03_cmd | default('N/A') }}"
      - "  Exit code: {{ task_03_rc | default(-1) }}"
      - "  Data: {{ data_03 | default('') | trim }}"
      - "  Status: {{ status_03 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_03 | default('Not evaluated') | trim }}"
      - ""
      - "========================================================"
      - "OVERALL REMEDIATION:"
      - "  Result: {{ status_03 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_03 | default('Not evaluated') | trim }}"
      - "========================================================"
    tags: [execute]

  always:
# === RESTORE (tag: restore) ===
  - name: "Restore - Check if backup exists"
    ansible.builtin.stat:
      path: "{{ backup_dir }}/selinux_config.bak"
    register: _restore_backup_stat
    failed_when: false
    tags: [restore]

  - name: "Restore - Overwrite with original"
    ansible.builtin.copy:
      src: "{{ backup_dir }}/selinux_config.bak"
      dest: "/etc/selinux/config"
      remote_src: true
    when: _restore_backup_stat.stat.exists
    failed_when: false
    tags: [restore]

  - name: "Restore - Remove backup directory"
    ansible.builtin.file:
      path: "{{ backup_dir }}"
      state: absent
    when: _restore_backup_stat.stat.exists
    failed_when: false
    tags: [restore]
