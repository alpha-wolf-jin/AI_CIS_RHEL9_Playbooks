---
- name: Initialize meta data variables
  include_vars: cis_remediation_var_6_3_1_2.yml

- name: "Snapshot - Create backup directory"
  ansible.builtin.file:
    path: "{{ backup_dir }}"
    state: directory
    mode: '0700'
  tags: [snapshot]
- name: "Snapshot - Check if /etc/default/grub exists"
  ansible.builtin.stat:
    path: /etc/default/grub
  register: _grub_stat
  tags: [snapshot]
- name: "Snapshot - Backup /etc/default/grub if exists"
  ansible.builtin.copy:
    src: /etc/default/grub
    dest: "{{ backup_dir }}/grub.present"
    remote_src: true
  when: "_grub_stat.stat.exists"
  tags: [snapshot]

- block:
  - name: "Req 01 - Check if grubby is installed"
    ansible.builtin.shell: which grubby
    args:
      executable: /bin/bash
    register: result_01
    failed_when: false
    tags: [execute]

  - name: "Store requirement 01 details"
    ansible.builtin.set_fact:
      task_01_name: "Check if grubby is installed"
      task_01_cmd: "which grubby"
      task_01_rc: "{{ result_01.rc | default(-1) }}"
      data_01: "{{ result_01.stdout | default('') | trim }}"
      status_01: "{{ 'PASS' if result_01.rc | default(-1) == 0 else 'FAIL' | trim }}"
      details_01: "{{ 'grubby found at ' + result_01.stdout | trim if result_01.rc | default(-1) == 0 else 'grubby not found' }}"
    tags: [execute]

  - name: "Req 02 - Apply audit=1 kernel parameter to all kernels"
    ansible.builtin.shell: grubby --update-kernel ALL --args 'audit=1'
    args:
      executable: /bin/bash
    register: result_02
    failed_when: false
    when: "result_01.rc | default(-1) == 0"
    tags: [execute]

  - name: "Store requirement 02 details"
    ansible.builtin.set_fact:
      task_02_name: "Apply audit=1 kernel parameter to all kernels"
      task_02_cmd: "grubby --update-kernel ALL --args 'audit=1'"
      task_02_rc: "{{ result_02.rc | default(-1) }}"
      data_02: "{{ result_02.stdout | default('') | trim }}"
      status_02: "{{ 'SKIP' if result_01.rc | default(-1) != 0 else ('PASS' if result_02.rc | default(-1) == 0 else 'FAIL') | trim }}"
      details_02: "{{ 'Skipped - grubby not installed' if result_01.rc | default(-1) != 0 else ('Kernel command lines updated' if result_02.rc | default(-1) == 0 else 'Failed to update kernel parameters') }}"
    tags: [execute]

  - name: "Req 03 - Add audit=1 to GRUB_CMDLINE_LINUX in /etc/default/grub"
    ansible.builtin.shell: |
      if grep -q 'audit=1' /etc/default/grub; then
        echo "audit=1 already present"
      else
        sed -i 's/^GRUB_CMDLINE_LINUX="/&audit=1 /' /etc/default/grub
        echo "audit=1 added"
      fi
    args:
      executable: /bin/bash
    register: result_03
    failed_when: false
    when: "result_01.rc | default(-1) == 0"
    tags: [execute]

  - name: "Store requirement 03 details"
    ansible.builtin.set_fact:
      task_03_name: "Add audit=1 to GRUB_CMDLINE_LINUX in /etc/default/grub"
      task_03_cmd: |
        sed -i 's/^GRUB_CMDLINE_LINUX="/&audit=1 /' /etc/default/grub
      task_03_rc: "{{ result_03.rc | default(-1) }}"
      data_03: "{{ result_03.stdout | default('') | trim }}"
      status_03: "{{ 'SKIP' if result_01.rc | default(-1) != 0 else ('PASS' if result_03.rc | default(-1) == 0 else 'FAIL') | trim }}"
      details_03: "{{ 'Skipped - grubby not installed' if result_01.rc | default(-1) != 0 else ('GRUB config updated' if result_03.rc | default(-1) == 0 else 'Failed to update GRUB config') }}"
    tags: [execute]

  - name: "Req 04 - Verify audit=1 via grubby --info ALL"
    ansible.builtin.shell: grubby --info ALL | grep -q 'audit=1' && echo 'audit=1 present for all kernels'
    args:
      executable: /bin/bash
    register: result_04
    failed_when: false
    when: "result_01.rc | default(-1) == 0"
    tags: [execute]

  - name: "Store requirement 04 details"
    ansible.builtin.set_fact:
      task_04_name: "Verify audit=1 via grubby --info ALL"
      task_04_cmd: "grubby --info ALL | grep -q 'audit=1' && echo 'audit=1 present for all kernels'"
      task_04_rc: "{{ result_04.rc | default(-1) }}"
      data_04: "{{ result_04.stdout | default('') | trim }}"
      status_04: "{{ 'SKIP' if result_01.rc | default(-1) != 0 else ('PASS' if result_04.rc | default(-1) == 0 else 'FAIL') | trim }}"
      details_04: "{{ 'Skipped - grubby not installed' if result_01.rc | default(-1) != 0 else ('audit=1 present for all kernels' if result_04.rc | default(-1) == 0 else 'audit=1 not present for all kernels') }}"
    tags: [execute]

  - name: "Req 05 - Verify audit=1 in /etc/default/grub"
    ansible.builtin.shell: grep '^GRUB_CMDLINE_LINUX=' /etc/default/grub | grep -q 'audit=1' && echo 'audit=1 present in GRUB config'
    args:
      executable: /bin/bash
    register: result_05
    failed_when: false
    when: "result_01.rc | default(-1) == 0"
    tags: [execute]

  - name: "Store requirement 05 details"
    ansible.builtin.set_fact:
      task_05_name: "Verify audit=1 in /etc/default/grub"
      task_05_cmd: "grep '^GRUB_CMDLINE_LINUX=' /etc/default/grub | grep -q 'audit=1' && echo 'audit=1 present in GRUB config'"
      task_05_rc: "{{ result_05.rc | default(-1) }}"
      data_05: "{{ result_05.stdout | default('') | trim }}"
      status_05: "{{ 'SKIP' if result_01.rc | default(-1) != 0 else ('PASS' if result_05.rc | default(-1) == 0 else 'FAIL') | trim }}"
      details_05: "{{ 'Skipped - grubby not installed' if result_01.rc | default(-1) != 0 else ('audit=1 present in GRUB config' if result_05.rc | default(-1) == 0 else 'audit=1 not present in GRUB config') }}"
    tags: [execute]

  - name: "Req 06 - Store final remediation result"
    ansible.builtin.set_fact:
      cis_result: "{{ status_05 | trim }}"
    tags: [execute]

  - name: "Store requirement 06 details"
    ansible.builtin.set_fact:
      task_06_name: "Store final cis_result"
      task_06_cmd: "set_fact cis_result based on status_05"
      task_06_rc: 0
      data_06: "{{ cis_result }}"
      status_06: "PASS"
      details_06: "Overall result stored as {{ cis_result }}"
    tags: [execute]

  - name: "Generate remediation report"
    ansible.builtin.debug:
      msg:
      - "========================================================"
      - "REMEDIATION REPORT — CIS 6.3.1.2"
      - "Reference: CIS Benchmark checkpoint 6.3.1.2"
      - "========================================================"
      - ""
      - "REQUIREMENT 01 - {{ req_01 }}:"
      - "  Task: {{ task_01_name | default('Task not recorded') }}"
      - "  Command: {{ task_01_cmd | default('N/A') }}"
      - "  Exit code: {{ task_01_rc | default(-1) }}"
      - "  Data: {{ data_01 | default('Data collection failed') | trim }}"
      - "  Status: {{ status_01 | default('ERROR') | trim }}"
      - "  Details: {{ details_01 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 02 - {{ req_02 }}:"
      - "  Task: {{ task_02_name | default('Task not recorded') }}"
      - "  Command: {{ task_02_cmd | default('N/A') }}"
      - "  Exit code: {{ task_02_rc | default(-1) }}"
      - "  Data: {{ data_02 | default('Data collection failed') | trim }}"
      - "  Status: {{ status_02 | default('ERROR') | trim }}"
      - "  Details: {{ details_02 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 03 - {{ req_03 }}:"
      - "  Task: {{ task_03_name | default('Task not recorded') }}"
      - "  Command: {{ task_03_cmd | default('N/A') }}"
      - "  Exit code: {{ task_03_rc | default(-1) }}"
      - "  Data: {{ data_03 | default('Data collection failed') | trim }}"
      - "  Status: {{ status_03 | default('ERROR') | trim }}"
      - "  Details: {{ details_03 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 04 - {{ req_04 }}:"
      - "  Task: {{ task_04_name | default('Task not recorded') }}"
      - "  Command: {{ task_04_cmd | default('N/A') }}"
      - "  Exit code: {{ task_04_rc | default(-1) }}"
      - "  Data: {{ data_04 | default('Data collection failed') | trim }}"
      - "  Status: {{ status_04 | default('ERROR') | trim }}"
      - "  Details: {{ details_04 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 05 - {{ req_05 }}:"
      - "  Task: {{ task_05_name | default('Task not recorded') }}"
      - "  Command: {{ task_05_cmd | default('N/A') }}"
      - "  Exit code: {{ task_05_rc | default(-1) }}"
      - "  Data: {{ data_05 | default('Data collection failed') | trim }}"
      - "  Status: {{ status_05 | default('ERROR') | trim }}"
      - "  Details: {{ details_05 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 06 - {{ req_06 }}:"
      - "  Task: {{ task_06_name | default('Task not recorded') }}"
      - "  Command: {{ task_06_cmd | default('N/A') }}"
      - "  Exit code: {{ task_06_rc | default(-1) }}"
      - "  Data: {{ data_06 | default('Data collection failed') | trim }}"
      - "  Status: {{ status_06 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_06 | default('Not evaluated') | trim }}"
      - ""
      - "========================================================"
      - "OVERALL REMEDIATION:"
      - "  Result: {{ cis_result | default('ERROR') | trim }}"
      - "  Details: {{ details_05 | default('Not evaluated') | trim }}"
      - "========================================================"
    tags: [execute]

  always:
  - name: "Restore - Remove backup directory"
    ansible.builtin.file:
      path: "{{ backup_dir }}"
      state: absent
    failed_when: false
    tags: [restore]
