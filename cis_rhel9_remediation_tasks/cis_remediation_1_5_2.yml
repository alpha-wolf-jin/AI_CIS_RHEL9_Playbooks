---
- name: Initialize meta data variables
  include_vars: cis_remediation_var_1_5_2.yml

- name: "Snapshot - Create backup directory"
  ansible.builtin.file:
    path: "{{ backup_dir }}"
    state: directory
    mode: '0700'
  tags: [snapshot]
- name: "Snapshot - Check if runtime kernel param backup exists"
  ansible.builtin.stat:
    path: "{{ backup_dir }}/{{ runtime_value_file }}"
  register: _snap_runtime_check
  tags: [snapshot]
- name: "Snapshot - Capture and save current kernel parameter value"
  block:
  - name: "Snapshot - Get current kernel parameter value"
    ansible.builtin.shell: sysctl -n {{ param }}
    args:
      executable: /bin/bash
    register: _snap_kernel_value
    changed_when: false

  - name: "Snapshot - Save runtime value to backup file"
    ansible.builtin.copy:
      content: "{{ _snap_kernel_value.stdout | trim }}"
      dest: "{{ backup_dir }}/{{ runtime_value_file }}"
      mode: '0644'
  when: not _snap_runtime_check.stat.exists
  tags: [snapshot]
- name: "Snapshot - Check if config file exists"
  ansible.builtin.stat:
    path: "{{ config_file }}"
  register: config_stat
  tags: [snapshot]
- name: "Snapshot - Backup config file if exists"
  ansible.builtin.copy:
    src: "{{ config_file }}"
    dest: "{{ backup_dir }}/60-kernel_sysctl.conf.bak"
    remote_src: true
  when: config_stat.stat.exists
  tags: [snapshot]
- name: "Snapshot - Mark config file as absent originally"
  ansible.builtin.file:
    path: "{{ backup_dir }}/config_was_absent"
    state: touch
  when: not config_stat.stat.exists
  failed_when: false
  tags: [snapshot]

- block:
  - name: "Req 1 - Ensure kernel.yama.ptrace_scope = 1 in sysctl config file"
    ansible.builtin.lineinfile:
      path: "{{ config_file }}"
      regexp: |
        ^kernel\.yama\.ptrace_scope
      line: "kernel.yama.ptrace_scope = 1"
      create: yes
      mode: '0644'
    register: result_01
    failed_when: false
    tags: [execute]

  - name: "Req 2 - Apply active kernel parameter"
    ansible.posix.sysctl:
      name: "{{ param }}"
      value: "{{ value }}"
      sysctl_set: yes
      state: present
      reload: no
      ignoreerrors: yes
    register: result_02
    failed_when: false
    tags: [execute]

  - name: "Req 3 - Verify kernel parameter value"
    ansible.builtin.shell: "sysctl -n {{ param }}"
    args:
      executable: /bin/bash
    register: result_03
    failed_when: false
    changed_when: false
    tags: [execute]

  - name: "Store requirement 01 details"
    set_fact:
      task_01_name: "Req 1 - Ensure kernel.yama.ptrace_scope = 1 in /etc/sysctl.d/60-kernel_sysctl.conf"
      task_01_cmd: |
        lineinfile regex=^kernel\\.yama\\.ptrace_scope line='kernel.yama.ptrace_scope = 1'
      task_01_rc: "{{ result_01.rc | default(0) }}"
      data_01: "{{ 'File updated' if result_01.changed else 'File already compliant' }}"
      status_01: "{{ 'APPLIED' if not result_01.failed else 'FAILED' }}"
      details_01: "{{ 'Config file contains required line' if not result_01.failed else 'Failed to update config' }}"
    tags: [execute]

  - name: "Store requirement 02 details"
    set_fact:
      task_02_name: "Req 2 - Apply sysctl -w kernel.yama.ptrace_scope=1"
      task_02_cmd: "ansible.posix.sysctl name=kernel.yama.ptrace_scope value=1 sysctl_set=yes"
      task_02_rc: "{{ result_02.rc | default(0) }}"
      data_02: "{{ 'Sysctl applied' if not result_02.failed else 'Sysctl failed' }}"
      status_02: "{{ 'APPLIED' if not result_02.failed else 'FAILED' }}"
      details_02: "{{ 'Active kernel parameter set successfully' if not result_02.failed else 'Failed to set parameter' }}"
    tags: [execute]

  - name: "Store requirement 03 details"
    set_fact:
      task_03_name: "Req 3 - Verify kernel parameter value"
      task_03_cmd: "sysctl -n kernel.yama.ptrace_scope"
      task_03_rc: "{{ result_03.rc | default(-1) }}"
      data_03: "{{ result_03.stdout | default('') | trim }}"
      status_03: "{{ 'APPLIED' if (result_03.stdout | default('') | trim) == '1' else 'FAILED' }}"
      details_03: "{{ 'Kernel parameter verified as 1' if (result_03.stdout | default('') | trim) == '1' else ('Verification failed, value=' + result_03.stdout | default('')) | trim }}"
    tags: [execute]

  - name: "Determine overall remediation status"
    set_fact:
      overall_status: "{{ 'APPLIED' if (status_01 == 'APPLIED' and status_02 == 'APPLIED' and status_03 == 'APPLIED') else 'FAILED' }}"
    tags: [execute]

  - name: "Generate remediation report"
    debug:
      msg:
      - "REMEDIATION REPORT — CIS 1.5.2"
      - "Reference: CIS Benchmark checkpoint 1.5.2"
      - ""
      - "REQUIREMENT 01 - {{ req_01 }}:"
      - "  Task: {{ task_01_name }}"
      - "  Command: {{ task_01_cmd }}"
      - "  Exit code: {{ task_01_rc }}"
      - "  Data: {{ data_01 }}"
      - "  Status: {{ status_01 }}"
      - "  Details: {{ details_01 }}"
      - ""
      - "REQUIREMENT 02 - {{ req_02 }}:"
      - "  Task: {{ task_02_name }}"
      - "  Command: {{ task_02_cmd }}"
      - "  Exit code: {{ task_02_rc }}"
      - "  Data: {{ data_02 }}"
      - "  Status: {{ status_02 }}"
      - "  Details: {{ details_02 }}"
      - ""
      - "REQUIREMENT 03 - {{ req_03 }}:"
      - "  Task: {{ task_03_name }}"
      - "  Command: {{ task_03_cmd }}"
      - "  Exit code: {{ task_03_rc }}"
      - "  Data: {{ data_03 }}"
      - "  Status: {{ status_03 }}"
      - "  Details: {{ details_03 }}"
      - ""
      - "========================================================"
      - "OVERALL REMEDIATION:"
      - "  Result: {{ overall_status }}"
      - "========================================================"
    tags: [execute]

  always:
  - name: "Restore - Check if config backup exists"
    ansible.builtin.stat:
      path: "{{ backup_dir }}/60-kernel_sysctl.conf.bak"
    register: backup_stat
    failed_when: false
    tags: [restore]

  - name: "Restore - Overwrite config with original"
    ansible.builtin.copy:
      src: "{{ backup_dir }}/60-kernel_sysctl.conf.bak"
      dest: "{{ config_file }}"
      remote_src: true
    when: backup_stat.stat.exists
    failed_when: false
    tags: [restore]

# NEW: check for absent marker and delete config if it was created
  - name: "Restore - Check if config was absent originally"
    ansible.builtin.stat:
      path: "{{ backup_dir }}/config_was_absent"
    register: _restore_absent_marker
    failed_when: false
    tags: [restore]

  - name: "Restore - Remove config file created by remediation"
    ansible.builtin.file:
      path: "{{ config_file }}"
      state: absent
    when: _restore_absent_marker.stat.exists | default(false)
    failed_when: false
    tags: [restore]

  - name: "Restore - Check if runtime kernel param backup exists"
    ansible.builtin.stat:
      path: "{{ backup_dir }}/{{ runtime_value_file }}"
    register: _restore_runtime_check
    failed_when: false
    tags: [restore]

  - name: "Restore - Read original kernel parameter value"
    ansible.builtin.slurp:
      src: "{{ backup_dir }}/{{ runtime_value_file }}"
    register: _restore_original_value
    when: _restore_runtime_check.stat.exists | default(false)
    failed_when: false
    tags: [restore]

  - name: "Restore - Apply original kernel parameter value"
    ansible.builtin.shell: sysctl -w {{ param }}={{ _restore_original_value.content | b64decode | trim }}
    args:
      executable: /bin/bash
    when:
    - _restore_runtime_check.stat.exists | default(false)
    - _restore_original_value is defined
    - _restore_original_value.content is defined
    failed_when: false
    tags: [restore]

  - name: "Restore - Remove backup directory"
    ansible.builtin.file:
      path: "{{ backup_dir }}"
      state: absent
    failed_when: false
    tags: [restore]
