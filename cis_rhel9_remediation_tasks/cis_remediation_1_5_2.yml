---
- name: Initialize meta data variables
  include_vars: cis_remediation_var_1_5_2.yml

- name: "Snapshot - Create backup directory"
  ansible.builtin.file:
    path: "{{ backup_dir }}"
    state: directory
    mode: '0700'
  tags: [snapshot]
- name: "Snapshot - Check if sysctl config file exists"
  ansible.builtin.stat:
    path: "{{ sysctl_config_file }}"
  register: _snap_config_stat
  tags: [snapshot]
- name: "Snapshot - Backup sysctl config file if exists"
  ansible.builtin.copy:
    src: "{{ sysctl_config_file }}"
    dest: "{{ backup_dir }}/60-kernel_sysctl.conf.present"
    remote_src: true
  when: _snap_config_stat.stat.exists
  tags: [snapshot]
- name: "Snapshot - Mark sysctl config file as absent"
  ansible.builtin.copy:
    content: "absent"
    dest: "{{ backup_dir }}/60-kernel_sysctl.conf.absent"
  when: not _snap_config_stat.stat.exists
  tags: [snapshot]
- name: "Snapshot - Save current runtime sysctl value"
  ansible.builtin.shell: "sysctl -n {{ sysctl_param }}"
  args:
    executable: /bin/bash
  register: _snap_sysctl_runtime
  changed_when: false
  failed_when: false
  tags: [snapshot]
- name: "Snapshot - Persist runtime sysctl value to file"
  ansible.builtin.copy:
    content: "{{ _snap_sysctl_runtime.stdout | default('') | trim }}"
    dest: "{{ backup_dir }}/runtime_sysctl_value.state"
  tags: [snapshot]

- block:
  - name: "Initialize data variables"
    ansible.builtin.set_fact:
      data_01: "Not collected yet"
      status_01: "ERROR"
      details_01: "Not evaluated"
      task_01_name: "Not executed"
      task_01_cmd: "N/A"
      task_01_rc: -1
      data_02: "Not collected yet"
      status_02: "ERROR"
      details_02: "Not evaluated"
      task_02_name: "Not executed"
      task_02_cmd: "N/A"
      task_02_rc: -1
      data_03: "Not collected yet"
      status_03: "ERROR"
      details_03: "Not evaluated"
      task_03_name: "Not executed"
      task_03_cmd: "N/A"
      task_03_rc: -1
      data_04: "Not collected yet"
      status_04: "ERROR"
      details_04: "Not evaluated"
      task_04_name: "Not executed"
      task_04_cmd: "N/A"
      task_04_rc: -1
    tags: [execute]

  - name: "Req 01 - Apply kernel parameter to sysctl config file"
    ansible.builtin.lineinfile:
      path: "{{ sysctl_config_file }}"
      regexp: |
        ^{{ sysctl_param | regex_escape() }}\\s*=
      line: "{{ sysctl_param }} = {{ sysctl_value }}"
      state: present
      create: yes
      mode: '0644'
    register: result_01
    failed_when: false
    tags: [execute]

  - name: "Store requirement 01 details"
    ansible.builtin.set_fact:
      task_01_name: "Apply kernel parameter to sysctl config file"
      task_01_cmd: "lineinfile: {{ sysctl_param }} = {{ sysctl_value }} in {{ sysctl_config_file }}"
      task_01_rc: "{{ 0 if result_01 is not failed else 1 }}"
      data_01: "{{ sysctl_param }} = {{ sysctl_value }}"
      status_01: "{{ 'PASS' if result_01 is not failed else 'FAIL' }}"
      details_01: "{{ 'Config line ensured in ' + sysctl_config_file if result_01 is not failed else 'Failed to update config file' }}"
    tags: [execute]

  - name: "Req 02 - Apply active kernel parameter setting"
    ansible.builtin.shell: "sysctl -w {{ sysctl_param }}={{ sysctl_value }}"
    args:
      executable: /bin/bash
    register: result_02
    failed_when: false
    tags: [execute]

  - name: "Store requirement 02 details"
    ansible.builtin.set_fact:
      task_02_name: "Apply active kernel parameter"
      task_02_cmd: "sysctl -w {{ sysctl_param }}={{ sysctl_value }}"
      task_02_rc: "{{ result_02.rc | default(-1) }}"
      data_02: "{{ result_02.stdout | default('') | trim }}"
      status_02: "{{ 'PASS' if result_02.rc | default(-1) == 0 else 'FAIL' }}"
      details_02: "{{ 'Parameter applied successfully' if result_02.rc | default(-1) == 0 else 'Failed to apply parameter' }}"
    tags: [execute]

  - name: "Req 03 - Verify active kernel parameter value"
    ansible.builtin.shell: "sysctl {{ sysctl_param }}"
    args:
      executable: /bin/bash
    register: result_03
    failed_when: false
    tags: [execute]

  - name: "Store requirement 03 details"
    ansible.builtin.set_fact:
      task_03_name: "Verify kernel parameter value"
      task_03_cmd: "sysctl {{ sysctl_param }}"
      task_03_rc: "{{ result_03.rc | default(-1) }}"
      data_03: "{{ result_03.stdout | default('') | trim }}"
      status_03: "{{ 'PASS' if (result_03.stdout | default('') | trim) == (sysctl_param + ' = ' + sysctl_value) else 'FAIL' }}"
      details_03: "{{ 'Verification successful' if (result_03.stdout | default('') | trim) == (sysctl_param + ' = ' + sysctl_value) else 'Verification failed' }}"
    tags: [execute]

  - name: "Req 04 - Store final remediation result in cis_result"
    ansible.builtin.set_fact:
      cis_result: "{{ status_03 | default('ERROR') | trim }}"
      task_04_name: "Store final remediation result"
      task_04_cmd: "set_fact: cis_result = status_03"
      task_04_rc: 0
      data_04: "{{ status_03 | default('ERROR') | trim }}"
      status_04: "{{ status_03 | default('ERROR') | trim }}"
      details_04: "cis_result set to {{ status_03 | default('ERROR') | trim }}"
    tags: [execute]

  - name: "Req 05 - Generate remediation report"
    ansible.builtin.debug:
      msg:
      - "REMEDIATION REPORT — CIS 1.5.2"
      - "Reference: CIS Benchmark checkpoint 1.5.2"
      - ""
      - "REQUIREMENT 01 - {{ req_01 }}:"
      - "  Task: {{ task_01_name | default('Not recorded') }}"
      - "  Command: {{ task_01_cmd | default('N/A') }}"
      - "  Exit code: {{ task_01_rc | default(-1) }}"
      - "  Data: {{ data_01 | default('') | trim }}"
      - "  Status: {{ status_01 | default('ERROR') | trim }}"
      - "  Details: {{ details_01 | default('') | trim }}"
      - ""
      - "REQUIREMENT 02 - {{ req_02 }}:"
      - "  Task: {{ task_02_name | default('Not recorded') }}"
      - "  Command: {{ task_02_cmd | default('N/A') }}"
      - "  Exit code: {{ task_02_rc | default(-1) }}"
      - "  Data: {{ data_02 | default('') | trim }}"
      - "  Status: {{ status_02 | default('ERROR') | trim }}"
      - "  Details: {{ details_02 | default('') | trim }}"
      - ""
      - "REQUIREMENT 03 - {{ req_03 }}:"
      - "  Task: {{ task_03_name | default('Not recorded') }}"
      - "  Command: {{ task_03_cmd | default('N/A') }}"
      - "  Exit code: {{ task_03_rc | default(-1) }}"
      - "  Data: {{ data_03 | default('') | trim }}"
      - "  Status: {{ status_03 | default('ERROR') | trim }}"
      - "  Details: {{ details_03 | default('') | trim }}"
      - ""
      - "REQUIREMENT 04 - {{ req_04 }}:"
      - "  Task: {{ task_04_name | default('Not recorded') }}"
      - "  Command: {{ task_04_cmd | default('N/A') }}"
      - "  Exit code: {{ task_04_rc | default(-1) }}"
      - "  Data: {{ data_04 | default('') | trim }}"
      - "  Status: {{ status_04 | default('ERROR') | trim }}"
      - "  Details: {{ details_04 | default('') | trim }}"
      - ""
      - "========================================================"
      - "OVERALL REMEDIATION:"
      - "  Result: {{ cis_result | default('ERROR') | trim }}"
      - "========================================================"
    tags: [execute]

  always:
  - name: "Restore - Check if checkpoint exists"
    ansible.builtin.stat:
      path: "{{ backup_dir }}/60-kernel_sysctl.conf.present"
    register: _restore_present
    failed_when: false
    tags: [restore]

  - name: "Restore - Restore sysctl config from backup"
    ansible.builtin.copy:
      src: "{{ backup_dir }}/60-kernel_sysctl.conf.present"
      dest: "{{ sysctl_config_file }}"
      remote_src: true
    when: _restore_present.stat.exists | default(false)
    failed_when: false
    tags: [restore]

  - name: "Restore - Check if absent marker exists"
    ansible.builtin.stat:
      path: "{{ backup_dir }}/60-kernel_sysctl.conf.absent"
    register: _restore_absent
    failed_when: false
    tags: [restore]

  - name: "Restore - Delete sysctl config if it was absent before"
    ansible.builtin.file:
      path: "{{ sysctl_config_file }}"
      state: absent
    when: _restore_absent.stat.exists | default(false)
    failed_when: false
    tags: [restore]

  - name: "Restore - Read saved runtime sysctl value"
    ansible.builtin.slurp:
      src: "{{ backup_dir }}/runtime_sysctl_value.state"
    register: _restore_runtime_value
    failed_when: false
    tags: [restore]

  - name: "Restore - Revert runtime kernel parameter to original value"
    ansible.builtin.shell: "sysctl -w {{ sysctl_param }}={{ _restore_runtime_value.content | b64decode | trim }}"
    args:
      executable: /bin/bash
    when:
    - _restore_runtime_value.content is defined
    - (_restore_runtime_value.content | b64decode | trim) | length > 0
    failed_when: false
    tags: [restore]

  - name: "Restore - Remove backup directory"
    ansible.builtin.file:
      path: "{{ backup_dir }}"
      state: absent
    failed_when: false
    tags: [restore]
