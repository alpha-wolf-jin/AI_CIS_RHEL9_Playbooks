playbook_name: "cis_7_2_8_home_dirs"
backup_dir: "/var/log/ai-playbooks-backup/{{ playbook_name }}"
req_01: "1. Run the provided remediation script to fix Ensure local interactive user home directories are configured"
req_02: "2. VERIFY: Run audit check to confirm Ensure local interactive user home directories are configured is properly configured. Expected result: System is compliant"
req_03: "3. Store the final remediation result in a variable named 'cis_result' using set_fact. Set cis_result to the overall remediation status (PASS/FAIL/SKIP/ERROR) derived from the last requirement's status variable."
remediation_script: |
  {% raw %}#!/usr/bin/env bash
  {
     l_output2=""
     l_valid_shells="^($( awk -F\/ '$NF != "nologin" {print}' /etc/shells | sed -rn '/^\//{s,/,\\\\/,g;p}' | paste -s -d '|' - ))$"
     unset a_uarr && a_uarr=()
     while read -r l_epu l_eph; do
        a_uarr+=("$l_epu $l_eph")
     done <<< "$(awk -v pat="$l_valid_shells" -F: '$(NF) ~ pat { print $1 " " $(NF-1) }' /etc/passwd)"
     l_asize="${#a_uarr[@]}"
     [ "$l_asize " -gt "10000" ] && echo -e "\n  ** INFO **\n  - \"$l_asize\" Local interactive users found on the system\n  - This may be a long running process\n"
     while read -r l_user l_home; do
        if [ -d "$l_home" ]; then
           l_mask='0027'
           l_max="$( printf '%o' $(( 0777 & ~$l_mask)) )"
           while read -r l_own l_mode; do
              if [ "$l_user" != "$l_own" ]; then
                 l_output2="$l_output2\n  - User: \"$l_user\" Home \"$l_home\" is owned by: \"$l_own\"\n  -  changing ownership to: \"$l_user\"\n"
                 chown "$l_user" "$l_home"
              fi
              if [ $(( $l_mode & $l_mask )) -gt 0 ]; then
                 l_output2="$l_output2\n  - User: \"$l_user\" Home \"$l_home\" is mode: \"$l_mode\" should be mode: \"$l_max\" or more restrictive\n  - removing excess permissions\n"
                 chmod g-w,o-rwx "$l_home"
              fi
           done <<< "$(stat -Lc '%U %#a' "$l_home")"
        else
           l_output2="$l_output2\n  - User: \"$l_user\" Home \"$l_home\" Doesn't exist\n  -  Please create a home in accordance with local site policy"
        fi
     done <<< "$(printf '%s\n' "${a_uarr[@]}")"
     if [ -z "$l_output2" ]; then
        echo -e " - No modification needed to local interactive users home directories"
     else
        echo -e "\n$l_output2"
     fi
  }{% endraw %}
