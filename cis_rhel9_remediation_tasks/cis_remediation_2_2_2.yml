---
- name: Initialize meta data variables
  include_vars: cis_remediation_var_2_2_2.yml

- name: "Snapshot - Create backup directory"
  ansible.builtin.file:
    path: "{{ backup_dir }}"
    state: directory
    mode: '0700'
  tags: [snapshot]
- name: "Snapshot - Check if openldap-clients is installed"
  ansible.builtin.shell: rpm -q openldap-clients
  args:
    executable: /bin/bash
  register: _snap_installed
  failed_when: false
  changed_when: false
  tags: [snapshot]
- name: "Snapshot - Save installed state"
  ansible.builtin.copy:
    content: "{{ 'installed' if _snap_installed.rc == 0 else 'absent' }}"
    dest: "{{ backup_dir }}/openldap-clients.state"
  tags: [snapshot]

- block:
  - name: "Initialize data variables"
    set_fact:
      data_01: "Not collected yet"
      status_01: "ERROR"
      details_01: "Not evaluated"
      data_02: "Not collected yet"
      status_02: "ERROR"
      details_02: "Not evaluated"
      data_03: "Not collected yet"
      status_03: "ERROR"
      details_03: "Not evaluated"
      task_01_name: "Not executed"
      task_01_cmd: "N/A"
      task_01_rc: -1
    tags: [execute]

  - name: "Req 01 - Check if openldap-clients is installed"
    ansible.builtin.shell: rpm -q openldap-clients
    args:
      executable: /bin/bash
    register: _check_result
    failed_when: false
    changed_when: false
    tags: [execute]

  - name: "Set ldap_installed fact"
    set_fact:
      ldap_installed: "{{ _check_result.rc == 0 }}"
    tags: [execute]

  - name: "Req 01 - Remove openldap-clients package"
    ansible.builtin.shell: dnf remove -y openldap-clients
    args:
      executable: /bin/bash
    register: result_01
    when: ldap_installed | bool
    failed_when: false
    tags: [execute]

  - name: "Req 02 - Verify openldap-clients is not installed"
    ansible.builtin.shell: rpm -q openldap-clients
    args:
      executable: /bin/bash
    register: result_02
    failed_when: false
    changed_when: false
    tags: [execute]

  - name: "Store requirement 01 details"
    set_fact:
      task_01_name: "Remove openldap-clients package using dnf"
      task_01_cmd: "dnf remove -y openldap-clients"
      task_01_rc: "{{ result_01.rc | default(-1) }}"
      data_01: "{{ result_01.stdout | default('') | trim }}"
      status_01: >-
        {{- 'SKIP' if (ldap_installed | default(false)) == false else ('PASS' if result_01.rc | default(-1) == 0 else 'FAIL') -}}
      details_01: >-
        {{- 'Skipped: package was not installed' if (ldap_installed | default(false)) == false else ('Removal succeeded' if result_01.rc | default(-1) == 0 else 'Removal failed with exit code ' ~ result_01.rc | default(-1)) -}}
    tags: [execute]

  - name: "Store requirement 02 details"
    set_fact:
      task_02_name: "Verify openldap-clients not installed"
      task_02_cmd: "rpm -q openldap-clients"
      task_02_rc: "{{ result_02.rc | default(-1) }}"
      data_02: "{{ result_02.stdout | default('') | trim }}"
      status_02: "{{ 'PASS' if result_02.rc | default(-1) != 0 else 'FAIL' }}"
      details_02: "{{ 'Package not installed' if result_02.rc | default(-1) != 0 else 'Package still installed (unexpected)' }}"
    tags: [execute]

  - name: "Req 03 - Store final remediation result"
    set_fact:
      cis_result: "{{ status_02 | default('ERROR') | trim }}"
      task_03_name: "Store cis_result variable"
      task_03_cmd: "set_fact: cis_result = {{ status_02 | default('ERROR') | trim }}"
      task_03_rc: 0
      data_03: "{{ status_02 | default('ERROR') | trim }}"
      status_03: "PASS"
      details_03: "cis_result set successfully"
    tags: [execute]

  - name: "Generate remediation report"
    debug:
      msg:
      - "REMEDIATION REPORT — CIS 2.2.2"
      - "Reference: CIS Benchmark checkpoint 2.2.2"
      - ""
      - "REQUIREMENT 01 - {{ req_01 }}:"
      - "  Task: {{ task_01_name | default('Not recorded') }}"
      - "  Command: {{ task_01_cmd | default('N/A') }}"
      - "  Exit code: {{ task_01_rc | default(-1) }}"
      - "  Data: {{ data_01 | default('') | trim }}"
      - "  Status: {{ status_01 | default('ERROR') | trim }}"
      - "  Details: {{ details_01 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 02 - {{ req_02 }}:"
      - "  Task: {{ task_02_name | default('Not recorded') }}"
      - "  Command: {{ task_02_cmd | default('N/A') }}"
      - "  Exit code: {{ task_02_rc | default(-1) }}"
      - "  Data: {{ data_02 | default('') | trim }}"
      - "  Status: {{ status_02 | default('ERROR') | trim }}"
      - "  Details: {{ details_02 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 03 - {{ req_03 }}:"
      - "  Task: {{ task_03_name | default('Not recorded') }}"
      - "  Command: {{ task_03_cmd | default('N/A') }}"
      - "  Exit code: {{ task_03_rc | default(-1) }}"
      - "  Data: {{ data_03 | default('') | trim }}"
      - "  Status: {{ status_03 | default('ERROR') | trim }}"
      - "  Details: {{ details_03 | default('Not evaluated') | trim }}"
      - ""
      - "========================================================"
      - "OVERALL REMEDIATION:"
      - "  Result: {{ cis_result | default('ERROR') | trim }}"
      - "  Details: {{ details_02 | default('Not evaluated') | trim }}"
      - "========================================================"
    tags: [execute]

  always:
  - name: "Restore - Check if backup state exists"
    ansible.builtin.stat:
      path: "{{ backup_dir }}/openldap-clients.state"
    register: _restore_installed
    failed_when: false
    tags: [restore]

  - name: "Restore - Read saved state"
    ansible.builtin.slurp:
      src: "{{ backup_dir }}/openldap-clients.state"
    register: _restore_content
    when: _restore_installed.stat.exists | default(false)
    failed_when: false
    tags: [restore]

  - name: "Restore - Reinstall openldap-clients if it was installed"
    ansible.builtin.shell: dnf install -y openldap-clients
    args:
      executable: /bin/bash
    when:
    - _restore_installed.stat.exists | default(false)
    - _restore_content is defined
    - "_restore_content.content is defined"
    - "(_restore_content.content | b64decode | trim) == 'installed'"
    failed_when: false
    tags: [restore]

  - name: "Restore - Remove backup directory"
    ansible.builtin.file:
      path: "{{ backup_dir }}"
      state: absent
    failed_when: false
    tags: [restore]
