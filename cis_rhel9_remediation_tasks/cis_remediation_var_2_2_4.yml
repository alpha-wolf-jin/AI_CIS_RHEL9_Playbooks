playbook_name: "cis_2_2_4_telnet_removal"
backup_dir: "/var/log/ai-playbooks-backup/{{ playbook_name }}"
req_01: "Apply removal of telnet client using command: `dnf remove -y telnet`. Expected result: Package telnet is removed from the system."
req_02: "Verify telnet client is not installed using command: `rpm -q telnet`. Expected result: package telnet is not installed or returns 'package telnet is not installed'."
req_03: "Store the final remediation result in a variable named 'cis_result' using set_fact. Set cis_result to the overall remediation status (PASS/FAIL/SKIP/ERROR) derived from the last requirement's status variable."
