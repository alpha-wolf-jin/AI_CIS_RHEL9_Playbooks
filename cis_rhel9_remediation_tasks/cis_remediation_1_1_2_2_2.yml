---
- name: Initialize meta data variables
  include_vars: cis_remediation_var_1_1_2_2_2.yml

- name: "Snapshot - Create backup directory"
  ansible.builtin.file:
    path: "{{ backup_dir }}"
    state: directory
    mode: '0700'
  tags: [snapshot]
- name: "Snapshot - Check if /etc/fstab exists"
  ansible.builtin.stat:
    path: "/etc/fstab"
  register: _sg_fstab_stat
  tags: [snapshot]
- name: "Snapshot - Backup /etc/fstab if exists"
  ansible.builtin.copy:
    src: "/etc/fstab"
    dest: "{{ backup_dir }}/fstab.present"
    remote_src: true
  when: _sg_fstab_stat.stat.exists
  tags: [snapshot]

- block:
  - name: "Initialize data variables"
    ansible.builtin.set_fact:
      data_01: "Not collected yet"
      status_01: "ERROR"
      details_01: "Not evaluated"
      data_02: "Not collected yet"
      status_02: "ERROR"
      details_02: "Not evaluated"
      data_03: "Not collected yet"
      status_03: "ERROR"
      details_03: "Not evaluated"
      data_04: "Not collected yet"
      status_04: "ERROR"
      details_04: "Not evaluated"
      task_01_name: "Not executed"
      task_01_cmd: "N/A"
      task_01_rc: -1
    tags: [execute]

  - name: "Req 01 - Check if /dev/shm is a separate partition"
    ansible.builtin.shell: mount | grep -E '\s/dev/shm\s'
    args:
      executable: /bin/bash
    register: result_01
    failed_when: false
    changed_when: false
    tags: [execute]

  - name: "Store requirement 01 details"
    ansible.builtin.set_fact:
      task_01_name: "Check if /dev/shm is a separate partition"
      task_01_cmd: |
        mount | grep -E '\\s/dev/shm\\s'
      task_01_rc: "{{ result_01.rc | default(-1) }}"
      data_01: "{{ result_01.stdout | default('') | trim }}"
      status_01: "{{ 'PASS' if (result_01.rc | default(-1)) == 0 and (result_01.stdout | default('') | trim | length > 0) else 'FAIL' }}"
      details_01: "{{ 'Partition exists' if (result_01.rc | default(-1)) == 0 and (result_01.stdout | default('') | trim | length > 0) else 'Partition not found or command failed' }}"
    tags: [execute]

  - name: "Req 02 - Check if /dev/shm has an entry in /etc/fstab"
    ansible.builtin.shell: grep -E '^\S+\s+/dev/shm\s+' /etc/fstab
    args:
      executable: /bin/bash
    register: fstab_entry_check
    failed_when: false
    changed_when: false
    tags: [execute]

  - name: "Req 02 - Check if nodev is already in /dev/shm fstab options"
    ansible.builtin.shell: grep -E '^\S+\s+/dev/shm\s+\S+\s+[^ ]*nodev[^ ]*' /etc/fstab
    args:
      executable: /bin/bash
    register: nodev_in_fstab
    failed_when: false
    changed_when: false
    when: fstab_entry_check.rc == 0
    tags: [execute]

  - name: "Req 02 - Edit /etc/fstab to add nodev to /dev/shm mount options"
    ansible.builtin.lineinfile:
      path: /etc/fstab
      regexp: |
        ^(\S+\s+/dev/shm\s+\S+\s+)(.*)$
      line: |
        \1\2,nodev
      backrefs: true
    register: result_02
    failed_when: false
    when:
    - fstab_entry_check.rc == 0
    - nodev_in_fstab.rc != 0
    tags: [execute]

  - name: "Req 02 - Add /dev/shm entry to /etc/fstab with nodev option"
    ansible.builtin.lineinfile:
      path: /etc/fstab
      line: 'tmpfs /dev/shm tmpfs defaults,nodev,nosuid,noexec 0 0'
      create: true
    register: result_02_add
    failed_when: false
    when: fstab_entry_check.rc != 0
    tags: [execute]

  - name: "Store requirement 02 details"
    ansible.builtin.set_fact:
      task_02_name: "Edit /etc/fstab to add nodev to /dev/shm mount options"
      task_02_cmd: "lineinfile: add nodev to /dev/shm in /etc/fstab"
      task_02_rc: "{{ 0 if (result_02.changed | default(false)) or (result_02_add.changed | default(false)) else 0 }}"
      data_02: "{{ 'fstab updated' if (result_02.changed | default(false)) or (result_02_add.changed | default(false)) else 'fstab already had nodev or no /dev/shm entry' }}"
      status_02: "{{ 'PASS' if (result_02.changed | default(false)) or (result_02_add.changed | default(false)) or (not result_02.failed | default(false)) or (not result_02_add.failed | default(false)) else 'FAIL' }}"
      details_02: "{{ 'nodev option added to /dev/shm in /etc/fstab' if (result_02.changed | default(false)) or (result_02_add.changed | default(false)) else 'nodev option already present or /dev/shm entry not found' }}"
    tags: [execute]

  - name: "Req 03 - Remount /dev/shm with updated options"
    ansible.builtin.shell: mount -o remount /dev/shm
    args:
      executable: /bin/bash
    register: result_03
    failed_when: false
    tags: [execute]

  - name: "Store requirement 03 details"
    ansible.builtin.set_fact:
      task_03_name: "Remount /dev/shm with updated options"
      task_03_cmd: "mount -o remount /dev/shm"
      task_03_rc: "{{ result_03.rc | default(-1) }}"
      data_03: "{{ result_03.stdout | default('') | trim }}"
      status_03: "{{ 'PASS' if (result_03.rc | default(-1)) == 0 and ('parse error' not in (result_03.stderr | default(''))) else 'FAIL' }}"
      details_03: "{{ 'Remounted successfully' if (result_03.rc | default(-1)) == 0 and ('parse error' not in (result_03.stderr | default(''))) else 'Remount failed: ' + (result_03.stderr | default('')) }}"
    tags: [execute]

  - name: "Req 04 - Verify nodev option is set on /dev/shm"
    ansible.builtin.shell: mount | grep -E '\s/dev/shm\s' | grep nodev
    args:
      executable: /bin/bash
    register: result_04
    failed_when: false
    changed_when: false
    tags: [execute]

  - name: "Store requirement 04 details"
    ansible.builtin.set_fact:
      task_04_name: "Verify nodev option is set on /dev/shm"
      task_04_cmd: |
        mount | grep -E '\\s/dev/shm\\s' | grep nodev
      task_04_rc: "{{ result_04.rc | default(-1) }}"
      data_04: "{{ result_04.stdout | default('') | trim }}"
      status_04: "{{ 'PASS' if (result_04.rc | default(-1)) == 0 and (result_04.stdout | default('') | trim | length > 0) else 'FAIL' }}"
      details_04: "{{ 'nodev option confirmed' if (result_04.rc | default(-1)) == 0 and (result_04.stdout | default('') | trim | length > 0) else 'nodev option NOT confirmed' }}"
    tags: [execute]

  - name: "Store final remediation result in cis_result"
    ansible.builtin.set_fact:
      cis_result: "{{ 'PASS' if (status_01 == 'PASS' and status_02 == 'PASS' and status_03 == 'PASS' and status_04 == 'PASS') else 'FAIL' }}"
    tags: [execute]

  - name: "Generate remediation report"
    ansible.builtin.debug:
      msg:
      - "REMEDIATION REPORT — CIS 1.1.2.2.2"
      - "Reference: CIS Benchmark checkpoint 1.1.2.2.2"
      - ""
      - "REQUIREMENT 01 - {{ req_01 }}:"
      - "  Task: {{ task_01_name | default('Not recorded') }}"
      - "  Command: {{ task_01_cmd | default('N/A') }}"
      - "  Exit code: {{ task_01_rc | default(-1) }}"
      - "  Data: {{ data_01 | default('') | trim }}"
      - "  Status: {{ status_01 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_01 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 02 - {{ req_02 }}:"
      - "  Task: {{ task_02_name | default('Not recorded') }}"
      - "  Command: {{ task_02_cmd | default('N/A') }}"
      - "  Exit code: {{ task_02_rc | default(-1) }}"
      - "  Data: {{ data_02 | default('') | trim }}"
      - "  Status: {{ status_02 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_02 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 03 - {{ req_03 }}:"
      - "  Task: {{ task_03_name | default('Not recorded') }}"
      - "  Command: {{ task_03_cmd | default('N/A') }}"
      - "  Exit code: {{ task_03_rc | default(-1) }}"
      - "  Data: {{ data_03 | default('') | trim }}"
      - "  Status: {{ status_03 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_03 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 04 - {{ req_04 }}:"
      - "  Task: {{ task_04_name | default('Not recorded') }}"
      - "  Command: {{ task_04_cmd | default('N/A') }}"
      - "  Exit code: {{ task_04_rc | default(-1) }}"
      - "  Data: {{ data_04 | default('') | trim }}"
      - "  Status: {{ status_04 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_04 | default('Not evaluated') | trim }}"
      - ""
      - "OVERALL REMEDIATION:"
      - "  Result: {{ cis_result | default('ERROR') | trim }}"
    tags: [execute]

  always:
  - name: "State Guard Restore - Check if current checkpoint exists"
    ansible.builtin.stat:
      path: "{{ backup_dir }}/fstab.present"
    register: _sg_restore_flag
    failed_when: false
    ignore_errors: true
    tags: [restore]

  - name: "State Guard Restore - Check if fstab backup exists"
    ansible.builtin.stat:
      path: "{{ backup_dir }}/fstab.present"
    register: _sg_restore_fstab
    failed_when: false
    ignore_errors: true
    tags: [restore]

  - name: "State Guard Restore - Restore /etc/fstab from snapshot"
    ansible.builtin.copy:
      src: "{{ backup_dir }}/fstab.present"
      dest: "/etc/fstab"
      remote_src: true
    when: _sg_restore_fstab.stat.exists | default(false)
    failed_when: false
    ignore_errors: true
    tags: [restore]

  - name: "State Guard Restore - Read saved mount options"
    ansible.builtin.slurp:
      src: "{{ backup_dir }}/fstab.present"
    register: _sg_restore_mount_data
    failed_when: false
    ignore_errors: true
    tags: [restore]

  - name: "State Guard Restore - Remount /dev/shm with original options"
    ansible.builtin.shell: mount -o remount /dev/shm
    args:
      executable: /bin/bash
    when: _sg_restore_mount_data is not failed and _sg_restore_mount_data.content is defined
    failed_when: false
    ignore_errors: true
    tags: [restore]

  - name: "State Guard Restore - Remove checkpoint"
    ansible.builtin.file:
      path: "{{ backup_dir }}"
      state: absent
    when: _sg_restore_flag.stat.exists | default(false)
    failed_when: false
    ignore_errors: true
    tags: [restore]
