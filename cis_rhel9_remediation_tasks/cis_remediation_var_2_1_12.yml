playbook_name: "remediate_cis_2_1_12"
backup_dir: "/var/log/ai-playbooks-backup/{{ playbook_name }}"
package_name: "rpcbind"
service_socket: "rpcbind.socket"
service_unit: "rpcbind.service"
req_01: "Apply stop rpcbind.socket and rpcbind.service using command: `systemctl stop rpcbind.socket rpcbind.service`. Expected result: The services are stopped immediately."
req_02: "Apply remove the rpcbind package using command: `dnf remove rpcbind`. Expected result: The rpcbind package is removed from the system."
req_03: "Apply mask rpcbind.socket and rpcbind.service using command: `systemctl mask rpcbind.socket rpcbind.service`. Expected result: The services are masked and cannot be started."
req_04: "Verify that rpcbind services are not active or enabled using command: `systemctl is-active rpcbind.socket rpcbind.service && systemctl is-enabled rpcbind.socket rpcbind.service`. Expected result: The commands return 'inactive' and 'masked' or 'disabled' for each service."
req_05: "Store the final remediation result in a variable named 'cis_result' using set_fact. Set cis_result to the overall remediation status (PASS/FAIL/SKIP/ERROR) derived from the last requirement's status variable."
