playbook_name: "cis_2_1_11"
backup_dir: "/var/log/ai-playbooks-backup/{{ playbook_name }}"
req_01: "Apply stop cups.socket and cups.service using command: `systemctl stop cups.socket cups.service`. Expected result: The services are stopped."
req_02: "Apply remove the cups package using command: `dnf remove cups`. Expected result: The cups package is removed."
req_03: "Apply mask cups.socket and cups.service using command: `systemctl mask cups.socket cups.service`. Expected result: The services are masked and cannot be started."
req_04: "Verify that cups services are not active using command: `systemctl is-active cups.socket cups.service`. Expected result: inactive"
req_05: "Verify that cups package is removed or masked using command: `rpm -q cups` or `systemctl is-enabled cups.socket cups.service`. Expected result: package not installed or services disabled/masked."
req_06: "Store the final remediation result in a variable named 'cis_result' using set_fact. Set cis_result to the overall remediation status (PASS/FAIL/SKIP/ERROR) derived from the last requirement's status variable."
