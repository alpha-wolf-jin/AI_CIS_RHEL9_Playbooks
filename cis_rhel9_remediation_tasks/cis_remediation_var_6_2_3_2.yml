playbook_name: "cis_6_2_3_2_rsyslog_enabled_active"
backup_dir: "/var/log/ai-playbooks-backup/{{ playbook_name }}"
service_name: "rsyslog"
package_name: "rsyslog"
req_01: "Check if rsyslog is being used for logging on the system. Expected result: rsyslog is identified as the active logging service."
req_02: "Unmask rsyslog.service using command: `systemctl unmask rsyslog.service`. Expected result: rsyslog.service is unmasked."
req_03: "Enable rsyslog.service using command: `systemctl enable rsyslog.service`. Expected result: rsyslog.service is enabled to start on boot."
req_04: "Start rsyslog.service using command: `systemctl start rsyslog.service`. Expected result: rsyslog.service is active and running."
req_05: "Verify rsyslog.service is enabled and active using command: `systemctl is-enabled rsyslog.service && systemctl is-active rsyslog.service`. Expected result: Both commands return 'enabled' and 'active' respectively."
