---
- name: Initialize meta data variables
  include_vars: cis_remediation_var_6_3_3_20.yml

- name: "Snapshot - Create backup directory"
  ansible.builtin.file:
    path: "{{ backup_dir }}"
    state: directory
    mode: '0700'
  tags: [snapshot]
- name: "Snapshot - Check if config file exists"
  ansible.builtin.stat:
    path: "{{ audit_rules_file }}"
  register: _snapshot_config_stat
  tags: [snapshot]
- name: "Snapshot - Backup config file if exists"
  ansible.builtin.copy:
    src: "{{ audit_rules_file }}"
    dest: "{{ backup_dir }}/99-finalize.rules.present"
    remote_src: true
  when: "_snapshot_config_stat.stat.exists"
  tags: [snapshot]

- name: "Initialize data variables"
  ansible.builtin.set_fact:
    data_01: "Not collected yet"
    status_01: "UNKNOWN"
    details_01: "Not evaluated"
    data_02: "Not collected yet"
    status_02: "UNKNOWN"
    details_02: "Not evaluated"
    data_03: "Not collected yet"
    status_03: "UNKNOWN"
    details_03: "Not evaluated"
    data_04: "Not collected yet"
    status_04: "UNKNOWN"
    details_04: "Not evaluated"
    data_05: "Not collected yet"
    status_05: "UNKNOWN"
    details_05: "Not evaluated"
    task_01_name: "Not executed"
    task_01_cmd: "N/A"
    task_01_rc: -1
    task_02_name: "Not executed"
    task_02_cmd: "N/A"
    task_02_rc: -1
    task_03_name: "Not executed"
    task_03_cmd: "N/A"
    task_03_rc: -1
    task_04_name: "Not executed"
    task_04_cmd: "N/A"
    task_04_rc: -1
    task_05_name: "Not executed"
    task_05_cmd: "N/A"
    task_05_rc: -1
  tags: [always]
- block:
  - name: "Req 01 - Check if auditd is installed"
    ansible.builtin.shell: |
      set -o pipefail
      if command -v dpkg > /dev/null 2>&1; then
        dpkg -l auditd 2>/dev/null | grep -q '^ii' && echo "INSTALLED" || echo "NOT_INSTALLED"
      elif command -v rpm > /dev/null 2>&1; then
        rpm -q audit 2>/dev/null && echo "INSTALLED" || echo "NOT_INSTALLED"
      else
        echo "NOT_INSTALLED"
      fi
    args:
      executable: /bin/bash
    register: result_01
    failed_when: false
    changed_when: false
    tags: [execute]

  - name: "Store requirement 01 details"
    ansible.builtin.set_fact:
      task_01_name: "Check if auditd is installed"
      task_01_cmd: "dpkg -l auditd || rpm -q audit"
      task_01_rc: "{{ result_01.rc | default(-1) }}"
      data_01: "{{ result_01.stdout | default('') | trim }}"
      status_01: "{{ 'SKIP' if 'NOT_INSTALLED' in (result_01.stdout | default('')) else ('PASS' if 'INSTALLED' in (result_01.stdout | default('')) else 'FAIL') }}"
      details_01: "{{ 'auditd is installed' if 'INSTALLED' in (result_01.stdout | default('')) else ('auditd is NOT installed - skipping remediation' if 'NOT_INSTALLED' in (result_01.stdout | default('')) else 'Failed to check auditd installation') }}"
    tags: [execute]

  - name: "Req 02 - Add immutable audit rule to rules file"
    ansible.builtin.lineinfile:
      path: "{{ audit_rules_file }}"
      line: "-e 2"
      create: true
      mode: '0640'
    when:
    - "'INSTALLED' in (result_01.stdout | default(''))"
    register: result_02
    failed_when: false
    tags: [execute]

  - name: "Store requirement 02 details"
    ansible.builtin.set_fact:
      task_02_name: "Add immutable audit rule to rules file"
      task_02_cmd: "lineinfile: path={{ audit_rules_file }} line='-e 2'"
      task_02_rc: "{{ 0 if result_02 is not skipped else 0 }}"
      data_02: "{{ 'Rule added/verified' if result_02 is not skipped else 'Skipped' }}"
      status_02: "{{ 'SKIP' if result_02 is skipped else ('PASS' if result_02 is not failed else 'FAIL') }}"
      details_02: "{{ 'auditd not installed - skipped' if result_02 is skipped else ('Immutable rule -e 2 added/verified in ' + audit_rules_file) if result_02 is not failed else 'Failed to add immutable rule: ' + (result_02.msg | default('unknown error')) }}"
    tags: [execute]

  - name: "Req 03 - Merge and load audit rules"
    ansible.builtin.shell: augenrules --load
    args:
      executable: /bin/bash
    register: result_03
    failed_when: false
    when:
    - "'INSTALLED' in (result_01.stdout | default(''))"
    tags: [execute]

  - name: "Store requirement 03 details"
    ansible.builtin.set_fact:
      task_03_name: "Merge and load audit rules"
      task_03_cmd: "augenrules --load"
      task_03_rc: "{{ result_03.rc | default(-1) if result_03 is not skipped else 0 }}"
      data_03: "{{ result_03.stdout | default('') | trim if result_03 is not skipped else 'Skipped' }}"
      status_03: "{{ 'SKIP' if result_03 is skipped else ('PASS' if result_03.rc | default(-1) == 0 else 'FAIL') }}"
      details_03: "{{ 'auditd not installed - skipped' if result_03 is skipped else 'Rules loaded successfully' if result_03.rc | default(-1) == 0 else 'Failed to load rules: ' + (result_03.stderr | default('') | trim) }}"
    tags: [execute]

  - name: "Req 04 - Check if reboot is required"
    ansible.builtin.shell: |
      set -o pipefail
      if [[ $(auditctl -s | grep 'enabled') =~ '2' ]]; then
        printf 'Reboot required to load rules\n'
      else
        printf 'No reboot required\n'
      fi
    args:
      executable: /bin/bash
    register: result_04
    failed_when: false
    changed_when: false
    when:
    - "'INSTALLED' in (result_01.stdout | default(''))"
    tags: [execute]

  - name: "Store requirement 04 details"
    ansible.builtin.set_fact:
      task_04_name: "Check if reboot is required"
      task_04_cmd: "auditctl -s | grep 'enabled'"
      task_04_rc: "{{ result_04.rc | default(-1) if result_04 is not skipped else 0 }}"
      data_04: "{{ result_04.stdout | default('') | trim if result_04 is not skipped else 'Skipped' }}"
      status_04: "{{ 'SKIP' if result_04 is skipped else ('PASS' if result_04.rc | default(-1) == 0 else 'FAIL') }}"
      details_04: "{{ 'auditd not installed - skipped' if result_04 is skipped else result_04.stdout | default('') | trim if result_04.rc | default(-1) == 0 else 'Failed to check reboot status' }}"
    tags: [execute]

  - name: "Req 05 - Verify audit configuration is immutable"
    ansible.builtin.shell: |
      set -o pipefail
      auditctl -s | grep enabled
    args:
      executable: /bin/bash
    register: result_05
    failed_when: false
    changed_when: false
    when:
    - "'INSTALLED' in (result_01.stdout | default(''))"
    tags: [execute]

  - name: "Store requirement 05 details"
    ansible.builtin.set_fact:
      task_05_name: "Verify audit configuration is immutable"
      task_05_cmd: "auditctl -s | grep enabled"
      task_05_rc: "{{ result_05.rc | default(-1) if result_05 is not skipped else 0 }}"
      data_05: "{{ result_05.stdout | default('') | trim if result_05 is not skipped else 'Skipped' }}"
      status_05: "{{ 'SKIP' if result_05 is skipped else ('PASS' if 'enabled 2' in (result_05.stdout | default('')) else 'FAIL') }}"
      details_05: "{{ 'auditd not installed - skipped' if result_05 is skipped else 'Immutable config confirmed' if 'enabled 2' in (result_05.stdout | default('')) else 'Immutable config NOT confirmed: ' + (result_05.stdout | default('') | trim) }}"
    tags: [execute]

  - name: "Store final cis_result variable"
    ansible.builtin.set_fact:
      cis_result: >-
        {{ 'PASS' if status_01 == 'PASS' and status_02 == 'PASS' and status_03 == 'PASS' and status_04 == 'PASS' and status_05 == 'PASS'
           else ('SKIP' if status_01 == 'SKIP' else 'FAIL') }}
    tags: [execute]

  - name: "Generate remediation report"
    ansible.builtin.debug:
      msg:
      - "========================================================"
      - "        REMEDIATION REPORT — CIS 6.3.3.20"
      - "========================================================"
      - "Reference: CIS Benchmark checkpoint 6.3.3.20"
      - ""
      - "REQUIREMENT 01 - {{ req_01 }}:"
      - "  Task: {{ task_01_name | default('Task not recorded') }}"
      - "  Command: {{ task_01_cmd | default('N/A') }}"
      - "  Exit code: {{ task_01_rc | default(-1) }}"
      - "  Data: {{ data_01 | default('') | trim }}"
      - "  Status: {{ status_01 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_01 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 02 - {{ req_02 }}:"
      - "  Task: {{ task_02_name | default('Task not recorded') }}"
      - "  Command: {{ task_02_cmd | default('N/A') }}"
      - "  Exit code: {{ task_02_rc | default(-1) }}"
      - "  Data: {{ data_02 | default('') | trim }}"
      - "  Status: {{ status_02 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_02 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 03 - {{ req_03 }}:"
      - "  Task: {{ task_03_name | default('Task not recorded') }}"
      - "  Command: {{ task_03_cmd | default('N/A') }}"
      - "  Exit code: {{ task_03_rc | default(-1) }}"
      - "  Data: {{ data_03 | default('') | trim }}"
      - "  Status: {{ status_03 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_03 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 04 - {{ req_04 }}:"
      - "  Task: {{ task_04_name | default('Task not recorded') }}"
      - "  Command: {{ task_04_cmd | default('N/A') }}"
      - "  Exit code: {{ task_04_rc | default(-1) }}"
      - "  Data: {{ data_04 | default('') | trim }}"
      - "  Status: {{ status_04 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_04 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 05 - {{ req_05 }}:"
      - "  Task: {{ task_05_name | default('Task not recorded') }}"
      - "  Command: {{ task_05_cmd | default('N/A') }}"
      - "  Exit code: {{ task_05_rc | default(-1) }}"
      - "  Data: {{ data_05 | default('') | trim }}"
      - "  Status: {{ status_05 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_05 | default('Not evaluated') | trim }}"
      - ""
      - "========================================================"
      - "OVERALL REMEDIATION:"
      - "  Result: {{ cis_result | default('ERROR') | trim }}"
      - "  Details: {{ 'All requirements passed' if cis_result == 'PASS' else ('Prerequisite not met - remediation skipped' if cis_result == 'SKIP' else 'One or more requirements failed') }}"
      - "========================================================"
    tags: [execute]

  always:
  - name: "Restore - Check if backup exists"
    ansible.builtin.stat:
      path: "{{ backup_dir }}/99-finalize.rules.present"
    register: _restore_backup_stat
    failed_when: false
    tags: [restore]

  - name: "Restore - Overwrite with original"
    ansible.builtin.copy:
      src: "{{ backup_dir }}/99-finalize.rules.present"
      dest: "{{ audit_rules_file }}"
      remote_src: true
    when: "_restore_backup_stat.stat.exists"
    failed_when: false
    tags: [restore]

  - name: "Restore - Remove created file if no backup exists"
    ansible.builtin.file:
      path: "{{ audit_rules_file }}"
      state: absent
    when:
    - "not _restore_backup_stat.stat.exists"
    - "_snapshot_config_stat is defined"
    - "not _snapshot_config_stat.stat.exists"
    failed_when: false
    tags: [restore]

  - name: "Restore - Remove backup directory"
    ansible.builtin.file:
      path: "{{ backup_dir }}"
      state: absent
    failed_when: false
    tags: [restore]
