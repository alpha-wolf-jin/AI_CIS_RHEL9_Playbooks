---
- name: Initialize meta data variables
  include_vars: cis_remediation_var_7_1_5.yml

- name: "State Guard - Check for existing checkpoint"
  ansible.builtin.stat:
    path: "{{ state_guard_flag }}"
  register: _sg_flag
  tags: [snapshot]
- name: "State Guard - Restore /etc/shadow from prior checkpoint"
  ansible.builtin.copy:
    src: "{{ state_guard_dir }}/shadow.present"
    dest: "{{ target_file }}"
    remote_src: true
  when: "_sg_flag.stat.exists"
  failed_when: false
  tags: [snapshot]
- name: "State Guard - Remove old checkpoint"
  ansible.builtin.file:
    path: "{{ state_guard_dir }}"
    state: absent
  when: "_sg_flag.stat.exists"
  tags: [snapshot]
- name: "State Guard - Create checkpoint directory"
  ansible.builtin.file:
    path: "{{ state_guard_dir }}"
    state: directory
    mode: '0700'
  tags: [snapshot]
- name: "State Guard - Check if /etc/shadow exists"
  ansible.builtin.stat:
    path: "{{ target_file }}"
  register: _sg_shadow_stat
  tags: [snapshot]
- name: "State Guard - Backup /etc/shadow"
  ansible.builtin.copy:
    src: "{{ target_file }}"
    dest: "{{ state_guard_dir }}/shadow.present"
    remote_src: true
  when: "_sg_shadow_stat.stat.exists"
  tags: [snapshot]
- name: "State Guard - Save current permissions and ownership"
  ansible.builtin.shell: "stat -c '%U:%G %a' {{ target_file }}"
  args:
    executable: /bin/bash
  register: _sg_shadow_state
  failed_when: false
  tags: [snapshot]
- name: "State Guard - Persist permissions/ownership to file"
  ansible.builtin.copy:
    content: "{{ _sg_shadow_state.stdout | default('') }}"
    dest: "{{ state_guard_dir }}/shadow.state"
  when: "_sg_shadow_state.stdout | default('') | length > 0"
  tags: [snapshot]
- name: "State Guard - Create checkpoint flag"
  ansible.builtin.copy:
    content: "checkpoint"
    dest: "{{ state_guard_flag }}"
  tags: [snapshot]

- block:
# === STATE GUARD — EXECUTE PHASE ===
  - name: "Req 01 - Apply ownership of /etc/shadow to root:root"
    ansible.builtin.file:
      path: "{{ target_file }}"
      owner: "{{ expected_owner }}"
      group: "{{ expected_group }}"
    register: result_01
    failed_when: false
    tags: [execute]

  - name: "Req 02 - Apply permissions 0000 to /etc/shadow"
    ansible.builtin.file:
      path: "{{ target_file }}"
      mode: "{{ expected_mode }}"
    register: result_02
    failed_when: false
    tags: [execute]

  - name: "Req 03 - Verify ownership and permissions on /etc/shadow"
    ansible.builtin.shell: "stat -c '%a %U:%G' {{ target_file }}"
    args:
      executable: /bin/bash
    register: result_03
    failed_when: false
    changed_when: false
    tags: [execute]

  - name: "Store requirement details"
    ansible.builtin.set_fact:
      task_01_name: "Apply ownership of /etc/shadow to root:root"
      task_01_cmd: "chown root:root /etc/shadow"
      task_01_rc: "{{ 0 if result_01 is not failed else 1 }}"
      data_01: "{{ result_01.owner | default('') + ':' + result_01.group | default('') }}"
      status_01: "{{ 'PASS' if result_01 is not failed else 'FAIL' }}"
      details_01: "{{ 'Ownership set to root:root' if result_01 is not failed else 'Failed to set ownership' }}"
      task_02_name: "Apply permissions 0000 to /etc/shadow"
      task_02_cmd: "chmod 0000 /etc/shadow"
      task_02_rc: "{{ 0 if result_02 is not failed else 1 }}"
      data_02: "{{ result_02.mode | default('') }}"
      status_02: "{{ 'PASS' if result_02 is not failed else 'FAIL' }}"
      details_02: "{{ 'Permissions set to 0000' if result_02 is not failed else 'Failed to set permissions' }}"
      task_03_name: "Verify ownership and permissions on /etc/shadow"
      task_03_cmd: "stat -c '%a %U:%G' /etc/shadow"
      task_03_rc: "{{ result_03.rc | default(-1) }}"
      data_03: "{{ result_03.stdout | default('') | trim }}"
      status_03: "{{ 'PASS' if (result_03.stdout | default('') | trim) == '0 root:root' else 'FAIL' }}"
      details_03: "{{ 'Verification passed: ' + (result_03.stdout | default('') | trim) if (result_03.stdout | default('') | trim) == '0 root:root' else 'Verification failed: expected 0 root:root, got ' + (result_03.stdout | default('') | trim) }}"
    tags: [execute]

  - name: "Set overall remediation result"
    ansible.builtin.set_fact:
      cis_result: "{{ 'PASS' if status_03 == 'PASS' else 'FAIL' }}"
    tags: [execute]

  - name: "Store requirement 04 details"
    ansible.builtin.set_fact:
      task_04_name: "Set overall remediation result"
      task_04_cmd: "set_fact cis_result"
      task_04_rc: 0
      data_04: "{{ cis_result | default('') }}"
      status_04: "{{ 'PASS' if cis_result | default('') != '' else 'ERROR' }}"
      details_04: "{{ 'cis_result set to ' + cis_result | default('') | trim if cis_result | default('') != '' else 'Failed to set cis_result' }}"
    tags: [execute]

  - name: "Generate remediation report"
    ansible.builtin.debug:
      msg:
      - "REMEDIATION REPORT — CIS 7.1.5"
      - "Reference: CIS Benchmark checkpoint 7.1.5"
      - ""
      - "REQUIREMENT 01 - {{ req_01 }}:"
      - "  Task: {{ task_01_name | default('Task not recorded') }}"
      - "  Command: {{ task_01_cmd | default('N/A') }}"
      - "  Exit code: {{ task_01_rc | default(-1) }}"
      - "  Data: {{ data_01 | default('') | trim }}"
      - "  Status: {{ status_01 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_01 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 02 - {{ req_02 }}:"
      - "  Task: {{ task_02_name | default('Task not recorded') }}"
      - "  Command: {{ task_02_cmd | default('N/A') }}"
      - "  Exit code: {{ task_02_rc | default(-1) }}"
      - "  Data: {{ data_02 | default('') | trim }}"
      - "  Status: {{ status_02 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_02 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 03 - {{ req_03 }}:"
      - "  Task: {{ task_03_name | default('Task not recorded') }}"
      - "  Command: {{ task_03_cmd | default('N/A') }}"
      - "  Exit code: {{ task_03_rc | default(-1) }}"
      - "  Data: {{ data_03 | default('') | trim }}"
      - "  Status: {{ status_03 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_03 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 04 - {{ req_04 }}:"
      - "  Task: {{ task_04_name | default('Task not recorded') }}"
      - "  Command: {{ task_04_cmd | default('N/A') }}"
      - "  Exit code: {{ task_04_rc | default(-1) }}"
      - "  Data: {{ data_04 | default('') | trim }}"
      - "  Status: {{ status_04 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_04 | default('Not evaluated') | trim }}"
      - ""
      - "========================================================"
      - "OVERALL REMEDIATION:"
      - "  Result: {{ cis_result | default('ERROR') | trim }}"
      - "  Details: {{ details_03 | default('Not evaluated') | trim }}"
      - "========================================================"
    tags: [execute]

  always:
# === STATE GUARD — RESTORE PHASE (GUARANTEED) ===
  - name: "State Guard Restore - Check if checkpoint exists"
    ansible.builtin.stat:
      path: "{{ state_guard_flag }}"
    register: _sg_restore_flag
    failed_when: false
    tags: [restore]

  - name: "State Guard Restore - Check if shadow backup exists"
    ansible.builtin.stat:
      path: "{{ state_guard_dir }}/shadow.present"
    register: _sg_restore_shadow
    failed_when: false
    tags: [restore]

  - name: "State Guard Restore - Restore /etc/shadow from backup"
    ansible.builtin.copy:
      src: "{{ state_guard_dir }}/shadow.present"
      dest: "{{ target_file }}"
      remote_src: true
    when: "_sg_restore_shadow.stat.exists | default(false)"
    failed_when: false
    tags: [restore]

  - name: "State Guard Restore - Remove checkpoint"
    ansible.builtin.file:
      path: "{{ state_guard_dir }}"
      state: absent
    when: "_sg_restore_flag.stat.exists | default(false)"
    failed_when: false
    tags: [restore]
