playbook_name: "cis_5_1_20_permitrootlogin"
backup_dir: "/var/log/ai-playbooks-backup/{{ playbook_name }}"
config_file: "/etc/ssh/sshd_config"
config_param: "PermitRootLogin"
config_value: "no"
package_name: "openssh-server"
req_01: "Apply prerequisite check: ensure openssh-server is installed using command: `dpkg -l | grep -q openssh-server`. Expected result: exit code 0."
req_02: "Apply configuration change: set PermitRootLogin to no in /etc/ssh/sshd_config using command: `sudo sed -i 's/^#*PermitRootLogin.*/PermitRootLogin no/' /etc/ssh/sshd_config`. Expected result: no output, file updated."
req_03: "Apply configuration change: ensure the directive appears before any Include or Match entries using command: `sudo sed -i '/^Include/i PermitRootLogin no' /etc/ssh/sshd_config && sudo sed -i '/^Match/i PermitRootLogin no' /etc/ssh/sshd_config && sudo awk '!seen[$0]++' /etc/ssh/sshd_config > /tmp/sshd_config && sudo mv /tmp/sshd_config /etc/ssh/sshd_config`. Expected result: file reordered, duplicates removed."
req_04: "Apply restart service: restart SSH daemon to apply changes using command: `sudo systemctl restart sshd`. Expected result: service restarts without error."
req_05: "Verify step: confirm PermitRootLogin is set to no using command: `sudo sshd -T | grep -i permitrootlogin`. Expected result: output contains 'permitrootlogin no'."
req_06: "Store the final remediation result in a variable named 'cis_result' using set_fact. Set cis_result to the overall remediation status (PASS/FAIL/SKIP/ERROR) derived from the last requirement's status variable."
