---
- name: Initialize meta data variables
  include_vars: cis_remediation_var_6_2_1_2.yml

- name: "Snapshot - Create backup directory"
  ansible.builtin.file:
    path: "{{ backup_dir }}"
    state: directory
    mode: '0700'
  tags: [snapshot]
- name: "Snapshot - Check if target config file exists"
  ansible.builtin.stat:
    path: "{{ target_config }}"
  register: _snap_target_stat
  tags: [snapshot]
- name: "Snapshot - Backup target config file if exists"
  ansible.builtin.copy:
    src: "{{ target_config }}"
    dest: "{{ backup_dir }}/systemd.conf.present"
    remote_src: true
  when: _snap_target_stat.stat.exists
  tags: [snapshot]
- name: "Snapshot - Mark target config as absent if not exists"
  ansible.builtin.copy:
    content: "absent"
    dest: "{{ backup_dir }}/systemd.conf.absent"
  when: not _snap_target_stat.stat.exists
  tags: [snapshot]

- block:
  - name: "Req 01 - Check if systemd-journald is installed"
    ansible.builtin.package_facts:
      manager: auto
    failed_when: false
    tags: [execute]

  - name: "Req 01 - Set skip fact if systemd not installed"
    ansible.builtin.set_fact:
      playbook_skipped: "{{ 'systemd' not in ansible_facts.packages }}"
    tags: [execute]

  - name: "Req 01 - Check if default config exists and is appropriate"
    ansible.builtin.shell: |
      if [ -f "{{ source_config }}" ]; then
        grep -q '^f /var/log/journal' "{{ source_config }}" 2>/dev/null && echo "DEFAULT_EXISTS_WITH_JOURNAL" || echo "DEFAULT_EXISTS_NO_JOURNAL"
      else
        echo "DEFAULT_NOT_FOUND"
      fi
    args:
      executable: /bin/bash
    register: result_01
    failed_when: false
    changed_when: false
    when: "not (playbook_skipped | default(false) | bool)"
    tags: [execute]

  - name: "Req 02 - Copy default tmpfiles configuration to override directory"
    ansible.builtin.copy:
      src: "{{ source_config }}"
      dest: "{{ target_config }}"
      remote_src: true
    register: result_02
    failed_when: false
    when:
    - "not (playbook_skipped | default(false) | bool)"
    - "result_01.stdout | default('') | trim in ['DEFAULT_EXISTS_WITH_JOURNAL', 'DEFAULT_EXISTS_NO_JOURNAL']"
    tags: [execute]

  - name: "Req 03 - Set journal log file permissions in tmpfiles configuration"
    ansible.builtin.lineinfile:
      path: "{{ target_config }}"
      regexp: '^f /var/log/journal'
      line: "f /var/log/journal {{ desired_perms }} {{ desired_owner }} {{ desired_group }} -"
    register: result_03
    failed_when: false
    when:
    - "not (playbook_skipped | default(false) | bool)"
    - "result_01.stdout | default('') | trim in ['DEFAULT_EXISTS_WITH_JOURNAL', 'DEFAULT_EXISTS_NO_JOURNAL']"
    tags: [execute]

  - name: "Req 04 - Verify journal log file permissions are configured correctly"
    ansible.builtin.shell: "grep '^f /var/log/journal' {{ target_config }}"
    args:
      executable: /bin/bash
    register: result_04
    failed_when: false
    changed_when: false
    when:
    - "not (playbook_skipped | default(false) | bool)"
    - "result_01.stdout | default('') | trim in ['DEFAULT_EXISTS_WITH_JOURNAL', 'DEFAULT_EXISTS_NO_JOURNAL']"
    tags: [execute]

  - name: "Generate remediation report"
    ansible.builtin.set_fact:
      task_01_name: "Check if default configuration is appropriate"
      task_01_cmd: "grep -q '^f /var/log/journal' {{ source_config }}"
      task_01_rc: "{{ result_01.rc | default(-1) }}"
      data_01: "{{ result_01.stdout | default('') | trim }}"
      status_01: "{{ 'SKIPPED' if (playbook_skipped | default(false) | bool) else ('PASS' if result_01.stdout | default('') | trim in ['DEFAULT_EXISTS_WITH_JOURNAL', 'DEFAULT_EXISTS_NO_JOURNAL'] else 'FAIL') }}"
      details_01: "{{ 'systemd not installed' if (playbook_skipped | default(false) | bool) else ('Default config found with journal entry' if result_01.stdout | default('') | trim == 'DEFAULT_EXISTS_WITH_JOURNAL' else ('Default config found without journal entry — proceeding with remediation' if result_01.stdout | default('') | trim == 'DEFAULT_EXISTS_NO_JOURNAL' else 'Default config not found')) }}"
      task_02_name: "Copy default tmpfiles configuration"
      task_02_cmd: "cp {{ source_config }} {{ target_config }}"
      task_02_rc: "{{ 0 if not result_02.failed | default(false) else 1 }}"
      data_02: "{{ 'File copied' if result_02.changed | default(false) else 'File already exists' }}"
      status_02: "{{ 'SKIPPED' if (playbook_skipped | default(false) | bool) or result_01.stdout | default('') | trim not in ['DEFAULT_EXISTS_WITH_JOURNAL', 'DEFAULT_EXISTS_NO_JOURNAL'] else ('PASS' if not result_02.failed | default(false) else 'FAIL') }}"
      details_02: "{{ 'Skipped - not applicable' if (playbook_skipped | default(false) | bool) or result_01.stdout | default('') | trim not in ['DEFAULT_EXISTS_WITH_JOURNAL', 'DEFAULT_EXISTS_NO_JOURNAL'] else ('Copied successfully' if not result_02.failed | default(false) else 'Copy failed') }}"
      task_03_name: "Set journal log file permissions"
      task_03_cmd: "lineinfile: regexp='^f /var/log/journal' line='f /var/log/journal {{ desired_perms }} {{ desired_owner }} {{ desired_group }} -'"
      task_03_rc: "{{ 0 if result_03.changed | default(false) or not result_03.failed | default(false) else 1 }}"
      data_03: "{{ 'Permissions set to ' + desired_perms if result_03.changed | default(false) else 'Permissions already correct' }}"
      status_03: "{{ 'SKIPPED' if (playbook_skipped | default(false) | bool) or result_01.stdout | default('') | trim not in ['DEFAULT_EXISTS_WITH_JOURNAL', 'DEFAULT_EXISTS_NO_JOURNAL'] else ('PASS' if not result_03.failed | default(false) else 'FAIL') }}"
      details_03: "{{ 'Skipped - not applicable' if (playbook_skipped | default(false) | bool) or result_01.stdout | default('') | trim not in ['DEFAULT_EXISTS_WITH_JOURNAL', 'DEFAULT_EXISTS_NO_JOURNAL'] else ('Permissions updated' if result_03.changed | default(false) else 'Permissions already correct') }}"
      task_04_name: "Verify journal log file permissions"
      task_04_cmd: "grep '^f /var/log/journal' {{ target_config }}"
      task_04_rc: "{{ result_04.rc | default(-1) }}"
      data_04: "{{ result_04.stdout | default('') | trim }}"
      status_04: "{{ 'SKIPPED' if (playbook_skipped | default(false) | bool) or result_01.stdout | default('') | trim not in ['DEFAULT_EXISTS_WITH_JOURNAL', 'DEFAULT_EXISTS_NO_JOURNAL'] else ('PASS' if result_04.rc | default(-1) == 0 and desired_perms in result_04.stdout | default('') else 'FAIL') }}"
      details_04: "{{ 'Skipped - not applicable' if (playbook_skipped | default(false) | bool) or result_01.stdout | default('') | trim not in ['DEFAULT_EXISTS_WITH_JOURNAL', 'DEFAULT_EXISTS_NO_JOURNAL'] else ('Verified: ' + result_04.stdout | default('') | trim if result_04.rc | default(-1) == 0 else 'Verification failed') }}"
    tags: [execute]

  - name: "Generate remediation report"
    ansible.builtin.debug:
      msg:
      - "========================================================"
      - "        REMEDIATION REPORT — CIS 6.2.1.2"
      - "========================================================"
      - "Reference: CIS Benchmark checkpoint 6.2.1.2"
      - ""
      - "REQUIREMENT 01 - {{ req_01 }}:"
      - "  Task: {{ task_01_name | default('Task not recorded') }}"
      - "  Command: {{ task_01_cmd | default('N/A') }}"
      - "  Exit code: {{ task_01_rc | default(-1) }}"
      - "  Data: {{ data_01 | default('') | trim }}"
      - "  Status: {{ status_01 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_01 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 02 - {{ req_02 }}:"
      - "  Task: {{ task_02_name | default('Task not recorded') }}"
      - "  Command: {{ task_02_cmd | default('N/A') }}"
      - "  Exit code: {{ task_02_rc | default(-1) }}"
      - "  Data: {{ data_02 | default('') | trim }}"
      - "  Status: {{ status_02 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_02 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 03 - {{ req_03 }}:"
      - "  Task: {{ task_03_name | default('Task not recorded') }}"
      - "  Command: {{ task_03_cmd | default('N/A') }}"
      - "  Exit code: {{ task_03_rc | default(-1) }}"
      - "  Data: {{ data_03 | default('') | trim }}"
      - "  Status: {{ status_03 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_03 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 04 - {{ req_04 }}:"
      - "  Task: {{ task_04_name | default('Task not recorded') }}"
      - "  Command: {{ task_04_cmd | default('N/A') }}"
      - "  Exit code: {{ task_04_rc | default(-1) }}"
      - "  Data: {{ data_04 | default('') | trim }}"
      - "  Status: {{ status_04 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_04 | default('Not evaluated') | trim }}"
      - ""
      - "========================================================"
      - "OVERALL REMEDIATION:"
      - "  Result: {{ status_04 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_04 | default('Not evaluated') | trim }}"
      - "========================================================"
    tags: [execute]

  always:
  - name: "Restore - Check if backup exists"
    ansible.builtin.stat:
      path: "{{ backup_dir }}/systemd.conf.present"
    register: _restore_present
    failed_when: false
    tags: [restore]

  - name: "Restore - Restore original config from backup"
    ansible.builtin.copy:
      src: "{{ backup_dir }}/systemd.conf.present"
      dest: "{{ target_config }}"
      remote_src: true
    when: _restore_present.stat.exists | default(false)
    failed_when: false
    tags: [restore]

  - name: "Restore - Check if absent marker exists"
    ansible.builtin.stat:
      path: "{{ backup_dir }}/systemd.conf.absent"
    register: _restore_absent
    failed_when: false
    tags: [restore]

  - name: "Restore - Remove config file if it was absent before"
    ansible.builtin.file:
      path: "{{ target_config }}"
      state: absent
    when: _restore_absent.stat.exists | default(false)
    failed_when: false
    tags: [restore]

  - name: "Restore - Remove backup directory"
    ansible.builtin.file:
      path: "{{ backup_dir }}"
      state: absent
    failed_when: false
    tags: [restore]
