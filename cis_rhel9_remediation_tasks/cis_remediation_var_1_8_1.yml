playbook_name: "cis_1_8_1_remediation"
backup_dir: "/var/log/ai-playbooks-backup/{{ playbook_name }}"
package_name: "gdm"
req_01: "Apply removal of GNOME Display Manager using command: `dnf remove gdm`. Expected result: The gdm package is removed from the system."
req_02: "Verify GNOME Display Manager is removed using command: `rpm -q gdm`. Expected result: The command returns 'package gdm is not installed' or exits with a non-zero status."
req_03: "Store the final remediation result in a variable named 'cis_result' using set_fact. Set cis_result to the overall remediation status (PASS/FAIL/SKIP/ERROR) derived from the last requirement's status variable."
