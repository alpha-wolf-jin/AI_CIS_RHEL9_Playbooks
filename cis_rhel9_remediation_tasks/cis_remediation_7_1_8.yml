---
- name: Initialize meta data variables
  include_vars: cis_remediation_var_7_1_8.yml

- name: "Snapshot - Create backup directory"
  ansible.builtin.file:
    path: "{{ backup_dir }}"
    state: directory
    mode: '0700'
  tags: [snapshot]
- name: "Snapshot - Check if config file exists"
  ansible.builtin.stat:
    path: "{{ target_file }}"
  register: _backup_stat
  failed_when: false
  tags: [snapshot]
- name: "Snapshot - Backup config file if exists"
  ansible.builtin.copy:
    src: "{{ target_file }}"
    dest: "{{ backup_dir }}/gshadow-.backup"
    remote_src: true
  when: "_backup_stat.stat.exists | default(false)"
  failed_when: false
  tags: [snapshot]

- block:
  - name: "Req 01 - Apply ownership of /etc/gshadow- to root:root"
    ansible.builtin.file:
      path: "{{ target_file }}"
      owner: root
      group: root
    register: result_01
    failed_when: false
    tags: [execute]

  - name: "Req 02 - Apply permissions of 0000 on /etc/gshadow-"
    ansible.builtin.file:
      path: "{{ target_file }}"
      mode: '0000'
    register: result_02
    failed_when: false
    tags: [execute]

  - name: "Req 03 - Verify permissions and ownership on /etc/gshadow-"
    ansible.builtin.shell: "stat -c '%a %U:%G' {{ target_file }}"
    args:
      executable: /bin/bash
    register: result_03
    failed_when: false
    changed_when: false
    tags: [execute]

  - name: "Store requirement details"
    ansible.builtin.set_fact:
      task_01_name: "Apply ownership of /etc/gshadow- to root:root"
      task_01_cmd: "chown root:root /etc/gshadow-"
      task_01_rc: "{{ result_01.rc | default(-1) }}"
      data_01: "{{ result_01.msg | default('') | trim }}"
      status_01: "{{ 'APPLIED' if not (result_01.failed | default(false)) else 'FAILED' }}"
      details_01: "{{ 'Ownership set to root:root' if not (result_01.failed | default(false)) else 'Failed to set ownership' }}"
      task_02_name: "Apply permissions of 0000 on /etc/gshadow-"
      task_02_cmd: "chmod 0000 /etc/gshadow-"
      task_02_rc: "{{ result_02.rc | default(-1) }}"
      data_02: "{{ result_02.msg | default('') | trim }}"
      status_02: "{{ 'APPLIED' if not (result_02.failed | default(false)) else 'FAILED' }}"
      details_02: "{{ 'Permissions set to 0000' if not (result_02.failed | default(false)) else 'Failed to set permissions' }}"
      task_03_name: "Verify permissions and ownership on /etc/gshadow-"
      task_03_cmd: "stat -c '%a %U:%G' /etc/gshadow-"
      task_03_rc: "{{ result_03.rc | default(-1) }}"
      data_03: "{{ result_03.stdout | default('') | trim }}"
      status_03: "{{ 'APPLIED' if (result_03.stdout | default('') | trim) == '0 root:root' else 'FAILED' }}"
      details_03: "{{ 'Verification passed: ' + (result_03.stdout | default('') | trim) if (result_03.stdout | default('') | trim) == '0 root:root' else 'Verification failed: expected 0 root:root, got ' + (result_03.stdout | default('') | trim) }}"
    tags: [execute]

  - name: "Store overall remediation result"
    ansible.builtin.set_fact:
      cis_result: "{{ 'PASS' if (status_01 == 'APPLIED' and status_02 == 'APPLIED' and status_03 == 'APPLIED') else 'FAIL' }}"
    tags: [execute]

  - name: "Generate remediation report"
    ansible.builtin.debug:
      msg:
      - "========================================================"
      - "REMEDIATION REPORT — CIS 7.1.8"
      - "Reference: CIS Benchmark checkpoint 7.1.8"
      - "========================================================"
      - ""
      - "REQUIREMENT 01 - {{ req_01 }}:"
      - "  Task: {{ task_01_name | default('Task not recorded') }}"
      - "  Command: {{ task_01_cmd | default('N/A') }}"
      - "  Exit code: {{ task_01_rc | default(-1) }}"
      - "  Data: {{ data_01 | default('') | trim }}"
      - "  Status: {{ status_01 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_01 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 02 - {{ req_02 }}:"
      - "  Task: {{ task_02_name | default('Task not recorded') }}"
      - "  Command: {{ task_02_cmd | default('N/A') }}"
      - "  Exit code: {{ task_02_rc | default(-1) }}"
      - "  Data: {{ data_02 | default('') | trim }}"
      - "  Status: {{ status_02 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_02 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 03 - {{ req_03 }}:"
      - "  Task: {{ task_03_name | default('Task not recorded') }}"
      - "  Command: {{ task_03_cmd | default('N/A') }}"
      - "  Exit code: {{ task_03_rc | default(-1) }}"
      - "  Data: {{ data_03 | default('') | trim }}"
      - "  Status: {{ status_03 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_03 | default('Not evaluated') | trim }}"
      - ""
      - "========================================================"
      - "OVERALL REMEDIATION:"
      - "  Result: {{ cis_result | default('ERROR') | trim }}"
      - "  Details: {{ details_03 | default('Not evaluated') | trim }}"
      - "========================================================"
    tags: [execute]

  always:
  - name: "Restore - Check if backup exists"
    ansible.builtin.stat:
      path: "{{ backup_dir }}/gshadow-.backup"
    register: _restore_stat
    failed_when: false
    tags: [restore]

  - name: "Restore - Overwrite with original"
    ansible.builtin.copy:
      src: "{{ backup_dir }}/gshadow-.backup"
      dest: "{{ target_file }}"
      remote_src: true
    when: "_restore_stat.stat.exists | default(false)"
    failed_when: false
    tags: [restore]

  - name: "Restore - Remove backup directory"
    ansible.builtin.file:
      path: "{{ backup_dir }}"
      state: absent
    failed_when: false
    tags: [restore]
