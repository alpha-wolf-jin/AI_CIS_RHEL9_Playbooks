---
- name: Initialize meta data variables
  include_vars: cis_remediation_var_1_1_2_1_2.yml

- name: "Snapshot - Create backup directory"
  file:
    path: "{{ backup_dir }}"
    state: directory
    mode: '0700'
  tags: [snapshot]
- name: "Snapshot - Check if /etc/fstab exists"
  stat:
    path: /etc/fstab
  register: fstab_stat
  tags: [snapshot]
- name: "Snapshot - Backup /etc/fstab"
  copy:
    src: /etc/fstab
    dest: "{{ backup_dir }}/fstab.bak"
    remote_src: true
  when: fstab_stat.stat.exists
  tags: [snapshot]

- block:
  - name: "Initialize data variables"
    set_fact:
      task_01_name: "Req 1 - Check /tmp partition"
      task_01_cmd: |
        mount | grep -E '\\s/tmp\\s'
      task_01_rc: -1
      data_01: ""
      status_01: "UNKNOWN"
      details_01: ""
      task_02_name: "Req 2 - Add nodev to /etc/fstab"
      task_02_cmd: |
        if ! grep -E '^\\S+\\s+/tmp\\s+\\S+\\s+[^#]*\\bnodev\\b' /etc/fstab; then sed -i 's|\\(\\s/tmp\\s\\+\\S\\+\\s\\+\\S\\+\\)|\\1,nodev|' /etc/fstab; fi
      task_02_rc: -1
      data_02: ""
      status_02: "UNKNOWN"
      details_02: ""
      task_03_name: "Req 3 - Remount /tmp"
      task_03_cmd: "mount -o remount /tmp"
      task_03_rc: -1
      data_03: ""
      status_03: "UNKNOWN"
      details_03: ""
      task_04_name: "Req 4 - Verify nodev on /tmp"
      task_04_cmd: |
        mount | grep -E '\\s/tmp\\s' | grep -o 'nodev'
      task_04_rc: -1
      data_04: ""
      status_04: "UNKNOWN"
      details_04: ""
    tags: [execute]

  - name: "Req 1 - Check if separate partition exists for /tmp"
    shell: mount | grep -E '\s/tmp\s'
    args:
      executable: /bin/bash
    register: result_01
    failed_when: false
    tags: [execute]

  - name: "Store requirement 01 details"
    set_fact:
      task_01_rc: "{{ result_01.rc | default(-1) }}"
      data_01: "{{ result_01.stdout | default('') | trim }}"
      status_01: "{{ 'PASS' if (result_01.rc | default(-1)) == 0 else 'FAIL' }}"
      details_01: "{{ 'Partition exists' if (result_01.rc | default(-1)) == 0 else 'No separate /tmp partition found' }}"
    tags: [execute]

  - name: "Req 2 - Add nodev to /tmp options in /etc/fstab"
    shell: |
      if ! grep -E '^\S+\s+/tmp\s+\S+\s+[^#]*\bnodev\b' /etc/fstab; then
        sed -i 's|\(\s/tmp\s\+\S\+\s\+\S\+\)|\1,nodev|' /etc/fstab
      fi
    args:
      executable: /bin/bash
    register: result_02
    failed_when: false
    tags: [execute]

  - name: "Store requirement 02 details - capture fstab line after edit"
    shell: grep -E '^\S+\s+/tmp\s+' /etc/fstab
    args:
      executable: /bin/bash
    register: result_02_data
    failed_when: false
    tags: [execute]

  - name: "Set requirement 02 facts"
    set_fact:
      task_02_rc: "{{ result_02.rc | default(0) }}"
      data_02: "{{ result_02_data.stdout | default('') | trim }}"
      status_02: "{{ 'PASS' if (result_02_data.rc | default(1)) == 0 else 'FAIL' }}"
      details_02: "{{ 'nodev added or already present' if (result_02_data.rc | default(1)) == 0 else 'Failed to modify' }}"
    tags: [execute]

  - name: "Req 3 - Remount /tmp with updated options"
    shell: mount -o remount /tmp
    args:
      executable: /bin/bash
    register: result_03
    failed_when: false
    tags: [execute]

  - name: "Store requirement 03 details"
    set_fact:
      task_03_rc: "{{ result_03.rc | default(-1) }}"
      data_03: "{{ result_03.stdout | default('') | trim }}"
      status_03: "{{ 'PASS' if (result_03.rc | default(-1)) == 0 else 'FAIL' }}"
      details_03: "{{ 'Remounted successfully' if (result_03.rc | default(-1)) == 0 else 'Remount failed' }}"
    tags: [execute]

  - name: "Req 4 - Verify nodev option is set on /tmp"
    shell: mount | grep -E '\s/tmp\s' | grep -o 'nodev'
    args:
      executable: /bin/bash
    register: result_04
    failed_when: false
    tags: [execute]

  - name: "Store requirement 04 details"
    set_fact:
      task_04_rc: "{{ result_04.rc | default(-1) }}"
      data_04: "{{ result_04.stdout | default('') | trim }}"
      status_04: "{{ 'PASS' if (result_04.stdout | default('') | trim) == 'nodev' else 'FAIL' }}"
      details_04: "{{ 'Nodev is active' if (result_04.stdout | default('') | trim) == 'nodev' else 'Nodev not found' }}"
    tags: [execute]

  - name: "Generate remediation report"
    debug:
      msg:
      - "========================================================"
      - "        REMEDIATION REPORT — CIS 1.1.2.1.2"
      - "Reference: CIS Benchmark checkpoint 1.1.2.1.2"
      - "========================================================"
      - ""
      - "REQUIREMENT 01 - {{ req_01 }}:"
      - "  Task: {{ task_01_name | default('Task not recorded') }}"
      - "  Command: {{ task_01_cmd | default('N/A') }}"
      - "  Exit code: {{ task_01_rc | default(-1) }}"
      - "  Data: {{ data_01 | default('') | trim }}"
      - "  Status: {{ status_01 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_01 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 02 - {{ req_02 }}:"
      - "  Task: {{ task_02_name | default('Task not recorded') }}"
      - "  Command: {{ task_02_cmd | default('N/A') }}"
      - "  Exit code: {{ task_02_rc | default(-1) }}"
      - "  Data: {{ data_02 | default('') | trim }}"
      - "  Status: {{ status_02 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_02 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 03 - {{ req_03 }}:"
      - "  Task: {{ task_03_name | default('Task not recorded') }}"
      - "  Command: {{ task_03_cmd | default('N/A') }}"
      - "  Exit code: {{ task_03_rc | default(-1) }}"
      - "  Data: {{ data_03 | default('') | trim }}"
      - "  Status: {{ status_03 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_03 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 04 - {{ req_04 }}:"
      - "  Task: {{ task_04_name | default('Task not recorded') }}"
      - "  Command: {{ task_04_cmd | default('N/A') }}"
      - "  Exit code: {{ task_04_rc | default(-1) }}"
      - "  Data: {{ data_04 | default('') | trim }}"
      - "  Status: {{ status_04 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_04 | default('Not evaluated') | trim }}"
      - ""
      - "========================================================"
      - "OVERALL REMEDIATION section:"
      - "  Result: {{ status_04 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_04 | default('Not evaluated') | trim }}"
      - "========================================================"
    tags: [execute]

  always:
  - name: "Restore - Check if backup exists"
    stat:
      path: "{{ backup_dir }}/fstab.bak"
    register: backup_stat
    tags: [restore]

  - name: "Restore - Remove backup directory"
    file:
      path: "{{ backup_dir }}"
      state: absent
    tags: [restore]
