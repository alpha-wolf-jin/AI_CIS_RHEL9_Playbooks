---
- name: Initialize meta data variables
  include_vars: cis_remediation_var_5_4_2_7.yml

- name: "Snapshot - Create backup directory"
  ansible.builtin.file:
    path: "{{ backup_dir }}"
    state: directory
    mode: '0700'
  tags: [snapshot]
- name: "Snapshot - Check if /etc/passwd exists"
  ansible.builtin.stat:
    path: "/etc/passwd"
  register: _passwd_stat
  tags: [snapshot]
- name: "Snapshot - Backup /etc/passwd"
  ansible.builtin.copy:
    src: "/etc/passwd"
    dest: "{{ backup_dir }}/passwd.backup"
    remote_src: true
  when: "_passwd_stat.stat.exists | default(false)"
  tags: [snapshot]
- name: "Snapshot - Check if /tmp/remediate_shells.sh exists"
  ansible.builtin.stat:
    path: "/tmp/remediate_shells.sh"
  register: _snap_script_stat
  tags: [snapshot]
- name: "Snapshot - Mark /tmp/remediate_shells.sh as absent"
  ansible.builtin.copy:
    content: "absent"
    dest: "{{ backup_dir }}/remediate_shells.sh.absent"
  when: not (_snap_script_stat.stat.exists | default(false))
  tags: [snapshot]

- block:
  - name: "Req 01 - Check if shadow-utils is installed"
    ansible.builtin.package_facts:
      manager: auto
    failed_when: false
    tags: [execute]

  - name: "Req 01 - Set skip fact if shadow-utils not installed"
    ansible.builtin.set_fact:
      playbook_skipped: "{{ 'shadow-utils' not in ansible_facts.packages }}"
    tags: [execute]

  - name: "Req 01 - Deploy remediation script"
    ansible.builtin.copy:
      content: |
        #!/usr/bin/env bash
        {
           l_valid_shells="^($( awk -F\/ '$NF != "nologin" {print}' /etc/shells | sed -rn '/^\//{s,/,\\\\/,g;p}' | paste -s -d '|' - ))$"
           awk -v pat="$l_valid_shells" -F: '($1!~/^(root|halt|sync|shutdown|nfsnobody)$/ && ($3<'"$(awk '/^\s*UID_MIN/{print $2}' /etc/login.defs)"' || $3 == 65534) && $(NF) ~ pat) {system ("usermod -s '"$(command -v nologin)"' " $1)}' /etc/passwd
        }
      dest: "/tmp/remediate_shells.sh"
      mode: '0700'
    when: "not (playbook_skipped | default(false) | bool)"
    tags: [execute]

  - name: "Req 01 - Execute remediation script"
    ansible.builtin.shell: "/bin/bash /tmp/remediate_shells.sh"
    args:
      executable: /bin/bash
    register: result_01
    failed_when: false
    changed_when: false
    when: "not (playbook_skipped | default(false) | bool)"
    tags: [execute]

  - name: "Req 01 - Clean up remediation script"
    ansible.builtin.file:
      path: "/tmp/remediate_shells.sh"
      state: absent
    failed_when: false
    when: "not (playbook_skipped | default(false) | bool)"
    tags: [execute]

  - name: "Req 02 - Verify system accounts have nologin shell"
    ansible.builtin.shell: |
      l_valid_shells="^($( awk -F\/ '$NF != "nologin" {print}' /etc/shells | sed -rn '/^\//{s,/,\\\\/,g;p}' | paste -s -d '|' - ))$"
      awk -v pat="$l_valid_shells" -F: '($1!~/^(root|halt|sync|shutdown|nfsnobody)$/ && ($3<'"$(awk '/^\s*UID_MIN/{print $2}' /etc/login.defs)"' || $3 == 65534) && $(NF) ~ pat) {print $1}' /etc/passwd
    args:
      executable: /bin/bash
    register: result_02
    failed_when: false
    changed_when: false
    tags: [execute]

  - name: "Req 02 - Store verification details"
    ansible.builtin.set_fact:
      task_02_name: "Verify system accounts have nologin shell"
      task_02_cmd: "awk audit of /etc/passwd for system accounts with valid login shells"
      task_02_rc: "{{ result_02.rc | default(-1) }}"
      data_02: "{{ result_02.stdout | default('') | trim }}"
      status_02: "{{ 'PASS' if (result_02.stdout | default('') | trim) == '' else 'FAIL' }}"
      details_02: "{{ 'No non-compliant system accounts found' if (result_02.stdout | default('') | trim) == '' else 'Non-compliant accounts: ' + (result_02.stdout | default('') | trim) }}"
    tags: [execute]

  - name: "Req 01 - Store remediation details"
    ansible.builtin.set_fact:
      task_01_name: "Execute remediation script for system account shells"
      task_01_cmd: "/bin/bash /tmp/remediate_shells.sh"
      task_01_rc: "{{ result_01.rc | default(-1) }}"
      data_01: "{{ result_01.stdout | default('') | trim }}"
      status_01: "{{ 'SKIPPED' if (playbook_skipped | default(false) | bool) else ('APPLIED' if (result_01.rc | default(-1)) == 0 else 'FAILED') }}"
      details_01: "{{ 'shadow-utils not installed' if (playbook_skipped | default(false) | bool) else ('Script executed successfully' if (result_01.rc | default(-1)) == 0 else 'Script execution failed') }}"
    tags: [execute]

  - name: "Req 03 - Store final remediation result in cis_result"
    ansible.builtin.set_fact:
      cis_result: "{{ status_02 | default('ERROR') | trim }}"
    tags: [execute]

  - name: "Req 03 - Store cis_result task details"
    ansible.builtin.set_fact:
      task_03_name: "Set cis_result"
      task_03_cmd: "set_fact: cis_result = {{ status_02 | default('ERROR') | trim }}"
      task_03_rc: 0
      data_03: "{{ cis_result }}"
      status_03: "PASS"
      details_03: "cis_result stored successfully as {{ cis_result }}"
    tags: [execute]

  - name: "Req 04 - Generate remediation report"
    ansible.builtin.debug:
      msg:
      - "========================================================"
      - "        REMEDIATION REPORT — CIS 5.4.2.7"
      - "========================================================"
      - "Reference: CIS Benchmark checkpoint 5.4.2.7"
      - ""
      - "REQUIREMENT 01 - {{ req_01 }}:"
      - "  Task: {{ task_01_name | default('Not executed') }}"
      - "  Command: {{ task_01_cmd | default('N/A') }}"
      - "  Exit code: {{ task_01_rc | default(-1) }}"
      - "  Data: {{ data_01 | default('') | trim }}"
      - "  Status: {{ status_01 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_01 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 02 - {{ req_02 }}:"
      - "  Task: {{ task_02_name | default('Not executed') }}"
      - "  Command: {{ task_02_cmd | default('N/A') }}"
      - "  Exit code: {{ task_02_rc | default(-1) }}"
      - "  Data: {{ data_02 | default('') | trim }}"
      - "  Status: {{ status_02 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_02 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 03 - {{ req_03 }}:"
      - "  Task: {{ task_03_name | default('Not executed') }}"
      - "  Command: {{ task_03_cmd | default('N/A') }}"
      - "  Exit code: {{ task_03_rc | default(-1) }}"
      - "  Data: {{ data_03 | default('') | trim }}"
      - "  Status: {{ status_03 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_03 | default('Not evaluated') | trim }}"
      - ""
      - "========================================================"
      - "OVERALL REMEDIATION:"
      - "  Result: {{ cis_result | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_02 | default('Not evaluated') | trim }}"
      - "========================================================"
    tags: [execute]

  always:
  - name: "Restore - Check if backup directory exists"
    ansible.builtin.stat:
      path: "{{ backup_dir }}"
    register: _restore_backup_dir
    failed_when: false
    tags: [restore]

  - name: "Restore - Check for absent marker for remediation script"
    ansible.builtin.stat:
      path: "{{ backup_dir }}/remediate_shells.sh.absent"
    register: _restore_script_absent
    failed_when: false
    tags: [restore]

  - name: "Restore - Remove temporary remediation script if it was created"
    ansible.builtin.file:
      path: "/tmp/remediate_shells.sh"
      state: absent
    when: _restore_script_absent.stat.exists | default(false)
    failed_when: false
    tags: [restore]

  - name: "Restore - Remove backup directory"
    ansible.builtin.file:
      path: "{{ backup_dir }}"
      state: absent
    when: "_restore_backup_dir.stat.exists | default(false)"
    failed_when: false
    tags: [restore]
