  always:
  - name: "Restore - Check if backup directory exists"
    ansible.builtin.stat:
      path: "{{ backup_dir }}"
    register: _restore_dir
    failed_when: false
    tags: [restore]

  - name: "Restore - Restore aidecheck.service if backup exists"
    ansible.builtin.stat:
      path: "{{ backup_dir }}/aidecheck.service.present"
    register: _restore_service_bak
    failed_when: false
    tags: [restore]

  - name: "Restore - Copy back aidecheck.service"
    ansible.builtin.copy:
      src: "{{ backup_dir }}/aidecheck.service.present"
      dest: /etc/systemd/system/aidecheck.service
      remote_src: true
    when: "_restore_service_bak.stat.exists | default(false)"
    failed_when: false
    tags: [restore]

  - name: "Restore - Restore aidecheck.timer if backup exists"
    ansible.builtin.stat:
      path: "{{ backup_dir }}/aidecheck.timer.present"
    register: _restore_timer_bak
    failed_when: false
    tags: [restore]

  - name: "Restore - Copy back aidecheck.timer"
    ansible.builtin.copy:
      src: "{{ backup_dir }}/aidecheck.timer.present"
      dest: /etc/systemd/system/aidecheck.timer
      remote_src: true
    when: "_restore_timer_bak.stat.exists | default(false)"
    failed_when: false
    tags: [restore]

  - name: "Restore - Restore root crontab if backup exists"
    ansible.builtin.stat:
      path: "{{ backup_dir }}/root.crontab.present"
    register: _restore_cron_bak
    failed_when: false
    tags: [restore]

  - name: "Restore - Copy back root crontab"
    ansible.builtin.shell: |
      cat "{{ backup_dir }}/root.crontab.present" | crontab -u root -
    args:
      executable: /bin/bash
    when: "_restore_cron_bak.stat.exists | default(false)"
    failed_when: false
    tags: [restore]

  - name: "Restore - Remove backup directory"
    ansible.builtin.file:
      path: "{{ backup_dir }}"
      state: absent
    when: "_restore_dir.stat.exists | default(false)"
    failed_when: false
    tags: [restore]
