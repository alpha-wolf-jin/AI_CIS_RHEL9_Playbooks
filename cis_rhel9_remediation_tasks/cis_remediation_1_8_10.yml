---
- name: Initialize meta data variables
  include_vars: cis_remediation_var_1_8_10.yml

- name: "Snapshot - Create backup directory"
  ansible.builtin.file:
    path: "{{ backup_dir }}"
    state: directory
    mode: '0700'
  tags: [snapshot]
- name: "Snapshot - Check if config file exists"
  ansible.builtin.stat:
    path: "{{ gdm_config }}"
  register: config_stat
  tags: [snapshot]
- name: "Snapshot - Backup config file if exists"
  ansible.builtin.copy:
    src: "{{ gdm_config }}"
    dest: "{{ backup_dir }}/custom.conf.backup"
    remote_src: true
  when: config_stat.stat.exists
  tags: [snapshot]

- block:
  - name: "Initialize skip flag"
    set_fact:
      playbook_skipped: false
    tags: [execute]

  - name: "Gather installed package facts"
    ansible.builtin.package_facts:
      manager: auto
    failed_when: false
    tags: [execute]

  - name: "Determine if GDM package is installed"
    set_fact:
      gdm_installed: "{{ 'gdm' in ansible_facts.packages }}"
    tags: [execute]

  - name: "Set skip flag if GDM not installed"
    set_fact:
      playbook_skipped: true
    when: not gdm_installed
    tags: [execute]

  - name: "Req 01 - Check prerequisite text editing tools"
    shell: which sed || which gedit || which nano
    args:
      executable: /bin/bash
    register: result_01
    failed_when: false
    changed_when: false
    when: "not playbook_skipped | default(false)"
    tags: [execute]

  - name: "Store requirement 01 details"
    set_fact:
      task_01_name: "Check prerequisite text editing tools"
      task_01_cmd: "which sed || which gedit || which nano"
      task_01_rc: "{{ result_01.rc | default(-1) }}"
      data_01: "{{ result_01.stdout | default('') | trim }}"
      status_01: "{{ 'APPLIED' if (result_01.rc | default(-1) == 0) else 'FAILED' }}"
      details_01: "{{ 'At least one text editing tool is available' if (result_01.rc | default(-1) == 0) else 'No suitable text editing tool found' }}"
    when: "not playbook_skipped | default(false)"
    tags: [execute]

  - name: "Req 02 - Remove Enable=true line from GDM config"
    shell: sed -i '/^Enable=true/d' {{ gdm_config }}
    args:
      executable: /bin/bash
    register: result_02
    failed_when: false
    when: "not playbook_skipped | default(false)"
    tags: [execute]

  - name: "Store requirement 02 details"
    set_fact:
      task_02_name: "Remove Enable=true line from GDM config"
      task_02_cmd: "sed -i '/^Enable=true/d' {{ gdm_config }}"
      task_02_rc: "{{ result_02.rc | default(-1) }}"
      data_02: "{{ result_02.stdout | default('') | trim }}"
      status_02: "{{ 'APPLIED' if (result_02.rc | default(-1) == 0) else 'FAILED' }}"
      details_02: "{{ 'Line removed successfully' if (result_02.rc | default(-1) == 0) else 'Failed to remove line' }}"
    when: "not playbook_skipped | default(false)"
    tags: [execute]

  - name: "Req 03 - Verify XDMCP is not enabled"
    shell: grep -i 'Enable=true' {{ gdm_config }}
    args:
      executable: /bin/bash
    register: result_03
    failed_when: false
    changed_when: false
    when: "not playbook_skipped | default(false)"
    tags: [execute]

  - name: "Store requirement 03 details"
    set_fact:
      task_03_name: "Verify XDMCP not enabled"
      task_03_cmd: "grep -i 'Enable=true' {{ gdm_config }}"
      task_03_rc: "{{ result_03.rc | default(-1) }}"
      data_03: "{{ result_03.stdout | default('') | trim }}"
      status_03: "{{ 'APPLIED' if (result_03.rc | default(-1) == 1) else 'FAILED' }}"
      details_03: "{{ 'No Enable=true line found' if (result_03.rc | default(-1) == 1) else 'Enable=true line still present' }}"
    when: "not playbook_skipped | default(false)"
    tags: [execute]

  - name: "Generate remediation report"
    debug:
      msg:
      - "REMEDIATION REPORT — CIS 1.8.10"
      - "Reference: CIS Benchmark checkpoint 1.8.10"
      - ""
      - "REQUIREMENT 01 - {{ req_01 }}:"
      - "  Task: {{ task_01_name }}"
      - "  Command: {{ task_01_cmd }}"
      - "  Exit code: {{ task_01_rc }}"
      - "  Data: {{ data_01 }}"
      - "  Status: {{ status_01 }}"
      - "  Details: {{ details_01 }}"
      - ""
      - "REQUIREMENT 02 - {{ req_02 }}:"
      - "  Task: {{ task_02_name }}"
      - "  Command: {{ task_02_cmd }}"
      - "  Exit code: {{ task_02_rc }}"
      - "  Data: {{ data_02 }}"
      - "  Status: {{ status_02 }}"
      - "  Details: {{ details_02 }}"
      - ""
      - "REQUIREMENT 03 - {{ req_03 }}:"
      - "  Task: {{ task_03_name }}"
      - "  Command: {{ task_03_cmd }}"
      - "  Exit code: {{ task_03_rc }}"
      - "  Data: {{ data_03 }}"
      - "  Status: {{ status_03 }}"
      - "  Details: {{ details_03 }}"
      - ""
      - "OVERALL REMEDIATION:"
      - "  Result: {{ status_03 }}"
      - "  Details: {{ details_03 }}"
    when: "not playbook_skipped | default(false)"
    tags: [execute]

  - name: "Generate skipped report"
    debug:
      msg:
      - "REMEDIATION REPORT — CIS 1.8.10"
      - "Reference: CIS Benchmark checkpoint 1.8.10"
      - "Status: SKIPPED — GDM package not installed"
    when: "playbook_skipped | default(false)"
    tags: [execute]

  always:
  - name: "Restore - Check if backup exists"
    ansible.builtin.stat:
      path: "{{ backup_dir }}/custom.conf.backup"
    register: restore_backup_stat
    failed_when: false
    tags: [restore]

  - name: "Restore - Overwrite config with original"
    ansible.builtin.copy:
      src: "{{ backup_dir }}/custom.conf.backup"
      dest: "{{ gdm_config }}"
      remote_src: true
    when: restore_backup_stat.stat.exists
    failed_when: false
    tags: [restore]

  - name: "Restore - Remove backup directory"
    ansible.builtin.file:
      path: "{{ backup_dir }}"
      state: absent
    failed_when: false
    tags: [restore]
