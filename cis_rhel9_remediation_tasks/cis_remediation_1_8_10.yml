---
- name: Initialize meta data variables
  include_vars: cis_remediation_var_1_8_10.yml

- name: "Snapshot - Create backup directory"
  ansible.builtin.file:
    path: "{{ backup_dir }}"
    state: directory
    mode: '0700'
  tags: [snapshot]
- name: "Snapshot - Check if config file exists"
  ansible.builtin.stat:
    path: "{{ config_file }}"
  register: _sg_config_stat
  tags: [snapshot]
- name: "Snapshot - Backup config file if exists"
  ansible.builtin.copy:
    src: "{{ config_file }}"
    dest: "{{ backup_dir }}/custom.conf.present"
    remote_src: true
  when: _sg_config_stat.stat.exists
  tags: [snapshot]

- block:
  - name: "Initialize data variables"
    ansible.builtin.set_fact:
      data_01: "Not collected yet"
      status_01: "ERROR"
      details_01: "Not evaluated"
      data_02: "Not collected yet"
      status_02: "ERROR"
      details_02: "Not evaluated"
      data_03: "Not collected yet"
      status_03: "ERROR"
      details_03: "Not evaluated"
      data_04: "Not collected yet"
      status_04: "ERROR"
      details_04: "Not evaluated"
      task_01_name: "Not executed"
      task_01_cmd: "N/A"
      task_01_rc: -1
      playbook_skipped: false
    tags: [execute]

  - name: "Req 01 - Check if GDM is installed"
    ansible.builtin.shell: "which gdm || dpkg -l gdm3 2>/dev/null || rpm -q gdm 2>/dev/null"
    args:
      executable: /bin/bash
    register: result_01
    failed_when: false
    changed_when: false
    tags: [execute]

  - name: "Store requirement 01 details"
    ansible.builtin.set_fact:
      task_01_name: "Req 01 - Check if GDM is installed"
      task_01_cmd: "which gdm || dpkg -l gdm3 2>/dev/null || rpm -q gdm 2>/dev/null"
      task_01_rc: "{{ result_01.rc | default(-1) }}"
      data_01: "{{ result_01.stdout | default('') | trim }}"
      status_01: "{{ 'PASS' if result_01.rc | default(-1) != 0 else 'FAIL' }}"
      details_01: "{{ 'GDM not installed, remediation not applicable' if result_01.rc | default(-1) != 0 else 'GDM is installed' }}"
      playbook_skipped: "{{ result_01.rc | default(-1) != 0 }}"
    tags: [execute]

  - name: "Req 02 - Remove Enable=true line from GDM config"
    ansible.builtin.lineinfile:
      path: "{{ config_file }}"
      regexp: '^Enable=true'
      state: absent
    register: result_02
    failed_when: false
    when: not playbook_skipped | default(false)
    tags: [execute]

  - name: "Store requirement 02 details"
    ansible.builtin.set_fact:
      task_02_name: "Req 02 - Remove Enable=true line from GDM config"
      task_02_cmd: "lineinfile: path={{ config_file }} regexp='^Enable=true' state=absent"
      task_02_rc: "{{ 0 if not (playbook_skipped | default(false)) else -1 }}"
      data_02: "{{ 'Line removed' if (result_02.changed | default(false)) else ('Line not present' if not (playbook_skipped | default(false)) else 'SKIP') }}"
      status_02: "{{ 'SKIP' if (playbook_skipped | default(false)) else ('PASS' if (result_02 is not failed) else 'FAIL') }}"
      details_02: "{{ 'Skipped - GDM not installed' if (playbook_skipped | default(false)) else ('Enable=true line removed successfully' if (result_02.changed | default(false)) else 'Enable=true line was not present') }}"
    tags: [execute]

  - name: "Req 03 - Verify XDMCP is not enabled"
    ansible.builtin.shell: "grep -i 'Enable=true' {{ config_file }}"
    args:
      executable: /bin/bash
    register: result_03
    failed_when: false
    changed_when: false
    when: not playbook_skipped | default(false)
    tags: [execute]

  - name: "Store requirement 03 details"
    ansible.builtin.set_fact:
      task_03_name: "Req 03 - Verify XDMCP is not enabled"
      task_03_cmd: "grep -i 'Enable=true' {{ config_file }}"
      task_03_rc: "{{ result_03.rc | default(-1) if not (playbook_skipped | default(false)) else -1 }}"
      data_03: "{{ result_03.stdout | default('') | trim if not (playbook_skipped | default(false)) else 'SKIP' }}"
      status_03: "{{ 'SKIP' if (playbook_skipped | default(false)) else ('PASS' if (result_03.rc | default(-1) == 1) else 'FAIL') }}"
      details_03: "{{ 'Skipped - GDM not installed' if (playbook_skipped | default(false)) else ('XDMCP is not enabled' if (result_03.rc | default(-1) == 1) else 'XDMCP is still enabled') }}"
    tags: [execute]

  - name: "Req 04 - Store final remediation result"
    ansible.builtin.set_fact:
      cis_result: "{{ status_03 | default('ERROR') | trim }}"
      task_04_name: "Req 04 - Store final remediation result"
      task_04_cmd: "set_fact cis_result"
      task_04_rc: 0
      data_04: "N/A"
      status_04: "{{ status_03 | default('ERROR') | trim }}"
      details_04: "{{ 'GDM not installed; remediation not applicable. SKIP.' if (playbook_skipped | default(false)) else ('XDMCP is not enabled. Compliant.' if (status_03 | default('ERROR') | trim == 'PASS') else 'XDMCP is enabled. Non-compliant.') }}"
    tags: [execute]

  - name: "Generate remediation report"
    ansible.builtin.debug:
      msg:
      - "REMEDIATION REPORT — CIS 1.8.10"
      - "Reference: CIS Benchmark checkpoint 1.8.10"
      - ""
      - "REQUIREMENT 01 - {{ req_01 }}:"
      - "  Task: {{ task_01_name | default('Not recorded') }}"
      - "  Command: {{ task_01_cmd | default('N/A') }}"
      - "  Exit code: {{ task_01_rc | default(-1) }}"
      - "  Data: {{ data_01 | default('') | trim }}"
      - "  Status: {{ status_01 | default('ERROR') | trim }}"
      - "  Details: {{ details_01 | default('') | trim }}"
      - ""
      - "REQUIREMENT 02 - {{ req_02 }}:"
      - "  Task: {{ task_02_name | default('Not recorded') }}"
      - "  Command: {{ task_02_cmd | default('N/A') }}"
      - "  Exit code: {{ task_02_rc | default(-1) }}"
      - "  Data: {{ data_02 | default('') | trim }}"
      - "  Status: {{ status_02 | default('ERROR') | trim }}"
      - "  Details: {{ details_02 | default('') | trim }}"
      - ""
      - "REQUIREMENT 03 - {{ req_03 }}:"
      - "  Task: {{ task_03_name | default('Not recorded') }}"
      - "  Command: {{ task_03_cmd | default('N/A') }}"
      - "  Exit code: {{ task_03_rc | default(-1) }}"
      - "  Data: {{ data_03 | default('') | trim }}"
      - "  Status: {{ status_03 | default('ERROR') | trim }}"
      - "  Details: {{ details_03 | default('') | trim }}"
      - ""
      - "REQUIREMENT 04 - {{ req_04 }}:"
      - "  Task: {{ task_04_name | default('Not recorded') }}"
      - "  Command: {{ task_04_cmd | default('N/A') }}"
      - "  Exit code: {{ task_04_rc | default(-1) }}"
      - "  Data: {{ data_04 | default('') | trim }}"
      - "  Status: {{ status_04 | default('ERROR') | trim }}"
      - "  Details: {{ details_04 | default('') | trim }}"
      - ""
      - "========================================================"
      - "OVERALL REMEDIATION:"
      - "  Result: {{ cis_result | default('ERROR') | trim }}"
      - "  Details: {{ details_04 | default('Not evaluated') | trim }}"
      - "========================================================"
    tags: [execute]

  always:
  - name: "Restore - Check if backup exists"
    ansible.builtin.stat:
      path: "{{ backup_dir }}/custom.conf.present"
    register: _restore_present
    failed_when: false
    tags: [restore]

  - name: "Restore - Overwrite with original"
    ansible.builtin.copy:
      src: "{{ backup_dir }}/custom.conf.present"
      dest: "{{ config_file }}"
      remote_src: true
    when: _restore_present.stat.exists | default(false)
    failed_when: false
    tags: [restore]

  - name: "Restore - Remove backup directory"
    ansible.builtin.file:
      path: "{{ backup_dir }}"
      state: absent
    failed_when: false
    tags: [restore]
