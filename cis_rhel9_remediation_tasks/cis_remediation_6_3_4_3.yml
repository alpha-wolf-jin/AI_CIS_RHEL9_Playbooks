---
- name: Initialize meta data variables
  include_vars: cis_remediation_var_6_3_4_3.yml

- name: "Snapshot - Create backup directory"
  ansible.builtin.file:
    path: "{{ backup_dir }}"
    state: directory
    mode: '0700'
  tags: [snapshot]
- name: "Snapshot - Check if auditd config file exists"
  ansible.builtin.stat:
    path: "{{ auditd_conf }}"
  register: _snap_conf_stat
  tags: [snapshot]
- name: "Snapshot - Backup auditd config file if exists"
  ansible.builtin.copy:
    src: "{{ auditd_conf }}"
    dest: "{{ backup_dir }}/auditd.conf.present"
    remote_src: true
  when: "_snap_conf_stat.stat.exists"
  tags: [snapshot]

- block:
  - name: "Initialize data variables"
    ansible.builtin.set_fact:
      data_01: "Not collected yet"
      status_01: "UNKNOWN"
      details_01: "Not evaluated"
      data_02: "Not collected yet"
      status_02: "UNKNOWN"
      details_02: "Not evaluated"
      data_03: "Not collected yet"
      status_03: "UNKNOWN"
      details_03: "Not evaluated"
      task_01_name: "Not executed"
      task_01_cmd: "N/A"
      task_01_rc: -1
      task_02_name: "Not executed"
      task_02_cmd: "N/A"
      task_02_rc: -1
      task_03_name: "Not executed"
      task_03_cmd: "N/A"
      task_03_rc: -1
    tags: [execute]

  - name: "Req 01 - Check if auditd configuration file exists"
    ansible.builtin.shell: "[ -f {{ auditd_conf | quote }} ]"
    args:
      executable: /bin/bash
    register: result_01
    failed_when: false
    changed_when: false
    tags: [execute]

  - name: "Store requirement 01 details"
    ansible.builtin.set_fact:
      task_01_name: "Check if auditd configuration file exists"
      task_01_cmd: "[ -f {{ auditd_conf }} ]"
      task_01_rc: "{{ result_01.rc | default(-1) }}"
      data_01: "{{ result_01.rc | default(-1) }}"
      status_01: "{{ 'PASS' if (result_01.rc | default(-1)) == 0 else 'FAIL' }}"
      details_01: "{{ 'File exists' if (result_01.rc | default(-1)) == 0 else 'File not found' }}"
    tags: [execute]

  - name: "Req 02 - Change ownership of audit log files to root"
    ansible.builtin.shell: |
      find "$(dirname $(awk -F "=" '/^\s*log_file/ {print $2}' {{ auditd_conf }} | xargs))" -type f ! -user root -exec chown root {} +
    args:
      executable: /bin/bash
    register: result_02
    failed_when: false
    changed_when: false
    when: "result_01.rc | default(-1) == 0"
    tags: [execute]

  - name: "Store requirement 02 details"
    ansible.builtin.set_fact:
      task_02_name: "Change ownership of audit log files to root"
      task_02_cmd: |
        find \"$(dirname $(awk -F \"=\" '/^\\s*log_file/ {print $2}' {{ auditd_conf }} | xargs))\" -type f ! -user root -exec chown root {} +
      task_02_rc: "{{ result_02.rc | default(-1) }}"
      data_02: "{{ result_02.stdout | default('') | trim }}"
      status_02: "{{ 'SKIP' if (result_01.rc | default(-1)) != 0 else ('PASS' if (result_02.rc | default(-1)) == 0 else 'FAIL') }}"
      details_02: "{{ 'Skipped - auditd.conf not found' if (result_01.rc | default(-1)) != 0 else ('Ownership changed successfully' if (result_02.rc | default(-1)) == 0 else 'Failed to change ownership') }}"
    tags: [execute]

  - name: "Req 03 - Verify audit log files owner is root"
    ansible.builtin.shell: |
      find "$(dirname $(awk -F "=" '/^\s*log_file/ {print $2}' {{ auditd_conf }} | xargs))" -type f ! -user root
    args:
      executable: /bin/bash
    register: result_03
    failed_when: false
    changed_when: false
    when: "result_01.rc | default(-1) == 0"
    tags: [execute]

  - name: "Store requirement 03 details"
    ansible.builtin.set_fact:
      task_03_name: "Verify audit log files owner is root"
      task_03_cmd: |
        find \"$(dirname $(awk -F \"=\" '/^\\s*log_file/ {print $2}' {{ auditd_conf }} | xargs))\" -type f ! -user root
      task_03_rc: "{{ result_03.rc | default(-1) }}"
      data_03: "{{ result_03.stdout | default('') | trim }}"
      status_03: "{{ 'SKIP' if (result_01.rc | default(-1)) != 0 else ('PASS' if (result_03.stdout | default('') | trim) == '' else 'FAIL') }}"
      details_03: "{{ 'Skipped - auditd.conf not found' if (result_01.rc | default(-1)) != 0 else ('All files owned by root' if (result_03.stdout | default('') | trim) == '' else 'Files found with non-root owner: ' + (result_03.stdout | default('') | trim)) }}"
    tags: [execute]

  - name: "Store final remediation result"
    ansible.builtin.set_fact:
      cis_result: "{{ status_03 | default('UNKNOWN') | trim }}"
    tags: [execute]

  - name: "Generate remediation report"
    ansible.builtin.debug:
      msg:
      - "========================================================"
      - "        REMEDIATION REPORT — CIS 6.3.4.3"
      - "========================================================"
      - "Reference: CIS Benchmark checkpoint 6.3.4.3"
      - ""
      - "REQUIREMENT 01 - {{ req_01 }}:"
      - "  Task: {{ task_01_name | default('Task not recorded') }}"
      - "  Command: {{ task_01_cmd | default('N/A') }}"
      - "  Exit code: {{ task_01_rc | default(-1) }}"
      - "  Data: {{ data_01 | default('Data collection failed') | trim }}"
      - "  Status: {{ status_01 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_01 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 02 - {{ req_02 }}:"
      - "  Task: {{ task_02_name | default('Task not recorded') }}"
      - "  Command: {{ task_02_cmd | default('N/A') }}"
      - "  Exit code: {{ task_02_rc | default(-1) }}"
      - "  Data: {{ data_02 | default('Data collection failed') | trim }}"
      - "  Status: {{ status_02 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_02 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 03 - {{ req_03 }}:"
      - "  Task: {{ task_03_name | default('Task not recorded') }}"
      - "  Command: {{ task_03_cmd | default('N/A') }}"
      - "  Exit code: {{ task_03_rc | default(-1) }}"
      - "  Data: {{ data_03 | default('Data collection failed') | trim }}"
      - "  Status: {{ status_03 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_03 | default('Not evaluated') | trim }}"
      - ""
      - "========================================================"
      - "OVERALL REMEDIATION:"
      - "  Result: {{ cis_result }}"
      - "  Details: {{ details_03 | default('Not evaluated') | trim }}"
      - "========================================================"
    tags: [execute]

  always:
  - name: "Restore - Check if backup exists"
    ansible.builtin.stat:
      path: "{{ backup_dir }}/auditd.conf.present"
    register: _restore_backup_stat
    failed_when: false
    tags: [restore]

  - name: "Restore - Overwrite with original"
    ansible.builtin.copy:
      src: "{{ backup_dir }}/auditd.conf.present"
      dest: "{{ auditd_conf }}"
      remote_src: true
    when: "_restore_backup_stat.stat.exists"
    failed_when: false
    tags: [restore]

  - name: "Restore - Remove backup directory"
    ansible.builtin.file:
      path: "{{ backup_dir }}"
      state: absent
    failed_when: false
    tags: [restore]
