playbook_name: "cis_7_1_9_shells_permissions"
backup_dir: "/var/log/ai-playbooks-backup/{{ playbook_name }}"
target_file: "/etc/shells"
expected_owner: "root"
expected_group: "root"
expected_mode: "0644"
req_01: "Apply remove excess permissions on /etc/shells using command: chmod u-x,go-wx /etc/shells. Expected result: permissions on /etc/shells are set to u-x,go-wx."
req_02: "Apply set owner and group to root on /etc/shells using command: chown root:root /etc/shells. Expected result: owner and group of /etc/shells are root."
req_03: "Verify permissions and ownership on /etc/shells using command: stat -c '%a %U:%G' /etc/shells. Expected result: output is '644 root:root' (or equivalent numeric permissions 0644 and owner:group root:root)."
req_04: "Store the final remediation result in a variable named 'cis_result' using set_fact. Set cis_result to the overall remediation status (PASS/FAIL/SKIP/ERROR) derived from the last requirement's status variable."
