---
- name: Initialize meta data variables
  include_vars: cis_remediation_var_1_6_3.yml

- name: "Snapshot - Create backup directory"
  ansible.builtin.file:
    path: "{{ backup_dir }}"
    state: directory
    mode: '0700'
  tags: [snapshot]
- name: "Snapshot - Check if config file exists"
  ansible.builtin.stat:
    path: "{{ config_file }}"
  register: _snap_config_stat
  tags: [snapshot]
- name: "Snapshot - Backup config file if exists"
  ansible.builtin.copy:
    src: "{{ config_file }}"
    dest: "{{ backup_dir }}/config.present"
    remote_src: true
  when: _snap_config_stat.stat.exists
  tags: [snapshot]

- block:
# Initialize report variables with defaults (SKIP/not collected)
  - name: "Initialize report data"
    set_fact:
      task_01_name: "Not recorded"
      task_01_cmd: "N/A"
      task_01_rc: -1
      data_01: "Not collected"
      status_01: "SKIP"
      details_01: "Not evaluated"
      task_02_name: "Not recorded"
      task_02_cmd: "N/A"
      task_02_rc: -1
      data_02: "Not collected"
      status_02: "SKIP"
      details_02: "Not evaluated"
      task_03_name: "Not recorded"
      task_03_cmd: "N/A"
      task_03_rc: -1
      data_03: "Not collected"
      status_03: "SKIP"
      details_03: "Not evaluated"
      task_04_name: "Not recorded"
      task_04_cmd: "N/A"
      task_04_rc: -1
      data_04: "Not collected"
      status_04: "SKIP"
      details_04: "Not evaluated"
      task_05_name: "Not recorded"
      task_05_cmd: "N/A"
      task_05_rc: -1
      data_05: "Not collected"
      status_05: "SKIP"
      details_05: "Not evaluated"
      task_06_name: "Not recorded"
      task_06_cmd: "N/A"
      task_06_rc: -1
      data_06: "Not collected"
      status_06: "SKIP"
      details_06: "Not evaluated"
    tags: [execute]

# Requirement 1 - Prerequisite check
  - name: "Req 01 - Check if update-crypto-policies binary exists"
    ansible.builtin.shell: which update-crypto-policies
    args:
      executable: /bin/bash
    register: result_01
    failed_when: false
    changed_when: false
    tags: [execute]

  - name: "Store requirement 01 details"
    set_fact:
      task_01_name: "Prerequisite check - which update-crypto-policies"
      task_01_cmd: "which update-crypto-policies"
      task_01_rc: "{{ result_01.rc | default(-1) }}"
      data_01: "{{ result_01.stdout | default('') | trim }}"
      status_01: "{{ 'PASS' if result_01.rc | default(-1) == 0 else 'FAIL' }}"
      details_01: "{{ 'Binary found at: ' ~ result_01.stdout | trim if result_01.rc | default(-1) == 0 else 'update-crypto-policies not installed' }}"
      crypto_policies_available: "{{ result_01.rc | default(-1) == 0 }}"
    tags: [execute]

# Requirement 2 - Subpolicy creation
  - name: "Req 02 - Create NO-SHA1 subpolicy file"
    ansible.builtin.shell: printf '%s\n' "# This is a subpolicy dropping the SHA1 hash and signature support" "hash = -SHA1" "sign = -*-SHA1" "sha1_in_certs = 0" >> /etc/crypto-policies/policies/modules/NO-SHA1.pmod
    args:
      executable: /bin/bash
      creates: /etc/crypto-policies/policies/modules/NO-SHA1.pmod
    register: result_02
    failed_when: false
    when: crypto_policies_available | bool
    tags: [execute]

  - name: "Store requirement 02 details"
    set_fact:
      task_02_name: "Create NO-SHA1 subpolicy file"
      task_02_cmd: |
        printf '%s\\n' \"# This is a subpolicy dropping the SHA1 hash and signature support\" \"hash = -SHA1\" \"sign = -*-SHA1\" \"sha1_in_certs = 0\" >> /etc/crypto-policies/policies/modules/NO-SHA1.pmod
      task_02_rc: "{{ (result_02.rc | default(-1)) if crypto_policies_available | bool else -1 }}"
      data_02: "{{ result_02.stdout | default('') | trim if crypto_policies_available | bool else 'N/A' }}"
      status_02: "{{ 'PASS' if (crypto_policies_available | bool and result_02.rc | default(-1) == 0) else ('SKIP' if not crypto_policies_available | bool else 'FAIL') }}"
      details_02: "{{ 'Subpolicy file created or already present' if (crypto_policies_available | bool and result_02.rc | default(-1) == 0) else ('Prerequisite not met' if not crypto_policies_available | bool else 'Failed to create subpolicy') }}"
    tags: [execute]

# Requirement 3 - Update system-wide crypto policy
  - name: "Req 03 - Update system-wide crypto policy to include NO-SHA1"
    ansible.builtin.shell: update-crypto-policies --set DEFAULT:NO-SHA1
    args:
      executable: /bin/bash
    register: result_03
    failed_when: false
    when: crypto_policies_available | bool
    tags: [execute]

  - name: "Store requirement 03 details"
    set_fact:
      task_03_name: "Update crypto policy"
      task_03_cmd: "update-crypto-policies --set DEFAULT:NO-SHA1"
      task_03_rc: "{{ (result_03.rc | default(-1)) if crypto_policies_available | bool else -1 }}"
      data_03: "{{ result_03.stdout | default('') | trim if crypto_policies_available | bool else 'N/A' }}"
      status_03: "{{ 'PASS' if (crypto_policies_available | bool and result_03.rc | default(-1) == 0) else ('SKIP' if not crypto_policies_available | bool else 'FAIL') }}"
      details_03: "{{ 'Policy updated successfully' if (crypto_policies_available | bool and result_03.rc | default(-1) == 0) else ('Prerequisite not met' if not crypto_policies_available | bool else 'Policy update failed') }}"
    tags: [execute]

# Requirement 4 - Reboot
  - name: "Req 04 - Reboot system to apply cryptographic settings"
    ansible.builtin.reboot:
      reboot_timeout: 180
    register: result_04
    failed_when: false
    when: crypto_policies_available | bool
    tags: [execute]

  - name: "Store requirement 04 details"
    set_fact:
      task_04_name: "Reboot system"
      task_04_cmd: "reboot"
      task_04_rc: "{{ 0 if not (result_04.failed | default(true)) else 1 }}"
      data_04: "{{ 'Reboot initiated' if not (result_04.failed | default(true)) else 'Reboot failed' }}"
      status_04: "{{ 'PASS' if (crypto_policies_available | bool and not (result_04.failed | default(true))) else ('SKIP' if not crypto_policies_available | bool else 'FAIL') }}"
      details_04: "{{ 'System rebooted successfully' if (crypto_policies_available | bool and not (result_04.failed | default(true))) else ('Prerequisite not met' if not crypto_policies_available | bool else 'Reboot failed') }}"
    tags: [execute]

# Requirement 5 - Verify SHA1 disabled
  - name: "Req 05 - Verify SHA1 hash and signature support is disabled"
    ansible.builtin.shell: update-crypto-policies --show
    args:
      executable: /bin/bash
    register: result_05
    failed_when: false
    changed_when: false
    when: crypto_policies_available | bool
    tags: [execute]

  - name: "Store requirement 05 details"
    set_fact:
      task_05_name: "Verify active crypto policy"
      task_05_cmd: "update-crypto-policies --show"
      task_05_rc: "{{ (result_05.rc | default(-1)) if crypto_policies_available | bool else -1 }}"
      data_05: "{{ result_05.stdout | default('') | trim if crypto_policies_available | bool else 'N/A' }}"
      status_05: >-
        {{- 'PASS' if (crypto_policies_available | bool and 'NO-SHA1' in (result_05.stdout | default(''))) else
           ('SKIP' if not crypto_policies_available | bool else 'FAIL') -}}
      details_05: >-
        {{- 'NO-SHA1 subpolicy is active' if (crypto_policies_available | bool and 'NO-SHA1' in (result_05.stdout | default(''))) else
           ('Prerequisite not met' if not crypto_policies_available | bool else 'NO-SHA1 not found in active policy') -}}
    tags: [execute]

# Requirement 6 - Store final result (FIXED circular reference)
  - name: "Req 06 - Store final remediation result in cis_result"
    set_fact:
      cis_result: "{{ status_05 | default('ERROR') | trim }}"
      task_06_name: "Store overall remediation result"
      task_06_cmd: "set_fact cis_result = status_05"
      task_06_rc: 0
      data_06: "{{ status_05 | default('ERROR') | trim }}"
      status_06: "PASS"
      details_06: "cis_result set to {{ status_05 | default('ERROR') | trim }}"
    tags: [execute]

# Final report
  - name: "Generate remediation report"
    debug:
      msg:
      - "REMEDIATION REPORT — CIS 1.6.3"
      - "Reference: CIS Benchmark checkpoint 1.6.3"
      - ""
      - "REQUIREMENT 01 - {{ req_01 | default('') }}:"
      - "  Task: {{ task_01_name | default('Not recorded') }}"
      - "  Command: {{ task_01_cmd | default('N/A') }}"
      - "  Exit code: {{ task_01_rc | default(-1) }}"
      - "  Data: {{ data_01 | default('') | trim }}"
      - "  Status: {{ status_01 | default('ERROR') | trim }}"
      - "  Details: {{ details_01 | default('') | trim }}"
      - ""
      - "REQUIREMENT 02 - {{ req_02 | default('') }}:"
      - "  Task: {{ task_02_name | default('Not recorded') }}"
      - "  Command: {{ task_02_cmd | default('N/A') }}"
      - "  Exit code: {{ task_02_rc | default(-1) }}"
      - "  Data: {{ data_02 | default('') | trim }}"
      - "  Status: {{ status_02 | default('ERROR') | trim }}"
      - "  Details: {{ details_02 | default('') | trim }}"
      - ""
      - "REQUIREMENT 03 - {{ req_03 | default('') }}:"
      - "  Task: {{ task_03_name | default('Not recorded') }}"
      - "  Command: {{ task_03_cmd | default('N/A') }}"
      - "  Exit code: {{ task_03_rc | default(-1) }}"
      - "  Data: {{ data_03 | default('') | trim }}"
      - "  Status: {{ status_03 | default('ERROR') | trim }}"
      - "  Details: {{ details_03 | default('') | trim }}"
      - ""
      - "REQUIREMENT 04 - {{ req_04 | default('') }}:"
      - "  Task: {{ task_04_name | default('Not recorded') }}"
      - "  Command: {{ task_04_cmd | default('N/A') }}"
      - "  Exit code: {{ task_04_rc | default(-1) }}"
      - "  Data: {{ data_04 | default('') | trim }}"
      - "  Status: {{ status_04 | default('ERROR') | trim }}"
      - "  Details: {{ details_04 | default('') | trim }}"
      - ""
      - "REQUIREMENT 05 - {{ req_05 | default('') }}:"
      - "  Task: {{ task_05_name | default('Not recorded') }}"
      - "  Command: {{ task_05_cmd | default('N/A') }}"
      - "  Exit code: {{ task_05_rc | default(-1) }}"
      - "  Data: {{ data_05 | default('') | trim }}"
      - "  Status: {{ status_05 | default('ERROR') | trim }}"
      - "  Details: {{ details_05 | default('') | trim }}"
      - ""
      - "REQUIREMENT 06 - {{ req_06 | default('') }}:"
      - "  Task: {{ task_06_name | default('Not recorded') }}"
      - "  Command: {{ task_06_cmd | default('N/A') }}"
      - "  Exit code: {{ task_06_rc | default(-1) }}"
      - "  Data: {{ data_06 | default('') | trim }}"
      - "  Status: {{ status_06 | default('ERROR') | trim }}"
      - "  Details: {{ details_06 | default('') | trim }}"
      - ""
      - "========================================================"
      - "OVERALL REMEDIATION:"
      - "  Result: {{ cis_result | default('ERROR') | trim }}"
      - "  Details: {{ details_05 | default('Not evaluated') | trim }}"
      - "========================================================"
    tags: [execute]

  always:
# === RESTORE (tag: restore) ===
  - name: "Restore - Check if config backup exists"
    ansible.builtin.stat:
      path: "{{ backup_dir }}/config.present"
    register: _restore_config_present
    failed_when: false
    tags: [restore]

  - name: "Restore - Restore crypto config from backup"
    ansible.builtin.copy:
      src: "{{ backup_dir }}/config.present"
      dest: "{{ config_file }}"
      remote_src: true
    when: _restore_config_present.stat.exists
    failed_when: false
    tags: [restore]

  - name: "Restore - Read original crypto policy from backup"
    ansible.builtin.slurp:
      src: "{{ backup_dir }}/config.present"
    register: _restore_policy_content
    when:
    - _restore_config_present.stat.exists | default(false)
    failed_when: false
    tags: [restore]

  - name: "Restore - Apply original crypto policy"
    ansible.builtin.shell: "update-crypto-policies --set {{ _restore_policy_content.content | b64decode | trim }}"
    args:
      executable: /bin/bash
    when:
    - _restore_config_present.stat.exists | default(false)
    - _restore_policy_content.content is defined
    - (_restore_policy_content.content | b64decode | trim) | length > 0
    failed_when: false
    tags: [restore]

  - name: "Restore - Remove subpolicy file (created during remediation)"
    ansible.builtin.file:
      path: "{{ subpolicy_file }}"
      state: absent
    failed_when: false
    tags: [restore]

  - name: "Restore - Remove backup directory"
    ansible.builtin.file:
      path: "{{ backup_dir }}"
      state: absent
    failed_when: false
    tags: [restore]
