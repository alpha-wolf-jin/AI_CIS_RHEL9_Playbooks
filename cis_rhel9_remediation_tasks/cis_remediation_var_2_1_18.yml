playbook_name: "cis_2_1_18"
backup_dir: "/var/log/ai-playbooks-backup/{{ playbook_name }}"
checkpoint_id: "cis_2_1_18"
state_guard_dir: "/usr/local/bin/cis/.cis_state_guard/{{ checkpoint_id }}"
state_guard_flag: "{{ state_guard_dir }}/checkpoint.flag"
req_01: "Apply prerequisite check for systemctl and dnf using command: `which systemctl && which dnf`. Expected result: both commands return a path."
req_02: "Stop httpd.socket, httpd.service, and nginx.service using command: `systemctl stop httpd.socket httpd.service nginx.service`. Expected result: services are stopped."
req_03: "Remove httpd and nginx packages using command: `dnf remove httpd nginx`. Expected result: packages are removed."
req_04: "If packages are required for dependencies, stop and mask httpd.socket, httpd.service, and nginx.service using command: `systemctl stop httpd.socket httpd.service nginx.service && systemctl mask httpd.socket httpd.service nginx.service`. Expected result: services are stopped and masked."
req_05: "Verify that httpd.socket, httpd.service, and nginx.service are not active or enabled using command: `systemctl is-active httpd.socket httpd.service nginx.service && systemctl is-enabled httpd.socket httpd.service nginx.service`. Expected result: each returns 'inactive' or 'masked' for active check, and 'disabled' or 'masked' for enabled check."
req_06: "Store the final remediation result in a variable named 'cis_result' using set_fact. Set cis_result to the overall remediation status (PASS/FAIL/SKIP/ERROR) derived from the last requirement's status variable."
