playbook_name: "cis_5_2_6_sudo_timeout"
backup_dir: "/var/log/ai-playbooks-backup/{{ playbook_name }}"
checkpoint_id: "cis_5_2_6"
state_guard_dir: "/usr/local/bin/cis/.cis_state_guard/{{ checkpoint_id }}"
state_guard_flag: "{{ state_guard_dir }}/checkpoint.flag"
req_01: "Check if sudo is installed using command: `which sudo`. Expected result: path to sudo binary is displayed."
req_02: "Identify the sudoers file path from audit section using command: `sudo visudo -c 2>&1 | grep -oP '/[^ ]+sudoers[^ ]*'`. Expected result: path to the sudoers file."
req_03: "Check current timestamp_timeout value using command: `sudo grep -E '^Defaults.*timestamp_timeout' /etc/sudoers /etc/sudoers.d/* 2>/dev/null`. Expected result: current timeout value displayed."
req_04: "If current timeout is greater than 15 minutes, edit the sudoers file using command: `sudo visudo -f <PATH TO FILE>`. Expected result: editor opens the file."
req_05: "Modify the timestamp_timeout entry to 15 minutes or less by changing the line to: `Defaults    env_reset, timestamp_timeout=15` or `Defaults    timestamp_timeout=15`. Expected result: timeout value updated."
req_06: "Verify the change using command: `sudo grep -E '^Defaults.*timestamp_timeout' /etc/sudoers /etc/sudoers.d/* 2>/dev/null`. Expected result: timestamp_timeout set to 15 or less."
req_07: "Store the final remediation result in a variable named 'cis_result' using set_fact. Set cis_result to the overall remediation status (PASS/FAIL/SKIP/ERROR) derived from the last requirement's status variable."
timeout_value: "15"
max_timeout: 15
