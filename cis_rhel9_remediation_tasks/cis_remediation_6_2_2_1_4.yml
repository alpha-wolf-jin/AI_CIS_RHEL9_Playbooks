---
- name: Initialize meta data variables
  include_vars: cis_remediation_var_6_2_2_1_4.yml

- name: "State Guard - Check for existing checkpoint"
  ansible.builtin.stat:
    path: "{{ state_guard_flag }}"
  register: _sg_flag
  tags: [snapshot]
- name: "State Guard - Remove old checkpoint"
  ansible.builtin.file:
    path: "{{ state_guard_dir }}"
    state: absent
  when: "_sg_flag.stat.exists"
  tags: [snapshot]
- name: "State Guard - Create checkpoint directory"
  ansible.builtin.file:
    path: "{{ state_guard_dir }}"
    state: directory
    mode: '0700'
  tags: [snapshot]
- name: "State Guard - Snapshot socket unit file state"
  ansible.builtin.stat:
    path: "/etc/systemd/system/{{ socket_unit }}"
  register: _sg_socket_stat
  tags: [snapshot]
- name: "State Guard - Backup socket unit file if present"
  ansible.builtin.copy:
    src: "/etc/systemd/system/{{ socket_unit }}"
    dest: "{{ state_guard_dir }}/socket.present"
    remote_src: true
  when: "_sg_socket_stat.stat.exists"
  tags: [snapshot]
- name: "State Guard - Mark socket unit file as absent"
  ansible.builtin.copy:
    content: "absent"
    dest: "{{ state_guard_dir }}/socket.absent"
  when: "not _sg_socket_stat.stat.exists"
  tags: [snapshot]
- name: "State Guard - Snapshot service unit file state"
  ansible.builtin.stat:
    path: "/etc/systemd/system/{{ service_unit }}"
  register: _sg_service_stat
  tags: [snapshot]
- name: "State Guard - Backup service unit file if present"
  ansible.builtin.copy:
    src: "/etc/systemd/system/{{ service_unit }}"
    dest: "{{ state_guard_dir }}/service.present"
    remote_src: true
  when: "_sg_service_stat.stat.exists"
  tags: [snapshot]
- name: "State Guard - Mark service unit file as absent"
  ansible.builtin.copy:
    content: "absent"
    dest: "{{ state_guard_dir }}/service.absent"
  when: "not _sg_service_stat.stat.exists"
  tags: [snapshot]
- name: "State Guard - Create checkpoint flag"
  ansible.builtin.copy:
    content: "checkpoint"
    dest: "{{ state_guard_flag }}"
  tags: [snapshot]

- block:
  - name: "Check if systemd-journal-remote package is installed"
    ansible.builtin.package_facts:
      manager: auto
    failed_when: false
    tags: [execute]

  - name: "Set package installation status"
    ansible.builtin.set_fact:
      package_installed: "{{ 'systemd-journal-remote' in ansible_facts.packages }}"
    tags: [execute]

  - name: "Set playbook skipped flag"
    ansible.builtin.set_fact:
      playbook_skipped: "{{ not package_installed }}"
    tags: [execute]

  - name: "Req 01 - Stop systemd-journal-remote.socket"
    ansible.builtin.shell: |
      if systemctl is-active {{ socket_unit }} 2>/dev/null | grep -q '^active$'; then
        systemctl stop {{ socket_unit }} 2>&1 && echo "stopped" || echo "failed"
      else
        echo "already_inactive"
      fi
    args:
      executable: /bin/bash
    register: result_01
    failed_when: false
    changed_when: false
    when: "package_installed | default(false)"
    tags: [execute]

  - name: "Req 02 - Stop systemd-journal-remote.service"
    ansible.builtin.shell: |
      if systemctl is-active {{ service_unit }} 2>/dev/null | grep -q '^active$'; then
        systemctl stop {{ service_unit }} 2>&1 && echo "stopped" || echo "failed"
      else
        echo "already_inactive"
      fi
    args:
      executable: /bin/bash
    register: result_02
    failed_when: false
    changed_when: false
    when: "package_installed | default(false)"
    tags: [execute]

  - name: "Req 03 - Mask systemd-journal-remote.socket"
    ansible.builtin.shell: |
      if systemctl is-enabled {{ socket_unit }} 2>/dev/null | grep -q '^masked$'; then
        echo "already_masked"
      else
        systemctl mask {{ socket_unit }} 2>&1 && echo "masked" || echo "failed"
      fi
    args:
      executable: /bin/bash
    register: result_03
    failed_when: false
    changed_when: false
    when: "package_installed | default(false)"
    tags: [execute]

  - name: "Req 04 - Mask systemd-journal-remote.service"
    ansible.builtin.shell: |
      if systemctl is-enabled {{ service_unit }} 2>/dev/null | grep -q '^masked$'; then
        echo "already_masked"
      else
        systemctl mask {{ service_unit }} 2>&1 && echo "masked" || echo "failed"
      fi
    args:
      executable: /bin/bash
    register: result_04
    failed_when: false
    changed_when: false
    when: "package_installed | default(false)"
    tags: [execute]

  - name: "Req 05 - Verify systemd-journal-remote.socket is masked and inactive"
    ansible.builtin.shell: |
      systemctl is-enabled {{ socket_unit }} 2>/dev/null
      systemctl is-active {{ socket_unit }} 2>/dev/null
    args:
      executable: /bin/bash
    register: result_05
    failed_when: false
    changed_when: false
    when: "package_installed | default(false)"
    tags: [execute]

  - name: "Req 06 - Verify systemd-journal-remote.service is masked and inactive"
    ansible.builtin.shell: |
      systemctl is-enabled {{ service_unit }} 2>/dev/null
      systemctl is-active {{ service_unit }} 2>/dev/null
    args:
      executable: /bin/bash
    register: result_06
    failed_when: false
    changed_when: false
    when: "package_installed | default(false)"
    tags: [execute]

  - name: "Store requirement data"
    ansible.builtin.set_fact:
      task_01_name: "Req 01 - Stop systemd-journal-remote.socket"
      task_01_cmd: "systemctl stop {{ socket_unit }}"
      task_01_rc: "{{ result_01.rc | default(-1) if result_01 is defined else -1 }}"
      data_01: "{{ result_01.stdout | default('') | trim if result_01 is defined else 'SKIPPED - package not installed' }}"
      task_02_name: "Req 02 - Stop systemd-journal-remote.service"
      task_02_cmd: "systemctl stop {{ service_unit }}"
      task_02_rc: "{{ result_02.rc | default(-1) if result_02 is defined else -1 }}"
      data_02: "{{ result_02.stdout | default('') | trim if result_02 is defined else 'SKIPPED - package not installed' }}"
      task_03_name: "Req 03 - Mask systemd-journal-remote.socket"
      task_03_cmd: "systemctl mask {{ socket_unit }}"
      task_03_rc: "{{ result_03.rc | default(-1) if result_03 is defined else -1 }}"
      data_03: "{{ result_03.stdout | default('') | trim if result_03 is defined else 'SKIPPED - package not installed' }}"
      task_04_name: "Req 04 - Mask systemd-journal-remote.service"
      task_04_cmd: "systemctl mask {{ service_unit }}"
      task_04_rc: "{{ result_04.rc | default(-1) if result_04 is defined else -1 }}"
      data_04: "{{ result_04.stdout | default('') | trim if result_04 is defined else 'SKIPPED - package not installed' }}"
      task_05_name: "Req 05 - Verify systemd-journal-remote.socket"
      task_05_cmd: "systemctl is-enabled {{ socket_unit }} && systemctl is-active {{ socket_unit }}"
      task_05_rc: "{{ result_05.rc | default(-1) if result_05 is defined else -1 }}"
      data_05: "{{ result_05.stdout | default('') | trim if result_05 is defined else 'SKIPPED - package not installed' }}"
      task_06_name: "Req 06 - Verify systemd-journal-remote.service"
      task_06_cmd: "systemctl is-enabled {{ service_unit }} && systemctl is-active {{ service_unit }}"
      task_06_rc: "{{ result_06.rc | default(-1) if result_06 is defined else -1 }}"
      data_06: "{{ result_06.stdout | default('') | trim if result_06 is defined else 'SKIPPED - package not installed' }}"
    tags: [execute]

  - name: "Evaluate requirement statuses"
    ansible.builtin.set_fact:
      status_01: >-
        {{ 'SKIPPED' if (playbook_skipped | default(false)) or (result_01.skipped | default(false))
        else ('APPLIED' if (result_01.stdout | default('') | trim) in ['stopped', 'already_inactive']
        else 'FAILED') }}
      details_01: >-
        {{ 'Package not installed - skipped' if (playbook_skipped | default(false)) or (result_01.skipped | default(false))
        else ('Service stopped successfully' if (result_01.stdout | default('') | trim) == 'stopped'
        else ('Already inactive - no action needed' if (result_01.stdout | default('') | trim) == 'already_inactive'
        else 'Failed to stop service')) }}
      status_02: >-
        {{ 'SKIPPED' if (playbook_skipped | default(false)) or (result_02.skipped | default(false))
        else ('APPLIED' if (result_02.stdout | default('') | trim) in ['stopped', 'already_inactive']
        else 'FAILED') }}
      details_02: >-
        {{ 'Package not installed - skipped' if (playbook_skipped | default(false)) or (result_02.skipped | default(false))
        else ('Service stopped successfully' if (result_02.stdout | default('') | trim) == 'stopped'
        else ('Already inactive - no action needed' if (result_02.stdout | default('') | trim) == 'already_inactive'
        else 'Failed to stop service')) }}
      status_03: >-
        {{ 'SKIPPED' if (playbook_skipped | default(false)) or (result_03.skipped | default(false))
        else ('APPLIED' if 'masked' in (result_03.stdout | default(''))
        else 'FAILED') }}
      details_03: >-
        {{ 'Package not installed - skipped' if (playbook_skipped | default(false)) or (result_03.skipped | default(false))
        else ('Socket masked successfully' if 'masked' in (result_03.stdout | default(''))
        else ('Already masked - no action needed' if 'already_masked' in (result_03.stdout | default(''))
        else 'Failed to mask socket')) }}
      status_04: >-
        {{ 'SKIPPED' if (playbook_skipped | default(false)) or (result_04.skipped | default(false))
        else ('APPLIED' if 'masked' in (result_04.stdout | default(''))
        else 'FAILED') }}
      details_04: >-
        {{ 'Package not installed - skipped' if (playbook_skipped | default(false)) or (result_04.skipped | default(false))
        else ('Service masked successfully' if 'masked' in (result_04.stdout | default(''))
        else ('Already masked - no action needed' if 'already_masked' in (result_04.stdout | default(''))
        else 'Failed to mask service')) }}
      status_05: >-
        {{ 'SKIPPED' if (playbook_skipped | default(false)) or (result_05.skipped | default(false))
        else ('APPLIED' if ('masked' in (result_05.stdout | default('')) and 'inactive' in (result_05.stdout | default('')))
        else 'FAILED') }}
      details_05: >-
        {{ 'Package not installed - skipped' if (playbook_skipped | default(false)) or (result_05.skipped | default(false))
        else ('Verification passed - masked and inactive' if ('masked' in (result_05.stdout | default('')) and 'inactive' in (result_05.stdout | default('')))
        else 'Verification failed') }}
      status_06: >-
        {{ 'SKIPPED' if (playbook_skipped | default(false)) or (result_06.skipped | default(false))
        else ('APPLIED' if ('masked' in (result_06.stdout | default('')) and 'inactive' in (result_06.stdout | default('')))
        else 'FAILED') }}
      details_06: >-
        {{ 'Package not installed - skipped' if (playbook_skipped | default(false)) or (result_06.skipped | default(false))
        else ('Verification passed - masked and inactive' if ('masked' in (result_06.stdout | default('')) and 'inactive' in (result_06.stdout | default('')))
        else 'Verification failed') }}
    tags: [execute]

  - name: "Evaluate overall status"
    ansible.builtin.set_fact:
      overall_status: >-
        {{ 'SKIPPED' if (playbook_skipped | default(false))
        else ('APPLIED' if status_01 == 'APPLIED' and status_02 == 'APPLIED' and status_03 == 'APPLIED' and status_04 == 'APPLIED' and status_05 == 'APPLIED' and status_06 == 'APPLIED'
        else 'FAILED') }}
    tags: [execute]

  - name: "Set cis_result for reporting"
    ansible.builtin.set_fact:
      cis_result: "{{ {'APPLIED': 'PASS', 'FAILED': 'FAIL', 'SKIPPED': 'SKIP'}.get(overall_status | trim, 'ERROR') }}"
    tags: [execute]

  - name: "Store requirement 07 details"
    ansible.builtin.set_fact:
      task_07_name: "Req 07 - Store final remediation result"
      task_07_cmd: "cis_result set to {{ cis_result }}"
      task_07_rc: 0
      data_07: "cis_result = {{ cis_result }}"
      status_07: "{{ cis_result }}"
      details_07: "Overall remediation status stored in cis_result"
    tags: [execute]

  - name: "Generate remediation report"
    ansible.builtin.debug:
      msg:
      - "========================================================"
      - "        REMEDIATION REPORT — CIS 6.2.2.1.4"
      - "========================================================"
      - "Reference: CIS Benchmark checkpoint 6.2.2.1.4"
      - ""
      - "REQUIREMENT 01 - {{ req_01 }}:"
      - "  Task: {{ task_01_name | default('Task not recorded') }}"
      - "  Command: {{ task_01_cmd | default('N/A') }}"
      - "  Exit code: {{ task_01_rc | default(-1) }}"
      - "  Data: {{ data_01 | default('Data collection failed') | trim }}"
      - "  Status: {{ status_01 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_01 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 02 - {{ req_02 }}:"
      - "  Task: {{ task_02_name | default('Task not recorded') }}"
      - "  Command: {{ task_02_cmd | default('N/A') }}"
      - "  Exit code: {{ task_02_rc | default(-1) }}"
      - "  Data: {{ data_02 | default('Data collection failed') | trim }}"
      - "  Status: {{ status_02 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_02 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 03 - {{ req_03 }}:"
      - "  Task: {{ task_03_name | default('Task not recorded') }}"
      - "  Command: {{ task_03_cmd | default('N/A') }}"
      - "  Exit code: {{ task_03_rc | default(-1) }}"
      - "  Data: {{ data_03 | default('Data collection failed') | trim }}"
      - "  Status: {{ status_03 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_03 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 04 - {{ req_04 }}:"
      - "  Task: {{ task_04_name | default('Task not recorded') }}"
      - "  Command: {{ task_04_cmd | default('N/A') }}"
      - "  Exit code: {{ task_04_rc | default(-1) }}"
      - "  Data: {{ data_04 | default('Data collection failed') | trim }}"
      - "  Status: {{ status_04 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_04 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 05 - {{ req_05 }}:"
      - "  Task: {{ task_05_name | default('Task not recorded') }}"
      - "  Command: {{ task_05_cmd | default('N/A') }}"
      - "  Exit code: {{ task_05_rc | default(-1) }}"
      - "  Data: {{ data_05 | default('Data collection failed') | trim }}"
      - "  Status: {{ status_05 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_05 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 06 - {{ req_06 }}:"
      - "  Task: {{ task_06_name | default('Task not recorded') }}"
      - "  Command: {{ task_06_cmd | default('N/A') }}"
      - "  Exit code: {{ task_06_rc | default(-1) }}"
      - "  Data: {{ data_06 | default('Data collection failed') | trim }}"
      - "  Status: {{ status_06 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_06 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 07 - {{ req_07 }}:"
      - "  Task: {{ task_07_name | default('Task not recorded') }}"
      - "  Command: {{ task_07_cmd | default('N/A') }}"
      - "  Exit code: {{ task_07_rc | default(-1) }}"
      - "  Data: {{ data_07 | default('Data collection failed') | trim }}"
      - "  Status: {{ status_07 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_07 | default('Not evaluated') | trim }}"
      - ""
      - "========================================================"
      - "OVERALL REMEDIATION:"
      - "  Result: {{ cis_result | default('UNKNOWN') | trim }}"
      - "  Details: {{ 'All remediation steps skipped - package not installed' if cis_result | default('UNKNOWN') | trim == 'SKIP' else ('All requirements applied successfully' if cis_result | default('UNKNOWN') | trim == 'PASS' else ('One or more requirements failed' if cis_result | default('UNKNOWN') | trim == 'FAIL' else 'ERROR')) }}"
      - "========================================================"
    tags: [execute]

  always:
  - name: "State Guard Restore - Check if checkpoint exists"
    ansible.builtin.stat:
      path: "{{ state_guard_flag }}"
    register: _sg_restore_flag
    failed_when: false
    tags: [restore]

  - name: "State Guard Restore - Check if socket backup exists"
    ansible.builtin.stat:
      path: "{{ state_guard_dir }}/socket.present"
    register: _sg_restore_socket_present
    failed_when: false
    tags: [restore]

  - name: "State Guard Restore - Restore socket unit file"
    ansible.builtin.copy:
      src: "{{ state_guard_dir }}/socket.present"
      dest: "/etc/systemd/system/{{ socket_unit }}"
      remote_src: true
    when: "_sg_restore_socket_present.stat.exists | default(false)"
    failed_when: false
    tags: [restore]

  - name: "State Guard Restore - Check for socket absent marker"
    ansible.builtin.stat:
      path: "{{ state_guard_dir }}/socket.absent"
    register: _sg_restore_socket_absent
    failed_when: false
    tags: [restore]

  - name: "State Guard Restore - Delete socket unit file (was absent)"
    ansible.builtin.file:
      path: "/etc/systemd/system/{{ socket_unit }}"
      state: absent
    when: "_sg_restore_socket_absent.stat.exists | default(false)"
    failed_when: false
    tags: [restore]

  - name: "State Guard Restore - Check if service backup exists"
    ansible.builtin.stat:
      path: "{{ state_guard_dir }}/service.present"
    register: _sg_restore_service_present
    failed_when: false
    tags: [restore]

  - name: "State Guard Restore - Restore service unit file"
    ansible.builtin.copy:
      src: "{{ state_guard_dir }}/service.present"
      dest: "/etc/systemd/system/{{ service_unit }}"
      remote_src: true
    when: "_sg_restore_service_present.stat.exists | default(false)"
    failed_when: false
    tags: [restore]

  - name: "State Guard Restore - Check for service absent marker"
    ansible.builtin.stat:
      path: "{{ state_guard_dir }}/service.absent"
    register: _sg_restore_service_absent
    failed_when: false
    tags: [restore]

  - name: "State Guard Restore - Delete service unit file (was absent)"
    ansible.builtin.file:
      path: "/etc/systemd/system/{{ service_unit }}"
      state: absent
    when: "_sg_restore_service_absent.stat.exists | default(false)"
    failed_when: false
    tags: [restore]

  - name: "State Guard Restore - Unmask socket if it was not masked before"
    ansible.builtin.systemd:
      name: "{{ socket_unit }}"
      masked: no
    when: "_sg_restore_socket_present.stat.exists | default(false)"
    failed_when: false
    tags: [restore]

  - name: "State Guard Restore - Unmask service if it was not masked before"
    ansible.builtin.systemd:
      name: "{{ service_unit }}"
      masked: no
    when: "_sg_restore_service_present.stat.exists | default(false)"
    failed_when: false
    tags: [restore]

  - name: "State Guard Restore - Remove checkpoint"
    ansible.builtin.file:
      path: "{{ state_guard_dir }}"
      state: absent
    when: "_sg_restore_flag.stat.exists | default(false)"
    failed_when: false
    tags: [restore]
