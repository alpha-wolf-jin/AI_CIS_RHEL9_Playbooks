  always:
  - name: "Restore - Check if rsyslog.conf backup exists"
    ansible.builtin.stat:
      path: "{{ backup_dir }}/rsyslog.conf.present"
    register: _restore_stat_conf
    tags: [restore]

  - name: "Restore - Overwrite rsyslog.conf with original"
    ansible.builtin.copy:
      src: "{{ backup_dir }}/rsyslog.conf.present"
      dest: "{{ rsyslog_conf }}"
      remote_src: true
    when: "_restore_stat_conf.stat.exists | default(false)"
    failed_when: false
    tags: [restore]

  - name: "Restore - Check if rsyslog.d backup directory exists"
    ansible.builtin.stat:
      path: "{{ backup_dir }}/rsyslog.d"
    register: _restore_stat_d
    tags: [restore]

  - name: "Restore - Overwrite rsyslog.d with original"
    ansible.builtin.shell: |
      if [ -d "{{ backup_dir }}/rsyslog.d" ]; then
        rm -rf {{ rsyslog_d_dir }}/*
        if ls "{{ backup_dir }}/rsyslog.d"/*.conf 1>/dev/null 2>&1; then
          cp "{{ backup_dir }}/rsyslog.d"/*.conf {{ rsyslog_d_dir }}/
        fi
      fi
    args:
      executable: /bin/bash
    when: "_restore_stat_d.stat.exists | default(false) and _restore_stat_d.stat.isdir | default(false)"
    failed_when: false
    tags: [restore]

  - name: "Restore - Remove backup directory"
    ansible.builtin.file:
      path: "{{ backup_dir }}"
      state: absent
    failed_when: false
    tags: [restore]
