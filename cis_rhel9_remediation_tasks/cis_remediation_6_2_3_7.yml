---
- name: Initialize meta data variables
  include_vars: cis_remediation_var_6_2_3_7.yml

- name: "Snapshot - Create backup directory"
  ansible.builtin.file:
    path: "{{ backup_dir }}"
    state: directory
    mode: '0700'
  tags: [snapshot]
- name: "Snapshot - Check if rsyslog.conf exists"
  ansible.builtin.stat:
    path: "{{ rsyslog_conf }}"
  register: _stat_rsyslog_conf
  tags: [snapshot]
- name: "Snapshot - Backup rsyslog.conf if exists"
  ansible.builtin.copy:
    src: "{{ rsyslog_conf }}"
    dest: "{{ backup_dir }}/rsyslog.conf.present"
    remote_src: true
  when: "_stat_rsyslog_conf.stat.exists"
  tags: [snapshot]
- name: "Snapshot - Check if rsyslog.d directory exists"
  ansible.builtin.stat:
    path: "{{ rsyslog_d_dir }}"
  register: _stat_rsyslog_d
  tags: [snapshot]
- name: "Snapshot - Backup rsyslog.d directory if exists"
  ansible.builtin.shell: |
    if [ -d "{{ rsyslog_d_dir }}" ]; then
      mkdir -p "{{ backup_dir }}/rsyslog.d"
      if ls "{{ rsyslog_d_dir }}"/*.conf 1>/dev/null 2>&1; then
        cp "{{ rsyslog_d_dir }}"/*.conf "{{ backup_dir }}/rsyslog.d/"
      fi
    fi
  args:
    executable: /bin/bash
  when: "_stat_rsyslog_d.stat.exists and _stat_rsyslog_d.stat.isdir"
  failed_when: false
  tags: [snapshot]

