playbook_name: "cis_7_2_4"
backup_dir: "/var/log/ai-playbooks-backup/{{ playbook_name }}"
passwd_file: "/etc/passwd"
req_01: "Apply prerequisite check for passwd file access using command: `test -r /etc/passwd`. Expected result: exit code 0"
req_02: "Apply identification of duplicate UIDs using command: `awk -F: '{print $3}' /etc/passwd | sort | uniq -d`. Expected result: list of duplicate UIDs (or empty if none)"
req_03: "Apply listing of all users with a specific duplicate UID using command: `awk -F: -v uid='<DUPLICATE_UID>' '$3 == uid {print $1}' /etc/passwd`. Expected result: list of usernames sharing that UID"
req_04: "Apply listing of all files owned by a specific duplicate UID using command: `find / -user <DUPLICATE_UID> -ls 2>/dev/null`. Expected result: list of files owned by that UID"
req_05: "Apply assignment of a new unique UID to a user using command: `usermod -u <NEW_UNIQUE_UID> <username>`. Expected result: no output, user UID changed"
req_06: "Apply reassignment of file ownership to the new UID using command: `find / -user <OLD_DUPLICATE_UID> -exec chown <NEW_UNIQUE_UID> {} + 2>/dev/null`. Expected result: no output, files re-owned"
req_07: "Apply verification that no duplicate UIDs remain using command: `awk -F: '{print $3}' /etc/passwd | sort | uniq -d`. Expected result: empty output"
