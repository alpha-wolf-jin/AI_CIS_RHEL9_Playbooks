playbook_name: "remediate_cis_1_1_2_5_3"
backup_dir: "/var/log/ai-playbooks-backup/{{ playbook_name }}"
req_01: "Check if a separate partition exists for /var/tmp using command: `mount | grep /var/tmp`. Expected result: output shows a separate partition for /var/tmp."
req_02: "Edit the /etc/fstab file and add nosuid to the fourth field (mounting options) for the /var/tmp partition. Expected result: the line for /var/tmp in /etc/fstab includes nosuid in the options."
req_03: "Remount /var/tmp with the configured options using command: `mount -o remount /var/tmp`. Expected result: /var/tmp is remounted with nosuid option."
req_04: "Verify the nosuid option is set on /var/tmp using command: `mount | grep /var/tmp`. Expected result: output shows /var/tmp mounted with nosuid."
