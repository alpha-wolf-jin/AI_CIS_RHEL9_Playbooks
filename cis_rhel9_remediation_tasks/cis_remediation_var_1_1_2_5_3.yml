playbook_name: "remediate_cis_1_1_2_5_3"
backup_dir: "/var/log/ai-playbooks-backup/{{ playbook_name }}"
req_01: |
  Check if a separate partition exists for /var/tmp using command: `mount | grep -E '\\s/var/tmp\\s'`. Expected result: output showing a mounted partition for /var/tmp.
req_02: "Edit the /etc/fstab file and add nosuid to the fourth field (mounting options) for the /var/tmp partition. Expected result: the line for /var/tmp in /etc/fstab includes 'nosuid' among its options."
req_03: "Remount /var/tmp with the configured options using command: `mount -o remount /var/tmp`. Expected result: the /var/tmp partition is remounted successfully."
req_04: |
  Verify the nosuid option is set on /var/tmp using command: `mount | grep -E '\\s/var/tmp\\s' | grep -o 'nosuid'`. Expected result: output contains 'nosuid'.
req_05: "Store the final remediation result in a variable named 'cis_result' using set_fact. Set cis_result to the overall remediation status (PASS/FAIL/SKIP/ERROR) derived from the last requirement's status variable."
