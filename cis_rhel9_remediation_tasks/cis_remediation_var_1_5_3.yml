playbook_name: "cis_1_5_3_remediation"
backup_dir: "/var/log/ai-playbooks-backup/{{ playbook_name }}"
req_01: "1. Run the provided remediation script to fix Ensure core dump backtraces are disabled. Create or edit the file /etc/systemd/coredump.conf, or a file in the /etc/systemd/coredump.conf.d directory ending in .conf. Edit or add the following line in the [Coredump] section: ProcessSizeMax=0"
req_02: "2. VERIFY: Run audit check to confirm Ensure core dump backtraces are disabled is properly configured. Expected result: System is compliant"
req_03: "3. Store the final remediation result in a variable named 'cis_result' using set_fact. Set cis_result to the overall remediation status (PASS/FAIL/SKIP/ERROR) derived from the last requirement's status variable."
req_04: "4. Create a task named 'Generate remediation report' using debug msg"
coredump_config_file: "/etc/systemd/coredump.conf.d/60-coredump.conf"
