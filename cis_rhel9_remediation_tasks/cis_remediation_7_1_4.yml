---
- name: Initialize meta data variables
  include_vars: cis_remediation_var_7_1_4.yml

- name: "Snapshot - Create backup directory"
  ansible.builtin.file:
    path: "{{ backup_dir }}"
    state: directory
    mode: '0700'
  tags: [snapshot]
- name: "Snapshot - Check if config file exists"
  ansible.builtin.stat:
    path: "{{ target_file }}"
  register: _backup_stat
  failed_when: false
  tags: [snapshot]
- name: "Snapshot - Backup config file if exists"
  ansible.builtin.copy:
    src: "{{ target_file }}"
    dest: "{{ backup_dir }}/{{ target_file | basename }}.backup"
    remote_src: true
  when: "_backup_stat.stat.exists | default(false)"
  failed_when: false
  tags: [snapshot]

- name: "Initialize data variables"
  set_fact:
    data_01: "Not collected yet"
    status_01: "ERROR"
    details_01: "Not evaluated"
    data_02: "Not collected yet"
    status_02: "ERROR"
    details_02: "Not evaluated"
    data_03: "Not collected yet"
    status_03: "ERROR"
    details_03: "Not evaluated"
    data_04: "Not collected yet"
    status_04: "ERROR"
    details_04: "Not evaluated"
    task_01_name: "Not executed"
    task_01_cmd: "N/A"
    task_01_rc: -1
    task_02_name: "Not executed"
    task_02_cmd: "N/A"
    task_02_rc: -1
    task_03_name: "Not executed"
    task_03_cmd: "N/A"
    task_03_rc: -1
    task_04_name: "Not executed"
    task_04_cmd: "N/A"
    task_04_rc: -1
    cis_result: "ERROR"
  tags: [execute]
- name: "Check target file existence"
  ansible.builtin.stat:
    path: "{{ target_file }}"
  register: _target_stat
  failed_when: false
  tags: [execute]
- name: "Set SKIP status if file absent"
  set_fact:
    cis_result: "SKIP"
    data_01: "N/A"
    status_01: "SKIP"
    details_01: "Target file {{ target_file }} does not exist"
    task_01_name: "Skipped - file absent"
    task_01_cmd: "N/A"
    task_01_rc: 0
    data_02: "N/A"
    status_02: "SKIP"
    details_02: "Target file absent, skipping"
    task_02_name: "Skipped - file absent"
    task_02_cmd: "N/A"
    task_02_rc: 0
    data_03: "N/A"
    status_03: "SKIP"
    details_03: "Target file absent, cannot verify"
    task_03_name: "Skipped - file absent"
    task_03_cmd: "N/A"
    task_03_rc: 0
    data_04: "SKIP"
    status_04: "SKIP"
    details_04: "Target file absent, overall result SKIP"
    task_04_name: "Store overall remediation status"
    task_04_cmd: "N/A"
    task_04_rc: 0
  when: not (_target_stat.stat.exists | default(false))
  tags: [execute]
- block:
  - name: "Req 01 - Remove excess permissions on /etc/group-"
    ansible.builtin.file:
      path: "{{ target_file }}"
      mode: "u-x,go-wx"
    register: result_01
    failed_when: false
    tags: [execute]

  - name: "Store requirement 01 details"
    set_fact:
      task_01_name: "Remove excess permissions on /etc/group-"
      task_01_cmd: "chmod u-x,go-wx /etc/group-"
      task_01_rc: "{{ 0 if not (result_01.failed | default(false)) else -1 }}"
      data_01: "{{ 'Permissions set to u-x,go-wx' if not (result_01.failed | default(false)) else result_01.msg | default('Failed') }}"
      status_01: "{{ 'PASS' if not (result_01.failed | default(false)) else 'FAIL' }}"
      details_01: "{{ 'Permissions removed successfully' if not (result_01.failed | default(false)) else 'Failed to set permissions' }}"
    tags: [execute]

  - name: "Req 02 - Set owner and group to root on /etc/group-"
    ansible.builtin.file:
      path: "{{ target_file }}"
      owner: "{{ expected_owner }}"
      group: "{{ expected_group }}"
    register: result_02
    failed_when: false
    tags: [execute]

  - name: "Store requirement 02 details"
    set_fact:
      task_02_name: "Set owner and group to root on /etc/group-"
      task_02_cmd: "chown root:root /etc/group-"
      task_02_rc: "{{ 0 if not (result_02.failed | default(false)) else -1 }}"
      data_02: "{{ 'Owner and group set to root:root' if not (result_02.failed | default(false)) else result_02.msg | default('Failed') }}"
      status_02: "{{ 'PASS' if not (result_02.failed | default(false)) else 'FAIL' }}"
      details_02: "{{ 'Ownership set successfully' if not (result_02.failed | default(false)) else 'Failed to set ownership' }}"
    tags: [execute]

  - name: "Req 03 - Verify permissions and ownership on /etc/group-"
    ansible.builtin.shell: "stat -c '%a %U:%G' {{ target_file }}"
    args:
      executable: /bin/bash
    register: result_03
    failed_when: false
    changed_when: false
    tags: [execute]

  - name: "Store requirement 03 details"
    set_fact:
      task_03_name: "Verify permissions and ownership on /etc/group-"
      task_03_cmd: "stat -c '%a %U:%G' /etc/group-"
      task_03_rc: "{{ result_03.rc | default(-1) }}"
      data_03: "{{ result_03.stdout | default('') | trim }}"
      status_03: "{{ 'PASS' if (result_03.stdout | default('') | trim) == (expected_perms + ' ' + expected_owner + ':' + expected_group) else 'FAIL' }}"
      details_03: >-
        {{ 'Verification passed - ' + (result_03.stdout | default('') | trim)
           if (result_03.stdout | default('') | trim) == (expected_perms + ' ' + expected_owner + ':' + expected_group)
           else 'Verification failed - expected ' + expected_perms + ' ' + expected_owner + ':' + expected_group
                + ', got ' + (result_03.stdout | default('') | trim) }}
    tags: [execute]

  - name: "Req 04 - Store overall remediation status"
    set_fact:
      cis_result: >-
        {{ 'PASS' if status_03 | trim == 'PASS'
           else 'FAIL' if status_03 | trim == 'FAIL'
           else 'ERROR' }}
    tags: [execute]

  - name: "Store requirement 04 details"
    set_fact:
      task_04_name: "Store overall remediation status"
      task_04_cmd: "N/A"
      task_04_rc: 0
      data_04: "{{ cis_result }}"
      status_04: "{{ cis_result }}"
      details_04: "Overall remediation result derived from verification step"
    tags: [execute]

  when: _target_stat.stat.exists | default(false)
  tags: [execute]

  always:
  - name: "Restore - Check if backup exists"
    ansible.builtin.stat:
      path: "{{ backup_dir }}/{{ target_file | basename }}.backup"
    register: _restore_stat
    failed_when: false
    tags: [restore]

  - name: "Restore - Overwrite with original"
    ansible.builtin.copy:
      src: "{{ backup_dir }}/{{ target_file | basename }}.backup"
      dest: "{{ target_file }}"
      remote_src: true
    when: "_restore_stat.stat.exists | default(false)"
    failed_when: false
    tags: [restore]

  - name: "Restore - Remove backup directory"
    ansible.builtin.file:
      path: "{{ backup_dir }}"
      state: absent
    failed_when: false
    tags: [restore]

- name: "Generate remediation report"
  debug:
    msg:
    - "========================================================"
    - "        REMEDIATION REPORT — CIS 7.1.4"
    - "========================================================"
    - "Reference: CIS Benchmark checkpoint 7.1.4"
    - ""
    - "REQUIREMENT 01 - {{ req_01 }}:"
    - "  Task: {{ task_01_name | default('Task not recorded') }}"
    - "  Command: {{ task_01_cmd | default('N/A') }}"
    - "  Exit code: {{ task_01_rc | default(-1) }}"
    - "  Data: {{ data_01 | default('Data collection failed') | trim }}"
    - "  Status: {{ status_01 | default('ERROR') | trim }}"
    - "  Details: {{ details_01 | default('Not evaluated') | trim }}"
    - ""
    - "REQUIREMENT 02 - {{ req_02 }}:"
    - "  Task: {{ task_02_name | default('Task not recorded') }}"
    - "  Command: {{ task_02_cmd | default('N/A') }}"
    - "  Exit code: {{ task_02_rc | default(-1) }}"
    - "  Data: {{ data_02 | default('Data collection failed') | trim }}"
    - "  Status: {{ status_02 | default('ERROR') | trim }}"
    - "  Details: {{ details_02 | default('Not evaluated') | trim }}"
    - ""
    - "REQUIREMENT 03 - {{ req_03 }}:"
    - "  Task: {{ task_03_name | default('Task not recorded') }}"
    - "  Command: {{ task_03_cmd | default('N/A') }}"
    - "  Exit code: {{ task_03_rc | default(-1) }}"
    - "  Data: {{ data_03 | default('Data collection failed') | trim }}"
    - "  Status: {{ status_03 | default('ERROR') | trim }}"
    - "  Details: {{ details_03 | default('Not evaluated') | trim }}"
    - ""
    - "REQUIREMENT 04 - {{ req_04 }}:"
    - "  Task: {{ task_04_name | default('Task not recorded') }}"
    - "  Command: {{ task_04_cmd | default('N/A') }}"
    - "  Exit code: {{ task_04_rc | default(-1) }}"
    - "  Data: {{ data_04 | default('Data collection failed') | trim }}"
    - "  Status: {{ status_04 | default('ERROR') | trim }}"
    - "  Details: {{ details_04 | default('Not evaluated') | trim }}"
    - ""
    - "========================================================"
    - "OVERALL REMEDIATION:"
    - "  Result: {{ cis_result | default('ERROR') | trim }}"
    - "  Details: {{ details_04 | default('Not evaluated') | trim }}"
    - "========================================================"
  tags: [execute]
