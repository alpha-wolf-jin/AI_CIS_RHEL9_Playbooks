---
- name: Initialize meta data variables
  include_vars: cis_remediation_var_3_3_1.yml

- name: "Snapshot - Create backup directory"
  ansible.builtin.file:
    path: "{{ backup_dir }}"
    state: directory
    mode: '0700'
  tags: [snapshot]
- name: "Snapshot - Check if IPv4 sysctl config exists"
  ansible.builtin.stat:
    path: "{{ config_ipv4 }}"
  register: _sg_ipv4_stat
  tags: [snapshot]
- name: "Snapshot - Backup IPv4 config (present)"
  ansible.builtin.copy:
    src: "{{ config_ipv4 }}"
    dest: "{{ backup_dir }}/{{ config_ipv4 | basename }}.present"
    remote_src: true
  when: _sg_ipv4_stat.stat.exists
  tags: [snapshot]
- name: "Snapshot - Mark IPv4 config as absent"
  ansible.builtin.copy:
    content: "absent"
    dest: "{{ backup_dir }}/{{ config_ipv4 | basename }}.absent"
  when: not _sg_ipv4_stat.stat.exists
  tags: [snapshot]
- name: "Snapshot - Check if IPv6 sysctl config exists"
  ansible.builtin.stat:
    path: "{{ config_ipv6 }}"
  register: _sg_ipv6_stat
  tags: [snapshot]
- name: "Snapshot - Backup IPv6 config (present)"
  ansible.builtin.copy:
    src: "{{ config_ipv6 }}"
    dest: "{{ backup_dir }}/{{ config_ipv6 | basename }}.present"
    remote_src: true
  when: _sg_ipv6_stat.stat.exists
  tags: [snapshot]
- name: "Snapshot - Mark IPv6 config as absent"
  ansible.builtin.copy:
    content: "absent"
    dest: "{{ backup_dir }}/{{ config_ipv6 | basename }}.absent"
  when: not _sg_ipv6_stat.stat.exists
  tags: [snapshot]
- name: "Snapshot - Check if IPv4 temp script exists"
  ansible.builtin.stat:
    path: "{{ ipv4_temp_script }}"
  register: _sg_ipv4_temp_stat
  tags: [snapshot]
- name: "Snapshot - Mark IPv4 temp script as absent"
  ansible.builtin.copy:
    content: "absent"
    dest: "{{ ipv4_temp_absent_marker }}"
  when: not _sg_ipv4_temp_stat.stat.exists
  tags: [snapshot]
- name: "Snapshot - Check if IPv6 temp script exists"
  ansible.builtin.stat:
    path: "{{ ipv6_temp_script }}"
  register: _sg_ipv6_temp_stat
  tags: [snapshot]
- name: "Snapshot - Mark IPv6 temp script as absent"
  ansible.builtin.copy:
    content: "absent"
    dest: "{{ ipv6_temp_absent_marker }}"
  when: not _sg_ipv6_temp_stat.stat.exists
  tags: [snapshot]

- block:
  - name: "Check if IPv6 is enabled"
    ansible.builtin.shell: sysctl -n net.ipv6.conf.all.disable_ipv6
    args:
      executable: /bin/bash
    register: _ipv6_disable
    failed_when: false
    changed_when: false
    tags: [execute]

  - name: "Set fact for ipv6_enabled"
    set_fact:
      ipv6_enabled: "{{ (_ipv6_disable.stdout | default('0') | trim) == '0' }}"
    tags: [execute]

# Requirement 1: Apply IPv4 remediation
  - name: "Req 1 - Set net.ipv4.ip_forward=0 in sysctl config"
    ansible.builtin.lineinfile:
      path: "{{ config_ipv4 }}"
      regexp: |
        ^net\.ipv4\.ip_forward\s*=
      line: "net.ipv4.ip_forward = 0"
      create: true
      mode: '0644'
    register: _req1_ipv4_config
    failed_when: false
    tags: [execute]

  - name: "Req 1 - Deploy IPv4 remediation script"
    ansible.builtin.copy:
      dest: "{{ ipv4_temp_script }}"
      content: "{{ ipv4_script_content }}"
      mode: '0700'
    register: _req1_ipv4_deploy
    failed_when: false
    tags: [execute]

  - name: "Req 1 - Execute IPv4 remediation script"
    ansible.builtin.shell: /bin/bash "{{ ipv4_temp_script }}"
    args:
      executable: /bin/bash
    register: _req1_ipv4_exec
    failed_when: false
    tags: [execute]

  - name: "Req 1 - Remove IPv4 remediation script"
    ansible.builtin.file:
      path: "{{ ipv4_temp_script }}"
      state: absent
    tags: [execute]

# Requirement 1: Apply IPv6 remediation if enabled
  - name: "Req 1 - Set net.ipv6.conf.all.forwarding=0 in sysctl config (if IPv6 enabled)"
    ansible.builtin.lineinfile:
      path: "{{ config_ipv6 }}"
      regexp: |
        ^net\.ipv6\.conf\.all\.forwarding\s*=
      line: "net.ipv6.conf.all.forwarding = 0"
      create: true
      mode: '0644'
    register: _req1_ipv6_config
    failed_when: false
    when: ipv6_enabled | bool
    tags: [execute]

  - name: "Req 1 - Deploy IPv6 remediation script (if IPv6 enabled)"
    ansible.builtin.copy:
      dest: "{{ ipv6_temp_script }}"
      content: "{{ ipv6_script_content }}"
      mode: '0700'
    register: _req1_ipv6_deploy
    failed_when: false
    when: ipv6_enabled | bool
    tags: [execute]

  - name: "Req 1 - Execute IPv6 remediation script (if IPv6 enabled)"
    ansible.builtin.shell: /bin/bash "{{ ipv6_temp_script }}"
    args:
      executable: /bin/bash
    register: _req1_ipv6_exec
    failed_when: false
    when: ipv6_enabled | bool
    tags: [execute]

  - name: "Req 1 - Remove IPv6 remediation script"
    ansible.builtin.file:
      path: "{{ ipv6_temp_script }}"
      state: absent
    when: ipv6_enabled | bool
    tags: [execute]

# Aggregate remediation status
  - name: "Req 1 - Determine overall remediation status"
    set_fact:
      req1_status: >-
        {%- if (not (ipv6_enabled | bool) and _req1_ipv4_exec.rc | default(1) == 0) or
               (ipv6_enabled | bool and _req1_ipv4_exec.rc | default(1) == 0 and _req1_ipv6_exec.rc | default(1) == 0) -%}
        PASS {%- else -%} FAIL {%- endif -%}
    tags: [execute]

# Requirement 2: Verify
  - name: "Req 2 - Check net.ipv4.ip_forward is 0"
    ansible.builtin.shell: sysctl -n net.ipv4.ip_forward
    args:
      executable: /bin/bash
    register: _verify_ipv4
    failed_when: false
    changed_when: false
    tags: [execute]

  - name: "Req 2 - Check net.ipv6.conf.all.forwarding is 0 (if IPv6 enabled)"
    ansible.builtin.shell: sysctl -n net.ipv6.conf.all.forwarding
    args:
      executable: /bin/bash
    register: _verify_ipv6
    failed_when: false
    changed_when: false
    when: ipv6_enabled | bool
    tags: [execute]

  - name: "Req 2 - Determine verification status"
    set_fact:
      verify_status: >-
        {%- set v4_ok = _verify_ipv4.stdout | default('') | trim == '0' -%}
        {%- if ipv6_enabled | bool -%}
          {%- set v6_ok = _verify_ipv6.stdout | default('') | trim == '0' -%}
          {%- if v4_ok and v6_ok -%} PASS {%- else -%} FAIL {%- endif -%}
        {%- else -%}
          {%- if v4_ok -%} PASS {%- else -%} FAIL {%- endif -%}
        {%- endif -%}
    tags: [execute]

# Requirement 3: Store cis_result
  - name: "Req 3 - Set cis_result"
    set_fact:
      cis_result: "{{ verify_status | trim }}"
    tags: [execute]

# Requirement 4: Report
  - name: "Generate remediation report"
    debug:
      msg:
      - "REMEDIATION REPORT — CIS 3.3.1"
      - "Reference: CIS Benchmark checkpoint 3.3.1"
      - ""
      - "REQUIREMENT 01 - {{ req_01 }}:"
      - "  Task: Execute IPv4 (and IPv6 if enabled) remediation scripts and config"
      - "  Command: /bin/bash {{ ipv4_temp_script }} {% if ipv6_enabled | bool %}and {{ ipv6_temp_script }}{% endif %}"
      - "  Exit code: {{ _req1_ipv4_exec.rc | default(-1) }}"
      - "  Data: {{ _req1_ipv4_exec.stdout | default('') | trim }} {{ _req1_ipv4_exec.stderr | default('') | trim }}"
      - "  Status: {{ req1_status | trim }}"
      - "  Details: IPv4 remediation applied{% if ipv6_enabled | bool %}; IPv6 remediation applied{% endif %}"
      - ""
      - "REQUIREMENT 02 - {{ req_02 }}:"
      - "  Task: Verify kernel parameters"
      - "  Command: sysctl -n net.ipv4.ip_forward {% if ipv6_enabled | bool %}; sysctl -n net.ipv6.conf.all.forwarding{% endif %}"
      - "  Exit code: {{ _verify_ipv4.rc | default(-1) }}"
      - "  Data: net.ipv4.ip_forward={{ _verify_ipv4.stdout | default('') | trim }}{% if ipv6_enabled | bool %}, net.ipv6.conf.all.forwarding={{ _verify_ipv6.stdout | default('') | trim }}{% endif %}"
      - "  Status: {{ verify_status | trim }}"
      - "  Details: {{ 'Both forwarding parameters set to 0' if verify_status | trim == 'PASS' else 'Parameter(s) not 0 or IPv6 check failed' }}"
      - ""
      - "REQUIREMENT 03 - {{ req_03 }}:"
      - "  Task: Set cis_result"
      - "  Command: set_fact"
      - "  Exit code: 0"
      - "  Data: cis_result={{ cis_result | trim }}"
      - "  Status: {{ cis_result | trim }}"
      - "  Details: Overall remediation status"
      - ""
      - "========================================================"
      - "OVERALL REMEDIATION:"
      - "  Result: {{ cis_result | trim }}"
      - "========================================================"
    tags: [execute]

  always:
  - name: "Restore - Check if IPv4 config backup exists"
    ansible.builtin.stat:
      path: "{{ backup_dir }}/{{ config_ipv4 | basename }}.present"
    register: _restore_ipv4_present_stat
    tags: [restore]

  - name: "Restore - Restore IPv4 config from backup"
    ansible.builtin.copy:
      src: "{{ backup_dir }}/{{ config_ipv4 | basename }}.present"
      dest: "{{ config_ipv4 }}"
      remote_src: true
    when: _restore_ipv4_present_stat.stat.exists | default(false)
    tags: [restore]

  - name: "Restore - Check if IPv4 config absent marker exists"
    ansible.builtin.stat:
      path: "{{ backup_dir }}/{{ config_ipv4 | basename }}.absent"
    register: _restore_ipv4_absent_stat
    tags: [restore]

  - name: "Restore - Delete IPv4 config (it was absent)"
    ansible.builtin.file:
      path: "{{ config_ipv4 }}"
      state: absent
    when: _restore_ipv4_absent_stat.stat.exists | default(false)
    tags: [restore]

  - name: "Restore - Check if IPv6 config backup exists"
    ansible.builtin.stat:
      path: "{{ backup_dir }}/{{ config_ipv6 | basename }}.present"
    register: _restore_ipv6_present_stat
    tags: [restore]

  - name: "Restore - Restore IPv6 config from backup"
    ansible.builtin.copy:
      src: "{{ backup_dir }}/{{ config_ipv6 | basename }}.present"
      dest: "{{ config_ipv6 }}"
      remote_src: true
    when: _restore_ipv6_present_stat.stat.exists | default(false)
    tags: [restore]

  - name: "Restore - Check if IPv6 config absent marker exists"
    ansible.builtin.stat:
      path: "{{ backup_dir }}/{{ config_ipv6 | basename }}.absent"
    register: _restore_ipv6_absent_stat
    tags: [restore]

  - name: "Restore - Delete IPv6 config (it was absent)"
    ansible.builtin.file:
      path: "{{ config_ipv6 }}"
      state: absent
    when: _restore_ipv6_absent_stat.stat.exists | default(false)
    tags: [restore]

  - name: "Restore - Check if IPv4 temp script absent marker exists"
    ansible.builtin.stat:
      path: "{{ ipv4_temp_absent_marker }}"
    register: _restore_ipv4_temp_absent_stat
    failed_when: false
    tags: [restore]

  - name: "Restore - Delete IPv4 temp script (it was absent)"
    ansible.builtin.file:
      path: "{{ ipv4_temp_script }}"
      state: absent
    when: _restore_ipv4_temp_absent_stat.stat.exists | default(false)
    failed_when: false
    tags: [restore]

  - name: "Restore - Check if IPv6 temp script absent marker exists"
    ansible.builtin.stat:
      path: "{{ ipv6_temp_absent_marker }}"
    register: _restore_ipv6_temp_absent_stat
    failed_when: false
    tags: [restore]

  - name: "Restore - Delete IPv6 temp script (it was absent)"
    ansible.builtin.file:
      path: "{{ ipv6_temp_script }}"
      state: absent
    when: _restore_ipv6_temp_absent_stat.stat.exists | default(false)
    failed_when: false
    tags: [restore]

  - name: "Restore - Remove backup directory"
    ansible.builtin.file:
      path: "{{ backup_dir }}"
      state: absent
    tags: [restore]
