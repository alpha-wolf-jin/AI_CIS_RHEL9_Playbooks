---
- name: Initialize meta data variables
  include_vars: cis_remediation_var_2_1_21.yml

- name: "Snapshot - Create backup directory"
  ansible.builtin.file:
    path: "{{ backup_dir }}"
    state: directory
    mode: '0700'
  tags: [snapshot]
- name: "Snapshot - Check if /etc/postfix/main.cf exists"
  ansible.builtin.stat:
    path: /etc/postfix/main.cf
  register: _main_cf_stat
  tags: [snapshot]
- name: "Snapshot - Backup /etc/postfix/main.cf if exists"
  ansible.builtin.copy:
    src: /etc/postfix/main.cf
    dest: "{{ backup_dir }}/main.cf.bak"
    remote_src: true
  when: _main_cf_stat.stat.exists
  tags: [snapshot]

- block:
  - name: "Initialize data variables"
    ansible.builtin.set_fact:
      data_01: "Not collected yet"
      status_01: "ERROR"
      details_01: "Not evaluated"
      data_02: "Not collected yet"
      status_02: "ERROR"
      details_02: "Not evaluated"
      data_03: "Not collected yet"
      status_03: "ERROR"
      details_03: "Not evaluated"
      data_04: "Not collected yet"
      status_04: "ERROR"
      details_04: "Not evaluated"
      data_05: "Not collected yet"
      status_05: "ERROR"
      details_05: "Not evaluated"
      task_01_name: "Not executed"
      task_01_cmd: "N/A"
      task_01_rc: -1
      task_02_name: "Not executed"
      task_02_cmd: "N/A"
      task_02_rc: -1
      task_03_name: "Not executed"
      task_03_cmd: "N/A"
      task_03_rc: -1
      task_04_name: "Not executed"
      task_04_cmd: "N/A"
      task_04_rc: -1
      task_05_name: "Not executed"
      task_05_cmd: "N/A"
      task_05_rc: -1
      postfix_installed: false
    tags: [execute]

  - name: "Req 1 - Check postfix binary"
    ansible.builtin.command: which postfix
    register: result_01
    failed_when: false
    tags: [execute]

  - name: "Store requirement 01 details"
    ansible.builtin.set_fact:
      task_01_name: "Check postfix binary"
      task_01_cmd: "which postfix"
      task_01_rc: "{{ result_01.rc | default(-1) }}"
      data_01: "{{ result_01.stdout | default('') | trim }}"
      status_01: "{{ 'PASS' if (result_01.rc | default(-1)) == 0 else 'SKIP' }}"
      details_01: "{{ 'Postfix found at ' + result_01.stdout if (result_01.rc | default(-1)) == 0 else 'Postfix not installed, remediation skipped' }}"
      postfix_installed: "{{ (result_01.rc | default(-1)) == 0 }}"
    tags: [execute]

  - name: "Req 2 - Configure inet_interfaces in postfix main.cf"
    ansible.builtin.lineinfile:
      path: /etc/postfix/main.cf
      regexp: |
        ^inet_interfaces\s*=\s*.*
      line: 'inet_interfaces = loopback-only'
    when: postfix_installed
    register: result_02
    failed_when: false
    tags: [execute]

  - name: "Store requirement 02 details"
    ansible.builtin.set_fact:
      task_02_name: "Configure inet_interfaces"
      task_02_cmd: "lineinfile: regexp '^inet_interfaces...' line 'inet_interfaces = loopback-only'"
      task_02_rc: "{{ result_02.rc | default(-1) if result_02 is not skipped else -1 }}"
      data_02: "{{ ('Changed: ' ~ result_02 is changed ~ ', skipped: ' ~ result_02 is skipped) if result_02 is not skipped else 'N/A' }}"
      status_02: >-
        {%- if not postfix_installed -%}
          SKIP
        {%- elif result_02 is not skipped and (result_02.changed or result_02 is not changed) and result_02.failed == false -%}
          PASS
        {%- else -%}
          FAIL
        {%- endif -%}
      details_02: >-
        {%- if not postfix_installed -%}
          Skipped: postfix not installed
        {%- elif result_02 is not skipped and result_02.failed == false -%}
          Configuration applied successfully
        {%- else -%}
          Failed to apply configuration
        {%- endif -%}
    tags: [execute]

  - name: "Req 3 - Restart postfix service"
    ansible.builtin.service:
      name: postfix
      state: restarted
    when: postfix_installed
    register: result_03
    failed_when: false
    tags: [execute]

  - name: "Store requirement 03 details"
    ansible.builtin.set_fact:
      task_03_name: "Restart postfix service"
      task_03_cmd: "systemctl restart postfix"
      task_03_rc: "{{ result_03.rc | default(-1) if result_03 is not skipped else -1 }}"
      data_03: "{{ 'Restarted' if result_03 is not skipped and result_03.state == 'started' else (result_03.skipped if result_03 is skipped else 'N/A') }}"
      status_03: "{{ 'SKIP' if not postfix_installed else ('PASS' if result_03 is not skipped and result_03.state == 'started' else 'FAIL') }}"
      details_03: "{{ 'Postfix restarted successfully' if status_03 | trim == 'PASS' else ('Skipped: postfix not installed' if not postfix_installed else 'Service restart failed') }}"
    tags: [execute]

  - name: "Req 4 - Verify postfix listens only on loopback"
    ansible.builtin.shell: >
      ss -tlnp | grep -E ':(25|587|465)' | grep -v '127.0.0.1' | grep -v '::1'
    args:
      executable: /bin/bash
    register: result_04
    failed_when: false
    changed_when: false
    when: postfix_installed
    tags: [execute]

  - name: "Store requirement 04 details"
    ansible.builtin.set_fact:
      task_04_name: "Verify postfix loopback binding"
      task_04_cmd: "ss -tlnp | grep -E ':(25|587|465)' | grep -v '127.0.0.1' | grep -v '::1'"
      task_04_rc: "{{ result_04.rc | default(-1) if result_04 is not skipped else -1 }}"
      data_04: "{{ result_04.stdout | default('') | trim if result_04 is not skipped else 'N/A' }}"
      status_04: >-
        {%- if not postfix_installed -%}
          SKIP
        {%- elif result_04 is not skipped and result_04.stdout | default('') | trim == '' -%}
          PASS
        {%- else -%}
          FAIL
        {%- endif -%}
      details_04: >-
        {%- if not postfix_installed -%}
          Skipped: postfix not installed
        {%- elif status_04 | trim == 'PASS' -%}
          No non-loopback listeners detected
        {%- elif status_04 | trim == 'FAIL' -%}
          Non-loopback listeners found: {{ result_04.stdout | default('') }}
        {%- else -%}
          Verification could not be performed
        {%- endif -%}
    tags: [execute]

  - name: "Req 5 - Store overall remediation result in cis_result"
    ansible.builtin.set_fact:
      cis_result: "{{ status_04 | default('ERROR') | trim }}"
      task_05_name: "Store final result"
      task_05_cmd: "set_fact"
      task_05_rc: 0
      data_05: "{{ status_04 | default('ERROR') | trim }}"
      status_05: "{{ status_04 | default('ERROR') | trim }}"
      details_05: "Overall remediation status derived from last requirement"
    tags: [execute]

  - name: "Generate remediation report"
    ansible.builtin.debug:
      msg:
      - "REMEDIATION REPORT — CIS 2.1.21"
      - "Reference: CIS Benchmark checkpoint 2.1.21"
      - ""
      - "REQUIREMENT 01 - {{ req_01 }}:"
      - "  Task: {{ task_01_name | default('Not recorded') }}"
      - "  Command: {{ task_01_cmd | default('N/A') }}"
      - "  Exit code: {{ task_01_rc | default(-1) }}"
      - "  Data: {{ data_01 | default('') | trim }}"
      - "  Status: {{ status_01 | default('ERROR') | trim }}"
      - "  Details: {{ details_01 | default('') | trim }}"
      - ""
      - "REQUIREMENT 02 - {{ req_02 }}:"
      - "  Task: {{ task_02_name | default('Not recorded') }}"
      - "  Command: {{ task_02_cmd | default('N/A') }}"
      - "  Exit code: {{ task_02_rc | default(-1) }}"
      - "  Data: {{ data_02 | default('') | trim }}"
      - "  Status: {{ status_02 | default('ERROR') | trim }}"
      - "  Details: {{ details_02 | default('') | trim }}"
      - ""
      - "REQUIREMENT 03 - {{ req_03 }}:"
      - "  Task: {{ task_03_name | default('Not recorded') }}"
      - "  Command: {{ task_03_cmd | default('N/A') }}"
      - "  Exit code: {{ task_03_rc | default(-1) }}"
      - "  Data: {{ data_03 | default('') | trim }}"
      - "  Status: {{ status_03 | default('ERROR') | trim }}"
      - "  Details: {{ details_03 | default('') | trim }}"
      - ""
      - "REQUIREMENT 04 - {{ req_04 }}:"
      - "  Task: {{ task_04_name | default('Not recorded') }}"
      - "  Command: {{ task_04_cmd | default('N/A') }}"
      - "  Exit code: {{ task_04_rc | default(-1) }}"
      - "  Data: {{ data_04 | default('') | trim }}"
      - "  Status: {{ status_04 | default('ERROR') | trim }}"
      - "  Details: {{ details_04 | default('') | trim }}"
      - ""
      - "REQUIREMENT 05 - {{ req_05 }}:"
      - "  Task: {{ task_05_name | default('Not recorded') }}"
      - "  Command: {{ task_05_cmd | default('N/A') }}"
      - "  Exit code: {{ task_05_rc | default(-1) }}"
      - "  Data: {{ data_05 | default('') | trim }}"
      - "  Status: {{ status_05 | default('ERROR') | trim }}"
      - "  Details: {{ details_05 | default('') | trim }}"
      - ""
      - "========================================================"
      - "OVERALL REMEDIATION:"
      - "  Result: {{ cis_result | default('ERROR') | trim }}"
      - "========================================================"
    tags: [execute]

  always:
  - name: "Restore - Check if backup exists"
    ansible.builtin.stat:
      path: "{{ backup_dir }}/main.cf.bak"
    register: _restore_stat
    failed_when: false
    tags: [restore]

  - name: "Restore - Overwrite /etc/postfix/main.cf with original"
    ansible.builtin.copy:
      src: "{{ backup_dir }}/main.cf.bak"
      dest: /etc/postfix/main.cf
      remote_src: true
    when: _restore_stat.stat.exists | default(false)
    failed_when: false
    tags: [restore]

  - name: "Restore - Restart postfix to apply original configuration"
    ansible.builtin.service:
      name: postfix
      state: restarted
    when: _restore_stat.stat.exists | default(false)
    failed_when: false
    tags: [restore]

  - name: "Restore - Remove backup directory"
    ansible.builtin.file:
      path: "{{ backup_dir }}"
      state: absent
    failed_when: false
    tags: [restore]
