playbook_name: "cis_2_1_14"
backup_dir: "/var/log/ai-playbooks-backup/{{ playbook_name }}"
req_01: "Apply stop snmpd service using command: `systemctl stop snmpd.service`. Expected result: snmpd service is stopped."
req_02: "Apply remove net-snmp package using command: `dnf remove net-snmp`. Expected result: net-snmp package is removed."
req_03: "Apply mask snmpd service (if package is required for dependencies) using command: `systemctl mask snmpd.service`. Expected result: snmpd service is masked and cannot be started."
req_04: "Verify snmpd service is stopped and masked or removed using command: `systemctl status snmpd.service`. Expected result: snmpd service is inactive (dead) and masked or not found."
req_05: "Store the final remediation result in a variable named 'cis_result' using set_fact. Set cis_result to the overall remediation status (PASS/FAIL/SKIP/ERROR) derived from the last requirement's status variable."
req_06: "Generate remediation report using debug module with detailed status for each requirement."
