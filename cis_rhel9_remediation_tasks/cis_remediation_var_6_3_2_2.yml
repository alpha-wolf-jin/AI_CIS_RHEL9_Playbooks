playbook_name: "remediate_cis_6_3_2_2"
backup_dir: "/var/log/ai-playbooks-backup/{{ playbook_name }}"
config_file: "/etc/audit/auditd.conf"
config_param: "max_log_file_action"
config_value: "keep_logs"
service_name: "auditd"
package_name: "audit"
req_01: "Apply prerequisite check for auditd package using command: `dpkg -l auditd || rpm -q audit`. Expected result: package is installed."
req_02: "Apply configuration change to set max_log_file_action to keep_logs using command: `sudo sed -i 's/^max_log_file_action.*/max_log_file_action = keep_logs/' /etc/audit/auditd.conf`. Expected result: parameter is set correctly."
req_03: "Apply restart of auditd service to apply changes using command: `sudo systemctl restart auditd`. Expected result: service restarts successfully."
req_04: "Verify the max_log_file_action setting using command: `grep '^max_log_file_action' /etc/audit/auditd.conf`. Expected result: output shows 'max_log_file_action = keep_logs'."
