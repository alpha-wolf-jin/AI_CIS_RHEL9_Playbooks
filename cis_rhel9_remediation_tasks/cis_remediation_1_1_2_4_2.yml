---
- name: Initialize meta data variables
  include_vars: cis_remediation_var_1_1_2_4_2.yml

- name: "Snapshot - Create backup directory"
  ansible.builtin.file:
    path: "{{ backup_dir }}"
    state: directory
    mode: '0700'
  tags: [snapshot]
- name: "Snapshot - Check if /etc/fstab exists"
  ansible.builtin.stat:
    path: /etc/fstab
  register: _sg_fstab_stat
  tags: [snapshot]
- name: "Snapshot - Backup /etc/fstab if exists"
  ansible.builtin.copy:
    src: /etc/fstab
    dest: "{{ backup_dir }}/fstab.present"
    remote_src: true
  when: _sg_fstab_stat.stat.exists
  tags: [snapshot]

- block:
  - name: "Initialize data variables"
    set_fact:
      data_01: "Not collected yet"
      status_01: "ERROR"
      details_01: "Not evaluated"
      data_02: "Not collected yet"
      status_02: "ERROR"
      details_02: "Not evaluated"
      data_03: "Not collected yet"
      status_03: "ERROR"
      details_03: "Not evaluated"
      data_04: "Not collected yet"
      status_04: "ERROR"
      details_04: "Not evaluated"
      data_05: "Not collected yet"
      status_05: "ERROR"
      details_05: "Not evaluated"
      task_01_name: "Not executed"
      task_01_cmd: "N/A"
      task_01_rc: -1

  - name: "Req 01 - Check if /var is a separate partition"
    ansible.builtin.shell: mount | grep ' /var '
    args:
      executable: /bin/bash
    register: result_01
    failed_when: false
    changed_when: false
    tags: [execute]

  - name: "Store requirement 01 details"
    set_fact:
      task_01_name: "Check if /var is a separate partition"
      task_01_cmd: "mount | grep ' /var '"
      task_01_rc: "{{ result_01.rc | default(-1) }}"
      data_01: "{{ result_01.stdout | default('') | trim }}"
      status_01: "{{ ('PASS' if (result_01.rc | default(-1) == 0 and (result_01.stdout | default('') | trim | length > 0)) else 'FAIL') | trim }}"
      details_01: "{{ ('/var partition found' if (result_01.rc | default(-1) == 0 and (result_01.stdout | default('') | trim | length > 0)) else 'No separate /var partition') | trim }}"
    tags: [execute]

  - name: "Req 02 - Edit /etc/fstab to add nodev option for /var"
    ansible.builtin.replace:
      path: /etc/fstab
      regexp: |
        ^(\S+\s+/var\s+\S+\s+)(\S+)(\s+.*)$
      replace: |
        \1\2,nodev\3
    register: result_02
    failed_when: false
    when: "status_01 | trim == 'PASS'"
    tags: [execute]

  - name: "Store requirement 02 details"
    set_fact:
      task_02_name: "Edit /etc/fstab to add nodev option for /var"
      task_02_cmd: "replace module on /etc/fstab"
      task_02_rc: "{{ result_02.rc | default(-1) }}"
      data_02: "{{ result_02.changed | default(false) | string }}"
      status_02: "{{ ('PASS' if (result_02 is not skipped and (result_02.rc | default(-1) == 0)) else ('SKIP' if result_02 is skipped else 'FAIL')) | trim }}"
      details_02: "{{ ('/etc/fstab updated with nodev option' if (result_02 is not skipped and (result_02.rc | default(-1) == 0)) else ('No separate /var partition - skipped' if result_02 is skipped else 'Failed to update /etc/fstab')) | trim }}"
    when: "status_01 | trim == 'PASS'"
    tags: [execute]

  - name: "Store requirement 02 details when skipped"
    set_fact:
      task_02_name: "Edit /etc/fstab to add nodev option for /var"
      task_02_cmd: "replace module on /etc/fstab"
      task_02_rc: -1
      data_02: ""
      status_02: "SKIP"
      details_02: "No separate /var partition - skipped"
    when: "status_01 | trim != 'PASS'"
    tags: [execute]

  - name: "Req 03 - Remount /var with updated options"
    ansible.builtin.shell: mount -o remount /var
    args:
      executable: /bin/bash
    register: result_03
    failed_when: false
    when: "status_01 | trim == 'PASS'"
    tags: [execute]

  - name: "Store requirement 03 details"
    set_fact:
      task_03_name: "Remount /var with updated options"
      task_03_cmd: "mount -o remount /var"
      task_03_rc: "{{ result_03.rc | default(-1) }}"
      data_03: "{{ result_03.stdout | default('') | trim }}"
      status_03: "{{ ('PASS' if (result_03 is not skipped and (result_03.rc | default(-1) == 0)) else ('SKIP' if result_03 is skipped else 'FAIL')) | trim }}"
      details_03: "{{ ('/var remounted successfully' if (result_03 is not skipped and (result_03.rc | default(-1) == 0)) else ('No separate /var partition - skipped' if result_03 is skipped else 'Failed to remount /var')) | trim }}"
    when: "status_01 | trim == 'PASS'"
    tags: [execute]

  - name: "Store requirement 03 details when skipped"
    set_fact:
      task_03_name: "Remount /var with updated options"
      task_03_cmd: "mount -o remount /var"
      task_03_rc: -1
      data_03: ""
      status_03: "SKIP"
      details_03: "No separate /var partition - skipped"
    when: "status_01 | trim != 'PASS'"
    tags: [execute]

  - name: "Req 04 - Verify nodev option is set on /var partition"
    ansible.builtin.shell: mount | grep ' /var ' | grep nodev
    args:
      executable: /bin/bash
    register: result_04
    failed_when: false
    changed_when: false
    when: "status_01 | trim == 'PASS'"
    tags: [execute]

  - name: "Store requirement 04 details"
    set_fact:
      task_04_name: "Verify nodev option is set on /var partition"
      task_04_cmd: "mount | grep ' /var ' | grep nodev"
      task_04_rc: "{{ result_04.rc | default(-1) }}"
      data_04: "{{ result_04.stdout | default('') | trim }}"
      status_04: "{{ ('PASS' if (result_04 is not skipped and (result_04.rc | default(-1) == 0)) else ('SKIP' if result_04 is skipped else 'FAIL')) | trim }}"
      details_04: "{{ ('nodev option is set on /var' if (result_04 is not skipped and (result_04.rc | default(-1) == 0)) else ('No separate /var partition - skipped' if result_04 is skipped else 'nodev option is missing on /var')) | trim }}"
    when: "status_01 | trim == 'PASS'"
    tags: [execute]

  - name: "Store requirement 04 details when skipped"
    set_fact:
      task_04_name: "Verify nodev option is set on /var partition"
      task_04_cmd: "mount | grep ' /var ' | grep nodev"
      task_04_rc: -1
      data_04: ""
      status_04: "SKIP"
      details_04: "No separate /var partition - skipped"
    when: "status_01 | trim != 'PASS'"
    tags: [execute]

  - name: "Req 05 - Store final remediation result in cis_result"
    set_fact:
      cis_result: "{{ status_04 | default('ERROR') | trim }}"
      task_05_name: "Store final remediation result"
      task_05_cmd: "N/A"
      task_05_rc: -1
      data_05: "{{ status_04 | default('ERROR') | trim }}"
      status_05: "{{ status_04 | default('ERROR') | trim }}"
      details_05: "{{ details_04 | default('Not evaluated') | trim }}"
    tags: [execute]

  - name: "Generate remediation report"
    debug:
      msg:
      - "REMEDIATION REPORT — CIS 1.1.2.4.2"
      - "Reference: CIS Benchmark checkpoint 1.1.2.4.2"
      - ""
      - "REQUIREMENT 01 - {{ req_01 }}:"
      - "  Task: {{ task_01_name | default('Not recorded') }}"
      - "  Command: {{ task_01_cmd | default('N/A') }}"
      - "  Exit code: {{ task_01_rc | default(-1) }}"
      - "  Data: {{ data_01 | default('') | trim }}"
      - "  Status: {{ status_01 | default('ERROR') | trim }}"
      - "  Details: {{ details_01 | default('') | trim }}"
      - ""
      - "REQUIREMENT 02 - {{ req_02 }}:"
      - "  Task: {{ task_02_name | default('Not recorded') }}"
      - "  Command: {{ task_02_cmd | default('N/A') }}"
      - "  Exit code: {{ task_02_rc | default(-1) }}"
      - "  Data: {{ data_02 | default('') | trim }}"
      - "  Status: {{ status_02 | default('ERROR') | trim }}"
      - "  Details: {{ details_02 | default('') | trim }}"
      - ""
      - "REQUIREMENT 03 - {{ req_03 }}:"
      - "  Task: {{ task_03_name | default('Not recorded') }}"
      - "  Command: {{ task_03_cmd | default('N/A') }}"
      - "  Exit code: {{ task_03_rc | default(-1) }}"
      - "  Data: {{ data_03 | default('') | trim }}"
      - "  Status: {{ status_03 | default('ERROR') | trim }}"
      - "  Details: {{ details_03 | default('') | trim }}"
      - ""
      - "REQUIREMENT 04 - {{ req_04 }}:"
      - "  Task: {{ task_04_name | default('Not recorded') }}"
      - "  Command: {{ task_04_cmd | default('N/A') }}"
      - "  Exit code: {{ task_04_rc | default(-1) }}"
      - "  Data: {{ data_04 | default('') | trim }}"
      - "  Status: {{ status_04 | default('ERROR') | trim }}"
      - "  Details: {{ details_04 | default('') | trim }}"
      - ""
      - "REQUIREMENT 05 - {{ req_05 }}:"
      - "  Task: {{ task_05_name | default('Not recorded') }}"
      - "  Command: {{ task_05_cmd | default('N/A') }}"
      - "  Exit code: {{ task_05_rc | default(-1) }}"
      - "  Data: {{ data_05 | default('') | trim }}"
      - "  Status: {{ status_05 | default('ERROR') | trim }}"
      - "  Details: {{ details_05 | default('') | trim }}"
      - ""
      - "========================================================"
      - "OVERALL REMEDIATION:"
      - "  Result: {{ cis_result | default('ERROR') | trim }}"
      - "  Details: {{ details_05 | default('Not evaluated') | trim }}"
      - "========================================================"
    tags: [execute]

  always:
  - name: "Restore - Check if backup exists"
    ansible.builtin.stat:
      path: "{{ backup_dir }}/fstab.present"
    register: _restore_fstab
    failed_when: false
    tags: [restore]

  - name: "Restore - Overwrite /etc/fstab with original"
    ansible.builtin.copy:
      src: "{{ backup_dir }}/fstab.present"
      dest: /etc/fstab
      remote_src: true
    when: _restore_fstab.stat.exists | default(false)
    failed_when: false
    tags: [restore]

  - name: "Restore - Remove backup directory"
    ansible.builtin.file:
      path: "{{ backup_dir }}"
      state: absent
    failed_when: false
    tags: [restore]
