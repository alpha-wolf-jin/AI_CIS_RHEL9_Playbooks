playbook_name: "cis_1_2_1_2"
backup_dir: "/var/log/ai-playbooks-backup/{{ playbook_name }}"
dnf_conf: "/etc/dnf/dnf.conf"
repo_dir: "/etc/yum.repos.d/"
req_01: |
  Apply global gpgcheck activation by editing /etc/dnf/dnf.conf using command: `sed -i 's/^gpgcheck\\s*=\\s*.*/gpgcheck=1/' /etc/dnf/dnf.conf`. Expected result: gpgcheck is set to 1 in the main configuration file.
req_02: |
  Apply gpgcheck activation in all repository files under /etc/yum.repos.d/ using command: `find /etc/yum.repos.d/ -name \"*.repo\" -exec sed -i 's/^gpgcheck\\s*=\\s*.*/gpgcheck=1/' {} \\;`. Expected result: All gpgcheck directives in .repo files are set to 1.
req_03: |
  Verify that gpgcheck is globally activated using command: `grep -r '^gpgcheck\\s*=' /etc/dnf/dnf.conf /etc/yum.repos.d/*.repo | grep -v 'gpgcheck=1'`. Expected result: No output (all instances show gpgcheck=1).
