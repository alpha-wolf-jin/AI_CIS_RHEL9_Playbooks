---
- name: Initialize meta data variables
  include_vars: cis_remediation_var_6_2_2_3.yml

- name: "Snapshot - Create backup directory"
  ansible.builtin.file:
    path: "{{ backup_dir }}"
    state: directory
    mode: '0700'
  tags: [snapshot]
- name: "Snapshot - Check if journald conf.d directory exists"
  ansible.builtin.stat:
    path: "{{ journald_conf_dir }}"
  register: _snap_conf_dir_stat
  tags: [snapshot]
- name: "Snapshot - Backup journald conf.d directory if exists"
  ansible.builtin.copy:
    src: "{{ journald_conf_dir }}/"
    dest: "{{ backup_dir }}/journald.conf.d/"
    remote_src: true
  when: _snap_conf_dir_stat.stat.exists | default(false)
  failed_when: false
  tags: [snapshot]
- name: "Snapshot - Check if journald conf file exists"
  ansible.builtin.stat:
    path: "{{ journald_conf_file }}"
  register: _snap_conf_file_stat
  tags: [snapshot]
- name: "Snapshot - Backup journald conf file if exists"
  ansible.builtin.copy:
    src: "{{ journald_conf_file }}"
    dest: "{{ backup_dir }}/60-journald.conf.present"
    remote_src: true
  when: _snap_conf_file_stat.stat.exists | default(false)
  failed_when: false
  tags: [snapshot]
- name: "Snapshot - Mark journald conf file as absent if not present"
  ansible.builtin.copy:
    content: "absent"
    dest: "{{ backup_dir }}/60-journald.conf.absent"
  when: not (_snap_conf_file_stat.stat.exists | default(false))
  tags: [snapshot]

- block:
  - name: "Initialize data variables"
    ansible.builtin.set_fact:
      task_01_name: "Not executed"
      task_01_cmd: "N/A"
      task_01_rc: -1
      data_01: ""
      status_01: "ERROR"
      details_01: ""
      task_02_name: "Not executed"
      task_02_cmd: "N/A"
      task_02_rc: -1
      data_02: ""
      status_02: "ERROR"
      details_02: ""
      task_03_name: "Not executed"
      task_03_cmd: "N/A"
      task_03_rc: -1
      data_03: ""
      status_03: "ERROR"
      details_03: ""
    tags: [execute]

  - name: "Req 01 - Check if systemd-journald service is installed"
    ansible.builtin.package_facts:
      manager: auto
    failed_when: false
    tags: [execute]

  - name: "Req 01 - Set skip fact if systemd not installed"
    ansible.builtin.set_fact:
      playbook_skipped: "{{ 'systemd' not in ansible_facts.packages }}"
    tags: [execute]

  - name: "Req 01 - Create journald conf.d directory if needed"
    ansible.builtin.file:
      path: "{{ journald_conf_dir }}"
      state: directory
      mode: '0755'
    when: "not (playbook_skipped | default(false) | bool)"
    failed_when: false
    tags: [execute]

  - name: "Req 01 - Check if Journal section exists in config file"
    ansible.builtin.shell: |
      grep -Psq -- '^\h*\[Journal\]' "{{ journald_conf_file }}" 2>/dev/null && echo "FOUND" || echo "NOT_FOUND"
    args:
      executable: /bin/bash
    register: _section_check
    failed_when: false
    changed_when: false
    when: "not (playbook_skipped | default(false) | bool)"
    tags: [execute]

  - name: "Req 01 - Append Compress=yes to existing Journal section"
    ansible.builtin.lineinfile:
      path: "{{ journald_conf_file }}"
      line: "Compress=yes"
      regexp: '^Compress='
      state: present
      create: yes
      mode: '0644'
    register: _compress_result
    failed_when: false
    when:
    - "not (playbook_skipped | default(false) | bool)"
    - "_section_check.stdout | default('') == 'FOUND'"
    tags: [execute]

  - name: "Req 01 - Create Journal section with Compress=yes"
    ansible.builtin.blockinfile:
      path: "{{ journald_conf_file }}"
      block: |
        [Journal]
        Compress=yes
      create: yes
      mode: '0644'
    register: _block_result
    failed_when: false
    when:
    - "not (playbook_skipped | default(false) | bool)"
    - "_section_check.stdout | default('') == 'NOT_FOUND'"
    tags: [execute]

  - name: "Req 01 - Determine if configuration changed"
    ansible.builtin.set_fact:
      _config_changed: "{{ (_compress_result.changed | default(false) | bool) or (_block_result.changed | default(false) | bool) }}"
    when: "not (playbook_skipped | default(false) | bool)"
    tags: [execute]

  - name: "Req 01 - Reload-or-restart systemd-journald if configuration changed"
    ansible.builtin.command:
      cmd: "systemctl reload-or-restart {{ journald_service }}"
    register: _service_result
    failed_when: false
    changed_when: false
    when:
    - "not (playbook_skipped | default(false) | bool)"
    - "_config_changed | default(false) | bool"
    tags: [execute]

  - name: "Req 01 - Store remediation details and status"
    ansible.builtin.set_fact:
      task_01_name: "Apply Compress=yes to journald configuration and restart service if needed"
      task_01_cmd: "lineinfile/blockinfile, systemctl reload-or-restart systemd-journald"
      task_01_rc: >-
        {{ (_service_result.rc | default(0) if _config_changed | default(false) else 0) }}
      data_01: >-
        {{ 'Configuration updated and service restarted' if (not (playbook_skipped | default(false) | bool) and _config_changed | default(false) and (_service_result.rc | default(1) == 0)) else ('Already configured' if (not (playbook_skipped | default(false) | bool) and not (_config_changed | default(false))) else 'N/A') }}
      status_01: >-
        {% if playbook_skipped | default(false) | bool %} SKIP
        {%- elif not (_config_changed | default(false)) %} PASS
        {%- elif _config_changed | default(false) and (_service_result.rc | default(1) == 0) %} PASS
        {%- else %} FAIL
        {%- endif %}
      details_01: >-
        {% if playbook_skipped | default(false) | bool %} systemd package not installed - remediation not applicable
        {%- elif _config_changed | default(false) and (_service_result.rc | default(1) == 0) %} Configuration applied and service restarted successfully
        {%- elif not (_config_changed | default(false)) %} Configuration already correct, no restart needed
        {%- else %} Service restart failed
        {%- endif %}
    tags: [execute]

  - name: "Req 02 - Verify Compress is set to yes in journald configuration"
    ansible.builtin.shell: |
      if grep -Psiq -- '^\h*Compress\h*=\h*yes' "{{ journald_conf_file }}" 2>/dev/null; then
        echo "PASS: Compress=yes is configured"
      else
        echo "FAIL: Compress=yes is not configured"
      fi
    args:
      executable: /bin/bash
    register: result_02
    failed_when: false
    changed_when: false
    when: "not (playbook_skipped | default(false) | bool)"
    tags: [execute]

  - name: "Req 02 - Store verification details"
    ansible.builtin.set_fact:
      task_02_name: "Verify Compress=yes in journald configuration"
      task_02_cmd: |
        grep -Psiq -- '^\h*Compress\h*=\h*yes' {{ journald_conf_file }}
      task_02_rc: "{{ result_02.rc | default(-1) }}"
      data_02: "{{ result_02.stdout | default('') | trim }}"
      status_02: "{{ ('PASS' if (result_02.stdout | default('') | trim) == 'PASS: Compress=yes is configured' else 'FAIL') | trim }}"
      details_02: "{{ ('Compress=yes verified' if (result_02.stdout | default('') | trim) == 'PASS: Compress=yes is configured' else 'Compress=yes not found') | trim }}"
    when: "not (playbook_skipped | default(false) | bool)"
    tags: [execute]

  - name: "Req 02 - Set skipped status when systemd not installed"
    ansible.builtin.set_fact:
      task_02_name: "Verify Compress=yes in journald configuration"
      task_02_cmd: "N/A"
      task_02_rc: 0
      data_02: "SKIPPED"
      status_02: "SKIPPED"
      details_02: "systemd package not installed - remediation not applicable"
    when: "playbook_skipped | default(false) | bool"
    tags: [execute]

  - name: "Req 03 - Compute cis_result from requirements status"
    ansible.builtin.set_fact:
      cis_result: >-
        {%- if playbook_skipped | default(false) | bool -%} SKIP
        {%- elif status_01 | trim == 'FAIL' -%} FAIL
        {%- else -%} {{ status_02 | trim }}
        {%- endif -%}
    tags: [execute]

  - name: "Req 03 - Store final remediation details"
    ansible.builtin.set_fact:
      task_03_name: "Store final remediation result"
      task_03_cmd: "set_fact cis_result derived from requirements status"
      task_03_rc: 0
      data_03: "{{ cis_result | trim }}"
      status_03: "PASS"
      details_03: "{{ 'cis_result set to ' + (cis_result | string | trim) + ' based on remediation outcome' }}"
    tags: [execute]

  - name: "Req 04 - Generate remediation report"
    ansible.builtin.debug:
      msg:
      - "========================================================"
      - "        REMEDIATION REPORT — CIS 6.2.2.3"
      - "========================================================"
      - ""
      - "Reference: CIS Benchmark checkpoint 6.2.2.3"
      - ""
      - "REQUIREMENT 01 - {{ req_01 }}:"
      - "  Task: {{ task_01_name | default('Task not recorded') }}"
      - "  Command: {{ task_01_cmd | default('N/A') }}"
      - "  Exit code: {{ task_01_rc | default(-1) }}"
      - "  Data: {{ data_01 | default('') | trim }}"
      - "  Status: {{ status_01 | default('ERROR') | trim }}"
      - "  Details: {{ details_01 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 02 - {{ req_02 }}:"
      - "  Task: {{ task_02_name | default('Task not recorded') }}"
      - "  Command: {{ task_02_cmd | default('N/A') }}"
      - "  Exit code: {{ task_02_rc | default(-1) }}"
      - "  Data: {{ data_02 | default('') | trim }}"
      - "  Status: {{ status_02 | default('ERROR') | trim }}"
      - "  Details: {{ details_02 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 03 - {{ req_03 }}:"
      - "  Task: {{ task_03_name | default('Task not recorded') }}"
      - "  Command: {{ task_03_cmd | default('N/A') }}"
      - "  Exit code: {{ task_03_rc | default(-1) }}"
      - "  Data: {{ data_03 | default('') | trim }}"
      - "  Status: {{ status_03 | default('ERROR') | trim }}"
      - "  Details: {{ details_03 | default('Not evaluated') | trim }}"
      - ""
      - "========================================================"
      - "OVERALL REMEDIATION:"
      - "  Result: {{ cis_result | default('ERROR') | trim }}"
      - "========================================================"
    tags: [execute]

  always:
  - name: "Restore - Check if backup directory exists"
    ansible.builtin.stat:
      path: "{{ backup_dir }}"
    register: _restore_backup_dir
    failed_when: false
    when: restore_enabled | default(false) | bool
    tags: [restore]

  - name: "Restore - Check if journald conf file backup exists"
    ansible.builtin.stat:
      path: "{{ backup_dir }}/60-journald.conf.present"
    register: _restore_conf_present
    failed_when: false
    when: restore_enabled | default(false) | bool
    tags: [restore]

  - name: "Restore - Restore journald conf file from backup"
    ansible.builtin.copy:
      src: "{{ backup_dir }}/60-journald.conf.present"
      dest: "{{ journald_conf_file }}"
      remote_src: true
    when:
    - restore_enabled | default(false) | bool
    - _restore_conf_present.stat.exists | default(false)
    failed_when: false
    tags: [restore]

  - name: "Restore - Check if journald conf file was absent before remediation"
    ansible.builtin.stat:
      path: "{{ backup_dir }}/60-journald.conf.absent"
    register: _restore_conf_absent
    failed_when: false
    when: restore_enabled | default(false) | bool
    tags: [restore]

  - name: "Restore - Delete journald conf file if it was absent before"
    ansible.builtin.file:
      path: "{{ journald_conf_file }}"
      state: absent
    when:
    - restore_enabled | default(false) | bool
    - _restore_conf_absent.stat.exists | default(false)
    failed_when: false
    tags: [restore]

  - name: "Restore - Check if journald conf.d directory backup exists"
    ansible.builtin.stat:
      path: "{{ backup_dir }}/journald.conf.d"
    register: _restore_conf_dir
    failed_when: false
    when: restore_enabled | default(false) | bool
    tags: [restore]

  - name: "Restore - Restore journald conf.d directory from backup"
    ansible.builtin.shell: |
      rm -rf "{{ journald_conf_dir }}"/*
      cp -r "{{ backup_dir }}/journald.conf.d/"* "{{ journald_conf_dir }}/"
    args:
      executable: /bin/bash
    when:
    - restore_enabled | default(false) | bool
    - _restore_conf_dir.stat.exists | default(false)
    failed_when: false
    tags: [restore]

  - name: "Restore - Remove backup directory"
    ansible.builtin.file:
      path: "{{ backup_dir }}"
      state: absent
    when:
    - restore_enabled | default(false) | bool
    - _restore_backup_dir.stat.exists | default(false)
    failed_when: false
    tags: [restore]
