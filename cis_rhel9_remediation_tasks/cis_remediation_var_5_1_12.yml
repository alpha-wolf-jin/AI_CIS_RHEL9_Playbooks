playbook_name: "cis_5_1_12"
checkpoint_id: "cis_5_1_12"
state_guard_dir: "/usr/local/bin/cis/.cis_state_guard/{{ checkpoint_id }}"
state_guard_flag: "{{ state_guard_dir }}/checkpoint.flag"
config_file: "/etc/ssh/sshd_config"
service_name: "sshd"
config_param: "HostbasedAuthentication"
config_value: "no"
req_01: "Apply prerequisite check using command: `which sshd && sshd -t`. Expected result: sshd binary found and configuration syntax is valid."
req_02: "Apply setting HostbasedAuthentication to no in /etc/ssh/sshd_config using command: `grep -q '^HostbasedAuthentication' /etc/ssh/sshd_config && sed -i 's/^HostbasedAuthentication.*/HostbasedAuthentication no/' /etc/ssh/sshd_config || echo 'HostbasedAuthentication no' >> /etc/ssh/sshd_config`. Expected result: HostbasedAuthentication is set to no in the configuration file."
req_03: "Apply ensure the setting appears before any Include or Match entries using command: `sed -i '/^Include/i HostbasedAuthentication no' /etc/ssh/sshd_config && sed -i '/^Match/i HostbasedAuthentication no' /etc/ssh/sshd_config && awk '!seen[$0]++' /etc/ssh/sshd_config > /tmp/sshd_config && mv /tmp/sshd_config /etc/ssh/sshd_config`. Expected result: The HostbasedAuthentication no line is placed before Include and Match entries, with duplicates removed."
req_04: "Apply restart sshd service using command: `systemctl restart sshd`. Expected result: sshd service restarts successfully."
req_05: "Verify HostbasedAuthentication is disabled using command: `sshd -T | grep -i hostbasedauthentication`. Expected result: hostbasedauthentication no"
req_06: "Store the final remediation result in a variable named 'cis_result' using set_fact. Set cis_result to the overall remediation status (PASS/FAIL/SKIP/ERROR) derived from the last requirement's status variable."
