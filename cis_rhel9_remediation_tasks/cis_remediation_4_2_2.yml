---
- name: Initialize meta data variables
  include_vars: cis_remediation_var_4_2_2.yml

- name: "State Guard - Create checkpoint directory"
  ansible.builtin.file:
    path: "{{ state_guard_dir }}"
    state: directory
    mode: '0700'
  tags: [snapshot]
- name: "State Guard - Check if /etc/firewalld exists"
  ansible.builtin.stat:
    path: "/etc/firewalld"
  register: _sg_fwd_stat
  tags: [snapshot]
- name: "State Guard - Backup /etc/firewalld"
  ansible.builtin.copy:
    src: "/etc/firewalld/"
    dest: "{{ state_guard_dir }}/firewalld/"
    remote_src: true
  when: _sg_fwd_stat.stat.exists | default(false)
  tags: [snapshot]
- name: "State Guard - Check if remediation script already exists"
  ansible.builtin.stat:
    path: "/tmp/cis_4_2_2_remediate.sh"
  register: _sg_script_stat
  tags: [snapshot]
- name: "State Guard - Mark remediation script as absent"
  ansible.builtin.copy:
    content: "absent"
    dest: "{{ state_guard_dir }}/script.absent"
  when: not _sg_script_stat.stat.exists | default(false)
  tags: [snapshot]
- name: "State Guard - Create checkpoint flag"
  ansible.builtin.copy:
    content: "checkpoint"
    dest: "{{ state_guard_flag }}"
  tags: [snapshot]

- block:
# --- EXECUTE PHASE (tag: execute) ---
  - name: "Prereq - Check if firewalld is installed"
    ansible.builtin.shell:
      cmd: "command -v firewalld > /dev/null 2>&1 || echo not_installed"
      executable: /bin/bash
    register: _fwd_check
    failed_when: false
    changed_when: false
    tags: [execute]

  - name: "Set fact firewalld_installed"
    set_fact:
      firewalld_installed: "{{ 'not_installed' not in _fwd_check.stdout }}"
    tags: [execute]

  - name: "Req 01 - Deploy remediation script"
    ansible.builtin.copy:
      dest: "/tmp/cis_4_2_2_remediate.sh"
      content: |
        {% raw -%}
        #!/usr/bin/env bash

        {  l_hbfw=""
           if systemctl is-enabled firewalld.service | grep -q 'enabled'; then
              echo -e "\n - FirewallD is in use on the system" && l_hbfw="fwd"
           elif systemctl is-enabled nftables.service 2>/dev/null | grep -q 'enabled'; then
              echo -e "\n - nftables is in use on the system \n - Recommendation is NA \n - Remediation Complete" && l_hbfw="nft"
           fi
           if [ "$l_hbfw" = "fwd" ]; then
              l_ipsaddr="$(nft list ruleset | awk '/filter_IN_public_deny|hook\s+input\s+/,/\}\s*(#.*)?$/' | grep -P -- 'ip\h+saddr')"
              if ! nft list ruleset | awk '/hook\s+input\s+/,/\}\s*(#.*)?$/' | grep -Pq -- '\H+\h+"lo"\h+accept'; then
                 echo -e "\n - Enabling input to accept for loopback address"
                 firewall-cmd --permanent --zone=trusted --add-interface=lo
                 firewall-cmd --reload
              else
                 echo -e "\n - firewalld input correctly set to accept for loopback address"
                 if ! grep -Pq -- 'ip\h+saddr\h+127\.0\.0\.0\/8\h+(counter\h+packets\h+\d+\h+bytes\h+\d+\h+)?drop' <<< "$l_ipsaddr" && ! grep -Pq -- 'ip\h+daddr\h+\!\=\h+127\.0\.0\.1\h+ip\h+saddr\h+127\.0\.0\.1\h+drop' <<< "$l_ipsaddr"; then
                    echo -e "\n - Setting IPv4 network traffic from loopback address to drop"
                    firewall-cmd --permanent --add-rich-rule='rule family=ipv4 source address="127.0.0.1" destination not address="127.0.0.1" drop'
                    firewall-cmd --permanent --zone=trusted --add-rich-rule='rule family=ipv4 source address="127.0.0.1" destination not address="127.0.0.1" drop'
                    firewall-cmd --reload
                 else
                    echo -e "\n - firewalld correctly set IPv4 network traffic from loopback address to drop"
                 fi
                 if grep -Pq -- '^\h*0\h*$' /sys/module/ipv6/parameters/disable; then
                    l_ip6saddr="$(nft list ruleset | awk '/filter_IN_public_deny|hook input/,/}/' | grep 'ip6 saddr')"
                    if ! grep -Pq 'ip6\h+saddr\h+::1\h+(counter\h+packets\h+\d+\h+bytes\h+\d+\h+)?drop' <<< "$l_ip6saddr" && ! grep -Pq -- 'ip6\h+daddr\h+\!=\h+::1\h+ip6\h+saddr\h+::1\h+drop' <<< "$l_ip6saddr"; then
                       echo -e "\n - Setting IPv6 network traffic from loopback address to drop"
                       firewall-cmd --permanent --add-rich-rule='rule family=ipv6 source address="::1" destination not address="::1" drop'
                       firewall-cmd --permanent --zone=trusted --add-rich-rule='rule family=ipv6 source address="::1" destination not address="::1" drop'
                       firewall-cmd --reload
                    else
                       echo -e "\n - firewalld correctly set IPv6 network traffic from loopback address to drop"
                    fi
                 fi
              fi
           fi
        }
        {% endraw -%}
      mode: '0700'
    when: firewalld_installed | default(false) | bool
    tags: [execute]

  - name: "Req 01 - Execute remediation script"
    ansible.builtin.shell: "/bin/bash /tmp/cis_4_2_2_remediate.sh"
    args:
      executable: /bin/bash
    register: script_result
    when: firewalld_installed | default(false) | bool
    failed_when: false
    tags: [execute]

  - name: "Req 01 - Remove script"
    ansible.builtin.file:
      path: "/tmp/cis_4_2_2_remediate.sh"
      state: absent
    when: firewalld_installed | default(false) | bool
    failed_when: false
    tags: [execute]

  - name: "Req 02 - Verify firewalld loopback traffic configuration"
    ansible.builtin.shell:
      cmd: |
        if nft list ruleset | grep -Eq 'iif(name)? "lo" accept'; then
          echo PASS
        else
          echo FAIL
        fi
      executable: /bin/bash
    register: verify_result
    when: firewalld_installed | default(false) | bool
    failed_when: false
    changed_when: false
    tags: [execute]

  - name: "Store requirement 01 details"
    set_fact:
      status_01: >-
        {%- if not firewalld_installed | default(false) | bool -%}
          SKIP
        {%- elif script_result.rc == 0 -%}
          PASS
        {%- else -%}
          FAIL
        {%- endif -%}
      details_01: >-
        {%- if not firewalld_installed | default(false) | bool -%}
          Firewalld not installed
        {%- elif script_result.rc == 0 -%}
          Remediation script executed successfully
        {%- else -%}
          script_result.stderr | default('Unknown error')
        {%- endif -%}
    tags: [execute]

  - name: "Store requirement 02 details"
    set_fact:
      status_02: >-
        {%- if not firewalld_installed | default(false) | bool -%}
          SKIP
        {%- elif (verify_result.stdout | default('') | trim) == 'PASS' -%}
          PASS
        {%- else -%}
          FAIL
        {%- endif -%}
      details_02: >-
        {%- if not firewalld_installed | default(false) | bool -%}
          Firewalld not installed
        {%- elif (verify_result.stdout | default('') | trim) == 'PASS' -%}
          Verification passed
        {%- else -%}
          Verification failed
        {%- endif -%}
    tags: [execute]

  - name: "Store final remediation result as cis_result"
    set_fact:
      cis_result: "{{ status_02 | default('ERROR') | trim }}"
      overall_details: "{{ details_02 | default('Not evaluated') | trim }}"
    tags: [execute]

  - name: "Generate remediation report"
    ansible.builtin.debug:
      msg:
      - "========================================================"
      - "        REMEDIATION REPORT — CIS 4.2.2"
      - "========================================================"
      - "Reference: CIS Benchmark checkpoint 4.2.2"
      - ""
      - "REQUIREMENT 01 - {{ req_01 }}"
      - "  Task: Execute remediation script"
      - "  Command: /bin/bash /tmp/cis_4_2_2_remediate.sh"
      - "  Exit code: {{ script_result.rc | default(-1) }}"
      - "  Data: {{ script_result.stdout | default('') | trim }}"
      - "  Status: {{ status_01 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_01 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 02 - {{ req_02 }}"
      - "  Task: Check nft rules for loopback accept"
      - "  Command: nft list ruleset | grep -Eq 'iif(name)? \"lo\" accept' && echo PASS || echo FAIL"
      - "  Exit code: {{ verify_result.rc | default(-1) }}"
      - "  Data: {{ verify_result.stdout | default('') | trim }}"
      - "  Status: {{ status_02 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_02 | default('Not evaluated') | trim }}"
      - ""
      - "========================================================"
      - "OVERALL REMEDIATION:"
      - "  Result: {{ cis_result | default('ERROR') | trim }}"
      - "  Details: {{ overall_details | default('Not evaluated') | trim }}"
      - "========================================================"
    tags: [execute]

  always:
# --- RESTORE PHASE (tag: restore) ---
  - name: "State Guard Restore - Check if remediation script absent marker exists"
    ansible.builtin.stat:
      path: "{{ state_guard_dir }}/script.absent"
    register: _sg_restore_script_marker
    failed_when: false
    tags: [restore]

  - name: "State Guard Restore - Remove remediation script"
    ansible.builtin.file:
      path: "/tmp/cis_4_2_2_remediate.sh"
      state: absent
    when: _sg_restore_script_marker.stat.exists | default(false)
    failed_when: false
    tags: [restore]
