---
- name: Initialize meta data variables
  include_vars: cis_remediation_var_2_4_1_5.yml

- name: "Snapshot - Create backup directory"
  ansible.builtin.file:
    path: "{{ backup_dir }}"
    state: directory
    mode: '0700'
  tags: [snapshot]
- name: "Snapshot - Check if /etc/cron.weekly exists"
  ansible.builtin.stat:
    path: "/etc/cron.weekly"
  register: _sg_cron_weekly_stat
  tags: [snapshot]
- name: "Snapshot - Backup /etc/cron.weekly metadata"
  ansible.builtin.shell: "stat -c '%U:%G %a' /etc/cron.weekly/ > {{ backup_dir }}/cron.weekly.state"
  args:
    executable: /bin/bash
    creates: "{{ backup_dir }}/cron.weekly.state"
  when: _sg_cron_weekly_stat.stat.exists
  tags: [snapshot]

- block:
  - name: "Initialize data variables"
    set_fact:
      data_01: "Not collected yet"
      status_01: "ERROR"
      details_01: "Not evaluated"
      data_02: "Not collected yet"
      status_02: "ERROR"
      details_02: "Not evaluated"
      data_03: "Not collected yet"
      status_03: "ERROR"
      details_03: "Not evaluated"
      data_04: "Not collected yet"
      status_04: "ERROR"
      details_04: "Not evaluated"
      data_05: "Not collected yet"
      status_05: "ERROR"
      details_05: "Not evaluated"
      task_01_name: "Not executed"
      task_01_cmd: "N/A"
      task_01_rc: -1
    tags: [execute]

# Requirement 01
  - name: "Req 01 - Check if cron is installed"
    ansible.builtin.shell: |
      if command -v cron >/dev/null 2>&1; then echo 'cron installed'; else echo 'cron not installed'; fi
    args:
      executable: /bin/bash
    register: result_01
    failed_when: false
    changed_when: false
    tags: [execute]

  - name: "Store requirement 01 details"
    set_fact:
      task_01_name: "Verify cron is installed"
      task_01_cmd: "if command -v cron >/dev/null 2>&1; then echo 'cron installed'; else echo 'cron not installed'; fi"
      task_01_rc: "{{ result_01.rc | default(-1) }}"
      data_01: "{{ result_01.stdout | default('') | trim }}"
      cron_installed: "{{ 'cron installed' in (result_01.stdout | default('')) }}"
      status_01: "{{ ('PASS' if ('cron installed' in (result_01.stdout | default(''))) else 'SKIP') | trim }}"
      details_01: "{{ ('Cron is installed' if ('cron installed' in (result_01.stdout | default(''))) else 'Cron is not installed: remediation skipped') | trim }}"
    tags: [execute]

  - name: "Check if /etc/cron.weekly exists"
    ansible.builtin.stat:
      path: "/etc/cron.weekly"
    register: _cw_stat
    when: cron_installed | default(false) | bool
    tags: [execute]

# Requirement 02
  - name: "Req 02 - Set ownership on /etc/cron.weekly"
    ansible.builtin.file:
      path: "/etc/cron.weekly"
      owner: root
      group: root
    when: "cron_installed | default(false) | bool and _cw_stat.stat.exists | default(false)"
    register: result_02
    failed_when: false
    tags: [execute]

  - name: "Store requirement 02 details"
    set_fact:
      task_02_name: "Set ownership of /etc/cron.weekly"
      task_02_cmd: "chown root:root /etc/cron.weekly/"
      task_02_rc: "{{ 1 if (result_02.failed | default(false)) else 0 }}"
      data_02: "{{ 'Skipped' if (result_02.skipped | default(false)) else 'Applied' }}"
      status_02: "{{ ('SKIP' if (result_02.skipped | default(false)) else ('PASS' if not (result_02.failed | default(false)) else 'FAIL')) | trim }}"
      details_02: "{{ ('Cron not installed or directory missing' if (result_02.skipped | default(false)) else ('Ownership set to root:root' if not (result_02.failed | default(false)) else 'Failed to set ownership')) | trim }}"
    tags: [execute]

# Requirement 03
  - name: "Req 03 - Set permissions on /etc/cron.weekly"
    ansible.builtin.file:
      path: "/etc/cron.weekly"
      mode: '0700'
    when: "cron_installed | default(false) | bool and _cw_stat.stat.exists | default(false)"
    register: result_03
    failed_when: false
    tags: [execute]

  - name: "Store requirement 03 details"
    set_fact:
      task_03_name: "Restrict permissions on /etc/cron.weekly"
      task_03_cmd: "chmod og-rwx /etc/cron.weekly/"
      task_03_rc: "{{ 1 if (result_03.failed | default(false)) else 0 }}"
      data_03: "{{ 'Skipped' if (result_03.skipped | default(false)) else 'Applied' }}"
      status_03: "{{ ('SKIP' if (result_03.skipped | default(false)) else ('PASS' if not (result_03.failed | default(false)) else 'FAIL')) | trim }}"
      details_03: "{{ ('Cron not installed or directory missing' if (result_03.skipped | default(false)) else ('Permissions set to 700' if not (result_03.failed | default(false)) else 'Failed to set permissions')) | trim }}"
    tags: [execute]

# Requirement 04
  - name: "Req 04 - Verify ownership and permissions"
    ansible.builtin.shell: "stat -c '%U:%G %a' /etc/cron.weekly/"
    args:
      executable: /bin/bash
    when: "cron_installed | default(false) | bool and _cw_stat.stat.exists | default(false)"
    register: result_04
    failed_when: false
    changed_when: false
    tags: [execute]

  - name: "Store requirement 04 details"
    set_fact:
      task_04_name: "Verify /etc/cron.weekly state"
      task_04_cmd: "stat -c '%U:%G %a' /etc/cron.weekly/"
      task_04_rc: "{{ result_04.rc | default(-1) }}"
      data_04: "{{ result_04.stdout | default('') | trim }}"
      status_04: "{{ ('SKIP' if (result_04.skipped | default(false)) else ('PASS' if (result_04.stdout | default('') | trim == 'root:root 700') else 'FAIL')) | trim }}"
      details_04: "{{ ('Skipped: cron not installed or directory missing' if (result_04.skipped | default(false)) else ('Ownership and permissions correct' if (result_04.stdout | default('') | trim == 'root:root 700') else 'Ownership/permissions mismatch: ' + (result_04.stdout | default('') | trim))) | trim }}"
    tags: [execute]

# Requirement 05
  - name: "Req 05 - Store final remediation result"
    set_fact:
      cis_result: "{{ status_04 | default('ERROR') | trim }}"
      details_05: "{{ details_04 | default('Not evaluated') | trim }}"
    tags: [execute]

  - name: "Generate remediation report"
    debug:
      msg:
      - "REMEDIATION REPORT — CIS 2.4.1.5"
      - "Reference: CIS Benchmark checkpoint 2.4.1.5"
      - ""
      - "REQUIREMENT 01 - {{ req_01 }}:"
      - "  Task: {{ task_01_name | default('Not recorded') }}"
      - "  Command: {{ task_01_cmd | default('N/A') }}"
      - "  Exit code: {{ task_01_rc | default(-1) }}"
      - "  Data: {{ data_01 | default('') | trim }}"
      - "  Status: {{ status_01 | default('ERROR') | trim }}"
      - "  Details: {{ details_01 | default('') | trim }}"
      - ""
      - "REQUIREMENT 02 - {{ req_02 }}:"
      - "  Task: {{ task_02_name | default('Not recorded') }}"
      - "  Command: {{ task_02_cmd | default('N/A') }}"
      - "  Exit code: {{ task_02_rc | default(-1) }}"
      - "  Data: {{ data_02 | default('') | trim }}"
      - "  Status: {{ status_02 | default('ERROR') | trim }}"
      - "  Details: {{ details_02 | default('') | trim }}"
      - ""
      - "REQUIREMENT 03 - {{ req_03 }}:"
      - "  Task: {{ task_03_name | default('Not recorded') }}"
      - "  Command: {{ task_03_cmd | default('N/A') }}"
      - "  Exit code: {{ task_03_rc | default(-1) }}"
      - "  Data: {{ data_03 | default('') | trim }}"
      - "  Status: {{ status_03 | default('ERROR') | trim }}"
      - "  Details: {{ details_03 | default('') | trim }}"
      - ""
      - "REQUIREMENT 04 - {{ req_04 }}:"
      - "  Task: {{ task_04_name | default('Not recorded') }}"
      - "  Command: {{ task_04_cmd | default('N/A') }}"
      - "  Exit code: {{ task_04_rc | default(-1) }}"
      - "  Data: {{ data_04 | default('') | trim }}"
      - "  Status: {{ status_04 | default('ERROR') | trim }}"
      - "  Details: {{ details_04 | default('') | trim }}"
      - ""
      - "REQUIREMENT 05 - {{ req_05 }}:"
      - "  Task: Store final result"
      - "  Command: set_fact"
      - "  Exit code:  0"
      - "  Data: {{ cis_result | default('') | trim }}"
      - "  Status: {{ cis_result | default('ERROR') | trim }}"
      - "  Details: {{ details_05 | default('Not evaluated') | trim }}"
      - ""
      - "========================================================"
      - "OVERALL REMEDIATION:"
      - "  Result: {{ cis_result | default('ERROR') | trim }}"
      - "========================================================"
    tags: [execute]

  always:
  - name: "Restore - Check if backup exists"
    ansible.builtin.stat:
      path: "{{ backup_dir }}/cron.weekly.state"
    register: _restore_backup
    tags: [restore]

  - name: "Restore - Read original metadata"
    ansible.builtin.shell: "cat {{ backup_dir }}/cron.weekly.state"
    args:
      executable: /bin/bash
    register: _restore_raw
    when: _restore_backup.stat.exists | default(false)
    failed_when: false
    tags: [restore]

  - name: "Restore - Set original ownership"
    ansible.builtin.file:
      path: "/etc/cron.weekly"
      owner: "{{ _restore_raw.stdout | default('root:root') | split(':') | first }}"
      group: "{{ _restore_raw.stdout | default('root:root') | split(':') | last | split(' ') | first }}"
    when: "_restore_backup.stat.exists | default(false) and _restore_raw.rc | default(1) == 0"
    failed_when: false
    tags: [restore]

  - name: "Restore - Set original permissions"
    ansible.builtin.file:
      path: "/etc/cron.weekly"
      mode: "{{ _restore_raw.stdout | default('root:root 0755') | split(' ') | last }}"
    when: "_restore_backup.stat.exists | default(false) and _restore_raw.rc | default(1) == 0"
    failed_when: false
    tags: [restore]

  - name: "Restore - Remove backup directory"
    ansible.builtin.file:
      path: "{{ backup_dir }}"
      state: absent
    when: _restore_backup.stat.exists | default(false)
    failed_when: false
    tags: [restore]
