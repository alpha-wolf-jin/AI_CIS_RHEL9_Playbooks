playbook_name: "CIS_4_2_1_firewalld"
backup_dir: "/var/log/ai-playbooks-backup/{{ playbook_name }}"
req_01: "Check if firewalld is in use on the system using command: `systemctl is-active firewalld`. Expected result: active"
req_02: "Remove unnecessary service using command: `firewall-cmd --remove-service=<service>`. Expected result: success"
req_03: "Remove unnecessary port using command: `firewall-cmd --remove-port=<port-number>/<port-type>`. Expected result: success"
req_04: "Make new settings persistent using command: `firewall-cmd --runtime-to-permanent`. Expected result: success"
req_05: "Verify that unnecessary services and ports are dropped using command: `firewall-cmd --list-all`. Expected result: only allowed services and ports are listed"
unnecessary_service: "cockpit"
unnecessary_port: "25/tcp"
