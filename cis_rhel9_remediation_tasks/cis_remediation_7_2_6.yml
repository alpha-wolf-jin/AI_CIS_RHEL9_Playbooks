---
- name: Initialize meta data variables
  include_vars: cis_remediation_var_7_2_6.yml

- name: "Snapshot - Create backup directory"
  ansible.builtin.file:
    path: "{{ backup_dir }}"
    state: directory
    mode: '0700'
  tags: [snapshot]
- name: "Snapshot - Check if /etc/passwd exists"
  ansible.builtin.stat:
    path: /etc/passwd
  register: _passwd_stat
  tags: [snapshot]
- name: "Snapshot - Backup /etc/passwd"
  ansible.builtin.copy:
    src: /etc/passwd
    dest: "{{ backup_dir }}/passwd.backup"
    remote_src: true
  when: _passwd_stat.stat.exists
  tags: [snapshot]
- name: "Snapshot - Record whether renames_applied marker exists"
  ansible.builtin.stat:
    path: "{{ backup_dir }}/renames_applied"
  register: _snap_renames_applied_stat
  tags: [snapshot]
- name: "Snapshot - Save renames_applied existence marker"
  ansible.builtin.shell: 'echo "{{ _snap_renames_applied_stat.stat.exists | default(false) }}" > "{{ backup_dir }}/renames_applied.existed"'
  args:
    executable: /bin/bash
    creates: "{{ backup_dir }}/renames_applied.existed"
  failed_when: false
  changed_when: false
  tags: [snapshot]

- block:
  - name: "Req 01 - Check if useradd and usermod binaries exist"
    ansible.builtin.shell: "which useradd usermod"
    args:
      executable: /bin/bash
    register: result_01
    failed_when: false
    changed_when: false
    tags: [execute]

  - name: "Store requirement 01 details"
    set_fact:
      task_01_name: "Check if useradd and usermod binaries exist"
      task_01_cmd: "which useradd usermod"
      task_01_rc: "{{ result_01.rc | default(-1) }}"
      data_01: "{{ result_01.stdout | default('') | trim }}"
      status_01: "{{ 'PASS' if (result_01.rc | default(-1)) == 0 else 'FAIL' }}"
      details_01: "{{ 'Both binaries found' if (result_01.rc | default(-1)) == 0 else 'One or both binaries missing' }}"
    tags: [execute]

  - name: "Req 02 - Identify duplicate user names in /etc/passwd"
    ansible.builtin.shell: "awk -F: '{print $1}' /etc/passwd | sort | uniq -d"
    args:
      executable: /bin/bash
    register: result_02
    failed_when: false
    changed_when: false
    when: "(result_01.rc | default(-1)) == 0"
    tags: [execute]

  - name: "Store requirement 02 details"
    set_fact:
      task_02_name: "Identify duplicate user names"
      task_02_cmd: "awk -F: '{print $1}' /etc/passwd | sort | uniq -d"
      task_02_rc: "{{ result_02.rc | default(-1) }}"
      data_02: "{{ result_02.stdout | default('') | trim }}"
      status_02: "{{ 'PASS' if (result_02.rc | default(-1)) == 0 else 'FAIL' }}"
      details_02: "{{ 'Duplicate users found: ' + (result_02.stdout | default('') | trim) if (result_02.stdout | default('') | trim) != '' else 'No duplicate users found' }}"
    when: result_02 is defined
    tags: [execute]

  - name: "Req 03 - Rename duplicate users to unique names"
    ansible.builtin.shell: |
      {% raw %}
      DUPLICATES=$(awk -F: '{print $1}' /etc/passwd | sort | uniq -d)
      if [ -n "$DUPLICATES" ]; then
        for old_name in $DUPLICATES; do
          new_name="${old_name}_unique"
          counter=1
          while id "$new_name" &>/dev/null; do
            new_name="${old_name}_unique${counter}"
            counter=$((counter + 1))
          done
          usermod -l "$new_name" "$old_name"
          echo "Renamed $old_name to $new_name"
        done
      fi
      {% endraw %}
    args:
      executable: /bin/bash
    register: result_03
    failed_when: false
    when:
    - "(result_01.rc | default(-1)) == 0"
    - "result_02 is defined"
    - "(result_02.stdout | default('') | trim) != ''"
    tags: [execute]

  - name: "Mark that renames were applied"
    ansible.builtin.file:
      path: "{{ backup_dir }}/renames_applied"
      state: touch
    when: "result_03 is defined and result_03.rc | default(-1) == 0"
    tags: [execute]

  - name: "Store requirement 03 details"
    set_fact:
      task_03_name: "Rename duplicate users to unique names"
      task_03_cmd: "usermod -l <new_unique_name> <old_duplicate_name>"
      task_03_rc: "{{ result_03.rc | default(-1) }}"
      data_03: "{{ result_03.stdout | default('') | trim }}"
      status_03: "{{ 'PASS' if (result_03.rc | default(-1)) == 0 or (result_03.skipped | default(false)) else 'FAIL' }}"
      details_03: "{{ 'Users renamed successfully' if (result_03.rc | default(-1)) == 0 else 'No duplicates to rename - requirement vacuously satisfied' if (result_03.skipped | default(false)) else 'Failed to rename users' }}"
    when: result_03 is defined or result_02 is defined
    tags: [execute]

  - name: "Req 04 - Verify no duplicate user names remain"
    ansible.builtin.shell: "awk -F: '{print $1}' /etc/passwd | sort | uniq -d"
    args:
      executable: /bin/bash
    register: result_04
    failed_when: false
    changed_when: false
    when: "(result_01.rc | default(-1)) == 0"
    tags: [execute]

  - name: "Store requirement 04 details"
    set_fact:
      task_04_name: "Verify no duplicate user names remain"
      task_04_cmd: "awk -F: '{print $1}' /etc/passwd | sort | uniq -d"
      task_04_rc: "{{ result_04.rc | default(-1) }}"
      data_04: "{{ result_04.stdout | default('') | trim }}"
      status_04: "{{ 'PASS' if (result_04.stdout | default('') | trim) == '' else 'FAIL' }}"
      details_04: "{{ 'No duplicate user names found' if (result_04.stdout | default('') | trim) == '' else 'Duplicate user names still exist: ' + (result_04.stdout | default('') | trim) }}"
    when: result_04 is defined
    tags: [execute]

  - name: "Set final remediation result"
    set_fact:
      cis_result: "{{ status_04 | default('UNKNOWN') }}"
    when: status_04 is defined
    tags: [execute]

  - name: "Store requirement 05 details"
    set_fact:
      task_05_name: "Store final remediation result"
      task_05_cmd: "set_fact"
      task_05_rc: 0
      data_05: "{{ cis_result | default('UNKNOWN') }}"
      status_05: "{{ 'PASS' if cis_result is defined else 'ERROR' }}"
      details_05: "{{ 'cis_result set to ' + cis_result if cis_result is defined else 'Failed to set cis_result' }}"
    when: cis_result is defined
    tags: [execute]

  - name: "Generate remediation report"
    debug:
      msg:
      - "========================================================"
      - "        REMEDIATION REPORT — CIS 7.2.6"
      - "========================================================"
      - "Reference: CIS Benchmark checkpoint 7.2.6"
      - ""
      - "REQUIREMENT 01 - {{ req_01 }}:"
      - "  Task: {{ task_01_name | default('Task not recorded') }}"
      - "  Command: {{ task_01_cmd | default('N/A') }}"
      - "  Exit code: {{ task_01_rc | default(-1) }}"
      - "  Data: {{ data_01 | default('Data collection failed') | trim }}"
      - "  Status: {{ status_01 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_01 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 02 - {{ req_02 }}:"
      - "  Task: {{ task_02_name | default('Task not recorded') }}"
      - "  Command: {{ task_02_cmd | default('N/A') }}"
      - "  Exit code: {{ task_02_rc | default(-1) }}"
      - "  Data: {{ data_02 | default('Data collection failed') | trim }}"
      - "  Status: {{ status_02 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_02 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 03 - {{ req_03 }}:"
      - "  Task: {{ task_03_name | default('Task not recorded') }}"
      - "  Command: {{ task_03_cmd | default('N/A') }}"
      - "  Exit code: {{ task_03_rc | default(-1) }}"
      - "  Data: {{ data_03 | default('Data collection failed') | trim }}"
      - "  Status: {{ status_03 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_03 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 04 - {{ req_04 }}:"
      - "  Task: {{ task_04_name | default('Task not recorded') }}"
      - "  Command: {{ task_04_cmd | default('N/A') }}"
      - "  Exit code: {{ task_04_rc | default(-1) }}"
      - "  Data: {{ data_04 | default('Data collection failed') | trim }}"
      - "  Status: {{ status_04 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_04 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 05 - {{ req_05 }}:"
      - "  Task: {{ task_05_name | default('Task not recorded') }}"
      - "  Command: {{ task_05_cmd | default('N/A') }}"
      - "  Exit code: {{ task_05_rc | default(-1) }}"
      - "  Data: {{ data_05 | default('Data collection failed') | trim }}"
      - "  Status: {{ status_05 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_05 | default('Not evaluated') | trim }}"
      - ""
      - "========================================================"
      - "OVERALL REMEDIATION:"
      - "  Result: {{ cis_result | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_04 | default('Not evaluated') | trim }}"
      - "========================================================"
    tags: [execute]

  always:
  - name: "Restore - Check if backup exists"
    ansible.builtin.stat:
      path: "{{ backup_dir }}/passwd.backup"
    register: _restore_backup_stat
    failed_when: false
    tags: [restore]

  - name: "Restore - Check if renames were applied"
    ansible.builtin.stat:
      path: "{{ backup_dir }}/renames_applied"
    register: _restore_renames_applied
    failed_when: false
    tags: [restore]

  - name: "Restore - Overwrite /etc/passwd with original"
    ansible.builtin.copy:
      src: "{{ backup_dir }}/passwd.backup"
      dest: /etc/passwd
      remote_src: true
    when:
    - _restore_backup_stat.stat.exists | default(false)
    - "not _restore_renames_applied.stat.exists | default(false)"
    failed_when: false
    tags: [restore]

  - name: "Restore - Check if renames_applied.existed marker exists"
    ansible.builtin.stat:
      path: "{{ backup_dir }}/renames_applied.existed"
    register: _restore_renames_applied_existed
    failed_when: false
    tags: [restore]

  - name: "Restore - Read renames_applied existence"
    ansible.builtin.slurp:
      src: "{{ backup_dir }}/renames_applied.existed"
    register: _restore_renames_applied_content
    when: _restore_renames_applied_existed.stat.exists | default(false)
    failed_when: false
    tags: [restore]

  - name: "Restore - Remove renames_applied if it did not exist before execution"
    ansible.builtin.file:
      path: "{{ backup_dir }}/renames_applied"
      state: absent
    when:
    - _restore_renames_applied_existed.stat.exists | default(false)
    - _restore_renames_applied_content.content is defined
    - (_restore_renames_applied_content.content | b64decode | trim) == 'False'
    failed_when: false
    tags: [restore]

  - name: "Restore - Remove backup directory"
    ansible.builtin.file:
      path: "{{ backup_dir }}"
      state: absent
    failed_when: false
    tags: [restore]
