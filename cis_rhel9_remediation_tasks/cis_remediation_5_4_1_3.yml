---
- name: Initialize meta data variables
  include_vars: cis_remediation_var_5_4_1_3.yml

- name: "Snapshot - Create backup directory"
  ansible.builtin.file:
    path: "{{ backup_dir }}"
    state: directory
    mode: '0700'
  tags: [snapshot]
- name: "Snapshot - Check if /etc/login.defs exists"
  ansible.builtin.stat:
    path: /etc/login.defs
  register: _snap_login_defs_stat
  tags: [snapshot]
- name: "Snapshot - Backup /etc/login.defs if exists"
  ansible.builtin.copy:
    src: /etc/login.defs
    dest: "{{ backup_dir }}/login.defs.present"
    remote_src: true
  when: "_snap_login_defs_stat.stat.exists | default(false)"
  tags: [snapshot]
- name: "Snapshot - Check if /etc/shadow exists"
  ansible.builtin.stat:
    path: /etc/shadow
  register: _snap_shadow_stat
  tags: [snapshot]
- name: "Snapshot - Backup /etc/shadow if exists"
  ansible.builtin.copy:
    src: /etc/shadow
    dest: "{{ backup_dir }}/shadow.present"
    remote_src: true
  when: "_snap_shadow_stat.stat.exists | default(false)"
  tags: [snapshot]

- name: "Initialize data variables"
  set_fact:
    data_01: "Not collected yet"
    status_01: "UNKNOWN"
    details_01: "Not evaluated"
    data_02: "Not collected yet"
    status_02: "UNKNOWN"
    details_02: "Not evaluated"
    data_03: "Not collected yet"
    status_03: "UNKNOWN"
    details_03: "Not evaluated"
    data_04: "Not collected yet"
    status_04: "UNKNOWN"
    details_04: "Not evaluated"
    data_05: "Not collected yet"
    status_05: "UNKNOWN"
    details_05: "Not evaluated"
    data_06: "Not collected yet"
    status_06: "UNKNOWN"
    details_06: "Not evaluated"
    task_01_name: "Not executed"
    task_01_cmd: "N/A"
    task_01_rc: -1
    task_02_name: "Not executed"
    task_02_cmd: "N/A"
    task_02_rc: -1
    task_03_name: "Not executed"
    task_03_cmd: "N/A"
    task_03_rc: -1
    task_04_name: "Not executed"
    task_04_cmd: "N/A"
    task_04_rc: -1
    task_05_name: "Not executed"
    task_05_cmd: "N/A"
    task_05_rc: -1
    task_06_name: "Not executed"
    task_06_cmd: "N/A"
    task_06_rc: -1

- block:
  - name: "Req 01 - Check if awk and chage are available"
    ansible.builtin.shell: "which awk && which chage"
    args:
      executable: /bin/bash
    register: result_01
    failed_when: false
    changed_when: false
    tags: [execute]

  - name: "Store requirement 01 details"
    set_fact:
      task_01_name: "Req 01 - Check if awk and chage are available"
      task_01_cmd: "which awk && which chage"
      task_01_rc: "{{ result_01.rc | default(-1) }}"
      data_01: "{{ result_01.stdout | default('') | trim }}"
      status_01: "{{ 'PASS' if (result_01.rc | default(-1)) == 0 else 'FAIL' }}"
      details_01: "{{ 'Both commands found' if (result_01.rc | default(-1)) == 0 else 'One or both commands missing' }}"

  - name: "Req 02 - Set PASS_WARN_AGE in /etc/login.defs"
    ansible.builtin.shell: |
      if grep -q '^PASS_WARN_AGE' /etc/login.defs; then
        sed -i 's/^PASS_WARN_AGE.*/PASS_WARN_AGE 7/' /etc/login.defs
      else
        echo 'PASS_WARN_AGE 7' >> /etc/login.defs
      fi
    args:
      executable: /bin/bash
    register: result_02
    failed_when: false
    tags: [execute]

  - name: "Store requirement 02 details"
    set_fact:
      task_02_name: "Req 02 - Set PASS_WARN_AGE in /etc/login.defs"
      task_02_cmd: "sed -i 's/^PASS_WARN_AGE.*/PASS_WARN_AGE 7/' /etc/login.defs || echo 'PASS_WARN_AGE 7' >> /etc/login.defs"
      task_02_rc: "{{ result_02.rc | default(-1) }}"
      data_02: "{{ result_02.stdout | default('') | trim }}"
      status_02: "{{ 'PASS' if (result_02.rc | default(-1)) == 0 else 'FAIL' }}"
      details_02: "{{ 'PASS_WARN_AGE set to 7' if (result_02.rc | default(-1)) == 0 else 'Failed to set PASS_WARN_AGE' }}"

  - name: "Req 03 - Apply password warning days for all users with passwords"
    ansible.builtin.shell: |
      awk -F: '($2~/^\$.+\$/) {if($6 < 7) system("chage --warndays 7 " $1)}' /etc/shadow
    args:
      executable: /bin/bash
    register: result_03
    failed_when: false
    tags: [execute]

  - name: "Store requirement 03 details"
    set_fact:
      task_03_name: "Req 03 - Apply password warning days for all users with passwords"
      task_03_cmd: |
        awk -F: '($2~/^\\$.+\\$/) {if($6 < 7) system(\"chage --warndays 7 \" $1)}' /etc/shadow
      task_03_rc: "{{ result_03.rc | default(-1) }}"
      data_03: "{{ result_03.stdout | default('') | trim }}"
      status_03: "{{ 'PASS' if (result_03.rc | default(-1)) == 0 else 'FAIL' }}"
      details_03: "{{ 'Warning days applied to all users' if (result_03.rc | default(-1)) == 0 else 'Failed to apply warning days' }}"

  - name: "Req 04 - Verify PASS_WARN_AGE in /etc/login.defs"
    ansible.builtin.shell: grep ^PASS_WARN_AGE /etc/login.defs
    args:
      executable: /bin/bash
    register: result_04
    failed_when: false
    changed_when: false
    tags: [execute]

  - name: "Store requirement 04 details"
    set_fact:
      task_04_name: "Req 04 - Verify PASS_WARN_AGE in /etc/login.defs"
      task_04_cmd: "grep ^PASS_WARN_AGE /etc/login.defs"
      task_04_rc: "{{ result_04.rc | default(-1) }}"
      data_04: "{{ result_04.stdout | default('') | trim }}"
      status_04: "{{ ('PASS' if (result_04.rc | default(-1)) == 0 and 'PASS_WARN_AGE 7' in (result_04.stdout | default('') | trim) else 'FAIL') | trim }}"
      details_04: "{{ 'PASS_WARN_AGE set to 7' if (result_04.rc | default(-1)) == 0 and 'PASS_WARN_AGE 7' in (result_04.stdout | default('') | trim) else 'PASS_WARN_AGE not set correctly' }}"

  - name: "Req 05 - Verify user warning days >= 7"
    ansible.builtin.shell: |
      awk -F: '($2~/^\$.+\$/) {print $1, $6}' /etc/shadow | awk '$2 < 7 {print "FAIL: " $1 " has warning days " $2; found=1} END {if(!found) print "All users have warning days >= 7"}'
    args:
      executable: /bin/bash
    register: result_05
    failed_when: false
    changed_when: false
    tags: [execute]

  - name: "Store requirement 05 details"
    set_fact:
      task_05_name: "Req 05 - Verify user warning days >= 7"
      task_05_cmd: |
        awk -F: '($2~/^\\$.+\\$/) {print $1, $6}' /etc/shadow | awk '$2 < 7 {print \"FAIL: \" $1 \" has warning days \" $2; found=1} END {if(!found) print \"All users have warning days >= 7\"}'
      task_05_rc: "{{ result_05.rc | default(-1) }}"
      data_05: "{{ result_05.stdout | default('') | trim }}"
      status_05: "{{ ('PASS' if ('All users have warning days >= 7' in (result_05.stdout | default('') | trim)) else 'FAIL') | trim }}"
      details_05: "{{ 'User warning days verified' if ('All users have warning days >= 7' in (result_05.stdout | default('') | trim)) else 'Some users have warning days < 7' }}"

  - name: "Req 06 - Store final remediation result"
    set_fact:
      cis_result: "{{ 'PASS' if (status_04 | default('FAIL')) == 'PASS' and (status_05 | default('FAIL')) == 'PASS' else 'FAIL' }}"
    tags: [execute]

  - name: "Store requirement 06 details"
    set_fact:
      task_06_name: "Req 06 - Store final remediation result"
      task_06_cmd: "set_fact cis_result = {{ cis_result }}"
      task_06_rc: "0"
      data_06: "Overall remediation status: {{ cis_result }}"
      status_06: "PASS"
      details_06: "Final result stored in cis_result"

  - name: "Generate remediation report"
    debug:
      msg:
      - "========================================================"
      - "REMEDIATION REPORT — CIS 5.4.1.3"
      - "Reference: CIS Benchmark checkpoint 5.4.1.3"
      - "========================================================"
      - ""
      - "REQUIREMENT 01 - {{ req_01 }}:"
      - "  Task: {{ task_01_name | default('Task not recorded') }}"
      - "  Command: {{ task_01_cmd | default('N/A') }}"
      - "  Exit code: {{ task_01_rc | default(-1) }}"
      - "  Data: {{ data_01 | default('') | trim }}"
      - "  Status: {{ status_01 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_01 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 02 - {{ req_02 }}:"
      - "  Task: {{ task_02_name | default('Task not recorded') }}"
      - "  Command: {{ task_02_cmd | default('N/A') }}"
      - "  Exit code: {{ task_02_rc | default(-1) }}"
      - "  Data: {{ data_02 | default('') | trim }}"
      - "  Status: {{ status_02 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_02 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 03 - {{ req_03 }}:"
      - "  Task: {{ task_03_name | default('Task not recorded') }}"
      - "  Command: {{ task_03_cmd | default('N/A') }}"
      - "  Exit code: {{ task_03_rc | default(-1) }}"
      - "  Data: {{ data_03 | default('') | trim }}"
      - "  Status: {{ status_03 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_03 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 04 - {{ req_04 }}:"
      - "  Task: {{ task_04_name | default('Task not recorded') }}"
      - "  Command: {{ task_04_cmd | default('N/A') }}"
      - "  Exit code: {{ task_04_rc | default(-1) }}"
      - "  Data: {{ data_04 | default('') | trim }}"
      - "  Status: {{ status_04 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_04 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 05 - {{ req_05 }}:"
      - "  Task: {{ task_05_name | default('Task not recorded') }}"
      - "  Command: {{ task_05_cmd | default('N/A') }}"
      - "  Exit code: {{ task_05_rc | default(-1) }}"
      - "  Data: {{ data_05 | default('') | trim }}"
      - "  Status: {{ status_05 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_05 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 06 - {{ req_06 }}:"
      - "  Task: {{ task_06_name | default('Task not recorded') }}"
      - "  Command: {{ task_06_cmd | default('N/A') }}"
      - "  Exit code: {{ task_06_rc | default(-1) }}"
      - "  Data: {{ data_06 | default('') | trim }}"
      - "  Status: {{ status_06 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_06 | default('Not evaluated') | trim }}"
      - ""
      - "========================================================"
      - "OVERALL REMEDIATION:"
      - "  Result: {{ cis_result | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_06 | default('Not evaluated') | trim }}"
      - "========================================================"
    tags: [execute]

  always:
  - name: "Restore - Check if backup of /etc/login.defs exists"
    ansible.builtin.stat:
      path: "{{ backup_dir }}/login.defs.present"
    register: _restore_login_defs
    failed_when: false
    tags: [restore]

  - name: "Restore - Overwrite /etc/login.defs with original"
    ansible.builtin.copy:
      src: "{{ backup_dir }}/login.defs.present"
      dest: /etc/login.defs
      remote_src: true
    when: "_restore_login_defs.stat.exists | default(false)"
    failed_when: false
    tags: [restore]

  - name: "Restore - Check if backup of /etc/shadow exists"
    ansible.builtin.stat:
      path: "{{ backup_dir }}/shadow.present"
    register: _restore_shadow
    failed_when: false
    tags: [restore]

  - name: "Restore - Overwrite /etc/shadow with original"
    ansible.builtin.copy:
      src: "{{ backup_dir }}/shadow.present"
      dest: /etc/shadow
      remote_src: true
    when: "_restore_shadow.stat.exists | default(false)"
    failed_when: false
    tags: [restore]

  - name: "Restore - Remove backup directory"
    ansible.builtin.file:
      path: "{{ backup_dir }}"
      state: absent
    failed_when: false
    tags: [restore]
