playbook_name: "cis_5_1_14"
checkpoint_id: "cis_5_1_14"
state_guard_dir: "/usr/local/bin/cis/.cis_state_guard/{{ checkpoint_id }}"
state_guard_flag: "{{ state_guard_dir }}/checkpoint.flag"
sshd_config: "/etc/ssh/sshd_config"
ssh_dropin_dir: "/etc/ssh/sshd_config.d"
dropin_conf: "{{ ssh_dropin_dir }}/00-cis-logingracetime.conf"
package_name: "openssh-server"
config_param: "LoginGraceTime"
config_value: "60"
service_name: "sshd"
req_01: "Check that OpenSSH server is installed using command: `dpkg -l | grep -q openssh-server || rpm -q openssh-server`. Expected result: exit code 0."
req_02: "Verify the current LoginGraceTime setting in /etc/ssh/sshd_config using command: `grep -E '^LoginGraceTime' /etc/ssh/sshd_config`. Expected result: output shows the current value or no output if not set."
req_03: "Backup the current sshd_config file using command: `cp /etc/ssh/sshd_config /etc/ssh/sshd_config.bak.$(date +%Y%m%d%H%M%S)`. Expected result: backup file created."
req_04: "Set LoginGraceTime to 60 seconds using high‑precedence drop‑in config. Remove any conflicting direct entry from the main sshd_config."
req_05: "Restart the SSH service to apply changes using command: `systemctl restart sshd || service sshd restart`. Expected result: service restarts without error."
req_06: "Verify the LoginGraceTime setting is applied using command: `sshd -T | grep -i logingracetime`. Expected result: output shows 'logingracetime 60'."
req_07: "Store the final remediation result in a variable named 'cis_result' using set_fact. Set cis_result to the overall remediation status (PASS/FAIL/SKIP/ERROR) derived from the last requirement's status variable."
