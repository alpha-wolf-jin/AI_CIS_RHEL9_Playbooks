---
- name: Initialize meta data variables
  include_vars: cis_remediation_var_6_3_3_9.yml

- name: "Snapshot - Create backup directory"
  ansible.builtin.file:
    path: "{{ backup_dir }}"
    state: directory
    mode: '0700'
  tags: [snapshot]
- name: "Snapshot - Check if audit rules file exists"
  ansible.builtin.stat:
    path: "{{ audit_rules_file }}"
  register: _snap_rules_stat
  failed_when: false
  tags: [snapshot]
- name: "Snapshot - Backup audit rules file if exists"
  ansible.builtin.copy:
    src: "{{ audit_rules_file }}"
    dest: "{{ backup_dir }}/50-perm_mod.rules.orig"
    remote_src: true
  when: "_snap_rules_stat.stat.exists | default(false)"
  failed_when: false
  tags: [snapshot]
- name: "Snapshot - Check if temp script exists"
  ansible.builtin.stat:
    path: /tmp/cis_6_3_3_9_rules.sh
  register: _snap_temp_script_stat
  failed_when: false
  tags: [snapshot]
- name: "Snapshot - Record temp script existence marker"
  ansible.builtin.copy:
    content: "{{ _snap_temp_script_stat.stat.exists | default(false) }}"
    dest: "{{ backup_dir }}/temp_script_existed"
  failed_when: false
  tags: [snapshot]

- block:
  - name: "Req 01 - Check if auditd package is installed"
    ansible.builtin.package_facts:
      manager: auto
    failed_when: false
    tags: [execute]

  - name: "Req 01 - Set auditd installed fact"
    ansible.builtin.set_fact:
      auditd_installed: "{{ 'audit' in ansible_facts.packages }}"
      playbook_skipped: "{{ 'audit' not in ansible_facts.packages }}"
    tags: [execute]

  - name: "Req 01 - Check if auditd service is running"
    ansible.builtin.shell: |
      systemctl is-active auditd.service 2>/dev/null || echo "inactive"
    args:
      executable: /bin/bash
    register: _auditd_active
    failed_when: false
    changed_when: false
    when: "auditd_installed | default(false)"
    tags: [execute]

  - name: "Req 01 - Set skip fact if auditd not installed or not running"
    ansible.builtin.set_fact:
      auditd_ready: "{{ (auditd_installed | default(false)) and (_auditd_active.stdout | default('inactive') | trim == 'active') }}"
    tags: [execute]

  - name: "Req 01 - Get UID_MIN from login.defs"
    ansible.builtin.shell: |
      awk '/^\s*UID_MIN/{print $2}' /etc/login.defs
    args:
      executable: /bin/bash
    register: _uid_min
    failed_when: false
    changed_when: false
    when: "auditd_ready | default(false)"
    tags: [execute]

  - name: "Req 01 - Deploy audit rules script"
    ansible.builtin.copy:
      content: |
        #!/usr/bin/env bash
        UID_MIN=$(awk '/^\s*UID_MIN/{print $2}' /etc/login.defs)
        if [ -n "${UID_MIN}" ]; then
          cat > /etc/audit/rules.d/50-perm_mod.rules << 'EOF'
        -a always,exit -F arch=b64 -S chmod,fchmod,fchmodat -F auid>=UID_MIN_PLACEHOLDER -F auid!=unset -F key=perm_mod
        -a always,exit -F arch=b64 -S chown,fchown,lchown,fchownat -F auid>=UID_MIN_PLACEHOLDER -F auid!=unset -F key=perm_mod
        -a always,exit -F arch=b32 -S chmod,fchmod,fchmodat -F auid>=UID_MIN_PLACEHOLDER -F auid!=unset -F key=perm_mod
        -a always,exit -F arch=b32 -S lchown,fchown,chown,fchownat -F auid>=UID_MIN_PLACEHOLDER -F auid!=unset -F key=perm_mod
        -a always,exit -F arch=b64 -S setxattr,lsetxattr,fsetxattr,removexattr,lremovexattr,fremovexattr -F auid>=UID_MIN_PLACEHOLDER -F auid!=unset -F key=perm_mod
        -a always,exit -F arch=b32 -S setxattr,lsetxattr,fsetxattr,removexattr,lremovexattr,fremovexattr -F auid>=UID_MIN_PLACEHOLDER -F auid!=unset -F key=perm_mod
        EOF
          sed -i "s/UID_MIN_PLACEHOLDER/${UID_MIN}/g" /etc/audit/rules.d/50-perm_mod.rules
        else
          echo "ERROR: Variable UID_MIN is unset."
          exit 1
        fi
      dest: /tmp/cis_6_3_3_9_rules.sh
      mode: '0700'
    when: "auditd_ready | default(false)"
    tags: [execute]

  - name: "Req 01 - Execute audit rules script"
    ansible.builtin.shell: /bin/bash /tmp/cis_6_3_3_9_rules.sh
    args:
      executable: /bin/bash
    register: _rules_script
    failed_when: false
    when: "auditd_ready | default(false)"
    tags: [execute]

  - name: "Req 01 - Load audit rules with augenrules"
    ansible.builtin.shell: augenrules --load
    args:
      executable: /bin/bash
    register: _augenrules
    failed_when: false
    when: "auditd_ready | default(false)"
    tags: [execute]

  - name: "Req 01 - Check if reboot is required"
    ansible.builtin.shell: |
      if [[ $(auditctl -s | grep "enabled") =~ "2" ]]; then
        echo "REBOOT_REQUIRED"
      else
        echo "NO_REBOOT"
      fi
    args:
      executable: /bin/bash
    register: _reboot_check
    failed_when: false
    changed_when: false
    when: "auditd_ready | default(false)"
    tags: [execute]

  - name: "Req 01 - Reboot if required"
    ansible.builtin.reboot:
      reboot_timeout: 180
    when:
    - "auditd_ready | default(false)"
    - "_reboot_check.stdout | default('') | trim == 'REBOOT_REQUIRED'"
    tags: [execute]

  - name: "Req 01 - Clean up temp script"
    ansible.builtin.file:
      path: /tmp/cis_6_3_3_9_rules.sh
      state: absent
    failed_when: false
    tags: [execute]

  - name: "Req 02 - Verify audit rules are loaded"
    ansible.builtin.shell: |
      set -o pipefail
      auditctl -l | grep -E 'perm_mod' || echo 'VERIFY_FAILED'
    args:
      executable: /bin/bash
    register: _verify_result
    failed_when: false
    changed_when: false
    when: "auditd_ready | default(false)"
    tags: [execute]

  - name: "Store requirement 01 details"
    ansible.builtin.set_fact:
      task_01_name: "Apply audit rules for discretionary access control permission modification events"
      task_01_cmd: "Deploy and execute /tmp/cis_6_3_3_9_rules.sh, augenrules --load"
      task_01_rc: "{{ _rules_script.rc | default(-1) }}"
      data_01: "{{ _rules_script.stdout | default('') | trim }}"
      status_01: "{{ 'SKIP' if not (auditd_ready | default(false)) else ('APPLIED' if (_rules_script.rc | default(-1)) == 0 else 'FAILED') }}"
      details_01: "{{ 'auditd not installed or not running' if not (auditd_ready | default(false)) else ('Rules applied successfully' if (_rules_script.rc | default(-1)) == 0 else 'Failed to apply rules: ' + (_rules_script.stderr | default('Unknown error') | trim)) }}"
    tags: [execute]

  - name: "Store requirement 02 details"
    ansible.builtin.set_fact:
      task_02_name: "Verify discretionary access control audit rules are loaded"
      task_02_cmd: "auditctl -l | grep -E 'perm_mod'"
      task_02_rc: "{{ _verify_result.rc | default(-1) }}"
      data_02: "{{ _verify_result.stdout | default('') | trim }}"
      status_02: "{{ 'SKIP' if not (auditd_ready | default(false)) else ('APPLIED' if 'VERIFY_FAILED' not in (_verify_result.stdout | default('VERIFY_FAILED')) else 'FAILED') }}"
      details_02: "{{ 'auditd not installed or not running' if not (auditd_ready | default(false)) else ('perm_mod rules are active' if 'VERIFY_FAILED' not in (_verify_result.stdout | default('VERIFY_FAILED')) else 'perm_mod rules not found in active audit rules') }}"
    tags: [execute]

  - name: "Req 03 - Store final remediation result in cis_result"
    ansible.builtin.set_fact:
      cis_result: "{{ {'APPLIED': 'PASS', 'FAILED': 'FAIL', 'SKIP': 'SKIP', 'ERROR': 'ERROR'}[status_02 | default('ERROR')] | default('ERROR') }}"
      task_03_name: "Map internal status to canonical result"
      task_03_cmd: "cis_result = mapping from status_02"
      task_03_rc: 0
      data_03: "{{ status_02 | default('UNKNOWN') }}"
      status_03: "{{ {'APPLIED': 'PASS', 'FAILED': 'FAIL', 'SKIP': 'SKIP', 'ERROR': 'ERROR'}[status_02 | default('ERROR')] | default('ERROR') }}"
      details_03: "{{ 'Internal status ' + (status_02 | default('UNKNOWN')) + ' mapped to canonical result ' + ({'APPLIED': 'PASS', 'FAILED': 'FAIL', 'SKIP': 'SKIP', 'ERROR': 'ERROR'}[status_02 | default('ERROR')] | default('ERROR')) }}"
    tags: [execute]

  - name: "Generate remediation report"
    ansible.builtin.debug:
      msg:
      - "REMEDIATION REPORT — CIS 6.3.3.9"
      - "Reference: CIS Benchmark checkpoint 6.3.3.9"
      - ""
      - "REQUIREMENT 01 - {{ req_01 }}:"
      - "  Task: {{ task_01_name | default('Task not recorded') }}"
      - "  Command: {{ task_01_cmd | default('N/A') }}"
      - "  Exit code: {{ task_01_rc | default(-1) }}"
      - "  Data: {{ data_01 | default('') | trim }}"
      - "  Status: {{ status_01 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_01 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 02 - {{ req_02 }}:"
      - "  Task: {{ task_02_name | default('Task not recorded') }}"
      - "  Command: {{ task_02_cmd | default('N/A') }}"
      - "  Exit code: {{ task_02_rc | default(-1) }}"
      - "  Data: {{ data_02 | default('') | trim }}"
      - "  Status: {{ status_02 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_02 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 03 - {{ req_03 }}:"
      - "  Task: {{ task_03_name | default('Task not recorded') }}"
      - "  Command: {{ task_03_cmd | default('N/A') }}"
      - "  Exit code: {{ task_03_rc | default(-1) }}"
      - "  Data: {{ data_03 | default('') | trim }}"
      - "  Status: {{ status_03 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_03 | default('Not evaluated') | trim }}"
      - ""
      - "OVERALL REMEDIATION:"
      - "  Result: {{ cis_result | default('ERROR') | trim }}"
      - "  Details: {{ details_02 | default('Not evaluated') | trim }}"
    tags: [execute]

  always:
  - name: "Restore - Check if audit rules backup exists"
    ansible.builtin.stat:
      path: "{{ backup_dir }}/50-perm_mod.rules.orig"
    register: _restore_rules_check
    failed_when: false
    tags: [restore]

  - name: "Restore - Overwrite audit rules with original"
    ansible.builtin.copy:
      src: "{{ backup_dir }}/50-perm_mod.rules.orig"
      dest: "{{ audit_rules_file }}"
      remote_src: true
    when: "_restore_rules_check.stat.exists | default(false)"
    failed_when: false
    tags: [restore]

  - name: "Restore - Reload audit rules after restore"
    ansible.builtin.shell: augenrules --load 2>/dev/null || true
    args:
      executable: /bin/bash
    when: "_restore_rules_check.stat.exists | default(false)"
    failed_when: false
    tags: [restore]

  - name: "Restore - Read temp script existence marker"
    ansible.builtin.slurp:
      src: "{{ backup_dir }}/temp_script_existed"
    register: _restore_temp_script_marker
    failed_when: false
    tags: [restore]

  - name: "Restore - Remove temp script if it was created during remediation"
    ansible.builtin.file:
      path: /tmp/cis_6_3_3_9_rules.sh
      state: absent
    when:
    - _restore_temp_script_marker.content is defined
    - (_restore_temp_script_marker.content | b64decode | trim) == 'False'
    failed_when: false
    tags: [restore]

  - name: "Restore - Remove backup directory"
    ansible.builtin.file:
      path: "{{ backup_dir }}"
      state: absent
    failed_when: false
    tags: [restore]
