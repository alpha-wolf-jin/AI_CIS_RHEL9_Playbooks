playbook_name: "cis_6_2_2_1_1"
backup_dir: "/var/log/ai-playbooks-backup/{{ playbook_name }}"
package_name: "systemd-journal-remote"
req_01: "Apply prerequisite check for dnf package manager using command: `which dnf`. Expected result: path to dnf binary."
req_02: "Install systemd-journal-remote using command: `dnf install -y systemd-journal-remote`. Expected result: package installed successfully."
req_03: "Verify systemd-journal-remote is installed using command: `rpm -q systemd-journal-remote`. Expected result: package version is displayed."
req_04: "Store the final remediation result in a variable named 'cis_result' using set_fact. Set cis_result to the overall remediation status (PASS/FAIL/SKIP/ERROR) derived from the last requirement's status variable."
