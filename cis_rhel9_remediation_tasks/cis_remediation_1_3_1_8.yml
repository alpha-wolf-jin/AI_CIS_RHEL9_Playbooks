---
- name: Initialize meta data variables
  include_vars: cis_remediation_var_1_3_1_8.yml

- name: "Snapshot - Create backup directory"
  ansible.builtin.file:
    path: "{{ backup_dir }}"
    state: directory
    mode: '0700'
  tags: [snapshot]

- block:
  - name: "Initialize data variables"
    set_fact:
      data_01: "Not collected yet"
      status_01: "ERROR"
      details_01: "Not evaluated"
      data_02: "Not collected yet"
      status_02: "ERROR"
      details_02: "Not evaluated"
      data_03: "Not collected yet"
      status_03: "ERROR"
      details_03: "Not evaluated"
      data_04: "Not collected yet"
      status_04: "ERROR"
      details_04: "Not evaluated"
      task_01_name: "Not executed"
      task_01_cmd: "N/A"
      task_01_rc: -1
      task_02_name: "Not executed"
      task_02_cmd: "N/A"
      task_02_rc: -1
      task_03_name: "Not executed"
      task_03_cmd: "N/A"
      task_03_rc: -1
      task_04_name: "Not executed"
      task_04_cmd: "N/A"
      task_04_rc: -1

  - name: "Req 01 - Check if dnf package manager is available"
    ansible.builtin.shell: which dnf
    args:
      executable: /bin/bash
    register: result_01
    failed_when: false
    changed_when: false

  - name: "Store requirement 01 details"
    set_fact:
      task_01_name: "Check if dnf package manager is available"
      task_01_cmd: "which dnf"
      task_01_rc: "{{ result_01.rc | default(-1) }}"
      data_01: "{{ result_01.stdout | default('') | trim }}"
      status_01: "{{ 'PASS' if result_01.rc | default(-1) == 0 else 'FAIL' }}"
      details_01: "{{ 'dnf found at: ' + result_01.stdout | default('') | trim if result_01.rc | default(-1) == 0 else 'dnf not found' }}"

  - name: "Gather package facts"
    ansible.builtin.package_facts:
      manager: auto
    failed_when: false
    changed_when: false

  - name: "Set package installed fact"
    ansible.builtin.set_fact:
      setroubleshoot_installed: "{{ 'setroubleshoot' in ansible_facts.packages | default({}) }}"

  - name: "Req 02 - Remove setroubleshoot package using dnf"
    ansible.builtin.dnf:
      name: setroubleshoot
      state: absent
    register: result_02
    failed_when: false
    when: setroubleshoot_installed | default(false) | bool

  - name: "Store requirement 02 details"
    set_fact:
      task_02_name: "Remove setroubleshoot package using dnf"
      task_02_cmd: "dnf remove -y setroubleshoot"
      task_02_rc: "{{ result_02.rc | default(0) }}"
      data_02: "{{ result_02.stdout | default('') | trim }}"
      status_02: "{{ 'PASS' if result_02.rc | default(0) == 0 else 'SKIP' if not (setroubleshoot_installed | default(false) | bool) else 'FAIL' }}"
      details_02: "{{ 'Package removed successfully' if result_02.rc | default(0) == 0 else 'Package not installed, skipped' if not (setroubleshoot_installed | default(false) | bool) else 'Failed to remove package' }}"

  - name: "Req 03 - Verify setroubleshoot is not installed"
    ansible.builtin.shell: rpm -q setroubleshoot
    args:
      executable: /bin/bash
    register: result_03
    failed_when: false
    changed_when: false

  - name: "Store requirement 03 details"
    set_fact:
      task_03_name: "Verify setroubleshoot is not installed"
      task_03_cmd: "rpm -q setroubleshoot"
      task_03_rc: "{{ result_03.rc | default(-1) }}"
      data_03: "{{ result_03.stdout | default('') | trim }}"
      status_03: "{{ 'PASS' if result_03.rc | default(-1) == 1 else 'FAIL' }}"
      details_03: "{{ 'Package is not installed (compliant)' if result_03.rc | default(-1) == 1 else 'Package is still installed (non-compliant)' }}"

  - name: "Req 04 - Store final remediation result in cis_result"
    set_fact:
      task_04_name: "Store final remediation result in cis_result"
      task_04_cmd: "N/A"
      task_04_rc: 0
      data_04: "cis_result = {{ status_03 | default('ERROR') | trim }}"
      status_04: "{{ status_03 | default('ERROR') | trim }}"
      details_04: "Variable cis_result stored successfully"
      cis_result: "{{ status_03 | default('ERROR') | trim }}"

  - name: "Generate remediation report"
    debug:
      msg:
      - "REMEDIATION REPORT — CIS 1.3.1.8"
      - "Reference: CIS Benchmark checkpoint 1.3.1.8"
      - ""
      - "REQUIREMENT 01 - {{ req_01 }}:"
      - "  Task: {{ task_01_name | default('Not recorded') }}"
      - "  Command: {{ task_01_cmd | default('N/A') }}"
      - "  Exit code: {{ task_01_rc | default(-1) }}"
      - "  Data: {{ data_01 | default('') | trim }}"
      - "  Status: {{ status_01 | default('ERROR') | trim }}"
      - "  Details: {{ details_01 | default('') | trim }}"
      - ""
      - "REQUIREMENT 02 - {{ req_02 }}:"
      - "  Task: {{ task_02_name | default('Not recorded') }}"
      - "  Command: {{ task_02_cmd | default('N/A') }}"
      - "  Exit code: {{ task_02_rc | default(-1) }}"
      - "  Data: {{ data_02 | default('') | trim }}"
      - "  Status: {{ status_02 | default('ERROR') | trim }}"
      - "  Details: {{ details_02 | default('') | trim }}"
      - ""
      - "REQUIREMENT 03 - {{ req_03 }}:"
      - "  Task: {{ task_03_name | default('Not recorded') }}"
      - "  Command: {{ task_03_cmd | default('N/A') }}"
      - "  Exit code: {{ task_03_rc | default(-1) }}"
      - "  Data: {{ data_03 | default('') | trim }}"
      - "  Status: {{ status_03 | default('ERROR') | trim }}"
      - "  Details: {{ details_03 | default('') | trim }}"
      - ""
      - "REQUIREMENT 04 - {{ req_04 }}:"
      - "  Task: {{ task_04_name | default('Not recorded') }}"
      - "  Command: {{ task_04_cmd | default('N/A') }}"
      - "  Exit code: {{ task_04_rc | default(-1) }}"
      - "  Data: {{ data_04 | default('') | trim }}"
      - "  Status: {{ status_04 | default('ERROR') | trim }}"
      - "  Details: {{ details_04 | default('') | trim }}"
      - ""
      - "========================================================"
      - "OVERALL REMEDIATION:"
      - "  Result: {{ cis_result | default('ERROR') | trim }}"
      - "========================================================"

  always:
  - name: "Restore - Remove backup directory"
    ansible.builtin.file:
      path: "{{ backup_dir }}"
      state: absent
    failed_when: false
    tags: [restore]
