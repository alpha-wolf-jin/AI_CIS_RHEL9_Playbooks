---
- name: Initialize meta data variables
  include_vars: cis_remediation_var_1_3_1_8.yml

- name: "Snapshot - Create backup directory"
  ansible.builtin.file:
    path: "{{ backup_dir }}"
    state: directory
    mode: '0700'
  failed_when: false
  tags: [snapshot]
- name: "Snapshot - Check if config file exists"
  ansible.builtin.stat:
    path: "{{ config_file }}"
  register: _snap_config_stat
  failed_when: false
  tags: [snapshot]
- name: "Snapshot - Backup config file if present"
  ansible.builtin.copy:
    src: "{{ config_file }}"
    dest: "{{ backup_dir }}/setroubleshoot.conf.present"
    remote_src: true
  when: _snap_config_stat.stat.exists
  failed_when: false
  tags: [snapshot]
- name: "Snapshot - Mark config file absent if not present"
  ansible.builtin.copy:
    content: "absent"
    dest: "{{ backup_dir }}/setroubleshoot.conf.absent"
  when: not _snap_config_stat.stat.exists
  failed_when: false
  tags: [snapshot]

- block:
  - name: "Req 01 - Check dnf prerequisite"
    ansible.builtin.shell: which dnf
    args:
      executable: /bin/bash
    register: result_01
    failed_when: false
    changed_when: false
    tags: [execute]

  - name: "Check if setroubleshoot is installed"
    ansible.builtin.shell: rpm -q setroubleshoot
    args:
      executable: /bin/bash
    register: result_check
    failed_when: false
    changed_when: false
    tags: [execute]

  - name: "Req 02 - Uninstall setroubleshoot"
    ansible.builtin.shell: dnf remove -y setroubleshoot
    args:
      executable: /bin/bash
    register: result_02
    failed_when: false
    when: result_check.rc == 0
    tags: [execute]

  - name: "Req 03 - Verify setroubleshoot is not installed"
    ansible.builtin.shell: rpm -q setroubleshoot
    args:
      executable: /bin/bash
    register: result_03
    failed_when: false
    changed_when: false
    tags: [execute]

  - name: "Prepare report data for requirements"
    ansible.builtin.set_fact:
      task_01_name: "Req 01 - Check dnf prerequisite"
      task_01_cmd: "which dnf"
      task_01_rc: "{{ result_01.rc | default(-1) }}"
      data_01: "{{ result_01.stdout | default('') | trim }}"
      status_01: >-
        {{ 'PASS' if (result_01.rc | default(-1)) == 0 else 'FAIL' | trim }}
      details_01: >-
        {{ 'dnf is available at: ' ~ result_01.stdout | default('') | trim if (result_01.rc | default(-1)) == 0 else 'dnf not found' }}

      task_02_name: "Req 02 - Uninstall setroubleshoot"
      task_02_cmd: "dnf remove -y setroubleshoot"
      status_02: >-
        {{ 'SKIPPED' if result_check.rc | default(1) != 0 else ('PASS' if (result_02.rc | default(1)) == 0 else 'FAIL') | trim }}
      task_02_rc: >-
        {{ 'N/A' if result_check.rc | default(1) != 0 else (result_02.rc | default(-1)) | string }}
      data_02: >-
        {{ 'Skipped (package not installed)' if result_check.rc | default(1) != 0 else (result_02.stdout | default('') | trim) }}
      details_02: >-
        {{ 'Package was not installed, removal skipped' if result_check.rc | default(1) != 0 else ('Package removed successfully' if (result_02.rc | default(1)) == 0 else 'Failed to remove package') }}

      task_03_name: "Req 03 - Verify setroubleshoot is not installed"
      task_03_cmd: "rpm -q setroubleshoot"
      task_03_rc: "{{ result_03.rc | default(-1) }}"
      data_03: "{{ result_03.stdout | default('') | trim }}"
      status_03: >-
        {{ 'PASS' if (result_03.rc | default(0)) != 0 else 'FAIL' | trim }}
      details_03: >-
        {{ 'Package not installed (expected)' if (result_03.rc | default(0)) != 0 else 'Package is still installed' }}
    tags: [execute]

  - name: "Generate remediation report"
    ansible.builtin.debug:
      msg:
      - "REMEDIATION REPORT — CIS 1.3.1.8"
      - "Reference: CIS Benchmark checkpoint 1.3.1.8"
      - ""
      - "REQUIREMENT 01 - {{ req_01 }}:"
      - "  Task: {{ task_01_name }}"
      - "  Command: {{ task_01_cmd }}"
      - "  Exit code: {{ task_01_rc }}"
      - "  Data: {{ data_01 }}"
      - "  Status: {{ status_01 }}"
      - "  Details: {{ details_01 }}"
      - ""
      - "REQUIREMENT 02 - {{ req_02 }}:"
      - "  Task: {{ task_02_name }}"
      - "  Command: {{ task_02_cmd }}"
      - "  Exit code: {{ task_02_rc }}"
      - "  Data: {{ data_02 }}"
      - "  Status: {{ status_02 }}"
      - "  Details: {{ details_02 }}"
      - ""
      - "REQUIREMENT 03 - {{ req_03 }}:"
      - "  Task: {{ task_03_name }}"
      - "  Command: {{ task_03_cmd }}"
      - "  Exit code: {{ task_03_rc }}"
      - "  Data: {{ data_03 }}"
      - "  Status: {{ status_03 }}"
      - "  Details: {{ details_03 }}"
      - ""
      - "OVERALL REMEDIATION:"
      - "  Result: {{ status_03 }}"
      - "  Details: {{ details_03 }}"
      - "========================================================"
    tags: [execute]

  always:
  - name: "Restore - Check if config backup exists"
    ansible.builtin.stat:
      path: "{{ backup_dir }}/setroubleshoot.conf.present"
    register: _restore_present
    failed_when: false
    tags: [restore]

  - name: "Restore - Restore config file from backup"
    ansible.builtin.copy:
      src: "{{ backup_dir }}/setroubleshoot.conf.present"
      dest: "{{ config_file }}"
      remote_src: true
    when: _restore_present.stat.exists
    failed_when: false
    tags: [restore]

  - name: "Restore - Check if absent marker exists"
    ansible.builtin.stat:
      path: "{{ backup_dir }}/setroubleshoot.conf.absent"
    register: _restore_absent
    failed_when: false
    tags: [restore]

  - name: "Restore - Delete config file if it was absent originally"
    ansible.builtin.file:
      path: "{{ config_file }}"
      state: absent
    when: _restore_absent.stat.exists
    failed_when: false
    tags: [restore]

  - name: "Restore - Remove backup directory"
    ansible.builtin.file:
      path: "{{ backup_dir }}"
      state: absent
    failed_when: false
    tags: [restore]
