---
- name: Initialize meta data variables
  include_vars: cis_remediation_var_6_2_1_1.yml

- name: "Snapshot - Create backup directory"
  ansible.builtin.file:
    path: "{{ backup_dir }}"
    state: directory
    mode: '0700'
  tags: [snapshot]
- name: "Snapshot - Check if systemd-journald unit file exists"
  ansible.builtin.stat:
    path: "/usr/lib/systemd/system/{{ service_name }}.service"
  register: _unit_stat
  tags: [snapshot]
- name: "Snapshot - Backup unit file if exists"
  ansible.builtin.copy:
    src: "/usr/lib/systemd/system/{{ service_name }}.service"
    dest: "{{ backup_dir }}/{{ service_name }}.service.present"
    remote_src: true
  when: "_unit_stat.stat.exists"
  tags: [snapshot]

- block:
# --- Prerequisite check ---
  - name: "Check if systemd package is installed"
    ansible.builtin.package_facts:
      manager: auto
    tags: [execute]

  - name: "Determine journald availability"
    ansible.builtin.set_fact:
      journald_available: "{{ 'systemd' in ansible_facts.packages }}"
    tags: [execute]

# --- Default report variables (used when journald is unavailable) ---
  - name: "Initialize report variables"
    ansible.builtin.set_fact:
      task_01_name: "Unmask systemd-journald service"
      task_01_cmd: "systemctl unmask systemd-journald.service"
      task_01_rc: -1
      data_01: "Not collected"
      status_01: "SKIP"
      details_01: "Prerequisite not met - systemd not installed"
      task_02_name: "Start and enable systemd-journald service"
      task_02_cmd: "systemctl start systemd-journald.service && systemctl enable systemd-journald.service"
      task_02_rc: -1
      data_02: "Not collected"
      status_02: "SKIP"
      details_02: "Prerequisite not met - systemd not installed"
      task_03_name: "Verify journald service is enabled and active"
      task_03_cmd: "systemctl is-enabled systemd-journald.service && systemctl is-active systemd-journald.service"
      task_03_rc: -1
      data_03: "Not collected"
      status_03: "SKIP"
      details_03: "Prerequisite not met - systemd not installed"
    tags: [execute]

        # --- Remediation tasks (only when systemd is present) ---
  - block:
    - name: "Req 01 - Unmask systemd-journald service"
      ansible.builtin.systemd:
        name: "{{ service_name }}"
        masked: false
      register: result_01
      failed_when: false
      tags: [execute]

    - name: "Req 02 - Start and enable systemd-journald service"
      ansible.builtin.systemd:
        name: "{{ service_name }}"
        state: started
        enabled: true
      register: result_02
      failed_when: false
      tags: [execute]

    - name: "Req 03 - Verify journald service is enabled and active"
      ansible.builtin.shell: |
        systemctl is-enabled {{ service_name }}.service 2>/dev/null
        systemctl is-active {{ service_name }}.service 2>/dev/null
      args:
        executable: /bin/bash
      register: result_03
      failed_when: false
      changed_when: false
      tags: [execute]

    - name: "Store requirement 01 details"
      ansible.builtin.set_fact:
        task_01_name: "Unmask systemd-journald service"
        task_01_cmd: "systemctl unmask systemd-journald.service"
        task_01_rc: "{{ result_01.status is defined | ternary(0, -1) }}"
        data_01: "{{ result_01.state | default('unknown') }}"
        status_01: "{{ 'PASS' if result_01.status is defined else 'FAIL' }}"
        details_01: "{{ 'Service unmasked successfully' if result_01.status is defined else 'Failed to unmask service' }}"
      tags: [execute]

    - name: "Store requirement 02 details"
      ansible.builtin.set_fact:
        task_02_name: "Start and enable systemd-journald service"
        task_02_cmd: "systemctl start systemd-journald.service && systemctl enable systemd-journald.service"
        task_02_rc: "{{ result_02.status is defined | ternary(0, -1) }}"
        data_02: "{{ result_02.state | default('unknown') }}"
        status_02: "{{ 'PASS' if result_02.status is defined else 'FAIL' }}"
        details_02: "{{ 'Service started and enabled successfully' if result_02.status is defined else 'Failed to start/enable service' }}"
      tags: [execute]

    - name: "Store requirement 03 details"
      ansible.builtin.set_fact:
        task_03_name: "Verify journald service is enabled and active"
        task_03_cmd: "systemctl is-enabled systemd-journald.service && systemctl is-active systemd-journald.service"
        task_03_rc: "{{ result_03.rc | default(-1) }}"
        data_03: "{{ result_03.stdout_lines | default([]) | join(', ') }}"
        status_03: "{{ 'PASS' if (result_03.rc | default(-1)) == 0 else 'FAIL' }}"
        details_03: "{{ 'Verification passed - service is enabled and active' if (result_03.rc | default(-1)) == 0 else 'Verification failed' }}"
      tags: [execute]
    when: journald_available | bool
    tags: [execute]

# --- Compute overall remediation result ---
  - name: "Store final remediation result as cis_result"
    ansible.builtin.set_fact:
      cis_result: "{{ 'SKIP' if not journald_available else status_03 | default('ERROR') | trim }}"
    tags: [execute]

# --- Final report ---
  - name: "Generate remediation report"
    ansible.builtin.debug:
      msg:
      - "REMEDIATION REPORT — CIS 6.2.1.1"
      - "Reference: CIS Benchmark checkpoint 6.2.1.1"
      - ""
      - "REQUIREMENT 01 - {{ req_01 }}"
      - "  Task: {{ task_01_name | default('Task not recorded') }}"
      - "  Command: {{ task_01_cmd | default('N/A') }}"
      - "  Exit code: {{ task_01_rc | default(-1) }}"
      - "  Data: {{ data_01 | default('Data collection failed') | trim }}"
      - "  Status: {{ status_01 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_01 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 02 - {{ req_02 }}"
      - "  Task: {{ task_02_name | default('Task not recorded') }}"
      - "  Command: {{ task_02_cmd | default('N/A') }}"
      - "  Exit code: {{ task_02_rc | default(-1) }}"
      - "  Data: {{ data_02 | default('Data collection failed') | trim }}"
      - "  Status: {{ status_02 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_02 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 03 - {{ req_03 }}"
      - "  Task: {{ task_03_name | default('Task not recorded') }}"
      - "  Command: {{ task_03_cmd | default('N/A') }}"
      - "  Exit code: {{ task_03_rc | default(-1) }}"
      - "  Data: {{ data_03 | default('Data collection failed') | trim }}"
      - "  Status: {{ status_03 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_03 | default('Not evaluated') | trim }}"
      - ""
      - "OVERALL REMEDIATION:"
      - "  Result: {{ cis_result | default('ERROR') | trim }}"
      - "  Details: {{ details_03 | default('Not evaluated') | trim }}"
    tags: [execute]

  always:
  - name: "Restore - Check if backup exists"
    ansible.builtin.stat:
      path: "{{ backup_dir }}/{{ service_name }}.service.present"
    register: _restore_stat
    failed_when: false
    tags: [restore]

  - name: "Restore - Overwrite with original unit file"
    ansible.builtin.copy:
      src: "{{ backup_dir }}/{{ service_name }}.service.present"
      dest: "/usr/lib/systemd/system/{{ service_name }}.service"
      remote_src: true
    when: "_restore_stat.stat.exists | default(false)"
    failed_when: false
    tags: [restore]

  - name: "Restore - Remove backup directory"
    ansible.builtin.file:
      path: "{{ backup_dir }}"
      state: absent
    failed_when: false
    tags: [restore]
