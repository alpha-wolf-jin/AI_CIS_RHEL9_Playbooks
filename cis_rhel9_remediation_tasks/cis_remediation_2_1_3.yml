---
- name: Initialize meta data variables
  include_vars: cis_remediation_var_2_1_3.yml

- name: "Snapshot - Create backup directory"
  ansible.builtin.file:
    path: "{{ backup_dir }}"
    state: directory
    mode: '0700'
  tags: [snapshot]

- block:
  - name: "Initialize data variables"
    ansible.builtin.set_fact:
      data_01: "Not collected yet"
      status_01: "ERROR"
      details_01: "Not evaluated"
      data_02: "Not collected yet"
      status_02: "ERROR"
      details_02: "Not evaluated"
      data_03: "Not collected yet"
      status_03: "ERROR"
      details_03: "Not evaluated"
      data_04: "Not collected yet"
      status_04: "ERROR"
      details_04: "Not evaluated"
      data_05: "Not collected yet"
      status_05: "ERROR"
      details_05: "Not evaluated"
      data_06: "Not collected yet"
      status_06: "ERROR"
      details_06: "Not evaluated"
      data_07: "Not collected yet"
      status_07: "ERROR"
      details_07: "Not evaluated"
    tags: [execute]

  - name: "Pre-check - Determine if dhcp-server is present"
    ansible.builtin.package_facts:
      manager: auto
    tags: [execute]

  - name: "Set dhcp_installed fact"
    ansible.builtin.set_fact:
      dhcp_installed: "{{ 'dhcp-server' in ansible_facts.packages | default({}) }}"
    tags: [execute]

# Requirement 1
  - name: "Req 01 - Stop dhcpd.service"
    ansible.builtin.shell: "systemctl stop dhcpd.service"
    args:
      executable: /bin/bash
    register: result_01
    failed_when: false
    when: dhcp_installed
    tags: [execute]

  - name: "Store requirement 01 details"
    ansible.builtin.set_fact:
      task_01_name: "Req 01 - Stop dhcpd.service"
      task_01_cmd: "systemctl stop dhcpd.service"
      task_01_rc: "{{ result_01.rc | default(-1) if result_01 is not skipped else -1 }}"
      data_01: "{{ result_01.stdout | default('') | trim if result_01 is not skipped else 'Skipped' }}"
      status_01: "{%- if result_01 is skipped %}SKIP{%- elif (result_01.rc | default(-1) == 0) or ('not loaded' in (result_01.stderr | default(''))) %}PASS{%- else %}FAIL{%- endif %}"
      details_01: "{%- if result_01 is skipped %}Prerequisite not met: dhcp-server not installed{%- elif (result_01.rc | default(-1) == 0) or ('not loaded' in (result_01.stderr | default(''))) %}Service stopped or not loaded{%- else %}Failed to stop dhcpd.service{%- endif %}"
    tags: [execute]

# Requirement 2
  - name: "Req 02 - Stop dhcpd6.service"
    ansible.builtin.shell: "systemctl stop dhcpd6.service"
    args:
      executable: /bin/bash
    register: result_02
    failed_when: false
    when: dhcp_installed
    tags: [execute]

  - name: "Store requirement 02 details"
    ansible.builtin.set_fact:
      task_02_name: "Req 02 - Stop dhcpd6.service"
      task_02_cmd: "systemctl stop dhcpd6.service"
      task_02_rc: "{{ result_02.rc | default(-1) if result_02 is not skipped else -1 }}"
      data_02: "{{ result_02.stdout | default('') | trim if result_02 is not skipped else 'Skipped' }}"
      status_02: "{%- if result_02 is skipped %}SKIP{%- elif (result_02.rc | default(-1) == 0) or ('not loaded' in (result_02.stderr | default(''))) %}PASS{%- else %}FAIL{%- endif %}"
      details_02: "{%- if result_02 is skipped %}Prerequisite not met: dhcp-server not installed{%- elif (result_02.rc | default(-1) == 0) or ('not loaded' in (result_02.stderr | default(''))) %}Service stopped or not loaded{%- else %}Failed to stop dhcpd6.service{%- endif %}"
    tags: [execute]

# Requirement 3
  - name: "Req 03 - Remove dhcp-server package"
    ansible.builtin.dnf:
      name: dhcp-server
      state: absent
    register: result_03
    failed_when: false
    when: dhcp_installed
    tags: [execute]

  - name: "Store requirement 03 details"
    ansible.builtin.set_fact:
      task_03_name: "Req 03 - Remove dhcp-server"
      task_03_cmd: "dnf remove dhcp-server"
      task_03_rc: "{{ result_03.rc | default(-1) if result_03 is not skipped else -1 }}"
      data_03: "{{ 'Removed' if (result_03 is not skipped and result_03.changed) else ('Already absent' if (result_03 is not skipped and not result_03.changed) else 'Skipped') }}"
      status_03: "{%- if result_03 is skipped %}SKIP{%- elif not (result_03.failed | default(false)) %}PASS{%- else %}FAIL{%- endif %}"
      details_03: "{%- if result_03 is skipped %}Prerequisite not met: dhcp-server not installed{%- elif not (result_03.failed | default(false)) %}Package removed or already absent{%- else %}Failed to remove dhcp-server package{%- endif %}"
    tags: [execute]

# Requirement 4
  - name: "Req 04 - Apply mask dhcpd.service (if removal failed)"
    ansible.builtin.shell: "systemctl mask dhcpd.service"
    args:
      executable: /bin/bash
    register: result_04
    failed_when: false
    when:
    - dhcp_installed
    - result_03.failed | default(false)
    tags: [execute]

  - name: "Store requirement 04 details"
    ansible.builtin.set_fact:
      task_04_name: "Req 04 - Mask dhcpd.service"
      task_04_cmd: "systemctl mask dhcpd.service"
      task_04_rc: "{{ result_04.rc | default(-1) if result_04 is not skipped else -1 }}"
      data_04: "{{ result_04.stdout | default('') | trim if result_04 is not skipped else 'Skipped' }}"
      status_04: "{%- if result_04 is skipped %}SKIP{%- elif result_04.rc | default(-1) == 0 %}PASS{%- else %}FAIL{%- endif %}"
      details_04: "{%- if result_04 is skipped and not dhcp_installed %}Prerequisite not met: dhcp-server not installed{%- elif result_04 is skipped and dhcp_installed %}Mask not needed, package removed{%- elif result_04.rc | default(-1) == 0 %}Service masked successfully{%- else %}Failed to mask dhcpd.service{%- endif %}"
    tags: [execute]

# Requirement 5
  - name: "Req 05 - Apply mask dhcpd6.service (if removal failed)"
    ansible.builtin.shell: "systemctl mask dhcpd6.service"
    args:
      executable: /bin/bash
    register: result_05
    failed_when: false
    when:
    - dhcp_installed
    - result_03.failed | default(false)
    tags: [execute]

  - name: "Store requirement 05 details"
    ansible.builtin.set_fact:
      task_05_name: "Req 05 - Mask dhcpd6.service"
      task_05_cmd: "systemctl mask dhcpd6.service"
      task_05_rc: "{{ result_05.rc | default(-1) if result_05 is not skipped else -1 }}"
      data_05: "{{ result_05.stdout | default('') | trim if result_05 is not skipped else 'Skipped' }}"
      status_05: "{%- if result_05 is skipped %}SKIP{%- elif result_05.rc | default(-1) == 0 %}PASS{%- else %}FAIL{%- endif %}"
      details_05: "{%- if result_05 is skipped and not dhcp_installed %}Prerequisite not met: dhcp-server not installed{%- elif result_05 is skipped and dhcp_installed %}Mask not needed, package removed{%- elif result_05.rc | default(-1) == 0 %}Service masked successfully{%- else %}Failed to mask dhcpd6.service{%- endif %}"
    tags: [execute]

# Requirement 6
  - name: "Req 06 - Verify dhcpd.service is stopped and masked"
    ansible.builtin.shell: "systemctl status dhcpd.service"
    args:
      executable: /bin/bash
    register: result_06
    failed_when: false
    tags: [execute]

  - name: "Store requirement 06 details"
    ansible.builtin.set_fact:
      task_06_name: "Req 06 - Verify dhcpd.service status"
      task_06_cmd: "systemctl status dhcpd.service"
      task_06_rc: "{{ result_06.rc | default(-1) }}"
      data_06: "{{ result_06.stdout | default('') | trim }}"
      status_06: "{% set out = result_06.stdout | default('') | trim %}{% set stderr = result_06.stderr | default('') | trim %}{% if ('not found' in out) or ('could not be found' in stderr) or ('Unit' in stderr) %}PASS{% elif 'Active: inactive' in out and 'Loaded: masked' in out %}PASS{% else %}FAIL{% endif %}"
      details_06: "{% set out = result_06.stdout | default('') | trim %}{% set stderr = result_06.stderr | default('') | trim %}{% if ('not found' in out) or ('could not be found' in stderr) or ('Unit' in stderr) %}Service not installed{% elif 'Active: inactive' in out and 'Loaded: masked' in out %}Service is inactive and masked{% else %}Service state not compliant{% endif %}"
    tags: [execute]

# Requirement 7
  - name: "Req 07 - Verify dhcpd6.service is stopped and masked"
    ansible.builtin.shell: "systemctl status dhcpd6.service"
    args:
      executable: /bin/bash
    register: result_07
    failed_when: false
    tags: [execute]

  - name: "Store requirement 07 details"
    ansible.builtin.set_fact:
      task_07_name: "Req 07 - Verify dhcpd6.service status"
      task_07_cmd: "systemctl status dhcpd6.service"
      task_07_rc: "{{ result_07.rc | default(-1) }}"
      data_07: "{{ result_07.stdout | default('') | trim }}"
      status_07: "{% set out = result_07.stdout | default('') | trim %}{% set stderr = result_07.stderr | default('') | trim %}{% if ('not found' in out) or ('could not be found' in stderr) or ('Unit' in stderr) %}PASS{% elif 'Active: inactive' in out and 'Loaded: masked' in out %}PASS{% else %}FAIL{% endif %}"
      details_07: "{% set out = result_07.stdout | default('') | trim %}{% set stderr = result_07.stderr | default('') | trim %}{% if ('not found' in out) or ('could not be found' in stderr) or ('Unit' in stderr) %}Service not installed{% elif 'Active: inactive' in out and 'Loaded: masked' in out %}Service is inactive and masked{% else %}Service state not compliant{% endif %}"
    tags: [execute]

# Requirement 8
  - name: "Requirement 08 - Store final remediation result in cis_result"
    ansible.builtin.set_fact:
      cis_result: >-
        {%- if not dhcp_installed %}SKIP
        {%- elif (status_06 | trim == 'PASS') and (status_07 | trim == 'PASS') and ((status_03 | trim == 'PASS') or (status_04 | trim == 'PASS' and status_05 | trim == 'PASS')) %}PASS
        {%- else %}FAIL{%- endif %}
    tags: [execute]

  - name: "Generate remediation report"
    ansible.builtin.debug:
      msg:
      - "========================================================"
      - "REMEDIATION REPORT — CIS 2.1.3"
      - "Reference: CIS Benchmark checkpoint 2.1.3"
      - "========================================================"
      - ""
      - "REQUIREMENT 01 - {{ req_01 }}:"
      - "  Task: {{ task_01_name | default('Task not recorded') }}"
      - "  Command: {{ task_01_cmd | default('N/A') }}"
      - "  Exit code: {{ task_01_rc | default(-1) }}"
      - "  Data: {{ data_01 | default('Data collection failed') | trim }}"
      - "  Status: {{ status_01 | default('ERROR') | trim }}"
      - "  Details: {{ details_01 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 02 - {{ req_02 }}:"
      - "  Task: {{ task_02_name | default('Task not recorded') }}"
      - "  Command: {{ task_02_cmd | default('N/A') }}"
      - "  Exit code: {{ task_02_rc | default(-1) }}"
      - "  Data: {{ data_02 | default('Data collection failed') | trim }}"
      - "  Status: {{ status_02 | default('ERROR') | trim }}"
      - "  Details: {{ details_02 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 03 - {{ req_03 }}:"
      - "  Task: {{ task_03_name | default('Task not recorded') }}"
      - "  Command: {{ task_03_cmd | default('N/A') }}"
      - "  Exit code: {{ task_03_rc | default(-1) }}"
      - "  Data: {{ data_03 | default('Data collection failed') | trim }}"
      - "  Status: {{ status_03 | default('ERROR') | trim }}"
      - "  Details: {{ details_03 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 04 - {{ req_04 }}:"
      - "  Task: {{ task_04_name | default('Task not recorded') }}"
      - "  Command: {{ task_04_cmd | default('N/A') }}"
      - "  Exit code: {{ task_04_rc | default(-1) }}"
      - "  Data: {{ data_04 | default('Data collection failed') | trim }}"
      - "  Status: {{ status_04 | default('ERROR') | trim }}"
      - "  Details: {{ details_04 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 05 - {{ req_05 }}:"
      - "  Task: {{ task_05_name | default('Task not recorded') }}"
      - "  Command: {{ task_05_cmd | default('N/A') }}"
      - "  Exit code: {{ task_05_rc | default(-1) }}"
      - "  Data: {{ data_05 | default('Data collection failed') | trim }}"
      - "  Status: {{ status_05 | default('ERROR') | trim }}"
      - "  Details: {{ details_05 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 06 - {{ req_06 }}:"
      - "  Task: {{ task_06_name | default('Task not recorded') }}"
      - "  Command: {{ task_06_cmd | default('N/A') }}"
      - "  Exit code: {{ task_06_rc | default(-1) }}"
      - "  Data: {{ data_06 | default('Data collection failed') | trim }}"
      - "  Status: {{ status_06 | default('ERROR') | trim }}"
      - "  Details: {{ details_06 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 07 - {{ req_07 }}:"
      - "  Task: {{ task_07_name | default('Task not recorded') }}"
      - "  Command: {{ task_07_cmd | default('N/A') }}"
      - "  Exit code: {{ task_07_rc | default(-1) }}"
      - "  Data: {{ data_07 | default('Data collection failed') | trim }}"
      - "  Status: {{ status_07 | default('ERROR') | trim }}"
      - "  Details: {{ details_07 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 08 - {{ req_08 }}:"
      - "  Task: Store final remediation result"
      - "  Command: set_fact"
      - "  Exit code: 0"
      - "  Data: cis_result = {{ cis_result | default('ERROR') }}"
      - "  Status: {{ 'PASS' if cis_result is defined else 'ERROR' }}"
      - "  Details: Overall result stored"
      - ""
      - "========================================================"
      - "OVERALL REMEDIATION:"
      - "  Result: {{ cis_result | default('ERROR') | trim }}"
      - "  Details: {{ 'Remediation applied successfully' if cis_result | default('ERROR') | trim == 'PASS' else ('Remediation not applicable, skipped' if cis_result | default('ERROR') | trim == 'SKIP' else 'Remediation not fully applied') }}"
      - "========================================================"
    tags: [execute]

  always:
  - name: "Restore - Remove backup directory"
    ansible.builtin.file:
      path: "{{ backup_dir }}"
      state: absent
    failed_when: false
    tags: [restore]
