---
- name: Initialize meta data variables
  include_vars: cis_remediation_var_2_1_8.yml

- name: "Snapshot - Create state guard directory"
  ansible.builtin.file:
    path: "{{ state_guard_dir }}"
    state: directory
    mode: '0700'
  tags: [snapshot]
- name: "Snapshot - Deploy capture script"
  ansible.builtin.copy:
    dest: "{{ state_guard_capture_script }}"
    content: "{{ capture_script_content }}"
    mode: '0700'
  tags: [snapshot]
- name: "Snapshot - Capture current state"
  ansible.builtin.shell: "/bin/bash {{ state_guard_capture_script }}"
  args:
    executable: /bin/bash
  register: _sg_capture
  failed_when: false
  tags: [snapshot]

- block:
  - name: "Initialize data variables"
    ansible.builtin.set_fact:
      data_01: "Not collected yet"
      status_01: "ERROR"
      details_01: "Not evaluated"
      data_02: "Not collected yet"
      status_02: "ERROR"
      details_02: "Not evaluated"
      data_03: "Not collected yet"
      status_03: "ERROR"
      details_03: "Not evaluated"
      data_04: "Not collected yet"
      status_04: "ERROR"
      details_04: "Not evaluated"
      data_05: "Not collected yet"
      status_05: "ERROR"
      details_05: "Not evaluated"
      data_06: "Not collected yet"
      status_06: "ERROR"
      details_06: "Not evaluated"
      data_07: "Not collected yet"
      status_07: "ERROR"
      details_07: "Not evaluated"
      data_08: "Not collected yet"
      status_08: "ERROR"
      details_08: "Not evaluated"
      data_09: "Not collected yet"
      status_09: "ERROR"
      details_09: "Not evaluated"
      data_10: "Not collected yet"
      status_10: "ERROR"
      details_10: "Not evaluated"
      data_11: "Not collected yet"
      status_11: "ERROR"
      details_11: "Not evaluated"
      task_01_name: "Not executed"
      task_01_cmd: "N/A"
      task_01_rc: -1
    tags: [execute]

# Require dnf
  - name: "Req 01 - Check dnf package manager"
    ansible.builtin.shell: "which dnf"
    args:
      executable: /bin/bash
    register: result_01
    failed_when: false
    tags: [execute]

  - name: "Store requirement 01 details"
    ansible.builtin.set_fact:
      task_01_name: "Check dnf package manager"
      task_01_cmd: "which dnf"
      task_01_rc: "{{ result_01.rc | default(-1) }}"
      data_01: "{{ result_01.stdout | default('') | trim }}"
      status_01: "{{ ('PASS' if result_01.rc | default(1) == 0 else 'FAIL') | trim }}"
      details_01: "{{ ('Completed successfully' if result_01.rc | default(1) == 0 else 'dnf not found') | trim }}"
    tags: [execute]

  - name: "Gather package facts"
    ansible.builtin.package_facts:
      manager: auto
    failed_when: false
    tags: [execute]

  - name: "Determine package installation status"
    ansible.builtin.set_fact:
      dovecot_installed: "{{ 'dovecot' in ansible_facts.packages }}"
      cyrus_imapd_installed: "{{ 'cyrus-imapd' in ansible_facts.packages }}"
      dnf_available: "{{ result_01.rc | default(1) == 0 }}"
    tags: [execute]

# Requirement 02
  - name: "Req 02 - Stop dovecot.socket"
    ansible.builtin.systemd:
      name: dovecot.socket
      state: stopped
    register: result_02
    failed_when: false
    when: dovecot_installed | bool
    tags: [execute]

  - name: "Store requirement 02 details"
    ansible.builtin.set_fact:
      task_02_name: "Stop dovecot.socket"
      task_02_cmd: "systemctl stop dovecot.socket"
      task_02_rc: "{{ result_02.rc | default(-1) if result_02 is defined else -1 }}"
      data_02: "{{ result_02.stdout | default('') | trim if result_02 is defined and not result_02.skipped | default(false) else '' }}"
      status_02: "{{ 'PASS' if (result_02 is defined and not result_02.skipped | default(false) and result_02.rc | default(1) == 0) else 'SKIP' if (result_02.skipped | default(false)) else 'FAIL' }}"
      details_02: "{{ 'Completed successfully' if (result_02 is defined and not result_02.skipped | default(false) and result_02.rc | default(1) == 0) else 'Not applicable (dovecot not installed)' if (result_02.skipped | default(false)) else 'Failed to stop socket' }}"
    tags: [execute]

# Requirement 03
  - name: "Req 03 - Stop dovecot.service"
    ansible.builtin.systemd:
      name: dovecot.service
      state: stopped
    register: result_03
    failed_when: false
    when: dovecot_installed | bool
    tags: [execute]

  - name: "Store requirement 03 details"
    ansible.builtin.set_fact:
      task_03_name: "Stop dovecot.service"
      task_03_cmd: "systemctl stop dovecot.service"
      task_03_rc: "{{ result_03.rc | default(-1) if result_03 is defined else -1 }}"
      data_03: "{{ result_03.stdout | default('') | trim if result_03 is defined and not result_03.skipped | default(false) else '' }}"
      status_03: "{{ 'PASS' if (result_03 is defined and not result_03.skipped | default(false) and result_03.rc | default(1) == 0) else 'SKIP' if (result_03.skipped | default(false)) else 'FAIL' }}"
      details_03: "{{ 'Completed successfully' if (result_03 is defined and not result_03.skipped | default(false) and result_03.rc | default(1) == 0) else 'Not applicable (dovecot not installed)' if (result_03.skipped | default(false)) else 'Failed to stop service' }}"
    tags: [execute]

# Requirement 04
  - name: "Req 04 - Stop cyrus-imapd.service"
    ansible.builtin.systemd:
      name: cyrus-imapd.service
      state: stopped
    register: result_04
    failed_when: false
    when: cyrus_imapd_installed | bool
    tags: [execute]

  - name: "Store requirement 04 details"
    ansible.builtin.set_fact:
      task_04_name: "Stop cyrus-imapd.service"
      task_04_cmd: "systemctl stop cyrus-imapd.service"
      task_04_rc: "{{ result_04.rc | default(-1) if result_04 is defined else -1 }}"
      data_04: "{{ result_04.stdout | default('') | trim if result_04 is defined and not result_04.skipped | default(false) else '' }}"
      status_04: "{{ 'PASS' if (result_04 is defined and not result_04.skipped | default(false) and result_04.rc | default(1) == 0) else 'SKIP' if (result_04.skipped | default(false)) else 'FAIL' }}"
      details_04: "{{ 'Completed successfully' if (result_04 is defined and not result_04.skipped | default(false) and result_04.rc | default(1) == 0) else 'Not applicable (cyrus-imapd not installed)' if (result_04.skipped | default(false)) else 'Failed to stop service' }}"
    tags: [execute]

# Requirement 05
  - name: "Req 05 - Remove dovecot package"
    ansible.builtin.dnf:
      name: dovecot
      state: absent
    register: result_05
    failed_when: false
    when:
    - dnf_available | bool
    - dovecot_installed | bool
    tags: [execute]

  - name: "Store requirement 05 details"
    ansible.builtin.set_fact:
      task_05_name: "Remove dovecot package"
      task_05_cmd: "dnf remove -y dovecot"
      task_05_rc: "{{ result_05.rc | default(-1) if result_05 is defined else -1 }}"
      data_05: "{{ result_05.stdout | default('') | trim if result_05 is defined and not result_05.skipped | default(false) else '' }}"
      status_05: "{{ 'PASS' if (result_05 is defined and not result_05.skipped | default(false) and result_05.rc | default(1) == 0) else 'SKIP' if (not dnf_available or not dovecot_installed) or (result_05.skipped | default(false)) else 'FAIL' }}"
      details_05: "{{ 'Completed successfully' if (result_05 is defined and not result_05.skipped | default(false) and result_05.rc | default(1) == 0) else 'Not applicable (package not installed or dnf unavailable)' if (not dnf_available or not dovecot_installed) or (result_05.skipped | default(false)) else 'Failed to remove package' }}"
    tags: [execute]

# Requirement 06
  - name: "Req 06 - Remove cyrus-imapd package"
    ansible.builtin.dnf:
      name: cyrus-imapd
      state: absent
    register: result_06
    failed_when: false
    when:
    - dnf_available | bool
    - cyrus_imapd_installed | bool
    tags: [execute]

  - name: "Store requirement 06 details"
    ansible.builtin.set_fact:
      task_06_name: "Remove cyrus-imapd package"
      task_06_cmd: "dnf remove -y cyrus-imapd"
      task_06_rc: "{{ result_06.rc | default(-1) if result_06 is defined else -1 }}"
      data_06: "{{ result_06.stdout | default('') | trim if result_06 is defined and not result_06.skipped | default(false) else '' }}"
      status_06: "{{ 'PASS' if (result_06 is defined and not result_06.skipped | default(false) and result_06.rc | default(1) == 0) else 'SKIP' if (not dnf_available or not cyrus_imapd_installed) or (result_06.skipped | default(false)) else 'FAIL' }}"
      details_06: "{{ 'Completed successfully' if (result_06 is defined and not result_06.skipped | default(false) and result_06.rc | default(1) == 0) else 'Not applicable (package not installed or dnf unavailable)' if (not dnf_available or not cyrus_imapd_installed) or (result_06.skipped | default(false)) else 'Failed to remove package' }}"
    tags: [execute]

# Requirement 07
  - name: "Req 07 - Mask dovecot.socket"
    ansible.builtin.systemd:
      name: dovecot.socket
      masked: yes
    register: result_07
    failed_when: false
    when: dovecot_installed | bool
    tags: [execute]

  - name: "Store requirement 07 details"
    ansible.builtin.set_fact:
      task_07_name: "Mask dovecot.socket"
      task_07_cmd: "systemctl mask dovecot.socket"
      task_07_rc: "{{ result_07.rc | default(-1) if result_07 is defined else -1 }}"
      data_07: "{{ result_07.stdout | default('') | trim if result_07 is defined and not result_07.skipped | default(false) else '' }}"
