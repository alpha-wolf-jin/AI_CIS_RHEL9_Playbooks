      details_09: "{{ 'Completed successfully' if (result_09 is defined and not result_09.skipped | default(false) and result_09.rc | default(1) == 0) else 'Not applicable (cyrus-imapd not installed)' if (result_09.skipped | default(false)) else 'Failed to mask service' }}"
    tags: [execute]

# Requirement 10
  - name: "Req 10 - Verify services are not active"
    ansible.builtin.shell: "systemctl is-active dovecot.socket dovecot.service cyrus-imapd.service"
    args:
      executable: /bin/bash
    register: result_10
    failed_when: false
    tags: [execute]

  - name: "Store requirement 10 details"
    ansible.builtin.set_fact:
      task_10_name: "Verify services inactive"
      task_10_cmd: "systemctl is-active dovecot.socket dovecot.service cyrus-imapd.service"
      task_10_rc: "{{ result_10.rc | default(-1) }}"
      data_10: "{{ result_10.stdout | default('') | trim }}"
      status_10: "{{ 'FAIL' if 'active' in result_10.stdout_lines | default([]) else 'PASS' }}"
      details_10: "{{ 'One or more services are still active' if 'active' in result_10.stdout_lines | default([]) else 'All services inactive/masked' }}"
    tags: [execute]

# Requirement 11
  - name: "Req 11 - Store final remediation result"
    ansible.builtin.set_fact:
      cis_result: "{{ status_10 | default('ERROR') | trim }}"
      status_11: "{{ status_10 | default('ERROR') | trim }}"
      details_11: "{{ details_10 | default('Not evaluated') | trim }}"
      task_11_name: "Set cis_result fact"
      task_11_cmd: "N/A"
      task_11_rc: 0
      data_11: "{{ status_10 | default('ERROR') | trim }}"
    tags: [execute]

# FIX: Override cis_result to SKIP when both packages are absent (per feedback)
  - name: "Override cis_result to SKIP when target services not installed"
    ansible.builtin.set_fact:
      cis_result: "SKIP"
    when:
    - not dovecot_installed | default(false)
    - not cyrus_imapd_installed | default(false)
    tags: [execute]

