  always:
  - name: "Restore - Check if state guard flag exists"
    ansible.builtin.stat:
      path: "{{ state_guard_flag }}"
    register: _sg_restore_flag
    failed_when: false
    tags: [restore]

  - name: "Restore - Deploy restore script"
    ansible.builtin.copy:
      dest: "{{ state_guard_restore_script }}"
      content: "{{ restore_script_content }}"
      mode: '0700'
    when: _sg_restore_flag.stat.exists | default(false)
    tags: [restore]

  - name: "Restore - Execute restore script"
    ansible.builtin.shell: "/bin/bash {{ state_guard_restore_script }}"
    args:
      executable: /bin/bash
    when: _sg_restore_flag.stat.exists | default(false)
    failed_when: false
    tags: [restore]
