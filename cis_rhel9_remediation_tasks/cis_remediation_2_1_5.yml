---
- name: Initialize meta data variables
  include_vars: cis_remediation_var_2_1_5.yml

- name: "State Guard - Check for existing checkpoint"
  ansible.builtin.stat:
    path: "{{ state_guard_flag }}"
  register: _sg_flag
  tags: [snapshot]
- name: "State Guard - Read previous installed state"
  ansible.builtin.slurp:
    src: "{{ state_guard_dir }}/dnsmasq_installed.state"
  register: _sg_prev_installed
  when: _sg_flag.stat.exists
  failed_when: false
  tags: [snapshot]
- name: "State Guard - Reinstall dnsmasq if previously present"
  ansible.builtin.dnf:
    name: "{{ package_name }}"
    state: present
  when:
  - _sg_flag.stat.exists
  - "_sg_prev_installed.content | default('') | b64decode | trim == 'present'"
  failed_when: false
  tags: [snapshot]
- name: "State Guard - Read previous active state"
  ansible.builtin.slurp:
    src: "{{ state_guard_dir }}/dnsmasq_service_active.state"
  register: _sg_prev_active
  when: _sg_flag.stat.exists
  failed_when: false
  tags: [snapshot]
- name: "State Guard - Read previous enabled state"
  ansible.builtin.slurp:
    src: "{{ state_guard_dir }}/dnsmasq_service_enabled.state"
  register: _sg_prev_enabled
  when: _sg_flag.stat.exists
  failed_when: false
  tags: [snapshot]
- name: "State Guard - Restore dnsmasq service active state"
  ansible.builtin.systemd:
    name: "{{ service_name }}"
    state: "{{ _sg_prev_active.content | default('') | b64decode | trim }}"
  when:
  - _sg_flag.stat.exists
  - "_sg_prev_active.content | default('') | b64decode | trim == 'active'"
  failed_when: false
  tags: [snapshot]
- name: "State Guard - Restore dnsmasq service enabled state"
  ansible.builtin.systemd:
    name: "{{ service_name }}"
    enabled: "{{ _sg_prev_enabled.content | default('') | b64decode | trim == 'enabled' }}"
  when:
  - _sg_flag.stat.exists
  - "_sg_prev_enabled.content | default('') | b64decode | trim == 'enabled'"
  failed_when: false
  tags: [snapshot]
- name: "State Guard - Remove old checkpoint"
  ansible.builtin.file:
    path: "{{ state_guard_dir }}"
    state: absent
  when: _sg_flag.stat.exists
  tags: [snapshot]
- name: "State Guard - Create checkpoint directory"
  ansible.builtin.file:
    path: "{{ state_guard_dir }}"
    state: directory
    mode: '0700'
  tags: [snapshot]
- name: "State Guard - Capture dnsmasq package installed state"
  ansible.builtin.shell: |
    if rpm -q {{ package_name }} >/dev/null 2>&1; then echo present; else echo absent; fi
  args:
    executable: /bin/bash
  register: _sg_installed_state
  failed_when: false
  tags: [snapshot]
- name: "State Guard - Save installed state file"
  ansible.builtin.copy:
    content: "{{ _sg_installed_state.stdout | trim }}"
    dest: "{{ state_guard_dir }}/dnsmasq_installed.state"
  when: "_sg_installed_state.stdout | default('') | length > 0"
  tags: [snapshot]
- name: "State Guard - Capture dnsmasq service active state"
  ansible.builtin.shell: |
    systemctl is-active {{ service_name }}.service 2>/dev/null || echo inactive
  args:
    executable: /bin/bash
  register: _sg_active_state
  failed_when: false
  tags: [snapshot]
- name: "State Guard - Save active state file"
  ansible.builtin.copy:
    content: "{{ _sg_active_state.stdout | trim }}"
    dest: "{{ state_guard_dir }}/dnsmasq_service_active.state"
  when: "_sg_active_state.stdout | default('') | length > 0"
  tags: [snapshot]
- name: "State Guard - Capture dnsmasq service enabled state"
  ansible.builtin.shell: |
    systemctl is-enabled {{ service_name }}.service 2>/dev/null || echo disabled
  args:
    executable: /bin/bash
  register: _sg_enabled_state
  failed_when: false
  tags: [snapshot]
- name: "State Guard - Save enabled state file"
  ansible.builtin.copy:
    content: "{{ _sg_enabled_state.stdout | trim }}"
    dest: "{{ state_guard_dir }}/dnsmasq_service_enabled.state"
  when: "_sg_enabled_state.stdout | default('') | length > 0"
  tags: [snapshot]
- name: "State Guard - Create checkpoint flag"
  ansible.builtin.copy:
    content: "checkpoint"
    dest: "{{ state_guard_flag }}"
  tags: [snapshot]

- block:
        # === EXECUTE PHASE ===

  - name: "Initialize data variables"
    ansible.builtin.set_fact:
      task_01_name: "Not executed"
      task_01_cmd: "N/A"
      task_01_rc: -1
      data_01: "Not collected yet"
      status_01: "ERROR"
      details_01: "Not evaluated"
      task_02_name: "Not executed"
      task_02_cmd: "N/A"
      task_02_rc: -1
      data_02: "Not collected yet"
      status_02: "ERROR"
      details_02: "Not evaluated"
      task_03_name: "Not executed"
      task_03_cmd: "N/A"
      task_03_rc: -1
      data_03: "Not collected yet"
      status_03: "ERROR"
      details_03: "Not evaluated"
      task_04_name: "Not executed"
      task_04_cmd: "N/A"
      task_04_rc: -1
      data_04: "Not collected yet"
      status_04: "ERROR"
      details_04: "Not evaluated"
      task_05_name: "Not executed"
      task_05_cmd: "N/A"
      task_05_rc: -1
      data_05: "Not collected yet"
      status_05: "ERROR"
      details_05: "Not evaluated"
    tags: [execute]

  - name: "Check if dnsmasq package is installed"
    ansible.builtin.shell: "rpm -q {{ package_name }}"
    args:
      executable: /bin/bash
    register: dnsmasq_installed_check
    failed_when: false
    tags: [execute]

  - name: "Set skip_all fact"
    ansible.builtin.set_fact:
      skip_all: "{{ dnsmasq_installed_check.rc != 0 }}"
    tags: [execute]

# Requirement 01 — Stop dnsmasq service
  - name: "Req 01 - Stop dnsmasq service"
    ansible.builtin.shell: "systemctl stop {{ service_name }}.service"
    args:
      executable: /bin/bash
    register: result_01
    failed_when: false
    when: not skip_all
    tags: [execute]

  - name: "Store requirement 01 details"
    ansible.builtin.set_fact:
      task_01_name: "Stop dnsmasq service"
      task_01_cmd: "systemctl stop {{ service_name }}.service"
      task_01_rc: "{{ result_01.rc | default(-1) }}"
      data_01: "{{ result_01.stdout | default('') | trim }}"
      status_01: "{{ 'SKIP' if skip_all else ('PASS' if result_01.rc | default(-1) == 0 else 'FAIL') }}"
      details_01: "{{ 'Service stopped successfully' if result_01.rc | default(-1) == 0 else 'Failed to stop service' }}"
    tags: [execute]

# Requirement 02 — Remove dnsmasq package
  - name: "Req 02 - Remove dnsmasq package"
    ansible.builtin.dnf:
      name: "{{ package_name }}"
      state: absent
      allowerasing: no
    register: result_02
    failed_when: false
    when: not skip_all
    tags: [execute]

  - name: "Store requirement 02 details"
    ansible.builtin.set_fact:
      task_02_name: "Remove dnsmasq package"
      task_02_cmd: "dnf remove {{ package_name }}"
      task_02_rc: "{{ result_02.rc | default(-1) }}"
      data_02: "{{ result_02.msg | default('') | trim }}"
      status_02: "{{ 'SKIP' if skip_all else ('PASS' if result_02.rc | default(-1) == 0 else 'FAIL') }}"
      details_02: "{{ 'Package removed successfully' if result_02.rc | default(-1) == 0 else 'Failed to remove package' }}"
    tags: [execute]

# Requirement 03 — Mask service if dependency prevents removal
  - name: "Req 03 - Mask dnsmasq service if needed"
    ansible.builtin.systemd:
      name: "{{ service_name }}"
      masked: yes
    register: result_03
    failed_when: false
    when:
    - not skip_all
    - "result_02.rc | default(-1) != 0"
    tags: [execute]

  - name: "Store requirement 03 details"
    ansible.builtin.set_fact:
      task_03_name: "Mask dnsmasq service (dependency case)"
      task_03_cmd: "systemctl mask {{ service_name }}.service"
      task_03_rc: "{{ result_03.rc | default(-1) }}"
      data_03: "{{ result_03.msg | default('') | trim }}"
      status_03: "{{ 'SKIP' if skip_all or (result_02.rc | default(-1) == 0) else ('PASS' if result_03.rc | default(-1) == 0 else 'FAIL') }}"
      details_03: "{{ 'Service masked successfully' if result_03.rc | default(-1) == 0 else 'Failed to mask service' }}"
    tags: [execute]

# Requirement 04 — Verify service is not active
  - name: "Req 04 - Verify dnsmasq service is not active"
    ansible.builtin.shell: "systemctl is-active {{ service_name }}.service"
    args:
      executable: /bin/bash
    register: result_04
    failed_when: false
    tags: [execute]

  - name: "Store requirement 04 details"
    ansible.builtin.set_fact:
      task_04_name: "Verify dnsmasq service status"
      task_04_cmd: "systemctl is-active {{ service_name }}.service"
      task_04_rc: "{{ result_04.rc | default(-1) }}"
      data_04: "{{ result_04.stdout | default('') | trim }}"
      status_04: "{{ 'PASS' if result_04.rc | default(-1) != 0 else 'FAIL' }}"
      details_04: "{{ 'Service is not active' if result_04.rc | default(-1) != 0 else 'Service is still active' }}"
    tags: [execute]

# Requirement 05 — Verify package not installed or service masked
  - name: "Req 05 - Verify dnsmasq package not installed or service masked"
    ansible.builtin.shell: |
      set -o pipefail
      if rpm -q {{ package_name }} >/dev/null 2>&1; then
        if systemctl is-masked {{ service_name }}.service 2>/dev/null | grep -q masked; then
          echo "COMPLIANT: package installed but service masked"
          exit 0
        else
          echo "NON-COMPLIANT: package installed and service not masked"
          exit 1
        fi
      else
        echo "COMPLIANT: package not installed"
        exit 0
      fi
    args:
      executable: /bin/bash
    register: result_05
    failed_when: false
    tags: [execute]

  - name: "Store requirement 05 details"
    ansible.builtin.set_fact:
      task_05_name: "Verify dnsmasq package and service mask status"
      task_05_cmd: "rpm -q {{ package_name }} && systemctl is-masked {{ service_name }}.service | grep masked"
      task_05_rc: "{{ result_05.rc | default(-1) }}"
      data_05: "{{ result_05.stdout | default('') | trim }}"
      status_05: "{{ 'PASS' if result_05.rc | default(-1) == 0 else 'FAIL' }}"
      details_05: "{{ 'Compliant: package removed or masked' if result_05.rc | default(-1) == 0 else 'Non-compliant: package installed and service not masked' }}"
    tags: [execute]

# Requirement 06 — Store overall remediation result (FIXED)
  - name: "Req 06 - Store final remediation result (cis_result)"
    ansible.builtin.set_fact:
      cis_result: "{{ 'SKIP' if skip_all else (status_05 | default('ERROR') | trim) }}"
    tags: [execute]

# Requirement 07 — Generate remediation report
  - name: "Generate remediation report"
    ansible.builtin.debug:
      msg:
      - "REMEDIATION REPORT — CIS 2.1.5"
      - "Reference: CIS Benchmark checkpoint 2.1.5"
      - ""
      - "REQUIREMENT 01 - {{ req_01 }}:"
      - "  Task: {{ task_01_name | default('Not recorded') }}"
      - "  Command: {{ task_01_cmd | default('N/A') }}"
      - "  Exit code: {{ task_01_rc | default(-1) }}"
      - "  Data: {{ data_01 | default('') | trim }}"
      - "  Status: {{ status_01 | default('ERROR') | trim }}"
      - "  Details: {{ details_01 | default('') | trim }}"
      - ""
      - "REQUIREMENT 02 - {{ req_02 }}:"
      - "  Task: {{ task_02_name | default('Not recorded') }}"
      - "  Command: {{ task_02_cmd | default('N/A') }}"
      - "  Exit code: {{ task_02_rc | default(-1) }}"
      - "  Data: {{ data_02 | default('') | trim }}"
      - "  Status: {{ status_02 | default('ERROR') | trim }}"
      - "  Details: {{ details_02 | default('') | trim }}"
      - ""
      - "REQUIREMENT 03 - {{ req_03 }}:"
      - "  Task: {{ task_03_name | default('Not recorded') }}"
      - "  Command: {{ task_03_cmd | default('N/A') }}"
      - "  Exit code: {{ task_03_rc | default(-1) }}"
      - "  Data: {{ data_03 | default('') | trim }}"
      - "  Status: {{ status_03 | default('ERROR') | trim }}"
      - "  Details: {{ details_03 | default('') | trim }}"
      - ""
      - "REQUIREMENT 04 - {{ req_04 }}:"
      - "  Task: {{ task_04_name | default('Not recorded') }}"
      - "  Command: {{ task_04_cmd | default('N/A') }}"
      - "  Exit code: {{ task_04_rc | default(-1) }}"
      - "  Data: {{ data_04 | default('') | trim }}"
      - "  Status: {{ status_04 | default('ERROR') | trim }}"
      - "  Details: {{ details_04 | default('') | trim }}"
      - ""
      - "REQUIREMENT 05 - {{ req_05 }}:"
      - "  Task: {{ task_05_name | default('Not recorded') }}"
      - "  Command: {{ task_05_cmd | default('N/A') }}"
      - "  Exit code: {{ task_05_rc | default(-1) }}"
      - "  Data: {{ data_05 | default('') | trim }}"
      - "  Status: {{ status_05 | default('ERROR') | trim }}"
      - "  Details: {{ details_05 | default('') | trim }}"
      - ""
      - "REQUIREMENT 06 - {{ req_06 }}:"
      - "  Task: Store cis_result fact"
      - "  Command: set_fact"
      - "  Exit code: N/A"
      - "  Data: {{ cis_result | default('ERROR') | trim }}"
      - "  Status: {{ cis_result | default('ERROR') | trim }}"
      - "  Details: Overall remediation status derived from final verification"
      - ""
      - "========================================================"
      - "OVERALL REMEDIATION:"
      - "  Result: {{ cis_result | default('ERROR') | trim }}"
      - "========================================================"
    tags: [execute]

  always:
        # === STATE GUARD — RESTORE PHASE (GUARANTEED) ===

  - name: "State Guard Restore - Check if checkpoint exists"
    ansible.builtin.stat:
      path: "{{ state_guard_flag }}"
    register: _sg_restore_flag
    failed_when: false
    tags: [restore]

  - name: "State Guard Restore - Slurp installed state"
    ansible.builtin.slurp:
      src: "{{ state_guard_dir }}/dnsmasq_installed.state"
    register: _sg_restore_installed
    when: "_sg_restore_flag.stat.exists | default(false)"
    failed_when: false
    tags: [restore]

  - name: "State Guard Restore - Reinstall dnsmasq if present"
    ansible.builtin.dnf:
      name: "{{ package_name }}"
      state: present
    when:
    - "_sg_restore_flag.stat.exists | default(false)"
    - "_sg_restore_installed.content | default('') | b64decode | trim == 'present'"
    failed_when: false
    tags: [restore]

  - name: "State Guard Restore - Slurp active state"
    ansible.builtin.slurp:
      src: "{{ state_guard_dir }}/dnsmasq_service_active.state"
    register: _sg_restore_active
    when: "_sg_restore_flag.stat.exists | default(false)"
    failed_when: false
    tags: [restore]

  - name: "State Guard Restore - Restore active state"
    ansible.builtin.systemd:
      name: "{{ service_name }}"
      state: "{{ _sg_restore_active.content | default('') | b64decode | trim }}"
    when:
    - "_sg_restore_flag.stat.exists | default(false)"
    - "_sg_restore_active.content | default('') | b64decode | trim == 'active'"
    failed_when: false
    tags: [restore]

  - name: "State Guard Restore - Slurp enabled state"
    ansible.builtin.slurp:
      src: "{{ state_guard_dir }}/dnsmasq_service_enabled.state"
    register: _sg_restore_enabled
    when: "_sg_restore_flag.stat.exists | default(false)"
    failed_when: false
    tags: [restore]

  - name: "State Guard Restore - Restore enabled state"
    ansible.builtin.systemd:
      name: "{{ service_name }}"
      enabled: "{{ _sg_restore_enabled.content | default('') | b64decode | trim == 'enabled' }}"
    when:
    - "_sg_restore_flag.stat.exists | default(false)"
    - "_sg_restore_enabled.content | default('') | b64decode | trim == 'enabled'"
    failed_when: false
    tags: [restore]

  - name: "State Guard Restore - Remove checkpoint"
    ansible.builtin.file:
      path: "{{ state_guard_dir }}"
      state: absent
    when: "_sg_restore_flag.stat.exists | default(false)"
    failed_when: false
    tags: [restore]
