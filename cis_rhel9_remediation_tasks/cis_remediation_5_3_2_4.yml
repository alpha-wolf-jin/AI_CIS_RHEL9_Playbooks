---
- name: Initialize meta data variables
  include_vars: cis_remediation_var_5_3_2_4.yml

- name: "State Guard - Check for existing checkpoint"
  ansible.builtin.stat:
    path: "{{ state_guard_flag }}"
  register: _sg_flag
  tags: [snapshot]
- name: "State Guard - Restore /etc/authselect/authselect.conf from prior checkpoint"
  ansible.builtin.copy:
    src: "{{ state_guard_dir }}/authselect.conf.present"
    dest: "/etc/authselect/authselect.conf"
    remote_src: true
  when: "_sg_flag.stat.exists"
  failed_when: false
  tags: [snapshot]
- name: "State Guard - Remove old checkpoint"
  ansible.builtin.file:
    path: "{{ state_guard_dir }}"
    state: absent
  when: "_sg_flag.stat.exists"
  tags: [snapshot]
- name: "State Guard - Create checkpoint directory"
  ansible.builtin.file:
    path: "{{ state_guard_dir }}"
    state: directory
    mode: '0700'
  tags: [snapshot]
- name: "State Guard - Check if /etc/authselect/authselect.conf exists"
  ansible.builtin.stat:
    path: "/etc/authselect/authselect.conf"
  register: _sg_authselect_conf_stat
  tags: [snapshot]
- name: "State Guard - Backup /etc/authselect/authselect.conf"
  ansible.builtin.copy:
    src: "/etc/authselect/authselect.conf"
    dest: "{{ state_guard_dir }}/authselect.conf.present"
    remote_src: true
  when: "_sg_authselect_conf_stat.stat.exists"
  tags: [snapshot]
- name: "State Guard - Create checkpoint flag"
  ansible.builtin.copy:
    content: "checkpoint"
    dest: "{{ state_guard_flag }}"
  tags: [snapshot]

- block:
# === STATE GUARD — EXECUTE PHASE ===
  - name: "Initialize data variables"
    ansible.builtin.set_fact:
      data_01: "Not collected yet"
      status_01: "UNKNOWN"
      details_01: "Not evaluated"
      task_01_name: "Not executed"
      task_01_cmd: "N/A"
      task_01_rc: -1
      data_02: "Not collected yet"
      status_02: "UNKNOWN"
      details_02: "Not evaluated"
      task_02_name: "Not executed"
      task_02_cmd: "N/A"
      task_02_rc: -1
      data_03: "Not collected yet"
      status_03: "UNKNOWN"
      details_03: "Not evaluated"
      task_03_name: "Not executed"
      task_03_cmd: "N/A"
      task_03_rc: -1
    tags: [execute]

  - name: "Check if authselect package is installed"
    ansible.builtin.package_facts:
      manager: auto
    failed_when: false
    tags: [execute]

  - name: "Set authselect installed fact"
    ansible.builtin.set_fact:
      authselect_installed: "{{ 'authselect' in ansible_facts.packages }}"
      playbook_skipped: "{{ 'authselect' not in ansible_facts.packages }}"
    tags: [execute]

  - name: "Pre-check - Verify PAM configuration files are symlinks"
    ansible.builtin.shell: |
      if [ -L /etc/pam.d/system-auth ] && [ -L /etc/pam.d/password-auth ]; then
        echo "SYMLINKS_OK"
      else
        echo "NOT_SYMLINKS"
      fi
    args:
      executable: /bin/bash
    register: _pam_symlink_check
    failed_when: false
    changed_when: false
    when: "authselect_installed | default(false)"
    tags: [execute]

  - name: "Set authselect conflict fact"
    ansible.builtin.set_fact:
      authselect_conflict: "{{ _pam_symlink_check.stdout | default('') | trim == 'NOT_SYMLINKS' }}"
    when: "authselect_installed | default(false)"
    tags: [execute]

# Requirement 1
  - name: "Req 01 - Run remediation script to check and enable pam_pwhistory"
    ansible.builtin.shell: |
      l_module_name="pwhistory"
      l_pam_profile="$(head -1 /etc/authselect/authselect.conf)"
      if grep -Pq -- '^custom\/' <<< "$l_pam_profile"; then
        l_pam_profile_path="/etc/authselect/$l_pam_profile"
      else
        l_pam_profile_path="/usr/share/authselect/default/$l_pam_profile"
      fi
      grep_output=$(grep -P -- "\bpam_$l_module_name\.so\b" "$l_pam_profile_path"/{password,system}-auth 2>/dev/null || true)
      echo "$grep_output"
      if echo "$grep_output" | grep -q '{include if "with-pwhistory"}'; then
        echo "ENABLE_FEATURE"
        authselect enable-feature with-pwhistory 2>&1
      elif [ -n "$grep_output" ]; then
        echo "APPLY_CHANGES"
        authselect apply-changes 2>&1
      else
        echo "NO_MODULE_LINES"
      fi
    args:
      executable: /bin/bash
    register: result_01
    failed_when: false
    changed_when: false
    when:
    - "authselect_installed | default(false)"
    - "not (authselect_conflict | default(false))"
    tags: [execute]

  - name: "Store requirement 01 details"
    ansible.builtin.set_fact:
      task_01_name: "Run remediation script to check and enable pam_pwhistory"
      task_01_cmd: "authselect enable-feature with-pwhistory / authselect apply-changes (conditional)"
      task_01_rc: "{{ result_01.rc | default(-1) }}"
      data_01: "{{ result_01.stdout | default('') | trim }}"
      status_01: >-
        {{ 'SKIPPED' if not (authselect_installed | default(false))
           else ('SKIPPED' if (authselect_conflict | default(false))
           else ('APPLIED' if result_01.rc | default(-1) == 0 else 'FAILED')) }}
      details_01: >-
        {{ 'authselect not installed' if not (authselect_installed | default(false))
           else ('authselect conflict: /etc/pam.d/system-auth and /etc/pam.d/password-auth must be symlinks managed by authselect' if (authselect_conflict | default(false))
           else ('Remediation completed successfully' if result_01.rc | default(-1) == 0 else 'Remediation failed')) }}
    tags: [execute]

# Requirement 2
  - name: "Req 02 - Verify pam_pwhistory module is enabled in authselect profile"
    ansible.builtin.shell: |
      l_module_name="pwhistory"
      l_pam_profile="$(head -1 /etc/authselect/authselect.conf)"
      if grep -Pq -- '^custom\/' <<< "$l_pam_profile"; then
        l_pam_profile_path="/etc/authselect/$l_pam_profile"
      else
        l_pam_profile_path="/usr/share/authselect/default/$l_pam_profile"
      fi
      grep -P -- "\bpam_$l_module_name\.so\b" "$l_pam_profile_path"/{password,system}-auth 2>/dev/null || true
    args:
      executable: /bin/bash
    register: result_02
    failed_when: false
    changed_when: false
    when: "authselect_installed | default(false)"
    tags: [execute]

  - name: "Store requirement 02 details"
    ansible.builtin.set_fact:
      task_02_name: "Verify pam_pwhistory module is enabled in authselect profile"
      task_02_cmd: |
        grep -P -- '\\bpam_pwhistory\\.so\\b' <profile_path>/{password,system}-auth
      task_02_rc: "{{ result_02.rc | default(-1) }}"
      data_02: "{{ result_02.stdout | default('') | trim }}"
      status_02: >-
        {{ 'SKIPPED' if not (authselect_installed | default(false))
           else ('PASS' if (result_02.stdout | default('') | trim | length > 0) else 'FAIL') }}
      details_02: >-
        {{ 'authselect not installed' if not (authselect_installed | default(false))
           else ('pam_pwhistory.so found in profile templates' if (result_02.stdout | default('') | trim | length > 0) else 'pam_pwhistory.so NOT found in profile templates') }}
    tags: [execute]

# Requirement 3 – Store cis_result
  - name: "Store final remediation result in cis_result"
    ansible.builtin.set_fact:
      cis_result: >-
        {{ 'SKIPPED' if playbook_skipped | default(false) or authselect_conflict | default(false)
           else ('PASS' if (status_01 == 'APPLIED' or status_01 == 'PASS') and (status_02 == 'PASS')
           else 'FAIL') }}
    tags: [execute]

  - name: "Store requirement 03 details"
    ansible.builtin.set_fact:
      task_03_name: "Store final remediation result in cis_result"
      task_03_cmd: "ansible.builtin.set_fact"
      task_03_rc: "0"
      data_03: "{{ cis_result | default('ERROR') | trim }}"
      status_03: "PASS"
      details_03: "cis_result set to {{ cis_result | default('ERROR') | trim }}"
    tags: [execute]

# Requirement 4 – Report
  - name: "Req 04 - Generate remediation report"
    ansible.builtin.debug:
      msg:
      - "========================================================"
      - "        REMEDIATION REPORT — CIS 5.3.2.4"
      - "========================================================"
      - "Reference: CIS Benchmark checkpoint 5.3.2.4"
      - ""
      - "REQUIREMENT 01 - {{ req_01 }}:"
      - "  Task: {{ task_01_name | default('Task not recorded') }}"
      - "  Command: {{ task_01_cmd | default('N/A') }}"
      - "  Exit code: {{ task_01_rc | default(-1) }}"
      - "  Data: {{ data_01 | default('') | trim }}"
      - "  Status: {{ status_01 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_01 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 02 - {{ req_02 }}:"
      - "  Task: {{ task_02_name | default('Task not recorded') }}"
      - "  Command: {{ task_02_cmd | default('N/A') }}"
      - "  Exit code: {{ task_02_rc | default(-1) }}"
      - "  Data: {{ data_02 | default('') | trim }}"
      - "  Status: {{ status_02 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_02 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 03 - {{ req_03 }}:"
      - "  Task: {{ task_03_name | default('Task not recorded') }}"
      - "  Command: {{ task_03_cmd | default('N/A') }}"
      - "  Exit code: {{ task_03_rc | default(-1) }}"
      - "  Data: {{ data_03 | default('') | trim }}"
      - "  Status: {{ status_03 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_03 | default('Not evaluated') | trim }}"
      - ""
      - "========================================================"
      - "OVERALL REMEDIATION:"
      - "  Result: {{ cis_result | default('ERROR') | trim }}"
      - "  Details: {{ 'All requirements met' if cis_result | default('FAIL') | trim == 'PASS' else 'One or more requirements failed or were skipped' }}"
      - "========================================================"
    tags: [execute]

  always:
# === STATE GUARD — RESTORE PHASE (GUARANTEED) ===
  - name: "State Guard Restore - Check if checkpoint exists"
    ansible.builtin.stat:
      path: "{{ state_guard_flag }}"
    register: _sg_restore_flag
    failed_when: false
    tags: [restore]

  - name: "State Guard Restore - Check if authselect.conf backup exists"
    ansible.builtin.stat:
      path: "{{ state_guard_dir }}/authselect.conf.present"
    register: _sg_restore_authselect_conf
    failed_when: false
    tags: [restore]

  - name: "State Guard Restore - Restore /etc/authselect/authselect.conf from backup"
    ansible.builtin.copy:
      src: "{{ state_guard_dir }}/authselect.conf.present"
      dest: "/etc/authselect/authselect.conf"
      remote_src: true
    when: "_sg_restore_authselect_conf.stat.exists | default(false)"
    failed_when: false
    tags: [restore]

  - name: "State Guard Restore - Remove checkpoint"
    ansible.builtin.file:
      path: "{{ state_guard_dir }}"
      state: absent
    when: "_sg_restore_flag.stat.exists | default(false)"
    failed_when: false
    tags: [restore]
