playbook_name: "CIS_2_4_1_8"
backup_dir: "/var/log/ai-playbooks-backup/{{ playbook_name }}"
req_01: "Run the provided remediation script to fix Ensure crontab is restricted to authorized users. - IF - cron is installed on the system: Run the following script to: • Create /etc/cron.allow if it does not exist • Change owner to root • Change group owner to root • Change mode to 640 or more restrictive. Additional notes: - IF - /etc/cron.deny exists, run commands to set owner:root group:root mode 640 or more restrictive."
req_02: "VERIFY: Run audit check to confirm Ensure crontab is restricted to authorized users is properly configured. Expected result: System is compliant"
req_03: "Store the final remediation result in a variable named 'cis_result' using set_fact. Set cis_result to the overall remediation status (PASS/FAIL/SKIP/ERROR) derived from the last requirement's status variable."
req_04: "Create a task named 'Generate remediation report' using debug msg with EXACTLY this format: REMEDIATION REPORT — CIS 2.4.1.8 Reference: CIS Benchmark checkpoint 2.4.1.8 Then for each requirement: REQUIREMENT NN - {{ req_NN }}: With fields: Task, Command, Exit code, Data, Status (PASS/FAIL/SKIP/ERROR), Details. End with OVERALL REMEDIATION: section containing Result: {{{ cis_result }}}"
cron_allow_script_content: |
  {% raw %}
  #!/usr/bin/env bash
  {
     [ ! -e "/etc/cron.allow" ] && touch /etc/cron.allow
     chown root:root /etc/cron.allow
     chmod u-x,g-wx,o-rwx /etc/cron.allow
  }
  {% endraw %}
