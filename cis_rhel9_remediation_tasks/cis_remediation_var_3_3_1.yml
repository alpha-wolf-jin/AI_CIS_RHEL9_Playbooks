playbook_name: "cis_3_3_1_remediation"
backup_dir: "/var/log/ai-playbooks-backup/{{ playbook_name }}"
config_ipv4: "/etc/sysctl.d/99-cis-ipv4-forward.conf"
config_ipv6: "/etc/sysctl.d/99-cis-ipv6-forward.conf"
ipv4_temp_script: "/tmp/cis_remediate_ipv4.sh"
ipv6_temp_script: "/tmp/cis_remediate_ipv6.sh"
ipv4_temp_absent_marker: "{{ backup_dir }}/cis_remediate_ipv4.sh.absent"
ipv6_temp_absent_marker: "{{ backup_dir }}/cis_remediate_ipv6.sh.absent"
ipv4_script_content: |
  {% raw %}
  #!/usr/bin/env bash
  {
     sysctl -w net.ipv4.ip_forward=0
     sysctl -w net.ipv4.route.flush=1
  }
  {% endraw %}
ipv6_script_content: |
  {% raw %}
  #!/usr/bin/env bash
  {
     sysctl -w net.ipv6.conf.all.forwarding=0
     sysctl -w net.ipv6.route.flush=1
  }
  {% endraw %}
req_01: "Run the provided remediation script to fix Ensure ip forwarding is disabled. Set net.ipv4.ip_forward = 0 in sysctl config file, and if IPv6 enabled, set net.ipv6.conf.all.forwarding = 0 in sysctl config file. Execute scripts to apply active kernel parameters."
req_02: "VERIFY: Run audit check to confirm Ensure ip forwarding is disabled is properly configured. Expected result: System is compliant"
req_03: "Store the final remediation result in a variable named 'cis_result' using set_fact. Set cis_result to the overall remediation status (PASS/FAIL/SKIP/ERROR) derived from the last requirement's status variable."
