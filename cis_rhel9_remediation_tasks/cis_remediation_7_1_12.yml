---
- name: Initialize meta data variables
  include_vars: cis_remediation_var_7_1_12.yml

- name: "State Guard - Check for existing checkpoint"
  ansible.builtin.stat:
    path: "{{ state_guard_flag }}"
  register: _sg_flag
  tags: [snapshot]
- name: "State Guard - Remove old checkpoint"
  ansible.builtin.file:
    path: "{{ state_guard_dir }}"
    state: absent
  when: "_sg_flag.stat.exists"
  failed_when: false
  tags: [snapshot]
- name: "State Guard - Create checkpoint directory"
  ansible.builtin.file:
    path: "{{ state_guard_dir }}"
    state: directory
    mode: '0700'
  tags: [snapshot]
- name: "State Guard - Create checkpoint flag"
  ansible.builtin.copy:
    content: "checkpoint"
    dest: "{{ state_guard_flag }}"
  tags: [snapshot]

- block:
  - name: "Initialize data variables"
    ansible.builtin.set_fact:
      data_01: "Not collected yet"
      status_01: "UNKNOWN"
      details_01: "Not evaluated"
      data_02: "Not collected yet"
      status_02: "UNKNOWN"
      details_02: "Not evaluated"
      data_03: "Not collected yet"
      status_03: "UNKNOWN"
      details_03: "Not evaluated"
      data_04: "Not collected yet"
      status_04: "UNKNOWN"
      details_04: "Not evaluated"
      data_05: "Not collected yet"
      status_05: "UNKNOWN"
      details_05: "Not evaluated"
      data_06: "Not collected yet"
      status_06: "UNKNOWN"
      details_06: "Not evaluated"
      task_01_name: "Not executed"
      task_01_cmd: "N/A"
      task_01_rc: -1
      task_02_name: "Not executed"
      task_02_cmd: "N/A"
      task_02_rc: -1
      task_03_name: "Not executed"
      task_03_cmd: "N/A"
      task_03_rc: -1
      task_04_name: "Not executed"
      task_04_cmd: "N/A"
      task_04_rc: -1
      task_05_name: "Not executed"
      task_05_cmd: "N/A"
      task_05_rc: -1
      task_06_name: "Not executed"
      task_06_cmd: "N/A"
      task_06_rc: -1
    tags: [execute]

  - name: "Req 01 - Check if find command is available"
    ansible.builtin.shell: "command -v find"
    args:
      executable: /bin/bash
    register: result_01
    failed_when: false
    changed_when: false
    tags: [execute]

  - name: "Store requirement 01 details"
    ansible.builtin.set_fact:
      task_01_name: "Check if find command is available"
      task_01_cmd: "command -v find"
      task_01_rc: "{{ result_01.rc | default(-1) }}"
      data_01: "{{ result_01.stdout | default('') | trim }}"
      status_01: "{{ ('PASS' if (result_01.rc | default(-1)) == 0 else 'FAIL') | trim }}"
      details_01: "{{ 'find found' if (result_01.rc | default(-1)) == 0 else 'find not found' }}"
    tags: [execute]

  - name: "Req 02 - Identify files without owner or group"
    ansible.builtin.shell: "find / \\( -path /proc -o -path /sys \\) -prune -o \\( -nouser -o -nogroup \\) -print 2>/dev/null"
    args:
      executable: /bin/bash
    register: result_02
    failed_when: false
    changed_when: false
    tags: [execute]

  - name: "Store requirement 02 details"
    ansible.builtin.set_fact:
      task_02_name: "Identify files without owner or group"
      task_02_cmd: |
        find / \\( -path /proc -o -path /sys \\) -prune -o \\( -nouser -o -nogroup \\) -print 2>/dev/null
      task_02_rc: "{{ result_02.rc | default(-1) }}"
      data_02: "{{ result_02.stdout | default('') | trim }}"
      status_02: "{{ ('PASS' if (result_02.rc | default(-1)) == 0 else 'FAIL') | trim }}"
      details_02: "{{ 'Files identified' if (result_02.rc | default(-1)) == 0 else 'Failed to execute' }}"
    tags: [execute]

  - name: "Req 03 - Reassign ownership of files without owner to root"
    ansible.builtin.shell: >
      find / \( -path /proc -o -path /sys -o -path /dev \) -prune -o
      \( -nouser -exec chown root:root {} + \) 2>/dev/null
    args:
      executable: /bin/bash
    register: result_03
    failed_when: false
    changed_when: false
    tags: [execute]

  - name: "Store requirement 03 details"
    ansible.builtin.set_fact:
      task_03_name: "Reassign ownership of files without owner to root"
      task_03_cmd: |
        find / \\( -path /proc -o -path /sys -o -path /dev \\) -prune -o \\( -nouser -exec chown root:root {} + \\) 2>/dev/null
      task_03_rc: "{{ result_03.rc | default(-1) }}"
      data_03: "{{ result_03.stdout | default('') | trim }}"
      status_03: "{{ ('PASS' if (result_03.rc | default(-1)) == 0 else 'FAIL') | trim }}"
      details_03: "{{ 'Ownership reassigned' if (result_03.rc | default(-1)) == 0 else 'Failed to reassign ownership' }}"
    tags: [execute]

  - name: "Req 04 - Reassign group ownership of files without group to root"
    ansible.builtin.shell: >
      find / \( -path /proc -o -path /sys -o -path /dev \) -prune -o
      \( -nogroup -exec chgrp root {} + \) 2>/dev/null
    args:
      executable: /bin/bash
    register: result_04
    failed_when: false
    changed_when: false
    tags: [execute]

  - name: "Store requirement 04 details"
    ansible.builtin.set_fact:
      task_04_name: "Reassign group ownership of files without group to root"
      task_04_cmd: |
        find / \\( -path /proc -o -path /sys -o -path /dev \\) -prune -o \\( -nogroup -exec chgrp root {} + \\) 2>/dev/null
      task_04_rc: "{{ result_04.rc | default(-1) }}"
      data_04: "{{ result_04.stdout | default('') | trim }}"
      status_04: "{{ ('PASS' if (result_04.rc | default(-1)) == 0 else 'FAIL') | trim }}"
      details_04: "{{ 'Group ownership reassigned' if (result_04.rc | default(-1)) == 0 else 'Failed to reassign group' }}"
    tags: [execute]

  - name: "Req 05 - Verify no files or directories without owner or group exist"
    ansible.builtin.shell: "find / -nouser -o -nogroup 2>/dev/null"
    args:
      executable: /bin/bash
    register: result_05
    failed_when: false
    changed_when: false
    tags: [execute]

  - name: "Store requirement 05 details"
    ansible.builtin.set_fact:
      task_05_name: "Verify no files or directories without owner or group exist"
      task_05_cmd: "find / -nouser -o -nogroup 2>/dev/null"
      task_05_rc: "{{ result_05.rc | default(-1) }}"
      data_05: "{{ result_05.stdout | default('') | trim }}"
      status_05: "{{ ('PASS' if (result_05.stdout | default('') | trim) == '' else 'FAIL') | trim }}"
      details_05: "{{ 'No unowned files found' if (result_05.stdout | default('') | trim) == '' else 'Unowned files still exist: ' + (result_05.stdout | default('') | trim) }}"
    tags: [execute]

  - name: "Store final remediation result in cis_result"
    ansible.builtin.set_fact:
      cis_result: "{{ status_05 | trim }}"
    tags: [execute]

  - name: "Generate remediation report"
    ansible.builtin.debug:
      msg:
      - "REMEDIATION REPORT — CIS 7.1.12"
      - "Reference: CIS Benchmark checkpoint 7.1.12"
      - ""
      - "REQUIREMENT 01 - {{ req_01 }}:"
      - "  Task: {{ task_01_name | default('Task not recorded') }}"
      - "  Command: {{ task_01_cmd | default('N/A') }}"
      - "  Exit code: {{ task_01_rc | default(-1) }}"
      - "  Data: {{ data_01 | default('') | trim }}"
      - "  Status: {{ status_01 | default('ERROR') | trim }}"
      - "  Details: {{ details_01 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 02 - {{ req_02 }}:"
      - "  Task: {{ task_02_name | default('Task not recorded') }}"
      - "  Command: {{ task_02_cmd | default('N/A') }}"
      - "  Exit code: {{ task_02_rc | default(-1) }}"
      - "  Data: {{ data_02 | default('') | trim }}"
      - "  Status: {{ status_02 | default('ERROR') | trim }}"
      - "  Details: {{ details_02 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 03 - {{ req_03 }}:"
      - "  Task: {{ task_03_name | default('Task not recorded') }}"
      - "  Command: {{ task_03_cmd | default('N/A') }}"
      - "  Exit code: {{ task_03_rc | default(-1) }}"
      - "  Data: {{ data_03 | default('') | trim }}"
      - "  Status: {{ status_03 | default('ERROR') | trim }}"
      - "  Details: {{ details_03 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 04 - {{ req_04 }}:"
      - "  Task: {{ task_04_name | default('Task not recorded') }}"
      - "  Command: {{ task_04_cmd | default('N/A') }}"
      - "  Exit code: {{ task_04_rc | default(-1) }}"
      - "  Data: {{ data_04 | default('') | trim }}"
      - "  Status: {{ status_04 | default('ERROR') | trim }}"
      - "  Details: {{ details_04 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 05 - {{ req_05 }}:"
      - "  Task: {{ task_05_name | default('Task not recorded') }}"
      - "  Command: {{ task_05_cmd | default('N/A') }}"
      - "  Exit code: {{ task_05_rc | default(-1) }}"
      - "  Data: {{ data_05 | default('') | trim }}"
      - "  Status: {{ status_05 | default('ERROR') | trim }}"
      - "  Details: {{ details_05 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 06 - {{ req_06 }}:"
      - "  Task: Store final remediation result in cis_result"
      - "  Command: set_fact cis_result"
      - "  Exit code: 0"
      - "  Data: {{ cis_result }}"
      - "  Status: {{ cis_result | default('ERROR') | trim }}"
      - "  Details: Final result stored"
      - ""
      - "========================================================"
      - "OVERALL REMEDIATION:"
      - "  Result: {{ cis_result | default('ERROR') | trim }}"
      - "========================================================"
    tags: [execute]

  always:
  - name: "State Guard Restore - Check if checkpoint exists"
    ansible.builtin.stat:
      path: "{{ state_guard_flag }}"
    register: _sg_restore_flag
    failed_when: false
    tags: [restore]

  - name: "State Guard Restore - Remove checkpoint"
    ansible.builtin.file:
      path: "{{ state_guard_dir }}"
      state: absent
    when: "_sg_restore_flag.stat.exists | default(false)"
    failed_when: false
    tags: [restore]
