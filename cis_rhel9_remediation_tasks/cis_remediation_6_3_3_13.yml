---
- name: Initialize meta data variables
  include_vars: cis_remediation_var_6_3_3_13.yml

- name: "Snapshot - Create backup directory"
  ansible.builtin.file:
    path: "{{ backup_dir }}"
    state: directory
    mode: '0700'
  tags: [snapshot]
- name: "Snapshot - Check if audit rules file exists"
  ansible.builtin.stat:
    path: "{{ audit_rules_file }}"
  register: _snap_rules_stat
  tags: [snapshot]
- name: "Snapshot - Backup audit rules file if exists"
  ansible.builtin.copy:
    src: "{{ audit_rules_file }}"
    dest: "{{ backup_dir }}/50-delete.rules.orig"
    remote_src: true
  when: "_snap_rules_stat.stat.exists"
  failed_when: false
  tags: [snapshot]
- name: "Snapshot - Check if remediation success flag exists"
  ansible.builtin.stat:
    path: "{{ backup_dir }}/remediation_success.flag"
  register: _snap_success_flag
  tags: [snapshot]
- name: "Snapshot - Mark remediation success flag as absent (will be created)"
  ansible.builtin.copy:
    content: "absent"
    dest: "{{ backup_dir }}/remediation_success_flag.absent"
  when: "not _snap_success_flag.stat.exists"
  failed_when: false
  tags: [snapshot]

- block:
  - name: "Req 01 - Check if auditd is installed"
    ansible.builtin.package_facts:
      manager: auto
    failed_when: false
    tags: [execute]

  - name: "Req 01 - Set auditd installed fact"
    ansible.builtin.set_fact:
      auditd_installed: "{{ 'audit' in ansible_facts.packages }}"
      playbook_skipped: "{{ 'audit' not in ansible_facts.packages }}"
    tags: [execute]

  - name: "Req 01 - Get UID_MIN from login.defs"
    ansible.builtin.shell: |
      awk '/^\s*UID_MIN/{print $2}' /etc/login.defs
    args:
      executable: /bin/bash
    register: _uid_min_result
    failed_when: false
    changed_when: false
    when: "auditd_installed | default(false)"
    tags: [execute]

  - name: "Req 01 - Add file deletion audit rules"
    ansible.builtin.lineinfile:
      path: "{{ audit_rules_file }}"
      line: "{{ item }}"
      create: true
      mode: '0640'
    loop:
    - "-a always,exit -F arch=b64 -S rename,unlink,unlinkat,renameat -F auid>={{ _uid_min_result.stdout | trim }} -F auid!=unset -F key=delete"
    - "-a always,exit -F arch=b32 -S rename,unlink,unlinkat,renameat -F auid>={{ _uid_min_result.stdout | trim }} -F auid!=unset -F key=delete"
    when:
    - "auditd_installed | default(false)"
    - "_uid_min_result.stdout | default('') | trim | length > 0"
    failed_when: false
    register: _rules_result
    tags: [execute]

  - name: "Req 02 - Load audit rules with augenrules"
    ansible.builtin.shell: augenrules --load
    args:
      executable: /bin/bash
    when: "auditd_installed | default(false)"
    failed_when: false
    register: _augenrules_result
    tags: [execute]

  - name: "Req 02 - Verify file deletion audit rule is active"
    ansible.builtin.shell: |
      set -o pipefail
      auditctl -l | grep -E 'key=delete' || echo 'VERIFY_FAILED'
    args:
      executable: /bin/bash
    when: "auditd_installed | default(false)"
    failed_when: false
    register: _verify_result
    tags: [execute]

  - name: "Store requirement 01 details"
    ansible.builtin.set_fact:
      task_01_name: "Add file deletion audit rules"
      task_01_cmd: "lineinfile to {{ audit_rules_file }}"
      task_01_rc: "{{ 0 if (_rules_result is not failed) else 1 }}"
      data_01: "{{ _uid_min_result.stdout | default('UID_MIN not found') | trim }}"
      status_01: "{{ 'APPLIED' if (auditd_installed | default(false)) and (_uid_min_result.stdout | default('') | trim | length > 0) and (_rules_result is not failed) else ('SKIP' if not (auditd_installed | default(false)) else 'FAILED') }}"
      details_01: "{{ 'Audit rules added successfully' if (auditd_installed | default(false)) and (_uid_min_result.stdout | default('') | trim | length > 0) and (_rules_result is not failed) else ('SKIP: auditd not installed' if not (auditd_installed | default(false)) else 'FAILED: Could not add rules') }}"
    tags: [execute]

  - name: "Store requirement 02 details"
    ansible.builtin.set_fact:
      task_02_name: "Verify file deletion audit rule is active"
      task_02_cmd: "auditctl -l | grep -E 'key=delete'"
      task_02_rc: "{{ _verify_result.rc | default(-1) }}"
      data_02: "{{ _verify_result.stdout | default('') | trim }}"
      status_02: "{{ 'APPLIED' if (_verify_result.rc | default(-1) == 0) and ('VERIFY_FAILED' not in _verify_result.stdout | default('')) else ('SKIP' if not (auditd_installed | default(false)) else 'FAILED') }}"
      details_02: "{{ 'File deletion audit rule is active' if (_verify_result.rc | default(-1) == 0) and ('VERIFY_FAILED' not in _verify_result.stdout | default('')) else ('SKIP: auditd not installed' if not (auditd_installed | default(false)) else 'FAILED: Rule not found in active audit rules') }}"
    tags: [execute]

# FIX: Split into two set_fact tasks to avoid circular reference of cis_result
  - name: "Store final cis_result"
    ansible.builtin.set_fact:
      cis_result: "{{ 'PASS' if status_02 == 'APPLIED' else ('SKIP' if status_02 == 'SKIP' else 'FAIL') }}"
    tags: [execute]

  - name: "Store requirement 03 details"
    ansible.builtin.set_fact:
      task_03_name: "Store cis_result from verification status"
      task_03_cmd: "set_fact cis_result"
      task_03_rc: "0"
      data_03: "{{ cis_result }}"
      status_03: "PASS"
      details_03: "cis_result set to {{ cis_result }} based on status_02 ({{ status_02 }})"
    tags: [execute]

  - name: "Mark remediation success flag"
    ansible.builtin.copy:
      content: "success"
      dest: "{{ backup_dir }}/remediation_success.flag"
      mode: '0640'
    when: "status_02 == 'APPLIED'"
    failed_when: false
    tags: [execute]

  - name: "Generate remediation report"
    ansible.builtin.debug:
      msg:
      - "========================================================"
      - "        REMEDIATION REPORT — CIS 6.3.3.13"
      - "========================================================"
      - "Reference: CIS Benchmark checkpoint 6.3.3.13"
      - ""
      - "REQUIREMENT 01 - {{ req_01 }}:"
      - "  Task: {{ task_01_name | default('Task not recorded') }}"
      - "  Command: {{ task_01_cmd | default('N/A') }}"
      - "  Exit code: {{ task_01_rc | default(-1) }}"
      - "  Data: {{ data_01 | default('Data collection failed') | trim }}"
      - "  Status: {{ status_01 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_01 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 02 - {{ req_02 }}:"
      - "  Task: {{ task_02_name | default('Task not recorded') }}"
      - "  Command: {{ task_02_cmd | default('N/A') }}"
      - "  Exit code: {{ task_02_rc | default(-1) }}"
      - "  Data: {{ data_02 | default('Data collection failed') | trim }}"
      - "  Status: {{ status_02 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_02 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 03 - {{ req_03 }}:"
      - "  Task: {{ task_03_name | default('Task not recorded') }}"
      - "  Command: {{ task_03_cmd | default('N/A') }}"
      - "  Exit code: {{ task_03_rc | default(-1) }}"
      - "  Data: {{ data_03 | default('Data collection failed') | trim }}"
      - "  Status: {{ status_03 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_03 | default('Not evaluated') | trim }}"
      - ""
      - "========================================================"
      - "OVERALL REMEDIATION:"
      - "  Result: {{ cis_result | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_02 | default('Not evaluated') | trim }}"
      - "========================================================"
    tags: [execute]

  always:
  - name: "Restore - Check if remediation success flag exists"
    ansible.builtin.stat:
      path: "{{ backup_dir }}/remediation_success.flag"
    register: _restore_success_flag
    failed_when: false
    tags: [restore]

  - name: "Restore - Check if audit rules backup exists"
    ansible.builtin.stat:
      path: "{{ backup_dir }}/50-delete.rules.orig"
    register: _restore_rules_check
    failed_when: false
    tags: [restore]

  - name: "Restore - Overwrite audit rules with original"
    ansible.builtin.copy:
      src: "{{ backup_dir }}/50-delete.rules.orig"
      dest: "{{ audit_rules_file }}"
      remote_src: true
    when:
    - "_restore_rules_check.stat.exists | default(false)"
    - "not (_restore_success_flag.stat.exists | default(false))"
    failed_when: false
    tags: [restore]

  - name: "Restore - Reload audit rules after restore"
    ansible.builtin.shell: augenrules --load
    args:
      executable: /bin/bash
    when:
    - "_restore_rules_check.stat.exists | default(false)"
    - "not (_restore_success_flag.stat.exists | default(false))"
    failed_when: false
    tags: [restore]

  - name: "Restore - Check if remediation success flag absence marker exists"
    ansible.builtin.stat:
      path: "{{ backup_dir }}/remediation_success_flag.absent"
    register: _restore_success_flag_marker
    failed_when: false
    tags: [restore]

  - name: "Restore - Delete remediation success flag file"
    ansible.builtin.file:
      path: "{{ backup_dir }}/remediation_success.flag"
      state: absent
    when: "_restore_success_flag_marker.stat.exists | default(false)"
    failed_when: false
    tags: [restore]

  - name: "Restore - Remove backup directory"
    ansible.builtin.file:
      path: "{{ backup_dir }}"
      state: absent
    failed_when: false
    tags: [restore]
