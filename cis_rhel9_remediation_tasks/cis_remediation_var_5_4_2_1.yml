playbook_name: "cis_5_4_2_1"
checkpoint_id: "cis_5_4_2_1"
state_guard_dir: "/usr/local/bin/cis/.cis_state_guard/{{ checkpoint_id }}"
state_guard_flag: "{{ state_guard_dir }}/checkpoint.flag"
req_01: "Apply prerequisite check for usermod command using: `command -v usermod`. Expected result: usermod is available."
req_02: "Apply root UID assignment using command: `usermod -u 0 root`. Expected result: root user has UID 0."
req_03: "Apply new UID assignment to any non-root user with UID 0 using command: `usermod -u <new_uid> <username>`. Expected result: each non-root user with UID 0 is assigned a unique non-zero UID."
req_04: "Verify no non-root user has UID 0 using command: `awk -F: '($3 == 0) {print $1}' /etc/passwd`. Expected result: only 'root' is listed."
req_05: "Store the final remediation result in a variable named 'cis_result' using set_fact. Set cis_result to the overall remediation status (PASS/FAIL/SKIP/ERROR) derived from the last requirement's status variable."
req_06: "Create a task named 'Generate remediation report' using debug msg with EXACTLY this format: REMEDIATION REPORT — CIS 5.4.2.1 Reference: CIS Benchmark checkpoint 5.4.2.1 Then for each requirement: REQUIREMENT NN - {{ req_NN }}: With fields: Task, Command, Exit code, Data, Status (PASS/FAIL/SKIP/ERROR), Details. End with OVERALL REMEDIATION: section containing Result: {{ cis_result }}"
