---
- name: Initialize meta data variables
  include_vars: cis_remediation_var_1_1_2_6_3.yml

- name: "Snapshot - Create backup directory"
  ansible.builtin.file:
    path: "{{ backup_dir }}"
    state: directory
    mode: '0700'
  tags: [snapshot]
- name: "Snapshot - Check if /etc/fstab exists"
  ansible.builtin.stat:
    path: /etc/fstab
  register: _sg_fstab_stat
  tags: [snapshot]
- name: "Snapshot - Backup /etc/fstab if exists"
  ansible.builtin.copy:
    src: /etc/fstab
    dest: "{{ backup_dir }}/fstab.present"
    remote_src: true
  when: _sg_fstab_stat.stat.exists
  tags: [snapshot]

- block:
  - name: "Initialize data variables"
    set_fact:
      data_01: "Not collected yet"
      status_01: "ERROR"
      details_01: "Not evaluated"
      data_02: "Not collected yet"
      status_02: "ERROR"
      details_02: "Not evaluated"
      data_03: "Not collected yet"
      status_03: "ERROR"
      details_03: "Not evaluated"
      data_04: "Not collected yet"
      status_04: "ERROR"
      details_04: "Not evaluated"
      data_05: "Not collected yet"
      status_05: "ERROR"
      details_05: "Not evaluated"
      task_01_name: "Not executed"
      task_01_cmd: "N/A"
      task_01_rc: -1
      task_02_name: "Not executed"
      task_02_cmd: "N/A"
      task_02_rc: -1
      task_03_name: "Not executed"
      task_03_cmd: "N/A"
      task_03_rc: -1
      task_04_name: "Not executed"
      task_04_cmd: "N/A"
      task_04_rc: -1
      task_05_name: "Not executed"
      task_05_cmd: "N/A"
      task_05_rc: -1

  - name: "Req 01 - Check if a separate partition exists for /var/log"
    ansible.builtin.shell: findmnt -kn /var/log
    args:
      executable: /bin/bash
    register: result_01
    failed_when: false
    changed_when: false
    tags: [execute]

  - name: "Store requirement 01 details"
    set_fact:
      task_01_name: "Check if a separate partition exists for /var/log"
      task_01_cmd: "findmnt -kn /var/log"
      task_01_rc: "{{ result_01.rc | default(-1) }}"
      data_01: "{{ result_01.stdout | default('') | trim }}"
      status_01: "{{ 'SKIP' if (result_01.stdout | default('') | trim) == '' else 'PASS' }}"
      details_01: "{{ 'No separate partition found for /var/log - remediation not applicable' if (result_01.stdout | default('') | trim) == '' else 'Partition exists for /var/log' }}"
    tags: [execute]

  - name: "Req 02 - Add nosuid to /var/log entry in /etc/fstab"
    ansible.builtin.lineinfile:
      path: /etc/fstab
      regexp: |
        ^(\S+\s+/var/log\s+\S+\s+)((?:(?!nosuid)[^\s,]+(,?))+\s+)(.*)$
      line: |
        \1nosuid,\2\3
      backrefs: true
    register: result_02
    failed_when: false
    when: "status_01 | trim == 'PASS'"
    tags: [execute]

  - name: "Store requirement 02 details"
    set_fact:
      task_02_name: "Add nosuid to /var/log entry in /etc/fstab"
      task_02_cmd: "lineinfile: add nosuid to /var/log options in /etc/fstab"
      task_02_rc: "{{ result_02.rc | default(-1) if result_02 is defined else -1 }}"
      data_02: "{{ result_02.diff | default('') if result_02 is defined else '' }}"
      status_02: "{{ 'SKIP' if status_01 | trim == 'SKIP' else ('PASS' if result_02 is defined and not result_02.failed else 'FAIL') }}"
      details_02: "{{ 'Skipped - no separate partition' if status_01 | trim == 'SKIP' else ('nosuid added to /etc/fstab' if result_02 is defined and not result_02.failed else 'Failed to update /etc/fstab') }}"
    tags: [execute]

  - name: "Req 03 - Remount /var/log with updated options"
    ansible.builtin.shell: mount -o remount /var/log
    args:
      executable: /bin/bash
    register: result_03
    failed_when: false
    when: "status_02 | trim == 'PASS'"
    tags: [execute]

  - name: "Store requirement 03 details"
    set_fact:
      task_03_name: "Remount /var/log with updated options"
      task_03_cmd: "mount -o remount /var/log"
      task_03_rc: "{{ result_03.rc | default(-1) if result_03 is defined else -1 }}"
      data_03: "{{ result_03.stdout | default('') | trim if result_03 is defined else '' }}"
      status_03: "{{ 'SKIP' if status_02 | trim == 'SKIP' else ('PASS' if result_03 is defined and result_03.rc | default(-1) == 0 else 'FAIL') }}"
      details_03: "{{ 'Skipped - fstab not updated' if status_02 | trim == 'SKIP' else ('/var/log remounted successfully' if result_03 is defined and result_03.rc | default(-1) == 0 else 'Failed to remount /var/log') }}"
    tags: [execute]

  - name: "Req 04 - Verify nosuid option is set on /var/log partition"
    ansible.builtin.shell: findmnt -kn /var/log | grep -v nosuid
    args:
      executable: /bin/bash
    register: result_04
    failed_when: false
    changed_when: false
    when: "status_03 | trim == 'PASS'"
    tags: [execute]

  - name: "Store requirement 04 details"
    set_fact:
      task_04_name: "Verify nosuid option is set on /var/log partition"
      task_04_cmd: "findmnt -kn /var/log | grep -v nosuid"
      task_04_rc: "{{ result_04.rc | default(-1) if result_04 is defined else -1 }}"
      data_04: "{{ result_04.stdout | default('') | trim if result_04 is defined else '' }}"
      status_04: "{{ 'SKIP' if status_03 | trim == 'SKIP' else ('PASS' if result_04 is defined and (result_04.stdout | default('') | trim) == '' else 'FAIL') }}"
      details_04: "{{ 'Skipped - remount not performed' if status_03 | trim == 'SKIP' else ('nosuid option is set on /var/log partition' if result_04 is defined and (result_04.stdout | default('') | trim) == '' else 'nosuid option is NOT set on /var/log partition') }}"
    tags: [execute]

  - name: "Req 05 - Store final remediation result in cis_result"
    set_fact:
      cis_result: "{{ status_04 | default('ERROR') | trim }}"
      task_05_name: "Store final remediation result in cis_result"
      task_05_cmd: "set_fact"
      task_05_rc: 0
      data_05: "{{ status_04 | default('ERROR') | trim }}"
      status_05: "PASS"
      details_05: "cis_result set to {{ status_04 | default('ERROR') | trim }}"
    tags: [execute]

  - name: "Generate remediation report"
    debug:
      msg:
      - "REMEDIATION REPORT — CIS 1.1.2.6.3"
      - "Reference: CIS Benchmark checkpoint 1.1.2.6.3"
      - ""
      - "REQUIREMENT 01 - {{ req_01 }}:"
      - "  Task: {{ task_01_name | default('Not recorded') }}"
      - "  Command: {{ task_01_cmd | default('N/A') }}"
      - "  Exit code: {{ task_01_rc | default(-1) }}"
      - "  Data: {{ data_01 | default('') | trim }}"
      - "  Status: {{ status_01 | default('ERROR') | trim }}"
      - "  Details: {{ details_01 | default('') | trim }}"
      - ""
      - "REQUIREMENT 02 - {{ req_02 }}:"
      - "  Task: {{ task_02_name | default('Not recorded') }}"
      - "  Command: {{ task_02_cmd | default('N/A') }}"
      - "  Exit code: {{ task_02_rc | default(-1) }}"
      - "  Data: {{ data_02 | default('') | trim }}"
      - "  Status: {{ status_02 | default('ERROR') | trim }}"
      - "  Details: {{ details_02 | default('') | trim }}"
      - ""
      - "REQUIREMENT 03 - {{ req_03 }}:"
      - "  Task: {{ task_03_name | default('Not recorded') }}"
      - "  Command: {{ task_03_cmd | default('N/A') }}"
      - "  Exit code: {{ task_03_rc | default(-1) }}"
      - "  Data: {{ data_03 | default('') | trim }}"
      - "  Status: {{ status_03 | default('ERROR') | trim }}"
      - "  Details: {{ details_03 | default('') | trim }}"
      - ""
      - "REQUIREMENT 04 - {{ req_04 }}:"
      - "  Task: {{ task_04_name | default('Not recorded') }}"
      - "  Command: {{ task_04_cmd | default('N/A') }}"
      - "  Exit code: {{ task_04_rc | default(-1) }}"
      - "  Data: {{ data_04 | default('') | trim }}"
      - "  Status: {{ status_04 | default('ERROR') | trim }}"
      - "  Details: {{ details_04 | default('') | trim }}"
      - ""
      - "REQUIREMENT 05 - {{ req_05 }}:"
      - "  Task: {{ task_05_name | default('Not recorded') }}"
      - "  Command: {{ task_05_cmd | default('N/A') }}"
      - "  Exit code: {{ task_05_rc | default(-1) }}"
      - "  Data: {{ data_05 | default('') | trim }}"
      - "  Status: {{ status_05 | default('ERROR') | trim }}"
      - "  Details: {{ details_05 | default('') | trim }}"
      - ""
      - "========================================================"
      - "OVERALL REMEDIATION:"
      - "  Result: {{ cis_result | default('ERROR') | trim }}"
      - "  Details: {{ details_04 | default('Not evaluated') | trim }}"
      - "========================================================"
    tags: [execute]

  always:
  - name: "Restore - Check if backup exists"
    ansible.builtin.stat:
      path: "{{ backup_dir }}/fstab.present"
    register: _restore_fstab
    failed_when: false
    tags: [restore]

  - name: "Restore - Overwrite /etc/fstab with original"
    ansible.builtin.copy:
      src: "{{ backup_dir }}/fstab.present"
      dest: /etc/fstab
      remote_src: true
    when: _restore_fstab.stat.exists | default(false)
    failed_when: false
    tags: [restore]

  - name: "Restore - Remove backup directory"
    ansible.builtin.file:
      path: "{{ backup_dir }}"
      state: absent
    failed_when: false
    tags: [restore]
