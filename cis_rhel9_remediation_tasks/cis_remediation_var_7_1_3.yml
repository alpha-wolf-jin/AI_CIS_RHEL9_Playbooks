playbook_name: "cis_7_1_3_group_permissions"
backup_dir: "/var/log/ai-playbooks-backup/{{ playbook_name }}"
target_file: "/etc/group"
expected_perms: "644"
expected_owner: "root"
expected_group: "root"
req_01: "Apply remove excess permissions on /etc/group using command: chmod u-x,go-wx /etc/group. Expected result: Permissions on /etc/group are set to 644 (owner read/write, group and others read-only)."
req_02: "Apply set owner and group to root on /etc/group using command: chown root:root /etc/group. Expected result: Owner and group of /etc/group are both root."
req_03: "Verify permissions and ownership on /etc/group using command: stat -c '%a %U:%G' /etc/group. Expected result: Output is '644 root:root'."
