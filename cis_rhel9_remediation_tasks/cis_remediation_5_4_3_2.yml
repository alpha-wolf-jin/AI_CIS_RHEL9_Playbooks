---
- name: Initialize meta data variables
  include_vars: cis_remediation_var_5_4_3_2.yml

- name: "Snapshot - Create backup directory"
  ansible.builtin.file:
    path: "{{ backup_dir }}"
    state: directory
    mode: '0700'
  tags: [snapshot]
- name: "Snapshot - Check if /etc/bashrc exists"
  ansible.builtin.stat:
    path: /etc/bashrc
  register: _snap_bashrc
  tags: [snapshot]
- name: "Snapshot - Backup /etc/bashrc"
  ansible.builtin.copy:
    src: /etc/bashrc
    dest: "{{ backup_dir }}/bashrc.present"
    remote_src: true
  when: "_snap_bashrc.stat.exists | default(false)"
  tags: [snapshot]
- name: "Snapshot - Check if /etc/profile exists"
  ansible.builtin.stat:
    path: /etc/profile
  register: _snap_profile
  tags: [snapshot]
- name: "Snapshot - Backup /etc/profile"
  ansible.builtin.copy:
    src: /etc/profile
    dest: "{{ backup_dir }}/profile.present"
    remote_src: true
  when: "_snap_profile.stat.exists | default(false)"
  tags: [snapshot]
- name: "Snapshot - Check if /etc/profile.d/50-tmout.sh exists"
  ansible.builtin.stat:
    path: /etc/profile.d/50-tmout.sh
  register: _snap_tmout
  tags: [snapshot]
- name: "Snapshot - Backup /etc/profile.d/50-tmout.sh"
  ansible.builtin.copy:
    src: /etc/profile.d/50-tmout.sh
    dest: "{{ backup_dir }}/50-tmout.sh.present"
    remote_src: true
  when: "_snap_tmout.stat.exists | default(false)"
  tags: [snapshot]
- name: "Snapshot - Mark /etc/profile.d/50-tmout.sh as absent"
  ansible.builtin.copy:
    content: "absent"
    dest: "{{ backup_dir }}/50-tmout.sh.absent"
  when: "not (_snap_tmout.stat.exists | default(false))"
  tags: [snapshot]

- block:
  - name: "Req 01 - Check if bash and printf are available"
    ansible.builtin.shell: which bash && which printf
    args:
      executable: /bin/bash
    register: result_01
    failed_when: false
    changed_when: false
    tags: [execute]

  - name: "Store requirement 01 details"
    set_fact:
      task_01_name: "Check if bash and printf are available"
      task_01_cmd: "which bash && which printf"
      task_01_rc: "{{ result_01.rc | default(-1) }}"
      data_01: "{{ result_01.stdout | default('') | trim }}"
      status_01: "{{ 'PASS' if (result_01.rc | default(-1)) == 0 else 'FAIL' }}"
      details_01: "{{ 'Commands found' if (result_01.rc | default(-1)) == 0 else 'Commands not found' }}"
    tags: [execute]

  - name: "Req 02 - Remove existing TMOUT entries from /etc/bashrc"
    ansible.builtin.lineinfile:
      path: /etc/bashrc
      regexp: '^(TMOUT=|readonly TMOUT|export TMOUT)'
      state: absent
    register: result_02
    failed_when: false
    tags: [execute]

  - name: "Store requirement 02 details"
    set_fact:
      task_02_name: "Remove existing TMOUT entries from /etc/bashrc"
      task_02_cmd: "lineinfile regexp='^(TMOUT=|readonly TMOUT|export TMOUT)' state=absent"
      task_02_rc: "{{ 0 if not result_02.failed else 1 }}"
      data_02: "{{ 'TMOUT entries removed' if result_02.changed else 'No TMOUT entries found' }}"
      status_02: "{{ 'PASS' if not result_02.failed else 'FAIL' }}"
      details_02: "{{ 'TMOUT lines removed from /etc/bashrc' if result_02.changed else 'No TMOUT lines present in /etc/bashrc' }}"
    tags: [execute]

  - name: "Req 03 - Remove existing TMOUT entries from /etc/profile"
    ansible.builtin.lineinfile:
      path: /etc/profile
      regexp: '^(TMOUT=|readonly TMOUT|export TMOUT)'
      state: absent
    register: result_03
    failed_when: false
    tags: [execute]

  - name: "Store requirement 03 details"
    set_fact:
      task_03_name: "Remove existing TMOUT entries from /etc/profile"
      task_03_cmd: "lineinfile regexp='^(TMOUT=|readonly TMOUT|export TMOUT)' state=absent"
      task_03_rc: "{{ 0 if not result_03.failed else 1 }}"
      data_03: "{{ 'TMOUT entries removed' if result_03.changed else 'No TMOUT entries found' }}"
      status_03: "{{ 'PASS' if not result_03.failed else 'FAIL' }}"
      details_03: "{{ 'TMOUT lines removed from /etc/profile' if result_03.changed else 'No TMOUT lines present in /etc/profile' }}"
    tags: [execute]

  - name: "Req 04 - Remove existing TMOUT entries from /etc/profile.d/*.sh"
    ansible.builtin.shell: |
      find /etc/profile.d/ -name '*.sh' -exec sed -i '/^TMOUT=/d; /^readonly TMOUT/d; /^export TMOUT/d' {} +
    args:
      executable: /bin/bash
    register: result_04
    failed_when: false
    changed_when: false
    tags: [execute]

  - name: "Store requirement 04 details"
    set_fact:
      task_04_name: "Remove existing TMOUT entries from /etc/profile.d/*.sh"
      task_04_cmd: "find /etc/profile.d/ -name '*.sh' -exec sed -i '/^TMOUT=/d; /^readonly TMOUT/d; /^export TMOUT/d' {} +"
      task_04_rc: "{{ result_04.rc | default(-1) }}"
      data_04: "{{ 'TMOUT entries cleaned from profile.d scripts' if (result_04.rc | default(-1)) == 0 else 'Failed to clean profile.d scripts' }}"
      status_04: "{{ 'PASS' if (result_04.rc | default(-1)) == 0 else 'FAIL' }}"
      details_04: "{{ 'All TMOUT entries removed from /etc/profile.d/*.sh files' if (result_04.rc | default(-1)) == 0 else 'Error executing find/sed command' }}"
    tags: [execute]

  - name: "Req 05 - Configure TMOUT to 900 seconds in /etc/profile.d/50-tmout.sh"
    ansible.builtin.copy:
      content: |
        # Set TMOUT to 900 seconds
        typeset -xr TMOUT=900
      dest: /etc/profile.d/50-tmout.sh
      mode: '0644'
    register: result_05
    failed_when: false
    tags: [execute]

  - name: "Store requirement 05 details"
    set_fact:
      task_05_name: "Configure TMOUT to 900 seconds in /etc/profile.d/50-tmout.sh"
      task_05_cmd: |
        copy content='# Set TMOUT to 900 seconds\\ntypeset -xr TMOUT=900' dest=/etc/profile.d/50-tmout.sh
      task_05_rc: "{{ 0 if not result_05.failed else 1 }}"
      data_05: "{{ '/etc/profile.d/50-tmout.sh created/updated' if result_05.changed else '/etc/profile.d/50-tmout.sh already correct' }}"
      status_05: "{{ 'PASS' if not result_05.failed else 'FAIL' }}"
      details_05: "{{ 'File /etc/profile.d/50-tmout.sh configured with typeset -xr TMOUT=900' if not result_05.failed else 'Failed to create/update /etc/profile.d/50-tmout.sh' }}"
    tags: [execute]

  - name: "Req 06 - Verify TMOUT is set correctly"
    ansible.builtin.shell: |
      grep -r 'TMOUT' /etc/bashrc /etc/profile /etc/profile.d/*.sh 2>/dev/null | grep -v '^[^:]*:#'
    args:
      executable: /bin/bash
    register: result_06
    failed_when: false
    changed_when: false
    tags: [execute]

  - name: "Store requirement 06 details"
    set_fact:
      task_06_name: "Verify TMOUT is set correctly"
      task_06_cmd: "grep -r 'TMOUT' /etc/bashrc /etc/profile /etc/profile.d/*.sh 2>/dev/null | grep -v '^[^:]*:#'"
      task_06_rc: "{{ result_06.rc | default(-1) }}"
      data_06: "{{ result_06.stdout | default('') | trim }}"
      status_06: "{{ 'PASS' if (result_06.stdout | default('')) is search('typeset -xr TMOUT=900') and (result_06.stdout_lines | default([]) | length) == 1 else 'FAIL' }}"
      details_06: "{{ 'Only typeset -xr TMOUT=900 found in /etc/profile.d/50-tmout.sh' if (result_06.stdout | default('')) is search('typeset -xr TMOUT=900') and (result_06.stdout_lines | default([]) | length) == 1 else 'Multiple or missing TMOUT entries detected' }}"
    tags: [execute]

  - name: "Set final remediation result variable"
    set_fact:
      cis_result: "{{ status_06 | default('ERROR') | trim }}"
    tags: [execute]

  - name: "Generate remediation report"
    debug:
      msg:
      - "========================================================"
      - "        REMEDIATION REPORT — CIS 5.4.3.2"
      - "Reference: CIS Benchmark checkpoint 5.4.3.2"
      - "========================================================"
      - ""
      - "REQUIREMENT 01 - {{ req_01 }}:"
      - "  Task: {{ task_01_name | default('Task not recorded') }}"
      - "  Command: {{ task_01_cmd | default('N/A') }}"
      - "  Exit code: {{ task_01_rc | default(-1) }}"
      - "  Data: {{ data_01 | default('') | trim }}"
      - "  Status: {{ status_01 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_01 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 02 - {{ req_02 }}:"
      - "  Task: {{ task_02_name | default('Task not recorded') }}"
      - "  Command: {{ task_02_cmd | default('N/A') }}"
      - "  Exit code: {{ task_02_rc | default(-1) }}"
      - "  Data: {{ data_02 | default('') | trim }}"
      - "  Status: {{ status_02 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_02 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 03 - {{ req_03 }}:"
      - "  Task: {{ task_03_name | default('Task not recorded') }}"
      - "  Command: {{ task_03_cmd | default('N/A') }}"
      - "  Exit code: {{ task_03_rc | default(-1) }}"
      - "  Data: {{ data_03 | default('') | trim }}"
      - "  Status: {{ status_03 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_03 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 04 - {{ req_04 }}:"
      - "  Task: {{ task_04_name | default('Task not recorded') }}"
      - "  Command: {{ task_04_cmd | default('N/A') }}"
      - "  Exit code: {{ task_04_rc | default(-1) }}"
      - "  Data: {{ data_04 | default('') | trim }}"
      - "  Status: {{ status_04 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_04 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 05 - {{ req_05 }}:"
      - "  Task: {{ task_05_name | default('Task not recorded') }}"
      - "  Command: {{ task_05_cmd | default('N/A') }}"
      - "  Exit code: {{ task_05_rc | default(-1) }}"
      - "  Data: {{ data_05 | default('') | trim }}"
      - "  Status: {{ status_05 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_05 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 06 - {{ req_06 }}:"
      - "  Task: {{ task_06_name | default('Task not recorded') }}"
      - "  Command: {{ task_06_cmd | default('N/A') }}"
      - "  Exit code: {{ task_06_rc | default(-1) }}"
      - "  Data: {{ data_06 | default('') | trim }}"
      - "  Status: {{ status_06 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_06 | default('Not evaluated') | trim }}"
      - ""
      - "========================================================"
      - "OVERALL REMEDIATION:"
      - "  Result: {{ cis_result | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_06 | default('Not evaluated') | trim }}"
      - "========================================================"
    tags: [execute]

  always:
  - name: "Restore - Check if backup directory exists"
    ansible.builtin.stat:
      path: "{{ backup_dir }}"
    register: _restore_dir
    failed_when: false
    tags: [restore]

  - name: "Restore - Check if bashrc backup exists"
    ansible.builtin.stat:
      path: "{{ backup_dir }}/bashrc.present"
    register: _restore_bashrc
    failed_when: false
    tags: [restore]

  - name: "Restore - Restore /etc/bashrc from backup"
    ansible.builtin.copy:
      src: "{{ backup_dir }}/bashrc.present"
      dest: /etc/bashrc
      remote_src: true
    when: "_restore_bashrc.stat.exists | default(false)"
    failed_when: false
    tags: [restore]

  - name: "Restore - Check if profile backup exists"
    ansible.builtin.stat:
      path: "{{ backup_dir }}/profile.present"
    register: _restore_profile
    failed_when: false
    tags: [restore]

  - name: "Restore - Restore /etc/profile from backup"
    ansible.builtin.copy:
      src: "{{ backup_dir }}/profile.present"
      dest: /etc/profile
      remote_src: true
    when: "_restore_profile.stat.exists | default(false)"
    failed_when: false
    tags: [restore]

  - name: "Restore - Check if 50-tmout.sh backup exists"
    ansible.builtin.stat:
      path: "{{ backup_dir }}/50-tmout.sh.present"
    register: _restore_tmout_present
    failed_when: false
    tags: [restore]

  - name: "Restore - Restore /etc/profile.d/50-tmout.sh from backup"
    ansible.builtin.copy:
      src: "{{ backup_dir }}/50-tmout.sh.present"
      dest: /etc/profile.d/50-tmout.sh
      remote_src: true
    when: "_restore_tmout_present.stat.exists | default(false)"
    failed_when: false
    tags: [restore]

  - name: "Restore - Check if 50-tmout.sh was absent before remediation"
    ansible.builtin.stat:
      path: "{{ backup_dir }}/50-tmout.sh.absent"
    register: _restore_tmout_absent
    failed_when: false
    tags: [restore]

  - name: "Restore - Remove /etc/profile.d/50-tmout.sh (was absent before)"
    ansible.builtin.file:
      path: /etc/profile.d/50-tmout.sh
      state: absent
    when: "_restore_tmout_absent.stat.exists | default(false)"
    failed_when: false
    tags: [restore]

  - name: "Restore - Remove backup directory"
    ansible.builtin.file:
      path: "{{ backup_dir }}"
      state: absent
    when: "_restore_dir.stat.exists | default(false)"
    failed_when: false
    tags: [restore]
