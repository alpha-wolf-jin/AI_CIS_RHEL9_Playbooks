---
- name: Initialize meta data variables
  include_vars: cis_remediation_var_5_1_16.yml

- name: "Snapshot - Create backup directory"
  ansible.builtin.file:
    path: "{{ backup_dir }}"
    state: directory
    mode: '0700'
  tags: [snapshot]
- name: "Snapshot - Check if config file exists"
  ansible.builtin.stat:
    path: "{{ config_file }}"
  register: _snap_config_stat
  tags: [snapshot]
- name: "Snapshot - Backup config file if exists"
  ansible.builtin.copy:
    src: "{{ config_file }}"
    dest: "{{ backup_dir }}/sshd_config.bak"
    remote_src: true
  when: _snap_config_stat.stat.exists | default(false)
  tags: [snapshot]

- name: "Initialize data variables"
  ansible.builtin.set_fact:
    data_01: "Not collected yet"
    status_01: "UNKNOWN"
    details_01: "Not evaluated"
    data_02: "Not collected yet"
    status_02: "UNKNOWN"
    details_02: "Not evaluated"
    data_03: "Not collected yet"
    status_03: "UNKNOWN"
    details_03: "Not evaluated"
    task_01_name: "Not executed"
    task_01_cmd: "N/A"
    task_01_rc: -1
    task_02_name: "Not executed"
    task_02_cmd: "N/A"
    task_02_rc: -1
    task_03_name: "Not executed"
    task_03_cmd: "N/A"
    task_03_rc: -1
    playbook_skipped: false
  tags: [always]
- name: "Check if sshd package is installed"
  ansible.builtin.package_facts:
    manager: auto
  failed_when: false
  tags: [always]
- name: "Set skip flag if sshd not installed"
  ansible.builtin.set_fact:
    playbook_skipped: true
  when: "'openssh-server' not in ansible_facts.packages"
  tags: [always]
- block:
  - name: "Req 01 - Prerequisite check for sshd configuration"
    ansible.builtin.shell: |
      which sshd && sshd -t 2>/dev/null
    args:
      executable: /bin/bash
    register: result_01
    failed_when: false
    changed_when: false
    when: "not playbook_skipped"
    tags: [execute]

  - name: "Store requirement 01 details"
    ansible.builtin.set_fact:
      task_01_name: "Prerequisite check for sshd configuration"
      task_01_cmd: "which sshd && sshd -t 2>/dev/null"
      task_01_rc: "{{ result_01.rc | default(-1) }}"
      data_01: "{{ result_01.stdout | default('') | trim }}"
      status_01: "{{ 'PASS' if (result_01.rc | default(-1)) == 0 else 'FAIL' }}"
      details_01: "{{ 'Completed successfully' if (result_01.rc | default(-1)) == 0 else 'Failed to execute' }}"
    when: "not playbook_skipped"
    tags: [execute]

  - name: "Req 02 - Apply MaxAuthTries setting to 4 in sshd_config"
    ansible.builtin.shell: |
      grep -q '^MaxAuthTries' /etc/ssh/sshd_config && sed -i 's/^MaxAuthTries.*/MaxAuthTries 4/' /etc/ssh/sshd_config || echo 'MaxAuthTries 4' >> /etc/ssh/sshd_config
    args:
      executable: /bin/bash
    register: result_02
    failed_when: false
    when: "not playbook_skipped"
    tags: [execute]

  - name: "Store requirement 02 details"
    ansible.builtin.set_fact:
      task_02_name: "Apply MaxAuthTries setting to 4 in sshd_config"
      task_02_cmd: "grep -q '^MaxAuthTries' /etc/ssh/sshd_config && sed -i 's/^MaxAuthTries.*/MaxAuthTries 4/' /etc/ssh/sshd_config || echo 'MaxAuthTries 4' >> /etc/ssh/sshd_config"
      task_02_rc: "{{ result_02.rc | default(-1) }}"
      data_02: "{{ 'MaxAuthTries 4' if (result_02.rc | default(-1)) == 0 else result_02.stderr | default('') | trim }}"
      status_02: "{{ 'PASS' if (result_02.rc | default(-1)) == 0 else 'FAIL' }}"
      details_02: "{{ 'Applied successfully' if (result_02.rc | default(-1)) == 0 else 'Failed to apply' }}"
    when: "not playbook_skipped"
    tags: [execute]

  - name: "Req 03 - Verify active MaxAuthTries setting using sshd -T"
    ansible.builtin.shell: |
      sshd -T 2>/dev/null | grep -i maxauthtries
    args:
      executable: /bin/bash
    register: result_03
    failed_when: false
    changed_when: false
    when: "not playbook_skipped"
    tags: [execute]

  - name: "Store requirement 03 details"
    ansible.builtin.set_fact:
      task_03_name: "Verify active MaxAuthTries setting using sshd -T"
      task_03_cmd: "sshd -T | grep -i maxauthtries"
      task_03_rc: "{{ result_03.rc | default(-1) }}"
      data_03: "{{ result_03.stdout | default('') | trim }}"
      status_03: "{{ 'PASS' if (result_03.rc | default(-1)) == 0 and 'maxauthtries 4' in (result_03.stdout | default('') | lower) else 'FAIL' }}"
      details_03: "{{ 'Verified maxauthtries 4' if (result_03.rc | default(-1)) == 0 and 'maxauthtries 4' in (result_03.stdout | default('') | lower) else 'Verification failed' }}"
    when: "not playbook_skipped"
    tags: [execute]

  - name: "Req 04 - Store final remediation result"
    ansible.builtin.set_fact:
      cis_result: "{{ status_03 | default('UNKNOWN') }}"
    when: "not playbook_skipped"
    tags: [execute]

  - name: "Generate remediation report"
    ansible.builtin.debug:
      msg:
      - "========================================================"
      - "        REMEDIATION REPORT — CIS 5.1.16"
      - "        Reference: CIS Benchmark checkpoint 5.1.16"
      - "========================================================"
      - ""
      - "REQUIREMENT 01 - {{ req_01 }}:"
      - "  Task: {{ task_01_name | default('Task not recorded') }}"
      - "  Command: {{ task_01_cmd | default('N/A') }}"
      - "  Exit code: {{ task_01_rc | default(-1) }}"
      - "  Data: {{ data_01 | default('Data collection failed') | trim }}"
      - "  Status: {{ status_01 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_01 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 02 - {{ req_02 }}:"
      - "  Task: {{ task_02_name | default('Task not recorded') }}"
      - "  Command: {{ task_02_cmd | default('N/A') }}"
      - "  Exit code: {{ task_02_rc | default(-1) }}"
      - "  Data: {{ data_02 | default('Data collection failed') | trim }}"
      - "  Status: {{ status_02 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_02 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 03 - {{ req_03 }}:"
      - "  Task: {{ task_03_name | default('Task not recorded') }}"
      - "  Command: {{ task_03_cmd | default('N/A') }}"
      - "  Exit code: {{ task_03_rc | default(-1) }}"
      - "  Data: {{ data_03 | default('Data collection failed') | trim }}"
      - "  Status: {{ status_03 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_03 | default('Not evaluated') | trim }}"
      - ""
      - "========================================================"
      - "OVERALL REMEDIATION:"
      - "  Result: {{ cis_result | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_03 | default('Not evaluated') | trim }}"
      - "========================================================"
    tags: [execute]

  always:
  - name: "Restore - No action needed"
    ansible.builtin.debug:
      msg: "Restore phase intentionally empty – backup remains for manual rollback"
    tags: [restore]
