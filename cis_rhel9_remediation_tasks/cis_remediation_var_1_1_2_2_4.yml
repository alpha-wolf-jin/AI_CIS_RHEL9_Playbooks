checkpoint_id: "cis_1_1_2_2_4"
state_guard_dir: "/usr/local/bin/cis/.cis_state_guard/{{ checkpoint_id }}"
state_guard_flag: "{{ state_guard_dir }}/checkpoint.flag"
mount_point: "/dev/shm"
fstab_file: "/etc/fstab"
mount_option: "noexec"
req_01: "Verify that a separate partition exists for /dev/shm by checking /etc/fstab or running: `mount | grep /dev/shm`. Expected result: an entry for /dev/shm is present."
req_02: "Edit the /etc/fstab file and add noexec to the fourth field (mounting options) for the /dev/shm partition. Example: tmpfs /dev/shm tmpfs defaults,rw,nosuid,nodev,noexec,relatime 0 0. Expected result: the noexec option is included in the mount options for /dev/shm."
req_03: "Apply the remount of /dev/shm with the configured options using command: `mount -o remount /dev/shm`. Expected result: /dev/shm is remounted with the noexec option."
req_04: "Verify that the noexec option is set on /dev/shm using command: `mount | grep /dev/shm`. Expected result: the output includes 'noexec' in the mount options."
