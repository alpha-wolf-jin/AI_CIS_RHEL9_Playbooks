playbook_name: "cis_1_1_2_2_4"
backup_dir: "/var/log/ai-playbooks-backup/{{ playbook_name }}"
req_01: "Verify that a separate partition exists for /dev/shm by checking /etc/fstab or running: `mount | grep /dev/shm`. Expected result: an entry for /dev/shm is present."
req_02: "Edit the /etc/fstab file and add noexec to the fourth field (mounting options) for the /dev/shm partition. Example: `tmpfs /dev/shm tmpfs defaults,rw,nosuid,nodev,noexec,relatime 0 0`. Expected result: the noexec option is included in the fstab entry."
req_03: "Remount /dev/shm with the configured options using command: `mount -o remount /dev/shm`. Expected result: /dev/shm is remounted with noexec option."
req_04: "Verify that the noexec option is active on /dev/shm using command: `mount | grep /dev/shm`. Expected result: the output includes 'noexec'."
req_05: "Store the final remediation result in a variable named 'cis_result' using set_fact. Set cis_result to the overall remediation status (PASS/FAIL/SKIP/ERROR) derived from the last requirement's status variable."
