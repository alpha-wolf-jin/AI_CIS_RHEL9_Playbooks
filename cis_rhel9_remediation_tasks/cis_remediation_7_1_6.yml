---
- name: Initialize meta data variables
  include_vars: cis_remediation_var_7_1_6.yml

- name: "Snapshot - Create backup directory"
  ansible.builtin.file:
    path: "{{ backup_dir }}"
    state: directory
    mode: '0700'
  tags: [snapshot]
- name: "Snapshot - Check if config file exists"
  ansible.builtin.stat:
    path: "{{ target_file }}"
  register: _snapshot_stat
  tags: [snapshot]
- name: "Snapshot - Backup config file if exists"
  ansible.builtin.copy:
    src: "{{ target_file }}"
    dest: "{{ backup_dir }}/shadow-.backup"
    remote_src: true
  when: _snapshot_stat.stat.exists | default(false)
  failed_when: false
  tags: [snapshot]

- block:
  - name: "Req 01 - Set ownership of {{ target_file }} to {{ expected_owner }}:{{ expected_group }}"
    ansible.builtin.file:
      path: "{{ target_file }}"
      owner: "{{ expected_owner }}"
      group: "{{ expected_group }}"
    register: result_01
    failed_when: false
    tags: [execute]

  - name: "Req 02 - Set permissions of {{ target_file }} to {{ expected_mode }}"
    ansible.builtin.file:
      path: "{{ target_file }}"
      mode: "{{ expected_mode }}"
    register: result_02
    failed_when: false
    tags: [execute]

  - name: "Req 03 - Verify ownership and permissions of {{ target_file }}"
    ansible.builtin.shell: "stat -c '%U:%G %a' {{ target_file }}"
    args:
      executable: /bin/bash
    register: result_03
    failed_when: false
    changed_when: false
    tags: [execute]

  - name: "Store requirement details"
    set_fact:
      task_01_name: "Set ownership of {{ target_file }} to {{ expected_owner }}:{{ expected_group }}"
      task_01_cmd: "chown {{ expected_owner }}:{{ expected_group }} {{ target_file }}"
      task_01_rc: "{{ 0 if result_01 is not failed else 1 }}"
      data_01: "{{ result_01.owner | default('') }}:{{ result_01.group | default('') }}"
      status_01: "{{ 'PASS' if result_01 is not failed else 'FAIL' }}"
      details_01: "{{ 'Ownership set successfully' if result_01 is not failed else 'Failed to set ownership: ' + result_01.msg | default('unknown error') }}"
      task_02_name: "Set permissions of {{ target_file }} to {{ expected_mode }}"
      task_02_cmd: "chmod {{ expected_mode }} {{ target_file }}"
      task_02_rc: "{{ 0 if result_02 is not failed else 1 }}"
      data_02: "{{ result_02.mode | default('') }}"
      status_02: "{{ 'PASS' if result_02 is not failed else 'FAIL' }}"
      details_02: "{{ 'Permissions set successfully' if result_02 is not failed else 'Failed to set permissions: ' + result_02.msg | default('unknown error') }}"
      task_03_name: "Verify ownership and permissions of {{ target_file }}"
      task_03_cmd: "stat -c '%U:%G %a' {{ target_file }}"
      task_03_rc: "{{ result_03.rc | default(-1) }}"
      data_03: "{{ result_03.stdout | default('') | trim }}"
      status_03: "{{ 'PASS' if (result_03.stdout | default('') | trim) == 'root:root 0' else 'FAIL' }}"
      details_03: "{{ 'Verification passed: ' + (result_03.stdout | default('') | trim) if (result_03.stdout | default('') | trim) == 'root:root 0' else 'Verification failed: expected root:root 0, got ' + (result_03.stdout | default('') | trim) }}"
    tags: [execute]

  - name: "Set overall cis_result"
    set_fact:
      cis_result: "{{ status_03 }}"
    tags: [execute]

  - name: "Generate remediation report"
    debug:
      msg:
      - "========================================================"
      - "        REMEDIATION REPORT — CIS 7.1.6"
      - "========================================================"
      - "Reference: CIS Benchmark checkpoint 7.1.6"
      - ""
      - "REQUIREMENT 01 - {{ req_01 }}:"
      - "  Task: {{ task_01_name | default('Task not recorded') }}"
      - "  Command: {{ task_01_cmd | default('N/A') }}"
      - "  Exit code: {{ task_01_rc | default(-1) }}"
      - "  Data: {{ data_01 | default('') }}"
      - "  Status: {{ status_01 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_01 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 02 - {{ req_02 }}:"
      - "  Task: {{ task_02_name | default('Task not recorded') }}"
      - "  Command: {{ task_02_cmd | default('N/A') }}"
      - "  Exit code: {{ task_02_rc | default(-1) }}"
      - "  Data: {{ data_02 | default('') }}"
      - "  Status: {{ status_02 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_02 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 03 - {{ req_03 }}:"
      - "  Task: {{ task_03_name | default('Task not recorded') }}"
      - "  Command: {{ task_03_cmd | default('N/A') }}"
      - "  Exit code: {{ task_03_rc | default(-1) }}"
      - "  Data: {{ data_03 | default('') | trim }}"
      - "  Status: {{ status_03 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_03 | default('Not evaluated') | trim }}"
      - ""
      - "========================================================"
      - "OVERALL REMEDIATION:"
      - "  Result: {{ cis_result | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_03 | default('Not evaluated') | trim }}"
      - "========================================================"
    tags: [execute]

  always:
  - name: "Restore - Check if backup exists"
    ansible.builtin.stat:
      path: "{{ backup_dir }}/shadow-.backup"
    register: _restore_stat
    failed_when: false
    tags: [restore]

  - name: "Restore - Overwrite with original"
    ansible.builtin.copy:
      src: "{{ backup_dir }}/shadow-.backup"
      dest: "{{ target_file }}"
      remote_src: true
    when: _restore_stat.stat.exists | default(false)
    failed_when: false
    tags: [restore]

  - name: "Restore - Remove backup directory"
    ansible.builtin.file:
      path: "{{ backup_dir }}"
      state: absent
    failed_when: false
    tags: [restore]
