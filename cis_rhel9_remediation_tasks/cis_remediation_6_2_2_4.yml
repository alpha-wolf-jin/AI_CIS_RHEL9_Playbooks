---
- name: Initialize meta data variables
  include_vars: cis_remediation_var_6_2_2_4.yml

- name: "Snapshot - Create backup directory"
  ansible.builtin.file:
    path: "{{ backup_dir }}"
    state: directory
    mode: '0700'
  tags: [snapshot]
- name: "Snapshot - Check if config file exists"
  ansible.builtin.stat:
    path: "{{ config_file }}"
  register: _snap_config_stat
  tags: [snapshot]
- name: "Snapshot - Backup config file if exists"
  ansible.builtin.copy:
    src: "{{ config_file }}"
    dest: "{{ backup_dir }}/60-journald.conf.present"
    remote_src: true
  when: _snap_config_stat.stat.exists | default(false)
  tags: [snapshot]

- block:
  - name: "Req 01 - Check if systemd-journald is installed"
    ansible.builtin.package_facts:
      manager: auto
    failed_when: false
    tags: [execute]

  - name: "Req 01 - Set skip fact if systemd-journald not installed"
    ansible.builtin.set_fact:
      playbook_skipped: "{{ 'systemd' not in ansible_facts.packages }}"
    tags: [execute]

  - name: "Req 01 - Ensure config directory exists"
    ansible.builtin.file:
      path: "{{ config_dir }}"
      state: directory
      mode: '0755'
    when: "not (playbook_skipped | default(false) | bool)"
    failed_when: false
    tags: [execute]

  - name: "Req 01 - Check if Journal section exists in config"
    ansible.builtin.shell: |
      grep -Psq -- '^\h*\[{{ config_section }}\]' "{{ config_file }}" 2>/dev/null && echo "FOUND" || echo "NOT_FOUND"
    args:
      executable: /bin/bash
    register: _section_check
    failed_when: false
    changed_when: false
    when: "not (playbook_skipped | default(false) | bool)"
    tags: [execute]

  - name: "Req 01 - Append Storage parameter when section exists"
    ansible.builtin.lineinfile:
      path: "{{ config_file }}"
      line: "{{ config_param }}"
      regexp: '^Storage='
      state: present
      create: yes
      mode: '0644'
    register: _lineinfile_result
    failed_when: false
    when:
    - "not (playbook_skipped | default(false) | bool)"
    - "_section_check.stdout | default('') == 'FOUND'"
    tags: [execute]

  - name: "Req 01 - Create config with section and parameter when section missing"
    ansible.builtin.blockinfile:
      path: "{{ config_file }}"
      block: |
        [{{ config_section }}]
        {{ config_param }}
      create: yes
      mode: '0644'
    register: _blockinfile_result
    failed_when: false
    when:
    - "not (playbook_skipped | default(false) | bool)"
    - "_section_check.stdout | default('') == 'NOT_FOUND'"
    tags: [execute]

  - name: "Req 01 - Reload systemd-journald service"
    ansible.builtin.shell: "systemctl reload-or-restart {{ service_name }}"
    args:
      executable: /bin/bash
    register: _service_reload
    failed_when: false
    when: "not (playbook_skipped | default(false) | bool)"
    tags: [execute]

  - name: "Req 02 - Verify Storage parameter is set to persistent"
    ansible.builtin.shell: |
      if grep -Psiq -- '^\s*Storage\s*=\s*persistent' "{{ config_file }}" 2>/dev/null; then
        echo "PASS: Storage=persistent is configured"
      else
        echo "FAIL: Storage=persistent is not configured"
      fi
    args:
      executable: /bin/bash
    register: result_02
    failed_when: false
    changed_when: false
    when: "not (playbook_skipped | default(false) | bool)"
    tags: [execute]

  - name: "Store requirement 02 details"
    ansible.builtin.set_fact:
      task_02_name: "Verify Storage parameter is set to persistent"
      task_02_cmd: |
        grep -Psiq -- '^\\s*Storage\\s*=\\s*persistent' {{ config_file }}
      task_02_rc: "{{ result_02.rc | default(-1) }}"
      data_02: "{{ result_02.stdout | default('') | trim }}"
      status_02: "{{ ('PASS' if (result_02.stdout | default('') | trim) == 'PASS: Storage=persistent is configured' else 'FAIL') | trim }}"
      details_02: "{{ ('Storage=persistent is properly configured' if (result_02.stdout | default('') | trim) == 'PASS: Storage=persistent is configured' else 'Storage=persistent is not configured or check skipped') | trim }}"
    tags: [execute]

# Explicitly store the overall remediation result in cis_result
  - name: "Req 03 - Store overall remediation status in cis_result"
    ansible.builtin.set_fact:
      cis_result: "{{ status_02 | default('UNKNOWN') | trim }}"
    tags: [execute]

  - name: "Req 03 - Generate remediation report"
    ansible.builtin.debug:
      msg:
      - "========================================================"
      - "        REMEDIATION REPORT — CIS 6.2.2.4"
      - "========================================================"
      - "Reference: CIS Benchmark checkpoint 6.2.2.4"
      - ""
      - "REQUIREMENT 01 - {{ req_01 }}:"
      - "  Task: Configure Storage=persistent in journald config"
      - "  Command: lineinfile/blockinfile + systemctl reload-or-restart"
      - "  Exit code: {{ _service_reload.rc | default(0) }}"
      - "  Data: Config file {{ config_file }} updated"
      - "  Status: {{ 'PASS' if not (playbook_skipped | default(false) | bool) else 'SKIP' }}"
      - "  Details: {{ 'Configuration applied successfully' if not (playbook_skipped | default(false) | bool) else 'systemd-journald not installed' }}"
      - ""
      - "REQUIREMENT 02 - {{ req_02 }}:"
      - "  Task: {{ task_02_name | default('Task not recorded') }}"
      - "  Command: {{ task_02_cmd | default('N/A') }}"
      - "  Exit code: {{ task_02_rc | default(-1) }}"
      - "  Data: {{ data_02 | default('Data collection failed') | trim }}"
      - "  Status: {{ status_02 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_02 | default('Not evaluated') | trim }}"
      - ""
      - "========================================================"
      - "OVERALL REMEDIATION:"
      - "  Result: {{ cis_result | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_02 | default('Not evaluated') | trim }}"
      - "========================================================"
    tags: [execute]

  always:
  - name: "Restore - Check if backup exists"
    ansible.builtin.stat:
      path: "{{ backup_dir }}/60-journald.conf.present"
    register: _restore_backup_stat
    failed_when: false
    tags: [restore]

  - name: "Restore - Overwrite with original config"
    ansible.builtin.copy:
      src: "{{ backup_dir }}/60-journald.conf.present"
      dest: "{{ config_file }}"
      remote_src: true
    when: _restore_backup_stat.stat.exists | default(false)
    failed_when: false
    tags: [restore]

  - name: "Restore - Reload systemd-journald after config restore"
    ansible.builtin.shell: "systemctl reload-or-restart systemd-journald"
    when: _restore_backup_stat.stat.exists | default(false)
    failed_when: false
    tags: [restore]

  - name: "Restore - Remove config if newly created"
    ansible.builtin.file:
      path: "{{ config_file }}"
      state: absent
    when: not _restore_backup_stat.stat.exists | default(false)
    failed_when: false
    tags: [restore]

  - name: "Restore - Remove backup directory"
    ansible.builtin.file:
      path: "{{ backup_dir }}"
      state: absent
    failed_when: false
    tags: [restore]
