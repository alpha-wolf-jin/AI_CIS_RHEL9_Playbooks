---
- name: Initialize meta data variables
  include_vars: cis_remediation_var_6_3_3_15.yml

- name: "Snapshot - Create backup directory"
  ansible.builtin.file:
    path: "{{ backup_dir }}"
    state: directory
    mode: '0700'
  tags: [snapshot]
- name: "Snapshot - Check if audit rules file exists"
  ansible.builtin.stat:
    path: "{{ audit_rules_file }}"
  register: _snap_rules_stat
  tags: [snapshot]
- name: "Snapshot - Backup audit rules file if exists"
  ansible.builtin.copy:
    src: "{{ audit_rules_file }}"
    dest: "{{ backup_dir }}/50-perm_chng.rules.orig"
    remote_src: true
  when: "_snap_rules_stat.stat.exists | default(false)"
  failed_when: false
  tags: [snapshot]
- name: "Snapshot - Record whether audit rules file existed"
  ansible.builtin.copy:
    content: "{{ _snap_rules_stat.stat.exists | default(false) }}"
    dest: "{{ backup_dir }}/rules_existed"
  tags: [snapshot]

- name: "Req 01 - Check if auditd package is installed"
  ansible.builtin.package_facts:
    manager: auto
  failed_when: false
  tags: [execute]
- name: "Req 01 - Set auditd installed fact"
  ansible.builtin.set_fact:
    auditd_installed: "{{ 'audit' in ansible_facts.packages }}"
  tags: [execute]
- name: "Req 01 - Ensure audit rules directory exists"
  ansible.builtin.file:
    path: "/etc/audit/rules.d"
    state: directory
    mode: '0750'
  when: "auditd_installed | default(false) | bool"
  failed_when: false
  tags: [execute]
- name: "Req 01 - Get UID_MIN from /etc/login.defs"
  ansible.builtin.shell: |
    awk '/^\s*UID_MIN/{print $2}' /etc/login.defs
  args:
    executable: /bin/bash
  register: uid_min_result
  failed_when: false
  changed_when: false
  when: "auditd_installed | default(false) | bool"
  tags: [execute]
- name: "Req 01 - Ensure audit rule for chcon command in rules file (idempotent)"
  ansible.builtin.lineinfile:
    path: "{{ audit_rules_file }}"
    regexp: '^ *-a always,exit -F path={{ audit_binary | regex_escape() }} -F perm=x -F auid>=.* -F auid!=unset -k {{ audit_key }}$'
    line: "-a always,exit -F path={{ audit_binary }} -F perm=x -F auid>={{ uid_min_result.stdout | trim }} -F auid!=unset -k {{ audit_key }}"
    create: yes
    mode: '0640'
  register: result_01_rule
  when:
  - "auditd_installed | default(false) | bool"
  - "uid_min_result.stdout | default('') | trim | length > 0"
  failed_when: false
  tags: [execute]
- name: "Req 01 - Load audit rules with augenrules"
  ansible.builtin.shell: augenrules --load
  args:
    executable: /bin/bash
  register: result_01_load
  failed_when: false
  when: "auditd_installed | default(false) | bool"
  tags: [execute]
- name: "Req 01 - Check if reboot is required"
  ansible.builtin.shell: |
    set -o pipefail
    if [[ $(auditctl -s | grep "enabled") =~ "2" ]]; then
      echo "Reboot required to load rules"
    else
      echo "No reboot required"
    fi
  args:
    executable: /bin/bash
  register: result_01_reboot
  failed_when: false
  when: "auditd_installed | default(false) | bool"
  tags: [execute]
- name: "Req 01 - Reboot if required"
  ansible.builtin.reboot:
    reboot_timeout: 180
  when:
  - "auditd_installed | default(false) | bool"
  - "'Reboot required' in result_01_reboot.stdout | default('')"
  tags: [execute]
- name: "Req 02 - Verify chcon audit rules are loaded"
  ansible.builtin.shell: |
    set -o pipefail
    auditctl -l | grep -E 'path={{ audit_binary }}.*key={{ audit_key }}' || echo 'VERIFY_FAILED'
  args:
    executable: /bin/bash
  register: result_02
  failed_when: false
  when: "auditd_installed | default(false) | bool"
  tags: [execute]
- name: "Store requirement 01 details"
  ansible.builtin.set_fact:
    task_01_name: "Ensure audit rule for chcon and load rules"
    task_01_cmd: "lineinfile + augenrules --load"
    task_01_rc: "{{ result_01_load.rc | default(-1) }}"
    data_01: "{{ result_01_load.stdout | default('') | trim }}"
    status_01: "{{ ('SKIPPED' if not (auditd_installed | default(false) | bool) else ('FAIL' if (uid_min_result.stdout | default('') | trim | length == 0) else ('PASS' if (result_01_load.rc | default(-1)) == 0 else 'FAIL'))) | trim }}"
    details_01: "{{ ('auditd not installed - skipped' if not (auditd_installed | default(false) | bool) else ('UID_MIN not set, cannot add audit rule' if (uid_min_result.stdout | default('') | trim | length == 0) else ('Audit rule added and loaded successfully' if (result_01_load.rc | default(-1)) == 0 else 'Failed to load audit rules'))) | trim }}"
  tags: [execute]
- name: "Store requirement 02 details"
  ansible.builtin.set_fact:
    task_02_name: "Verify chcon audit rules with auditctl"
    task_02_cmd: "auditctl -l | grep -E 'path={{ audit_binary }}.*key={{ audit_key }}'"
    task_02_rc: "{{ result_02.rc | default(-1) }}"
    data_02: "{{ result_02.stdout | default('') | trim }}"
    status_02: "{{ 'SKIPPED' if not (auditd_installed | default(false) | bool) else ('PASS' if 'VERIFY_FAILED' not in (result_02.stdout | default('')) else 'FAIL') }}"
    details_02: "{{ 'auditd not installed - skipped' if not (auditd_installed | default(false) | bool) else ('chcon audit rule is active' if 'VERIFY_FAILED' not in (result_02.stdout | default('')) else 'chcon audit rule NOT found in active rules') }}"
  tags: [execute]
- name: "Req 03 - Store overall remediation result in cis_result"
  ansible.builtin.set_fact:
    cis_result: "{{ status_02 | default('ERROR') | trim }}"
  tags: [execute]
- name: "Store requirement 03 details"
  ansible.builtin.set_fact:
    task_03_name: "Store final remediation result in cis_result"
    task_03_cmd: "set_fact cis_result = {{ cis_result }}"
    task_03_rc: 0
    data_03: "{{ cis_result | default('ERROR') }}"
    status_03: "PASS"
    details_03: "cis_result successfully stored"
  tags: [execute]
- name: "Generate remediation report"
  ansible.builtin.debug:
    msg:
    - "REMEDIATION REPORT — CIS 6.3.3.15"
    - "Reference: CIS Benchmark checkpoint 6.3.3.15"
    - ""
    - "REQUIREMENT 01 - {{ req_01 }}:"
    - "  Task: {{ task_01_name | default('Task not recorded') }}"
    - "  Command: {{ task_01_cmd | default('N/A') }}"
    - "  Exit code: {{ task_01_rc | default(-1) }}"
    - "  Data: {{ data_01 | default('') | trim }}"
    - "  Status: {{ status_01 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_01 | default('Not evaluated') | trim }}"
    - ""
    - "REQUIREMENT 02 - {{ req_02 }}:"
    - "  Task: {{ task_02_name | default('Task not recorded') }}"
    - "  Command: {{ task_02_cmd | default('N/A') }}"
    - "  Exit code: {{ task_02_rc | default(-1) }}"
    - "  Data: {{ data_02 | default('') | trim }}"
    - "  Status: {{ status_02 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_02 | default('Not evaluated') | trim }}"
    - ""
    - "REQUIREMENT 03 - {{ req_03 }}:"
    - "  Task: {{ task_03_name | default('Task not recorded') }}"
    - "  Command: {{ task_03_cmd | default('N/A') }}"
    - "  Exit code: {{ task_03_rc | default(-1) }}"
    - "  Data: {{ data_03 | default('') | trim }}"
    - "  Status: {{ status_03 | default('UNKNOWN') | trim }}"
    - "  Details: {{ details_03 | default('Not evaluated') | trim }}"
    - ""
    - "OVERALL REMEDIATION:"
    - "  Result: {{ cis_result | default('ERROR') | trim }}"
    - "  Details: {{ details_02 | default('Not evaluated') | trim }}"
  tags: [execute]
- name: "Store requirement 04 details"
  ansible.builtin.set_fact:
    task_04_name: "Generate remediation report"
    task_04_cmd: "debug msg"
    task_04_rc: 0
    data_04: "Report generated"
    status_04: "PASS"
    details_04: "Remediation report successfully displayed"
  tags: [execute]
