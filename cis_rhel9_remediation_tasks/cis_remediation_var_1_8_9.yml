playbook_name: "cis_1_8_9_remediation"
backup_dir: "/var/log/ai-playbooks-backup/{{ playbook_name }}"
req_02: "VERIFY: Run audit check to confirm Ensure GDM autorun-never is not overridden is properly configured. Expected result: System is compliant"
req_03: "Store the final remediation result in a variable named 'cis_result' using set_fact. Set cis_result to the overall remediation status (PASS/FAIL/SKIP/ERROR) derived from the last requirement's status variable."
remediate_script: "/tmp/cis_1_8_9_remediate.sh"
remediate_script_content: |
  {% raw %}
  #!/usr/bin/env bash
  {
     l_pkgoutput=""
     if command -v dpkg-query > /dev/null 2>&1; then
        l_pq="dpkg-query -W"
     elif command -v rpm > /dev/null 2>&1; then
        l_pq="rpm -q"
     fi
     l_pcl="gdm gdm3"
     for l_pn in $l_pcl; do
        $l_pq "$l_pn" > /dev/null 2>&1 && l_pkgoutput="y" && echo -e "\n - Package: \"$l_pn\" exists on the system\n - remediating configuration if needed"
     done
     if [ -n "$l_pkgoutput" ]; then
        # Ensure the dconf database directory exists
        l_kfd="/etc/dconf/db/gdm.d"
        if [ ! -d "$l_kfd" ]; then
           mkdir -p "$l_kfd"
        fi
        # Ensure autorun-never is enabled
        if ! grep -Psril '^\h*autorun-never\b' "$l_kfd"/*.d 2>/dev/null; then
           echo -e '\n[org/gnome/desktop/media-handling]\nautorun-never=true' > "$l_kfd/00-media-autorun"
        fi
        # Create lock file
        l_lockdir="$l_kfd/locks"
        [ ! -d "$l_lockdir" ] && mkdir -p "$l_lockdir"
        if ! grep -Pril '^\h*\/org\/gnome\/desktop\/media-handling\/autorun-never\b' "$l_lockdir" 2>/dev/null; then
           {
              echo -e '\n# Lock desktop media-handling autorun-never setting'
              echo '/org/gnome/desktop/media-handling/autorun-never'
           } >> "$l_lockdir/00-media-autorun"
        fi
        dconf update
        # Run audit to confirm
        l_output="" l_output2=""
        l_kfd="/etc/dconf/db/$(grep -Psril '^\h*autorun-never\b' /etc/dconf/db/*/ | awk -F'/' '{split($(NF-1),a,".");print a[1]}').d"
        if [ -d "$l_kfd" ]; then
           if grep -Priq '^\h*\/org\/gnome\/desktop\/media-handling\/autorun-never\b' "$l_kfd"; then
              l_output="$l_output\n - \"autorun-never\" is locked in \"$(grep -Pril '^\h*\/org\/gnome\/desktop\/media-handling\/autorun-never\b' "$l_kfd")\""
           else
              l_output2="$l_output2\n - \"autorun-never\" is not locked"
           fi
        else
           l_output2="$l_output2\n - \"autorun-never\" is not set so it can not be locked"
        fi
        if [ -z "$l_output2" ]; then
           echo -e "\n- Audit Result:\n  ** PASS **\n$l_output\n"
        else
           echo -e "\n- Audit Result:\n  ** FAIL **\n - Reason(s) for audit failure:\n$l_output2\n"
           [ -n "$l_output" ] && echo -e "\n- Correctly set:\n$l_output\n"
        fi
     else
        echo -e " - GNOME Desktop Manager package is not installed on the system\n  - Recommendation is not applicable"
     fi
  }
  {% endraw %}
