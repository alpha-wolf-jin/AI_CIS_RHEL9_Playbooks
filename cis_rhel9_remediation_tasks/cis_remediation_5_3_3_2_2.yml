---
- name: Initialize meta data variables
  include_vars: cis_remediation_var_5_3_3_2_2.yml

- name: "State Guard - Check for existing checkpoint"
  ansible.builtin.stat:
    path: "{{ state_guard_flag }}"
  register: _sg_flag
  tags: [snapshot]
- name: "State Guard - Restore pwquality.conf from prior checkpoint"
  ansible.builtin.copy:
    src: "{{ state_guard_dir }}/pwquality.conf.present"
    dest: "{{ pwquality_conf }}"
    remote_src: true
  when: _sg_flag.stat.exists
  failed_when: false
  tags: [snapshot]
- name: "State Guard - Restore pwquality.conf.d directory from prior checkpoint"
  ansible.builtin.shell: |
    if [ -d "{{ state_guard_dir }}/pwquality.conf.d" ]; then
      rm -rf {{ pwquality_conf_d }}/*
      cp -r "{{ state_guard_dir }}/pwquality.conf.d/"* {{ pwquality_conf_d }}/
    fi
  args:
    executable: /bin/bash
  when: _sg_flag.stat.exists
  failed_when: false
  tags: [snapshot]
- name: "State Guard - Delete pwquality.conf.d/50-pwlength.conf (from prior run)"
  ansible.builtin.file:
    path: "{{ pwquality_minlen_file }}"
    state: absent
  when: _sg_flag.stat.exists
  failed_when: false
  tags: [snapshot]
- name: "State Guard - Remove old checkpoint"
  ansible.builtin.file:
    path: "{{ state_guard_dir }}"
    state: absent
  when: _sg_flag.stat.exists
  tags: [snapshot]
- name: "State Guard - Create checkpoint directory"
  ansible.builtin.file:
    path: "{{ state_guard_dir }}"
    state: directory
    mode: '0700'
  tags: [snapshot]
- name: "State Guard - Check if pwquality.conf exists"
  ansible.builtin.stat:
    path: "{{ pwquality_conf }}"
  register: _sg_pwquality_stat
  tags: [snapshot]
- name: "State Guard - Backup pwquality.conf"
  ansible.builtin.copy:
    src: "{{ pwquality_conf }}"
    dest: "{{ state_guard_dir }}/pwquality.conf.present"
    remote_src: true
  when: _sg_pwquality_stat.stat.exists
  tags: [snapshot]
- name: "State Guard - Check if pwquality.conf.d directory exists"
  ansible.builtin.stat:
    path: "{{ pwquality_conf_d }}"
  register: _sg_pwquality_d_stat
  tags: [snapshot]
- name: "State Guard - Backup pwquality.conf.d directory"
  ansible.builtin.shell: |
    mkdir -p "{{ state_guard_dir }}/pwquality.conf.d"
    if [ -d "{{ pwquality_conf_d }}" ]; then
      cp -r "{{ pwquality_conf_d }}/"* "{{ state_guard_dir }}/pwquality.conf.d/" 2>/dev/null || true
    fi
  args:
    executable: /bin/bash
  when: _sg_pwquality_d_stat.stat.exists and _sg_pwquality_d_stat.stat.isdir
  failed_when: false
  tags: [snapshot]
- name: "State Guard - Mark 50-pwlength.conf as absent if not present"
  ansible.builtin.stat:
    path: "{{ pwquality_minlen_file }}"
  register: _sg_minlen_stat
  tags: [snapshot]
- name: "State Guard - Create absent marker for 50-pwlength.conf"
  ansible.builtin.copy:
    content: "absent"
    dest: "{{ state_guard_dir }}/50-pwlength.conf.absent"
  when: not _sg_minlen_stat.stat.exists
  tags: [snapshot]
- name: "State Guard - Create checkpoint flag"
  ansible.builtin.copy:
    content: "checkpoint"
    dest: "{{ state_guard_flag }}"
  tags: [snapshot]

- block:
        # === EXECUTE PHASE ===

  - name: "Req 01 - Check if pam_pwquality package is installed"
    ansible.builtin.package_facts:
      manager: auto
    failed_when: false
    tags: [execute]

  - name: "Req 01 - Set skip fact if pam_pwquality not installed"
    ansible.builtin.set_fact:
      playbook_skipped: "{{ 'libpwquality' not in ansible_facts.packages }}"
    tags: [execute]

  - name: "Req 01 - Ensure pwquality.conf.d directory exists"
    ansible.builtin.file:
      path: "{{ pwquality_conf_d }}"
      state: directory
      mode: '0755'
    when: "not playbook_skipped"
    failed_when: false
    tags: [execute]

  - name: "Req 01 - Comment out existing minlen lines in pwquality.conf"
    ansible.builtin.replace:
      path: "{{ pwquality_conf }}"
      regexp: |
        ^(\s*minlen\s*=)
      replace: |
        # \1
    when: "not playbook_skipped"
    failed_when: false
    tags: [execute]

  - name: "Req 01 - Set minlen in pwquality.conf.d/50-pwlength.conf"
    ansible.builtin.lineinfile:
      path: "{{ pwquality_minlen_file }}"
      regexp: |
        ^\s*minlen\s*=
      line: "minlen = {{ minlen_value }}"
      create: true
      mode: '0644'
    when: "not playbook_skipped"
    failed_when: false
    tags: [execute]

  - name: "Req 01 - Remove minlen from pam_pwquality.so in PAM files"
    ansible.builtin.shell: |
      for l_pam_file in system-auth password-auth; do
        l_authselect_file="/etc/authselect/$(head -1 /etc/authselect/authselect.conf | grep 'custom/')/$l_pam_file"
        if [ -f "$l_authselect_file" ]; then
          sed -ri 's/(^\s*password\s+(requisite|required|sufficient)\s+pam_pwquality\.so.*)(\s+minlen\s*=\s*[0-9]+)(.*$)/\1\4/' "$l_authselect_file"
        fi
      done
      authselect apply-changes
    args:
      executable: /bin/bash
    register: result_01_pam
    when: "not playbook_skipped"
    failed_when: false
    tags: [execute]

# Requirement 2: VERIFY
  - name: "Req 02 - Verify minlen is set to 14 or more in pwquality config"
    ansible.builtin.shell: |
      VALUE=$(grep -rh '^\s*minlen\s*=' {{ pwquality_conf }} {{ pwquality_conf_d }}/ 2>/dev/null | sed -r 's/.*=\s*([0-9]+).*/\1/' | head -1)
      if [ -n "$VALUE" ] && [ "$VALUE" -ge {{ minlen_value }} ]; then
        echo "COMPLIANT: minlen=$VALUE"
      elif [ -n "$VALUE" ]; then
        echo "NONCOMPLIANT: minlen=$VALUE (expected >= {{ minlen_value }})"
      else
        echo "NOT_FOUND"
      fi
    args:
      executable: /bin/bash
    register: result_02_pwquality
    failed_when: false
    changed_when: false
    tags: [execute]

  - name: "Req 02 - Verify minlen is not set in pam_pwquality.so PAM module"
    ansible.builtin.shell: |
      l_pam_profile="$(head -1 /etc/authselect/authselect.conf 2>/dev/null | grep 'custom/')"
      if [ -n "$l_pam_profile" ]; then
        if grep -E '^\s*password\s+.*pam_pwquality\.so.*minlen' "/etc/authselect/$l_pam_profile/system-auth" "/etc/authselect/$l_pam_profile/password-auth" 2>/dev/null; then
          echo "FOUND_IN_PAM"
        else
          echo "NOT_FOUND_IN_PAM"
        fi
      else
        echo "NO_CUSTOM_PROFILE"
      fi
    args:
      executable: /bin/bash
    register: result_02_pam
    failed_when: false
    changed_when: false
    tags: [execute]

  - name: "Req 02 - Store verification details"
    ansible.builtin.set_fact:
      data_02: "pwquality: {{ result_02_pwquality.stdout | default('') | trim }} | PAM: {{ result_02_pam.stdout | default('') | trim }}"
      status_02: "{{ 'PASS' if ('COMPLIANT' in (result_02_pwquality.stdout | default('')) and 'NOT_FOUND_IN_PAM' in (result_02_pam.stdout | default(''))) else 'FAIL' }}"
      details_02: "{{ 'System is compliant' if ('COMPLIANT' in (result_02_pwquality.stdout | default('')) and 'NOT_FOUND_IN_PAM' in (result_02_pam.stdout | default(''))) else 'System is NOT compliant' }}"
      task_02_name: "Verify password length configuration"
      task_02_cmd: "grep minlen in pwquality configs and PAM files"
      task_02_rc: "{{ 0 if ('COMPLIANT' in (result_02_pwquality.stdout | default('')) and 'NOT_FOUND_IN_PAM' in (result_02_pam.stdout | default(''))) else 1 }}"
    tags: [execute]

# Requirement 3: Store cis_result
  - name: "Req 03 - Store overall remediation result"
    ansible.builtin.set_fact:
      cis_result: "{{ status_02 }}"
    tags: [execute]

# Requirement 4: Generate remediation report
  - name: "Req 04 - Generate remediation report"
    ansible.builtin.debug:
      msg:
      - "========================================================"
      - "        REMEDIATION REPORT — CIS 5.3.3.2.2"
      - "========================================================"
      - ""
      - "Reference: CIS Benchmark checkpoint 5.3.3.2.2"
      - ""
      - "REQUIREMENT 01 - {{ req_01 }}:"
      - "  Task: Configure minlen in pwquality and clean PAM"
      - "  Command: lineinfile + sed + authselect apply-changes"
      - "  Exit code: {{ result_01_pam.rc | default(-1) }}"
      - "  Data: {{ result_01_pam.stdout | default('') | trim }}"
      - "  Status: {{ 'SKIPPED' if playbook_skipped | default(false) else 'APPLIED' }}"
      - "  Details: {{ 'Skipped - pam_pwquality not installed' if playbook_skipped | default(false) else 'Remediation script executed' }}"
      - ""
      - "REQUIREMENT 02 - {{ req_02 }}:"
      - "  Task: {{ task_02_name | default('Not executed') }}"
      - "  Command: {{ task_02_cmd | default('N/A') }}"
      - "  Exit code: {{ task_02_rc | default(-1) }}"
      - "  Data: {{ data_02 | default('') | trim }}"
      - "  Status: {{ status_02 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_02 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 03 - {{ req_03 }}:"
      - "  Task: Store cis_result variable"
      - "  Command: set_fact cis_result = status_02"
      - "  Exit code: 0"
      - "  Data: {{ cis_result | default('ERROR') | trim }}"
      - "  Status: {{ cis_result | default('ERROR') | trim }}"
      - "  Details: cis_result derived from verification status"
      - ""
      - "REQUIREMENT 04 - {{ req_04 }}:"
      - "  Task: Generate remediation report"
      - "  Command: debug msg"
      - "  Exit code: 0"
      - "  Data: Report generated"
      - "  Status: PASS"
      - "  Details: Report displayed above"
      - ""
      - "========================================================"
      - "OVERALL REMEDIATION:"
      - "  Result: {{ cis_result | default('ERROR') | trim }}"
      - "  Details: {{ details_02 | default('Not evaluated') | trim }}"
      - "========================================================"
    tags: [execute]

  always:
        # === STATE GUARD — RESTORE PHASE ===

  - name: "State Guard Restore - Check if checkpoint exists"
    ansible.builtin.stat:
      path: "{{ state_guard_flag }}"
    register: _sg_restore_flag
    failed_when: false
    tags: [restore]

  - name: "State Guard Restore - Check if pwquality.conf backup exists"
    ansible.builtin.stat:
      path: "{{ state_guard_dir }}/pwquality.conf.present"
    register: _sg_restore_pwquality
    failed_when: false
    tags: [restore]

  - name: "State Guard Restore - Restore pwquality.conf from backup"
    ansible.builtin.copy:
      src: "{{ state_guard_dir }}/pwquality.conf.present"
      dest: "{{ pwquality_conf }}"
      remote_src: true
    when: _sg_restore_pwquality.stat.exists | default(false)
    failed_when: false
    tags: [restore]

  - name: "State Guard Restore - Check if pwquality.conf.d backup exists"
    ansible.builtin.stat:
      path: "{{ state_guard_dir }}/pwquality.conf.d"
    register: _sg_restore_pwquality_d
    failed_when: false
    tags: [restore]

  - name: "State Guard Restore - Restore pwquality.conf.d from backup"
    ansible.builtin.shell: |
      rm -rf {{ pwquality_conf_d }}/*
      cp -r "{{ state_guard_dir }}/pwquality.conf.d/"* {{ pwquality_conf_d }}/
    args:
      executable: /bin/bash
    when: _sg_restore_pwquality_d.stat.exists | default(false) and _sg_restore_pwquality_d.stat.isdir | default(false)
    failed_when: false
    tags: [restore]

  - name: "State Guard Restore - Check for absent marker"
    ansible.builtin.stat:
      path: "{{ state_guard_dir }}/50-pwlength.conf.absent"
    register: _sg_restore_absent
    failed_when: false
    tags: [restore]

  - name: "State Guard Restore - Delete 50-pwlength.conf"
    ansible.builtin.file:
      path: "{{ pwquality_minlen_file }}"
      state: absent
    when: _sg_restore_absent.stat.exists | default(false)
    failed_when: false
    tags: [restore]

  - name: "State Guard Restore - Remove checkpoint"
    ansible.builtin.file:
      path: "{{ state_guard_dir }}"
      state: absent
    when: _sg_restore_flag.stat.exists | default(false)
    failed_when: false
    tags: [restore]
