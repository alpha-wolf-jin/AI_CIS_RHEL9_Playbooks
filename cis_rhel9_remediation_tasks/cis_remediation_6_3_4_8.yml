---
- name: Initialize meta data variables
  include_vars: cis_remediation_var_6_3_4_8.yml

- name: "Snapshot - Create backup directory"
  ansible.builtin.file:
    path: "{{ backup_dir }}"
    state: directory
    mode: '0700'
  tags: [snapshot]
- name: "Snapshot - Capture permissions of audit tools"
  ansible.builtin.shell: "stat -c '%a %n' {{ audit_tools | join(' ') }}"
  args:
    executable: /bin/bash
  register: _snapshot_perms
  failed_when: false
  changed_when: false
  tags: [snapshot]
- name: "Snapshot - Save permissions to backup file"
  ansible.builtin.copy:
    content: "{{ _snapshot_perms.stdout | default('') }}"
    dest: "{{ backup_dir }}/audit_tools_perms.txt"
    mode: '0600'
  tags: [snapshot]

- block:
  - name: "Initialize report variables"
    ansible.builtin.set_fact:
      task_01_name: "Req 01 - Prerequisite check for audit tools"
      task_01_cmd: "which chmod && which /sbin/auditctl /sbin/aureport /sbin/ausearch /sbin/autrace /sbin/auditd /sbin/augenrules"
      task_01_rc: -1
      data_01: "Not collected yet"
      status_01: "UNKNOWN"
      details_01: "Not evaluated"
      task_02_name: "Req 02 - Apply restrictive permissions to audit tools"
      task_02_cmd: "chmod go-w /sbin/auditctl /sbin/aureport /sbin/ausearch /sbin/autrace /sbin/auditd /sbin/augenrules"
      task_02_rc: -1
      data_02: "Not collected yet"
      status_02: "UNKNOWN"
      details_02: "Not evaluated"
      task_03_name: "Req 03 - Verify audit tools mode is configured"
      task_03_cmd: "ls -l /sbin/auditctl /sbin/aureport /sbin/ausearch /sbin/autrace /sbin/auditd /sbin/augenrules"
      task_03_rc: -1
      data_03: "Not collected yet"
      status_03: "UNKNOWN"
      details_03: "Not evaluated"
    tags: [execute]

  - name: "Req 01 - Prerequisite check for audit tools"
    ansible.builtin.shell: "which chmod && which {{ audit_tools | join(' ') }}"
    args:
      executable: /bin/bash
    register: result_01
    failed_when: false
    changed_when: false
    tags: [execute]

  - name: "Store requirement 01 details"
    ansible.builtin.set_fact:
      task_01_rc: "{{ result_01.rc | default(-1) }}"
      data_01: "{{ result_01.stdout | default('') | trim }}"
      status_01: "{{ 'PASS' if (result_01.rc | default(-1)) == 0 else 'FAIL' }}"
      details_01: "{{ 'All audit tools found and chmod available' if (result_01.rc | default(-1)) == 0 else 'Prerequisite check failed - one or more tools missing' }}"
    tags: [execute]

  - name: "Req 02 - Apply restrictive permissions to audit tools"
    ansible.builtin.file:
      path: "{{ item }}"
      mode: "go-w"
    loop: "{{ audit_tools }}"
    register: result_02
    failed_when: false
    when: "status_01 == 'PASS'"
    tags: [execute]

  - name: "Store requirement 02 details"
    ansible.builtin.set_fact:
      task_02_rc: "{{ 0 if result_02 is not skipped else -1 }}"
      data_02: "{{ audit_tools | join(', ') }}"
      status_02: "{{ 'SKIPPED' if result_02 is skipped else ('FAIL' if (result_02.results | default([]) | selectattr('failed') | list | length) > 0 else 'PASS') }}"
      details_02: >-
        {{ 'Skipped - prerequisite check failed' if result_02 is skipped
           else ('Group and others write permissions removed from all audit tools' if 
                 (result_02.results | default([]) | selectattr('failed') | list | length) == 0
                 else 'Failed to remove group/others write from one or more audit tools') }}
    tags: [execute]

  - name: "Req 03 - Verify audit tools mode is configured"
    ansible.builtin.shell: "ls -l {{ audit_tools | join(' ') }}"
    args:
      executable: /bin/bash
    register: result_03
    failed_when: false
    changed_when: false
    tags: [execute]

  - name: "Store requirement 03 status"
    ansible.builtin.set_fact:
      task_03_rc: "{{ result_03.rc | default(-1) }}"
      data_03: "{{ result_03.stdout | default('') | trim }}"
      status_03: >-
        {%- set lines = result_03.stdout_lines | default([]) -%}
        {%- set fail = namespace(value=false) -%}
        {%- for line in lines -%}
          {%- set perms = line.split()[0] -%}
          {%- if perms | length >= 9 and (perms[5] == 'w' or perms[8] == 'w') -%}
            {%- set fail.value = true -%}
          {%- endif -%}
        {%- endfor -%}
        {%- if fail.value -%}
          FAIL
        {%- else -%}
          PASS
        {%- endif -%}
    tags: [execute]

  - name: "Store requirement 03 details"
    ansible.builtin.set_fact:
      details_03: >-
        {{ 'All audit tools have correct permissions (no group/others write)' if status_03 == 'PASS'
           else 'Verification failed - some tools may still have group/others write permissions' }}
    tags: [execute]

  - name: "Set final remediation result"
    ansible.builtin.set_fact:
      cis_result: "{{ status_03 }}"
    tags: [execute]

  - name: "Generate remediation report"
    ansible.builtin.debug:
      msg:
      - "========================================================"
      - "REMEDIATION REPORT — CIS 6.3.4.8"
      - "Reference: CIS Benchmark checkpoint 6.3.4.8"
      - "========================================================"
      - ""
      - "REQUIREMENT 01 - {{ req_01 }}:"
      - "  Task: {{ task_01_name }}"
      - "  Command: {{ task_01_cmd }}"
      - "  Exit code: {{ task_01_rc }}"
      - "  Data: {{ data_01 }}"
      - "  Status: {{ status_01 }}"
      - "  Details: {{ details_01 }}"
      - ""
      - "REQUIREMENT 02 - {{ req_02 }}:"
      - "  Task: {{ task_02_name }}"
      - "  Command: {{ task_02_cmd }}"
      - "  Exit code: {{ task_02_rc }}"
      - "  Data: {{ data_02 }}"
      - "  Status: {{ status_02 }}"
      - "  Details: {{ details_02 }}"
      - ""
      - "REQUIREMENT 03 - {{ req_03 }}:"
      - "  Task: {{ task_03_name }}"
      - "  Command: {{ task_03_cmd }}"
      - "  Exit code: {{ task_03_rc }}"
      - "  Data: {{ data_03 }}"
      - "  Status: {{ status_03 }}"
      - "  Details: {{ details_03 }}"
      - ""
      - "========================================================"
      - "OVERALL REMEDIATION:"
      - "  Result: {{ cis_result }}"
      - "  Details: {{ details_03 }}"
      - "========================================================"
    tags: [execute]

  always:
  - name: "Restore - Check if backup exists"
    ansible.builtin.stat:
      path: "{{ backup_dir }}/audit_tools_perms.txt"
    register: _restore_backup_stat
    failed_when: false
    tags: [restore]

  - name: "Restore - Restore original permissions from backup"
    ansible.builtin.shell: |
      while IFS=' ' read -r perms path; do
        if [ -f "$path" ]; then
          chmod "$perms" "$path"
        fi
      done < "{{ backup_dir }}/audit_tools_perms.txt"
    args:
      executable: /bin/bash
    when: "_restore_backup_stat.stat.exists | default(false)"
    failed_when: false
    tags: [restore]

  - name: "Restore - Remove backup directory"
    ansible.builtin.file:
      path: "{{ backup_dir }}"
      state: absent
    failed_when: false
    tags: [restore]
