---
- name: Initialize meta data variables
  include_vars: cis_remediation_var_2_4_1_4.yml

- name: "Snapshot - Create backup directory"
  ansible.builtin.file:
    path: "{{ backup_dir }}"
    state: directory
    mode: '0700'
  tags: snapshot

- name: "Snapshot - Check if /etc/cron.daily exists"
  ansible.builtin.stat:
    path: /etc/cron.daily
  register: _snap_dir_stat
  tags: snapshot

- name: "Snapshot - Backup /etc/cron.daily metadata"
  ansible.builtin.shell: stat -c '%U:%G %a' /etc/cron.daily/ > "{{ backup_dir }}/cron_daily_attrs"
  args:
    executable: /bin/bash
  when: _snap_dir_stat.stat.exists
  failed_when: false
  tags: snapshot


- block:
  - name: "Initialize data variables"
    ansible.builtin.set_fact:
      data_01: "Not collected yet"
      status_01: "ERROR"
      details_01: "Not evaluated"
      data_02: "Not collected yet"
      status_02: "ERROR"
      details_02: "Not evaluated"
      data_03: "Not collected yet"
      status_03: "ERROR"
      details_03: "Not evaluated"
      data_04: "Not collected yet"
      status_04: "ERROR"
      details_04: "Not evaluated"
      data_05: "Not collected yet"
      status_05: "ERROR"
      details_05: "Not evaluated"
      task_01_name: "Not executed"
      task_01_cmd: "N/A"
      task_01_rc: -1
    tags: execute

  - name: "Req 01 - Check if cron is installed"
    ansible.builtin.shell: which cron || dpkg -l cron 2>/dev/null || rpm -q cron 2>/dev/null
    args:
      executable: /bin/bash
    register: result_01
    failed_when: false
    changed_when: false
    tags: execute

  - name: "Store requirement 01 details"
    ansible.builtin.set_fact:
      task_01_name: "Check if cron is installed"
      task_01_cmd: "which cron || dpkg -l cron 2>/dev/null || rpm -q cron 2>/dev/null"
      task_01_rc: "{{ result_01.rc | default(-1) }}"
      data_01: "{{ result_01.stdout | default('') | trim }}"
      status_01: "{{ ('SKIP' if result_01.rc != 0 else 'PASS') | trim }}"
      details_01: "{{ 'cron is not installed' if result_01.rc != 0 else 'cron is installed' | trim }}"
      cron_installed: "{{ result_01.rc == 0 }}"
    tags: execute

  - name: "Req 02 - Apply ownership root:root to /etc/cron.daily"
    ansible.builtin.file:
      path: /etc/cron.daily/
      owner: root
      group: root
    when: cron_installed | bool
    register: result_02
    failed_when: false
    tags: execute

  - name: "Store requirement 02 details"
    ansible.builtin.set_fact:
      task_02_name: "Set ownership to root:root"
      task_02_cmd: "chown root:root /etc/cron.daily/"
      task_02_rc: "{{ result_02.rc | default(-1) }}"
      data_02: "{{ result_02.msg | default('') | trim }}"
      status_02: "{{ ('SKIP' if not (cron_installed | bool) else ('PASS' if result_02.rc | default(-1) == 0 else 'FAIL')) | trim }}"
      details_02: "{{ 'Skipped: cron not installed' if not (cron_installed | bool) else ('Ownership set to root:root' if result_02.rc | default(-1) == 0 else 'Failed to set ownership') | trim }}"
    tags: execute

  - name: "Req 03 - Apply permissions og-rwx to /etc/cron.daily"
    ansible.builtin.file:
      path: /etc/cron.daily/
      mode: '0700'
    when: cron_installed | bool
    register: result_03
    failed_when: false
    tags: execute

  - name: "Store requirement 03 details"
    ansible.builtin.set_fact:
      task_03_name: "Set permissions to og-rwx"
      task_03_cmd: "chmod og-rwx /etc/cron.daily/"
      task_03_rc: "{{ result_03.rc | default(-1) }}"
      data_03: "{{ result_03.msg | default('') | trim }}"
      status_03: "{{ ('SKIP' if not (cron_installed | bool) else ('PASS' if result_03.rc | default(-1) == 0 else 'FAIL')) | trim }}"
      details_03: "{{ 'Skipped: cron not installed' if not (cron_installed | bool) else ('Permissions set to 700' if result_03.rc | default(-1) == 0 else 'Failed to set permissions') | trim }}"
    tags: execute

  - name: "Req 04 - Verify ownership and permissions"
    ansible.builtin.shell: stat -c '%U:%G %a' /etc/cron.daily/
    args:
      executable: /bin/bash
    register: result_04
    failed_when: false
    changed_when: false
    when: cron_installed | bool
    tags: execute

  - name: "Store requirement 04 details"
    ansible.builtin.set_fact:
      task_04_name: "Verify ownership and permissions"
      task_04_cmd: "stat -c '%U:%G %a' /etc/cron.daily/"
      task_04_rc: "{{ result_04.rc | default(-1) }}"
      data_04: "{{ result_04.stdout | default('') | trim }}"
      status_04: >-
        {%- if not (cron_installed | bool) -%}
          SKIP
        {%- elif result_04.rc | default(-1) == 0 and result_04.stdout | default('') | trim == 'root:root 700' -%}
          PASS
        {%- else -%}
          FAIL
        {%- endif -%}
      details_04: >-
        {%- if not (cron_installed | bool) -%}
          Skipped: cron not installed
        {%- elif result_04.rc | default(-1) == 0 and result_04.stdout | default('') | trim == 'root:root 700' -%}
          Ownership and permissions are correct (root:root 700)
        {%- else -%}
          Verification failed: expected root:root 700, got '{{ result_04.stdout | default('') | trim }}'
        {%- endif -%}
    tags: execute

  - name: "Req 05 - Store final remediation result"
    ansible.builtin.set_fact:
      cis_result: "{{ status_04 | default('ERROR') | trim }}"
      status_05: "N/A"
      details_05: "Result stored in cis_result"
    tags: execute

  - name: "Generate remediation report"
    ansible.builtin.debug:
      msg:
      - "REMEDIATION REPORT — CIS 2.4.1.4"
      - "Reference: CIS Benchmark checkpoint 2.4.1.4"
      - ""
      - "REQUIREMENT 01 - {{ req_01 }}:"
      - "  Task: {{ task_01_name | default('Not recorded') }}"
      - "  Command: {{ task_01_cmd | default('N/A') }}"
      - "  Exit code: {{ task_01_rc | default(-1) }}"
      - "  Data: {{ data_01 | default('') | trim }}"
      - "  Status: {{ status_01 | default('ERROR') | trim }}"
      - "  Details: {{ details_01 | default('') | trim }}"
      - ""
      - "REQUIREMENT 02 - {{ req_02 }}:"
      - "  Task: {{ task_02_name | default('Not recorded') }}"
      - "  Command: {{ task_02_cmd | default('N/A') }}"
      - "  Exit code: {{ task_02_rc | default(-1) }}"
      - "  Data: {{ data_02 | default('') | trim }}"
      - "  Status: {{ status_02 | default('ERROR') | trim }}"
      - "  Details: {{ details_02 | default('') | trim }}"
      - ""
      - "REQUIREMENT 03 - {{ req_03 }}:"
      - "  Task: {{ task_03_name | default('Not recorded') }}"
      - "  Command: {{ task_03_cmd | default('N/A') }}"
      - "  Exit code: {{ task_03_rc | default(-1) }}"
      - "  Data: {{ data_03 | default('') | trim }}"
      - "  Status: {{ status_03 | default('ERROR') | trim }}"
      - "  Details: {{ details_03 | default('') | trim }}"
      - ""
      - "REQUIREMENT 04 - {{ req_04 }}:"
      - "  Task: {{ task_04_name | default('Not recorded') }}"
      - "  Command: {{ task_04_cmd | default('N/A') }}"
      - "  Exit code: {{ task_04_rc | default(-1) }}"
      - "  Data: {{ data_04 | default('') | trim }}"
      - "  Status: {{ status_04 | default('ERROR') | trim }}"
      - "  Details: {{ details_04 | default('') | trim }}"
      - ""
      - "REQUIREMENT 05 - {{ req_05 }}:"
      - "  Task: Store final remediation result"
      - "  Command: set_fact for cis_result"
      - "  Exit code: N/A"
      - "  Data: N/A"
      - "  Status: {{ status_05 | default('ERROR') | trim }}"
      - "  Details: {{ details_05 | default('') | trim }}"
      - ""
      - "OVERALL REMEDIATION:"
      - "  Result: {{ cis_result | default('ERROR') | trim }}"
    tags: execute

  always:
  - name: "Restore - Check if backup exists"
    ansible.builtin.stat:
      path: "{{ backup_dir }}/cron_daily_attrs"
    register: _restore_attrs_stat
    failed_when: false
    tags: restore

  - name: "Restore - Read original metadata"
    ansible.builtin.slurp:
      src: "{{ backup_dir }}/cron_daily_attrs"
    register: _restore_attrs_slurp
    when: _restore_attrs_stat.stat.exists
    failed_when: false
    tags: restore

  - name: "Restore - Apply original ownership and permissions"
    ansible.builtin.shell: |
      ATTRS=$(echo "{{ _restore_attrs_slurp.content | b64decode | trim }}")
      OWNER=$(echo "$ATTRS" | cut -d' ' -f1 | cut -d: -f1)
      GROUP=$(echo "$ATTRS" | cut -d' ' -f1 | cut -d: -f2)
      MODE=$(echo "$ATTRS" | awk '{print $2}')
      chown ${OWNER}:${GROUP} /etc/cron.daily/
      chmod ${MODE} /etc/cron.daily/
    args:
      executable: /bin/bash
    when:
    - _restore_attrs_stat.stat.exists | default(false)
    - _restore_attrs_slurp is not failed
    - _restore_attrs_slurp.content is defined
    failed_when: false
    tags: restore

  - name: "Restore - Remove backup directory"
    ansible.builtin.file:
      path: "{{ backup_dir }}"
      state: absent
    when: _restore_attrs_stat.stat.exists
    failed_when: false
    tags: restore
