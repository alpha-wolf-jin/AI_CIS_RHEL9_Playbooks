---
- name: Initialize meta data variables
  include_vars: cis_remediation_var_5_3_3_3_2.yml

- name: "Snapshot - Create backup directory"
  ansible.builtin.file:
    path: "{{ backup_dir }}"
    state: directory
    mode: '0700'
  tags: [snapshot]
- name: "Snapshot - Check if config file exists"
  ansible.builtin.stat:
    path: "{{ config_file }}"
  register: _snap_stat
  tags: [snapshot]
- name: "Snapshot - Backup config file if exists"
  ansible.builtin.copy:
    src: "{{ config_file }}"
    dest: "{{ backup_dir }}/pwhistory.conf.backup"
    remote_src: true
  when: "_snap_stat.stat.exists | default(false)"
  tags: [snapshot]

- block:
  - name: "Req 01 - Check if pwhistory configuration file exists"
    ansible.builtin.shell: "test -f {{ config_file }}"
    args:
      executable: /bin/bash
    register: result_01
    failed_when: false
    changed_when: false
    tags: [execute]

  - name: "Store requirement 01 details"
    set_fact:
      task_01_name: "Check if pwhistory configuration file exists"
      task_01_cmd: "test -f {{ config_file }}"
      task_01_rc: "{{ result_01.rc | default(-1) }}"
      data_01: "{{ result_01.stdout | default('') | trim }}"
      status_01: "{{ 'PASS' if result_01.rc | default(-1) == 0 else 'FAIL' }}"
      details_01: "{{ 'File exists' if result_01.rc | default(-1) == 0 else 'File not found' }}"
    tags: [execute]

  - name: "Req 02 - Append enforce_for_root to pwhistory configuration"
    ansible.builtin.lineinfile:
      path: "{{ config_file }}"
      line: "enforce_for_root"
      state: present
      create: true
    register: result_02
    failed_when: false
    when: "result_01.rc | default(-1) == 0"
    tags: [execute]

  - name: "Store requirement 02 details"
    set_fact:
      task_02_name: "Append enforce_for_root to pwhistory configuration"
      task_02_cmd: "lineinfile: path={{ config_file }} line=enforce_for_root"
      task_02_rc: "{{ 0 if result_02 is not skipped else -1 }}"
      data_02: "{{ 'enforce_for_root' if result_02 is not skipped else 'N/A' }}"
      status_02: "{{ 'PASS' if result_02 is not skipped and not result_02.failed | default(false) else 'SKIP' if result_02 is skipped else 'FAIL' }}"
      details_02: "{{ 'Line added/confirmed' if result_02 is not skipped and not result_02.failed | default(false) else 'Skipped - prerequisite not met' if result_02 is skipped else 'Failed to apply' }}"
    tags: [execute]

  - name: "Req 03 - Verify enforce_for_root is set in pwhistory configuration"
    ansible.builtin.shell: "grep -q '^enforce_for_root' {{ config_file }}"
    args:
      executable: /bin/bash
    register: result_03
    failed_when: false
    changed_when: false
    tags: [execute]

  - name: "Store requirement 03 details"
    set_fact:
      task_03_name: "Verify enforce_for_root is set in pwhistory configuration"
      task_03_cmd: "grep -q '^enforce_for_root' {{ config_file }}"
      task_03_rc: "{{ result_03.rc | default(-1) }}"
      data_03: "{{ result_03.stdout | default('') | trim }}"
      status_03: "{{ 'PASS' if result_03.rc | default(-1) == 0 else 'FAIL' }}"
      details_03: "{{ 'enforce_for_root is set' if result_03.rc | default(-1) == 0 else 'enforce_for_root not found' }}"
    tags: [execute]

  - name: "Set overall cis_result"
    set_fact:
      cis_result: "{{ status_03 }}"
    tags: [execute]

  - name: "Generate remediation report"
    debug:
      msg:
      - "========================================================"
      - "        REMEDIATION REPORT — CIS 5.3.3.3.2"
      - "========================================================"
      - "Reference: CIS Benchmark checkpoint 5.3.3.3.2"
      - ""
      - "REQUIREMENT 01 - {{ req_01 }}:"
      - "  Task: {{ task_01_name | default('Task not recorded') }}"
      - "  Command: {{ task_01_cmd | default('N/A') }}"
      - "  Exit code: {{ task_01_rc | default(-1) }}"
      - "  Data: {{ data_01 | default('') | trim }}"
      - "  Status: {{ status_01 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_01 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 02 - {{ req_02 }}:"
      - "  Task: {{ task_02_name | default('Task not recorded') }}"
      - "  Command: {{ task_02_cmd | default('N/A') }}"
      - "  Exit code: {{ task_02_rc | default(-1) }}"
      - "  Data: {{ data_02 | default('') | trim }}"
      - "  Status: {{ status_02 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_02 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 03 - {{ req_03 }}:"
      - "  Task: {{ task_03_name | default('Task not recorded') }}"
      - "  Command: {{ task_03_cmd | default('N/A') }}"
      - "  Exit code: {{ task_03_rc | default(-1) }}"
      - "  Data: {{ data_03 | default('') | trim }}"
      - "  Status: {{ status_03 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_03 | default('Not evaluated') | trim }}"
      - ""
      - "========================================================"
      - "OVERALL REMEDIATION:"
      - "  Result: {{ cis_result | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_03 | default('Not evaluated') | trim }}"
      - "========================================================"
    tags: [execute]

  always:
  - name: "Restore - Check if backup exists"
    ansible.builtin.stat:
      path: "{{ backup_dir }}/pwhistory.conf.backup"
    register: _restore_stat
    failed_when: false
    tags: [restore]

  - name: "Restore - Overwrite with original"
    ansible.builtin.copy:
      src: "{{ backup_dir }}/pwhistory.conf.backup"
      dest: "{{ config_file }}"
      remote_src: true
    when: "_restore_stat.stat.exists | default(false)"
    failed_when: false
    tags: [restore]

  - name: "Restore - Remove backup directory"
    ansible.builtin.file:
      path: "{{ backup_dir }}"
      state: absent
    failed_when: false
    tags: [restore]
