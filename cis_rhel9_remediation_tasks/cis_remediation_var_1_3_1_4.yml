playbook_name: "remediate_cis_1_3_1_4"
checkpoint_id: "cis_1_3_1_4"
state_guard_dir: "/usr/local/bin/cis/.cis_state_guard/{{ checkpoint_id }}"
state_guard_flag: "{{ state_guard_dir }}/checkpoint.flag"
selinux_config: "/etc/selinux/config"
selinux_package: "policycoreutils"
selinux_desired_mode: "enforcing"
req_01: "Apply SELinux enforcing mode using command: `setenforce 1`. Expected result: SELinux mode changes to enforcing immediately."
req_02: "Apply SELinux permissive mode using command: `setenforce 0`. Expected result: SELinux mode changes to permissive immediately."
req_03: "Edit /etc/selinux/config to set SELINUX=enforcing using command: `sed -i 's/^SELINUX=.*/SELINUX=enforcing/' /etc/selinux/config`. Expected result: SELinux configuration persists as enforcing on reboot."
req_04: "Edit /etc/selinux/config to set SELINUX=permissive using command: `sed -i 's/^SELINUX=.*/SELINUX=permissive/' /etc/selinux/config`. Expected result: SELinux configuration persists as permissive on reboot."
req_05: "Verify SELinux mode using command: `getenforce`. Expected result: Output is either 'Enforcing' or 'Permissive' (not 'Disabled')."
