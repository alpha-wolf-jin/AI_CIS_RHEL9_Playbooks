playbook_name: "cis_remediation_1_3_1_4"
backup_dir: "/var/log/ai-playbooks-backup/{{ playbook_name }}"
selinux_config_file: "/etc/selinux/config"
selinux_package: "selinux-policy-targeted"
target_selinux_mode: "enforcing"
req_01: "Apply SELinux enforcing mode using command: `setenforce 1`. Expected result: SELinux is set to enforcing mode immediately."
req_02: "Apply SELinux permissive mode using command: `setenforce 0`. Expected result: SELinux is set to permissive mode immediately."
req_03: "Edit /etc/selinux/config to set SELINUX=enforcing using command: `sed -i 's/^SELINUX=.*/SELINUX=enforcing/' /etc/selinux/config`. Expected result: SELinux configuration is set to enforcing on reboot."
req_04: "Edit /etc/selinux/config to set SELINUX=permissive using command: `sed -i 's/^SELINUX=.*/SELINUX=permissive/' /etc/selinux/config`. Expected result: SELinux configuration is set to permissive on reboot."
req_05: "Verify SELinux mode is not disabled using command: `getenforce`. Expected result: output is either 'Enforcing' or 'Permissive'."
req_06: "Store the final remediation result in a variable named 'cis_result' using set_fact. Set cis_result to the overall remediation status (PASS/FAIL/SKIP/ERROR) derived from the last requirement's status variable."
