---
- name: Initialize meta data variables
  include_vars: cis_remediation_var_5_3_2_1.yml

- name: "Snapshot - Create backup directory"
  ansible.builtin.file:
    path: "{{ backup_dir }}"
    state: directory
    mode: '0700'
  tags: [snapshot]
- name: "Snapshot - Check if authselect current profile exists"
  ansible.builtin.shell: "authselect current 2>/dev/null || echo 'NO_PROFILE'"
  args:
    executable: /bin/bash
  register: _snap_authselect_current
  changed_when: false
  failed_when: false
  tags: [snapshot]
- name: "Snapshot - Save current authselect profile to file"
  ansible.builtin.copy:
    content: "{{ _snap_authselect_current.stdout | trim }}"
    dest: "{{ backup_dir }}/authselect_current.state"
  tags: [snapshot]

- block:
  - name: "Initialize data variables"
    set_fact:
      data_01: "Not collected yet"
      status_01: "UNKNOWN"
      details_01: "Not evaluated"
      data_02: "Not collected yet"
      status_02: "UNKNOWN"
      details_02: "Not evaluated"
      data_03: "Not collected yet"
      status_03: "UNKNOWN"
      details_03: "Not evaluated"
      data_04: "Not collected yet"
      status_04: "UNKNOWN"
      details_04: "Not evaluated"
      data_05: "Not collected yet"
      status_05: "UNKNOWN"
      details_05: "Not evaluated"
      data_06: "Not collected yet"
      status_06: "UNKNOWN"
      details_06: "Not evaluated"
      task_01_name: "Not executed"
      task_01_cmd: "N/A"
      task_01_rc: -1
    tags: [execute]

  - name: "Req 01 - Check if pam and authselect packages are installed"
    ansible.builtin.package_facts:
      manager: auto
    failed_when: false
    tags: [execute]

  - name: "Req 01 - Verify pam and authselect package versions"
    ansible.builtin.shell: |
      pam_ver=$(rpm -q --qf '%{version}-%{release}' pam 2>/dev/null || echo 'not_installed')
      authselect_ver=$(rpm -q --qf '%{version}-%{release}' authselect 2>/dev/null || echo 'not_installed')
      echo "pam:${pam_ver} authselect:${authselect_ver}"
    args:
      executable: /bin/bash
    register: result_01
    failed_when: false
    changed_when: false
    tags: [execute]

  - name: "Store requirement 01 details"
    set_fact:
      task_01_name: "Req 01 - Verify pam and authselect package versions"
      task_01_cmd: "rpm -q --qf '%{version}-%{release}' pam authselect"
      task_01_rc: "{{ result_01.rc | default(-1) }}"
      data_01: "{{ result_01.stdout | default('') | trim }}"
      status_01: "{{ 'PASS' if (result_01.rc | default(-1)) == 0 and 'not_installed' not in (result_01.stdout | default('')) else 'FAIL' }}"
      details_01: "{{ 'Packages found: ' + (result_01.stdout | default('') | trim) if (result_01.rc | default(-1)) == 0 and 'not_installed' not in (result_01.stdout | default('')) else 'One or both packages not installed or version check failed' }}"
    tags: [execute]

  - name: "Req 02 - Create custom authselect profile based on sssd"
    ansible.builtin.shell: "authselect create-profile {{ custom_profile_name }} -b sssd"
    args:
      executable: /bin/bash
    register: result_02
    failed_when: false
    when: "'not_installed' not in (result_01.stdout | default(''))"
    tags: [execute]

  - name: "Store requirement 02 details"
    set_fact:
      task_02_name: "Req 02 - Create custom authselect profile"
      task_02_cmd: "authselect create-profile {{ custom_profile_name }} -b sssd"
      task_02_rc: "{{ result_02.rc | default(-1) }}"
      data_02: "{{ result_02.stdout | default('') | trim }}"
      status_02: "{{ 'PASS' if (result_02.rc | default(-1)) == 0 or 'already exist' in (result_02.stderr | default('')) else 'FAIL' }}"
      details_02: "{{ 'Custom profile exists (idempotent)' if ('already exist' in (result_02.stderr | default(''))) else 'Custom profile created successfully' if (result_02.rc | default(-1)) == 0 else 'Failed to create custom profile: ' + (result_02.stderr | default('') | trim) }}"
    when: "result_02 is defined"
    tags: [execute]

  - name: "Req 03 - Select custom authselect profile with backup and force"
    ansible.builtin.shell: "authselect select custom/{{ custom_profile_name }} --backup=PAM_CONFIG_BACKUP --force"
    args:
      executable: /bin/bash
    register: result_03
    failed_when: false
    tags: [execute]

  - name: "Store requirement 03 details"
    set_fact:
      task_03_name: "Req 03 - Select custom authselect profile"
      task_03_cmd: "authselect select custom/{{ custom_profile_name }} --backup=PAM_CONFIG_BACKUP --force"
      task_03_rc: "{{ result_03.rc | default(-1) }}"
      data_03: "{{ result_03.stdout | default('') | trim }}"
      status_03: "{{ 'PASS' if (result_03.rc | default(-1)) == 0 else 'FAIL' }}"
      details_03: "{{ 'Profile selected and configuration applied' if (result_03.rc | default(-1)) == 0 else 'Failed to select profile: ' + (result_03.stderr | default('') | trim) }}"
    when: "result_03 is defined"
    tags: [execute]

  - name: "Req 04 - Apply changes to custom profile templates"
    ansible.builtin.shell: "authselect apply-changes"
    args:
      executable: /bin/bash
    register: result_04
    failed_when: false
    changed_when: false
    tags: [execute]

  - name: "Store requirement 04 details"
    set_fact:
      task_04_name: "Req 04 - Apply changes to custom profile templates"
      task_04_cmd: "authselect apply-changes"
      task_04_rc: "{{ result_04.rc | default(-1) }}"
      data_04: "{{ result_04.stdout | default('') | trim }}"
      status_04: "{{ 'PASS' if (result_04.rc | default(-1)) == 0 else 'FAIL' }}"
      details_04: "{{ 'Changes applied successfully' if (result_04.rc | default(-1)) == 0 else 'Failed to apply changes: ' + (result_04.stderr | default('') | trim) }}"
    tags: [execute]

  - name: "Req 05 - Verify active authselect profile"
    ansible.builtin.shell: "authselect current"
    args:
      executable: /bin/bash
    register: result_05
    failed_when: false
    changed_when: false
    tags: [execute]

  - name: "Store requirement 05 details"
    set_fact:
      task_05_name: "Req 05 - Verify active authselect profile"
      task_05_cmd: "authselect current"
      task_05_rc: "{{ result_05.rc | default(-1) }}"
      data_05: "{{ result_05.stdout | default('') | trim }}"
      status_05: "{{ 'PASS' if (result_05.rc | default(-1)) == 0 and ('custom/' + custom_profile_name) in (result_05.stdout | default('')) else 'FAIL' }}"
      details_05: "{{ 'Active profile: ' + (result_05.stdout | default('') | trim) if (result_05.rc | default(-1)) == 0 and ('custom/' + custom_profile_name) in (result_05.stdout | default('')) else 'Custom profile not active or verification failed' }}"
    tags: [execute]

  - name: "Store final remediation result"
    set_fact:
      cis_result: "{{ status_05 | default('UNKNOWN') }}"
    tags: [execute]

  - name: "Store requirement 06 details"
    set_fact:
      task_06_name: "Req 06 - Store final remediation result in cis_result"
      task_06_cmd: "set_fact cis_result = {{ status_05 }}"
      task_06_rc: 0
      data_06: "cis_result = {{ status_05 | default('UNKNOWN') }}"
      status_06: "PASS"
      details_06: "Overall remediation result stored as cis_result"
    tags: [execute]

  - name: "Generate remediation report"
    debug:
      msg:
      - "========================================================"
      - "        REMEDIATION REPORT — CIS 5.3.2.1"
      - "========================================================"
      - "Reference: CIS Benchmark checkpoint 5.3.2.1"
      - ""
      - "REQUIREMENT 01 - {{ req_01 }}:"
      - "  Task: {{ task_01_name | default('Task not recorded') }}"
      - "  Command: {{ task_01_cmd | default('N/A') }}"
      - "  Exit code: {{ task_01_rc | default(-1) }}"
      - "  Data: {{ data_01 | default('') | trim }}"
      - "  Status: {{ status_01 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_01 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 02 - {{ req_02 }}:"
      - "  Task: {{ task_02_name | default('Task not recorded') }}"
      - "  Command: {{ task_02_cmd | default('N/A') }}"
      - "  Exit code: {{ task_02_rc | default(-1) }}"
      - "  Data: {{ data_02 | default('') | trim }}"
      - "  Status: {{ status_02 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_02 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 03 - {{ req_03 }}:"
      - "  Task: {{ task_03_name | default('Task not recorded') }}"
      - "  Command: {{ task_03_cmd | default('N/A') }}"
      - "  Exit code: {{ task_03_rc | default(-1) }}"
      - "  Data: {{ data_03 | default('') | trim }}"
      - "  Status: {{ status_03 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_03 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 04 - {{ req_04 }}:"
      - "  Task: {{ task_04_name | default('Task not recorded') }}"
      - "  Command: {{ task_04_cmd | default('N/A') }}"
      - "  Exit code: {{ task_04_rc | default(-1) }}"
      - "  Data: {{ data_04 | default('') | trim }}"
      - "  Status: {{ status_04 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_04 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 05 - {{ req_05 }}:"
      - "  Task: {{ task_05_name | default('Task not recorded') }}"
      - "  Command: {{ task_05_cmd | default('N/A') }}"
      - "  Exit code: {{ task_05_rc | default(-1) }}"
      - "  Data: {{ data_05 | default('') | trim }}"
      - "  Status: {{ status_05 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_05 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 06 - {{ req_06 }}:"
      - "  Task: {{ task_06_name | default('Task not recorded') }}"
      - "  Command: {{ task_06_cmd | default('N/A') }}"
      - "  Exit code: {{ task_06_rc | default(-1) }}"
      - "  Data: {{ data_06 | default('') | trim }}"
      - "  Status: {{ status_06 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_06 | default('Not evaluated') | trim }}"
      - ""
      - "========================================================"
      - "OVERALL REMEDIATION:"
      - "  Result: {{ cis_result | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_05 | default('Not evaluated') | trim }}"
      - "========================================================"
    tags: [execute]

  always:
  - name: "Restore - Check if authselect state backup exists"
    ansible.builtin.stat:
      path: "{{ backup_dir }}/authselect_current.state"
    register: _restore_state_check
    failed_when: false
    tags: [restore]

  - name: "Restore - Read saved authselect profile"
    ansible.builtin.slurp:
      src: "{{ backup_dir }}/authselect_current.state"
    register: _restore_profile_data
    failed_when: false
    when: "_restore_state_check.stat.exists | default(false)"
    tags: [restore]

  - name: "Restore - Re-select original authselect profile"
    ansible.builtin.shell: |
      saved_profile="{{ _restore_profile_data.content | b64decode | trim }}"
      if [ "$saved_profile" != "NO_PROFILE" ] && [ -n "$saved_profile" ]; then
        authselect select "$saved_profile" --force 2>/dev/null || true
      fi
    args:
      executable: /bin/bash
    when:
    - "_restore_state_check.stat.exists | default(false)"
    - "_restore_profile_data.content is defined"
    failed_when: false
    tags: [restore]

  - name: "Restore - Remove backup directory"
    ansible.builtin.file:
      path: "{{ backup_dir }}"
      state: absent
    failed_when: false
    tags: [restore]
