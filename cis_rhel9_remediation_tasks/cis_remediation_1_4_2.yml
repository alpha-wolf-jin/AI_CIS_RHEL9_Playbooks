  - name: "Req 01 - Check boot mode (UEFI / BIOS)"
    ansible.builtin.shell: stat /sys/firmware/efi
    args:
      executable: /bin/bash
    register: result_01
    failed_when: false
    changed_when: false
    tags: [execute]

  - name: "Store requirement 01 details"
    ansible.builtin.set_fact:
      task_01_name: "Check boot mode (UEFI / BIOS)"
      task_01_cmd: "stat /sys/firmware/efi"
      task_01_rc: "{{ result_01.rc | default(-1) }}"
      data_01: "{{ 'UEFI' if result_01.rc | default(-1) == 0 else 'BIOS' }}"
      status_01: "{{ 'PASS' if result_01.rc | default(-1) in [0, 1] else 'ERROR' }}"
      details_01: "{{ 'UEFI boot detected' if result_01.rc | default(-1) == 0 else 'BIOS boot detected' }}"
    tags: [execute]

  - name: "Req 02 - Add secure mount options to /boot/efi in /etc/fstab"
    ansible.builtin.lineinfile:
      path: /etc/fstab
      regexp: |
        ^(\S+\s+/boot/efi\s+vfat\s+)((?!.*fmask=0077,uid=0,gid=0)\S+)(\s+.*)$
      line: |
        \1\2,fmask=0077,uid=0,gid=0\3
      backrefs: yes
      state: present
    register: result_02
    failed_when: false
    when: "result_01.rc | default(-1) == 0"
    tags: [execute]

  - name: "Store requirement 02 details"
    ansible.builtin.set_fact:
      task_02_name: "Add secure mount options to /boot/efi in /etc/fstab"
      task_02_cmd: "lineinfile regexp add fmask=0077,uid=0,gid=0"
      task_02_rc: "{{ result_02.rc | default(-1) if result_02 is defined else -1 }}"
      data_02: "{{ 'fstab updated' if result_02 is defined and result_02.changed | default(false) else 'no change needed or skipped' }}"
      status_02: "{{ 'PASS' if result_01.rc | default(-1) != 0 else ('PASS' if result_02 is defined and result_02.rc | default(-1) == 0 else 'FAIL') }}"
      details_02: "{{ 'Skipped (BIOS boot)' if result_01.rc | default(-1) != 0 else ('fstab updated with fmask=0077,uid=0,gid=0' if result_02 is defined and result_02.changed | default(false) else 'fstab already compliant') }}"
    tags: [execute]

