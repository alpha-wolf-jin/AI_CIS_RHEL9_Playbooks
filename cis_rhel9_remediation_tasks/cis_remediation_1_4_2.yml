      - "  Status: {{ status_11 | default('ERROR') | trim }}"
      - "  Details: {{ details_11 | default('') | trim }}"
      - ""
      - "========================================================"
      - "OVERALL RESULT:"
      - "  Result: {{ cis_result | default('ERROR') | trim }}"
      - "  Details: {{ details_10 | default('Not evaluated') | trim }}"
      - "========================================================"
    tags: [execute]

  always:
  - name: "Restore - Check if fstab backup exists"
    ansible.builtin.stat:
      path: "{{ backup_dir }}/fstab.present"
    register: _restore_fstab_check
    failed_when: false
    tags: [restore]

  - name: "Restore - Overwrite /etc/fstab with original"
    ansible.builtin.copy:
      src: "{{ backup_dir }}/fstab.present"
      dest: /etc/fstab
      remote_src: true
    when: _restore_fstab_check.stat.exists | default(false)
    failed_when: false
    tags: [restore]

  - name: "Restore - Check if grub.cfg state backup exists"
    ansible.builtin.stat:
      path: "{{ backup_dir }}/grub_cfg.state"
    register: _restore_grub_cfg_state_check
    failed_when: false
    tags: [restore]

  - name: "Restore - Read grub.cfg original state"
    ansible.builtin.slurp:
      src: "{{ backup_dir }}/grub_cfg.state"
    register: _restore_grub_cfg_state_data
    when: _restore_grub_cfg_state_check.stat.exists | default(false)
    failed_when: false
    tags: [restore]

  - name: "Restore - Restore /boot/grub2/grub.cfg ownership and permissions"
    ansible.builtin.shell: |
      state="{{ _restore_grub_cfg_state_data.content | b64decode | trim }}"
      owner=$(echo "$state" | cut -d: -f1)
      group=$(echo "$state" | cut -d: -f2 | cut -d' ' -f1)
      mode=$(echo "$state" | awk '{print $2}')
      chown "$owner":"$group" /boot/grub2/grub.cfg
      chmod "$mode" /boot/grub2/grub.cfg
    args:
      executable: /bin/bash
    when:
    - _restore_grub_cfg_state_check.stat.exists | default(false)
    - _restore_grub_cfg_state_data.content is defined
    failed_when: false
    tags: [restore]

  - name: "Restore - Check if grub.cfg absent marker exists"
    ansible.builtin.stat:
      path: "{{ backup_dir }}/grub_cfg.absent"
    register: _restore_grub_cfg_absent_check
    failed_when: false
    tags: [restore]

  - name: "Restore - Delete /boot/grub2/grub.cfg if it was absent before"
    ansible.builtin.file:
      path: /boot/grub2/grub.cfg
      state: absent
    when: _restore_grub_cfg_absent_check.stat.exists | default(false)
    failed_when: false
    tags: [restore]

  - name: "Restore - Check if grubenv state backup exists"
    ansible.builtin.stat:
      path: "{{ backup_dir }}/grubenv.state"
    register: _restore_grubenv_state_check
