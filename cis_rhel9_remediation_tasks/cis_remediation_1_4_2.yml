---
- name: Initialize meta data variables
  include_vars: cis_remediation_var_1_4_2.yml

- name: "Snapshot - Create backup directory"
  ansible.builtin.file:
    path: "{{ backup_dir }}"
    state: directory
    mode: '0755'
  tags: [snapshot]
- name: "Snapshot - Check if /etc/fstab exists"
  ansible.builtin.stat:
    path: /etc/fstab
  register: _snap_fstab_stat
  tags: [snapshot]
- name: "Snapshot - Backup /etc/fstab"
  ansible.builtin.copy:
    src: /etc/fstab
    dest: "{{ backup_dir }}/fstab.present"
    remote_src: true
  when: _snap_fstab_stat.stat.exists
  tags: [snapshot]
- name: "Snapshot - Mark /etc/fstab as absent"
  ansible.builtin.copy:
    content: "absent"
    dest: "{{ backup_dir }}/fstab.absent"
  when: not _snap_fstab_stat.stat.exists
  tags: [snapshot]
- name: "Snapshot - Check if /boot/grub2/grub.cfg exists"
  ansible.builtin.stat:
    path: /boot/grub2/grub.cfg
  register: _snap_grub_cfg_stat
  tags: [snapshot]
- name: "Snapshot - Backup /boot/grub2/grub.cfg ownership and permissions"
  ansible.builtin.shell: stat -c '%U:%G %a' /boot/grub2/grub.cfg
  args:
    executable: /bin/bash
  register: _snap_grub_cfg_state
  changed_when: false
  when: _snap_grub_cfg_stat.stat.exists
  tags: [snapshot]
- name: "Snapshot - Save /boot/grub2/grub.cfg state"
  ansible.builtin.copy:
    content: "{{ _snap_grub_cfg_state.stdout | default('') | trim }}"
    dest: "{{ backup_dir }}/grub_cfg.state"
  when: _snap_grub_cfg_stat.stat.exists
  tags: [snapshot]
- name: "Snapshot - Mark /boot/grub2/grub.cfg as absent"
  ansible.builtin.copy:
    content: "absent"
    dest: "{{ backup_dir }}/grub_cfg.absent"
  when: not _snap_grub_cfg_stat.stat.exists
  tags: [snapshot]
- name: "Snapshot - Check if /boot/grub2/grubenv exists"
  ansible.builtin.stat:
    path: /boot/grub2/grubenv
  register: _snap_grubenv_stat
  tags: [snapshot]
- name: "Snapshot - Backup /boot/grub2/grubenv ownership and permissions"
  ansible.builtin.shell: stat -c '%U:%G %a' /boot/grub2/grubenv
  args:
    executable: /bin/bash
  register: _snap_grubenv_state
  changed_when: false
  when: _snap_grubenv_stat.stat.exists
  tags: [snapshot]
- name: "Snapshot - Save /boot/grub2/grubenv state"
  ansible.builtin.copy:
    content: "{{ _snap_grubenv_state.stdout | default('') | trim }}"
    dest: "{{ backup_dir }}/grubenv.state"
  when: _snap_grubenv_stat.stat.exists
  tags: [snapshot]
- name: "Snapshot - Mark /boot/grub2/grubenv as absent"
  ansible.builtin.copy:
    content: "absent"
    dest: "{{ backup_dir }}/grubenv.absent"
  when: not _snap_grubenv_stat.stat.exists
  tags: [snapshot]
- name: "Snapshot - Check if /boot/grub2/user.cfg exists"
  ansible.builtin.stat:
    path: /boot/grub2/user.cfg
  register: _snap_user_cfg_stat
  tags: [snapshot]
- name: "Snapshot - Backup /boot/grub2/user.cfg ownership and permissions"
