    failed_when: false
    tags: [restore]

  - name: "Restore - Restore /boot/grub2/grubenv ownership and permissions"
    ansible.builtin.shell: |
      state="{{ _restore_grubenv_state_data.content | b64decode | trim }}"
      owner=$(echo "$state" | cut -d: -f1)
      group=$(echo "$state" | cut -d: -f2 | cut -d' ' -f1)
      mode=$(echo "$state" | awk '{print $2}')
      chown "$owner":"$group" /boot/grub2/grubenv
      chmod "$mode" /boot/grub2/grubenv
    args:
      executable: /bin/bash
    when:
    - _restore_grubenv_state_check.stat.exists | default(false)
    - _restore_grubenv_state_data.content is defined
    failed_when: false
    tags: [restore]

  - name: "Restore - Check if grubenv absent marker exists"
    ansible.builtin.stat:
      path: "{{ backup_dir }}/grubenv.absent"
    register: _restore_grubenv_absent_check
    failed_when: false
    tags: [restore]

  - name: "Restore - Delete /boot/grub2/grubenv if it was absent before"
    ansible.builtin.file:
      path: /boot/grub2/grubenv
      state: absent
    when: _restore_grubenv_absent_check.stat.exists | default(false)
    failed_when: false
    tags: [restore]

  - name: "Restore - Check if user.cfg state backup exists"
    ansible.builtin.stat:
      path: "{{ backup_dir }}/user_cfg.state"
    register: _restore_user_cfg_state_check
    failed_when: false
    tags: [restore]

  - name: "Restore - Read user.cfg original state"
    ansible.builtin.slurp:
      src: "{{ backup_dir }}/user_cfg.state"
    register: _restore_user_cfg_state_data
    when: _restore_user_cfg_state_check.stat.exists | default(false)
    failed_when: false
    tags: [restore]

  - name: "Restore - Restore /boot/grub2/user.cfg ownership and permissions"
    ansible.builtin.shell: |
      state="{{ _restore_user_cfg_state_data.content | b64decode | trim }}"
      owner=$(echo "$state" | cut -d: -f1)
      group=$(echo "$state" | cut -d: -f2 | cut -d' ' -f1)
      mode=$(echo "$state" | awk '{print $2}')
      chown "$owner":"$group" /boot/grub2/user.cfg
      chmod "$mode" /boot/grub2/user.cfg
    args:
      executable: /bin/bash
    when:
    - _restore_user_cfg_state_check.stat.exists | default(false)
    - _restore_user_cfg_state_data.content is defined
    failed_when: false
    tags: [restore]

  - name: "Restore - Check if user.cfg absent marker exists"
    ansible.builtin.stat:
      path: "{{ backup_dir }}/user_cfg.absent"
    register: _restore_user_cfg_absent_check
    failed_when: false
    tags: [restore]

  - name: "Restore - Delete /boot/grub2/user.cfg if it was absent before"
    ansible.builtin.file:
      path: /boot/grub2/user.cfg
      state: absent
    when: _restore_user_cfg_absent_check.stat.exists | default(false)
    failed_when: false
    tags: [restore]

  - name: "Restore - Remove backup directory"
    ansible.builtin.file:
      path: "{{ backup_dir }}"
      state: absent
    failed_when: false
    tags: [restore]
