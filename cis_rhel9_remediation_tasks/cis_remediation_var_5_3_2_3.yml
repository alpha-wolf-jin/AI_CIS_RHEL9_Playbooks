req_01: "1. Run the provided remediation script to fix Ensure pam_pwquality module is enabled. Review the authselect profile templates and apply required changes. Expected result: Script applies the required changes"
req_02: "2. VERIFY: Run audit check to confirm Ensure pam_pwquality module is enabled is properly configured. Expected result: System is compliant"
req_03: "3. Store the final remediation result in a variable named 'cis_result' using set_fact. Set cis_result to the overall remediation status (PASS/FAIL/SKIP/ERROR) derived from the last requirement's status variable."
req_04: "4. Create a task named 'Generate remediation report' using debug msg with EXACTLY this format: REMEDIATION REPORT — CIS 5.3.2.3 Reference: CIS Benchmark checkpoint 5.3.2.3 Then for each requirement: REQUIREMENT NN - req_NN: With fields: Task, Command, Exit code, Data, Status (PASS/FAIL/SKIP/ERROR), Details. End with OVERALL REMEDIATION: section containing Result: cis_result"
