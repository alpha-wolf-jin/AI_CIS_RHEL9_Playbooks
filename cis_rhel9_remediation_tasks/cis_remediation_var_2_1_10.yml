playbook_name: "cis_2_1_10"
backup_dir: "/var/log/ai-playbooks-backup/{{ playbook_name }}"
req_01: "Apply stop ypserv.service using command: `systemctl stop ypserv.service`. Expected result: The ypserv service is stopped."
req_02: "Apply remove ypserv package using command: `dnf remove ypserv`. Expected result: The ypserv package is removed."
req_03: "Apply mask ypserv.service using command: `systemctl mask ypserv.service`. Expected result: The ypserv service is masked and cannot be started."
req_04: "Verify that ypserv.service is not running using command: `systemctl is-active ypserv.service`. Expected result: inactive."
req_05: "Verify that ypserv package is not installed using command: `rpm -q ypserv`. Expected result: package ypserv is not installed."
req_06: "Store the final remediation result in a variable named 'cis_result' using set_fact. Set cis_result to the overall remediation status (PASS/FAIL/SKIP/ERROR) derived from the last requirement's status variable."
req_07: "Create a task named 'Generate remediation report' using debug msg with EXACTLY this format: REMEDIATION REPORT — CIS 2.1.10 ... details."
