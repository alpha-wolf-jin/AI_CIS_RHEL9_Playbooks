---
- name: Initialize meta data variables
  include_vars: cis_remediation_var_1_3_1_1.yml

- name: "Snapshot - Create backup directory"
  ansible.builtin.file:
    path: "{{ backup_dir }}"
    state: directory
    mode: '0700'
  tags: [snapshot]

- block:
  - name: "Req 1 - Gather package facts"
    ansible.builtin.package_facts:
      manager: auto
    tags: [execute]

  - name: "Req 1 - Set libselinux installed fact"
    ansible.builtin.set_fact:
      libselinux_installed: "{{ 'libselinux' in ansible_facts.packages }}"
    tags: [execute]

  - name: "Req 1 - Install libselinux"
    ansible.builtin.dnf:
      name: libselinux
      state: present
    register: install_result
    when: not libselinux_installed
    failed_when: false
    tags: [execute]

  - name: "Req 2 - Verify libselinux installation"
    ansible.builtin.shell: rpm -q libselinux
    args:
      executable: /bin/bash
    register: verify_result
    failed_when: false
    changed_when: false
    tags: [execute]

  - name: "Store requirement 01 details"
    ansible.builtin.set_fact:
      task_01_name: "Install libselinux via dnf"
      task_01_cmd: "dnf install libselinux"
      task_01_rc: "{{ install_result.rc | default(0) }}"
      data_01: >-
        {{ (install_result.stdout | default('') | trim) if (install_result is defined and not install_result.skipped | default(false)) else 'Already installed' }}
      status_01: >-
        {{ 'APPLIED' if (libselinux_installed or (install_result is defined and not install_result.skipped | default(false) and install_result.rc | default(-1) == 0)) else 'FAILED' }}
      details_01: >-
        {{ 'Already installed' if libselinux_installed else ('Installation succeeded' if (install_result is defined and not install_result.skipped | default(false) and install_result.rc | default(-1) == 0) else 'Installation failed') }}
    tags: [execute]

  - name: "Store requirement 02 details"
    ansible.builtin.set_fact:
      task_02_name: "Verify libselinux via rpm"
      task_02_cmd: "rpm -q libselinux"
      task_02_rc: "{{ verify_result.rc | default(-1) }}"
      data_02: "{{ verify_result.stdout | default('') | trim }}"
      status_02: "{{ 'APPLIED' if (verify_result.rc | default(-1) == 0) else 'FAILED' }}"
      details_02: "{{ 'Package version confirmed' if (verify_result.rc | default(-1) == 0) else 'Package not installed' }}"
    tags: [execute]

  - name: "Set overall remediation status"
    ansible.builtin.set_fact:
      overall_status: "{{ 'APPLIED' if (status_01 == 'APPLIED' and status_02 == 'APPLIED') else 'FAILED' }}"
      overall_details: "{{ 'All requirements met' if (status_01 == 'APPLIED' and status_02 == 'APPLIED') else 'One or more requirements not met' }}"
    tags: [execute]

  - name: "Generate remediation report"
    ansible.builtin.debug:
      msg:
      - "REMEDIATION REPORT — CIS 1.3.1.1"
      - "Reference: CIS Benchmark checkpoint 1.3.1.1"
      - ""
      - "REQUIREMENT 01 - {{ req_01 }}:"
      - "  Task: {{ task_01_name | default('N/A') }}"
      - "  Command: {{ task_01_cmd | default('N/A') }}"
      - "  Exit code: {{ task_01_rc | default(-1) }}"
      - "  Data: {{ data_01 | default('') | trim }}"
      - "  Status: {{ status_01 | default('UNKNOWN') }}"
      - "  Details: {{ details_01 | default('') | trim }}"
      - ""
      - "REQUIREMENT 02 - {{ req_02 }}:"
      - "  Task: {{ task_02_name | default('N/A') }}"
      - "  Command: {{ task_02_cmd | default('N/A') }}"
      - "  Exit code: {{ task_02_rc | default(-1) }}"
      - "  Data: {{ data_02 | default('') | trim }}"
      - "  Status: {{ status_02 | default('UNKNOWN') }}"
      - "  Details: {{ details_02 | default('') | trim }}"
      - ""
      - "OVERALL REMEDIATION:"
      - "  Result: {{ overall_status | default('UNKNOWN') }}"
      - "  Details: {{ overall_details | default('') | trim }}"
    tags: [execute]

  always:
  - name: "Restore - Remove backup directory"
    ansible.builtin.file:
      path: "{{ backup_dir }}"
      state: absent
    failed_when: false
    tags: [restore]
