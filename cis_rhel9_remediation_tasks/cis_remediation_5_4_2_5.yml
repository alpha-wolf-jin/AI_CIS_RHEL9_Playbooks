---
- name: Initialize meta data variables
  include_vars: cis_remediation_var_5_4_2_5.yml

- name: "Snapshot - Create backup directory"
  ansible.builtin.file:
    path: "{{ backup_dir }}"
    state: directory
    mode: "0700"
  tags: [snapshot]
- name: "Snapshot - Capture root PATH directory states"
  ansible.builtin.shell: |
    backup_dir="{{ backup_dir }}"
    path_var=$(sudo -Hiu root env 2>/dev/null | grep '^PATH' | cut -d= -f2)
    if [ -z "$path_var" ]; then
      echo "No root PATH found"
      exit 0
    fi
    IFS=':' read -ra dirs <<< "$path_var"
    > "$backup_dir/path_dirs.state"
    for d in "${dirs[@]}"; do
      if [ -d "$d" ]; then
        owner=$(stat -c '%U' "$d" 2>/dev/null || echo "unknown")
        mode=$(stat -c '%a' "$d" 2>/dev/null || echo "000")
        echo "exists $d $owner $mode" >> "$backup_dir/path_dirs.state"
      else
        echo "absent $d" >> "$backup_dir/path_dirs.state"
      fi
    done
  args:
    executable: /bin/bash
  register: snapshot_result
  failed_when: false
  changed_when: false
  tags: [snapshot]

- block:
  - name: "Initialize data variables"
    ansible.builtin.set_fact:
      data_01: "Not collected yet"
      status_01: "ERROR"
      details_01: "Not evaluated"
      data_02: "Not collected yet"
      status_02: "ERROR"
      details_02: "Not evaluated"
      task_01_name: "Not executed"
      task_01_cmd: "N/A"
      task_01_rc: -1
      task_02_name: "Not executed"
      task_02_cmd: "N/A"
      task_02_rc: -1
    tags: [execute]

  - name: "Req 01 - Get root's PATH"
    ansible.builtin.shell: "sudo -Hiu root env | grep '^PATH' | cut -d= -f2"
    args:
      executable: /bin/bash
    register: root_path_raw
    changed_when: false
    failed_when: false
    tags: [execute]

  - name: "Req 01 - Parse root PATH directories"
    ansible.builtin.set_fact:
      root_path_dirs: "{{ (root_path_raw.stdout | default('')).split(':') }}"
    when:
    - root_path_raw.rc is defined
    - root_path_raw.rc == 0
    - root_path_raw.stdout | default('') | trim | length > 0
    tags: [execute]

  - name: "Req 01 - Ensure root PATH directories are compliant"
    ansible.builtin.file:
      path: "{{ item }}"
      state: directory
      owner: root
      group: root
      mode: "go-w"
    loop: "{{ root_path_dirs }}"
    loop_control:
      label: "{{ item }}"
    register: file_result
    when: root_path_dirs is defined
    failed_when: false
    tags: [execute]

  - name: "Store requirement 01 details"
    ansible.builtin.set_fact:
      task_01_name: "Remediate root PATH integrity"
      task_01_cmd: "Ansible file module loop over root PATH directories"
      task_01_rc: 0
      data_01: "{{ 'Directories processed: ' + (root_path_dirs | join(', ') if root_path_dirs is defined else 'None') }}"
      status_01: >-
        {%- if root_path_dirs is not defined -%}
        SKIP
        {%- elif file_result is defined and file_result.results is defined -%}
        {%- set all_ok = file_result.results | selectattr('failed', 'equalto', true) | list | length == 0 -%}
        {{ 'PASS' if all_ok else 'FAIL' }}
        {%- else -%}
        ERROR
        {%- endif -%}
      details_01: >-
        {%- if root_path_dirs is not defined -%}
        Root PATH not found, remediation skipped
        {%- elif file_result is defined and file_result.results is defined -%}
        {%- set all_ok = file_result.results | selectattr('failed', 'equalto', true) | list | length == 0 -%}
        {{ 'All directories compliant' if all_ok else 'Some directories could not be remediated' }}
        {%- else -%}
        No file_result
        {%- endif -%}
    tags: [execute]

  - name: "Req 02 - Verify root PATH integrity"
    ansible.builtin.shell: |
      path_var=$(sudo -Hiu root env 2>/dev/null | grep '^PATH' | cut -d= -f2)
      if [ -z "$path_var" ]; then
        echo "No root PATH found"
        exit 1
      fi
      IFS=':' read -ra dirs <<< "$path_var"
      for d in "${dirs[@]}"; do
        if [ -L "$d" ]; then
          real=$(readlink -f "$d")
          d="$real"
        fi
        if [ ! -d "$d" ]; then
          echo "FAIL: directory $d does not exist"
          exit 1
        fi
        owner=$(stat -c '%U' "$d" 2>/dev/null || echo "")
        if [ "$owner" != "root" ]; then
          echo "FAIL: directory $d not owned by root"
          exit 1
        fi
        perm=$(stat -c '%a' "$d" 2>/dev/null || echo "000")
        if [ $(( 0$perm & 020 )) -ne 0 ]; then
          echo "FAIL: directory $d has group write permission"
          exit 1
        fi
        if [ $(( 0$perm & 002 )) -ne 0 ]; then
          echo "FAIL: directory $d has other write permission"
          exit 1
        fi
      done
      echo "PASS: all directories compliant"
      exit 0
    args:
      executable: /bin/bash
    register: result_02
    failed_when: false
    changed_when: false
    tags: [execute]

  - name: "Store requirement 02 details"
    ansible.builtin.set_fact:
      task_02_name: "Verify root PATH integrity"
      task_02_cmd: "Verification script executed"
      task_02_rc: "{{ result_02.rc | default(-1) }}"
      data_02: "{{ result_02.stdout | default('') | trim }}"
      status_02: >-
        {%- if result_02.rc | default(-1) == 0 -%}
        PASS
        {%- else -%}
        FAIL
        {%- endif -%}
      details_02: "{{ 'Verification passed' if result_02.rc | default(-1) == 0 else 'Verification failed' }}"
    tags: [execute]

  - name: "Store final remediation result in cis_result"
    ansible.builtin.set_fact:
      cis_result: "{{ status_02 | default('ERROR') | trim }}"
    tags: [execute]

  - name: "Generate remediation report"
    ansible.builtin.debug:
      msg:
      - "REMEDIATION REPORT — CIS 5.4.2.5"
      - "Reference: CIS Benchmark checkpoint 5.4.2.5"
      - ""
      - "REQUIREMENT 01 - {{ req_01 }}:"
      - "  Task: {{ task_01_name | default('Not recorded') }}"
      - "  Command: {{ task_01_cmd | default('N/A') }}"
      - "  Exit code: {{ task_01_rc | default(-1) }}"
      - "  Data: {{ data_01 | default('') | trim }}"
      - "  Status: {{ status_01 | default('ERROR') | trim }}"
      - "  Details: {{ details_01 | default('') | trim }}"
      - ""
      - "REQUIREMENT 02 - {{ req_02 }}:"
      - "  Task: {{ task_02_name | default('Not recorded') }}"
      - "  Command: {{ task_02_cmd | default('N/A') }}"
      - "  Exit code: {{ task_02_rc | default(-1) }}"
      - "  Data: {{ data_02 | default('') | trim }}"
      - "  Status: {{ status_02 | default('ERROR') | trim }}"
      - "  Details: {{ details_02 | default('') | trim }}"
      - ""
      - "========================================================"
      - "OVERALL REMEDIATION:"
      - "  Result: {{ cis_result | default('ERROR') | trim }}"
      - "========================================================"
    tags: [execute]

  always:
  - name: "State Guard Restore - Check if snapshot exists"
    ansible.builtin.stat:
      path: "{{ backup_dir }}/path_dirs.state"
    register: _restore_state_stat
    failed_when: false
    tags: [restore]

  - name: "State Guard Restore - Revert PATH directories"
    ansible.builtin.shell: |
      state_file="{{ backup_dir }}/path_dirs.state"
      while IFS= read -r line; do
        type=$(echo "$line" | awk '{print $1}')
        dir=$(echo "$line" | awk '{print $2}')
        if [ "$type" = "absent" ]; then
          [ -d "$dir" ] && rmdir --ignore-fail-on-non-empty "$dir" 2>/dev/null || true
        else
          owner=$(echo "$line" | awk '{print $3}')
          mode=$(echo "$line" | awk '{print $4}')
          [ -d "$dir" ] && chown "$owner" "$dir" && chmod "$mode" "$dir"
        fi
      done < "$state_file"
      echo "Restore completed"
    args:
      executable: /bin/bash
    when: _restore_state_stat.stat.exists | default(false)
    failed_when: false
    tags: [restore]

  - name: "State Guard Restore - Remove backup directory"
    ansible.builtin.file:
      path: "{{ backup_dir }}"
      state: absent
    when: _restore_state_stat.stat.exists | default(false)
    failed_when: false
    tags: [restore]
