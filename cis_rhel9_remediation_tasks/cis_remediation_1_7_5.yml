---
- name: Initialize meta data variables
  include_vars: cis_remediation_var_1_7_5.yml

- name: "Snapshot - Create backup directory"
  ansible.builtin.file:
    path: "{{ backup_dir }}"
    state: directory
    mode: '0700'
  tags: ["snapshot"]
- name: "Snapshot - Check if {{ target_file }} exists"
  ansible.builtin.stat:
    path: "{{ target_file }}"
    follow: yes
  register: _snapshot_stat
  tags: ["snapshot"]
- name: "Snapshot - Backup {{ target_file }}"
  ansible.builtin.shell: cp -L {{ target_file | quote }} {{ backup_dir }}/{{ target_file | basename | quote }}
  args:
    executable: /bin/bash
  when: _snapshot_stat.stat.exists
  failed_when: false
  tags: ["snapshot"]

- block:
  - name: "Req 1 - Apply ownership root:root to {{ target_file }}"
    ansible.builtin.file:
      path: "{{ target_file }}"
      owner: root
      group: root
      follow: yes
    register: result_01
    failed_when: false
    tags: ["execute"]

  - name: "Req 2 - Apply permissions u-x,go-wx to {{ target_file }}"
    ansible.builtin.file:
      path: "{{ target_file }}"
      mode: 'u-x,go-wx'
      follow: yes
    register: result_02
    failed_when: false
    tags: ["execute"]

  - name: "Req 3 - Verify ownership and permissions of {{ target_file }}"
    ansible.builtin.shell: stat -L -c '%U:%G %a' {{ target_file | quote }}
    args:
      executable: /bin/bash
    register: result_03
    failed_when: false
    changed_when: false
    tags: ["execute"]

  - name: "Req 4 - Store overall remediation result"
    ansible.builtin.set_fact:
      cis_result: "{{ 'PASS' if (result_03.stdout | default('') | trim) == 'root:root 644' else 'FAIL' }}"
    tags: ["execute"]

  - name: "Generate remediation report"
    ansible.builtin.debug:
      msg:
      - "REMEDIATION REPORT — CIS 1.7.5"
      - "Reference: CIS Benchmark checkpoint 1.7.5"
      - ""
      - "REQUIREMENT 01 - {{ req_01 }}:"
      - "  Task: Req 1 - Apply ownership root:root to /etc/issue"
      - "  Command: 'chown root:root $(readlink -e /etc/issue)'"
      - "  Exit code: {{ result_01.rc | default(-1) }}"
      - "  Data: {{ 'Changed' if result_01.changed else 'Unchanged' }}"
      - "  Status: {{ 'PASS' if not (result_01.failed | default(false)) else 'FAIL' }}"
      - "  Details: {{ 'Ownership set to root:root' if not (result_01.failed | default(false)) else 'Failed to set ownership' }}"
      - ""
      - "REQUIREMENT 02 - {{ req_02 }}:"
      - "  Task: Req 2 - Apply permissions u-x,go-wx to /etc/issue"
      - "  Command: 'chmod u-x,go-wx $(readlink -e /etc/issue)'"
      - "  Exit code: {{ result_02.rc | default(-1) }}"
      - "  Data: {{ 'Changed' if result_02.changed else 'Unchanged' }}"
      - "  Status: {{ 'PASS' if not (result_02.failed | default(false)) else 'FAIL' }}"
      - "  Details: {{ 'Permissions set to u-x,go-wx' if not (result_02.failed | default(false)) else 'Failed to set permissions' }}"
      - ""
      - "REQUIREMENT 03 - {{ req_03 }}:"
      - "  Task: Req 3 - Verify ownership and permissions"
      - "  Command: 'stat -L -c '%U:%G %a' /etc/issue'"
      - "  Exit code: {{ result_03.rc | default(-1) }}"
      - "  Data: {{ result_03.stdout | default('') | trim }}"
      - "  Status: {{ 'PASS' if (result_03.stdout | default('') | trim) == 'root:root 644' else 'FAIL' }}"
      - "  Details: >-"
      - "    {{ 'Ownership and permissions correct' if (result_03.stdout | default('') | trim) == 'root:root 644' else 'Mismatch: ' + (result_03.stdout | default('') | trim) }}"
      - ""
      - "REQUIREMENT 04 - {{ req_04 }}:"
      - "  Task: Req 4 - Store overall remediation result"
      - "  Command: set_fact: cis_result = 'PASS' if output is 'root:root 644' else 'FAIL'"
      - "  Exit code: 0"
      - "  Data: {{ cis_result }}"
      - "  Status: {{ cis_result }}"
      - "  Details: {{ 'Remediation passed' if cis_result == 'PASS' else 'Remediation failed - expected root:root 644 but got ' + (result_03.stdout | default('') | trim) }}"
      - ""
      - "OVERALL REMEDIATION:"
      - "  Result: {{ cis_result }}"
    tags: ["execute"]

  always:
  - name: "Restore - Check if backup exists"
    ansible.builtin.stat:
      path: "{{ backup_dir }}/{{ target_file | basename }}"
    register: _restore_stat
    failed_when: false
    tags: ["restore"]

  - name: "Restore - Overwrite original with backup"
    ansible.builtin.copy:
      src: "{{ backup_dir }}/{{ target_file | basename }}"
      dest: "{{ target_file }}"
      remote_src: true
      follow: yes
    when: _restore_stat.stat.exists
    failed_when: false
    tags: ["restore"]

  - name: "Restore - Remove backup directory"
    ansible.builtin.file:
      path: "{{ backup_dir }}"
      state: absent
    failed_when: false
    tags: ["restore"]
