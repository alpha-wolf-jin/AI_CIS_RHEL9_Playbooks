playbook_name: "cis_2_1_3_remediation"
backup_dir: "/var/log/ai-playbooks-backup/{{ playbook_name }}"
req_01: "Apply stop dhcpd.service using command: `systemctl stop dhcpd.service`. Expected result: dhcpd.service is stopped."
req_02: "Apply stop dhcpd6.service using command: `systemctl stop dhcpd6.service`. Expected result: dhcpd6.service is stopped."
req_03: "Apply remove dhcp-server package using command: `dnf remove dhcp-server`. Expected result: dhcp-server package is removed."
req_04: "Apply mask dhcpd.service using command: `systemctl mask dhcpd.service`. Expected result: dhcpd.service is masked."
req_05: "Apply mask dhcpd6.service using command: `systemctl mask dhcpd6.service`. Expected result: dhcpd6.service is masked."
req_06: "Verify dhcpd.service is stopped and masked using command: `systemctl status dhcpd.service`. Expected result: dhcpd.service is inactive and masked."
req_07: "Verify dhcpd6.service is stopped and masked using command: `systemctl status dhcpd6.service`. Expected result: dhcpd6.service is inactive and masked."
req_08: "Store the final remediation result in a variable named 'cis_result' using set_fact. Set cis_result to the overall remediation status (PASS/FAIL/SKIP/ERROR) derived from the last requirement's status variable."
