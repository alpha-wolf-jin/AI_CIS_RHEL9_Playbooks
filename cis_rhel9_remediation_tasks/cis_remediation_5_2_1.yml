---
- name: Initialize meta data variables
  include_vars: cis_remediation_var_5_2_1.yml

- name: "Snapshot - Create backup directory"
  ansible.builtin.file:
    path: "{{ backup_dir }}"
    state: directory
    mode: '0700'
  tags: [snapshot]

- block:
  - name: "Req 01 - Install sudo package"
    ansible.builtin.dnf:
      name: sudo
      state: present
    register: result_01
    failed_when: false
    tags: [execute]

  - name: "Req 02 - Verify sudo is installed"
    ansible.builtin.shell: rpm -q sudo
    args:
      executable: /bin/bash
    register: result_02
    failed_when: false
    changed_when: false
    tags: [execute]

  - name: "Store requirement details"
    ansible.builtin.set_fact:
      task_01_name: "Install sudo package"
      task_01_cmd: "dnf install sudo"
      task_01_rc: "{{ result_01.rc | default(-1) }}"
      data_01: "{{ result_01.stdout | default('') | trim }}"
      status_01: "{{ 'PASS' if result_01.rc | default(-1) == 0 else 'FAIL' }}"
      details_01: "{{ 'Package installed successfully' if result_01.rc | default(-1) == 0 else 'Installation failed' }}"
      task_02_name: "Verify sudo package"
      task_02_cmd: "rpm -q sudo"
      task_02_rc: "{{ result_02.rc | default(-1) }}"
      data_02: "{{ result_02.stdout | default('') | trim }}"
      status_02: "{{ 'PASS' if result_02.rc | default(-1) == 0 else 'FAIL' }}"
      details_02: "{{ 'Package verified: ' ~ result_02.stdout | default('') | trim if result_02.rc | default(-1) == 0 else 'Verification failed' }}"
    tags: [execute]

  - name: "Store overall remediation result"
    ansible.builtin.set_fact:
      cis_result: "{{ 'PASS' if result_02.rc == 0 else 'FAIL' }}"
    tags: [execute]

  - name: "Generate remediation report"
    ansible.builtin.debug:
      msg:
      - "REMEDIATION REPORT — CIS 5.2.1"
      - "Reference: CIS Benchmark checkpoint 5.2.1"
      - ""
      - "REQUIREMENT 01 - {{ req_01 }}:"
      - "  Task: {{ task_01_name | default('Task not recorded') }}"
      - "  Command: {{ task_01_cmd | default('N/A') }}"
      - "  Exit code: {{ task_01_rc | default(-1) }}"
      - "  Data: {{ data_01 | default('') | trim }}"
      - "  Status: {{ status_01 | default('ERROR') | trim }}"
      - "  Details: {{ details_01 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 02 - {{ req_02 }}:"
      - "  Task: {{ task_02_name | default('Task not recorded') }}"
      - "  Command: {{ task_02_cmd | default('N/A') }}"
      - "  Exit code: {{ task_02_rc | default(-1) }}"
      - "  Data: {{ data_02 | default('') | trim }}"
      - "  Status: {{ status_02 | default('ERROR') | trim }}"
      - "  Details: {{ details_02 | default('Not evaluated') | trim }}"
      - ""
      - "OVERALL REMEDIATION:"
      - "  Result: {{ cis_result | default('ERROR') | trim }}"
      - "  Details: {{ details_02 | default('Not evaluated') | trim }}"
    tags: [execute]

  always:
  - name: "Restore - Remove backup directory"
    ansible.builtin.file:
      path: "{{ backup_dir }}"
      state: absent
    failed_when: false
    tags: [restore]
