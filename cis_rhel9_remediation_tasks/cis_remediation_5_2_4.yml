---
- name: Initialize meta data variables
  include_vars: cis_remediation_var_5_2_4.yml

- name: "State Guard - Check for existing checkpoint"
  ansible.builtin.stat:
    path: "{{ state_guard_flag }}"
  register: _sg_flag
  tags: [snapshot]
- name: "State Guard - Restore /etc/sudoers from prior checkpoint"
  ansible.builtin.copy:
    src: "{{ state_guard_dir }}/sudoers.present"
    dest: "/etc/sudoers"
    remote_src: true
  when: "_sg_flag.stat.exists"
  failed_when: false
  tags: [snapshot]
- name: "State Guard - Restore /etc/sudoers.d directory from prior checkpoint"
  ansible.builtin.shell: |
    if [ -d "{{ state_guard_dir }}/sudoers.d" ]; then
      rm -rf /etc/sudoers.d/*
      cp -r "{{ state_guard_dir }}/sudoers.d/"* /etc/sudoers.d/
    fi
  args:
    executable: /bin/bash
  when: "_sg_flag.stat.exists"
  failed_when: false
  tags: [snapshot]
- name: "State Guard - Remove old checkpoint"
  ansible.builtin.file:
    path: "{{ state_guard_dir }}"
    state: absent
  when: "_sg_flag.stat.exists"
  tags: [snapshot]
- name: "State Guard - Create checkpoint directory"
  ansible.builtin.file:
    path: "{{ state_guard_dir }}"
    state: directory
    mode: '0700'
  tags: [snapshot]
- name: "State Guard - Check if /etc/sudoers exists"
  ansible.builtin.stat:
    path: "/etc/sudoers"
  register: _sg_sudoers_stat
  tags: [snapshot]
- name: "State Guard - Backup /etc/sudoers"
  ansible.builtin.copy:
    src: "/etc/sudoers"
    dest: "{{ state_guard_dir }}/sudoers.present"
    remote_src: true
  when: "_sg_sudoers_stat.stat.exists"
  tags: [snapshot]
- name: "State Guard - Check if /etc/sudoers.d directory exists"
  ansible.builtin.stat:
    path: "/etc/sudoers.d"
  register: _sg_sudoersd_stat
  tags: [snapshot]
- name: "State Guard - Backup /etc/sudoers.d directory"
  ansible.builtin.copy:
    src: "/etc/sudoers.d/"
    dest: "{{ state_guard_dir }}/sudoers.d/"
    remote_src: true
  when: "_sg_sudoersd_stat.stat.exists and _sg_sudoersd_stat.stat.isdir"
  tags: [snapshot]
- name: "State Guard - Create checkpoint flag"
  ansible.builtin.copy:
    content: "checkpoint"
    dest: "{{ state_guard_flag }}"
  tags: [snapshot]

- block:
# === STATE GUARD — EXECUTE PHASE ===
  - name: "Req 01 - Check if sudo is installed"
    ansible.builtin.shell: which sudo
    args:
      executable: /bin/bash
    register: result_01
    failed_when: false
    changed_when: false
    tags: [execute]

  - name: "Store requirement 01 details"
    ansible.builtin.set_fact:
      task_01_name: "Check if sudo is installed"
      task_01_cmd: "which sudo"
      task_01_rc: "{{ result_01.rc | default(-1) }}"
      data_01: "{{ result_01.stdout | default('') | trim }}"
      status_01: "{{ 'PASS' if (result_01.rc | default(-1)) == 0 else 'FAIL' }}"
      details_01: "{{ 'sudo found at: ' + result_01.stdout | trim if (result_01.rc | default(-1)) == 0 else 'sudo not found' }}"
      playbook_skipped: "{{ (result_01.rc | default(-1)) != 0 }}"
    tags: [execute]

  - name: "Req 02 - Remove NOPASSWD tags from /etc/sudoers"
    ansible.builtin.lineinfile:
      path: "/etc/sudoers"
      regexp: 'NOPASSWD'
      state: absent
      validate: '/usr/sbin/visudo -cf %s'
    register: result_02
    failed_when: false
    when: "not playbook_skipped | default(false)"
    tags: [execute]

  - name: "Store requirement 02 details"
    ansible.builtin.set_fact:
      task_02_name: "Remove NOPASSWD tags from /etc/sudoers"
      task_02_cmd: "lineinfile: path=/etc/sudoers regexp=NOPASSWD state=absent"
      task_02_rc: "{{ 0 if result_02 is not skipped else -1 }}"
      data_02: "{{ 'NOPASSWD lines removed' if result_02.changed | default(false) else 'No NOPASSWD lines found' }}"
      status_02: "{{ 'SKIP' if result_02 is skipped else 'PASS' }}"
      details_02: "{{ 'Sudo not installed' if result_02 is skipped else 'NOPASSWD entries removed from /etc/sudoers' }}"
    when: "not playbook_skipped | default(false)"
    tags: [execute]

  - name: "Store requirement 02 skipped details"
    ansible.builtin.set_fact:
      task_02_name: "Remove NOPASSWD tags from /etc/sudoers"
      task_02_cmd: "lineinfile: path=/etc/sudoers regexp=NOPASSWD state=absent"
      task_02_rc: -1
      data_02: "SKIP"
      status_02: "SKIP"
      details_02: "Sudo not installed"
    when: "playbook_skipped | default(false)"
    tags: [execute]

  - name: "Req 03 - Remove NOPASSWD tags from /etc/sudoers.d files"
    ansible.builtin.shell: |
      find /etc/sudoers.d/ -type f ! -name '*.bak' -exec grep -l 'NOPASSWD' {} \; | while read f; do
        sed -i '/NOPASSWD/d' "$f"
      done
    args:
      executable: /bin/bash
    register: result_03
    failed_when: false
    changed_when: false
    when: "not playbook_skipped | default(false)"
    tags: [execute]

  - name: "Store requirement 03 details"
    ansible.builtin.set_fact:
      task_03_name: "Remove NOPASSWD tags from /etc/sudoers.d files"
      task_03_cmd: |
        find /etc/sudoers.d/ -type f -exec sed -i '/NOPASSWD/d' {} \\;
      task_03_rc: "{{ result_03.rc | default(-1) }}"
      data_03: "{{ 'NOPASSWD lines removed from sudoers.d files' if result_03.rc | default(-1) == 0 else 'Failed' }}"
      status_03: "{{ 'SKIP' if result_03 is skipped else 'PASS' }}"
      details_03: "{{ 'Sudo not installed' if result_03 is skipped else 'NOPASSWD entries removed from /etc/sudoers.d/' }}"
    when: "not playbook_skipped | default(false)"
    tags: [execute]

  - name: "Store requirement 03 skipped details"
    ansible.builtin.set_fact:
      task_03_name: "Remove NOPASSWD tags from /etc/sudoers.d files"
      task_03_cmd: |
        find /etc/sudoers.d/ -type f -exec sed -i '/NOPASSWD/d' {} \\;
      task_03_rc: -1
      data_03: "SKIP"
      status_03: "SKIP"
      details_03: "Sudo not installed"
    when: "playbook_skipped | default(false)"
    tags: [execute]

  - name: "Req 04 - Verify no NOPASSWD tags remain"
    ansible.builtin.shell: grep -r 'NOPASSWD' /etc/sudoers /etc/sudoers.d/ 2>/dev/null || echo "CLEAN"
    args:
      executable: /bin/bash
    register: result_04
    failed_when: false
    changed_when: false
    when: "not playbook_skipped | default(false)"
    tags: [execute]

  - name: "Store requirement 04 details"
    ansible.builtin.set_fact:
      task_04_name: "Verify no NOPASSWD tags remain"
      task_04_cmd: "grep -r 'NOPASSWD' /etc/sudoers /etc/sudoers.d/"
      task_04_rc: "{{ result_04.rc | default(-1) }}"
      data_04: "{{ result_04.stdout | default('') | trim }}"
      status_04: "{{ 'SKIP' if result_04 is skipped else ('PASS' if (result_04.stdout | default('') | trim) == 'CLEAN' else 'FAIL') }}"
      details_04: "{{ 'Sudo not installed' if result_04 is skipped else ('No NOPASSWD entries found' if (result_04.stdout | default('') | trim) == 'CLEAN' else 'NOPASSWD entries still present') }}"
    when: "not playbook_skipped | default(false)"
    tags: [execute]

  - name: "Store requirement 04 skipped details"
    ansible.builtin.set_fact:
      task_04_name: "Verify no NOPASSWD tags remain"
      task_04_cmd: "grep -r 'NOPASSWD' /etc/sudoers /etc/sudoers.d/"
      task_04_rc: -1
      data_04: "SKIP"
      status_04: "SKIP"
      details_04: "Sudo not installed"
    when: "playbook_skipped | default(false)"
    tags: [execute]

  - name: "Set cis_result"
    ansible.builtin.set_fact:
      cis_result: "{{ 'PASS' if status_04 == 'PASS' else 'FAIL' if status_04 == 'FAIL' else status_04 }}"
    tags: [execute]

  - name: "Generate remediation report"
    ansible.builtin.debug:
      msg:
      - "========================================================"
      - "        REMEDIATION REPORT — CIS 5.2.4"
      - "========================================================"
      - "Reference: CIS Benchmark checkpoint 5.2.4"
      - ""
      - "REQUIREMENT 01 - {{ req_01 }}:"
      - "  Task: {{ task_01_name | default('Task not recorded') }}"
      - "  Command: {{ task_01_cmd | default('N/A') }}"
      - "  Exit code: {{ task_01_rc | default(-1) }}"
      - "  Data: {{ data_01 | default('') | trim }}"
      - "  Status: {{ status_01 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_01 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 02 - {{ req_02 }}:"
      - "  Task: {{ task_02_name | default('Task not recorded') }}"
      - "  Command: {{ task_02_cmd | default('N/A') }}"
      - "  Exit code: {{ task_02_rc | default(-1) }}"
      - "  Data: {{ data_02 | default('') | trim }}"
      - "  Status: {{ status_02 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_02 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 03 - {{ req_03 }}:"
      - "  Task: {{ task_03_name | default('Task not recorded') }}"
      - "  Command: {{ task_03_cmd | default('N/A') }}"
      - "  Exit code: {{ task_03_rc | default(-1) }}"
      - "  Data: {{ data_03 | default('') | trim }}"
      - "  Status: {{ status_03 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_03 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 04 - {{ req_04 }}:"
      - "  Task: {{ task_04_name | default('Task not recorded') }}"
      - "  Command: {{ task_04_cmd | default('N/A') }}"
      - "  Exit code: {{ task_04_rc | default(-1) }}"
      - "  Data: {{ data_04 | default('') | trim }}"
      - "  Status: {{ status_04 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_04 | default('Not evaluated') | trim }}"
      - ""
      - "========================================================"
      - "OVERALL REMEDIATION:"
      - "  Result: {{ cis_result | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_04 | default('Not evaluated') | trim }}"
      - "========================================================"
    tags: [execute]

  always:
# === STATE GUARD — RESTORE PHASE (GUARANTEED) ===
  - name: "State Guard Restore - Check if checkpoint exists"
    ansible.builtin.stat:
      path: "{{ state_guard_flag }}"
    register: _sg_restore_flag
    failed_when: false
    tags: [restore]

  - name: "State Guard Restore - Check if sudoers backup exists"
    ansible.builtin.stat:
      path: "{{ state_guard_dir }}/sudoers.present"
    register: _sg_restore_sudoers
    failed_when: false
    tags: [restore]

  - name: "State Guard Restore - Restore /etc/sudoers from backup"
    ansible.builtin.copy:
      src: "{{ state_guard_dir }}/sudoers.present"
      dest: "/etc/sudoers"
      remote_src: true
    when: "_sg_restore_sudoers.stat.exists | default(false)"
    failed_when: false
    tags: [restore]

  - name: "State Guard Restore - Check if sudoers.d backup exists"
    ansible.builtin.stat:
      path: "{{ state_guard_dir }}/sudoers.d"
    register: _sg_restore_sudoersd
    failed_when: false
    tags: [restore]

  - name: "State Guard Restore - Restore /etc/sudoers.d from backup"
    ansible.builtin.shell: |
      rm -rf /etc/sudoers.d/*
      cp -r "{{ state_guard_dir }}/sudoers.d/"* /etc/sudoers.d/
    args:
      executable: /bin/bash
    when: "_sg_restore_sudoersd.stat.exists | default(false) and _sg_restore_sudoersd.stat.isdir | default(false)"
    failed_when: false
    tags: [restore]

  - name: "State Guard Restore - Remove checkpoint"
    ansible.builtin.file:
      path: "{{ state_guard_dir }}"
      state: absent
    when: "_sg_restore_flag.stat.exists | default(false)"
    failed_when: false
    tags: [restore]
