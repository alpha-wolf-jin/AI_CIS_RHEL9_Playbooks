playbook_name: "cis_1_1_2_2_3_remediation"
backup_dir: "/var/log/ai-playbooks-backup/{{ playbook_name }}"
mount_point: "/dev/shm"
mount_option: "nosuid"
req_01: |
  Check if a separate partition exists for /dev/shm using command: `mount | grep -E '\\s/dev/shm\\s'`. Expected result: output showing a mount point for /dev/shm.
req_02: "Edit /etc/fstab to add nosuid to the fourth field for /dev/shm partition. Expected result: the line for /dev/shm includes 'nosuid' in the options."
req_03: "Remount /dev/shm with the configured options using command: `mount -o remount /dev/shm`. Expected result: /dev/shm is remounted with nosuid option."
req_04: |
  Verify the nosuid option is set on /dev/shm using command: `mount | grep -E '\\s/dev/shm\\s' | grep -o 'nosuid'`. Expected result: output contains 'nosuid'.
req_05: "Store the final remediation result in a variable named 'cis_result' using set_fact. Set cis_result to the overall remediation status (PASS/FAIL/SKIP/ERROR) derived from the last requirement's status variable."
