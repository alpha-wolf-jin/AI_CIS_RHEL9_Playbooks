---
- name: Initialize meta data variables
  include_vars: cis_remediation_var_1_1_2_7_2.yml

- name: "Snapshot - Create backup directory"
  ansible.builtin.file:
    path: "{{ backup_dir }}"
    state: directory
    mode: '0700'
  tags: [snapshot]
- name: "Snapshot - Check if /etc/fstab exists"
  ansible.builtin.stat:
    path: /etc/fstab
  register: fstab_stat
  tags: [snapshot]
- name: "Snapshot - Backup /etc/fstab if exists"
  ansible.builtin.copy:
    src: /etc/fstab
    dest: "{{ backup_dir }}/fstab.bak"
    remote_src: true
  when: "fstab_stat.stat.exists | default(false)"
  tags: [snapshot]

- block:
  - name: "Req 01 - Check if /var/log/audit is a separate partition"
    ansible.builtin.shell: "mount | grep -E '\\s{{ mount_point }}\\s'"
    args:
      executable: /bin/bash
    register: result_01
    failed_when: false
    changed_when: false
    tags: [execute]

  - name: "Store requirement 01 details"
    set_fact:
      task_01_name: "Check if /var/log/audit is a separate partition"
      task_01_cmd: |
        mount | grep -E '\\s{{ mount_point }}\\s'
      task_01_rc: "{{ result_01.rc | default(-1) }}"
      data_01: "{{ result_01.stdout | default('') | trim }}"
      status_01: "{{ 'PASS' if (result_01.rc | default(-1)) == 0 and (result_01.stdout | default('') | trim | length > 0) else 'FAIL' }}"
      details_01: "{{ 'Separate partition exists' if (result_01.rc | default(-1)) == 0 and (result_01.stdout | default('') | trim | length > 0) else 'No separate partition found' }}"
      partition_exists: "{{ (result_01.rc | default(-1)) == 0 and (result_01.stdout | default('') | trim | length > 0) }}"
    tags: [execute]

  - name: "Req 02 - Apply nodev mount option to /var/log/audit in /etc/fstab"
    ansible.builtin.shell: "sed -i 's|\\(\\s{{ mount_point }}\\s\\+\\S\\+\\s\\+\\)\\S\\+|\\1defaults,rw,nosuid,nodev,noexec,relatime|' /etc/fstab"
    args:
      executable: /bin/bash
    register: result_02
    failed_when: false
    when: "partition_exists | default(false)"
    tags: [execute]

  - name: "Store requirement 02 details"
    set_fact:
      task_02_name: "Apply nodev mount option to /var/log/audit in /etc/fstab"
      task_02_cmd: |
        sed -i 's|\\(\\s{{ mount_point }}\\s\\+\\S\\+\\s\\+\\)\\S\\+|\\1defaults,rw,nosuid,nodev,noexec,relatime|' /etc/fstab
      task_02_rc: "{{ result_02.rc | default(-1) if (result_02 is defined and not (result_02.skipped | default(false))) else -1 }}"
      data_02: "{{ 'Not applicable - no separate partition' if (result_02 is not defined or (result_02.skipped | default(false))) else (result_02.stdout | default('') | trim) }}"
      status_02: "{{ 'SKIP' if (result_02 is not defined or (result_02.skipped | default(false))) else ('PASS' if (result_02.rc | default(-1)) == 0 else 'FAIL') }}"
      details_02: "{{ 'Requirement not applicable because /var/log/audit is not a separate partition' if (result_02 is not defined or (result_02.skipped | default(false))) else ('nodev option applied to fstab' if (result_02.rc | default(-1)) == 0 else 'Failed to apply nodev option to fstab') }}"
    tags: [execute]

  - name: "Req 03 - Remount /var/log/audit with updated options"
    ansible.builtin.shell: "mount -o remount {{ mount_point }}"
    args:
      executable: /bin/bash
    register: result_03
    failed_when: false
    when: "partition_exists | default(false)"
    tags: [execute]

  - name: "Store requirement 03 details"
    set_fact:
      task_03_name: "Remount /var/log/audit with updated options"
      task_03_cmd: "mount -o remount {{ mount_point }}"
      task_03_rc: "{{ result_03.rc | default(-1) if (result_03 is defined and not (result_03.skipped | default(false))) else -1 }}"
      data_03: "{{ 'Not applicable - no separate partition' if (result_03 is not defined or (result_03.skipped | default(false))) else (result_03.stderr | default('') | trim) }}"
      status_03: "{{ 'SKIP' if (result_03 is not defined or (result_03.skipped | default(false))) else ('PASS' if (result_03.rc | default(-1)) == 0 else 'FAIL') }}"
      details_03: "{{ 'Requirement not applicable because /var/log/audit is not a separate partition' if (result_03 is not defined or (result_03.skipped | default(false))) else ('Remount succeeded' if (result_03.rc | default(-1)) == 0 else 'Remount failed') }}"
    tags: [execute]

  - name: "Req 04 - Verify nodev option is active on /var/log/audit"
    ansible.builtin.shell: "mount | grep -E '\\s{{ mount_point }}\\s' | grep -o '{{ mount_option }}'"
    args:
      executable: /bin/bash
    register: result_04
    failed_when: false
    changed_when: false
    when: "partition_exists | default(false)"
    tags: [execute]

  - name: "Store requirement 04 details"
    set_fact:
      task_04_name: "Verify nodev option is active on /var/log/audit"
      task_04_cmd: |
        mount | grep -E '\\s{{ mount_point }}\\s' | grep -o '{{ mount_option }}'
      task_04_rc: "{{ result_04.rc | default(-1) if (result_04 is defined and not (result_04.skipped | default(false))) else -1 }}"
      data_04: "{{ 'Not applicable - no separate partition' if (result_04 is not defined or (result_04.skipped | default(false))) else (result_04.stdout | default('') | trim) }}"
      status_04: "{{ 'SKIP' if (result_04 is not defined or (result_04.skipped | default(false))) else ('PASS' if (result_04.stdout | default('') | trim) == mount_option else 'FAIL') }}"
      details_04: "{{ 'Requirement not applicable because /var/log/audit is not a separate partition' if (result_04 is not defined or (result_04.skipped | default(false))) else ('nodev option is active' if (result_04.stdout | default('') | trim) == mount_option else 'nodev option is not active') }}"
    tags: [execute]

  - name: "Set final remediation result"
    set_fact:
      cis_result: "{{ 'SKIP' if not partition_exists else ('PASS' if status_04 == 'PASS' else 'FAIL') }}"
    tags: [execute]

  - name: "Generate remediation report"
    ansible.builtin.debug:
      msg:
      - "REMEDIATION REPORT — CIS 1.1.2.7.2"
      - "Reference: CIS Benchmark checkpoint 1.1.2.7.2"
      - ""
      - "REQUIREMENT 01 - {{ req_01 }}:"
      - "  Task: {{ task_01_name | default('Task not recorded') }}"
      - "  Command: {{ task_01_cmd | default('N/A') }}"
      - "  Exit code: {{ task_01_rc | default(-1) }}"
      - "  Data: {{ data_01 | default('Data collection failed') | trim }}"
      - "  Status: {{ status_01 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_01 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 02 - {{ req_02 }}:"
      - "  Task: {{ task_02_name | default('Task not recorded') }}"
      - "  Command: {{ task_02_cmd | default('N/A') }}"
      - "  Exit code: {{ task_02_rc | default(-1) }}"
      - "  Data: {{ data_02 | default('Data collection failed') | trim }}"
      - "  Status: {{ status_02 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_02 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 03 - {{ req_03 }}:"
      - "  Task: {{ task_03_name | default('Task not recorded') }}"
      - "  Command: {{ task_03_cmd | default('N/A') }}"
      - "  Exit code: {{ task_03_rc | default(-1) }}"
      - "  Data: {{ data_03 | default('Data collection failed') | trim }}"
      - "  Status: {{ status_03 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_03 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 04 - {{ req_04 }}:"
      - "  Task: {{ task_04_name | default('Task not recorded') }}"
      - "  Command: {{ task_04_cmd | default('N/A') }}"
      - "  Exit code: {{ task_04_rc | default(-1) }}"
      - "  Data: {{ data_04 | default('Data collection failed') | trim }}"
      - "  Status: {{ status_04 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_04 | default('Not evaluated') | trim }}"
      - ""
      - "========================================================"
      - "OVERALL RESULT:"
      - "  Result: {{ cis_result | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_04 | default('Not evaluated') | trim }}"
      - "========================================================"
    tags: [execute]

  always:
  - name: "Restore - Check if backup exists"
    ansible.builtin.stat:
      path: "{{ backup_dir }}/fstab.bak"
    register: restore_stat
    tags: [restore]

  - name: "Restore - Restore /etc/fstab from backup"
    ansible.builtin.copy:
      src: "{{ backup_dir }}/fstab.bak"
      dest: /etc/fstab
      remote_src: true
    when: "restore_stat.stat.exists | default(false)"
    tags: [restore]

  - name: "Restore - Remount /var/log/audit from restored fstab"
    ansible.builtin.shell: "mount -o remount {{ mount_point }}"
    args:
      executable: /bin/bash
    failed_when: false
    when: "restore_stat.stat.exists | default(false)"
    tags: [restore]

  - name: "Restore - Remove backup directory"
    ansible.builtin.file:
      path: "{{ backup_dir }}"
      state: absent
    tags: [restore]
