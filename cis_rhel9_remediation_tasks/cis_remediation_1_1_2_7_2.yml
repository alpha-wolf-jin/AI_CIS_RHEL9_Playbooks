---
- name: Initialize meta data variables
  include_vars: cis_remediation_var_1_1_2_7_2.yml

- name: "Snapshot - Create backup directory"
  ansible.builtin.file:
    path: "{{ backup_dir }}"
    state: directory
    mode: '0700'
  tags: [snapshot]
- name: "Snapshot - Check if /etc/fstab exists"
  ansible.builtin.stat:
    path: /etc/fstab
  register: fstab_stat
  tags: [snapshot]
- name: "Snapshot - Backup /etc/fstab if exists"
  ansible.builtin.copy:
    src: /etc/fstab
    dest: "{{ backup_dir }}/fstab.bak"
    remote_src: true
  when: fstab_stat.stat.exists
  tags: [snapshot]

- block:
  - name: "Initialize partition existence flag"
    set_fact:
      partition_exists: false
    tags: [execute]

  - name: "Req 01 - Check if /var/log/audit is mounted"
    ansible.builtin.shell: mount | grep '/var/log/audit'
    args:
      executable: /bin/bash
    register: mount_check
    failed_when: false
    changed_when: false
    tags: [execute]

  - name: "Req 01 - Check if /var/log/audit in fstab"
    ansible.builtin.shell: grep '/var/log/audit' /etc/fstab
    args:
      executable: /bin/bash
    register: fstab_check
    failed_when: false
    changed_when: false
    tags: [execute]

  - name: "Req 01 - Store partition check results"
    set_fact:
      partition_exists: "{{ mount_check.rc == 0 and fstab_check.rc == 0 }}"
      task_01_name: "Check if separate partition exists for /var/log/audit"
      task_01_cmd: "mount | grep '/var/log/audit' ; grep '/var/log/audit' /etc/fstab"
      task_01_rc: "{{ 0 if (mount_check.rc == 0 and fstab_check.rc == 0) else 1 }}"
      data_01: "mount: {{ mount_check.stdout | default('') | trim }}; fstab: {{ fstab_check.stdout | default('') | trim }}"
      status_01: "{{ 'PASS' if (mount_check.rc == 0 and fstab_check.rc == 0) else 'SKIPPED' }}"
      details_01: "{{ 'Partition found in mount and fstab' if (mount_check.rc == 0 and fstab_check.rc == 0) else 'Partition not found, skipping remediation' }}"
    tags: [execute]

  - name: "Req 02 - Add nodev option to /var/log/audit in fstab"
    ansible.builtin.lineinfile:
      path: /etc/fstab
      regexp: |
        ^\s*(\S+\s+/var/log/audit\s+\S+\s+)(?!\S*\bnodev\b)(\S+)(\s+\S+\s+\S+\s*)$
      line: |
        \1\2,nodev\3
      backrefs: true
    register: fstab_edit
    failed_when: false
    when: partition_exists | default(false)
    tags: [execute]

  - name: "Req 02 - Capture fstab line after edit"
    ansible.builtin.shell: grep '/var/log/audit' /etc/fstab
    args:
      executable: /bin/bash
    register: fstab_line_after
    changed_when: false
    when: partition_exists | default(false)
    tags: [execute]

  - name: "Req 02 - Store fstab edit results"
    set_fact:
      task_02_name: "Edit /etc/fstab to add nodev"
      task_02_cmd: "lineinfile: add nodev to fstab entry"
      task_02_rc: "{{ 0 if fstab_edit is defined else -1 }}"
      data_02: "{{ fstab_line_after.stdout | default('') | trim }}"
      status_02: "{{ 'APPLIED' if (partition_exists and fstab_edit.changed) else ('PASS' if partition_exists else 'SKIPPED') }}"
      details_02: "{{ 'nodev added' if (partition_exists and fstab_edit.changed) else ('nodev already present' if partition_exists else 'No partition, skipped') }}"
    tags: [execute]

  - name: "Req 03 - Remount /var/log/audit"
    ansible.builtin.shell: mount -o remount /var/log/audit
    args:
      executable: /bin/bash
    register: remount_result
    failed_when: false
    when: partition_exists | default(false)
    tags: [execute]

  - name: "Req 03 - Store remount results"
    set_fact:
      task_03_name: "Remount /var/log/audit"
      task_03_cmd: "mount -o remount /var/log/audit"
      task_03_rc: "{{ remount_result.rc | default(-1) }}"
      data_03: "{{ remount_result.stdout | default('') | trim }}"
      status_03: "{{ 'APPLIED' if (remount_result.rc | default(-1) == 0) else ('FAIL' if partition_exists else 'SKIPPED') }}"
      details_03: "{{ 'Remounted successfully' if (remount_result.rc | default(-1) == 0) else ('Remount failed' if partition_exists else 'Skipped') }}"
    tags: [execute]

  - name: "Req 04 - Verify nodev option set on /var/log/audit"
    ansible.builtin.shell: mount | grep '/var/log/audit' | grep nodev
    args:
      executable: /bin/bash
    register: verify_result
    failed_when: false
    when: partition_exists | default(false)
    tags: [execute]

  - name: "Req 04 - Store verify results"
    set_fact:
      task_04_name: "Verify nodev option set"
      task_04_cmd: "mount | grep '/var/log/audit' | grep nodev"
      task_04_rc: "{{ verify_result.rc | default(-1) }}"
      data_04: "{{ verify_result.stdout | default('') | trim }}"
      status_04: "{{ 'PASS' if (verify_result.rc | default(-1) == 0) else ('FAIL' if partition_exists else 'SKIPPED') }}"
      details_04: "{{ 'nodev verified' if (verify_result.rc | default(-1) == 0) else ('nodev not found on mount' if partition_exists else 'Skipped') }}"
    tags: [execute]

  - name: "Generate remediation report"
    ansible.builtin.debug:
      msg:
      - "REMEDIATION REPORT — CIS 1.1.2.7.2"
      - "Reference: CIS Benchmark checkpoint 1.1.2.7.2"
      - ""
      - "REQUIREMENT 01 - {{ req_01 }}:"
      - "  Task: {{ task_01_name | default('Task not recorded') }}"
      - "  Command: {{ task_01_cmd | default('N/A') }}"
      - "  Exit code: {{ task_01_rc | default(-1) }}"
      - "  Data: {{ data_01 | default('Data collection failed') | trim }}"
      - "  Status: {{ status_01 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_01 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 02 - {{ req_02 }}:"
      - "  Task: {{ task_02_name | default('Task not recorded') }}"
      - "  Command: {{ task_02_cmd | default('N/A') }}"
      - "  Exit code: {{ task_02_rc | default(-1) }}"
      - "  Data: {{ data_02 | default('Data collection failed') | trim }}"
      - "  Status: {{ status_02 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_02 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 03 - {{ req_03 }}:"
      - "  Task: {{ task_03_name | default('Task not recorded') }}"
      - "  Command: {{ task_03_cmd | default('N/A') }}"
      - "  Exit code: {{ task_03_rc | default(-1) }}"
      - "  Data: {{ data_03 | default('Data collection failed') | trim }}"
      - "  Status: {{ status_03 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_03 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 04 - {{ req_04 }}:"
      - "  Task: {{ task_04_name | default('Task not recorded') }}"
      - "  Command: {{ task_04_cmd | default('N/A') }}"
      - "  Exit code: {{ task_04_rc | default(-1) }}"
      - "  Data: {{ data_04 | default('Data collection failed') | trim }}"
      - "  Status: {{ status_04 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_04 | default('Not evaluated') | trim }}"
      - ""
      - "========================================================"
      - "OVERALL RESULT:"
      - "  Result: {{ status_04 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_04 | default('Not evaluated') | trim }}"
      - "========================================================"
    tags: [execute]

  always:
  - name: "Restore - Check if backup exists"
    ansible.builtin.stat:
      path: "{{ backup_dir }}/fstab.bak"
    register: backup_stat
    failed_when: false
    tags: [restore]

  - name: "Restore - Overwrite /etc/fstab with backup"
    ansible.builtin.copy:
      src: "{{ backup_dir }}/fstab.bak"
      dest: /etc/fstab
      remote_src: true
    when: backup_stat.stat.exists | default(false)
    failed_when: false
    tags: [restore]

  - name: "Restore - Remount /var/log/audit with original options"
    ansible.builtin.shell: mount -o remount /var/log/audit
    args:
      executable: /bin/bash
    when: backup_stat.stat.exists | default(false)
    failed_when: false
    tags: [restore]

  - name: "Restore - Remove backup directory"
    ansible.builtin.file:
      path: "{{ backup_dir }}"
      state: absent
    failed_when: false
    tags: [restore]
