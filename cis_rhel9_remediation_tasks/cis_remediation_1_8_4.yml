---
- name: Initialize meta data variables
  include_vars: cis_remediation_var_1_8_4.yml

- name: "Snapshot - Create backup directory"
  ansible.builtin.file:
    path: "{{ backup_dir }}"
    state: directory
    mode: '0700'
  tags: [snapshot]
- name: "Snapshot - Check if dconf profile file exists"
  ansible.builtin.stat:
    path: "{{ dconf_profile_file }}"
  register: _profile_stat
  tags: [snapshot]
- name: "Snapshot - Backup dconf profile file if exists"
  ansible.builtin.copy:
    src: "{{ dconf_profile_file }}"
    dest: "{{ backup_dir }}/user.profile"
    remote_src: true
  when: "_profile_stat.stat.exists | default(false)"
  tags: [snapshot]
- name: "Snapshot - Check if dconf key file exists"
  ansible.builtin.stat:
    path: "{{ dconf_key_file }}"
  register: _keyfile_stat
  tags: [snapshot]
- name: "Snapshot - Backup dconf key file if exists"
  ansible.builtin.copy:
    src: "{{ dconf_key_file }}"
    dest: "{{ backup_dir }}/00-screensaver"
    remote_src: true
  when: "_keyfile_stat.stat.exists | default(false)"
  tags: [snapshot]
- name: "Snapshot - Check if dconf database directory exists"
  ansible.builtin.stat:
    path: "{{ dconf_db_dir }}"
  register: _dbdir_stat
  tags: [snapshot]
- name: "Snapshot - Mark dconf database directory as absent"
  ansible.builtin.copy:
    content: "absent"
    dest: "{{ backup_dir }}/dconf_db_dir.absent"
  when: "not (_dbdir_stat.stat.exists | default(false))"
  tags: [snapshot]
- name: "Snapshot - Check if remediation script exists"
  ansible.builtin.stat:
    path: "{{ remediation_script }}"
  register: _remediation_script_stat
  tags: [snapshot]
- name: "Snapshot - Mark remediation script as absent"
  ansible.builtin.copy:
    content: "absent"
    dest: "{{ backup_dir }}/remediation_script.absent"
  when: "not (_remediation_script_stat.stat.exists | default(false))"
  tags: [snapshot]
- name: "Snapshot - Check if audit script exists"
  ansible.builtin.stat:
    path: "{{ audit_script }}"
  register: _audit_script_stat
  tags: [snapshot]
- name: "Snapshot - Mark audit script as absent"
  ansible.builtin.copy:
    content: "absent"
    dest: "{{ backup_dir }}/audit_script.absent"
  when: "not (_audit_script_stat.stat.exists | default(false))"
  tags: [snapshot]

- block:
  - name: "Req 01 - Gather package facts"
    ansible.builtin.package_facts:
      manager: auto
    failed_when: false
    tags: [execute]

  - name: "Req 01 - Set GDM installation status"
    ansible.builtin.set_fact:
      gdm_installed: "{{ ('gdm' in ansible_facts.packages) or ('gdm3' in ansible_facts.packages) }}"
    tags: [execute]

  - name: "Req 01 - Ensure dconf profile directory exists"
    ansible.builtin.file:
      path: "{{ dconf_profile_dir }}"
      state: directory
      mode: '0755'
    when: "gdm_installed | default(false)"
    failed_when: false
    tags: [execute]

  - name: "Req 01 - Configure dconf profile file"
    ansible.builtin.blockinfile:
      path: "{{ dconf_profile_file }}"
      block: |
        user-db:user
        system-db:{{ dconf_db_name }}
      marker: "# {mark} ANSIBLE MANAGED BLOCK"
      create: true
      mode: '0644'
    when: "gdm_installed | default(false)"
    failed_when: false
    tags: [execute]

  - name: "Req 01 - Ensure dconf database directory exists"
    ansible.builtin.file:
      path: "{{ dconf_db_dir }}"
      state: directory
      mode: '0755'
    when: "gdm_installed | default(false)"
    failed_when: false
    tags: [execute]

  - name: "Req 01 - Copy remediation script to remote"
    ansible.builtin.copy:
      dest: "{{ remediation_script }}"
      mode: '0700'
      content: "{{ remediation_script_content }}"
    when: "gdm_installed | default(false)"
    failed_when: false
    changed_when: false
    tags: [execute]

  - name: "Req 01 - Execute remediation script"
    ansible.builtin.shell: /bin/bash "{{ remediation_script }}"
    args:
      executable: /bin/bash
    register: result_01
    when: "gdm_installed | default(false)"
    failed_when: false
    changed_when: false
    tags: [execute]

  - name: "Req 01 - Remove temporary remediation script"
    ansible.builtin.file:
      path: "{{ remediation_script }}"
      state: absent
    when: "gdm_installed | default(false)"
    failed_when: false
    changed_when: false
    tags: [execute]

  - name: "Req 01 - Update dconf system databases"
    ansible.builtin.shell: dconf update
    args:
      executable: /bin/bash
    when: "gdm_installed | default(false)"
    register: dconf_update_result
    failed_when: false
    changed_when: false
    tags: [execute]

  - name: "Req 01 - Store requirement 01 details"
    ansible.builtin.set_fact:
      task_01_name: "Execute GDM screen lock remediation script"
      task_01_cmd: "/bin/bash {{ remediation_script }}"
      task_01_rc: "{{ -1 if not (gdm_installed | default(false)) else (result_01.rc | default(-1)) }}"
      data_01: "{{ 'Not executed (GDM not installed)' if not (gdm_installed | default(false)) else (result_01.stdout | default('No output')) }}"
      status_01: "{{ 'SKIP' if not (gdm_installed | default(false)) else ('PASS' if (result_01.rc | default(-1) == 0) else 'FAIL') }}"
      details_01: "{{ 'GNOME Desktop Manager not installed, remediation not applicable' if not (gdm_installed | default(false)) else ('Remediation script executed successfully' if (result_01.rc | default(-1) == 0) else 'Remediation script failed') }}"
    tags: [execute]

  - name: "Req 02 - Copy audit script to remote"
    ansible.builtin.copy:
      dest: "{{ audit_script }}"
      mode: '0700'
      content: "{{ audit_script_content }}"
    when: "gdm_installed | default(false)"
    failed_when: false
    changed_when: false
    tags: [execute]

  - name: "Req 02 - Execute GDM screen lock audit script"
    ansible.builtin.shell: /bin/bash "{{ audit_script }}"
    args:
      executable: /bin/bash
    register: audit_result
    when: "gdm_installed | default(false)"
    failed_when: false
    changed_when: false
    tags: [execute]

  - name: "Req 02 - Remove temporary audit script"
    ansible.builtin.file:
      path: "{{ audit_script }}"
      state: absent
    when: "gdm_installed | default(false)"
    failed_when: false
    changed_when: false
    tags: [execute]

  - name: "Req 02 - Store requirement 02 details"
    ansible.builtin.set_fact:
      task_02_name: "Execute GDM screen lock audit script"
      task_02_cmd: "/bin/bash {{ audit_script }}"
      task_02_rc: "{{ -1 if not (gdm_installed | default(false)) else (audit_result.rc | default(-1)) }}"
      data_02: "{{ 'Not executed (GDM not installed)' if not (gdm_installed | default(false)) else (audit_result.stdout | default('No output')) }}"
      status_02: "{{ 'SKIP' if not (gdm_installed | default(false)) else ('PASS' if ('** PASS **' in (audit_result.stdout | default(''))) else ('FAIL' if ('** FAIL **' in (audit_result.stdout | default(''))) else 'ERROR')) }}"
      details_02: "{{ 'GNOME Desktop Manager not installed, audit not applicable' if not (gdm_installed | default(false)) else ('Audit script reported PASS' if ('** PASS **' in (audit_result.stdout | default(''))) else ('Audit script reported FAIL' if ('** FAIL **' in (audit_result.stdout | default(''))) else 'Audit result indeterminate')) }}"
    tags: [execute]

  - name: "Req 03 - Set cis_result fact"
    ansible.builtin.set_fact:
      cis_result: "{{ status_02 }}"
      compliance_details: "{{ details_02 }}"
    tags: [execute]

  - name: "Req 04 - Generate remediation report"
    ansible.builtin.debug:
      msg:
      - "REMEDIATION REPORT — CIS 1.8.4"
      - "Reference: CIS Benchmark checkpoint 1.8.4"
      - ""
      - "REQUIREMENT 01 - {{ req_01 }}:"
      - "  Task: {{ task_01_name | default('Not executed') }}"
      - "  Command: {{ task_01_cmd | default('N/A') }}"
      - "  Exit code: {{ task_01_rc | default(-1) }}"
      - "  Data: {{ data_01 | default('') | trim }}"
      - "  Status: {{ status_01 | default('ERROR') | trim }}"
      - "  Details: {{ details_01 | default('') | trim }}"
      - ""
      - "REQUIREMENT 02 - {{ req_02 }}:"
      - "  Task: {{ task_02_name | default('Not executed') }}"
      - "  Command: {{ task_02_cmd | default('N/A') }}"
      - "  Exit code: {{ task_02_rc | default(-1) }}"
      - "  Data: {{ data_02 | default('') | trim }}"
      - "  Status: {{ status_02 | default('ERROR') | trim }}"
      - "  Details: {{ details_02 | default('') | trim }}"
      - ""
      - "REQUIREMENT 03 - {{ req_03 }}:"
      - "  Task: Store cis_result fact"
      - "  Command: set_fact"
      - "  Exit code: 0"
      - "  Data: {{ cis_result | default('ERROR') | trim }}"
      - "  Status: PASS"
      - "  Details: Overall remediation status stored as {{ cis_result | default('ERROR') | trim }}"
      - ""
      - "========================================================"
      - "OVERALL REMEDIATION:"
      - "  Result: {{ cis_result | default('ERROR') | trim }}"
      - "  Details: {{ compliance_details | default('Not evaluated') | trim }}"
      - "========================================================"
    tags: [execute]

  always:
  - name: "Restore - Check if dconf profile backup exists"
    ansible.builtin.stat:
      path: "{{ backup_dir }}/user.profile"
    register: _restore_profile_stat
    failed_when: false
    tags: [restore]

  - name: "Restore - Overwrite dconf profile with original"
    ansible.builtin.copy:
      src: "{{ backup_dir }}/user.profile"
      dest: "{{ dconf_profile_file }}"
      remote_src: true
    when: "_restore_profile_stat.stat.exists | default(false)"
    failed_when: false
    tags: [restore]

  - name: "Restore - Check if dconf key file backup exists"
    ansible.builtin.stat:
      path: "{{ backup_dir }}/00-screensaver"
    register: _restore_keyfile_stat
    failed_when: false
    tags: [restore]

  - name: "Restore - Overwrite dconf key file with original"
    ansible.builtin.copy:
      src: "{{ backup_dir }}/00-screensaver"
      dest: "{{ dconf_key_file }}"
      remote_src: true
    when: "_restore_keyfile_stat.stat.exists | default(false)"
    failed_when: false
    tags: [restore]

  - name: "Restore - Check if dconf database directory absent marker exists"
    ansible.builtin.stat:
      path: "{{ backup_dir }}/dconf_db_dir.absent"
    register: _restore_dbdir_absent
    failed_when: false
    tags: [restore]

  - name: "Restore - Remove dconf database directory if it was absent before"
    ansible.builtin.file:
      path: "{{ dconf_db_dir }}"
      state: absent
    when: "_restore_dbdir_absent.stat.exists | default(false)"
    failed_when: false
    tags: [restore]

  - name: "Restore - Check if remediation script absent marker exists"
    ansible.builtin.stat:
      path: "{{ backup_dir }}/remediation_script.absent"
    register: _restore_remediation_script_absent
    failed_when: false
    tags: [restore]

  - name: "Restore - Remove remediation script if it was absent before"
    ansible.builtin.file:
      path: "{{ remediation_script }}"
      state: absent
    when: "_restore_remediation_script_absent.stat.exists | default(false)"
    failed_when: false
    tags: [restore]

  - name: "Restore - Check if audit script absent marker exists"
    ansible.builtin.stat:
      path: "{{ backup_dir }}/audit_script.absent"
    register: _restore_audit_script_absent
    failed_when: false
    tags: [restore]

  - name: "Restore - Remove audit script if it was absent before"
    ansible.builtin.file:
      path: "{{ audit_script }}"
      state: absent
    when: "_restore_audit_script_absent.stat.exists | default(false)"
    failed_when: false
    tags: [restore]

  - name: "Restore - Remove backup directory"
    ansible.builtin.file:
      path: "{{ backup_dir }}"
      state: absent
    failed_when: false
    tags: [restore]
