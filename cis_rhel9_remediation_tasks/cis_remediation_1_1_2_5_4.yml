---
- name: Initialize meta data variables
  include_vars: cis_remediation_var_1_1_2_5_4.yml

- name: "Snapshot - Create backup directory"
  ansible.builtin.file:
    path: "{{ backup_dir }}"
    state: directory
    mode: '0700'
  tags: [snapshot]
- name: "Snapshot - Check if /etc/fstab exists"
  ansible.builtin.stat:
    path: "{{ fstab_file }}"
  register: _sg_fstab_stat
  tags: [snapshot]
- name: "Snapshot - Backup /etc/fstab if exists"
  ansible.builtin.copy:
    src: "{{ fstab_file }}"
    dest: "{{ backup_dir }}/fstab.present"
    remote_src: true
  when: _sg_fstab_stat.stat.exists
  tags: [snapshot]
- name: "Snapshot - Mark /etc/fstab as absent if not exists"
  ansible.builtin.copy:
    content: "absent"
    dest: "{{ backup_dir }}/fstab.absent"
  when: not _sg_fstab_stat.stat.exists
  tags: [snapshot]
- name: "Snapshot - Save current mount options for /var/tmp"
  ansible.builtin.shell: "findmnt -n -o OPTIONS {{ mount_point }} 2>/dev/null || echo NOTMOUNTED"
  args:
    executable: /bin/bash
  register: _sg_mount_opts
  changed_when: false
  failed_when: false
  tags: [snapshot]
- name: "Snapshot - Persist mount options to file"
  ansible.builtin.copy:
    content: "{{ _sg_mount_opts.stdout | default('NOTMOUNTED') | trim }}"
    dest: "{{ backup_dir }}/mount_options.state"
  tags: [snapshot]

- block:
  - name: "Initialize data variables"
    ansible.builtin.set_fact:
      data_01: "Not collected yet"
      status_01: "ERROR"
      details_01: "Not evaluated"
      data_02: "Not collected yet"
      status_02: "ERROR"
      details_02: "Not evaluated"
      data_03: "Not collected yet"
      status_03: "ERROR"
      details_03: "Not evaluated"
      data_04: "Not collected yet"
      status_04: "ERROR"
      details_04: "Not evaluated"
      data_05: "Not collected yet"
      status_05: "ERROR"
      details_05: "Not evaluated"
      task_01_name: "Not executed"
      task_01_cmd: "N/A"
      task_01_rc: -1
      task_02_name: "Not executed"
      task_02_cmd: "N/A"
      task_02_rc: -1
      task_03_name: "Not executed"
      task_03_cmd: "N/A"
      task_03_rc: -1
      task_04_name: "Not executed"
      task_04_cmd: "N/A"
      task_04_rc: -1
      task_05_name: "Not executed"
      task_05_cmd: "N/A"
      task_05_rc: -1
    tags: [execute]

  - name: "Req 01 - Check if /var/tmp is a separate partition"
    ansible.builtin.shell: "mount | grep -E '\\s/var/tmp\\s'"
    args:
      executable: /bin/bash
    register: result_01
    failed_when: false
    changed_when: false
    tags: [execute]

  - name: "Store requirement 01 details"
    ansible.builtin.set_fact:
      task_01_name: "Check if /var/tmp is a separate partition"
      task_01_cmd: |
        mount | grep -E '\\s/var/tmp\\s'
      task_01_rc: "{{ result_01.rc | default(-1) }}"
      data_01: "{{ result_01.stdout | default('') | trim }}"
      status_01: "{{ 'PASS' if (result_01.rc | default(-1) == 0 and (result_01.stdout | default('') | trim | length > 0)) else 'FAIL' }}"
      details_01: "{{ 'Separate partition found for /var/tmp' if (result_01.rc | default(-1) == 0 and (result_01.stdout | default('') | trim | length > 0)) else 'No separate partition found for /var/tmp, remediation failed' }}"
    tags: [execute]

  - name: "Req 02 - Add noexec to /var/tmp in /etc/fstab"
    ansible.builtin.lineinfile:
      path: "{{ fstab_file }}"
      regexp: |
        ^(\s*\S+\s+{{ mount_point | regex_escape() }}\s+\S+\s+)((?:(?!{{ mount_option }})[^\s,]+(,?))+\s+)(.*)$
      line: |
        \1{{ mount_option }},\2\3
      backrefs: true
    register: result_02
    failed_when: false
    when:
    - "result_01.rc | default(-1) == 0"
    - "result_01.stdout | default('') | trim | length > 0"
    tags: [execute]

  - name: "Store requirement 02 details"
    ansible.builtin.set_fact:
      task_02_name: "Add noexec to /var/tmp in /etc/fstab"
      task_02_cmd: "lineinfile on /etc/fstab"
      task_02_rc: "{{ result_02 is not skipped | ternary(result_02.rc | default(-1), -1) }}"
      data_02: "{{ result_02 is not skipped | ternary('fstab updated', '') }}"
      status_02: "{{ 'PASS' if (result_02 is not skipped and result_02.rc | default(-1) == 0) else ('SKIP' if result_02 is skipped else 'FAIL') }}"
      details_02: "{{ 'noexec added to /var/tmp in /etc/fstab' if (result_02 is not skipped and result_02.rc | default(-1) == 0) else ('Skipped because no separate partition exists for /var/tmp' if result_02 is skipped else 'Failed to update /etc/fstab') }}"
    tags: [execute]

  - name: "Req 03 - Remount /var/tmp with updated options"
    ansible.builtin.shell: "mount -o remount {{ mount_point }}"
    args:
      executable: /bin/bash
    register: result_03
    failed_when: false
    when:
    - "result_01.rc | default(-1) == 0"
    - "result_01.stdout | default('') | trim | length > 0"
    tags: [execute]

  - name: "Store requirement 03 details"
    ansible.builtin.set_fact:
      task_03_name: "Remount /var/tmp with updated options"
      task_03_cmd: "mount -o remount /var/tmp"
      task_03_rc: "{{ result_03 is not skipped | ternary(result_03.rc | default(-1), -1) }}"
      data_03: "{{ result_03 is not skipped | ternary(result_03.stdout | default('') | trim, '') }}"
      status_03: "{{ 'PASS' if (result_03 is not skipped and result_03.rc | default(-1) == 0) else ('SKIP' if result_03 is skipped else 'FAIL') }}"
      details_03: "{{ '/var/tmp remounted successfully' if (result_03 is not skipped and result_03.rc | default(-1) == 0) else ('Skipped because no separate partition exists for /var/tmp' if result_03 is skipped else 'Failed to remount /var/tmp') }}"
    tags: [execute]

  - name: "Req 04 - Verify noexec option is set on /var/tmp"
    ansible.builtin.shell: "mount | grep -E '\\s/var/tmp\\s' | grep noexec"
    args:
      executable: /bin/bash
    register: result_04
    failed_when: false
    changed_when: false
    when:
    - "result_01.rc | default(-1) == 0"
    - "result_01.stdout | default('') | trim | length > 0"
    tags: [execute]

  - name: "Store requirement 04 details"
    ansible.builtin.set_fact:
      task_04_name: "Verify noexec option is set on /var/tmp"
      task_04_cmd: |
        mount | grep -E '\\s/var/tmp\\s' | grep noexec
      task_04_rc: "{{ result_04 is not skipped | ternary(result_04.rc | default(-1), -1) }}"
      data_04: "{{ result_04 is not skipped | ternary(result_04.stdout | default('') | trim, '') }}"
      status_04: "{{ 'PASS' if (result_04 is not skipped and result_04.rc | default(-1) == 0) else ('SKIP' if result_04 is skipped else 'FAIL') }}"
      details_04: "{{ 'noexec option confirmed on /var/tmp' if (result_04 is not skipped and result_04.rc | default(-1) == 0) else ('Skipped because no separate partition exists for /var/tmp' if result_04 is skipped else 'noexec option NOT set on /var/tmp') }}"
    tags: [execute]

  - name: "Req 05 - Store final remediation result in cis_result"
    ansible.builtin.set_fact:
      task_05_name: "Store final remediation result in cis_result"
      task_05_cmd: "N/A"
      task_05_rc: 0
      data_05: "{{ status_04 | trim }}"
      status_05: "{{ status_04 | trim }}"
      details_05: "{{ details_04 | trim }}"
      cis_result: "{{ status_04 | trim }}"
    tags: [execute]

  - name: "Generate remediation report"
    ansible.builtin.debug:
      msg:
      - "REMEDIATION REPORT — CIS 1.1.2.5.4"
      - "Reference: CIS Benchmark checkpoint 1.1.2.5.4"
      - ""
      - "REQUIREMENT 01 - {{ req_01 }}:"
      - "  Task: {{ task_01_name | default('Not recorded') }}"
      - "  Command: {{ task_01_cmd | default('N/A') }}"
      - "  Exit code: {{ task_01_rc | default(-1) }}"
      - "  Data: {{ data_01 | default('') | trim }}"
      - "  Status: {{ status_01 | default('ERROR') | trim }}"
      - "  Details: {{ details_01 | default('') | trim }}"
      - ""
      - "REQUIREMENT 02 - {{ req_02 }}:"
      - "  Task: {{ task_02_name | default('Not recorded') }}"
      - "  Command: {{ task_02_cmd | default('N/A') }}"
      - "  Exit code: {{ task_02_rc | default(-1) }}"
      - "  Data: {{ data_02 | default('') | trim }}"
      - "  Status: {{ status_02 | default('ERROR') | trim }}"
      - "  Details: {{ details_02 | default('') | trim }}"
      - ""
      - "REQUIREMENT 03 - {{ req_03 }}:"
      - "  Task: {{ task_03_name | default('Not recorded') }}"
      - "  Command: {{ task_03_cmd | default('N/A') }}"
      - "  Exit code: {{ task_03_rc | default(-1) }}"
      - "  Data: {{ data_03 | default('') | trim }}"
      - "  Status: {{ status_03 | default('ERROR') | trim }}"
      - "  Details: {{ details_03 | default('') | trim }}"
      - ""
      - "REQUIREMENT 04 - {{ req_04 }}:"
      - "  Task: {{ task_04_name | default('Not recorded') }}"
      - "  Command: {{ task_04_cmd | default('N/A') }}"
      - "  Exit code: {{ task_04_rc | default(-1) }}"
      - "  Data: {{ data_04 | default('') | trim }}"
      - "  Status: {{ status_04 | default('ERROR') | trim }}"
      - "  Details: {{ details_04 | default('') | trim }}"
      - ""
      - "REQUIREMENT 05 - {{ req_05 }}:"
      - "  Task: {{ task_05_name | default('Not recorded') }}"
      - "  Command: {{ task_05_cmd | default('N/A') }}"
      - "  Exit code: {{ task_05_rc | default(-1) }}"
      - "  Data: {{ data_05 | default('') | trim }}"
      - "  Status: {{ status_05 | default('ERROR') | trim }}"
      - "  Details: {{ details_05 | default('') | trim }}"
      - ""
      - "========================================================"
      - "OVERALL REMEDIATION:"
      - "  Result: {{ cis_result | default('ERROR') | trim }}"
      - "  Details: {{ details_05 | default('Not evaluated') | trim }}"
      - "========================================================"
    tags: [execute]

  always:
  - name: "Restore - Check if checkpoint flag exists"
    ansible.builtin.stat:
      path: "{{ backup_dir }}/fstab.present"
    register: _restore_fstab_present
    failed_when: false
    tags: [restore]

  - name: "Restore - Check if fstab absent marker exists"
    ansible.builtin.stat:
      path: "{{ backup_dir }}/fstab.absent"
    register: _restore_fstab_absent
    failed_when: false
    tags: [restore]

  - name: "Restore - Overwrite /etc/fstab with original"
    ansible.builtin.copy:
      src: "{{ backup_dir }}/fstab.present"
      dest: "{{ fstab_file }}"
      remote_src: true
    when: _restore_fstab_present.stat.exists | default(false)
    register: _restore_fstab_result
    failed_when: false
    tags: [restore]

  - name: "Restore - Delete /etc/fstab if it was absent before"
    ansible.builtin.file:
      path: "{{ fstab_file }}"
      state: absent
    when: _restore_fstab_absent.stat.exists | default(false)
    failed_when: false
    tags: [restore]

  - name: "Restore - Read saved mount options"
    ansible.builtin.slurp:
      src: "{{ backup_dir }}/mount_options.state"
    register: _restore_mount_data
    failed_when: false
    tags: [restore]

  - name: "Restore - Remount /var/tmp with original options"
    ansible.builtin.shell: "mount -o remount,{{ _restore_mount_data.content | b64decode | trim }} {{ mount_point }}"
    args:
      executable: /bin/bash
    when:
    - _restore_mount_data is not failed
    - _restore_mount_data.content is defined
    - (_restore_mount_data.content | b64decode | trim) != 'NOTMOUNTED'
    failed_when: false
    tags: [restore]

  - name: "Restore - Remove backup directory"
    ansible.builtin.file:
      path: "{{ backup_dir }}"
      state: absent
    failed_when: false
    tags: [restore]
