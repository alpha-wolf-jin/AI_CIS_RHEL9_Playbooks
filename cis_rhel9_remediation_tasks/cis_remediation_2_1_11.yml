---
- name: Initialize meta data variables
  include_vars: cis_remediation_var_2_1_11.yml

- name: "Snapshot - Create backup directory"
  ansible.builtin.file:
    path: "{{ backup_dir }}"
    state: directory
    mode: '0700'
  tags: [snapshot]
- name: "Snapshot - Save cups package installation state"
  ansible.builtin.shell: "rpm -q cups >/dev/null 2>&1 && echo installed || echo not_installed"
  args:
    executable: /bin/bash
  register: _snap_cups_pkg
  changed_when: false
  failed_when: false
  tags: [snapshot]
- name: "Snapshot - Write cups package state to file"
  ansible.builtin.copy:
    content: "{{ _snap_cups_pkg.stdout | trim }}"
    dest: "{{ backup_dir }}/cups_pkg_state"
    force: false
  tags: [snapshot]
- name: "Snapshot - Save cups.socket active state"
  ansible.builtin.shell: "systemctl is-active cups.socket || true"
  args:
    executable: /bin/bash
  register: _snap_cups_socket_active
  changed_when: false
  failed_when: false
  tags: [snapshot]
- name: "Snapshot - Write cups.socket active state to file"
  ansible.builtin.copy:
    content: "{{ _snap_cups_socket_active.stdout | trim }}"
    dest: "{{ backup_dir }}/cups_socket_active_state"
    force: false
  tags: [snapshot]
- name: "Snapshot - Save cups.socket enabled state"
  ansible.builtin.shell: "systemctl is-enabled cups.socket 2>/dev/null || echo unknown"
  args:
    executable: /bin/bash
  register: _snap_cups_socket_enabled
  changed_when: false
  failed_when: false
  tags: [snapshot]
- name: "Snapshot - Write cups.socket enabled state to file"
  ansible.builtin.copy:
    content: "{{ _snap_cups_socket_enabled.stdout | trim }}"
    dest: "{{ backup_dir }}/cups_socket_enabled_state"
    force: false
  tags: [snapshot]
- name: "Snapshot - Save cups.service active state"
  ansible.builtin.shell: "systemctl is-active cups.service || true"
  args:
    executable: /bin/bash
  register: _snap_cups_service_active
  changed_when: false
  failed_when: false
  tags: [snapshot]
- name: "Snapshot - Write cups.service active state to file"
  ansible.builtin.copy:
    content: "{{ _snap_cups_service_active.stdout | trim }}"
    dest: "{{ backup_dir }}/cups_service_active_state"
    force: false
  tags: [snapshot]
- name: "Snapshot - Save cups.service enabled state"
  ansible.builtin.shell: "systemctl is-enabled cups.service 2>/dev/null || echo unknown"
  args:
    executable: /bin/bash
  register: _snap_cups_service_enabled
  changed_when: false
  failed_when: false
  tags: [snapshot]
- name: "Snapshot - Write cups.service enabled state to file"
  ansible.builtin.copy:
    content: "{{ _snap_cups_service_enabled.stdout | trim }}"
    dest: "{{ backup_dir }}/cups_service_enabled_state"
    force: false
  tags: [snapshot]

- block:
  - name: "Prerequisite - Check if cups is installed"
    ansible.builtin.package_facts:
      manager: auto
    failed_when: false
    tags: [execute]

  - name: "Set skip flag if cups not installed"
    set_fact:
      skip_all: true
    when: "'cups' not in ansible_facts.packages"
    tags: [execute]

  - name: "Req 01 - Stop cups socket and service"
    ansible.builtin.systemd:
      name: "{{ item }}"
      state: stopped
    loop:
    - cups.socket
    - cups.service
    register: result_01
    failed_when: false
    when: "not skip_all | default(false)"
    tags: [execute]

  - name: "Store requirement 01 details"
    set_fact:
      task_01_name: "Stop cups.socket and cups.service"
      task_01_cmd: "systemctl stop cups.socket cups.service"
      task_01_rc: "{{ '0' if (result_01 is defined and not (result_01.failed | default(false))) else '-1' }}"
      data_01: "{{ result_01 | to_json if result_01 is defined else 'Not executed' }}"
      status_01: "{{ 'SKIP' if skip_all | default(false) else ('PASS' if result_01 is defined and not (result_01.failed | default(false)) else 'FAIL') | trim }}"
      details_01: "{{ 'Skipped because cups not installed' if skip_all | default(false) else ('Services stopped' if result_01 is defined and not (result_01.failed | default(false)) else 'Failed to stop') | trim }}"
    tags: [execute]

  - name: "Req 02 - Remove cups package"
    ansible.builtin.dnf:
      name: cups
      state: absent
    register: result_02
    failed_when: false
    when: "not skip_all | default(false)"
    tags: [execute]

  - name: "Store requirement 02 details and set cups_removed flag"
    set_fact:
      task_02_name: "Remove cups package"
      task_02_cmd: "dnf remove -y cups"
      task_02_rc: "{{ result_02.rc | default(-1) if result_02 is defined else -1 }}"
      data_02: "{{ result_02 | to_json if result_02 is defined else 'Not executed' }}"
      status_02: "{{ 'SKIP' if skip_all | default(false) else ('PASS' if result_02 is defined and not (result_02.failed | default(false)) else 'FAIL') | trim }}"
      details_02: "{{ 'Skipped' if skip_all | default(false) else ('Package removed' if result_02 is defined and not (result_02.failed | default(false)) else 'Removal failed') | trim }}"
      cups_removed: "{{ result_02 is defined and not (result_02.failed | default(false)) }}"
    tags: [execute]

  - name: "Req 03 - Mask cups socket and service if package not removed"
    ansible.builtin.systemd:
      name: "{{ item }}"
      masked: true
    loop:
    - cups.socket
    - cups.service
    register: result_03
    failed_when: false
    when:
    - "not skip_all | default(false)"
    - "not (cups_removed | default(false))"
    tags: [execute]

  - name: "Store requirement 03 details"
    set_fact:
      task_03_name: "Mask cups.socket and cups.service"
      task_03_cmd: "systemctl mask cups.socket cups.service"
      task_03_rc: "{{ '0' if (result_03 is defined and not (result_03.failed | default(false))) else '-1' }}"
      data_03: "{{ result_03 | to_json if result_03 is defined else 'Not executed' }}"
      status_03: "{{ 'SKIP' if (skip_all | default(false)) or (cups_removed | default(false)) else ('PASS' if result_03 is defined and not (result_03.failed | default(false)) else 'FAIL') | trim }}"
      details_03: >-
        {%- if skip_all | default(false) -%}Skipped
        {%- elif cups_removed | default(false) -%}Masking not needed because package removed
        {%- elif result_03 is defined and not (result_03.failed | default(false)) -%}Services masked
        {%- else -%}Failed to mask
        {%- endif -%}
    tags: [execute]

  - name: "Req 04 - Verify cups services inactive"
    ansible.builtin.shell: |
      systemctl is-active cups.socket cups.service
    args:
      executable: /bin/bash
    register: result_04
    failed_when: false
    changed_when: false
    when: "not skip_all | default(false)"
    tags: [execute]

  - name: "Store requirement 04 details"
    set_fact:
      task_04_name: "Verify cups services inactive"
      task_04_cmd: "systemctl is-active cups.socket cups.service"
      task_04_rc: "{{ result_04.rc | default(-1) if result_04 is defined else -1 }}"
      data_04: "{{ result_04.stdout | default('') | trim if result_04 is defined else 'Not executed' }}"
      status_04: |
        {{ 'SKIP' if skip_all | default(false) else ('PASS' if result_04.stdout | default('') | trim == 'inactive\ninactive' else 'FAIL') | trim }}
      details_04: |
        {{ 'Skipped' if skip_all | default(false) else ('Services are inactive' if result_04.stdout | default('') | trim == 'inactive\ninactive' else 'Services still active') | trim }}
    tags: [execute]

  - name: "Req 05 - Verify cups package removed or services masked"
    ansible.builtin.shell: |
      rpm -q cups && echo 'PACKAGE_INSTALLED' || echo 'PACKAGE_NOT_INSTALLED'
      systemctl is-enabled cups.socket cups.service 2>/dev/null || echo 'MASKED_OR_DISABLED'
    args:
      executable: /bin/bash
    register: result_05
    failed_when: false
    changed_when: false
    when: "not skip_all | default(false)"
    tags: [execute]

  - name: "Store requirement 05 details"
    set_fact:
      task_05_name: "Verify cups package removed or services masked"
      task_05_cmd: "rpm -q cups && systemctl is-enabled cups.socket cups.service"
      task_05_rc: "{{ result_05.rc | default(-1) if result_05 is defined else -1 }}"
      data_05: "{{ result_05.stdout | default('') | trim if result_05 is defined else 'Not executed' }}"
      status_05: >-
        {%- if skip_all | default(false) -%}SKIP
        {%- elif 'PACKAGE_NOT_INSTALLED' in result_05.stdout | default('') or 'MASKED_OR_DISABLED' in result_05.stdout | default('') -%}PASS
        {%- else -%}FAIL
        {%- endif -%}
      details_05: >-
        {%- if skip_all | default(false) -%}Skipped because cups not installed
        {%- elif 'PACKAGE_NOT_INSTALLED' in result_05.stdout | default('') -%}Package removed
        {%- elif 'MASKED_OR_DISABLED' in result_05.stdout | default('') -%}Services masked/disabled
        {%- else -%}Package still installed and services not masked
        {%- endif -%}
    tags: [execute]

  - name: "Req 06 - Set cis_result fact"
    set_fact:
      cis_result: "{{ status_05 | default('ERROR') | trim }}"
    tags: [execute]

  - name: "Store requirement 06 details"
    set_fact:
      task_06_name: "Store final remediation result"
      task_06_cmd: "N/A"
      task_06_rc: "0"
      data_06: "cis_result set to {{ cis_result }}"
      status_06: "{{ cis_result }}"
      details_06: "{{ details_05 | default('Not evaluated') | trim }}"
    tags: [execute]

  - name: "Generate remediation report"
    debug:
      msg:
      - "REMEDIATION REPORT — CIS 2.1.11"
      - "Reference: CIS Benchmark checkpoint 2.1.11"
      - ""
      - "REQUIREMENT 01 - {{ req_01 }}:"
      - "  Task: {{ task_01_name | default('Not recorded') }}"
      - "  Command: {{ task_01_cmd | default('N/A') }}"
      - "  Exit code: {{ task_01_rc | default(-1) }}"
      - "  Data: {{ data_01 | default('') | trim }}"
      - "  Status: {{ status_01 | default('ERROR') | trim }}"
      - "  Details: {{ details_01 | default('') | trim }}"
      - ""
      - "REQUIREMENT 02 - {{ req_02 }}:"
      - "  Task: {{ task_02_name | default('Not recorded') }}"
      - "  Command: {{ task_02_cmd | default('N/A') }}"
      - "  Exit code: {{ task_02_rc | default(-1) }}"
      - "  Data: {{ data_02 | default('') | trim }}"
      - "  Status: {{ status_02 | default('ERROR') | trim }}"
      - "  Details: {{ details_02 | default('') | trim }}"
      - ""
      - "REQUIREMENT 03 - {{ req_03 }}:"
      - "  Task: {{ task_03_name | default('Not recorded') }}"
      - "  Command: {{ task_03_cmd | default('N/A') }}"
      - "  Exit code: {{ task_03_rc | default(-1) }}"
      - "  Data: {{ data_03 | default('') | trim }}"
      - "  Status: {{ status_03 | default('ERROR') | trim }}"
      - "  Details: {{ details_03 | default('') | trim }}"
      - ""
      - "REQUIREMENT 04 - {{ req_04 }}:"
      - "  Task: {{ task_04_name | default('Not recorded') }}"
      - "  Command: {{ task_04_cmd | default('N/A') }}"
      - "  Exit code: {{ task_04_rc | default(-1) }}"
      - "  Data: {{ data_04 | default('') | trim }}"
      - "  Status: {{ status_04 | default('ERROR') | trim }}"
      - "  Details: {{ details_04 | default('') | trim }}"
      - ""
      - "REQUIREMENT 05 - {{ req_05 }}:"
      - "  Task: {{ task_05_name | default('Not recorded') }}"
      - "  Command: {{ task_05_cmd | default('N/A') }}"
      - "  Exit code: {{ task_05_rc | default(-1) }}"
      - "  Data: {{ data_05 | default('') | trim }}"
      - "  Status: {{ status_05 | default('ERROR') | trim }}"
      - "  Details: {{ details_05 | default('') | trim }}"
      - ""
      - "REQUIREMENT 06 - {{ req_06 }}:"
      - "  Task: {{ task_06_name | default('Not recorded') }}"
      - "  Command: {{ task_06_cmd | default('N/A') }}"
      - "  Exit code: {{ task_06_rc | default(-1) }}"
      - "  Data: {{ data_06 | default('') | trim }}"
      - "  Status: {{ status_06 | default('ERROR') | trim }}"
      - "  Details: {{ details_06 | default('') | trim }}"
      - ""
      - "========================================================"
      - "OVERALL REMEDIATION:"
      - "  Result: {{ cis_result | default('ERROR') | trim }}"
      - "  Details: {{ details_06 | default('Not evaluated') | trim }}"
      - "========================================================"
    tags: [execute]

  always:
  - name: "Restore - Reinstall cups if originally installed"
    ansible.builtin.slurp:
      src: "{{ backup_dir }}/cups_pkg_state"
    register: _restore_pkg_state_raw
    failed_when: false
    tags: [restore]

  - name: "Restore - Set cups package state fact"
    ansible.builtin.set_fact:
      _restore_pkg_state: "{{ (_restore_pkg_state_raw.content | b64decode | trim) if (_restore_pkg_state_raw is not failed and _restore_pkg_state_raw.content is defined) else '' }}"
    tags: [restore]

  - name: "Restore - Install cups if originally installed"
    ansible.builtin.dnf:
      name: cups
      state: present
    when: "_restore_pkg_state | default('') == 'installed'"
    failed_when: false
    tags: [restore]

  - name: "Restore - Read original active state for cups.socket"
    ansible.builtin.slurp:
      src: "{{ backup_dir }}/cups_socket_active_state"
    register: _restore_sock_active_raw
    failed_when: false
    tags: [restore]

  - name: "Restore - Set fact for cups.socket active state"
    ansible.builtin.set_fact:
      _restore_sock_active: "{{ (_restore_sock_active_raw.content | b64decode | trim) if (_restore_sock_active_raw is not failed and _restore_sock_active_raw.content is defined) else '' }}"
    tags: [restore]

  - name: "Restore - Read original enabled state for cups.socket"
    ansible.builtin.slurp:
      src: "{{ backup_dir }}/cups_socket_enabled_state"
    register: _restore_sock_enabled_raw
    failed_when: false
    tags: [restore]

  - name: "Restore - Set fact for cups.socket enabled state"
    ansible.builtin.set_fact:
      _restore_sock_enabled: "{{ (_restore_sock_enabled_raw.content | b64decode | trim) if (_restore_sock_enabled_raw is not failed and _restore_sock_enabled_raw.content is defined) else '' }}"
    tags: [restore]

  - name: "Restore - Start cups.socket if was active"
    ansible.builtin.systemd:
      name: cups.socket
      state: started
    when: "_restore_sock_active | default('') == 'active'"
    failed_when: false
    tags: [restore]

  - name: "Restore - Enable and unmask cups.socket if was enabled"
    ansible.builtin.systemd:
      name: cups.socket
      masked: no
      enabled: yes
    when: "_restore_sock_enabled in ['enabled', 'enabled-runtime', 'indirect']"
    failed_when: false
    tags: [restore]

  - name: "Restore - Disable cups.socket if was disabled"
    ansible.builtin.systemd:
      name: cups.socket
      enabled: no
    when: "_restore_sock_enabled == 'disabled'"
    failed_when: false
    tags: [restore]

  - name: "Restore - Mask cups.socket if was masked"
    ansible.builtin.systemd:
      name: cups.socket
      masked: yes
    when: "_restore_sock_enabled == 'masked'"
    failed_when: false
    tags: [restore]

  - name: "Restore - Read original active state for cups.service"
    ansible.builtin.slurp:
      src: "{{ backup_dir }}/cups_service_active_state"
    register: _restore_svc_active_raw
    failed_when: false
    tags: [restore]

  - name: "Restore - Set fact for cups.service active state"
    ansible.builtin.set_fact:
      _restore_svc_active: "{{ (_restore_svc_active_raw.content | b64decode | trim) if (_restore_svc_active_raw is not failed and _restore_svc_active_raw.content is defined) else '' }}"
    tags: [restore]

  - name: "Restore - Read original enabled state for cups.service"
    ansible.builtin.slurp:
      src: "{{ backup_dir }}/cups_service_enabled_state"
    register: _restore_svc_enabled_raw
    failed_when: false
    tags: [restore]

  - name: "Restore - Set fact for cups.service enabled state"
    ansible.builtin.set_fact:
      _restore_svc_enabled: "{{ (_restore_svc_enabled_raw.content | b64decode | trim) if (_restore_svc_enabled_raw is not failed and _restore_svc_enabled_raw.content is defined) else '' }}"
    tags: [restore]

  - name: "Restore - Start cups.service if was active"
    ansible.builtin.systemd:
      name: cups.service
      state: started
    when: "_restore_svc_active | default('') == 'active'"
    failed_when: false
    tags: [restore]

  - name: "Restore - Enable and unmask cups.service if was enabled"
    ansible.builtin.systemd:
      name: cups.service
      masked: no
      enabled: yes
    when: "_restore_svc_enabled in ['enabled', 'enabled-runtime', 'indirect']"
    failed_when: false
    tags: [restore]

  - name: "Restore - Disable cups.service if was disabled"
    ansible.builtin.systemd:
      name: cups.service
      enabled: no
    when: "_restore_svc_enabled == 'disabled'"
    failed_when: false
    tags: [restore]

  - name: "Restore - Mask cups.service if was masked"
    ansible.builtin.systemd:
      name: cups.service
      masked: yes
    when: "_restore_svc_enabled == 'masked'"
    failed_when: false
    tags: [restore]

  - name: "Restore - Remove backup directory"
    ansible.builtin.file:
      path: "{{ backup_dir }}"
      state: absent
    failed_when: false
    tags: [restore]
