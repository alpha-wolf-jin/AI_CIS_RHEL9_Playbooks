playbook_name: "cis_1_1_2_6_4"
backup_dir: "/var/tmp/ai-playbooks-backup/{{ playbook_name }}"
mount_point: "/var/log"
remote_backup_file: "{{ backup_dir }}/fstab.bak"
req_01: "Apply noexec mount option to /var/log partition by editing /etc/fstab: add noexec to the fourth field for the /var/log partition. Expected result: The /var/log partition entry in /etc/fstab includes noexec in its mount options."
req_02: "Remount /var/log with the updated options using command: `mount -o remount /var/log`. Expected result: The /var/log partition is remounted with the noexec option."
req_03: "Verify the noexec option is active on /var/log using command: `mount | grep /var/log`. Expected result: The output shows noexec among the mount options for /var/log."
