---
- name: Initialize meta data variables
  include_vars: cis_remediation_var_2_4_1_6.yml

- name: "Snapshot - Create backup directory"
  ansible.builtin.file:
    path: "{{ backup_dir }}"
    state: directory
    mode: "0700"
  tags:
  - snapshot

- name: "Snapshot - Check if /etc/cron.monthly directory exists"
  ansible.builtin.stat:
    path: "/etc/cron.monthly"
  register: snapshot_stat
  tags:
  - snapshot

- name: "Snapshot - Backup /etc/cron.monthly directory"
  ansible.builtin.copy:
    src: "/etc/cron.monthly"
    dest: "{{ backup_dir }}/cron.monthly"
    remote_src: true
  when: snapshot_stat.stat.exists
  tags:
  - snapshot


- block:
# === EXECUTE (tag: execute) ===
  - name: "Initialize data variables"
    set_fact:
      data_01: "Not collected yet"
      status_01: "ERROR"
      details_01: "Not evaluated"
      data_02: "Not collected yet"
      status_02: "ERROR"
      details_02: "Not evaluated"
      data_03: "Not collected yet"
      status_03: "ERROR"
      details_03: "Not evaluated"
      data_04: "Not collected yet"
      status_04: "ERROR"
      details_04: "Not evaluated"
      data_05: "Not collected yet"
      status_05: "ERROR"
      details_05: "Not evaluated"
      task_01_name: "Not executed"
      task_01_cmd: "N/A"
      task_01_rc: -1
    tags:
    - execute

  - name: "Req 01 - Check if cron package is installed"
    ansible.builtin.shell: |
      if command -v cron &>/dev/null; then
        echo 'cron installed'
      else
        echo 'cron not installed'
      fi
    args:
      executable: /bin/bash
    register: result_01
    failed_when: false
    changed_when: false
    tags:
    - execute

  - name: "Store requirement 01 details"
    set_fact:
      task_01_name: "Check if cron is installed"
      task_01_cmd: "if command -v cron &>/dev/null; then echo 'cron installed'; else echo 'cron not installed'; fi"
      task_01_rc: "{{ result_01.rc | default(-1) }}"
      data_01: "{{ result_01.stdout | default('') | trim }}"
      status_01: "{{ ('PASS' if (result_01.stdout | default('') | trim) == 'cron installed' else 'FAIL') | trim }}"
      details_01: "{{ 'cron found' if (result_01.stdout | default('') | trim) == 'cron installed' else 'cron not found' | trim }}"
    tags:
    - execute

  - name: "Req 02 - Set ownership to root:root on /etc/cron.monthly"
    ansible.builtin.file:
      path: "/etc/cron.monthly"
      owner: root
      group: root
    when: (result_01.stdout | default('') | trim) == 'cron installed'
    register: result_02
    failed_when: false
    tags:
    - execute

  - name: "Store requirement 02 details"
    set_fact:
      task_02_name: "Set ownership to root:root on /etc/cron.monthly"
      task_02_cmd: "chown root:root /etc/cron.monthly/"
      task_02_rc: "{{ result_02.rc | default('SKIP') if not ((result_01.stdout | default('') | trim) == 'cron installed') else result_02.rc | default(-1) }}"
      data_02: "{{ 'ownership set' if ((result_01.stdout | default('') | trim) == 'cron installed') and (result_02 is not failed) else 'N/A' }}"
      status_02: >-
        {{- 'SKIP' if (result_01.stdout | default('') | trim) != 'cron installed'
           else 'PASS' if result_02.rc | default(-1) == 0
           else 'FAIL' -}}
      details_02: >-
        {{- 'Not applicable (cron not installed)' if (result_01.stdout | default('') | trim) != 'cron installed'
           else 'Ownership changed to root:root' if result_02.rc | default(-1) == 0
           else 'Ownership change failed' -}}
    tags:
    - execute

  - name: "Req 03 - Remove read, write, execute permissions for group and others"
    ansible.builtin.file:
      path: "/etc/cron.monthly"
      mode: "0700"
    when: (result_01.stdout | default('') | trim) == 'cron installed'
    register: result_03
    failed_when: false
    tags:
    - execute

  - name: "Store requirement 03 details"
    set_fact:
      task_03_name: "Remove group and other permissions on /etc/cron.monthly"
      task_03_cmd: "chmod og-rwx /etc/cron.monthly/"
      task_03_rc: "{{ result_03.rc | default('SKIP') if not ((result_01.stdout | default('') | trim) == 'cron installed') else result_03.rc | default(-1) }}"
      data_03: "{{ 'permissions set to 0700' if ((result_01.stdout | default('') | trim) == 'cron installed') and (result_03 is not failed) else 'N/A' }}"
      status_03: >-
        {{- 'SKIP' if (result_01.stdout | default('') | trim) != 'cron installed'
           else 'PASS' if result_03.rc | default(-1) == 0
           else 'FAIL' -}}
      details_03: >-
        {{- 'Not applicable (cron not installed)' if (result_01.stdout | default('') | trim) != 'cron installed'
           else 'Permissions set to drwx------' if result_03.rc | default(-1) == 0
           else 'Permissions change failed' -}}
    tags:
    - execute

  - name: "Req 04 - Verify ownership and permissions on /etc/cron.monthly"
    ansible.builtin.shell: "stat -c '%U:%G %A' /etc/cron.monthly/"
    args:
      executable: /bin/bash
    when: (result_01.stdout | default('') | trim) == 'cron installed'
    register: result_04
    failed_when: false
    changed_when: false
    tags:
    - execute

  - name: "Store requirement 04 details"
    set_fact:
      task_04_name: "Verify /etc/cron.monthly ownership and permissions"
      task_04_cmd: "stat -c '%U:%G %A' /etc/cron.monthly/"
      task_04_rc: "{{ result_04.rc | default('SKIP') if not ((result_01.stdout | default('') | trim) == 'cron installed') else result_04.rc | default(-1) }}"
      data_04: "{{ result_04.stdout | default('') | trim if ((result_01.stdout | default('') | trim) == 'cron installed') else 'N/A' }}"
      status_04: >-
        {{- 'SKIP' if (result_01.stdout | default('') | trim) != 'cron installed'
           else 'PASS' if ((result_04.stdout | default('') | trim) == 'root:root drwx------')
           else 'FAIL' -}}
      details_04: >-
        {{- 'Not applicable (cron not installed)' if (result_01.stdout | default('') | trim) != 'cron installed'
           else 'Expected root:root drwx------, got ' + (result_04.stdout | default('') | trim) if (result_04.stdout | default('') | trim) != 'root:root drwx------'
           else 'Permissions are correct' -}}
    tags:
    - execute

  - name: "Req 05 - Store final remediation result"
    set_fact:
      cis_result: "{{ status_04 | default('ERROR') | trim }}"
    tags:
    - execute

  - name: "Generate remediation report"
    debug:
      msg:
      - "REMEDIATION REPORT — CIS 2.4.1.6"
      - "Reference: CIS Benchmark checkpoint 2.4.1.6"
      - ""
      - "REQUIREMENT 01 - {{ req_01 }}:"
      - "  Task: {{ task_01_name | default('Not recorded') }}"
      - "  Command: {{ task_01_cmd | default('N/A') }}"
      - "  Exit code: {{ task_01_rc | default(-1) }}"
      - "  Data: {{ data_01 | default('') | trim }}"
      - "  Status: {{ status_01 | default('ERROR') | trim }}"
      - "  Details: {{ details_01 | default('') | trim }}"
      - ""
      - "REQUIREMENT 02 - {{ req_02 }}:"
      - "  Task: {{ task_02_name | default('Not recorded') }}"
      - "  Command: {{ task_02_cmd | default('N/A') }}"
      - "  Exit code: {{ task_02_rc | default(-1) }}"
      - "  Data: {{ data_02 | default('') | trim }}"
      - "  Status: {{ status_02 | default('ERROR') | trim }}"
      - "  Details: {{ details_02 | default('') | trim }}"
      - ""
      - "REQUIREMENT 03 - {{ req_03 }}:"
      - "  Task: {{ task_03_name | default('Not recorded') }}"
      - "  Command: {{ task_03_cmd | default('N/A') }}"
      - "  Exit code: {{ task_03_rc | default(-1) }}"
      - "  Data: {{ data_03 | default('') | trim }}"
      - "  Status: {{ status_03 | default('ERROR') | trim }}"
      - "  Details: {{ details_03 | default('') | trim }}"
      - ""
      - "REQUIREMENT 04 - {{ req_04 }}:"
      - "  Task: {{ task_04_name | default('Not recorded') }}"
      - "  Command: {{ task_04_cmd | default('N/A') }}"
      - "  Exit code: {{ task_04_rc | default(-1) }}"
      - "  Data: {{ data_04 | default('') | trim }}"
      - "  Status: {{ status_04 | default('ERROR') | trim }}"
      - "  Details: {{ details_04 | default('') | trim }}"
      - ""
      - "========================================================"
      - "OVERALL REMEDIATION:"
      - "  Result: {{ cis_result | default('ERROR') | trim }}"
      - "========================================================"
    tags:
    - execute

  always:
# === RESTORE (tag: restore) ===
  - name: "Restore - Check if backup exists"
    ansible.builtin.stat:
      path: "{{ backup_dir }}/cron.monthly"
    register: restore_backup_stat
    failed_when: false
    tags:
    - restore

  - name: "Restore - Overwrite /etc/cron.monthly with original"
    ansible.builtin.copy:
      src: "{{ backup_dir }}/cron.monthly/"
      dest: "/etc/cron.monthly"
      remote_src: true
    when: restore_backup_stat.stat.exists
    failed_when: false
    tags:
    - restore

  - name: "Restore - Remove backup directory"
    ansible.builtin.file:
      path: "{{ backup_dir }}"
      state: absent
    tags:
    - restore
