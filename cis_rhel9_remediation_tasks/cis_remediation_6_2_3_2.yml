---
- name: Initialize meta data variables
  include_vars: cis_remediation_var_6_2_3_2.yml

- name: "Snapshot - Create backup directory"
  ansible.builtin.file:
    path: "{{ backup_dir }}"
    state: directory
    mode: '0700'
  tags: [snapshot]
- name: "Snapshot - Check if rsyslog config exists"
  ansible.builtin.stat:
    path: "/etc/rsyslog.conf"
  register: _snap_rsyslog_conf
  tags: [snapshot]
- name: "Snapshot - Backup rsyslog config if exists"
  ansible.builtin.copy:
    src: "/etc/rsyslog.conf"
    dest: "{{ backup_dir }}/rsyslog.conf.present"
    remote_src: true
  when: "_snap_rsyslog_conf.stat.exists"
  tags: [snapshot]

- name: "Initialize report variables"
  ansible.builtin.set_fact:
    data_01: "Not collected yet"
    status_01: "UNKNOWN"
    details_01: "Not evaluated"
    task_01_name: "Not executed"
    task_01_cmd: "N/A"
    task_01_rc: -1
    data_02: "Not collected yet"
    status_02: "UNKNOWN"
    details_02: "Not evaluated"
    task_02_name: "Not executed"
    task_02_cmd: "N/A"
    task_02_rc: -1
    data_03: "Not collected yet"
    status_03: "UNKNOWN"
    details_03: "Not evaluated"
    task_03_name: "Not executed"
    task_03_cmd: "N/A"
    task_03_rc: -1
    data_04: "Not collected yet"
    status_04: "UNKNOWN"
    details_04: "Not evaluated"
    task_04_name: "Not executed"
    task_04_cmd: "N/A"
    task_04_rc: -1
    data_05: "Not collected yet"
    status_05: "UNKNOWN"
    details_05: "Not evaluated"
    task_05_name: "Not executed"
    task_05_cmd: "N/A"
    task_05_rc: -1
    playbook_skipped: false
  tags: [execute]
- block:
  - name: "Req 01 - Check if rsyslog package is installed"
    ansible.builtin.package_facts:
      manager: auto
    failed_when: false
    tags: [execute]

  - name: "Req 01 - Set skip fact if rsyslog not installed"
    ansible.builtin.set_fact:
      playbook_skipped: "{{ package_name not in ansible_facts.packages }}"
    tags: [execute]

  - name: "Req 01 - Check if rsyslog is the active logging service"
    ansible.builtin.shell: |
      systemctl is-active rsyslog.service 2>/dev/null || echo "inactive"
    args:
      executable: /bin/bash
    register: result_01
    failed_when: false
    changed_when: false
    when: "not playbook_skipped"
    tags: [execute]

  - name: "Req 01 - Store requirement 01 details"
    ansible.builtin.set_fact:
      task_01_name: "Check if rsyslog is active logging service"
      task_01_cmd: "systemctl is-active rsyslog.service"
      task_01_rc: "{{ result_01.rc | default(-1) }}"
      data_01: "{{ result_01.stdout | default('') | trim }}"
      status_01: "{{ 'SKIP' if playbook_skipped else ('PASS' if (result_01.stdout | default('') | trim) == 'active' else 'FAIL') }}"
      details_01: "{{ 'rsyslog package not installed' if playbook_skipped else ('rsyslog is active' if (result_01.stdout | default('') | trim) == 'active' else 'rsyslog is not active') }}"
    tags: [execute]

  - name: "Req 02 - Unmask rsyslog.service"
    ansible.builtin.systemd:
      name: "{{ service_name }}"
      masked: false
    register: result_02
    failed_when: false
    when: "not playbook_skipped"
    tags: [execute]

  - name: "Req 02 - Store requirement 02 details"
    ansible.builtin.set_fact:
      task_02_name: "Unmask rsyslog.service"
      task_02_cmd: "systemctl unmask rsyslog.service"
      task_02_rc: "{{ 0 if result_02 is not skipped else -1 }}"
      data_02: "{{ 'unmasked' if result_02 is not skipped else 'skipped' }}"
      status_02: "{{ 'SKIP' if playbook_skipped else 'PASS' }}"
      details_02: "{{ 'rsyslog package not installed' if playbook_skipped else 'rsyslog.service unmasked' }}"
    tags: [execute]

  - name: "Req 03 - Enable rsyslog.service"
    ansible.builtin.systemd:
      name: "{{ service_name }}"
      enabled: yes
    register: result_03
    failed_when: false
    when: "not playbook_skipped"
    tags: [execute]

  - name: "Req 03 - Store requirement 03 details"
    ansible.builtin.set_fact:
      task_03_name: "Enable rsyslog.service"
      task_03_cmd: "systemctl enable rsyslog.service"
      task_03_rc: "{{ 0 if result_03 is not skipped else -1 }}"
      data_03: "{{ 'enabled' if result_03 is not skipped else 'skipped' }}"
      status_03: "{{ 'SKIP' if playbook_skipped else 'PASS' }}"
      details_03: "{{ 'rsyslog package not installed' if playbook_skipped else 'rsyslog.service enabled' }}"
    tags: [execute]

  - name: "Req 04 - Start rsyslog.service"
    ansible.builtin.systemd:
      name: "{{ service_name }}"
      state: started
    register: result_04
    failed_when: false
    when: "not playbook_skipped"
    tags: [execute]

  - name: "Req 04 - Store requirement 04 details"
    ansible.builtin.set_fact:
      task_04_name: "Start rsyslog.service"
      task_04_cmd: "systemctl start rsyslog.service"
      task_04_rc: "{{ 0 if result_04 is not skipped else -1 }}"
      data_04: "{{ 'started' if result_04 is not skipped else 'skipped' }}"
      status_04: "{{ 'SKIP' if playbook_skipped else 'PASS' }}"
      details_04: "{{ 'rsyslog package not installed' if playbook_skipped else 'rsyslog.service started' }}"
    tags: [execute]

  - name: "Req 05 - Verify rsyslog.service is enabled and active"
    ansible.builtin.shell: |
      ENABLED=$(systemctl is-enabled rsyslog.service 2>/dev/null || echo "disabled")
      ACTIVE=$(systemctl is-active rsyslog.service 2>/dev/null || echo "inactive")
      echo "enabled:$ENABLED active:$ACTIVE"
    args:
      executable: /bin/bash
    register: result_05
    failed_when: false
    changed_when: false
    when: "not playbook_skipped"
    tags: [execute]

  - name: "Req 05 - Store requirement 05 details"
    ansible.builtin.set_fact:
      task_05_name: "Verify rsyslog.service enabled and active"
      task_05_cmd: "systemctl is-enabled rsyslog.service && systemctl is-active rsyslog.service"
      task_05_rc: "{{ result_05.rc | default(-1) }}"
      data_05: "{{ result_05.stdout | default('') | trim }}"
      status_05: "{{ 'SKIP' if playbook_skipped else ('PASS' if ('enabled:enabled' in (result_05.stdout | default('')) and 'active:active' in (result_05.stdout | default(''))) else 'FAIL') }}"
      details_05: "{{ 'rsyslog package not installed' if playbook_skipped else ('rsyslog is enabled and active' if ('enabled:enabled' in (result_05.stdout | default('')) and 'active:active' in (result_05.stdout | default(''))) else 'rsyslog is not fully enabled/active') }}"
    tags: [execute]

  - name: "Store final remediation result in cis_result"
    ansible.builtin.set_fact:
      cis_result: "{{ status_05 | default('ERROR') | trim }}"
    tags: [execute]

  - name: "Generate remediation report"
    ansible.builtin.debug:
      msg:
      - "REMEDIATION REPORT — CIS 6.2.3.2"
      - "Reference: CIS Benchmark checkpoint 6.2.3.2"
      - ""
      - "REQUIREMENT 01 - {{ req_01 }}:"
      - "  Task: {{ task_01_name | default('Task not recorded') }}"
      - "  Command: {{ task_01_cmd | default('N/A') }}"
      - "  Exit code: {{ task_01_rc | default(-1) }}"
      - "  Data: {{ data_01 | default('') | trim }}"
      - "  Status: {{ status_01 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_01 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 02 - {{ req_02 }}:"
      - "  Task: {{ task_02_name | default('Task not recorded') }}"
      - "  Command: {{ task_02_cmd | default('N/A') }}"
      - "  Exit code: {{ task_02_rc | default(-1) }}"
      - "  Data: {{ data_02 | default('') | trim }}"
      - "  Status: {{ status_02 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_02 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 03 - {{ req_03 }}:"
      - "  Task: {{ task_03_name | default('Task not recorded') }}"
      - "  Command: {{ task_03_cmd | default('N/A') }}"
      - "  Exit code: {{ task_03_rc | default(-1) }}"
      - "  Data: {{ data_03 | default('') | trim }}"
      - "  Status: {{ status_03 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_03 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 04 - {{ req_04 }}:"
      - "  Task: {{ task_04_name | default('Task not recorded') }}"
      - "  Command: {{ task_04_cmd | default('N/A') }}"
      - "  Exit code: {{ task_04_rc | default(-1) }}"
      - "  Data: {{ data_04 | default('') | trim }}"
      - "  Status: {{ status_04 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_04 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 05 - {{ req_05 }}:"
      - "  Task: {{ task_05_name | default('Task not recorded') }}"
      - "  Command: {{ task_05_cmd | default('N/A') }}"
      - "  Exit code: {{ task_05_rc | default(-1) }}"
      - "  Data: {{ data_05 | default('') | trim }}"
      - "  Status: {{ status_05 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_05 | default('Not evaluated') | trim }}"
      - ""
      - "OVERALL REMEDIATION:"
      - "  Result: {{ cis_result | default('ERROR') | trim }}"
      - "  Details: {{ details_05 | default('Not evaluated') | trim }}"
    tags: [execute]

  always:
  - name: "Restore - Check if backup exists"
    ansible.builtin.stat:
      path: "{{ backup_dir }}/rsyslog.conf.present"
    register: _restore_rsyslog_conf
    failed_when: false
    tags: [restore]

  - name: "Restore - Overwrite rsyslog.conf with original"
    ansible.builtin.copy:
      src: "{{ backup_dir }}/rsyslog.conf.present"
      dest: "/etc/rsyslog.conf"
      remote_src: true
    when: "_restore_rsyslog_conf.stat.exists | default(false)"
    failed_when: false
    tags: [restore]

  - name: "Restore - Remove backup directory"
    ansible.builtin.file:
      path: "{{ backup_dir }}"
      state: absent
    failed_when: false
    tags: [restore]
