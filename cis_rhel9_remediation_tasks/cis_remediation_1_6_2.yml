---
- name: Initialize meta data variables
  include_vars: cis_remediation_var_1_6_2.yml

- name: "Snapshot - Create backup directory"
  ansible.builtin.file:
    path: "{{ backup_dir }}"
    state: directory
    mode: '0700'
  tags: [snapshot]
- name: "Snapshot - Check if /etc/sysconfig/sshd exists"
  ansible.builtin.stat:
    path: "/etc/sysconfig/sshd"
  register: _sg_sshd_config_stat
  tags: [snapshot]
- name: "Snapshot - Backup /etc/sysconfig/sshd if exists"
  ansible.builtin.copy:
    src: "/etc/sysconfig/sshd"
    dest: "{{ backup_dir }}/sshd_config.present"
    remote_src: true
  when: _sg_sshd_config_stat.stat.exists
  tags: [snapshot]
- name: "Snapshot - Mark /etc/sysconfig/sshd as absent if not exists"
  ansible.builtin.copy:
    content: "absent"
    dest: "{{ backup_dir }}/sshd_config.absent"
  when: not _sg_sshd_config_stat.stat.exists
  tags: [snapshot]

- block:
  - name: "Initialize data variables"
    ansible.builtin.set_fact:
      data_01: "Not collected yet"
      status_01: "ERROR"
      details_01: "Not evaluated"
      data_02: "Not collected yet"
      status_02: "ERROR"
      details_02: "Not evaluated"
      data_03: "Not collected yet"
      status_03: "ERROR"
      details_03: "Not evaluated"
      data_04: "Not collected yet"
      status_04: "ERROR"
      details_04: "Not evaluated"
      task_01_name: "Not executed"
      task_01_cmd: "N/A"
      task_01_rc: -1
    tags: [execute]

  - name: "Req 01 - Check if openssh-server is installed"
    ansible.builtin.package_facts:
      manager: auto
    failed_when: false
    tags: [execute]

  - name: "Req 01 - Comment out CRYPTO_POLICY line in /etc/sysconfig/sshd"
    ansible.builtin.replace:
      path: "/etc/sysconfig/sshd"
      regexp: |
        ^\s*(CRYPTO_POLICY\s*=.*)$
      replace: |
        # \1
    register: result_01
    failed_when: false
    when: "'openssh-server' in ansible_facts.packages"
    tags: [execute]

  - name: "Store requirement 01 details"
    ansible.builtin.set_fact:
      task_01_name: "Comment out CRYPTO_POLICY line in /etc/sysconfig/sshd"
      task_01_cmd: |
        sed -ri \"s/^\\s*(CRYPTO_POLICY\\s*=.*)$/# \\1/\" /etc/sysconfig/sshd
      task_01_rc: "{{ result_01.rc | default(-1) }}"
      data_01: "{{ result_01.stdout | default('') | trim }}"
      status_01: "{{ 'SKIP' if 'openssh-server' not in ansible_facts.packages else ('PASS' if result_01.rc | default(-1) == 0 else 'FAIL') | trim }}"
      details_01: "{{ 'SKIP: openssh-server not installed' if 'openssh-server' not in ansible_facts.packages else ('PASS: CRYPTO_POLICY line commented out' if result_01.rc | default(-1) == 0 else 'FAIL: Could not comment out CRYPTO_POLICY line') | trim }}"
    tags: [execute]

  - name: "Req 02 - Reload sshd service"
    ansible.builtin.service:
      name: sshd
      state: reloaded
    register: result_02
    failed_when: false
    when: "'openssh-server' in ansible_facts.packages"
    tags: [execute]

  - name: "Store requirement 02 details"
    ansible.builtin.set_fact:
      task_02_name: "Reload sshd service"
      task_02_cmd: "systemctl reload sshd"
      task_02_rc: "{{ result_02.rc | default(-1) }}"
      data_02: "{{ result_02.state | default('') | trim }}"
      status_02: "{{ 'SKIP' if 'openssh-server' not in ansible_facts.packages else ('PASS' if result_02 is not failed else 'FAIL') | trim }}"
      details_02: "{{ 'SKIP: openssh-server not installed' if 'openssh-server' not in ansible_facts.packages else ('PASS: sshd reloaded successfully' if result_02 is not failed else 'FAIL: sshd reload failed') | trim }}"
    tags: [execute]

  - name: "Req 03 - Verify no uncommented CRYPTO_POLICY line remains"
    ansible.builtin.shell: |
      grep -E '^\s*CRYPTO_POLICY' /etc/sysconfig/sshd
    args:
      executable: /bin/bash
    register: result_03
    failed_when: false
    changed_when: false
    when: "'openssh-server' in ansible_facts.packages"
    tags: [execute]

  - name: "Store requirement 03 details"
    ansible.builtin.set_fact:
      task_03_name: "Verify no uncommented CRYPTO_POLICY line remains"
      task_03_cmd: |
        grep -E '^\\s*CRYPTO_POLICY' /etc/sysconfig/sshd
      task_03_rc: "{{ result_03.rc | default(-1) }}"
      data_03: "{{ result_03.stdout | default('') | trim }}"
      status_03: "{{ 'SKIP' if 'openssh-server' not in ansible_facts.packages else ('PASS' if result_03.rc | default(-1) == 1 else 'FAIL') | trim }}"
      details_03: "{{ 'SKIP: openssh-server not installed' if 'openssh-server' not in ansible_facts.packages else ('PASS: No uncommented CRYPTO_POLICY line found' if result_03.rc | default(-1) == 1 else 'FAIL: Uncommented CRYPTO_POLICY line still present') | trim }}"
    tags: [execute]

  - name: "Req 04 - Store final remediation result in cis_result"
    ansible.builtin.set_fact:
      cis_result: >-
        {{ 'SKIP' if 'openssh-server' not in ansible_facts.packages else
           ('PASS' if status_01 | trim == 'PASS' and status_02 | trim == 'PASS' and status_03 | trim == 'PASS' else 'FAIL') | trim }}
      task_04_name: "Store final remediation result in cis_result"
      task_04_cmd: "N/A"
      task_04_rc: -1
      data_04: "{{ cis_result | default('ERROR') | trim }}"
      status_04: "PASS"
      details_04: "cis_result stored as {{ cis_result | default('ERROR') | trim }}"
    tags: [execute]

  - name: "Generate remediation report"
    ansible.builtin.debug:
      msg:
      - "REMEDIATION REPORT — CIS 1.6.2"
      - "Reference: CIS Benchmark checkpoint 1.6.2"
      - ""
      - "REQUIREMENT 01 - {{ req_01 }}:"
      - "  Task: {{ task_01_name | default('Not recorded') }}"
      - "  Command: {{ task_01_cmd | default('N/A') }}"
      - "  Exit code: {{ task_01_rc | default(-1) }}"
      - "  Data: {{ data_01 | default('') | trim }}"
      - "  Status: {{ status_01 | default('ERROR') | trim }}"
      - "  Details: {{ details_01 | default('') | trim }}"
      - ""
      - "REQUIREMENT 02 - {{ req_02 }}:"
      - "  Task: {{ task_02_name | default('Not recorded') }}"
      - "  Command: {{ task_02_cmd | default('N/A') }}"
      - "  Exit code: {{ task_02_rc | default(-1) }}"
      - "  Data: {{ data_02 | default('') | trim }}"
      - "  Status: {{ status_02 | default('ERROR') | trim }}"
      - "  Details: {{ details_02 | default('') | trim }}"
      - ""
      - "REQUIREMENT 03 - {{ req_03 }}:"
      - "  Task: {{ task_03_name | default('Not recorded') }}"
      - "  Command: {{ task_03_cmd | default('N/A') }}"
      - "  Exit code: {{ task_03_rc | default(-1) }}"
      - "  Data: {{ data_03 | default('') | trim }}"
      - "  Status: {{ status_03 | default('ERROR') | trim }}"
      - "  Details: {{ details_03 | default('') | trim }}"
      - ""
      - "REQUIREMENT 04 - {{ req_04 }}:"
      - "  Task: {{ task_04_name | default('Not recorded') }}"
      - "  Command: {{ task_04_cmd | default('N/A') }}"
      - "  Exit code: {{ task_04_rc | default(-1) }}"
      - "  Data: {{ data_04 | default('') | trim }}"
      - "  Status: {{ status_04 | default('ERROR') | trim }}"
      - "  Details: {{ details_04 | default('') | trim }}"
      - ""
      - "========================================================"
      - "OVERALL REMEDIATION:"
      - "  Result: {{ cis_result | default('ERROR') | trim }}"
      - "  Details: {{ details_03 | default('Not evaluated') | trim }}"
      - "========================================================"
    tags: [execute]

  always:
  - name: "Restore - Check if backup exists"
    ansible.builtin.stat:
      path: "{{ backup_dir }}/sshd_config.present"
    register: _restore_present
    failed_when: false
    tags: [restore]

  - name: "Restore - Restore /etc/sysconfig/sshd from backup"
    ansible.builtin.copy:
      src: "{{ backup_dir }}/sshd_config.present"
      dest: "/etc/sysconfig/sshd"
      remote_src: true
    when: _restore_present.stat.exists | default(false)
    failed_when: false
    tags: [restore]

  - name: "Restore - Check if absent marker exists"
    ansible.builtin.stat:
      path: "{{ backup_dir }}/sshd_config.absent"
    register: _restore_absent
    failed_when: false
    tags: [restore]

  - name: "Restore - Delete /etc/sysconfig/sshd if it was absent before"
    ansible.builtin.file:
      path: "/etc/sysconfig/sshd"
      state: absent
    when: _restore_absent.stat.exists | default(false)
    failed_when: false
    tags: [restore]

  - name: "Restore - Remove backup directory"
    ansible.builtin.file:
      path: "{{ backup_dir }}"
      state: absent
    failed_when: false
    tags: [restore]
