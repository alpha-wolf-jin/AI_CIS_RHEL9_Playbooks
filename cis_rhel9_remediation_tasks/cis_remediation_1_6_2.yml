---
- name: Initialize meta data variables
  include_vars: cis_remediation_var_1_6_2.yml

- name: "Snapshot - Create backup directory"
  ansible.builtin.file:
    path: "{{ backup_dir }}"
    state: directory
    mode: '0700'
  tags: [snapshot]
- name: "Snapshot - Check if config file exists"
  ansible.builtin.stat:
    path: "{{ config_file }}"
  register: _snap_sshd_stat
  tags: [snapshot]
- name: "Snapshot - Backup config file if exists"
  ansible.builtin.copy:
    src: "{{ config_file }}"
    dest: "{{ backup_file }}"
    remote_src: true
  when: "_snap_sshd_stat.stat.exists"
  tags: [snapshot]

- block:
  - name: "Check if sshd is installed"
    ansible.builtin.package_facts:
      manager: auto
    failed_when: false
    tags: [execute]

  - name: "Set sshd installed fact"
    ansible.builtin.set_fact:
      sshd_installed: "{{ 'openssh-server' in ansible_facts.packages or 'sshd' in ansible_facts.packages }}"
      playbook_skipped: "{{ not ('openssh-server' in ansible_facts.packages or 'sshd' in ansible_facts.packages) }}"
    tags: [execute]

  - name: "Req 1 - Pre-check - Check if uncommented CRYPTO_POLICY line exists"
    shell: |
      grep -qE '^\s*CRYPTO_POLICY\s*=' {{ config_file }}
    args:
      executable: /bin/bash
    register: pre_01
    failed_when: false
    changed_when: false
    when: "sshd_installed | bool"
    tags: [execute]

  - name: "Req 1 - Comment out CRYPTO_POLICY line"
    shell: |
      sed -ri 's/^\s*(CRYPTO_POLICY\s*=.*)/# \1/' {{ config_file }}
    args:
      executable: /bin/bash
    register: req_01
    failed_when: false
    when:
    - "sshd_installed | bool"
    - "pre_01.rc == 0"
    tags: [execute]

  - name: "Req 2 - Reload sshd service"
    ansible.builtin.service:
      name: sshd
      state: reloaded
    register: req_02
    failed_when: false
    when: "sshd_installed | bool"
    tags: [execute]

  - name: "Req 3 - Verify no uncommented CRYPTO_POLICY line"
    shell: |
      grep -E '^\s*CRYPTO_POLICY' {{ config_file }}
    args:
      executable: /bin/bash
    register: req_03
    failed_when: false
    changed_when: false
    when: "sshd_installed | bool"
    tags: [execute]

  - name: "Store requirement 01 details"
    set_fact:
      task_01_name: "Req 1 - Comment out CRYPTO_POLICY line"
      task_01_cmd: |
        sed -ri 's/^\\s*(CRYPTO_POLICY\\s*=.*)/# \\1/' /etc/sysconfig/sshd
      task_01_rc: "{{ req_01.get('rc', -1) }}"
      data_01: "{{ req_01.get('stdout', '') | trim }}"
      status_01: "{{ 'SKIPPED' if playbook_skipped | bool else ('APPLIED' if (pre_01.get('rc', -1) == 0 and req_01.get('rc', -1) == 0) else 'PASS' if (pre_01.get('rc', -1) != 0 and sshd_installed | bool) else 'FAILED' if (req_01.get('rc', -1) != 0) else 'UNKNOWN') }}"
      details_01: "{{ 'Package not installed' if playbook_skipped | bool else ('Applied sed' if (pre_01.get('rc', -1) == 0 and req_01.get('rc', -1) == 0) else 'No change needed' if pre_01.get('rc', -1) != 0 else 'sed failed') }}"
    tags: [execute]

  - name: "Store requirement 02 details"
    set_fact:
      task_02_name: "Req 2 - Reload sshd service"
      task_02_cmd: "systemctl reload sshd"
      task_02_rc: "{{ 1 if req_02 is failed else 0 }}"
      data_02: "{{ req_02.state | default('') | trim }}"
      status_02: >-
        {{ 'SKIPPED' if playbook_skipped | bool
            else ('APPLIED' if req_02 is success
            else 'FAILED') }}
      details_02: >-
        {{ 'Package not installed' if playbook_skipped | bool
            else ('Reloaded successfully' if req_02 is success
            else 'Reload failed') }}
    tags: [execute]

  - name: "Store requirement 03 details"
    set_fact:
      task_03_name: "Req 3 - Verify no uncommented CRYPTO_POLICY"
      task_03_cmd: |
        grep -E '^\\s*CRYPTO_POLICY' /etc/sysconfig/sshd
      task_03_rc: "{{ req_03.get('rc', -1) }}"
      data_03: "{{ req_03.get('stdout', '') | trim }}"
      status_03: "{{ 'FAILED' if (sshd_installed | bool) and req_03.get('rc', -1) == 0 else ('PASS' if sshd_installed and req_03.get('rc', -1) != 0 else 'SKIPPED') }}"
      details_03: "{{ 'Uncommented line(s) found' if req_03.get('rc', -1) == 0 else 'All lines commented or absent' if req_03.get('rc', -1) != 0 else 'Skipped - sshd not installed' }}"
    tags: [execute]

  - name: "Generate remediation report"
    debug:
      msg:
      - "REMEDIATION REPORT — CIS 1.6.2"
      - "Reference: CIS Benchmark checkpoint 1.6.2"
      - ""
      - "Requirement 1 - {{ req_01_text }}:"
      - "  Task: {{ task_01_name }}"
      - "  Command: {{ task_01_cmd }}"
      - "  Exit code: {{ task_01_rc }}"
      - "  Data: {{ data_01 }}"
      - "  Status: {{ status_01 }}"
      - "  Details: {{ details_01 }}"
      - ""
      - "Requirement 2 - {{ req_02_text }}:"
      - "  Task: {{ task_02_name }}"
      - "  Command: {{ task_02_cmd }}"
      - "  Exit code: {{ task_02_rc }}"
      - "  Data: {{ data_02 }}"
      - "  Status: {{ status_02 }}"
      - "  Details: {{ details_02 }}"
      - ""
      - "Requirement 3 - {{ req_03_text }}:"
      - "  Task: {{ task_03_name }}"
      - "  Command: {{ task_03_cmd }}"
      - "  Exit code: {{ task_03_rc }}"
      - "  Data: {{ data_03 }}"
      - "  Status: {{ status_03 }}"
      - "  Details: {{ details_03 }}"
      - ""
      - "========================================================"
      - "OVERALL REMEDIATION:"
      - "  Result: {{ status_03 }}"
      - "  Details: {{ details_03 }}"
      - "========================================================"
    tags: [execute]
