---
- name: Initialize meta data variables
  include_vars: cis_remediation_var_1_8_8.yml

- name: "Snapshot - Create backup directory"
  ansible.builtin.file:
    path: "{{ backup_dir }}"
    state: directory
    mode: '0700'
  tags: [snapshot]
- name: "Snapshot - Check if remediation script already exists"
  ansible.builtin.stat:
    path: "{{ remediate_script }}"
  register: _snapshot_remediate_stat
  tags: [snapshot]
- name: "Snapshot - Check if verification script already exists"
  ansible.builtin.stat:
    path: "{{ verify_script }}"
  register: _snapshot_verify_stat
  tags: [snapshot]

- block:
  - name: "Req 1 - Deploy remediation script"
    ansible.builtin.copy:
      dest: "{{ remediate_script }}"
      mode: '0700'
      content: "{{ remediate_script_content }}"
    changed_when: false
    tags: [execute]

  - name: "Req 1 - Execute remediation script to set autorun-never to true"
    ansible.builtin.shell: /bin/bash "{{ remediate_script }}"
    args:
      executable: /bin/bash
    register: result_01
    failed_when: false
    changed_when: false
    tags: [execute]

  - name: "Req 1 - Remove temporary remediation script"
    ansible.builtin.file:
      path: "{{ remediate_script }}"
      state: absent
    changed_when: false
    when: not (_snapshot_remediate_stat.stat.exists | default(false))
    tags: [execute]

  - name: "Req 1 - Store remediation details"
    ansible.builtin.set_fact:
      task_01_name: "Execute remediation script for GDM autorun-never"
      task_01_cmd: "/bin/bash {{ remediate_script }}"
      task_01_rc: "{{ result_01.rc | default(-1) }}"
      data_01: "{{ result_01.stdout | default('') | trim }}"
      status_01: >-
        {%- set out = result_01.stdout | default('') | trim -%}
        {%- if 'GNOME Desktop Manager package is not installed' in out -%}
          SKIP
        {%- elif result_01.rc | default(-1) == 0 -%}
          PASS
        {%- else -%}
          FAIL
        {%- endif -%}
      details_01: >-
        {%- set out = result_01.stdout | default('') | trim -%}
        {%- if 'GNOME Desktop Manager package is not installed' in out -%}
          GDM not installed - recommendation is not applicable
        {%- elif result_01.rc | default(-1) == 0 -%}
          autorun-never set to true successfully
        {%- else -%}
          autorun-never remediation failed
        {%- endif -%}
    tags: [execute]

  - name: "Req 2 - Deploy verification script"
    ansible.builtin.copy:
      dest: "{{ verify_script }}"
      mode: '0700'
      content: "{{ verify_script_content }}"
    changed_when: false
    tags: [execute]

  - name: "Req 2 - Verify autorun-never is set to true"
    ansible.builtin.shell: /bin/bash "{{ verify_script }}"
    args:
      executable: /bin/bash
    register: result_02
    failed_when: false
    changed_when: false
    tags: [execute]

  - name: "Req 2 - Remove temporary verification script"
    ansible.builtin.file:
      path: "{{ verify_script }}"
      state: absent
    changed_when: false
    when: not (_snapshot_verify_stat.stat.exists | default(false))
    tags: [execute]

  - name: "Req 2 - Store verification details"
    ansible.builtin.set_fact:
      task_02_name: "Verify GDM autorun-never is enabled"
      task_02_cmd: "/bin/bash {{ verify_script }}"
      task_02_rc: "{{ result_02.rc | default(-1) }}"
      data_02: "{{ result_02.stdout | default('') | trim }}"
      status_02: >-
        {%- set out = result_02.stdout | default('') | trim -%}
        {%- if 'GNOME Desktop Manager package is not installed' in out -%}
          SKIP
        {%- elif result_02.rc | default(-1) == 0 -%}
          PASS
        {%- else -%}
          FAIL
        {%- endif -%}
      details_02: >-
        {%- set out = result_02.stdout | default('') | trim -%}
        {%- if 'GNOME Desktop Manager package is not installed' in out -%}
          GDM not installed - recommendation is not applicable
        {%- elif result_02.rc | default(-1) == 0 -%}
          autorun-never is set to true
        {%- else -%}
          autorun-never is not set correctly or dconf configuration is incomplete
        {%- endif -%}
    tags: [execute]

  - name: "Req 3 - Store final remediation result in cis_result"
    ansible.builtin.set_fact:
      cis_result: "{{ status_02 | default('ERROR') | trim }}"
    tags: [execute]

  - name: "Generate remediation report"
    ansible.builtin.debug:
      msg:
      - "REMEDIATION REPORT — CIS 1.8.8"
      - "Reference: CIS Benchmark checkpoint 1.8.8"
      - ""
      - "REQUIREMENT 01 - Run the provided remediation script to fix Ensure GDM autorun-never is enabled:"
      - "  Task: {{ task_01_name | default('Not recorded') }}"
      - "  Command: {{ task_01_cmd | default('N/A') }}"
      - "  Exit code: {{ task_01_rc | default(-1) }}"
      - "  Data: {{ data_01 | default('') | trim }}"
      - "  Status: {{ status_01 | default('ERROR') | trim }}"
      - "  Details: {{ details_01 | default('') | trim }}"
      - ""
      - "REQUIREMENT 02 - VERIFY: Run audit check to confirm Ensure GDM autorun-never is enabled is properly configured:"
      - "  Task: {{ task_02_name | default('Not recorded') }}"
      - "  Command: {{ task_02_cmd | default('N/A') }}"
      - "  Exit code: {{ task_02_rc | default(-1) }}"
      - "  Data: {{ data_02 | default('') | trim }}"
      - "  Status: {{ status_02 | default('ERROR') | trim }}"
      - "  Details: {{ details_02 | default('') | trim }}"
      - ""
      - "========================================================"
      - "OVERALL REMEDIATION:"
      - "  Result: {{ cis_result | default('ERROR') | trim }}"
      - "========================================================"
    tags: [execute]

  always:
  - name: "Restore - Remove remediation script if created by playbook"
    ansible.builtin.file:
      path: "{{ remediate_script }}"
      state: absent
    failed_when: false
    when: not (_snapshot_remediate_stat.stat.exists | default(false))
    tags: [restore]

  - name: "Restore - Remove verification script if created by playbook"
    ansible.builtin.file:
      path: "{{ verify_script }}"
      state: absent
    failed_when: false
    when: not (_snapshot_verify_stat.stat.exists | default(false))
    tags: [restore]

  - name: "Restore - Remove backup directory"
    ansible.builtin.file:
      path: "{{ backup_dir }}"
      state: absent
    failed_when: false
    tags: [restore]
