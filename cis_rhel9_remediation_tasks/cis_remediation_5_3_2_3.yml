---
- name: Initialize meta data variables
  include_vars: cis_remediation_var_5_3_2_3.yml

- name: "Snapshot - Create backup directory"
  ansible.builtin.file:
    path: "{{ backup_dir }}"
    state: directory
    mode: '0700'
  tags: [snapshot]
- name: "Snapshot - Check if authselect.conf exists"
  ansible.builtin.stat:
    path: /etc/authselect/authselect.conf
  register: _snapshot_authselect_conf
  tags: [snapshot]
- name: "Snapshot - Backup authselect.conf if exists"
  ansible.builtin.copy:
    src: /etc/authselect/authselect.conf
    dest: "{{ backup_dir }}/authselect.conf.bak"
    remote_src: true
  when: "_snapshot_authselect_conf.stat.exists | default(false)"
  tags: [snapshot]
- name: "Snapshot - Check if password-auth exists"
  ansible.builtin.stat:
    path: /etc/pam.d/password-auth
  register: _snapshot_password_auth
  tags: [snapshot]
- name: "Snapshot - Backup password-auth if exists"
  ansible.builtin.copy:
    src: /etc/pam.d/password-auth
    dest: "{{ backup_dir }}/password-auth.bak"
    remote_src: true
  when: "_snapshot_password_auth.stat.exists | default(false)"
  tags: [snapshot]
- name: "Snapshot - Check if system-auth exists"
  ansible.builtin.stat:
    path: /etc/pam.d/system-auth
  register: _snapshot_system_auth
  tags: [snapshot]
- name: "Snapshot - Backup system-auth if exists"
  ansible.builtin.copy:
    src: /etc/pam.d/system-auth
    dest: "{{ backup_dir }}/system-auth.bak"
    remote_src: true
  when: "_snapshot_system_auth.stat.exists | default(false)"
  tags: [snapshot]

- name: "Initialize data variables"
  ansible.builtin.set_fact:
    data_01: "Not collected yet"
    status_01: "ERROR"
    details_01: "Not evaluated"
    task_01_name: "Not executed"
    task_01_cmd: "N/A"
    task_01_rc: -1
    data_02: "Not collected yet"
    status_02: "ERROR"
    details_02: "Not evaluated"
    task_02_name: "Not executed"
    task_02_cmd: "N/A"
    task_02_rc: -1
    data_03: "Not collected yet"
    status_03: "ERROR"
    details_03: "Not evaluated"
    task_03_name: "Not executed"
    task_03_cmd: "N/A"
    task_03_rc: -1
    data_04: "Not collected yet"
    status_04: "ERROR"
    details_04: "Not evaluated"
    task_04_name: "Not executed"
    task_04_cmd: "N/A"
    task_04_rc: -1
    playbook_skipped: false

- block:
  - name: "Req 01 - Check if authselect package is installed"
    ansible.builtin.package_facts:
      manager: auto
    failed_when: false
    tags: [execute]

  - name: "Req 01 - Set authselect installed fact"
    ansible.builtin.set_fact:
      authselect_installed: "{{ 'authselect' in ansible_facts.packages }}"
      playbook_skipped: "{{ 'authselect' not in ansible_facts.packages }}"
    tags: [execute]

  - name: "Req 01 - Run remediation script to check and enable pam_pwquality"
    ansible.builtin.shell: |
      l_module_name="pwquality"
      l_pam_profile="$(head -1 /etc/authselect/authselect.conf)"
      if grep -Pq -- '^custom\/' <<< "$l_pam_profile"; then
        l_pam_profile_path="/etc/authselect/$l_pam_profile"
      else
        l_pam_profile_path="/usr/share/authselect/default/$l_pam_profile"
      fi
      grep_output=$(grep -P -- "\bpam_$l_module_name\.so\b" "$l_pam_profile_path"/{password,system}-auth 2>/dev/null || true)
      echo "$grep_output"

      # Check if already present in running PAM config (idempotent enhancement)
      if grep -q 'pam_pwquality.so' /etc/pam.d/system-auth /etc/pam.d/password-auth 2>/dev/null; then
        echo "ALREADY_PRESENT"
        exit 0
      fi

      if echo "$grep_output" | grep -q '{include if "with-pwquality"}'; then
        echo "ENABLE_FEATURE"
        authselect enable-feature with-pwquality 2>&1
      elif [ -n "$grep_output" ]; then
        echo "APPLY_CHANGES"
        authselect apply-changes 2>&1
      else
        echo "NO_PWQUALITY_LINES"
      fi
    args:
      executable: /bin/bash
    register: result_01
    failed_when: false
    changed_when: false
    when: "authselect_installed | default(false)"
    tags: [execute]

  - name: "Req 01 - Store requirement 01 details"
    ansible.builtin.set_fact:
      task_01_name: "Run remediation script to check and enable pam_pwquality"
      task_01_cmd: "authselect profile check and enable-feature/apply-changes for pam_pwquality"
      task_01_rc: "{{ result_01.rc | default(-1) }}"
      data_01: "{{ result_01.stdout | default('') | trim }}"
      status_01: >-
        {%- set rc = result_01.rc | default(-1) | int -%}
        {%- if 'ALREADY_PRESENT' in (result_01.stdout | default('')) -%}PASS
        {%- elif rc != 0 -%}FAIL
        {%- elif 'NO_PWQUALITY_LINES' in (result_01.stdout | default('')) -%}SKIP
        {%- else -%}PASS
        {%- endif -%}
      details_01: >-
        {%- set rc = result_01.rc | default(-1) | int -%}
        {%- if 'ALREADY_PRESENT' in (result_01.stdout | default('')) -%}pam_pwquality.so already present in running PAM configuration; no changes needed
        {%- elif rc != 0 -%}Remediation script failed with exit code {{ rc }}. Stderr: {{ result_01.stderr | default('') | trim }}
        {%- elif 'NO_PWQUALITY_LINES' in (result_01.stdout | default('')) -%}pam_pwquality.so lines not found in authselect profile templates; manual intervention required
        {%- else -%}Remediation script executed successfully
        {%- endif -%}
    when: "authselect_installed | default(false)"
    tags: [execute]

  - name: "Req 01 - Store skipped details when authselect not installed"
    ansible.builtin.set_fact:
      task_01_name: "Run remediation script to check and enable pam_pwquality"
      task_01_cmd: "authselect profile check and enable-feature/apply-changes for pam_pwquality"
      task_01_rc: -1
      data_01: "SKIPPED"
      status_01: "SKIP"
      details_01: "authselect package is not installed"
    when: "not (authselect_installed | default(false))"
    tags: [execute]

  - name: "Req 02 - Verify pam_pwquality module is enabled in running PAM configuration"
    ansible.builtin.shell: |
      system_ok=0
      password_ok=0
      grep -q 'pam_pwquality.so' /etc/pam.d/system-auth && system_ok=1
      grep -q 'pam_pwquality.so' /etc/pam.d/password-auth && password_ok=1
      if [ "$system_ok" -eq 1 ] && [ "$password_ok" -eq 1 ]; then
        echo "BOTH_FOUND"
      else
        echo "NOT_BOTH_FOUND"
        [ "$system_ok" -eq 1 ] || echo "MISSING: /etc/pam.d/system-auth"
        [ "$password_ok" -eq 1 ] || echo "MISSING: /etc/pam.d/password-auth"
      fi
    args:
      executable: /bin/bash
    register: result_02
    failed_when: false
    changed_when: false
    when: "authselect_installed | default(false)"
    tags: [execute]

  - name: "Req 02 - Store requirement 02 details"
    ansible.builtin.set_fact:
      task_02_name: "Verify pam_pwquality module is enabled in running PAM configuration"
      task_02_cmd: "grep pam_pwquality.so in /etc/pam.d/system-auth and /etc/pam.d/password-auth"
      task_02_rc: "{{ result_02.rc | default(-1) }}"
      data_02: "{{ result_02.stdout | default('') | trim }}"
      status_02: "{{ ('PASS' if 'BOTH_FOUND' in (result_02.stdout | default('')) else 'FAIL') | trim }}"
      details_02: "{{ 'pam_pwquality.so found in both system-auth and password-auth' if 'BOTH_FOUND' in (result_02.stdout | default('')) else 'pam_pwquality.so NOT found in both PAM files' }}"
    when: "authselect_installed | default(false)"
    tags: [execute]

  - name: "Req 02 - Store skipped details when authselect not installed"
    ansible.builtin.set_fact:
      task_02_name: "Verify pam_pwquality module is enabled in running PAM configuration"
      task_02_cmd: "grep pam_pwquality.so in /etc/pam.d/system-auth and /etc/pam.d/password-auth"
      task_02_rc: -1
      data_02: "SKIPPED"
      status_02: "SKIP"
      details_02: "authselect package is not installed"
    when: "not (authselect_installed | default(false))"
    tags: [execute]

  - name: "Req 03 - Set final remediation result variable"
    ansible.builtin.set_fact:
      cis_result: "{{ status_02 | default('ERROR') | trim }}"
    tags: [execute]

  - name: "Req 03 - Store requirement 03 details"
    ansible.builtin.set_fact:
      task_03_name: "Set final remediation result variable"
      task_03_cmd: "set_fact cis_result"
      task_03_rc: 0
      data_03: "{{ cis_result }}"
      status_03: "PASS"
      details_03: "cis_result set to {{ cis_result }}"
    tags: [execute]

  - name: "Req 04 - Store requirement 04 details"
    ansible.builtin.set_fact:
      task_04_name: "Generate remediation report"
      task_04_cmd: "debug module"
      task_04_rc: 0
      data_04: "Report generated"
      status_04: "PASS"
      details_04: "Report displayed below"
    tags: [execute]

  - name: "Req 04 - Generate remediation report"
    ansible.builtin.debug:
      msg:
      - "========================================================"
      - "        REMEDIATION REPORT — CIS 5.3.2.3"
      - "========================================================"
      - "Reference: CIS Benchmark checkpoint 5.3.2.3"
      - ""
      - "REQUIREMENT 01 - {{ req_01 }}:"
      - "  Task: {{ task_01_name | default('Task not recorded') }}"
      - "  Command: {{ task_01_cmd | default('N/A') }}"
      - "  Exit code: {{ task_01_rc | default(-1) }}"
      - "  Data: {{ data_01 | default('Data collection failed') | trim }}"
      - "  Status: {{ status_01 | default('ERROR') | trim }}"
      - "  Details: {{ details_01 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 02 - {{ req_02 }}:"
      - "  Task: {{ task_02_name | default('Task not recorded') }}"
      - "  Command: {{ task_02_cmd | default('N/A') }}"
      - "  Exit code: {{ task_02_rc | default(-1) }}"
      - "  Data: {{ data_02 | default('Data collection failed') | trim }}"
      - "  Status: {{ status_02 | default('ERROR') | trim }}"
      - "  Details: {{ details_02 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 03 - {{ req_03 }}:"
      - "  Task: {{ task_03_name | default('Task not recorded') }}"
      - "  Command: {{ task_03_cmd | default('N/A') }}"
      - "  Exit code: {{ task_03_rc | default(-1) }}"
      - "  Data: {{ data_03 | default('Data collection failed') | trim }}"
      - "  Status: {{ status_03 | default('ERROR') | trim }}"
      - "  Details: {{ details_03 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 04 - {{ req_04 }}:"
      - "  Task: {{ task_04_name | default('Task not recorded') }}"
      - "  Command: {{ task_04_cmd | default('N/A') }}"
      - "  Exit code: {{ task_04_rc | default(-1) }}"
      - "  Data: {{ data_04 | default('Data collection failed') | trim }}"
      - "  Status: {{ status_04 | default('ERROR') | trim }}"
      - "  Details: {{ details_04 | default('Not evaluated') | trim }}"
      - ""
      - "========================================================"
      - "OVERALL REMEDIATION:"
      - "  Result: {{ cis_result | default('ERROR') | trim }}"
      - "========================================================"
    tags: [execute]

  always:
  - name: "Restore - Check if authselect.conf backup exists"
    ansible.builtin.stat:
      path: "{{ backup_dir }}/authselect.conf.bak"
    register: _restore_authselect_conf
    tags: [restore]

  - name: "Restore - Restore authselect.conf from backup"
    ansible.builtin.copy:
      src: "{{ backup_dir }}/authselect.conf.bak"
      dest: /etc/authselect/authselect.conf
      remote_src: true
    when: "_restore_authselect_conf.stat.exists | default(false)"
    failed_when: false
    tags: [restore]

  - name: "Restore - Check if password-auth backup exists"
    ansible.builtin.stat:
      path: "{{ backup_dir }}/password-auth.bak"
    register: _restore_password_auth
    tags: [restore]

  - name: "Restore - Restore password-auth from backup"
    ansible.builtin.copy:
      src: "{{ backup_dir }}/password-auth.bak"
      dest: /etc/pam.d/password-auth
      remote_src: true
    when: "_restore_password_auth.stat.exists | default(false)"
    failed_when: false
    tags: [restore]

  - name: "Restore - Check if system-auth backup exists"
    ansible.builtin.stat:
      path: "{{ backup_dir }}/system-auth.bak"
    register: _restore_system_auth
    tags: [restore]

  - name: "Restore - Restore system-auth from backup"
    ansible.builtin.copy:
      src: "{{ backup_dir }}/system-auth.bak"
      dest: /etc/pam.d/system-auth
      remote_src: true
    when: "_restore_system_auth.stat.exists | default(false)"
    failed_when: false
    tags: [restore]

  - name: "Restore - Remove backup directory"
    ansible.builtin.file:
      path: "{{ backup_dir }}"
      state: absent
    failed_when: false
    tags: [restore]
