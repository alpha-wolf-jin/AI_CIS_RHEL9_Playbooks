---
- name: Initialize meta data variables
  include_vars: cis_remediation_var_7_2_8.yml

- name: "Snapshot - Create backup directory"
  ansible.builtin.file:
    path: "{{ backup_dir }}"
    state: directory
    mode: '0700'
  tags: [snapshot]
- name: "Snapshot - Check if /etc/passwd exists"
  ansible.builtin.stat:
    path: "/etc/passwd"
  register: _snap_passwd_stat
  tags: [snapshot]
- name: "Snapshot - Backup /etc/passwd"
  ansible.builtin.copy:
    src: "/etc/passwd"
    dest: "{{ backup_dir }}/passwd.backup"
    remote_src: true
  when: _snap_passwd_stat.stat.exists | default(false)
  tags: [snapshot]
- name: "Snapshot - Check if remediation script already exists"
  ansible.builtin.stat:
    path: "{{ backup_dir }}/remediate_home_dirs.sh"
  register: _snap_script_stat
  tags: [snapshot]
- name: "Snapshot - Record whether remediation script existed"
  ansible.builtin.copy:
    content: "{{ _snap_script_stat.stat.exists | default(false) }}"
    dest: "{{ backup_dir }}/script_existed.marker"
  tags: [snapshot]

- block:
  - name: "Req 01 - Deploy remediation script"
    ansible.builtin.copy:
      content: "{{ remediation_script }}"
      dest: "{{ backup_dir }}/remediate_home_dirs.sh"
      mode: '0700'
    failed_when: false
    tags: [execute]

  - name: "Req 01 - Execute remediation script"
    ansible.builtin.shell: "/bin/bash {{ backup_dir }}/remediate_home_dirs.sh"
    args:
      executable: /bin/bash
    register: result_01
    failed_when: false
    changed_when: false
    tags: [execute]

  - name: "Req 02 - Verify home directory configuration"
    ansible.builtin.shell: "/bin/bash {{ backup_dir }}/remediate_home_dirs.sh"
    args:
      executable: /bin/bash
    register: result_02
    failed_when: false
    changed_when: false
    tags: [execute]

  - name: "Store requirement 01 details"
    ansible.builtin.set_fact:
      task_01_name: "Execute remediation script for home directories"
      task_01_cmd: "/bin/bash {{ backup_dir }}/remediate_home_dirs.sh"
      task_01_rc: "{{ result_01.rc | default(-1) }}"
      data_01: "{{ result_01.stdout | default('') | trim }}"
      status_01: "{{ ('PASS' if (result_01.rc | default(-1)) == 0 else 'FAIL') | trim }}"
      details_01: "{{ ('Script executed successfully' if (result_01.rc | default(-1)) == 0 else 'Script execution failed') | trim }}"
    tags: [execute]

  - name: "Store requirement 02 details"
    ansible.builtin.set_fact:
      task_02_name: "Verify home directory configuration"
      task_02_cmd: "/bin/bash {{ backup_dir }}/remediate_home_dirs.sh"
      task_02_rc: "{{ result_02.rc | default(-1) }}"
      data_02: "{{ result_02.stdout | default('') | trim }}"
      status_02: "{{ ('PASS' if ('No modification needed' in (result_02.stdout | default(''))) else 'FAIL') | trim }}"
      details_02: "{{ ('System is compliant' if ('No modification needed' in (result_02.stdout | default(''))) else 'System requires remediation') | trim }}"
    tags: [execute]

  - name: "Req 03 - Set final remediation result"
    ansible.builtin.set_fact:
      cis_result: "{{ status_02 | default('ERROR') | trim }}"
    tags: [execute]

  - name: "Store requirement 03 details"
    ansible.builtin.set_fact:
      task_03_name: "Set final remediation result"
      task_03_cmd: "set_fact: cis_result = status_02"
      task_03_rc: 0
      data_03: "{{ status_02 | default('ERROR') | trim }}"
      status_03: "PASS"
      details_03: "cis_result set to {{ status_02 | default('ERROR') | trim }}"
    tags: [execute]

  - name: "Generate remediation report"
    ansible.builtin.debug:
      msg:
      - "REMEDIATION REPORT — CIS 7.2.8"
      - "Reference: CIS Benchmark checkpoint 7.2.8"
      - ""
      - "REQUIREMENT 01 - {{ req_01 }}:"
      - "  Task: {{ task_01_name | default('Task not recorded') }}"
      - "  Command: {{ task_01_cmd | default('N/A') }}"
      - "  Exit code: {{ task_01_rc | default(-1) }}"
      - "  Data: {{ data_01 | default('') | trim }}"
      - "  Status: {{ status_01 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_01 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 02 - {{ req_02 }}:"
      - "  Task: {{ task_02_name | default('Task not recorded') }}"
      - "  Command: {{ task_02_cmd | default('N/A') }}"
      - "  Exit code: {{ task_02_rc | default(-1) }}"
      - "  Data: {{ data_02 | default('') | trim }}"
      - "  Status: {{ status_02 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_02 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 03 - {{ req_03 }}:"
      - "  Task: {{ task_03_name | default('Task not recorded') }}"
      - "  Command: {{ task_03_cmd | default('N/A') }}"
      - "  Exit code: {{ task_03_rc | default(-1) }}"
      - "  Data: {{ data_03 | default('') | trim }}"
      - "  Status: {{ status_03 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_03 | default('Not evaluated') | trim }}"
      - ""
      - "OVERALL REMEDIATION:"
      - "  Result: {{ cis_result | default('ERROR') | trim }}"
    tags: [execute]

  always:
  - name: "Restore - Check if passwd backup exists"
    ansible.builtin.stat:
      path: "{{ backup_dir }}/passwd.backup"
    register: _restore_passwd_stat
    failed_when: false
    tags: [restore]

  - name: "Restore - Restore /etc/passwd from backup"
    ansible.builtin.copy:
      src: "{{ backup_dir }}/passwd.backup"
      dest: "/etc/passwd"
      remote_src: true
    when: _restore_passwd_stat.stat.exists | default(false)
    failed_when: false
    tags: [restore]

  - name: "Restore - Read script existence marker"
    ansible.builtin.slurp:
      src: "{{ backup_dir }}/script_existed.marker"
    register: _restore_script_marker
    failed_when: false
    tags: [restore]

  - name: "Restore - Remove remediation script (created during execution)"
    ansible.builtin.file:
      path: "{{ backup_dir }}/remediate_home_dirs.sh"
      state: absent
    when:
    - _restore_script_marker.content is defined
    - (_restore_script_marker.content | b64decode | trim) == 'False'
    failed_when: false
    tags: [restore]

  - name: "Restore - Remove backup directory"
    ansible.builtin.file:
      path: "{{ backup_dir }}"
      state: absent
    failed_when: false
    tags: [restore]
