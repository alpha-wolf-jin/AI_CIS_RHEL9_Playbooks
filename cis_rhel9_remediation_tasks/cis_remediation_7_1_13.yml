---
- name: Initialize meta data variables
  include_vars: cis_remediation_var_7_1_13.yml

- name: "Snapshot - Create backup directory"
  ansible.builtin.file:
    path: "{{ backup_dir }}"
    state: directory
    mode: '0700'
  tags: [snapshot]

- name: "Initialize data variables"
  set_fact:
    data_01: "Not collected yet"
    status_01: "UNKNOWN"
    details_01: "Not evaluated"
    data_02: "Not collected yet"
    status_02: "UNKNOWN"
    details_02: "Not evaluated"
    data_03: "Not collected yet"
    status_03: "UNKNOWN"
    details_03: "Not evaluated"
    data_04: "Not collected yet"
    status_04: "UNKNOWN"
    details_04: "Not evaluated"
    task_01_name: "Not executed"
    task_01_cmd: "N/A"
    task_01_rc: -1
    task_02_name: "Not executed"
    task_02_cmd: "N/A"
    task_02_rc: -1
    task_03_name: "Not executed"
    task_03_cmd: "N/A"
    task_03_rc: -1
    task_04_name: "Not executed"
    task_04_cmd: "N/A"
    task_04_rc: -1
  tags: [execute]
- block:
  - name: "Req 01 - Check prerequisite software availability"
    ansible.builtin.shell: "which find && which stat && which awk"
    args:
      executable: /bin/bash
    register: result_01
    failed_when: false
    changed_when: false
    tags: [execute]

  - name: "Store requirement 01 details"
    set_fact:
      task_01_name: "Check prerequisite software availability"
      task_01_cmd: "which find && which stat && which awk"
      task_01_rc: "{{ result_01.rc | default(-1) }}"
      data_01: "{{ result_01.stdout | default('') | trim }}"
      status_01: "{{ ('PASS' if result_01.rc | default(-1) == 0 else 'FAIL') | trim }}"
      details_01: "{{ ('Prerequisite utilities found' if result_01.rc | default(-1) == 0 else 'One or more utilities missing') | trim }}"
    tags: [execute]

  - name: "Req 02 - Review all SUID and SGID files"
    ansible.builtin.shell: "find / -type f \\( -perm -4000 -o -perm -2000 \\) -exec ls -la {} \\; 2>/dev/null || true"
    args:
      executable: /bin/bash
    register: result_02
    failed_when: false
    changed_when: false
    when: "result_01.rc | default(-1) == 0"
    tags: [execute]

  - name: "Store requirement 02 details"
    set_fact:
      task_02_name: "Review all SUID and SGID files"
      task_02_cmd: |
        find / -type f \\( -perm -4000 -o -perm -2000 \\) -exec ls -la {} \\; 2>/dev/null || true
      task_02_rc: "{{ result_02.rc | default(-1) }}"
      data_02: "{{ result_02.stdout | default('') | trim }}"
      status_02: "{{ ('PASS' if (result_02.stdout | default('') | trim | length > 0) else 'FAIL') | trim }}"
      details_02: "{{ ('SUID/SGID files listed' if (result_02.stdout | default('') | trim | length > 0) else 'Failed to list files') | trim }}"
    when: "result_01.rc | default(-1) == 0"
    tags: [execute]

  - name: "Req 03 - Generate SHA256 hashes for SUID/SGID files"
    ansible.builtin.shell: "for f in $(find / -type f \\( -perm -4000 -o -perm -2000 \\) 2>/dev/null); do sha256sum \"$f\"; done"
    args:
      executable: /bin/bash
    register: result_03
    failed_when: false
    changed_when: false
    when: "result_01.rc | default(-1) == 0"
    tags: [execute]

  - name: "Store requirement 03 details"
    set_fact:
      task_03_name: "Generate SHA256 hashes for SUID/SGID files"
      task_03_cmd: |
        for f in $(find / -type f \\( -perm -4000 -o -perm -2000 \\) 2>/dev/null); do sha256sum \"$f\"; done
      task_03_rc: "{{ result_03.rc | default(-1) }}"
      data_03: "{{ result_03.stdout | default('') | trim }}"
      status_03: "{{ ('PASS' if result_03.rc | default(-1) == 0 else 'FAIL') | trim }}"
      details_03: "{{ ('SHA256 hashes generated' if result_03.rc | default(-1) == 0 else 'Failed to generate hashes') | trim }}"
    when: "result_01.rc | default(-1) == 0"
    tags: [execute]

  - name: "Req 04 - Count total SUID/SGID files"
    ansible.builtin.shell: "find / -type f \\( -perm -4000 -o -perm -2000 \\) 2>/dev/null | wc -l"
    args:
      executable: /bin/bash
    register: result_04
    failed_when: false
    changed_when: false
    when: "result_01.rc | default(-1) == 0"
    tags: [execute]

  - name: "Store requirement 04 details"
    set_fact:
      task_04_name: "Count total SUID/SGID files"
      task_04_cmd: |
        find / -type f \\( -perm -4000 -o -perm -2000 \\) 2>/dev/null | wc -l
      task_04_rc: "{{ result_04.rc | default(-1) }}"
      data_04: "{{ result_04.stdout | default('') | trim }}"
      status_04: "{{ ('PASS' if result_04.rc | default(-1) == 0 else 'FAIL') | trim }}"
      details_04: "{{ ('SUID/SGID file count obtained' if result_04.rc | default(-1) == 0 else 'Failed to count files') | trim }}"
    when: "result_01.rc | default(-1) == 0"
    tags: [execute]

  - name: "Generate remediation report"
    debug:
      msg:
      - "========================================================"
      - "        REMEDIATION REPORT — CIS 7.1.13"
      - "        Reference: CIS Benchmark checkpoint 7.1.13"
      - "========================================================"
      - ""
      - "REQUIREMENT 01 - {{ req_01 }}:"
      - "  Task: {{ task_01_name | default('Task not recorded') }}"
      - "  Command: {{ task_01_cmd | default('N/A') }}"
      - "  Exit code: {{ task_01_rc | default(-1) }}"
      - "  Data: {{ data_01 | default('Data collection failed') | trim }}"
      - "  Status: {{ status_01 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_01 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 02 - {{ req_02 }}:"
      - "  Task: {{ task_02_name | default('Task not recorded') }}"
      - "  Command: {{ task_02_cmd | default('N/A') }}"
      - "  Exit code: {{ task_02_rc | default(-1) }}"
      - "  Data: {{ data_02 | default('Data collection failed') | trim }}"
      - "  Status: {{ status_02 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_02 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 03 - {{ req_03 }}:"
      - "  Task: {{ task_03_name | default('Task not recorded') }}"
      - "  Command: {{ task_03_cmd | default('N/A') }}"
      - "  Exit code: {{ task_03_rc | default(-1) }}"
      - "  Data: {{ data_03 | default('Data collection failed') | trim }}"
      - "  Status: {{ status_03 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_03 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 04 - {{ req_04 }}:"
      - "  Task: {{ task_04_name | default('Task not recorded') }}"
      - "  Command: {{ task_04_cmd | default('N/A') }}"
      - "  Exit code: {{ task_04_rc | default(-1) }}"
      - "  Data: {{ data_04 | default('Data collection failed') | trim }}"
      - "  Status: {{ status_04 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_04 | default('Not evaluated') | trim }}"
      - ""
      - "========================================================"
      - "OVERALL REMEDIATION:"
      - "  Result: {{ 'PASS' if (status_01 | default('FAIL') == 'PASS' and status_02 | default('FAIL') == 'PASS' and status_03 | default('FAIL') == 'PASS' and status_04 | default('FAIL') == 'PASS') else 'FAIL' }}"
      - "  Details: All requirements completed with data collection"
      - "========================================================"
    tags: [execute]

  always:
  - name: "Restore - Remove backup directory"
    ansible.builtin.file:
      path: "{{ backup_dir }}"
      state: absent
    failed_when: false
    tags: [restore]
