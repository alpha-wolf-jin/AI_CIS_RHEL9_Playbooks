playbook_name: "cis-3.3.9-remediation"
backup_dir: "/var/log/ai-playbooks-backup/{{ playbook_name }}"
sysctl_config_file: "/etc/sysctl.d/60-netipv4_sysctl.conf"
req_01: "Run the provided remediation script to fix Ensure suspicious packets are logged. Set the following parameters in /etc/sysctl.conf or a file in /etc/sysctl.d/ ending in .conf: net.ipv4.conf.all.log_martians = 1, net.ipv4.conf.default.log_martians = 1. Run the provided script to set the active kernel parameters."
req_02: "VERIFY: Run audit check to confirm Ensure suspicious packets are logged is properly configured. Expected result: System is compliant"
req_03: "Store the final remediation result in a variable named 'cis_result' using set_fact. Set cis_result to the overall remediation status (PASS/FAIL/SKIP/ERROR) derived from the last requirement's status variable."
req_04: "Create a task named 'Generate remediation report' using debug msg with EXACTLY this format"
script_content: |
  #!/usr/bin/env bash
  {
     sysctl -w net.ipv4.conf.all.log_martians=1
     sysctl -w net.ipv4.conf.default.log_martians=1
     sysctl -w net.ipv4.route.flush=1
  }
