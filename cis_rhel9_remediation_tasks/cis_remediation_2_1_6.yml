---
- name: Initialize meta data variables
  include_vars: cis_remediation_var_2_1_6.yml

- name: "Snapshot - Create backup directory"
  ansible.builtin.file:
    path: "{{ backup_dir }}"
    state: directory
    mode: '0700'
  tags: [snapshot]
- name: "Snapshot - Record smb.service active state"
  ansible.builtin.shell: "systemctl is-active {{ service_unit }} 2>/dev/null || echo unknown"
  args:
    executable: /bin/bash
  register: _snap_active
  changed_when: false
  tags: [snapshot]
- name: "Snapshot - Save active state to file"
  ansible.builtin.copy:
    content: "{{ _snap_active.stdout | trim }}"
    dest: "{{ backup_dir }}/smb_active.state"
    mode: '0600'
    force: false
  tags: [snapshot]
- name: "Snapshot - Record smb.service enabled state"
  ansible.builtin.shell: "systemctl is-enabled {{ service_unit }} 2>/dev/null || echo unknown"
  args:
    executable: /bin/bash
  register: _snap_enabled
  changed_when: false
  tags: [snapshot]
- name: "Snapshot - Save enabled state to file"
  ansible.builtin.copy:
    content: "{{ _snap_enabled.stdout | trim }}"
    dest: "{{ backup_dir }}/smb_enabled.state"
    mode: '0600'
    force: false
  tags: [snapshot]
- name: "Snapshot - Record samba package installed state"
  ansible.builtin.shell: "rpm -q {{ package_name }} >/dev/null 2>&1 && echo installed || echo not_installed"
  args:
    executable: /bin/bash
  register: _snap_pkg
  changed_when: false
  tags: [snapshot]
- name: "Snapshot - Save package state to file"
  ansible.builtin.copy:
    content: "{{ _snap_pkg.stdout | trim }}"
    dest: "{{ backup_dir }}/samba_installed.state"
    mode: '0600'
    force: false
  tags: [snapshot]

- block:
  - name: "Initialize data variables"
    set_fact:
      data_01: "Not collected yet"
      status_01: "SKIP"
      details_01: "Not evaluated"
      data_02: "Not collected yet"
      status_02: "SKIP"
      details_02: "Not evaluated"
      data_03: "Not collected yet"
      status_03: "SKIP"
      details_03: "Not evaluated"
      data_04: "Not collected yet"
      status_04: "SKIP"
      details_04: "Not evaluated"
      data_05: "Not collected yet"
      status_05: "ERROR"
      details_05: "Not evaluated"
      task_01_name: "Not executed"
      task_01_cmd: "N/A"
      task_01_rc: -1
      task_02_name: "Not executed"
      task_02_cmd: "N/A"
      task_02_rc: -1
      task_03_name: "Not executed"
      task_03_cmd: "N/A"
      task_03_rc: -1
      task_04_name: "Not executed"
      task_04_cmd: "N/A"
      task_04_rc: -1
    tags: [execute]

  - name: "Gather package facts"
    ansible.builtin.package_facts:
      manager: auto
    tags: [execute]

  - name: "Check if samba is installed"
    set_fact:
      skip_all: "{{ 'samba' not in ansible_facts.packages }}"
    tags: [execute]

  - name: "Req 01 - Stop smb.service"
    ansible.builtin.shell: "systemctl stop {{ service_unit }}"
    args:
      executable: /bin/bash
    register: result_01
    failed_when: false
    when: "not skip_all | default(false)"
    tags: [execute]

  - name: "Store Req 01 details"
    set_fact:
      task_01_name: "Stop smb.service"
      task_01_cmd: "systemctl stop smb.service"
      task_01_rc: "{{ result_01.rc | default(-1) }}"
      data_01: "{{ result_01.stdout | default('') | trim }}"
      status_01: "{{ 'PASS' if result_01.rc | default(-1) == 0 else 'FAIL' }}"
      details_01: "{{ 'Service stop command executed successfully.' if result_01.rc | default(-1) == 0 else 'Failed to stop service: ' + result_01.stderr | default('') }}"
    when: "not skip_all | default(false)"
    tags: [execute]

  - name: "Check if samba is a dependency of other packages"
    ansible.builtin.shell: |
      dnf repoquery --whatrequires samba --qf '%{name}' 2>/dev/null || true
    args:
      executable: /bin/bash
    register: samba_deps_check
    failed_when: false
    changed_when: false
    when: "not skip_all | default(false)"
    tags: [execute]

  - name: "Set skip_removal based on dependency check"
    set_fact:
      skip_removal: >-
        {{ (samba_deps_check.stdout_lines | default([]) | reject('==', '') | list | length > 0) if not skip_all | default(false) else false }}
    tags: [execute]

  - name: "Pre-set status_02 to SKIP when removal skipped due to dependency"
    set_fact:
      status_02: "SKIP"
      details_02: "Removal skipped: samba is required by other packages"
      data_02: "Skipped"
      task_02_name: "Remove samba package (skipped)"
      task_02_cmd: "dnf remove samba"
      task_02_rc: 0
    when:
    - "not skip_all | default(false)"
    - "skip_removal | default(false)"
    tags: [execute]

  - name: "Req 02 - Remove samba package"
    ansible.builtin.dnf:
      name: "{{ package_name }}"
      state: absent
    register: result_02
    failed_when: false
    when:
    - "not skip_all | default(false)"
    - "not skip_removal | default(false)"
    tags: [execute]

  - name: "Store Req 02 details"
    set_fact:
      task_02_name: "Remove samba package"
      task_02_cmd: "dnf remove samba"
      task_02_rc: "{{ result_02.rc | default(-1) }}"
      data_02: "{{ result_02.stdout | default('') | trim }}"
      status_02: "{{ 'PASS' if result_02.rc | default(-1) == 0 else 'FAIL' }}"
      details_02: "{{ 'Package removed successfully.' if result_02.rc | default(-1) == 0 else 'Failed to remove package: ' + result_02.stderr | default('') }}"
    when:
    - "not skip_all | default(false)"
    - "not skip_removal | default(false)"
    tags: [execute]

  - name: "Req 03 - Mask smb.service"
    ansible.builtin.shell: "systemctl mask {{ service_unit }}"
    args:
      executable: /bin/bash
    register: result_03
    failed_when: false
    when: "not skip_all | default(false)"
    tags: [execute]

  - name: "Store Req 03 details"
    set_fact:
      task_03_name: "Mask smb.service"
      task_03_cmd: "systemctl mask smb.service"
      task_03_rc: "{{ result_03.rc | default(-1) }}"
      data_03: "{{ result_03.stdout | default('') | trim }}"
      status_03: "{{ 'PASS' if result_03.rc | default(-1) == 0 else 'FAIL' }}"
      details_03: "{{ 'Service masked successfully.' if result_03.rc | default(-1) == 0 else 'Failed to mask service: ' + result_03.stderr | default('') }}"
    when: "not skip_all | default(false)"
    tags: [execute]

  - name: "Req 04 - Verify smb.service status"
    ansible.builtin.shell: "systemctl status {{ service_unit }}"
    args:
      executable: /bin/bash
    register: result_04
    failed_when: false
    changed_when: false
    when: "not skip_all | default(false)"
    tags: [execute]

  - name: "Store Req 04 details"
    set_fact:
      task_04_name: "Verify smb.service status"
      task_04_cmd: "systemctl status smb.service"
      task_04_rc: "{{ result_04.rc | default(-1) }}"
      data_04: "{{ result_04.stdout | default('') | trim }}"
      status_04: "{{ 'PASS' if ('inactive (dead)' in result_04.stdout | default('') or 'masked' in result_04.stdout | default('')) else 'FAIL' }}"
      details_04: "{{ 'Service is not running or masked.' if ('inactive (dead)' in result_04.stdout | default('') or 'masked' in result_04.stdout | default('')) else 'Service is still running or not properly stopped/masked.' }}"
    when: "not skip_all | default(false)"
    tags: [execute]

  - name: "Req 05 - Store final remediation result"
    set_fact:
      cis_result: "{{ status_04 | default('ERROR') | trim }}"
    tags: [execute]

  - name: "Mark requirement 5 status"
    set_fact:
      status_05: "PASS"
      details_05: "cis_result stored successfully as {{ cis_result }}"
    tags: [execute]

  - name: "Generate remediation report"
    debug:
      msg:
      - "REMEDIATION REPORT — CIS 2.1.6"
      - "Reference: CIS Benchmark checkpoint 2.1.6"
      - ""
      - "REQUIREMENT 01 - {{ req_01 }}:"
      - "  Task: {{ task_01_name | default('Not recorded') }}"
      - "  Command: {{ task_01_cmd | default('N/A') }}"
      - "  Exit code: {{ task_01_rc | default(-1) }}"
      - "  Data: {{ data_01 | default('') | trim }}"
      - "  Status: {{ status_01 | default('SKIP') | trim }}"
      - "  Details: {{ details_01 | default('') | trim }}"
      - ""
      - "REQUIREMENT 02 - {{ req_02 }}:"
      - "  Task: {{ task_02_name | default('Not recorded') }}"
      - "  Command: {{ task_02_cmd | default('N/A') }}"
      - "  Exit code: {{ task_02_rc | default(-1) }}"
      - "  Data: {{ data_02 | default('') | trim }}"
      - "  Status: {{ status_02 | default('SKIP') | trim }}"
      - "  Details: {{ details_02 | default('') | trim }}"
      - ""
      - "REQUIREMENT 03 - {{ req_03 }}:"
      - "  Task: {{ task_03_name | default('Not recorded') }}"
      - "  Command: {{ task_03_cmd | default('N/A') }}"
      - "  Exit code: {{ task_03_rc | default(-1) }}"
      - "  Data: {{ data_03 | default('') | trim }}"
      - "  Status: {{ status_03 | default('SKIP') | trim }}"
      - "  Details: {{ details_03 | default('') | trim }}"
      - ""
      - "REQUIREMENT 04 - {{ req_04 }}:"
      - "  Task: {{ task_04_name | default('Not recorded') }}"
      - "  Command: {{ task_04_cmd | default('N/A') }}"
      - "  Exit code: {{ task_04_rc | default(-1) }}"
      - "  Data: {{ data_04 | default('') | trim }}"
      - "  Status: {{ status_04 | default('SKIP') | trim }}"
      - "  Details: {{ details_04 | default('') | trim }}"
      - ""
      - "REQUIREMENT 05 - {{ req_05 }}:"
      - "  Task: Store final remediation result"
      - "  Command: set_fact"
      - "  Exit code: 0"
      - "  Data: Not applicable"
      - "  Status: {{ status_05 | default('SKIP') | trim }}"
      - "  Details: {{ details_05 | default('') | trim }}"
      - ""
      - "========================================================"
      - "OVERALL REMEDIATION:"
      - "  Result: {{ cis_result | default('ERROR') | trim }}"
      - "========================================================"
    tags: [execute]

  always:
  - name: "Restore - Check if backup directory exists"
    ansible.builtin.stat:
      path: "{{ backup_dir }}"
    register: _restore_backup_stat
    failed_when: false
    tags: [restore]

  - name: "Restore - Read saved active state"
    ansible.builtin.slurp:
      src: "{{ backup_dir }}/smb_active.state"
    register: _restore_active
    failed_when: false
    when: _restore_backup_stat.stat.exists | default(false)
    tags: [restore]

  - name: "Restore - Read saved enabled state"
    ansible.builtin.slurp:
      src: "{{ backup_dir }}/smb_enabled.state"
    register: _restore_enabled
    failed_when: false
    when: _restore_backup_stat.stat.exists | default(false)
    tags: [restore]

  - name: "Restore - Read saved package installed state"
    ansible.builtin.slurp:
      src: "{{ backup_dir }}/samba_installed.state"
    register: _restore_pkg
    failed_when: false
    when: _restore_backup_stat.stat.exists | default(false)
    tags: [restore]

  - name: "Restore - Reinstall samba if it was originally installed"
    ansible.builtin.dnf:
      name: "{{ package_name }}"
      state: present
    register: _reinstall_result
    failed_when: false
    when:
    - _restore_backup_stat.stat.exists | default(false)
    - _restore_pkg.content is defined
    - (_restore_pkg.content | default('') | b64decode | trim) == 'installed'
    tags: [restore]

  - name: "Restore - Unmask service (if currently masked, before setting original state)"
    ansible.builtin.shell: "systemctl unmask {{ service_unit }} 2>/dev/null || true"
    args:
      executable: /bin/bash
    failed_when: false
    when:
    - _restore_backup_stat.stat.exists | default(false)
    - _restore_enabled.content is defined
    - (_restore_enabled.content | default('') | b64decode | trim) != 'masked'
    tags: [restore]

  - name: "Restore - Enable service if originally enabled"
    ansible.builtin.shell: "systemctl enable {{ service_unit }}"
    args:
      executable: /bin/bash
    failed_when: false
    when:
    - _restore_backup_stat.stat.exists | default(false)
    - _restore_enabled.content is defined
    - (_restore_enabled.content | default('') | b64decode | trim) == 'enabled'
    tags: [restore]

  - name: "Restore - Disable service if originally disabled"
    ansible.builtin.shell: "systemctl disable {{ service_unit }}"
    args:
      executable: /bin/bash
    failed_when: false
    when:
    - _restore_backup_stat.stat.exists | default(false)
    - _restore_enabled.content is defined
    - (_restore_enabled.content | default('') | b64decode | trim) == 'disabled'
    tags: [restore]

  - name: "Restore - Mask service if originally masked"
    ansible.builtin.shell: "systemctl mask {{ service_unit }}"
    args:
      executable: /bin/bash
    failed_when: false
    when:
    - _restore_backup_stat.stat.exists | default(false)
    - _restore_enabled.content is defined
    - (_restore_enabled.content | default('') | b64decode | trim) == 'masked'
    tags: [restore]

  - name: "Restore - Start service if originally active"
    ansible.builtin.shell: "systemctl start {{ service_unit }}"
    args:
      executable: /bin/bash
    failed_when: false
    when:
    - _restore_backup_stat.stat.exists | default(false)
    - _restore_active.content is defined
    - (_restore_active.content | default('') | b64decode | trim) == 'active'
    tags: [restore]

  - name: "Restore - Stop service if originally inactive (in case it was started)"
    ansible.builtin.shell: "systemctl stop {{ service_unit }}"
    args:
      executable: /bin/bash
    failed_when: false
    when:
    - _restore_backup_stat.stat.exists | default(false)
    - _restore_active.content is defined
    - (_restore_active.content | default('') | b64decode | trim) == 'inactive'
    tags: [restore]

  - name: "Restore - Remove backup directory"
    ansible.builtin.file:
      path: "{{ backup_dir }}"
      state: absent
    failed_when: false
    tags: [restore]
