---
- name: Initialize meta data variables
  include_vars: cis_remediation_var_5_4_2_4.yml

- name: "State Guard - Check for existing checkpoint"
  ansible.builtin.stat:
    path: "{{ state_guard_flag }}"
  register: _sg_flag
  tags: [snapshot]
- name: "State Guard - Remove stale checkpoint if exists"
  ansible.builtin.file:
    path: "{{ state_guard_dir }}"
    state: absent
  when: _sg_flag.stat.exists
  failed_when: false
  tags: [snapshot]
- name: "State Guard - Create checkpoint directory"
  ansible.builtin.file:
    path: "{{ state_guard_dir }}"
    state: directory
    mode: '0700'
  tags: [snapshot]
- name: "State Guard - Backup /etc/shadow"
  ansible.builtin.copy:
    src: "/etc/shadow"
    dest: "{{ state_guard_dir }}/shadow.present"
    remote_src: true
  tags: [snapshot]
- name: "State Guard - Create checkpoint flag"
  ansible.builtin.copy:
    content: "checkpoint"
    dest: "{{ state_guard_flag }}"
  tags: [snapshot]

- block:
  - name: "Req 01 - Set password for root user"
    ansible.builtin.shell: "echo 'root:{{ root_password }}' | chpasswd"
    args:
      executable: /bin/bash
    register: result_01
    failed_when: false
    no_log: true
    tags: [execute]

  - name: "Store requirement 01 details"
    set_fact:
      task_01_name: "Set password for root user"
      task_01_cmd: "echo 'root:****' | chpasswd"
      task_01_rc: "{{ result_01.rc | default(-1) }}"
      data_01: "{{ result_01.stdout | default('') | trim }}"
      status_01: "{{ 'PASS' if (result_01.rc | default(-1)) == 0 else 'FAIL' }}"
      details_01: "{{ 'Root password set successfully' if (result_01.rc | default(-1)) == 0 else 'Failed to set root password' }}"
    tags: [execute]

  - name: "Req 02 - Lock root user account"
    ansible.builtin.shell: "usermod -L root"
    args:
      executable: /bin/bash
    register: result_02
    failed_when: false
    tags: [execute]

  - name: "Store requirement 02 details"
    set_fact:
      task_02_name: "Lock root user account"
      task_02_cmd: "usermod -L root"
      task_02_rc: "{{ result_02.rc | default(-1) }}"
      data_02: "{{ result_02.stdout | default('') | trim }}"
      status_02: "{{ 'PASS' if (result_02.rc | default(-1)) == 0 else 'FAIL' }}"
      details_02: "{{ 'Root account locked successfully' if (result_02.rc | default(-1)) == 0 else 'Failed to lock root account' }}"
    tags: [execute]

  - name: "Req 03 - Verify root account status"
    ansible.builtin.shell: "passwd -S root"
    args:
      executable: /bin/bash
    register: result_03
    failed_when: false
    tags: [execute]

  - name: "Store requirement 03 details"
    set_fact:
      task_03_name: "Verify root account status"
      task_03_cmd: "passwd -S root"
      task_03_rc: "{{ result_03.rc | default(-1) }}"
      data_03: "{{ result_03.stdout | default('') | trim }}"
      status_03: "{{ 'PASS' if ('Password set' in (result_03.stdout | default('') | trim)) or (' LK ' in (result_03.stdout | default('') | trim)) else 'FAIL' }}"
      details_03: "{{ 'Root account status: ' + (result_03.stdout | default('') | trim) if ('Password set' in (result_03.stdout | default('') | trim)) or (' LK ' in (result_03.stdout | default('') | trim)) else 'Verification failed; output did not indicate lock or password set' }}"
    tags: [execute]

  - name: "Req 04 - Store final remediation result"
    set_fact:
      cis_result: "{{ 'PASS' if status_03 == 'PASS' else 'FAIL' if status_03 == 'FAIL' else 'ERROR' }}"
    tags: [execute]

  - name: "Store requirement 04 details"
    set_fact:
      task_04_name: "Store final remediation result"
      task_04_cmd: "set_fact: cis_result = ..."
      task_04_rc: 0
      data_04: "{{ cis_result | default('') | trim }}"
      status_04: "{{ 'PASS' if cis_result | default('') | trim in ['PASS','FAIL','SKIP','ERROR'] else 'ERROR' }}"
      details_04: "{{ 'Overall remediation result stored successfully: ' + cis_result if cis_result | default('') | trim in ['PASS','FAIL','SKIP','ERROR'] else 'Failed to store final result' }}"
    tags: [execute]

  - name: "Generate remediation report"
    ansible.builtin.debug:
      msg:
      - "========================================================"
      - "        REMEDIATION REPORT — CIS 5.4.2.4"
      - "========================================================"
      - "Reference: CIS Benchmark checkpoint 5.4.2.4"
      - ""
      - "REQUIREMENT 01 - {{ req_01 }}:"
      - "  Task: {{ task_01_name | default('Task not recorded') }}"
      - "  Command: {{ task_01_cmd | default('N/A') }}"
      - "  Exit code: {{ task_01_rc | default(-1) }}"
      - "  Data: {{ data_01 | default('') | trim }}"
      - "  Status: {{ status_01 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_01 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 02 - {{ req_02 }}:"
      - "  Task: {{ task_02_name | default('Task not recorded') }}"
      - "  Command: {{ task_02_cmd | default('N/A') }}"
      - "  Exit code: {{ task_02_rc | default(-1) }}"
      - "  Data: {{ data_02 | default('') | trim }}"
      - "  Status: {{ status_02 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_02 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 03 - {{ req_03 }}:"
      - "  Task: {{ task_03_name | default('Task not recorded') }}"
      - "  Command: {{ task_03_cmd | default('N/A') }}"
      - "  Exit code: {{ task_03_rc | default(-1) }}"
      - "  Data: {{ data_03 | default('') | trim }}"
      - "  Status: {{ status_03 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_03 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 04 - {{ req_04 }}:"
      - "  Task: {{ task_04_name | default('Task not recorded') }}"
      - "  Command: {{ task_04_cmd | default('N/A') }}"
      - "  Exit code: {{ task_04_rc | default(-1) }}"
      - "  Data: {{ data_04 | default('') | trim }}"
      - "  Status: {{ status_04 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_04 | default('Not evaluated') | trim }}"
      - ""
      - "========================================================"
      - "OVERALL REMEDIATION:"
      - "  Result: {{ cis_result | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_03 | default('Not evaluated') | trim }}"
      - "========================================================"
    tags: [execute]

  always:
  - name: "State Guard Restore - Check if checkpoint exists"
    ansible.builtin.stat:
      path: "{{ state_guard_flag }}"
    register: _sg_restore_flag
    failed_when: false
    tags: [restore]

  - name: "State Guard Restore - Check if shadow backup exists"
    ansible.builtin.stat:
      path: "{{ state_guard_dir }}/shadow.present"
    register: _sg_restore_shadow
    failed_when: false
    tags: [restore]

  - name: "State Guard Restore - Restore /etc/shadow from backup"
    ansible.builtin.copy:
      src: "{{ state_guard_dir }}/shadow.present"
      dest: "/etc/shadow"
      remote_src: true
    when: "_sg_restore_shadow.stat.exists | default(false)"
    failed_when: false
    tags: [restore]

  - name: "State Guard Restore - Remove checkpoint"
    ansible.builtin.file:
      path: "{{ state_guard_dir }}"
      state: absent
    when: "_sg_restore_flag.stat.exists | default(false)"
    failed_when: false
    tags: [restore]
