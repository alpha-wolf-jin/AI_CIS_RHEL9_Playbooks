playbook_name: "cis_6_2_2_1_2"
backup_dir: "/var/log/ai-playbooks-backup/{{ playbook_name }}"
config_file: "/etc/systemd/journal-upload.conf"
service_name: "systemd-journal-upload"
package_name: "systemd-journal-upload"
url_value: "192.168.50.42"
server_key_file: "/etc/ssl/private/journal-upload.pem"
server_cert_file: "/etc/ssl/certs/journal-upload.pem"
trusted_cert_file: "/etc/ssl/ca/trusted.pem"
req_01: "Ensure systemd-journal-upload is installed using command: dpkg -l systemd-journal-upload || rpm -q systemd-journal-upload. Expected result: package is installed."
req_02: "Configure authentication in /etc/systemd/journal-upload.conf or a .conf file in /etc/systemd/journal-upload.conf.d by setting URL=192.168.50.42 using command: grep -q '^URL=' /etc/systemd/journal-upload.conf && sed -i 's|^URL=.*|URL=192.168.50.42|' /etc/systemd/journal-upload.conf || echo 'URL=192.168.50.42' >> /etc/systemd/journal-upload.conf. Expected result: URL line is set."
req_03: "Configure ServerKeyFile in /etc/systemd/journal-upload.conf or a .conf file in /etc/systemd/journal-upload.conf.d using command: grep -q '^ServerKeyFile=' /etc/systemd/journal-upload.conf && sed -i 's|^ServerKeyFile=.*|ServerKeyFile=/etc/ssl/private/journal-upload.pem|' /etc/systemd/journal-upload.conf || echo 'ServerKeyFile=/etc/ssl/private/journal-upload.pem' >> /etc/systemd/journal-upload.conf. Expected result: ServerKeyFile line is set."
req_04: "Configure ServerCertificateFile in /etc/systemd/journal-upload.conf or a .conf file in /etc/systemd/journal-upload.conf.d using command: grep -q '^ServerCertificateFile=' /etc/systemd/journal-upload.conf && sed -i 's|^ServerCertificateFile=.*|ServerCertificateFile=/etc/ssl/certs/journal-upload.pem|' /etc/systemd/journal-upload.conf || echo 'ServerCertificateFile=/etc/ssl/certs/journal-upload.pem' >> /etc/systemd/journal-upload.conf. Expected result: ServerCertificateFile line is set."
req_05: "Configure TrustedCertificateFile in /etc/systemd/journal-upload.conf or a .conf file in /etc/systemd/journal-upload.conf.d using command: grep -q '^TrustedCertificateFile=' /etc/systemd/journal-upload.conf && sed -i 's|^TrustedCertificateFile=.*|TrustedCertificateFile=/etc/ssl/ca/trusted.pem|' /etc/systemd/journal-upload.conf || echo 'TrustedCertificateFile=/etc/ssl/ca/trusted.pem' >> /etc/systemd/journal-upload.conf. Expected result: TrustedCertificateFile line is set."
req_06: "Restart systemd-journal-upload service using command: systemctl restart systemd-journal-upload. Expected result: service restarts without error."
req_07: "Verify systemd-journal-upload authentication configuration using command: systemctl status systemd-journal-upload && journalctl -u systemd-journal-upload --no-pager | tail -20. Expected result: service is active and no authentication errors in logs."
