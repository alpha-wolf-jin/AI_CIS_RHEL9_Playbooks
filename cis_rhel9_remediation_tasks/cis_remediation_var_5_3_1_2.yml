playbook_name: "cis_5_3_1_2_authselect"
backup_dir: "/var/log/ai-playbooks-backup/{{ playbook_name }}"
req_01: "Apply prerequisite check for dnf package manager using command: `which dnf`. Expected result: dnf is available."
req_02: "Apply installation of authselect using command: `dnf install authselect`. Expected result: authselect is installed."
req_03: "Apply update to the latest version of authselect if current version is less than authselect-1.2.6-2 using command: `dnf upgrade authselect`. Expected result: authselect is updated to the latest version."
req_04: "Verify the installed version of authselect using command: `rpm -q --queryformat '%{VERSION}-%{RELEASE}' authselect`. Expected result: version is at least authselect-1.2.6-2."
req_05: "Store the final remediation result in a variable named 'cis_result' using set_fact. Set cis_result to the overall remediation status (PASS/FAIL/SKIP/ERROR) derived from the last requirement's status variable."
package_name: "authselect"
min_version_ver: "1.2.6-2"
