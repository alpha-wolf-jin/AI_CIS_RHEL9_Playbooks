---
- name: Initialize meta data variables
  include_vars: cis_remediation_var_6_2_2_1_3.yml

- name: "Snapshot - Create backup directory"
  ansible.builtin.file:
    path: "{{ backup_dir }}"
    state: directory
    mode: '0700'
  tags: [snapshot]
- name: "Snapshot - Check if {{ service_name }} unit file exists"
  ansible.builtin.stat:
    path: "/lib/systemd/system/{{ service_name }}.service"
  register: _snap_unit_exists
  tags: [snapshot]
- name: "Snapshot - Record current service state"
  ansible.builtin.shell: |
    set -o pipefail
    systemctl is-enabled {{ service_name }}.service 2>/dev/null || echo "disabled"
    systemctl is-active {{ service_name }}.service 2>/dev/null || echo "failed"
    if systemctl status {{ service_name }}.service 2>/dev/null | head -1 | grep -qi masked; then
      echo "masked"
    else
      echo "unmasked"
    fi
  args:
    executable: /bin/bash
  register: _snap_service_state
  changed_when: false
  when: _snap_unit_exists.stat.exists | default(false)
  tags: [snapshot]
- name: "Snapshot - Save service state to file"
  ansible.builtin.copy:
    content: "{{ _snap_service_state.stdout }}"
    dest: "{{ backup_dir }}/service_state.txt"
    mode: '0600'
  when: _snap_unit_exists.stat.exists | default(false)
  tags: [snapshot]
- name: "Snapshot - Save empty state if unit does not exist"
  ansible.builtin.copy:
    content: ""
    dest: "{{ backup_dir }}/service_state.txt"
    mode: '0600'
  when: not (_snap_unit_exists.stat.exists | default(false))
  tags: [snapshot]

- block:
  - name: "Check if {{ service_name }}.service unit file exists"
    ansible.builtin.shell: "systemctl list-unit-files | grep {{ service_name }}.service"
    args:
      executable: /bin/bash
    register: _pkg_check
    failed_when: false
    changed_when: false
    tags: [execute]

  - name: "Set playbook skip flag based on service unit file existence"
    ansible.builtin.set_fact:
      playbook_skipped: "{{ _pkg_check['rc'] | default(-1) != 0 }}"
    tags: [execute]

  - name: "Initialize result variables"
    ansible.builtin.set_fact:
      result_01: {}
      result_02: {}
      result_03: {}
    tags: [execute]

  - name: "Req 01 - Unmask {{ service_name }}.service"
    ansible.builtin.shell: systemctl unmask {{ service_name }}.service
    args:
      executable: /bin/bash
    register: result_01
    failed_when: false
    when: not playbook_skipped
    tags: [execute]

  - name: "Req 02 - Enable and start {{ service_name }}.service"
    ansible.builtin.shell: systemctl --now enable {{ service_name }}.service
    args:
      executable: /bin/bash
    register: result_02
    failed_when: false
    when: not playbook_skipped
    tags: [execute]

  - name: "Retry start if {{ service_name }} is not active after initial enable"
    when: not playbook_skipped
    block:
    - name: "Check if {{ service_name }} is active"
      ansible.builtin.command: systemctl is-active {{ service_name }}.service
      register: _retry_check
      failed_when: false
      changed_when: false
      tags: [execute]

    - name: "Start {{ service_name }} if not active"
      ansible.builtin.command: systemctl start {{ service_name }}.service
      when: _retry_check.rc != 0
      register: _start_retry
      failed_when: false
      tags: [execute]

    - name: "Capture journal errors if start fails"
      ansible.builtin.shell: journalctl -u {{ service_name }}.service --no-pager -n 50
      args:
        executable: /bin/bash
      when:
      - _start_retry is defined
      - _start_retry.rc != 0
      register: _journal_output
      failed_when: false
      tags: [execute]

  - name: "Check final active state of {{ service_name }} after enable/start"
    ansible.builtin.command: systemctl is-active {{ service_name }}.service
    register: _final_active_check
    failed_when: false
    changed_when: false
    when: not playbook_skipped
    tags: [execute]

  - name: "Req 03 - Verify {{ service_name }} is enabled and active"
    ansible.builtin.shell: systemctl is-enabled {{ service_name }}.service && systemctl is-active {{ service_name }}.service && [ "$(systemctl is-active {{ service_name }}.service)" = "active" ]
    args:
      executable: /bin/bash
    register: result_03
    failed_when: false
    when: not playbook_skipped
    tags: [execute]

  - name: "Capture journal diagnostics on verification failure"
    ansible.builtin.shell: journalctl -u {{ service_name }}.service --no-pager -n 100
    args:
      executable: /bin/bash
    register: _diag_journal
    changed_when: false
    failed_when: false
    when:
    - result_03.rc | default(-1) != 0
    - not playbook_skipped | default(false)
    tags: [execute]

  - name: "Store requirement 01 details"
    ansible.builtin.set_fact:
      task_01_name: "Unmask {{ service_name }}.service"
      task_01_cmd: "systemctl unmask {{ service_name }}.service"
      task_01_rc: "{{ result_01['rc'] | default(-1) }}"
      data_01: "{{ result_01['stdout'] | default('') | trim }}"
      status_01: >-
        {%- if playbook_skipped | default(false) | bool -%}
        SKIP
        {%- elif result_01['rc'] | default(-1) == 0 -%}
        PASS
        {%- else -%}
        FAIL
        {%- endif -%}
      details_01: >-
        {%- if playbook_skipped | default(false) | bool -%}
        Service unit file not found — skipped
        {%- elif result_01['rc'] | default(-1) == 0 -%}
        Service unmasked successfully
        {%- else -%}
        Failed to unmask service (RC: {{ result_01['rc'] }})
        {%- endif -%}
    tags: [execute]

  - name: "Store requirement 02 details"
    ansible.builtin.set_fact:
      task_02_name: "Enable and start {{ service_name }}.service"
      task_02_cmd: "systemctl --now enable {{ service_name }}.service"
      task_02_rc: "{{ result_02['rc'] | default(-1) }}"
      data_02: "{{ _final_active_check.stdout | default('') | trim }}"
      status_02: >-
        {%- if playbook_skipped | default(false) | bool -%}
        SKIP
        {%- elif _final_active_check.stdout | default('') | trim == 'active' -%}
        PASS
        {%- else -%}
        FAIL
        {%- endif -%}
      details_02: >-
        {%- if playbook_skipped | default(false) | bool -%}
        Service unit file not found — skipped
        {%- elif _final_active_check.stdout | default('') | trim == 'active' -%}
        Service enabled and active after enable/start
        {%- else -%}
        Failed to achieve active state (current: {{ _final_active_check.stdout | default('unknown') | trim }})
        {%- endif -%}
    tags: [execute]

  - name: "Store requirement 03 details"
    ansible.builtin.set_fact:
      task_03_name: "Verify {{ service_name }} is enabled and active"
      task_03_cmd: |
        systemctl is-enabled {{ service_name }}.service && systemctl is-active {{ service_name }}.service && [ \"$(systemctl is-active {{ service_name }}.service)\" = \"active\" ]
      task_03_rc: "{{ result_03['rc'] | default(-1) }}"
      data_03: "{{ result_03['stdout'] | default('') | trim }}"
      status_03: >-
        {%- if playbook_skipped | default(false) | bool -%}
        SKIP
        {%- elif result_03['rc'] | default(-1) == 0 -%}
        PASS
        {%- else -%}
        FAIL
        {%- endif -%}
      details_03: >-
        {%- if playbook_skipped | default(false) | bool -%}
        Service unit file not found — skipped
        {%- elif result_03['rc'] | default(-1) == 0 -%}
        Verification passed: service is enabled and active
        {%- else -%}
        Verification failed: service not enabled or not active (RC: {{ result_03['rc'] }}){% if _diag_journal.stdout | default('') | trim | length > 0 %} Journal: {{ _diag_journal.stdout | trim }}{% endif %}
        {%- endif -%}
    tags: [execute]

  - name: "Req 04 - Store final remediation result"
    ansible.builtin.set_fact:
      cis_result: "{{ status_03 | default('ERROR') | trim }}"
    tags: [execute]

  - name: "Store requirement 04 details"
    ansible.builtin.set_fact:
      task_04_name: "Store final remediation result"
      task_04_cmd: "set_fact"
      task_04_rc: 0
      data_04: "N/A"
      status_04: "PASS"
      details_04: "cis_result stored successfully"
    tags: [execute]

  - name: "Generate remediation report"
    ansible.builtin.debug:
      msg:
      - "REMEDIATION REPORT — CIS 6.2.2.1.3"
      - "Reference: CIS Benchmark checkpoint 6.2.2.1.3"
      - ""
      - "REQUIREMENT 01 - {{ req_01 }}:"
      - "  Task: {{ task_01_name | default('Not recorded') }}"
      - "  Command: {{ task_01_cmd | default('N/A') }}"
      - "  Exit code: {{ task_01_rc | default(-1) }}"
      - "  Data: {{ data_01 | default('') | trim }}"
      - "  Status: {{ status_01 | default('ERROR') | trim }}"
      - "  Details: {{ details_01 | default('') | trim }}"
      - ""
      - "REQUIREMENT 02 - {{ req_02 }}:"
      - "  Task: {{ task_02_name | default('Not recorded') }}"
      - "  Command: {{ task_02_cmd | default('N/A') }}"
      - "  Exit code: {{ task_02_rc | default(-1) }}"
      - "  Data: {{ data_02 | default('') | trim }}"
      - "  Status: {{ status_02 | default('ERROR') | trim }}"
      - "  Details: {{ details_02 | default('') | trim }}"
      - ""
      - "REQUIREMENT 03 - {{ req_03 }}:"
      - "  Task: {{ task_03_name | default('Not recorded') }}"
      - "  Command: {{ task_03_cmd | default('N/A') }}"
      - "  Exit code: {{ task_03_rc | default(-1) }}"
      - "  Data: {{ data_03 | default('') | trim }}"
      - "  Status: {{ status_03 | default('ERROR') | trim }}"
      - "  Details: {{ details_03 | default('') | trim }}"
      - ""
      - "REQUIREMENT 04 - {{ req_04 }}:"
      - "  Task: {{ task_04_name | default('Not recorded') }}"
      - "  Command: {{ task_04_cmd | default('N/A') }}"
      - "  Exit code: {{ task_04_rc | default(-1) }}"
      - "  Data: {{ data_04 | default('') | trim }}"
      - "  Status: {{ status_04 | default('ERROR') | trim }}"
      - "  Details: {{ details_04 | default('') | trim }}"
      - ""
      - "========================================================"
      - "OVERALL REMEDIATION:"
      - "  Result: {{ cis_result | default('ERROR') | trim }}"
      - "  Details: Overall remediation status"
      - "========================================================"
    tags: [execute]

  always:
  - name: "Restore - Check if backup directory exists"
    ansible.builtin.stat:
      path: "{{ backup_dir }}"
    register: _restore_check
    failed_when: false
    tags: [restore]

  - name: "Restore - Read saved service state"
    ansible.builtin.slurp:
      src: "{{ backup_dir }}/service_state.txt"
    register: _restore_saved_state
    failed_when: false
    when: _restore_check.stat.exists | default(false)
    tags: [restore]

  - name: "Restore - Restore original service state"
    ansible.builtin.shell: |
      saved_contents="{{ _restore_saved_state['content'] | b64decode | trim }}"
      orig_enabled=$(echo "$saved_contents" | sed -n '1p')
      orig_active=$(echo "$saved_contents" | sed -n '2p')
      orig_masked=$(echo "$saved_contents" | sed -n '3p')
      # Restore mask state
      if [ "$orig_masked" = "masked" ]; then
        systemctl mask {{ service_name }}.service 2>/dev/null || true
      elif [ "$orig_masked" = "masked-runtime" ]; then
        systemctl mask --runtime {{ service_name }}.service 2>/dev/null || true
      else
        systemctl unmask {{ service_name }}.service 2>/dev/null || true
      fi
      # Restore enabled state
      if [ "$orig_enabled" = "enabled" ]; then
        systemctl enable {{ service_name }}.service 2>/dev/null || true
      elif [ "$orig_enabled" = "disabled" ]; then
        systemctl disable {{ service_name }}.service 2>/dev/null || true
      fi
      # Restore active state
      if [ "$orig_active" = "active" ]; then
        systemctl start {{ service_name }}.service 2>/dev/null || true
      elif [ "$orig_active" = "inactive" ] || [ "$orig_active" = "failed" ]; then
        systemctl stop {{ service_name }}.service 2>/dev/null || true
      fi
    args:
      executable: /bin/bash
    when:
    - "_restore_saved_state is not failed"
    - "_restore_saved_state['content'] is defined"
    - "(_restore_saved_state['content'] | b64decode | trim | length > 0)"
    failed_when: false
    tags: [restore]

  - name: "Restore - Remove backup directory"
    ansible.builtin.file:
      path: "{{ backup_dir }}"
      state: absent
    when: _restore_check.stat.exists | default(false)
    failed_when: false
    tags: [restore]
