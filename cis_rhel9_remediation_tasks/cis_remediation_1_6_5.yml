---
- name: Initialize meta data variables
  include_vars: cis_remediation_var_1_6_5.yml

- name: "Snapshot - Create backup directory"
  ansible.builtin.file:
    path: "{{ backup_dir }}"
    state: directory
    mode: '0700'
  tags: [snapshot]
- name: "Snapshot - Check if crypto-policies config exists"
  ansible.builtin.stat:
    path: "/etc/crypto-policies/config"
  register: _snap_config_stat
  tags: [snapshot]
- name: "Snapshot - Backup crypto-policies config"
  ansible.builtin.copy:
    src: "/etc/crypto-policies/config"
    dest: "{{ backup_dir }}/crypto-policies.config.present"
    remote_src: true
  when: _snap_config_stat.stat.exists
  tags: [snapshot]
- name: "Snapshot - Mark crypto-policies config as absent"
  ansible.builtin.copy:
    content: "absent"
    dest: "{{ backup_dir }}/crypto-policies.config.absent"
  when: not _snap_config_stat.stat.exists
  tags: [snapshot]
- name: "Snapshot - Record file list in crypto-policies modules"
  ansible.builtin.shell: find /etc/crypto-policies/policies/modules/ -maxdepth 1 -type f 2>/dev/null || true
  args:
    executable: /bin/bash
  register: _snap_crypto_d_files
  changed_when: false
  tags: [snapshot]
- name: "Snapshot - Save crypto-policies modules file list"
  ansible.builtin.copy:
    content: "{{ _snap_crypto_d_files.stdout | default('') }}"
    dest: "{{ backup_dir }}/crypto_modules_d.filelist"
  tags: [snapshot]
- name: "Snapshot - Check if NO-SSHCBC.pmod exists"
  ansible.builtin.stat:
    path: "/etc/crypto-policies/policies/modules/NO-SSHCBC.pmod"
  register: _snap_nosshcbc_stat
  tags: [snapshot]
- name: "Snapshot - Mark NO-SSHCBC.pmod as absent"
  ansible.builtin.copy:
    content: "absent"
    dest: "{{ backup_dir }}/NO-SSHCBC.pmod.absent"
  when: not _snap_nosshcbc_stat.stat.exists
  tags: [snapshot]
- name: "Snapshot - Save current crypto policy"
  ansible.builtin.shell: update-crypto-policies --show
  args:
    executable: /bin/bash
  register: _snap_current_policy
  changed_when: false
  tags: [snapshot]
- name: "Snapshot - Persist current crypto policy to file"
  ansible.builtin.copy:
    content: "{{ _snap_current_policy.stdout | default('') | trim }}"
    dest: "{{ backup_dir }}/current_policy.state"
  tags: [snapshot]

- block:
  - name: "Initialize data variables"
    ansible.builtin.set_fact:
      data_01: "Not collected yet"
      status_01: "ERROR"
      details_01: "Not evaluated"
      data_02: "Not collected yet"
      status_02: "ERROR"
      details_02: "Not evaluated"
      data_03: "Not collected yet"
      status_03: "ERROR"
      details_03: "Not evaluated"
      data_04: "Not collected yet"
      status_04: "ERROR"
      details_04: "Not evaluated"
      data_05: "Not collected yet"
      status_05: "ERROR"
      details_05: "Not evaluated"
      data_06: "Not collected yet"
      status_06: "ERROR"
      details_06: "Not evaluated"
      task_01_name: "Not executed"
      task_01_cmd: "N/A"
      task_01_rc: -1
    tags: [execute]

  - name: "Req 01 - Check if crypto-policies package is installed"
    ansible.builtin.shell: rpm -q crypto-policies
    args:
      executable: /bin/bash
    register: result_01
    failed_when: false
    changed_when: false
    tags: [execute]

  - name: "Store requirement 01 details"
    ansible.builtin.set_fact:
      task_01_name: "Check if crypto-policies package is installed"
      task_01_cmd: "rpm -q crypto-policies"
      task_01_rc: "{{ result_01.rc | default(-1) }}"
      data_01: "{{ result_01.stdout | default('') | trim }}"
      status_01: "{{ 'PASS' if result_01.rc | default(-1) == 0 else 'FAIL' }}"
      details_01: "{{ 'crypto-policies is installed' if result_01.rc | default(-1) == 0 else 'crypto-policies is NOT installed' }}"
    tags: [execute]

  - name: "Req 02 - Create subpolicy file to disable CBC ciphers for SSH"
    ansible.builtin.copy:
      dest: "/etc/crypto-policies/policies/modules/NO-SSHCBC.pmod"
      content: |
        # This is a subpolicy to disable all CBC mode ciphers
        # for the SSH protocol (libssh and OpenSSH)
        cipher@SSH = -*-CBC
      owner: root
      group: root
      mode: '0644'
    register: result_02
    failed_when: false
    when:
    - "result_01.rc | default(-1) == 0"
    tags: [execute]

  - name: "Store requirement 02 details"
    ansible.builtin.set_fact:
      task_02_name: "Create subpolicy file to disable CBC ciphers for SSH"
      task_02_cmd: "copy NO-SSHCBC.pmod to /etc/crypto-policies/policies/modules/"
      task_02_rc: "{{ 0 if result_02 is not skipped and not result_02.failed | default(false) else (result_02.rc | default(-1)) }}"
      data_02: "{{ '/etc/crypto-policies/policies/modules/NO-SSHCBC.pmod created' if result_02 is not skipped and not result_02.failed | default(false) else (result_02.msg | default('SKIP')) }}"
      status_02: "{{ 'PASS' if result_02 is not skipped and not result_02.failed | default(false) else ('SKIP' if result_02 is skipped else 'FAIL') }}"
      details_02: "{{ 'Subpolicy file created successfully' if result_02 is not skipped and not result_02.failed | default(false) else ('Skipped: crypto-policies not installed' if result_02 is skipped else 'Failed to create subpolicy file') }}"
    tags: [execute]

  - name: "Req 03 - Apply system-wide cryptographic policy with NO-SSHCBC subpolicy"
    ansible.builtin.shell: update-crypto-policies --set DEFAULT:NO-SHA1:NO-WEAKMAC:NO-SSHCBC
    args:
      executable: /bin/bash
    register: result_03
    failed_when: false
    when:
    - "result_01.rc | default(-1) == 0"
    tags: [execute]

  - name: "Store requirement 03 details"
    ansible.builtin.set_fact:
      task_03_name: "Apply system-wide cryptographic policy with NO-SSHCBC subpolicy"
      task_03_cmd: "update-crypto-policies --set DEFAULT:NO-SHA1:NO-WEAKMAC:NO-SSHCBC"
      task_03_rc: "{{ result_03.rc | default(-1) }}"
      data_03: "{{ result_03.stdout | default('') | trim }}"
      status_03: "{{ 'PASS' if result_03.rc | default(-1) == 0 else ('SKIP' if result_03 is skipped else 'FAIL') }}"
      details_03: "{{ 'Policy applied successfully' if result_03.rc | default(-1) == 0 else ('Skipped: crypto-policies not installed' if result_03 is skipped else 'Failed to apply policy') }}"
    tags: [execute]

  - name: "Req 04 - Reboot the system to make cryptographic settings effective"
    ansible.builtin.reboot:
      reboot_timeout: 180
    register: result_04
    failed_when: false
    when:
    - "result_01.rc | default(-1) == 0"
    - "result_03 is defined"
    - "not result_03.skipped | default(false)"
    tags: [execute]

  - name: "Store requirement 04 details"
    ansible.builtin.set_fact:
      task_04_name: "Reboot the system to make cryptographic settings effective"
      task_04_cmd: "reboot"
      task_04_rc: "{{ 0 if result_04.rebooted | default(false) else (result_04.rc | default(-1)) }}"
      data_04: "{{ 'System rebooted' if result_04.rebooted | default(false) else ('Reboot skipped' if result_04 is skipped else 'Reboot failed') }}"
      status_04: "{{ 'PASS' if result_04.rebooted | default(false) else ('SKIP' if result_04 is skipped else 'FAIL') }}"
      details_04: "{{ 'System rebooted successfully' if result_04.rebooted | default(false) else ('Skipped: prerequisites not met' if result_04 is skipped else 'Reboot failed') }}"
    tags: [execute]

  - name: "Deploy audit script for verification"
    ansible.builtin.copy:
      dest: "{{ audit_script }}"
      mode: '0700'
      content: "{{ audit_script_content }}"
    when:
    - "result_01.rc | default(-1) == 0"
    - "result_04 is defined"
    - "result_04.rebooted | default(false)"
    tags: [execute]

  - name: "Req 05 - Verify that CBC ciphers are disabled for SSH"
    ansible.builtin.shell: "/bin/bash {{ audit_script }}"
    args:
      executable: /bin/bash
    register: audit_verify
    failed_when: false
    changed_when: false
    when:
    - "result_01.rc | default(-1) == 0"
    - "result_04 is defined"
    - "result_04.rebooted | default(false)"
    tags: [execute]

  - name: "Store requirement 05 details"
    ansible.builtin.set_fact:
      task_05_name: "Verify that CBC ciphers are disabled for SSH"
      task_05_cmd: "/bin/bash {{ audit_script }}"
      task_05_rc: "{{ audit_verify.rc | default(-1) }}"
      data_05: "{{ audit_verify.stdout | default('') | trim }}"
      status_05: "{{ 'PASS' if ('** PASS **' in audit_verify.stdout | default('')) else ('SKIP' if audit_verify is skipped else 'FAIL') }}"
      details_05: "{{ 'CBC ciphers are disabled for SSH' if ('** PASS **' in audit_verify.stdout | default('')) else ('Skipped: prerequisites not met' if audit_verify is skipped else 'CBC ciphers may still be enabled for SSH') }}"
    tags: [execute]

  - name: "Req 06 - Store final remediation result"
    ansible.builtin.set_fact:
      cis_result: "{{ status_05 | default('ERROR') | trim }}"
      task_06_name: "Store final remediation result"
      task_06_cmd: "set_fact: cis_result={{ status_05 | default('ERROR') | trim }}"
      task_06_rc: 0
    tags: [execute]

  - name: "Req 06 - Set report variables"
    ansible.builtin.set_fact:
      data_06: "{{ cis_result | default('ERROR') | trim }}"
      status_06: "{{ 'PASS' if cis_result is defined and cis_result in ['PASS','FAIL','SKIP','ERROR'] else 'ERROR' }}"
      details_06: "cis_result variable set to {{ cis_result | default('ERROR') | trim }}"
    tags: [execute]

  - name: "Generate remediation report"
    ansible.builtin.debug:
      msg:
      - "REMEDIATION REPORT — CIS 1.6.5"
      - "Reference: CIS Benchmark checkpoint 1.6.5"
      - ""
      - "REQUIREMENT 01 - {{ req_01 }}:"
      - "  Task: {{ task_01_name | default('Not recorded') }}"
      - "  Command: {{ task_01_cmd | default('N/A') }}"
      - "  Exit code: {{ task_01_rc | default(-1) }}"
      - "  Data: {{ data_01 | default('') | trim }}"
      - "  Status: {{ status_01 | default('ERROR') | trim }}"
      - "  Details: {{ details_01 | default('') | trim }}"
      - ""
      - "REQUIREMENT 02 - {{ req_02 }}:"
      - "  Task: {{ task_02_name | default('Not recorded') }}"
      - "  Command: {{ task_02_cmd | default('N/A') }}"
      - "  Exit code: {{ task_02_rc | default(-1) }}"
      - "  Data: {{ data_02 | default('') | trim }}"
      - "  Status: {{ status_02 | default('ERROR') | trim }}"
      - "  Details: {{ details_02 | default('') | trim }}"
      - ""
      - "REQUIREMENT 03 - {{ req_03 }}:"
      - "  Task: {{ task_03_name | default('Not recorded') }}"
      - "  Command: {{ task_03_cmd | default('N/A') }}"
      - "  Exit code: {{ task_03_rc | default(-1) }}"
      - "  Data: {{ data_03 | default('') | trim }}"
      - "  Status: {{ status_03 | default('ERROR') | trim }}"
      - "  Details: {{ details_03 | default('') | trim }}"
      - ""
      - "REQUIREMENT 04 - {{ req_04 }}:"
      - "  Task: {{ task_04_name | default('Not recorded') }}"
      - "  Command: {{ task_04_cmd | default('N/A') }}"
      - "  Exit code: {{ task_04_rc | default(-1) }}"
      - "  Data: {{ data_04 | default('') | trim }}"
      - "  Status: {{ status_04 | default('ERROR') | trim }}"
      - "  Details: {{ details_04 | default('') | trim }}"
      - ""
      - "REQUIREMENT 05 - {{ req_05 }}:"
      - "  Task: {{ task_05_name | default('Not recorded') }}"
      - "  Command: {{ task_05_cmd | default('N/A') }}"
      - "  Exit code: {{ task_05_rc | default(-1) }}"
      - "  Data: {{ data_05 | default('') | trim }}"
      - "  Status: {{ status_05 | default('ERROR') | trim }}"
      - "  Details: {{ details_05 | default('') | trim }}"
      - ""
      - "REQUIREMENT 06 - {{ req_06 }}:"
      - "  Task: {{ task_06_name | default('Not recorded') }}"
      - "  Command: {{ task_06_cmd | default('N/A') }}"
      - "  Exit code: {{ task_06_rc | default(-1) }}"
      - "  Data: {{ data_06 | default('') | trim }}"
      - "  Status: {{ status_06 | default('ERROR') | trim }}"
      - "  Details: {{ details_06 | default('') | trim }}"
      - ""
      - "========================================================"
      - "OVERALL REMEDIATION:"
      - "  Result: {{ cis_result | default('ERROR') | trim }}"
      - "  Details: {{ details_06 | default('Not evaluated') | trim }}"
      - "========================================================"
    tags: [execute]

  always:
  - name: "Restore - Check if checkpoint exists"
    ansible.builtin.stat:
      path: "{{ backup_dir }}/crypto-policies.config.present"
    register: _restore_present
    failed_when: false
    tags: [restore]

  - name: "Restore - Restore crypto-policies config from backup"
    ansible.builtin.copy:
      src: "{{ backup_dir }}/crypto-policies.config.present"
      dest: "/etc/crypto-policies/config"
      remote_src: true
    when: _restore_present.stat.exists | default(false)
    failed_when: false
    tags: [restore]

  - name: "Restore - Check if config absent marker exists"
    ansible.builtin.stat:
      path: "{{ backup_dir }}/crypto-policies.config.absent"
    register: _restore_absent
    failed_when: false
    tags: [restore]

  - name: "Restore - Delete crypto-policies config if it was absent before"
    ansible.builtin.file:
      path: "/etc/crypto-policies/config"
      state: absent
    when: _restore_absent.stat.exists | default(false)
    failed_when: false
    tags: [restore]

  - name: "Restore - Read original crypto-policies modules file list"
    ansible.builtin.slurp:
      src: "{{ backup_dir }}/crypto_modules_d.filelist"
    register: _restore_crypto_d_filelist
    failed_when: false
    tags: [restore]

  - name: "Restore - Find current files in crypto-policies modules"
    ansible.builtin.shell: find /etc/crypto-policies/policies/modules/ -maxdepth 1 -type f 2>/dev/null || true
    args:
      executable: /bin/bash
    register: _restore_crypto_d_current
    changed_when: false
    failed_when: false
    when: _restore_crypto_d_filelist.content is defined
    tags: [restore]

  - name: "Restore - Delete files added during execution"
    ansible.builtin.file:
      path: "{{ item }}"
      state: absent
    loop: >-
      {{
        (_restore_crypto_d_current.stdout_lines | default([]))
        | difference((_restore_crypto_d_filelist.content | default('') | b64decode).splitlines())
      }}
    when:
    - _restore_crypto_d_filelist.content is defined
    - _restore_crypto_d_current.stdout_lines is defined
    failed_when: false
    tags: [restore]

  - name: "Restore - Check if NO-SSHCBC.pmod absent marker exists"
    ansible.builtin.stat:
      path: "{{ backup_dir }}/NO-SSHCBC.pmod.absent"
    register: _restore_nosshcbc_absent
    failed_when: false
    tags: [restore]

  - name: "Restore - Delete NO-SSHCBC.pmod if it was absent before"
    ansible.builtin.file:
      path: "/etc/crypto-policies/policies/modules/NO-SSHCBC.pmod"
      state: absent
    when: _restore_nosshcbc_absent.stat.exists | default(false)
    failed_when: false
    tags: [restore]

  - name: "Restore - Read saved crypto policy"
    ansible.builtin.slurp:
      src: "{{ backup_dir }}/current_policy.state"
    register: _restore_policy_content
    failed_when: false
    tags: [restore]

  - name: "Restore - Apply original crypto policy"
    ansible.builtin.shell: "update-crypto-policies --set {{ _restore_policy_content.content | b64decode | trim }}"
    args:
      executable: /bin/bash
    register: _restore_policy_result
    when:
    - _restore_policy_content.content is defined
    - _restore_policy_content.content | b64decode | trim | length > 0
    failed_when: false
    tags: [restore]

  - name: "Restore - Remove audit script"
    ansible.builtin.file:
      path: "{{ audit_script }}"
      state: absent
    failed_when: false
    tags: [restore]

  - name: "Restore - Remove backup directory"
    ansible.builtin.file:
      path: "{{ backup_dir }}"
      state: absent
    failed_when: false
    tags: [restore]
