---
- name: Initialize meta data variables
  include_vars: cis_remediation_var_1_1_2_2_3.yml

- name: "Snapshot - Create backup directory"
  ansible.builtin.file:
    path: "{{ backup_dir }}"
    state: directory
    mode: '0700'
  tags: [snapshot]
- name: "Snapshot - Check if /etc/fstab exists"
  ansible.builtin.stat:
    path: "/etc/fstab"
  register: _snap_fstab_stat
  tags: [snapshot]
- name: "Snapshot - Backup /etc/fstab if exists"
  ansible.builtin.copy:
    src: "/etc/fstab"
    dest: "{{ backup_dir }}/fstab.present"
    remote_src: true
  when: _snap_fstab_stat.stat.exists
  tags: [snapshot]
- name: "Snapshot - Save current mount options for /dev/shm"
  ansible.builtin.shell: "findmnt -n -o OPTIONS {{ mount_point }} 2>/dev/null || echo NOTMOUNTED"
  args:
    executable: /bin/bash
  register: _snap_mount_opts
  changed_when: false
  failed_when: false
  tags: [snapshot]
- name: "Snapshot - Persist mount options to file"
  ansible.builtin.copy:
    content: "{{ _snap_mount_opts.stdout | default('NOTMOUNTED') | trim }}"
    dest: "{{ backup_dir }}/mount_options.state"
  tags: [snapshot]

- block:
  - name: "Initialize data variables"
    ansible.builtin.set_fact:
      data_01: "Not collected yet"
      status_01: "ERROR"
      details_01: "Not evaluated"
      data_02: "Not collected yet"
      status_02: "ERROR"
      details_02: "Not evaluated"
      data_03: "Not collected yet"
      status_03: "ERROR"
      details_03: "Not evaluated"
      data_04: "Not collected yet"
      status_04: "ERROR"
      details_04: "Not evaluated"
      data_05: "Not collected yet"
      status_05: "ERROR"
      details_05: "Not evaluated"
      task_01_name: "Not executed"
      task_01_cmd: "N/A"
      task_01_rc: -1
      task_02_name: "Not executed"
      task_02_cmd: "N/A"
      task_02_rc: -1
      task_03_name: "Not executed"
      task_03_cmd: "N/A"
      task_03_rc: -1
      task_04_name: "Not executed"
      task_04_cmd: "N/A"
      task_04_rc: -1
      task_05_name: "Not executed"
      task_05_cmd: "N/A"
      task_05_rc: -1

  - name: "Req 01 - Check if a separate partition exists for /dev/shm"
    ansible.builtin.shell: "mount | grep -E '\\s/dev/shm\\s'"
    args:
      executable: /bin/bash
    register: result_01
    failed_when: false
    changed_when: false

  - name: "Store requirement 01 details"
    ansible.builtin.set_fact:
      task_01_name: "Check partition existence"
      task_01_cmd: |
        mount | grep -E '\\s/dev/shm\\s'
      task_01_rc: "{{ result_01.rc | default(-1) }}"
      data_01: "{{ result_01.stdout | default('') | trim }}"
      status_01: "{{ 'PASS' if result_01.rc | default(-1) == 0 and (result_01.stdout | default('') | trim | length > 0) else 'FAIL' }}"
      details_01: "{{ 'Partition /dev/shm exists' if result_01.rc | default(-1) == 0 and (result_01.stdout | default('') | trim | length > 0) else 'Partition /dev/shm not found or error' }}"

  - name: "Req 02 - Add nosuid to /dev/shm entry in /etc/fstab"
    ansible.builtin.lineinfile:
      path: "/etc/fstab"
      regexp: |
        ^(\S+\s+/dev/shm\s+\S+\s+)(?!\S*\bnosuid\b)(\S+)(\s+\S+\s+\S+\s*)$
      line: |
        \1\2,nosuid\3
      backrefs: true
    register: result_02
    failed_when: false

  - name: "Store requirement 02 details"
    ansible.builtin.set_fact:
      task_02_name: "Edit /etc/fstab to add nosuid"
      task_02_cmd: "lineinfile: regexp add nosuid to /dev/shm options"
      task_02_rc: "{{ 0 if not result_02.failed else -1 }}"
      data_02: "{{ 'nosuid added' if result_02.changed else 'nosuid already present' }}"
      status_02: "{{ 'PASS' if not result_02.failed else 'FAIL' }}"
      details_02: "{{ 'nosuid option added to /etc/fstab' if result_02.changed else 'nosuid option already present in /etc/fstab' }}"

  - name: "Req 03 - Remount /dev/shm with updated options"
    ansible.builtin.shell: "mount -o remount {{ mount_point }}"
    args:
      executable: /bin/bash
    register: result_03
    failed_when: false

  - name: "Store requirement 03 details"
    ansible.builtin.set_fact:
      task_03_name: "Remount /dev/shm"
      task_03_cmd: "mount -o remount /dev/shm"
      task_03_rc: "{{ result_03.rc | default(-1) }}"
      data_03: "{{ result_03.stdout | default('') | trim }}"
      status_03: "{{ 'PASS' if result_03.rc | default(-1) == 0 else 'FAIL' }}"
      details_03: "{{ '/dev/shm remounted successfully' if result_03.rc | default(-1) == 0 else 'Failed to remount /dev/shm' }}"

  - name: "Req 04 - Verify nosuid option is set on /dev/shm"
    ansible.builtin.shell: "mount | grep -E '\\s/dev/shm\\s' | grep -o 'nosuid'"
    args:
      executable: /bin/bash
    register: result_04
    failed_when: false
    changed_when: false

  - name: "Store requirement 04 details"
    ansible.builtin.set_fact:
      task_04_name: "Verify nosuid option"
      task_04_cmd: |
        mount | grep -E '\\s/dev/shm\\s' | grep -o 'nosuid'
      task_04_rc: "{{ result_04.rc | default(-1) }}"
      data_04: "{{ result_04.stdout | default('') | trim }}"
      status_04: "{{ 'PASS' if result_04.stdout | default('') | trim == 'nosuid' else 'FAIL' }}"
      details_04: "{{ 'nosuid option is set' if result_04.stdout | default('') | trim == 'nosuid' else 'nosuid option not set' }}"

  - name: "Req 05 - Store final remediation result"
    ansible.builtin.set_fact:
      task_05_name: "Store cis_result"
      task_05_cmd: "N/A"
      task_05_rc: "N/A"
      data_05: ""
      status_05: "{{ status_04 | default('ERROR') | trim }}"
      details_05: "cis_result set to {{ status_04 | default('ERROR') | trim }}"
      cis_result: "{{ status_04 | default('ERROR') | trim }}"

  - name: "Generate remediation report"
    ansible.builtin.debug:
      msg:
      - "========================================================"
      - "        REMEDIATION REPORT — CIS 1.1.2.2.3"
      - "        Reference: CIS Benchmark checkpoint 1.1.2.2.3"
      - "========================================================"
      - ""
      - "REQUIREMENT 01 - {{ req_01 }}:"
      - "  Task: {{ task_01_name | default('Not recorded') }}"
      - "  Command: {{ task_01_cmd | default('N/A') }}"
      - "  Exit code: {{ task_01_rc | default(-1) }}"
      - "  Data: {{ data_01 | default('') | trim }}"
      - "  Status: {{ status_01 | default('ERROR') | trim }}"
      - "  Details: {{ details_01 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 02 - {{ req_02 }}:"
      - "  Task: {{ task_02_name | default('Not recorded') }}"
      - "  Command: {{ task_02_cmd | default('N/A') }}"
      - "  Exit code: {{ task_02_rc | default(-1) }}"
      - "  Data: {{ data_02 | default('') | trim }}"
      - "  Status: {{ status_02 | default('ERROR') | trim }}"
      - "  Details: {{ details_02 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 03 - {{ req_03 }}:"
      - "  Task: {{ task_03_name | default('Not recorded') }}"
      - "  Command: {{ task_03_cmd | default('N/A') }}"
      - "  Exit code: {{ task_03_rc | default(-1) }}"
      - "  Data: {{ data_03 | default('') | trim }}"
      - "  Status: {{ status_03 | default('ERROR') | trim }}"
      - "  Details: {{ details_03 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 04 - {{ req_04 }}:"
      - "  Task: {{ task_04_name | default('Not recorded') }}"
      - "  Command: {{ task_04_cmd | default('N/A') }}"
      - "  Exit code: {{ task_04_rc | default(-1) }}"
      - "  Data: {{ data_04 | default('') | trim }}"
      - "  Status: {{ status_04 | default('ERROR') | trim }}"
      - "  Details: {{ details_04 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 05 - {{ req_05 }}:"
      - "  Task: {{ task_05_name | default('Not recorded') }}"
      - "  Command: {{ task_05_cmd | default('N/A') }}"
      - "  Exit code: {{ task_05_rc | default(-1) }}"
      - "  Data: {{ data_05 | default('') | trim }}"
      - "  Status: {{ status_05 | default('ERROR') | trim }}"
      - "  Details: {{ details_05 | default('Not evaluated') | trim }}"
      - ""
      - "========================================================"
      - "OVERALL REMEDIATION:"
      - "  Result: {{ cis_result | default('ERROR') | trim }}"
      - "  Details: {{ details_05 | default('Not evaluated') | trim }}"
      - "========================================================"

  always:
  - name: "Restore - Check if fstab backup exists"
    ansible.builtin.stat:
      path: "{{ backup_dir }}/fstab.present"
    register: _restore_fstab
    failed_when: false
    tags: [restore]

  - name: "Restore - Overwrite /etc/fstab with original"
    ansible.builtin.copy:
      src: "{{ backup_dir }}/fstab.present"
      dest: "/etc/fstab"
      remote_src: true
    when: _restore_fstab.stat.exists | default(false)
    register: _restore_fstab_result
    failed_when: false
    tags: [restore]

  - name: "Restore - Read saved mount options"
    ansible.builtin.slurp:
      src: "{{ backup_dir }}/mount_options.state"
    register: _restore_mount_data
    failed_when: false
    tags: [restore]

  - name: "Restore - Remount /dev/shm with original options"
    ansible.builtin.shell: "mount -o remount,{{ _restore_mount_data.content | b64decode | trim }} {{ mount_point }}"
    args:
      executable: /bin/bash
    when:
    - _restore_mount_data is not failed
    - _restore_mount_data.content is defined
    - (_restore_mount_data.content | b64decode | trim) != 'NOTMOUNTED'
    failed_when: false
    tags: [restore]

  - name: "Restore - Remove backup directory"
    ansible.builtin.file:
      path: "{{ backup_dir }}"
      state: absent
    failed_when: false
    tags: [restore]
