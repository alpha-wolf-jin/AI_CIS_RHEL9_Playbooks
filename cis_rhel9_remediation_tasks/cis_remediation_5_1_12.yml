---
- name: Initialize meta data variables
  include_vars: cis_remediation_var_5_1_12.yml

- name: "State Guard - Check for existing checkpoint"
  ansible.builtin.stat:
    path: "{{ state_guard_flag }}"
  register: _sg_flag
  tags: [snapshot]
- name: "State Guard - Restore sshd_config from prior checkpoint"
  ansible.builtin.copy:
    src: "{{ state_guard_dir }}/sshd_config.present"
    dest: "{{ config_file }}"
    remote_src: true
  when: _sg_flag.stat.exists
  failed_when: false
  tags: [snapshot]
- name: "State Guard - Remove old checkpoint"
  ansible.builtin.file:
    path: "{{ state_guard_dir }}"
    state: absent
  when: _sg_flag.stat.exists
  tags: [snapshot]
- name: "State Guard - Create checkpoint directory"
  ansible.builtin.file:
    path: "{{ state_guard_dir }}"
    state: directory
    mode: '0700'
  tags: [snapshot]
- name: "State Guard - Check if sshd_config exists"
  ansible.builtin.stat:
    path: "{{ config_file }}"
  register: _sg_config_stat
  tags: [snapshot]
- name: "State Guard - Backup sshd_config"
  ansible.builtin.copy:
    src: "{{ config_file }}"
    dest: "{{ state_guard_dir }}/sshd_config.present"
    remote_src: true
  when: _sg_config_stat.stat.exists
  tags: [snapshot]
- name: "State Guard - Create checkpoint flag"
  ansible.builtin.copy:
    content: "checkpoint"
    dest: "{{ state_guard_flag }}"
  tags: [snapshot]

- block:
# === EXECUTE PHASE ===
  - name: "Initialize data variables"
    ansible.builtin.set_fact:
      task_01_name: "Not executed"
      task_01_cmd: "N/A"
      task_01_rc: -1
      data_01: "Not collected yet"
      status_01: "ERROR"
      details_01: "Not evaluated"
      task_02_name: "Not executed"
      task_02_cmd: "N/A"
      task_02_rc: -1
      data_02: "Not collected yet"
      status_02: "ERROR"
      details_02: "Not evaluated"
      task_03_name: "Not executed"
      task_03_cmd: "N/A"
      task_03_rc: -1
      data_03: "Not collected yet"
      status_03: "ERROR"
      details_03: "Not evaluated"
      task_04_name: "Not executed"
      task_04_cmd: "N/A"
      task_04_rc: -1
      data_04: "Not collected yet"
      status_04: "ERROR"
      details_04: "Not evaluated"
      task_05_name: "Not executed"
      task_05_cmd: "N/A"
      task_05_rc: -1
      data_05: "Not collected yet"
      status_05: "ERROR"
      details_05: "Not evaluated"
      task_06_name: "Not executed"
      task_06_cmd: "N/A"
      task_06_rc: -1
      data_06: "Not collected yet"
      status_06: "ERROR"
      details_06: "Not evaluated"
    tags: [execute]

  - name: "Req 01 - Check if sshd package is installed"
    ansible.builtin.package_facts:
      manager: auto
    failed_when: false
    tags: [execute]

  - name: "Req 01 - Set sshd installed fact"
    ansible.builtin.set_fact:
      sshd_installed: "{{ 'openssh-server' in ansible_facts.packages }}"
    tags: [execute]

  - name: "Req 01 - Check sshd binary and config syntax"
    ansible.builtin.shell: |
      which sshd && sshd -t
    args:
      executable: /bin/bash
    register: result_01
    failed_when: false
    changed_when: false
    when: sshd_installed | default(false)
    tags: [execute]

  - name: "Req 01 - Store details"
    ansible.builtin.set_fact:
      task_01_name: "Check sshd binary and config syntax"
      task_01_cmd: "which sshd && sshd -t"
      task_01_rc: "{{ result_01.rc | default(-1) }}"
      data_01: "{{ result_01.stdout | default('') | trim }}"
      status_01: "{{ 'SKIP' if not (sshd_installed | default(false)) else ('PASS' if result_01.rc | default(-1) == 0 else 'FAIL') }}"
      details_01: "{{ 'sshd not installed' if not (sshd_installed | default(false)) else ('Completed successfully' if result_01.rc | default(-1) == 0 else 'Failed to execute') }}"
    tags: [execute]

  - name: "Req 02 - Capture sshd_config before changes"
    ansible.builtin.shell: cat "{{ config_file }}"
    args:
      executable: /bin/bash
    register: before_config
    failed_when: false
    changed_when: false
    when: sshd_installed | default(false)
    tags: [execute]

  - name: "Req 02 - Set HostbasedAuthentication to no"
    ansible.builtin.lineinfile:
      path: "{{ config_file }}"
      regexp: '^HostbasedAuthentication'
      line: "HostbasedAuthentication no"
      insertbefore: '^Include'
      backup: true
    register: result_02
    failed_when: false
    when: sshd_installed | default(false)
    tags: [execute]

  - name: "Req 02 - Store details"
    ansible.builtin.set_fact:
      task_02_name: "Set HostbasedAuthentication to no in sshd_config"
      task_02_cmd: "lineinfile: regexp=^HostbasedAuthentication line='HostbasedAuthentication no'"
      task_02_rc: "{{ 0 if result_02 is not failed else -1 }}"
      data_02: "{{ before_config.stdout | default('') | trim }}"
      status_02: "{{ 'SKIP' if not (sshd_installed | default(false)) else ('PASS' if result_02 is not failed else 'FAIL') }}"
      details_02: "{{ 'sshd not installed' if not (sshd_installed | default(false)) else ('Applied successfully' if result_02 is not failed else 'Failed to apply') }}"
    tags: [execute]

  - name: "Req 03 - Ensure HostbasedAuthentication before Include/Match and deduplicate"
    ansible.builtin.shell: |
      sed -i '/^Include/i HostbasedAuthentication no' /etc/ssh/sshd_config
      sed -i '/^Match/i HostbasedAuthentication no' /etc/ssh/sshd_config
      awk '!seen[$0]++' /etc/ssh/sshd_config > /tmp/sshd_config && mv /tmp/sshd_config /etc/ssh/sshd_config
    args:
      executable: /bin/bash
    register: result_03
    failed_when: false
    when: sshd_installed | default(false)
    tags: [execute]

  - name: "Req 03 - Capture sshd_config after changes"
    ansible.builtin.shell: cat "{{ config_file }}"
    args:
      executable: /bin/bash
    register: after_config
    failed_when: false
    changed_when: false
    when: sshd_installed | default(false)
    tags: [execute]

  - name: "Req 03 - Store details"
    ansible.builtin.set_fact:
      task_03_name: "Ensure HostbasedAuthentication before Include/Match and deduplicate"
      task_03_cmd: "sed -i '/^Include/i HostbasedAuthentication no' /etc/ssh/sshd_config && sed -i '/^Match/i HostbasedAuthentication no' /etc/ssh/sshd_config && awk '!seen[$0]++' /etc/ssh/sshd_config > /tmp/sshd_config && mv /tmp/sshd_config /etc/ssh/sshd_config"
      task_03_rc: "{{ result_03.rc | default(-1) }}"
      data_03: "{{ after_config.stdout | default('') | trim }}"
      status_03: "{{ 'SKIP' if not (sshd_installed | default(false)) else ('PASS' if result_03.rc | default(-1) == 0 else 'FAIL') }}"
      details_03: "{{ 'sshd not installed' if not (sshd_installed | default(false)) else ('Ordering and dedup applied' if result_03.rc | default(-1) == 0 else 'Failed to apply ordering/dedup') }}"
    tags: [execute]

  - name: "Req 04 - Restart sshd service"
    ansible.builtin.service:
      name: "{{ service_name }}"
      state: restarted
    register: result_04
    failed_when: false
    when: sshd_installed | default(false)
    tags: [execute]

  - name: "Req 04 - Store details"
    ansible.builtin.set_fact:
      task_04_name: "Restart sshd service"
      task_04_cmd: "systemctl restart sshd"
      task_04_rc: "{{ 0 if result_04 is not failed else -1 }}"
      data_04: "{{ result_04.state | default('') }}"
      status_04: "{{ 'SKIP' if not (sshd_installed | default(false)) else ('PASS' if result_04 is not failed else 'FAIL') }}"
      details_04: "{{ 'sshd not installed' if not (sshd_installed | default(false)) else ('Restarted successfully' if result_04 is not failed else 'Failed to restart') }}"
    tags: [execute]

  - name: "Req 05 - Verify HostbasedAuthentication is disabled"
    ansible.builtin.shell: |
      sshd -T | grep -i hostbasedauthentication
    args:
      executable: /bin/bash
    register: result_05
    failed_when: false
    changed_when: false
    when: sshd_installed | default(false)
    tags: [execute]

  - name: "Req 05 - Store details"
    ansible.builtin.set_fact:
      task_05_name: "Verify HostbasedAuthentication is disabled"
      task_05_cmd: "sshd -T | grep -i hostbasedauthentication"
      task_05_rc: "{{ result_05.rc | default(-1) }}"
      data_05: "{{ result_05.stdout | default('') | trim }}"
      status_05: "{{ 'SKIP' if not (sshd_installed | default(false)) else ('PASS' if (result_05.stdout | default('') | trim) == 'hostbasedauthentication no' else 'FAIL') }}"
      details_05: "{{ 'sshd not installed' if not (sshd_installed | default(false)) else ('Verified: hostbasedauthentication no' if (result_05.stdout | default('') | trim) == 'hostbasedauthentication no' else 'Verification failed') }}"
    tags: [execute]

  - name: "Req 06 - Set cis_result"
    ansible.builtin.set_fact:
      cis_result: "{{ status_05 | default('ERROR') | trim }}"
    tags: [execute]

  - name: "Generate remediation report"
    ansible.builtin.debug:
      msg:
      - "REMEDIATION REPORT — CIS 5.1.12"
      - "Reference: CIS Benchmark checkpoint 5.1.12"
      - ""
      - "REQUIREMENT 01 - {{ req_01 }}:"
      - "  Task: {{ task_01_name | default('Task not recorded') }}"
      - "  Command: {{ task_01_cmd | default('N/A') }}"
      - "  Exit code: {{ task_01_rc | default(-1) }}"
      - "  Data: {{ data_01 | default('') | trim }}"
      - "  Status: {{ status_01 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_01 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 02 - {{ req_02 }}:"
      - "  Task: {{ task_02_name | default('Task not recorded') }}"
      - "  Command: {{ task_02_cmd | default('N/A') }}"
      - "  Exit code: {{ task_02_rc | default(-1) }}"
      - "  Data: {{ data_02 | default('') | trim }}"
      - "  Status: {{ status_02 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_02 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 03 - {{ req_03 }}:"
      - "  Task: {{ task_03_name | default('Task not recorded') }}"
      - "  Command: {{ task_03_cmd | default('N/A') }}"
      - "  Exit code: {{ task_03_rc | default(-1) }}"
      - "  Data: {{ data_03 | default('') | trim }}"
      - "  Status: {{ status_03 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_03 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 04 - {{ req_04 }}:"
      - "  Task: {{ task_04_name | default('Task not recorded') }}"
      - "  Command: {{ task_04_cmd | default('N/A') }}"
      - "  Exit code: {{ task_04_rc | default(-1) }}"
      - "  Data: {{ data_04 | default('') | trim }}"
      - "  Status: {{ status_04 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_04 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 05 - {{ req_05 }}:"
      - "  Task: {{ task_05_name | default('Task not recorded') }}"
      - "  Command: {{ task_05_cmd | default('N/A') }}"
      - "  Exit code: {{ task_05_rc | default(-1) }}"
      - "  Data: {{ data_05 | default('') | trim }}"
      - "  Status: {{ status_05 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_05 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 06 - {{ req_06 }}:"
      - "  Task: Set cis_result"
      - "  Command: set_fact"
      - "  Exit code: 0"
      - "  Data: {{ cis_result | default('ERROR') | trim }}"
      - "  Status: PASS"
      - "  Details: cis_result set to {{ cis_result | default('ERROR') | trim }}"
      - ""
      - "========================================================"
      - "OVERALL REMEDIATION:"
      - "  Result: {{ cis_result | default('ERROR') | trim }}"
      - "  Details: {{ details_05 | default('Not evaluated') | trim }}"
      - "========================================================"
    tags: [execute]

  always:
# === STATE GUARD — RESTORE PHASE ===
  - name: "State Guard Restore - Check if checkpoint exists"
    ansible.builtin.stat:
      path: "{{ state_guard_flag }}"
    register: _sg_restore_flag
    failed_when: false
    tags: [restore]

  - name: "State Guard Restore - Check if sshd_config backup exists"
    ansible.builtin.stat:
      path: "{{ state_guard_dir }}/sshd_config.present"
    register: _sg_restore_config
    failed_when: false
    tags: [restore]

  - name: "State Guard Restore - Restore sshd_config from backup"
    ansible.builtin.copy:
      src: "{{ state_guard_dir }}/sshd_config.present"
      dest: "{{ config_file }}"
      remote_src: true
    when: _sg_restore_config.stat.exists | default(false)
    failed_when: false
    tags: [restore]

  - name: "State Guard Restore - Remove checkpoint"
    ansible.builtin.file:
      path: "{{ state_guard_dir }}"
      state: absent
    when: _sg_restore_flag.stat.exists | default(false)
    failed_when: false
    tags: [restore]
