playbook_name: "cis_2_2_1_remediate"
backup_dir: "/var/log/ai-playbooks-backup/{{ playbook_name }}"
ftp_package: "ftp"
req_01: "Apply removal of ftp client using command: `dnf remove ftp`. Expected result: The ftp package is removed from the system."
req_02: "Verify ftp client is not installed using command: `rpm -q ftp`. Expected result: Package ftp is not installed."
req_03: "Store the final remediation result in a variable named 'cis_result' using set_fact. Set cis_result to the overall remediation status (PASS/FAIL/SKIP/ERROR) derived from the last requirement's status variable."
