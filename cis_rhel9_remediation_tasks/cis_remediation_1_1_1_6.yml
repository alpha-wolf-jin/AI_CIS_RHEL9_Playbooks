---
- name: Initialize meta data variables
  include_vars: cis_remediation_var_1_1_1_6.yml

- name: "State Guard - Check for existing checkpoint"
  ansible.builtin.stat:
    path: "{{ state_guard_flag }}"
  register: _sg_flag
  tags: [snapshot]
- name: "State Guard - Restore squashfs.conf from prior checkpoint"
  ansible.builtin.copy:
    src: "{{ state_guard_dir }}/squashfs.conf.present"
    dest: "/etc/modprobe.d/squashfs.conf"
    remote_src: true
  when: _sg_flag.stat.exists
  failed_when: false
  tags: [snapshot]
- name: "State Guard - Delete squashfs.conf if created in prior run"
  ansible.builtin.file:
    path: "/etc/modprobe.d/squashfs.conf"
    state: absent
  when: _sg_flag.stat.exists
  failed_when: false
  tags: [snapshot]
- name: "State Guard - Read previous squashfs loaded state"
  ansible.builtin.slurp:
    src: "{{ state_guard_dir }}/squashfs_loaded.state"
  register: _sg_prev_loaded
  when: _sg_flag.stat.exists
  failed_when: false
  tags: [snapshot]
- name: "State Guard - Reload squashfs if previously loaded"
  ansible.builtin.shell: modprobe {{ kernel_module }}
  when:
  - _sg_flag.stat.exists
  - _sg_prev_loaded.content | b64decode | trim == 'loaded'
  failed_when: false
  tags: [snapshot]
- name: "State Guard - Remove old checkpoint directory"
  ansible.builtin.file:
    path: "{{ state_guard_dir }}"
    state: absent
  when: _sg_flag.stat.exists
  tags: [snapshot]
- name: "State Guard - Create checkpoint directory"
  ansible.builtin.file:
    path: "{{ state_guard_dir }}"
    state: directory
    mode: "0700"
  tags: [snapshot]
- name: "State Guard - Check if /etc/modprobe.d/squashfs.conf exists"
  ansible.builtin.stat:
    path: /etc/modprobe.d/squashfs.conf
  register: _sg_conf_stat
  tags: [snapshot]
- name: "State Guard - Backup squashfs.conf if present"
  ansible.builtin.copy:
    src: /etc/modprobe.d/squashfs.conf
    dest: "{{ state_guard_dir }}/squashfs.conf.present"
    remote_src: true
  when: _sg_conf_stat.stat.exists
  tags: [snapshot]
- name: "State Guard - Mark squashfs.conf as absent if not present"
  ansible.builtin.copy:
    content: "absent"
    dest: "{{ state_guard_dir }}/squashfs.conf.absent"
  when: not _sg_conf_stat.stat.exists
  tags: [snapshot]
- name: "State Guard - Record current squashfs module load state"
  ansible.builtin.shell: lsmod | grep -q '^{{ kernel_module }} ' && echo 'loaded' || echo 'not_loaded'
  register: _sg_loaded_state
  failed_when: false
  changed_when: false
  tags: [snapshot]
- name: "State Guard - Save load state to file"
  ansible.builtin.copy:
    content: "{{ _sg_loaded_state.stdout | trim }}"
    dest: "{{ state_guard_dir }}/squashfs_loaded.state"
  tags: [snapshot]
- name: "State Guard - Check if /tmp/remediate_squashfs.sh exists"
  ansible.builtin.stat:
    path: /tmp/remediate_squashfs.sh
  register: _sg_script_stat
  tags: [snapshot]
- name: "State Guard - Mark /tmp/remediate_squashfs.sh as absent (created by playbook)"
  ansible.builtin.copy:
    content: "absent"
    dest: "{{ state_guard_dir }}/remediate_squashfs.sh.absent"
  when: not _sg_script_stat.stat.exists
  tags: [snapshot]
- name: "State Guard - Create checkpoint flag"
  ansible.builtin.copy:
    content: "checkpoint"
    dest: "{{ state_guard_flag }}"
  tags: [snapshot]

- block:
        # ============================================================
        # EXECUTE: remediation + verification + status storage + report
        # ============================================================

# ---- SQUASHFS CHECK (prerequisite) ----
  - name: "Req 00 - Check if {{ kernel_module }} kernel module is available"
    ansible.builtin.shell: |
      find /lib/modules -type d -name {{ kernel_module }} -path "*/kernel/fs/*" 2>/dev/null | head -1
    args:
      executable: /bin/bash
    register: module_check
    failed_when: false
    changed_when: false
    tags: [execute]

  - name: "Set module availability fact"
    ansible.builtin.set_fact:
      squashfs_module_available: "{{ module_check.stdout_lines | length > 0 }}"
    tags: [execute]

# ---- SQUASHFS REMEDIATE (only when module present) ----
  - name: "Req 01 - Deploy remediation script to disable {{ kernel_module }} kernel module"
    ansible.builtin.copy:
      content: |
        {% raw %}
        #!/usr/bin/env bash
        {
           unset a_output2; l_output3="" l_dl="" # unset arrays and clear variables
           l_mod_name="squashfs" # set module name
           l_mod_type="fs" # set module type
           l_mod_path="$(readlink -f /lib/modules/**/kernel/$l_mod_type | sort -u)"
           f_module_fix()
           {
              l_dl="y"
              a_showconfig=()
              while IFS= read -r l_showconfig; do
                 a_showconfig+=("$l_showconfig")
              done < <(modprobe --showconfig | grep -P -- '\b(install|blacklist)\h+'"${l_mod_name//-/_}"'\b')
              if  lsmod | grep "$l_mod_name" &> /dev/null; then
                 a_output2+=(" - unloading kernel module: \"$l_mod_name\"")
                 modprobe -r "$l_mod_name" 2>/dev/null; rmmod "$l_mod_name" 2>/dev/null
              fi
              if ! grep -Pq -- '\binstall\h+'"${l_mod_name//- /_}"'\h+\/bin\/(true|false)\b' <<< "${a_showconfig[*]}"; then
                 a_output2+=(" - setting kernel  module: \"$l_mod_name\" to \"/bin/false\"")
                 printf '%s\n' "install $l_mod_name /bin/false" >> /etc/modprobe.d/"$l_mod_name".conf
              fi
              if ! grep -Pq -- '\bblacklist\h+'"${l_mod_name//-/_}"'\b' <<< "${a_showconfig[*]}"; then
                 a_output2+=(" - denylisting kernel  module: \"$l_mod_name\"")
                 printf '%s\n' "blacklist $l_mod_name" >> /etc/modprobe.d/"$l_mod_name".conf
              fi
           }
           for l_mod_base_directory in $l_mod_path; do
              if [ -d "$l_mod_base_directory/${l_mod_name/-/\/}" ] && [ -n "$(ls -A $l_mod_base_directory/${l_mod_name/-/\/})" ]; then
                 l_output3="$l_output3\n  - \"$l_mod_base_directory\""
                 [[ "$l_mod_name" =~ overlay ]] && l_mod_name="${l_mod_name::-2}"
                 [ "$l_dl" != "y" ] && f_module_fix
              else
                 echo -e " - kernel module: \"$l_mod_name\" doesn't exist in \"$l_mod_base_directory\""
              fi
           done
           [ -n "$l_output3" ] && echo -e "\n\n -- INFO --\n - module: \"$l_mod_name\" exists in:$l_output3"
           [ "${#a_output2[@]}" -gt 0 ] && printf '%s\n' "${a_output2[@]}"
           echo -e "\n - remediation of kernel module: \"$l_mod_name\" complete\n"
        }
        {% endraw %}
      dest: "/tmp/remediate_squashfs.sh"
      mode: "0700"
    when: squashfs_module_available | bool
    failed_when: false
    tags: [execute]

  - name: "Req 01 - Execute remediation script"
    ansible.builtin.shell: /bin/bash /tmp/remediate_squashfs.sh
    args:
      executable: /bin/bash
    register: remediate_result
    when: squashfs_module_available | bool
    failed_when: false
    tags: [execute]

# ---- SQUASHFS VERIFY ----
  - name: "Req 02 - Verify squashfs kernel module is not available"
    ansible.builtin.shell: |
      if ! find /lib/modules -type d -name squashfs -path "*/kernel/fs/*" 2>/dev/null | grep -q squashfs; then
        echo "COMPLIANT: squashfs module not found on filesystem"
        exit 0
      fi
      if modprobe --showconfig | grep -q 'install squashfs /bin/false' && \
         modprobe --showconfig | grep -q 'blacklist squashfs' && \
         ! lsmod | grep -q '^squashfs '; then
        echo "COMPLIANT: squashfs is properly configured and not loaded"
        exit 0
      fi
      echo "NON-COMPLIANT: squashfs configuration or load state is incorrect"
      exit 1
    args:
      executable: /bin/bash
    register: verify_result
    failed_when: false
    changed_when: false
    tags: [execute]

# ---- SQUASHFS RESULT ----
  - name: "Req 03 - Store overall remediation result in cis_result"
    ansible.builtin.set_fact:
      cis_result: "{{ 'PASS' if verify_result.rc | default(-1) == 0 else 'FAIL' }}"
    tags: [execute]

  - name: "Store requirement 03 details"
    ansible.builtin.set_fact:
      task_03_name: "Store overall remediation result in cis_result"
      task_03_cmd: "cis_result = 'PASS' if verify_result.rc == 0 else 'FAIL'"
      task_03_rc: 0
      data_03: "{{ cis_result }}"
      status_03: "PASS"
      details_03: "cis_result stored as {{ cis_result }}"
    tags: [execute]

# ---- SQUASHFS REPORT ----
  - name: "Req 04 - Prepare report details"
    ansible.builtin.set_fact:
      task_04_name: "Generate remediation report"
      task_04_cmd: "debug msg"
      task_04_rc: 0
      data_04: "Report generated"
      status_04: "PASS"
      details_04: "Remediation report generated successfully"
    tags: [execute]

  - name: "Req 04 - Generate remediation report"
    ansible.builtin.debug:
      msg:
      - "========================================================"
      - "        REMEDIATION REPORT — CIS 1.1.1.6"
      - "========================================================"
      - "Reference: CIS Benchmark checkpoint 1.1.1.6"
      - ""
      - "REQUIREMENT 01 — {{ req_01 }}:"
      - "  Task: Deploy and execute remediation script"
      - "  Command: /bin/bash /tmp/remediate_squashfs.sh"
      - "  Exit code: {{ remediate_result.rc | default(-1) }}"
      - "  Data: {{ remediate_result.stdout | default('') | trim }}"
      - "  Status: {{ 'SKIP' if not (squashfs_module_available | default(false) | bool) else ('PASS' if remediate_result.rc | default(-1) == 0 else 'FAIL') }}"
      - "  Details: {{ 'Module not present, no remediation needed' if not (squashfs_module_available | default(false) | bool) else ('Script executed successfully' if remediate_result.rc | default(-1) == 0 else 'Script execution failed') }}"
      - ""
      - "REQUIREMENT 02 — {{ req_02 }}:"
      - "  Task: Audit verification"
      - "  Command: verification shell script"
      - "  Exit code: {{ verify_result.rc | default(-1) }}"
      - "  Data: {{ verify_result.stdout | default('') | trim }}"
      - "  Status: {{ 'PASS' if verify_result.rc | default(-1) == 0 else 'FAIL' }}"
      - "  Details: {{ 'System is compliant' if verify_result.rc | default(-1) == 0 else 'System is not compliant' }}"
      - ""
      - "REQUIREMENT 03 — {{ req_03 }}:"
      - "  Task: {{ task_03_name | default('Not recorded') }}"
      - "  Command: {{ task_03_cmd | default('N/A') }}"
      - "  Exit code: {{ task_03_rc | default(-1) }}"
      - "  Data: {{ data_03 | default('') | trim }}"
      - "  Status: {{ status_03 | default('ERROR') | trim }}"
      - "  Details: {{ details_03 | default('') | trim }}"
      - ""
      - "REQUIREMENT 04 — {{ req_04 }}:"
      - "  Task: {{ task_04_name | default('Not recorded') }}"
      - "  Command: {{ task_04_cmd | default('N/A') }}"
      - "  Exit code: {{ task_04_rc | default(-1) }}"
      - "  Data: {{ data_04 | default('') | trim }}"
      - "  Status: {{ status_04 | default('ERROR') | trim }}"
      - "  Details: {{ details_04 | default('') | trim }}"
      - ""
      - "========================================================"
      - "OVERALL REMEDIATION:"
      - "  Result: {{ cis_result }}"
      - "  Details: {{ 'All checks passed' if cis_result == 'PASS' else 'Some checks failed' }}"
      - "========================================================"
    tags: [execute]

  always:
        # ============================================================
        # RESTORE: guaranteed rollback to captured baseline
# ============================================================
  - name: "State Guard Restore - Check if checkpoint exists"
    ansible.builtin.stat:
      path: "{{ state_guard_flag }}"
    register: _sg_restore_flag
    failed_when: false
    tags: [restore]

  - name: "State Guard Restore - Check if squashfs.conf backup exists"
    ansible.builtin.stat:
      path: "{{ state_guard_dir }}/squashfs.conf.present"
    register: _sg_restore_conf_present
    failed_when: false
    tags: [restore]

  - name: "State Guard Restore - Restore /etc/modprobe.d/squashfs.conf from backup"
    ansible.builtin.copy:
      src: "{{ state_guard_dir }}/squashfs.conf.present"
      dest: "/etc/modprobe.d/squashfs.conf"
      remote_src: true
    when: _sg_restore_conf_present.stat.exists | default(false)
    failed_when: false
    tags: [restore]

  - name: "State Guard Restore - Check for absent marker for squashfs.conf"
    ansible.builtin.stat:
      path: "{{ state_guard_dir }}/squashfs.conf.absent"
    register: _sg_restore_conf_absent
    failed_when: false
    tags: [restore]

  - name: "State Guard Restore - Delete /etc/modprobe.d/squashfs.conf if originally absent"
    ansible.builtin.file:
      path: "/etc/modprobe.d/squashfs.conf"
      state: absent
    when: _sg_restore_conf_absent.stat.exists | default(false)
    failed_when: false
    tags: [restore]

  - name: "State Guard Restore - Read saved loaded state"
    ansible.builtin.slurp:
      src: "{{ state_guard_dir }}/squashfs_loaded.state"
    register: _sg_restore_loaded
    failed_when: false
    tags: [restore]

  - name: "State Guard Restore - Reload squashfs module if originally loaded"
    ansible.builtin.shell: modprobe {{ kernel_module }}
    when:
    - _sg_restore_loaded is not failed and _sg_restore_loaded.content is defined
    - "(_sg_restore_loaded.content | b64decode | trim) == 'loaded'"
    failed_when: false
    tags: [restore]

        # ------------------------------------------------------------
        # Clean up temporary remediation script
# ------------------------------------------------------------
  - name: "State Guard Restore - Check if remediate script absent marker exists"
    ansible.builtin.stat:
      path: "{{ state_guard_dir }}/remediate_squashfs.sh.absent"
    register: _sg_restore_script_absent
    failed_when: false
    tags: [restore]

  - name: "State Guard Restore - Delete /tmp/remediate_squashfs.sh if created"
    ansible.builtin.file:
      path: /tmp/remediate_squashfs.sh
      state: absent
    when: _sg_restore_script_absent.stat.exists | default(false)
    failed_when: false
    tags: [restore]

  - name: "State Guard Restore - Remove checkpoint"
    ansible.builtin.file:
      path: "{{ state_guard_dir }}"
      state: absent
    when: _sg_restore_flag.stat.exists | default(false)
    failed_when: false
    tags: [restore]
