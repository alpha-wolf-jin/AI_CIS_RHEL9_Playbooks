playbook_name: "cis_7_1_5_shadow_perms"
checkpoint_id: "cis_7_1_5"
state_guard_dir: "/usr/local/bin/cis/.cis_state_guard/{{ checkpoint_id }}"
state_guard_flag: "{{ state_guard_dir }}/checkpoint.flag"
target_file: "/etc/shadow"
expected_owner: "root"
expected_group: "root"
expected_mode: "0000"
req_01: "Apply ownership of /etc/shadow to root:root using command: `chown root:root /etc/shadow`. Expected result: /etc/shadow is owned by root:root."
req_02: "Apply permissions 0000 on /etc/shadow using command: `chmod 0000 /etc/shadow`. Expected result: /etc/shadow has permissions 0000 (no read, write, or execute for any user)."
req_03: "Verify ownership and permissions on /etc/shadow using command: `stat -c '%a %U:%G' /etc/shadow`. Expected result: Output is '0 root:root'."
req_04: "Store the final remediation result in a variable named 'cis_result' using set_fact. Set cis_result to the overall remediation status (PASS/FAIL/SKIP/ERROR) derived from the last requirement's status variable."
