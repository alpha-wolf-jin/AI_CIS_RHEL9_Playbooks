---
- name: Initialize meta data variables
  include_vars: cis_remediation_var_6_3_3_2.yml

- name: "Snapshot - Create backup directory"
  ansible.builtin.file:
    path: "{{ backup_dir }}"
    state: directory
    mode: '0700'
  tags: [snapshot]
- name: "Snapshot - Check if audit rules file exists"
  ansible.builtin.stat:
    path: "{{ audit_rules_file }}"
  register: _snap_audit_stat
  tags: [snapshot]
- name: "Snapshot - Backup audit rules file if exists"
  ansible.builtin.copy:
    src: "{{ audit_rules_file }}"
    dest: "{{ backup_dir }}/50-user_emulation.rules.orig"
    remote_src: true
  when: "_snap_audit_stat.stat.exists | default(false)"
  failed_when: false
  tags: [snapshot]
- name: "Snapshot - Record whether audit rules file existed"
  ansible.builtin.copy:
    content: "{{ _snap_audit_stat.stat.exists | default(false) }}"
    dest: "{{ backup_dir }}/audit_rules_existed"
  tags: [snapshot]

- name: "Initialize data variables"
  ansible.builtin.set_fact:
    data_01: "Not collected yet"
    status_01: "UNKNOWN"
    details_01: "Not evaluated"
    task_01_name: "Not executed"
    task_01_cmd: "N/A"
    task_01_rc: -1
    data_02: "Not collected yet"
    status_02: "UNKNOWN"
    details_02: "Not evaluated"
    task_02_name: "Not executed"
    task_02_cmd: "N/A"
    task_02_rc: -1
    data_03: "Not collected yet"
    status_03: "UNKNOWN"
    details_03: "Not evaluated"
    task_03_name: "Not executed"
    task_03_cmd: "N/A"
    task_03_rc: -1
  tags: [execute]
- block:
  - name: "Req 01 - Check if auditd package is installed"
    ansible.builtin.package_facts:
      manager: auto
    failed_when: false
    tags: [execute]

  - name: "Req 01 - Set skip fact if auditd not installed"
    ansible.builtin.set_fact:
      auditd_installed: "{{ 'audit' in ansible_facts.packages }}"
      playbook_skipped: "{{ 'audit' not in ansible_facts.packages }}"
    tags: [execute]

  - name: "Req 01 - Create audit rules file for user emulation logging"
    ansible.builtin.copy:
      content: |
        {{ audit_rule_b64 }}
        {{ audit_rule_b32 }}
      dest: "{{ audit_rules_file }}"
      owner: root
      group: root
      mode: '0640'
    register: result_01
    failed_when: false
    when: "auditd_installed | default(false) | bool"
    tags: [execute]

  - name: "Req 01 - Load audit rules with augenrules"
    ansible.builtin.shell: augenrules --load
    args:
      executable: /bin/bash
    register: result_01_load
    failed_when: false
    changed_when: false
    when: "auditd_installed | default(false) | bool"
    tags: [execute]

  - name: "Req 01 - Check if reboot is required"
    ansible.builtin.shell: |
      if [[ $(auditctl -s | grep "enabled") =~ "2" ]]; then printf "Reboot required to load rules\n"; fi
    args:
      executable: /bin/bash
    register: result_01_reboot
    failed_when: false
    changed_when: false
    when: "auditd_installed | default(false) | bool"
    tags: [execute]

  - name: "Store requirement 01 details"
    ansible.builtin.set_fact:
      task_01_name: "Create and load audit rules for user emulation logging"
      task_01_cmd: "printf rules >> {{ audit_rules_file }}; augenrules --load"
      task_01_rc: "{{ result_01_load.rc | default(-1) }}"
      data_01: "{{ result_01_load.stdout | default('') | trim }}"
      status_01: "{{ 'SKIP' if not (auditd_installed | default(false) | bool) else ('PASS' if (result_01_load.rc | default(-1) == 0) else 'FAIL') | trim }}"
      details_01: "{{ 'auditd package not installed - remediation skipped' if not (auditd_installed | default(false) | bool) else ('Rules created and loaded successfully' if (result_01_load.rc | default(-1) == 0) else 'Failed to create or load audit rules') | trim }}"
    tags: [execute]

  - name: "Req 02 - Verify audit rules are active for user emulation"
    ansible.builtin.shell: auditctl -l | grep -i 'user_emulation' || echo 'VERIFY_FAILED'
    args:
      executable: /bin/bash
    register: result_02
    failed_when: false
    changed_when: false
    when: "auditd_installed | default(false) | bool"
    tags: [execute]

  - name: "Store requirement 02 details"
    ansible.builtin.set_fact:
      task_02_name: "Verify audit rules for user emulation are active"
      task_02_cmd: "auditctl -l | grep -i 'user_emulation'"
      task_02_rc: "{{ result_02.rc | default(-1) }}"
      data_02: "{{ result_02.stdout | default('') | trim }}"
      status_02: "{{ 'SKIP' if not (auditd_installed | default(false) | bool) else ('PASS' if ('user_emulation' in (result_02.stdout | default(''))) else 'FAIL') | trim }}"
      details_02: "{{ 'auditd package not installed - verification skipped' if not (auditd_installed | default(false) | bool) else ('Audit rules for user emulation are active' if ('user_emulation' in (result_02.stdout | default(''))) else 'Audit rules for user emulation NOT found in active rules') | trim }}"
    tags: [execute]

  - name: "Req 03 - Set cis_result fact"
    ansible.builtin.set_fact:
      cis_result: "{{ 'PASS' if (status_01 | trim == 'PASS' and status_02 | trim == 'PASS') else ('SKIP' if (status_01 | trim == 'SKIP' and status_02 | trim == 'SKIP') else 'FAIL') | trim }}"
    tags: [execute]

  - name: "Store requirement 03 details"
    ansible.builtin.set_fact:
      task_03_name: "Store final remediation result (cis_result)"
      task_03_cmd: "set_fact cis_result = {{ cis_result | default('?') }}"
      task_03_rc: 0
      data_03: "cis_result = {{ cis_result }}"
      status_03: "{{ 'PASS' if cis_result is defined else 'FAIL' | trim }}"
      details_03: "Overall remediation status stored as {{ cis_result }}"
    tags: [execute]

  - name: "Req 04 - Generate remediation report"
    ansible.builtin.debug:
      msg:
      - "========================================================"
      - "REMEDIATION REPORT — CIS 6.3.3.2"
      - "Reference: CIS Benchmark checkpoint 6.3.3.2"
      - "========================================================"
      - ""
      - "REQUIREMENT 01 - {{ req_01 }}:"
      - "  Task: {{ task_01_name | default('Task not recorded') }}"
      - "  Command: {{ task_01_cmd | default('N/A') }}"
      - "  Exit code: {{ task_01_rc | default(-1) }}"
      - "  Data: {{ data_01 | default('') | trim }}"
      - "  Status: {{ status_01 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_01 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 02 - {{ req_02 }}:"
      - "  Task: {{ task_02_name | default('Task not recorded') }}"
      - "  Command: {{ task_02_cmd | default('N/A') }}"
      - "  Exit code: {{ task_02_rc | default(-1) }}"
      - "  Data: {{ data_02 | default('') | trim }}"
      - "  Status: {{ status_02 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_02 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 03 - {{ req_03 }}:"
      - "  Task: {{ task_03_name | default('Task not recorded') }}"
      - "  Command: {{ task_03_cmd | default('N/A') }}"
      - "  Exit code: {{ task_03_rc | default(-1) }}"
      - "  Data: {{ data_03 | default('') | trim }}"
      - "  Status: {{ status_03 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_03 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 04 - {{ req_04 }}:"
      - "  Task: Generate remediation report"
      - "  Command: N/A"
      - "  Exit code: 0"
      - "  Data: Report generated"
      - "  Status: PASS"
      - "  Details: Remediation report created"
      - ""
      - "========================================================"
      - "OVERALL REMEDIATION:"
      - "  Result: {{ cis_result | default('ERROR') | trim }}"
      - "  Details: {{ 'All requirements passed' if cis_result | trim == 'PASS' else ('Remediation skipped - auditd not installed' if cis_result | trim == 'SKIP' else 'One or more requirements failed or skipped') | trim }}"
      - "========================================================"
    tags: [execute]

  always:
  - name: "Restore - Check if audit rules backup exists"
    ansible.builtin.stat:
      path: "{{ backup_dir }}/50-user_emulation.rules.orig"
    register: _restore_audit_check
    failed_when: false
    tags: [restore]

  - name: "Restore - Overwrite audit rules with original"
    ansible.builtin.copy:
      src: "{{ backup_dir }}/50-user_emulation.rules.orig"
      dest: "{{ audit_rules_file }}"
      remote_src: true
    when: "_restore_audit_check.stat.exists | default(false)"
    failed_when: false
    tags: [restore]

  - name: "Restore - Read existence marker"
    ansible.builtin.slurp:
      src: "{{ backup_dir }}/audit_rules_existed"
    register: _restore_existed
    failed_when: false
    tags: [restore]

  - name: "Restore - Remove audit rules file if it was created by playbook"
    ansible.builtin.file:
      path: "{{ audit_rules_file }}"
      state: absent
    when:
    - "_restore_existed.content is defined"
    - "(_restore_existed.content | b64decode | trim) == 'False'"
    failed_when: false
    tags: [restore]

  - name: "Restore - Reload audit rules after restore"
    ansible.builtin.shell: augenrules --load
    args:
      executable: /bin/bash
    when: "_restore_audit_check.stat.exists | default(false)"
    failed_when: false
    tags: [restore]

  - name: "Restore - Remove backup directory"
    ansible.builtin.file:
      path: "{{ backup_dir }}"
      state: absent
    failed_when: false
    tags: [restore]
