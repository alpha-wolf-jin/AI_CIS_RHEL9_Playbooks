---
- name: Initialize meta data variables
  include_vars: cis_remediation_var_1_5_1.yml

- name: "Snapshot - Create backup directory"
  ansible.builtin.file:
    path: "{{ backup_dir }}"
    state: directory
    mode: '0700'
  tags: [snapshot]
- name: "Snapshot - Check if config file exists"
  ansible.builtin.stat:
    path: "/etc/sysctl.d/60-kernel_sysctl.conf"
  register: _sg_config_stat
  tags: [snapshot]
- name: "Snapshot - Backup config file if exists"
  ansible.builtin.copy:
    src: "/etc/sysctl.d/60-kernel_sysctl.conf"
    dest: "{{ backup_dir }}/60-kernel_sysctl.conf.present"
    remote_src: true
  when: _sg_config_stat.stat.exists
  tags: [snapshot]
- name: "Snapshot - Mark config file as absent"
  ansible.builtin.copy:
    content: "absent"
    dest: "{{ backup_dir }}/60-kernel_sysctl.conf.absent"
  when: not _sg_config_stat.stat.exists
  tags: [snapshot]
- name: "Snapshot - Save current kernel.randomize_va_space value"
  ansible.builtin.shell: sysctl -n kernel.randomize_va_space
  args:
    executable: /bin/bash
  register: _sg_sysctl_val
  changed_when: false
  failed_when: false
  tags: [snapshot]
- name: "Snapshot - Persist kernel.randomize_va_space value to file"
  ansible.builtin.copy:
    content: "{{ _sg_sysctl_val.stdout | default('') | trim }}"
    dest: "{{ backup_dir }}/kernel.randomize_va_space.state"
  tags: [snapshot]

- block:
  - name: "Initialize data variables"
    set_fact:
      data_01: "Not collected yet"
      status_01: "ERROR"
      details_01: "Not evaluated"
      task_01_name: "Not executed"
      task_01_cmd: "N/A"
      task_01_rc: -1
      data_02: "Not collected yet"
      status_02: "ERROR"
      details_02: "Not evaluated"
      task_02_name: "Not executed"
      task_02_cmd: "N/A"
      task_02_rc: -1
      data_03: "Not collected yet"
      status_03: "ERROR"
      details_03: "Not evaluated"
      task_03_name: "Not executed"
      task_03_cmd: "N/A"
      task_03_rc: -1
      data_04: "Not collected yet"
      status_04: "ERROR"
      details_04: "Not evaluated"
      task_04_name: "Not executed"
      task_04_cmd: "N/A"
      task_04_rc: -1
      data_05: "Not collected yet"
      status_05: "ERROR"
      details_05: "Not evaluated"
      task_05_name: "Not executed"
      task_05_cmd: "N/A"
      task_05_rc: -1
    tags: [execute]

  - name: "Req 01 - Check if sysctl is installed"
    ansible.builtin.shell: which sysctl
    args:
      executable: /bin/bash
    register: result_01
    failed_when: false
    changed_when: false
    tags: [execute]

  - name: "Store requirement 01 details"
    set_fact:
      task_01_name: "Check if sysctl is installed"
      task_01_cmd: "which sysctl"
      task_01_rc: "{{ result_01.rc | default(-1) }}"
      data_01: "{{ result_01.stdout | default('') | trim }}"
      status_01: "{{ ('PASS' if result_01.rc | default(-1) == 0 else 'FAIL') | trim }}"
      details_01: "{{ ('sysctl found at: ' + (result_01.stdout | default('') | trim)) if result_01.rc | default(-1) == 0 else 'sysctl not found' | trim }}"
    tags: [execute]

  - name: "Req 02 - Apply kernel.randomize_va_space in sysctl config"
    ansible.builtin.lineinfile:
      path: "/etc/sysctl.d/60-kernel_sysctl.conf"
      regexp: |
        ^#?kernel\\.randomize_va_space\\s*=
      line: "kernel.randomize_va_space = 2"
      state: present
      create: yes
      mode: '0644'
    register: result_02
    failed_when: false
    tags: [execute]

  - name: "Store requirement 02 details"
    set_fact:
      task_02_name: "Apply kernel.randomize_va_space in sysctl config"
      task_02_cmd: "lineinfile: kernel.randomize_va_space = 2 in /etc/sysctl.d/60-kernel_sysctl.conf"
      task_02_rc: "{{ 0 if result_02 is not failed else -1 }}"
      data_02: "{{ 'Config updated' if result_02.changed | default(false) else 'Config already correct' }}"
      status_02: "{{ 'PASS' if result_02 is not failed else 'FAIL' | trim }}"
      details_02: "{{ 'Config line ensured' if result_02 is not failed else 'Failed to update config' | trim }}"
    tags: [execute]

  - name: "Req 03 - Apply active kernel parameter"
    ansible.builtin.shell: sysctl -w kernel.randomize_va_space=2
    args:
      executable: /bin/bash
    register: result_03
    failed_when: false
    tags: [execute]

  - name: "Store requirement 03 details"
    set_fact:
      task_03_name: "Apply active kernel parameter"
      task_03_cmd: "sysctl -w kernel.randomize_va_space=2"
      task_03_rc: "{{ result_03.rc | default(-1) }}"
      data_03: "{{ result_03.stdout | default('') | trim }}"
      status_03: "{{ ('PASS' if result_03.rc | default(-1) == 0 else 'FAIL') | trim }}"
      details_03: "{{ 'Active parameter applied' if result_03.rc | default(-1) == 0 else 'Failed to apply parameter' | trim }}"
    tags: [execute]

  - name: "Req 04 - Verify the setting is active"
    ansible.builtin.shell: sysctl kernel.randomize_va_space
    args:
      executable: /bin/bash
    register: result_04
    failed_when: false
    changed_when: false
    tags: [execute]

  - name: "Store requirement 04 details"
    set_fact:
      task_04_name: "Verify the setting is active"
      task_04_cmd: "sysctl kernel.randomize_va_space"
      task_04_rc: "{{ result_04.rc | default(-1) }}"
      data_04: "{{ result_04.stdout | default('') | trim }}"
      status_04: "{{ ('PASS' if (result_04.stdout | default('') | trim) == 'kernel.randomize_va_space = 2' else 'FAIL') | trim }}"
      details_04: "{{ 'Verified: kernel.randomize_va_space = 2' if (result_04.stdout | default('') | trim) == 'kernel.randomize_va_space = 2' else 'Verification failed: ' + (result_04.stdout | default('') | trim) | trim }}"
    tags: [execute]

  - name: "Req 05 - Store final remediation result"
    set_fact:
      cis_result: "{{ status_04 | default('ERROR') | trim }}"
      task_05_name: "Store final remediation result"
      task_05_cmd: "set_fact"
      task_05_rc: 0
      data_05: "{{ status_04 | default('ERROR') | trim }}"
      status_05: "PASS"
      details_05: "cis_result set to {{ status_04 | default('ERROR') | trim }}"
    tags: [execute]

  - name: "Generate remediation report"
    debug:
      msg:
      - "REMEDIATION REPORT — CIS 1.5.1"
      - "Reference: CIS Benchmark checkpoint 1.5.1"
      - ""
      - "REQUIREMENT 01 - {{ req_01 }}:"
      - "  Task: {{ task_01_name | default('Not recorded') }}"
      - "  Command: {{ task_01_cmd | default('N/A') }}"
      - "  Exit code: {{ task_01_rc | default(-1) }}"
      - "  Data: {{ data_01 | default('') | trim }}"
      - "  Status: {{ status_01 | default('ERROR') | trim }}"
      - "  Details: {{ details_01 | default('') | trim }}"
      - ""
      - "REQUIREMENT 02 - {{ req_02 }}:"
      - "  Task: {{ task_02_name | default('Not recorded') }}"
      - "  Command: {{ task_02_cmd | default('N/A') }}"
      - "  Exit code: {{ task_02_rc | default(-1) }}"
      - "  Data: {{ data_02 | default('') | trim }}"
      - "  Status: {{ status_02 | default('ERROR') | trim }}"
      - "  Details: {{ details_02 | default('') | trim }}"
      - ""
      - "REQUIREMENT 03 - {{ req_03 }}:"
      - "  Task: {{ task_03_name | default('Not recorded') }}"
      - "  Command: {{ task_03_cmd | default('N/A') }}"
      - "  Exit code: {{ task_03_rc | default(-1) }}"
      - "  Data: {{ data_03 | default('') | trim }}"
      - "  Status: {{ status_03 | default('ERROR') | trim }}"
      - "  Details: {{ details_03 | default('') | trim }}"
      - ""
      - "REQUIREMENT 04 - {{ req_04 }}:"
      - "  Task: {{ task_04_name | default('Not recorded') }}"
      - "  Command: {{ task_04_cmd | default('N/A') }}"
      - "  Exit code: {{ task_04_rc | default(-1) }}"
      - "  Data: {{ data_04 | default('') | trim }}"
      - "  Status: {{ status_04 | default('ERROR') | trim }}"
      - "  Details: {{ details_04 | default('') | trim }}"
      - ""
      - "REQUIREMENT 05 - {{ req_05 }}:"
      - "  Task: {{ task_05_name | default('Not recorded') }}"
      - "  Command: {{ task_05_cmd | default('N/A') }}"
      - "  Exit code: {{ task_05_rc | default(-1) }}"
      - "  Data: {{ data_05 | default('') | trim }}"
      - "  Status: {{ status_05 | default('ERROR') | trim }}"
      - "  Details: {{ details_05 | default('') | trim }}"
      - ""
      - "========================================================"
      - "OVERALL REMEDIATION:"
      - "  Result: {{ cis_result | default('ERROR') | trim }}"
      - "========================================================"
    tags: [execute]

  always:
  - name: "Restore - Check if backup exists"
    ansible.builtin.stat:
      path: "{{ backup_dir }}/60-kernel_sysctl.conf.present"
    register: _restore_present
    failed_when: false
    tags: [restore]

  - name: "Restore - Overwrite with original"
    ansible.builtin.copy:
      src: "{{ backup_dir }}/60-kernel_sysctl.conf.present"
      dest: "/etc/sysctl.d/60-kernel_sysctl.conf"
      remote_src: true
    when: _restore_present.stat.exists | default(false)
    failed_when: false
    tags: [restore]

  - name: "Restore - Check if absent marker exists"
    ansible.builtin.stat:
      path: "{{ backup_dir }}/60-kernel_sysctl.conf.absent"
    register: _restore_absent
    failed_when: false
    tags: [restore]

  - name: "Restore - Delete config if it was absent before"
    ansible.builtin.file:
      path: "/etc/sysctl.d/60-kernel_sysctl.conf"
      state: absent
    when: _restore_absent.stat.exists | default(false)
    failed_when: false
    tags: [restore]

  - name: "Restore - Read saved kernel.randomize_va_space value"
    ansible.builtin.slurp:
      src: "{{ backup_dir }}/kernel.randomize_va_space.state"
    register: _restore_sysctl_val
    failed_when: false
    tags: [restore]

  - name: "Restore - Revert kernel.randomize_va_space to original value"
    ansible.builtin.shell: "sysctl -w kernel.randomize_va_space={{ _restore_sysctl_val.content | b64decode | trim }}"
    args:
      executable: /bin/bash
    when:
    - _restore_sysctl_val.content is defined
    - (_restore_sysctl_val.content | b64decode | trim) | length > 0
    failed_when: false
    tags: [restore]

  - name: "Restore - Remove backup directory"
    ansible.builtin.file:
      path: "{{ backup_dir }}"
      state: absent
    failed_when: false
    tags: [restore]
