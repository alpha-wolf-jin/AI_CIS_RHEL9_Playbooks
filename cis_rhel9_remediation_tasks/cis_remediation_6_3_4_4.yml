---
- name: Initialize meta data variables
  include_vars: cis_remediation_var_6_3_4_4.yml

- name: "Snapshot - Create backup directory"
  ansible.builtin.file:
    path: "{{ backup_dir }}"
    state: directory
    mode: '0700'
  tags: [snapshot]
- name: "Snapshot - Check if auditd config file exists"
  ansible.builtin.stat:
    path: "/etc/audit/auditd.conf"
  register: _snap_auditd_conf
  tags: [snapshot]
- name: "Snapshot - Backup auditd config file if exists"
  ansible.builtin.copy:
    src: "/etc/audit/auditd.conf"
    dest: "{{ backup_dir }}/auditd.conf.present"
    remote_src: true
  when: _snap_auditd_conf.stat.exists
  tags: [snapshot]
- name: "Snapshot - Record original group of /var/log/audit/"
  ansible.builtin.stat:
    path: "/var/log/audit/"
  register: _snap_audit_dir_stat
  failed_when: false
  tags: [snapshot]
- name: "Snapshot - Save original group of /var/log/audit/ to file"
  ansible.builtin.copy:
    content: "{{ _snap_audit_dir_stat.stat.gr_name | default('') }}"
    dest: "{{ backup_dir }}/audit_dir_group.orig"
  when: _snap_audit_dir_stat.stat.exists | default(false)
  tags: [snapshot]
- name: "Snapshot - Record original group ownership of audit log files"
  ansible.builtin.shell: |
    find $(dirname $(awk -F"=" '/^\s*log_file\s*=\s*/ {print $2}' /etc/audit/auditd.conf 2>/dev/null | xargs)) -type f -exec stat -c '%n:%G' {} \; 2>/dev/null || true
  args:
    executable: /bin/bash
  register: _snap_log_groups_output
  failed_when: false
  changed_when: false
  tags: [snapshot]
- name: "Snapshot - Save audit log file groups to file"
  ansible.builtin.copy:
    content: "{{ _snap_log_groups_output.stdout | default('') }}"
    dest: "{{ backup_dir }}/audit_log_groups.orig"
  when: _snap_log_groups_output.stdout | default('') | trim | length > 0
  tags: [snapshot]

- block:
  - name: "Req 01 - Check if auditd package is installed"
    ansible.builtin.package_facts:
      manager: auto
    failed_when: false
    tags: [execute]

  - name: "Req 01 - Set auditd installed fact"
    ansible.builtin.set_fact:
      auditd_installed: "{{ 'audit' in ansible_facts.packages }}"
      playbook_skipped: "{{ 'audit' not in ansible_facts.packages }}"
    tags: [execute]

  - name: "Req 01 - Check required utilities availability"
    ansible.builtin.shell: "which auditd find xargs awk sed chgrp systemctl"
    args:
      executable: /bin/bash
    register: result_01
    failed_when: false
    changed_when: false
    when: auditd_installed | default(false)
    tags: [execute]

  - name: "Req 01 - Store requirement 01 details"
    ansible.builtin.set_fact:
      task_01_name: "Check required utilities availability"
      task_01_cmd: "which auditd find xargs awk sed chgrp systemctl"
      task_01_rc: "{{ result_01.rc | default(-1) }}"
      data_01: "{{ result_01.stdout | default('') | trim }}"
      status_01: >-
        {{ 'SKIP' if not (auditd_installed | default(false))
           else ('PASS' if (result_01.rc | default(-1)) == 0 else 'FAIL') }}
      details_01: >-
        {{ 'auditd not installed - skipped' if not (auditd_installed | default(false))
           else ('All utilities found' if (result_01.rc | default(-1)) == 0
                 else 'Missing utilities: ' + (result_01.stderr | default('') | trim)) }}
    tags: [execute]

  - name: "Req 02 - Identify audit log files not owned by adm or root"
    ansible.builtin.shell: |
      find $(dirname $(awk -F"=" '/^\s*log_file\s*=\s*/ {print $2}' /etc/audit/auditd.conf | xargs)) -type f \( ! -group adm -a ! -group root \) 2>/dev/null
    args:
      executable: /bin/bash
    register: _req02_check
    changed_when: false
    failed_when: false
    when: auditd_installed | default(false)
    tags: [execute]

  - name: "Req 02 - Change group ownership of audit log files to adm"
    ansible.builtin.shell: |
      find $(dirname $(awk -F"=" '/^\s*log_file\s*=\s*/ {print $2}' /etc/audit/auditd.conf | xargs)) -type f \( ! -group adm -a ! -group root \) -exec chgrp adm {} +
    args:
      executable: /bin/bash
    register: result_02
    failed_when: false
    changed_when: true
    when:
    - auditd_installed | default(false)
    - _req02_check.stdout | default('') | trim | length > 0
    tags: [execute]

  - name: "Req 02 - Store requirement 02 details"
    ansible.builtin.set_fact:
      task_02_name: "Change group ownership of audit log files to adm"
      task_02_cmd: |
        find $(dirname $(awk -F"=" '/^\s*log_file\s*=\s*/ {print $2}' /etc/audit/auditd.conf | xargs)) -type f \( ! -group adm -a ! -group root \) -exec chgrp adm {} +
      task_02_rc: "{{ result_02.rc | default(-1) }}"
      data_02: "{{ result_02.stdout | default('') | trim }}"
      status_02: >-
        {{ 'SKIP' if not (auditd_installed | default(false))
           else ('PASS' if (result_02.rc | default(-1)) == 0 or (_req02_check.stdout | default('') | trim | length == 0) else 'FAIL') }}
      details_02: >-
        {{ 'auditd not installed - skipped' if not (auditd_installed | default(false))
           else ('Group ownership changed' if (result_02.rc | default(-1)) == 0 or (_req02_check.stdout | default('') | trim | length == 0)
                 else 'Failed: ' + (result_02.stderr | default('') | trim)) }}
    tags: [execute]

  - name: "Req 03 - Check current group of /var/log/audit/"
    ansible.builtin.stat:
      path: /var/log/audit/
    register: _req03_stat
    when: auditd_installed | default(false)
    tags: [execute]

  - name: "Req 03 - Change group ownership of /var/log/audit/ to adm"
    ansible.builtin.shell: "chgrp adm /var/log/audit/"
    args:
      executable: /bin/bash
    register: result_03
    failed_when: false
    changed_when: true
    when:
    - auditd_installed | default(false)
    - _req03_stat.stat.gr_name | default('') != 'adm'
    tags: [execute]

  - name: "Req 03 - Store requirement 03 details"
    ansible.builtin.set_fact:
      task_03_name: "Change group ownership of /var/log/audit/ to adm"
      task_03_cmd: "chgrp adm /var/log/audit/"
      task_03_rc: "{{ result_03.rc | default(-1) }}"
      data_03: "{{ result_03.stdout | default('') | trim }}"
      status_03: >-
        {{ 'SKIP' if not (auditd_installed | default(false))
           else ('PASS' if (result_03.rc | default(-1)) == 0 or (_req03_stat.stat.gr_name | default('') == 'adm') else 'FAIL') }}
      details_03: >-
        {{ 'auditd not installed - skipped' if not (auditd_installed | default(false))
           else ('Directory group set to adm' if (result_03.rc | default(-1)) == 0 or (_req03_stat.stat.gr_name | default('') == 'adm')
                 else 'Failed: ' + (result_03.stderr | default('') | trim)) }}
    tags: [execute]

  - name: "Req 04 - Check current log_group setting in auditd.conf"
    ansible.builtin.shell: >
      grep -P '^\s*#?\s*log_group\s*=\s*adm\b' /etc/audit/auditd.conf
    args:
      executable: /bin/bash
    register: _req04_check
    changed_when: false
    failed_when: false
    when: auditd_installed | default(false)
    tags: [execute]

  - name: "Req 04 - Set log_group parameter in auditd.conf"
    ansible.builtin.shell: "sed -ri 's/^\\s*#?\\s*log_group\\s*=\\s*\\S+(\\s*#.*)?.*$/log_group = adm\\1/' /etc/audit/auditd.conf"
    args:
      executable: /bin/bash
    register: result_04
    failed_when: false
    changed_when: true
    when:
    - auditd_installed | default(false)
    - _req04_check.rc | default(1) != 0
    tags: [execute]

  - name: "Req 04 - Store requirement 04 details"
    ansible.builtin.set_fact:
      task_04_name: "Set log_group parameter in auditd.conf"
      task_04_cmd: |
        sed -ri 's/^\\s*#?\\s*log_group\\s*=\\s*\\S+(\\s*#.*)?.*$/log_group = adm\\1/' /etc/audit/auditd.conf
      task_04_rc: "{{ result_04.rc | default(-1) }}"
      data_04: "{{ result_04.stdout | default('') | trim }}"
      status_04: >-
        {{ 'SKIP' if not (auditd_installed | default(false))
           else ('PASS' if (result_04.rc | default(-1)) == 0 or (_req04_check.rc | default(1)) == 0 else 'FAIL') }}
      details_04: >-
        {{ 'auditd not installed - skipped' if not (auditd_installed | default(false))
           else ('log_group set to adm' if (result_04.rc | default(-1)) == 0 or (_req04_check.rc | default(1)) == 0
                 else 'Failed: ' + (result_04.stderr | default('') | trim)) }}
    tags: [execute]

  - name: "Req 05 - Restart auditd service"
    ansible.builtin.systemd:
      name: auditd
      state: restarted
    register: result_05
    failed_when: false
    when: auditd_installed | default(false)
    tags: [execute]

  - name: "Req 05 - Store requirement 05 details"
    ansible.builtin.set_fact:
      task_05_name: "Restart auditd service"
      task_05_cmd: "systemctl restart auditd"
      task_05_rc: "{{ 0 if result_05 is not failed else result_05.rc | default(-1) }}"
      data_05: "{{ result_05.stdout | default('') | trim }}"
      status_05: >-
        {{ 'SKIP' if not (auditd_installed | default(false))
           else ('PASS' if result_05 is not failed else 'FAIL') }}
      details_05: >-
        {{ 'auditd not installed - skipped' if not (auditd_installed | default(false))
           else ('auditd restarted' if result_05 is not failed
                 else 'Failed: ' + (result_05.stderr | default('') | trim)) }}
    tags: [execute]

  - name: "Req 06 - Verify audit log files group ownership"
    ansible.builtin.shell: |
      find $(dirname $(awk -F"=" '/^\s*log_file\s*=\s*/ {print $2}' /etc/audit/auditd.conf | xargs)) -type f \( ! -group adm -a ! -group root \) 2>/dev/null | wc -l
    args:
      executable: /bin/bash
    register: result_06
    failed_when: false
    changed_when: false
    when: auditd_installed | default(false)
    tags: [execute]

  - name: "Req 06 - Store requirement 06 details"
    ansible.builtin.set_fact:
      task_06_name: "Verify audit log files group ownership"
      task_06_cmd: |
        find $(dirname $(awk -F"=" '/^\s*log_file\s*=\s*/ {print $2}' /etc/audit/auditd.conf | xargs)) -type f \( ! -group adm -a ! -group root \) 2>/dev/null | wc -l
      task_06_rc: "{{ result_06.rc | default(-1) }}"
      data_06: "{{ result_06.stdout | default('') | trim }}"
      status_06: >-
        {{ 'SKIP' if not (auditd_installed | default(false))
           else ('PASS' if (result_06.stdout | default('') | trim) == '0' else 'FAIL') }}
      details_06: >-
        {{ 'auditd not installed - skipped' if not (auditd_installed | default(false))
           else ('All audit log files owned by adm or root' if (result_06.stdout | default('') | trim) == '0'
                 else 'Non-compliant file count: ' + (result_06.stdout | default('') | trim)) }}
    tags: [execute]

  - name: "Req 07 - Compute overall remediation status"
    ansible.builtin.set_fact:
      _overall: >-
        {%- set action_statuses = [status_01, status_02, status_03, status_04, status_05, status_06] -%}
        {{- 'SKIP' if status_01 == 'SKIP' else 'PASS' if 'FAIL' not in action_statuses else 'FAIL' -}}
    tags: [execute]

  - name: "Req 07 - Store overall remediation result"
    ansible.builtin.set_fact:
      cis_result: "{{ _overall }}"
      task_07_name: "Store overall remediation result"
      task_07_cmd: "set_fact: cis_result = {{ _overall }}"
      task_07_rc: 0
      data_07: "{{ _overall }}"
      status_07: "{{ _overall }}"
      details_07: "Overall remediation result: {{ _overall }}"
    tags: [execute]

  - name: "Generate remediation report"
    ansible.builtin.debug:
      msg:
      - "========================================================"
      - "        REMEDIATION REPORT — CIS 6.3.4.4"
      - "========================================================"
      - "Reference: CIS Benchmark checkpoint 6.3.4.4"
      - ""
      - "REQUIREMENT 01 - {{ req_01 }}:"
      - "  Task: {{ task_01_name | default('Task not recorded') }}"
      - "  Command: {{ task_01_cmd | default('N/A') }}"
      - "  Exit code: {{ task_01_rc | default(-1) }}"
      - "  Data: {{ data_01 | default('') | trim }}"
      - "  Status: {{ status_01 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_01 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 02 - {{ req_02 }}:"
      - "  Task: {{ task_02_name | default('Task not recorded') }}"
      - "  Command: {{ task_02_cmd | default('N/A') }}"
      - "  Exit code: {{ task_02_rc | default(-1) }}"
      - "  Data: {{ data_02 | default('') | trim }}"
      - "  Status: {{ status_02 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_02 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 03 - {{ req_03 }}:"
      - "  Task: {{ task_03_name | default('Task not recorded') }}"
      - "  Command: {{ task_03_cmd | default('N/A') }}"
      - "  Exit code: {{ task_03_rc | default(-1) }}"
      - "  Data: {{ data_03 | default('') | trim }}"
      - "  Status: {{ status_03 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_03 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 04 - {{ req_04 }}:"
      - "  Task: {{ task_04_name | default('Task not recorded') }}"
      - "  Command: {{ task_04_cmd | default('N/A') }}"
      - "  Exit code: {{ task_04_rc | default(-1) }}"
      - "  Data: {{ data_04 | default('') | trim }}"
      - "  Status: {{ status_04 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_04 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 05 - {{ req_05 }}:"
      - "  Task: {{ task_05_name | default('Task not recorded') }}"
      - "  Command: {{ task_05_cmd | default('N/A') }}"
      - "  Exit code: {{ task_05_rc | default(-1) }}"
      - "  Data: {{ data_05 | default('') | trim }}"
      - "  Status: {{ status_05 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_05 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 06 - {{ req_06 }}:"
      - "  Task: {{ task_06_name | default('Task not recorded') }}"
      - "  Command: {{ task_06_cmd | default('N/A') }}"
      - "  Exit code: {{ task_06_rc | default(-1) }}"
      - "  Data: {{ data_06 | default('') | trim }}"
      - "  Status: {{ status_06 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_06 | default('Not evaluated') | trim }}"
      - ""
      - "REQUIREMENT 07 - {{ req_07 }}:"
      - "  Task: {{ task_07_name | default('Task not recorded') }}"
      - "  Command: {{ task_07_cmd | default('N/A') }}"
      - "  Exit code: {{ task_07_rc | default(-1) }}"
      - "  Data: {{ data_07 | default('') | trim }}"
      - "  Status: {{ status_07 | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_07 | default('Not evaluated') | trim }}"
      - ""
      - "========================================================"
      - "OVERALL REMEDIATION:"
      - "  Result: {{ cis_result | default('UNKNOWN') | trim }}"
      - "  Details: {{ details_06 | default('Not evaluated') | trim }}"
      - "========================================================"
    tags: [execute]

  always:
# --- STATE GUARD RESTORE PHASE ---
  - name: "Restore - Check if snapshot exists"
    ansible.builtin.stat:
      path: "{{ backup_dir }}/auditd.conf.present"
    register: _restore_snapshot_exists
    failed_when: false
    tags: [restore]

  - name: "Restore - Restore auditd.conf from backup"
    ansible.builtin.copy:
      src: "{{ backup_dir }}/auditd.conf.present"
      dest: "/etc/audit/auditd.conf"
      remote_src: true
    when: _restore_snapshot_exists.stat.exists | default(false)
    failed_when: false
    tags: [restore]

  - name: "Restore - Restore /var/log/audit/ group ownership"
    ansible.builtin.shell: |
      original_group="$(cat '{{ backup_dir }}/audit_dir_group.orig' 2>/dev/null)"
      [ -n "$original_group" ] && chgrp "$original_group" /var/log/audit/ || true
    args:
      executable: /bin/bash
    when: _restore_snapshot_exists.stat.exists | default(false)
    failed_when: false
    tags: [restore]

  - name: "Restore - Check if audit log group file exists"
    ansible.builtin.stat:
      path: "{{ backup_dir }}/audit_log_groups.orig"
    register: _restore_log_groups_file
    failed_when: false
    tags: [restore]

  - name: "Restore - Restore audit log file groups from saved file"
    ansible.builtin.shell: |
      while IFS=':' read -r file group; do
        chgrp "$group" "$file" 2>/dev/null || true
      done < "{{ backup_dir }}/audit_log_groups.orig"
    args:
      executable: /bin/bash
    when:
    - _restore_log_groups_file.stat.exists | default(false)
    - _restore_log_groups_file.stat.size | default(0) > 0
    failed_when: false
    tags: [restore]

  - name: "Restore - Reload auditd after config/group restore"
    ansible.builtin.shell: "kill -HUP $(cat /var/run/auditd.pid 2>/dev/null || echo 0)"
    args:
      executable: /bin/bash
    when: _restore_snapshot_exists.stat.exists | default(false)
    failed_when: false
    tags: [restore]

  - name: "Restore - Clean up backup directory"
    ansible.builtin.file:
      path: "{{ backup_dir }}"
      state: absent
    failed_when: false
    tags: [restore]
