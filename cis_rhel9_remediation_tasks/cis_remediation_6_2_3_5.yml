  always:
  - name: "Restore - Check if backup exists"
    ansible.builtin.stat:
      path: "{{ backup_dir }}/rsyslog.conf.backup"
    register: backup_stat
    tags: [restore]

  - name: "Restore - Overwrite with original"
    ansible.builtin.copy:
      src: "{{ backup_dir }}/rsyslog.conf.backup"
      dest: "{{ config_file }}"
      remote_src: true
    when: "backup_stat.stat.exists | default(false)"
    failed_when: false
    tags: [restore]

  - name: "Restore - Remove backup directory"
    ansible.builtin.file:
      path: "{{ backup_dir }}"
      state: absent
    failed_when: false
    tags: [restore]
