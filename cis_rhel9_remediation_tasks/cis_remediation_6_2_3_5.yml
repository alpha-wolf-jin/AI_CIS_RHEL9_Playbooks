- name: Initialize meta data variables
  include_vars: cis_remediation_var_6_2_3_5.yml

- name: "Snapshot - Create backup directory"
  ansible.builtin.file:
    path: "{{ backup_dir }}"
    state: directory
    mode: '0700'
  tags: [snapshot]
- name: "Snapshot - Check if config file exists"
  ansible.builtin.stat:
    path: "{{ config_file }}"
  register: config_stat
  tags: [snapshot]
- name: "Snapshot - Backup config file if exists"
  ansible.builtin.copy:
    src: "{{ config_file }}"
    dest: "{{ backup_dir }}/rsyslog.conf.backup"
    remote_src: true
  when: "config_stat.stat.exists | default(false)"
  tags: [snapshot]

