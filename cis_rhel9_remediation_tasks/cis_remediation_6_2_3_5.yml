    ansible.builtin.package_facts:
      manager: auto
    failed_when: false
    tags: [execute]

  - name: "Req 01 - Set skip fact if rsyslog is not installed"
    ansible.builtin.set_fact:
      playbook_skipped: "{{ 'rsyslog' not in ansible_facts.packages }}"
    tags: [execute]

  - name: "Req 01 - Check if rsyslogd binary exists"
    ansible.builtin.stat:
      path: /usr/sbin/rsyslogd
    register: rsyslogd_bin_stat
    failed_when: false
    when: "not playbook_skipped | bool"
    tags: [execute]

  - name: "Req 01 - Store prerequisite check details"
    ansible.builtin.set_fact:
      task_01_name: "Check rsyslogd binary existence"
      task_01_cmd: "stat /usr/sbin/rsyslogd"
      task_01_rc: "{{ 0 if (rsyslogd_bin_stat.stat.exists | default(false)) else 1 }}"
      data_01: "{{ '/usr/sbin/rsyslogd' if (rsyslogd_bin_stat.stat.exists | default(false)) else 'Not found' }}"
      status_01: "{{ 'PASS' if (rsyslogd_bin_stat.stat.exists | default(false)) else 'FAIL' }}"
      details_01: "{{ 'rsyslogd binary found' if (rsyslogd_bin_stat.stat.exists | default(false)) else 'rsyslogd binary not found' }}"
    when: "not playbook_skipped | bool"
    tags: [execute]

  - name: "Req 02 - Add *.emerg configuration"
